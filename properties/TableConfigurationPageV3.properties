firstCheckBoxOnPopup= [css]:#column-options-label+div div[role=option]:first-child
subTypeCheckBox =[css]:#column-options-label+div div[role=option]:nth-child(3) label span+span
typeCheckBox =[css]:#column-options-label+div div[role=option]:nth-child(4) label span+span
storeNumber = [id]:storeNumber
nameColumnCheckbox = [xpath]://label[@for='name']
