resettodefault = [xpath]:(//h4[@id='column-options-label']//following-sibling::div//button[contains(@class,'vn-reset-to-default-button')])
selectColumnToDisplay=[xpath]://*[@id='column-options']//ul//*[contains(text(),'%s')]

selectedCheckBoxesOnPopupAfterDeselect = [css]:#column-options-label+div div[role=option] input[aria-checked=true]
