com.hp.ns.wxp.holdingtankuser.mail.bod.line2 = HP Premium/Premium+ Support vous permet d’identifier les problèmes susceptibles de causer des pannes matérielles sur votre PC. En cas de détection d’un problème, une alerte s’affichera automatiquement sur votre appareil, et vous aurez la possibilité de demander directement une assistance matérielle depuis votre PC. Les clients qui souhaitent gérer de manière centralisée la maintenance et le support des appareils pour leurs utilisateurs finaux peuvent le faire via un portail optionnel disponible sur HP Workforce Experience Platform.
com.hp.ns.wxp.holdingtankuser.mail.bod.line3 = Notez que l'agent HP Insights doit être installé pour que la détection proactive et les alertes en libre-service fonctionnent correctement. S’il ne s’installe pas automatiquement ou si vous souhaitez vérifier l’installation sur votre ou vos appareils, suivez les instructions dans :
