com.hp.ns.wxp.holdingtankuser.mail.bod.line2 = HP Premium/Premium+ Support contribuisce a rilevare i problemi che possono portare a interruzioni e guasti dell'hardware del PC. Quando viene rilevato un problema, la soluzione mostra automaticamente un avviso sul dispositivo e offre la possibilità di richiedere l'assistenza per l'hardware direttamente dal PC. I clienti che desiderano gestire centralmente la manutenzione e l'assistenza per i loro utenti finali possono utilizzare un portale opzionale in HP Workforce Experience Platform.
com.hp.ns.wxp.holdingtankuser.mail.bod.line3 = È necessario che sia installato l'agente HP Insights affinché il rilevamento proattivo e gli avvisi self-service funzionino correttamente. Se non è stato installato automaticamente, o se volete verificare l'installazione sul dispositivo in uso, seguite le istruzioni in:
