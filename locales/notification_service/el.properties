com.hp.ns.daas.pcdeviceingestor.mail.bod.greeting = Αγαπητέ πελάτη,
com.hp.ns.daas.pcdeviceingestor.mail.bod.line1 = Σας ευχαριστούμε γα τη αγορά του <b>HP Premium+ Support ή του HP Active Care</b>.
com.hp.ns.daas.pcdeviceingestor.mail.bod.line14 = <b>Μάθετε περισσότερα στη διεύθυνση </b><a href={0} style="text-decoration:underline; color:#027AAE"><b>hp.com/premium-plus</b></a>
com.hp.ns.daas.pcdeviceingestor.mail.bod.line2 = Η HP Premium+ Support και το HP Active Care σας βοηθούν να αποφύγετε καταστροφικές βλάβες της μονάδας δίσκου και της μπαταρίας, προειδοποιώντας σας με αναδυόμενες ειδοποιήσεις στον υπολογιστή σας και επιτρέποντάς σας να ζητήσετε επισκευή απευθείας από τον υπολογιστή σας. Οι μεγαλύτεροι πελάτες που επιθυμούν να διαχειρίζονται κεντρικά τη συντήρηση των συσκευών μπορούν να ζητήσουν ένα προαιρετικό <a href={0} style="text-decoration-line: none; color:#027AAE">πίνακα εργαλείων</a>.
com.hp.ns.daas.pcdeviceingestor.mail.bod.line3 = Για να ξεκινήσετε, ακολουθήστε τα βήματα σε αυτόν τον σύντομο <a href={0} style="text-decoration-line: none; color:#027AAE"> Γρήγορο οδηγό εισαγωγής</a>. Οι συσκευές στις οποίες έχει εγκατασταθεί ο πράκτορας HP Insights θα αρχίσουν να λαμβάνουν την αξία που παρέχει η υπηρεσία. Για λεπτομέρειες, διαβάστε τον Γρήγορο οδηγό εισαγωγής.
com.hp.ns.daas.pcdeviceingestor.mail.bod.regards.line1 = Με εκτίμηση.
com.hp.ns.daas.pcdeviceingestor.mail.copyright = <b>Copyright {0} HP Development Company, L.P. Οι πληροφορίες που περιέχονται στο παρόν έγγραφο μπορεί να αλλάξουν χωρίς προειδοποίηση. Οι μοναδικές εγγυήσεις για τα προϊόντα και τις υπηρεσίες της ΗΡ είναι αυτές που ορίζονται στις ρητές δηλώσεις εγγύησης που συνοδεύουν αυτά τα προϊόντα και τις υπηρεσίες. Τίποτα από όσα αναφέρονται στο παρόν δεν πρέπει να εκληφθεί ως πρόσθετη εγγύηση. Η HP δεν φέρει ευθύνη για τεχνικά ή συντακτικά σφάλματα ή παραλείψεις του παρόντος.</b>
