com.hp.ns.wxp.holdingtankuser.mail.bod.line2 = O HP Premium/Premium+ Support ajuda a detetar problemas que podem levar a falhas e interrupções no hardware do PC. Quando um problema é detetado, é automaticamente apresentado um alerta no seu dispositivo, com a opção de pedir suporte de hardware diretamente a partir do seu PC. Os clientes que pretendam gerir de forma centralizada a manutenção e o suporte de dispositivos para os seus utilizadores finais podem geri-los através de um portal opcional na HP Workforce Experience Platform.
com.hp.ns.wxp.holdingtankuser.mail.bod.line3 = Tenha em conta que o agente HP Insights tem de estar instalado para a deteção proativa e alertas de self-service para funcionar adequadamente. Se não estiver instalado automaticamente ou para verificar a instalação no(s) seu(s) dispositivo(s), siga as instruções em:
