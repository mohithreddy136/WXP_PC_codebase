com.hp.ns.daas.pcdeviceingestor.mail.bod.greeting = Szanowny Kliencie,
com.hp.ns.daas.pcdeviceingestor.mail.bod.line1 = Dziękujemy za zakup usługi <b>HP Premium+ Support lub HP Active Care</b>.
com.hp.ns.daas.pcdeviceingestor.mail.bod.line14 = <b>Dowiedz się więcej na stronie </b><a href={0} style="text-decoration:underline; color:#027AAE"><b>hp.com/premium-plus</b></a>
com.hp.ns.daas.pcdeviceingestor.mail.bod.line2 = Usługi HP Premium+ Support i HP Active Care pomagają uniknąć katastrofalnych w skutkach awarii dysku twardego i baterii poprzez informowanie za pomocą wyskakującego okienka na Twoim komputerze i umożliwienie Ci złożenie zapytania o naprawę bezpośrednio z Twojego komputera. Więksi klienci, którzy chcieliby scentralizować zarządzanie konserwacją urządzeń mogą zapytać o opcjonalny <a href={0} style="text-decoration-line: none; color:#027AAE">pulpit</a>.
com.hp.ns.daas.pcdeviceingestor.mail.bod.line3 = Aby rozpocząć wykonaj czynności opisane w tym krótkim <a href={0} style=”text-decoration-line: none; color:#027AAE"> Szybkim przewodniku wdrożenia</a>. Urządzenia z zainstalowanym oprogramowaniem HP Insights będą czerpać korzyści oferowanych przez usługę. Więcej szczegółów można znaleźć w Szybkim przewodniku wdrożenia.
com.hp.ns.daas.pcdeviceingestor.mail.bod.regards.line1 = Z poważaniem
com.hp.ns.daas.pcdeviceingestor.mail.copyright = <b>Copyright {0} HP Development Company, L.P. Informacje zawarte w niniejszej broszurze mogą ulec zmianie bez uprzedzenia. Jedyne gwarancje na produkty i usługi HP są określone w stosownych wyraźnych oświadczeniach gwarancyjnych towarzyszących tym produktom i usługom. Żadnych z podanych w niniejszej broszurze informacji nie należy interpretować jako dodatkowych gwarancji. HP nie ponosi odpowiedzialności za błędy techniczne i wydawnicze ani za pominięcia, jakie mogą wystąpić w niniejszej broszurze.</b>
com.hp.ns.daas.pcdeviceingestor.mail.disclaimer = Wyłączenie odpowiedzialności
