com.hp.ns.wxp.activecare.activation.mail.bod.line1 = Dziękujemy za zakup usługi HP Premium/Premium+ Support!
com.hp.ns.wxp.activecare.activation.mail.bod.line2 = Na Twoim koncie zarejestrowano po raz pierwszy urządzenie z usługą HP Premium/Premium+ Support.
com.hp.ns.wxp.activecare.activation.mail.bod.line3 = Usługi HP Premium/Premium+ Support pomagają wykrywać problemy, które mogą prowadzić do awarii i przerw w działaniu sprzętu komputerowego. W momencie rozpoznania problemu, na Twoim urządzeniu wyświetli się automatycznie powiadomienie z opcją złożenia zapytania o sprzętowe wsparcie techniczne bezpośrednio z Twojego komputera.
com.hp.ns.wxp.activecare.activation.mail.bod.line4 = Klienci, którzy chcieliby zarządzać konserwacją urządzeń i wsparciem dla swoich użytkowników końcowych w sposób scentralizowany, mogą skorzystać z opcjonalnego portalu na platformie HP Workforce Experience Platform.
com.hp.ns.wxp.activecare.activation.mail.bod.line5 = Pamiętaj, że agent HP Insights musi być zainstalowany, aby proaktywne wykrywanie i samoobsługowe alerty działały prawidłowo. Jeśli nie zostanie on zainstalowany automatycznie lub w celu zweryfikowania instalacji na urządzeniu (urządzeniach), postępuj zgodnie z instrukcjami w sekcji:
