com.hp.ns.workforce.migration.body1 = أخبار مثيرة لعملاء TechPulse مثلك: تجربتك على وشك التغيّر. في غضون الأسابيع القليلة المقبلة، سيكون لديك إمكانية الوصول إلى {0}، وهي واجهة جديدة تسمح لك بالتفاعل مع منتجات HP وخدماتها وحلولها.
com.hp.ns.workforce.migration.body2 = توفر {0} لمسؤولي تكنولوجيا المعلومات إمكانية الوصول المركزي وإمكانات الخدمة الذاتية، بما في ذلك الوصول المباشر إلى تجربة الخدمة الخاصة بك، ووظائف إدارة تكنولوجيا المعلومات، وذكاء الجهاز القابل للتنفيذ. ولمساعدتك على توفير أفضل التجارب الممكنة لموظفيك، فإنها ترسل إشعارات قابلة للتنفيذ وتوصيات علاجية، مستفيدةً من الرؤى لاتخاذ قرارات أفضل.
com.hp.ns.workforce.migration.body3 = تساعدك الأدوات والواجهات المرنة، التي تم تحسينها لتلبية احتياجات إدارة تكنولوجيا المعلومات، في الوصول إلى المعلومات التي تحتاجها بسرعة أكبر.
