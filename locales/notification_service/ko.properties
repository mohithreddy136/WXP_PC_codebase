com.hp.ns.wxp.holdingtankuser.mail.bod.line2 = HP Premium/Premium+ Support는 PC 하드웨어 장애 및 중단을 초래할 수 있는 문제를 감지하는 데 도움을 줍니다. 문제가 감지되면 장치에 자동으로 경고가 표시되며, PC에서 바로 하드웨어 지원을 요청할 수 있는 옵션도 제공됩니다. 장치 유지 관리 및 최종 사용자 지원을 중앙에서 관리하려는 고객은 선택 사항인 HP Workforce Experience Platform의 포털을 사용하여 관리할 수 있습니다.
com.hp.ns.wxp.holdingtankuser.mail.bod.line3 = 사전 감지와 자체 서비스 경고가 올바르게 동작하려면 HP Insights 에이전트가 설치되어 있어야 합니다. 만약 자동 설치되지 않거나 장치에서 설치 여부를 확인하려면 다음 안내를 따르십시오.
com.hp.ns.wxp.holdingtankuser.mail.bod.line4 = 시작하려면 다음 단계를 따르십시오.
com.hp.ns.wxp.holdingtankuser.mail.bod.regards.line1 = 감사합니다.
