com.hp.ns.wxp.platform.invite.org.body2.bullet1 = 최신 엔드포인트 관리와 실시간 인사이트로 <b>직원 생산성 강화</b>
com.hp.ns.wxp.platform.invite.org.body2.bullet2 = 일상 작업을 자동화하고, 빠르게 문제를 해결하고, 지원 시간과 운영 비용을 절감해 <b>IT 운영을 간소화</b>
com.hp.ns.wxp.platform.invite.org.body2.bullet3 = 데이터 중심 의사 결정으로 <b>비용 최적화</b>
com.hp.ns.wxp.platform.invite.org.body2.bullet4 = Pulse 설문조사에서 얻은 실행 가능한 인사이트로 <b>직원 정서 개선</b>
