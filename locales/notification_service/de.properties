com.hp.ns.daas.pcdeviceingestor.mail.bod.line1 = Vielen Dank, dass Sie sich für <b>HP Premium+ Support oder HP Active Care</b> entschieden haben.
com.hp.ns.daas.pcdeviceingestor.mail.bod.line14 = <b>Weitere Informationen finden Sie unter </b><a href={0} style="text-decoration:underline; color:#027AAE"><b>hp.com/premium-plus</b></a>
