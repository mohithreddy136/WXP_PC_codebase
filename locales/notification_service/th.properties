com.hp.ns.wxp.holdingtankuser.mail.bod.line2 = HP Premium/Premium+ Support จะช่วยตรวจจับปัญหาที่อาจทำให้ฮาร์ดแวร์ของพีซีขัดข้องหรือหยุดชะงักได้ เมื่อตรวจพบปัญหาแล้ว ระบบจะแสดงการแจ้งเตือนขึ้นในอุปกรณ์ของคุณ พร้อมเสนอตัวเลือกในขอรับการสนับสนุนด้านฮาร์ดแวร์จากพีซีของคุณโดยตรง ลูกค้าที่ประสงค์จะจัดการกับการบำรุงรักษาและการสนับสนุนอุปกรณ์สำหรับผู้ใช้ปลายทางแบบรวมศูนย์ สามารถจัดการกับความประสงค์นี้ได้โดยใช้พอร์ทัลเสริมใน HP Workforce Experience Platform
com.hp.ns.wxp.holdingtankuser.mail.bod.line3 = โปรดทราบว่า คุณต้องติดตั้งเอเจนต์ HP Insights เพื่อการตรวจจับเชิงรุก และการแจ้งเตือนด้วยตนเองเพื่อให้สามารถทำงานได้อย่างถูกต้อง หากไม่ได้ติดตั้งเอเจนต์นี้โดยอัตโนมัติ หรือต้องการตรวจสอบยืนยันการติดตั้งในอุปกรณ์ของคุณ ให้ปฏิบัติตามคำแนะนำใน:
