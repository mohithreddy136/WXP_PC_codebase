com.hp.ns.wxp.holdingtankuser.mail.bod.line2 = HP Premium/Premium+ Support hjælper med at opdage problemer, som kan føre til pc-hardwarefejl og afbrydelser. Når et problem opdages, vises der automatisk en advarsel på din enhed med mulighed for at anmode om hardwaresupport direkte fra din pc. Kunder, der ønsker at administrere vedligeholdelse af enheder og support til deres slutbrugere centralt, kan administrere disse ved hjælp af en valgfri portal i HP Workforce Experience Platform.
com.hp.ns.wxp.holdingtankuser.mail.bod.line3 = Bemærk, at HP Insights-agenten skal være installeret, for at proaktiv detektering og selvbetjeningsadvarsler kan fungere korrekt. Hvis dette ikke automatisk installeres, eller hvis du vil bekræfte installationen på dine enheder, så følg instruktionerne i:
