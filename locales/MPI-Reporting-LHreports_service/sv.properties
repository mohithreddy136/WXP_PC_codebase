mpi.report.common.cashdraweractivity = Kassalådans aktivitet
mpi.report.common.cashdraweractivity1 = 1. För varningstyper per kassalåda = öppettiden har överskridits.
mpi.report.common.cashdraweractivity2 = Kassalådor som visas på den här fliken har överskridit den konfigurerade tidsgränsen de kan vara öppna. Detta kan visa vårdslöshet och potentiellt misstänkt aktivitet för deras POS.
mpi.report.common.cashdraweractivity3 = 2. För varningstyper per kassalåda = kassalåda har öppnats manuellt.
mpi.report.common.cashdraweractivity4 = Kassalådor som visas på den här fliken öppnades manuellt utan att en POS-programvarutransaktion utlöste att kassan öppnades. Detta kan indikera en potentiell transaktion som äger rum utanför POS-programvaran eller en potentiell aktivitet som skapar förlust.
mpi.report.common.cashdraweractivity5 = 3. För varningstyper per kassalåda = öppnades under obehörig tid.
mpi.report.common.cashdraweractivity6 = Kassalådor som visas på den här fliken öppnades utanför de konfigurerade vanliga öppettiderna. Detta skulle indikera att en kassalåda var tillgänglig under en tid då den inte förväntades kunna nås vilket indikerar en potentiellt misstänkt händelse.
mpi.report.common.cashdraweractivitysub = 1. För varningstyper per kassalåda = öppettiden har överskridits. Kassalådor som visas på den här fliken har överskridit den konfigurerade tidsgränsen de kan vara öppna. Detta kan belysa vårdslöshet och potentiellt misstänkt aktivitet för respektive POS. 
2. För varningstyper per kassalåda = kassalåda har öppnats manuellt. Kassalådor som visas på den här fliken öppnades manuellt utan att en POS-programvarutransaktion utlöste att kassan öppnades. Detta kan indikera en potentiell transaktion som äger rum utanför POS-programvaran eller en potentiell aktivitet som skapar förlust. 
3. För varningstyper per kassalåda = obehörig händelse. Kassalådor som visas på den här fliken öppnades utanför de konfigurerade vanliga öppettiderna. Detta skulle indikera att en kassalåda var tillgänglig under en tid då den inte förväntades kunna nås vilket indikerar en potentiellt misstänkt händelse.
