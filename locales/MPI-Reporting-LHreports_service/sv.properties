label.report_option_description_hwperfcomparison_hwperfcompanyconfigdetails = Med hjälp av den här rapporten kan användare jämföra prestandan för enhetskonfigurationerna i flottan mot en uppsättning andra konfigurationer i samma flotta eller HPs TechPulse-prestandamått. Mätetalen för jämförelse är följande: Veckogenomsnitt för utnyttjande av CPU och minne, veckosiffror för blå kraschskärmsfel eller genomsnittstid för starter/avstängningar för en viss vecka. Avvikelserna från prestandamåtten utvärderas för statistisk betydelse och beständighet (dvs. antalet veckor i följd som ett mätetal överskrider prestandamåttet). Om flera enhetskonfigurationer har valts visas ett genomsnittligt mätetal för alla konfigurationer.
