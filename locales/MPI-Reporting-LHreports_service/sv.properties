label.report_option_additional_description_thermalgrade_details = Windows: \n Underhåll – Kontrollera blockeringar i ventiler och rengör enheten.\n OK – Ingen åtgärd krävs.\n \n MAC: \n Kritisk – Enhetens temperatur påverkar systemets prestanda avsevärt och enheten behöver kylas ned.\n Allvarlig – Hög temperatur i enheten. Fläktarna körs på maxhastighet och systemprestandan kan vara påverkad.\n Nominell – Temperaturen befinner sig inom normala gränser och inga åtgärder krävs.\n Ganska bra – Temperaturen är något förhöjd, fläktarna kan höras.\n 
