mpi.report.column.graph.diskcap.graph.summary.text.description = Planeringsrapporten för diskkapacitet meddelar på förhand hur mycket tid som är kvar innan diskutrymmet når en förbestämd tröskel. Trösklarna går att välja i rapportfiltren och definieras som 0–10 %, 0–20 %, 0–30 %, 0–40 % och 0–50 %.
mpi.report.column.graph.diskcap.graph.summary.text.status = Rapporten använder data för de senaste 3–6 månaderna för att avgöra hur mycket tid som återstår innan diskkapaciteten når tröskelvärdet som angavs i rapportfiltret. De främsta kategoriseringsnivåerna för status för diskutrymme är följande:
mpi.report.column.graph.diskcap.graph.summary.text.status.first = Omedelbart. Det återstående diskutrymmet har nått tröskelvärdet
mpi.report.column.graph.diskcap.graph.summary.text.status.five = OK. Diskutrymmet kan vara OK för åtminstone de kommande 1, 2 eller 3 månaderna beroende på informationen i kolumnen för ytterligare status. 
mpi.report.column.graph.diskcap.graph.summary.text.status.four = Inom 3 månader. Diskutrymmet kommer att nå tröskelvärdet inom 3 månader
mpi.report.column.graph.diskcap.graph.summary.text.status.second = Inom 1 månad. Diskutrymmet kommer att nå tröskelvärdet inom 1 månad
mpi.report.column.graph.diskcap.graph.summary.text.status.seven = Ej tillämpligt. Diskutrymmet är OK just nu, men det finns inte tillräckligt med data för att fastställa hur mycket tid som återstår innan disken når tröskelvärdet
mpi.report.column.graph.diskcap.graph.summary.text.status.six = Om kolumnen för ytterligare status visar:
mpi.report.column.graph.diskcap.graph.summary.text.status.six.sub.first = 1+, then the disk space is OK for at least 1 month
mpi.report.column.graph.diskcap.graph.summary.text.status.six.sub.second = 2+, then the disk space is OK for at least 2 months
mpi.report.column.graph.diskcap.graph.summary.text.status.six.sub.third = 3+, then the disk space is OK for at least 3 months
mpi.report.column.graph.diskcap.graph.summary.text.status.third = Inom 2 månader. Diskutrymmet kommer att nå tröskelvärdet inom 2 månader
