mpi.report.column.graph.usermob.graph.summary.text.description = Användares mobilitetsaspekter baserat på deras enheters geografiska plats.
mpi.report.column.graph.usermob.graph.summary.text.status = Användarens mobilitetsfaktor under en viss period är baserad på flera komplicerade mobila beteendemönster. Till exempel reser ständigt en del användare med samma eller olika enheter i olika format till olika platser, medan vissa ofta reser fram och tillbaka med sina enheter mellan två eller tre platser, och ytterligare andra ständigt rör sig korta avstånd med sina enheter. Till användares mobilitetsfaktor används den geografiska platsen för användares enheter som är registrerade för HP TechPulse Analytics och Proactive Management, till skillnad från användares plats från externa källor.
mpi.report.column.graph.usermob.graph.summary.text.status.first = De platsbaserade tjänsterna för att spåra enheters geografiska plats är som standard inaktiverade för alla kunder, och kunderna erbjuds alternativet att aktivera eller inaktivera tjänsterna i den molnbaserade portalen för HP TechPulse Analytics och Proactive Management. Även om platsbaserade tjänster är aktiverade tillåter inte HP TechPulse Analytics och Proactive Management att platsinformation för enheter samlas in för enheter som är klassificerade som ägda av anställda eller personliga enheter (inom den molnbaserade portalen för HP TechPulse Analytics och Proactive Management).
mpi.report.column.graph.usermob.graph.summary.text.status.forth = Due to the monthly scheduled execution, users and devices that were enrolled or unenrolled in HP TechPulse Analytics and Proactive Management after the last scheduled execution, will not appear in this report.
mpi.report.column.graph.usermob.graph.summary.text.status.second = Användarens mobilitetsfaktor är en gradering på en skala mellan 1 och 10 och är en relativ gradering för alla enheter inom områdena analys och proaktiv hantering. Graderingen 1 indikerar att en användares enhet är minst mobil och graderingen 10 indikerar att en användares enhet är mest mobil. Graderingen -1 indikerar att det inte finns någon platsinformation från användarens enheter.
mpi.report.column.graph.usermob.graph.summary.text.status.third = Analysen av användarens mobilitetsfaktor har schemalagts att köras periodvis en gång i början av varje månad. Det senaste schemalagda utförandet var:
