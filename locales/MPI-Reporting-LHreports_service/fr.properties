mpi.report.common.cashdraweractivity = Activité du tiroir-caisse
mpi.report.common.cashdraweractivity1 = 1. Pour le type d’alerte Tiroir-caisse = Durée d’ouverture dépassée.
mpi.report.common.cashdraweractivity2 = Les tiroirs-caisses affichés dans cet onglet ont dépassé leur seuil de durée d’ouverture configuré. Cette information peut indiquer une négligence ou une activité potentiellement suspecte dans la ligne PDV.
mpi.report.common.cashdraweractivity3 = 2. Pour le type d’alerte Tiroir-caisse = Ouverture manuelle du tiroir-caisse.
mpi.report.common.cashdraweractivity4 = Les tiroirs-caisses affichés dans cet onglet ont été ouverts manuellement sans transaction du logiciel PDV déclenchant l’ouverture. Cette information peut indiquer une transaction potentielle ayant lieu en dehors du cadre du logiciel PDV ou une activité de perte potentielle.
mpi.report.common.cashdraweractivity5 = 3. Pour le type d’alerte Tiroir-caisse = Ouverture durant les heures non autorisées.
mpi.report.common.cashdraweractivity6 = Les tiroirs-caisses affichés dans cet onglet ont été ouverts en dehors des heures de fonctionnement standard configurées. Cette information indique qu’un tiroir-caisse a fait l’objet d’un accès à un moment où cela était inattendu, indiquant un événement potentiellement suspect.
mpi.report.common.cashdraweractivitysub = 1. Pour le type d’alerte Tiroir-caisse = Durée d’ouverture dépassée. Les tiroirs-caisses affichés dans cet onglet ont dépassé leur seuil de durée d’ouverture configuré. Cette information peut indiquer une négligence ou une activité potentiellement suspecte dans la ligne PDV. 
2. Pour le type d’alerte Tiroir-caisse = Ouverture manuelle du tiroir-caisse. Les tiroirs-caisses affichés dans cet onglet ont été ouverts manuellement sans transaction du logiciel PDV déclenchant l’ouverture. Cette information indique une transaction potentielle ayant lieu en dehors du cadre du logiciel PDV ou une activité de perte potentielle. 
3. Pour le type d’alerte Tiroir-caisse = Événement non autorisé. Les tiroirs-caisses affichés dans cet onglet ont été ouverts en dehors des heures de fonctionnement standard configurées. Cette information indique qu’un tiroir-caisse a fait l’objet d’un accès à un moment où cela était inattendu, indiquant un événement potentiellement suspect.
