label.report_option_description_valueReminderEmail_details = Ce rapport indique la performance hebdomadaire d'une société basée sur les domaines suivants : productivité, sécurité, état d’intégrité du périphérique et adoption. Le rapport peut être planifié comme un courriel de rappel, qui donne une mise à jour périodique de l’état de performance d’une société par rapport à la moyenne TechPulse, et qui indique quel domaine doit être amélioré.
