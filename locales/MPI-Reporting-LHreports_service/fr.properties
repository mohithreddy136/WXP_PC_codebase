mpi.report.common.unknownusbdevicesubheading = Cet onglet met en évidence tout périphérique USB qui n’est pas configuré pour être connecté à l’unité de base et qui est donc inconnu et inattendu. Les périphériques affichés peuvent ne pas être autorisés ou peuvent souligner une menace de sécurité potentielle.
