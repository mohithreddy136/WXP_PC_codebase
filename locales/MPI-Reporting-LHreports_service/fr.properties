mpi.report.common.msrmaintenance = Maintenance MSR
mpi.report.common.msrsubmaintenance = Voici la liste des lecteurs de cartes magnétiques ayant atteint un incrément d’utilisation pour les lectures réussies. Le nettoyage du lecteur est recommandé. Pour ce faire, les débris doivent être nettoyés dans le connecteur de carte pour permettre une bonne performance continue du lecteur.
mpi.report.common.network.outages.details = Détails des déconnexions réseau
mpi.report.common.peripheralclaimingerrors = Erreurs de revendication du périphérique
mpi.report.common.peripheralclaimingerrorssubheading = Les périphériques illustrés dans cet onglet rencontrent des problèmes avec les statistiques des périphériques collectées à cause de raisons diverses mises en évidence dans le tableau ci-dessous. Cela inclut les conflits de revendication de périphérique avec un logiciel point de vente, de configuration correcte de HP Peripheral Agent, et plus encore.
mpi.report.common.peripheralmodeldetails = Fabricant et modèle du périphérique
mpi.report.common.peripheralthresholdmet = Seuil du périphérique atteint
mpi.report.common.peripheralthresholdmetsubheading = Cet onglet met en évidence les dispositifs (scanneurs, lecteurs de carte magnétique et imprimantes de reçus) qui ont dépassé leur seuil d’utilisation et de durée de vie attendu, ce qui indique que le dispositif présente un risque plus élevé de défaillance en raison de son ancienneté. Qu’il s’agisse d’extraire des données d’une classe de données de journaux ou d’un rapport de seuil établi, la solution la plus simple est adaptée. En fin de compte, il s’agit des mêmes données.
mpi.report.common.printerheadmaintenance = Voici la liste des imprimantes de reçus ayant atteint un incrément d’utilisation pour les lignes imprimées. La maintenance de la tête d’impression est recommandée. Pour ce faire, le nettoyage de la tête d’impression de l’imprimante est requis pour obtenir des impressions de haute qualité.
mpi.report.common.printerknifecutmaintenance = Voici la liste des imprimantes de reçus ayant atteint un incrément d’utilisation pour les découpes par lame. L’inspection et la maintenance de la lame de l’imprimante sont recommandées selon les besoins. Pour ce faire, vous devez vérifier que la lame de l’imprimante est suffisamment aiguisée pour couper facilement les reçus. L’aiguisage et le remplacement doivent se faire selon les besoins.
