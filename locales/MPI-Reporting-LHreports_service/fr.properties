label.report_option_description_win10hwcomp_details = Le rapport d'évaluation Windows 10 montre l’état de compatibilité matérielle de Windows 10 des périphériques, afin de déterminer si un périphérique prend en charge la migration ou la mise à niveau vers le système d'exploitation Windows 10, ou si une mise à niveau ou un remplacement du matériel est requis. Ce rapport s'appuie sur les données disponibles concernant les périphériques non-Windows 10 du parc.
