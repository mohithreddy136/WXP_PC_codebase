label.report_option_additional_description_batteryStatRiskFact_batteryRepAndRiskFact = Pour de plus amples informations sur l’optimisation de la longévité et de l’état de santé de la batterie, veuillez consulter le site : <a href='https://support.hp.com/us-en/document/ish_4034543-1660469-16'>https://support.hp.com/us-en/document/ish_4034543-1660469-16</a>.
label.report_option_additional_description_batterySwellProb_details = This report contains a list of HP devices that have been identified as having a high probability of swelling. These devices should be evaluated for any visual signs of swelling, and we recommend ensuring that the Battery Health Management (BHM) setting in the BIOS are set to Maximize My Battery Health.
label.report_option_additional_description_batteryUsageOpt_batteryRepAndRiskFact = For more information on how to optimize battery health and longevity, please visit: <a href='https://support.hp.com/us-en/document/c01297640' >https://support.hp.com/us-en/document/c01297640</a> .
label.report_option_additional_description_batteryUsageOpt_details = Pour de plus amples informations sur l’optimisation de la longévité et de l’état de santé de la batterie, veuillez consulter le site : <a href='https://support.hp.com/us-en/document/c01297640' >https://support.hp.com/us-en/document/c01297640</a> . \nVeuillez sélectionner le pays/la région dans la page de l’Assistance HP pour afficher l'article dans votre pays et votre langue préférés.
label.report_option_additional_description_devicecomp = Les périphériques Android et iOS sont considérés comme étant corrompus s’ils ont été rootés ou jailbreakés. Les périphériques Windows sont considérés comme étant corrompus si l'une des stratégies de sécurité configurée n’est pas conforme.
label.report_option_additional_description_devicecomp_details = Les périphériques Android et iOS sont considérés comme étant corrompus s’ils ont été rootés ou jailbreakés. Les périphériques Windows sont considérés comme étant corrompus si l'une des stratégies de sécurité configurée n’est pas conforme.
label.report_option_additional_description_softuti = <b>Les principales applications utilisées activement</b> sont classées en fonction du nombre de périphériques utilisant une application sur le nombre total de périphériques.\n\n<b>Les principales applications par durée d’utilisation</b> sont classées en fonction du récapitulatif de la durée d’utilisation de l'application sur le nombre total de périphériques.\n\nDans le cas où plusieurs mois sont sélectionnés dans le filtre de rapport, les graphiques sont calculés comme la moyenne des ratios ci-dessus pour les mois concernés.
label.report_option_additional_description_softuti_summary = <b>Les principales applications utilisées activement</b> sont classées en fonction du nombre de périphériques utilisant une application sur le nombre total de périphériques.\n\n<b>Les principales applications par durée d’utilisation</b> sont classées en fonction du récapitulatif de la durée d’utilisation de l'application sur le nombre total de périphériques.\n\nDans le cas où plusieurs mois sont sélectionnés dans le filtre de rapport, les graphiques sont calculés comme la moyenne des ratios ci-dessus pour les mois concernés.
label.report_option_additional_description_thermalgrade_details = Windows : \n Maintenance - Vérifier le blocage des évents et nettoyer l’unité.\n Ok - Aucune action n'est requise.\n \n MAC : \n Critique - L'état thermique du périphérique impacte de manière significative la performance du système et le périphérique a besoin de refroidir.\n Sérieux - L’état thermique est élevé sur le périphérique. Les ventilateurs fonctionnent à vitesse maximale et les performances du système pourrait être affectées.\n Nominal - L’état thermique est dans la limite et aucune action corrective n'est nécessaire.\n Raisonnable - L'état thermique est légèrement surélevé, les ventilateurs peuvent être audibles.\n 
label.report_option_additional_description_thermalgradeV2_thermalGrading = Windows : \n Maintenance - Vérifier le blocage des ventilateurs et nettoyer l’unité.\n Ok - Aucune action n'est requise.\n \n MAC : \n Critique - L'état thermique du périphérique impacte de manière significative la performance du système, et le refroidissement est nécessaire pour le périphérique.\n Sérieux - L’état thermique est élevé sur le périphérique. Les ventilateurs fonctionnent à vitesse maximale et les performances du système pourrait être affectées.\n Nominal - L’état thermique est dans la limite et aucune action corrective n'est nécessaire.\n Raisonnable - L'état thermique est légèrement surélevé, les ventilateurs peuvent être audibles.\n
