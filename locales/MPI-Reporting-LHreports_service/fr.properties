label.report_option_description_softwareUpdates_msOfficeUpdates = Le rapport fournit des informations sur les mises à jour Office manquantes sur les périphériques, ainsi que le niveau de criticité de ces mises à jour. Un périphérique est classé dans la catégorie « Mises à jour critiques manquantes » s’il lui manque au minimum une mise à jour critique, même s’il lui manque simultanément d'autres types de mises à jour. Les périphériques auxquels il ne manque aucune mise à jour critique, mais auxquels il manque au moins une mise à jour importante, sont classés dans la catégorie « Mises à jour importantes manquantes » etc.
label.report_option_description_softwareUpdates_officeSummary = Le rapport fournit des informations détaillées sur les mises à jour Microsoft Office manquantes sur les périphériques, ainsi que le niveau de criticité de ces mises à jour. Un périphérique est classé dans la catégorie « Mises à jour critiques manquantes » s’il lui manque au minimum une mise à jour critique, même s’il lui manque simultanément d'autres types de mises à jour. Les périphériques auxquels il ne manque aucune mise à jour critique, mais auxquels il manque au moins une mise à jour importante, sont classés dans la catégorie « Mises à jour importantes manquantes » etc.
label.report_option_description_softwareUpdates_windowsSummary = Le rapport fournit des informations détaillées sur les mises à jour Windows manquantes sur les périphériques, ainsi que le niveau de criticité de ces mises à jour. Un périphérique est classé dans la catégorie « Mises à jour critiques manquantes » s’il lui manque au minimum une mise à jour critique, même s’il lui manque simultanément d'autres types de mises à jour. Les périphériques auxquels il ne manque aucune mise à jour critique, mais auxquels il manque au moins une mise à jour importante, sont classés dans la catégorie « Mises à jour importantes manquantes » etc.
