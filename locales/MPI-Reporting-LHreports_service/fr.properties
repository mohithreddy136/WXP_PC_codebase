mpi.report.column.graph.usermob.graph.summary.text.description = Les aspects de mobilité des utilisateurs en fonction de la géolocalisation de leur appareil.
mpi.report.column.graph.usermob.graph.summary.text.status = Le facteur de mobilité de l'utilisateur au cours d'une période de temps est basé sur des modèles de comportements mobiles multiples et complexes. Par exemple, certains utilisateurs voyagent constamment avec des appareils identiques ou différents, avec des facteurs de forme différents à des endroits différents, tandis que d'autres se déplacent fréquemment entre deux ou trois endroits avec leurs appareils, tandis que d'autres se déplacent constamment sur de courtes distances avec leurs appareils. Le facteur de mobilité de l'utilisateur exploite la géolocalisation de l'appareil de l'utilisateur pour les appareils enregistrés dans HP TechPulse Analytics and Proactive Management, par opposition à n'importe quel emplacement de l'utilisateur à partir de n'importe quelle source externe.
mpi.report.column.graph.usermob.graph.summary.text.status.first = Les services de géolocalisation pour le suivi de la géolocalisation des dispositifs sont désactivés par défaut pour tous les clients et une option est fournie aux clients pour activer ou désactiver les services de géolocalisation dans le portail HP TechPulse Analytics and Proactive Management. Même si les services de géolocalisation sont activés, HP TechPulse Analytics and Proactive Management ne permet pas la collecte de données de localisation des appareils classés comme appareils personnels ou appartenant aux employés (dans le portail sur le cloud HP TechPulse Analytics and Proactive Management).
mpi.report.column.graph.usermob.graph.summary.text.status.forth = Due to the monthly scheduled execution, users and devices that were enrolled or unenrolled in HP TechPulse Analytics and Proactive Management after the last scheduled execution, will not appear in this report.
mpi.report.column.graph.usermob.graph.summary.text.status.second = Le facteur de mobilité de l'utilisateur correspond à une notation entre 1 et 10 et représente un classement relatif pour tous les appareils dans le domaine de l'analyse et de la gestion proactive. Une notation de 1 indique que l'appareil d'un utilisateur est le moins mobile et une notation de 10 indique que l’appareil d'un utilisateur est le plus mobile. Une notation de -1 indique qu'il n'existe aucune donnée de localisation des appareils de l'utilisateur.
mpi.report.column.graph.usermob.graph.summary.text.status.third = L'analyse du Facteur mobilité utilisateur est planifiée pour être exécutée périodiquement une fois à chaque début de mois. La dernière exécution planifiée a eu lieu le :
