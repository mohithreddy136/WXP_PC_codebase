label.report_option_description_hwperfcomparison_hwperfcompanyconfigdetails = Le rapport permet aux utilisateurs de comparer les performances des configurations d'appareils de leur parc à un ensemble d'autres configurations du même parc ou des mêmes valeurs de référence TechPulse HP. Les métriques de comparaison sont : Les moyennes hebdomadaires d'utilisation du processeur et de la mémoire, le nombre hebdomadaire d'erreurs d'écran bleu ou la durée moyenne des démarrages/arrêts pour une semaine donnée. Les différences par rapport aux valeurs de référence sont évaluées en termes de signification statistique et de persistance (c'est-à-dire le nombre de semaines consécutives pendant lesquelles une mesure est plus grande que la valeur de référence). Dans le cas où plusieurs configurations de périphérique sont sélectionnées, les mesures sont moyennées entre les configurations.
label.report_option_description_hwperfcomparison_hwperfsummary = Le rapport permet aux utilisateurs de comparer les performances des configurations d'appareils de leur parc à un ensemble d'autres configurations du même parc ou des mêmes valeurs de référence TechPulse HP. Les métriques de comparaison sont : Les moyennes hebdomadaires d'utilisation du processeur et de la mémoire, le nombre hebdomadaire d'erreurs d'écran bleu ou la durée moyenne des démarrages/arrêts pour une semaine donnée. Les différences par rapport aux valeurs de référence sont évaluées en termes de signification statistique et de persistance (c'est-à-dire le nombre de semaines consécutives pendant lesquelles une mesure est plus grande que la valeur de référence). Dans le cas où plusieurs configurations de périphérique sont sélectionnées, les mesures sont moyennées entre les configurations.
label.report_option_description_hwperfcomparison_weeklyhwperfsummary = Le rapport permet aux utilisateurs de comparer les performances des configurations d'appareils de leur parc à un ensemble d'autres configurations du même parc ou des mêmes valeurs de référence TechPulse HP. Les métriques de comparaison sont : Les moyennes hebdomadaires d'utilisation du processeur et de la mémoire, le nombre hebdomadaire d'erreurs d'écran bleu ou la durée moyenne des démarrages/arrêts pour une semaine donnée. Les différences par rapport aux valeurs de référence sont évaluées en termes de signification statistique et de persistance (c'est-à-dire le nombre de semaines consécutives pendant lesquelles une mesure est plus grande que la valeur de référence). Dans le cas où plusieurs configurations de périphérique sont sélectionnées, les mesures sont moyennées entre les configurations.
