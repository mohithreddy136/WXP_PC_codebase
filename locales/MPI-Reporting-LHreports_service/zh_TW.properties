mpi.report.column.graph.diskcap.graph.summary.text.description = 磁碟容量規劃報告預測磁碟空間達到預定臨界值之前剩餘的時間長度。臨界值可在報告篩選器中選擇，並定義為 0-10%、0-20%、0-30%、0-40% 和 0-50%。
mpi.report.column.graph.diskcap.graph.summary.text.status = 該報告使用過去 3 至 6 個月的資料來判斷距離磁碟容量達到報告篩選器中設定的臨界值之前剩餘的時間。磁碟容量狀態的頂層分類如下:
mpi.report.column.graph.diskcap.graph.summary.text.status.first = 立即。剩餘磁碟空間已達到臨界值
mpi.report.column.graph.diskcap.graph.summary.text.status.five = 確定。根據「額外狀態」欄中的資訊，磁碟空間可能至少在接下來的 1、2 或 3 個月內都足夠使用。
mpi.report.column.graph.diskcap.graph.summary.text.status.four = 3 個月內。磁碟空間將在 3 個月內達到臨界值
mpi.report.column.graph.diskcap.graph.summary.text.status.second = 1 個月內。磁碟空間將在 1 個月內達到臨界值
mpi.report.column.graph.diskcap.graph.summary.text.status.seven = 不適用。目前磁碟空間仍足夠使用，但資料不足以預測磁碟空間達到臨界值之前的剩餘時間
mpi.report.column.graph.diskcap.graph.summary.text.status.six = 如果額外欄顯示:
mpi.report.column.graph.diskcap.graph.summary.text.status.six.sub.first = 1+, then the disk space is OK for at least 1 month
mpi.report.column.graph.diskcap.graph.summary.text.status.six.sub.second = 2+, then the disk space is OK for at least 2 months
mpi.report.column.graph.diskcap.graph.summary.text.status.six.sub.third = 3+, then the disk space is OK for at least 3 months
mpi.report.column.graph.diskcap.graph.summary.text.status.third = 2 個月內。磁碟空間將在 2 個月內達到臨界值
