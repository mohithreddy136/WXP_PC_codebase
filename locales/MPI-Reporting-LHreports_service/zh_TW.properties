label.report_option_additional_description_batteryStatRiskFact_batteryRepAndRiskFact = 如需有關如何最佳化電池健全狀況和壽命的詳細資訊，請造訪: <a href='https://support.hp.com/us-en/document/ish_4034543-1660469-16'>https://support.hp.com/us-en/document/ish_4034543-1660469-16</a>。
label.report_option_additional_description_batterySwellProb_details = This report contains a list of HP devices that have been identified as having a high probability of swelling. These devices should be evaluated for any visual signs of swelling, and we recommend ensuring that the Battery Health Management (BHM) setting in the BIOS are set to Maximize My Battery Health.
label.report_option_additional_description_batteryUsageOpt_batteryRepAndRiskFact = For more information on how to optimize battery health and longevity, please visit: <a href='https://support.hp.com/us-en/document/c01297640' >https://support.hp.com/us-en/document/c01297640</a> .
label.report_option_additional_description_batteryUsageOpt_details = 如需有關如何最佳化電池健全狀況和壽命的詳細資訊，請造訪: <a href='https://support.hp.com/us-en/document/c01297640' >https://support.hp.com/us-en/document/c01297640</a>。\n請在 HP 支援頁面中選取國家/地區，以使用您偏好的國家/地區和語言來查看文章。
label.report_option_additional_description_devicecomp = 若 Android 和 iOS 裝置各自取得最高權限和遭到破解，皆會被視為遭到入侵。若 Windows 裝置有任何設定的安全性原則不合規，則該裝置會被視為遭到入侵。
label.report_option_additional_description_devicecomp_details = 若 Android 和 iOS 裝置各自取得最高權限和遭到破解，皆會被視為遭到入侵。若 Windows 裝置有任何設定的安全性原則不合規，則該裝置會被視為遭到入侵。
label.report_option_additional_description_softuti = <b>最常主動使用的應用程式</b>是依照使用該應用程式的裝置數量/全部裝置數量來進行排名。\n\n<b>依使用時間排名的熱門應用程式</b>則是依照應用程式的總使用時間/全部裝置數量進行排名。\n\n當在報告篩選器中選取多個月份時，圖表將以這些月份的上述比率平均值進行計算。
label.report_option_additional_description_softuti_summary = <b>最常主動使用的應用程式</b>是依照使用該應用程式的裝置數量/全部裝置數量來進行排名。\n\n<b>依使用時間排名的熱門應用程式</b>則是依照應用程式的總使用時間/全部裝置數量進行排名。\n\n當在報告篩選器中選取多個月份時，圖表將以這些月份的上述比率平均值進行計算。
label.report_option_additional_description_thermalgrade_details = Windows: \n 維護 - 檢查通風口是否堵塞並清潔裝置。\n好的 - 無需採取動作。\n\n MAC: \n 重大 - 在裝置上的溫度狀態已嚴重影響系統效能，裝置需要降溫。\n嚴重 - 裝置上溫度狀態偏高。風扇以最大速度運轉，系統效能可能會受到影響。\n額定 - 溫度狀態處於正常範圍內，無需採取任何糾正措施。\n普通 - 溫度狀態略為升高，已可聽見風扇噪音。\n
label.report_option_additional_description_thermalgradeV2_thermalGrading = Windows: \n 維護 - 檢查通風口是否堵塞並清潔裝置。\n好的 - 無需採取動作。\n\n MAC: \n 重大 - 在裝置上的溫度狀態已嚴重影響系統效能，裝置需要降溫。\n嚴重 - 裝置上溫度狀態偏高。風扇以最大速度運轉，系統效能可能會受到影響。\n額定 - 溫度狀態處於正常範圍內，無需採取任何糾正措施。\n普通 - 溫度狀態略為升高，已可聽見風扇噪音。\n
