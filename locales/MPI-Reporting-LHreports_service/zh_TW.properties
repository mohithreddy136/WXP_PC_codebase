mpi.report.common.cashdraweractivity = 收銀機活動
mpi.report.common.cashdraweractivity1 = 1. 針對收銀機警示類型 = 超過打開時間。
mpi.report.common.cashdraweractivity2 = 此索引標籤中顯示的收銀機已超過其設定的打開時間臨界值。這將凸顯出其 POS 通道的疏忽和潛在可疑活動。
mpi.report.common.cashdraweractivity3 = 2. 針對收銀機警示類型 = 手動打開收銀機。
mpi.report.common.cashdraweractivity4 = 此索引標籤中顯示的收銀機為手動打開，而非透過 POS 軟體交易觸發所打開。這可能表示其並非 POS 軟體產生的交易，或存在潛在的損失風險。
mpi.report.common.cashdraweractivity5 = 3. 針對收銀機警示類型 = 未經授權的事件。
mpi.report.common.cashdraweractivity6 = 此索引標籤中顯示的收銀機是在設定的標準營業時間之外被打開的。這表示收銀機是在非預期使用時間內被打開，代表可能發生可疑事件。
mpi.report.common.cashdraweractivitysub = 1. 針對收銀機警示類型 = 超過打開時間。此索引標籤中顯示的收銀機已超過其設定的打開時間臨界值。這將凸顯出其 POS 通道的疏忽和潛在可疑活動。2. 針對收銀機警示類型 = 手動打開收銀機。此索引標籤中顯示的收銀機為手動打開，而非透過 POS 軟體交易觸發所打開。這可能表示其並非 POS 軟體產生的交易，或存在潛在的損失風險。3. 針對收銀機警示類型 = 未經授權的事件。此索引標籤中顯示的收銀機是在設定的標準營業時間之外被打開的。這表示收銀機是在非預期使用時間內被打開，代表可能發生可疑事件。
