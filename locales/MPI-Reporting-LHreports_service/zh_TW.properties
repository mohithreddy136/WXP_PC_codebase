mpi.report.common.peripheralclaimingerrors = 周邊設備權利要求錯誤
mpi.report.common.peripheralclaimingerrorssubheading = 此索引標籤中顯示的周邊設備因下表所列的各種原因，導致無法收集周邊裝置的統計資料。這包括與 POS 軟體的周邊設備權利要求衝突、HP Peripheral Agent 的正確設定問題，以及其他情況。
mpi.report.common.peripheralmodeldetails = 周邊設備製造商和型號
mpi.report.common.peripheralthresholdmet = 已達到周邊設備臨界值
mpi.report.common.peripheralthresholdmetsubheading = 此索引標籤會標示已超過預期使用壽命臨界值的周邊設備 (掃描器、磁條讀卡機及收據印表機)，表示該周邊裝置因使用年限而面臨較高的故障風險。無論是從記錄資料類別中擷取資料，還是從既有的臨界值報告中取得，就以最為方便的方式進行即可。最後都會得到相同的資料。
mpi.report.common.printerheadmaintenance = 這是列印行數已達到使用增量的收據印表機清單。建議對列印頭進行維修。這需要清潔印表機的列印頭，以確保高品質的輸出。
mpi.report.common.printerknifecutmaintenance = 這是刀切數已達到使用增量的收據印表機清單。建議視需要檢查和維修印表機裁切刀。這需要檢查印表機裁切刀是否仍足夠鋒利以順利裁切收據，並視需要進行磨刀或更換。
