label.report_option_description_hwperfcomparison_hwperfcompanyconfigdetails = 該報告讓使用者能將其機群的裝置組態效能與相同機群中的另一組組態或 HP TechPulse 基準進行比較。比較的指標是: 每週 CPU 與記憶體使用率平均值、每週藍色畫面錯誤次數，或指定週的啟動/關機平均時間。我們會評估與基準值之間的差異以呈現統計顯著性及持續性 (即某項指標連續超過基準值的週數)。若選擇了多個裝置組態，則會針對這些組態取得各項指標的平均值。
