mpi.report.column.graph.usermob.graph.summary.text.description = 基於使用者裝置地理位置的使用者行動性分析。
mpi.report.column.graph.usermob.graph.summary.text.status = 使用者在特定期間內的行動性因素，是以多種複雜的行動行為模式為根據。例如，有些使用者經常攜帶相同或不同型態的裝置到不同地點; 有些使用者則頻繁地在兩到三個地點之間往返; 還有些使用者則帶著裝置在短距離內持續移動。使用者行動性因素是基於已註冊於 HP TechPulse Analytics 與 Proactive Management 的裝置地理位置，而非來自任何外部來源的使用者位置。
mpi.report.column.graph.usermob.graph.summary.text.status.first = 用於追蹤裝置地理位置的定位服務已依預設對所有客戶關閉，並在雲端的 HP TechPulse Analytics 與 Proactive Management 入口網站中提供選項，讓客戶可自行啟用或停用該服務。即使啟用了定位服務，HP TechPulse Analytics 與 Proactive Management 也不會收集任何被分類為員工自有或個人裝置的定位資料 (位於雲端的 HP TechPulse Analytics 與 Proactive Management 入口網站內)。
mpi.report.column.graph.usermob.graph.summary.text.status.forth = Due to the monthly scheduled execution, users and devices that were enrolled or unenrolled in HP TechPulse Analytics and Proactive Management after the last scheduled execution, will not appear in this report.
mpi.report.column.graph.usermob.graph.summary.text.status.second = 使用者的行動性因素為 1 到 10 之間的排名，並且是在 Analytics 與 Proactive Management 中跨所有裝置的相對排名。排名第 1 表示使用者的裝置行動性最低，排名第 10 表示使用者的裝置行動性最高。排名為 -1 表示沒有來自使用者裝置的位置資料。
mpi.report.column.graph.usermob.graph.summary.text.status.third = 使用者行動性因素分析預定於每月初定期執行一次。上次排定的執行時間為:
