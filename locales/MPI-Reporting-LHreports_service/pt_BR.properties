label.report_option_description_valueReminderEmail_details = Este relatório indica o desempenho semanal de uma empresa com base nas áreas de Produtividade, Segurança, Integridade do dispositivo e Adoção. O relatório pode ser programado como um lembrete por e-mail que forneça uma atualização de status periódica de como está o desempenho de uma empresa em relação à média do TechPulse e indica que áreas estão precisando de melhorias.
