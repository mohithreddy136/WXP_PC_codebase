label.report_option_description_networkassmtV2_networkHealthAndOutages = O relatório Resumo da conectividade do dispositivo fornece um instantâneo das velocidades de conexão e qualidade do sinal Wi-Fi de dispositivos em sua frota em redes corporativas, domésticas e móveis, incluindo uma tendência de 7 dias de conexões de baixa velocidade (menos de 15 Mbps). Este relatório também mostra todos os drivers de placa de rede desatualizados em dispositivos em sua frota e, quando disponível, fornece um link para o driver atualizado para correção. Dispositivos com desconexões de rede serão exibidos com contagens semanais e mensais.
