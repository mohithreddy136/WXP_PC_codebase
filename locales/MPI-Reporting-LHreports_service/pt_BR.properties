label.report_option_description_softwareUpdates_msOfficeUpdates = O relatório fornece informações sobre as atualizações do Microsoft Office faltando nos dispositivos e o nível de importância dessas atualizações. Um dispositivo é classificado como "Sem atualizações críticas" caso esteja faltando pelo menos uma atualização crítica, mesmo que esteja,  ao mesmo tempo, sem outros tipos de atualização. Os dispositivos que não estejam sem nenhuma atualização crítica, mas que estejam sem ao menos uma atualização importante são classificados como "Sem atualizações importantes" e assim por diante.
label.report_option_description_softwareUpdates_officeSummary = O relatório fornece informações detalhadas sobre as atualizações do Microsoft Office faltando nos dispositivos e o nível de importância dessas atualizações. Um dispositivo é classificado como tendo "Atualizações críticas faltando" caso esteja sem, pelo menos, uma atualização crítica, mesmo que esteja, ao mesmo tempo, sem outros tipos de atualização. Os dispositivos que não estejam sem nenhuma atualização crítica, mas que estejam sem ao menos uma atualização importante são classificados como "Sem atualizações importantes" e assim por diante.
label.report_option_description_softwareUpdates_windowsSummary = O relatório fornece informações detalhadas sobre as atualizações do Microsoft Windows faltando nos dispositivos e o nível de importância dessas atualizações. Um dispositivo é classificado como tendo "Atualizações críticas faltando" caso esteja sem, pelo menos, uma atualização crítica, mesmo que esteja, ao mesmo tempo, sem outros tipos de atualização. Os dispositivos que não estejam sem nenhuma atualização crítica, mas que estejam sem ao menos uma atualização importante são classificados como "Sem atualizações importantes" e assim por diante.
label.report_option_description_softwareUpdates_windowsUpdates = O relatório fornece informações sobre as atualizações do Microsoft Windows faltando nos dispositivos e o nível de importância dessas atualizações. Um dispositivo é classificado como "Sem atualizações críticas" caso esteja faltando pelo menos uma atualização crítica, mesmo que esteja,  ao mesmo tempo, sem outros tipos de atualização. Os dispositivos que não estejam sem nenhuma atualização crítica, mas que estejam sem ao menos uma atualização importante são classificados como "Sem atualizações importantes" e assim por diante.
label.report_option_description_softwareUpdatesV2_microsoftOfficeUpdates = Esse relatório contém informações sobre os dispositivos com atualizações disponíveis para o Microsoft Windows e a classificação das atualizações segundo o Microsoft Update.
