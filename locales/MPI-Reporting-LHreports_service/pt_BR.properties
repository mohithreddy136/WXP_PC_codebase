label.report_option_description_win10hwcomp_details = O relatório de avaliação do Windows 10 mostra o status de compatibilidade de hardware do Windows 10 com dispositivos, para determinar se um dispositivo oferece suporte à migração ou atualização para o sistema operacional Windows 10 ou se um upgrade ou substituição de hardware pode ser necessária. Este relatório é baseado em dados disponíveis para dispositivos não Windows 10 na frota.
label.report_option_description_win11FleetReadiness_details = O relatório de Avaliação de prontidão do Windows 11 mostra o status atual de compatibilidade das frotas de computadores para dispositivos para determinar se um dispositivo dá suporte à migração ou atualização para o sistema operacional Windows 11 ou se uma atualização ou substituição de hardware pode ser necessária.
