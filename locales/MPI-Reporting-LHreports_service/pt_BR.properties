mpi.report.column.graph.usermob.graph.summary.text.description = Os aspectos de mobilidade dos usuários com base na geolocalização de seus dispositivos.
mpi.report.column.graph.usermob.graph.summary.text.status = O fator de mobilidade dos usuários durante um período de tempo baseia-se em diversos e complexos padrões de comportamentos móveis. Por exemplo, alguns usuários se locomovem com os mesmos ou com diferentes dispositivos de diversos tamanhos para lugares diferentes constantemente, outros se locomovem entre dois ou três lugares com bastante frequência com seus próprios dispositivos e outros percorrem constantemente distâncias curtas com seus dispositivos. O fator de mobilidade dos usuários utiliza a geolocalização dos dispositivos dos usuários, no caso de dispositivos registrados no Gerenciamento proativo e análise do HP TechPulse, em oposição à localização de qualquer usuário de quaisquer fontes externas.
mpi.report.column.graph.usermob.graph.summary.text.status.first = Os serviços baseados em localização, que rastreiam a geolocalização de dispositivos, ficam desativados por padrão para todos os clientes, e é disponibilizada aos clientes uma opção para habilitar ou desabilitar os serviços baseados em localização no portal de Gerenciamento proativo e análise do HP TechPulse baseado em nuvem. Até mesmo quando os serviços baseados em localização são habilitados, o gerenciamento proativo e análise do HP TechPulse não permite a coleta de dados de localização de dispositivo em nenhum dispositivo classificado como pessoal ou de propriedade do funcionário (dentro do portal de Gerenciamento proativo e análise do HP TechPulse baseado em nuvem).
mpi.report.column.graph.usermob.graph.summary.text.status.forth = Due to the monthly scheduled execution, users and devices that were enrolled or unenrolled in HP TechPulse Analytics and Proactive Management after the last scheduled execution, will not appear in this report.
mpi.report.column.graph.usermob.graph.summary.text.status.second = O fator de mobilidade do usuário é uma classificação de 1 a 10, e trata-se de classificar relativamente todos os dispositivos em análise e gerenciamento proativo. A classificação 1 indica que o dispositivo do usuário é o menos móvel, e a classificação 10 indica que o dispositivo do usuário é o mais móvel. A classificação -1 indica que não há dados de localização dos dispositivos do usuário.
mpi.report.column.graph.usermob.graph.summary.text.status.third = A análise do fator de mobilidade do usuário está agendada para ser realizada periodicamente uma vez no início de cada mês. A última execução agendada foi em:
