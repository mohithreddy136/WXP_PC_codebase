label.report_option_description_hwperfcomparison_hwperfcompanyconfigdetails = O relatório permite que os usuários comparem o desempenho das configurações do dispositivo em sua frota com um conjunto de outras configurações na mesma frota ou nos HP TechPulse Benchmarks. As métricas para comparação são: As médias semanais de utilização da CPU e da memória, número semanal de erros de tela azul ou tempo médio de inicializações/desligamentos de uma determinada semana. As diferenças dos benchmarks são avaliadas quanto à significância estatística e persistência (ou seja, o número de semanas consecutivas em que uma métrica é maior que o benchmark). Caso sejam selecionadas várias configurações de dispositivo, as métricas serão calculadas em média nas configurações.
label.report_option_description_hwperfcomparison_hwperfsummary = O relatório permite que os usuários comparem o desempenho das configurações do dispositivo em sua frota com um conjunto de outras configurações na mesma frota ou nos HP TechPulse Benchmarks. As métricas para comparação são: As médias semanais de utilização da CPU e da memória, número semanal de erros de tela azul ou tempo médio de inicializações/desligamentos de uma determinada semana. As diferenças dos benchmarks são avaliadas quanto à significância estatística e persistência (ou seja, o número de semanas consecutivas em que uma métrica é maior que o benchmark). Caso sejam selecionadas várias configurações de dispositivo, as métricas serão calculadas em média nas configurações.
