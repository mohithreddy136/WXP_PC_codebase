mpi.report.common.cashdraweractivity1 = 1. Para tipo de alerta da gaveta de dinheiro = Tempo de abertura excedido.
mpi.report.common.cashdraweractivity2 = As gavetas de dinheiro mostradas nesta aba excederam o limite de tempo configurado para ficarem abertas. Isso pode destacar a negligência e a atividade potencialmente suspeita para sua faixa de POS.
mpi.report.common.cashdraweractivity3 = 2. Para tipo de alerta da gaveta de dinheiro = Gaveta de dinheiro aberta manualmente.
mpi.report.common.cashdraweractivity4 = As gavetas de dinheiro mostradas nesta aba foram abertas manualmente sem uma transação de software POS acionando a abertura da caixa registradora. Isso pode indicar uma transação potencial ocorrendo fora do software POS ou uma atividade de perda potencial.
mpi.report.common.cashdraweractivity5 = 3. Para tipo de alerta da gaveta de dinheiro = Aberta durante o horário não autorizado.
mpi.report.common.cashdraweractivity6 = As gavetas de dinheiro mostradas nesta aba foram abertas fora do horário de funcionamento padrão configurado. Isso pode indicar que uma gaveta de dinheiro foi acessada em um momento em que isso não era esperado, destacando um evento potencialmente suspeito.
mpi.report.common.cashdraweractivitysub = 1. Para tipo de alerta da gaveta de dinheiro = Tempo de abertura excedido. As gavetas de dinheiro mostradas nesta aba excederam o limite de tempo configurado para ficarem abertas. Isso pode destacar a negligência e a atividade potencialmente suspeita para sua faixa de POS. 
2. Para tipo de alerta da gaveta de dinheiro = Gaveta de dinheiro aberta manualmente. As gavetas de dinheiro mostradas nesta aba foram abertas manualmente sem uma transação de software POS acionando a abertura da caixa registradora. Isso pode indicar uma transação potencial ocorrendo fora do software POS ou uma atividade de perda potencial. 
3. Para tipo de alerta da gaveta de dinheiro = Evento não autorizado. As gavetas de dinheiro mostradas nesta aba foram abertas fora do horário de funcionamento padrão configurado. Isso pode indicar que uma gaveta de dinheiro foi acessada em um momento em que isso não era esperado, destacando um evento potencialmente suspeito.
