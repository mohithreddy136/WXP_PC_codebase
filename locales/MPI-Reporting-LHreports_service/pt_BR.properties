mpi.report.column.graph.diskcap.graph.summary.text.description = O relatório de planejamento da capacidade em disco prevê o tempo restante para que o espaço em disco alcance um limite predeterminado. Os limites podem ser selecionados nos filtros do relatório e são definidos como 0–10%, 0–20%, 0–30%, 0–40% e 0–50%.
mpi.report.column.graph.diskcap.graph.summary.text.status = O relatório usa dados dos últimos 3 a 6 meses para determinar o tempo restante para que a capacidade em disco alcance o limite predeterminado no filtro do relatório. As categorias de alto nível para o status da capacidade em disco são as seguintes:
mpi.report.column.graph.diskcap.graph.summary.text.status.first = Imediato. O espaço em disco restante está chegando ao limite
mpi.report.column.graph.diskcap.graph.summary.text.status.five = OK. O espaço em disco deverá estar OK, no mínimo, pelos próximos 1, 2 ou 3 meses, dependendo da informação contida na coluna Status adicional. 
mpi.report.column.graph.diskcap.graph.summary.text.status.four = Em 3 meses. O espaço em disco vai chegar ao limite dentro de três meses
mpi.report.column.graph.diskcap.graph.summary.text.status.second = Em 1 mês. O espaço em disco vai chegar ao limite dentro de um mês
mpi.report.column.graph.diskcap.graph.summary.text.status.seven = N/D. O espaço em disco está OK no momento, mas não há dados suficientes para prever o tempo que falta para o espaço em disco chegar ao limite
mpi.report.column.graph.diskcap.graph.summary.text.status.six = Se a coluna Status adicional contiver:
mpi.report.column.graph.diskcap.graph.summary.text.status.six.sub.first = 1+, then the disk space is OK for at least 1 month
mpi.report.column.graph.diskcap.graph.summary.text.status.six.sub.second = 2+, then the disk space is OK for at least 2 months
mpi.report.column.graph.diskcap.graph.summary.text.status.six.sub.third = 3+, then the disk space is OK for at least 3 months
mpi.report.column.graph.diskcap.graph.summary.text.status.third = Em 2 meses. O espaço em disco vai chegar ao limite dentro de dois meses
