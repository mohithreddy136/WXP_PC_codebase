mpi.report.common.peripheralthresholdmet = Limiar de periféricos atingido
mpi.report.common.peripheralthresholdmetsubheading = Essa aba destaca os periféricos (scanners, leitores de tarja magnética e impressoras de recibos) que excederam o limite de uso esperado durante a vida útil, o que indica que o dispositivo periférico corre um risco relativamente maior de falhar devido ao tempo de uso. Seja para extrair dados da classe de dados do registro ou de um relatório de limite estabelecido, o que for mais fácil. No final, são os mesmos dados.
mpi.report.common.printerheadmaintenance = Esta é a lista de Impressoras de recibos que tiveram um aumento de uso para linhas impressas. Recomenda-se que o cabeçote de impressão seja reparado. Isso requer a limpeza do cabeçote de impressão da impressora para permitir resultados de alta qualidade.
mpi.report.common.printerknifecutmaintenance = Esta é a lista de Impressoras de recibos que tiveram um aumento de uso para cortes da lâmina. Recomenda-se que a lâmina da impressora seja inspecionada e reparada conforme necessário. Isso requer a verificação de que a lâmina da impressora ainda está suficientemente afiada para cortar facilmente os recibos e afiar e substituir conforme necessário.
