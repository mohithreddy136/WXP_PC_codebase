mpi.report.common.peripheralclaimingerrorssubheading = Os periféricos mostrados nessa guia estão com problemas de estatísticas dos dispositivos periféricos sendo coletadas devido a um número de diferentes razões destacadas na tabela abaixo. Isso inclui conflitos com reclamações de periférico de PDV, configuração adequada com Agente de periférico e outros.
