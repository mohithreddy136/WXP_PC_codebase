mpi.report.common.msrsubmaintenance = Esta é a lista de Leitores de tarja magnética que tiveram um aumento de uso para leituras boas. Recomenda-se a limpeza do leitor. Isso requer a limpeza de detritos e acúmulos do slot do cartão para permitir o desempenho contínuo do leitor.
