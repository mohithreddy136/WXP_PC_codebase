label.report_option_description_winperformance_summary = O relatório mostra o desempenho de ligar/desligar os dispositivos por segmento de tempo para as últimas 12 semanas completas, bem como os principais motivos de lentidão e o tempo desde a última reinicialização. Os tempos de inicialização/desligamento/ativação de cada dispositivo são calculados em média para uma determinada semana.
