label.report_option_additional_description_batteryStatRiskFact_batteryRepAndRiskFact = Para obter mais informações sobre como otimizar a integridade e a longevidade da bateria, acesse: <a href='https://support.hp.com/us-en/document/ish_4034543-1660469-16'>https://support.hp.com/us-en/document/ish_4034543-1660469-16</a>.
label.report_option_additional_description_batterySwellProb_details = This report contains a list of HP devices that have been identified as having a high probability of swelling. These devices should be evaluated for any visual signs of swelling, and we recommend ensuring that the Battery Health Management (BHM) setting in the BIOS are set to Maximize My Battery Health.
label.report_option_additional_description_batteryUsageOpt_batteryRepAndRiskFact = For more information on how to optimize battery health and longevity, please visit: <a href='https://support.hp.com/us-en/document/c01297640' >https://support.hp.com/us-en/document/c01297640</a> .
label.report_option_additional_description_batteryUsageOpt_details = Para obter mais informações sobre como otimizar a integridade e a longevidade da bateria, acesse: <a href='https://support.hp.com/us-en/document/c01297640' >https://support.hp.com/us-en/document/c01297640</a> . \nSelecione o País/Região na página de suporte da HP para ver o artigo no idioma e país de sua preferência.
label.report_option_additional_description_devicecomp = Os dispositivos Android e iOS são considerados comprometidos se forem desbloqueados por rooting e modificados por jailbreak, respectivamente. Os dispositivos Windows são considerados comprometidos se alguma política de segurança configurada não estiver em conformidade.
label.report_option_additional_description_devicecomp_details = Os dispositivos Android e iOS são considerados comprometidos se forem desbloqueados por rooting e modificados por jailbreak, respectivamente. Os dispositivos Windows são considerados comprometidos se alguma política de segurança configurada não estiver em conformidade.
label.report_option_additional_description_softuti = <b>Aplicativos mais utilizados</b> são classificados pelo número de dispositivos utilizando um aplicativo/número geral de dispositivos.\n\n<b>Principais aplicativos por tempo de uso</b> são classificados pelo tempo de uso do aplicativo resumido/número geral de dispositivos.\n\nNo caso de vários meses serem selecionados no filtro de relatório, os gráficos são calculados como a média das taxas acima para esses meses.
label.report_option_additional_description_softuti_summary = <b>Aplicativos mais utilizados</b> são classificados pelo número de dispositivos utilizando um aplicativo/número geral de dispositivos.\n\n<b>Principais aplicativos por tempo de uso</b> são classificados pelo tempo de uso do aplicativo resumido/número geral de dispositivos.\n\nNo caso de vários meses serem selecionados no filtro de relatório, os gráficos são calculados como a média das taxas acima para esses meses.
label.report_option_additional_description_thermalgrade_details = Windows : \n Manutenção - Verificar obstrução nas saídas de ventilação e limpar a unidade.\n Ok - Nenhuma ação necessária.\n \n MAC : \n Crítico - O estado térmico do dispositivo está impactando significativamente o desempenho do sistema, e o dispositivo precisa ser resfriado.\n Sério - O estado térmico está alto no dispositivo. As ventoinhas estão operando em velocidade máxima e o desempenho do sistema pode ser afetado.\n Nominal - O estado térmico está dentro dos limites normais e nenhuma medida corretiva se faz necessária.\n Moderado - O estado térmico está levemente elevado, pode ser possível ouvir as ventoinhas. 
label.report_option_additional_description_thermalgradeV2_thermalGrading = Windows : \n Manutenção - Verificar obstrução nas saídas de ventilação e limpar a unidade.\n Ok - Nenhuma ação necessária.\n \n MAC : \n Crítico - O estado térmico do dispositivo está impactando significativamente o desempenho do sistema, e o dispositivo precisa ser resfriado.\n Sério - O estado térmico está alto no dispositivo. As ventoinhas estão operando em velocidade máxima e o desempenho do sistema pode ser afetado.\n Nominal - O estado térmico está dentro dos limites normais e nenhuma medida corretiva se faz necessária.\n Moderado - O estado térmico está levemente elevado, pode ser possível ouvir as ventoinhas.
