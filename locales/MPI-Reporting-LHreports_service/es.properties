label.report_option_additional_description_batteryStatRiskFact_batteryRepAndRiskFact = Para obtener más información sobre cómo optimizar el estado y la vida útil de la batería, visite: <a href='https://support.hp.com/us-en/document/ish_4034543-1660469-16'>https://support.hp.com/us-en/document/ish_4034543-1660469-16</a>.
label.report_option_additional_description_batterySwellProb_details = This report contains a list of HP devices that have been identified as having a high probability of swelling. These devices should be evaluated for any visual signs of swelling, and we recommend ensuring that the Battery Health Management (BHM) setting in the BIOS are set to Maximize My Battery Health.
label.report_option_additional_description_batteryUsageOpt_batteryRepAndRiskFact = For more information on how to optimize battery health and longevity, please visit: <a href='https://support.hp.com/us-en/document/c01297640' >https://support.hp.com/us-en/document/c01297640</a> .
label.report_option_additional_description_batteryUsageOpt_details = Para obtener más información sobre cómo optimizar el estado y la longevidad de la batería, visite: <a href='https://support.hp.com/us-en/document/c01297640' >https://support.hp.com/us-en/document/c01297640</a> . \nSeleccione el País/Región en la página de soporte de HP para ver el artículo en su país e idioma preferidos.
label.report_option_additional_description_devicecomp = Los dispositivos Android e iOS se consideran en peligro si presentan "rooting" (control privilegiado) o "jailbreak" (desbloqueo), respectivamente. Los dispositivos Windows se consideran en peligro si cualquiera de las políticas de seguridad configuradas no son conformes.
label.report_option_additional_description_devicecomp_details = Los dispositivos Android e iOS se consideran en peligro si presentan "rooting" (control privilegiado) o "jailbreak" (desbloqueo), respectivamente. Los dispositivos Windows se consideran en peligro si cualquiera de las políticas de seguridad configuradas no son conformes.
label.report_option_additional_description_softuti = <b>Las aplicaciones más utilizadas</b> se clasifican según la cantidad de dispositivos que usan una aplicación / cantidad general de dispositivos.\n\n<b>Las principales aplicaciones según el tiempo de uso</b> se clasifican según el tiempo de uso de la aplicación / la cantidad general de dispositivos.\n\nEn el caso en que se seleccionan varios meses en el filtro del informe, los gráficos se calculan según el promedio de las proporciones anteriores referentes a esos meses.
label.report_option_additional_description_softuti_summary = <b>Las aplicaciones más utilizadas</b> se clasifican según la cantidad de dispositivos que usan una aplicación / cantidad general de dispositivos.\n\n<b>Las principales aplicaciones según el tiempo de uso</b> se clasifican según el tiempo de uso de la aplicación / la cantidad general de dispositivos.\n\nEn el caso en que se seleccionan varios meses en el filtro del informe, los gráficos se calculan según el promedio de las proporciones anteriores referentes a esos meses.
label.report_option_additional_description_thermalgrade_details = Windows : \n Mantenimiento: verifique si los orificios de ventilación están bloqueados y limpie la unidad.\n Ok: no se requiere ninguna acción.\n \n MAC : \n Crítico: el estado térmico del dispositivo está afectando considerablemente el rendimiento del sistema y el dispositivo necesita enfriarse.\n Serio: el estado térmico del dispositivo es alto. Los ventiladores están funcionando a la máxima velocidad y el rendimiento del sistema puede verse afectado.\n Nominal: el estado térmico están dentro de los límites y no se necesita ninguna medida correctiva.\n Razonable: el estado térmico está un poco elevado, se pueden oír los ventiladores.\n 
label.report_option_additional_description_thermalgradeV2_thermalGrading = Windows : \n Mantenimiento: verifique si los orificios de ventilación están bloqueados y limpie la unidad.\n Ok: no se requiere ninguna acción.\n \n MAC : \n Crítico: el estado térmico del dispositivo está afectando considerablemente el rendimiento del sistema y el dispositivo necesita enfriarse.\n Serio: el estado térmico del dispositivo es alto. Los ventiladores están funcionando a la máxima velocidad y el rendimiento del sistema puede verse afectado.\n Nominal: el estado térmico está dentro de los límites y no se necesita ninguna medida correctiva.\n Razonable: el estado térmico está un poco elevado, se pueden oír los ventiladores.\n
