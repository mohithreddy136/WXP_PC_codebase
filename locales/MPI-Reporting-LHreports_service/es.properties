mpi.report.common.peripheralthresholdmetsubheading = Esta ficha destaca los periféricos (escáneres, lectores de cinta magnética e impresoras de recibos) que han excedido su umbral de uso esperado en su vida útil, lo que indica que el dispositivo periférico corre un riesgo relativamente más alto de fallar debido al tiempo de uso. Ya sea para extraer datos de registro o de un informe de umbral establecido, lo que sea más fácil funcionaría. En última instancia, son los mismos datos.
mpi.report.common.printerheadmaintenance = Esta es la lista de Impresoras de recibos que alcanzaron un incremento de uso de líneas impresas. Se recomienda el mantenimiento del cabezal de impresión. Esto consiste en limpiar el cabezal de impresión para obtener resultados de alta calidad.
mpi.report.common.printerknifecutmaintenance = Esta es la lista de Impresoras de recibos que alcanzaron un incremento de uso de cortes de cuchilla. Se recomienda examinar la cuchilla de la impresora y repararla si es necesario. Esto requiere verificar si la cuchilla está bien afilada para cortar los recibos con facilidad, y afilarla o reemplazarla.
