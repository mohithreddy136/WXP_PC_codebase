mpi.report.column.graph.usermob.graph.summary.text.description = Los aspectos de la movilidad de los usuarios según la geolocalización de su dispositivo.
mpi.report.column.graph.usermob.graph.summary.text.status = El factor de movilidad del usuario durante un periodo se basa en varios patrones de comportamiento móvil complejos. Por ejemplo, algunos usuarios viajan constantemente con los mismos dispositivos o con dispositivos distintos, con formatos diferentes y a lugares distintos. Otros usuarios viajan con frecuencia entre dos o tres lugares con sus dispositivos. Y hay otros que se desplazan de manera constante entre distancias cortas con sus dispositivos. El factor de movilidad del usuario aprovecha la geolocalización del dispositivo registrado en HP TechPulse Analytics and Proactive Management, a diferencia de la ubicación de cualquier usuario desde cualquier fuente externa.
mpi.report.column.graph.usermob.graph.summary.text.status.first = Los servicios basados en la ubicación para rastrear la geolocalización de los dispositivos viene desactivada de forma predeterminada para todos los clientes. En el portal de HP TechPulse Analytics and Proactive Management se brinda una opción para que los clientes habiliten o deshabiliten los servicios basados en la ubicación. Incluso cuando los servicios basados en la ubicación están activados, HP TechPulse Analytics and Proactive Management no permite la recopilación de datos de ubicación del dispositivo en cualquier dispositivo clasificado como personal o de propiedad del empleado (dentro del portal basado en la nube HP TechPulse Analytics and Proactive Management).
mpi.report.column.graph.usermob.graph.summary.text.status.forth = Due to the monthly scheduled execution, users and devices that were enrolled or unenrolled in HP TechPulse Analytics and Proactive Management after the last scheduled execution, will not appear in this report.
mpi.report.column.graph.usermob.graph.summary.text.status.second = El factor de movilidad del usuario es una clasificación entre 1 y 10 de todos los dispositivos para fines de análisis y administración proactiva. Una clasificación de 1 indica que el dispositivo del usuario es el menos móvil y una clasificación de 10 indica que el dispositivo del usuario es el más móvil. Una clasificación de -1 indica que no hay datos de ubicación referentes a los dispositivos del usuario.
mpi.report.column.graph.usermob.graph.summary.text.status.third = El análisis del factor de movilidad del usuario está programado para ejecutarse una vez al principio de cada mes. La última ejecución programada fue el:
