label.report_option_description_softwareUpdatesV2_msOfficeUpdates = The report provides information on the Microsoft Office updates missing on the devices and the criticality level of those updates. A device is categorized as "Missing Critical Updates" in case if it's missing at least one Critical update even if it's missing other types of updates at the same time. Devices not missing any Critical updates but missing at least one Important update are categorized as "Missing Important Updates" and so on.
