mpi.report.common.peripheralclaimingerrorssubheading = Los periféricos mostrados en esta pestaña tienen problemas con estadísticas de dispositivos periféricos que se están recopilando debido a diversos motivos resaltados en la tabla a continuación. Esto incluye conflictos de reclamación de periféricos con Software de POS, configuración adecuada de HP Peripheral Agent y otros.
