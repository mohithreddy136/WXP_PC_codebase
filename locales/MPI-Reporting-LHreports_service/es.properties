label.report_option_description_networkassmtV2_networkHealthAndOutages = El resumen de conectividad del dispositivo proporciona una instantánea de las velocidades de conexión y la calidad de la señal Wi-Fi de los dispositivos de su flota en redes empresariales, domésticas o móviles, lo que incluye una tendencia de conexiones lentas (menos de 15 Mbps) en 7 días. Este informe también muestra todos los controladores de tarjeta de red obsoletos en los dispositivos de su flota y, cuando disponible, proporciona un enlace al controlador actualizado para corregir el problema. Los dispositivos con desconexiones de red se mostrarán con números semanales y mensuales.
