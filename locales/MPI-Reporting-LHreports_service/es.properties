mpi.report.common.msrsubmaintenance = Esta es la lista de Lectores de banda magnética que alcanzaron un incremento de uso de buenas lecturas. Se recomienda la limpieza del lector. Esto requiere la eliminación de polvo y residuos de la ranura para tarjetas para mantener el buen funcionamiento del lector.
