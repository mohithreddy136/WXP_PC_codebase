mpi.report.column.graph.diskcap.graph.summary.text.description = El informe de Planificación de la capacidad de disco pronostica el tiempo que queda antes de que el espacio de disco llegue a un umbral predeterminado. Los umbrales se pueden seleccionar en los filtros del informe y se definen como 0-10 %, 0-20 %, 0-30 %, 0-40 % y 0-50 %.
mpi.report.column.graph.diskcap.graph.summary.text.status = El informe usa datos de los últimos 3-6 meses para determinar el tiempo que queda antes de que la capacidad de disco llegue al umbral predeterminado en el filtro del informe. Las categorías del nivel superior referentes al Estado de la capacidad de disco son:
mpi.report.column.graph.diskcap.graph.summary.text.status.first = Inmediato. El espacio en disco restante llegó al umbral
mpi.report.column.graph.diskcap.graph.summary.text.status.five = Adecuado. El espacio en disco podría ser el adecuado al menos para los próximos 1, 2 o 3 meses según la información de la columna de Estado adicional. 
mpi.report.column.graph.diskcap.graph.summary.text.status.four = Dentro de 3 meses. El espacio de disco llegará al umbral dentro de 3 meses
mpi.report.column.graph.diskcap.graph.summary.text.status.second = Dentro de 1 mes. El espacio de disco llegará al umbral dentro de 1 mes
mpi.report.column.graph.diskcap.graph.summary.text.status.seven = N/D. El espacio en disco es adecuado por ahora pero no hay suficientes datos para predecir el tiempo que queda para que el espacio en disco llegue al umbral
mpi.report.column.graph.diskcap.graph.summary.text.status.six = Si la columna de Estado adicional muestra:
mpi.report.column.graph.diskcap.graph.summary.text.status.six.sub.first = 1+, then the disk space is OK for at least 1 month
mpi.report.column.graph.diskcap.graph.summary.text.status.six.sub.second = 2+, then the disk space is OK for at least 2 months
mpi.report.column.graph.diskcap.graph.summary.text.status.six.sub.third = 3+, then the disk space is OK for at least 3 months
mpi.report.column.graph.diskcap.graph.summary.text.status.third = Dentro de 2 meses. El espacio de disco llegará al umbral dentro de 2 meses
