mpi.report.common.cashdraweractivity = Actividad del cajón de efectivo
mpi.report.common.cashdraweractivity1 = 1. En el caso del tipo de alerta de la gaveta de efectivo = tiempo de apertura excedido.
mpi.report.common.cashdraweractivity2 = Las gavetas de efectivo mostradas en esta ficha han excedido el umbral de tiempo configurado para su apertura. Esto destacaría la negligencia y, potencialmente, una actividad sospechosa en su POS.
mpi.report.common.cashdraweractivity3 = 2. En el caso del tipo de alerta de la gaveta de efectivo = apertura manual de la gaveta de efectivo.
mpi.report.common.cashdraweractivity4 = Las gavetas de efectivo mostradas en esta ficha se abrieron manualmente sin que una transacción del software de POS activara la apertura. Esto indicaría que, potencialmente, se está realizando una transacción fuera del software de POS o una actividad de pérdida potencial.
mpi.report.common.cashdraweractivity5 = 3. En el caso del tipo de alerta de la gaveta de efectivo = abierta durante horas no autorizadas.
mpi.report.common.cashdraweractivity6 = Las gavetas de efectivo que se muestran en esta ficha se abrieron fuera de los horarios de operación estándar configurados. Esto indicaría que se accedió a una gaveta de efectivo durante un momento en que no se esperaba el acceso, lo que destaca un evento potencialmente sospechoso.
mpi.report.common.cashdraweractivitysub = 1. En el caso del tipo de alerta de la gaveta de efectivo = tiempo de apertura excedido. Las gavetas de efectivo mostradas en esta ficha han excedido el umbral de tiempo configurado para su apertura. Esto destacaría la negligencia y actividad potencialmente sospechosa de su POS. 
2. En el caso del tipo de alerta de la gaveta de efectivo = apertura manual de la gaveta de efectivo. Las gavetas de efectivo mostradas en esta ficha se abrieron manualmente sin que una transacción del software de POS activara la apertura. Esto indicaría que, potencialmente, se está realizando una transacción fuera del software de POS o una actividad de pérdida potencial. 
3. En el caso del tipo de alerta de la gaveta de efectivo = evento no autorizado. Las gavetas de efectivo que se muestran en esta ficha se abrieron fuera de los horarios de operación estándar configurados. Esto indicaría que se accedió a una gaveta de efectivo durante un momento en que no se esperaba el acceso, lo que destaca un evento potencialmente sospechoso.
