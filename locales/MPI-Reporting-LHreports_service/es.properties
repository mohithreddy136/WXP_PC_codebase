label.report_option_description_softwareUpdates_msOfficeUpdates = El informe brinda datos sobre las actualizaciones de Microsoft Office faltantes en los dispositivos y el nivel de importancia de esas actualizaciones. La categoría de un dispositivo es "Missing Critical Updates" (Faltan actualizaciones esenciales) si falta al menos una actualización esencial, incluso si al mismo tiempo faltan actualizaciones de otro tipo. A los dispositivos a los que no les falta ninguna actualización esencial pero les falta al menos una actualización importante se les asigna la categoría de "Missing Important Updates" (Faltan actualizaciones importantes).
label.report_option_description_softwareUpdates_officeSummary = El informe brinda datos sobre las actualizaciones de Microsoft Office faltantes en los dispositivos y el nivel de importancia de esas actualizaciones. La categoría de un dispositivo es "Missing Critical Updates" (Faltan actualizaciones esenciales) si falta al menos una actualización esencial, incluso si al mismo tiempo faltan actualizaciones de otro tipo. A los dispositivos a los que no les falta ninguna actualización esencial pero les falta al menos una actualización importante se les asigna la categoría de "Missing Important Updates" (Faltan actualizaciones importantes).
label.report_option_description_softwareUpdates_windowsSummary = El informe brinda datos detallados sobre las actualizaciones de Microsoft Windows faltantes en los dispositivos y el nivel de importancia de esas actualizaciones. La categoría de un dispositivo es "Missing Critical Updates" (Faltan actualizaciones esenciales) si falta al menos una actualización esencial, incluso si al mismo tiempo faltan actualizaciones de otro tipo. A los dispositivos a los que no les falta ninguna actualización esencial pero les falta al menos una actualización importante se les asigna la categoría de "Missing Important Updates" (Faltan actualizaciones importantes).
label.report_option_description_softwareUpdates_windowsUpdates = El informe brinda datos sobre las actualizaciones de Microsoft Windows faltantes en los dispositivos y el nivel de importancia de esas actualizaciones. La categoría de un dispositivo es "Missing Critical Updates" (Faltan actualizaciones esenciales) si falta al menos una actualización esencial, incluso si al mismo tiempo faltan actualizaciones de otro tipo. A los dispositivos a los que no les falta ninguna actualización esencial pero les falta al menos una actualización importante se les asigna la categoría de "Missing Important Updates" (Faltan actualizaciones importantes).
