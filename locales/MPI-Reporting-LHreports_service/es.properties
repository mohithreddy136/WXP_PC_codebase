label.report_option_description_hwperfcomparison_hwperfcompanyconfigdetails = El informe permite que los usuarios comparen el rendimiento de las configuraciones del dispositivo en su flota con un conjunto de otras configuraciones en la misma flota o con los análisis de rendimiento de HP TechPulse. Las mediciones para comparación son: Los promedios semanales de uso de CPU y Memoria, la cantidad semanal de Errores de pantalla azul, o el tiempo promedio de encendido/apagado en una semana determinada. Las diferencias de los análisis comparativos se evalúan para fines de significado estadístico y de persistencia (por ej. la cantidad de semanas consecutivas en que una medición supera la del análisis comparativo). En caso de que se seleccionen varias Configuraciones de dispositivo, las mediciones se promedian en todas las configuraciones.
label.report_option_description_hwperfcomparison_hwperfsummary = El informe permite que los usuarios comparen el rendimiento de las configuraciones del dispositivo en su flota con un conjunto de otras configuraciones en la misma flota o con los análisis de rendimiento de HP TechPulse. Las mediciones para comparación son: Los promedios semanales de uso de CPU y Memoria, la cantidad semanal de Errores de pantalla azul, o el tiempo promedio de encendido/apagado en una semana determinada. Las diferencias de los análisis comparativos se evalúan para fines de significado estadístico y de persistencia (por ej. la cantidad de semanas consecutivas en que una medición supera la del análisis comparativo). En caso de que se seleccionen varias Configuraciones de dispositivo, las mediciones se promedian en todas las configuraciones.
