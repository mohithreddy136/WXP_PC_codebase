label.report_option_additional_description_batteryStatRiskFact_batteryRepAndRiskFact = Para obter mais informações sobre como otimizar o estado e a longevidade da bateria, visite: <a href='https://support.hp.com/us-en/document/ish_4034543-1660469-16'>https://support.hp.com/us-en/document/ish_4034543-1660469-16</a>.
label.report_option_additional_description_batterySwellProb_details = This report contains a list of HP devices that have been identified as having a high probability of swelling. These devices should be evaluated for any visual signs of swelling, and we recommend ensuring that the Battery Health Management (BHM) setting in the BIOS are set to Maximize My Battery Health.
label.report_option_additional_description_batteryUsageOpt_batteryRepAndRiskFact = For more information on how to optimize battery health and longevity, please visit: <a href='https://support.hp.com/us-en/document/c01297640' >https://support.hp.com/us-en/document/c01297640</a> .
label.report_option_additional_description_batteryUsageOpt_details = Para obter mais informações sobre como otimizar o estado e a longevidade da bateria, visite: <a href='https://support.hp.com/us-en/document/c01297640' >https://support.hp.com/us-en/document/c01297640</a> . \nSelecione o país/região na página de suporte da HP para ver o artigo no país e idioma da sua preferência.
label.report_option_additional_description_devicecomp = Os dispositivos Android e iOS são considerados comprometidos quando submetidos aos processos de "rooting" e "jail break", respetivamente. Os dispositivos Windows são considerados comprometidos quando uma das políticas de segurança configuradas não está em conformidade.
label.report_option_additional_description_devicecomp_details = Os dispositivos Android e iOS são considerados comprometidos quando submetidos aos processos de "rooting" e "jail break", respetivamente. Os dispositivos Windows são considerados comprometidos quando uma das políticas de segurança configuradas não está em conformidade.
label.report_option_additional_description_softuti = <b>Principais Aplicações Utilizadas Ativamente</b> são classificadas pelo número de dispositivos que utilizam uma aplicação/número geral de dispositivos.\n\n<b>Principais Aplicações com Mais Tempo de Utilização</b> são classificadas pelo resumo do tempo de utilização da aplicação/número geral de dispositivos.\n\nCaso sejam selecionados vários meses no filtro de relatório, os gráficos são calculados como a média dos coeficientes acima para esses meses.
label.report_option_additional_description_softuti_summary = <b>Principais Aplicações Utilizadas Ativamente</b> são classificadas pelo número de dispositivos que utilizam uma aplicação/número geral de dispositivos.\n\n<b>Principais Aplicações com Mais Tempo de Utilização</b> são classificadas pelo resumo do tempo de utilização da aplicação/número geral de dispositivos.\n\nCaso sejam selecionados vários meses no filtro de relatório, os gráficos são calculados como a média dos coeficientes acima para esses meses.
label.report_option_additional_description_thermalgrade_details = Windows : \n Manutenção – Verificar se as aberturas de ventilação estão obstruídas e limpar a unidade .\n Ok – Não é necessária ação.\n \n MAC : \n Crítico – O estado térmico do dispositivo está a ter um impacto significativo no desempenho do sistema e o dispositivo precisa de arrefecer.\n Grave – O estado térmico é elevado no dispositivo. Os dissipadores estão a funcionar na velocidade máxima e o desempenho do sistema pode ser afetado.\n Nominal – O estado térmico está dentro dos limites normais e não é necessária qualquer ação de correção.\n Justo – O estado térmico está ligeiramente elevado, os dissipadores podem ser audíveis.\n 
label.report_option_additional_description_thermalgradeV2_thermalGrading = Windows: \n Manutenção – Verificar se as aberturas de ventilação estão obstruídas e limpar a unidade .\n Ok – Não é necessária ação.\n \n MAC: \n Crítico – O estado térmico do dispositivo está a ter um impacto significativo no desempenho do sistema e o dispositivo precisa de arrefecer.\n Grave – O estado térmico é elevado no dispositivo. Os dissipadores estão a funcionar na velocidade máxima e o desempenho do sistema pode ser afetado.\n Nominal – O estado térmico está dentro dos limites normais e não é necessária qualquer ação de correção.\n Suficiente – O estado térmico está ligeiramente elevado, os dissipadores podem ser audíveis.\n
