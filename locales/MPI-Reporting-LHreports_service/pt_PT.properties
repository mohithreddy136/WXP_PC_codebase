mpi.report.column.graph.diskcap.graph.summary.text.description = O relatório de Planeamento de Capacidade de Disco prevê antecipadamente a duração de tempo restante antes do espaço de disco alcançar um limite predeterminado. Os limites são selecionáveis nos filtros de relatório e definidos como 0-10%, 0-20%, 0-30%, 0-40% e 0-50%.
mpi.report.column.graph.diskcap.graph.summary.text.status = O relatório utiliza os dados dos últimos 3 a 6 meses para determinar o tempo restante antes da capacidade de disco alcançar o limite definido no filtro do relatório. As categorias de nível superior para o estado da capacidade de disco são as seguintes:
mpi.report.column.graph.diskcap.graph.summary.text.status.first = Imediato. O espaço em disco restante atingiu o limite.
mpi.report.column.graph.diskcap.graph.summary.text.status.five = OK. De acordo com a informação apresentada na coluna "Estado Adicional", o espaço em disco está OK para os próximos 1, 2 ou 3 meses. 
mpi.report.column.graph.diskcap.graph.summary.text.status.four = Dentro de 3 meses. O espaço de disco alcançará o limite dentro de 3 meses
mpi.report.column.graph.diskcap.graph.summary.text.status.second = Dentro de 1 mês. O espaço de disco alcançará o limite dentro de 1 mês
mpi.report.column.graph.diskcap.graph.summary.text.status.seven = N/A. Neste momento, o espaço em disco está OK, mas não existem dados suficientes para prever o tempo restante antes de o disco atingir o limite.
mpi.report.column.graph.diskcap.graph.summary.text.status.six = Se a Coluna Adicional exibe:
mpi.report.column.graph.diskcap.graph.summary.text.status.six.sub.first = 1+, then the disk space is OK for at least 1 month
mpi.report.column.graph.diskcap.graph.summary.text.status.six.sub.second = 2+, then the disk space is OK for at least 2 months
mpi.report.column.graph.diskcap.graph.summary.text.status.six.sub.third = 3+, then the disk space is OK for at least 3 months
mpi.report.column.graph.diskcap.graph.summary.text.status.third = Dentro de 2 meses. O espaço de disco alcançará o limite dentro de 2 meses
