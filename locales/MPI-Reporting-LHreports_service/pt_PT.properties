mpi.report.common.peripheralthresholdmetsubheading = Este separador destaca os periféricos (scanners, leitores de banda magnética e impressoras de recibos) que excederam o limiar de utilização da vida útil esperada, o que indica que o dispositivo periférico tem um risco relativamente superior de falhar devido à idade de utilização. Quer seja para extrair dados de uma classe de dados de registo ou de um relatório de limiar estabelecido, o que for mais fácil irá funcionar. Em última análise, são os mesmos dados.
mpi.report.common.printerheadmaintenance = Esta é a lista de impressoras de recibos que atingiram um incremento de utilização relativo às linhas impressas. É recomendada a manutenção da cabeça de impressão. Isto requer a limpeza da cabeça de impressão da impressora para obter resultados de elevada qualidade.
mpi.report.common.printerknifecutmaintenance = Esta é a lista de impressoras de recibos que atingiram um incremento de utilização relativo aos cortes da lâmina. É recomendada a inspeção e manutenção da lâmina da impressora, conforme necessário. Isto requer verificar se a lâmina da impressora está afiada o suficiente para cortar facilmente recibos e afiar e substituir, conforme necessário.
