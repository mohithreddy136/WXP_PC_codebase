label.report_option_description_hwperfcomparison_hwperfcompanyconfigdetails = O relatório permite que os utilizadores comparem o desempenho das configurações do dispositivo na respetiva frota para um conjunto de outras configurações na mesma frota dos testes de referência HP TechPulse. As métricas para comparação são: As médias semanais de utilização de CPU e de Memória, número semanal de Erros de ecrã azul ou o tempo médio de arranques/encerramentos de uma semana específica. As diferenças dos testes de referência são avaliadas por significância estatísticas e por persistência (ou seja, o número de semanas consecutivas em que uma métrica é superior ao teste de referência). Caso sejam selecionadas múltiplas Configurações do dispositivo, as métricas apresentam a média das configurações.
label.report_option_description_hwperfcomparison_hwperfsummary = O relatório permite que os utilizadores comparem o desempenho das configurações do dispositivo na respetiva frota para um conjunto de outras configurações na mesma frota dos testes de referência HP TechPulse. As métricas para comparação são: As médias semanais de utilização de CPU e de Memória, número semanal de Erros de ecrã azul ou o tempo médio de arranques/encerramentos de uma semana específica. As diferenças dos testes de referência são avaliadas por significância estatísticas e por persistência (ou seja, o número de semanas consecutivas em que uma métrica é superior ao teste de referência). Caso sejam selecionadas múltiplas Configurações do dispositivo, as métricas apresentam a média das configurações.
label.report_option_description_hwperfcomparison_weeklyhwperfsummary = O relatório permite que os utilizadores comparem o desempenho das configurações do dispositivo na respetiva frota para um conjunto de outras configurações na mesma frota dos testes de referência HP TechPulse. As métricas para comparação são: As médias semanais de utilização de CPU e de Memória, número semanal de Erros de ecrã azul ou o tempo médio de arranques/encerramentos de uma semana específica. As diferenças dos testes de referência são avaliadas por significância estatísticas e por persistência (ou seja, o número de semanas consecutivas em que uma métrica é superior ao teste de referência). Caso sejam selecionadas múltiplas Configurações do dispositivo, as métricas apresentam a média das configurações.
