mpi.report.common.cashdraweractivity = Atividade da gaveta registadora
mpi.report.common.cashdraweractivity1 = 1. Para tipo de alerta de gaveta registadora = tempo de abertura excedido.
mpi.report.common.cashdraweractivity2 = As gavetas registadoras apresentadas neste separador excederam o limiar de tempo configurado para a caixa registadora estar aberta. Isto destacaria a negligência e uma potencial atividade suspeita para o POS.
mpi.report.common.cashdraweractivity3 = 2. Para tipo de alerta de gaveta registadora = abertura manual de gaveta registadora.
mpi.report.common.cashdraweractivity4 = As gavetas registadoras apresentadas neste separador foram abertas manualmente sem uma transação de software POS acionar a abertura da caixa registadora. Isto indicaria uma potencial transação ocorrendo fora do software POS ou uma potencial atividade de perda.
mpi.report.common.cashdraweractivity5 = 3. Para tipo de alerta de gaveta registadora = aberta durante horário não autorizado.
mpi.report.common.cashdraweractivity6 = As gavetas registadoras apresentadas neste separador foram abertas fora do horário de funcionamento normal configurado. Isto indicaria que uma gaveta registadora foi acedida durante um horário em que não era suposto ser acedida, destacando um potencial evento suspeito.
mpi.report.common.cashdraweractivitysub = 1. Para tipo de alerta de gaveta registadora = tempo de abertura excedido. As gavetas registadoras apresentadas neste separador excederam o limiar de tempo configurado para a caixa registadora estar aberta. Isto destacaria a negligência e uma potencial atividade suspeita para o POS. 
2. Para tipo de alerta de gaveta registadora = abertura manual de gaveta registadora. As gavetas registadoras apresentadas neste separador foram abertas manualmente sem uma transação de software POS acionar a abertura da caixa registadora. Isto indicaria uma potencial transação ocorrendo fora do software POS ou uma potencial atividade de perda. 
3. Para tipo de alerta de gaveta registadora = evento não autorizado. As gavetas registadoras apresentadas neste separador foram abertas fora do horário de funcionamento normal configurado. Isto indicaria que uma gaveta registadora foi acedida durante um horário em que não era suposto ser acedida, destacando um potencial evento suspeito.
