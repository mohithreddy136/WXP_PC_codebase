label.report_option_description_softwareUpdates_windowsSummary = O relatório fornece informações sobre as atualizações do Windows em falta nos dispositivos e o nível de criticidade dessas atualizações. Um dispositivo é categorizado como "Atualizações Críticas em Falta" caso tenha em falta pelo menos uma atualização Crítica, mesmo que tenha em falta outros tipos de atualizações em simultâneo. Os dispositivos que não tenham quaisquer atualizações Críticas em falta, mas onde falte pelo menos uma atualização Importante, são categorizados como "Atualizações Importantes em Falta" e assim sucessivamente.
label.report_option_description_softwareUpdates_windowsUpdates = O relatório fornece informações sobre as atualizações do Microsoft Windows em falta nos dispositivos e o nível de criticidade dessas atualizações. Um dispositivo é categorizado como "Atualizações Críticas em Falta" caso tenha em falta pelo menos uma atualização Crítica, mesmo que tenha em falta outros tipos de atualizações em simultâneo. Os dispositivos que não tenham quaisquer atualizações Críticas em falta, mas onde falte pelo menos uma atualização Importante, são categorizados como "Atualizações Importantes em Falta" e assim sucessivamente.
