mpi.report.column.graph.usermob.graph.summary.text.description = Os aspetos da mobilidade de utilizadores tendo por base a geolocalização dos seus dispositivos.
mpi.report.column.graph.usermob.graph.summary.text.status = O fator da mobilidade do utilizador durante um período de tempo é baseado em vários padrões de comportamentos móveis complexos. Por exemplo, alguns utilizadores viajam constantemente com o mesmo ou diferentes dispositivos com diferentes fatores de forma para locais diferentes, outros viajam frequentemente entre dois ou três locais com os seus dispositivos, enquanto outros movem-se constantemente, e por curtas distâncias, com os seus dispositivos. O fator da mobilidade de utilizador tira partido da geolocalização dos dispositivos dos utilizadores para dispositivos registados na Análise e Gestão Proativa do HP TechPulse, por oposição a qualquer localização de fontes externas.
mpi.report.column.graph.usermob.graph.summary.text.status.first = Os serviços baseados na localização para monitorizar a geolocalização de dispositivos estão desativados por predefinição para todos os clientes e é fornecida uma opção para que seja possível ativar ou desativar estes serviços no portal baseado na nuvem Análise e Gestão Proativa do HP TechPulse. Mesmo no caso de serviços baseados na localização estarem ativos, o Análise e Gestão Proativa do HP TechPulse não permite a recolha de dados de localização de quaisquer dispositivos classificados como sendo propriedade do funcionário ou dispositivos pessoais (dentro do portal baseado na nuvem Análise e Gestão Proativa do HP TechPulse).
mpi.report.column.graph.usermob.graph.summary.text.status.forth = Due to the monthly scheduled execution, users and devices that were enrolled or unenrolled in HP TechPulse Analytics and Proactive Management after the last scheduled execution, will not appear in this report.
mpi.report.column.graph.usermob.graph.summary.text.status.second = O fator de mobilidade do utilizador é classificado de 1 a 10 e é relativo à classificação entre todos os dispositivos em gestão analítica e proativa. Uma classificação de 1 indica que o dispositivo do utilizador é o menos móvel, sendo que uma classificação de 10 indica que o dispositivo do utilizador é o mais móvel. Uma classificação de -1 indica que não existem dados de localização dos dispositivos do utilizador.
mpi.report.column.graph.usermob.graph.summary.text.status.third = A análise do Fator de mobilidade do utilizador está agendada para ser executada periodicamente uma vez no início de cada mês. A última execução agendada foi em:
