mpi.report.common.cashdraweractivity1 = 1. For advarselstypen kontantskuffe = Åben tid overskredet.
mpi.report.common.cashdraweractivity2 = Kontantskuffer, der vises på denne fane, har overskredet deres konfigurerede tærskel for åbning. Dette vil fremhæve uagtsomhed og potentiel mistænkelig aktivitet for deres POS-bane.
mpi.report.common.cashdraweractivity3 = 2. For advarselstypen kontantskuffe = Manuel kontantskuffe åben.
mpi.report.common.cashdraweractivity4 = Kontantskuffer vist på denne fane blev åbnet manuelt uden at en POS-softwaretransaktion udløste, at kassen skulle åbne. Dette ville indikere en potentiel transaktion, der finder sted uden for POS-softwaren eller en potentiel tabsaktivitet.
mpi.report.common.cashdraweractivity5 = 3. For advarselstypen kontantskuffe = Åbnet i uautoriserede timer.
mpi.report.common.cashdraweractivity6 = Kontantskuffer vist på denne fane blev åbnet uden for de konfigurerede standarddriftstimer. Dette ville indikere, at der var adgang til en kontantskuffe i en periode, hvor den ikke forventedes at blive åbnet, hvilket fremhæver en potentiel mistænkelig hændelse.
mpi.report.common.cashdraweractivitysub = 1. For advarselstypen kontantskuffe = Åben tid overskredet. Kontantskuffer, der vises på denne fane, har overskredet deres konfigurerede tærskel for åbning. Dette vil fremhæve uagtsomhed og potentielt mistænkelig aktivitet for deres POS-bane. 
2. For advarselstypen kontantskuffe = Manuel kontantskuffe åben. Kontantskuffer vist på denne fane blev åbnet manuelt uden at en POS-softwaretransaktion udløste, at kassen skulle åbne. Dette ville indikere en potentiel transaktion, der finder sted uden for POS-softwaren eller en potentiel tabsaktivitet. 
3. For advarselstypen kontantskuffe = Uautoriseret hændelse. Kontantskuffer vist på denne fane blev åbnet uden for de konfigurerede standarddriftstimer. Dette ville indikere, at der var adgang til en kontantskuffe i en periode, hvor den ikke forventedes at blive åbnet, hvilket fremhæver en potentiel mistænkelig hændelse.
