label.report_option_description_hwperfcomparison_hwperfcompanyconfigdetails = Denne rapport giver brugere mulighed for at sammenligne effektiviteten af enhedskonfigurationer i deres flåde med en række andre konfigurationer i samme flåde eller HP TechPulse-benchmarkværdier. Følgende metrik sammenlignes: Det ugentlige gennemsnit for CPU- og hukommelsesudnyttelse, ugentligt antal fejl med blå skærm eller gennemsnitlig tid for start/slukning i en bestemt uge. Forskellene på benchmark-værdierne vurderes med henblik på statistisk signifikans og hyppighed (dvs. antallet af uger i træk, hvor en metrik er større end benchmark-værdien). Hvis flere enhedskonfigurationer vælges, beregnes metrik-værdiernes gennemsnit for flere konfigurationer.
label.report_option_description_hwperfcomparison_hwperfsummary = Denne rapport giver brugere mulighed for at sammenligne effektiviteten af enhedskonfigurationer i deres flåde med en række andre konfigurationer i samme flåde eller HP TechPulse-benchmarkværdier. Følgende metrik sammenlignes: Det ugentlige gennemsnit for CPU- og hukommelsesudnyttelse, ugentligt antal fejl med blå skærm eller gennemsnitlig tid for start/slukning i en bestemt uge. Forskellene på benchmark-værdierne vurderes med henblik på statistisk signifikans og hyppighed (dvs. antallet af uger i træk, hvor en metrik er større end benchmark-værdien). Hvis flere enhedskonfigurationer vælges, beregnes metrik-værdiernes gennemsnit for flere konfigurationer.
