mpi.report.column.graph.usermob.graph.summary.text.description = Mobilitetsaspekter for brugere baseret på deres enheds geoplacering.
mpi.report.column.graph.usermob.graph.summary.text.status = Brugerens mobilitetsfaktor inden for en tidsperiode er baseret på mange forskellige, komplekse adfærdsmønstre for mobilenheder. Nogle brugere rejser f.eks. hele tiden til forskellige steder med samme eller forskellige enheder med forskellige formfaktorer, hvorimod andre brugere ofte rejser frem og tilbage mellem to eller tre steder med deres enheder, og andre konstant bevæger sig over korte afstande med deres enheder. Brugerens mobilitetsfaktor udnytter brugerenhedens geoplacering for enheder tilmeldt HP TechPulse med Analytics og Proactive Management i modsætning til brugerplaceringer fra andre eksterne kilder.
mpi.report.column.graph.usermob.graph.summary.text.status.first = De lokalitetsbaserede tjenester til sporing af enheders geoplacering er som standard deaktiveret for alle kunder, og der findes en indstilling, som kunder kan bruge til at aktivere eller deaktivere lokalitetsbaserede tjenester i den cloud-baserede portal for HP TechPulse Analytics og Proactive Management. Selv når de lokalitetsbaserede tjenester er aktiveret, tillader HP TechPulse Analytics og  Proactive Management ikke indsamling af lokalitetsdata for enheder klassificeret som medarbejderejede eller personlige enheder (i den cloud-baserede portal for HP TechPulse Analytics og Proactive Management).
mpi.report.column.graph.usermob.graph.summary.text.status.forth = Due to the monthly scheduled execution, users and devices that were enrolled or unenrolled in HP TechPulse Analytics and Proactive Management after the last scheduled execution, will not appear in this report.
mpi.report.column.graph.usermob.graph.summary.text.status.second = Brugerens mobilitetsfaktor er en bedømmelse på mellem 1 og 10 og er en relativ bedømmelse på tværs af alle enheder, hvad angår analyse og proaktiv administration. En bedømmelse på 1 betyder, at en brugers enhed er mindst muligt mobil, og en bedømmelse på 10 betyder, at en brugers enhed er mest muligt mobil. En bedømmelse på -1 betyder, at der ikke er nogen lokalitetsdata fra brugerens enheder.
mpi.report.column.graph.usermob.graph.summary.text.status.third = Analysen af brugerens mobilitetsfaktor er planlagt til at køre med jævne mellemrum i begyndelsen af hver måned. Den sidst planlagte udførelse var den:
