label.report_option_additional_description_batteryStatRiskFact_batteryRepAndRiskFact = Få flere oplysninger om optimering af batteritilstand og -levetid på: <a href='https://support.hp.com/us-en/document/ish_4034543-1660469-16'>https://support.hp.com/us-en/document/ish_4034543-1660469-16</a>.
label.report_option_additional_description_batterySwellProb_details = This report contains a list of HP devices that have been identified as having a high probability of swelling. These devices should be evaluated for any visual signs of swelling, and we recommend ensuring that the Battery Health Management (BHM) setting in the BIOS are set to Maximize My Battery Health.
label.report_option_additional_description_batteryUsageOpt_batteryRepAndRiskFact = For more information on how to optimize battery health and longevity, please visit: <a href='https://support.hp.com/us-en/document/c01297640' >https://support.hp.com/us-en/document/c01297640</a> .
label.report_option_additional_description_batteryUsageOpt_details = Yderligere oplysninger om optimering af batteritilstand og -levetid kan fås på: <a href='https://support.hp.com/us-en/document/c01297640' >https://support.hp.com/us-en/document/c01297640</a> . \nVælg Land/Område på HP-supportsiden for at få vist artiklen i dit foretrukne land og på dit foretrukne sprog.
label.report_option_additional_description_devicecomp = Android- og iOS-enheder anses for kompromitteret, hvis de er henholdsvis rootet og jail broken. Windows-enheder anses for kompromitteret, hvis en eller flere af de konfigurerede sikkerhedspolitikker ikke er gældende.
label.report_option_additional_description_devicecomp_details = Android- og iOS-enheder anses for kompromitteret, hvis de er henholdsvis rootet og jail broken. Windows-enheder anses for kompromitteret, hvis en eller flere af de konfigurerede sikkerhedspolitikker ikke er gældende.
label.report_option_additional_description_softuti = <b>Mest aktivt anvendte programmer</b> rangeres efter antallet af enheder, der bruger et program/samlet antal enheder.\n\n<b>Topprogrammer efter brugstid</b> rangeres efter overordnet programbrugstid/samlet antal enheder.\n\nNår der er valgt flere måneder i rapportfilteret, beregnes diagrammerne som gennemsnittet af nævnte forholdstal for de måneder.
label.report_option_additional_description_softuti_summary = <b>Mest aktivt anvendte programmer</b> rangeres efter antallet af enheder, der bruger et program / overordnet antal enheder.\n\n<b>Topprogrammer efter brugstid</b> rangeres efter overordnet programbrugstid / overordnet antal enheder.\n\nI tilfælde af at flere måneder er valgt i rapportfilteret, beregnes diagrammerne som gennemsnittet af nævnte forholdstal for de måneder.
label.report_option_additional_description_thermalgrade_details = Windows : \n Vedligeholdelse – Kontrollér luftkanaler for blokeringer og rene enheder.\n Ok – Du behøver ikke foretage dig noget.\n \n MAC : \N Kritisk – Enhedens temperaturtilstand påvirker systemets ydeevne betydeligt, og enheden skal køle ned.\n Alvorlig – Enhedens temperaturtilstand er høj. Blæserne kører ved maksimum hastighed, og systemets ydeevne kan være påvirket heraf.\n Nominel  – Temperaturtilstanden ligger inden for normalen. og det er ikke nødvendigt at foretage korrigerende handling.\n Rimelig – Temperaturtilstanden er lettere forhøjet, og blæserne kan muligvis høres.\n 
label.report_option_additional_description_thermalgradeV2_thermalGrading = Windows : \n Vedligeholdelse – Kontrollér luftkanaler for blokeringer, og rengør enhed.\n Ok – Du behøver ikke foretage dig noget.\n \n MAC : \n Kritisk – Enhedens termiske tilstand påvirker systemets ydeevne betydeligt, og enheden skal køle ned.\n Alvorlig – Enhedens termiske tilstand er høj. Blæserne kører ved maksimum hastighed, og systemets ydeevne kan være påvirket heraf.\n Nominel  – Den termiske tilstand ligger inden for normalen, og det er ikke nødvendigt at foretage korrigerende handlinger.\n Rimelig – Den termiske tilstand er lettere forhøjet, og blæserne kan muligvis høres.\n
