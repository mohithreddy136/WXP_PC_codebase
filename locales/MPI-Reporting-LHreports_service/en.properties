mpi.report.column.graph.diskcap.graph.summary.text.description = The Disk Capacity Planning report forecasts ahead the time duration left prior to the disk space reaching a predetermined threshold. The thresholds are selectable in the report filters and defined as 0-10%, 0-20%, 0-30%, 0-40% and 0-50%.
mpi.report.column.graph.diskcap.graph.summary.text.status = The report uses data for last 3-6 months to determine the time left before the disk capacity will reach the threshold set in the report filter. The top level categorizations for Disk Capacity Status are as follows:
mpi.report.column.graph.diskcap.graph.summary.text.status.first = Immediate. The remaining disk space has reached the threshold
mpi.report.column.graph.diskcap.graph.summary.text.status.five = OK. The disk space may be OK for at least the next 1, 2, or 3 months depending on the information in the Additional Status column. 
mpi.report.column.graph.diskcap.graph.summary.text.status.four = Within 3 months. The disk space will reach the threshold within 3 months
mpi.report.column.graph.diskcap.graph.summary.text.status.second = Within 1 month. The disk space will reach the threshold within 1 month
mpi.report.column.graph.diskcap.graph.summary.text.status.seven = N/A. The disk space is OK for now, but there is not enough data to forecast ahead the time duration left prior to the disk space reaching the threshold
mpi.report.column.graph.diskcap.graph.summary.text.status.six = If the Additional Column displays:
mpi.report.column.graph.diskcap.graph.summary.text.status.six.sub.first = 1+, then the disk space is OK for at least 1 month
mpi.report.column.graph.diskcap.graph.summary.text.status.six.sub.second = 2+, then the disk space is OK for at least 2 months
mpi.report.column.graph.diskcap.graph.summary.text.status.six.sub.third = 3+, then the disk space is OK for at least 3 months
mpi.report.column.graph.diskcap.graph.summary.text.status.third = Within 2 months. The disk space will reach the threshold within 2 months
