mpi.report.common.cashdraweractivity = Cash Drawer Activity
mpi.report.common.cashdraweractivity1 = 1. For Cash Drawer Alert Type = Open Time exceeded.
mpi.report.common.cashdraweractivity2 = Cash drawers shown in this tab have exceeded their configured time threshold for their till being opened. This would highlight the negligence and potentially suspicious activity for their POS lane.
mpi.report.common.cashdraweractivity3 = 2. For Cash Drawer Alert Type = Manual Cash Drawer Open.
mpi.report.common.cashdraweractivity4 = Cash drawers shown in this tab were opened manually without a POS software transaction triggering the till to open. This would indicate a potential transaction taking place outside of the POS software or a potential loss activity.
mpi.report.common.cashdraweractivity5 = 3. For Cash Drawer Alert Type = Opened During Unauthorized Hours.
mpi.report.common.cashdraweractivity6 = Cash drawers shown in this tab were opened outside of the configured standard operating hours. This would indicate that a cash drawer was accessed during a time when it was not expected to be accessed, highlighting a potentially suspicious event.
mpi.report.common.cashdraweractivitysub = 1. For Cash Drawer Alert Type = Open Time exceeded. Cash drawers shown in this tab have exceeded their configured time threshold for their till being opened. This would highlight the negligence and potentially suspicious activity for their POS lane.
2. For Cash Drawer Alert Type = Manual Cash Drawer Open. Cash drawers shown in this tab were opened manually without a POS software transaction triggering the till to open. This would indicate a potential transaction taking place outside of the POS software or a potential loss activity.
3. For Cash Drawer Alert Type = Unauthorized Event. Cash drawers shown in this tab were opened outside of the configured standard operating hours. This would indicate that a cash drawer was accessed during a time when it was not expected to be accessed, highlighting a potentially suspicious event.
