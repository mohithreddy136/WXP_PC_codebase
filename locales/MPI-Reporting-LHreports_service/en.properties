label.report_option_description_hwperfcomparison_hwperfcompanyconfigdetails = The report allows users to compare the performance of the device configurations in their fleet to a set of other configurations in the same fleet or HP TechPulse benchmarks. The metrics for comparison are: The weekly averages for CPU and Memory utilization, weekly number of Blue Screen Errors, or average time of startups/shutdowns for a given week. The differences from the benchmarks are evaluated for statistical significance and for persistence (i.e. the number of consecutive weeks a metric is larger than the benchmark). In case if multiple Device Configurations are selected, the metrics are averaged across configurations.
