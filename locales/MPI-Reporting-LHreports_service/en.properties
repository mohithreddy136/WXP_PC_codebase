label.report_option_additional_description_batteryStatRiskFact_batteryRepAndRiskFact = For more information about how to optimize battery health and longevity, please visit: <a href='https://support.hp.com/us-en/document/ish_4034543-1660469-16'>https://support.hp.com/us-en/document/ish_4034543-1660469-16</a>.
label.report_option_additional_description_batterySwellProb_details = This report contains a list of HP devices that have been identified as having a high probability of swelling. These devices should be evaluated for any visual signs of swelling, and we recommend ensuring that the Battery Health Management (BHM) setting in the BIOS are set to Maximize My Battery Health.
label.report_option_additional_description_batteryUsageOpt_batteryRepAndRiskFact = For more information on how to optimize battery health and longevity, please visit: <a href='https://support.hp.com/us-en/document/c01297640' >https://support.hp.com/us-en/document/c01297640</a> .
label.report_option_additional_description_batteryUsageOpt_details = For more information on how to optimize battery health and longevity, please visit: <a href='https://support.hp.com/us-en/document/c01297640' >https://support.hp.com/us-en/document/c01297640</a> . \nPlease select  the Country/Region in the HP support page to view the article in your preferred country and language.
label.report_option_additional_description_devicecomp = Android and iOS devices are considered compromised if they are rooted and jail broken respectively. Windows devices are considered compromised if any of the security policies configured are not compliant.
label.report_option_additional_description_devicecomp_details = Android and iOS devices are considered compromised if they are rooted and jail broken respectively. Windows devices are considered compromised if any of the security policies configured are not compliant.
label.report_option_additional_description_softuti = <b>Top Actively Used Apps</b> are ranked by the number of devices using an app / overall number of devices.\n\n<b>Top Apps by Usage Time</b> are ranked by the summary app usage time / overall number of devices.\n\nIn case when several months are selected in the report filter, the charts are calculated as the average of the above ratios for those months.
label.report_option_additional_description_softuti_summary = <b>Top Actively Used Apps</b> are ranked by the number of devices using an app / overall number of devices.\n\n<b>Top Apps by Usage Time</b> are ranked by the summary app usage time / overall number of devices.\n\nIn case when several months are selected in the report filter, the charts are calculated as the average of the above ratios for those months.
label.report_option_additional_description_thermalgrade_details = Windows : \n  Maintenance - Check vents for blockage and clean unit.\n Ok - No action required.\n \n MAC : \n Critical - The thermal state on device is significantly impacting the performance of the system and the device needs to cool down.\n Serious - The thermal state is high on device. Fans are running at maximum speed and system performance may be impacted.\n Nominal - The thermal state is within normal limits and no corrective action is needed.\n Fair - The thermal state is slightly elevated, fans may be audible.\n 
label.report_option_additional_description_thermalgradeV2_thermalGrading = Windows : \n  Maintenance - Check vents for blockage and clean unit.\n Ok - No action required.\n \n MAC : \n Critical - The thermal state on device is significantly impacting the performance of the system and the device needs to cool down.\n Serious - The thermal state is high on device. Fans are running at maximum speed and system performance may be impacted.\n Nominal - The thermal state is within normal limits and no corrective action is needed.\n Fair - The thermal state is slightly elevated, fans may be audible.\n
