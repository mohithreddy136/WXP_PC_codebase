mpi.report.column.graph.usermob.graph.summary.text.description = The mobility aspects of users based on their device's geolocation.
mpi.report.column.graph.usermob.graph.summary.text.status = The user's mobility factor during a time period is based on multiple and complex mobile behaviors patterns. For example, some users travel with same or different devices with different form factors to different places constantly, while others travel between two or three locations back and forth frequently with their devices, while others keep constantly moving short distances with their devices. The user mobility factor leverages users device's geolocation for devices enrolled in HP TechPulse Analytics and Proactive Management, as opposed to any user location from any external sources.
mpi.report.column.graph.usermob.graph.summary.text.status.first = The location-based services to track geolocation of devices is turned off by default for all customers and an option is provided for customers to enable or disable location-based services in cloud-based HP TechPulse Analytics and Proactive Management portal. Even in case of location-based services turned on, HP TechPulse Analytics and Proactive Management does not allow for collection of device location data for any devices classified as employee-owned or personal devices (within the cloud-based HP TechPulse Analytics and Proactive Management portal).
mpi.report.column.graph.usermob.graph.summary.text.status.forth = Due to the monthly scheduled execution, users and devices that were enrolled or unenrolled in HP TechPulse Analytics and Proactive Management after the last scheduled execution, will not appear in this report.
mpi.report.column.graph.usermob.graph.summary.text.status.second = The user's mobility factor is a rank between 1 to 10 and is a relative ranking across all devices in analytics and proactive management. A ranking of 1 indicates that a user's device is the least mobile and a ranking of 10 indicates that a user's device are the most mobile. A ranking of -1 indicates that there are no location data from the user's devices.
mpi.report.column.graph.usermob.graph.summary.text.status.third = The User Mobility Factor analysis is scheduled to run periodically once at the beginning of each month. The last scheduled execution was on:
