label.report_option_description_softwareUpdates_msOfficeUpdates = Il report fornisce informazioni sugli aggiornamenti Microsoft Office mancanti sui dispositivi e sul livello di criticità di tali aggiornamenti. Un dispositivo viene classificato come "Aggiornamenti critici mancanti" nel caso in cui manchi almeno un aggiornamento critico, anche se nello stesso momento dovessero mancare altri tipi di aggiornamenti. I dispositivi dotati di aggiornamenti critici ma privi di almeno un aggiornamento importante vengono classificati come "Aggiornamenti importanti assenti" e così via.
label.report_option_description_softwareUpdates_officeSummary = Il report fornisce informazioni dettagliate sugli aggiornamenti Microsoft Office mancanti sui dispositivi e sul livello di criticità di tali aggiornamenti. Un dispositivo viene classificato come "Aggiornamenti critici mancanti" nel caso in cui manchi almeno un aggiornamento critico, anche se nello stesso momento dovessero mancare altri tipi di aggiornamenti. I dispositivi dotati di aggiornamenti critici ma privi di almeno un aggiornamento importante vengono classificati come "Aggiornamenti importanti assenti" e così via.
