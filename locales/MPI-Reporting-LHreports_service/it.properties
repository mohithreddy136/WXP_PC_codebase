label.report_option_description_networkassmtV2_networkHealthAndOutages = Il report di riepilogo sulla connettività dei dispositivi fornisce un’istantanea della velocità di connessione e della qualità del segnale Wi-Fi dei componenti del parco dispositivi su reti aziendali, domestiche e mobili, compreso un trend di 7 giorni delle connessioni a bassa velocità (meno di 15 Mbps). Questo report mostra anche tutti i driver delle schede di rete non aggiornati sui componenti del parco dispositivi e, laddove disponibile, fornisce un link al driver aggiornato per la correzione. I dispositivi con disconnessioni di rete verranno visualizzati con conteggi settimanali e mensili.
