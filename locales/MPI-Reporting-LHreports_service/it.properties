label.report_option_description_hwperfcomparison_hwperfcompanyconfigdetails = Il report consente agli utenti di confrontare le prestazioni delle configurazioni dei dispositivi disponibili con una serie di altre configurazioni nell'ambito dello stesso parco dispositivi o con i benchmark HP TechPulse. Di seguito sono riportate le metriche per il confronto: Le medie settimanali per l'utilizzo della CPU e della memoria, il numero settimanale di errori con schermata blu (Blue Screen Errors) o i tempi medi di avvio/arresto in una settimana specifica. Le differenze rispetto ai benchmark vengono valutate in base alla rilevanza statistica e alla persistenza (ad esempio, il numero di settimane consecutive in cui i valori della metrica sono maggiori del benchmark). Se si selezionano configurazioni per più dispositivi, le metriche vengono calcolate in media tra le configurazioni.
label.report_option_description_hwperfcomparison_hwperfsummary = Il report consente agli utenti di confrontare le prestazioni delle configurazioni dei dispositivi disponibili con una serie di altre configurazioni nell'ambito dello stesso parco dispositivi o con i benchmark HP TechPulse. Di seguito sono riportate le metriche per il confronto: Le medie settimanali per l'utilizzo della CPU e della memoria, il numero settimanale di errori con schermata blu (Blue Screen Errors) o i tempi medi di avvio/arresto in una settimana specifica. Le differenze rispetto ai benchmark vengono valutate in base alla rilevanza statistica e alla persistenza (ad esempio, il numero di settimane consecutive in cui i valori della metrica sono maggiori del benchmark). Se si selezionano configurazioni per più dispositivi, le metriche vengono calcolate in media tra le configurazioni.
label.report_option_description_hwperfcomparison_weeklyhwperfsummary = Il report consente agli utenti di confrontare le prestazioni delle configurazioni dei dispositivi disponibili con una serie di altre configurazioni nell'ambito dello stesso parco dispositivi o con i benchmark HP TechPulse. Di seguito sono riportate le metriche per il confronto: Le medie settimanali per l'utilizzo della CPU e della memoria, il numero settimanale di errori con schermata blu (Blue Screen Errors) o i tempi medi di avvio/arresto in una settimana specifica. Le differenze rispetto ai benchmark vengono valutate in base alla rilevanza statistica e alla persistenza (ad esempio, il numero di settimane consecutive in cui i valori della metrica sono maggiori del benchmark). Se si selezionano configurazioni per più dispositivi, le metriche vengono calcolate in media tra le configurazioni.
