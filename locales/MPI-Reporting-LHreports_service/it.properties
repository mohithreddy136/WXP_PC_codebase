label.report_option_additional_description_batteryStatRiskFact_batteryRepAndRiskFact = Per ulteriori informazioni sull’ottimizzazione dell’integrità e della longevità della batteria, visitare: <a href='https://support.hp.com/us-en/document/ish_4034543-1660469-16'>https://support.hp.com/us-en/document/ish_4034543-1660469-16</a>.
label.report_option_additional_description_batterySwellProb_details = This report contains a list of HP devices that have been identified as having a high probability of swelling. These devices should be evaluated for any visual signs of swelling, and we recommend ensuring that the Battery Health Management (BHM) setting in the BIOS are set to Maximize My Battery Health.
label.report_option_additional_description_batteryUsageOpt_batteryRepAndRiskFact = For more information on how to optimize battery health and longevity, please visit: <a href='https://support.hp.com/us-en/document/c01297640' >https://support.hp.com/us-en/document/c01297640</a> .
label.report_option_additional_description_batteryUsageOpt_details = Per ulteriori informazioni sull'ottimizzazione dell'integrità e della longevità della batteria, visitare: <a href='https://support.hp.com/us-en/document/c01297640' >https://support.hp.com/us-en/document/c01297640</a> . \nSelezionare il paese o l'area geografica nella pagina del supporto HP per visualizzare l'articolo nella lingua preferita.
label.report_option_additional_description_devicecomp = I dispositivi Android e iOS sono considerati compromessi se sono stati sottoposti rispettivamente a rooting e jail breaking. I dispositivi Windows sono considerati compromessi se uno dei criteri di sicurezza configurati non risulta conforme.
label.report_option_additional_description_devicecomp_details = I dispositivi Android e iOS sono considerati compromessi se sono stati sottoposti rispettivamente a rooting e jail breaking. I dispositivi Windows sono considerati compromessi se uno dei criteri di sicurezza configurati non risulta conforme.
label.report_option_additional_description_softuti = Le <b>app maggiormente utilizzate</b> sono classificate in base al numero di dispositivi che utilizzano un'app diviso per il numero complessivo di dispositivi.\n\nLe <b>principali app per tempo di utilizzo</b> sono classificate per il tempo di utilizzo dell'app diviso per il numero complessivo di dispositivi.\n\nSe nel filtro del report sono selezionati diversi mesi, i grafici vengono calcolati su una media dei suddetti rapporti per questi mesi.
label.report_option_additional_description_softuti_summary = Le <b>app maggiormente utilizzate</b> sono classificate in base al numero di dispositivi che utilizzano un'app diviso per il numero complessivo di dispositivi.\n\nLe <b>principali app per tempo di utilizzo</b> sono classificate per il tempo di utilizzo dell'app diviso per il numero complessivo di dispositivi.\n\nSe nel filtro del report sono selezionati diversi mesi, i grafici vengono calcolati su una media dei suddetti rapporti per questi mesi.
label.report_option_additional_description_thermalgrade_details = Windows: \n Manutenzione: controllare che le aperture di ventilazione non siano ostruite e pulire l'unità.\n OK: nessun intervento richiesto.\n \n MAC: \n Critico: lo stato termico del dispositivo incide notevolmente sulle prestazioni del sistema; è necessario lasciar raffreddare il dispositivo.\n Grave: alta temperatura sul dispositivo. Le ventole sono in funzione alla velocità massima e le prestazioni del sistema potrebbero risentirne.\n Nominale: la temperatura è compresa tra i limiti di normalità e non sono necessari interventi correttivi.\n Discreto: la temperatura è leggermente elevata e si potrebbero sentire le ventole.\n 
label.report_option_additional_description_thermalgradeV2_thermalGrading = Windows: \n Manutenzione: controllare che le aperture di ventilazione non siano ostruite e pulire l'unità.\n OK: nessun intervento richiesto.\n \n MAC: \n Critico: lo stato termico del dispositivo incide notevolmente sulle prestazioni del sistema; è necessario lasciar raffreddare il dispositivo.\n Grave: alta temperatura sul dispositivo. Le ventole sono in funzione alla velocità massima e le prestazioni del sistema potrebbero risentirne.\n Nominale: la temperatura è compresa tra i limiti di normalità e non sono necessari interventi correttivi.\n Discreto: la temperatura è leggermente elevata e si potrebbero sentire le ventole.\n
