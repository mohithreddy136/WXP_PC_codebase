label.report_option_description_win10hwcomp_details = Il rapporto di valutazione Windows 10 mostra lo stato di compatibilità dell'hardware Windows 10 per i dispositivi, per stabilire se un dispositivo supporta la migrazione o l'aggiornamento al sistema operativo Windows 10 o se possono essere richiesti l'aggiornamento o la sostituzione dell'hardware. Il rapporto si basa su dati disponibili per i dispositivi del parco su cui non è installato Windows 10.
label.report_option_description_win11FleetReadiness_details = Il rapporto Windows 11 Readiness Assessment mostra lo stato di compatibilità per i dispositivi della flotta PC corrente, per stabilire se un dispositivo supporta la migrazione o l’upgrade al sistema operativo Windows 11 o se possono essere richiesti l’upgrade o la sostituzione dell’hardware.
label.report_option_description_win11ReadinessV2_details = Il report Valutazione della predisposizione per Windows 11 mostra lo stato di compatibilità per i dispositivi del parco PC corrente, al fine di stabilire se un dispositivo supporta la migrazione o l'upgrade al sistema operativo Windows 11 o se possono essere richiesti l'upgrade o la sostituzione dell'hardware.
label.report_option_description_windowsDefender_summary = Report per identificare attività di minaccia e stato di protezione di Windows Defender
label.report_option_description_winperformance_summary = Il report mostra le prestazioni di accensione/spegnimento dei dispositivi per segmento orario nelle ultime 12 settimane complete, nonché le principali cause dei rallentamenti e il tempo trascorso dall'ultimo riavvio. Per i tempi di avvio/arresto/riattivazione per ogni dispositivo, viene calcolata la media per una settimana specifica.
