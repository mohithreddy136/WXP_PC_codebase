mpi.report.common.peripheralclaimingerrorssubheading = Le periferiche mostrate in questa scheda stanno avendo problemi con le statistiche da dispositivi periferici che vengono raccolti a causa di una serie di ragioni diverse evidenziate nella tabella sottostante. Questo include i conflitti con la rivendicazione della periferica con il software POS, la corretta configurazione del HP Peripheral Agent, e altro ancora.
