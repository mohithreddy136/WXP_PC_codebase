mpi.report.column.graph.usermob.graph.summary.text.description = Aspetti legati alla mobilità degli utenti in base alla geo-localizzazione dei loro dispositivi.
mpi.report.column.graph.usermob.graph.summary.text.status = Il fattore di mobilità dell'utente in un intervallo di tempo si basa su molteplici schemi di comportamento mobile complessi. Ad esempio, alcuni utenti si spostano costantemente con lo stesso dispositivo o con dispositivi diversi di fattori di forma differenti tra luoghi diversi, mentre altri si spostano spesso avanti e indietro tra due o tre luoghi con i loro dispositivi; altri ancora si spostano costantemente su brevi distanze con i loro dispositivi. Il fattore di mobilità dell'utente ricorre alla geolocalizzazione dei dispositivi dell'utente iscritti al servizio Analytics and Proactive Management di HP TechPulse, anziché ai dati sulla posizione dell'utente provenienti da origini esterne.
mpi.report.column.graph.usermob.graph.summary.text.status.first = I servizi di localizzazione che consentono la geo-localizzazione dei dispositivi sono disattivati per impostazione predefinita per tutti i clienti, a cui viene tuttavia offerta la possibilità di abilitare o disabilitare i servizi di localizzazione nel portale cloud HP TechPulse Analytics and Proactive Management. Anche se i servizi di localizzazione risultano attivati, HP TechPulse Analytics and Proactive Management non consente la raccolta dei dati sulla localizzazione di tutti i dispositivi aziendali o personali (nel portale cloud HP TechPulse Analytics and Proactive Management).
mpi.report.column.graph.usermob.graph.summary.text.status.forth = Due to the monthly scheduled execution, users and devices that were enrolled or unenrolled in HP TechPulse Analytics and Proactive Management after the last scheduled execution, will not appear in this report.
mpi.report.column.graph.usermob.graph.summary.text.status.second = Il fattore di mobilità dell'utente è un numero compreso tra 1 e 10 utilizzato per stilare una classifica relativa tra tutti i dispositivi sottoposti ad analisi e gestione dinamica. Un valore pari a 1 indica che il dispositivo dell'utente è il meno mobile, mentre un valore pari a 10 indica che il dispositivo dell'utente è il più mobile. Un valore pari a -1 indica che il dispositivo dell'utente non fornisce dati sulla posizione.
mpi.report.column.graph.usermob.graph.summary.text.status.third = L'analisi del fattore di mobilità dell'utente è pianificata per l'esecuzione periodica una volta all'inizio di ogni mese. L'ultima esecuzione pianificata è avvenuta il:
