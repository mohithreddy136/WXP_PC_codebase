mpi.report.common.cashdraweractivity = Attività del cassetto contanti
mpi.report.common.cashdraweractivity1 = 1. Per il tipo avviso per cassetti contanti = Tempo di apertura superato.
mpi.report.common.cashdraweractivity2 = I cassetti contanti mostrati in questa scheda hanno superato il proprio limite temporale configurato di apertura. Ciò potrebbe indicare una negligenza e un'attività potenzialmente sospetta per la postazione POS.
mpi.report.common.cashdraweractivity3 = 2. Per il tipo avviso per cassetti contanti = Apertura manuale cassetto contanti.
mpi.report.common.cashdraweractivity4 = I cassetti contanti mostrati in questa scheda sono stati aperti manualmente senza una transazione software POS che ne attivi l’apertura. Ciò potrebbe indicare una potenziale transazione esterna al software POS o una potenziale attività di sottrazione.
mpi.report.common.cashdraweractivity5 = 3. Per il tipo avviso per cassetti contanti = Apertura durante ore non autorizzate.
mpi.report.common.cashdraweractivity6 = I cassetti contanti mostrati in questa scheda sono rimasti aperti al di fuori delle ore di apertura standard configurate. Ciò potrebbe indicare che un cassetto contanti è stato aperto in un orario in cui avrebbe dovuto rimanere chiuso, mostrando un evento potenzialmente sospetto.
mpi.report.common.cashdraweractivitysub = 1. Per il tipo avviso per cassetti contanti = Tempo di apertura superato. I cassetti contanti mostrati in questa scheda hanno superato il proprio limite temporale configurato di apertura. Ciò potrebbe indicare una negligenza e un’attività potenzialmente sospetta per la postazione POS. 
2. Per il tipo avviso per cassetti contanti = Apertura manuale cassetto contanti. I cassetti contanti mostrati in questa scheda sono stati aperti manualmente senza una transazione software POS che ne attivi l’apertura. Ciò potrebbe indicare una potenziale transazione esterna al software POS o una potenziale attività di sottrazione. 
3. Per il tipo avviso per cassetti contanti = Evento non autorizzato. I cassetti contanti mostrati in questa scheda sono rimasti aperti al di fuori delle ore di apertura standard configurate. Ciò potrebbe indicare che un cassetto contanti è stato aperto in un orario in cui avrebbe dovuto rimanere chiuso, mostrando un evento potenzialmente sospetto.
