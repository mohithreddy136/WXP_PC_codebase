label.report_option_description_rpos_rposBaseUnitUsageHoursDetails = Questo rapporto riassume l'utilizzo giornaliero dell'unità di base mese per mese per vedere le tendenze di quali negozi e dispositivi hanno il più alto livello di utilizzo, nonché l'utilizzo e la necessità di questi dispositivi in momenti diversi. Questo rapporto aiuterà l'utente finale a tracciare le tendenze d'uso dell'unità di base per determinare se devono espandere o ridurre la flotta in certi periodi dell'anno o in generale.
