label.report_option_description_valueReminderEmail_details = Questo report comunica le prestazioni settimanali di un'azienda per le aree Produttività, Sicurezza, Integrità dispositivi e Adozione. È possibile pianificare l'invio del report tramite e-mail per ottenere un aggiornamento di stato periodico delle prestazioni dell'azienda rispetto alla media di TechPulse e conoscere le aree in cui occorre apportare miglioramenti.
