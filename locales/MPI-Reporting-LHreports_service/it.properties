mpi.report.column.graph.diskcap.graph.summary.text.description = Il rapporto Pianificazione capacità disco segnala preventivamente il tempo rimasto prima che lo spazio su disco raggiunga una soglia predeterminata. È possibile selezionare le soglie nei filtri del rapporto, definite come 0-10%, 0-20%, 0-30%, 0-40% e 0-50%.
mpi.report.column.graph.diskcap.graph.summary.text.status = Il rapporto utilizza i dati degli ultimi 3-6 mesi per stabilire il tempo rimasto prima che la capacità del disco raggiunga la soglia impostata nel filtro del rapporto. Le principali classificazioni per lo stato della capacità del disco sono le seguenti:
mpi.report.column.graph.diskcap.graph.summary.text.status.first = Immediato. Lo spazio su disco rimanente ha raggiunto la soglia predeterminata
mpi.report.column.graph.diskcap.graph.summary.text.status.five = OK. Lo spazio su disco non darà problemi per almeno i prossimi 1, 2 o 3 mesi, a seconda delle informazioni nella colonna dello stato aggiuntivo. 
mpi.report.column.graph.diskcap.graph.summary.text.status.four = Entro 3 mesi. Lo spazio su disco raggiungerà la soglia predeterminata entro 3 mesi
mpi.report.column.graph.diskcap.graph.summary.text.status.second = Entro 1 mese. Lo spazio su disco raggiungerà la soglia predeterminata entro 1 mese
mpi.report.column.graph.diskcap.graph.summary.text.status.seven = N/D. Lo spazio su disco per il momento non darà problemi, ma non sono disponibili dati sufficienti per prevedere il tempo rimasto prima che lo spazio su disco raggiunga la soglia predeterminata
mpi.report.column.graph.diskcap.graph.summary.text.status.six = Se la colonna dello stato aggiuntivo indica:
mpi.report.column.graph.diskcap.graph.summary.text.status.six.sub.first = 1+, then the disk space is OK for at least 1 month
mpi.report.column.graph.diskcap.graph.summary.text.status.six.sub.second = 2+, then the disk space is OK for at least 2 months
mpi.report.column.graph.diskcap.graph.summary.text.status.six.sub.third = 3+, then the disk space is OK for at least 3 months
mpi.report.column.graph.diskcap.graph.summary.text.status.third = Entro 2 mesi. Lo spazio su disco raggiungerà la soglia predeterminata entro 2 mesi
