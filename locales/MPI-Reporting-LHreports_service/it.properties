label.report_option_description_softwareUpdatesV2_microsoftOfficeUpdates = Questo report fornisce informazioni sui dispositivi per cui sono disponibili aggiornamenti di Microsoft Office, nonché la classificazione Microsoft Update degli aggiornamenti.
