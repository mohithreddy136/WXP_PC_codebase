mpi.report.column.graph.usermob.graph.summary.text.description = De mobiliteitsaspecten van gebruikers gebaseerd op de geolocatie van hun apparaat.
mpi.report.column.graph.usermob.graph.summary.text.status = De mobiliteitsfactor van een gebruiker gedurende een periode is gebaseerd op meerdere complexe, mobiele gedragspatronen. Sommige gebruikers reizen bijvoorbeeld voortdurend naar verschillende locaties met hetzelfde of verschillende apparaten met verschillende vormfactors, terwijl anderen regelmatig met hun apparaten tussen twee of drie locaties reizen. Anderen reizen alleen korte afstanden met hun apparaten. De mobiliteitsfactor van een gebruiker is gebaseerd op de geolocatie van hun apparaat voor apparaten die bij HP TechPulse Analytics and Proactive Management is geregistreerd, tegenover de gebruikerslocatie van externe bronnen.
mpi.report.column.graph.usermob.graph.summary.text.status.first = De locatiegebaseerde services om de geolocatie van apparaten te volgen is standaard voor alle gebruikers uitgeschakeld en er wordt in het HP TechPulse Analytics and Proactive Management cloudportaal een optie geboden om deze functie in of uit te schakelen. Zelfs als locatiegebaseerde services zijn ingeschakeld, kan HP TechPulse Analytics and Proactive Management geen locatiegegevens verzamelen van apparaten die zijn geclassificeerd als apparaten van werknemers of persoonlijke apparaten (in het HP TechPulse Analytics and Proactive Management cloudportaal).
mpi.report.column.graph.usermob.graph.summary.text.status.forth = Due to the monthly scheduled execution, users and devices that were enrolled or unenrolled in HP TechPulse Analytics and Proactive Management after the last scheduled execution, will not appear in this report.
mpi.report.column.graph.usermob.graph.summary.text.status.second = De mobiliteitsfactor van een gebruiker is een relatief niveau tussen 1 en 10 voor alle apparaten in Analytics en Proactive Management. Een niveau van 1 geeft aan dat een appaat van de gebruiker het minst mobiel is en een niveau van 10 geeft aan dat een apparaat van de gebruiker het meest mobiel is. Een niveau van –1 geeft aan dat er geen locatiegegevens van de apparaten van de gebruiker zijn.
mpi.report.column.graph.usermob.graph.summary.text.status.third = De analyse van de mobiliteitsfactor is periodiek ingepland op eenmaal per maand aan het begin van elke maand. Deze is het laatst uitgevoerd op:
