label.report_option_description_hwperfcomparison_hwperfcompanyconfigdetails = Met dit rapport kunnen gebruikers de prestaties van de apparaatconfiguraties van hun printers vergelijken met een reeks andere configuraties met dezelfde printers of HP TechPulse benchmarks. De meetgegevens voor vergelijking zijn: De wekelijkse gemiddelden voor CPU- en geheugengebruik, wekelijks aantal fouten met een blauw scherm of de gemiddelde tijd van opstarten/afsluiten voor een bepaalde week. De verschillen van de benchmarks worden geëvalueerd voor statistische betekenis en voor persistentie (d.w.z. het aantal opeenvolgende weken dat een metriek groter is dan de benchmark). Als er meerdere apparaatconfiguraties zijn geselecteerd, worden de metrieken gemiddeld over de configuraties weergegeven.
label.report_option_description_hwperfcomparison_hwperfsummary = Met dit rapport kunnen gebruikers de prestaties van de apparaatconfiguraties van hun printers vergelijken met een reeks andere configuraties met dezelfde printers of HP TechPulse benchmarks. De meetgegevens voor vergelijking zijn: De wekelijkse gemiddelden voor CPU- en geheugengebruik, wekelijks aantal fouten met een blauw scherm of de gemiddelde tijd van opstarten/afsluiten voor een bepaalde week. De verschillen van de benchmarks worden geëvalueerd voor statistische betekenis en voor persistentie (d.w.z. het aantal opeenvolgende weken dat een metriek groter is dan de benchmark). Als er meerdere apparaatconfiguraties zijn geselecteerd, worden de metrieken gemiddeld over de configuraties weergegeven.
label.report_option_description_hwperfcomparison_weeklyhwperfsummary = Met dit rapport kunnen gebruikers de prestaties van de apparaatconfiguraties van hun printers vergelijken met een reeks andere configuraties met dezelfde printers of HP TechPulse benchmarks. De meetgegevens voor vergelijking zijn: De wekelijkse gemiddelden voor CPU- en geheugengebruik, wekelijks aantal fouten met een blauw scherm of de gemiddelde tijd van opstarten/afsluiten voor een bepaalde week. De verschillen van de benchmarks worden geëvalueerd voor statistische betekenis en voor persistentie (d.w.z. het aantal opeenvolgende weken dat een metriek groter is dan de benchmark). Als er meerdere apparaatconfiguraties zijn geselecteerd, worden de metrieken gemiddeld over de configuraties weergegeven.
