label.report_option_additional_description_softuti = <b>Meest actief gebruikte apps</b> zijn gerangschikt op het aantal apparaten dat gebruik maakt van een app/het totale aantal apparaten.\n\n<b>Top apps op gebruiksduur</b> zijn gerangschikt op het overzicht van de gebruiksduur van een app/het totale aantal apparaten.\n\nIndien er in het rapportfilter meerdere maanden zijn geselecteerd, worden de grafieken berekend als het gemiddelde van de bovenstaande verhoudingen voor die maanden.
label.report_option_additional_description_softuti_summary = <b>Meest actief gebruikte apps</b> zijn gerangschikt op het aantal apparaten dat gebruik maakt van een app/het totale aantal apparaten.\n\n<b>Top apps op gebruiksduur</b> zijn gerangschikt op het overzicht van de gebruiksduur van een app/het totale aantal apparaten.\n\nIndien er in het rapportfilter meerdere maanden zijn geselecteerd, worden de grafieken berekend als het gemiddelde van de bovenstaande verhoudingen voor die maanden.
label.report_option_additional_description_thermalgrade_details = Windows: \n Onderhoud - Controleer ventilatieopeningen op verstoppingen en reinig de unit.\n OK - Geen actie vereist.\n \n MAC: \n Kritisch - De warmtestatus van het apparaat beïnvloedt de systeemprestaties aanzienlijk en het apparaat moet afkoelen.\n Ernstig - De warmtestatus van het apparaat is hoog. Ventilatoren werken op maximale snelheid en de systeemprestaties kunnen zijn aangetast.\n Nominaal - De thermische toestand is binnen normale limieten en er is geen corrigerende actie nodig.\n Redelijk - De thermische toestand is enigszins verhoogd, ventilatoren kunnen hoorbaar zijn.\n 
label.report_option_additional_description_thermalgradeV2_thermalGrading = Windows: \n Onderhoud - Controleer ventilatieopeningen op verstoppingen en reinig de unit.\n OK - Geen actie vereist.\n \n MAC: \n Kritisch - De warmtestatus van het apparaat beïnvloedt de systeemprestaties aanzienlijk en het apparaat moet afkoelen.\n Ernstig - De warmtestatus van het apparaat is hoog. Ventilatoren werken op maximale snelheid en de systeemprestaties kunnen zijn aangetast.\n Nominaal - De thermische toestand is binnen normale limieten en er is geen corrigerende actie nodig.\n Redelijk - De thermische toestand is enigszins verhoogd, ventilatoren kunnen hoorbaar zijn.\n
