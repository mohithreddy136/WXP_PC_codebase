mpi.report.column.graph.diskcap.graph.summary.text.description = Het rapport Planning schijfcapaciteit geeft van tevoren een verwachting van de tijd die nog resteert voordat de schijfruimte een vooraf bepaalde drempel bereikt. De drempels kunnen in de rapportfilters worden geselecteerd en zijn gedefinieerd als 0-10%, 0-20%, 0-30%, 0-40% en 0-50%.
mpi.report.column.graph.diskcap.graph.summary.text.status = In dit rapport worden gegevens van de afgelopen 3–6 maanden gebruikt om te bepalen hoeveel tijd resteert voordat de schijfcapaciteit de in de rapportfilter ingestelde drempel bereikt. De categorisaties op het hoogste niveau voor Status schijfcapaciteit zijn als volgt:
mpi.report.column.graph.diskcap.graph.summary.text.status.first = Onmiddellijk. De resterende schijfruimte heeft de drempel bereikt
mpi.report.column.graph.diskcap.graph.summary.text.status.five = OK. De schijfruimte blijft de komende 1, 2 of 3 maanden OK, afhankelijk van de informatie in de kolom Extra status. 
mpi.report.column.graph.diskcap.graph.summary.text.status.four = Binnen 3 maanden. De schijfruimte bereikt binnen 3 maanden de drempel
mpi.report.column.graph.diskcap.graph.summary.text.status.second = Binnen 1 maand. De schijfruimte bereikt binnen 1 maand de drempel
mpi.report.column.graph.diskcap.graph.summary.text.status.seven = N.v.t. De schijfruimte is voor nu OK, maar er zijn niet genoeg gegevens om een verwachting te maken van de tijd die nog resteert voordat de schijfruimte de drempel bereikt
mpi.report.column.graph.diskcap.graph.summary.text.status.six = Als de kolom Extra het volgende weergeeft:
mpi.report.column.graph.diskcap.graph.summary.text.status.six.sub.first = 1+, then the disk space is OK for at least 1 month
mpi.report.column.graph.diskcap.graph.summary.text.status.six.sub.second = 2+, then the disk space is OK for at least 2 months
mpi.report.column.graph.diskcap.graph.summary.text.status.six.sub.third = 3+, then the disk space is OK for at least 3 months
mpi.report.column.graph.diskcap.graph.summary.text.status.third = Binnen 2 maanden. De schijfruimte bereikt binnen 2 maanden de drempel
