label.report_option_additional_description_devicecomp = Android- en iOS-apparaten worden beschouwd als aangetast indien deze respectievelijk zijn geroot of gejailbreakt. Windows-apparaten worden beschouwd als aangetast indien het geconfigureerde beveiligingsbeleid afwijkt.
