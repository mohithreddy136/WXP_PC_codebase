label.report_option_additional_description_softuti = <b>Am häufigsten genutzte Apps</b> beziehen sich auf die Anzahl der Geräte, die eine App nutzen/die Gesamtzahl an Geräten.\n\n<b>Wichtigste Apps nach Nutzungszeit</b> beziehen sich auf die zusammengefasste Nutzungszeit der App/die Gesamtzahl an Geräten.\n\nWenn mehrere Monate im Berichtfilter ausgewählt sind, zeigen die Diagramme die durchschnittlichen Verhältnisse für diese Monate.
