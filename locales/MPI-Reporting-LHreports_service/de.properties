label.report_option_description_hwperfcomparison_hwperfcompanyconfigdetails = Mit dem Bericht können Benutzer die Leistung der Gerätekonfigurationen in Ihrer Flotte mit einem Satz anderer Konfigurationen in der gleichen Flotte oder mit HP TechPulse Benchmarks vergleichen. Für den Vergleich werden die folgenden Metriken verwendet: Die wöchentlichen Mittelwerte der CPU- und Speicherauslastung, die wöchentliche Anzahl von Bluescreen-Fehlern oder die durchschnittliche Dauer für das Starten/Herunterfahren in einer bestimmten Woche. Die Unterschiede zu den Benchmarks werden auf ihre statistische Signifikanz oder Persistenz ausgewertet (dabei wird die Anzahl aufeinanderfolgender Wochen betrachtet, in denen eine Metrik über dem Benchmark liegt). Wenn verschiedene Gerätekonfigurationen ausgewählt werden, werden die Metriken für die Konfigurationen gemittelt.
label.report_option_description_hwperfcomparison_hwperfsummary = Mit dem Bericht können Benutzer die Leistung der Gerätekonfigurationen in Ihrer Flotte mit einem Satz anderer Konfigurationen in der gleichen Flotte oder mit HP TechPulse Benchmarks vergleichen. Für den Vergleich werden die folgenden Metriken verwendet: Die wöchentlichen Mittelwerte der CPU- und Speicherauslastung, die wöchentliche Anzahl von Bluescreen-Fehlern oder die durchschnittliche Dauer für das Starten/Herunterfahren in einer bestimmten Woche. Die Unterschiede zu den Benchmarks werden auf ihre statistische Signifikanz oder Persistenz ausgewertet (dabei wird die Anzahl aufeinanderfolgender Wochen betrachtet, in denen eine Metrik über dem Benchmark liegt). Wenn verschiedene Gerätekonfigurationen ausgewählt werden, werden die Metriken für die Konfigurationen gemittelt.
label.report_option_description_hwperfcomparison_weeklyhwperfsummary = Mit dem Bericht können Benutzer die Leistung der Gerätekonfigurationen in Ihrer Flotte mit einem Satz anderer Konfigurationen in der gleichen Flotte oder mit HP TechPulse Benchmarks vergleichen. Für den Vergleich werden die folgenden Metriken verwendet: Die wöchentlichen Mittelwerte der CPU- und Speicherauslastung, die wöchentliche Anzahl von Bluescreen-Fehlern oder die durchschnittliche Dauer für das Starten/Herunterfahren in einer bestimmten Woche. Die Unterschiede zu den Benchmarks werden auf ihre statistische Signifikanz oder Persistenz ausgewertet (dabei wird die Anzahl aufeinanderfolgender Wochen betrachtet, in denen eine Metrik über dem Benchmark liegt). Wenn verschiedene Gerätekonfigurationen ausgewählt werden, werden die Metriken für die Konfigurationen gemittelt.
