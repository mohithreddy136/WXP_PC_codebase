label.report_option_description_rpos_rposBaseUnitUsageHoursDetails = Dieser Bericht fasst die tägliche Nutzung der Basisgeräte auf Monatsbasis zusammen, um Trends zu erkennen, in welchen Geschäften und mit welchen Geräten die Nutzung am höchsten ist und wie die Nutzung und Notwendigkeit dieser Geräte zu verschiedenen Zeiten aussieht. Dieser Bericht ermöglicht es Endbenutzern, Gerätenutzungstrends für Basiseinheiten zu verfolgen, um zu bestimmen, ob sie die Flotte zu bestimmten Zeiten im Jahr oder grundsätzlich erweitern oder reduzieren sollten
