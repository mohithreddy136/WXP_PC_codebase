mpi.report.column.graph.diskcap.graph.summary.text.description = Der Bericht zur Planung der Festplattenkapazität prognostiziert die verbleibende Zeit, bis die Speicherkapazität einen festgelegten Grenzwert erreicht. Die Grenzwerte können in den Filtern der Berichte ausgewählt und als 0-10 %, 0-20 %, 0-30 %, 0-40 % und 0-50 % definiert werden.
mpi.report.column.graph.diskcap.graph.summary.text.status = Der Bericht verwendet die Daten der letzten 3-6 Monate, um die verbleibende Zeit zu bestimmen, bis die Speicherkapazität den im Filter des Berichts festgelegten Grenzwert erreicht. Die obersten Kategorien für den Status der Festplattenkapazität sind wie folgt:
mpi.report.column.graph.diskcap.graph.summary.text.status.first = Sofort. Der verbleibende Plattenspeicherplatz hat den Grenzwert erreicht
mpi.report.column.graph.diskcap.graph.summary.text.status.five = OK. Der Plattenspeicherplatz kann abhängig von den Informationen in der Spalte "Zusätzlicher Status" noch für mindestens 1, 2 oder 3 Monate reichen. 
mpi.report.column.graph.diskcap.graph.summary.text.status.four = Innerhalb von 3 Monaten. Der Plattenspeicherplatz wird den Grenzwert innerhalb von 3 Monaten erreichen
mpi.report.column.graph.diskcap.graph.summary.text.status.second = Innerhalb von 1 Monat. Der Plattenspeicherplatz wird den Grenzwert innerhalb von 1 Monat erreichen
mpi.report.column.graph.diskcap.graph.summary.text.status.seven = Nicht verfügbar. Der Plattenspeicherplatz reicht für den Moment aus, aber es sind nicht genügend Daten vorhanden, um die verbleibende Zeit zu bestimmen, bis der Plattenspeicherplatz den Grenzwert erreicht.
mpi.report.column.graph.diskcap.graph.summary.text.status.six = Wenn Folgendes angezeigt wird:
mpi.report.column.graph.diskcap.graph.summary.text.status.six.sub.first = 1+, then the disk space is OK for at least 1 month
mpi.report.column.graph.diskcap.graph.summary.text.status.six.sub.second = 2+, then the disk space is OK for at least 2 months
mpi.report.column.graph.diskcap.graph.summary.text.status.six.sub.third = 3+, then the disk space is OK for at least 3 months
mpi.report.column.graph.diskcap.graph.summary.text.status.third = Innerhalb von 2 Monaten. Der Plattenspeicherplatz wird den Grenzwert innerhalb von 2 Monaten erreichen
