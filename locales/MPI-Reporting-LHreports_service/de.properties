label.report_option_description_softwareUpdates_msOfficeUpdates = Der Bericht bietet Informationen zu den Microsoft Office Updates, die auf den Geräten fehlen, und zur Wichtigkeit dieser Updates. Ein Gerät wird unter "Fehlendes kritisches Update" kategorisiert, wenn mindestens ein kritisches Update auf dem Gerät fehlt, auch wenn noch weitere Updates anderer Typen fehlen. Ein Gerät, auf dem kein kritisches Update, aber mindestens ein wichtiges Update fehlt, wird unter "Fehlendes wichtiges Update" kategorisiert usw.
