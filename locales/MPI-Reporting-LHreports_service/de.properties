mpi.report.common.unknownusbdevice = Unbekanntes USB-Gerät
mpi.report.common.unknownusbdevicesubheading = Auf dieser Registerkarte werden alle USB-Geräte hervorgehoben, die nicht zum Herstellen einer Verbindung mit der Basiseinheit konfiguriert und daher unbekannt und unerwartet sind. Die angezeigten Geräte könnten nicht autorisiert sein oder ein potenzielles Sicherheitsrisiko darstellen.
