mpi.report.column.graph.usermob.graph.summary.text.description = Die Mobilitätsaspekte von Benutzern basieren auf dem Standort ihrer Geräte.
mpi.report.column.graph.usermob.graph.summary.text.status = Der Mobilitätsfaktor von Benutzern in einem bestimmten Zeitraum basiert auf verschiedenen, komplexen mobilitätsbezogenen Verhaltensmustern. Beispielsweise reisen einige Benutzer mit denselben oder unterschiedlichen Geräten bzw. Gerätetypen ständig an verschiedene Orte, während andere Benutzer mit ihren Geräten häufig zwischen zwei oder drei Orten hin- und herpendeln und wieder andere mit ihren Geräten regelmäßig kurze Strecken zurücklegen. Der Mobilitätsfaktor nutzt die Ortungsinformationen von für HP TechPulse Analytics and Proactive Management registrierten Geräten anstelle von Informationen zum Benutzerstandort aus externen Quellen.
mpi.report.column.graph.usermob.graph.summary.text.status.first = Die standortbezogenen Services zur Ortung von Geräten sind standardmäßig für alle Kunden deaktiviert. Kunden haben die Möglichkeit, die standortbezogenen Services im cloudbasierten HP TechPulse Analytics and Proactive Management Portal zu aktivieren oder zu deaktivieren. Auch bei aktivierten standortbezogenen Services gestattet HP TechPulse Analytics and Proactive Management keine Erfassung von Standortdaten für Geräte, die als mitarbeitereigene oder Privatgeräte klassifiziert sind (innerhalb des cloudbasierten HP TechPulse Analytics and Proactive Management Portals).
mpi.report.column.graph.usermob.graph.summary.text.status.forth = Due to the monthly scheduled execution, users and devices that were enrolled or unenrolled in HP TechPulse Analytics and Proactive Management after the last scheduled execution, will not appear in this report.
mpi.report.column.graph.usermob.graph.summary.text.status.second = Der Mobilitätsfaktor des Benutzers wird mit einem Rang zwischen 1 und 10 angegeben. Es handelt sich dabei um einen relativen Rang für alle Geräte in Analytics and Proactive Management. Ein Rang von 1 gibt an, dass das Gerät eines Benutzers so gut wie gar nicht mobil verwendet wird, während ein Rang von 10 angibt, dass das Gerät eines Benutzers äußerst mobil verwendet wird. Ein Rang von -1 gibt an, dass keine Standortdaten für die Geräte eines Benutzers erfasst wurden.
mpi.report.column.graph.usermob.graph.summary.text.status.third = Die periodische Analyse des Mobilitätsfaktors des Benutzers wurde auf einmal am Anfang des Monats festgelegt. Die letzte geplante Ausführung war am:
