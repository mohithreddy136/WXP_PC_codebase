mpi.report.common.msrmaintenance = MSR-Wartung
mpi.report.common.msrsubmaintenance = Dies ist die Liste der Magnetstreifen-Lesegeräte, deren Nutzung in Bezug auf hochwertige Lesevorgänge einen bestimmten Wert erreicht hat. Es wird empfohlen, das Lesegerät zu reinigen. Der Kartensteckplatz muss von Verunreinigungen und Rückständen befreit werden, um eine fortgesetzte hohe Leistung des Lesegeräts sicherzustellen.
mpi.report.common.network.outages.details = Details zu Netzwerktrennungen
mpi.report.common.peripheralclaimingerrors = Fehler bei der Beanspruchung von Peripheriegeräten
mpi.report.common.peripheralclaimingerrorssubheading = Bei den auf dieser Registerkarte angezeigten Peripheriegeräten gibt es Probleme mit der Erfassung der Statistiken von Peripheriegeräten, und zwar aus verschiedenen Gründen, die in der folgenden Tabelle aufgeführt sind. Dazu gehören Konflikte bei der Beanspruchung von Peripheriegeräten mit der POS-Software, die richtige Konfiguration des HP Peripheral Agent und mehr.
mpi.report.common.peripheralmodeldetails = Hersteller und Modell des Peripheriegeräts
mpi.report.common.peripheralthresholdmet = Grenzwert von Peripheriegeräten erreicht
mpi.report.common.peripheralthresholdmetsubheading = Auf dieser Registerkarte werden Peripheriegeräte (Scanner, Magnetstreifenleser und Belegdrucker) hervorgehoben, die den jeweiligen Schwellenwert für die erwartete Nutzungsdauer überschritten haben. Dadurch wird darauf hingewiesen, dass die Peripheriegeräte aufgrund des Nutzungsalters ein relativ hohes Ausfallrisiko aufweisen. Es ist unerheblich, ob die Daten aus der Klasse der Protokolldaten oder aus einem vorhandenen Schwellenwertbericht extrahiert werden, je nachdem, was einfacher ist. Letztlich handelt es sich um dieselben Daten.
mpi.report.common.printerheadmaintenance = Dies ist die Liste der Belegdrucker, deren Nutzung in Bezug auf gedruckte Zeilen einen bestimmten Wert erreicht hat. Es wird empfohlen, den Druckkopf zu warten. Eine Reinigung des Druckkopfs ist erforderlich, um eine hohe Qualität der Druckausgabe zu gewährleisten.
mpi.report.common.printerknifecutmaintenance = Dies ist die Liste der Belegdrucker, deren Nutzung in Bezug auf Messerschnitte einen bestimmten Wert erreicht hat. Es wird empfohlen, das Druckermesser zu untersuchen und bei Bedarf zu warten. Es muss überprüft werden, ob das Messer noch scharf genug ist, um Belege problemlos abzuschneiden. Ggf. muss es geschärft oder ausgetauscht werden.
mpi.report.common.printerknifemaintenance = Druckermesserwartung
mpi.report.common.printheadmaintenance = Druckkopfwartung
