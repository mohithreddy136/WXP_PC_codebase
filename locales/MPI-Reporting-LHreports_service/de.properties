label.report_option_additional_description_thermalgrade_details = Windows: \n Wartung – Lüftungsschlitze auf Blockierungen prüfen und Einheit reinigen.\n OK – Keine Aktion erforderlich.\n \n MAC : \n Kritisch – Die Temperatur des Geräts beeinträchtigt die Systemleistung in hohem Maße und das Gerät muss abkühlen.\n Ernst – Die Temperatur des Geräts ist hoch. Lüfter laufen mit maximaler Geschwindigkeit und die Systemleistung kann leiden.\n Nominal – Die Temperatur liegt im normalen Bereich und es sind keine Maßnahmen erforderlich.\n Mittel – Die Temperatur ist leicht erhöht, Lüfter können hörbar sein.\n 
