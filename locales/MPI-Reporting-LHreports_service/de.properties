mpi.report.common.cashdraweractivity = Kassenladenaktivität
mpi.report.common.cashdraweractivity1 = 1. Alarmtyp Kassenschublade = Öffnungszeit überschritten.
mpi.report.common.cashdraweractivity2 = Die auf dieser Registerkarte aufgeführten Kassenschubladen haben den konfigurierten Schwellenwert für die Öffnungszeit überschritten. Dieser Alarm weist auf eine Nachlässigkeit und möglicherweise verdächtige Aktivität in der POS-Spur hin.
mpi.report.common.cashdraweractivity3 = 2. Alarmtyp Kassenschublade = Manuelle Öffnung der Kassenschublade.
mpi.report.common.cashdraweractivity4 = Die auf dieser Registerkarte aufgeführten Kassenschubladen wurden manuell geöffnet, ohne dass die Öffnung durch eine Transaktion der POS-Software ausgelöst wurde. Dieser Alarm weist auf eine potenzielle Transaktion außerhalb der POS-Software oder eine potenzielle Verlustaktivität hin.
mpi.report.common.cashdraweractivity5 = 3. Alarmtyp Kassenschublade = Öffnung außerhalb autorisierter Zeiten.
mpi.report.common.cashdraweractivity6 = Die auf dieser Registerkarte aufgeführten Kassenschubladen wurden außerhalb der konfigurierten Standardbetriebszeiten geöffnet. Dieser Alarm gibt an, dass zu einer Zeit auf eine Kassenschublade zugegriffen wurde, zu der der Zugriff nicht erwartet wurde. Dies weist auf ein potenziell verdächtiges Ereignis hin.
mpi.report.common.cashdraweractivitysub = 1. Alarmtyp Kassenschublade = Öffnungszeit überschritten. Die auf dieser Registerkarte aufgeführten Kassenschubladen haben den konfigurierten Schwellenwert für die Öffnungszeit überschritten. Dieser Alarm weist auf eine Nachlässigkeit und möglicherweise verdächtige Aktivität in der POS-Spur hin. 
2. Alarmtyp Kassenschublade = Manuelle Öffnung der Kassenschublade. Die auf dieser Registerkarte aufgeführten Kassenschubladen wurden manuell geöffnet, ohne dass die Öffnung durch eine Transaktion der POS-Software ausgelöst wurde. Dieser Alarm weist auf eine potenzielle Transaktion außerhalb der POS-Software oder eine potenzielle Verlustaktivität hin. 
3. Alarmtyp Kassenschublade = Nicht autorisiertes Ereignis. Die auf dieser Registerkarte aufgeführten Kassenschubladen wurden außerhalb der konfigurierten Standardbetriebszeiten geöffnet. Dieser Alarm gibt an, dass zu einer Zeit auf eine Kassenschublade zugegriffen wurde, zu der der Zugriff nicht erwartet wurde. Dies weist auf ein potenziell verdächtiges Ereignis hin.
