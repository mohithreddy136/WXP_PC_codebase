label.report_option_description_hwperfcomparison_hwperfcompanyconfigdetails = 该报告允许用户将其机群中的设备配置性能与同一机群中的一组其他配置或 HP TechPulse 基准进行比较。用于执行比较的指标为: 每周平均 CPU 和内存使用率、每周蓝屏错误数或给定周內的平均启动/关闭时间。将评估与基准的差异以实现统计显著性和持久性(即，指标持续大于基准的周数)。如果选择多个“设备配置”，则指标将跨多个配置求平均值。
