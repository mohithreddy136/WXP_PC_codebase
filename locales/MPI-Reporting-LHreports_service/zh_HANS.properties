label.report_option_additional_description_batterySwellProb_details = This report contains a list of HP devices that have been identified as having a high probability of swelling. These devices should be evaluated for any visual signs of swelling, and we recommend ensuring that the Battery Health Management (BHM) setting in the BIOS are set to Maximize My Battery Health.
label.report_option_additional_description_batteryUsageOpt_batteryRepAndRiskFact = For more information on how to optimize battery health and longevity, please visit: <a href='https://support.hp.com/us-en/document/c01297640' >https://support.hp.com/us-en/document/c01297640</a> .
label.report_option_additional_description_batteryUsageOpt_details = 有关如何优化电池运行状况和使用寿命的更多信息，请访问: <a href='https://support.hp.com/us-en/document/c01297640' >https://support.hp.com/us-en/document/c01297640</a>。\n请在 HP 支持页面中选择国家/地区，以您的首选国家/地区和语言查看文章。
label.report_option_additional_description_devicecomp = 如果分别对 Android 设备和 iOS 设备执行 Root 和越狱操作，则将它们视为被盗用。如果配置的安全策略不合规，则将 Windows 设备视为被盗用。
label.report_option_additional_description_devicecomp_details = 如果分别对 Android 设备和 iOS 设备执行 Root 和越狱操作，则将它们视为被盗用。如果配置的安全策略不合规，则将 Windows 设备视为被盗用。
label.report_option_additional_description_softuti = <b>使用最多的应用</b>根据使用应用的设备数量/总体设备数量进行排名。\n\n<b>使用时间最长的应用</b>根据汇总的应用使用时间/总体设备数量进行排名。\n\n如果在报表过滤器中选择了几个月，则图表将计算为这些月份的上述比率的平均值。
label.report_option_additional_description_softuti_summary = <b>使用最多的应用</b>根据使用应用的设备数量/总体设备数量进行排名。\n\n<b>使用时间最长的应用</b>根据汇总的应用使用时间/总体设备数量进行排名。\n\n如果在报表过滤器中选择了几个月，则图表将计算为这些月份的上述比率的平均值。
label.report_option_additional_description_thermalgrade_details = Windows：\n 维护 - 检查通风孔是否堵塞并清洁设备。\n 正常 - 无需执行任何操作。\n \n MAC：\n 严重 - 设备上的热状态显著影响系统的性能，需要冷却设备。\n 严重 - 设备上的热状态较高。风扇正以最大速度运行，系统性能可能受到影响。\n 标称 - 热状态在正常范围内，无需采取纠正措施。\n 一般 - 热状态稍微升高，风扇可能会发出声音。\n 
label.report_option_additional_description_thermalgradeV2_thermalGrading = Windows: \n 维护 - 检查通风孔是否堵塞并清洁设备。\n 正常 - 无需执行任何操作。\n \n MAC: \n 严重 - 设备上的热量状态显著影响系统的性能，需要冷却设备。\n 严重 - 设备上的热量状态较高。风扇正以最大速度运行，系统性能可能受到影响。\n 标称 - 热量状态在正常范围内，无需采取纠正措施。\n 一般 - 热量状态稍微升高，风扇可能会发出声音。\n
