mpi.report.common.cashdraweractivity = Cash Drawer 活动
mpi.report.common.cashdraweractivity1 = 1. 对于现金抽屉警报类型 = 超出“打开时间”。
mpi.report.common.cashdraweractivity2 = 此选项卡中显示的现金抽屉已超出为其配置的打开时间阈值。这将突出显示其 POS 通道的疏忽和潜在可疑活动。
mpi.report.common.cashdraweractivity3 = 2. 对于现金抽屉警报类型 = 现金抽屉手动打开。
mpi.report.common.cashdraweractivity4 = 此选项卡中显示的现金抽屉已手动打开，并且没有 POS 软件交易触发收银台打开。这将表明在 POS 软件之外发生潜在交易或存在潜在损失活动。
mpi.report.common.cashdraweractivity5 = 3. 对于现金抽屉警报类型 = 在未经授权的时间段内打开。
mpi.report.common.cashdraweractivity6 = 此选项卡中显示的现金抽屉已在配置的标准工作时间之外打开。这将表明现金抽屉在不应被访问的时间内被访问，从而突出显示潜在的可疑事件。
mpi.report.common.cashdraweractivitysub = 1. 对于现金抽屉警报类型 = 超出“打开时间”。此选项卡中显示的现金抽屉已超出为其配置的打开时间阈值。这将突出显示其 POS 通道的疏忽和潜在可疑活动。
2. 对于现金抽屉警报类型 = 现金抽屉手动打开。此选项卡中显示的现金抽屉已手动打开，并且没有 POS 软件交易触发收银台打开。这将表明在 POS 软件之外发生潜在交易或存在潜在损失活动。
3. 对于现金抽屉警报类型 = 未经授权的事件。此选项卡中显示的现金抽屉已在配置的标准工作时间之外打开。这将表明现金抽屉在不应被访问的时间内被访问，从而突出显示潜在的可疑事件。
