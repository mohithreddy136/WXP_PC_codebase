label.report_option_description_softwareUpdates_msOfficeUpdates = 该报告提供有关设备上缺少的 Microsoft Office 更新及其关键性级别的信息。如果设备缺少至少一个关键更新，则即使它还缺少其他类型的更新，该设备也将归类为“缺少关键更新”。不缺少任何关键更新但至少缺少一个重要更新的设备将归类为“缺少重要更新”，依此类推。
