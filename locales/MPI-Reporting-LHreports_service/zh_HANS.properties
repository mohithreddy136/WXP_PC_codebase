mpi.report.column.graph.usermob.graph.summary.text.description = 用户流动方面基于用户设备的地理定位。
mpi.report.column.graph.usermob.graph.summary.text.status = 某个时间段的用户流动因素基于多个复杂的移动行为模式。例如，一些用户时常携带相同设备或尺寸各异的不同设备出行，而另一些用户则经常携带设备在两三个地点之间往返，再有一些用户时常携带设备短程活动。用户流动因素充分利用 HP TechPulse Analytics 和 Proactive Management 中注册的设备的用户设备地理定位功能确定用户位置，而不是使用来自任何外部来源的任何用户位置。
mpi.report.column.graph.usermob.graph.summary.text.status.first = 所有客户的用于跟踪设备地理位置的定位服务默认情况下都是关闭的，且在基于云的 HP TechPulse Analytics 和 Proactive Management 门户中为客户提供了启用或禁用定位服务的选项。即使开启定位服务，对归类为员工所有或私人的设备，HP TechPulse Analytics 和 Proactive Management 也不允许收集设备位置数据(在基于云的 HP TechPulse Analytics 和 Proactive Management 门户中)。
mpi.report.column.graph.usermob.graph.summary.text.status.forth = Due to the monthly scheduled execution, users and devices that were enrolled or unenrolled in HP TechPulse Analytics and Proactive Management after the last scheduled execution, will not appear in this report.
mpi.report.column.graph.usermob.graph.summary.text.status.second = 用户的移动性系数是一个值在 1 到 10 之间的等级，相对于分析和主动式管理中的所有设备。等级为 1 表示用户设备的移动性最低，而等级为 10 则表示用户设备的移动性最高。等级为 -1 表示没有任何关于用户设备的位置数据。
mpi.report.column.graph.usermob.graph.summary.text.status.third = 用户移动性系数分析计划为每个月开始时定期运行一次。上次计划执行时间为:
