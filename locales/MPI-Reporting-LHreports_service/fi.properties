label.report_option_description_hwperfcomparison_hwperfcompanyconfigdetails = Raportin avulla käyttäjät voivat vertailla kalustonsa laitekokoonpanojen suorituskykyä saman kaluston muihin laitekokoonpanoihin tai HP TechPulse -vertailuarvoihin. Vertailun mittarit: Suorittimen ja muistin käytön viikoittaiset keskiarvot, sinisten virhenäyttöjen viikoittaiset määrät ja tietyn viikon käynnistysten/sammutusten keskimääräiset kestot. Erot vertailuarvoihin nähden arvioidaan tilastollisen merkittävyyden ja jatkuvuuden (eli peräkkäisten viikkojen määrä, kun mittarin arvo on suurempi kuin vertailuarvo) suhteen. Jos valitaan useita laitekokoonpanoja, käytetään eri kokoonpanojen välistä keskiarvoa.
