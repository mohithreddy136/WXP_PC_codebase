mpi.report.common.cashdraweractivity1 = 1. Kassalaatikon hälytystyyppi = aukipitoaika ylittyi.
mpi.report.common.cashdraweractivity2 = Tässä välilehdessä näytetyt kassalaatikot ovat ylittäneet aukipitoajalleen määritetyn aikarajan. Tämä viittaa laiminlyöntiin ja mahdolliseen epäilyttävään toimintaan kyseisellä kassalla.
mpi.report.common.cashdraweractivity3 = 2. Kassalaatikon hälytystyyppi = manuaalinen kassalaatikon avaaminen.
mpi.report.common.cashdraweractivity4 = Tässä välilehdessä näytetyt kassalaatikot avattiin manuaalisesti ilman, että kassaohjelmiston maksutapahtuma olisi avannut kassalaatikon. Tämä viittaa mahdolliseen maksutapahtumaan, joka on tehty kassaohjelmiston ulkopuolella tai mahdolliseen tappioita aiheuttavaan toimintaan.
mpi.report.common.cashdraweractivity5 = 3. Kassalaatikon hälytystyyppi = avattu luvallisen ajan ulkopuolella.
mpi.report.common.cashdraweractivity6 = Tässä välilehdessä näytetyt kassalaatikot avattiin määritetyn aukioloajan ulkopuolella. Toisin sanoen kassalaatikko avattiin odottamattomaan aikaan, mikä saattaa viitata epäilyttävään tapahtumaan.
mpi.report.common.cashdraweractivitysub = 1. Kassalaatikon hälytystyyppi = aukipitoaika ylittyi. Tässä välilehdessä näytetyt kassalaatikot ovat ylittäneet aukipitoajalleen määritetyn aikarajan. Tämä viittaa laiminlyöntiin ja mahdolliseen epäilyttävään toimintaan kyseisellä kassalla. 
2. Kassalaatikon hälytystyyppi = manuaalinen kassalaatikon avaaminen. Tässä välilehdessä näytetyt kassalaatikot avattiin manuaalisesti ilman, että kassaohjelmiston maksutapahtuma olisi avannut kassalaatikon. Tämä viittaa mahdolliseen maksutapahtumaan, joka on tehty kassaohjelmiston ulkopuolella tai mahdolliseen tappioita aiheuttavaan toimintaan. 
3. Kassalaatikon hälytystyyppi = luvaton tapahtuma. Tässä välilehdessä näytetyt kassalaatikot avattiin määritetyn aukioloajan ulkopuolella. Toisin sanoen kassalaatikko avattiin odottamattomaan aikaan, mikä saattaa viitata epäilyttävään tapahtumaan.
