mpi.report.column.graph.usermob.graph.summary.text.description = Käyttäjien liikkuvuustiedot perustuvat laitteen maantieteelliseen sijaintiin.
mpi.report.column.graph.usermob.graph.summary.text.status = Käyttäjän liikkuvuuskerroin tietyllä ajanjaksolla perustuu useisiin monitahoisiin liikkuvuuden käytösmalleihin. Osa käyttäjistä esimerkiksi matkustaa jatkuvasti eri paikkoihin sama laite tai erilaisia laitteita mukanaan, toiset matkustavat usein kahden tai kolmen eri paikan välillä laitteidensa kanssa ja toiset puolestaan liikkuvat jatkuvasti lyhyitä matkoja laitteidensa kanssa. Käyttäjän liikkuvuuskertoimen luomiseen käytetään käyttäjien HP TechPulse Analytics and Proactive Managementin kautta hallinnoitujen laitteiden maantieteellisiä sijainteja, ei ulkoisista lähteistä saatavia käyttäjän sijaintitietoja.
mpi.report.column.graph.usermob.graph.summary.text.status.first = Laitteiden maantieteellisen sijainnin seurantaan käytettävät sijaintipalvelut ovat oletuksena poissa käytöstä kaikilla asiakkailla, ja asiakkaille tarjotaan mahdollisuus ottaa sijaintipalvelut käyttöön tai poistaa ne käytöstä pilvipohjaisessa HP TechPulse Analytics and Proactive Management -portaalissa. Vaikka sijaintipalvelut olisi kytketty päälle, HP TechPulse Analytics and Proactive Management ei salli sijaintitietojen keräämistä laitteista, jotka on luokiteltu työntekijöiden omistamiksi tai henkilökohtaisiksi laitteiksi (pilvipohjaisen HP TechPulse Analytics and Proactive Management -portaalin kautta).
mpi.report.column.graph.usermob.graph.summary.text.status.forth = Due to the monthly scheduled execution, users and devices that were enrolled or unenrolled in HP TechPulse Analytics and Proactive Management after the last scheduled execution, will not appear in this report.
mpi.report.column.graph.usermob.graph.summary.text.status.second = Käyttäjän liikkuvuuskerroin on arvo väliltä 1–10, ja se on suhteellinen arvo verrattuna kaikkiin analytiikan ja ennakoivan hallinnan laitteisiin. Arvo 1 tarkoittaa, että käyttäjän laite on vähiten liikkuva, ja arvo 10 tarkoittaa, että se on liikkuvin. Arvo -1 ilmaisee, että käyttäjän laitteista ei ole saatavana sijaintitietoja.
mpi.report.column.graph.usermob.graph.summary.text.status.third = Käyttäjän liikkuvuuskertoimen analyysi on ajastettu suoritettavaksi kerran jokaisen kuukauden alussa. Viimeisin ajastettu suorituskerta oli:
