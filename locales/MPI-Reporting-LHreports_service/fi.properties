mpi.report.column.graph.diskcap.graph.summary.text.description = Levyn kapasiteetin suunnitteluraportti kertoo arvion siitä, kuinka paljon aikaa on jäljellä ennen kuin levytila saavuttaa asetetun kynnysarvon. Kynnysarvot ovat valittavissa raportin suodattimista, ja ne on määritetty väleille 0–10 %, 0–20 %, 0–30 %, 0–40 % ja 0–50 %.
mpi.report.column.graph.diskcap.graph.summary.text.status = Raportti käyttää tietoja viimeisen 3–6 kuukauden ajalta sen määrittämiseksi, kuinka paljon aikaa kuluu, ennen kuin levyn kapasiteetti saavuttaa raportin suodattimessa määritetyn raja-arvon. Levyn kapasiteetin tilan ylätason luokitukset ovat seuraavat:
