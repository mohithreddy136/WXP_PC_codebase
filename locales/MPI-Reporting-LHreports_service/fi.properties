label.report_option_description_softwareUpdates_msOfficeUpdates = Raportissa on tietoja Microsoft Office -päivityksistä, jotka puuttuvat laitteista, ja näiden päivitysten kriittisyystaso. Laitteen luokka on ”Kriittisiä päivityksiä puuttuu”, jos siitä puuttuu vähintään yksi kriittinen päivitys, vaikka siitä puuttuisi samaan aikaan myös muunlaisia päivityksiä. Jos laitteesta ei puutu yhtään kriittistä päivitystä, mutta siitä puuttuu vähintään yksi tärkeä päivitys, sen luokka on ”Tärkeitä päivityksiä puuttuu” ja niin edelleen.
