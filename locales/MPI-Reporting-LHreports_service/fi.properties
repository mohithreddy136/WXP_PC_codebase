label.report_option_additional_description_devicecomp = Android- ja iOS-laitteita pidetään vaarantuneina, jos niiden suojaus on murrettu (rooting- tai jailbreak-tekniikka). Windows-laitteita pidetään vaarantuneina, jos niiden määritetyt suojauskäytännöt eivät noudata ehtoja.
