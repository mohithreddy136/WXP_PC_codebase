mpi.report.column.graph.diskcap.graph.summary.text.status.four = 3 kuukauden kuluessa Levytila saavuttaa raja-arvon 3 kuukauden kuluessa
mpi.report.column.graph.diskcap.graph.summary.text.status.second = 1 kuukauden kuluessa. Levytila saavuttaa raja-arvon 1 kuukauden kuluessa
mpi.report.column.graph.diskcap.graph.summary.text.status.seven = – Levytila on toistaiseksi riittävä, mutta käytettävien tietojen perusteella ei voida ennustaa etukäteen, kuinka kauan kuluu siihen, että levytila saavuttaa raja-arvonsa
