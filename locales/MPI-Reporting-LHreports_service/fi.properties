label.report_option_additional_description_softuti = <b>Käytetyimmät sovellukset</b> määritetään sovellusta käyttävien laitteiden ja laitteiden kokonaismäärän perusteella.\n\n<b>Käytetyimmät sovellukset käyttöajan mukaan</b> määritetään sovelluksen käyttöajan yhteenvedon ja laitteiden kokonaismäärän perusteella.\n\nJos raportin suodattimeen on valittu useita kuukausia, kaavioissa ilmoitetaan yllä mainittujen lukujen keskiarvot valituilta kuukausilta.
label.report_option_additional_description_softuti_summary = <b>Käytetyimmät sovellukset</b> määritetään sovellusta käyttävien laitteiden ja laitteiden kokonaismäärän perusteella.\n\n<b>Käytetyimmät sovellukset käyttöajan mukaan</b> määritetään sovelluksen käyttöajan yhteenvedon ja laitteiden kokonaismäärän perusteella.\n\nJos raportin suodattimeen on valittu useita kuukausia, kaavioissa ilmoitetaan yllä mainittujen lukujen keskiarvot valituilta kuukausilta.
label.report_option_additional_description_thermalgrade_details = Windows: \n Huolla – Tarkista tuuletusaukot tukosten varalta ja puhdista yksikkö.\n Ok – Toimia ei vaadita.\n\n MAC: \n Kriittinen – Laitteen lämpötila vaikuttaa merkittävästi järjestelmän suorituskykyyn, minkä vuoksi laitteen on annettava jäähtyä.\n Vakava – Laitteen lämpötila on korkea. Tuulettimet pyörivät enimmäisnopeudella, ja järjestelmän suorituskyky voi heiketä.\n Normaali – Lämpötila on normaalien raja-arvojen mukainen, eikä korjaustoimia vaadita.\n Kohtuullinen – Lämpötila on hieman kohonnut, ja tuulettimista voi lähteä havaittavaa ääntä.\n 
