mpi.report.common.cashdraweractivity = Cash Drawer 활동
mpi.report.common.cashdraweractivity1 = 1. Cash Drawer 알림 유형 = 열기 시간 초과.
mpi.report.common.cashdraweractivity2 = 이 탭에 표시된 Cash Drawer를 여는 데 걸리는 시간으로 설정한 임계값을 초과했습니다. POS 레인을 부주의하게 관리했거나 의심스러운 활동이 발생했을 수 있습니다.
mpi.report.common.cashdraweractivity3 = 2. Cash Drawer 알림 유형 = Cash Drawer 수동 열림.
mpi.report.common.cashdraweractivity4 = 이 탭에 표시된 Cash Drawer가 서랍을 여는 POS 소프트웨어 트랜잭션 없이 수동으로 열렸습니다. POS 소프트웨어 외부에서 잠재적 트랙잭션이 이루어졌거나 도난이 발생했을 수 있습니다.
mpi.report.common.cashdraweractivity5 = 3. Cash Drawer 알림 유형 = 승인 시간 외 열림.
mpi.report.common.cashdraweractivity6 = 이 탭에 표시된 Cash Drawer가 구성된 표준 작동 시간이 아닌 시간에 열렸습니다. 예정에 없던 시간에 Cash Drawer에 접근이 있었다는 의미이며, 잠재적으로 의심스러운 이벤트를 강조합니다.
mpi.report.common.cashdraweractivitysub = 1. Cash Drawer 알림 유형 = 열기 시간 초과. 이 탭에 표시된 Cash Drawer를 여는 데 걸리는 시간으로 설정한 임계값을 초과했습니다. POS 레인을 부주의하게 관리했거나 의심스러운 활동이 발생했을 수 있습니다. 2. Cash Drawer 알림 유형 = Cash Drawer 수동 열림. 이 탭에 표시된 Cash Drawer가 서랍을 여는 POS 소프트웨어 트랜잭션 없이 수동으로 열렸습니다. POS 소프트웨어 외부에서 잠재적 트랙잭션이 이루어졌거나 도난이 발생했을 수 있습니다. 3. Cash Drawer 알림 유형 = 무단 이벤트. 이 탭에 표시된 Cash Drawer가 구성된 표준 작동 시간이 아닌 시간에 열렸습니다. 예정에 없던 시간에 Cash Drawer에 접근이 있었다는 의미이며, 잠재적으로 의심스러운 이벤트를 강조합니다.
