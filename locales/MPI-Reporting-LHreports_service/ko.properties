mpi.report.column.graph.usermob.graph.summary.text.description = 장치의 지리적 위치에 따른 사용자의 이동성 측면입니다.
mpi.report.column.graph.usermob.graph.summary.text.status = 일정 기간 동안의 사용자 이동성 요인은 다양하고 복잡한 모바일 행동 패턴에 기반을 둡니다. 예를 들어, 누구는 폼 팩터가 상이한 다른 장치나 같은 장치를 들고 다른 장소로 끊임없이 이동하고, 어떤 사용자는 장치를 들고 2개 또는 3개의 장소를 자주 왔다 갔다 하고, 누구는 장치를 들고 짧은 거리를 계속 이동하기도 합니다. 사용자 이동성 요인은 외부 소스의 사용자 위치가 아닌 HP TechPulse Analytics 및 Proactive Management에 등록된 장치에 대해 사용자 장치의 지리적 위치를 활용합니다.
mpi.report.column.graph.usermob.graph.summary.text.status.first = 장치의 지리적 위치를 추적하는 위치 기반 서비스는 모든 고객에 대해 기본적으로 해제되어 있으며, 클라우드 기반 HP TechPulse Analytics 및 Proactive Management 포털에서 위치 기반 서비스를 활성화하거나 비활성화할 수 있는 옵션이 제공됩니다. 위치 기반 서비스가 켜져 있는 경우에도 HP TechPulse Analytics 및 Proactive Management에서는 직원 소유 장치나 개인용 장치로 분류된 장치(클라우드 기반 HP TechPulse Analytics 및 Proactive Management 포털 내)의 장치 위치 데이터 수집을 허용하지 않습니다.
mpi.report.column.graph.usermob.graph.summary.text.status.forth = Due to the monthly scheduled execution, users and devices that were enrolled or unenrolled in HP TechPulse Analytics and Proactive Management after the last scheduled execution, will not appear in this report.
mpi.report.column.graph.usermob.graph.summary.text.status.second = 사용자의 이동성 요인은 1에서 10 사이로 평가되며, 이는 분석 및 사전 예방적 관리에 있어 모든 장치에 걸쳐 상대적인 수치입니다. 수치가 1이면 사용자의 장치가 가장 적게 이동하고, 수치가 10이면 사용자의 장치가 가장 많이 이동한다는 의미입니다. 수치가 -1이면 사용자 장치의 위치 데이터가 없음을 나타냅니다.
mpi.report.column.graph.usermob.graph.summary.text.status.third = 사용자 이동성 요인 분석은 매월 초에 한 번씩 주기적으로 실행되게끔 예약되어 있습니다. 마지막으로 예약된 실행 날짜는 다음과 같습니다.
