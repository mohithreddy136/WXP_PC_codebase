label.report_option_additional_description_batteryStatRiskFact_batteryRepAndRiskFact = 배터리 상태 및 수명을 최적화하는 방법에 대한 자세한 내용은 다음을 참조하십시오. <a href='https://support.hp.com/us-en/document/ish_4034543-1660469-16'>https://support.hp.com/us-en/document/ish_4034543-1660469-16</a>.
label.report_option_additional_description_batterySwellProb_details = This report contains a list of HP devices that have been identified as having a high probability of swelling. These devices should be evaluated for any visual signs of swelling, and we recommend ensuring that the Battery Health Management (BHM) setting in the BIOS are set to Maximize My Battery Health.
label.report_option_additional_description_batteryUsageOpt_batteryRepAndRiskFact = For more information on how to optimize battery health and longevity, please visit: <a href='https://support.hp.com/us-en/document/c01297640' >https://support.hp.com/us-en/document/c01297640</a> .
label.report_option_additional_description_batteryUsageOpt_details = 배터리 상태 및 수명을 최적화하는 방법에 대한 자세한 내용은 다음을 참조하십시오. <a href='https://support.hp.com/us-en/document/c01297640' >https://support.hp.com/us-en/document/c01297640</a> . \nHP 지원 페이지에서 국가/지역을 선택하면 원하는 국가 및 언어로 기사를 볼 수 있습니다.
label.report_option_additional_description_devicecomp = 안드로이드와 iOS 장치는 각각 루팅된 경우와 탈옥된 경우에 손상된 것으로 간주됩니다. Windows 장치는 구성된 보안 정책이 준수되지 않으면 손상된 것으로 간주됩니다.
label.report_option_additional_description_devicecomp_details = 안드로이드와 iOS 장치는 각각 루팅된 경우와 탈옥된 경우에 손상된 것으로 간주됩니다. Windows 장치는 구성된 보안 정책이 준수되지 않으면 손상된 것으로 간주됩니다.
label.report_option_additional_description_softuti = <b>가장　많이　사용 중인　앱</b>은 앱을 사용하는 장치 수/전체 장치 수로 순위가 매겨집니다.\n\n<b>사용 시간별 상위 앱</b>은 요약 앱 사용 시간/전체 장치　수로 순위가 매겨집니다.\n\n보고서 필터에서 여러 달을 선택한 경우 차트는 해당하는　달에　대해 위 비율의 평균으로 계산됩니다.
label.report_option_additional_description_softuti_summary = <b>가장　많이　사용 중인　앱</b>은 앱을 사용하는 장치 수/전체 장치 수로 순위가 매겨집니다.\n\n<b>사용 시간별 상위 앱</b>은 요약 앱 사용 시간/전체 장치　수로 순위가 매겨집니다.\n\n보고서 필터에서 여러 달을 선택한 경우 차트는 해당하는　달에　대해 위 비율의 평균으로 계산됩니다.
label.report_option_additional_description_thermalgrade_details = Windows: \n 유지 관리 - 통풍구가 막혔는지 점검하고 유닛을 청소합니다.\n 양호 - 작업이 필요 없습니다.\n \n MAC: \n 위험 - 장치의 온도 상태가 시스템 성능에 상당한 영향을 미치므로, 장치 온도를 내려 주어야 합니다.\n 심각 - 장치의 온도가 높은 상태입니다. 팬이 최대 속도로 작동하고 있어 시스템 성능에 영향을 줄 수 있습니다.\n 정상 - 온도가 정상 한도 내에 있는 상태이므로, 시정 조치가 필요하지 않습니다.\n 양호 - 온도가 약간 높아진 상태여서 팬 소리가 들릴 수 있습니다.\n
label.report_option_additional_description_thermalgradeV2_thermalGrading = Windows: \n 유지 관리 - 통풍구가 막혔는지 점검하고 유닛을 청소합니다.\n 양호 - 작업이 필요 없습니다.\n \n MAC: \n 위험 - 장치의 온도 상태가 시스템 성능에 상당한 영향을 미치므로, 장치 온도를 내려 주어야 합니다.\n 심각 - 장치의 온도가 높은 상태입니다. 팬이 최대 속도로 작동하고 있어 시스템 성능에 영향을 줄 수 있습니다.\n 정상 - 온도가 정상 한도 내에 있는 상태이므로, 시정 조치가 필요하지 않습니다.\n 양호 - 온도가 약간 높아진 상태여서 팬 소리가 들릴 수 있습니다.\n
