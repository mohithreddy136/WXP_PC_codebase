label.report_option_additional_description_devicecomp = Androidデバイスがroot化されたり、iOSデバイスがJailbreakされたりした場合に、デバイスのセキュリティが侵害されたとみなされます。Windowsデバイスは設定されているセキュリティ ポリシーのどれかが準拠していない場合に、デバイスのセキュリティが侵害されたとみなされます。
label.report_option_additional_description_devicecomp_details = Androidデバイスがroot化されたり、iOSデバイスがJailbreakされたりした場合に、デバイスのセキュリティが侵害されたとみなされます。Windowsデバイスは設定されているセキュリティ ポリシーのどれかが準拠していない場合に、デバイスのセキュリティが侵害されたとみなされます。
label.report_option_additional_description_softuti = <b>[積極的に使用された上位のアプリ]</b>は、アプリを使用したデバイス数を全デバイス数で割った数値が高い順にランク付けされます。\n\n<b>[使用時間による上位のアプリ]</b>は、アプリの総使用時間を全デバイス数で割った数値が高い順にランク付けされます。\n\nレポート フィルターで複数の月を選択した場合は、その複数の月の上記の割合の平均でチャートが算出されます。
label.report_option_additional_description_softuti_summary = <b>[積極的に使用された上位のアプリ]</b>は、アプリを使用したデバイス数を全デバイス数で割った数値が高い順にランク付けされます。\n\n<b>[使用時間による上位のアプリ]</b>は、アプリの総使用時間を全デバイス数で割った数値が高い順にランク付けされます。\n\nレポート フィルターで複数の月を選択した場合は、その複数の月の上記の割合の平均でチャートが算出されます。
label.report_option_additional_description_thermalgrade_details = Windows：\n  [Maintenance]（メンテナンス）：通気孔がふさがれていないか確認し、ユニットを清掃します。\n[OK]：操作は必要ありません。\n\n MAC：\n [Critical]（重大）：デバイスの温度が高いためにシステムのパフォーマンスに大きく影響を及ぼしており、デバイスの冷却が必要です。\n[Serious]（深刻）：デバイスの温度が高い状態です。ファンが最大速度で動作しており、システム パフォーマンスに影響が出る可能性があります。\n[Nominal]（定格）：温度状態は正常範囲内であり、修正操作は必要ありません。\n[Fair]（適正）：温度がわずかに上昇しており、ファンの音が聞こえる場合があります。\n 
label.report_option_additional_description_thermalgradeV2_thermalGrading = Windows：\n メンテナンス：通気口が詰まっていないか確認し、ユニットを清掃してください。\n OK：操作は必要ありません。\n \n MAC：\n [Critical]（重大）：デバイスの温度が高いためにシステムのパフォーマンスに大きく影響を及ぼしており、デバイスの冷却が必要です。\n [Serious]（重要）：デバイスの温度が高くなっています。ファンが最高速度で回転していることが、システムのパフォーマンスに影響している可能性があります。\n [Nominal]（定格）：温度は定格制限内であり、修正措置は必要ありません。\n [Fair]（適正）：温度が少し上昇し、ファンの音が聞こえる場合があります。\n
