mpi.report.common.cashdraweractivity = キャッシュ ドロワー アクティビティ
mpi.report.common.cashdraweractivity1 = 1. キャッシュ ドロワーの警告タイプ = 開錠時間の超過。
mpi.report.common.cashdraweractivity2 = このタブに表示されるキャッシュ ドロワーは、設定された開錠時間のしきい値を超えています。これは、そのPOSレーンでの過失や、疑わしい使用状況の可能性を示しています。
mpi.report.common.cashdraweractivity3 = 2. キャッシュ ドロワーの警告タイプ = 手動での開錠。
mpi.report.common.cashdraweractivity4 = このタブに表示されるキャッシュ ドロワーは、POSソフトウェアの処理によらずに手動で開錠されています。これは、POSソフトウェア以外の場所で処理が発生している可能性があるか、損失が発生した可能性があることを示しています。
mpi.report.common.cashdraweractivity5 = 3. キャッシュ ドロワーの警告タイプ = 許可された時間外の開錠。
mpi.report.common.cashdraweractivity6 = このタブに表示されるキャッシュ ドロワーは、設定された標準運用時間外に開錠されています。これは、キャッシュ ドロワーが、アクセスされるべきではない時間帯にアクセスされたことを示しており、疑わしいイベントが発生した可能性をハイライトしています。
mpi.report.common.cashdraweractivitysub = 1. キャッシュ ドロワーの警告タイプ = 開錠時間の超過。このタブに表示されるキャッシュ ドロワーは、設定された開錠時間のしきい値を超えています。これは、そのPOSレーンでの過失や、疑わしい使用状況の可能性を示しています。
2. キャッシュ ドロワーの警告タイプ = 手動での開錠。このタブに表示されるキャッシュ ドロワーは、POSソフトウェアの処理によらずに手動で開錠されています。これは、POSソフトウェア以外の場所で処理が発生している可能性があるか、損失が発生した可能性があることを示しています。
3. キャッシュ ドロワーの警告タイプ = 不正なイベント。このタブに表示されるキャッシュ ドロワーは、設定された標準運用時間外に開錠されています。これは、キャッシュ ドロワーが、アクセスされるべきではない時間帯にアクセスされたことを示しており、疑わしいイベントが発生した可能性をハイライトしています。
