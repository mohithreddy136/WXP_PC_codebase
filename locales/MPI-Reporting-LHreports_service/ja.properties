label.report_option_description_win10hwcomp_details = Windows 10評価レポートには、Windows 10オペレーティング システムへの移行またはアップグレードをデバイスがサポートしているかどうか、またはハードウェアのアップグレードまたは交換が必要かどうかを判断するための、デバイスのWindows 10ハードウェア互換性ステータスが記載されています。このレポートは、フリート内のWindows 10以外のデバイスで利用可能なデータに基づいています。
label.report_option_description_win11FleetReadiness_details = Windows 11対応準備評価レポートには、Windows 11オペレーティング システムへの移行またはアップグレードをデバイスがサポートしているかどうか、またはハードウェアのアップグレードまたは交換が必要かどうかを判断するための、現在のPCフリートの互換性ステータスが記載されています。
