label.report_option_description_hwperfcomparison_hwperfcompanyconfigdetails = このレポートにより、ユーザーはフリート内のデバイス構成のパフォーマンスを、同じフリート内の他の構成のセット、または[HP TechPulse]ベンチマークと比較できます。比較のための指標は以下のとおりです：CPUとメモリの使用率の週平均、ブルー スクリーン エラーの週ごとの数、または特定の週の起動/シャットダウンの平均時間。ベンチマークとの違いについて、その統計的有意性と持続性（つまり、指標がベンチマークよりも大きい状態が連続する週の数）が評価されます。複数のデバイス構成が選択されている場合、指標は構成全体で平均化されます。
