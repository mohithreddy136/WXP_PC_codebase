mpi.report.common.peripheralthresholdmetsubheading = このタブでは、予想耐用年数のしきい値を超えた周辺機器（スキャナー、磁気ストライプ リーダー、およびレシート プリンター）がハイライトされます。ここでは、使用年数が多いために故障のリスクが相対的に高くなっている周辺機器を示します。ログ データ クラスからデータを抽出するか、作成したしきい値レポートからデータを抽出するかどうかに関係なく、どちらかより簡単な方法で抽出できます。最終的に抽出されるデータは同じです。
