mpi.report.common.printerknifecutmaintenance = ナイフ カットの使用回数が増分値に達したレシート プリンターの一覧です。必要に応じてプリンター ナイフを点検および修理することをお勧めします。プリンター ナイフがレシートをスムーズにカットできるだけの切れ味を維持しているかどうかを確認し、必要に応じて研磨したり交換したりする必要があります。
