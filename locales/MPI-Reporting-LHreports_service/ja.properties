mpi.report.common.peripheralclaimingerrorssubheading = 下の表で強調表示されているさまざまな理由により、このタブに表示されている周辺機器には、周辺デバイスから収集されている統計に問題があります。これには、POSソフトウェアを使用した周辺機器の要求との競合、[HP Peripheral Agent]の適切な構成などが含まれます。
