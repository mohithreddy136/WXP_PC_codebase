mpi.report.column.graph.diskcap.graph.summary.text.description = ディスク容量計画レポートでは、ディスクの空き領域があらかじめ決めたしきい値に達するまでの残り時間を予測します。しきい値は、レポート フィルターで0～10%、0～20%、0～30%、0～40%、および0～50%から選択できます。
mpi.report.column.graph.diskcap.graph.summary.text.status = レポートでは、直近の3～6か月のデータを使用して、ディスクの空き容量がレポート フィルターで設定したしきい値に達するまでの残り時間を判断します。[ディスクの空き領域の状態]の最上位のカテゴリは以下のとおりです。
mpi.report.column.graph.diskcap.graph.summary.text.status.first = 即時：ディスクの空き領域がしきい値に達しました
mpi.report.column.graph.diskcap.graph.summary.text.status.five = OK：ディスクの空き領域は、[その他の状態]列の情報に応じて、少なくとも次の1か月、2か月、または3か月の間は問題ないと予測されます。 
mpi.report.column.graph.diskcap.graph.summary.text.status.four = 3か月以内：ディスクの空き領域が3か月以内にしきい値に達します
mpi.report.column.graph.diskcap.graph.summary.text.status.second = 1か月以内：ディスクの空き領域が1か月以内にしきい値に達します
mpi.report.column.graph.diskcap.graph.summary.text.status.seven = 判定不能：ディスクの空き領域は今のところ問題ありませんが、ディスクの空き領域がしきい値に達するまでの残り時間を予測するための十分なデータがありません
mpi.report.column.graph.diskcap.graph.summary.text.status.six = [その他の状態]列の表示内容は以下のとおりです。
mpi.report.column.graph.diskcap.graph.summary.text.status.six.sub.first = 1+, then the disk space is OK for at least 1 month
mpi.report.column.graph.diskcap.graph.summary.text.status.six.sub.second = 2+, then the disk space is OK for at least 2 months
mpi.report.column.graph.diskcap.graph.summary.text.status.six.sub.third = 3+, then the disk space is OK for at least 3 months
mpi.report.column.graph.diskcap.graph.summary.text.status.third = 2か月以内：ディスクの空き領域が2か月以内にしきい値に達します
