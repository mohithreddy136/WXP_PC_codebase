label.report_option_description_softwareUpdates_msOfficeUpdates = このレポートは、デバイスで不足しているMicrosoft Officeアップデートに関する情報、およびこれらのアップデートの重要度を示します。クリティカルなアップデートが1つ以上不足している場合は、同時に他の種類のアップデートが不足していても、デバイスは「クリティカルなアップデートが実行されていない」として分類されます。クリティカルなアップデートは不足していないが、重要なアップデートが1つ以上不足しているデバイスは、「重要なアップデートが実行されていない」などとして分類されます。
label.report_option_description_softwareUpdates_officeSummary = このレポートは、デバイスで不足しているMicrosoft Officeアップデートに関する詳細情報、およびこれらのアップデートの重要度を示します。クリティカルなアップデートが1つ以上不足している場合は、同時に他の種類のアップデートが不足していても、デバイスは「クリティカルなアップデートが実行されていない」として分類されます。クリティカルなアップデートは不足していないが、重要なアップデートが1つ以上不足しているデバイスは、「重要なアップデートが実行されていない」などとして分類されます。
