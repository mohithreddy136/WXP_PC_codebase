mpi.report.common.cashdraweractivity1 = 1. For kontantskuff-varseltype = Overskredet tid åpen.
mpi.report.common.cashdraweractivity2 = Kontantskuffer som vises i denne fanen har overskredet konfigurert tidsterskel for hvor lenge kassa har vært åpen. Dette vil fremheve uaktsomhet og potensielt mistenkelig aktivitet for POS-bane.
mpi.report.common.cashdraweractivity3 = 2. For kontaktskuff-varseltype = Manuell kontantskuff åpen.
mpi.report.common.cashdraweractivity4 = Kontantskuffer som vises i denne fanen ble åpnet manuelt uten en POS-programvaretransaksjon som utløser åpning av kassa. Dette vil indikere at en potensiell transaksjon finner sted utenfor POS-programvaren eller en potensiell tapsaktivitet.
mpi.report.common.cashdraweractivity5 = 3. For kontantskuff-varseltype = Åpnet under uautoriserte timer.
mpi.report.common.cashdraweractivity6 = Kontantskuffer som vises i denne fanen ble åpnet utenfor de konfigurerte standard driftstimene. Dette vil indikere at en kontantskuff ble åpnet på et uventet tidspunkt, noe som fremhever en potensielt mistenkelig hendelse.
mpi.report.common.cashdraweractivitysub = 1. For kontantskuff-varseltype = Overskredet tid åpen. Kontantskuffer som vises i denne fanen har overskredet konfigurert tidsterskel for hvor lenge kassa har vært åpen. Dette vil fremheve uaktsomhet og potensielt mistenkelig aktivitet for POS-banen. 
2. For kontantskuff-varseltype = Kontantskuff åpen. Kontantskuffer som vises i denne fanen ble åpnet manuelt uten en POS-programvaretransaksjon som utløser åpning av kassa. Dette vil indikere at en potensiell transaksjon finner sted utenfor POS-programvaren eller en potensiell tapsaktivitet. 
3. For kontantkasse-varselstype = Uautorisert hendelse. Kontantskuffer som vises i denne fanen ble åpnet utenfor de konfigurerte standard driftstimene. Dette vil indikere at en kontantskuff ble åpnet på et uventet tidspunkt, noe som fremhever en potensielt mistenkelig hendelse.
