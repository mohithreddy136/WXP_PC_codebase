label.report_option_description_hwperfcomparison_hwperfcompanyconfigdetails = Rapporten gjør det mulig for brukere å sammenligne resultatene av enhetskonfigurasjonene i flåten med et sett med andre konfigurasjoner i samme flåte eller HP TechPulse-referansepunkt. Beregningene for sammenligning er: De ukentlige gjennomsnittene for CPU og minneutnyttelse, ukentlig antall feil med blå skjerm, eller gjennomsnittlig tid for oppstart/avslutninger for en gitt uke. Forskjellene fra referansepunktene evalueres for statistisk signifikans og for utholdenhet (dvs. antallet påfølgende uker en beregning er større enn referansepunktet). Hvis flere enhetskonfigurasjoner er valgt, blir beregningene gjennomsnittlig på tvers av konfigurasjoner.
