label.report_option_additional_description_thermalgrade_details = Windows : \n Vedlikehold – Kontroller luftelukene for blokkeringer og rengjør enheten.\n Ingen handling kreves.\n \n Kritisk – temperaturtilstanden på enheten har betydelig innvirkning på systemytelsen, og enheten må kjøles ned.\n Alvorlig – temperaturtilstanden er høy på enheten. Vifter kjører med maksimal hastighet og systemytelsen kan påvirkes.\n Nominell - Termisk tilstand er innenfor normale grenser, og ingen korrigerende tiltak er nødvendig.\n Fair - Den termiske tilstanden er litt forhøyet, fanene kan kanskje høres.\n 
label.report_option_additional_description_thermalgradeV2_thermalGrading = Windows : \n Vedlikehold – Kontroller luftelukene for blokkeringer og rengjør enheten.\n Ingen handling kreves.\n \n MAC: \n Kritisk – temperaturtilstanden på enheten har betydelig innvirkning på systemytelsen, og enheten må kjøles ned.\n Alvorlig – temperaturtilstanden er høy på enheten. Vifter kjører med maksimal hastighet og systemytelsen kan påvirkes.\n Nominell – termisk tilstand er innenfor normale grenser, og ingen korrigerende tiltak er nødvendig.\n Fair – den termiske tilstanden er litt forhøyet, viftene kan kanskje høres.\n
