label.report_option_additional_description_softuti = <b>Mest brukte apper</b> er rangert etter antall enheter som bruker en app / totalt antall enheter. \n\n<b>Mest brukte apper med tanke på tidsbruk</b> er rangert basert på appens tidsbruk / totalt antall enheter. \n\nI tilfelle flere måneder er valgt i rapportfilteret, vil diagrammene kalkulere gjennomsnittet på ovennevnte forholdstall i disse månedene.
