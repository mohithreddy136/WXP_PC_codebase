mpi.report.graph.hwhealthNew.graph.monthly_summary.text.status = Tilstandsrapporten for maskinvare viser en månedlig trend der enheter som yter under optimalt, vises som ikke friske, og tilrettelegger for dyptgående identifikasjon av enheter som ikke tilfredsstiller individuelle ytelsesmålinger.
mpi.report.graph.hwhealthNew.graph.monthly_summary.text.status.first = Følgende regler klassifiserer enheter i dårlig stand, med hensyn til ytelsesmålinger i løpet av en observert måned.
mpi.report.graph.hwhealthNew.graph.monthly_summary.text.status.second = The user's mobility factor is a rank between 1 to 10 and is a relative ranking across all devices in analytics and proactive management. A ranking of 1 indicates that a user's devices are the least mobile and a rankingof 10 indicates that a user's devices are the most mobile. A ranking of -1 indicates that there is no location data for the user's devices.
mpi.report.graph.hwhealthNew.graph.monthly_summary.text.status.third = The User Mobility Factor analysis is scheduled to run periodically once at the beginning of each month. The last scheduled execution was on Due to the monthly scheduled execution, users and devices that were enrolled or unenrolled in HP TechPulse Analytics and Proactive Management after the last scheduled execution, will not appear in this report.
