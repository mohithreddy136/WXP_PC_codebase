mpi.report.column.graph.usermob.graph.summary.text.status = Brukerens mobilitetsfaktor i løpet av en periode er basert på flere og kompliserte mønstre for mobil oppførsel. For eksempel reiser noen brukere veldig ofte med samme eller forskjellige enheter med forskjellige formfaktorer, mens andre ofte reiser frem og tilbake mellom to eller tre steder med enhetene, og andre igjen er i konstant bevegelse over korte avstander med sine enheter. Brukerens mobilitetsfaktor benytter den geografiske plasseringen til brukeres enheter som er registrert i HP TechPulse Analytics og Proactive Management, i motsetning til brukerplasseringer fra andre eksterne kilder.
mpi.report.column.graph.usermob.graph.summary.text.status.first = De plasseringsbaserte tjenestene som sporer geografisk plassering er som standard deaktivert for alle kunder, og kundene kan aktivere eller deaktivere plasseringsbaserte tjenester i den skybaserte portalen HP TechPulse Analytics og Proactive Management. Selv i tilfeller der plasseringsbaserte tjenester er aktivert, tillater ikke HP TechPulse Analytics og Proactive Management innsamling av enhetsplasseringsdata for enheter som er klassifisert som eid av ansatte eller private enheter (i den skybaserte portalen HP TechPulse Analytics og Proactive Management).
mpi.report.column.graph.usermob.graph.summary.text.status.forth = Due to the monthly scheduled execution, users and devices that were enrolled or unenrolled in HP TechPulse Analytics and Proactive Management after the last scheduled execution, will not appear in this report.
mpi.report.column.graph.usermob.graph.summary.text.status.second = Brukerens mobilitetsfaktor er en vurdering mellom 1 og 10, og er en relativ vurdering på tvers av alle enheter i analyse og proaktiv administrering. En vurdering på 1 betyr at brukerens enhet er den minst mobile, og en vurdering på 10 betyr at brukerens enhet er den mest mobile. En vurdering på -1 indikerer at det ikke finnes stedsdata fra brukerens enheter.
mpi.report.column.graph.usermob.graph.summary.text.status.third = Analysen av brukerens mobilitetsfaktor er planlagt gjennomført periodisk én gang i begynnelsen av hver måned. Forrige planlagte utførelse var:
