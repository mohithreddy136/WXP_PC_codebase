label.report_option_description_softwareUpdates_msOfficeUpdates = Rapporten gir informasjon om Microsoft Office-oppdateringer som mangler på enhetene og hvor kritisk viktige disse oppdateringene er. En enhet kategoriseres som «Mangler kritisk viktige oppdateringer» i tilfelle minst én kritisk viktig oppdatering mangler, selv om den også mangler andre typer oppdateringer samtidig. Enheter som ikke mangler noen kritisk viktige oppdateringer, men som mangler minst én viktig oppdatering, kategoriseres som «Mangler viktige oppdateringer», og så videre.
