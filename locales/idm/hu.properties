active.care.account.create.body_msg1 = Köszönjük, hogy <b>HP Premium+ Support támogatást vagy HP Active Care szolgáltatást</b> vásárolt.
active.care.account.create.body_msg10 = Nem szeretném aktiválni a szolgáltatásomat.
