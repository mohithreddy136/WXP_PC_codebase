active.care.account.create.body_msg12 = A HP Active Care felkészítési csapata
active.care.account.create.body_msg13 = Az Active Care révén eszközvédelmi, -támogatási és javítási szolgáltatások teljes körű csomagja áll rendelkezésére, továbbá igénybe veheti a HP TechPulse portál szolgáltatásait is.
active.care.account.create.body_msg14 = Következő lépések:
active.care.account.create.body_msg15 = Erősítse meg e-mail-címét a következőbe való bejelentkezéssel: <a href={0} style="color: #0096D6;">{0}</a>. E-mail-címét megadhatja közvetlenül, a rendszer pedig végigvezeti a HP-jelszó létrehozásának folyamatán.
active.care.account.create.body_msg16 = Töltse le, majd telepítse a <a href={0} style="color: #0096D6;">HP TechPulse Windows-alkalmazást</a>. Ha több regisztrálandó eszközzel rendelkezik, kövesse az <a href={1} style="color: #0096D6;">Active Care felhasználói útmutató</a> 8–10. oldalán található útmutatást.
active.care.account.create.body_msg17 = Jogi nyilatkozat
active.care.account.create.body_msg2 = A(z) {0} szolgáltatással kapcsolatos feljegyzéseink szerint {1} eszközt kell regisztrálni az Active Care portálon.
active.care.account.create.body_msg3 = Azért kapja ezt az üzenetet, mert az e-mail címe szerepelt egy vezérlőpultkérvényben.
active.care.account.create.body_msg4 = Ha nem hajtja végre a regisztrációt, nem veheti igénybe a HP Active Care néhány új funkcióját, például a hardverproblémák távolról történő bejelentését és elhárítását. Véleménye fontos a HP számára. Tudassa velünk, hogyan segíthetünk Önnek a mindennapokban:
active.care.account.create.body_msg5 = Szeretnék bővebben tájékozódni, és megtekinteni egy bemutatót. Találkozzunk!
active.care.account.create.body_msg6 = Minden szükséges dolog a rendelkezésem áll, és most nekikezdek.
active.care.account.create.body_msg7 = Segítségre van szükségem. Műszaki problémákba ütköztem.
active.care.account.create.body_msg8 = Nem kaptam meg HP-hardvereszközeimet.
active.care.account.create.body_msg9 = Még nem állok készen a kezdésre, és több időre van szükségem.
active.care.account.create.body_next_steps.2 = Az e-mail-címét hozzáadták bérlőjéhez. Amennyiben először jelentkezik be a Workforce Experience Platformra, kéjük, keresse meg a HP által önnek küldött e-mailt, és az abban található linket követve hozza létre bejelentkezési adatait.
active.care.account.create.body_next_steps.3 = Ha ezzel végzett, jelentkezzen be a következő oldalon: <a href={0} style="text-decoration:none; color:#027AAE">https://admin.hp.com</a>. Ha egynél több bérlőhöz kapott hozzáférést, a jobb felső sarokban a profil ikonra kattintva választhatja ki a Fiókváltás lehetőséget az egyes bérlők közötti váltáshoz.
active.care.account.create.body_next_steps1 = Töltse le, majd telepítse a <a href={0} style="text-decoration:none; color:#027AAE">HP Insights Windows-alkalmazást</a> minden egyes számítógépre.
active.care.account.create.body_next_steps1.1 = Ha sok számítógéppel rendelkezik és szoftverterjesztési vagy végpontkezelési eszközt használ, olvassa el a <a href={0} style="text-decoration:none; color:#027AAE">Felhasználói útmutató</a> 8–10. oldalát.
active.care.account.create.body_next_steps1.2 = Ellenkező esetben kövesse az ebben a rövid <a href={0} style="text-decoration:none; color:#027AAE">Bevezető gyors útmutatóban</a> megadott lépéseket.
active.care.account.create.body_next_steps2 = Jelentkezzen be az <a href={0} style="text-decoration:none; color:#027AAE">admin.hp.com oldalon</a>, adja meg e-mail címét, és hozzon létre egy jelszót, amikor a rendszer erre kéri.
active.care.account.create.body_next_steps2.1 = Nyissa meg az Eszközök oldalt.
active.care.account.create.body_next_steps2.2 = Nyissa meg a Függő regisztráció fület a vezérlőpultkérvényben szereplő számítógépek megtekintéséhez. A jövőben ezzel a szolgáltatással vásárolt számítógépek automatikusan megjelennek ebben a listában.
active.care.account.create.body_next_steps2.3 = Nyissa meg az Összes fület azon számítógépek megtekintéséhez, melyekre telepítve van a HP Insights ügynök. Ezek a számítógépek részesülnek majd a szolgáltatás értékéből. Olvassa el ezt a <a href={0} style="text-decoration:none; color:#027AAE">rövid cikket, és tekintsen meg egy videót</a> a további információkért.
active.care.account.create.body_support = Az eszközei regisztrációjával vagy a vezérlőpult használatával kapcsolatos kérdések esetén kövesse a következő egyszerű lépéseket.
active.care.account.create.body_support1 = Amennyiben még nem rendelkezik fiókkal a Support.HP.com oldalon, <a href={0} style="text-decoration:none; color:#027AAE">hozzon létre egyet</a>.
active.care.account.create.body_support2 = <a href={0} style="text-decoration:none; color:#027AAE">Jelentkezzen be</a>, és hozzon létre egy jegyet.
active.care.account.create.body_support2.a = Adja meg flottája egyik olyan eszközének sorozatszámát, mely rendelkezik HP Premium+ Support támogatással vagy regisztrálva van a HP Active Care szolgáltatásban.
active.care.account.create.body_support2.b = Írja le az Ön által tapasztalt hibát.
active.care.account.create.body_support2.c = Esetét elküldjük egy erre a szolgáltatásra szakosodott csapatnak.
