gt.embargo_by_ip = A globális kereskedelmi csoport az Egyesült Államok által embargóval sújtott országhoz tartozóként jelölte meg fiókját. A szolgáltatást nem lehet használni a korlátozás hatálya alá eső országokból, ezért a hozzáférése le lesz tiltva. Ha csak átmenetileg tartózkodik egy embargó alatt álló országban, kérjük, próbáljon meg később, egy olyan hálózatból belépni a szolgáltatásba, amely nem egy embargó alatt álló országban üzemel.
gt.embrgo_device_enroll = A globális kereskedelmi csoport az Egyesült Államok által embargóval sújtott országhoz tartozóként jelölte meg az eszközregisztrációt.  A szolgáltatást nem lehet használni a korlátozás hatálya alá eső országokból, ezért a hozzáférése le lesz tiltva. Ha csak átmenetileg tartózkodik egy embargó alatt álló országban, kérjük, próbálja meg később, egy olyan hálózatból regisztrálni a készüléket, amely nem egy embargó alatt álló országban üzemel.
gt.general_msg = Ha további információra van szüksége, vagy kérdései vannak a fiók letiltásával/felfüggesztésével kapcsolatban, jelezze ezt a TouchpointGT@HP.COM e-mail címen.
