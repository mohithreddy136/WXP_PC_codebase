sign_in_change_notification.invite.body.content_7 = Wprowadź kod weryfikacyjny.
sign_in_change_notification.invite.body.content_8 = Gotowe!
sign_in_change_notification.invite.body.listcontent2 = Następnie wybierz jedną z dwóch opcji <b>Zaloguj się</b> – korzystając z konta Microsoft lub HPID – w prawym górnym rogu.
sign_in_change_notification.invite.body.listcontent3 = Jeśli wybrano konto Microsoft, możliwe powinno być bezpośrednie logowanie. <br/>Jeśli wybrano konto HPID, należy wybrać łącze „Nie masz konta? Zarejestruj się” pod polem logowania.
