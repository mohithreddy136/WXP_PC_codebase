active.care.account.create.body_msg1 = Dziękujemy za zakup usługi <b>HP Premium+ Support lub HP Active Care</b>.
active.care.account.create.body_msg10 = Nie chcę aktywować swojej usługi.
active.care.account.create.body_msg11 = Z poważaniem
active.care.account.create.body_msg12 = Zespół ds. wprowadzania do usługi HP Active Care
active.care.account.create.body_msg13 = Dzięki rozwiązaniu Active Care możesz korzystać z pełnego pakietu zabezpieczeń sprzętowych oraz usług wsparcia i naprawy, a także zyskujesz dostęp do portalu HP TechPulse.
active.care.account.create.body_msg14 = Kolejne kroki:
active.care.account.create.body_msg15 = Potwierdź swój adres e-mail, logując się tutaj: <a href={0} style="color: #0096D6;">{0}</a>. Możesz wpisać bezpośrednio swój e-mail, a system pomoże Ci utworzyć hasło HP.
active.care.account.create.body_msg16 = Pobierz i zainstaluj <a href={0} style="color: #0096D6;">aplikację HP TechPulse dla systemu Windows</a>. Jeśli masz do zarejestrowania kilka urządzeń, postępuj zgodnie z instrukcjami <a href={1} style="color: #0096D6;">podręcznika użytkownika Active Care</a> znajdującymi się na stronach 8–10.
active.care.account.create.body_msg17 = Wyłączenie odpowiedzialności
active.care.account.create.body_msg2 = Zgodnie z naszymi informacjami o {0} dostępne są urządzenia (liczba: {1}), które można zarejestrować w portalu Active Care.
active.care.account.create.body_msg3 = Otrzymujesz tę wiadomość, ponieważ Twój adres e-mail podano w żądaniu na pulpicie nawigacyjnym.
active.care.account.create.body_msg4 = Jeśli zrezygnujesz z rejestracji, stracisz kilka nowych funkcji HP Active Care, w tym możliwość zdalnego zgłaszania i rozwiązywania problemów sprzętowych. Twoja opinia jest bardzo ważna dla HP. Powiedz nam, jak możemy Ci ułatwić życie:
active.care.account.create.body_msg5 = Potrzebuję więcej informacji i wersji demonstracyjnej. Spotkajmy się!
active.care.account.create.body_msg6 = Mam wszystko, czego potrzebuję, i mogę zacząć już teraz.
active.care.account.create.body_msg7 = Pomocy! Mam problem techniczny!
active.care.account.create.body_msg8 = Moje urządzenia HP nie dotarły do mnie.
active.care.account.create.body_msg9 = Nie chcę jeszcze zaczynać. Potrzebuję więcej czasu.
active.care.account.create.body_next_steps.2 = Twój adres e-mail został dodany do Twojego dzierżawcy. Jeśli to Twoje pierwsze logowanie do Workforce Experience Platform, poszukaj wiadomości e-mail od HP i użyj zawartego w niej łącza, aby utworzyć dane uwierzytelniające.
active.care.account.create.body_next_steps.3 = Gdy już to zrobisz, zaloguj się na stronie <a href={0} style="text-decoration:none; color:#027AAE">https://admin.hp.com</a>. Jeśli masz dostęp do więcej niż jednego dzierżawcy, możesz wybrać ikonę profilu w prawym górnym rogu, a następnie skorzystać z opcji Przełącz konto, aby zmienić dzierżawcę.
active.care.account.create.body_next_steps1 = Pobierz i zainstaluj <a href={0} style="text-decoration:none; color:#027AAE">aplikację HP Insights Windows</a> na każdym komputerze.
active.care.account.create.body_next_steps1.1 = Jeśli masz wiele komputerów i korzystasz z narzędzia do dystrybucji oprogramowania lub zarządzania punktami końcowymi, przeczytaj strony 8–10 w <a href={0} style="text-decoration:none; color:#027AAE">instrukcji obsługi</a>.
active.care.account.create.body_next_steps1.2 = W przeciwnym razie wykonaj czynności opisane w tej krótkiej <a href={0} style="text-decoration:none; color:#027AAE">instrukcji szybkiego wdrożenia</a>.
active.care.account.create.body_next_steps2 = Zaloguj się na stronie <a href={0} style="text-decoration:none; color:#027AAE">admin.hp.com</a>, wpisz swój adres e-mail i utwórz hasło, gdy otrzymasz taką prośbę.
active.care.account.create.body_next_steps2.1 = Otwórz stronę Urządzenia.
active.care.account.create.body_next_steps2.2 = Otwórz kartę Oczekujące na rejestrację, aby zobaczyć, które komputery uwzględniono w żądaniu na pulpicie nawigacyjnym. Na liście będą automatycznie pojawiały się komputery z tą usługą, które zostaną kupione w przyszłości.
active.care.account.create.body_next_steps2.3 = Otwórz kartę Wszystko, aby wyświetlić komputery z zainstalowanym agentem HP Insights. Zaczną one korzystać z wartości, jaką zapewnia ta usługa. Przeczytaj ten <a href={0} style="text-decoration:none; color:#027AAE">krótki artykuł i obejrzyj film</a>, aby dowiedzieć się więcej.
active.care.account.create.body_support = W przypadku pytań dotyczących wdrażania urządzeń lub korzystania z pulpitu nawigacyjnego wykonaj te proste czynności.
active.care.account.create.body_support1 = Jeśli nie masz jeszcze konta na stronie Support.HP.com, <a href={0} style="text-decoration:none; color:#027AAE">, utwórz je</a>.
active.care.account.create.body_support2 = <a href={0} style="text-decoration:none; color:#027AAE">Zaloguj się</a> i utwórz zgłoszenie.
active.care.account.create.body_support2.a = Podaj jeden z numerów seryjnych ze swojej floty objętej programem HP Premium+ Support lub HP Active Care.
active.care.account.create.body_support2.b = Opisz problem, z którym się zmagasz.
active.care.account.create.body_support2.c = Twoja sprawa zostanie przesłana do zespołu, który będzie specjalizował się w danej usłudze.
