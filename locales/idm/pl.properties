thinclients_plan_user_email_body_content_10 = Zaloguj się przy użyciu nowo utworzonych danych uwierzytelniających.
thinclients_plan_user_email_body_content_11 = Jeśli potrzebujesz więcej informacji na temat aktywacji, pobierania lub instalowania HP Cloud Endpoint Manager, obejrzyj nasz <a href="{0}" target="_blank" style="color:#027aae; text-decoration: none;">samouczek wideo</a>.
thinclients_plan_user_email_body_content_3 = Select "Access HPCEM" below to begin the process of activating your order of HP Cloud Endpoint Manager, or visit 
