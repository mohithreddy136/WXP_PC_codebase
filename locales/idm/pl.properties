thinclients_plan_user_email_body_content_7 = Wypełnij wymagane pola, korzystając z <a href="javascript:void(0)" style="text-decoration: none; font-weight: bold; color: #404040; cursor: auto;">{0}</a> jako adresu e-mail i wybierz <b>Utwórz konto</b>.
