sign_in_change.content_1 = HP przygotowuje rozwiązanie HP ID, ujednolicony ekosystem zarządzania tożsamością dla wszystkich urządzeń HP. HP ID zapewnia użytkownikom możliwość posługiwania się jednymi danymi logowania we wszystkich produktach HP, co oznacza większe bezpieczeństwo i wygodę.
sign_in_change.content_2 = W dniu 10 maja 2018 r. HP TechPulse zmieni się w HP ID. Twój obecny adres e-mail zostanie zachowany, jednak ze względów bezpieczeństwa konieczne będzie zresetowanie hasła.
sign_in_change.content_3 = Jeśli masz jakieś pytania lub potrzebujesz pomocy, skontaktuj się z naszym Zespołem pomocy technicznej.
