thinclients_pro_plan_user_email_body_content_1 = Dziękujemy za zamówienie oprogramowania HP Cloud Endpoint Manager. Jesteś teraz o krok bliżej do prostego, bezpiecznego i elastycznego zarządzania urządzeniami!
thinclients_pro_plan_user_email_body_content_2 = Poniżej znajdują się szczegóły Twojego zamówienia, w tym klucz licencyjny. Zachowaj klucz licencyjny w dostępnym miejscu, ponieważ będzie on wymagany do weryfikacji w przypadku rozmowy telefonicznej lub innej formy kontaktu z działem wsparcia firmy HP w celu uzyskania pomocy dotyczącej programu HP Cloud Endpoint Manager. Jeśli ten zakup obejmuje więcej niż jednego użytkownika lub system, każdy użytkownik lub administrator systemu powinien mieć kopię klucza licencyjnego w celach referencyjnych.
thinclients_pro_trial_plan_user_email_body_content_1 = Dziękujemy za zamówienie 180-dniowej wersji próbnej oprogramowania HP Cloud Endpoint Manager. Jesteś teraz o krok bliżej do prostego, bezpiecznego i elastycznego zarządzania urządzeniami!
thinclients_pro_trial_plan_user_email_body_content_2 = Poniżej znajdziesz szczegóły swojego zamówienia. Aby kontynuować korzystanie z programu HP Cloud Endpoint Manager po wygaśnięciu 180-dniowej wersji próbnej, skontaktuj się z przedstawicielem handlowym HP w celu aktualizacji.
thinclients_standard_plan_user_email_body_content_1 = Dziękujemy za zamówienie oprogramowania HP Cloud Endpoint Manager. Jesteś teraz o krok bliżej do prostego, bezpiecznego i elastycznego zarządzania urządzeniami!
thinclients_standard_plan_user_email_body_content_2 = Poniżej znajdują się szczegóły Twojego zamówienia, w tym klucz licencyjny. Zachowaj klucz licencyjny w dostępnym miejscu, ponieważ będzie on wymagany do weryfikacji w przypadku rozmowy telefonicznej lub innej formy kontaktu z działem wsparcia HP w celu uzyskania pomocy dotyczącej programu HP Cloud Endpoint Manager. Jeśli to zamówienie obejmuje więcej niż jednego użytkownika lub system, każdy użytkownik lub administrator systemu powinien mieć kopię klucza licencyjnego w celach referencyjnych.
