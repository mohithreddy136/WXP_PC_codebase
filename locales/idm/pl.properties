sign_in_change_notification.content_1 = Aby uzyskać dostęp do portalu HP TechPulse, kliknij przycisk poniżej. Konieczne będzie użycie konta HP powiązanego z <b>[{0}]</b>. Jeśli nie masz konta HP, utwórz go, postępując zgodnie z instrukcjami podanymi na stronie logowania.
sign_in_change_notification.invite.body.content_1 = Najpierw utwórz nowe konto HP, klikając poniższy przycisk <b>Przejdź do HP TechPulse</b>.
sign_in_change_notification.invite.body.content_2 = Nastąpi przekierowanie do strony <a {0}>{1}</a>.
sign_in_change_notification.invite.body.content_3 = Kliknij przycisk <b>Zaloguj</b>, aby wyświetlić ekran logowania.
sign_in_change_notification.invite.body.content_4 = Kliknij łącze <b>Nie masz konta? Zarejestruj się</b>.
sign_in_change_notification.invite.body.content_5 = Uzupełnij wymagane pola, używając <b >[ {0} ]</b> jako adresu e-mail.
