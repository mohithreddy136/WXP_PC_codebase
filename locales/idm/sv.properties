active.care.account.create.body_msg1 = Tack för att du har köpt <b>HP Premium+ Support eller HP Active Care</b>.
active.care.account.create.body_msg10 = Jag vill inte aktivera min tjänst.
active.care.account.create.body_msg11 = Vänliga hälsningar.
active.care.account.create.body_msg12 = Registreringsteamet för HP Active Care
active.care.account.create.body_msg13 = Med Active Care har du en fullständig uppsättning enhetsskydd, support och reparationstjänster samt tillgång till HP TechPulse-portalen.
active.care.account.create.body_msg14 = Nästa steg:
active.care.account.create.body_msg15 = Verifiera din e-postadress genom att logga in på <a href={0} style="color: #0096D6;">{0}</a>. Du kan ange din e-postadress direkt och systemet guidar dig för att skapa ett lösenord med HP.
active.care.account.create.body_msg16 = Ladda ned och installera <a href={0} style="color: #0096D6;">Windows-appen HP TechPulse</a>. Om du har många enheter att registrera kan du följa instruktionerna i <a href={1} style="color: #0096D6;">användarguiden för Active Care</a> som finns på sidor 8–10.
active.care.account.create.body_msg17 = Friskrivningsklausul
active.care.account.create.body_msg2 = Baserat på våra register för {0} finns det {1} enheter som ska registreras i Active Care-portalen.
active.care.account.create.body_msg3 = Du får det här meddelandet eftersom din e-postadress tillhandahölls i en instrumentpanelförfrågan.
active.care.account.create.body_msg4 = Om du inte registrerar dig kommer du att missa några av de nya funktionerna i HP Active Care. Detta är inklusive möjligheten att skapa biljetter på distans och lösa dina hårdvaruproblem. Din feedback är viktig för HP. Meddela oss gärna hur vi kan hjälpa dig på din resa:
active.care.account.create.body_msg5 = Jag behöver mer information och en demo. Låt os träffas!
active.care.account.create.body_msg6 = Jag har allt jag behöver och börjar nu.
active.care.account.create.body_msg7 = Hjälp! Jag har tekniska problem!
active.care.account.create.body_msg8 = Jag har inte fått mina HP-hårdvaruenheter.
active.care.account.create.body_msg9 = Jag är inte redo att börja än och behöver mer tid.
active.care.account.create.body_next_steps.2 = Din e-postadressen har lagts till på din klientorganisation. Om det här är första gången du loggar in på Workforce Experience Platform ska du se e-postmeddelande från HP och följa länken i det för att skapa autentiseringsuppgifter.
active.care.account.create.body_next_steps.3 = När de har skapats kan du logga in på <a href={0} style="text-decoration:none; color:#027AAE">https://admin.hp.com</a>. Om du har fått åtkomst till mer än en klientorganisation kan du trycka på profilikonen i det övre högra hörnet och sedan välja alternativet Växla konto för att byta mellan dem.
active.care.account.create.body_next_steps1 = Ladda ned och installera <a href={0} style="text-decoration:none; color:#027AAE">HP Insights Windows-applikationen</a> på varje dator.
active.care.account.create.body_next_steps1.1 = Om du har många datorer och använder en programvarudistribution eller ett enhetshanteringsverktyg ska du läsa sidorna 8–10 i <a href={0} style="text-decoration:none; color:#027AAE">användarhandboken</a>.
active.care.account.create.body_next_steps1.2 = I annat fall ska du följa stegen i den här korta <a href={0} style="text-decoration:none; color:#027AAE">introduktionsguiden</a>.
active.care.account.create.body_next_steps2 = Logga in på <a href={0} style="text-decoration:none; color:#027AAE">admin.hp.com</a>, ange din e-postadress och skapa ett lösenord när du så uppmanas.
active.care.account.create.body_next_steps2.1 = Öppna sidan Enheter.
active.care.account.create.body_next_steps2.2 = Öppna fliken Väntande registrering för att se datorerna som omfattas av instrumentpanelsförfrågan. Framtida köp av datorer med den här tjänsten kommer automatiskt att visas i den här listan.
active.care.account.create.body_next_steps2.3 = Öppna fliken Alla för att se de datorer som har HP Insights-agenten installerade. Dessa börja ta vara på värdet i tjänsten. Läs den här <a href={0} style="text-decoration:none; color:#027AAE">korta artikeln och se en video</a> för mer information.
active.care.account.create.body_support = För frågor om registrering av dina enheter eller om hur du använder instrumentpanelen följer du de här enkla stegen.
active.care.account.create.body_support1 = Om du inte har ett konto på Support.HP.com <a href={0} style="text-decoration:none; color:#027AAE">måste du skapa ett</a>.
active.care.account.create.body_support2 = <a href={0} style="text-decoration:none; color:#027AAE">Logga in</a> och skapa ett ärende.
active.care.account.create.body_support2.a = Ange ett av serienumren i din datorpark som har HP Premium+ Support eller HP Active Care.
active.care.account.create.body_support2.b = Beskriv ditt problem.
active.care.account.create.body_support2.c = Ditt ärende kommer att skickas till ett team som specialiserar sig på tjänsten.
