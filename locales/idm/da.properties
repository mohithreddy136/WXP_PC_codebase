sign_in_change.content_1 = HP er ved at udrulle HP-id, et samlet økosystem for identitetsstyring for hele HP. HP-id giver brugere en enkelt identitet på tværs af alle HP-produkter, hvilket medfører øget sikkerhed og brugervenlighed.
sign_in_change.content_2 = Den 10. maj 2018 overgår HP TechPulse til HP-id. Din nuværende e-mailadresse for login ændres ikke, men af sikkerhedsmæssige årsager vil du blive bedt om at nulstille din adgangskode.
sign_in_change.content_3 = Hvis du har spørgsmål eller brug for hjælp, bedes du kontakte vores supportteam.
