sign_in_change_notification.content_1 = Du kan få adgang til HP TechPulse-portalen ved at klikke på knappen herunder. Du skal bruge den HP-konto, der er tilknyttet <b>[{0}]</b>. Hvis du ikke har en HP-konto, bedes du oprette én ved at følge anvisningerne på loginsiden.
sign_in_change_notification.invite.body.content_1 = Først skal du oprette din nye HP-konto ved at klikke på knappen <b> "Gå til HP TechPulse" </b> nedenfor.
sign_in_change_notification.invite.body.content_2 = Du ledes til siden <a {0}> {1} </a>.
sign_in_change_notification.invite.body.content_3 = Derefter skal du klikke på knappen <b> "Log ind" </b> for at få vist indlogningssiden.
sign_in_change_notification.invite.body.content_4 = Du skal nu klikke på linket <b> "Har du ikke en konto? Tilmeld dig" </b>.
sign_in_change_notification.invite.body.content_5 = Udfyld de obligatoriske felter, og brug <b >[ {0} ] </b> som e-mailadresse.
sign_in_change_notification.invite.body.content_5_nobracke = Udfyld de obligatoriske felter, og brug <b>{0}</b> som e-mailadresse.
sign_in_change_notification.invite.body.content_5_nobracket = Udfyld de obligatoriske felter, og brug <b>{0}</b> som e-mailadresse.
sign_in_change_notification.invite.body.content_6 = Der sendes en bekræftelseskode til din e-mail.
sign_in_change_notification.invite.body.content_7 = Indtast bekræftelseskoden.
sign_in_change_notification.invite.body.content_8 = Så er du klar!
sign_in_change_notification.invite.body.listcontent2 = Vælg derefter en af de to <b>"Log ind"</b>-muligheder ─ ved hjælp af Microsoft-konto eller ved hjælp af HPID-konto ─ i øverste, højre hjørne.
sign_in_change_notification.invite.body.listcontent3 = Hvis du valgte Microsoft-konto ─ bør du kunne logge direkte ind. <br/>Hvis du valgte HPID-konto ─ skal du vælge Har du ikke en konto? Link til tilmelding under log på-feltet
