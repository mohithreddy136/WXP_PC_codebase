active.care.account.create.body_msg1 = Tak for dit køb af <b>HP Premium+ Support eller HP Active Care</b>.
active.care.account.create.body_msg10 = Jeg er ikke interesseret i at aktivere min service.
active.care.account.create.body_msg11 = Med venlig hilsen.
active.care.account.create.body_msg12 = HP Active Cares onboarding-team
active.care.account.create.body_msg13 = Når du har Active Care, får du komplet enhedsbeskyttelse, support og reparationsservice samt adgang til HP TechPulse-portalen.
active.care.account.create.body_msg14 = Næste trin:
active.care.account.create.body_msg15 = Bekræft din e-mail ved at logge på <a href={0} style="color: #0096D6;">{0}</a>. Du kan indtaste din e-mailadresse direkte, så guider systemet dig i at oprette en adgangskode til HP.
active.care.account.create.body_msg16 = Download og installer <a href={0} style="color: #0096D6;">HP TechPulse Windows-programmet</a>. Hvis du tilmelder mange enheder, skal du følge instruktionerne i <a href={1} style="color: #0096D6;">Brugervejledning til Active Care</a> på side 8-10.
active.care.account.create.body_msg17 = Ansvarsfraskrivelse
active.care.account.create.body_msg2 = Ud fra vores registreringer for {0} skal {1} enheder meldes til Active Care-portalen.
active.care.account.create.body_msg3 = Du har modtaget denne besked, fordi din e-mail blev angivet i en dashboard-anmodning.
active.care.account.create.body_msg4 = Hvis du ikke er tilmeldt, kan du gå glip af de nye funktioner i HP Active Care, herunder muligheden for at sende fejlmeddelelser via fjernadgang samt få løst eventuelle hardwareproblemer. Din feedback er vigtig for HP. Fortæl os endelig, hvis der er noget, vi kan hjælpe dig med på din rejse:
active.care.account.create.body_msg5 = Jeg vil gerne have om flere oplysninger og en prøveversion. Lad os mødes!
active.care.account.create.body_msg6 = Jeg har alt det, jeg skal bruge, og vil gerne i gang nu.
active.care.account.create.body_msg7 = Hjælp! Jeg har tekniske problemer!
active.care.account.create.body_msg8 = Jeg har ikke modtaget mine HP-hardwareenheder.
active.care.account.create.body_msg9 = Jeg er ikke klar til at starte endnu, og jeg har derfor brug for mere tid.
active.care.account.create.body_next_steps.2 = Din e-mailadresse er blevet tilføjet til din operatør. Hvis det er første gang, du logger ind på Workforce Experience Platform, skal du kigge efter en e-mail fra HP og følge linket i den for at oprette dine loginoplysninger.
active.care.account.create.body_next_steps.3 = Når du har gjort det, skal du logge ind på <a href={0} style="text-decoration:none; color:#027AAE">https://admin.hp.com</a>. Hvis du har fået adgang til mere end én operatør, kan du vælge profil-ikonet i øverste højre hjørne og derefter vælge Skift konto for at skifte mellem dem.
active.care.account.create.body_next_steps1 = Download og installer <a href={0} style="text-decoration:none; color:#027AAE">HP Insights Windows-programmet</a> på hver pc.
active.care.account.create.body_next_steps1.1 = Hvis du har mange pc'er og bruger et softwaredistributions- eller endpoint-administrationsværktøj, skal du læse side 8-10 i <a href={0} style="text-decoration:none; color:#027AAE">brugervejledning</a>.
active.care.account.create.body_next_steps1.2 = Ellers skal du følge skridtene i denne korte <a href={0} style="text-decoration:none; color:#027AAE">Kvikvejledning til at komme i gang</a>.
active.care.account.create.body_next_steps2 = Log ind på <a href={0} style="text-decoration:none; color:#027AAE">admin.hp.com</a>, og vælg en adgangskode, når du bliver bedt om det.
active.care.account.create.body_next_steps2.1 = Åbn Enheder-siden.
active.care.account.create.body_next_steps2.2 = Åbn Afventende tilmelding-fanen for at se pc'er, der er inkluderet i dashboard-anmodningen. Nye køb af pc'er med denne service vil automatisk blive vist på denne liste.
active.care.account.create.body_next_steps2.3 = Åbn fanen Alle for at se pc'er, der har HP Insights-agenten installeret. Disse vil begynde at modtage nytteværdien af tjenesten. Læs denne <a href={0} style="text-decoration:none; color:#027AAE">korte artikel og se en video</a> få et få mere at vide.
active.care.account.create.body_support = Hvis du har spørgsmål om onboarding af dine enheder eller brug af dashboardet, kan du følge disse enkle trin.
active.care.account.create.body_support1 = Hvis du endnu ikke har en konto hos Support.HP.com, så <a href={0} style="text-decoration:none; color:#027AAE">opret en</a>.
active.care.account.create.body_support2 = <a href={0} style="text-decoration:none; color:#027AAE">Log ind</a> og opret en ticket.
active.care.account.create.body_support2.a = Angiv et af serienumrene til dine maskiner, som har HP Premium+ Support eller HP Active Care.
active.care.account.create.body_support2.b = Beskriv dit problem.
active.care.account.create.body_support2.c = Din sag vil blive overført til et team, der har specialiseret sig i denne service.
