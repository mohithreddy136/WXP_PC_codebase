gt.embargo_by_ip = Din konto er blevet mærket af afdelingen for global handel som kommende fra et land, der er underlagt handelsforbud i USA. Brug af tjenesten fra et begrænset land er forbudt, og adgang vil blive blokeret. Hvis du er på midlertidig rejse til et land med handelsforbud, kan du prøve at opnå adgang til tjenesten på en senere dato, når du ikke længere benytter et computernetværk i det land, der er underlagt handelsforbud.
