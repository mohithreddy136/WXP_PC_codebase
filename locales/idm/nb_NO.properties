thinclients_pro_plan_user_email_body_content_1 = Takk for at du bestilte HP Cloud Endpoint Manager. Du er nå ett skritt nærmere enkel, sikker og fleksibel enhetsbehandling!
thinclients_pro_plan_user_email_body_content_2 = Under finner du detaljer om bestillingen din, inkludert lisensnøkkelen. Ha lisensnøkkelen tilgjengelig da du trenger den til verifisering hvis du ringer eller kontakter HP-kundestøtte for hjelp med HP Cloud Endpoint Manager. Hvis dette kjøpet er for mer enn én bruker eller ett system, sørg for at hver bruker eller systemadministrator også har en kopi av lisensnøkkelen.
thinclients_pro_trial_plan_user_email_body_content_1 = Takk for at du bestilte 180 dagers test av HP Cloud Endpoint Manager. Du er nå ett skritt nærmere enkel, sikker og fleksibel enhetsbehandling!
thinclients_pro_trial_plan_user_email_body_content_2 = Du finner ordredetaljene dine nedenfor. For å fortsette å bruke HP Cloud Endpoint Manager etter utløpet av prøveperioden på 180 dager, kontakter du HP-salgsrepresentanten din for å oppgradere.
thinclients_standard_plan_user_email_body_content_1 = Takk for at du bestilte HP Cloud Endpoint Manager. Du er nå ett skritt nærmere enkel, sikker og fleksibel enhetsbehandling!
thinclients_standard_plan_user_email_body_content_2 = Under finner du detaljer om bestillingen din, inkludert lisensnøkkelen. Ha lisensnøkkelen tilgjengelig da du trenger den til verifisering hvis du ringer eller kontakter HP Support for hjelp med HP Cloud Endpoint Manager. Hvis denne bestillingen er for mer enn én bruker eller ett system, sørg for at hver bruker eller systemadministrator også har en kopi av lisensnøkkelen.
