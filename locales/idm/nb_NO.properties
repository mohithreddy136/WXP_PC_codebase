active.care.account.create.body_msg1 = Takk for at du kjøper <b>HP Premium+ Support eller HP Active Care</b>.
active.care.account.create.body_msg10 = Jeg vil ikke aktivere tjenesten min.
active.care.account.create.body_msg11 = Vennlig hilsen.
active.care.account.create.body_msg12 = HP Active Care Onboarding-team
active.care.account.create.body_msg13 = Med Active Care har du en fullstendig pakke med enhetsbeskyttelse, støtte og reparasjonstjenester, i tillegg til tilgang til HP TechPulse-portalen.
active.care.account.create.body_msg14 = Neste skritt:
active.care.account.create.body_msg15 = Bekreft e-postadressen din ved å logge på <a href={0} style="color: #0096D6;">{0}</a>. Du kan oppgi e-postadressen direkte. Systemet vil veilede deg i opprettingen av et passord hos HP.
active.care.account.create.body_msg16 = Last ned og installer <a href={0} style="color: #0096D6;">HP TechPulse Windows-programmet</a>. Hvis du har flere enheter som skal registreres, følger du <a href={1} style="color: #0096D6;">Active Care-brukerveiledningens</a> instruksjoner på side 8–10.
active.care.account.create.body_msg17 = Ansvarsfraskrivelse
active.care.account.create.body_msg2 = Basert på våre oppføringer for {0}, skal {1} enhet(er) registreres i Active Care-portalen.
active.care.account.create.body_msg3 = Du mottar denne meldingen fordi e-posten din ble oppgitt i en dashbordforespørsel.
active.care.account.create.body_msg4 = Hvis du ikke registrerer deg, vil du gå glipp av noen av de nye funksjonene til HP Active Care, inkludert muligheten til å sende forespørsel og løse maskinvareproblemer eksternt. Din tilbakemelding er viktig for HP. Fortell oss gjerne hva vi kan hjelpe deg med på reisen din:
active.care.account.create.body_msg5 = Jeg trenger mer informasjon og en demonstrasjon. La oss møtes!
active.care.account.create.body_msg6 = Jeg har alt jeg trenger og vil begynne nå.
active.care.account.create.body_msg7 = Hjelp! Jeg har støtt på tekniske problemer!
active.care.account.create.body_msg8 = Jeg har ikke mottatt mine HP-maskinvareenheter.
active.care.account.create.body_msg9 = Jeg er ikke klar til å starte ennå og trenger mer tid.
active.care.account.create.body_next_steps.2 = E-postadressen din har blitt lagt til leietakeren din. Hvis du logger deg på Workforce Experience Platform for første gang, kan du se etter en e-postmelding fra HP og følge koblingen i denne meldingen for å opprette påloggingsinformasjonen din.
active.care.account.create.body_next_steps.3 = Så snart du har gjort dette, logger du deg på <a href={0} style="text-decoration:none; color:#027AAE">https://admin.hp.com</a>. Hvis du har fått tilgang til mer enn én leietaker, kan du velge profilikonet øverst i høyre hjørne og deretter velge alternativet Bytt konto for å bytte mellom dem.
active.care.account.create.body_next_steps1 = Last ned og installer <a href={0} style="text-decoration:none; color:#027AAE">HP Insights Windows-program</a> på hver PC.
active.care.account.create.body_next_steps1.1 = Hvis du har mange PC-er og bruker et verktøy for programvaredistribusjon eller endepunktsadministrasjon, kan du lese side 8–10 i <a href={0} style="text-decoration:none; color:#027AAE">Brukerveiledningen</a>.
active.care.account.create.body_next_steps1.2 = Du kan også følge trinnene i denne korte <a href={0} style="text-decoration:none; color:#027AAE">Hurtigveiledningen for pålasting</a>.
active.care.account.create.body_next_steps2 = Logg på <a href={0} style="text-decoration:none; color:#027AAE">admin.hp.com</a>, angi e-postadressen din og opprett et passord når du blir bedt om det.
active.care.account.create.body_next_steps2.1 = Åpne Enheter-siden.
active.care.account.create.body_next_steps2.2 = Åpne kategorien Venter på registrering for å se PC-er som er inkludert i dashbordforespørselen. Fremtidige PC-kjøp med denne tjenesten vises automatisk på denne listen.
active.care.account.create.body_next_steps2.3 = Åpne fanen Alle for å se PC-er med HP Insights-agenten installert. Disse vil begynne å motta denne tjenesten. Du kan lese denne <a href={0} style="text-decoration:none; color:#027AAE">korte artikkelen og se en video</a> for å finne ut mer.
active.care.account.create.body_support = For spørsmål om pålasting av enheter eller bruk av dashbordet, kan du følge disse enkle trinnene.
active.care.account.create.body_support1 = Hvis du ennå ikke har en konto i Support.HP.com, <a href={0} style="text-decoration:none; color:#027AAE">kan du opprette en</a>.
active.care.account.create.body_support2 = <a href={0} style="text-decoration:none; color:#027AAE">Logg på</a> og opprett en støtteforespørsel.
active.care.account.create.body_support2.a = Oppgi ett av serienumrene i flåten din som har HP Premium+ Support eller HP Active Care.
active.care.account.create.body_support2.b = Beskriv problemet du har.
active.care.account.create.body_support2.c = Saken sendes til et team som spesialiserer seg i tjenesten.
