active.care.account.create.body_msg1 = Благодарим за покупку <b>HP Premium+ Support или HP Active Care</b>.
active.care.account.create.body_msg10 = Я не хочу активировать свою услугу.
active.care.account.create.body_msg11 = С наилучшими пожеланиями.
active.care.account.create.body_msg12 = Отдел регистрации HP Active Care
active.care.account.create.body_msg13 = С Active Care у вас есть полный набор услуг по защите, поддержке и ремонту устройства, а также доступ к порталу HP TechPulse.
active.care.account.create.body_msg14 = Дальнейшие действия:
active.care.account.create.body_msg15 = Подтвердите свой адрес электронной почты, войдя в <a href={0} style="color: #0096D6;">{0}</a>. Вы можете ввести свой адрес электронной почты напрямую, и система поможет вам создать пароль с помощью HP.
active.care.account.create.body_msg16 = Скачайте и установите <a href={0} style="color: #0096D6;"> приложение HP TechPulse Windows</a>. Если вам нужно зарегистрировать много устройств, следуйте <a href={1} style="color: #0096D6;"> инструкциям на страницах 8-10 в Руководстве пользователя</a> Active Care.
active.care.account.create.body_msg17 = Ограничение ответственности
active.care.account.create.body_msg2 = Согласно нашим записям для {0}, на портале Active Care необходимо зарегистрировать {1} устройств.
active.care.account.create.body_msg3 = Вы получили это сообщение, поскольку ваш адрес электронной почты был указан в запросе панели управления.
active.care.account.create.body_msg4 = Если вы не зарегистрируетесь, у вас не будет доступа к некоторым новым функциям HP Active Care, включая возможность удаленно регистрировать и решать проблемы с вашим оборудованием. Ваше мнение важно для HP. Просим сообщить, чем мы можем вам помочь:
active.care.account.create.body_msg5 = Мне нужна дополнительная информация и демоверсия. Давайте встретимся!
active.care.account.create.body_msg6 = У меня есть все необходимое, и я начну сейчас.
active.care.account.create.body_msg7 = Помогите! У меня возникли технические проблемы!
active.care.account.create.body_msg8 = Я не получил(-а) свое оборудование HP.
active.care.account.create.body_msg9 = Мне нужно больше времени, я не готов начать сейчас.
active.care.account.create.body_next_steps.2 = Ваш адрес электронной почты был добавлен для вашего участника. Если вы впервые входите в систему «Workforce Experience Platform», найдите сообщение электронной почты от HP и перейдите по ссылке в этом сообщении, чтобы создать свои учетные данные.
active.care.account.create.body_next_steps.3 = Сделав это, войдите в систему <a href={0} style="text-decoration:none; color:#027AAE">https://admin.hp.com</a>. Если вам предоставлен доступ к нескольким участникам, вы можете выбрать значок профиля в правом верхнем углу, а затем выбрать параметр «Сменить учетную запись» для перемещения между ними.
active.care.account.create.body_next_steps1 = Скачайте и установите <a href={0} style="text-decoration:none; color:#027AAE">приложение HP Insights Windows</a> на каждый ПК.
active.care.account.create.body_next_steps1.1 = Если у вас много ПК и вы используете инструмент распространения программного обеспечения или управления конечными точками, прочтите страницы 8-10 в <a href={0} style="text-decoration:none; color:#027AAE">Руководстве пользователя</a>.
active.care.account.create.body_next_steps1.2 = В противном случае выполните действия, описанные в этом <a href={0} style="text-decoration:none; color:#027AAE">Кратком руководстве по адаптации</a>.
active.care.account.create.body_next_steps2 = Войдите в <a href={0} style="text-decoration:none; color:#027AAE">admin.hp.com</a>, введите свой адрес электронной почты и при появлении соответствующего запроса создайте пароль.
active.care.account.create.body_next_steps2.1 = Откройте страницу «Устройства».
active.care.account.create.body_next_steps2.2 = Откройте вкладку «Ожидание регистрации», чтобы просмотреть компьютеры, включенные в запрос панели управления. Будущие покупки ПК с этой услугой автоматически появятся в этом списке.
active.care.account.create.body_next_steps2.3 = Откройте вкладку «Все», чтобы просмотреть компьютеры, на которых установлен агент HP Insights. Они будут получать преимущества, предоставляемые этой услугой. Прочтите эту <a href={0} style="text-decoration:none; color:#027AAE">короткую статью и посмотрите видео</a>, чтобы узнать больше.
active.care.account.create.body_support = Если у вас возникнут вопросы о подключении ваших устройств или использовании панели управления, выполните следующие простые действия.
active.care.account.create.body_support1 = Если у вас еще нет учетной записи в Support.HP.com, <a href={0} style="text-decoration:none; color:#027AAE">создайте ее</a>.
active.care.account.create.body_support2 = <a href={0} style="text-decoration:none; color:#027AAE">Войдите</a> и создайте заявку.
active.care.account.create.body_support2.a = Укажите один из серийных номеров вашего парка устройств, имеющих поддержку HP Premium+ Support или HP Active Care.
active.care.account.create.body_support2.b = Опишите проблему, с которой вы столкнулись.
active.care.account.create.body_support2.c = Ваш вопрос будет отправлен команде, которая специализируется на этой услуге.
