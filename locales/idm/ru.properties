gt.embargo_by_domain = Организация Global Trade отметила, что ваша учетная запись электронной почты используется в стране, на которую распространяется эмбарго США. Запрещено пользоваться сервисом в стране, подпадающей под действие санкций, а потому доступ будет заблокирован.
gt.embargo_by_ip = Организация Global Trade отметила, что ваша учетная запись используется в стране, на которую распространяется эмбарго США. Запрещено пользоваться сервисом в стране, подпадающей под действие санкций, а потому доступ будет заблокирован. Если вы временно находитесь в стране, на которую распространяется эмбарго, попробуйте позднее воспользоваться сервисом, когда подключитесь к компьютерной сети в другой стране.
gt.embrgo_device_enroll = Организация Global Trade отметила, что вы зарегистрировали устройство в стране, на которую распространяется эмбарго США. Запрещено пользоваться сервисом в стране, подпадающей под действие санкций, а потому доступ будет заблокирован. Если вы временно находитесь в стране, на которую распространяется эмбарго, попробуйте позднее зарегистрировать устройство, когда подключитесь в компьютерной сети в другой стране.
gt.general_msg = Для получения дополнительной информации о блокировке и приостановке действия учетной записи обратитесь по адресу TouchpointGT@HP.COM
