sign_in_change.title = Скоро мы изменим процесс входа в систему.
sign_in_change_notification.content_1 = Для доступа к порталу HP TechPulse нажмите ссылку ниже. Вам нужно будет воспользоваться учетной записью HP, связанной с <b>[{0}]</b>. Если у вас нет учетной записи HP, создайте ее, выполнив инструкции на странице входа в систему.
sign_in_change_notification.invite.body.content_1 = Сначала создайте новую учетную запись HP, нажав кнопку <b>Перейти в HP TechPulse</b> ниже.
sign_in_change_notification.invite.body.content_2 = Вы будете перенаправлены на страницу <a {0}> {1}</a>.
sign_in_change_notification.invite.body.content_3 = Далее нажмите кнопку <b>Вход</b>, чтобы открыть экран входа в систему.
sign_in_change_notification.invite.body.content_4 = Теперь нажмите ссылку <b>У вас нет учетной записи? Регистрация</b>.
sign_in_change_notification.invite.body.content_5 = Заполните обязательные поля, указав в качестве адреса электронной почты <b >[ {0} ] </b>.
sign_in_change_notification.invite.body.content_5_nobracke = Заполните обязательные поля, указав в качестве адреса электронной почты <b >{0}</b>.
sign_in_change_notification.invite.body.content_5_nobracket = Заполните обязательные поля, указав в качестве адреса электронной почты <b >{0}</b>.
sign_in_change_notification.invite.body.content_6 = На ваш адрес будет отправлен код проверки.
sign_in_change_notification.invite.body.content_7 = Введите код проверки.
sign_in_change_notification.invite.body.content_8 = Все готово.
sign_in_change_notification.invite.body.listcontent2 = Затем выберите один из двух вариантов <b>«Войти»</b> — с помощью учетной записи Microsoft или с помощью учетной записи HPID — в правом верхнем углу.
sign_in_change_notification.invite.body.listcontent3 = Если вы выбрали учетную запись Microsoft, вы сможете войти напрямую. <br/>Если вы выбрали учетную запись HPID, выберите «Нет учетной записи? Регистрация» ниже поля для входа в систему.
sign_in_change_notification.invite.title_2 = Рады видеть вас среди пользователей HP TechPulse Proactive Management. Выполните описанные ниже действия, чтобы приступить.
sign_in_change_notification.title_1 = Здравствуйте!
sign_in_change_notification.title_2 = Для вас была создана учетная запись HP TechPulse.
SIGN_IN_CHANGE_NOTIFICATION_INVITE_BODY_CONTENT_5_NOBRACKET = Заполните обязательные поля, указав в качестве адреса электронной почты <b >{0}</b>.
sign_in_changed.content_1 = В настоящий момент HP постепенно делает доступной единую экосистему управления удостоверениями для всех служб HP под названием HP ID. HP ID представляет собой единое удостоверение пользователя для всех продуктов HP, которое позволит повысить безопасность и удобство работы.
sign_in_changed.content_2 = 10 мая 2018 года HP TechPulse перейдет на HP ID. Адрес электронной почты, который вы используете для входа, будет сохранен. Однако из соображений безопасности вам нужно будет сбросить пароль. Выполните перечисленные далее действия, чтобы обновить свой пароль:
sign_in_changed.content_3 = Если у вас возникнут любые сомнения, вам обязательно поможет {0}.
