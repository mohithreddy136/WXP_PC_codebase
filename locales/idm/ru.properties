sign_in_change.content_1 = В настоящий момент HP постепенно делает доступной единую экосистему управления удостоверениями для всех служб HP под названием HP ID. HP ID представляет собой единое удостоверение пользователя для всех продуктов HP, которое позволит повысить безопасность и удобство работы.
sign_in_change.content_2 = 10 мая 2018 года HP TechPulse перейдет на HP ID. Адрес электронной почты, который вы используете для входа, будет сохранен. Однако из соображений безопасности вам нужно будет сбросить пароль.
sign_in_change.content_3 = Если у вас есть вопросы или вам нужна помощь, обратитесь в нашу службу поддержки.
