thinclients_pro_plan_user_email_body_content_1 = ขอบคุณที่สั่งซื้อ HP Cloud Endpoint Manager ขณะนี้คุณได้ก้าวเข้าไปใกล้กับการจัดการอุปกรณ์ที่เรียบง่าย ปลอดภัย และยืดหยุ่นขึ้นอีกขั้นหนึ่งแล้ว
thinclients_pro_plan_user_email_body_content_2 = คุณสามารถตรวจสอบรายละเอียดคำสั่งซื้อของคุณ รวมถึงคีย์ใบอนุญาตได้จากด้านล่าง โปรดเก็บคีย์ใบอนุญาตไว้ในลักษณะที่พร้อมเข้าใช้งานตลอดเวลา เนื่องจากคุณจำเป็นต้องใช้ในการยืนยันความถูกต้อง ในกรณีที่คุณโทรหาหรือติดต่อฝ่ายสนับสนุนของ HP เพื่อขอความช่วยเหลือเกี่ยวกับ HP Cloud Endpoint Manager หากในการซื้อครั้งนี้มีผู้ใช้หรือระบบมากกว่าหนึ่งรายการ โปรดตรวจสอบให้แน่ใจว่าผู้ใช้หรือผู้ดูแลระบบแต่ละรายมีสำเนาของคีย์ใบอนุญาตเพื่อใช้ในการอ้างอิง
thinclients_pro_trial_plan_user_email_body_content_1 = ขอบคุณที่สั่งซื้อการทดลองใช้งาน HP Cloud Endpoint Manager 180 วัน ขณะนี้คุณได้ก้าวเข้าไปใกล้กับการจัดการอุปกรณ์ที่เรียบง่าย ปลอดภัย และยืดหยุ่นขึ้นอีกขั้นหนึ่งแล้ว
thinclients_pro_trial_plan_user_email_body_content_2 = คุณจะพบรายละเอียดเกี่ยวกับคำสั่งของคุณด้านล่าง หากต้องการใช้งาน HP Cloud Endpoint Manager ต่อไปหลังจากหมดระยะการทดลองใช้ 180 วัน โปรดติดต่อตัวแทนฝ่ายขาย HP ของคุณเพื่อทำการอัปเกรด
thinclients_standard_plan_user_email_body_content_1 = ขอบคุณที่สั่งซื้อ HP Cloud Endpoint Manager ขณะนี้คุณได้ก้าวเข้าสู่การจัดการอุปกรณ์ที่เรียบง่าย ปลอดภัย และยืดหยุ่นขึ้นอีกหนึ่งก้าวแล้ว
thinclients_standard_plan_user_email_body_content_2 = คุณสามารถตรวจสอบรายละเอียดคำสั่งซื้อของคุณ รวมถึงคีย์ใบอนุญาตได้จากด้านล่าง โปรดเก็บคีย์ใบอนุญาตไว้ในลักษณะที่พร้อมเข้าใช้งานตลอดเวลา เนื่องจากคุณจำเป็นต้องใช้ในการยืนยันความถูกต้อง ในกรณีที่คุณโทรหาหรือติดต่อฝ่ายสนับสนุนของ HP เพื่อขอความช่วยเหลือเกี่ยวกับ HP Cloud Endpoint Manager หากในคำสั่งซื้อนี้มีผู้ใช้หรือระบบมากกว่าหนึ่งรายการ โปรดตรวจสอบให้แน่ใจว่าผู้ใช้หรือผู้ดูแลระบบแต่ละราย มีสำเนาของคีย์ใบอนุญาต เพื่อใช้ในการอ้างอิง
