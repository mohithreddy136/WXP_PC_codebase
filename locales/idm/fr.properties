active.care.account.create.body_msg1 = Merci d’avoir acheté <b>HP Premium+ Support ou HP Active Care</b>.
active.care.account.create.body_msg10 = Je ne veux pas activer mon service.
active.care.account.create.body_msg11 = Cordialement.
active.care.account.create.body_msg12 = Équipe Intégration HP Active Care
active.care.account.create.body_msg13 = Avec Active Care, vous disposez d’une suite complète de services de protection, de support et de réparation de périphériques, ainsi que l’accès au portail HP TechPulse.
active.care.account.create.body_msg14 = Étapes suivantes :
active.care.account.create.body_msg15 = Validez votre adresse e-mail en vous connectant à <a href={0} style="color: #0096D6;">{0}</a>. Vous pouvez entrer votre adresse e-mail directement et le système vous guidera pour créer un mot de passe avec HP.
active.care.account.create.body_msg16 = Téléchargez et installez <a href={0} style="color: #0096D6;">l'application Windows HP TechPulse</a>. Si vous avez de nombreux périphériques à inscrire, suivez les <a href={1} style="color: #0096D6;">instructions du Guide de l'utilisateur Active Care</a> situées aux pages 8-10.
active.care.account.create.body_msg17 = Limite de responsabilité
active.care.account.create.body_msg2 = Selon nos dossiers pour {0}, il y a {1} périphériques à inscrire sur le portail Active Care.
active.care.account.create.body_msg3 = Vous recevez ce message car votre adresse e-mail a été fournie dans le cadre d’une demande de tableau de bord.
active.care.account.create.body_msg4 = Si vous ne vous inscrivez pas, vous ne bénéficierez pas de certaines nouvelles fonctionnalités de HP Active Care, notamment la possibilité d’ouvrir un ticket et de résoudre vos problèmes de matériel à distance. Vos commentaires sont importants pour HP. Veuillez nous dire comment nous pouvons vous aider :
active.care.account.create.body_msg5 = J’ai besoin de plus d’informations et d’une démonstration. Rencontrons-nous !
active.care.account.create.body_msg6 = J’ai tout ce dont j’ai besoin et vais commencer dès maintenant.
active.care.account.create.body_msg7 = À l’aide ! J’ai rencontré des problèmes techniques.
active.care.account.create.body_msg8 = Je n’ai pas reçu mes périphériques matériels HP.
active.care.account.create.body_msg9 = Je ne suis pas prêt à commencer et ai besoin de plus de temps.
active.care.account.create.body_next_steps.2 = Votre adresse e-mail a été ajoutée à votre locataire. Si vous vous connectez pour la première fois à Workforce Experience Platform, veuillez consulter l’e-mail de HP et suivre le lien spécifié dans ce message pour créer vos identifiants.
active.care.account.create.body_next_steps.3 = Une fois cette étape accomplie, connectez-vous sur <a href={0} style="text-decoration:none; color:#027AAE">https://admin.hp.com</a>. Si vous avez accès à plusieurs locataires, cliquez sur l’icône de profil en haut à droite, puis sélectionnez l’option Changer de compte pour passer de l’un à l’autre.
active.care.account.create.body_next_steps1 = Téléchargez et installez <a href={0} style="text-decoration:none; color:#027AAE"></a>l’application HP Insights Windows sur chaque PC.
active.care.account.create.body_next_steps1.1 = Si vous possédez plusieurs PC et utilisez un outil de distribution de logiciels ou de gestion des terminaux, référez-vous aux pages 8 à 10 du <a href={0} style="text-decoration:none; color:#027AAE">Guide de l’utilisateur</a>.
active.care.account.create.body_next_steps1.2 = Sinon, suivez les étapes ci-dessous de ce court <a href={0} style="text-decoration:none; color:#027AAE">Guide de mise en route rapide</a>.
active.care.account.create.body_next_steps2 = Connectez-vous sur <a href={0} style="text-decoration:none; color:#027AAE">admin.hp.com</a>, saisissez votre adresse e-mail et créez un mot de passe lorsque vous y êtes invité.
active.care.account.create.body_next_steps2.1 = Ouvrez la page Périphériques.
active.care.account.create.body_next_steps2.2 = Ouvrez l’onglet Inscription en attente pour voir les ordinateurs inclus dans la demande de tableau de bord. Tous les futurs achats d’ordinateurs bénéficiant de ce service seront automatiquement ajoutés à cette liste.
active.care.account.create.body_next_steps2.3 = Ouvrez l’onglet Tous pour afficher tous les PC sur lesquels l’agent HP Insights est installé. Ceux-ci vont commencer à bénéficier des avantages du service. Lisez ce <a href={0} style="text-decoration:none; color:#027AAE">court article et regardez une vidéo</a> pour en savoir plus.
active.care.account.create.body_support = Si vous avez des questions concernant la configuration de vos appareils ou l’utilisation du tableau de bord, suivez ces étapes simples.
active.care.account.create.body_support1 = Si vous n’avez pas encore de compte sur Support.HP.com, <a href={0} style="text-decoration:none; color:#027AAE">vous devez en créer un</a>.
active.care.account.create.body_support2 = <a href={0} style="text-decoration:none; color:#027AAE">Connectez-vous</a> et créez un ticket.
active.care.account.create.body_support2.a = Fournissez l’un des numéros de série de votre parc qui dispose de l’assistance HP Premium+ Support ou HP Active Care.
active.care.account.create.body_support2.b = Décrivez le problème que vous rencontrez.
active.care.account.create.body_support2.c = Votre dossier sera transmis à une équipe spécialisée.
