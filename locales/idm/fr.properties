thinclients_pro_plan_user_email_body_content_1 = Nous vous remercions d'avoir commandé HP Cloud Endpoint Manager. Vous êtes à présent tout proche d'une gestion de périphérique simple, sécurisée et flexible !
thinclients_pro_plan_user_email_body_content_2 = Vous trouverez ci-dessous les informations sur votre commande, y compris votre clé de licence. Veuillez garder la clé de licence à disposition, car elle vous sera demandée pour vérification au cas où vous appelleriez ou contactiez le support HP pour obtenir de l'aide au sujet de HP Cloud Endpoint Manager. Si cet achat couvre plus d'un utilisateur ou plus d'un système, veuillez vous assurer que l'administrateur de chaque utilisateur ou système dispose d'une copie de la clé de licence comme référence.
thinclients_pro_trial_plan_user_email_body_content_1 = Nous vous remercions d'avoir commandé l'essai de 180 jours de HP Cloud Endpoint Manager. Vous êtes à présent tout proche d'une gestion de périphérique simple, sécurisée et flexible !
thinclients_pro_trial_plan_user_email_body_content_2 = Vous trouverez ci-dessous les détails de votre commande. Pour continuer à utiliser HP Cloud Endpoint Manager après l'expiration de la période d'essai de 180 - jours, contactez votre représentant commercial HP pour effectuer une mise à niveau.
thinclients_standard_plan_user_email_body_content_1 = Nous vous remercions d’avoir commandé HP Cloud Endpoint Manager. Vous êtes à présent tout proche d’une gestion de périphérique simple, sécurisée et flexible !
thinclients_standard_plan_user_email_body_content_2 = Vous trouverez ci-dessous les informations sur votre commande, y compris votre clé de licence. Veuillez garder la clé de licence à disposition, car elle vous sera demandée pour vérification au cas où vous appelleriez ou contactiez le support HP pour obtenir de l’aide au sujet de HP Cloud Endpoint Manager. Si cette commande couvre plus d’un utilisateur ou plus d’un système, veuillez vous assurer que l’administrateur de chaque utilisateur ou système dispose d’une copie de la clé de licence comme référence.
