thinclients_pro_plan_user_email_body_content_1 = HP Cloud Endpoint Manager siparişiniz için teşekkür ederiz. Artık basit, güvenli ve esnek aygıt yönetimine bir adım daha yakınsınız.
thinclients_pro_plan_user_email_body_content_2 = Aşağıda lisans anahtarınız da dahil olmak üzere siparişinizin ayrıntılarını bulacaksınız. HP Cloud Endpoint Manager ile ilgili yardım için HP Desteğini aramanız veya iletişime geçmeniz gerektiğinde doğrulamak amacıyla gerekeceği için lütfen Lisans Anahtarınızı erişilebilir bir yerde saklayın. Bu sipariş birden fazla kullanıcı veya sistem içeriyorsa, referans için lisans anahtarının bir kopyasının her kullanıcıda veya sistem yöneticisinde bulunduğundan emin olun.
thinclients_pro_trial_plan_user_email_body_content_1 = HP Cloud Endpoint Manager’ın 180 günlük deneme sürümünü sipariş ettiğiniz için teşekkürler. Artık basit, güvenli ve esnek aygıt yönetimine bir adım daha yakınsınız.
thinclients_pro_trial_plan_user_email_body_content_2 = Aşağıda siparişinizin ayrıntılarını bulabilirsiniz. 180 günlük deneme süresi sona erdikten sonra HP Cloud Endpoint Manager’ı kullanmaya devam etmek için yükseltmek amacıyla HP satış temsilcisiyle iletişim kurun.
thinclients_standard_plan_user_email_body_content_1 = HP Cloud Endpoint Manager siparişiniz için teşekkür ederiz. Artık basit, güvenli ve esnek aygıt yönetimine bir adım daha yakınsınız.
thinclients_standard_plan_user_email_body_content_2 = Aşağıda Lisans Anahtarınız da dahil olmak üzere sipariş detaylarınızı bulacaksınız. HP Cloud Endpoint Manager ile ilgili yardım için HP Desteğini aramanız veya iletişime geçmeniz gerektiğinde doğrulama için gerekeceğinden lütfen Lisans Anahtarınızı erişilebilir bir yerde saklayın. Bu sipariş birden fazla kullanıcı veya sistem içeriyorsa, referans için Lisans Anahtarının bir kopyasının her kullanıcıda veya sistem yöneticisinde bulunduğundan emin olun.
