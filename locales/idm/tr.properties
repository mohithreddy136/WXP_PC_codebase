active.care.account.create.body_msg12 = HP Active Care Karşılama Ekibi
active.care.account.create.body_msg13 = Active Care ile eksiksiz bir aygıt koruma, destek ve onarım hizmetleri paketinin yanı sıra HP TechPulse portalına da erişebilirsiniz.
active.care.account.create.body_msg14 = Sonraki adımlar:
active.care.account.create.body_msg15 = Şu bağlantıyı kullanıp oturum açarak e-postanızı doğrulayın: <a href={0} style="color: #0096D6;">{0}</a>. E-postanızı doğrudan girebilirsiniz, sistem HP bünyesinde bir parola oluşturmanız için size yol gösterecektir.
active.care.account.create.body_msg16 = Bunu indirip kurun: <a href={0} style="color: #0096D6;">HP TechPulse Windows uygulaması</a>. Kaydedilecek çok sayıda aygıtınız varsa şu bağlantıyı takip edin: <a href={1} style="color: #0096D6;">Active Care Kullanım Kılavuzu</a> talimatları 8-10 numaralı sayfalarda yer almaktadır.
active.care.account.create.body_msg17 = Sorumluluk reddi
active.care.account.create.body_msg2 = {0} kayıtlarımıza göre, Active Care portalında kaydedilecek {1} aygıt mevcut.
active.care.account.create.body_msg3 = Bu mesajı almanızın nedeni e-postanızın bir pano isteğinde sağlanmış olmasıdır.
active.care.account.create.body_msg4 = Kayıt olmazsanız, donanım sorunlarınızı uzaktan biletleme ve çözme olanağı da dahil olmak üzere HP Active Care’in bazı yeni fırsatlarını kaçıracaksınız. Geri bildiriminiz HP için önemli. Lütfen yolculuğunuz esnasında size nasıl yardımcı olabileceğimizi bize bildirin:
active.care.account.create.body_msg5 = Daha fazla bilgiye ve bir demoya ihtiyacım var. Hadi tanışalım!
active.care.account.create.body_msg6 = İhtiyacım olan her şeye sahibim ve şimdi başlayacağım.
active.care.account.create.body_msg7 = Yardım! Teknik sorunlarla karşılaştım!
active.care.account.create.body_msg8 = HP donanım aygıtlarımı almadım.
active.care.account.create.body_msg9 = Henüz başlamak için hazır değilim ve daha fazla zamana ihtiyacım var.
active.care.account.create.body_next_steps.2 = E-posta adresiniz kiracınıza eklendi. Workforce Experience Platform’da ilk kez oturum açıyorsanız HP’nin gönderdiği e-posta mesajını bulun ve kimlik bilgilerinizi oluşturmak için bu mesajdaki bağlantıyı takip edin.
active.care.account.create.body_next_steps.3 = Bunu yaptıktan sonra <a href={0} style="text-decoration:none; color:#027AAE”>https://admin.hp.com</a> adresinde oturum açın. Birden fazla kiracıya erişim verilmişse üst sağ köşede profil simgesini seçebilir ve daha sonra bunlar arasında geçiş yapmak için Hesabı Değiştir’i seçebilirsiniz.
active.care.account.create.body_next_steps1 = <a href={0} style="text-decoration:none; color:#027AAE">HP Insights Windows uygulamasını</a> indirin ve her bilgisayara yükleyin.
active.care.account.create.body_next_steps1.1 = Birden fazla bilgisayarınız varsa ve bir yazılım dağıtımı veya uç nokta yönetimi aracı kullanıyorsanız <a href={0} style="text-decoration:none; color:#027AAE">Kullanım Kılavuzu</a>’nda sayfa 8-10’u okuyun.
active.care.account.create.body_next_steps1.2 = Ya da bu kısa <a href={0} style="text-decoration:none; color:#027AAE">Alıştırma Hızlı Kılavuzu</a>’ndaki adımları takip edin.
active.care.account.create.body_next_steps2 = <a href={0} style="text-decoration:none; color:#027AAE">admin.hp.com</a> adresinde oturum açın, e-postanızı girin ve sizden istendiğinde bir parola oluşturun.
active.care.account.create.body_next_steps2.1 = Cihazlar sayfasını açın.
active.care.account.create.body_next_steps2.2 = Pano isteğine dahil olan bilgisayarları görmek için Kayıt Bekleniyor sekmesini açın. Gelecekte satın alınacak bu hizmetin sağlandığı bilgisayarlar otomatik olarak listede görüntülenecektir.
active.care.account.create.body_next_steps2.3 = HP Insights aracının yüklendiği bilgisayarları görmek için Tümü sekmesini açın. Bu bilgisayarlar hizmet değeri almaya başlayacaktır. Daha fazla bilgi almak için bu <a href={0} style="text-decoration:none; color:#027AAE">kısa makaleyi okuyun ve videoyu izleyin</a>.
active.care.account.create.body_support = Cihazların dahil edilmesi veya panonun kullanılması ile ilgili sorular için şu basit adımları uygulayın.
active.care.account.create.body_support1 = Support.HP.com adresinde henüz bir hesabınız yoksa, <a href={0} style="text-decoration:none; color:#027AAE">bir hesap oluşturun</a>.
