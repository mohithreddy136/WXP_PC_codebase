thinclients_pro_trial_plan_user_email_body_content_1 = Agradecemos a sua encomenda do período de avaliação de 180 dias do HP Cloud Endpoint Manager. Está agora um passo mais próximo de uma gestão de dispositivos simples, segura e flexível!
thinclients_pro_trial_plan_user_email_body_content_2 = Abaixo encontrará os detalhes da sua encomenda. Para continuar a utilizar o HP Cloud Endpoint Manager após o período de avaliação de 180 dias expirar, contacte o seu representante de vendas HP para atualizar.
