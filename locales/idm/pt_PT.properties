active.care.account.create.body_msg1 = Obrigado por adquirir o <b>HP Premium+ Support ou HP Active Care</b>.
active.care.account.create.body_msg10 = Não quero ativar o meu serviço.
active.care.account.create.body_msg11 = Cumprimentos,
active.care.account.create.body_msg12 = Equipa de Integração HP Active Care
active.care.account.create.body_msg13 = Com o Active Care, tem um conjunto completo de proteção de dispositivos, suporte e serviços de reparação, assim como acesso ao portal HP TechPulse.
active.care.account.create.body_msg14 = Passos seguintes:
active.care.account.create.body_msg15 = Valide o seu email ao iniciar sessão em <a href={0} style="color: #0096D6;">{0}</a>. Pode introduzir diretamente o seu email e o sistema irá guiá-lo na criação de uma palavra-passe com a HP.
active.care.account.create.body_msg16 = Transfira e instale a <a href={0} style="color: #0096D6;">aplicação HP TechPulse Windows</a>. Se tem vários dispositivos para registar, siga as instruções do <a href={1} style="color: #0096D6;">Manual do Utilizador Active Care</a> localizadas nas páginas 8 a 10.
active.care.account.create.body_msg17 = Exclusão de responsabilidade
active.care.account.create.body_msg2 = Com base nos nossos registos para {0}, existem {1} dispositivos registados no portal Active Care.
active.care.account.create.body_msg3 = Está a receber esta mensagem porque o seu email foi fornecido num pedido no painel.
active.care.account.create.body_msg4 = Se não se registar, perderá algumas das novas funcionalidades do HP Active Care, incluindo a capacidade de criar pedidos de suporte e resolver os seus problemas de hardware de forma remota. Os seus comentários são importantes para a HP. Diga-nos como podemos ajudá-lo:
active.care.account.create.body_msg5 = Necessito de mais informações e uma demonstração. Vamos nos encontrar!
active.care.account.create.body_msg6 = Tenho tudo o que necessito e vou começar agora.
active.care.account.create.body_msg7 = Ajuda! Deparei-me com problemas técnicos!
active.care.account.create.body_msg8 = Não recebi os meus dispositivos de hardware HP.
active.care.account.create.body_msg9 = Ainda não estou pronto para começar e necessito de mais tempo.
active.care.account.create.body_next_steps.2 = O seu endereço de e-mail foi adicionado ao seu inquilino. Se esta é a primeira vez que inicia sessão na Workforce Experience Platform, procure uma mensagem de e-mail da HP e siga a ligação nessa mensagem para criar as suas credenciais.
active.care.account.create.body_next_steps.3 = Depois de o ter feito, inicie sessão em <a href={0} style="text-decoration:none; color:#027AAE">https://admin.hp.com</a>. Se lhe foi dado acesso a mais do que um inquilino, pode selecionar o ícone do perfil no canto superior direito e, em seguida, selecionar a opção Mudar de conta para se deslocar entre eles.
active.care.account.create.body_next_steps1 = Transfira e instale a <a href={0} style="text-decoration:none; color:#027AAE">aplicação HP Insights Windows</a> em cada PC.
active.care.account.create.body_next_steps1.1 = Se tem muitos PCs e utiliza uma distribuição de software ou ferramenta de gestão de endpoint, leia páginas 8-10 no <a href={0} style="text-decoration:none; color:#027AAE">guia do Utilizador</a>.
active.care.account.create.body_next_steps1.2 = Caso contrário, siga os passos neste breve <a href={0} style="text-decoration:none; color:#027AAE">Guia rápido de integração</a>.
active.care.account.create.body_next_steps2 = Inicie sessão em <a href={0} style="text-decoration:none; color:#027AAE">admin.hp.com</a>, introduza o seu email e crie uma palavra-passe quando solicitado.
active.care.account.create.body_next_steps2.1 = Abra a página de dispositivos.
active.care.account.create.body_next_steps2.2 = Abra o separador de registo pendente para ver os PCs incluídos no pedido no painel. Futuras aquisições de PCs com este serviço irão aparecer automaticamente nesta lista.
active.care.account.create.body_next_steps2.3 = Abra o separador Todos para ver os PCs que têm o agente HP Insights instalado. Estes irão começar a receber o valor do serviço. Leia este <a href={0} style="text-decoration:none; color:#027AAE">breve artigo e assista ao vídeo</a> para saber mais.
active.care.account.create.body_support = Para questões sobre a integração do seus dispositivos ou a utilização do painel, siga estes passos simples.
active.care.account.create.body_support1 = Se ainda não tiver uma conta em Support.HP.com, <a href={0} style="text-decoration:none; color:#027AAE">crie uma</a>.
active.care.account.create.body_support2 = <a href={0} style="text-decoration:none; color:#027AAE">Inicie sessão</a> e crie um ticket.
active.care.account.create.body_support2.a = Forneça um dos números de série na sua frota que tenha HP Premium+ Support ou HP Active Care.
active.care.account.create.body_support2.b = Descreva o problema que está a ter.
active.care.account.create.body_support2.c = O seu caso será enviado para uma equipa especializada no serviço.
