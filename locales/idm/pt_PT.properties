sign_in_change.content_1 = A HP está atualmente a implementar o ID HP, um ecossistema de gestão de identidade para toda a HP. O ID HP fornece aos utilizadores uma única identidade transversal a todos os produtos HP, o que resulta num melhoramento da segurança e conveniência.
