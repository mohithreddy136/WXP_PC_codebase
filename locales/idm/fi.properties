active.care.account.create.body_msg1 = Kiitos, kun ostit <b>HP Premium+ Support -tuen tai HP Active Caren</b>.
active.care.account.create.body_msg10 = En halua aktivoida palveluani.
active.care.account.create.body_msg11 = Ystävällisin terveisin.
active.care.account.create.body_msg12 = HP Active Caren perehdytystiimi
active.care.account.create.body_msg13 = Active Caren avulla saat laitesuojan, tukea ja korjauspalveluita sekä pääsyn HP TechPulse -portaaliin.
active.care.account.create.body_msg14 = Seuraavat vaiheet:
active.care.account.create.body_msg15 = Vahvista sähköpostisi kirjautumalla kohteeseen <a href={0} style="color: #0096D6;">{0}</a>. Voit syöttää sähköpostiosoitteesi suoraan, ja järjestelmä ohjaa sinut luomaan HP-salasanan.
active.care.account.create.body_msg16 = Lataa ja asenna <a href={0} style="color: #0096D6;">HP TechPulse -Windows-sovellus</a>. Jos sinulla on rekisteröitäviä laitteita, seuraa <a href={1} style="color: #0096D6;">Active Care -käyttöoppaan</a> ohjeita, jotka löytyvät sivuilta 8–10.
active.care.account.create.body_msg17 = Vastuuvapauslauseke
active.care.account.create.body_msg2 = {0} tietojemme perusteella Active Care -portaaliin on rekisteröitävissä {1} laitetta.
active.care.account.create.body_msg3 = Saat tämän viestin, koska sähköpostiosoitteesi annettiin hallintapaneelipyynnössä.
active.care.account.create.body_msg4 = Jos et rekisteröidy, jäät paitsi joistakin HP Active Caren uusista ominaisuuksista, kuten kyvystä tehdä etänä palvelupyyntöjä ja ratkaista laitteisto-ongelmia. Palautteesi on tärkeää HP:lle. Kerro meille, kuinka voimme auttaa sinua matkallasi:
active.care.account.create.body_msg5 = Tarvitsen lisätietoja ja esittelyn. Tavataan!
active.care.account.create.body_msg6 = Minulla on kaikki tarvittava ja aloitan nyt.
active.care.account.create.body_msg7 = Apua! Törmäsin teknisiin ongelmiin!
active.care.account.create.body_msg8 = En ole saanut HP-laitteitani.
active.care.account.create.body_msg9 = En ole valmis aloittamaan vielä. Tarvitsen lisää aikaa.
active.care.account.create.body_next_steps.2 = Sähköpostiosoitteesi on lisätty vuokraajaan. Jos tämä on ensimmäinen kerta, kun kirjaudut Workforce Experience Platform -alustalle, etsi HP:n lähettämä sähköpostiviesti ja seuraa viestin linkkiä tunnustesi luomiseksi.
active.care.account.create.body_next_steps.3 = Kun olet tehnyt tämän, kirjaudu osoitteeseen <a href={0} style="text-decoration:none; color:#027AAE">https://admin.hp.com</a>. Jos sinulle on annettu pääsy useampaan kuin yhteen vuokraajaan, voit valita profiilikuvakkeen oikeassa yläkulmassa ja vaihtaa niiden välillä valitsemalla Vaihda tili -vaihtoehdon.
active.care.account.create.body_next_steps1 = Lataa ja asenna <a href={0} style="text-decoration:none; color:#027AAE">HP Insights Windows -sovellus</a> jokaiselle tietokoneelle.
active.care.account.create.body_next_steps1.1 = Jos käytössäsi on useita tietokoneita ja käytät ohjelmistonjakelu- tai päätelaitteiden hallintatyökalua, lue sivut 8–10 <a href={0} style="text-decoration:none; color:#027AAE">-käyttöoppaasta</a>.
active.care.account.create.body_next_steps1.2 = Muussa tapauksessa noudata tämän lyhyen <a href={0} style="text-decoration:none; color:#027AAE">-perehdytyspikaoppaan ohjeita</a>.
active.care.account.create.body_next_steps2 = Kirjaudu osoitteeseen <a href={0} style="text-decoration:none; color:#027AAE">admin.hp.com</a>, anna sähköpostiosoitteesi ja luo salasana pyydettäessä.
active.care.account.create.body_next_steps2.1 = Avaa Laitteet-sivu.
active.care.account.create.body_next_steps2.2 = Avaa Odottavat rekisteröinnit -välilehti nähdäksesi hallintapaneelipyyntöön sisältyvät tietokoneet. Myöhemmin ostetut tämän palvelun sisältävät tietokoneet näkyvät tässä luettelossa automaattisesti.
active.care.account.create.body_next_steps2.3 = Avaa Kaikki-välilehti, jotta näet ne tietokoneet, joille on asennettuna HP Insights -agentti. Nämä tietokoneet pääsevät hyötymään palvelun tuomasta arvosta. Lue tämä <a href={0} style="text-decoration:none; color:#027AAE">lyhyt artikkeli ja katso video</a> saadaksesi lisätietoja.
active.care.account.create.body_support = Jos sinulla on kysyttävää laitteidesi käyttöönotosta tai hallintapaneelin käytöstä, noudata näitä yksinkertaisia vaiheita.
active.care.account.create.body_support1 = Jos sinulla ei vielä ole tiliä palvelussa Support.HP.com, <a href={0} style="text-decoration:none; color:#027AAE">luo sellainen</a>.
active.care.account.create.body_support2 = <a href={0} style="text-decoration:none; color:#027AAE">Kirjaudu sisään</a> ja luo palvelupyyntö.
active.care.account.create.body_support2.a = Anna yksi sarjanumero laitekantasi laitteesta, jossa on HP Premium+ Support -tuki tai HP Active Care.
active.care.account.create.body_support2.b = Kuvaile kohtaamaasi ongelmaa.
active.care.account.create.body_support2.c = Tapauksesi lähetetään tähän palveluun erikoistuneelle tiimille.
