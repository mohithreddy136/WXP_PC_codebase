thinclients_plan_user_email_body_content_10 = Faça login com suas credenciais recém-criadas.
thinclients_plan_user_email_body_content_11 = Se você precisar de mais informações sobre ativar, baixar ou instalar o HP Cloud Endpoint Manager, assista a nosso <a href="{0}" target="_blank" style="color:#027aae; text-decoration: none;">tutorial em vídeo</a>.
thinclients_plan_user_email_body_content_3 = Select "Access HPCEM" below to begin the process of activating your order of HP Cloud Endpoint Manager, or visit 
thinclients_plan_user_email_body_content_4 = Caso ainda não tenha uma ID de conta HP, poderá criá-la durante o processo de login.
thinclients_plan_user_email_body_content_5 = Select <b>Access HPCEM,</b> or go to 
thinclients_plan_user_email_body_content_6 = Depois, selecione <b>"Não possui uma conta? Cadastre-se"</b> abaixo da caixa de login.
thinclients_plan_user_email_body_content_7 = Preencha os campos obrigatórios usando <a href="javascript:void(0)" style="text-decoration: none; font-weight: bold; color: #404040; cursor: auto;">{0}</a> como o endereço de e-mail e selecione <b>Criar conta</b>.
thinclients_plan_user_email_body_content_8 = Um código de verificação será enviado para o seu endereço de e-mail.
thinclients_plan_user_email_body_content_9 = Insira o código de verificação.
thinclients_pro_plan_user_email_body_content_1 = Obrigado pelo pedido do HP Cloud Endpoint Manager. Você está mais perto de ter um gerenciamento simples, seguro e flexível de dispositivo!
thinclients_pro_plan_user_email_body_content_2 = Abaixo, você verá os detalhes do pedido, incluindo sua chave de licença. Mantenha a chave de licença acessível, pois ela será necessária para verificação, se você ligar ou entrar em contato com o Suporte HP para assistência com o HP Cloud Endpoint Manager. Se essa compra cobrir mais de um usuário ou sistema, assegure-se de que cada usuário ou administrador do sistema tenha uma cópia da chave de licença para referência.
thinclients_pro_trial_plan_user_email_body_content_1 = Obrigado por seu pedido de avaliação de 180 dias do HP Cloud Endpoint Manager. Você está mais perto de ter um gerenciamento simples, seguro e flexível de dispositivo!
thinclients_pro_trial_plan_user_email_body_content_2 = Abaixo, estão os detalhes do seu pedido. Para continuar usando o HP Cloud Endpoint Manager Pro após a avaliação de 180 dias, fale com seu representante de vendas HP sobre um upgrade.
thinclients_standard_plan_user_email_body_content_1 = Obrigado pelo pedido do HP Cloud Endpoint Manager. Você está mais perto de ter um gerenciamento simples, seguro e flexível de dispositivo!
thinclients_standard_plan_user_email_body_content_2 = Abaixo, você verá os detalhes do pedido, incluindo sua Chave de licença. Mantenha a Chave de licença acessível, pois ela será necessária para verificação, se você ligar ou entrar em contato com o Suporte HP de outra forma para assistência com o HP Cloud Endpoint Manager. Se o seu pedido cobrir mais de um usuário ou sistema, assegure-se de que cada usuário ou administrador do sistema tenha uma cópia da Chave de licença para referência.
