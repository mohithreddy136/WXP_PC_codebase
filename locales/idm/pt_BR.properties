active.care.account.create.body_msg1 = Agradecemos por você ter adquirido o <b>HP Premium+ Support ou o HP Active Care</b>.
active.care.account.create.body_msg10 = Eu não quero ativar meu serviço.
active.care.account.create.body_msg11 = Atenciosamente,
active.care.account.create.body_msg12 = Equipe de integração do HP Active Care
active.care.account.create.body_msg13 = Com o Active Care, você tem um pacote completo de proteção de dispositivo, suporte e serviços de reparo, bem como acesso ao portal HP TechPulse.
active.care.account.create.body_msg14 = Próximas etapas:
active.care.account.create.body_msg15 = Valide seu e-mail fazendo login em <a href={0} style="color: #0096D6;">{0}</a>. Você pode inserir seu e-mail diretamente e o sistema o guiará para criar uma senha com a HP.
active.care.account.create.body_msg16 = Baixe e instale o <a href={0} style="color: #0096D6;">aplicativo HP TechPulse para Windows</a>. Se você tiver muitos dispositivos para registrar, siga as instruções do <a href={1} style="color: #0096D6;">Manual do usuário do Active Care</a> nas páginas 8 a 10.
active.care.account.create.body_msg17 = Isenção de responsabilidade
active.care.account.create.body_msg2 = Com base em nossos registros para {0}, existem {1} dispositivos a serem registrados no portal Active Care.
active.care.account.create.body_msg3 = Você está recebendo essa mensagem porque o seu e-mail foi fornecido em uma solicitação de painel.
active.care.account.create.body_msg4 = Se você não se registrar, perderá alguns dos novos recursos do HP Active Care, incluindo a capacidade de solicitar atendimento e resolver seus problemas de hardware remotamente. Seus comentários são importantes para a HP. Diga-nos como podemos ajudá-lo em sua jornada:
active.care.account.create.body_msg5 = Eu preciso de mais informações e de uma demonstração. Vamos fazer uma reunião!
active.care.account.create.body_msg6 = Eu tenho tudo que preciso e vou começar agora.
active.care.account.create.body_msg7 = Socorro! Encontrei problemas técnicos!
active.care.account.create.body_msg8 = Não recebi meus dispositivos de hardware HP.
active.care.account.create.body_msg9 = Ainda não estou pronto para começar e preciso de mais tempo.
active.care.account.create.body_next_steps.2 = Seu endereço de e-mail foi adicionado a seu locatário. Caso esta seja a primeira vez que você faz login na Workforce Experience Platform, procure uma mensagem de e-mail da HP e siga o link nessa mensagem para criar suas credenciais.
active.care.account.create.body_next_steps.3 = Depois disso, faça login em <a href={0} style="text-decoration:none; color:#027AAE">https://admin.hp.com</a>. Se você tiver recebido acesso a mais de um locatário, poderá selecionar o ícone do perfil no canto superior direito e, em seguida, selecionar a opção Alternar conta para se movimentar entre eles.
active.care.account.create.body_next_steps1 = Baixe e instale <a href={0} style="text-decoration:none; color:#027AAE">o aplicativo HP Insights Windows</a> em cada computador.
active.care.account.create.body_next_steps1.1 = Se você tiver muitos computadores e usar uma ferramenta de distribuição de software ou de gerenciamento de extremidade, leia as páginas de 8 a 10 do <a href={0} style="text-decoration:none; color:#027AAE">Guia do Usuário</a>.
active.care.account.create.body_next_steps1.2 = Do contrário, siga as instruções neste breve <a href={0} style="text-decoration:none; color:#027AAE">Guia rápido de integração</a>.
active.care.account.create.body_next_steps2 = Faça login em <a href={0} style="text-decoration:none; color:#027AAE">admin.hp.com</a>, insira o seu e-mail e crie uma senha, quando solicitado.
active.care.account.create.body_next_steps2.1 = Abra a página Dispositivos.
active.care.account.create.body_next_steps2.2 = Abra a guia Inscrição pendente para ver os computadores incluídos na solicitação de painel. Futuras aquisições de computadores com esse serviço aparecerão automaticamente nesta lista.
active.care.account.create.body_next_steps2.3 = Abra a guia Todos para ver os PCs que têm o agente do HP Insights instalado. Eles começarão a receber o valor do serviço. Leia este <a href={0} style="text-decoration:none; color:#027AAE">breve artigo e assista a um vídeo</a> para saber mais.
active.care.account.create.body_support = Em caso de dúvidas sobre integração de dispositivos ou uso do painel, siga estas breves instruções.
active.care.account.create.body_support1 = Se você ainda não tiver uma conta em support.hp.com, <a href={0} style="text-decoration:none; color:#027AAE">crie uma</a>.
active.care.account.create.body_support2 = <a href={0} style="text-decoration:none; color:#027AAE">Faça login</a> e crie um tíquete.
active.care.account.create.body_support2.a = Informe um dos números de série na sua frota que tenha o HP Premium+ Support ou HP Active Care.
active.care.account.create.body_support2.b = Descreva o problema que você está tendo.
active.care.account.create.body_support2.c = O seu caso será enviado a uma equipe especializada no serviço.
