active.care.account.create.body_msg13 = 有了 Active Care，您便能擁有一整套完善的裝置保護、支援及維修服務，並能存取 HP TechPulse 入口網站。
active.care.account.create.body_msg14 = 後續步驟:
active.care.account.create.body_msg15 = 請登入 <a href={0} style="color: #0096D6;">{0}</a> 以驗證您的電子郵件。您可以直接輸入您的電子郵件，系統將會引導您建立用於 HP 的密碼。
active.care.account.create.body_msg16 = 下載並安裝 <a href={0} style="color: #0096D6;">HP TechPulse Windows 應用程式</a>。如果您有多部裝置要註冊，請依照 <a href={1} style="color: #0096D6;">Active Care 使用指南</a>內 8-10 頁上的指示操作。
active.care.account.create.body_msg17 = 免責聲明
active.care.account.create.body_msg2 = 根據我們的 {0} 記錄，會有 {1} 個裝置要進行 Active Care 入口網站註冊。
active.care.account.create.body_msg3 = 您在儀表板要求中提供了電子郵件，因此會收到這則訊息。
active.care.account.create.body_msg4 = 若您尚未註冊，將會錯過一部分 HP Active Care 的全新功能，包括遠端建立票證及解決硬體問題的能力。您的意見反應對於 HP 而言非常重要。在您的使用過程中，若有任何我們能夠協助之處，請不吝提出:
active.care.account.create.body_msg5 = 我需要詳細資訊及示範。請為我安排會面!
active.care.account.create.body_msg6 = 我已萬事皆備，並且隨時都能開始。
active.care.account.create.body_msg7 = 請幫幫我! 我遇到了技術問題!
active.care.account.create.body_msg8 = 我並未收到我的 HP 硬體裝置。
active.care.account.create.body_msg9 = 我還沒準備好開始，還需要一些時間。
active.care.account.create.body_next_steps.2 = 已將您的電子郵件地址新增至您的租用戶。如果這是您第一次登入 Workforce Experience Platform，請尋找來自 HP 的電子郵件訊息，並依照訊息中的連結建立您的認證。
active.care.account.create.body_next_steps.3 = 完成此操作後，請登入 <a href={0} style="text-decoration:none; color:#027AAE">https://admin.hp.com</a>。如果您已獲授予多個租用戶的存取權限，則可選取右上角的設定檔圖示，然後選取「切換帳戶」選項，即可在不同帳戶之間移動。
active.care.account.create.body_next_steps1 = 在每台電腦上下載並安裝 <a href={0} style="text-decoration:none; color:#027AAE">HP Insights Windows 應用程式</a>。
active.care.account.create.body_next_steps1.1 = 如果您有多台電腦並使用軟體發佈或端點管理工具，請參閱<a href={0} style="text-decoration:none; color:#027AAE">《使用指南</a>》第 8 到 10 頁。
active.care.account.create.body_next_steps1.2 = 如為其他情況，請依照此簡短<a href={0} style="text-decoration:none; color:#027AAE">《上線快速指南</a>》中的步驟進行操作。
active.care.account.create.body_next_steps2 = 登入 <a href={0} style="text-decoration:none; color:#027AAE">admin.hp.com</a>，出現提示時輸入電子郵件並建立密碼。
active.care.account.create.body_next_steps2.1 = 開啟「裝置」頁面。
active.care.account.create.body_next_steps2.2 = 開啟「待註冊」標籤，查看儀表板要求中註明的電腦。未來購買且用於這項服務的電腦，會自動出現在這份清單中。
active.care.account.create.body_next_steps2.3 = 開啟「全部」標籤，查看已安裝 HP Insights 代理程式的電腦。其將開始享受服務提供的價值。閱讀此篇<a href={0} style="text-decoration:none; color:#027AAE">短文並觀看影片</a>以瞭解更多資訊。
active.care.account.create.body_support = 如對於裝置上線及儀表板使用方式有任何疑問，請按照下列簡單步驟操作。
