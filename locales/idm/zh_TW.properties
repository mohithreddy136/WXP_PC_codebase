thinclients_pro_trial_plan_user_email_body_content_1 = 感謝您訂購 HP Cloud Endpoint Manager 180 天試用版。現在只差一步，您就能擁有簡單、安全、靈活的裝置管理!
thinclients_pro_trial_plan_user_email_body_content_2 = 以下是您的訂單詳細資料。若在 180 天試用期過後要繼續使用 HP Cloud Endpoint Manager，請聯絡您的 HP 銷售代表以安排升級。
