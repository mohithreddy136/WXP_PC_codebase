thinclients_pro_plan_user_email_body_content_1 = Vielen Dank für Ihre Bestellung von HP Cloud Endpoint Manager. Sie sind einer einfachen, sicheren und flexiblen Geräteverwaltung einen Schritt näher gekommen!
thinclients_pro_plan_user_email_body_content_2 = Im Folgenden finden Sie die Einzelheiten zu Ihrer Bestellung, einschließlich Ihres Lizenzschlüssels. Halten Sie den Lizenzschlüssel griffbereit, da er zur Verifizierung benötigt wird, falls Sie den HP Support kontaktieren, um Hilfe zu HP Cloud Endpoint Manager zu erhalten. Wenn diese Bestellung mehr als einen Benutzer oder ein System betrifft, stellen Sie sicher, dass jeder Benutzer oder Systemadministrator zur Referenz eine Kopie des Lizenzschlüssels erhält.
thinclients_pro_trial_plan_user_email_body_content_1 = Vielen Dank für Ihre Bestellung der 180-Tage-Testversion von HP Cloud Endpoint Manager. Sie sind einer einfachen, sicheren und flexiblen Geräteverwaltung einen Schritt näher gekommen!
thinclients_pro_trial_plan_user_email_body_content_2 = Nachstehend finden Sie die Einzelheiten Ihrer Bestellung. Wenn Sie HP Cloud Endpoint Manager Pro nach Ablauf der 180-tägigen Testphase weiter nutzen möchten, wenden Sie sich für ein Upgrade an Ihren HP Vertriebsmitarbeiter.
thinclients_standard_plan_user_email_body_content_1 = Vielen Dank für Ihre Bestellung von HP Cloud Endpoint Manager. Sie sind einer einfachen, sicheren und flexiblen Geräteverwaltung einen Schritt näher gekommen!
thinclients_standard_plan_user_email_body_content_2 = Im Folgenden finden Sie die Einzelheiten zu Ihrer Bestellung, einschließlich Ihres Lizenzschlüssels. Halten Sie den Lizenzschlüssel griffbereit, da er zur Verifizierung benötigt wird, falls Sie den HP Support kontaktieren, um Hilfe zu HP Cloud Endpoint Manager zu erhalten. Wenn diese Bestellung mehr als einen Benutzer oder ein System betrifft, stellen Sie sicher, dass jeder Benutzer oder Systemadministrator eine Kopie des Lizenzschlüssels zur Referenz erhält.
