active.care.account.create.body_msg1 = Vielen Dank, dass Sie sich für <b>HP Premium+ Support oder HP Active Care</b> entschieden haben.
active.care.account.create.body_msg10 = Ich möchte meinen Service nicht aktivieren.
active.care.account.create.body_msg11 = Mit freundlichen Grüßen
active.care.account.create.body_msg12 = HP Active Care Onboarding-Team
active.care.account.create.body_msg13 = Mit Active Care erhalten Sie ein umfassendes Angebot an Geräteschutz-, Support- und Reparaturservices sowie Zugriff auf das HP TechPulse-Portal.
active.care.account.create.body_msg14 = Nächste Schritte:
active.care.account.create.body_msg15 = Validieren Sie Ihre E-Mail-Adresse, indem Sie sich anmelden bei <a href={0} style="color: #0096D6;">{0}</a>. Sie können Ihre E-Mail-Adresse auch direkt eingeben, woraufhin das System Sie anleitet, ein Kennwort bei HP zu erstellen.
active.care.account.create.body_msg16 = Laden Sie folgende Anwendung herunter und installieren Sie sie: <a href={0} style="color: #0096D6;">HP TechPulse Windows</a>. Wenn Sie eine große Zahl von Geräten registrieren müssen, folgen Sie den Anweisungen im <a href={1} style="color: #0096D6;">Benutzerhandbuch zu Active Care</a> auf den Seiten 8–10.
active.care.account.create.body_msg17 = Haftungsausschluss
active.care.account.create.body_msg2 = Basierend auf unseren Informationen für {0} gibt es {1} Geräte, die für das Active Care-Portal registriert werden müssen.
active.care.account.create.body_msg3 = Sie erhalten diese Nachricht, weil Ihre E-Mail-Adresse in einer Dashboard-Anfrage angegeben wurde.
active.care.account.create.body_msg4 = Wenn Sie keine Geräte registrieren, verpassen Sie einige der neuen Funktionen von HP Active Care, einschließlich der Möglichkeit, Ihre Hardware-Probleme aus der Ferne zu melden und zu lösen. Ihr Feedback ist sehr wichtig für HP. Bitte teilen Sie uns mit, wie wir Sie bei Ihrem Vorhaben unterstützen können:
active.care.account.create.body_msg5 = Ich benötige weitere Informationen und eine Demo. Wie wär's mit einem Meeting?
active.care.account.create.body_msg6 = Ich habe alles, was ich brauche, und fange jetzt an.
active.care.account.create.body_msg7 = Hilfe! Ich bin auf technische Probleme gestoßen!
active.care.account.create.body_msg8 = Ich habe meine HP Hardwaregeräte nicht erhalten.
active.care.account.create.body_msg9 = Ich bin noch nicht so weit und brauche mehr Zeit.
active.care.account.create.body_next_steps.2 = Ihre E-Mail-Adresse wurde Ihrem Mandanten hinzugefügt. Wenn Sie sich zum ersten Mal bei der Workforce Experience Platform anmelden, warten Sie bitte auf eine E-Mail-Nachricht von HP und folgen Sie dem Link in dieser Nachricht, um Ihre Anmeldeinformationen zu erstellen.
active.care.account.create.body_next_steps.3 = Melden Sie sich danach bei <a href={0} style="text-decoration:none; color:#027AAE">https://admin.hp.com</a> an. Wenn Sie Zugang zu mehr als einem Mandanten erhalten haben, können Sie auf das Profilsymbol in der oberen rechten Ecke klicken und dann die Option „Konto wechseln“ wählen, um zwischen den Konten zu wechseln.
active.care.account.create.body_next_steps1 = Laden Sie die <a href={0} style="text-decoration:none; color:#027AAE">HP Insights Windows-Anwendung</a> herunter und installieren Sie sie auf jedem PC.
active.care.account.create.body_next_steps1.1 = Wenn Sie viele PCs haben und ein Softwareverteilungs- oder Endpunktverwaltungstool verwenden, lesen Sie die Seiten 8-10 im <a href={0} style="text-decoration:none; color:#027AAE">Benutzerhandbuch</a>.
active.care.account.create.body_next_steps1.2 = Andernfalls folgen Sie den Schritten in dieser kurzen <a href={0} style="text-decoration:none; color:#027AAE">Onboarding-Schnellanleitung</a>.
active.care.account.create.body_next_steps2 = Melden Sie sich bei <a href={0} style="text-decoration:none; color:#027AAE">admin.hp.com</a>, geben Sie Ihre E-Mail-Adresse ein und erstellen Sie ein Kennwort, wenn Sie dazu aufgefordert werden.
active.care.account.create.body_next_steps2.1 = Öffnen Sie die Seite Geräte.
active.care.account.create.body_next_steps2.2 = Öffnen Sie die Registerkarte "Ausstehende Registrierung", um die in der Dashboard-Anforderung enthaltenen PCs zu sehen. Künftige Käufe von PCs mit diesem Service werden automatisch in dieser Liste erscheinen.
active.care.account.create.body_next_steps2.3 = Öffnen Sie die Registerkarte "Alle", um die PCs anzuzeigen, auf denen der HP Insights-Agent installiert ist. Diese werden beginnen, den Wert des Service zu erhalten. Lesen Sie diesen <a href={0} style="text-decoration:none; color:#027AAE">Kurzartikel und schauen Sie ein Video an</a>, um mehr zu erfahren.
active.care.account.create.body_support = Wenn Sie Fragen zum Onboarding Ihrer Geräte oder zur Verwendung des Dashboards haben, folgen Sie diesen einfachen Schritten.
active.care.account.create.body_support1 = Wenn Sie noch kein Konto bei Support.HP.com haben, <a href={0} style="text-decoration:none; color:#027AAE"> erstellen Sie eines</a>.
active.care.account.create.body_support2 = <a href={0} style="text-decoration:none; color:#027AAE">Melden Sie sich an</a> und erstellen Sie ein Ticket.
active.care.account.create.body_support2.a = Geben Sie eine der Seriennummern in Ihrer Flotte an, für die HP Premium+ Support oder HP Active Care gilt.
active.care.account.create.body_support2.b = Beschreiben Sie Ihr Problem.
active.care.account.create.body_support2.c = Ihr Fall wird an ein Team weitergeleitet, das auf diesen Service spezialisiert ist.
