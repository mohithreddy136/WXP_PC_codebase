gt.embargo_by_ip = Ihr Konto wurde von Global Trade als Konto aus einem Land markiert, gegen das die USA ein Embargo verhängt hat. Die Verwendung des Dienstes in einem Land, das Einschränkungen unterliegt, ist untersagt, sodass der Zugriff blockiert wird. Falls Sie vorübergehend in ein Embargoland gereist sind, versuchen Sie zu einem späteren Zeitpunkt, auf den Dienst zuzugreifen, wenn Sie sich nicht mehr in einem Computernetzwerk im Embargoland befinden.
