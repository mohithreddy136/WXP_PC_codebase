sign_in_change.content_1 = HP führt derzeit HP ID ein, ein einheitliches Identitätsmanagementsystem für alle HP Produkte. Mit HP ID können Benutzer mit einer einzigen Identität auf alle HP Produkte zugreifen, was zu mehr Sicherheit und Komfort führt.
sign_in_change.content_2 = Am 10. Mai 2018 wurde HP TechPulse auf HP ID umgestellt. Ihre bestehende E-Mail-Adresse für die Anmeldung behält weiterhin ihre Gültigkeit. Aus Sicherheitsgründen müssen Sie jedoch Ihr Kennwort zurücksetzen.
