sign_in_change_notification.invite.body.content_7 = Geben Sie den Prüfcode ein.
sign_in_change_notification.invite.body.content_8 = Und schon sind Sie startklar!
sign_in_change_notification.invite.body.listcontent2 = Wählen Sie dann in der oberen rechten Ecke eine der beiden Optionen <b>Anmelden</b> – mit Microsoft-Konto oder mit HPID-Konto.
sign_in_change_notification.invite.body.listcontent3 = Wenn Sie die Anmeldung über Ihr Microsoft-Konto gewählt haben, sollten Sie sich direkt anmelden können. <br/>Wenn Sie die Anmeldung über Ihr HPID-Konto gewählt haben, wählen Sie anschließend die Option "Sie haben noch kein Konto?“ aus. Registrieren Sie sich unterhalb des Anmeldefensters.
