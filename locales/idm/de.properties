sign_in_change_notification.content_1 = Klicken Sie unten auf die Schaltfläche, um auf das HP TechPulse Portal zuzugreifen. Sie müssen das mit <b>[{0}]</b> verknüpfte HP Konto verwenden. Wenn Sie noch kein HP Konto haben, erstellen Sie ein Konto, indem Sie den Anweisungen auf der Anmeldeseite folgen.
sign_in_change_notification.invite.body.content_1 = Erstellen Sie zunächst ein neues HP Konto. Klicken Sie dazu unten auf die Schaltfläche <b>"Zu HP TechPulse wechseln"</b>.
sign_in_change_notification.invite.body.content_2 = Sie werden zur Seite <a {0}> {1} </a> weitergeleitet.
sign_in_change_notification.invite.body.content_3 = Klicken Sie dann auf die Schaltfläche <b>"Anmelden"</b>, um den Anmeldebildschirm aufzurufen.
sign_in_change_notification.invite.body.content_4 = Klicken Sie jetzt auf den Link <b>"Sie haben noch kein Konto? Anmelden"</b>.
sign_in_change_notification.invite.body.content_5 = Füllen Sie die erforderlichen Felder aus und verwenden Sie dabei <b >[ {0} ] </b> als E-Mail-Adresse.
