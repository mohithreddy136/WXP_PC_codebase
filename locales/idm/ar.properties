active.care.account.create.body_msg12 = فريق HP Active Care Onboarding
active.care.account.create.body_msg13 = مع Active Care، لديك مجموعة كاملة من خدمات حماية الجهاز والدعم والإصلاح بالإضافة إلى الوصول إلى بوابة HP TechPulse.
active.care.account.create.body_msg14 = الخطوات التالية:
active.care.account.create.body_msg15 = تحقق من صحة بريدك الإلكتروني عن طريق تسجيل الدخول إلى <a href={0} style="color: #0096D6;">{0}</a>. يمكنك إدخال بريدك الإلكتروني مباشرةً وسيقوم النظام بإرشادك لإنشاء كلمة مرور باستخدام HP.
active.care.account.create.body_msg16 = تنزيل وتثبيت <a href={0} style="color: #0096D6;">تطبيق HP TechPulse Windows</a>. إذا كان لديك العديد من الأجهزة للتسجيل، فاتبع <a href={1} style="color: #0096D6;">دليل مستخدم Active Care</a> تتوفّر الإرشادات في الصفحات 8-10.
active.care.account.create.body_msg17 = إخلاء المسؤولية
active.care.account.create.body_msg2 = بناءً على سجلاتنا الخاصة بـ {0}، هناك {1} من الأجهزة التي سيتم تسجيلها في بوابة Active Care.
active.care.account.create.body_msg3 = تتلقى هذه الرسالة لأنه تم تقديم بريدك الإلكتروني في طلب لوحة المعلومات.
active.care.account.create.body_msg4 = إذا لم تقم بالتسجيل، فستفقد بعض الميزات الجديدة لـ HP Active Care، بما في ذلك القدرة على حجز التذاكر عن بُعد وحل مشكلات أجهزتك. ملاحظاتك مهمة لشركة HP. يرجى إخبارنا كيف يمكننا مساعدتك في رحلتك:
active.care.account.create.body_msg5 = أحتاج إلى مزيد من المعلومات وعرض توضيحي. فلنلتقي!
active.care.account.create.body_msg6 = لدي كل ما أحتاجه وسأبدأ الآن.
active.care.account.create.body_msg7 = تعليمات! واجهت مشاكل فنية!
active.care.account.create.body_msg8 = لم أستلم أجهزتي من HP.
active.care.account.create.body_msg9 = لست مستعدًا للبدء بعد وأحتاج إلى مزيد من الوقت.
active.care.account.create.body_next_steps.2 = تمت إضافة عنوان بريدك الإلكتروني إلى المستأجر الخاص بك. إذا كانت هذه هي المرة الأولى التي تقوم فيها بتسجيل الدخول إلى Workforce Experience Platform، فيُرجى البحث عن رسالة بريد إلكتروني من HP واتباع الرابط الموجود الوارد في تلك الرسالة لإنشاء بيانات اعتمادك.
active.care.account.create.body_next_steps.3 = بمجرد الانتهاء من ذلك، سجل الدخول إلى، <a href={0} style="text-decoration:none; color:#027AAE">https://admin.hp.com</a>. إذا تم منحك إمكانية الوصول إلى أكثر من مستأجر واحد، فيمكنك تحديد أيقونة ملف التعريف في الزاوية العلوية اليمنى ثم تحديد خيار تبديل الحساب للتنقل بينهم.
active.care.account.create.body_next_steps1 = قم بتنزيل <a href={0} style="text-decoration:none; color:#027AAE">تطبيق HP Insights Windows</a> وتثبيته على كل كمبيوتر شخصي.
active.care.account.create.body_next_steps1.1 = إذا كانت لديك العديد من أجهزة الكمبيوتر الشخصي وتستخدم أداة توزيع البرامج أو إدارة الأجهزة الطرفية، فاقرأ الصفحات من 8 إلى 10 في <a href={0} style="text-decoration:none; color:#027AAE">دليل المستخدم</a>.
active.care.account.create.body_next_steps1.2 = وإلا، اتبع الخطوات الواردة في <a href={0} style="text-decoration:none; color:#027AAE">دليل التأهيل السريع</a> المختصر هذا.
active.care.account.create.body_next_steps2 = سجل الدخول إلى <a href={0} style="text-decoration:none; color:#027AAE">admin.hp.com</a>، وأدخل بريدك الإلكتروني، وقم بإنشاء كلمة مرور عند مطالبتك بذلك.
active.care.account.create.body_next_steps2.1 = افتح صفحة الأجهزة.
active.care.account.create.body_next_steps2.2 = افتح علامة التبويب التسجيل المعلق للاطلاع على أجهزة الكمبيوتر الشخصي المضمنة في طلب لوحة المعلومات. ستظهر عمليات الشراء المستقبلية لأجهزة الكمبيوتر الشخصي التي تتضمن هذه الخدمة تلقائيًا في هذه القائمة.
active.care.account.create.body_next_steps2.3 = افتح علامة التبويب "الكل" لرؤية أجهزة الكمبيوتر الشخصي التي تم تثبيت وكيل HP Insights عليها. ستبدأ هذه الأجهزة في تلقي قيمة الخدمة. اقرا هذا <a href={0} style="text-decoration:none; color:#027AAE">المقال المختصر وشاهد مقطع فيديو</a> لمعرفة المزيد.
