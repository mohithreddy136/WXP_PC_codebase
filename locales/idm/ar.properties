gt.embargo_by_domain = تمت الإشارة إلى حساب البريد الإلكتروني خاصتك من قبل منظمة Global Trade‏ بصفته موجود في دولة حظرت الولايات المتحدة الأمريكية التجارة معها. يعد استخدام الحساب من مثل تلك الدول ممنوعًا فيتم سد الوصول إلى كافة المرافق المناسبة.
gt.embargo_by_ip = تمت الإشارة إلى حسابك من قبل منظمة Global Trade‏ بصفته موجود في دولة حظرت الولايات المتحدة الأمريكية التجارة معها. يعد استخدام الحساب من مثل تلك الدول ممنوعًا فيتم سد الوصول إلى كافة المرافق المناسبة. أما إذا كنت موجودًا في هذا البلد المحظور مؤقتًا في إطارة رحلة محدودة الزمان، فالرجاء محاولة الوصول إلى الخدمة في وقت لاحق، عندما تعمل عن شبكة غير شبكة الكمبيوتر الموجودة في الدولة المحظورة.
gt.embrgo_device_enroll = تمت الإشارة إلى موقع تسجيل جهازك من قبل منظمة Global Trade‏ بصفته موجود في دولة حظرت الولايات المتحدة الأمريكية التجارة معها.  يعد استخدام الحساب من مثل تلك الدول ممنوعًا فيتم سد الوصول إلى كافة المرافق المناسبة. أما إذا كنت موجودًا في هذا البلد المحظور مؤقتًا في إطارة رحلة محدودة الزمان، فالرجاء محاولة تسجيل الحساب في وقت لاحق، عندما تعمل عن شبكة غير شبكة الكمبيوتر الموجودة في الدولة المحظورة.
