sign_in_change.content_1 = ستطلق شركة HP قريبًا "معرّف HP"، هو نظام موحّد لإدارة الهوية لجميع مستخدمي منتجات HP. يوفر "معرّف HP" للمستخدمين هوية واحدة في جميع منتجات HP، مما يؤدي إلى زيادة الأمان والراحة.
sign_in_change.content_2 = بحلول 10 مايو 2018، ستتحول HP TechPulse إلى "معرِّف HP". وسيتم الاحتفاظ بعنوان بريدك الإلكتروني الحالي لتسجيل الدخول؛ ومع ذلك، سيُطلب منك إعادة تعيين كلمة المرور الخاصة بك لأغراض الأمان.
sign_in_change.content_3 = إذا كان لديك أي أسئلة أو كنت بحاجة إلى المساعدة، يُرجى الاتصال "بفريق الدعم" الخاص بنا.
