thinclients_plan_user_email_body_content_7 = فضلاً، املأ الحقول المطلوبة باستخدام <a href="javascript:void(0)" style="text-decoration: none; font-weight: bold; color: #404040; cursor: auto;">{0}</a> مثل عنوان البريد الإلكتروني، وحدد <b>إنشاء حساب</b>.
