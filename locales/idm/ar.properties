thinclients_pro_plan_user_email_body_content_1 = شكرًا لك على طلب HP Cloud Endpoint Manager‏. أنت الآن على بُعد خطوة واحدة من إدارة الأجهزة بطريقة بسيطة وآمنة ومرنة!
thinclients_pro_plan_user_email_body_content_2 = يمكنك العثور أدناه على تفاصيل طلبك متضمنةً مفتاح الترخيص. يُرجى الاحتفاظ به في مكان يسهل الوصول إليه حيث سيكون مطلوبًا للتحقق في حال اتصالك بدعم HP لطلب الحصول على مساعدة باستخدام HP Cloud Endpoint Manager. وإذا كانت عملية الشراء تشمل أكثر من مستخدم أو نظام احد، يُرجى التأكد من أن كل مستخدم أو مسؤول نظام يمتلك نسخة من مفتاح الترخيص كمرجع.
thinclients_pro_trial_plan_user_email_body_content_1 = شكرًا لك على طلب النسخة التجريبية التي مدتها 180 يومًا من HP Cloud Endpoint Manager‏. أنت الآن على بُعد خطوة واحدة من إدارة الأجهزة بطريقة بسيطة وآمنة ومرنة!
thinclients_pro_trial_plan_user_email_body_content_2 = أدناه ستجد تفاصيل طلبك. لمواصلة استخدام HP Cloud Endpoint Manager بعد انتهاء النسخة التجريبية التي مدتها 180 يومًا، اتصل بممثل مبيعات HP لديك للترقية.
thinclients_standard_plan_user_email_body_content_1 = شكرًا لك على طلب HP Cloud Endpoint Manager‏. يمكنك الآن باتّباع خطوات ميسرة إدارة الجهاز بطريقة بسيطة وآمنة ومرنة!
thinclients_standard_plan_user_email_body_content_2 = يمكنك العثور أدناه على تفاصيل طلبك بما في ذلك مفتاح الترخيص. يُرجى الاحتفاظ بمفتاح الترخيص في مكان يسهل الوصول إليه حيث سيكون مطلوبًا للتحقق مما إذا اتصلت بدعم HP للحصول على مساعدة باستخدام HP Cloud Endpoint Manager. إذا تناول هذا الطلب أكثر من مستخدم أو نظام، فيُرجى التأكد من أن كل مستخدم أو مسؤول نظام يمتلك نسخة من مفتاح الترخيص كمرجع.
