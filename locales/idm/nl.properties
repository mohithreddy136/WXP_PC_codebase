active.care.account.create.body_msg1 = Bedankt voor uw aankoop van <b>HP Premium+ Support of HP Active Care</b>.
active.care.account.create.body_msg10 = Ik wil mijn service niet activeren.
active.care.account.create.body_msg11 = Met vriendelijke groet.
active.care.account.create.body_msg12 = HP Active Care Onboarding-team
active.care.account.create.body_msg13 = Met Active Care beschikt u over een complete suite aan apparaatbescherming, support en reparatieservices, evenals toegang tot de HP TechPulse-portal.
active.care.account.create.body_msg14 = Volgende stappen:
active.care.account.create.body_msg15 = Valideer uw e-mailadres door u aan te melden bij <a href={0} style="color: #0096D6;">{0}</a>. U kunt uw e-mailadres rechtstreeks invoeren, dan zal het systeem u begeleiden bij het maken van een wachtwoord bij HP.
active.care.account.create.body_msg16 = Download en installeer de <a href={0} style="color: #0096D6;">HP TechPulse Windows-toepassing</a>. Als u veel apparaten moet registreren, volgt u de instructies van de <a href={1} style="color: #0096D6;">Active Care-gebruikershandleiding</a> op pagina's 8-10.
active.care.account.create.body_msg17 = Disclaimer
active.care.account.create.body_msg2 = Op basis van onze gegevens voor {0} zijn er {1} apparaten die moeten worden ingeschreven in de Active Care-portal.
active.care.account.create.body_msg3 = U ontvangt dit bericht omdat uw e-mailadres is opgegeven in een dashboardaanvraag.
active.care.account.create.body_msg4 = Niet registreren betekent dat u enkele nieuwe functies van HP Active Care misloopt, zoals de mogelijkheid om uw hardwareproblemen op afstand te melden en op te lossen. Uw feedback is belangrijk voor HP. Laat ons weten hoe wij u op weg kunnen helpen:
active.care.account.create.body_msg5 = Ik heb meer informatie en een demo nodig. Laten we afspreken!
active.care.account.create.body_msg6 = Ik heb alles wat ik nodig heb en zal nu beginnen.
active.care.account.create.body_msg7 = Help! Ik heb technische problemen ondervonden!
active.care.account.create.body_msg8 = Ik heb mijn HP hardwareapparaten niet ontvangen.
active.care.account.create.body_msg9 = Ik ben nog niet klaar en heb meer tijd nodig.
active.care.account.create.body_next_steps.2 = Uw e-mailadres is aan uw tenant toegevoegd. Als dit de eerste keer is dat u zich aanmeldt op Workforce Experience Platform, zoek dan naar een e-mailbericht van HP en volg de koppeling in dat bericht om uw aanmeldingsgegevens aan te maken.
active.care.account.create.body_next_steps.3 = Als u dit gedaan hebt, meldt u zich aan op <a href={0} style="text-decoration:none; color:#027AAE">https://admin.hp.com</a>. Als u toegang hebt gekregen tot meer dan één tenant, kunt u het profielpictogram in de rechterbovenhoek selecteren en vervolgens de optie Account wisselen selecteren om tussen de tenants te schakelen.
active.care.account.create.body_next_steps1 = Download en installeer de <a href={0} style="text-decoration:none; color:#027AAE">HP Insights Windows-applicatie</a> op elke pc.
active.care.account.create.body_next_steps1.1 = Als u veel pc's hebt en een hulpprogramma voor softwaredistributie of eindpuntbeheer gebruikt, lees dan pagina's 8-10 in de <a href={0} style="text-decoration:none; color:#027AAE">Gebruikershandleiding</a>.
active.care.account.create.body_next_steps1.2 = Volg anders de stappen in deze korte <a href={0} style="text-decoration:none; color:#027AAE">Snelgids voor onboarding</a>.
active.care.account.create.body_next_steps2 = Meld u aan bij <a href={0} style="text-decoration:none; color:#027AAE">admin.hp.com</a>, voer uw e-mailadres in en maak een wachtwoord aan als dat wordt gevraagd.
active.care.account.create.body_next_steps2.1 = Open de pagina Apparaten.
active.care.account.create.body_next_steps2.2 = Open het tabblad Registratie in behandeling om te zien welke pc's in de dashboardaanvraag zijn opgenomen. Toekomstige aankopen van pc's met deze service verschijnen automatisch in deze lijst.
active.care.account.create.body_next_steps2.3 = Open het tabblad Alles om te zien op welke pc's de HP Insights-agent is geïnstalleerd. Deze zullen de waarde van de service ontvangen. Lees dit <a href={0} style="text-decoration:none; color:#027AAE">korte artikel en bekijk een video</a> voor meer informatie.
active.care.account.create.body_support = Volg deze eenvoudige stappen als u vragen hebt over de onboarding van uw apparaten of als u het dashboard gebruikt.
active.care.account.create.body_support1 = Als u nog geen account hebt op Support.HP.com, <a href={0} style="text-decoration:none; color:#027AAE">kunt u er een aanmaken</a>.
active.care.account.create.body_support2 = <a href={0} style="text-decoration:none; color:#027AAE">Meld u aan</a> en maak een ticket aan.
active.care.account.create.body_support2.a = Geef een serienummer op van een van uw apparaten met HP Premium+ Support of HP Active Care.
