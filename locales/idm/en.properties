active.care.account.create.body_msg1 = Thank you for purchasing <b>HP Premium+ Support or HP Active Care</b>.
active.care.account.create.body_msg10 = I don't want to activate my service.
active.care.account.create.body_msg11 = Kind regards.
active.care.account.create.body_msg12 = HP Active Care Onboarding Team
active.care.account.create.body_msg13 = With Active Care, you have a complete suite of device protection, support, and repair services as well as access to the HP TechPulse portal.
active.care.account.create.body_msg14 = Next steps:
active.care.account.create.body_msg15 = Validate your email by signing in to <a href={0} style="color: #0096D6;">{0}</a>. You can enter your email directly and the system will guide you to create a password with HP.
active.care.account.create.body_msg16 = Download and install <a href={0} style="color: #0096D6;">HP TechPulse Windows application</a>. If you have many devices to enroll, follow the <a href={1} style="color: #0096D6;">Active Care User Guide</a> instructions located on pages 8-10.
active.care.account.create.body_msg17 = Disclaimer
active.care.account.create.body_msg2 = Based on our records for {0}, there are {1} devices to be enrolled in the Active Care portal.
active.care.account.create.body_msg3 = You are receiving this message because your email was provided in a dashboard request.
active.care.account.create.body_msg4 = If you do not enroll, you will miss out on some of the new features of HP Active Care, including the ability to remotely ticket and resolve your hardware issues. Your feedback is important to HP. Please let us know how we can assist you on your journey:
active.care.account.create.body_msg5 = I need more information and a demo.  Let's meet!
active.care.account.create.body_msg6 = I have everything I need and will start now.
active.care.account.create.body_msg7 = Help!  I encountered technical issues!
active.care.account.create.body_msg8 = I have not received my HP hardware devices.
active.care.account.create.body_msg9 = I am not ready to begin yet and need more time.
active.care.account.create.body_next_steps.2 = Your email address has been added to your tenant. If this is your first time logging in to Workforce Experience Platform, please look for an email message from HP and follow the link in that message to create your credentials.
active.care.account.create.body_next_steps.3 = Once you have done this, log in to <a href={0} style="text-decoration:none; color:#027AAE">https://admin.hp.com</a>. If you have been given access to more than one tenant, you can select the profile icon in the upper right corner and then select the Switch Account option to move between them.
active.care.account.create.body_next_steps1 = Download and install <a href={0} style="text-decoration:none; color:#027AAE">HP Insights Windows application</a> on each PC.
active.care.account.create.body_next_steps1.1 = If you have many PCs and use a software distribution or endpoint management tool, read pages 8-10 in the <a href={0} style="text-decoration:none; color:#027AAE">User Guide</a>.
active.care.account.create.body_next_steps1.2 = Otherwise, follow the steps in this short <a href={0} style="text-decoration:none; color:#027AAE">Onboarding Quick Guide</a>.
active.care.account.create.body_next_steps2 = Sign in to <a href={0} style="text-decoration:none; color:#027AAE">admin.hp.com</a>, enter your email, and create a password when prompted.
active.care.account.create.body_next_steps2.1 = Open the Devices page.
active.care.account.create.body_next_steps2.2 = Open the Pending Enrollment tab to see PCs included in the dashboard request. Future purchases of PCs with this service will automatically appear in this list.
active.care.account.create.body_next_steps2.3 = Open the All tab to see PCs that have the HP Insights agent installed. These will begin to receive the value of the service. Read this <a href={0} style="text-decoration:none; color:#027AAE">short article and watch a video</a> to learn more.
active.care.account.create.body_support = For questions about onboarding your devices or using the dashboard, follow these simple steps.
active.care.account.create.body_support1 = If you do not yet have an account in Support.HP.com, <a href={0} style="text-decoration:none; color:#027AAE">create one</a>.
active.care.account.create.body_support2 = <a href={0} style="text-decoration:none; color:#027AAE">Sign in</a> and create a ticket.
active.care.account.create.body_support2.a = Provide one of the serial numbers in your fleet that has HP Premium+ Support or HP Active Care.
active.care.account.create.body_support2.b = Describe the issue you are having.
active.care.account.create.body_support2.c = Your case will be sent to a team who specializes in the service.
active.care.account.create.dear = Dear customer,
active.care.account.create.header = HP Premium+ Support and HP Active Care Service Activation
active.care.account.create.subject = HP Premium+ Support and HP Active Care Service Activation
