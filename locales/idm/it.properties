thinclients_pro_plan_user_email_body_content_1 = Grazie per aver ordinato HP Cloud Endpoint Manager. Ora sei un passo più vicino alla gestione semplice, sicura e flessibile dei dispositivi!
thinclients_pro_plan_user_email_body_content_2 = Qui sotto troverai i dettagli del tuo ordine, inclusa la tua chiave di licenza. Tieni la chiave di licenza a portata di mano perché sarà necessaria per la verifica se dovessi chiamare o contattare HP Support per ricevere assistenza con HP Cloud Endpoint Manager. Se questo acquisto copre più di un utente o sistema, assicurati che ogni utente o amministratore di sistema abbia una copia della chiave di licenza come riferimento.
thinclients_pro_trial_plan_user_email_body_content_1 = Grazie per aver richiesto il periodo di prova di 180 giorni di HP Cloud Endpoint Manager. Ora sei un passo più vicino alla gestione semplice, sicura e flessibile dei dispositivi!
thinclients_pro_trial_plan_user_email_body_content_2 = Sotto sono riportati i dettagli del tuo ordine. Per continuare a usare HP Cloud Endpoint Manager dopo il periodo di prova di 180 giorni, contatta il tuo rappresentante vendite HP per richiedere un upgrade.
thinclients_standard_plan_user_email_body_content_1 = Grazie per aver ordinato HP Cloud Endpoint Manager. Ora sei un passo più vicino alla gestione semplice, sicura e flessibile dei dispositivi!
thinclients_standard_plan_user_email_body_content_2 = Qui sotto troverai i dettagli del tuo ordine, inclusa la tua chiave di licenza. Tieni la chiave di licenza a portata di mano perché sarà necessaria per la verifica se dovessi chiamare o contattare il Supporto HP per ricevere assistenza con HP Cloud Endpoint Manager. Se questo ordine copre più di un utente o sistema, assicurati che ogni utente o amministratore di sistema abbia una copia della chiave di licenza come riferimento.
