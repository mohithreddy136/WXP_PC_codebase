active.care.account.create.body_msg1 = Grazie per avere acquistato <b>HP Premium+ Support o HP Active Care</b>.
active.care.account.create.body_msg10 = Non voglio attivare il mio servizio.
active.care.account.create.body_msg11 = Cordiali saluti.
active.care.account.create.body_msg12 = Team di onboarding di HP Active Care
active.care.account.create.body_msg13 = Con Active Care, ottieni una suite completa di servizi di protezione, supporto e riparazione dispositivi, nonché l’accesso al portale HP TechPulse.
active.care.account.create.body_msg14 = Prossimi passaggi:
active.care.account.create.body_msg15 = Convalida la tua e-mail accedendo a <a href={0} style="color: #0096D6;">{0}</a>. Puoi inserire la tua e-mail direttamente e il sistema ti guiderà a creare una password con HP.
active.care.account.create.body_msg16 = Scarica e installa l'applicazione <a href={0} style="color: #0096D6;">HP TechPulse Windows</a>. Se devi registrare molteplici dispositivi, segui le istruzioni della <a href={1} style="color: #0096D6;">Guida per l'utente di Active Care</a> riportate alle pagine 8-10.
active.care.account.create.body_msg17 = Dichiarazione di non responsabilità
active.care.account.create.body_msg2 = In base ai nostri record per {0}, sono presenti {1} dispositivi da registrare nel portale Active Care.
active.care.account.create.body_msg3 = Questo messaggio comunica che l'indirizzo e-mail dell'utente è stato inserito in una richiesta del dashboard.
active.care.account.create.body_msg4 = Se non ti registri, perderai alcune delle nuove funzionalità di HP Active Care, compresa la possibilità di aprire ticket e risolvere i tuoi problemi hardware in remoto. Il tuo feedback è importante per HP. Facci sapere come possiamo assisterti nel tuo viaggio:
active.care.account.create.body_msg5 = Ho bisogno di maggiori informazioni e di una demo. Incontriamoci!
active.care.account.create.body_msg6 = Ho tutto ciò di cui ho bisogno e inizierò ora.
active.care.account.create.body_msg7 = Mi serve aiuto! Ho dei problemi tecnici!
active.care.account.create.body_msg8 = Non ho ricevuto i miei dispositivi hardware HP.
active.care.account.create.body_msg9 = Non sono ancora pronto per iniziare e ho bisogno di più tempo.
active.care.account.create.body_next_steps.2 = L'indirizzo e-mail è stato aggiunto al tenant. Durante il primo accesso a Workforce Experience Platform, cercare il messaggio e-mail ricevuto da HP e seguire il link nel messaggio per creare le proprie credenziali.
active.care.account.create.body_next_steps.3 = Una volta completata l'operazione, accedere ad <a href={0} style="text-decoration:none; color:#027AAE">https://admin.hp.com</a>. Se l'utente ha accesso a più tenant, è possibile selezionare l'icona del profilo nell'angolo in alto a destra e quindi selezionare l'opzione Cambia account per passare da un tenant all'altro.
active.care.account.create.body_next_steps1 = Scaricare e installare <a href={0} style="text-decoration:none; color:#027AAE">l'applicazione HP Insights Windows</a> su ogni PC.
active.care.account.create.body_next_steps1.1 = Se si possiedono numerosi PC e si utilizza uno strumento di distribuzione del software o di gestione degli endpoint, leggere le pagine 8-10 della <a href={0} style="text-decoration:none; color:#027AAE">Guida dell'utente</a>.
active.care.account.create.body_next_steps1.2 = In caso contrario, seguire la procedura in questa <a href={0} style="text-decoration:none; color:#027AAE">Guida rapida all'onboarding</a>.
active.care.account.create.body_next_steps2 = Accedere a <a href={0} style="text-decoration:none; color:#027AAE">admin.hp.com</a>, inserire il proprio indirizzo e-mail e creare una password quando richiesto.
active.care.account.create.body_next_steps2.1 = Aprire la pagina Dispositivi.
active.care.account.create.body_next_steps2.2 = Aprire la scheda Registrazione in sospeso per visualizzare i PC inclusi nella richiesta del dashboard. I PC dotati di questo servizio acquisitati successivamente compariranno automaticamente in questo elenco.
active.care.account.create.body_next_steps2.3 = Aprire la scheda Tutti per vedere i PC su cui è installato l'agente HP Insights. Questi PC inizieranno a ricevere valori dal servizio. Leggere questo <a href={0} style="text-decoration:none; color:#027AAE">breve articolo e guardare un video</a> per saperne di più.
active.care.account.create.body_support = Per eventuali domande sull'onboarding dei dispositivi o sull'utilizzo del dashboard, seguire questa semplice procedura.
active.care.account.create.body_support1 = Se non è ancora stato creato un account in Support.HP.com, <a href={0} style="text-decoration:none; color:#027AAE">crearne uno</a>.
active.care.account.create.body_support2 = <a href={0} style="text-decoration:none; color:#027AAE">Accedere</a> e creare un ticket.
active.care.account.create.body_support2.a = Specificare il numero di serie di un dispositivo del proprio parco che disponga di HP Premium+ Support o HP Active Care.
active.care.account.create.body_support2.b = Descrivere il problema riscontrato.
active.care.account.create.body_support2.c = La richiesta sarà trasferita a un team specializzato in quel tipo di assistenza.
