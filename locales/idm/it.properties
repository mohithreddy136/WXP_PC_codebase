thinclients_plan_user_email_body_content_11 = Se ti servono maggiori informazioni su attivazione, download o installazione di HP Cloud Endpoint Manager, guarda il nostro <a href="{0}" target="_blank" style="color:#027aae; text-decoration: none;">tutorial video</a>.
