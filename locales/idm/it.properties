thinclients_plan_user_email_body_content_7 = Compila i campi richiesti usando <a href="javascript:void(0)" style="text-decoration: none; font-weight: bold; color: #404040; cursor: auto;">{0}</a> come indirizzo e-mail e seleziona <b>Crea account</b>.
