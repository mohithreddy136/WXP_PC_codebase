sign_in_change.content_1 = HPでは現在、HPの全製品を対象とする統合ID管理エコシステムである[HP ID]を展開しています。[HP ID]を利用すると、ユーザーはHPの全製品で1つのIDを使用することができ、セキュリティおよび利便性が向上します。
sign_in_change.content_2 = 2018年5月10日に、[HP TechPulse]は[HP ID]に移行します。既存のサインイン用メール アドレスは保持されます。ただし、セキュリティ上の理由からパスワードをリセットする必要があります。
sign_in_change.content_3 = 不明点や疑問点がある場合、またはサポートが必要な場合は、サポート チームまでお問い合わせください。
sign_in_change.content_4 = [HP TechPulse]チーム一同。
sign_in_change.go_to_daas = [HP TechPulse]に移動
sign_in_change.need_assistance = 不明点や疑問点がある場合、またはサポートが必要な場合は、{0}までお問い合わせください。
sign_in_change.support_team = サポート チーム
sign_in_change.title = まもなくサインインの方法が新しくなります。
sign_in_change_notification.content_1 = [HP TechPulse]ポータルにアクセスするには、以下のボタンをクリックしてください。<b>[{0}]</b>に関連付けられているHPアカウントを使用する必要があります。HPアカウントをお持ちでない場合は、サインイン ページに記載されている手順に沿ってアカウントを作成してください。
sign_in_change_notification.invite.body.content_1 = 最初に、新しいHPアカウントを作成するために、下の<b>[[HP TechPulse]に移動]</b>ボタンをクリックします。
sign_in_change_notification.invite.body.content_2 = <a {0}>{1}</a>ページが表示されます。
sign_in_change_notification.invite.body.content_3 = 次に、<b>[サインイン]</b>ボタンをクリックしてサインイン画面を表示します。
sign_in_change_notification.invite.body.content_4 = <b>[HPアカウントの新規作成はこちら]</b>リンクをクリックします。
sign_in_change_notification.invite.body.content_5 = 入力必須フィールドに入力します。電子メール アドレスには、<b >[{0}]</b>を使用します。
sign_in_change_notification.invite.body.content_5_nobracke = 入力必須フィールドに入力します。電子メール アドレスには、<b>{0}</b>を使用します。
sign_in_change_notification.invite.body.content_5_nobracket = 入力必須フィールドに入力します。　電子メール アドレスには、アクティブケアの登録時にご提供いただきましたシステム管理者	のメールアドレス<b>{0}</b>を使用します。
sign_in_change_notification.invite.body.content_6 = 電子メールで確認コードが送信されます。
sign_in_change_notification.invite.body.content_7 = 確認コードを入力します。
