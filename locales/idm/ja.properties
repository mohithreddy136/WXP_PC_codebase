active.care.account.create.body_msg12 = [HP Active Care]オンボーディング チーム
active.care.account.create.body_msg13 = [Active Care]を使用すると、デバイス保護、サポート、修理サービスの完全なスイートを利用し、[HP TechPulse]ポータルにアクセスすることができます。
active.care.account.create.body_msg14 = 以下の手順：
active.care.account.create.body_msg15 = <a href={0} style="color: #0096D6;">{0}</a>にサインインして電子メールをご確認ください。電子メール アドレスを直接入力し、システムの案内に従ってHPでのパスワードを作成できます。
active.care.account.create.body_msg16 = <a href={0} style="color: #0096D6;">[HP TechPulse]のWindowsアプリケーション</a>をダウンロードしてインストールしてください。登録するデバイスが多数ある場合は、<a href={1} style="color: #0096D6;">[Active Care]ユーザー ガイド</a>の8～10ページにある指示に従ってください。
active.care.account.create.body_msg17 = 免責事項
active.care.account.create.body_msg2 = {0}の記録に基づき、{1}台のデバイスが[Active Care]ポータルの登録対象となっています。
active.care.account.create.body_msg3 = ダッシュボードのリクエストに電子メール アドレスが提示されていたため、このメッセージが送信されています。
active.care.account.create.body_msg4 = ご登録いただけない場合、ハードウェアの問題に関するリモートでのチケット作成や解決など、[HP Active Care]の一部の新機能を使用することができません。HPにとってお客様からのご意見、ご感想は貴重です。HPの支援が必要な場合はお知らせください。
active.care.account.create.body_msg5 = 詳細情報やデモを見たい。ご覧ください。
active.care.account.create.body_msg6 = 必要なものがそろっているのですぐに始めたい。
active.care.account.create.body_msg7 = サポートが必要。技術的な問題が発生した。
active.care.account.create.body_msg8 = HPハードウェア デバイスを受け取っていない。
active.care.account.create.body_msg9 = 始める準備ができていないのでもう少し時間が必要。
active.care.account.create.body_next_steps.2 = お使いの電子メール アドレスがテナントに追加されました。[Workforce Experience Platform]に初めてログインする場合、HPからの電子メール メッセージを探して、そのメッセージ内のリンクに従って資格情報を作成してください。
active.care.account.create.body_next_steps.3 = この操作が完了したら、<a href={0} style="text-decoration:none; color:#027AAE">https://admin.hp.com</a>にログインしてください。複数のテナントへのアクセス権が付与されている場合、右上隅のプロファイル アイコンを選択してから、[アカウントの切り替え]オプションを選択し、テナントを切り替えることができます。
active.care.account.create.body_next_steps1 = <a href={0} style="text-decoration:none; color:#027AAE">[HP Insights Windows]アプリケーション</a>をダウンロードして、各コンピューターにインストールしてください。
active.care.account.create.body_next_steps1.1 = コンピューターの台数が多く、ソフトウェア配信ツールやエンドポイント管理ツールを使用する場合は、『<a href={0} style="text-decoration:none; color:#027AAE">ユーザー ガイド</a>』の8～10ページをお読みください。
active.care.account.create.body_next_steps1.2 = それ以外の場合は、こちらの短い『<a href={0} style="text-decoration:none; color:#027AAE">オンボーディング クイック ガイド</a>』の手順を実行してください。
active.care.account.create.body_next_steps2 = <a href={0} style="text-decoration:none; color:#027AAE">admin.hp.com</a> にサインインし、求められた場合は電子メール アドレスを入力し、パスワードを作成します。
active.care.account.create.body_next_steps2.1 = [デバイス]ページを開きます。
active.care.account.create.body_next_steps2.2 = [登録待ち]タブを開き、ダッシュボードのリクエストに含まれているコンピューターを確認します。今後このサービスを利用してコンピューターを購入すると、このリストに自動的に表示されます。
active.care.account.create.body_next_steps2.3 = [すべて]タブを開き、[HP Insights]エージェントがインストールされているコンピューターを確認します。これらのPCでは、サービスがもたらす価値を享受できるようになります。詳しくは、こちらの<a href={0} style="text-decoration:none; color:#027AAE">短い記事をお読みいただき、ビデオをご覧ください</a>。
active.care.account.create.body_support = デバイスのオンボーディングまたはダッシュボードの使用についてご質問がある場合は、次の簡単な手順に沿って操作を実行してください。
active.care.account.create.body_support1 = Support.HP.comのアカウントをまだお持ちでない場合は、<a href={0} style="text-decoration:none; color:#027AAE">アカウントを作成してください</a>。
active.care.account.create.body_support2 = <a href={0} style="text-decoration:none; color:#027AAE">サインイン</a>し、チケットを作成します
