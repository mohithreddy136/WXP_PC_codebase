gt.embargo_by_ip = Το τμήμα παγκόσμιου εμπορίου έχει επισημάνει ότι ο λογαριασμός σας προέρχεται από χώρα που τελεί υπό εμπορικό αποκλεισμό από τις ΗΠΑ. Η χρήση της υπηρεσίας σε χώρες που τελούν υπό εμπορικό αποκλεισμό απαγορεύεται και η πρόσβασή σας θα μπλοκαριστεί. Εάν βρίσκεστε σε χώρα που τελεί υπό εμπορικό αποκλεισμό προσωρινά, δοκιμάστε να συνδεθείτε στην υπηρεσία στο μέλλον, όταν δεν θα χρησιμοποιείτε πλέον δίκτυο υπολογιστών στη συγκεκριμένη χώρα.
gt.embrgo_device_enroll = Το τμήμα παγκόσμιου εμπορίου έχει επισημάνει ότι η καταχώριση της συσκευής σας έγινε από χώρα που τελεί υπό εμπορικό αποκλεισμό από τις ΗΠΑ.  Η χρήση της υπηρεσίας σε χώρες που τελούν υπό εμπορικό αποκλεισμό απαγορεύεται και η πρόσβασή σας θα μπλοκαριστεί. Εάν βρίσκεστε σε χώρα που τελεί υπό εμπορικό αποκλεισμό προσωρινά, δοκιμάστε να καταχωρίσετε τη συσκευή στο μέλλον, όταν δεν θα χρησιμοποιείτε πλέον δίκτυο υπολογιστών στη συγκεκριμένη χώρα.
