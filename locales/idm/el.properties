workspace.already.signup.user.body  = Διαπιστώσαμε ότι προσπαθήσατε να δημιουργήσετε λογαριασμό στο HP Workspace, παρότι έχετε ήδη έναν. Εάν έχετε ξεχάσει τον κωδικό πρόσβασής σας, κάντε κλικ στο κουμπί Επαναφορά κωδικού πρόσβασης παρακάτω για να οδηγηθείτε στην πύλη.
workspace.auth.password_rules = Οι κωδικοί πρόσβασης πρέπει να έχουν τουλάχιστον 8 χαρακτήρες και να περιλαμβάνουν τουλάχιστον τρία από τα παρακάτω στοιχεία: ένα πεζό γράμμα, ένα κεφαλαίο γράμμα, έναν αριθμό και έναν ειδικό χαρακτήρα. Οι επιτρεπόμενοι ειδικοί χαρακτήρες είναι οι εξής: ! @ # $ % ^ & * ( ) [ ] ; , . και το κενό διάστημα. Ο χαρακτήρας κενού διαστήματος μπορεί να χρησιμοποιηθεί μόνο ανάμεσα σε άλλους τύπους χαρακτήρων και δεν μπορεί να αποτελεί τον πρώτο ή τον τελευταίο χαρακτήρα του κωδικού πρόσβασης.
