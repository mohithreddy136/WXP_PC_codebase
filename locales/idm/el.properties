thinclients_pro_plan_user_email_body_content_1 = Σας ευχαριστούμε για την παραγγελία του HP Cloud Endpoint Manager. Βρίσκεστε τώρα ένα βήμα πιο κοντά στην απλή, ασφαλή και ευέλικτη διαχείριση της συσκευής σας!
thinclients_pro_plan_user_email_body_content_2 = Παρακάτω θα βρείτε τα στοιχεία της παραγγελίας σας, όπως και τον αριθμό-κλειδί της άδειας χρήσης. Πρέπει να έχετε διαθέσιμο τον αριθμό-κλειδί της άδειας χρήσης, καθώς θα χρειαστεί για επαλήθευση εάν καλέσετε ή επικοινωνήσετε με την Υποστήριξη της HP για βοήθεια σχετικά με το HP Cloud Endpoint Manager. Εάν αυτή η αγορά καλύπτει περισσότερους από έναν χρήστες ή συστήματα, βεβαιωθείτε ότι ο κάθε χρήστης ή διαχειριστής συστήματος έχει ένα αντίγραφο του αριθμού-κλειδιού της άδειας χρήσης, στο οποίο θα μπορέσει να ανατρέξει για αναφορά.
thinclients_pro_trial_plan_user_email_body_content_1 = Σας ευχαριστούμε για την παραγγελία της δοκιμαστικής περιόδου 180 ημερών του HP Cloud Endpoint Manager. Βρίσκεστε τώρα ένα βήμα πιο κοντά στην απλή, ασφαλή και ευέλικτη διαχείριση της συσκευής σας!
thinclients_pro_trial_plan_user_email_body_content_2 = Παρακάτω θα βρείτε τα στοιχεία της παραγγελίας σας. Για να συνεχίσετε να χρησιμοποιείτε το HP Cloud Endpoint Manager μετά τη λήξη της δοκιμαστικής περιόδου των 180 ημερών, επικοινωνήστε με τον αντιπρόσωπο πωλήσεων της HP για αναβάθμιση.
thinclients_standard_plan_user_email_body_content_1 = Σας ευχαριστούμε για την παραγγελία του HP Cloud Endpoint Manager. Βρίσκεστε τώρα ένα βήμα πιο κοντά στην απλή, ασφαλή και ευέλικτη διαχείριση της συσκευής σας!
thinclients_standard_plan_user_email_body_content_2 = Παρακάτω θα βρείτε τα στοιχεία της παραγγελίας σας, όπως και τον αριθμό-κλειδί της άδειας χρήσης. Πρέπει να έχετε διαθέσιμο τον αριθμό-κλειδί της άδειας χρήσης, καθώς θα χρειαστεί για επαλήθευση εάν επικοινωνήσετε με την Υποστήριξη της HP για βοήθεια σχετικά με το HP Cloud Endpoint Manager. Εάν αυτή η παραγγελία καλύπτει περισσότερους από έναν χρήστες ή συστήματα, βεβαιωθείτε ότι ο κάθε χρήστης ή διαχειριστής συστήματος έχει ένα αντίγραφο του αριθμού-κλειδιού της άδειας χρήσης, στο οποίο θα μπορέσει να ανατρέξει για αναφορά.
