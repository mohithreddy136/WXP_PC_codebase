sign_in_change_notification.invite.body.listcontent2 = Στη συνέχεια, επιλέξτε έναν από τους δύο τρόπους <b>Σύνδεσης</b>, χρησιμοποιώντας τον λογαριασμό Microsoft ή χρησιμοποιώντας τον λογαριασμό HPID, την επάνω δεξιά γωνία.
sign_in_change_notification.invite.body.listcontent3 = Αν επιλέξατε τον λογαριασμό Microsoft, θα μπορέσετε να συνδεθείτε αμέσως. <br/>Αν επιλέξατε τον λογαριασμό HPID, κάντε κλικ στον σύνδεσμο «Δεν έχετε λογαριασμό; Εγγραφή» κάτω από το πλαίσιο εισόδου
