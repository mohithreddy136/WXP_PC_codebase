sign_in_change_notification.content_1 = Για πρόσβαση στην πύλη HP TechPulse, κάντε κλικ στο κουμπί παρακάτω. Θα πρέπει να χρησιμοποιήσετε τον λογαριασμό HP που έχει συσχετιστεί με το <b>[{0}]</b>. Εάν δεν διαθέτετε λογαριασμό HP, δημιουργήστε έναν ακολουθώντας τις οδηγίες στη σελίδα σύνδεσης.
sign_in_change_notification.invite.body.content_1 = Πρώτα, δημιουργήστε τον νέο σας λογαριασμό HP πατώντας το κουμπί <b> "Μετάβαση στο HP TechPulse" </b> παρακάτω.
