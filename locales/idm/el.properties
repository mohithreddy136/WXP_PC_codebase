gt.rpl_error = Η Hewlett-Packard (HP) είναι στη δυσάρεστη θέση να σας ανακοινώσει ότι δεν μπορεί να προβεί σε καμία ενέργεια σχετικά με το πρόσφατο αίτημά σας. Ως αμερικανική εταιρεία, η ΗΡ οφείλει να συμμορφώνεται με το εμπορικό δίκαιο, τους ελέγχους, τις κυρώσεις και τους αποκλεισμούς που επιβάλλει η κυβέρνηση των ΗΠΑ, καθώς και οι κυβερνήσεις άλλων χωρών, στο βαθμό που περιορίζουν ή απαγορεύουν τη συνεργασία με συγκεκριμένα άτομα, εταιρείες, οργανισμούς και χώρες. Για να μάθετε περισσότερα για την ταυτότητα των ατόμων, των εταιρειών, των οργανισμών και των χωρών που υπόκεινται σε εμπορικούς ελέγχους, κυρώσεις και αποκλεισμούς από τις ΗΠΑ, μπορείτε να επικοινωνήσετε με την πλησιέστερη πρεσβεία ή το πλησιέστερο προξενείο των ΗΠΑ.
