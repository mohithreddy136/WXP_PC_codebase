active.care.account.create.body_msg1 = Σας ευχαριστούμε γα τη αγορά του <b>HP Premium+ Support ή του HP Active Care</b>.
active.care.account.create.body_msg10 = Δεν θέλω να ενεργοποιηθεί η υπηρεσία μου.
active.care.account.create.body_msg11 = Με εκτίμηση.
active.care.account.create.body_msg12 = Ομάδα καλωσορίσματος στην υπηρεσία HP Active Care
active.care.account.create.body_msg13 = Με την υπηρεσία Active Care, έχετε μια ολοκληρωμένη σουίτα προστασίας, υποστήριξης και υπηρεσιών επιδιόρθωσης των συσκευών σας, καθώς και πρόσβαση στην πύλη HP TechPulse.
active.care.account.create.body_msg14 = Επόμενα βήματα:
active.care.account.create.body_msg15 = Για να επικυρώσετε το email σας, συνδεθείτε στο <a href={0} style="color: #0096D6;">{0}</a>. Μπορείτε να εισέλθετε στο email σας απευθείας και το σύστημα θα σας καθοδηγήσει για να δημιουργήσετε έναν κωδικό πρόσβασης με την HP.
active.care.account.create.body_msg16 = Κατεβάστε και εγκαταστήστε την <a href={0} style="color: #0096D6;">εφαρμογή HP TechPulse για Windows</a>. Αν θέλετε να εγγράψετε πολλές συσκευές, ακολουθήστε τις οδηγίες στον <a href={1} style="color: #0096D6;">Οδηγό χρήστη Active Care</a> που θα βρείτε στις σελίδες 8-10.
active.care.account.create.body_msg17 = Αποποίηση ευθυνών
active.care.account.create.body_msg2 = Σύμφωνα΄με τα αρχεία μας για το {0}, υπάρχουν {1} συσκευές που πρέπει να εγγραφούν στην πύλη Active Care.
active.care.account.create.body_msg3 = Λαμβάνετε αυτό το μήνυμα επειδή το email σας δόθηκε σε ένα αίτημα πίνακα εργαλείων.
active.care.account.create.body_msg4 = Αν δεν εγγραφείτε, θα χάσετε ορισμένες από τις νέες δυνατότητες του HP Active Care, όπως τη δυνατότητα υποβολής απομακρυσμένου αιτήματος υποστήριξης και επίλυσης προβλημάτων στο υλικό σας. Τα σχόλιά σας είναι πολύ σημαντικά για την HP. Πείτε μας πώς μπορούμε να σας βοηθήσουμε στο ταξίδι σας:
active.care.account.create.body_msg5 = Χρειάζομαι περισσότερες πληροφορίες και μια επίδειξη. Ας συναντηθούμε!
active.care.account.create.body_msg6 = Έχω ό,τι χρειάζομαι και θα ξεκινήσω τώρα.
active.care.account.create.body_msg7 = Βοήθεια! Αντιμετώπισα τεχνικά προβλήματα!
active.care.account.create.body_msg8 = Δεν έχω λάβει τις συσκευές υλικού HP.
active.care.account.create.body_msg9 = Δεν είμαι έτοιμος/η για να ξεκινήσω ακόμη και χρειάζομαι περισσότερο χρόνο.
active.care.account.create.body_next_steps.2 = Η διεύθυνση email σας προστέθηκε στον μισθωτή σας. Εάν αυτή είναι η πρώτη φορά που συνδέεστε στην Workforce Experience Platform, αναζητήστε ένα μήνυμα email από την HP και ακολουθήστε τον σύνδεσμο σε αυτό το μήνυμα για να δημιουργήσετε τα διαπιστευτήριά σας.
active.care.account.create.body_next_steps.3 = Αφού το κάνετε αυτό, συνδεθείτε στο <a href={0} style="text-decoration:none; color:#027AAE">https://admin.hp.com</a>. Εάν σας έχει δοθεί πρόσβαση σε περισσότερους από έναν μισθωτές, μπορείτε να επιλέξετε το εικονίδιο προφίλ στην επάνω δεξιά γωνία και, στη συνέχεια, να επιλέξετε την επιλογή Εναλλαγή λογαριασμού για να μετακινηθείτε μεταξύ τους.
active.care.account.create.body_next_steps1 = Πραγματοποιήστε λήψη και εγκαταστήστε την εφαρμογή <a href={0} style="text-decoration:none; color:#027AAE">HP Insights Windows</a> σε κάθε υπολογιστή.
active.care.account.create.body_next_steps1.1 = Εάν έχετε πολλούς υπολογιστές και χρησιμοποιείτε ένα εργαλείο διανομής λογισμικού ή διαχείρισης τελικού χρήστη, διαβάστε τις σελίδες 8-10 στον <a href={0} style="text-decoration:none; color:#027AAE">Οδηγό χρήσης</a>.
active.care.account.create.body_next_steps1.2 = Διαφορετικά, ακολουθήστε τα βήματα σε αυτόν τον σύντομο <a href={0} style="text-decoration:none; color:#027AAE">Σύντομο οδηγό προετοιμασίας</a>.
active.care.account.create.body_next_steps2 = Συνδεθείτε στο <a href={0} style="text-decoration:none; color:#027AAE">admin.hp.com</a>, εισαγάγετε το email σας και δημιουργήστε έναν κωδικό πρόσβασης όταν σας ζητηθεί.
active.care.account.create.body_next_steps2.1 = Ανοίξτε τη σελίδα Συσκευές.
active.care.account.create.body_next_steps2.2 = Ανοίξτε την καρτέλα Εγγραφή σε εκκρεμότητα για να δείτε τους υπολογιστές που περιλαμβάνονται στην αίτηση πίνακα εργαλείων. Οι μελλοντικές αγορές υπολογιστών με αυτήν την υπηρεσία θα εμφανιστούν αυτόματα σε αυτήν τη λίστα.
active.care.account.create.body_next_steps2.3 = Ανοίξτε την καρτέλα Όλα για να δείτε υπολογιστές που έχουν εγκατεστημένο τον παράγοντα HP Insights. Αυτά θα αρχίσουν να λαμβάνουν την τιμή της υπηρεσίας. Διαβάστε αυτό το <a href={0} style="text-decoration:none; color:#027AAE">σύντομο άρθρο και παρακολουθήστε ένα βίντεο</a> για να μάθετε περισσότερα.
active.care.account.create.body_support = Για ερωτήσεις σχετικά με την ενσωμάτωση των συσκευών σας ή τη χρήση του πίνακα ελέγχου, ακολουθήστε αυτά τα απλά βήματα.
active.care.account.create.body_support1 = Εάν δεν έχετε ακόμη λογαριασμό στο Support.HP.com, <a href={0} style="text-decoration:none; color:#027AAE">δημιουργήστε έναν</a>.
active.care.account.create.body_support2 = <a href={0} style="text-decoration:none; color:#027AAE">Συνδεθείτε στο</a> και δημιουργήστε ένα αίτημα υποστήριξης.
active.care.account.create.body_support2.a = Καταχωρίστε έναν από τους σειριακούς αριθμούς του στόλου σας που διαθέτει υποστήριξη HP Premium+ Support ή HP Active Care.
active.care.account.create.body_support2.b = Περιγράψτε το πρόβλημα που αντιμετωπίζετε.
active.care.account.create.body_support2.c = Η υπόθεσή σας θα σταλεί σε μια ομάδα που ειδικεύεται στην υπηρεσία.
