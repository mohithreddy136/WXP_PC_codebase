sign_in.txt.description = Καλωσορίσατε στην πύλη HP TechPulse. Από εδώ έχετε εύκολη πρόσβαση στα αναλυτικά στοιχεία και τις αναφορές του διαχειριζόμενου στόλου συσκευών σας. Μπορείτε επίσης να επικοινωνείτε με τους ειδικούς των υπηρεσιών HP.
sign_in.txt.title = Σύνδεση στο <span class="bold-font">{0}</span>
sign_in_change.content_1 = Η HP θέτει σε κυκλοφορία την νέα υπηρεσία HP ID, ένα ενοποιημένο οικοσύστημα διαχείρισης ταυτότητας για ολόκληρη την HP. Το HP ID παρέχει στους χρήστες μία ενιαία ταυτότητα για όλα τα προϊόντα HP, προσφέροντας έτσι μεγαλύτερη ασφάλεια και πρακτικότητα.
sign_in_change.content_2 = Στις 10 Μαΐου 2018, θα γίνει μετάβαση του HP TechPulse στο HP ID. Η τρέχουσα διεύθυνση email που χρησιμοποιείτε για σύνδεση θα διατηρηθεί. Ωστόσο, για λόγους ασφάλειας, θα σας ζητηθεί να αλλάξετε τον κωδικό πρόσβασής σας.
sign_in_change.content_3 = Εάν έχετε απορίες ή χρειάζεστε βοήθεια, επικοινωνήστε με την ομάδα υποστήριξης.
sign_in_change.content_4 = Η ομάδα του HP TechPulse.
sign_in_change.go_to_daas = Μετάβαση στο HP TechPulse
sign_in_change.need_assistance = Εάν έχετε απορίες ή χρειάζεστε βοήθεια, επικοινωνήστε με την {0}.
