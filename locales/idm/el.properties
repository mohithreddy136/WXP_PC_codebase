auth.oauth2_client_mismatch = Ο έλεγχος ταυτότητας της συσκευής-πελάτη απέτυχε. Μπορεί να πρόκειται για άγνωστη συσκευή-πελάτη, να μην περιλαμβάνεται διαδικασία ελέγχου ταυτότητας της συσκευής-πελάτη ή να μην υποστηρίζεται η μέθοδος ελέγχου ταυτότητας.
