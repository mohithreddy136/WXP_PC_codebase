active.care.account.create.body_next_steps1 = <a href={0} style="text-decoration:none; color:#027AAE">HP Insights Windows 애플리케이션</a>을 다운로드하여 각 PC에 설치하십시오.
active.care.account.create.body_next_steps1.1 = PC가 여러 대 있고 소프트웨어 배포나 엔드포인트 관리 도구를 사용할 경우 <a href={0} style="text-decoration:none; color:#027AAE">사용자 가이드</a>의 8-10페이지를 참조하십시오.
