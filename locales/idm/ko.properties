thinclients_pro_plan_user_email_body_content_1 = HP Cloud Endpoint Manager를 주문해 주셔서 감사합니다. 이제 간편하고 안전하며 유연한 장치 관리에 한 걸음 더 다가섰습니다!
thinclients_pro_plan_user_email_body_content_2 = 아래에서 라이선스 키를 포함한 주문 세부 정보를 찾을 수 있습니다. HP Cloud Endpoint Manager에 대한 지원을 위해 HP Support에 전화하거나 문의하는 경우 확인을 위해 라이선스 키가 필요하므로 액세스할 수 있어야 합니다. 이 주문에 둘 이상의 사용자 또는 시스템이 포함되는 경우 각 사용자 또는 시스템 관리자에게 참조용으로 라이선스 키 사본이 있어야 합니다.
