sign_in_change.content_1 = HP에서는 현재 HP 전체에서 사용될 통합 ID 관리 에코시스템인 HP ID를 배포하고 있습니다. 사용자는 HP ID를 통해 모든 HP 제품에서 단일 ID를 사용할 수 있으므로 보안과 편의성이 향상됩니다.
sign_in_change.content_2 = 2018년 5월 10일에는 HP TechPulse가 HP ID로 전환됩니다. 기존 로그인 이메일 주소는 유지되지만 보안을 위해 암호를 다시 설정해야 합니다.
