active.care.account.create.body_next_steps.2 = 최근 테넌트에 추가된 이메일 주소입니다. Workforce Experience Platform에 처음 로그인하는 경우 HP의 이메일 메시지에서 링크를 따라 자격 증명을 생성하십시오.
