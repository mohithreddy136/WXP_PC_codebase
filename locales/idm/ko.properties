active.care.account.create.body_next_steps2.2 = 등록 대기 탭을 열면 대시보드 요청에 포함된 PC를 확인할 수 있습니다. 이후 본 서비스가 포함된 PC를 구입하면 자동으로 이 목록에 표시됩니다.
