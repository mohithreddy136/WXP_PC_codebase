active.care.account.create.body_msg15 = <a href={0} style="color: #0096D6;">{0}</a>에 로그인하여 이메일을 확인하십시오. 이메일을 직접 입력할 수도 있으며, 이 경우 HP에서 암호를 만드는 절차가 안내됩니다.
active.care.account.create.body_msg16 = <a href={0} style="color: #0096D6;">HP TechPulse Windows 애플리케이션</a>을 다운로드하고 설치하십시오. 등록할 장치가 많은 경우 8~10페이지에 있는 <a href={1} style="color: #0096D6;">Active Care 사용자 안내서</a>의 지침을 따르십시오.
