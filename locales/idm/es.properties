thinclients_plan_user_email_body_content_7 = Complete los campos obligatorios usando <a href="javascript:void(0)" style="text-decoration: none; font-weight: bold; color: #404040; cursor: auto;">{0}</a> como dirección de correo electrónico y seleccione <b>Crear cuenta</b>.
