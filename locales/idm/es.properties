active.care.account.create.body_msg1 = Gracias por adquirir <b>HP Premium+ Support o HP Active Care</b>.
active.care.account.create.body_msg10 = No deseo activar mi servicio.
active.care.account.create.body_msg11 = Atentamente,
active.care.account.create.body_msg12 = Equipo de integración de HP Active Care
active.care.account.create.body_msg13 = Con Active Care, tiene un conjunto completo de protección, soporte y servicio de reparación para sus dispositivos, además de acceso al portal HP TechPulse.
active.care.account.create.body_msg14 = Próximos pasos:
active.care.account.create.body_msg15 = Valide su correo electrónico iniciando sesión en <a href={0} style="color: #0096D6;">{0}</a>. Puede introducir su correo electrónico directamente; el sistema lo guiará para crear su contraseña de HP.
active.care.account.create.body_msg16 = Descargue e instale <a href={0} style="color: #0096D6;">Aplicación HP TechPulse para Windows</a>. Si tiene varios dispositivos inscritos, siga las instrucciones en la <a href={1} style="color: #0096D6;">Guía de usuario de Active Care</a> en las páginas 8 a 10.
active.care.account.create.body_msg17 = Exención de responsabilidad
active.care.account.create.body_msg2 = Con base en nuestros registros de {0}, hay {1} dispositivos que deben inscribirse en el portal Active Care.
active.care.account.create.body_msg3 = Está recibiendo este mensaje porque su correo electrónico fue proporcionado en una solicitud del panel.
active.care.account.create.body_msg4 = Si no se inscribe, se perderá algunos de los nuevos recursos de HP Active Care, como la capacidad de emitir un ticket y solucionar problemas de hardware de modo remoto, Sus comentarios son muy importantes para HP. Permítanos saber cómo podemos ayudarlo:
active.care.account.create.body_msg5 = Necesito más información y una demostración. ¡Encontrémonos!
active.care.account.create.body_msg6 = Tengo todo lo que necesito y empezaré ahora.
active.care.account.create.body_msg7 = ¡Necesito ayuda! ¡He encontrado problemas técnicos!
active.care.account.create.body_msg8 = No he recibido mis dispositivos de hardware HP.
active.care.account.create.body_msg9 = No estoy listo parta empezar; necesito más tiempo.
active.care.account.create.body_next_steps.2 = Su dirección de correo electrónico recientemente se agregó a su inquilino. Si es la primera vez que inicia sesión en Workforce Experience Platform, vea el mensaje de correo electrónico de HP y siga el enlace de ese mensaje para crear sus credenciales.
active.care.account.create.body_next_steps.3 = Una vez que lo haya hecho, inicie sesión en <a href={0} style="text-decoration:none; color:#027AAE">https://admin.hp.com</a>. Si se le ha dado acceso a más de un inquilino, puede seleccionar el ícono de perfil en la esquina superior derecha y seleccione la opción Cambiar cuenta para alternar entre ellas.
active.care.account.create.body_next_steps1 = Descargue e instale <a href={0} style="text-decoration:none; color:#027AAE">la aplicación HP Insights Windows</a> en cada PC.
active.care.account.create.body_next_steps1.1 = Si tiene varios PC y usa software de distribución o herramienta de administración de puntos de conexión, lea las páginas 8 a 10 de la <a href={0} style="text-decoration:none; color:#027AAE">Guía del usuario</a>.
active.care.account.create.body_next_steps1.2 = De lo contrario, siga los pasos de esta <a href={0} style="text-decoration:none; color:#027AAE">Guía rápida de integración</a>.
active.care.account.create.body_next_steps2 = Inicie sesión en <a href={0} style="text-decoration:none; color:#027AAE">admin.hp.com</a>, introduzca su correo electrónico y cree su contraseña cuando se le indique.
active.care.account.create.body_next_steps2.1 = Abra la página Dispositivos.
active.care.account.create.body_next_steps2.2 = Abra la pestaña de Registro pendiente para ver los PC incluidos en la solicitud del panel. Las compras futuras de PC con este servicio aparecerán automáticamente en esta lista.
active.care.account.create.body_next_steps2.3 = Abra la pestaña Todo para ver los PC que tienen el agente HP Insights instalado. Esos empezarán a recibir el valor del servicio. Lea este <a href={0} style="text-decoration:none; color:#027AAE">artículo corto y mire el video</a> para obtener más información.
active.care.account.create.body_support = Si tiene preguntas sobre la integración de sus dispositivos o el uso del panel, siga estos pasos sencillos.
active.care.account.create.body_support1 = Si aún no tiene una cuenta en Support.HP.com, <a href={0} style="text-decoration:none; color:#027AAE">cree una</a>.
active.care.account.create.body_support2 = <a href={0} style="text-decoration:none; color:#027AAE">Inicie sesión y</a> cree un ticket.
active.care.account.create.body_support2.a = Proporcione uno de los números de serie de su flota que tenga HP Premium+ Support o HP Active Care.
active.care.account.create.body_support2.b = Describa el problema que tiene.
active.care.account.create.body_support2.c = Su caso será enviado a un equipo especializado en el servicio.
