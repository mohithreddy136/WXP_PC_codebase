sign_in_change.content_1 = HP en la actualidad desarrolla una HP ID, un ecosistema unificado de administración de identidades para todo HP. HP ID brinda a los usuarios una sola identidad en todos los productos HP, lo que genera más seguridad y practicidad.
sign_in_change.content_2 = El 10 de mayo de 2018, HP TechPulse hará la transición a HP ID. Su dirección de correo electrónico existente para el inicio de sesión se conservará. No obstante, por motivos de seguridad, se le pedirá que restablezca su contraseña.
