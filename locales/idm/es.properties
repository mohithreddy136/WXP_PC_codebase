thinclients_pro_plan_user_email_body_content_1 = Gracias por su pedido de HP Cloud Endpoint Manager. ¡Está un paso más cerca de la administración de dispositivos simple, segura y flexible!
thinclients_pro_plan_user_email_body_content_2 = Más abajo encontrará detalles del pedido, incluyendo la clave de su licencia. Tenga la clave de licencia a mano, ya que se le solicitará para verificación si se pone en contacto con HP Support para obtener ayuda con HP Cloud Endpoint Manager. Si la adquisición cubre más de un usuario o sistema, asegúrese de que cada usuario o administrador de sistema tenga una copia de la clave de licencia para consulta.
thinclients_pro_trial_plan_user_email_body_content_1 = Gracias por su pedido de la prueba de 180 días de HP Cloud Endpoint Manager. ¡Está un paso más cerca de la administración de dispositivos simple, segura y flexible!
thinclients_pro_trial_plan_user_email_body_content_2 = Vea a continuación los detalles de su pedido. Para continuar usando HP Cloud Endpoint Manager después de los 180 días de prueba, comuníquese con su representante de ventas HP para obtener una versión oficial.
thinclients_standard_plan_user_email_body_content_1 = Gracias por su pedido de HP Cloud Endpoint Manager. ¡Está un paso más cerca de la administración de dispositivos simple, segura y flexible!
thinclients_standard_plan_user_email_body_content_2 = Más abajo encontrará detalles del pedido, incluyendo la clave de licencia. Tenga la clave de licencia a mano, ya que se le solicitará para verificación si se pone en contacto con HP Support para obtener ayuda con HP Cloud Endpoint Manager. Si el pedido cubre más de un usuario o sistema, asegúrese de que cada usuario o administrador de sistema tenga una copia de la clave de licencia para consulta.
