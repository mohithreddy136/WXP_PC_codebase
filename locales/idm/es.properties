sign_in_change_notification.content_1 = Para acceder al portal de HP TechPulse, haga clic en el siguiente botón. Necesitará usar la cuenta HP asociada a <b>[{0}]</b>. Si no tiene una cuenta HP, cree una siguiendo las instrucciones de la página de inicio de sesión.
sign_in_change_notification.invite.body.content_1 = Primero, cree su nueva cuenta de HP: haga clic en el botón <b> "Ir a HP TechPulse" </b> que aparece más adelante.
sign_in_change_notification.invite.body.content_2 = Se le enviará a la página de <a {0}> {1} </a>.
sign_in_change_notification.invite.body.content_3 = A continuación, haga clic en el botón <b> "Iniciar sesión" </b> para mostrar la pantalla de inicio de sesión.
sign_in_change_notification.invite.body.content_4 = Ahora, haga clic en el enlace <b> "¿No tiene cuenta? Suscríbase" </b> link.
sign_in_change_notification.invite.body.content_5 = Complete los campos obligatorios usando <b >[ {0} ] </b> como dirección de correo electrónico.
