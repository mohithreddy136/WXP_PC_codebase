sign_in_change_notification.invite.body.content_8 = ¡Ya está listo!
sign_in_change_notification.invite.body.listcontent2 = A continuación, seleccione una de las dos opciones de <b>"Inicio de sesión"</b> (Usar la cuenta Microsoft o Usar la cuenta HPID) en la esquina superior derecha.
sign_in_change_notification.invite.body.listcontent3 = Si seleccionó la cuenta Microsoft: podrá iniciar sesión directamente. <br/>Si seleccionó la cuenta HPID: seleccione ¿No tiene una cuenta? Enlace de suscripción debajo del cuadro de inicio de sesión.
