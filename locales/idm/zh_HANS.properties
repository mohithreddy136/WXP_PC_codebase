active.care.account.create.body_next_steps1 = 在每台电脑上下载并安装 <a href={0} style="text-decoration:none; color:#027AAE">HP Insights Windows 应用程序</a>。
active.care.account.create.body_next_steps1.1 = 如果您拥有多台电脑并且会用到软件分发或端点管理工具，请阅读<a href={0} style="text-decoration:none; color:#027AAE">《用户指南》</a>第 8-10 页。
active.care.account.create.body_next_steps1.2 = 其他情况则请按照这份简短<a href={0} style="text-decoration:none; color:#027AAE">《快速引导指南》</a>中的步骤操作。
active.care.account.create.body_next_steps2 = 登录到 <a href={0} style="text-decoration:none; color:#027AAE">admin.hp.com</a>，输入您的电子邮件，并根据提示创建密码。
