services_v2.app_catalog.long_description = Créer un catalogue ou des catalogues d'applications approuvées depuis la boutique d'applications iOS ou la boutique Google Play. Vous pouvez ajouter des applications personnalisées avec un fichier exécutable Windows, Android APK ou iOS IPA.
