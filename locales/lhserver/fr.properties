welcome.whats_new.line1 = Jonathan Nikols, Vice-Président et Responsable mondial de HP TechPulse
welcome.whats_new.line2 = HP vient de fêter le premier anniversaire de la livraison de nos forfaits TechPulse à nos clients et partenaires, et ce fut vraiment une belle fête d'anniversaire ! En octobre 2018, l’entreprise HP était fière de recevoir le prix de l’innovation « 2018 STAR Award for Innovation » dans une offre de services gérés standard et/ou le catalogue de notre solution TechPulse, de la part de l’Association des services de technologie de l'industrie (TSIA). Ce fut un événement particulièrement marquant, puisqu'il s'agissait de la 15ème récompense TSIA reçue par HP, et que nous avons pu ainsi remonter notre position sur le Hall of Fame des entreprises récompensées par TSIA.
welcome.whats_new.line3 = La gestion proactive avec les forfaits HP TechPulse aidera nos clients à tirer davantage parti des investissements informatiques existants, à les accompagner dans leur progression vers Windows 10, et à leur ouvrir les portes de décisions plus judicieuses, plus appropriées pour stimuler les résultats commerciaux. Pour les partenaires, nous améliorons l’expérience de fourniture de service TechPulse, en augmentant l’espace de solution TechPulse accessible et en simplifiant le processus de conseil aux clients afin de leur offrir les services de cycle de vie appropriés et compléter leur forfait TechPulse favori.
welcome.whats_new.line4 = Ce qui reste un élément capital du succès global de TechPulse, c’est de continuer à se concentrer sur la plateforme, sur la technologie et sur les processus qui nous aident à mettre en œuvre les innovations de services. La solution HP Proactive Management avec TechPulse est plus intelligente, rapide et puissante que jamais, et nous posons les fondations d’un bel avenir ensemble.
welcome.whats_new.line5 = De nouveau, nous souhaitons vous remercier de nous avoir rejoints sur ce projet passionnant et nous nous réjouissons de partager avec vous de nombreuses autres années de collaboration fructueuse !
welcome.whats_new.title = Nouveautés
