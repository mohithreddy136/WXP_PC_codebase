services_v2.find_device.long_description.first = Tentez de localiser un dispositif perdu ou volé sur une carte. Vous pouvez également faire sonner une alarme pour localiser un dispositif qui pourrait être dans les environs. %{application_name} active automatiquement le son et règle le volume du haut-parleur au maximum avant que l'alarme ne sonne. Vous pouvez également effectuer un verrouillage d'écran (blocage PIN), une déconnexion de Windows ou effacer à distance les données en effectuant une réinitialisation des paramètres d'usine
services_v2.find_device.long_description.second = * Le produit perdu doit être allumé et avoir un accès Internet. Ce service n'est pas garanti.
services_v2.find_device.short_description = Localisez, bloquez ou effacer à distance un périphérique géré. Faites sonner une alarme sur un dispositif avoisinant.
services_v2.find_device.title = Trouver un périphérique
services_v2.header.description = Gérez la configuration du service.
services_v2.header.title = Services
services_v2.password_recovery.long_description.first = Permettez aux utilisateurs de réinitialiser leurs mots de passe oubliés sur leurs périphériques Windows gérés. La fonction Récupération du mot de passe HP peut être distribuée à n'importe quel périphérique Windows inscrit avec des comptes pro %{application_name}. (%{open_italic_tag}Par défaut, la fonction n'est PAS automatiquement distribuée, donc l'administrateur doit permettre la distribution de la fonction de récupération des mots de passe par l'onglet  Services sur le tableau de bord %{application_name}.%{close_italic_tag})
services_v2.password_recovery.long_description.second = Une fois la fonction Récupération du mot de passe HP activée, l'utilisateur doit répondre à trois questions de sécurité pour authentifier le périphérique et réinitialiser le mot de passe Windows.
services_v2.password_recovery.short_description = Réinitialiser les mots de passe oubliés sur des périphériques Microsoft Windows gérés.
services_v2.password_recovery.title = Récupération du mot de passe
