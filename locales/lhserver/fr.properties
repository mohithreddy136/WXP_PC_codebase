tpm.welcome.banner.description_1 = Merci d'utiliser HP Touchpoint Manager. Comme nous en avons informé nos contacts clients, le portail en ligne à l'adresse <a href="//www.hptouchpointmanager.com" target="_hptpm">www.hptouchpointmanager.com</a> et le client logiciel des périphériques sera désactivé. À compter du 5 novembre 2018, ce service ne sera plus disponible.
tpm.welcome.banner.description_2 = Nous sommes très heureux de proposer la solution HP TechPulse, qui permet de garantir la gestion, la sécurité et l’état d'intégrité des points de terminaison clients. Vous trouverez des détails sur les toutes dernières fonctionnalités de HP TechPulse Proactive Management avec les analyses HP TechPulse à l’adresse <a href="//www.hp.com/go/daas" target="_hpdaas">here</a>.
tpm.welcome.banner.description_3 = Si vous avez des questions sur l’arrêt du service HP Touchpoint Manager ou HP TechPulse, veuillez contacter votre représentant HP ou votre revendeur.
