services_v2.patches.title = Gestion des correctifs
services_v2.pro_package_advertisement.title = Accéder aux fonctions avancées avec l'abonnement Pro
services_v2.remote_control.long_description.first = Connectez-vous et dépannez les dispositifs Microsoft Windows par le biais de n'importe quel dispositif et navigateur qui supporte HTML. La fonction de support et de commande à distance avec cryptage intégré vous permet d'accéder en toute sécurité et de dépanner les périphériques à l'intérieur et à l'extérieur du pare-feu de la société. Les fonctions incluent le chat, le transfert de fichier bilatéral et l'accès à un agent de support de tiers. Vous pouvez également vous connecter à des périphériques sans surveillance en utilisant des options préétablies, acceptées par le client pour fournir des mises à jour de routine ou des urgences de maintenance ou de traitement. Vos utilisateurs peuvent demander une session d'assistance à distance en cliquant sur un lien de demande d'aide dans le plateau du système.
services_v2.remote_control.long_description.second = * Le produit perdu doit être allumé et avoir un accès Internet. Ce service n'est pas garanti.
services_v2.remote_control.short_description = Connectez-vous et dépannez les périphériques Microsoft Windows gérés par le biais du navigateur pratiquement à partir de partout.
services_v2.remote_control.title = Commande à distance
services_v2.security.long_description.first = Protégez les données sur les appareils gérés en personnalisant, appliquant et en renforçant les stratégies de sécurité. Assurez-vous que le logiciel de sécurité, comme le pare-feu ou la protection anti-virus, est activé.
services_v2.security.long_description.second = Configurez les réglages pour les dispositifs mobiles comme longueur de code PIN/mot de passe et les heures de verrouillage d'écran. Recherchez, effacez et verrouillez les appareils perdus ou volés. Obtenez également des alertes concernant vos appareils gérés, comme l’intégrité du disque dur et de la batterie.
services_v2.security.long_description.second_no_alerts = Configurez les réglages pour les dispositifs mobiles comme longueur de code PIN/mot de passe et les heures de verrouillage d'écran. Recherchez, effacez et verrouillez les appareils perdus ou volés.
services_v2.security.short_description = Protégez les données en appliquant des niveaux personnalisés de politiques de sécurité aux dispositifs gérés.
services_v2.security.title = Sécurité
services_v2.software_update.long_description = Appliquez et gérez les politiques concernant le matériel HP, Microsoft, et les mises à jour de logiciels de tiers. Une fois créées, les politiques vous permettent de contrôler et de déployer des mises à jour de logiciels provenant d'HP, Microsoft, et d'autres éditeurs de logiciels.
