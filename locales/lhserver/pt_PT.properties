services_v2.find_device.long_description.first = Tente localizar um dispositivo perdido ou roubado num mapa. Também pode acionar um alarme para localizar um dispositivo que possa estar nas imediações. A aplicação %{application_name} ativa automaticamente o som e define o volume do altifalante para o máximo antes de o alarme soar. Também pode bloquear o ecrã (bloqueio com PIN), encerrar sessão no Windows ou eliminar remotamente os dados ao efetuar uma reposição das definições de fábrica.
services_v2.find_device.long_description.second = * O produto perdido deve estar ligado e ter acesso à Internet. Este serviço não é garantido.
services_v2.find_device.short_description = Localizar, bloquear ou eliminar remotamente os dados de um dispositivo gerido. Ativar um alarme num dispositivo que se encontre nas imediações.
services_v2.find_device.title = Localizar dispositivo
services_v2.header.description = Gerir configuração do serviço
services_v2.header.title = Serviços
services_v2.password_recovery.long_description.first = Permite aos utilizadores a reposição das palavras-passe de sistema em qualquer dispositivo Windows gerido. A funcionalidade de Recuperação da palavra-passe HP pode ser distribuída para quaisquer dispositivos Windows registados e associados a contas Pro da aplicação %{application_name}. (%{open_italic_tag}Por predefinição, a funcionalidade NÃO é distribuída automaticamente, ou seja, o administrador deve ativar a distribuição da funcionalidade de recuperação da palavra-passe através do separador Serviços no painel da aplicação %{application_name}.%{close_italic_tag})
services_v2.password_recovery.long_description.second = Após a implementação da funcionalidade de Recuperação da palavra-passe HP, o utilizador deve responder a três perguntas de segurança para autenticar o dispositivo e repor a palavra-passe do Windows.
services_v2.password_recovery.short_description = Efetue a reposição de palavras-passe esquecidas em dispositivos Microsoft Windows geridos.
services_v2.password_recovery.title = Recuperação da palavra-passe
services_v2.patches.long_description = Gerir atualizações de software em dispositivos registados
services_v2.patches.short_description = Gerir atualizações de software em dispositivos registados
services_v2.patches.title = Gestão de patches
services_v2.pro_package_advertisement.title = Aceder a funcionalidades avançadas com a subscrição Pro
services_v2.remote_control.long_description.first = Ligue-se e solucione problemas em dispositivos Microsoft Windows geridos através de qualquer dispositivo e browser que suporte HTML. A funcionalidade de controlo e suporte remoto com encriptação integrada permite-lhe aceder com segurança e solucionar problemas em dispositivos, abrangidos ou não pela firewall da empresa. As funcionalidades incluem chat, transferência de ficheiros bidirecional e acesso a agentes de suporte de terceiros. Pode também efetuar uma ligação a dispositivos autónomos, utilizando opções predefinidas e aceites pelo cliente para fornecer atualizações ou manutenção de rotina ou lidar com emergências. Os seus utilizadores podem solicitar uma sessão de suporte remoto, clicando numa ligação de pedido de Ajuda no tabuleiro do sistema.
services_v2.remote_control.long_description.second = * O produto perdido deve estar ligado e ter acesso à Internet. Este serviço não é garantido.
services_v2.remote_control.short_description = Ligue-se e solucione problemas em dispositivos Microsoft Windows geridos através do browser em praticamente qualquer lugar.
services_v2.remote_control.title = Controlo remoto
services_v2.security.long_description.first = Proteja os dados em dispositivos registados ao personalizar, aplicar e impor políticas de segurança. Assegure que o software de segurança, como a firewall e a proteção antivírus, está ativado.
services_v2.security.long_description.second = Configure as definições para dispositivos móveis, tais como PIN ou comprimento da palavra-passe e tempo de bloqueio do ecrã. Localize, elimine e bloqueie dispositivos perdidos ou roubados. Obtenha alertas sobre os seus dispositivos geridos, tais como a unidade de disco rígido e o estado da bateria.
services_v2.security.long_description.second_no_alerts = Configure as definições para dispositivos móveis, tais como PIN ou comprimento da palavra-passe e tempo de bloqueio do ecrã. Localize, elimine e bloqueie dispositivos perdidos ou roubados.
services_v2.security.short_description = Proteja os dados, aplicando níveis personalizados de políticas de segurança em dispositivos geridos.
services_v2.security.title = Segurança
services_v2.software_update.long_description = Aplique e efetue a gestão de políticas relacionadas com atualizações de software de terceiros, da Microsoft ou de hardware da HP. Uma vez criadas, as políticas permitem-lhe monitorizar e implementar as atualizações de software da HP, da Microsoft e de outros fabricantes de software.
services_v2.software_update.short_description = Aplique e efetue a gestão de políticas relacionadas com atualizações de software da Microsoft e de terceiros através da aplicação %{application_name}.
services_v2.software_update.title = Atualização de software
