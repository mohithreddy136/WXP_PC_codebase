welcome.whats_new.line1 = Jonathan Nikols, VP e Responsável geral do HP TechPulse
welcome.whats_new.line2 = A HP acabou de celebrar o primeiro aniversário desde que disponibilizámos os Planos TechPulse aos nossos clientes e parceiros; e que aniversário foi! Em outubro de 2018, a HP recebeu orgulhosamente o prémio 2018 STAR Award for Innovation in a Standard Managed Services Offering and/or Catalog (Prémio STAR 2018 para Inovação em serviço e/ou catálogo de gestão standard) para a nossa solução TechPulse, atribuído pela Technology Services Industry Association (TSIA). Este foi um momento especialmente memorável, uma vez que constituiu o 15.º prémio TSIA da HP e fez subir a posição ocupada pela HP no Hall of Fame de premiados da TSIA.
welcome.whats_new.line3 = A gestão proativa com os Planos HP TechPulse irá ajudar os nossos clientes a tirarem maior partido dos investimentos já efetuados em TI, ajudar na transição para o Windows 10, bem como abrir a porta para uma melhor e mais inteligente tomada de decisões, impulsionando os resultados empresariais. Para os parceiros, estamos a melhorar a experiência de distribuição do serviço TechPulse, a aumentar a abrangência da solução TechPulse, bem como a simplificar o processo através do qual ajudamos os nossos clientes a encontrarem os serviços de ciclo de vida adequados para complementarem o respetivo Plano TechPulse preferido.
welcome.whats_new.line4 = No centro do sucesso generalizado do TechPulse está um foco continuado na plataforma, na tecnologia e nos processos que nos ajudam a concretizar a inovação nos serviços. A Gestão proativa HP com TechPulse está mais inteligente, mais rápida e mais poderosa que nunca, e estamos a criar as bases para um futuro bastante promissor juntos.
welcome.whats_new.line5 = Mais uma vez, muito obrigado pela sua companhia neste percurso emocionante e esperamos manter esta colaboração de sucesso durante muitos e muitos anos!
welcome.whats_new.title = Novidades
