services_v2.app_catalog.long_description = Crie um catálogo ou catálogos de aplicações aprovadas a partir da iOS App Store ou Google Play Store. Pode adicionar aplicações personalizadas com um ficheiro executável do Windows, Android APK ou iOS IPA.
