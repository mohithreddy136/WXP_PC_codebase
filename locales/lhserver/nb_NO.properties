services_v2.password_recovery.long_description.first = La brukere tilbakestille glemte systempassord på alle administrerte Windows-enheter. HPs funksjon for passordgjenoppretting kan distribueres til alle registrerte Windows-enheter knyttet til %{application_name} Pro-kontoer. (%{open_italic_tag}Som standard distribueres funksjonen IKKE automatisk, så admin må aktivere distribusjon av passordgjenopprettingsfunksjonen via Tjenester-fanen på %{application_name}-dashboardet.%{close_italic_tag})
services_v2.password_recovery.long_description.second = Når HPs funksjon for passordgjenoppretting rulles ut, må brukeren besvare tre sikkerhetsspørsmål for å autentisere enheten og tilbakestille Windows-passordet.
