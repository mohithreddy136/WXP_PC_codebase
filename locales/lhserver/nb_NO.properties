services_v2.remote_control.long_description.first = Koble til og feilsøk administrerte Microsoft Windows-enheter via enhver enhet og nettleser som støtter HTML. Med den eksterne støtten og kontrollfunksjonen med innebygd kryptering kan du sikkert gå inn på og feilsøke enheter både innenfor og utenfor bedriftens brannmur. Funksjoner inkluderer chat, toveis filoverføring og tilgang til tredjeparts kundestøtterepresentanter. Du kan også koble deg til ubetjente enheter ved bruk av forhåndsinnstilte, klientgodkjente alternativer som gir deg rutinemessige oppdateringer eller vedlikehold, eller håndterer nødssituasjoner. Brukerne dine kan be om en ekstern støtteøkt ved å klikke på en Hjelp-anmodningskobling i systemstatusfeltet.
services_v2.remote_control.long_description.second = * Det mistede produktet må være slått på og ha tilgang til Internett. Denne tjenesten er ikke garantert.
services_v2.remote_control.short_description = Koble til og feilsøk administrerte Microsoft Windows-enheter via nettleseren fra nærmest hvor som helst.
services_v2.remote_control.title = Fjernkontroll
services_v2.security.long_description.first = Beskytt data på administrerte enheter ved å tilpasse, bruke og håndheve sikkerhetspolicyer. Påse at sikkerhetsprogramvaren, for eksempel brannmur og virusbeskyttelse, er aktivert.
services_v2.security.long_description.second = Konfigurer innstillinger for mobile enheter, for eksempel PIN eller passordlengde og tider for skjermsperring. Finn, slett og sperr mistede eller stjålne enheter. Få også varsler om dine administrerte enheter, for eksempel harddisk- og batteritilstand.
services_v2.security.long_description.second_no_alerts = Konfigurer innstillinger for mobile enheter, for eksempel PIN eller passordlengde og tider for skjermsperring. Finn, slett og sperr mistede eller stjålne enheter.
services_v2.security.short_description = Beskytt data ved å bruke tilpassede nivåer av sikkerhetspolicyer på administrerte enheter.
services_v2.security.title = Sikkerhet
services_v2.software_update.long_description = Bruk og administrer policyer vedrørende oppdateringer av HP-maskinvare, Microsoft og tredjeparts programvare. Når policyene er opprettet, lar de deg overvåke og benytte programvareoppdateringer fra HP, Microsoft og andre programvareutgivere.
