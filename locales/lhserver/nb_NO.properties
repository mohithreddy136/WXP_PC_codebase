services_v2.find_device.long_description.first = Forsøk på å finne en mistet eller stjålet enhet på et kart. Du kan også spille av en alarm for å finne en enhet som kan være i nærheten. %{application_name} aktiverer automatisk lyd og stiller høyttalervolumet til maksimum før alarmen spilles av. Du kan også utføre en skjermlås (PIN-blokk), Windows-avlogging eller eksternt slette data ved å utføre en tilbakestilling til fabrikkinstillingene.
services_v2.find_device.long_description.second = * Det mistede produktet må være slått på og ha tilgang til Internett. Denne tjenesten er ikke garantert.
