welcome.daas.presence.terms = 1. HP TechPulse-planer og/eller inkluderte komponenter kan variere fra region til region eller etter autoriserte partnere av HP TechPulse-tjeneste. Ta kontakt med den lokale HP-representanten eller en autorisert TechPulse-partner for spesifikke detaljer for din plassering. HP-tjenester er underlagt de gjeldende vilkår og betingelser, fra HP, for tjenesten som er oppgitt eller angitt til kunden på kjøpstidspunktet. Kunden kan ha ytterligere lovbestemte rettigheter i henhold til gjeldende lokale lover, og slike rettigheter påvirkes ikke på noen måte av HPs vilkår for bruk eller HPs begrensede garanti som følger med HP-produktet.
