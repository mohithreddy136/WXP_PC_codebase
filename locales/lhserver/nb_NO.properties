welcome.whats_new.line1 = Jonathan Nikols, VP og global sjef for HP TechPulse
welcome.whats_new.line2 = HP feiret nylig vårt første jubileum for å levere våre TechPulse-planer til kunder og partnere, og det var litt av et jubileum! I oktober 2018 kunne HP stolt motta 2018 STAR Award for Innovation in a Standard Managed Services Offering og/eller Catalog for vår TechPulse-løsning fra Technology Services Industry Association (TSIA). Dette var en spesielt viktig anledning siden den markerte HPs 15. TSIA-pris alt i alt og det hevet HPs posisjon i TSIAs Æresgalleri for prisvinnere.
welcome.whats_new.line3 = Proaktiv styring med HP TechPulse-planer vil hjelpe kundene våre med å få mer verdi ut av eksisterende IT-investeringer, hjelpe dem på reisen mot Windows 10 og åpne døren til bedre og smartere beslutninger for å forsterke forretningsmessige resultater. Vi forbedrer leveringsopplevelsen av TechPulse-tjenesten til kunder, øker adresserbare TechPulse-løsningsområder og forenkler prosessen med å hjelpe kunder med å finne de riktige livssyklustjenestene som utfyller den TechPulse-planen de foretrekker.
welcome.whats_new.line4 = Sentralt i den overordnede suksessen til TechPulse er et vedvarende fokus på plattformen, teknologien og prosessene som hjelper oss med å finne nyvinninger for tjenesten. HP Proactive Management med TechPulse er smartere, raskere og kraftigere enn noen gang tidligere og vi legger grunnlaget for en svært lys fremtid sammen.
welcome.whats_new.line5 = Takk, enda en gang, for at du ville bli med oss på denne spennende reisen og vi ser frem til mange flere år med vellykket samarbeid med deg!
welcome.whats_new.title = Hva er nytt?
