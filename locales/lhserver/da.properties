services_v2.app_catalog.long_description = Opret et katalog eller kataloger med godkendte programmer fra iOS App Store eller Google Play Store. Du kan tilføje brugertilpassede programmer med en Windows eksekverbar, Android APK- eller iOS IPA-fil. 
