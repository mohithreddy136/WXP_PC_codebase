services_v2.find_device.long_description.first = Forsøg at finde en mistet eller stjålet enhed på et kort. Du kan også udløse en alarm for at finde en enhed, som måske er i nærheden. %{application_name} aktiverer automatisk lyden og indstiller højtalerlydstyrken på maksimum, inden alarmen udløses. Du kan også foretage skærmlåsning (PIN-kodeblokering), Windows-logoff eller slette dataene på enheden ved hjælp af nulstilling til fabriksindstillinger.
services_v2.find_device.long_description.second = * Den mistede enhed skal være tændt og have forbindelse til internettet. Denne tjeneste er ikke garanteret.
services_v2.find_device.short_description = Find, lås eller slet en administreret enhed med fjernbetjeningen. Udløs en alarm på en enhed i nærheden.
services_v2.find_device.title = Find enhed
