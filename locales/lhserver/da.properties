services_v2.patches.title = Administration af programrettelser
services_v2.pro_package_advertisement.title = Få adgang til avancerede funktioner med et Pro-abonnement
services_v2.remote_control.long_description.first = Tilslut og lav fejlsøgning på administrerede Microsoft Windows-enheder vha. en hvilken som helst enhed og browser, som understøtter HTML. Fjernsupport- og fjernbetjeningsfunktionen med indbygget kryptering muliggør, at du på en sikker måde kan få adgang til og lave fejlsøgning på enheder både inden for og uden for virksomhedens firewall. Funktionerne omfatter chat, tovejsfiloverførsel og adgang til tredjepartssupportagent. Du kan endvidere tilslutte ledige enheder vha. forudindstillede, klientgodkendte valgmuligheder for at udføre rutinemæssige opdateringer eller vedligeholdelse eller håndtere nødsituationer. Dine brugere kan anmode om fjernsupportsessioner ved at klikke på et link for anmodning om hjælp i meddelelsesområdet.
services_v2.remote_control.long_description.second = * Den mistede enhed skal være tændt og have forbindelse til internettet. Denne tjeneste er ikke garanteret.
services_v2.remote_control.short_description = Tilslut og lav fejlsøgning på administrerede Microsoft Windows-enheder via browseren fra stort set hvor som helst.
services_v2.remote_control.title = Fjernbetjening
services_v2.security.long_description.first = Beskyt data på administrerede enheder ved at tilpasse, anvende og håndhæve sikkerhedspolitikker. Sørg for, at sikkerhedssoftware såsom firewall og antivirusbeskyttelse er aktiveret.
services_v2.security.long_description.second = Konfigurer indstillinger for mobilenheder såsom PIN-kode eller adgangskodelængde og tidsintervaller for skærmlåsning. Find, slet og lås mistede eller stjålne enheder. Modtag endvidere advarsler om dine administrerede enheder såsom harddisk- og batteritilstande.
services_v2.security.long_description.second_no_alerts = Konfigurer indstillinger for mobilenheder såsom PIN-kode eller adgangskodelængde og tidsintervaller for skærmlåsning. Find, slet og lås mistede eller stjålne enheder.
services_v2.security.short_description = Beskyt data ved at anvende brugertilpassede politikker på administrerede enheder.
services_v2.security.title = Sikkerhed
services_v2.software_update.long_description = Anvend og administrer politikker for opdateringer af HP hardware, Microsoft- og tredjepartssoftware. Efter oprettelsen giver politikkerne dig mulighed for at overvåge og installere softwareopdateringer fra HP, Microsoft og andre softwareudgivere.
