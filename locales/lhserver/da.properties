welcome.whats_new.line1 = Jonathan Nikols, VP og Global Head  of HP TechPulse
welcome.whats_new.line2 = HP har lige fejret sit første jubilæum for levering af TechPulse-abonnementer til vores kunder og partnere, og det var intet mindre end fantastisk! I oktober 2018 blev HP de stolte vindere af Technology Services Industry Associations (TSIA) STAR-prisen i kategorien Innovation in a Standard Managed Services Offering and/or Catalog for vores TechPulse-løsning. Dette var en særlig begivenhed, da det var HP's 15. TSIA-pris, hvilket gav HP en endnu vigtigere plads blandt tidligere TSIA-prismodtagere.
welcome.whats_new.line3 = Proactive Management med HP TechPulse-abonnementer sørger for, at vores kunder får mere ud af deres nuværende it-investeringer samt får hjælp på deres vej til benyttelse af Windows 10 og kan træffe bedre og mere intelligente beslutninger, hvilket giver bedre resultater for deres virksomheder. Vi giver desuden vores partnere en bedre oplevelse ved leveringen af TechPulse-tjenester, så der bliver plads til flere TechPulse-løsninger, og det bliver lettere at hjælpe kunder med at finde de rigtige livscyklustjenester til deres foretrukne TechPulse-abonnement.
welcome.whats_new.line4 = Det vigtige element i TechPulse' samlede succes er, at der hele tiden fokuseres på platformen, teknologien og de processer, der hjælper os med at forny vores tjenester. HP Proactive Management med TechPulse er mere intelligent, hurtig og avanceret end nogensinde, og sammen er vi med til at skabe fundamentet for en strålende fremtid.
welcome.whats_new.line5 = Vi vil endnu en gang sige tak, fordi du er med os på denne spændende rejse, og vi ser frem til mange års vellykket samarbejde med dig!
welcome.whats_new.title = Nyheder
