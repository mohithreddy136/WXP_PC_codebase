services_v2.header.title = Tjenester
services_v2.password_recovery.long_description.first = Tillader brugere at nulstille glemte systemadgangskoder på enhver administreret Windows-enhed. HP's funktion for genoprettelse af adgangskode kan sendes til alle tilmeldte Windows-enheder tilknyttet %{application_name} Pro-konti. (%{open_italic_tag}Som standard bliver funktionen IKKE sendt automatisk. Derfor skal administratoren aktivere funktionen for genoprettelse af adgangskode via fanen Tjenester på %{application_name}-dashboardet.%{close_italic_tag})
services_v2.password_recovery.long_description.second = Når HP’s funktion for genoprettelse af adgangskode er installeret, skal brugeren besvare tre sikkerhedsspørgsmål for at godkende enheden og nulstille Windows-adgangskoden.
services_v2.password_recovery.short_description = Nulstil glemte adgangskoder på administrerede Microsoft Windows-enheder.
