welcome.whats_new.line1 = Jonathan Nikols, VP and Global Head of HP TechPulse
welcome.whats_new.line2 = HP just celebrated our first anniversary since delivering our TechPulse Plans to our customers and partners and what an anniversary it was!  In October 2018,  HP was proud to receive the 2018 STAR Award for Innovation in a Standard Managed Services Offering and/or Catalog for our TechPulse solution from Technology Services Industry Association (TSIA).  This was an especially momentous occasion as it marked HP's 15th TSIA award overall and elevated HP's position in TSIA's award winner Hall of Fame.
welcome.whats_new.line3 = Proactive Management with HP TechPulse Plans will help our customers get more value from existing IT investments, assist in their journey to Windows 10, and open the door to better, smarter decision making to drive Business Outcomes. For Partners, we're improving the TechPulse service delivery experience, increasing the addressable TechPulse solution space, and simplifying the process of helping customers find the right lifecycle services to complement their preferred TechPulse Plan.
welcome.whats_new.line4 = Central to the overall success of TechPulse is a continued focus on the platform, technology and processes that help us realize services innovation. HP Proactive Management with TechPulse is smarter, faster, and more powerful than ever before, and we are laying the foundation for a very bright future together.
welcome.whats_new.line5 = Again, thank you for joining us on this exciting journey and we look forward to many more years of successful collaboration with you!
welcome.whats_new.title = What's New
