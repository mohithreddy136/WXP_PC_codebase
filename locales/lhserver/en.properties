services_v2.password_recovery.long_description.first = Allows users to reset forgotten system passwords on any managed Windows devices. The HP Password Recovery feature can be distributed to any enrolled Windows devices associated with %{application_name} Pro accounts. (%{open_italic_tag}By default, the feature is NOT automatically distributed, so the admin must enable the distribution of the password recovery feature via the Services tab on the %{application_name} dashboard.%{close_italic_tag})
services_v2.password_recovery.long_description.second = After the HP Password Recovery feature is deployed, the user must answer three security questions to authenticate the device and reset the Windows password.
services_v2.password_recovery.short_description = Reset forgotten passwords on managed Microsoft Windows devices.
services_v2.password_recovery.title = Password Recovery
