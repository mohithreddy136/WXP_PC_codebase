services_v2.find_device.long_description.first = Attempt to locate a lost or stolen device on a map. You can also sound an alarm to locate a device that may be nearby. %{application_name} automatically enables sound and sets the speaker volume at maximum before the alarm sounds. You can also perform a screen lock (PIN block), Windows logoff, or remotely erase the data by performing a factory reset.
services_v2.find_device.long_description.second = * The lost product must be powered on and have Internet access. This service is not guaranteed.
services_v2.find_device.short_description = Locate, lock, or remotely erase a managed device. Sound an alarm on a nearby device.
services_v2.find_device.title = Find Device
services_v2.header.description = Manage service configuration
