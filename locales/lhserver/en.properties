services_v2.remote_control.long_description.first = Connect to and troubleshoot managed Microsoft Windows devices through any device and browser that supports HTML. The remote support and control feature with built-in encryption allows you to securely access and troubleshoot devices both inside and outside of the company firewall. Features include chat, two-way file transfer, and third-party support agent access. You can also connect to unattended devices using preset, client accepted options to provide routine updates or maintenance or handle emergencies. Your users can request a remote support session by clicking a Help request link in the system tray.
services_v2.remote_control.long_description.second = * The lost product must be powered on and have Internet access. This service is not guaranteed.
services_v2.remote_control.short_description = Connect to and troubleshoot managed Microsoft Windows devices through the browser from virtually anywhere.
services_v2.remote_control.title = Remote Control
services_v2.security.long_description.first = Protect data on managed devices by customizing, applying and enforcing security policies. Ensure that security software, such as firewall and anti-virus protection, is activated.
services_v2.security.long_description.second = Configure settings for mobile devices, such as PIN or password length and screen lock out times. Find, erase, and lock lost or stolen devices. Also, get alerts about your managed devices, such as hard drive and battery health.
services_v2.security.long_description.second_no_alerts = Configure settings for mobile devices, such as PIN or password length and screen lock out times. Find, erase, and lock lost or stolen devices.
services_v2.security.short_description = Protect data by applying customized levels of security policies to managed devices.
services_v2.security.title = Security
services_v2.software_update.long_description = Apply and manage policies concerning HP hardware, Microsoft, and third party software updates. Once created, the policies allow you to monitor and deploy software updates from HP, Microsoft, and other software publishers.
services_v2.software_update.short_description = Apply and manage policies concerning Microsoft and third-party software updates via %{application_name}.
services_v2.software_update.title = Software Update
