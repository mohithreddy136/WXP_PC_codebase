services_v2.find_device.long_description.first = Trate de ubicar un dispositivo perdido o robado en un mapa. También puede tocar una alarma para ubicar un dispositivo que podría estar en las cercanías. %{application_name} habilita de forma automática el sonido y establece el volumen del altavoz al máximo antes de que toque la alarma. También puede bloquear la pantalla (bloqueo con PIN), cerrar sesión en Windows o eliminar de forma remota los datos mediante un restablecimiento de fábrica.
services_v2.find_device.long_description.second = * El producto perdido debe estar encendido y tener acceso a Internet. Este servicio no está garantizado.
services_v2.find_device.short_description = Ubique, bloquee o elimine de forma remota un dispositivo administrado. Toque una alarma en un dispositivo cercano.
services_v2.find_device.title = Encontrar Dispositivo 
services_v2.header.description = Administrar configuración de servicio
services_v2.header.title = Servicios
services_v2.password_recovery.long_description.first = Permite que los usuarios restablezcan sus contraseñas olvidadas en cualquier dispositivo Windows administrado. El recurso HP Password Recovery puede distribuirse en cualquier dispositivo Windows registrado con las cuentas de %{application_name} Profesional. (%{open_italic_tag}De forma predeterminada, el recurso NO se distribuye automáticamente, por lo que el administrador debe habilitar la distribución del recurso de recuperación de contraseña mediante la ficha de Servicios en el panel de %{application_name}.%{close_italic_tag})
services_v2.password_recovery.long_description.second = Después de que se implementa el recurso HP Password Recovery, el usuario debe responder tres preguntas de seguridad para autenticar el dispositivo y restablecer la contraseña de Windows.
services_v2.password_recovery.short_description = Restablezca las contraseñas olvidadas en dispositivos Microsoft Windows administrados.
services_v2.password_recovery.title = Recuperación de contraseña
services_v2.patches.long_description = Administrar las actualizaciones de software en los dispositivos registrados
services_v2.patches.short_description = Administrar las actualizaciones de software en los dispositivos registrados
services_v2.patches.title = Administración de parches
services_v2.pro_package_advertisement.title = Acceda a funciones avanzadas con la suscripción Profesional
services_v2.remote_control.long_description.first = Conéctese y resuelva los problemas de los dispositivos Microsoft Windows administrados mediante cualquier dispositivo y navegador que admita HTML. El recurso de control y soporte remoto con encriptación incorporada le permite acceder con seguridad y resolver problemas de dispositivos, tanto dentro como fuera del firewall de la compañía. Los recursos incluyen chat, transferencia bidireccional de archivos u acceso a agentes de soporte de terceros. También puede conectarse a dispositivos sin supervisión mediante opciones preconfiguradas y aceptadas por el cliente con el fin de brindar actualizaciones o mantenimientos de rutina o de lidiar con emergencias. Sus usuarios pueden solicitar una sesión de soporte remoto al hacer clic con un enlace de solicitud de Ayuda en la bandeja del sistema.
services_v2.remote_control.long_description.second = * El producto perdido debe estar encendido y tener acceso a Internet. Este servicio no está garantizado.
services_v2.remote_control.short_description = Conéctese y resuelva los problemas de los dispositivos Microsoft Windows administrados mediante el navegador y prácticamente en cualquier lugar.
services_v2.remote_control.title = Control remoto
services_v2.security.long_description.first = Proteja los datos en los dispositivos administrados al personalizar, aplicar y hacer cumplir las políticas de seguridad. Asegúrese de que el software de seguridad, como el firewall y la protección antivirus, esté activado.
services_v2.security.long_description.second = Configure los ajustes de los dispositivos móviles, como la longitud del PIN o la contraseña y los tiempos de bloqueo de la pantalla. Encuentre, elimine y bloquee dispositivos perdidos o robados. Además, obtenga alertas acerca de sus dispositivos administrados, como la unidad del disco duro o el estado de la batería.
services_v2.security.long_description.second_no_alerts = Configure los ajustes de los dispositivos móviles, como la longitud del PIN o la contraseña y los tiempos de bloqueo de la pantalla. Encuentre, elimine y bloquee dispositivos perdidos o robados.
services_v2.security.short_description = Proteja los datos al aplicar niveles personalizados de políticas de seguridad en los dispositivos administrados.
services_v2.security.title = Seguridad
services_v2.software_update.long_description = Aplique y administre las políticas referentes al hardware HP, Microsoft y actualizaciones de software de terceros. Una vez que se hayan creado, las políticas le permitirán supervisar e implementar actualizaciones de software de HP, Microsoft y de otros editores de software.
services_v2.software_update.short_description = Aplique y administre las políticas referentes a actualizaciones de software de terceros y Microsoft mediante %{application_name}.
services_v2.software_update.title = Actualización de software
