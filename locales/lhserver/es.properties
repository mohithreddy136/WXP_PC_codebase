services_v2.app_catalog.long_description = Cree un catálogo o catálogos de aplicaciones aprobadas desde la iOS App Store o Google Play Store. Puede agregar aplicaciones personalizadas con un archivo iOS IPA, Android APK o un ejecutable de Windows.
