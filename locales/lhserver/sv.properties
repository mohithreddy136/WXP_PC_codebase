services_v2.pro_package_advertisement.title = Få tillgång till avancerade funktioner med en Pro-prenumeration
services_v2.remote_control.long_description.first = Anslut till och felsök hanterade Microsoft Windows-enheter via valfri enhet och webbläsare med stöd för HTML. Med funktionen för fjärrsupport och fjärrstyrning med inbyggd kryptering kan du säkert få tillgång till och felsöka enheter både innanför och utanför företagets brandvägg. Funktionerna innefattar chatt, tvåvägsfilöverföring och åtkomst för tredjepartssupport. Du kan även ansluta till oövervakade enheter med förinställda, kundgodkända alternativ för att göra rutinuppdateringar eller underhåll eller hantera nödsituationer. Dina användare kan begära en fjärrsupportsession genom att klicka på en hjälplänk i systemfältet.
services_v2.remote_control.long_description.second = * Den förlorade produkten måste vara påslagen och ansluten till Internet. Den här tjänsten är inte garanterad.
services_v2.remote_control.short_description = Anslut till och felsök hanterade Microsoft Windows-enheter via webbläsaren var som helst.
services_v2.remote_control.title = Fjärrkontroll
services_v2.security.long_description.first = Skydda data på hanterade enheter genom att anpassa, tillämpa och tvinga fram säkerhetspolicyer. Se till att säkerhetsprogramvaran (t.ex. brandvägg och virusskydd) är aktiverad.
services_v2.security.long_description.second = Konfigurera inställningar för mobila enheter som PIN- eller lösenordslängd och tidsgränser för skärmlåsning. Lokalisera, rensa data på och lås förlorade eller stulna enheter. Du kan även få varningar om dina hanterade enheter, t.ex. angående hårddisk- och batteristatus.
services_v2.security.long_description.second_no_alerts = Konfigurera inställningar för mobila enheter som PIN- eller lösenordslängd och tidsgränser för skärmlåsning. Lokalisera, rensa data på och lås förlorade eller stulna enheter.
services_v2.security.short_description = Skydda data genom att tillämpa anpassade nivåer av säkerhetspolicyer på hanterade enheter.
services_v2.security.title = Säkerhet
services_v2.software_update.long_description = Tillämpa och hantera policyer för uppdateringar av HP-maskinvara samt programvara från Microsoft och andra tillverkare. När policyerna har skapats låter de dig övervaka och distribuera programuppdateringar från HP, Microsoft och andra programutgivare.
