services_v2.password_recovery.long_description.first = Låter användarna återställa glömda systemlösenord på hanterade Windows-enheter. HP:s funktion för lösenordsinställning kan distribueras till alla registrerade Windows-enheter som är kopplade till %{application_name} Pro-konton. (%{open_italic_tag}Som standard distribueras funktionen INTE automatiskt, så administratören måste aktivera distribution av lösenordsåterställningsfunktionen via fliken Tjänster på manöverpanelen i %{application_name}.%{close_italic_tag})
services_v2.password_recovery.long_description.second = Efter att funktionen HP Password Recovery har distribuerats måste användaren svara på tre säkerhetsfrågor för att verifiera enheten och återställa Windows-lösenordet.
