services_v2.find_device.long_description.first = Försök att lokalisera en förlorad eller stulen enhet på en karta. Du kan även aktivera ett larm för att lokalisera en enhet som befinner sig i närheten. %{application_name} aktiverar automatiskt ljudet och ställer in högtalarvolymen på max innan larmet ljuder. Du kan även låsa skärmen (PIN-spärr), logga ut från Windows eller fjärradera data genom att utföra en fabriksåterställning.
services_v2.find_device.long_description.second = * Den förlorade produkten måste vara påslagen och ansluten till Internet. Den här tjänsten är inte garanterad.
services_v2.find_device.short_description = Lokalisera, lås, eller fjärradera en hanterad enhet. Aktivera larmet på en enhet i närheten.
