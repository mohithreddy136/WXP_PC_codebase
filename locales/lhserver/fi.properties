services_v2.patches.title = Korjauspakettien hallinta
services_v2.pro_package_advertisement.title = Käytä edistyneitä ominaisuuksia Pro-tilauksen avulla
services_v2.remote_control.long_description.first = Muodosta yhteys hallinnoituihin Microsoft Windows -laitteisiin ja tee niille vianmääritys jollain HTML:ää tukevalla laitteella ja selaimella. Sisäisellä salauksella varustettu Etätuki ja -hallinta -ominaisuus sallii käyttää suojatusti laitteita sekä yrityksen palomuurin sisällä että ulkopuolella sekä määrittää niiden viat. Sen ominaisuuksia ovat keskustelu, kahdensuuntainen tiedostonsiirto ja yhteys kolmannen osapuolen tukiedustajaan. Voit myös muodostaa yhteyden valvomattomiin laitteisiin käyttäen ennalta määritettyjä, asiakassovelluksen hyväksymiä asetuksia ja suorittaa siten rutiinipäivityksiä tai kunnossapitotoimintoja tai hoitaa hätätilanteita. Käyttäjät voivat pyytää etätuki-istuntoa napsauttamalla ilmaisinalueen Ohje-pyyntölinkkiä.
services_v2.remote_control.long_description.second = * Hävinneen tuotteen virran pitää olla kytkettynä, ja siinä pitää olla internetyhteys. Tätä palvelua ei taata.
services_v2.remote_control.short_description = Voit muodostaa yhteyden hallinnoituihin Microsoft Windows -laitteisiin ja tehdä niille vianmäärityksen selaimen kautta käytännössä mistä tahansa.
services_v2.remote_control.title = Etähallinta
services_v2.security.long_description.first = Suojaa hallinnoitujen laitteiden tiedot mukauttamalla, ottamalla käyttöön ja toteuttamalla suojauskäytäntöjä. Varmista, että tietoturvaohjelmisto, kuten palomuuri ja virustorjunta, on aktivoitu.
services_v2.security.long_description.second = Määritä mobiililaitteiden asetukset, kuten PIN-koodi tai salasanan pituus ja näytön lukitusajat. Etsi, pyyhi ja lukitse hävinneitä tai varastettuja laitteita. Saat myös varoituksia hallinnoiduista laitteistasi, kuten kiintolevyaseman ja akun kunnosta.
services_v2.security.long_description.second_no_alerts = Määritä mobiililaitteiden asetukset, kuten PIN-koodi tai salasanan pituus ja näytön lukitusajat. Etsi, pyyhi ja lukitse hävinneitä tai varastettuja laitteita.
services_v2.security.short_description = Suojaa tiedot ottamalla hallinnoiduissa laitteissa käyttöön mukautettuja suojauskäytäntöjen tasoja.
services_v2.security.title = Tietoturva
