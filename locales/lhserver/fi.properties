services_v2.find_device.long_description.first = Yritettiin paikantaa hävinnyt tai varastettu laite kartalla. Voit myös soittaa hälytyksen, joka auttaa löytämään mahdollisesti lähellä olevan laitteen. %{application_name} ottaa automaattisesti käyttöön äänet ja säätää kaiuttimen äänenvoimakkuuden maksimiasetukseen ennen hälytyksen soittamista. Voit myös suorittaa näytön lukituksen (PIN-koodin esto), Windows-uloskirjauksen tai pyyhkiä tiedot etänä suorittamalla tehdasasetusten palautuksen.
services_v2.find_device.long_description.second = * Hävinneen tuotteen virran pitää olla kytkettynä, ja siinä pitää olla internetyhteys. Tätä palvelua ei taata.
