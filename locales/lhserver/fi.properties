tpm.welcome.banner.description_1 = Kiitos HP Touchpoint Managerin käyttämisestä. Kuten olemme ilmoittaneet asiakkaidemme yhteyshenkilöille, <a href="//www.hptouchpointmanager.com" target="_hptpm">www.hptouchpointmanager.com</a>-verkkoportaali ja laitteilla toimiva asiakasohjelma poistetaan käytöstä. Palvelu ei ole enää saatavilla 5.11.2018 jälkeen.
tpm.welcome.banner.description_2 = Olemme innoissamme saadessamme tarjota sinulle HP TechPulse -palvelun, joka auttaa hallitsemaan ja suojaamaan asiakkaiden päätepisteitä ja varmistamaan, että ne ovat kunnossa. Tietoja HP TechPulse Proactive Managementista ja sen hyödyntämästä HP TechPulse -analytiikasta on saatavilla <a href="http://www.hp.com/go/daas" target="_hpdaas">täällä</a>.
