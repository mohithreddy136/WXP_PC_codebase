welcome.whats_new.line1 = Jonathan Nikols, VP ja Global Head, HP TechPulse
welcome.whats_new.line2 = HP juhlisti hiljattain TechPulse-palveluiden ensimmäistä vuosipäivää komeasti. Lokakuussa 2018 HP:n TechPulse-ratkaisu sai Technology Services Industry Associationin (TSIA) jakaman vuoden 2018 STAR-innovaatiopalkinnon, joka annettiin perustason hallinnoitujen palveluiden tarjooman ja/tai valikoiman sarjassa. Tällä oli erityistä merkitystä, sillä kyseessä oli kaikkiaan 15. saamamme TSIA-palkinto, jonka myötä HP pääsi TSIA:n kunniagalleriaan.
welcome.whats_new.line3 = HP TechPulse -sopimuksiin sisältyvä Proactive Management auttaa asiakkaita saamaan enemmän arvoa IT-investoinneistaan ja siirtymään Windows 10:een. Lisäksi se tukee älykästä päätöksentekoa, joka mahdollistaa paremmat bisnestulokset. Parannamme TechPulse-palveluiden toimituskokemusta, lisäämme käytettävissä olevaa TechPulse-ratkaisutilaa ja helpotamme kuhunkin TechPulse-sopimukseen istuvien elinkaaripalveluiden valitsemista.
welcome.whats_new.line4 = TechPulse-palveluiden menestyksessä keskeistä on ollut jatkuva keskittyminen alustaan, teknologiaan ja prosesseihin, jotka tukevat palveluinnovaatiota. TechPulsea hyödyntävä HP Proactive Management on entistäkin älykkäämpi, nopeampi ja tehokkaampi, ja näitä ominaisuuksia kehitetään jatkossa entisestään.
welcome.whats_new.line5 = Kiitos vielä kerran liittymisestä mukaan. Odotamme monia onnistuneita yhteistyövuosia!
welcome.whats_new.title = Uudet ominaisuudet
