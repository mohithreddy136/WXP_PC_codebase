services_v2.password_recovery.long_description.first = Sallii käyttäjien palauttaa unohtuneet järjestelmän salasanat kaikille hallinnoiduille Windows-laitteille. HP Password Recovery -salasanatallennustoiminnon voi jaella mille tahansa rekisteröidyille Windows-laitteille, joihin on liitetty sovelluksen %{application_name} Pro-tili. (%{open_italic_tag}Oletusasetuksena on, että ominaisuutta EI jaella automaattisesti, joten järjestelmänvalvojan pitää ottaa salasanan palautusominaisuuden jakelu käyttöön sovelluksen %{application_name} koontinäytön Palvelut-välilehdessä.%{close_italic_tag})
services_v2.password_recovery.long_description.second = Kun HP Password Recovery -salasanatallennustoiminto on otettu käyttöön, käyttäjän pitää vastata kolmeen suojauskysymykseen, joilla laite todennetaan ja Windows-salasana palautetaan.
