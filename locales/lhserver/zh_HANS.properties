services_v2.remote_control.long_description.first = 通过支持 HTML 的任何设备和浏览器，连接到受管理的 Microsoft Windows 设备并执行故障排除。具有内置加密的远程支持和控制功能可让您在公司防火墙内外安全地访问设备并执行故障排除。功能包括聊天、双向文件传输和第三方支持代理访问。您还可使用客户端接受的预设选项连接到无人管理的设备，以进行例行更新或维护或处理紧急情况。您的用户可通过单击系统托盘中的“帮助”请求链接来请求远程支持会话。
services_v2.remote_control.long_description.second = *丢失的产品必须为开机状态并具有 Internet 访问。不保证此服务。
services_v2.remote_control.short_description = 几乎在任何地方通过浏览器连接到受管理的 Microsoft Windows 设备并执行故障排除。
services_v2.remote_control.title = 远程控制
services_v2.security.long_description.first = 通过自定义、应用和实施安全策略来保护受管理设备上的数据。确保已激活安全软件，如防火墙和病毒防护。
services_v2.security.long_description.second = 配置移动设备的设置，如 PIN 或密码长度和屏幕锁定时间。查找、擦除和锁定丢失或被盗的设备。另外，获取有关受管理设备的警报，例如硬盘和电池运行状况。
services_v2.security.long_description.second_no_alerts = 配置移动设备的设置，如 PIN 或密码长度和屏幕锁定时间。查找、擦除和锁定丢失或被盗的设备。
services_v2.security.short_description = 通过将自定义级别的安全策略应用到受管理设备来保护数据。
services_v2.security.title = 安全
