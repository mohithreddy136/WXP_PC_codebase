services_v2.password_recovery.long_description.first = 允许用户在任何受管理的 Windows 设备上重置忘记的系统密码。HP 密码恢复功能可分发到任何与 %{application_name} Pro 版本帐户相关联且已注册的 Windows 设备。（%{open_italic_tag}默认情况下，该功能不会自动分发，因此管理员必须通过 %{application_name} 控制板上的“服务”选项卡启用密码恢复功能的分发。%{close_italic_tag}）
