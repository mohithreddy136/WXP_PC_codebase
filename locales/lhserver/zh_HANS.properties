services_v2.find_device.long_description.first = 尝试在地图上定位丢失或被盗设备。您也可发出警报来定位可能在附近的设备。在警报响起前，%{application_name} 自动启用声音并将扬声器音量调至最大。您还可以执行屏幕锁定（PIN 块）、Windows 注销或通过恢复出厂设置远程擦除数据。
