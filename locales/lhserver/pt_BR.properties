services_v2.find_device.long_description.first = Tente localizar um dispositivo perdido ou roubado em um mapa. Você também pode emitir um alarme para localizar um dispositivo que possa estar próximo. O %{application_name} ativa automaticamente os sons e coloca o volume do altofalante no máximo, antes de soar o alarme. Você também pode executar um travamento de tela (bloqueio de PIN), logoff do Windows ou apagar remotamente os dados, executando uma redefinição de fábrica.
services_v2.find_device.long_description.second = * O produto perdido deve estar ligado e ter acesso à Internet. Esse serviço não é garantido.
services_v2.find_device.short_description = Localize, bloqueie ou apague remotamente um dispositivo gerenciado. Toque um alarme em um dispositivo próximo.
services_v2.find_device.title = Localizar dispositivo
services_v2.header.description = Gerenciar configurações do serviço
services_v2.header.title = Serviços
services_v2.password_recovery.long_description.first = Permite que os usuários redefinam senhas do sistema esquecidas em qualquer dispositivo Windows gerenciado. O recurso de Recuperação de senhas HP pode ser distribuído para qualquer dispositivo Windows registrado associado a contas Pro do %{application_name}. (%{open_italic_tag}Por padrão, o recurso NÃO é distribuído automaticamente, de forma que o administrador deve ativar a distribuição do recurso de recuperação de senha através da guia de Serviços no painel do  %{application_name}.%{close_italic_tag})
services_v2.password_recovery.long_description.second = Após o recurso de Recuperação de senhas HP ser implantado, o usuário deve responder a três perguntas de segurança, para autenticar o dispositivo e redefinir a senha do Windows.
services_v2.password_recovery.short_description = Redefina senhas esquecidas em dispositivos Microsoft Windows gerenciados.
services_v2.password_recovery.title = Recuperação de senha
services_v2.patches.long_description = Gerenciar atualizações de software nos dispositivos registrados
services_v2.patches.short_description = Gerenciar atualizações de software nos dispositivos registrados
services_v2.patches.title = Gerenciamento de correções
services_v2.pro_package_advertisement.title = Acessar recursos avançados com a assinatura Pro
services_v2.remote_control.long_description.first = Conecte-se a e resolva problemas de dispositivos Microsoft Windows gerenciados, através de qualquer dispositivo e navegador que suporte HTML. O recurso de suporte e controle remotos com criptografia integrada permite que você acesse e solucione problemas, com segurança, de dispositivos tanto dentro quanto fora do firewall da companhia. Dentre os recursos, estão transferência de arquivos bidirecional e acesso ao agente de suporte de terceiros. Você também pode se conectar a dispositivos autônomos, usando opções pré-definidas aceitas pelo cliente, para oferecer atualizações ou manutenção de rotina ou lidar com emergências. Os seus usuários podem solicitar uma sessão de suporte remoto, clicando no link de solicitação de Ajuda, na bandeja do sistema.
services_v2.remote_control.long_description.second = * O produto perdido deve estar ligado e ter acesso à Internet. Esse serviço não é garantido.
services_v2.remote_control.short_description = Conecte-se a e resolva problemas de dispositivos Microsoft Windows gerenciados, através do navegador, de virtualmente qualquer lugar.
services_v2.remote_control.title = Controle remoto
services_v2.security.long_description.first = Proteger dados em dispositivos gerenciados personalizando, aplicando e reforçando as políticas de segurança. Garantir que os softwares de segurança, tais como proteção por firewall e antivírus, estejam ativados.
services_v2.security.long_description.second = Definir configurações para dispositivos móveis, como tamanho do PIN/senha e tempo para bloqueio de tela. Encontrar, apagar e bloquear dispositivos perdidos ou roubados. Além disso, obter alertas sobre seus dispositivos gerenciados, tais como unidade de disco rígido e integridade da bateria.
services_v2.security.long_description.second_no_alerts = Define configurações para dispositivos móveis, como tamanho do PIN/senha e tempo de bloqueio de tela. Encontra, apaga e bloqueia dispositivos perdidos ou roubados.
services_v2.security.short_description = Proteja dados, aplicando níveis personalizados de políticas de segurança para dispositivos gerenciados.
services_v2.security.title = Segurança
services_v2.software_update.long_description = Aplique e gerencie políticas relacionadas a hardware da HP, Microsoft e atualizações de software de terceiros. Uma vez criadas, as políticas irão permitir que você monitore e implante atualizações de software da HP, Microsoft e outras firmas de software.
services_v2.software_update.short_description = Aplique e gerencie políticas relacionadas a atualizações de software da Microsoft e de terceiros, através do %{application_name}.
services_v2.software_update.title = Atualização de software
