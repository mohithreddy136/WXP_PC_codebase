welcome.whats_new.line1 = Jonathan Nikols, VP e Diretor global do HP TechPulse
welcome.whats_new.line2 = A HP acaba de celebrar nosso primeiro aniversário desde a entrega de nossos planos TechPulse aos nossos clientes e parceiros, e foi um baita aniversário! Em outubro de 2018, a HP orgulhou-se de receber o Prêmio STAR de Inovação 2018 em Oferta e/ou Catálogo Padrão de Serviços Gerenciados para nossa solução TechPulse da TSIA (Technology Services Industry Association). Esta foi uma ocasião particularmente importante, pois marcou o 15º prêmio TSIA da HP no geral e elevou a posição da HP no Hall da fama de vencedores do prêmio da TSIA.
welcome.whats_new.line3 = O Gerenciamento proativo com os Planos HP TechPulse ajudarão nossos clientes a obter mais valor dos investimentos em TI existentes, auxiliará em sua jornada para o Windows 10 e abrirá as portas para uma tomada de decisão melhor e mais inteligente para impulsionar os resultados corporativos. Para os Parceiros, estamos aprimorando a experiência de entrega de serviços TechPulse, aumentando o espaço da solução TechPulse endereçável e simplificando o processo de ajudar os clientes a encontrar os serviços de ciclo de vida certos para complementar seu Plano TechPulse preferido.
welcome.whats_new.line4 = Central para o sucesso geral do TechPulse é um foco contínuo na plataforma, tecnologia e processos que nos ajudam a alcançar a inovação de serviços. O Gerenciamento proativo da HP com TechPulse está mais inteligente, mais rápido e mais poderoso do que nunca, e estamos estabelecendo as bases para um futuro muito brilhante juntos.
welcome.whats_new.line5 = Mais uma vez, obrigado por se juntar a nós nesta jornada emocionante e estamos ansiosos para muitos mais anos de colaboração bem sucedida com você!
welcome.whats_new.title = O que há de novo
