services_v2.app_catalog.long_description = Crie um ou mais catálogos de aplicativos aprovados da App Store do iOS ou da Google Play Store. Você pode adicionar aplicativos personalizados com um arquivo executável do Windows, APK do Android ou IPA do iOS.
