services_v2.password_recovery.long_description.first = Laat gebruikers vergeten systeemwachtwoord opnieuw instellen op alle beheerde Windows-apparaten. De HP wachtwoordherstel kan op alle geregistreerde Windows-apparaten die gekoppeld zijn aan Pro-accounts bij %{application_name} worden gedistribueerd. (%{open_italic_tag}Standaard wordt de functie NIET automatisch gedistribueerd, dus moet de beheerder de distributie van de wachtwoordherstelfunctie inschakelen via het tabblad Services op het dashboard van %{application_name}.%{close_italic_tag})
services_v2.password_recovery.long_description.second = Nadat de functie HP wachtwoordherstel is geïmplementeerd, moet de gebruiker drie beveiligingsvragen beantwoorden om het apparaat te verifiëren en het Windows-wachtwoord opnieuw in te stellen.
