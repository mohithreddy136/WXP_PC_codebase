services_v2.find_device.long_description.first = Probeer een verloren of gestolen apparaat op een kaart te vinden. U kunt ook een alarm laten klinken om een apparaat te zoeken dat al in de buurt kan zijn. %{application_name} schakelt automatisch geluid in en zet het volume van de luidspreker op maximum voor het alarm klinkt. U kunt ook een schermvergrendeling (pinblokkade) uitvoeren, afmelden bij Windows of de gegevens op afstand wissen door de fabriekswaarden te herstellen.
services_v2.find_device.long_description.second = * Het verloren product moet zijn ingeschakeld en internettoegang hebben. Deze service is niet gegarandeerd.
