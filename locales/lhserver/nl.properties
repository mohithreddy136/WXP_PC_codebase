services_v2.remote_control.long_description.first = Maak verbinding met en los problemen op van beheerde Microsoft Windows-apparaten via ieder apparaat en iedere browser die HTML ondersteunt. De externe ondersteunings- en beheersfunctie met ingebouwde versleuteling stelt u in staat om veilig toegang te krijgen tot en problemen op te lossen van apparaten, zowel binnen als buiten de bedrijfsfirewall. Functies zijn chatten, bestandsoverdracht twee kanten op en toegang tot een externe ondersteuningsagent. U kunt ook verbinding maken met onbewaakte apparaten via vooraf ingestelde client-geaccepteerde opties voor het bieden van routine-updates of onderhoud of om noodgevallen aan te pakken. Uw gebruikers kunnen een externe ondersteuningssessie aanvragen door op de koppeling Help aanvragen in de systeemlade te klikken.
services_v2.remote_control.long_description.second = * Het verloren product moet zijn ingeschakeld en internettoegang hebben. Deze service is niet gegarandeerd.
services_v2.remote_control.short_description = U kunt vrijwel overal via de browser verbinding maken en problemen met beheerde Microsoft Windows-apparaten oplossen.
services_v2.remote_control.title = Extern beheer
services_v2.security.long_description.first = Bescherm gegevens op beheerde apparaten door beveiligingspolicy's aan te passen, toe te passen en af te dwingen. Zorg dat beveiligingssoftware, zoals firewall- en antivirusbescherming, is geactiveerd.
services_v2.security.long_description.second = Configureer instellingen voor mobiele apparaten, zoals pincode of wachtwoordlengte en schermvergrendelingstijden. Zoek, wis en vergrendel verloren of gestolen apparaten. U kunt ook waarschuwingen krijgen over uw beheerde apparaten, zoals de status van de harde schijf en de accu.
services_v2.security.long_description.second_no_alerts = Configureer instellingen voor mobiele apparaten, zoals pincode of wachtwoordlengte en schermvergrendelingstijden. Zoek, wis en vergrendel verloren of gestolen apparaten.
