services_v2.security.title = Beveiliging
services_v2.software_update.long_description = U kunt policy's met betrekking tot HP hardware, Microsoft en externe software-updates toepassen en beheren. Na het aanmaken kunt u met de policy's software-updates van HP, Microsoft en overige software-uitgevers bewaken en implementeren.
