services_v2.remote_control.long_description.first = 透過任何支援 HTML 的裝置和瀏覽器，連接至託管的 Microsoft Windows 裝置並進行疑難排解。內建加密的遠端支援和控制功能，可讓您安全地存取公司防火牆內外的裝置，以及為其進行疑難排解。功能包括聊天、雙向檔案傳輸，以及第三方支援代理程式存取。您也可以使用預設且客戶接受的方式，連接至無人值守裝置以提供例行更新或維護，或是處理緊急情況。您的使用者可以按一下系統匣中的「請求協助」連結以請求遠端支援工作階段。
services_v2.remote_control.long_description.second = * 遺失的產品必須處於開機狀態並能存取網際網路。此服務無法保證可用。
services_v2.remote_control.short_description = 幾乎可從任何地方透過瀏覽器連接至託管的 Microsoft Windows 裝置並進行疑難排解。
services_v2.remote_control.title = 遠端控制
services_v2.security.long_description.first = 藉由自訂、套用及強制執行安全性原則來保護託管裝置上的資料。確保防火牆和防毒軟體保護等安全性軟體已啟用。
services_v2.security.long_description.second = 配置行動裝置的設定，例如 PIN 或密碼長度及螢幕鎖定時間。尋找、清除和鎖定遺失或遭竊的裝置。此外，接收關於託管裝置 (例如硬碟和電池健全狀況) 的警示。
services_v2.security.long_description.second_no_alerts = 配置行動裝置的設定，例如 PIN 或密碼長度及螢幕鎖定時間。尋找、清除和鎖定遺失或遭竊的裝置。
services_v2.security.short_description = 藉由將自訂層級的安全性原則套用至託管裝置的方式來保護資料。
services_v2.security.title = 安全性
services_v2.software_update.long_description = 套用並管理 HP 硬體、Microsoft 和第三方軟體更新的相關原則。建立後，這些原則可讓您監控和部署來自 HP、Microsoft 和其他軟體發行商的軟體更新。
