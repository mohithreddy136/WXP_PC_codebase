services_v2.find_device.long_description.first = 紛失したり盗まれたりしたデバイスの位置を地図上で特定しようとします。近くにあるかもしれないデバイスの位置を特定するためにアラームを鳴らすこともできます。[%{application_name}]は、自動的にサウンドを有効にし、アラームを鳴らす前にスピーカーのボリュームを最大に設定します。画面ロック（PINブロック）やWindowsログオフを実行したり、または工場出荷時設定にリセットすることによりデータをリモート消去したりできます。
services_v2.find_device.long_description.second = * 紛失した製品は、電源が入っていてインターネットにアクセスできる状態でなければなりません。このサービスは必ず利用できるとは限りません。
services_v2.find_device.short_description = デバイスの位置の特定、ロック、またはリモート消去を行います。近くにあるデバイスのアラームを鳴らします。
services_v2.find_device.title = デバイスの検索
services_v2.header.description = サービス構成の管理
services_v2.header.title = サービス
services_v2.password_recovery.long_description.first = 管理対象のWindowsデバイスのシステム パスワードを忘れてしまった場合に、ユーザー自身がリセットできるようにします。[%{application_name}]プロ パッケージのアカウントと関連付けられているすべての登録済みデバイスに[HP Password Recovery]機能を配布できます。（%{open_italic_tag}初期設定では、この機能は自動的に配布されないため、管理者が[%{application_name}]ダッシュボードの[サービス]タブからパスワード復元機能の配布を有効にする必要があります。%{close_italic_tag}）
services_v2.password_recovery.long_description.second = [HP Password Recovery]機能が展開された後、ユーザーは、3つのセキュリティに関する質問に答えてデバイスを認証し、Windowsパスワードをリセットする必要があります。
services_v2.password_recovery.short_description = 管理対象のMicrosoft Windowsデバイスのパスワードを忘れてしまった場合に、パスワードをリセットします。
services_v2.password_recovery.title = パスワード復元
services_v2.patches.long_description = 登録済みデバイスのソフトウェアの更新の管理
services_v2.patches.short_description = 登録済みデバイスのソフトウェアの更新の管理
services_v2.patches.title = パッチ管理
services_v2.pro_package_advertisement.title = プロ パッケージ サブスクリプションでの高度な機能へのアクセス
services_v2.remote_control.long_description.first = HTMLをサポートする任意のデバイスおよびブラウザーを使用して、管理対象のMicrosoft Windowsデバイスに接続し、トラブルシューティングを行います。暗号化が組み込まれたリモート サポートおよびコントロール機能により、会社のファイアウォールの内部と外部の両方のデバイスに安全にアクセスし、トラブルシューティングを行うことができます。この機能には、チャット、双方向のファイル転送、および他社のサポート エージェントへのアクセスが含まれます。事前設定され、クライアントによって承認済みのオプションを使用して無人のデバイスに接続し、通常の更新やメンテナンスを提供したり、緊急事態に対処したりすることもできます。ユーザーは、システム トレイのヘルプ要求リンクをクリックすることにより、リモート サポート セッションを要求できます。
services_v2.remote_control.long_description.second = * 紛失した製品は、電源が入っていてインターネットにアクセスできる状態でなければなりません。このサービスは必ず利用できるとは限りません。
services_v2.remote_control.short_description = 事実上どこからでも、ブラウザーを使用して管理対象のMicrosoft Windowsデバイスに接続し、トラブルシューティングを行います。
services_v2.remote_control.title = リモート コントロール
services_v2.security.long_description.first = セキュリティ ポリシーをカスタマイズ、適用、および執行して、管理対象デバイス上のデータを保護します。ファイアウォールやウィルス対策などのセキュリティ ソフトウェアが有効になっていることを確認してください。
services_v2.security.long_description.second = PINまたはパスワードの長さや画面をロックアウトするまでの施行回数など、モバイル デバイスの各種設定を行います。紛失したり盗まれたりしたデバイスの検索、データ消去、およびロックを行います。また、ハードドライブやバッテリの状態など、管理対象デバイスに関するアラートを取得します。
services_v2.security.long_description.second_no_alerts = PINまたはパスワードの長さや画面をロックアウトするまでの施行回数など、モバイル デバイスの各種設定を行います。紛失したり盗まれたりしたデバイスの検索、データ消去、およびロックを行います。
services_v2.security.short_description = カスタマイズされたレベルのセキュリティ ポリシーを管理対象デバイスに適用して、データを保護します。
services_v2.security.title = セキュリティ
services_v2.software_update.long_description = HPハードウェア、Microsoft、および他社製ソフトウェアの更新プログラムに関するポリシーを適用し、管理します。ポリシーを作成すると、そのポリシーを使用して、HP、Microsoft、およびその他のソフトウェア発行者からのソフトウェアの更新プログラムを監視し、展開できます。
services_v2.software_update.short_description = Microsoftおよび他社製ソフトウェアの更新プログラムに関するポリシーを[%{application_name}]を通じて適用し、管理します。
services_v2.software_update.title = ソフトウェアの更新プログラム
