services_v2.remote_control.long_description.first = HTML을 지원하는 모든 장치 및 브라우저를 통해 관리되는 Microsoft Windows 장치에 연결하고 문제를 해결합니다. 암호화 기능이 내장된 원격 지원 및 제어 기능을 통해 회사 방화벽 내외부의 장치에 안전하게 액세스하고 문제를 해결할 수 있습니다. 채팅, 양방향 파일 전송, 타사 지원 에이전트 액세스 등의 기능이 있습니다. 나아가 사전 설정된 클라이언트 승인 옵션을 통해 무인 장치에 연결하여 정기적인 업데이트 또는 유지 보수를 제공하거나 긴급 상황을 처리할 수 있습니다. 사용자는 시스템 트레이에서 도움말 요청 링크를 클릭하여 원격 지원 세션을 요청할 수 있습니다.
services_v2.remote_control.long_description.second = * 분실 제품의 전원을 켜고 인터넷에 접속할 수 있어야 합니다. 이 서비스는 보장되지 않습니다.
services_v2.remote_control.short_description = 어디서나 브라우저를 통해 관리되는 Microsoft Windows 장치에 연결하고 문제를 해결할 수 있습니다.
services_v2.remote_control.title = 원격 제어
services_v2.security.long_description.first = 보안 정책을 사용자 정의, 적용 및 시행하여 관리되는 장치의 데이터를 보호합니다. 방화벽 및 바이러스 백신 보호와 같은 보안 소프트웨어가 활성화되었는지 확인할 수 있습니다.
services_v2.security.long_description.second = PIN 또는 암호 길이, 화면 잠금 시간 등 모바일 장치에 대한 설정을 구성합니다. 분실하거나 도난당한 장치를 찾아서 지우고 잠그십시오. 하드 드라이브 및 배터리 상태와 같이 관리 중인 장치에 대한 알림을 받을 수도 있습니다.
services_v2.security.long_description.second_no_alerts = PIN 또는 암호 길이, 화면 잠금 시간 등 모바일 장치에 대한 설정을 구성합니다. 분실하거나 도난당한 장치를 찾아서 지우고 잠그십시오.
services_v2.security.short_description = 사용자 정의된 수준의 보안 정책을 관리되는 장치에 적용하여 데이터를 보호합니다.
services_v2.security.title = 보안
services_v2.software_update.long_description = HP 하드웨어, Microsoft 및 타사 소프트웨어 업데이트와 관련된 정책을 적용하고 관리합니다. 생성된 정책을 사용하면 HP, Microsoft 및 기타 소프트웨어 게시자의 소프트웨어 업데이트를 모니터링하고 배포할 수 있습니다.
