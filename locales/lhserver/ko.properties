services_v2.header.title = 서비스
services_v2.password_recovery.long_description.first = 사용자가 관리 중인 Windows 장치에서 잊어버린 시스템 암호를 재설정할 수 있습니다. HP 암호 복구 기능은 %{application_name} Pro 계정과 연결되어 등록된 모든 Windows 장치에 배포할 수 있습니다. (%{open_italic_tag}기본적으로 이 기능은 자동으로 배포되지 않으므로, 관리자는 %{application_name} 대시보드%{close_italic_tag}의 서비스 탭을 통해 암호 복구 기능을 배포하도록 설정해야 합니다.)
services_v2.password_recovery.long_description.second = HP 암호 복구 기능이 배포된 후 사용자는 장치를 인증하고 Windows 암호를 재설정하기 위해 3가지 보안 질문에 답해야 합니다.
services_v2.password_recovery.short_description = 관리 중인 Microsoft Windows 장치에서 잊어버린 암호를 재설정합니다.
services_v2.password_recovery.title = 암호 복구
