tpm.welcome.banner.description_1 = HP Touchpoint Manager를 사용해 주셔서 감사합니다. 고객 담당자와 나눈 논의에 따라 <a href="//www.hptouchpointmanager.com" target="_hptpm">www.hptouchpointmanager.com</a>의 온라인 포털과 장치용 소프트웨어 클라이언트 설정이 해제됩니다. 2018년 11월 5일 이후로 서비스를 이용할 수 없습니다.
tpm.welcome.banner.description_2 = HP는 고객 엔드포인트를 관리하고 안전하게 유지할 수 있도록 HP TechPulse를 선보입니다. HP TechPulse Proactive Management와 HP TechPulse 분석의 최신 기능은 <a href="//www.hp.com/go/daas" target="_hpdaas">여기</a>에서 자세히 확인할 수 있습니다.
tpm.welcome.banner.description_3 = HP Touchpoint Manager 서비스 종료 또는 HP TechPulse와 관련하여 궁금한 점은 HP 담당자 또는 재판매인에게 문의하십시오.
