services_v2.find_device.long_description.first = 지도에서 분실하거나 도난당한 장치를 찾습니다. 알람을 울려서 근처에 있을지 모르는 장치를 찾을 수도 있습니다. %{application_name}은(는) 자동으로 사운드를 활성화하고 스피커 볼륨을 최대로 설정한 후 알람을 울립니다. 또한, 화면 잠금(PIN 블록), Windows 로그오프를 수행하거나, 공장 출하 시 재설정을 수행하여 원격으로 데이터를 지울 수도 있습니다.
services_v2.find_device.long_description.second = * 분실 제품의 전원을 켜고 인터넷에 접속할 수 있어야 합니다. 이 서비스는 보장되지 않습니다.
services_v2.find_device.short_description = 관리되는 장치를 찾거나 잠그거나 원격으로 지웁니다. 근처에 있는 장치에 알람을 울립니다.
services_v2.find_device.title = 장치 찾기
