services_v2.app_catalog.long_description = iOS 앱 스토어 또는 Google Play 스토어에서 승인된 애플리케이션의 카탈로그를 하나 이상 생성합니다. Windows 실행 파일, 안드로이드 APK 또는 iOS IPA 파일로 사용자 정의 애플리케이션을 추가할 수 있습니다.
