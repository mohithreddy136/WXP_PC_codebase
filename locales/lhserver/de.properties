services_v2.find_device.long_description.first = Versuchen Sie, ein verlorenes oder gestohlenes Gerät auf einer Karte zu finden. Sie können auch einen Alarmton auslösen, um ein Gerät zu finden, dass sich möglicherweise in der Nähe befindet. %{application_name} aktiviert automatisch die Audioausgabe und legt die Lautsprecherlautstärke auf das Maximum fest, bevor der Alarmton ausgegeben wird. Sie können auch den Bildschirm sperren (PIN-Sperre), sich von Windows abmelden oder die Daten durch eine Rücksetzung auf die Werkseinstellungen remote löschen.
services_v2.find_device.long_description.second = * Das verlorene Geräte muss eingeschaltet sein und Zugang zum Internet haben. Dieser Dienst wird nicht garantiert.
services_v2.find_device.short_description = Sie können ein verwaltetes Gerät suchen, sperren oder remote löschen. Geben Sie auf einem Gerät in der Nähe einen Alarmton aus.
services_v2.find_device.title = Gerät suchen
