tpm.welcome.banner.description_1 = Danke, dass Sie sich für HP Touchpoint Manager entschieden haben. Wie wir unseren Kunden bereits mitgeteilt haben, wird das Online-Portal unter <a href="//www.hptouchpointmanager.com" target="_hptpm">www.hptouchpointmanager.com</a> und der Software-Client für Geräte abgeschaltet. Der Service ist nach dem 5. November 2018 nicht mehr verfügbar.
tpm.welcome.banner.description_2 = Wir freuen uns, HP TechPulse anbieten zu können – um Endpunkte bei Kunden zu verwalten und für Sicherheit und einen fehlerfreien Zustand zu sorgen. Details zu unseren aktuellen Funktionen für HP TechPulse Proactive Management mit HP TechPulse Analysen finden Sie <a href="//www.hp.com/go/daas" target="_hpdaas">hier</a>.
tpm.welcome.banner.description_3 = Wenn Sie Fragen zum Ende des HP Touchpoint Manager Services oder zu HP TechPulse haben, wenden Sie sich an Ihren HP Kundendienstmitarbeiter oder Fachhändler.
