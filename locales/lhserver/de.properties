services_v2.header.title = Dienste
services_v2.password_recovery.long_description.first = Bietet Benutzern die Möglichkeit, vergessene Systemkennwörter auf verwalteten Windows-Geräten zurückzusetzen. Die HP Password Recovery-Funktion kann auf registrierte Windows-Geräte verteilt werden, die mit %{application_name} Pro-Konten verbunden sind. (%{open_italic_tag}Die Funktion wird NICHT standardmäßig automatisch verteilt. Der Administrator muss also die Verteilung der Kennwortwiederherstellungs-Funktion über die Registerkarte für Dienste im %{application_name}-Dashboard aktivieren.%{close_italic_tag})
services_v2.password_recovery.long_description.second = Nachdem die HP Password Recovery-Funktion verteilt wurde, muss der Benutzer drei Sicherheitsfragen beantworten, um das Gerät zu authentifizieren und das Windows-Kennwort zurückzusetzen.
services_v2.password_recovery.short_description = Setzen Sie vergessene Kennwörter auf verwalteten Microsoft Windows-Geräten zurück.
services_v2.password_recovery.title = Kennwortwiederherstellung
