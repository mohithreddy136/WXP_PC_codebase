services_v2.patches.title = Patchverwaltung
services_v2.pro_package_advertisement.title = Mit dem Pro-Abonnement haben Sie Zugriff auf erweiterte Funktionen
services_v2.remote_control.long_description.first = Stellen Sie über beliebige Geräte und Browser, die HTML unterstützen, eine Verbindung mit verwalteten Microsoft Windows-Geräten her und beheben Sie Probleme. Die Funktion für Remote-Support und -Kontrolle mit integrierter Verschlüsselung ermöglicht Ihnen sicheren Zugriff auf Geräte innerhalb und außerhalb der Unternehmensfirewall, um Probleme zu beheben. Zu den Funktionen gehören Chat, bidirektionale Dateiübertragung und Zugang zu externen Support-Mitarbeitern. Darüber hinaus können Sie über voreingestellte, vom Client akzeptierte Optionen eine Verbindung mit unbeaufsichtigten Geräten herstellen, um regelmäßig Updates oder Wartung durchzuführen oder Notfälle zu bewältigen. Über einen Link zur Anforderung von Hilfe in der Taskleiste können Ihre Benutzer zudem eine Remote-Support-Sitzung anfordern.
services_v2.remote_control.long_description.second = * Das verlorene Geräte muss eingeschaltet sein und Zugang zum Internet haben. Dieser Dienst wird nicht garantiert.
services_v2.remote_control.short_description = Stellen Sie über den Browser von praktisch überall eine Verbindung mit verwalteten Microsoft Windows-Geräten her und beheben Sie Probleme.
services_v2.remote_control.title = Fernbedienung
services_v2.security.long_description.first = Schützen Sie Daten auf verwalteten Geräten, indem Sie Sicherheitsrichtlinien anpassen, anwenden und erzwingen. Stellen Sie sicher, dass Sicherheitssoftware wie Firewalls und Virenschutzprogramme aktiviert ist.
services_v2.security.long_description.second = Konfigurieren Sie Einstellungen für mobile Geräte wie z. B. die Länge von PINs/Kennwörtern und die Zeiten für Bildschirmsperren. Finden und sperren Sie verloren gegangene oder gestohlene Geräte und löschen Sie die darauf befindlichen Daten. Sie können auch Warnmeldungen zu Ihren verwalteten Geräten erhalten, etwa zum Zustand von Festplatten oder Akkus.
services_v2.security.long_description.second_no_alerts = Konfigurieren Sie Einstellungen für mobile Geräte wie z. B. die Länge von PINs/Kennwörtern und die Zeiten für Bildschirmsperren. Finden und sperren Sie verloren gegangene oder gestohlene Geräte und löschen Sie die darauf befindlichen Daten.
