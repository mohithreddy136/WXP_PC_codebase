services_v2.app_catalog.long_description = Erstellen Sie einen Katalog oder Kataloge genehmigter Anwendungen aus dem iOS App Store oder dem Google Play Store. Sie können benutzerdefinierte Anwendungen mit einer ausführbaren Windows Datei, Android APK- oder iOS IPA-Datei hinzufügen.
