tpm.welcome.banner.description_1 = Grazie per aver utilizzato HP Touchpoint Manager. Come comunicato ai contatti dei nostri clienti, il portale online all'indirizzo <a href="//www.hptouchpointmanager.com" target="_hptpm">www.hptouchpointmanager.com</a> e il client software per i dispositivi saranno disattivati. Dopo il 5 novembre 2018 il servizio non sarà più disponibile.
