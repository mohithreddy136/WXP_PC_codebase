services_v2.find_device.long_description.first = Tenta di individuare un dispositivo smarrito o rubato su una mappa. È possibile far suonare un segnale di allarme per individuare un dispositivo che potrebbe essere nelle vicinanze. %{application_name} abilita automaticamente l'audio e imposta il volume degli altoparlanti al massimo prima che venga fatto suonare l'allarme. È anche possibile eseguire un blocco schermo (blocco PIN), la disconnessione dell'utente da Windows o la cancellazione da remoto dei dati eseguendo un ripristino delle impostazioni di fabbrica.
services_v2.find_device.long_description.second = * Il prodotto smarrito deve essere acceso e avere accesso a Internet. Questo servizio non è garantito.
services_v2.find_device.short_description = Individua, blocca o cancella da remoto un dispositivo gestito. Fa suonare l'allarme di un dispositivo nelle vicinanze.
services_v2.find_device.title = Trova dispositivo
services_v2.header.description = Gestisci la configurazione dei servizi
services_v2.header.title = Servizi
services_v2.password_recovery.long_description.first = Consente agli utenti di reimpostare le password di sistema dimenticate su dispositivi Microsoft Windows gestiti. La funzionalità Recupero password HP è distribuibile su tutti i dispositivi Windows registrati associati con account Pro di %{application_name}. (%{open_italic_tag}Per impostazione predefinita, la funzionalità NON viene distribuita automaticamente, quindi l'amministratore deve abilitare la distribuzione della funzionalità di recupero password nella scheda Servizi del dashboard di %{application_name}.%{close_italic_tag})
services_v2.password_recovery.long_description.second = Una volta eseguita la distribuzione della funzionalità Recupero password HP, l'utente deve rispondere a tre domande di sicurezza per autenticare il dispositivo e ripristinare la password di Windows.
services_v2.password_recovery.short_description = Ripristina password dimenticate su dispositivi Microsoft Windows gestiti.
services_v2.password_recovery.title = Recupero password
