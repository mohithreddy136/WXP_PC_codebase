services_v2.app_catalog.long_description = Crea un catalogo o una serie di cataloghi di applicazioni approvate provenienti da iOS App Store o da Google Play Store. È possibile aggiungere applicazioni personalizzate con un file Windows eseguibile, un APK Android o un IPA iOS. 
