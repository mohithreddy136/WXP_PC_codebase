services_v2.patches.title = Gestione patch
services_v2.pro_package_advertisement.title = Accesso alle funzionalità avanzate con sottoscrizione Pro
services_v2.remote_control.long_description.first = Effettua la connessione e risolvi i problemi di dispositivi Microsoft Windows tramite qualsiasi dispositivo e browser che supporta HTML. La funzionalità di supporto e monitoraggio remoto, con crittografia integrata, consente di accedere in modo sicuro e risolvere i problemi dei dispositivi sia all'interno che all'esterno del firewall aziendale. Le funzionalità includono chat, trasferimento di file bidirezionale e accesso tramite agenti di supporto di terzi. È anche possibile connettersi a dispositivi non presidiati utilizzando opzioni preimpostate accettate dal client per fornire aggiornamenti di routine o manutenzione, oppure gestire emergenze. Gli utenti possono richiedere una sessione di supporto remota facendo clic su un link di richiesta di aiuto nella barra di sistema.
services_v2.remote_control.long_description.second = * Il prodotto smarrito deve essere acceso e avere accesso a Internet. Questo servizio non è garantito.
services_v2.remote_control.short_description = Effettua la connessione e risolve i problemi di dispositivi Microsoft Windows tramite il browser praticamente ovunque.
services_v2.remote_control.title = Controllo remoto
services_v2.security.long_description.first = Consente di protegge i dati sui dispositivi gestiti personalizzando, applicando e imponendo criteri di protezione. Garantisce che il software di protezione, quale firewall e protezione antivirus, sia attivato.
services_v2.security.long_description.second = Permette di configurare impostazioni per dispositivi mobili, quali PIN o lunghezza della password, e durata del blocco dello schermo. Consente di trovare, cancellare dati e bloccare dispositivi smarriti o rubati. Permette inoltre di ottenere avvisi sui dispositivi gestiti, quali integrità di dischi rigidi e batteria.
services_v2.security.long_description.second_no_alerts = Permette di configurare impostazioni per dispositivi mobili, quali PIN o lunghezza della password, e durata del blocco dello schermo. Consente di trovare, cancellare dati e bloccare dispositivi smarriti o rubati.
services_v2.security.short_description = Permette di proteggere i dati applicando livelli personalizzati di criteri di protezione ai dispositivi gestiti.
services_v2.security.title = Protezione
services_v2.software_update.long_description = Consente di applicare e gestire i criteri riguardanti l'hardware HP nonché gli aggiornamenti del software di Microsoft e di terzi. Una volta creati, i criteri consentono di monitorare e distribuire gli aggiornamenti software di HP di Microsoft e altri produttori di software.
services_v2.software_update.short_description = Applicare e gestire i criteri riguardanti gli aggiornamenti software di Microsoft e di terzi tramite %{application_name}.
services_v2.software_update.title = Aggiornamento software
