graphHeaders.Disk_Capacity_Forecasting.Summary.desc_1 = Le rapport de planification de la capacité du disque prévoit la durée restante avant que l'espace disque n'atteigne un seuil prédéterminé. Les seuils sont sélectionnables dans les filtres de rapport et définis comme suit : 0-10 %, 0-20 %, 0-30 %, 0-40 % et 0-50 %.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_10 = 3+. L’espace disque est OK pour au moins 3 mois.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_11 = Sans objet. L’espace disque est OK actuellement, mais il n’y a pas suffisamment de données pour prédire le temps restant avant que l’espace disque n’atteigne le seuil
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_2 = Le rapport utilise les données des 3 à 6 derniers mois pour déterminer le temps restant avant que la capacité du disque n’atteigne le seuil défini dans le filtre de rapport. Les classifications de niveau supérieur pour l’état de la capacité du disque sont les suivantes :
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_3 = Immédiat. L’espace disque restant a atteint la limite
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_4 = D’ici 1 mois. L’espace disque atteindra la limite d'ici 1 mois
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_5 = D’ici 2 mois. L’espace disque atteindra la limite d'ici 2 mois
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_6 = D’ici 3 mois. L’espace disque atteindra la limite d'ici 3 mois
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_7 = OK. L’espace disque sera OK pendant au moins les 1, 2 ou 3 prochains mois en fonction des informations situées dans la colonne d’état supplémentaire.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_8 = 1+. L’espace disque est OK pour au moins 1 mois.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_9 = 2+. L’espace disque est OK pour au moins 2 mois.
