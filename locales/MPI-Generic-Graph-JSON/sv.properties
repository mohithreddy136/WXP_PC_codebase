graphHeaders.User_Mobility_Factor.Summary.desc_1 = Användares mobilitetsaspekter baserat på deras enheters geografiska plats.
graphHeaders.User_Mobility_Factor.Summary.desc_2 = Användarens mobilitetsfaktor under en viss period är baserad på flera komplicerade mobila beteendemönster. Till exempel reser ständigt en del användare med samma eller olika enheter i olika format till olika platser, medan vissa ofta reser fram och tillbaka med sina enheter mellan två eller tre platser, och ytterligare andra ständigt rör sig korta avstånd med sina enheter. Till användares mobilitetsfaktor används den geografiska platsen för användares enheter som är registrerade för HP TechPulse Analytics och Proactive Management, till skillnad från användares plats från externa källor.
graphHeaders.User_Mobility_Factor.Summary.desc_3 = De platsbaserade tjänsterna för att spåra enheters geografiska plats är som standard inaktiverade för alla kunder, och kunderna erbjuds alternativet att aktivera eller inaktivera tjänsterna i den molnbaserade portalen för HP TechPulse Analytics och Proactive Management. Även om platsbaserade tjänster är aktiverade tillåter inte HP TechPulse Analytics och Proactive Management att platsinformation för enheter samlas in för enheter som är klassificerade som ägda av anställda eller personliga enheter (inom den molnbaserade portalen för HP TechPulse Analytics och Proactive Management).
graphHeaders.User_Mobility_Factor.Summary.desc_4 = Användarens mobilitetsfaktor är en gradering på en skala mellan 1 och 10 och är en relativ gradering för alla enheter inom områdena analys och proaktiv hantering. Graderingen 1 indikerar att en användares enheter är minst mobila och graderingen 10 indikerar att en användares enheter är mest mobila. Graderingen -1 indikerar att det inte finns några platsdata för användarens enheter.
graphHeaders.User_Mobility_Factor.Summary.desc_5 = Analysen av användarens mobilitetsfaktor har schemalagts att köras periodvis en gång i början av varje månad. Det senaste schemalagda utförandet var {last_scheduled_date}
graphHeaders.User_Mobility_Factor.Summary.desc_6 = Eftersom schemalagd rapportkörning endast sker en gång i månaden kommer inte den här rapporten att visa de användare och enheter som registrerats eller avregistrerats i HP TechPulse Analytics och Proactive Management efter den senaste schemalagda körningen.
