graphHeaders.Disk_Capacity_Forecasting.Summary.desc_1 = Planeringsrapporten för diskkapacitet meddelar på förhand hur mycket tid som är kvar innan diskutrymmet når en förbestämd tröskel. Trösklarna går att välja i rapportfiltren och definieras som 0–10 %, 0–20 %, 0–30 %, 0–40 % och 0–50 %.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_10 = 3+. Är diskutrymmet OK i minst 3 månader
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_11 = Ej tillämpligt. Diskutrymmet är OK just nu, men det finns inte tillräckligt med data för beräkna hur mycket tid som återstår innan disken når tröskelvärdet
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_2 = Rapporten använder data för de senaste 3–6 månaderna för att avgöra hur mycket tid som återstår innan diskkapaciteten når tröskelvärdet som angavs i rapportfiltret. De främsta kategoriseringsnivåerna för status för diskutrymme är följande:
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_3 = Omedelbart. Det återstående diskutrymmet har nått tröskelvärdet
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_4 = Inom 1 månad. Diskutrymmet kommer att nå tröskelvärdet inom 1 månad
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_5 = Inom 2 månader. Diskutrymmet kommer att nå tröskelvärdet inom 2 månader
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_6 = Inom 3 månader. Diskutrymmet kommer att nå tröskelvärdet inom 3 månader
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_7 = OK. Diskutrymmet kan vara OK för åtminstone de kommande 1, 2 eller 3 månader beroende på informationen i kolumnen för ytterligare status.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_8 = 1+. Är diskutrymmet OK i minst 1 månad
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_9 = 2+. Är diskutrymmet OK i minst 2 månader
