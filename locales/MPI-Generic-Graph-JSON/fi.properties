graphHeaders.Disk_Capacity_Forecasting.Summary.desc_6 = 3 kuukauden kuluessa Levytila saavuttaa raja-arvon 3 kuukauden kuluessa
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_7 = OK. Levytila saattaa olla riittävä ainakin seuraavan yhden, kahden tai kolmen kuukauden ajaksi Lisätila-sarakkeessa annettujen tietojen mukaan
