graphHeaders.Disk_Capacity_Forecasting.Summary.desc_1 = Levyn kapasiteetin suunnitteluraportti kertoo arvion siitä, kuinka paljon aikaa on jäljellä ennen kuin levytila saavuttaa asetetun kynnysarvon. Kynnysarvot ovat valittavissa raportin suodattimista, ja ne on määritetty väleille 0–10 %, 0–20 %, 0–30 %, 0–40 % ja 0–50 %.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_10 = 3+. Levytila on riittävä vähintään 3 kuukauden ajaksi
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_11 = – Levytila on toistaiseksi riittävä, mutta käytettävien tietojen perusteella ei voida ennustaa etukäteen, kuinka kauan kuluu siihen, että levytila saavuttaa raja-arvonsa
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_2 = Raportti käyttää tietoja viimeisen 3–6 kuukauden ajalta sen määrittämiseksi, kuinka paljon aikaa kuluu, ennen kuin levyn kapasiteetti saavuttaa raportin suodattimessa määritetyn raja-arvon. Levyn kapasiteetin tilan ylätason luokitukset ovat seuraavat:
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_3 = Välitön. Jäljellä oleva levytila on saavuttanut raja-arvon
