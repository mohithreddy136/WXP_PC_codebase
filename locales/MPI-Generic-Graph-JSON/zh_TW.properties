graphHeaders.Disk_Capacity_Forecasting.Summary.desc_1 = 磁碟容量規劃報告預測磁碟空間達到預定臨界值之前剩餘的時間長度。臨界值可在報告篩選器中選擇，並定義為 0-10%、0-20%、0-30%、0-40% 和 0-50%。
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_10 = 3+。磁碟空間至少可以使用 3 個月
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_11 = 不適用。目前磁碟空間仍足夠使用，但資料不足以預測磁碟空間達到臨界值之前的剩餘時間
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_2 = 該報告使用過去 3 至 6 個月的資料來判斷距離磁碟容量達到報告篩選器中設定的臨界值之前剩餘的時間。磁碟容量狀態的頂層分類如下:
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_3 = 立即。剩餘磁碟空間已達到臨界值
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_4 = 1 個月內。磁碟空間將在 1 個月內達到臨界值
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_5 = 2 個月內。磁碟空間將在 2 個月內達到臨界值
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_6 = 3 個月內。磁碟空間將在 3 個月內達到臨界值
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_7 = 確定。根據「額外狀態」欄中的資訊，磁碟空間可能至少在接下來的 1、2 或 3 個月內都足夠使用
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_8 = 1+。磁碟空間至少可以使用 1 個月
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_9 = 2+。磁碟空間至少可以使用 2 個月
