graphHeaders.User_Mobility_Factor.Summary.desc_1 = 基於使用者裝置地理位置的使用者行動性分析。
graphHeaders.User_Mobility_Factor.Summary.desc_2 = 使用者在特定期間內的行動性因素，是以多種複雜的行動行為模式為根據。例如，有些使用者經常攜帶相同或不同型態的裝置到不同地點; 有些使用者則頻繁地在兩到三個地點之間往返; 還有些使用者則帶著裝置在短距離內持續移動。使用者行動性因素是基於已註冊於 HP TechPulse Analytics 與 Proactive Management 的裝置地理位置，而非來自任何外部來源的使用者位置。
graphHeaders.User_Mobility_Factor.Summary.desc_3 = 用於追蹤裝置地理位置的定位服務已依預設對所有客戶關閉，並在雲端的 HP TechPulse Analytics 與 Proactive Management 入口網站中提供選項，讓客戶可自行啟用或停用該服務。即使啟用了定位服務，HP TechPulse Analytics 與 Proactive Management 也不會收集任何被分類為員工自有或個人裝置的定位資料 (位於雲端的 HP TechPulse Analytics 與 Proactive Management 入口網站內)。
graphHeaders.User_Mobility_Factor.Summary.desc_4 = 使用者的行動性因素為 1 到 10 之間的排名，並且是在 Analytics 與 Proactive Management 中跨所有裝置的相對排名。排名第 1 表示使用者的裝置行動性最低，排名第 10 表示使用者的裝置行動性最高。排名為 -1 表示使用者裝置沒有位置資料。
graphHeaders.User_Mobility_Factor.Summary.desc_5 = 使用者行動性因素分析預定於每月初定期執行一次。上次排定的執行時間為 {last_scheduled_date}
graphHeaders.User_Mobility_Factor.Summary.desc_6 = 由於每月定期執行的安排，在上次排程執行之後才在 HP TechPulse Analytics 與 Proactive Management 註冊或取消註冊的使用者和裝置將不會出現在此報告中。
