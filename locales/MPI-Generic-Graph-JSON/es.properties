graphHeaders.Disk_Capacity_Forecasting.Summary.desc_1 = El informe de Planificación de la capacidad de disco pronostica el tiempo que queda antes de que el espacio de disco llegue a un umbral predeterminado. Los umbrales se pueden seleccionar en los filtros del informe y se definen como 0-10 %, 0-20 %, 0-30 %, 0-40 % y 0-50 %.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_10 = 3+. El espacio de disco es adecuado para al menos 3 meses
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_11 = N/D. El espacio en disco es adecuado por ahora pero no hay suficientes datos para predecir el tiempo que queda para que el espacio en disco llegue al umbral
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_2 = El informe usa datos de los últimos 3-6 meses para determinar el tiempo que queda antes de que la capacidad de disco llegue al umbral predeterminado en el filtro del informe. Las categorías del nivel superior referentes al Estado de la capacidad de disco son:
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_3 = Inmediato. El espacio en disco restante llegó al umbral
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_4 = Dentro de 1 mes. El espacio de disco llegará al umbral dentro de 1 mes
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_5 = Dentro de 2 meses. El espacio de disco llegará al umbral dentro de 2 meses
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_6 = Dentro de 3 meses. El espacio de disco llegará al umbral dentro de 3 meses
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_7 = Adecuado. El espacio en disco podría ser el adecuado al menos para los próximos 1, 2 o 3 meses según la información de la columna de Estado adicional.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_8 = 1+. El espacio de disco es adecuado para al menos 1 mes
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_9 = 2+. El espacio de disco es adecuado para al menos 2 meses
