graphHeaders.Hardware_Health_new.monthly_summary.desc_1 = El informe de estado del hardware muestra una tendencia mensual de dispositivos no óptimos que aparecen como en mal estado, y facilita el análisis a fondo para identificar los dispositivos que no logran cumplir con las mediciones de rendimiento individuales.
