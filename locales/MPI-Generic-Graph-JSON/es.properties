graphHeaders.User_Mobility_Factor.Summary.desc_1 = Los aspectos de la movilidad de los usuarios según la geolocalización de su dispositivo.
graphHeaders.User_Mobility_Factor.Summary.desc_2 = El factor de movilidad del usuario durante un periodo se basa en varios patrones de comportamiento móvil complejos. Por ejemplo, algunos usuarios viajan constantemente con los mismos dispositivos o con dispositivos distintos, con formatos diferentes y a lugares distintos. Otros usuarios viajan con frecuencia entre dos o tres lugares con sus dispositivos. Y hay otros que se desplazan de manera constante entre distancias cortas con sus dispositivos. El factor de movilidad del usuario aprovecha la geolocalización del dispositivo registrado en HP TechPulse Analytics and Proactive Management, a diferencia de la ubicación de cualquier usuario desde cualquier fuente externa.
graphHeaders.User_Mobility_Factor.Summary.desc_3 = Los servicios basados en la ubicación para rastrear la geolocalización de los dispositivos viene desactivada de forma predeterminada para todos los clientes. En el portal de HP TechPulse Analytics and Proactive Management se brinda una opción para que los clientes habiliten o deshabiliten los servicios basados en la ubicación. Incluso cuando los servicios basados en la ubicación están activados, HP TechPulse Analytics and Proactive Management no permite la recopilación de datos de ubicación del dispositivo en cualquier dispositivo clasificado como personal o de propiedad del empleado (dentro del portal basado en la nube HP TechPulse Analytics and Proactive Management).
graphHeaders.User_Mobility_Factor.Summary.desc_4 = El factor de movilidad del usuario es una clasificación entre 1 y 10 de todos los dispositivos para fines de análisis y administración proactiva. Una clasificación de 1 indica que los dispositivos del usuario son los menos móviles y una clasificación de 10 indica que los dispositivos del usuario son los más móviles. Una clasificación de -1 indica que no hay datos de ubicación referentes a los dispositivos del usuario.
graphHeaders.User_Mobility_Factor.Summary.desc_5 = El análisis del factor de movilidad del usuario está programado para ejecutarse una vez al principio de cada mes. La última ejecución programada fue el {last_scheduled_date}
graphHeaders.User_Mobility_Factor.Summary.desc_6 = Debido a la ejecución programada mensualmente, los usuarios y los dispositivos que se registraron o a los que se les canceló el registro en HP TechPulse Analytics y Proactive Management después de la última ejecución programada no aparecen en este informe.
