graphHeaders.User_Mobility_Factor.Summary.desc_1 = Os aspectos de mobilidade dos usuários com base na geolocalização de seus dispositivos.
graphHeaders.User_Mobility_Factor.Summary.desc_2 = O fator de mobilidade dos usuários durante um período de tempo baseia-se em diversos e complexos padrões de comportamentos móveis. Por exemplo, alguns usuários se locomovem com os mesmos ou com diferentes dispositivos de diversos tamanhos para lugares diferentes constantemente, outros se locomovem entre dois ou três lugares com bastante frequência com seus próprios dispositivos e outros percorrem constantemente distâncias curtas com seus dispositivos. O fator de mobilidade dos usuários utiliza a geolocalização dos dispositivos dos usuários, no caso de dispositivos registrados no Gerenciamento proativo e análise do HP TechPulse, em oposição à localização de qualquer usuário de quaisquer fontes externas.
graphHeaders.User_Mobility_Factor.Summary.desc_3 = Os serviços baseados em localização, que rastreiam a geolocalização de dispositivos, ficam desativados por padrão para todos os clientes, e é disponibilizada aos clientes uma opção para habilitar ou desabilitar os serviços baseados em localização no portal de Gerenciamento proativo e análise do HP TechPulse baseado em nuvem. Até mesmo quando os serviços baseados em localização são habilitados, o gerenciamento proativo e análise do HP TechPulse não permite a coleta de dados de localização de dispositivo em nenhum dispositivo classificado como pessoal ou de propriedade do funcionário (dentro do portal de Gerenciamento proativo e análise do HP TechPulse baseado em nuvem).
graphHeaders.User_Mobility_Factor.Summary.desc_4 = O fator de mobilidade do usuário é uma classificação de 1 a 10, e trata-se de classificar relativamente todos os dispositivos em análise e gerenciamento proativo. A classificação 1 indica que os dispositivos do usuário são os menos móveis, e a classificação 10 indica que os dispositivos do usuário são os mais móveis. A classificação -1 indica que não há dados de localização para os dispositivos do usuário.
graphHeaders.User_Mobility_Factor.Summary.desc_5 = A análise do fator de mobilidade do usuário está agendada para ser realizada periodicamente uma vez no início de cada mês. A última execução agendada foi em {last_scheduled_date}
graphHeaders.User_Mobility_Factor.Summary.desc_6 = Em razão da execução mensal programada, não aparecerão nesse relatório os usuários e dispositivos que foram registrados ou removidos no gerenciamento proativo e de análises do HP TechPulse após a execução programada mais recente.
