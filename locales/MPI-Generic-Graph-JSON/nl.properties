graphHeaders.User_Mobility_Factor.Summary.desc_1 = De mobiliteitsaspecten van gebruikers gebaseerd op de geolocatie van hun apparaat.
graphHeaders.User_Mobility_Factor.Summary.desc_2 = De mobiliteitsfactor van een gebruiker gedurende een periode is gebaseerd op meerdere complexe, mobiele gedragspatronen. Sommige gebruikers reizen bijvoorbeeld voortdurend naar verschillende locaties met hetzelfde of verschillende apparaten met verschillende vormfactors, terwijl anderen regelmatig met hun apparaten tussen twee of drie locaties reizen. Anderen reizen alleen korte afstanden met hun apparaten. De mobiliteitsfactor van een gebruiker is gebaseerd op de geolocatie van hun apparaat voor apparaten die bij HP TechPulse Analytics and Proactive Management is geregistreerd, tegenover de gebruikerslocatie van externe bronnen.
graphHeaders.User_Mobility_Factor.Summary.desc_3 = De locatiegebaseerde services om de geolocatie van apparaten te volgen is standaard voor alle gebruikers uitgeschakeld en er wordt in het HP TechPulse Analytics and Proactive Management cloudportaal een optie geboden om deze functie in of uit te schakelen. Zelfs als locatiegebaseerde services zijn ingeschakeld, kan HP TechPulse Analytics and Proactive Management geen locatiegegevens verzamelen van apparaten die zijn geclassificeerd als apparaten van werknemers of persoonlijke apparaten (in het HP TechPulse Analytics and Proactive Management cloudportaal).
graphHeaders.User_Mobility_Factor.Summary.desc_4 = De mobiliteitsfactor van een gebruiker is een relatief niveau tussen 1 en 10 voor alle apparaten in Analytics en Proactive Management. Een niveau van 1 geeft aan dat de apparaten van de gebruiker het minst mobiel zijn en een niveau van 10 geeft aan dat de apparaten van de gebruiker het meest mobiel zijn. Een niveau van –1 geeft aan dat er een locatiegegevens voor de apparaten van de gebruiker zijn.
graphHeaders.User_Mobility_Factor.Summary.desc_5 = De analyse van de mobiliteitsfactor is periodiek ingepland op eenmaal per maand aan het begin van elke maand. Deze is het laatst uitgevoerd op {last_scheduled_date}
graphHeaders.User_Mobility_Factor.Summary.desc_6 = Wegens de maandelijks ingeplande uitvoering worden gebruikers en apparaten die na de laatste ingeplande uitvoering bij HP TechPulse Analytics and Proactive Management zijn geregistreerd of uitgeschreven, niet weergegeven in dit rapport.
