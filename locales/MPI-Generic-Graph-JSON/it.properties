graphHeaders.User_Mobility_Factor.Summary.desc_1 = Aspetti legati alla mobilità degli utenti in base alla geo-localizzazione dei loro dispositivi.
graphHeaders.User_Mobility_Factor.Summary.desc_2 = Il fattore di mobilità dell'utente in un intervallo di tempo si basa su molteplici schemi di comportamento mobile complessi. Ad esempio, alcuni utenti si spostano costantemente con lo stesso dispositivo o con dispositivi diversi di fattori di forma differenti tra luoghi diversi, mentre altri si spostano spesso avanti e indietro tra due o tre luoghi con i loro dispositivi; altri ancora si spostano costantemente su brevi distanze con i loro dispositivi. Il fattore di mobilità dell'utente ricorre alla geolocalizzazione dei dispositivi dell'utente iscritti al servizio Analytics and Proactive Management di HP TechPulse, anziché ai dati sulla posizione dell'utente provenienti da origini esterne.
graphHeaders.User_Mobility_Factor.Summary.desc_3 = I servizi di localizzazione che consentono la geo-localizzazione dei dispositivi sono disattivati per impostazione predefinita per tutti i clienti, a cui viene tuttavia offerta la possibilità di abilitare o disabilitare i servizi di localizzazione nel portale cloud HP TechPulse Analytics and Proactive Management. Anche se i servizi di localizzazione risultano attivati, HP TechPulse Analytics and Proactive Management non consente la raccolta dei dati sulla localizzazione di tutti i dispositivi aziendali o personali (nel portale cloud HP TechPulse Analytics and Proactive Management).
graphHeaders.User_Mobility_Factor.Summary.desc_4 = Il fattore di mobilità dell'utente è un numero compreso tra 1 e 10 utilizzato per stilare una classifica relativa tra tutti i dispositivi sottoposti ad analisi e gestione dinamica. Un valore pari a 1 indica che i dispositivi dell'utente sono i meno mobili, mentre un valore pari a 10 indica che i dispositivi dell'utente sono i più mobili. Un valore pari a -1 indica che non sono disponibili dati sulla posizione per i dispositivi dell'utente.
graphHeaders.User_Mobility_Factor.Summary.desc_5 = L'analisi del fattore di mobilità dell'utente è pianificata per l'esecuzione periodica una volta all'inizio di ogni mese. L'ultima esecuzione pianificata è avvenuta il {last_scheduled_date}
graphHeaders.User_Mobility_Factor.Summary.desc_6 = A causa dell'esecuzione mensile pianificata, gli utenti e i dispositivi registrati (o di cui è stata annullata la registrazione) in HP TechPulse Analytics and Proactive Management dopo l'ultima esecuzione pianificata non saranno visualizzati nel presente report.
