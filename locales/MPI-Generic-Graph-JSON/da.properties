graphHeaders.User_Mobility_Factor.Summary.desc_1 = Mobilitetsaspekter for brugere baseret på deres enheds geoplacering.
graphHeaders.User_Mobility_Factor.Summary.desc_2 = Brugerens mobilitetsfaktor inden for en tidsperiode er baseret på mange forskellige, komplekse adfærdsmønstre for mobilenheder. Nogle brugere rejser f.eks. hele tiden til forskellige steder med samme eller forskellige enheder med forskellige formfaktorer, hvorimod andre brugere ofte rejser frem og tilbage mellem to eller tre steder med deres enheder, og andre konstant bevæger sig over korte afstande med deres enheder. Brugerens mobilitetsfaktor udnytter brugerenhedens geoplacering for enheder tilmeldt HP TechPulse med Analytics og Proactive Management i modsætning til brugerplaceringer fra andre eksterne kilder.
graphHeaders.User_Mobility_Factor.Summary.desc_3 = De lokalitetsbaserede tjenester til sporing af enheders geoplacering er som standard deaktiveret for alle kunder, og der findes en indstilling, som kunder kan bruge til at aktivere eller deaktivere lokalitetsbaserede tjenester i den cloud-baserede portal for HP TechPulse Analytics og Proactive Management. Selv når de lokalitetsbaserede tjenester er aktiveret, tillader HP TechPulse Analytics og Proactive Management ikke indsamling af lokalitetsdata for enheder klassificeret som medarbejderejede eller personlige enheder (i den cloud-baserede portal for HP TechPulse Analytics og Proactive Management).
graphHeaders.User_Mobility_Factor.Summary.desc_4 = Brugerens mobilitetsfaktor er en bedømmelse på mellem 1 og 10 og er en relativ bedømmelse på tværs af alle enheder, hvad angår analyse og proaktiv administration. En bedømmelse på 1 betyder, at en brugers enheder er mindst muligt mobile, og en bedømmelse på 10 betyder, at en brugers enheder er mest muligt mobile. En bedømmelse på -1 betyder, at der ikke er nogen lokalitetsdata for brugerens enheder.
graphHeaders.User_Mobility_Factor.Summary.desc_5 = Analysen af brugerens mobilitetsfaktor er planlagt til at køre med jævne mellemrum i begyndelsen af hver måned. Den sidst planlagte udførelse var den {last_scheduled_date}
graphHeaders.User_Mobility_Factor.Summary.desc_6 = På grund af den planlagte månedlige udførelse indgår brugere og enheder, der blev tilmeldt eller afmeldt HP TechPulse Analytics and Proactive Management efter den sidste planlagte udførelse, ikke i denne rapport.
