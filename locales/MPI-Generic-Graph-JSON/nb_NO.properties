graphHeaders.Disk_Capacity_Forecasting.Summary.desc_6 = Innen 3 måneder. Gjenværende harddiskplass når terskelen innen 3 måned
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_7 = OK. Harddiskplassen kan være OK for de neste 1, 2 eller 3 månedene, avhengig av informasjonen i kolonnen Ytterligere status.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_8 = 1+. Det er nok harddiskplass for minst 1 måned
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_9 = 2+. Det er nok harddiskplass for minst 2 måneder
