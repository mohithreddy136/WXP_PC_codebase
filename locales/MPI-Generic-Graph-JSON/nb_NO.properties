graphHeaders.Disk_Capacity_Forecasting.Summary.desc_1 = Planleggingsrapporten for harddiskkapasitet forutser gjenværende tid før harddiskkapasiteten når en forhåndsangitt terskel. Terskelen kan velges i rapportens filtre, og defineres som 0–10 %, 0–20 %, 0–30 %, 0–40 % og 0–50 %.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_10 = 3+. Det er nok harddiskplass for minst 3 måneder
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_11 = Ikke relevant. Det er nok harddiskplass for øyeblikket, men ikke nok data til å spå på forhånd hvor lang tid som gjenstår før harddisken når terskelen.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_2 = Rapporten benytter data for de siste 3 til 6 månedene for å fastslå gjenværende tid før harddiskkapasiteten når terskelen angitt i rapportfilteret. Kategoriseringene på øverste nivå for harddiskkapasitet-status er som følger:
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_3 = Umiddelbart. Gjenværende harddiskplass har nådd terskelen
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_4 = Innen 1 måned. Gjenværende harddiskplass når terskelen innen 1 måned
