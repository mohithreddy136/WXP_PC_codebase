graphHeaders.Disk_Capacity_Forecasting.Summary.desc_1 = O relatório de Planeamento de Capacidade de Disco prevê antecipadamente a duração de tempo restante antes do espaço de disco alcançar um limite predeterminado. Os limites são selecionáveis nos filtros de relatório e definidos como 0-10%, 0-20%, 0-30%, 0-40% e 0-50%.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_10 = 3+. O espaço de disco está OK durante, pelo menos, 3 meses
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_11 = N/A. Neste momento, o espaço em disco está OK, mas não existem dados suficientes para prever o tempo restante antes de o disco atingir o limite.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_2 = O relatório utiliza os dados dos últimos 3 a 6 meses para determinar o tempo restante antes da capacidade de disco alcançar o limite definido no filtro do relatório. As categorias de nível superior para o estado da capacidade de disco são as seguintes:
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_3 = Imediato. O espaço em disco restante atingiu o limite.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_4 = Dentro de 1 mês. O espaço de disco alcançará o limite dentro de 1 mês
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_5 = Dentro de 2 meses. O espaço de disco alcançará o limite dentro de 2 meses
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_6 = Dentro de 3 meses. O espaço de disco alcançará o limite dentro de 3 meses
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_7 = OK. De acordo com a informação na coluna "Estado Adicional", o espaço em disco está OK para os próximos 1, 2 ou 3 meses.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_8 = 1+. O espaço de disco está OK durante, pelo menos, 1 mês
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_9 = 2+. O espaço de disco está OK durante, pelo menos, 2 meses
