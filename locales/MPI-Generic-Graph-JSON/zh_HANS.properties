graphHeaders.Disk_Capacity_Forecasting.Summary.desc_1 = “磁盘容量计划”报告预测磁盘空间达到预定阈值之前的持续时间。阈值在报告过滤器中可选，并定义为 0-10%、0-20%、0-30%、0-40% 和 0-50%。
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_10 = 3+。磁盘空间至少在 3 个月内正常
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_11 = 不适用。磁盘空间目前正常，但由于数据不足，无法预测还有多长时间磁盘空间会达到阈值
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_2 = 报告使用最近 3-6 个月的数据确定在磁盘容量达到报告过滤器中设置的阈值之前剩余的时间。“磁盘容量状态”的顶层分类如下所示:
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_3 = 即将。剩余磁盘空间已达到阈值
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_4 = 1 个月内。磁盘空间将在 1 个月内达到阈值
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_5 = 2 个月内。磁盘空间将在 2 个月内达到阈值
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_6 = 3 个月内。磁盘空间将在 3 个月内达到阈值
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_7 = 正常。根据“其他状态”列中的信息，磁盘空间可能至少在接下来的 1、2 或 3 个月内正常
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_8 = 1+。磁盘空间至少在 1 个月内正常
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_9 = 2+。磁盘空间至少在 2 个月内正常
