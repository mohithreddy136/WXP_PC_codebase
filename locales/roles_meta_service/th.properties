daas.customer.default.roles.description.hw_admin = ความสามารถในการจัดการฮาร์ดแวร์ รวมถึงการรักษาความปลอดภัยให้กับระบบปฏิบัติการและแพตช์ ในพื้นที่ใช้งานประเภทลูกค้าสำหรับแอปพลิเคชัน DAAS
