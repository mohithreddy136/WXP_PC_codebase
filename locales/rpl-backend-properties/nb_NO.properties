active.care.account.create.body_msg1  = Takk for at du kjøper <b>HP Premium+ Support eller HP Active Care</b>.
active.care.account.create.body_msg10 = Jeg vil ikke aktivere tjenesten min.
active.care.account.create.body_msg11 = Vennlig hilsen.
active.care.account.create.body_msg12 = HP Active Care Onboarding-team
active.care.account.create.body_msg13 = Med Active Care har du en fullstendig pakke med enhetsbeskyttelse, støtte og reparasjonstjenester, i tillegg til tilgang til HP TechPulse-portalen.
active.care.account.create.body_msg14 = Neste skritt:
active.care.account.create.body_msg15 = Bekreft e-postadressen din ved å logge på <a href={0} style="color: #0096D6;">{0}</a>. Du kan oppgi e-postadressen direkte. Systemet vil veilede deg i opprettingen av et passord hos HP.
active.care.account.create.body_msg16 = Last ned og installer <a href={0} style="color: #0096D6;">HP TechPulse Windows-programmet</a>. Hvis du har flere enheter som skal registreres, følger du <a href={1} style="color: #0096D6;">Active Care-brukerveiledningens</a> instruksjoner på side 8–10.
active.care.account.create.body_msg17 = Ansvarsfraskrivelse
active.care.account.create.body_msg2 = Basert på våre oppføringer for {0}, skal {1} enhet(er) registreres i Active Care-portalen.
active.care.account.create.body_msg3 = Du mottar denne meldingen fordi e-posten din ble oppgitt i en dashbordforespørsel.
active.care.account.create.body_msg4 = Hvis du ikke registrerer deg, vil du gå glipp av noen av de nye funksjonene til HP Active Care, inkludert muligheten til å sende forespørsel og løse maskinvareproblemer eksternt. Din tilbakemelding er viktig for HP. Fortell oss gjerne hva vi kan hjelpe deg med på reisen din:
active.care.account.create.body_msg5 = Jeg trenger mer informasjon og en demonstrasjon. La oss møtes!
active.care.account.create.body_msg6 = Jeg har alt jeg trenger og vil begynne nå.
active.care.account.create.body_msg7 = Hjelp! Jeg har støtt på tekniske problemer!
active.care.account.create.body_msg8 = Jeg har ikke mottatt mine HP-maskinvareenheter.
active.care.account.create.body_msg9 = Jeg er ikke klar til å starte ennå og trenger mer tid.
active.care.account.create.dear = Kjære kunde
active.care.account.create.subject = (navngitt leietaker) Aktivering av HP Premium+ Support og HP Active Care-tjenesten
