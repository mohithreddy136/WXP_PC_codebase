active.care.account.create.body_msg1  = Merci d’avoir acheté <b>HP Premium+ Support ou HP Active Care</b>.
active.care.account.create.body_msg10 = Je ne veux pas activer mon service.
active.care.account.create.body_msg11 = Cordialement.
active.care.account.create.body_msg12 = Équipe Intégration HP Active Care
active.care.account.create.body_msg13 = Avec Active Care, vous disposez d’une suite complète de services de protection, de support et de réparation de périphériques, ainsi que l’accès au portail HP TechPulse.
active.care.account.create.body_msg14 = Étapes suivantes :
active.care.account.create.body_msg15 = Validez votre adresse e-mail en vous connectant à <a href={0} style="color: #0096D6;">{0}</a>. Vous pouvez entrer votre adresse e-mail directement et le système vous guidera pour créer un mot de passe avec HP.
active.care.account.create.body_msg16 = Téléchargez et installez <a href={0} style="color: #0096D6;">l'application Windows HP TechPulse</a>. Si vous avez de nombreux périphériques à inscrire, suivez les <a href={1} style="color: #0096D6;">instructions du Guide de l'utilisateur Active Care</a> situées aux pages 8-10.
active.care.account.create.body_msg17 = Limite de responsabilité
active.care.account.create.body_msg2 = Selon nos dossiers pour {0}, il y a {1} périphériques à inscrire sur le portail Active Care.
active.care.account.create.body_msg3 = Vous recevez ce message car votre adresse e-mail a été fournie dans le cadre d’une demande de tableau de bord.
active.care.account.create.body_msg4 = Si vous ne vous inscrivez pas, vous ne bénéficierez pas de certaines nouvelles fonctionnalités de HP Active Care, notamment la possibilité d’ouvrir un ticket et de résoudre vos problèmes de matériel à distance. Vos commentaires sont importants pour HP. Veuillez nous dire comment nous pouvons vous aider :
active.care.account.create.body_msg5 = J’ai besoin de plus d’informations et d’une démonstration. Rencontrons-nous !
active.care.account.create.body_msg6 = J’ai tout ce dont j’ai besoin et vais commencer dès maintenant.
active.care.account.create.body_msg7 = À l’aide ! J’ai rencontré des problèmes techniques !
active.care.account.create.body_msg8 = Je n’ai pas reçu mes périphériques matériels HP.
active.care.account.create.body_msg9 = Je ne suis pas prêt à commencer et ai besoin de plus de temps.
active.care.account.create.dear = Chère cliente, Cher client,
active.care.account.create.subject = (nom tenant) Activation du service HP Premium+ Support et HP Active Care
