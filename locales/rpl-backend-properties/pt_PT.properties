onboarding.confirmation.message2.active_care_newformat = A sua conta foi ativada para aceder ao HP Active Care. Se já possui uma conta Azure Active Directory ou uma conta HP com o e-mail <b>{1}</b>, pode utilizá-la para iniciar sessão em <a style='word-break: break-all; color: #007dba; text-decoration: none;' href={2}>{3}</a>
onboarding.confirmation.new_message2 = Se ainda não tiver um ID de conta HP, poderá criá-lo durante este processo de inscrição.
onboarding.confirmation.new_message3 = Aqui estão apenas alguns exemplos de como o HP Active Care assegura o seu funcionamento.
