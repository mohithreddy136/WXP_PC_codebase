active.care.account.create.body_msg1  = Obrigado por adquirir o <b>HP Premium+ Support ou HP Active Care</b>.
active.care.account.create.body_msg10 = Não quero ativar o meu serviço.
active.care.account.create.body_msg11 = Cumprimentos,
active.care.account.create.body_msg12 = Equipa de Integração HP Active Care
active.care.account.create.body_msg13 = Com o Active Care, tem um conjunto completo de proteção de dispositivos, suporte e serviços de reparação, assim como acesso ao portal HP TechPulse.
active.care.account.create.body_msg14 = Passos seguintes:
active.care.account.create.body_msg15 = Valide o seu email ao iniciar sessão em <a href={0} style="color: #0096D6;">{0}</a>. Pode introduzir diretamente o seu email e o sistema irá guiá-lo na criação de uma palavra-passe com a HP.
active.care.account.create.body_msg16 = Transfira e instale a <a href={0} style="color: #0096D6;">aplicação HP TechPulse Windows</a>. Se tem vários dispositivos para registar, siga as instruções do <a href={1} style="color: #0096D6;">Manual do Utilizador Active Care</a> localizadas nas páginas 8 a 10.
active.care.account.create.body_msg17 = Exclusão de responsabilidade
active.care.account.create.body_msg2 = Com base nos nossos registos para {0}, existem {1} dispositivos registados no portal Active Care.
active.care.account.create.body_msg3 = Está a receber esta mensagem porque o seu email foi fornecido num pedido no painel.
active.care.account.create.body_msg4 = Se não se registar, perderá algumas das novas funcionalidades do HP Active Care, incluindo a capacidade de criar pedidos de suporte e resolver os seus problemas de hardware de forma remota. Os seus comentários são importantes para a HP. Diga-nos como podemos ajudá-lo:
active.care.account.create.body_msg5 = Necessito de mais informações e uma demonstração. Vamos nos encontrar!
active.care.account.create.body_msg6 = Tenho tudo o que necessito e vou começar agora.
active.care.account.create.body_msg7 = Ajuda! Deparei-me com problemas técnicos!
active.care.account.create.body_msg8 = Não recebi os meus dispositivos de hardware HP.
active.care.account.create.body_msg9 = Ainda não estou pronto para começar e necessito de mais tempo.
active.care.account.create.dear = Estimado cliente,
active.care.account.create.subject = (named tenant) Ativação de HP Premium+ Support e HP Active Care Service
