onboarding.display.msg_10 = Mantenha os PCs nas melhores condições
onboarding.display.msg_2 = As reparações de TI são agendadas de forma imediata e automática, assegurando o menor abrandamento possível de produtividade.
onboarding.display.msg_3 = Prolongue a vida útil do seu hardware ao identificar as reparações necessárias antes de se tornarem um problema.
