onboarding.display.msg_4 = © Copyright {0} HP Development Company, L.P. 이 설명서의 내용은 조건에 따라 사전 통지 없이 변경될 수 있습니다. HP 제품 및 서비스에 대한 유일한 보증은 제품 및 서비스와 함께 동봉된 보증서에 명시되어 있습니다. 이 설명서에는 어떠한 추가 보증 내용도 들어 있지 않습니다. HP는 이 설명서의 기술상 또는 편집상 오류나 누락에 대해 책임지지 않습니다.
onboarding.display.msg_5 = 질문이 있는 경우 HP 지원에 문의하십시오.
