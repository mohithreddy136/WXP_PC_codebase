active.care.account.create.body_msg1  = <b>HP Premium+ Support 또는 HP Active Care</b>를 구매해 주셔서 감사합니다.
active.care.account.create.body_msg10 = 서비스를 활성화하고 싶지 않습니다.
active.care.account.create.body_msg11 = 감사합니다.
active.care.account.create.body_msg12 = HP Active Care 온보딩 팀
active.care.account.create.body_msg13 = Active Care에서는 장치 보호, 지원, 복구 서비스 및 HP TechPulse 포털 액세스로 이루어진 전체 제품군이 제공됩니다.
active.care.account.create.body_msg14 = 다음 단계:
active.care.account.create.body_msg15 = <a href={0} style="color: #0096D6;">{0}</a>에 로그인하여 이메일을 검증하십시오. 이메일을 직접 입력할 수도 있으며, 이 경우 HP에서 암호를 만드는 절차가 안내됩니다.
active.care.account.create.body_msg16 = <a href={0} style="color: #0096D6;">HP TechPulse Windows 애플리케이션</a>을 다운로드하고 설치하십시오. 등록할 장치가 많은 경우 8~10페이지에 있는 <a href={1} style="color: #0096D6;">Active Care 사용자 안내서</a>의 지침을 따르십시오.
active.care.account.create.body_msg17 = 법적 부인
active.care.account.create.body_msg2 = {0}에 대한 저희 기록에 따르면 {1}개의 장치가 Active Care 포털에 등록되어 있습니다.
active.care.account.create.body_msg3 = 대시보드 요청 시 이메일이 제공되어 이 메시지를 수신합니다.
active.care.account.create.body_msg4 = 등록하지 않으면 원격으로 티켓을 제공하는 기능과 하드웨어 문제를 해결하는 기능 등 HP Active Care의 새로운 기능 일부를 이용할 수 없게 됩니다. HP는 귀하의 피드백을 소중히 여깁니다. 다양한 과정에서 어떤 도움이 필요한지 알려주십시오.
active.care.account.create.body_msg5 = 자세한 정보와 데모가 필요합니다. 지금 시작하십시오!
active.care.account.create.body_msg6 = 필요한 정보가 모두 있고 지금 시작합니다.
active.care.account.create.body_msg7 = 도와주십시오! 기술 문제가 발생했습니다!
active.care.account.create.body_msg8 = 내 HP 하드웨어 장치를 받지 못했습니다.
active.care.account.create.body_msg9 = 시작할 준비가 되지 않았고 시간이 더 필요합니다.
active.care.account.create.dear = 고객 여러분께,
active.care.account.create.subject = (named tenant) HP Premium+ Support 및 HP Active Care 서비스 활성화
global.idm.product_name.daas = HP TechPulse
