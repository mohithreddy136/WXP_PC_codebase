onboarding.confirmation.message1.techpulse_newformat = TechPulse에서 제공하는 {0}에서 계정이 활성화되었습니다. Azure Active Directory나 이메일 주소(<b>{1}</b>)를 사용하는 HP 계정 ID로 <a style='word-break: break-all; color: #007dba; text-decoration: none;' href='{2}'>{3}</a>에서 계정을 만들 수 있습니다.
onboarding.confirmation.message2 = 아직 HP 계정이 없다면 로그인 프로세스 동안 계정을 만들 수 있습니다.
onboarding.confirmation.message2.active_care_newformat = HP Active Care에 액세스하기 위해 계정을 활성화했습니다. Azure Active Directory 계정이나 <b>{1}</b> 이메일을 사용하는 HP 계정이 이미 있는 경우, 이를 통해 <a style='word-break: break-all; color: #007dba; text-decoration: none;' href={2}>{3}</a>에 로그인할 수 있습니다.
onboarding.confirmation.new_message2 = 아직 HP 계정 ID가 없다면 로그인 프로세스 동안 만들 수 있습니다.
onboarding.confirmation.new_message3 = 다음은 HP Active Care를 통해 안정적으로 실행하는 몇 가지 방법입니다.
onboarding.confirmation.new_ordered_list_2 = 다음으로 오른쪽 위에 있는 <b>로그인</b> 버튼을 선택합니다.
onboarding.confirmation.new_ordered_list_3 = 이제 로그인 상자 아래에서 <b>계정이 없으십니까? 가입</b> 링크를 선택합니다.
onboarding.confirmation.new_ordered_list_4 = <b>{0}</b>을(를) 이메일 주소로 사용하여 필수 필드를 입력하고 <b>계정 만들기</b>를 선택합니다.
onboarding.confirmation.new_ordered_list_7 = 완료되었습니다.
