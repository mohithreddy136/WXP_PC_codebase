sign_in_change_notification.invite.body.content_1 = First, create your new HP account by clicking on the <b> "Go to HP TechPulse" </b> button below.
sign_in_change_notification.invite.body.content_2 = Verrà visualizzata la pagina <a {0}> {1} </a>.
sign_in_change_notification.invite.body.content_3 = Next, click on the <b> "Sign In" </b> button to display the sign-in screen.
sign_in_change_notification.invite.body.content_4 = Now, click the <b> "Don't have an account? Sign up" </b> link.
sign_in_change_notification.invite.body.content_5 = Immettere le informazioni nei campi obbligatori utilizzando <b >[ {0} ] </b> come indirizzo e-mail.
sign_in_change_notification.invite.body.content_5_nobracke = Immettere le informazioni nei campi obbligatori utilizzando <b>[{0}]</b> come indirizzo e-mail.
sign_in_change_notification.invite.body.content_5_nobracket = Immettere le informazioni nei campi obbligatori utilizzando <b>[{0}]</b> come indirizzo e-mail.
sign_in_change_notification.invite.body.content_6 = Verrà inviato un codice di verifica al proprio indirizzo e-mail.
sign_in_change_notification.invite.body.content_7 = Inserire il codice di verifica.
sign_in_change_notification.invite.body.content_8 = La registrazione è stata completata.
