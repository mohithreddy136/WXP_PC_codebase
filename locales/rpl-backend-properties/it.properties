active.care.account.create.body_msg1  = Grazie per avere acquistato <b>HP Premium+ Support o HP Active Care</b>.
active.care.account.create.body_msg10 = Non voglio attivare il mio servizio.
active.care.account.create.body_msg11 = Cordiali saluti.
active.care.account.create.body_msg12 = Team di onboarding di HP Active Care
active.care.account.create.body_msg13 = Con Active Care, ottieni una suite completa di servizi di protezione, supporto e riparazione dispositivi, nonché l’accesso al portale HP TechPulse.
active.care.account.create.body_msg14 = Prossimi passaggi:
active.care.account.create.body_msg15 = Convalida la tua e-mail accedendo a <a href={0} style="color: #0096D6;">{0}</a>. Puoi inserire la tua e-mail direttamente e il sistema ti guiderà a creare una password con HP.
active.care.account.create.body_msg16 = Scarica e installa l'applicazione <a href={0} style="color: #0096D6;">HP TechPulse Windows</a>. Se devi registrare molteplici dispositivi, segui le istruzioni della <a href={1} style="color: #0096D6;">Guida per l'utente di Active Care</a> riportate alle pagine 8-10.
active.care.account.create.body_msg17 = Dichiarazione di non responsabilità
active.care.account.create.body_msg2 = In base ai nostri record per {0}, sono presenti {1} dispositivi da registrare nel portale Active Care.
active.care.account.create.body_msg3 = Questo messaggio comunica che l'indirizzo e-mail dell'utente è stato inserito in una richiesta del dashboard.
active.care.account.create.body_msg4 = Se non ti registri, perderai alcune delle nuove funzionalità di HP Active Care, compresa la possibilità di aprire ticket e risolvere i tuoi problemi hardware in remoto. Il tuo feedback è importante per HP. Facci sapere come possiamo assisterti nel tuo viaggio:
active.care.account.create.body_msg5 = Ho bisogno di maggiori informazioni e di una demo. Incontriamoci!
active.care.account.create.body_msg6 = Ho tutto ciò di cui ho bisogno e inizierò ora.
active.care.account.create.body_msg7 = Mi serve aiuto! Ho dei problemi tecnici!
active.care.account.create.body_msg8 = Non ho ricevuto i miei dispositivi hardware HP.
active.care.account.create.body_msg9 = Non sono ancora pronto per iniziare e ho bisogno di più tempo.
active.care.account.create.dear = Gentile cliente,
active.care.account.create.subject = (named tenant) Attivazione dell'assistenza HP Premium+ Support e HP Active Care
global.idm.product_name.daas = HP TechPulse
onboarding.confirmation.latest_order_1 = Next, select the <b>Sign In</b> button to display the sign in screen.
onboarding.confirmation.latest_order_2 = Ora, selezionare il link <b>“Non hai un account? Registrati”</b>.
onboarding.confirmation.latest_order_3 = Immettere le informazioni nel campo obbligatorio utilizzando <b>{0}</b> come indirizzo e-mail.
onboarding.confirmation.message1.edited_nospace_product = L’account è stato abilitato per accedere a {0}. Se si dispone già di un account Azure Active Directory o di un account HP con l’indirizzo e-mail <b>{1}</b>, è possibile utilizzarlo per accedere a <a {2}>{3}</a>.
onboarding.confirmation.message1.techpulse_newformat = L’account è stato abilitato per {0} gestito da TechPulse. È possibile creare il tuo account usando Azure Active Directory o il tuo ID account HP con l'indirizzo e-mail <b>{1}</b> all'indirizzo <a style='word-break: break-all; color: #007dba; text-decoration: none;' href='{2}'>{3}</a>.
onboarding.confirmation.message2 = Se non si possiede ancora un account HP, sarà possibile crearne uno durante la procedura di registrazione.
onboarding.confirmation.message2.active_care_newformat = L’account è stato abilitato per accedere ad HP Active Care. Se si dispone già di un account Azure Active Directory o di un account HP con l’indirizzo e-mail <b>{1}</b>, è possibile utilizzarlo per accedere a <a style='word-break: break-all; color: #007dba; text-decoration: none;' href={2}>{3}</a>
onboarding.confirmation.new_message2 = Se non si possiede ancora un ID account HP, è possibile crearne uno durante questo processo di registrazione.
onboarding.confirmation.new_message3 = Ecco alcuni dei modi in cui HP Active Care mantiene tutto in funzione.
onboarding.confirmation.new_ordered_list_2 = Poi, selezionare il pulsante <b>Sign In</b> nell'angolo in alto a destra.
onboarding.confirmation.new_ordered_list_3 = Ora, selezionare il link <b>Non hai un account? Registrati</b> sotto la casella di accesso.
onboarding.confirmation.new_ordered_list_4 = Compilare i campi richiesti usando <b>{0}</b> come indirizzo email e selezionare <b>Create Account</b>.
onboarding.confirmation.new_ordered_list_7 = È tutto pronto.
onboarding.confirmation.signature = Il team HP Services
onboarding.confirmation.step1 = In primo luogo, passare a <a {0}> {1} </a>.
onboarding.confirmation.step1.nospace = In primo luogo, passare a <a {0}>{1}</a>.
onboarding.confirmation.subject = Iniziamo con l'account
