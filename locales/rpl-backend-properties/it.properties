onboarding.display.msg_1 = Traccia rapidamente la diagnosi del problema e la possibile risoluzione per far tornare al lavoro i dipendenti il prima possibile.
onboarding.display.msg_10 = Mantieni i PC al massimo delle prestazioni
onboarding.display.msg_2 = Le riparazioni IT sono programmate immediatamente e automaticamente, garantendo rallentamenti minimi della produttività.
onboarding.display.msg_3 = Estendi la durata del tuo hardware identificando le riparazioni richieste prima che diventino un problema.
onboarding.display.msg_4 = © Copyright {0} HP Development Company, L.P. Le informazioni contenute in questo documento sono soggette a modifica senza preavviso. Le uniche garanzie sui prodotti e sui servizi HP sono esposte nelle dichiarazioni di garanzia esplicita che accompagnano i suddetti prodotti e servizi. Nulla di quanto contenuto nel presente documento va interpretato come costituente una garanzia aggiuntiva. HP non risponde di eventuali omissioni o errori tecnici o editoriali contenuti nel presente documento.
onboarding.display.msg_5 = Contattare il supporto HP in caso di domande.
onboarding.display.msg_6 = Ecco alcuni dei modi in cui HP Active Care mantiene tutto in funzione.
onboarding.display.msg_7 = Learn more at
onboarding.display.msg_8 = Riduci al minimo le interruzioni
onboarding.display.msg_9 = Risolvi rapidamente i problemi
