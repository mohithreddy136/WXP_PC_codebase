active.care.account.create.body_msg11 = 顺祝商祺。
active.care.account.create.body_msg12 = HP Active Care 内置团队
active.care.account.create.body_msg13 = 通过 Active Care，您可以获得一整套设备保护、支持和维修服务，并可以访问 HP TechPulse 门户。
active.care.account.create.body_msg14 = 后续步骤:
active.care.account.create.body_msg15 = 请登录 <a href={0} style="color: #0096D6;">{0}</a> 来验证您的电子邮件。可以直接输入您的电子邮件，系统将指导您创建 HP 密码。
active.care.account.create.body_msg16 = 下载并安装 <a href={0} style="color: #0096D6;">HP TechPulse Windows 应用程序</a>。如果您要注册多台设备，请按照 <a href={1} style="color: #0096D6;">Active Care 用户指南</a>中的说明(第 8-10 页)执行操作。
active.care.account.create.body_msg17 = 免责声明
active.care.account.create.body_msg2 = 根据我们对 {0} 的记录，有 {1} 台设备需要在 Active Care 门户中注册。
active.care.account.create.body_msg3 = 您之所以收到此消息是因为在一项仪表板请求中提供了您的电子邮件。
active.care.account.create.body_msg4 = 如果不注册，您将无法使用 HP Active Care 的一些新增功能，包括远程票据和硬件问题解决能力。您的反馈对 HP 至关重要。请告诉我们如何在您的旅程中为您提供帮助:
active.care.account.create.body_msg5 = 我需要更多信息和演示。请为我安排会面!
active.care.account.create.body_msg6 = 我已拥有所需的一切，现在就开始。
active.care.account.create.body_msg7 = 需要帮助! 我遇到了技术问题!
active.care.account.create.body_msg8 = 我还没有收到我的 HP 硬件设备。
active.care.account.create.body_msg9 = 我还没有准备好开始，并且需要更多时间。
active.care.account.create.dear = 尊敬的客户:
active.care.account.create.subject = (指定租户) HP Premium+ Support 和 HP Active Care 服务激活
