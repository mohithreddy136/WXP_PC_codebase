onboarding.confirmation.message2.active_care_newformat = お客様のアカウントは、[HP Active Care]へのアクセスが有効になっています。[Azure Active Directory]アカウントまたは電子メール アドレス<b>{1}</b>のHPアカウントをすでにお持ちの場合は、そのアカウントを使用して次にサインインできます：<a style='word-break: break-all; color: #007dba; text-decoration: none;' href={2}>{3}</a>
onboarding.confirmation.new_message2 = HPアカウントIDをまだお持ちでない場合は、サインアップ プロセスで新しいアカウントを作成できます。
onboarding.confirmation.new_message3 = ここでは、[HP Active Care]が稼働状態を維持する方法をいくつかご紹介します。
onboarding.confirmation.new_ordered_list_2 = 次に、右上の<b>[サインイン]</b>ボタンを選択します。
onboarding.confirmation.new_ordered_list_3 = ログイン ボックスの下にある<b>[アカウントをまだお持ちでない場合はこちらからサインアップ]</b>リンクを選択します。
onboarding.confirmation.new_ordered_list_4 = 入力必須フィールドに入力します。電子メール アドレスには、<b>{0}</b>を使用し、<b>[アカウントの作成]</b>を選択します。
onboarding.confirmation.new_ordered_list_7 = 準備が完了しました。
