active.care.account.create.body_msg1  = <b>[HP Premium+ Support]または[HP Active Care]</b>をご購入いただきありがとうございます。
active.care.account.create.body_msg10 = サービスを有効にしたくない。
active.care.account.create.body_msg11 = 今後ともよろしくお願いいたします。
active.care.account.create.body_msg12 = [HP Active Care]オンボーディング チーム
active.care.account.create.body_msg13 = [Active Care]を使用すると、デバイス保護、サポート、修理サービスの完全なスイートを利用し、[HP TechPulse]ポータルにアクセスすることができます。
active.care.account.create.body_msg14 = 次の手順：
active.care.account.create.body_msg15 = <a href={0} style="color: #0096D6;">{0}</a>にサインインして電子メールをご確認ください。電子メール アドレスを直接入力し、システムの案内に従ってHPでのパスワードを作成できます。
active.care.account.create.body_msg16 = <a href={0} style="color: #0096D6;">[HP TechPulse]のWindowsアプリケーション</a>をダウンロードしてインストールしてください。登録するデバイスが多数ある場合は、<a href={1} style="color: #0096D6;">[Active Care]ユーザー ガイド</a>の8～10ページにある指示に従ってください。
active.care.account.create.body_msg17 = 免責事項
active.care.account.create.body_msg2 = {0}の記録に基づき、{1}台のデバイスが[Active Care]ポータルの登録対象となっています。
active.care.account.create.body_msg3 = ダッシュボードのリクエストに電子メール アドレスが提示されていたため、このメッセージが送信されています。
active.care.account.create.body_msg4 = ご登録いただけない場合、ハードウェアの問題に関するリモートでのチケット作成や解決など、[HP Active Care]の一部の新機能を使用することができません。HPにとってお客様からのご意見、ご感想は貴重です。HPの支援が必要な場合はお知らせください。
active.care.account.create.body_msg5 = 詳細情報やデモを見たい。ご覧ください。
active.care.account.create.body_msg6 = 必要なものがそろっているのですぐに始めたい。
active.care.account.create.body_msg7 = サポートが必要。技術的な問題が発生した。
active.care.account.create.body_msg8 = HPハードウェア デバイスを受け取っていない。
active.care.account.create.body_msg9 = 始める準備ができていないのでもう少し時間が必要。
active.care.account.create.dear = お客様各位
active.care.account.create.subject = (名前付きテナント) HP Premium+ SupportおよびHP Active Careサービスの有効化
