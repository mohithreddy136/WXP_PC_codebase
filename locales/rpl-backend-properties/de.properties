onboarding.confirmation.message2 = Wenn Sie noch kein HP Konto haben, können Sie es während des Anmeldeprozesses erstellen.
onboarding.confirmation.message2.active_care_newformat = Ihr Konto wurde für den Zugriff auf HP Active Care aktiviert. Wenn Sie bereits über ein Azure Active Directory-Konto oder HP Konto mit der E-Mail-Adresse <b>{1}</b> verfügen, können Sie sich damit anmelden bei: <a style='word-break: break-all; color: #007dba; text-decoration: none;' href={2}>{3}</a>
onboarding.confirmation.new_message2 = Wenn Sie noch kein HP Konto haben, können Sie es während des Registrierungsprozesses erstellen.
onboarding.confirmation.new_message3 = Im Folgenden sind einige Beispiele dafür aufgeführt, wie HP Active Care dafür sorgt, dass Sie stets einsatzbereit sind.
onboarding.confirmation.new_ordered_list_2 = Klicken Sie anschließend auf die Schaltfläche <b>Anmelden</b> oben rechts.
onboarding.confirmation.new_ordered_list_3 = Klicken Sie jetzt auf den Link <b>Sie haben noch kein Konto? Registrieren</b> unterhalb des Anmeldefensters.
onboarding.confirmation.new_ordered_list_4 = Füllen Sie die erforderlichen Felder aus, geben Sie die E-Mail-Adresse <b>{0}</b> ein und klicken Sie auf <b>Konto erstellen</b>.
onboarding.confirmation.new_ordered_list_7 = Alles ist eingerichtet, Sie sind startklar.
