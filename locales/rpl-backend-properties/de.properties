active.care.account.create.body_msg1  = Vielen Dank, dass Sie sich für <b>HP Premium+ Support oder HP Active Care</b> entschieden haben.
active.care.account.create.body_msg10 = Ich möchte meinen Service nicht aktivieren.
active.care.account.create.body_msg11 = Mit freundlichen Grüßen
active.care.account.create.body_msg12 = HP Active Care Onboarding-Team
active.care.account.create.body_msg13 = Mit Active Care erhalten Sie ein umfassendes Angebot an Geräteschutz-, Support- und Reparaturservices sowie Zugriff auf das HP TechPulse-Portal.
active.care.account.create.body_msg14 = Nächste Schritte:
active.care.account.create.body_msg15 = Validieren Sie Ihre E-Mail-Adresse, indem Sie sich anmelden bei <a href={0} style="color: #0096D6;">{0}</a>. Sie können Ihre E-Mail-Adresse auch direkt eingeben, woraufhin das System Sie anleitet, ein Kennwort bei HP zu erstellen.
active.care.account.create.body_msg16 = Laden Sie folgende Anwendung herunter und installieren Sie sie: <a href={0} style="color: #0096D6;">HP TechPulse Windows</a>. Wenn Sie eine große Zahl von Geräten registrieren müssen, folgen Sie den Anweisungen im <a href={1} style="color: #0096D6;">Benutzerhandbuch zu Active Care</a> auf den Seiten 8–10.
active.care.account.create.body_msg17 = Haftungsausschluss
active.care.account.create.body_msg2 = Basierend auf unseren Informationen für {0} gibt es {1} Geräte, die für das Active Care-Portal registriert werden müssen.
active.care.account.create.body_msg3 = Sie erhalten diese Nachricht, weil Ihre E-Mail-Adresse in einer Dashboard-Anfrage angegeben wurde.
active.care.account.create.body_msg4 = Wenn Sie keine Geräte registrieren, verpassen Sie einige der neuen Funktionen von HP Active Care, einschließlich der Möglichkeit, Ihre Hardware-Probleme aus der Ferne zu melden und zu lösen. Ihr Feedback ist sehr wichtig für HP. Bitte teilen Sie uns mit, wie wir Sie bei Ihrem Vorhaben unterstützen können:
active.care.account.create.body_msg5 = Ich benötige weitere Informationen und eine Demo. Wie wär's mit einem Meeting?
active.care.account.create.body_msg6 = Ich habe alles, was ich brauche, und fange jetzt an.
active.care.account.create.body_msg7 = Hilfe! Ich bin auf technische Probleme gestoßen!
active.care.account.create.body_msg8 = Ich habe meine HP Hardwaregeräte nicht erhalten.
active.care.account.create.body_msg9 = Ich bin noch nicht so weit und brauche mehr Zeit.
active.care.account.create.dear = Lieber Kunde,
active.care.account.create.subject = (named tenant) HP Premium+ Support und HP Active Care Service-Aktivierung
