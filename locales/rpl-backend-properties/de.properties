sign_in_change_notification.invite.body.content_1 = First, create your new HP account by clicking on the <b> "Go to HP TechPulse" </b> button below.
sign_in_change_notification.invite.body.content_2 = Sie werden zur Seite <a {0}> {1} </a> weitergeleitet.
sign_in_change_notification.invite.body.content_3 = Next, click on the <b> "Sign In" </b> button to display the sign-in screen.
sign_in_change_notification.invite.body.content_4 = Now, click the <b> "Don't have an account? Sign up" </b> link.
sign_in_change_notification.invite.body.content_5 = Füllen Sie die erforderlichen Felder aus und verwenden Sie dabei <b >[ {0} ] </b> als E-Mail-Adresse.
sign_in_change_notification.invite.body.content_5_nobracke = Füllen Sie die erforderlichen Felder aus und verwenden Sie dabei <b>{0}</b> als E-Mail-Adresse.
sign_in_change_notification.invite.body.content_5_nobracket = Füllen Sie die erforderlichen Felder aus und verwenden Sie dabei <b>{0}</b> als E-Mail-Adresse.
sign_in_change_notification.invite.body.content_6 = Ein Prüfcode wird an Ihre E-Mail-Adresse gesendet.
sign_in_change_notification.invite.body.content_7 = Geben Sie den Prüfcode ein.
sign_in_change_notification.invite.body.content_8 = Und schon sind Sie startklar!
