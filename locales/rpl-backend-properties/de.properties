onboarding.confirmation.latest_order_1 = Next, select the <b>Sign In</b> button to display the sign in screen.
onboarding.confirmation.latest_order_2 = Klicken Sie jetzt auf den Link <b>"Sie haben noch kein Konto? Anmelden"</b>.
onboarding.confirmation.latest_order_3 = Füllen Sie das erforderliche Feld aus und verwenden Sie dabei <b>{0}</b> als E-Mail-Adresse.
onboarding.confirmation.message1.edited_nospace_product = Ihr Konto wurde für den Zugriff auf {0} aktiviert. Wenn Sie bereits ein Azure Active Directory-Konto oder HP Konto mit der E-Mail-Adresse <b>{1}</b> haben, können Sie sich damit bei <a {2}>{3}</a> anmelden.
