exp.EarlyDetectionWear.causeConstantCharge=Maintenir la batterie constamment chargée à 100 %, surtout lorsqu’elle reste branchée pendant de longues périodes, peut également accélérer son usure et réduire sa longévité.
exp.EarlyDetectionWear.causeDeepDischarge=Les décharges profondes fréquentes (lorsque la batterie est entièrement vidée avant d’être rechargée) peuvent accélérer son usure et réduire sa durée de vie globale.
exp.EarlyDetectionWear.causeHighTemp=Une exposition prolongée à des températures élevées, que ce soit en utilisant l’appareil dans un environnement chaud ou en le plaçant près d’une source de chaleur, peut provoquer un stress thermique et dégrader progressivement ses performances.
exp.EarlyDetectionWear.changeHealthManager=Modifiez le paramètre du gestionnaire de l’état de la batterie de l’appareil en choisissant l’une des options suivantes, selon l’âge de l’appareil :
