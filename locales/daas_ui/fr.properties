exp.FrequentWindowsBsodsHaveOccurred.description=Il y a eu plus de 3 codes d’erreur (événements BSOD) au cours des 7 derniers jours. Les évènements de codes d’erreur sont également appelés « écrans bleus » ou « BSoD ».
