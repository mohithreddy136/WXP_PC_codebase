btg.addon.description=HP IQ combine la reconnaissance du contexte, une collaboration sans effort et une interface utilisateur personnalisée avec une sécurité de niveau entreprise afin d’améliorer l’efficacité des équipes et les flux de travail individuels.
btg.addon.list.feature_five.description=En associant HP Poly Studio à Poly Lens, les utilisateurs peuvent personnaliser leurs périphériques et conserver une connexion optimale, où qu’ils se trouvent.
btg.addon.list.feature_five.title=Deployment something something
btg.addon.list.feature_four.description=En associant HP Poly Studio à Poly Lens, les utilisateurs peuvent personnaliser leurs périphériques et conserver une connexion optimale, où qu’ils se trouvent.
btg.addon.list.feature_four.title=Une expérience personnalisée où que vous soyez
btg.addon.list.feature_one.description=DCT désigne la technologie de maillage sous-jacente qui permet la découverte, la connexion et la collaboration des périphériques HP, sans oublier la gestion intelligente et la simplification des changements de situation. Elle permet un partage en temps réel du contexte, de l’état et des fonctionnalités, transformant les produits autonomes en écosystème évolutif et entièrement intégré.
btg.addon.list.feature_one.title=Couche de connectivité transparente
btg.addon.list.feature_six.description=Lorem ipsum dolor sit amet, consectetur adipiscing elit. Aliquam volutpat nisi ut ipsum bibendum elementum.
btg.addon.list.feature_six.title=Magna aliqua
btg.addon.list.feature_three.description=The HP IQ App is a universal multi-modal interface, fluidly spanning devices, context, location, and intent, enabling seamless, adaptive access to AI regardless of form factor. It also delivers a consistent and personal interaction model across the HP product ecosystem - making products feel simpler, more intuitive and intelligent.
btg.addon.list.feature_three.title=Couche UX/UI universelle
btg.addon.list.feature_two.description=IQ’s AI orchestrator dynamically blends local and cloud AI to deliver fast, private, and personal context-aware computing. It intelligently and seamlessly routes tasks to the right model in the right place while optimizing for privacy and personalization. Powered by HP’s hybrid architecture, it keeps workflows always available, and fluid.
btg.addon.list.feature_two.title=Orchestrateur d’IA puissant
btg.addon.section.description=Aidez vos employés à mieux collaborer avec les périphériques HP
btg.addon.section.overview.description=HP’s powerful AI orchestrator for all of its AI-enabled products, HP IQ combines context awareness, effortless Collaboration, and a personalized UI with enterprise-grade security to enhance workforce Efficiency and personal Flow.
