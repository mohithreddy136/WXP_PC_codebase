wex.onboarding.signin.desc=Nous vérifierons si vous possédez un compte, et nous vous aiderons à en créer un si ce n’est pas le cas. Nous allons commencer avec votre adresse e-mail.
wex.onboarding.signin.inviteDesc=Bienvenue, vous avez reçu une invitation pour accéder à HP Workforce Experience Platform (WXP)
wex.onboarding.skipTour.desc1=Suivez vos progrès et réalisez ces tâches essentielles pour tirer le meilleur parti de notre plateforme. L’ajout d'appareils et d'utilisateurs, la configuration du profil de votre entreprise et la création de sondages d’opinion sont des étapes indispensables.
wex.onboarding.skipTour.desc2=Ajoutez des appareils pour commencer à remplir votre tableau de bord avec des données.
wex.onboarding.slider.desc.1=Cette plateforme unique vous permet de surveiller, gérer, et obtenir des informations utiles pour chaque PC, Mac, imprimante, outil de collaboration et accessoire.
wex.onboarding.slider.desc.2=Gérez efficacement les problèmes via une analyse intelligente qui explore les enseignements tirés des incidents passés pour guider les futures stratégies informatiques.
wex.onboarding.slider.desc.3=Tirez parti des informations prédictives sur l’état des périphériques et des alertes au niveau de la flotte pour anticiper les problèmes informatiques et améliorer ainsi l’ensemble de votre environnement IT.
wex.onboarding.slider.desc.4=Accédez à des informations utiles et repérez les tendances grâce à un calcul pondéré intégrant le ressenti des employés, l’état des périphériques, la sécurité, les performances du système d’exploitation et l’expérience des applications.
wex.onboarding.slider.desc.5=Déterminez l’ampleur des problèmes émergents, recueillez des informations sur l’engagement des employés et utilisez un Score de satisfaction pour évaluer la satisfaction de vos employés vis-à-vis de leurs outils numériques.
