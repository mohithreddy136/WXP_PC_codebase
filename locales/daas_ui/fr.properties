azureonboard.marketing.signupcard.tryitnow=Essayer maintenant*
azureonboard.marketing.signupsection.description=Avec Proactive Insights, vous aurez accès à l'état d'intégrité de l'ordinateur et à des informations prédictives pour tous les périphériques inscrits afin de guider la prise de décision et d'identifier les problèmes émergents à résoudre avant qu'ils n'impactent votre activité.
azureonboard.marketing.signupsection.heading=Inscrivez-vous dès maintenant !
banner.iot.update.description=Un changement d'infrastructure de la plate-forme TechPulse sera implémenté le lundi 27 février 2023. Il se peut que vous deviez mettre à jour les paramètres du proxy, du pare-feu et du logiciel d'inspection SSL. Exécutez l'outil d'évaluation du réseau sur <a href='https://www.hpdaas.com/software' target='_blank'>HP TechPulse - Software (hpdaas.com)</a> et vérifiez si l'une des quatre (4) cibles de test *.IoT renvoie un message d'échec (Fail). Si le test se solde par un échec, suivez les instructions disponibles ici '<b><a href='https://hp.service-now.com/techpulse_kb?id=kb_article&sysparm_article=KB0011291' target='_blank'>KB0011291</a> - Configuration d'un proxy ou d'un pare-feu'</b> et <b>effectuez ces changements avant le jeudi 23 février 2023</b>.
