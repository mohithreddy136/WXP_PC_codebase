exp.GpuHealthIssue.blueScreenLink=https://docs.microsoft.com/en-us/windows-hardware/drivers/debugger/-analyze
exp.GpuHealthIssue.blueScreenLinkText=https://docs.microsoft.com/en-us/windows-hardware/drivers/debugger/-analyze
exp.GpuHealthIssue.causeBlueScreenErrors=Erreurs d’écran bleu : Les erreurs d’écran bleu peuvent être causées par l’exécution d’un trop grand nombre de programmes gourmands en ressources graphiques, des effets visuels exécutés en simultané, ou encore des problèmes de pilotes ou de matériel.
exp.GpuHealthIssue.causeDoubleBitEcc=Erreurs de mémoire ECC à double bit : La carte graphique rencontre des erreurs de mémoire ECC à double bit pouvant indiquer un défaut matériel ou une défaillance de la mémoire.
exp.GpuHealthIssue.causeHighDoubleBitEccOverTime=Accumulation d’erreurs de mémoire ECC à double bit : La carte graphique a un nombre élevé d’erreurs de mémoire ECC à double bit, et le nombre moyen d’erreurs est en hausse depuis au moins 3 semaines.
exp.GpuHealthIssue.causeHighTdrEvents=Nombre élevé d’événements TDR (timeout et récupération du pilote d’affichage) : La carte graphique rencontre un nombre important d’événements TDR, ce qui peut indiquer un problème de pilote ou de matériel.
exp.GpuHealthIssue.causeMissingDriverUpdate=Mise à jour critique manquante Un pilote critique de la carte graphique n’est pas installé, ce qui peut affecter ses performances et sa stabilité.
exp.GpuHealthIssue.causeThermalIssues=Problèmes thermiques : La carte graphique rencontre un grand nombre de problèmes liés à la température, avec un GPU ou une mémoire dépassant la température maximale de fonctionnement.
exp.GpuHealthIssue.driverOption1=Option 1 : Utiliser HP Image Assistant pour mettre à jour les pilotes
exp.GpuHealthIssue.driverOption2=Option 2 : Utiliser Windows Update pour mettre à jour les pilotes
exp.GpuHealthIssue.possibleCauses=Causes possibles :
exp.GpuHealthIssue.remediationBlueScreenPrefix=Pour les erreurs d’écran bleu : Vérifier si un nombre trop important de programmes à forte intensité graphique ou d’effets visuels sont exécutés simultanément. Mettre à jour le pilote de la carte graphique, restaurer les paramètres d’overclocking aux valeurs par défaut, effectuer une installation propre du pilote ou restaurer les paramètres d’usine, vérifier que l’alimentation électrique est suffisante, et nettoyer les grilles de ventilation ainsi que le ventilateur. Analyser le mini fichier de vidage pour identifier les étapes de résolution spécifiques :
exp.GpuHealthIssue.remediationDoubleBitEcc=Pour les erreurs de mémoire ECC à double bit : Continuer à surveiller la situation et vérifier si les performances continuent de se dégrader. Si le nombre d’erreurs reste élevé, envisager de remplacer la carte graphique.
exp.GpuHealthIssue.remediationMissingDriver=Pour une mise à jour de pilote manquante : Mettre à jour le pilote de la carte graphique vers la dernière version afin de corriger les problèmes de performances.
exp.GpuHealthIssue.remediationTdr=Pour les événements TDR : Continuer à surveiller et mettre à jour le pilote de la carte graphique si le problème persiste. Restaurer les paramètres graphiques aux valeurs par défaut, restaurer les paramètres d’overclocking aux valeurs par défaut, mettre à jour le BIOS si une version plus récente est disponible, vérifier que l’alimentation électrique est suffisante et que la circulation de l’air est correcte. Nettoyer les grilles de ventilation et le ventilateur.
exp.GpuHealthIssue.remediationThermal=Pour les problèmes thermiques : Vérifier qu’aucun obstacle ne bloque la circulation de l’air, nettoyez les grilles de ventilation et assurez-vous que le ventilateur fonctionne correctement et qu’il est propre.
exp.GpuHealthIssue.suggestedRemediations=Correctifs suggérés :
exp.GpuHealthIssue.title=Vérifier l’intégrité du GPU
exp.HpBatteryHealthManagerNotEnabled.causeNotCompatible=L’appareil n’est pas compatible avec le Gestionnaire de santé de la batterie HP.
exp.HpBatteryHealthManagerNotEnabled.causeRequiresBiosUpdate=Mise à jour du BIOS requise sur l’appareil.
exp.HpBatteryHealthManagerNotEnabled.description=Le Gestionnaire de santé de la batterie HP est disponible sur tous les ordinateurs portables professionnels HP depuis 2016. Pour améliorer la durée de vie de la batterie, il est recommandé d’activer le Gestionnaire de santé de la batterie
exp.HpBatteryHealthManagerNotEnabled.option1Detail=HP recommande d’activer le Gestionnaire de santé de la batterie HP et de le configurer sur Laisser HP gérer le chargement de ma batterie ou sur Optimiser l’état de santé de ma batterie en fonction de l’utilisation ou de l’ancienneté de l’appareil.
exp.HpBatteryHealthManagerNotEnabled.option1Title=Option 1 : Mettre à jour le BIOS avec une version prise en charge
exp.HpBatteryHealthManagerNotEnabled.possibleCauses=Causes possibles :
exp.HpBatteryHealthManagerNotEnabled.reference1Link=https://support.hp.com/us-en/document/ish_4449597-3519507-16
exp.HpBatteryHealthManagerNotEnabled.reference1Text=Gestionnaire de santé de la batterie HP - Support
exp.HpBatteryHealthManagerNotEnabled.references=Références :
exp.HpBatteryHealthManagerNotEnabled.settingLetDetail1=Adapte dynamiquement la charge de la batterie en fonction des conditions d’utilisation et de la température au fil du temps.
exp.HpBatteryHealthManagerNotEnabled.settingLetTitle=Laisser HP gérer le chargement de ma batterie
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases1=Environnements d’utilisation mixte où l’ordinateur portable est régulièrement débranché de l’alimentation secteur et la batterie se décharge.
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases2=Vous préférez un seul processus pour votre entreprise.
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases3=L’ordinateur portable a moins d’un an.
exp.HpBatteryHealthManagerNotEnabled.settingMaxDetail1=Plafonne la charge maximale de la batterie à 80 % afin d’optimiser la durée de vie de la batterie et réduire les risques de gonflement.
exp.HpBatteryHealthManagerNotEnabled.settingMaxTitle=Optimiser l’état de santé de ma batterie
exp.HpBatteryHealthManagerNotEnabled.settingMaxUseCases1=Environnements dans lesquels les ordinateurs portables sont en permanence branchés au secteur.
exp.HpBatteryHealthManagerNotEnabled.settingMaxUseCases2=Ordinateurs portables d’un an ou plus.
exp.HpBatteryHealthManagerNotEnabled.suggestedRemediations=Correctifs suggérés :
exp.HpBatteryHealthManagerNotEnabled.title=Le Gestionnaire de santé de la batterie HP n’est pas activé
exp.LastReboot21Days.causeNotRestarted=Les utilisateurs n’ont pas redémarré leur appareil depuis plus de 21 jours.
exp.LastReboot21Days.possibleCauses=Causes possibles :
exp.LastReboot21Days.remediationScheduleRestart=Planifier un redémarrage à l’aide d’un outil de gestion comme Microsoft Intune ou PowerShell.
exp.LastReboot21Days.remediationSuggestions=Correctifs suggérés :
exp.MemoryUtilizationIsHighForAnExtendedTime.causeHungApp=Une application en cours d’exécution est bloquée ou ne répond pas.
exp.MemoryUtilizationIsHighForAnExtendedTime.causeInsufficientMemory=L’ordinateur ne dispose pas d’une mémoire suffisante pour son utilisation.
exp.MemoryUtilizationIsHighForAnExtendedTime.causeLongRunningApp=Une application en cours d’exécution nécessite une grande quantité de mémoire pendant une période prolongée pour accomplir une tâche, telle que l’analyse antivirus.
exp.MemoryUtilizationIsHighForAnExtendedTime.causeMemoryLeak=Une application installée peut présenter une fuite mémoire.
exp.MemoryUtilizationIsHighForAnExtendedTime.option1Detail=Pour aider les clients à prolonger la durée de vie de leur appareil et pour améliorer l’expérience de l’utilisateur final, une pratique courante sur les PC dont la mémoire est surutilisée consiste à ajouter de la mémoire sur l’appareil.
exp.MemoryUtilizationIsHighForAnExtendedTime.option1Title=Option 1 : Augmenter la mémoire de l’appareil.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail1=Ouvrir le rapport sur l’utilisation de l’appareil.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail2=Les applications qui consomment le plus de mémoire seront identifiées dans la colonne Applications entraînant une utilisation élevée de la mémoire.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail3=Les mesures correctives varient en fonction de l’application en question. S’il s’agit d’applications critiques pour l’entreprise, une mise à niveau de la mémoire peut résoudre le problème. Les applications non critiques pour l’entreprise peuvent être supprimées de l’appareil ou leurs paramètres peuvent être ajustés pour réduire la charge sur l’appareil.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Title=Option 2 : Identifier et désinstaller des applications.
exp.MemoryUtilizationIsHighForAnExtendedTime.option3Detail=Redémarrer l’ordinateur pour fermer complètement toutes les applications en cours.
exp.MemoryUtilizationIsHighForAnExtendedTime.option3Title=Option 3 : Redémarrer l’appareil.
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Detail1=Utiliser le gestionnaire des tâches pour afficher les applications en cours d’exécution en fonction de l’utilisation de la mémoire.
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Detail2=Fermer les applications qui utilisent le plus de mémoire.
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Title=Option 4 : Fermer les applications.
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Detail1=Use Task Manager to identify an application where the Memory utilization is steadily increasing to unusual proportions, but never decreasing.
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Detail2=Vérifiez auprès de l’éditeur si une mise à jour est disponible pour cette application.
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Title=Option 5 : Identifier une éventuelle fuite mémoire et effectuer une mise à jour.
exp.MemoryUtilizationIsHighForAnExtendedTime.possibleCauses=Causes possibles :
exp.MemoryUtilizationIsHighForAnExtendedTime.suggestedRemediations=Correctifs suggérés :
exp.MemoryUtilizationIsHighForAnExtendedTime.title=Réduisez l’utilisation excessive de la mémoire
