wex.fleet.mgmt.score.tooltip=L’expérience est basée sur l’expérience la plus basse de toutes les notes.
wex.fleet.mgmt.troubleshoot.linux_firewall_disabled.description=L’activation du pare-feu participe à la protection du système contre l’accès non autorisé, les attaques réseau et le trafic indésirable via le contrôle des connexions entrantes et sortantes. Il s’agit d’une étape critique pour la sécurisation des systèmes Linux, en particulier ceux exposés aux réseaux publics ou d’entreprise.
