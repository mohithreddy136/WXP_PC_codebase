partner.exp.mgmt.recommended.avg_fan_speed_high=Analysez la vitesse élevée constante du ventilateur.
partner.exp.mgmt.recommended.bitlocker_encryption_not_enabled=Activez le chiffrement BitLocker.
partner.exp.mgmt.recommended.button.guide_me=Me guider
partner.exp.mgmt.recommended.desc.AV_NOT_ENABLED=Résolvez tous les problèmes, ou désélectionnez dans le tableau ci-dessous tous les ordinateurs que vous n’allez pas activer maintenant.
partner.exp.mgmt.recommended.desc.AV_WD_SIGNATURE=En maintenant à jour les signatures des logiciels malveillants, une protection complète contre les menaces les plus récentes est assurée.
partner.exp.mgmt.recommended.desc.AVG_FAN_SPEED_HIGH=Une vitesse élevée du ventilateur pendant une longue période indique que l’appareil surchauffe, ce qui peut endommager ses composants et réduire sa durée de vie.
partner.exp.mgmt.recommended.desc.BITLOCKER_ENCRYPTION_NOT_ENABLED=Les appareils non chiffrés peuvent avoir leurs données divulguées en cas de perte ou de vol.
partner.exp.mgmt.recommended.desc.DISK_UTILIZATION_HIGH=Les appareils disposant d’un espace disque disponible restreint peuvent ralentir et avoir du mal à réaliser des tâches essentielles.
partner.exp.mgmt.recommended.desc.DOCKING_STATION_AC_ADAPTER_FAILED=Une défaillance de l’adaptateur secteur de la station d'accueil pourrait être le signe de problèmes liés au matériel, susceptibles d’entraîner une perte d'alimentation ou un fonctionnement intermittent de l’appareil.
partner.exp.mgmt.recommended.desc.DOCKING_STATION_FIRMWARE_OUT_OF_DATE=Un microprogramme pour station d'accueil obsolète peut entraîner des problèmes de compatibilité, restreindre la fonctionnalité ou exposer à des failles de sécurité.
partner.exp.mgmt.recommended.desc.EXCESSIVE_OS_SHUTDOWN_TIME=Un temps d'arrêt prolongé peut être le signe d'applications bloquées, d'un ralentissement matériel, de mises à jour de stratégies, de longs scripts ou de tâches Windows non terminées.
partner.exp.mgmt.recommended.desc.EXCESSIVE_OS_STARTUP_TIME=Un démarrage prolongé peut être le fait de conflits logiciels sous-jacents ou de problèmes matériels.
partner.exp.mgmt.recommended.desc.FIREWALL_DISABLED=Un pare-feu Windows Defender désactivé pourrait exposer les appareils à des attaques malveillantes sur votre réseau.
partner.exp.mgmt.recommended.desc.FIREWALL_SIGNATURE_OUTDATED=Les définitions de pare-feu obsolètes rendent les appareils vulnérables face aux nouveaux logiciels malveillants et aux cybermenaces.
partner.exp.mgmt.recommended.desc.GPU_HEALTH_ISSUE=La détection d'un problème de processeur graphique pourrait entraîner des anomalies visuelles, des problèmes de performances, voir même une incapacité totale à afficher les graphiques.
partner.exp.mgmt.recommended.desc.HIGH_COLLABORATION_SW_ERRORS=Des erreurs persistantes dans les logiciels de collaboration peuvent perturber les flux de travail en équipe, entraver la communication et l'avancement des projets.
partner.exp.mgmt.recommended.desc.HIGH_WINDOWS_CRASH=Des pannes et des redémarrages inattendus sont le signe d'une instabilité sous-jacente qui pourrait entraîner une perte de données ou des dommages matériels permanents.
partner.exp.mgmt.recommended.desc.LAST_REBOOT_MORE_THAN_21_DAYS=Les appareils qui ne sont pas redémarrés pendant une période prolongée peuvent connaître des problèmes de stabilité et de performance du système d’exploitation.
partner.exp.mgmt.recommended.desc.MAXIMISE_MY_BATTERY_HEALTH_NOT_ENABLED=Si vous n’activez pas le gestionnaire de l’état de santé de la batterie, cela peut avoir un impact sur l’autonomie de la batterie.
partner.exp.mgmt.recommended.desc.MEMORY_UTILIZATION_HIGH=Une utilisation élevée de la mémoire de l’appareil pendant une durée prolongée peut ralentir un appareil, et impacter la productivité des employés.
partner.exp.mgmt.recommended.desc.MISSING_CRITICAL_DRIVER_UPDATES=Sans mises à jour de pilotes critiques, le matériel des périphériques peut présenter des dysfonctionner ou même ne pas fonctionner du tout.
partner.exp.mgmt.recommended.desc.MISSING_WINDOWS_SECURITY_UPDATES=Des mises à jour de sécurité obsolètes peuvent rendre les appareils vulnérables face aux hackers et aux virus.
partner.exp.mgmt.recommended.desc.MISSING_WINDOWS_UPDATES=Les mises à jour Windows obsolètes exposent les appareils à des vulnérabilités et à des infections potentielles par des logiciels malveillants.
partner.exp.mgmt.recommended.desc.PC_REFRESH=Démarrez un renouvellement intelligent, ou désélectionnez dans le tableau ci-dessous tous les ordinateurs que vous n’allez pas remplacer maintenant.
partner.exp.mgmt.recommended.desc.PC_REFRESH_SELECT=Examinez les appareils et procédez avec la demande.
partner.exp.mgmt.recommended.desc.security=Résolvez tous les problèmes, ou désélectionnez dans le tableau ci-dessous tous les ordinateurs que vous n’allez pas activer maintenant.
partner.exp.mgmt.recommended.desc.WINDOWS_SECURE_BOOT_NOT_ENABLED=L’activation du démarrage sécurisé Windows garantit qu'un appareil démarre uniquement avec un logiciel de confiance.
partner.exp.mgmt.recommended.disk_utilization_high=Libérez de l’espace sur le disque.
partner.exp.mgmt.recommended.docking_station_ac_adapter_failed=Faites des recherches sur la panne de l’adaptateur AC de la station d’accueil.
partner.exp.mgmt.recommended.docking_station_firmware_out_of_date=Mettez à jour le micrologiciel pour la station d’accueil.
partner.exp.mgmt.recommended.excessive_os_shutdown_time=Optimisez le temps d’arrêt du système d’exploitation.
partner.exp.mgmt.recommended.excessive_os_startup_time=Optimisez le temps de démarrage du système d’exploitation.
partner.exp.mgmt.recommended.firewall_disabled=Activez le pare-feu Windows Defender.
partner.exp.mgmt.recommended.firewall_signature_outdated=Mettez à jour la signature du pare-feu Windows Defender.
partner.exp.mgmt.recommended.gpu_health_issue=Faites des recherches sur les problèmes critiques détectés sur le GPU
partner.exp.mgmt.recommended.high_collaboration_sw_errors=Faites des recherches sur l’augmentation des erreurs des logiciels de collaboration.
