requirements.list.hp_print_fleetproxy.desc1=Le Print Fleet Proxy nécessite l’installation de HP Web Jetadmin sur le même PC. HP vous recommande fortement de procéder à une mise à jour avec la dernière version de Web Jetadmin avant d’installer HP Fleet Proxy.
requirements.list.hp_print_fleetproxy.desc2=HP ne teste actuellement que le HP Fleet Proxy avec HP Web Jetadmin 10.5 SR4. Bien que HP Fleet Proxy puisse fonctionner avec des versions antérieures de HP Web Jetadmin, HP ne peut garantir le bon fonctionnement de toutes les fonctionnalités.
requirements.list.hp_print_fleetproxy.desc3=HP Web Jetadmin est un service qui demande beaucoup de ressources.. Comme HP Fleet Proxy ne doit pas ajouter trop de surcharge supplémentaire, il peut y avoir un impact sur la performance si le serveur hôte ne dispose pas d’une puissance informatique suffisante pour prendre en charge à la fois les services et les périphériques qu'il gère. Vous devez vous assurer que le serveur hébergeant HP Web Jetadmin et HP Fleet Proxy est suffisamment solide et qu'il dispose de suffisamment de cœurs de processeur pour résoudre les éventuels problèmes de performances.
requirements.list.hp_print_fleetproxy.desc4=Suite à des tests sur 2000 appareils, HP a déterminé que les spécifications matérielles de base suivantes devraient suffire pour obtenir des performances acceptables. Si vous remarquez des ralentissements ou si vous gérez plus de 2000 appareils, il se peut qu’un serveur plus puissant soit nécessaire.
requirements.list.hp_print_fleetproxy.desc5=Print Fleet Proxy est un service sur site qui communique avec un service basé sur le cloud. Par conséquent, vous devrez configurer votre pare-feu pour autoriser les communications entrantes et sortantes entre le serveur WJA et le HP Command Center, que ce soit via un filtrage DNS ou une liste blanche IP.
requirements.list.hp_print_fleetproxy.desc6=Vous pouvez trouver cette liste ici :
requirements.list.hp_print_fleetproxy.hp-nf1=Filtrage DNS : Configurez votre pare-feu pour autoriser les requêtes HTTPS sortantes sur le port 443 vers les destinations suivantes :
requirements.list.hp_print_fleetproxy.hp-nf2=Liste blanche IP : Pour créer une liste blanche IP, vous devrez inclure l’adresse IP de chaque serveur cloud avec lequel le HP Fleet Proxy pourrait avoir besoin de communiquer.
