wex.ra.remediation.antivirus_not_enabled=Microsoft Defender Antivirus est un logiciel antivirus inclus dans Windows qui vous aide à protéger votre appareil des virus, des logiciels malveillants et d'autres menaces.
wex.ra.remediation.antivirus_signature_outdated=Pour garantir une protection optimale, les fichiers de définition de l'antivirus doivent être mis à jour régulièrement.
wex.ra.remediation.antivirus_signature_outdated_other=L'appareil est configuré pour utiliser un antivirus tiers non-Microsoft afin de le protéger contre les virus, les logiciels malveillants et d’autres menaces, mais des mises à jour de la signature antivirus sont requises sur l'appareil.
wex.ra.remediation.app_crash=Plus de 10 erreurs logicielles au cours des 7 derniers jours dans Teams, Outlook, Zoom, Webex, Chrome, Office.
wex.ra.remediation.avg_fan_speed_high=La vitesse moyenne du ventilateur est élevée sur une longue période.
wex.ra.remediation.battery_calibrate=La batterie nécessite un étalonnage.
wex.ra.remediation.battery_early_detection_wear=Au cours des 30 derniers jours, le système a prédit que la batterie possèdera moins de 70 % de capacité de charge maximale restante.
wex.ra.remediation.battery_needs_attention=Workforce Experience Platform displays records of battery warnings and failures that can be used to obtain service for a battery that is experiencing issues
wex.ra.remediation.bitlocker_encryption_not_enabled=Pour protéger les données au repos, le cryptage de disque est fortement recommandé.
wex.ra.remediation.bsod=Il y a eu plus de 3 codes d’erreur (événements BSOD) au cours des 7 derniers jours.
wex.ra.remediation.bsod_occured=Le périphérique a subi au moins 1 événement de code d’erreur au cours des 7 derniers jours.
wex.ra.remediation.cpu_utilization_high=Causes possibles : Une application en cours d’exécution est bloquée ou ne répond pas.
wex.ra.remediation.disk_needs_attention=Workforce Experience Platform affiche les enregistrements des avertissements et des défaillances du disque qui peuvent être utilisés pour la maintenance d’un disque rencontrant des problèmes.
wex.ra.remediation.disk_utilization_high=Hard disk is near full disk capacity and low in free space.
wex.ra.remediation.docking_station_ac_adapter_failed=The Docking Station AC Adapter is having a hardware issue.
wex.ra.remediation.docking_station_ac_adapter_running_at_reduced_perofmance=L'adaptateur secteur de la station d'accueil ne fonctionne pas correctement.
wex.ra.remediation.docking_station_firmware_out_of_date=Possible Causes: The docking station may require a Firmware or Driver update.
wex.ra.remediation.excessive_os_shutdown_time=La durée de l’arrêt est de 3 minutes ou plus.
wex.ra.remediation.excessive_os_startup_time=Le démarrage du système prend plus de 3 minutes.
wex.ra.remediation.firewall_disabled=Le pare-feu empêche les hackers et les logiciels malveillants d'accéder à votre PC par le biais d'Internet ou d'un réseau.
wex.ra.remediation.firewall_signature_outdated=Le pare-feu requiert des mises à jour régulières pour assurer une protection optimale contre les attaques basées sur le réseau.
wex.ra.remediation.frequent_bsod_occured=Il y a eu plus de 3 codes d’erreur (événements BSOD) au cours des 7 derniers jours.
wex.ra.remediation.frequent_network_disconnection=Pour les réseaux domestiques, vérifiez que le microprogramme de votre routeur est à jour et placez le routeur dans une position centrale afin de minimiser les interférences. En outre, réduisez le nombre d'appareils connectés et envisagez d’utiliser une connexion filaire pour les appareils afin de préserver la stabilité et la fiabilité du réseau.
wex.ra.remediation.gpu_health_issue=Workforce Experience Platform a détecté un problème avec le processeur graphique qui nécessite une attention immédiate.
wex.ra.remediation.high_collaboration_sw_errors=Plus de 10 erreurs logicielles au cours des 7 derniers jours dans Teams, Outlook, Zoom, Webex, Chrome, Office.
wex.ra.remediation.high_windows_crash=Le système d'exploitation a connu au moins 1 crash ou redémarrage inattendu au cours des 7 derniers jours.
wex.ra.remediation.last_reboot_more_than_21_days=Le dernier redémarrage remonte à plus de 21 jours.
wex.ra.remediation.maximise_my_battery_health_not_enabled=HP Battery Health Manager is available on all HP business notebooks since 2016. To improve battery life, it is recommended that Battery Health Manager be enabled
wex.ra.remediation.memory_utilization_high=The average Memory utilization over the last 30 days is 85% or greater.
wex.ra.remediation.missing_critical_bios_updates=Mettez à jour le BIOS des périphériques compatibles via la plateforme en sélectionnant les périphériques ci-dessous et en cliquant sur « Appliquer la politique ». Pour les périphériques non compatibles, mettez à jour les pilotes système et le micrologiciel en utilisant Windows Update ou HP Image Assistant.
wex.ra.remediation.missing_critical_driver_updates=Le rapport d'inventaire des pilotes contient un inventaire détaillé des appareils pour lesquels il manque des mises à jour de pilotes critiques.
wex.ra.remediation.missing_windows_security_updates=Le tableau de bord HP Workforce Experience Platform Security comprend des indicateurs clés de performance répertoriant le nombre d’appareils avec des mises à jour de sécurité Windows manquantes.
wex.ra.remediation.os_crash=Le système d’exploitation a connu au moins 1 crash ou redémarrage inattendu au cours des 7 derniers jours.
wex.ra.remediation.poor_network_signal_strength=Pour les réseaux domestiques, vous pouvez améliorer la force du signal Wi-Fi en redémarrant votre routeur ou en le déplaçant afin de réduire le nombre d’obstacles entre le point d'accès et le PC.
wex.ra.remediation.poor_nominal_speed=Concernant les réseaux domestiques, envisagez de mettre à niveau votre routeur vers un modèle plus récent capable de prendre en charge les normes Wi-Fi les plus récentes, comme la norme Wi-Fi 6. En outre, optimisez la configuration de votre réseau en plaçant votre routeur dans une position centrale, ce qui réduit les interférences provenant des autres appareils et en utilisant des connexions filaires si possible pour augmenter la stabilité des performances.
wex.ra.remediation.unauthenticated_connection=Pour les réseaux domestiques, optez pour un protocole de cryptage solide, comme WPA2 ou WPA3, et définissez un mot de passe unique fort pour l'accès. En outre, envisagez de mettre en place un filtrage des adresses MAC et de mettre à jour régulièrement le microprogramme de votre routeur afin de renforcer la sécurité et d’empêcher les connexions non autorisées.
wex.ra.remediation.windows_secure_boot_not_enabled=Le démarrage sécurisé est une norme de sécurité développée par des membres de l’industrie du PC pour garantir qu’un appareil démarre en utilisant uniquement des logiciels approuvés par le fabricant de l’équipement d’origine (OEM).
