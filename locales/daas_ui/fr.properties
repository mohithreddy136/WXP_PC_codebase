dnto.subscriptions.privacy_statement.desc1=HP reconnaît que la vie privée est un droit humain fondamental et reconnaît également l’importance de la protection des données, de la sécurité, et de la vie privée de nos clients et partenaires dans le monde entier. En tant qu'organisation mondiale dotée d’entités juridiques, de processus opérationnels, de structures de gestion et de systèmes techniques qui vont au-delà des frontières internationales, nous nous efforçons de fournir des protections dans l’ensemble de nos opérations qui dépassent les exigences minimales prévues par la loi, et de déployer des politiques et des procédures cohérentes et rigoureuses.
dnto.subscriptions.privacy_statement.desc2=Dans la présente déclaration, les termes tels que « nous », « notre » et « Société » se réfèrent aux sociétés de la marque HP et aux sociétés affiliées actuelles et futures, telles que définies par la législation locale (ci-après « HP »). Les coordonnées du Délégué à la protection des données de HP sont mentionnées dans la section « {0} » ci-dessous.
dnto.subscriptions.privacy_statement.exercise_rights=Faire valoir vos droits et nous contacter
dnto.subscriptions.privacy_statement.heading=Déclaration de confidentialité HP
dnto.subscriptions.section.details.desc1=Les employés sont habitués à la flexibilité, au point même d’exiger de pouvoir travailler comment et où ils le souhaitent. Avec des équipes informatiques sollicitées au-delà de leurs limites, l’expérience des employés, la productivité et l’engagement sont en souffrance.
dnto.subscriptions.section.details.desc2=HP Workforce Experience Pro anticipe et résout intelligemment les points de discordance numérique depuis une plateforme modulaire regroupée.
dnto.subscriptions.section.details.desc3=Que vous gériez une petite équipe sur un seul site ou que vous deviez faire face aux complexités liées à un personnel hybride mondial, HP Workforce Experience Pro fournit une plateforme unifiée permettant de prendre en charge et d’optimiser les expériences numériques de vos employés.
dnto.subscriptions.section.details.desc4=Stimulez la productivité de vos employés en résolvant de manière proactive les problèmes informatiques avant leur apparition. Réduisez les heures et les coûts associés à l’assistance IT grâce des solutions d’IA avancée. Renforcez la sécurité sur les terminaux en anticipant et en résolvant les menaces.
dnto.subscriptions.section.details.desc5=Améliorez la satisfaction des employés avec des renseignements exploitables à partir des enquêtes Pulse. Optimisez les coûts avec des renouvellements matériels ingénieux. Bénéficiez d'une intégration transparente dans des environnements multi-fournisseurs et multi-OS.
dnto.subscriptions.section.details.heading=Détails de l’abonnement
dnto.subscriptions.sign_in=S’inscrire à HP Workforce Experience
dnto.subscriptions.thank_you.desc=Merci de choisir HP Workforce Experience. Nous sommes convaincus que vous bénéficierez d'une productivité et d'une collaboration accrues. Si vous avez des questions, n’hésitez pas à consulter nos ressources de support complètes ou à contacter notre équipe du service clientèle qui se fera un plaisir de vous aider.
