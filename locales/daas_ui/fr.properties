account_management.subscriptions.addon.anyware.azure_notice=La licence est actuellement offerte sur Azure Marketplace. La licence HP Anyware Standard comprend l’accès à HP Anyware Manager Enterprise.
account_management.subscriptions.addon.anyware.desc=Gérez et provisionnez des ordinateurs de bureau distants pour votre équipe. Les utilisateurs finaux bénéficieront d’un accès sécurisé aux ordinateurs de bureau sans avoir besoin d’un réseau privé virtuel (VPN). Surveillez l’ensemble de votre parc distant en intégrant HP Anyware avec WXP
account_management.subscriptions.addon.anyware.desc.short=Bénéficiez d’un accès, d’une gestion et d’une surveillance des ordinateurs de bureau en toute sécurité
account_management.subscriptions.addon.anyware.enterprise.header=HP Anyware Manager Enterprise
account_management.subscriptions.addon.anyware.features.automation=Automatiser les tâches
account_management.subscriptions.addon.anyware.features.automation.desc=Intégrer en toute transparence votre flux de travail admin personnalisé dans le plan de gestion
account_management.subscriptions.addon.anyware.features.multitenant_rbac=Contrôle d’accès basé sur le rôle et mutualisé
account_management.subscriptions.addon.anyware.features.multitenant_rbac.desc=Gérez plusieurs organisations avec une seule instance de HP Anyware Manager Enterprise. Attribuer des permissions aux Admins en fonction de leur rôle
account_management.subscriptions.addon.anyware.features.productivity=Activer la productivité des utilisateurs finaux
account_management.subscriptions.addon.anyware.features.productivity.desc=L'utilisateur final va utiliser les ordinateurs de bureau comme s’ils étaient en local, quels que soient leurs besoins en termes de performances ou de conditions du réseau.
account_management.subscriptions.addon.anyware.features.provision_desktops=Gérez les ordinateurs de bureau physiques et virtuels
account_management.subscriptions.addon.anyware.features.provision_desktops.desc=Les équipes informatiques peuvent configurer et surveiller les ordinateurs de bureau distants via HP Anyware Manager Enterprise. Ils peuvent également provisionner des ordinateurs de bureau virtuels pour les utilisateurs finaux à tout moment.
account_management.subscriptions.addon.anyware.features.remote_access=Fournir aux utilisateurs finaux un accès distant sécurisé
account_management.subscriptions.addon.anyware.features.remote_access.desc=Les utilisateurs finaux bénéficieront d’un accès sécurisée aux ordinateurs de bureau sans avoir besoin d’un réseau privé virtuel (VPN). HP Anyware offre un accès simplifié via des passerelles cloud.
account_management.subscriptions.addon.anyware.features.role_access.desc=Effectuer l’attribution d’utilisateurs et le routage de sessions sans avoir à installer une passerelle dans d’autres environnements
account_management.subscriptions.addon.anyware.features.role_cloud_gateways=Accès simplifié via les passerelles Cloud
account_management.subscriptions.addon.anyware.features.setup=Tous les environnements IT et configuration simple
account_management.subscriptions.addon.anyware.features.setup.desc=Une solution flexible et intuitive qui simplifie le déploiement et la gestion de diverses infrastructures, y compris les environnements sur site, cloud et hybrides, tout en réduisant la complexité et l’empreinte IT.
account_management.subscriptions.addon.anyware.features.workforce_integration=Intégration de Workforce Experience
account_management.subscriptions.addon.anyware.features.workforce_integration.desc=L’équipe informatique peut centraliser les données du bureau à distance au sein de la Workforce Experience Platform, fournissant ainsi une vue centrale de sa flotte.
account_management.subscriptions.addon.anyware.header=HP Anyware
account_management.subscriptions.addon.anyware.overview.desc1=HP Anyware est une solution logicielle haute performance qui offre aux utilisateurs un accès sécurisé à leurs ordinateurs de bureau virtuels ou à distance sans réseau privé virtuel (VPN). HP Anyware comprend l’accès à un niveau de gestion informatique appelé HP Anyware Manager Enterprise.
account_management.subscriptions.addon.anyware.overview.desc2=HP Anyware Manager Enterprise (AME) est une console de gestion multi-locataire permettant de gérer à la fois des ordinateurs de bureau physiques et virtuels.
account_management.subscriptions.addon.anyware.required_components.header=Composants requis pour l’intégration de Workforce Experience
account_management.subscriptions.addon.anyware.required_components.li1=HP Anyware Standard
account_management.subscriptions.addon.anyware.required_components.li2=HP Anyware Manager Enterprise
account_management.subscriptions.addon.anyware.security_compliance=Sécurité et conformité
account_management.subscriptions.addon.anyware.security_compliance.desc1=HP Anyware donne la priorité à la sécurité et à la conformité dans l’ensemble de ses offres produits afin de garantir une protection solide et un respect strict des normes de l’industrie. Les principales fonctionnalités comprennent le cryptage complet, l’accès distant sécurisé et l’authentification multi-facteurs, assurant la protection de l’intégrité et de la confidentialité des données.
account_management.subscriptions.addon.anyware.security_compliance.desc2=HP Anyware intègre également la détection avancée des menaces et des fonctions avancées de réponse pour une atténuation proactive des risques. La conformité avec les réglementations telles que le GDPR, la HIPAA, et SOC 2 souligne l’engagement de HP Anyware à conserver des protocoles de sécurité rigoureux. Une surveillance permanente et des audits de sécurité réguliers assurent que les produits HP Anyware conservent leur résilience face à l’émergence des cybermenaces, en offrant aux utilisateurs une expérience de gestion informatique sécurisée et digne de confiance.
account_management.subscriptions.addon.anyware.technology=Technologie à distance
account_management.subscriptions.addon.anyware.technology.desc=La technologie d’affichage à distance largement récompensée PCoIP® de HP Anyware offre une expérience informatique haute définition très réactive dans les conditions de réseau complexes.
account_management.subscriptions.addon.anyware.technology.desc.li1=PCoIP® assure l’encodage, la compression, le chiffrement et le transport de pixels d’images à partir d’un serveur ou d’une station de travail central(e).
account_management.subscriptions.addon.anyware.technology.desc.li2=Elle se charge ensuite du décryptage et de la décompression de l’image pour les utilisateurs sur quasiment tous les points de terminaison.
account_management.subscriptions.addon.connect_accounts=Connecter les comptes
account_management.subscriptions.addon.oob.desc.short=Contrôle à distance du BIOS pour des diagnostics et des correctifs avancés
account_management.subscriptions.addon.oob.desclaimer1=1. Les diagnostics et les correctifs hors bande sont disponibles sous licence sur des périodes variables et sont indépendants des fournisseurs sur les PC compatibles avec Intel® vPro® Enterprise et Intel® AMT. Workforce Experience Platform Starter inclus et requis pour administrer et gérer la solution logicielle. Disponible aux États-Unis, au Canada et au sein de l’Union européenne auprès des représentants HP et distributeurs agréés. Pour en savoir plus, consultez (ajouter le lien vers les conditions de licence/CLUF).
account_management.subscriptions.addon.oob.desclaimer2=2. Selon les analyses réalisées en interne par HP en date du 24/09/2024 sur les fabricants de PC avec les contrôles du démarrage, du BIOS, de la réinitialisation et hors système d’exploitation.
account_management.subscriptions.addon.oob.desclaimer3=3. L’agent HP Insights est requis. Il s’agit d’une application de télémétrie et d’analyse qui fournit des données essentielles sur les appareils et les applications. Elle n’est pas vendue comme un service indépendant et est certifiée ISO27001, ISO27701, ISO27017 et SOC2 Type2 pour la sécurité informatique. Un accès à Internet avec connexion au portail est nécessaire. Pour tous les détails sur la configuration système requise, rendez-vous sur http://www.hpdaas.com/requirements. L’achat de tout service compatible avec l’agent HP Insights nécessite l’activation d’un logiciel à exécuter sur chaque appareil. HP Services Scan est fourni par le biais de Windows Update sur certains équipements HP et vérifie les droits sur chaque appareil matériel pour déterminer si un service actif a été acheté, puis télécharge automatiquement les logiciels applicables. Pour désactiver cette fonctionnalité, suivez les instructions sur la page <a target='_blank' href='http://www.hpdaas.com/requirements' style=\"text-decoration:none; color:#4D52E5\">http://www.hpdaas.com/requirements</a>
account_management.subscriptions.addon.oob.desclaimer4=4. WXP Starter est inclus et requis pour administrer et gérer la solution logicielle.
account_management.subscriptions.addon.oob.features.remote_control=Remote control - even when the Operating System is down
account_management.subscriptions.addon.oob.features.remote_control.desc=Le service informatique peut accéder à distance au BIOS pour effectuer le redémarrage, la réinitialisation et la récupération des PC quelle que soit la marque, sur tous les sites.
account_management.subscriptions.addon.oob.features.scalable=Gestion centralisée évolutive
account_management.subscriptions.addon.oob.features.scalable.desc=Simplifiez le provisionnement des PC, le contrôle des licences en bloc et l’accès basé sur les rôles avec cette fonctionnalité qui s’intègre avec WXP pour le déploiement, l’utilisation et la gestion au sein des entreprises.
account_management.subscriptions.addon.oob.features.secure=Expériences utilisateur sécurisées
account_management.subscriptions.addon.oob.features.secure.desc=Les utilisateurs gagnent en visibilité sur les sessions à distance et peuvent interrompre la connexion à tout moment. La confiance est au cœur de l’assistance transparente et sécurisée pour une expérience utilisateur optimale.
account_management.subscriptions.addon.oob.header=Connexion à distance hors bande
account_management.subscriptions.addon.oob.overview.desc1=Vous cherchez à améliorer les expériences numériques pour vos équipes hybrides ? Avec la connexion à distance hors bande HP, l’assistance technique accèdent au BIOS à distance pour effectuer le redémarrage, la réinitialisation et la récupération des PC, même en cas d’échec du système d’exploitation, sans manipulation par les utilisateurs ni intervention physique.
account_management.subscriptions.addon.vyopta.connect_accounts.error=Nous n’avons pas pu connecter votre compte. Vérifiez votre connexion et réessayez.
account_management.subscriptions.addon.vyopta.connect_accounts.found=Nous avons détecté un compte Vyopta "<b>{orgName}</b>". Souhaitez-vous le connecter à WXP ?
account_management.subscriptions.addon.vyopta.connect_accounts.no_permissions=Vous ne disposez pas des autorisations nécessaires. Veuillez contacter l’administrateur du compte Vyopta pour obtenir de l’aide.
account_management.subscriptions.addon.vyopta.connect_accounts.not_found=La détection automatique de votre compte {service} n’a pas abouti. Si vous êtes déjà client {service}, veuillez contacter {support_link} pour vous aider à configurer cette connexion.
account_management.subscriptions.addon.vyopta.connect_accounts.org_already_mapped=Cet ID Vyopta est déjà lié à un autre locataire. Veuillez contacter votre administrateur de compte pour obtenir une assistance.
account_management.subscriptions.addon.vyopta.connect_accounts.request_support=Veuillez contacter votre administrateur de compte {service} pour obtenir de l’aide.
account_management.subscriptions.addon.vyopta.connect_accounts.success=Nous avons connecté votre compte avec succès.
account_management.subscriptions.addon.vyopta.connect_accounts.unauthorized=Votre entreprise est bien identifiée dans {service}, mais il semble que vous ne disposiez pas des autorisations requises pour connecter les comptes.
account_management.subscriptions.addon.vyopta.desc=Optimisez la collaboration grâce à des informations en temps réel. Gérez la qualité des appels, l’utilisation des salles de réunion et les performances système sur Microsoft Teams, Zoom, Poly et Webex. L’intégration avec WXP permet aux services informatiques d’améliorer les expériences numériques et d’optimiser l’efficacité des collaborateurs.
account_management.subscriptions.addon.vyopta.features.comprehensive_monitoring=Surveillance efficace des différentes plateformes de collaboration
account_management.subscriptions.addon.vyopta.features.comprehensive_monitoring.desc=Obtenez un aperçu global de votre environnement de communications unifiées multifournisseurs pour bénéficier d’une gestion optimale des outils de collaboration.
account_management.subscriptions.addon.vyopta.features.deep_integration=Intégration avancée avec WXP
account_management.subscriptions.addon.vyopta.features.deep_integration.desc=Les données d’analyse et de gestion de Vyopta sont parfaitement intégrées à WXP afin de faciliter la gestion des performances de collaboration et l’utilisation d’autres technologies professionnelles. Cette approche centralisée améliore l’efficacité informatique, réduit la complexité et optimise la gestion de l’expérience numérique.
account_management.subscriptions.addon.vyopta.features.enhance_user_engagement=Amélioration de l’engagement et du bien-être des utilisateurs
account_management.subscriptions.addon.vyopta.features.enhance_user_engagement.desc=Utilisez les analyses de collaboration pour identifier les problèmes de productivité et améliorer l’expérience et le bien-être des employés.
account_management.subscriptions.addon.vyopta.features.optimize_meeting_space=Optimisation de l’utilisation des espaces de réunion
account_management.subscriptions.addon.vyopta.features.optimize_meeting_space.desc=Analysez l’occupation des salles et les habitudes d’utilisation afin de rentabiliser les investissements immobiliers et améliorer l’efficacité des salles de réunion.
account_management.subscriptions.addon.vyopta.features.proactive_issue_detection=Détection proactive et résolution des problèmes
account_management.subscriptions.addon.vyopta.features.proactive_issue_detection.desc=Utilisez la surveillance en temps réel pour identifier et résoudre les problèmes de qualité de collaboration avant qu’ils ne perturbent les utilisateurs, afin de minimiser le temps consacré à la résolution des problèmes.
account_management.subscriptions.addon.vyopta.header=Expérience de collaboration par Vyopta
account_management.subscriptions.addon.vyopta.overview=Offrez aux équipes informatiques des outils avancés de gestion et d’analyse pour les outils collaboratifs. L’intégration de Vyopta dans WXP offre une visibilité en temps réel sur l’utilisation des salles de réunion, la qualité des appels et les performances système sur les différentes plateformes comme Microsoft Teams, Zoom, Poly, et Webex. Améliorez la productivité en résolvant les problèmes de collaboration de manière proactive et en optimisant les expériences professionnelles.
account_management.subscriptions.addon.vyopta.short_desc=Analyses détaillées et informations sur les salles pour améliorer les environnements de collaboration
account_management.subscriptions.addon.wolf.desc=Déploiement, visibilité et protection de bout en bout, combinant la sécurité matérielle et logicielle afin de renforcer la défense des PC.
account_management.subscriptions.addon.wolf_security=HP Wolf Security
account_management.subscriptions.addon.wolf_security.desc=Protection imbattable des points de terminaison des périphériques contre les cyberattaques assurée par HP Wolf. Affichez la télémétrie dans HP Workforce Experience pour une sécurité renforcée.
account_management.subscriptions.addon.wpt.desc=Suivez, verrouillez et sécurisez à distance les périphériques perdus ou volés. Lorsqu’elle est intégrée dans WXP, elle aide les équipes informatiques à suivre les ressources PC et à réduire les risques de perte des périphériques, même si ceux-ci sont hors tension.
account_management.subscriptions.addon.wpt.features.always_available=Disponibilité permanente
account_management.subscriptions.addon.wpt.features.always_available.desc=Exploite des technologies logicielles et matérielles afin de fournir des fonctionnalités de localisation/verrouillage/effacement, même si le PC est éteint, qu’il n’est pas connecté à internet ou qu’il ne démarre pas.
account_management.subscriptions.addon.wpt.features.message_customization=Messages personnalisés
account_management.subscriptions.addon.wpt.features.message_customization.desc=Transmettez un message personnalisé à l’ordinateur cible pour afficher des instructions de déverrouillage
account_management.subscriptions.addon.wpt.features.remote_lock_and_erase=Verrouillage et effacement à distance
account_management.subscriptions.addon.wpt.features.remote_lock_and_erase.desc=Verrouillez un PC au niveau du micrologiciel afin de protéger les données et rendre l’appareil volé inutilisable. Effacez le stockage principal d’un ordinateur perdu ou volé pour éviter toute violation de données.
account_management.subscriptions.addon.wpt.features.seamless_integration=Intégration parfaite avec WXP
account_management.subscriptions.addon.wpt.features.seamless_integration.desc=Gérez la sécurité de l’appareil directement depuis WXP afin de simplifier les opérations informatiques ainsi que la gestion des terminaux.
account_management.subscriptions.addon.wpt.features.separations_of_duties=Séparation des tâches
account_management.subscriptions.addon.wpt.features.separations_of_duties.desc=Pour garantir la sécurité et éviter les erreurs ou les menaces internes, le verrouillage et l’effacement des données nécessite une validation par plusieurs intervenants.
account_management.subscriptions.addon.wpt.features.strong_audit_trail=Piste d’audit fiable
account_management.subscriptions.addon.wpt.features.strong_audit_trail.desc=Enregistre sur la plateforme WXP la réussite du verrouillage et de l’effacement en tant que preuve de conformité.
account_management.subscriptions.addon.wpt.header=HP Wolf Protect and Trace with Wolf Connect
account_management.subscriptions.addon.wpt.overview=Améliorez la gestion des ressources et réduisez les risques de violation des données avec HP Wolf Protect & Trace. Intégrée dans WXP, cette solution unique permet aux équipes informatiques de localiser, verrouiller et effacer des périphériques perdus ou volés, même s’ils sont hors tension. Couverture mondiale et administration facile adaptée à toutes les tailles de clients.
account_management.subscriptions.addon.wpt.requirements.purchase=Nécessite l’achat d’un nouveau PC HP auprès de votre représentant commercial HP ou votre partenaire de distribution agréé.<br> Nécessite un PC compatible avec option d’affichage « WWAN ». Liste des PC pris en charge à l’adresse : https://www.hpwolf.com/en/legal/ptwc/platforms
account_management.subscriptions.addon.wpt.short_desc=Localisez, verrouillez et effacez à distance un PC dans le monde entier, même s’il est éteint
