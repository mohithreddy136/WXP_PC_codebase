exp.AntivirusSignatureUpdatesNeeded.description=L'appareil est configuré pour utiliser un antivirus tiers non-Microsoft afin de le protéger contre les virus, les logiciels malveillants et d’autres menaces, mais des mises à jour de la signature antivirus sont requises sur l'appareil.
exp.AntivirusSignatureUpdatesNeeded.deviceRemediation=Dépannage du périphérique :
exp.AntivirusSignatureUpdatesNeeded.option1=Option 1 : Pour les solutions antivirus non-Microsoft gérées de manière centralisée, l’administrateur de la suite antivirus de l’organisation doit définir la politique de mise à jour au moins une fois par semaine (recommandé).
exp.AntivirusSignatureUpdatesNeeded.option2=Option 2 : Pour les solutions antivirus gérées par les utilisateurs, l’utilisateur devrait ouvrir la console d’administration de l’antivirus et suivre la procédure pour planifier ou déclencher une mise à jour de la signature. Il est recommandé que la solution antivirus soit configurée pour télécharger les mises à jour au moins une fois par semaine.
