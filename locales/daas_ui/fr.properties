dnto.subscriptions.about_hp.desc1=Nous sommes une entreprise technologique, née de la conviction que la finalité des sociétés ne réside pas dans le profit pur et simple. Elles devraient rendre le monde meilleur. Les efforts que nous consacrons à l’action climatique, aux droits humains et à l'équité numérique démontrent que nous faisons tout notre possible en ce sens.
dnto.subscriptions.about_hp.desc2=Avec plus de 80 ans d'actions démontrant nos intentions, nous sommes animés de la confiance nécessaire pour imaginer un monde où l'innovation donne lieu à des contributions extraordinaires à l’humanité.
dnto.subscriptions.about_hp.desc3=Et notre technologie, un portefeuille de produits et de services comportant des systèmes personnels, des imprimantes et des solutions d'impression 3D, a été conçue pour être la source d'inspiration de ce progrès significatif.
dnto.subscriptions.about_hp.desc4=Nous savons que les idées ingénieuses peuvent émaner de n'importe qui, n'importe où et n’importe quand.
dnto.subscriptions.about_hp.desc5=Et il suffit d'un(e) seul(e) pour changer le monde.
