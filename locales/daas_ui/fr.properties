poly.lens.addon.details.description=Gérez la flotte de périphériques de collaboration HP dans l’ensemble de votre organisation avec confiance et transparence. Des déploiements rationalisés à la maintenance simplifiée, en passant par la surveillance proactive et les connaissances concrètes, les équipes informatiques bénéficient d’un contrôle centralisé des espaces, des salles et des périphériques. Grâce à une gestion sécurisée basée sur le cloud et à une assistance fluide pour le travail hybride, vous réduisez les frais opérationnels, gardez une longueur d’avance sur les problèmes et fournissez une expérience fiable et cohérente, là où se trouvent vos équipes.
poly.lens.addon.feature.centralized.header=Gestion centralisée des périphériques personnels
poly.lens.addon.feature.centralized.text=Grâce aux applications HP Poly Studio, proposez une expérience fluide en libre-service aux utilisateurs finaux, tout en offrant aux équipes informatiques une visibilité et un contrôle centralisés sur les périphériques personnels. Gérez l’inventaire, les mises à jour, la surveillance et les informations en toute confiance, où que se trouvent vos équipes.
poly.lens.addon.feature.effortless.maintenance.header=Maintenance simplifiée
poly.lens.addon.feature.effortless.maintenance.text=Gérez les paramètres, les fonctionnalités et les mises à jour logicielles de l’ensemble de votre parc en toute simplicité. Appliquez des paramètres, préparez des mises à jour et ajustez les configurations à grande échelle sans compromis sur le contrôle ou la précision.
poly.lens.addon.feature.meaningful.measurement.header=Mesures concrètes
poly.lens.addon.feature.meaningful.measurement.text=Comprenez comment les périphériques, les espaces et les personnes fonctionnent réellement. Transformez les données d’utilisation et de performance en décisions plus intelligentes axées sur les données pour vos investissements en matière de collaboration.
poly.lens.addon.feature.proactive.monitoring.header=Surveillance proactive
poly.lens.addon.feature.proactive.monitoring.text=Gardez une longueur d’avance sur les problèmes grâce à une visibilité claire sur l’intégrité et l’état des périphériques. Recevez des alertes en cas de problème, afin que ces derniers soient résolus avant de perturber les réunions.
poly.lens.addon.feature.secure.header=Contrôle sécurisé basé sur le cloud
poly.lens.addon.feature.secure.text=Assurez une gestion complète via une plate-forme cloud fiable qui s’adapte à la croissance de votre organisation tout en répondant aux besoins de sécurité et de conformité de votre entreprise.
poly.lens.addon.feature.simplified.deployment.header=Déploiement simplifié
poly.lens.addon.feature.simplified.deployment.text=Préparez, préconfigurez et déployez vos périphériques en toute confiance. Les workflows d’intégration automatisés réduisent le temps de configuration, suppriment les erreurs et assurent la préparation des périphériques avant même qu’ils n’arrivent entre les mains d’un utilisateur ou dans une salle.
