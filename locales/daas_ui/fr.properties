wex.fleet.mgmt.remediation.kernel_panic_error.desc=Une panique du noyau s’est produite, signalant une erreur critique du système bloquant la reprise du noyau Linux. L’incident a pu être causé par des défaillances matérielles, des pilotes corrompus, une mauvaise configuration des paramètres de noyau ou des modules de noyau incompatibles. Il est recommandé d’enquêter immédiatement pour identifier l’origine du problème.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt1=Consultez les journaux système (/var/log/messages, /var/log/syslog, ou journalctl) pour accéder aux messages d’erreur précédant la panique.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt2=Vérifiez l’intégrité du matériel, notamment la mémoire (RAM), et des disques à l’aide d’outils tels que memtest86 et smartctl.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt3=Vérifiez les récentes modifications apportées au système (par exemple : mises à jour du noyau, installations de pilotes ou modifications de la configuration).
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt4=Démarrez en mode de secours ou de reprise pour accéder au système si le démarrage est impossible.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt5=Restaurez ou mettez à jour les modules de noyau ou les pilotes si vous les suspectez d’être incompatibles.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt6=Consultez l’assistance de la communauté ou du fournisseur si l’anomalie persiste ou est spécifique au matériel.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.desc=L’activation du chiffrage du disque protège les données sensibles au repos en veillant à ce que toutes les informations stockées sur le disque soient illisibles sans authentification. Il s’agit d’une mesure de sécurité essentielle pour les systèmes qui manipulent des données confidentielles ou régulées.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step1=Mettez en place un chiffrage complet du disque via des outils tels que LUKS (Linux Unified Key Setup) ou dm-crypt, en fonction de votre distribution Linux.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step2=Chiffrez des partitions sensibles (par exemple : /home, /var ou /data) si un chiffrage complet du disque n’est pas envisageable.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step3=Configurez la gestion des clés sécurisées, y compris des phrases secrètes ou l’intégration avec TPM (Trusted Platform Module), le cas échéant.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step4=Sauvegardez des clés de chiffrement en toute sécurité pour éviter la perte de données en cas de mauvais positionnement des clés.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step5=Testez les paramètres de cryptage pour garantir le démarrage correct du système et l’accès aux données après authentification.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step6=Documentez la configuration des chiffrements et les procédures de reprise afin d’assurer la conformité et la continuité des opérations.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step1=Installez et configurez un outil de pare-feu tels que firewalld, ufw ou iptables, en fonction de votre distribution Linux.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step2=Activer le service de pare-feu pour lancer le démarrage
wex.fleet.mgmt.remediation.linux_firewall_disabled.step3=Définissez les règles du pare-feu pour autoriser uniquement les services nécessaires (par exemple : SSH, HTTP/HTTPS) et bloquer les autres.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step4=Vérifiez le statut et les règles du pare-feu via : sudo firewall-cmd --list-all (pour firewalld), sudo ufw status (pour ufw)
wex.fleet.mgmt.remediation.linux_firewall_disabled.step5=Inspectez régulièrement les configurations du pare-feu pour assurer leur alignement avec les politiques de sécurité et les besoins opérationnels.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.desc=L’activation du démarrage sécurisé participe à la protection du système contre le code malveillant et non autorisé lors du processus de démarrage en vérifiant les signatures numériques des chargeurs d’amorçage, les modules du noyau et les pilotes. Cela améliore la sécurité et l’intégrité du système, notamment dans les environnements d’entreprise ou axés sur la conformité.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step1=Vérifiez la prise en charge du démarrage sécurisé pour le micrologiciel UEFI et son activation dans les paramètres UEFI.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step2=Installez et configurez les chargeurs d’amorçage signés et les paquets du noyau compatibles avec le démarrage sécurisé (par exemple : via shim et un GRUB signé).
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step3=Vérifiez que le noyau, les modules et tous les composants requis sont signés.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step4=Redémarrez et confirmez le statut du démarrage sécurisé avec mokutil.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step5=Enregistrez des clés personnalisées si vous utilisez des composants non standard.
wex.fleet.mgmt.remediation.missing_linux_security_updates.desc=Une ou plusieurs mises à jour de sécurité manquent dans le système. Ces mises à jour traitent des vulnérabilités connues dans le système d’exploitation, le noyau ou les paquets installés. Leur absence est susceptible d’exposer le système à des accès non autorisés, des violations de données ou des interruptions de service.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step1=Vérifiez et identifiez les correctifs de sécurité manquants via le gestionnaire de paquets du système (par exemple : apt, yum, dnf, zypper).
wex.fleet.mgmt.remediation.missing_linux_security_updates.step2=Effectuez toutes les mises à jour de sécurité essentielles immédiatement pour limiter les menaces connues et les vulnérabilités.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step3=Redémarrez le système si besoin, en particulier à la suite de mises à jour des services fondamentaux ou du noyau.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step4=Activez les mises à jour de sécurité automatiques ou programmez des correctifs réguliers pour assurer une protection continue.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step5=Vérifiez que la mise à jour a bien été effectuée en consultant les journaux et en confirmant les versions des paquets.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step6=Réalisez une analyse de vulnérabilité à l’issue de la mise à jour afin de vérifier qu’il n’existe plus aucun risque.
wex.fleet.mgmt.remediation.missing_linux_updates.desc=Une ou plusieurs mises à jour Linux manquent dans le système. Ces mises à jour peuvent inclure des correctifs de sécurité, de noyau et des améliorations au niveau de la stabilité. L’exécution d’un système obsolète augmente le risque de vulnérabilités, de plantages du système et des anomalies de compatibilité.
wex.fleet.mgmt.remediation.missing_linux_updates.step1=Consultez les mises à jour disponibles via votre gestionnaire de paquets (par exemple : yum, dnf, apt ou zypper) pour identifier les correctifs essentiels manquants.
wex.fleet.mgmt.remediation.missing_linux_updates.step2=Appliquez toutes les mises à jour de sécurité et du noyau le plus tôt possible pour limiter les vulnérabilités connues.
wex.fleet.mgmt.remediation.missing_linux_updates.step3=Redémarrez le système si besoin, en particulier à la suite de mises à jour fondamentales du système ou du noyau.
wex.fleet.mgmt.remediation.missing_linux_updates.step4=Activez les mises à jour automatiques ou programmez des correctifs réguliers pour assurer des mises à jour ponctuelles par la suite.
wex.fleet.mgmt.remediation.missing_linux_updates.step5=Vérifiez le succès de la mise à jour en consultant les journaux système et en confirmant les versions actuelles des paquets et du noyau.
wex.fleet.mgmt.remediation.network_connection_not_secure.desc=Une connexion réseau a été détectée au cours des dernières 24 heures sans le niveau de sécurité attendu.
wex.fleet.mgmt.remediation.network_connection_not_secure.desc1=Une connexion non authentifiée a été détectée au cours des 7 derniers jours.
wex.fleet.mgmt.remediation.network_disconnections.desc=Certains appareils ont subi des interruptions répétées au cours des dernières 24 heures.
wex.fleet.mgmt.remediation.network_disconnections.desc1=Des déconnexions réseau ont été détectées au cours des 7 derniers jours.
wex.fleet.mgmt.remediation.network_speed_slow.desc=Vitesse du réseau signalée comme faible au cours des dernières 24 heures.
wex.fleet.mgmt.remediation.wifi_signal_strength_weak.desc=La force du signal Wi-Fi a été signalée comme étant faible au cours des dernières 24 heures.
