wex.labs.remediation.ai.description=La solution assistée par IA vous oriente vers la solution la plus pertinente. Elle filtre intelligemment les options pour aider vos équipes à résoudre les problèmes plus vite et de manière uniforme.
wex.labs.remediation.ai.description.disclaimer=You are about to interact with an AI solution. Content generated by AI might contain inaccuracies and should be verified against the details provided. Please note that AI-generated responses might be incomplete or incorrect, and HP assumes no responsibility for actions taken based on this content.
wex.labs.remediation.ai.details.analyzesAvailableRemediations.desc=L’algorithme analyse les remédiations existantes sur la plate-forme, y compris les scripts, les politiques et les actions/mises à jour des périphériques pour recommander la remédiation la plus pertinente.<br/><br/>Il observe l’historique d’utilisation et le taux de réussite pour comprendre les méthodes de résolution typiques pour ce type de problème dans votre organisation. Les utilisateurs peuvent consacrer moins de temps aux plans d’action en confiant ces tâches à l’IA.
wex.labs.remediation.ai.details.analyzesAvailableRemediations.title=Analyse les mesures correctives disponibles
wex.labs.remediation.ai.details.applyOrReview.desc=Selon la solution choisie, les administrateurs peuvent : <br/><div class=remediation-ai-ui><ul><li>L’appliquer immédiatement sur les périphériques sélectionnés</li><li>La planifier ultérieurement pour limiter les interruptions</li><li>Consulter les détails avant de valider l’action</li></ul></div><br/>Une fois appliquée, l’opération et ses résultats sont suivis à des fins de transparence et d’apprentissage continu.
wex.labs.remediation.ai.details.applyOrReview.title=Appliquer, programmer ou vérifier
wex.labs.remediation.ai.details.continuousLearning.desc=La précision des recommandations s’améliore au fil du temps.
wex.labs.remediation.ai.details.continuousLearning.title=Apprentissage continu
wex.labs.remediation.ai.details.howItWorks.title=Fonctionnement
wex.labs.remediation.ai.details.issueToRemediation.desc=Lorsqu’un problème dépasse un seuil défini, il apparaît sur votre tableau de bord accompagné d’une description claire de la situation et de l’impact potentiel sur vos périphériques. La plateforme WXP prend désormais en charge la remédiation directe et la fonctionnalité de remédiation assistée par l’IA permet d’identifier la meilleure option pour résoudre le problème.
wex.labs.remediation.ai.details.issueToRemediation.title=Du diagnostic à la solution
wex.labs.remediation.ai.details.learnsandImproves.desc=L’algorithme développe en permanence sa compréhension de ce qui fonctionne le mieux pour votre organisation.<br/>À chaque mesure corrective appliquée, le système apprend :<div class=remediation-ai-ui><ul><li>Le degré d’efficacité de la mesure</li><li>Le délai de résolution du problème</li><li>Si des problèmes similaires ont eu lieu à nouveau</li></ul></div><br/>Cette boucle de feedback renforce les recommandations futures, qui deviennent plus précises et personnalisées au fil du temps.
wex.labs.remediation.ai.details.learnsandImproves.title=Apprend et s’améliore au fil du temps
wex.labs.remediation.ai.details.overview.desc=La remédiation assistée par l’IA aide les administrateurs IT à passer rapidement de la détection à la résolution. Elle analyse les données de votre flotte et recommande la politique, le script ou la mise à jour de périphérique nécessaire pour résoudre le problème en question. L’algorithme utilise les schémas de remédiation existants dans votre environnement pour suggérer la solution la plus pertinente.
wex.labs.remediation.ai.details.recommendBestFix.desc=Chaque recommandation inclut : <br/><div class=remediation-ai-ui><ul><li>Type d’action : script, politique ou mise à jour</li><li>Pertinence : la remédiation et l’automatisation résolvent les problèmes en temps réel, améliorent la productivité des employés et l’expérience numérique, font gagner du temps et diminuent la vulnérabilité.</li></ul></div>
wex.labs.remediation.ai.details.recommendBestFix.title=Recommande la meilleure solution
wex.labs.remediation.ai.details.relevance.desc=L’IA utilise vos propres solutions internes pour proposer des actions adaptées.
wex.labs.remediation.ai.details.relevance.title=Pertinence
