exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.option5=Option 5 : Mettre à jour le micrologiciel du BIOS en créant une politique BIOS ou en utilisant HP Image Assistant.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.possibleCauses=Causes possibles :
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.responseOptions=Les mesures correctives varient en fonction de l’application en question. Si l’application est essentielle à votre activité, la mise à niveau du CPU est susceptible de limiter l’impact du problème. Pour les applications non essentielles, vous pouvez les retirer de l’appareil ou ajuster leurs paramètres afin de réduire la charge sur l’appareil.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.restartComputer=Redémarrer l’ordinateur pour fermer complètement toutes les applications en cours.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.suggestedRemediations=Correctifs suggérés :
