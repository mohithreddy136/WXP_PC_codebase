exp.ExcessiveOsShutdownTime.causeAppHung=L’application est bloquée et ne se ferme pas correctement.
exp.ExcessiveOsShutdownTime.causeEventLog=La fermeture du journal des événements de Windows prend un temps excessif.
exp.ExcessiveOsShutdownTime.causeGroupPolicy=Les mises à jour de la stratégie de groupe prennent beaucoup de temps.
exp.ExcessiveOsShutdownTime.causeShutdownScripts=Les scripts d’arrêt prennent un temps excessif pour s’exécuter.
exp.ExcessiveOsShutdownTime.causeSlowDrive=Un disque dur lent prend un temps excessif pour effacer le contenu du fichier de page de la mémoire virtuelle.
exp.ExcessiveOsShutdownTime.causeSlowLink=L’appareil est sur une liaison lente.
exp.ExcessiveOsShutdownTime.causeWindowsUpdates=L’appareil installe les mises à jour de Windows.
exp.ExcessiveOsShutdownTime.possibleCauses=Causes possibles :
exp.ExcessiveOsShutdownTime.removeStartupApps=Supprimer les applications inutiles ou non essentielles à l’activité de l’entreprise et désactiver leur démarrage automatique.
