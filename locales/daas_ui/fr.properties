exp.NetworkConnectionNotSecure.moreInfo.linkText=Indication de réseau Wi-Fi non sécurisé (Microsoft Learn)
exp.NetworkConnectionNotSecure.moreInfo.linkText1=En savoir plus sur la sécurité de votre réseau
exp.NetworkConnectionNotSecure.moreInfoHeader=Plus d'informations :
exp.NetworkConnectionNotSecure.moreInformationHeader=Plus d'informations :
exp.NetworkConnectionNotSecure.recAccessControl=Mettez en place un contrôle d’accès réseau pour restreindre l’accès.
exp.NetworkConnectionNotSecure.recChangeSecurity=Modifier la configuration de la sécurité du Wi-Fi du domicile
exp.NetworkConnectionNotSecure.recChangeSecurity.step1=Connectez-vous au routeur via son logiciel de gestion.
exp.NetworkConnectionNotSecure.recChangeSecurity.step2=Modifiez le type de sécurité du réseau Wi-Fi du domicile.
exp.NetworkConnectionNotSecure.recChangeSecurity.step3=Utilisez un protocole d’authentification moderne (ex. WPA2 ou WPA3).
exp.NetworkConnectionNotSecure.recCheckPCSettings=Vérifiez les paramètres réseau de l’appareil.
exp.NetworkConnectionNotSecure.recCheckPCSettings.detail=Assurez-vous que le pare-feu est bien activé et que le réseau est défini comme étant privé si nécessaire.
exp.NetworkConnectionNotSecure.recCheckRouterSettings=Contrôlez les paramètres de sécurité du routeur.
exp.NetworkConnectionNotSecure.recCheckRouterSettings.detail=Activez le chiffrement, définissez un mot de passe administrateur complexe et désactivez la fonctionnalité WPS si elle n’est pas nécessaire.
exp.NetworkConnectionNotSecure.recCheckSecurityProtocol=Vérifiez le protocole de sécurité sans fil.
exp.NetworkConnectionNotSecure.recCheckSecurityProtocol.detail=Utilisez le protocole WPA2 ou WPA3 ; évitez les réseaux ouverts ou WEP.
exp.NetworkConnectionNotSecure.recCheckSSID=Vérifiez que vous êtes connecté au bon SSID.
exp.NetworkConnectionNotSecure.recCheckSSID.detail=Vérifiez que le nom du réseau correspond bien au point d’accès de confiance.
exp.NetworkConnectionNotSecure.recEnableEncryption=Activez le chiffrement réseau afin de protéger les données transmises.
exp.NetworkConnectionNotSecure.recMacFiltering=Utilisez le filtrage par adresse MAC pour n’autoriser que les appareils autorisés.
exp.NetworkConnectionNotSecure.recMonitorActivity=Surveillez l’activité réseau afin de détecter tout appareil non autorisé.
exp.NetworkConnectionNotSecure.recommendationsHeader=Recommandations :
exp.NetworkConnectionNotSecure.recommendationsHeader1=Recommandations :
exp.NetworkConnectionNotSecure.recStrongPasswords=Définissez des mots de passe forts et uniques pour sécuriser l’accès au réseau.
exp.NetworkConnectionNotSecure.recUpdateFirmware=Maintenez à jour le micrologiciel des routeurs et des périphériques afin de lutter contre les vulnérabilités.
exp.NetworkConnectionNotSecure.recUpgradeRouter=Remplacez les routeurs ou points d’accès anciens par des modèles répondant aux standards de sécurité actuels.
exp.NetworkDisconnections.causeInsufficientSpeed=Débit Internet insuffisant
exp.NetworkDisconnections.causeInsufficientSpeed.detail1=Une bande passante trop faible lors des périodes de forte utilisation peut entraîner des interruptions de connexion et des déconnexions fréquentes.
exp.NetworkDisconnections.causeInsufficientSpeed.detail2=Recommandation : Effectuez des tests de débit et augmentez votre forfait si la bande passante fournie est insuffisante.
exp.NetworkDisconnections.causeInterference=Interférences sans fil ou obstacles physiques.
exp.NetworkDisconnections.causeOutdatedRouter=Routeur ou modem obsolète installé à domicile
exp.NetworkDisconnections.causeOutdatedRouter.detail1=Un routeur obsolète peut ne pas prendre en charge les normes récentes ou un grand nombre de périphériques connectés, ce qui entraîne une surcharge réseau et des déconnexions
exp.NetworkDisconnections.causeOutdatedRouter.detail2=Recommandation : Maintenez vos équipements réseau à jour ; tentez d’effectuer une réinitialisation aux valeurs d’usine pour corriger les paramètres corrompus.
exp.NetworkDisconnections.causeOutdatedRouter.detail3=Si les problèmes persistent ou si le matériel est trop ancien, passez à un modèle plus récent pour plus de fiabilité.
exp.NetworkDisconnections.causePoorWifiSignal=Signal Wi-Fi faible
exp.NetworkDisconnections.causePoorWifiSignal.detail1=Un signal faible ou bloqué entraîne une connexion instable pour vos appareils.
exp.NetworkDisconnections.causePoorWifiSignal.detail2=Recommandation : Placez le routeur au centre de votre espace de travail et ajustez le canal ou la fréquence pour limiter les interférences.
exp.NetworkDisconnections.causeRouterIssues=Problèmes matériels ou liés au micrologiciel du routeur.
exp.NetworkDisconnections.causeSoftwareDriverIssues=Problèmes logiciels ou pilotes
exp.NetworkDisconnections.causeSoftwareDriverIssues.detail1=L’installation de pilotes/micrologociels obsolètes ou corrompus peuvent affecter la stabilité de la connexion.
exp.NetworkDisconnections.causeSoftwareDriverIssues.detail2=Recommandation : Activez les mises à jour automatiques et maintenez à jour tous les logiciels liés au réseau.
exp.NetworkDisconnections.causeUnprotectedNetwork=Réseau non sécurisé
exp.NetworkDisconnections.causeUnprotectedNetwork.detail1=L’utilisation de la bande passante par des utilisateurs non autorisés sur le réseau peut provoquer des déconnexions et diminuer les performances.
exp.NetworkDisconnections.causeUnprotectedNetwork.detail2=Recommandation : utilisez un mot de passe Wi-Fi fort et unique pour éviter l’accès non autorisé.
exp.NetworkDisconnections.possibleCauses=Causes possibles
exp.NetworkDisconnections.possibleCausesHeader=Causes possibles :
exp.NetworkDisconnections.recCheckCables=Vérifiez les câbles réseau.
exp.NetworkDisconnections.recCheckCables.detail=Assurez-vous qu’ils sont bien branchés et en bon état.
exp.NetworkDisconnections.recommendationsHeader=Recommandations :
exp.NetworkDisconnections.recReduceInterference=Réduisez les interférences sans fil.
exp.NetworkDisconnections.recReduceInterference.detail=Déplacez les appareils ou changez de canal pour éviter le chevauchement des signaux.
exp.NetworkDisconnections.recRestartRouter=Redémarrez votre modem et routeur.
