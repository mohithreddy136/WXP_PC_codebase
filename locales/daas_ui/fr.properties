welcome.banner.description=TechPulse est une plate-forme de télémétrie et d'analyse qui fournit des données stratégiques sur les périphériques et les applications, en mettant le deep learning à la disposition des équipes informatiques de manière à proposer aux employés les ordinateurs, les logiciels et les services adaptés pour les accompagner jusqu'à la réussite. HP TechPulse intervient de manière proactive : identification des problèmes, activation des corrections à grande échelle et réduction des menaces grâce à la surveillance active du niveau de sécurité.
welcome.banner.description_p={app_name} est une plate-forme de télémétrie et d'analyse qui fournit des données stratégiques sur les périphériques et les applications, en mettant le deep learning à la disposition des équipes informatiques de manière à proposer aux employés les ordinateurs, les logiciels et les services adaptés pour les accompagner jusqu'à la réussite. {app_name} intervient de manière proactive : identification des problèmes, activation des corrections à grande échelle et réduction des menaces grâce à la surveillance active du niveau de sécurité.
welcome.banner.description_p1={app_name} est une plate-forme d’analytique et de télémétrie basée sur le Cloud qui regroupe des données d’intégrité et de configuration critiques à partir de vos périphériques et applications. Avec l’IA et le Deep Learning, elle analyse ces données pour identifier les problèmes, fournir des solutions adaptées et minimiser les risques de sécurité de manière proactive.
welcome.banner.title=Plate-forme d’automatisation qui fournit des services d’envergure internationale grâce à des informations significatives alimentées par des milliards de points de données
welcome.banner.title1={app_name} met à votre disposition des informations détaillées pour prédire et résoudre les problèmes du périphérique avant même qu’ils ne se produisent
