exp.DiskUtilizationHigh.deleteAllFiles=Sélectionner et supprimer tous les fichiers.
exp.DiskUtilizationHigh.emptyRecycleBin=Vider la corbeille.
exp.DiskUtilizationHigh.enterTemp=Saisir '%temp%' (sans les guillemets) dans la barre d'adresse et appuyer sur la touche Entrée.
exp.DiskUtilizationHigh.freeUpDiskSpace=Dans Synchronisation et sauvegarde, appuyer sur Libérer de l'espace disque.
exp.DiskUtilizationHigh.openExplorer=Ouvrir l'explorateur Windows.
exp.DiskUtilizationHigh.openOneDriveSettings=Ouvrez les paramètres Microsoft OneDrive.
