azureonboard.marketing.signupcard.description=Accédez à PC Health et à des informations prédictives pour prendre des décisions plus avisées et résoudre les problèmes émergents avant qu'ils n'impactent votre activité.
azureonboard.marketing.signupcard.footertext=En sélectionnant le bouton, j’accepte les <a target='_blank' href={termsLink}>conditions générales</a>, je consens à fournir les données requises pour la configuration du compte, et j’accepte les e-mails de la part de HP ou de ses partenaires concernant l’essai.
