sustainability.dashbaord.help=Aide
sustainability.dashboard.info_message=Les données de consommation d’énergie sont collectées de deux manières : via une puce intégrée de mesure de la consommation d’énergie (PCM) et la consommation estimée (EC) basée sur une récente mise à jour du BIOS pour les nouveaux PC HP. L’exactitude des données dépend de la méthode prise en charge par chaque PC spécifique.
sustainability.dashboard.info_message_data=Cette méthode calcule la consommation totale d’énergie en kilowattheures (kWh) pour chaque périphérique, sans tenir compte de son état (actif, mode veille, arrêté). En traitant toutes les données acquises à la fin de chaque semaine, elle fournit une vue complète de la consommation d’énergie du périphérique. Elle calcule et affiche également en temps réel la consommation totale d’énergie de la semaine en cours, jusqu’au moment présent.
