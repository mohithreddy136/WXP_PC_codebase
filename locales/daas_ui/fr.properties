side_panal.smart_refresh.help_sec3_point_1=Utilisation du CPU : Pourcentage moyen au cours des 30 derniers jours
side_panal.smart_refresh.help_sec3_point_2=Utilisation de la mémoire : Pourcentage moyen au cours des 30 derniers jours
side_panal.smart_refresh.help_sec3_point_3=Utilisation du disque : Dernier pourcentage d’utilisation enregistré
side_panal.smart_refresh.help_sec3_point_4=Pannes OS : Nombre total de pannes du système d’exploitation au cours des 7 derniers jours
side_panal.smart_refresh.help_sec3_point_5=Pannes BSOD : Nombre total d’écrans bleus de la mort au cours des 7 derniers jours
side_panal.smart_refresh.help_sec3_point_6=Durée de démarrage : Dernière durée enregistrée en minutes
side_panal.smart_refresh.help_sec3_point_7=Durée d’arrêt : Dernière durée enregistrée en minutes
side_panal.smart_refresh.help_sec3_point_8=Erreurs logicielles pour les applications de collaboration : Nombre total d’erreurs au cours des 7 derniers jours
side_panal.smart_refresh.help_sec3_point_9=Intégrité de l’alimentation de la station d’accueil : Dernières données enregistrées, Oui/Non
side_panal.smart_refresh.help_sec3_sub_text=Les neuf facteurs suivants contribuent à l’évaluation de la réactualisation, chacun accompagné d'une explication détaillant la façon dont il a été mesuré :
side_panal.smart_refresh.help_sub_title=Mettez à niveau les PC au bon moment avec Smart Refresh de HP. Voici comment cet outil fonctionne :
side_panal.smart_refresh.personas_header=Personas
side_panal.smart_refresh.personas_sub_text=Groupes de périphériques basés sur l'IA, déterminés par des modèles d'utilisation
side_panal.smart_refresh.point_1_desc=Évaluer l’état actuel des PC en termes de performances matérielles, d’ergonomie logicielle et de sécurité.
side_panal.smart_refresh.point_1_title=1. Évaluation
side_panal.smart_refresh.point_2_desc=Donner la priorité aux PC nécessitant une attention immédiate en fonction de leur utilisation, de leur importance pour les opérations commerciales ou de leur niveau d’obsolescence.
side_panal.smart_refresh.point_2_title=2. Prioritisation
side_panal.smart_refresh.point_3_desc=Réaliser efficacement les mises à niveau ou les remplacements planifiés, en minimisant les temps d’arrêt et les perturbations pour les utilisateurs.
side_panal.smart_refresh.point_3_title=3. Implémentation
side_panal.smart_refresh.point_4_desc=Garantir que les PC mis à jour sont équipés des dernières fonctionnalités de sécurité pour se protéger contre les menaces cybernétiques.
side_panal.smart_refresh.point_4_title=4. Sécurité
side_panal.smart_refresh.point_5_desc=Surveiller régulièrement les PC mis à jour pour s’assurer qu’ils continuent de fonctionner de manière optimale, et effectuer la maintenance nécessaire en cas de besoin.
side_panal.smart_refresh.point_5_title=5. Surveillance et maintenance
side_panal.smart_refresh.software_persona_1=Inactif : Utilisateurs qui n’utilisent pas fréquemment leur appareil
side_panal.smart_refresh.software_persona_2=Office 365 : Utilisateurs qui utilisent fréquemment des applications bureautiques, telles qu’Excel et Word
