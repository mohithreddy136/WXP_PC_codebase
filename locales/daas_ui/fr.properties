exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.description=Connexion non authentifiée détectée.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.moreInfo=Plus d'informations :
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.moreInfoLink=https://support.microsoft.com/en-us/windows/wi-fi-network-not-secure-in-windows-9170b675-921b-3aa5-7e43-fcb2059d159c
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option1=Option 1 : Si vous vous connectez au réseau Wi-Fi de votre domicile, envisagez de modifier le type de sécurité utilisé par votre routeur ou votre point d'accès.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option1.step1=Connectez-vous à votre routeur à l’aide du logiciel prévu à cet effet.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option1.step2=Modifiez le type de sécurité du réseau Wi-Fi de votre domicile.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option2=Option 2 : Si vous disposez d'un routeur ou d’un point d'accès plus ancien, envisagez d'acquérir un routeur plus récent prenant en charge les toutes dernières normes et améliorations en matière de sécurité.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.recommendations=Recommandations :
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.title=La connexion Wi-Fi n’est pas sécurisée
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.cause1=L’agencement de votre domicile peut causer des problèmes de Wi-Fi.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.cause2=Il est possible que le point d’accès se trouve derrière des murs et des obstacles.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.description=La force du signal Wi-Fi a été signalée comme étant faible au cours des dernières 24 heures.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.moreInfo=Plus d'informations :
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.moreInfoLink=https://support.microsoft.com/en-us/windows/wi-fi-problems-and-your-home-layout-e1ed42e7-a3c5-d1be-2abb-e8fad00ad32a#WindowsVersion=Windows_11
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.possibleCauses=Causes possibles pour le réseau domestique :
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1=Option 1 : Redémarrage du routeur
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step1=Débranchez le modem et le routeur de la prise électrique.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step2=Attendez au moins 15 secondes.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step3=Rebranchez le modem à la prise secteur, attendez 1 à 2 minutes, puis rallumez le routeur.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step4=Attendez que tous les voyants sur le panneau de votre modem filaire se soient allumés en vert avant de tester votre connexion Internet.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2=Option 2 : Déplacez votre point d'accès.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step1=Déplacez votre point d'accès, si cela est possible, afin de réduire le nombre de murs ou autres obstacles situés entre votre point d'accès et votre PC.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step2=Rapprochez votre PC du point d'accès, si cela est possible.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step3=Déplacez le point d'accès au centre de votre domicile ou de la pièce, si cela possible, à un emplacement en hauteur, si possible. Si vous le placez dans un coin ou sous un bureau, cela peut réduire la force de votre signal Wi-Fi.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendations=Recommandations :
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.title=La puissance du signal Wi-Fi est faible
exp.mgmt.troubleshoot.network.wifispeedisslow.cause1=Il est possible que le point d’accès se trouve derrière des murs et des obstacles.
exp.mgmt.troubleshoot.network.wifispeedisslow.cause2=Il est possible que le micrologiciel du routeur soit obsolète.
exp.mgmt.troubleshoot.network.wifispeedisslow.description=La vitesse nominale du Wi-Fi a été signalée comme étant ralentie au cours des dernières 24 heures.
exp.mgmt.troubleshoot.network.wifispeedisslow.possibleCauses=Causes possibles pour le réseau domestique :
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation1=Redémarrer votre modem et routeur
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation1.step1=Éteignez d’abord votre modem, puis votre routeur.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation2=Déplacer votre routeur
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation2.step1=Essayez de déplacer votre routeur vers un autre emplacement à votre domicile ou à votre bureau, ou ajustez l’antenne dans une autre direction.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation3=Mettre à jour le micrologiciel de votre routeur
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation3.step1=Les mises à jour régulières du micrologiciel du routeur peuvent corriger certains bogues et problèmes de connectivité. Certains routeurs proposent des mises à jour automatiques, mais la plupart nécessitent une mise à jour manuelle.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation4=Modifier la fréquence de votre routeur
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation4.step1=Les routeurs Wi-Fi sélectionnent automatiquement une bande de fréquence, mais vous pouvez essayer de la modifier dans la plage comprise entre 2,4 GHz et 5 GHz pour voir si cela améliore les vitesses. Toutefois, avant de procéder ainsi, vous devez vérifier que votre routeur prend en charge la fréquence 5 GHz.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation5=Mettre à jour vos pilotes Wi-Fi
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation5.step1=Des pilotes obsolètes ou corrompus peuvent aussi causer des problèmes réseau. Assurez-vous que votre adaptateur Wi-Fi est bien à jour.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation6=Éviter les interférences
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation6.step1=Les interférences dans les canaux peuvent considérablement réduire le débit et ralentir le transfert de données ; vous devez donc essayer d'éliminer les éventuelles interférences que vous rencontrez.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation7=Vérifier les autres périphériques
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation7.step1=Observez quels autres périphériques sont connectés à votre réseau et leur activité. Par exemple, si un autre périphérique télécharge un grand nombre de données, cela peut affecter vos vitesses.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendations=Recommandations :
exp.mgmt.troubleshoot.network.wifispeedisslow.title=La vitesse du Wi-Fi est lente
