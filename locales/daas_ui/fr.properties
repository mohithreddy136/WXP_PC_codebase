exp.ExcessiveOsShutdownTime.title=Optimiser le temps d’arrêt de l’OS
exp.ExcessiveOsStartupTime.causeAntivirus=Les services antivirus ou d’autres applications gourmandes en espace disque prennent un temps de chargement excessif.
exp.ExcessiveOsStartupTime.causeGroupPolicyDownload=Le téléchargement des objets de politique de groupe lors du redémarrage du système prend beaucoup de temps.
exp.ExcessiveOsStartupTime.causeSlowDomainLink=Le PC peut avoir une liaison lente avec le contrôleur de domaine à partir duquel les objets de politique de groupe sont téléchargés au démarrage.
exp.ExcessiveOsStartupTime.causeStartupScripts=Les scripts de démarrage prennent un temps excessif.
exp.ExcessiveOsStartupTime.option1=Option 1 : Windows 11 - Applications de démarrage dans les Paramètres
exp.ExcessiveOsStartupTime.option1Guide=Pour améliorer la performance de l’appareil et résoudre la lenteur de la connexion, la solution la plus efficace est de bloquer le lancement des applications lors de la connexion. Pour les appareils Windows 11, Microsoft met à disposition un guide pour maîtriser votre démarrage Windows.
exp.ExcessiveOsStartupTime.option1GuideLink=https://www.microsoft.com/en-us/windows/learning-center/take-control-of-windows-startup
exp.ExcessiveOsStartupTime.option1GuideLinkText=https://www.microsoft.com/en-us/windows/learning-center/take-control-of-windows-startup
exp.ExcessiveOsStartupTime.option1StepApps=Dans le menu de gauche, sélectionner Applications.
exp.ExcessiveOsStartupTime.option1Steps=by changing the Windows startup programs using the following steps:
exp.ExcessiveOsStartupTime.option1StepSettings=Sélectionnez Paramètres.
exp.ExcessiveOsStartupTime.option1StepStart=Cliquer sur le bouton Démarrer, qui ressemble au logo Microsoft.
exp.ExcessiveOsStartupTime.option1StepStartup=En bas de la fenêtre Applications, sélectionner Démarrage.
exp.ExcessiveOsStartupTime.option1StepToggles=Utilisez les options d’activation afin de choisir les applications à exécuter lors du démarrage. Activez les applications que vous souhaitez ouvrir lors du démarrage ou désactivez les autres.
exp.ExcessiveOsStartupTime.option2=Option 2 : Windows 11 - Applications de démarrage dans le Gestionnaire des tâches
exp.ExcessiveOsStartupTime.option2Guide=Les applications de démarrage peuvent également être activées ou désactivées depuis le Gestionnaire des tâches Windows en effectuant les étapes suivantes :
exp.ExcessiveOsStartupTime.option2StepDisable=Faites un clic droit sur l’application et sélectionnez « Désactivez » (si la colonne de statut affiche « Activée »).
exp.ExcessiveOsStartupTime.option2StepStart=Cliquer sur le bouton Démarrer, qui ressemble au logo Microsoft.
exp.ExcessiveOsStartupTime.option2StepStartupApps=Sélectionner « Applications de démarrage » dans la navigation de gauche.
exp.ExcessiveOsStartupTime.option2StepTaskManager=Taper « Gestionnaire des tâches » et appuyez sur Entrée pour ouvrir le Gestionnaire des tâches de Windows.
exp.ExcessiveOsStartupTime.option3=Option 3 : Désinstaller des applications
exp.ExcessiveOsStartupTime.option3Guide=Les applications qui ne se lancent pas automatiquement au démarrage peuvent ralentir la connexion, car elles peuvent laisser des fichiers, services ou entrées de registre partiellement chargés. Les applications présentes dans la barre d’état système sont un exemple de programmes en cours d’exécution, même si aucune fenêtre n’est ouverte. Pour identifier et supprimer les applications inutiles, procédez comme suit : Remarque : certaines applications nécessitent des droits administrateur pour être désinstallées.
exp.ExcessiveOsStartupTime.option3StepControlPanel=Taper « Panneau de configuration » et appuyez sur Entrée.
exp.ExcessiveOsStartupTime.option3StepPrograms=Ouvrir Programmes et fonctionnalités.
exp.ExcessiveOsStartupTime.option3StepStart=Cliquer sur le bouton Démarrer, qui ressemble au logo Microsoft.
exp.ExcessiveOsStartupTime.option3StepUninstall=Sélectionner l’application à supprimer, puis cliquer sur Désinstaller.
exp.ExcessiveOsStartupTime.option4=Option 4 : Utiliser PowerShell et le module ActiveDirectory pour exécuter la commande Get-GpResultantSetofPolicy afin d’analyser les stratégies et la durée de leur application sur les machines concernées, dans le but d’identifier les améliorations possibles.
