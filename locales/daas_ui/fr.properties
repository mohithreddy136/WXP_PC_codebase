azureonboard.marketing.disclaimer.content=Les informations contenues dans ce document peuvent être modifiées sans préavis. Les garanties relatives aux produits et aux services HP sont décrites dans les textes de garantie limitée expresse qui les accompagnent. Les informations contenues dans ce document ne constituent en aucun cas une garantie supplémentaire. HP décline toute responsabilité en cas d'erreurs ou d'omissions techniques ou rédactionnelles constatées dans ce document.
azureonboard.marketing.disclaimer.contentlist1=HP Proactive Insights et/ou les composants inclus peuvent varier selon la région, le système d'exploitation ou le partenaire de service HP agréé. Veuillez contacter votre représentant HP local ou votre partenaire agréé pour connaître les détails spécifiques dans votre région. Les services HP sont régis par les conditions générales HP applicables, fournies ou mentionnées au client au moment de l'achat. La législation locale en vigueur peut octroyer des droits légaux supplémentaires au client. Ces droits ne sont en aucune façon affectés par les conditions générales de HP ni par la garantie limitée HP fournie avec votre produit HP.
azureonboard.marketing.disclaimer.contentlist2=HP {appName} est une plate-forme de télémétrie et d’analyse qui fournit des données essentielles sur les périphériques et les applications. Elle n’est pas vendue sous la forme d’un service autonome. HP {appName} respecte les règles strictes du RGPD en matière de confidentialité et elle est certifiée ISO27001, ISO27701, ISO27017 et SOC2 Type2 pour la sécurité des informations. Un accès à Internet avec connexion à {appName} est nécessaire. Pour connaître la configuration système requise, visitez le site <a target=’_blank’ href={link}>{text}</a>.
azureonboard.marketing.disclaimer.contentlist3=Les mises à jour du BIOS ne sont disponibles que sur les périphériques HP.
azureonboard.marketing.disclaimer.contentlist4=Pour obtenir des informations sur la prise en charge des systèmes d’exploitation visitez le site <a target='_blank' href={link}>{text}</a>.
azureonboard.marketing.employeesection.description=Collectez, mesurez et gérez l'expérience numérique de vos employés grâce à une corrélation d'études sur le matériel, les applications et l'expérience des employés sur tous vos périphériques.
azureonboard.marketing.employeesection.heading=Proactive Employee Insight
azureonboard.marketing.hardwaresection.description=Surveillez de manière proactive les disques durs des périphériques, l'utilisation du CPU, les niveaux thermiques et l'état de la batterie, pour prévoir les impacts potentiels en analysant vos données à l'aide d'un lac de données de plus de 20 millions de périphériques.
azureonboard.marketing.hardwaresection.heading=Proactive Hardware Insight
azureonboard.marketing.insightsection.description=Diagnostiquez les problèmes de performance, les erreurs logicielles, les pannes de type BSD (écran bleu) et l'utilisation du système, tout en mettant à jour les pilotes et les correctifs pour garantir l'intégrité de vos profils de sécurité.
azureonboard.marketing.insightsection.heading=Proactive Application Insight
azureonboard.marketing.learnmoresection.content=Regroupant les informations recueillies par plus de 20 millions de périphériques et des milliards de points de données, HP Proactive Insights s'appuie sur la plateforme d'analyse HP TechPulse pour identifier et résoudre les problèmes avant qu'ils n'affectent les employés.
azureonboard.marketing.learnmoresection.description=Nous vous aidons à changer le paradigme de la gestion de vos périphériques grâce à un contrôle proactif géré par IA des performances, de la sécurité, des coûts et des temps d'arrêt des ordinateurs, ainsi que de la satisfaction de vos employés. Les informations recueillies par plus de 20 millions d'autres périphériques vous aideront à améliorer votre organisation.
azureonboard.marketing.learnmoresection.heading=HP Proactive Insights fournit des analyses significatives à partir de milliards de points de données.
