bios.bsod.tooltip.context=Cet impact du BIOS est déterminé par la pondération, où des occurrences de BSOD plus proches de la mise à niveau sur d’autres périphériques du même modèle ont une pondération plus importante. En outre, les modèles de périphériques spécifiques avec une pondération supérieure à X % sont classés comme ayant un « impact élevé ». L’impact est calculé pour chaque modèle de périphérique et s’applique à tous les périphériques recommandés pour cette version spécifique du BIOS, si les occurrences de BSOD sont inférieures pour le modèle, la pondération est inférieure, ainsi que l’impact.
