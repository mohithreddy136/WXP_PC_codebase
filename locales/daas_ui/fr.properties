wpt.details.desc=Protégez efficacement vos données, surveillez l’ensemble de votre parc d’appareils HP et empêchez les utilisateurs non autorisés d’accéder à vos fichiers et documents sur votre réseau avec HP {appName}, le service de localisation, de verrouillage et d’effacement le plus sûr au monde. S’appuyant sur HP Workforce Experience Platform, HP {appName} fournit un service complet basé sur le matériel permettant de localiser, de verrouiller et d’effacer des appareils, même lorsque les PC sont hors ligne ou éteints.
wpt.details.header=Renforcez votre première ligne de défense
wpt.disclaimer.point1=Résultats basés sur l'analyse menée en interne par HP sur les services logiciels Recherche, Verrouillage et Effacement. Système le plus sécurisé basé sur la cryptographie et la persistance (y compris la persistance renforcée sur le plan matériel) au mois d'octobre 2021.
wpt.disclaimer.point2=HP {appName} est disponible sur certains ordinateurs portables HP Elite Dragonfly 600, 800, 1000 sous Windows, certains ordinateurs portables de la série 800, et des stations de travail Z1 G8, et fonctionnera dès que l’appareil sera mis en marche et connecté à Internet.
wpt.disclaimer.point3=HP Workforce Experience Platform est une plate-forme de télémétrie et d’analyse qui fournit des données essentielles sur les appareils et les applications. Elle n’est pas vendue sous la forme d’un service autonome. HP Workforce Experience Platform respecte les règles strictes du RGPD en matière de confidentialité. La plate-forme est certifiée ISO27001, ISO27701, ISO27017 et SOC2 Type2 pour la sécurité des informations. Un accès à Internet avec connexion au portail Workforce Experience Platform est nécessaire. Pour connaître la configuration système requise, veuillez consulter le site <a href=\"{link}\" target=\"_blank\" style=\"text-decoration: none; color: #027aae; cursor: pointer;\">{text}</a>.
wpt.disclaimer.point4=La caractéristique de renforcement sur le plan matériel se rapporte à HP Sure Run Gen4 et version supérieure, qui est disponible sur les PC HP compatibles, et nécessite Windows 10 et version supérieure.
wpt.disclaimer.point5=Les niveaux de service et les temps de réponse proposés avec les Supports matériels HP peuvent varier selon les régions. Le service prend effet à la date d’achat du matériel. Soumis à certaines restrictions et limitations. Pour obtenir plus d’informations, consultez le site <a href="https://www.hp.com/go/cpc" target="_blank" style="text-decoration: none; color: #027aae; cursor: pointer;">www.hp.com/go/cpc</a>. Les services HP sont régis par les conditions générales HP applicables, fournies ou mentionnées au client au moment de l’achat. La législation locale en vigueur peut octroyer des droits légaux supplémentaires au client. Ces droits ne sont en aucune façon affectés par les conditions générales de HP ni par la garantie limitée HP fournie avec votre produit HP.
wpt.explore.header=Explorer la solution
wpt.feature.cost.desc=La perte d’un ordinateur peut coûter bien plus que de l’argent. Atténuez les risques et réduisez les coûts associés à la perte d’un PC avec HP {appName}. Vous disposez désormais d’une solution complète qui vous permet de localiser votre appareil perdu ou volé et de verrouiller ou d’effacer facilement vos données.
wpt.feature.cost.title=Améliorez votre sécurité et réduisez les coûts
wpt.feature.data.desc=Préservez la confidentialité de vos informations sensibles grâce à notre meilleure solution de sécurisation qui utilise la cryptographie à seuil pour rechercher, verrouiller et effacer les données de tous vos appareils HP.
wpt.feature.data.title=Protégez vos appareils et vos données
wpt.feature.monitoring.desc=Avec le tableau de bord utilisateur simplifié de HP Workforce Experience Platform, les responsables informatiques peuvent réagir plus rapidement face à la perte ou au vol d'appareils, tout en surveillant l’état d'intégrité et de protection de tous les appareils sur une plate-forme conviviale unique.
wpt.feature.monitoring.title=Accélérez la réponse informatique avec une surveillance intégrée
