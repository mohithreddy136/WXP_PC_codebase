requirements.list.proSecurity.windows.supportLifecycle.content1=L'objectif de niveau de service HP est de fournir une prise en charge des 3 versions Windows 10 les plus actuelles du canal semi-annuel.
requirements.list.proSecurity.windows.supportLifecycle.content2=HP vise à publier la prise en charge de la nouvelle édition d’OS de la fonctionnalité Threat Containment de Wolf Pro Security dans les 30 jours de sa disponibilité dans le canal semi-annuel (\"SAC\"). Les versions Windows Insider provisoires ou de pré-édition ne sont pas prises en charge. Pour en savoir plus sur les éditions d’OS Windows, veuillez consulter <a href='https://docs.microsoft.com/en-us/windows/release-information/' target='_blank'>https://docs.microsoft.com/en-us/windows/release-information/</a>.
requirements.list.proSecurity.windows.supportLifecycle.content3=Pour garantir aux clients un temps suffisant pour une mise à niveau des versions Windows plus anciennes vers les versions plus actuelles, HP continuera de prendre en charge la 4ème version la plus actuelle (soit Windows 10 v1903 actuellement) pendant au moins 90 jours après que la prise en charge de l’édition la plus récente du canal semi-annuel soit disponible dans Wolf Pro Security. Après cette période, la prise en charge de la version d’OS plus ancienne prendra fin. La même politique de prise en charge s’applique aux éditions du canal de maintenance à long terme pour Windows 10. Ainsi, ces systèmes devront également être mis à jour conformément à la politique décrite ci-dessus.
requirements.list.proSecurity.windows.supportLifecycle.content4=La prise en charge Sure Click Pro de Windows 10 v2004 a démarré le 31 juillet 2020. La prise en charge de Windows 10 v1809 sera supprimée à compter du 31 octobre 2020.
requirements.list.proSecurity.windows.supportLifecycle.content5=Windows 7 et 8.1 ne sont pas pris en charge par HP Proactive Security
requirements.list.proSecurity.windows.supportLifecycle.content6=La prise en charge Sure Click Pro de Windows 10 v20H2 a démarré le mercredi 18 novembre 2020. La prise en charge de Windows 10 v1903 sera supprimée à compter du mardi 16 février 2021.
requirements.list.proSecurity.windows.supportLifecycle.content7=HP a publié le support de confinement de la menace Sure Click Pro pour Windows 10 v21H1 le 5 juillet 2021. Le support sera supprimé pour Windows 10 v1909 à partir du 3 octobre 2021.
