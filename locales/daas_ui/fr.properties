exp.CollaborationSoftwareErrorsAreHigh.causeConflicts=Les conflits entre applications ou extensions, comme les extensions de navigateur ou les modules complémentaires, peuvent perturber le fonctionnement des outils de collaboration et générer de multiples erreurs.
exp.CollaborationSoftwareErrorsAreHigh.causeNetwork=Une connexion internet lente ou instable peut causer des interruptions et des erreurs dans les outils de collaboration qui reposent sur la communication et le transfert de données en temps réel.
exp.CollaborationSoftwareErrorsAreHigh.causeUpdates=Les mises à jour fréquentes ou les correctifs logiciels peuvent introduire des bugs ou des problèmes de compatibilité, entraînant davantage d’erreurs dans des applications comme Teams, Outlook, Zoom, Webex, Chrome et Office.
exp.CollaborationSoftwareErrorsAreHigh.possibleCauses=Causes possibles :
exp.CollaborationSoftwareErrorsAreHigh.remediationConflicts=Résolvez les conflits en désactivant ou en supprimant les extensions ou modules complémentaires problématiques et en vous assurant de la compatibilité entre les différentes applications.
exp.CollaborationSoftwareErrorsAreHigh.remediationNetwork=Améliorez la stabilité du réseau en mettant à niveau vos connexions internet, en résolvant les problèmes de connectivité et en garantissant une bande passante suffisante pour vos outils de collaboration.
exp.CollaborationSoftwareErrorsAreHigh.remediationUpdates=Vérifiez régulièrement les mises à jour et les correctifs logiciels et appliquez-les afin de corriger les bugs et les problèmes de compatibilité.
exp.CollaborationSoftwareErrorsAreHigh.suggestedRemediations=Correctifs suggérés :
exp.CollaborationSoftwareErrorsAreHigh.title=Remédier aux erreurs des logiciels de collaboration
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.appsCausingHighCpu=Les applications qui utilisent le plus le processeur seront identifiées dans la colonne Applications entraînant une utilisation élevée du processeur.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeBackgroundProcesses=De nombreux processus et services en arrière-plan, tels que les mises à jour système, les analyses antivirus ou d’autres tâches de maintenance, peuvent également augmenter l’utilisation du CPU.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeFirmwareBug=Un bug du micrologiciel est susceptible d’empêcher l’exécution du CPU à des niveaux supérieurs à ceux attendus.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeMalfunctioningSoftware=Un logiciel mal optimisé ou défectueux peut entraîner une utilisation excessive du CPU, surtout s’il est bloqué dans une boucle ou exploite les ressources de manière inefficace.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeResourceIntensiveApps=L’exécution d’applications gourmandes en ressources, comme les éditeurs vidéo, les machines virtuelles ou les calculs complexes, peut fortement solliciter le CPU.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.closeHighCpuApps=Fermer les applications qui utilisent le plus le processeur.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.connectAcAdapter=Branchez un adaptateur secteur, car le processeur peut fonctionner à des performances inférieures sur batterie, en fonction des paramètres d’alimentation de l’appareil.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.openDeviceUtilizationReport=Ouvrir le rapport sur l’utilisation de l’appareil.
