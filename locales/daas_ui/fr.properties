wex.fleet.mgmt.recommended.desc.antivirus_not_enabled=L'activation de Microsoft Defender fournit une protection essentielle contre les logiciels malveillants et d'autres menaces pour la sécurité.
wex.fleet.mgmt.recommended.desc.antivirus_not_enabled_other=L'activation d'un logiciel antivirus protège les appareils contre les logiciels malveillants et sécurise votre système contre les attaques.
wex.fleet.mgmt.recommended.desc.antivirus_signature_outdated=La mise à jour régulière des signatures des logiciels malveillants garantit que Windows Defender est en mesure d’assurer la détection et la protection contre les menaces les plus récentes.
wex.fleet.mgmt.recommended.desc.antivirus_signature_outdated_other=En maintenant à jour les signatures des logiciels malveillants, une protection complète contre les menaces les plus récentes est assurée.
wex.fleet.mgmt.recommended.desc.avg_fan_speed_high=En remédiant aux vitesses élevées du ventilateur, toute surchauffe est évitée ainsi que les potentiels dommages aux composants internes de votre appareil.
wex.fleet.mgmt.recommended.desc.battery_calibrate=L'étalonnage de la batterie améliore la précision de lecture de l’alimentation et optimise l'autonomie de la batterie ainsi que ses performances.
wex.fleet.mgmt.recommended.desc.battery_early_detection_wear=La résolution du problème d’usure de la batterie assure fonctionnement efficace de l’appareil, des performances constantes et une prolongation de l’autonomie de la batterie.
wex.fleet.mgmt.recommended.desc.battery_needs_attention=Replacement of defective batteries can ensure good device performance, and system health. Devices which are covered by warranty may be eligible for battery replacement.
wex.fleet.mgmt.recommended.desc.bitlocker_encryption_not_enabled=L'activation de BitLocker protège les données sensibles en cryptant votre disque, ce qui renforce la sécurité globale contre toute accès non autorisé.
wex.fleet.mgmt.recommended.desc.bsod_occured=La résolution des erreurs d’écran bleu assure la stabilité du système, prévient les arrêts inattendus et préserve la fiabilité.
wex.fleet.mgmt.recommended.desc.cpu_utilization_high=L'analyse de l’utilisation élevée de l’UC permet d’éviter les goulets d’étranglement et de préserver le fonctionnement fluide du système.
wex.fleet.mgmt.recommended.desc.disk_needs_attention=Disk performance is degrading and may soon lead to slower performance or instability if not addressed.
wex.fleet.mgmt.recommended.desc.disk_utilization_high=En libérant de l’espace sur le disque, cela prévient les ralentissements du système et assure un fonctionnement fluide en évitant la surcharge de stockage.
wex.fleet.mgmt.recommended.desc.docking_station_ac_adapter_failed=La correction des pannes de l'adaptateur assure une alimentation électrique constante des stations d'accueil, et prévient ainsi les problèmes de connectivité.
wex.fleet.mgmt.recommended.desc.docking_station_ac_adapter_running_at_reduced_perofmance=L’optimisation des performances de l’adaptateur assure des connexions fiables et une fonctionnalité optimale des stations d'accueil.
wex.fleet.mgmt.recommended.desc.docking_station_firmware_out_of_date=Les mises à jour du microprogramme des stations d'accueil assure la compatibilité des appareils et améliore les performances du système.
wex.fleet.mgmt.recommended.desc.excessive_os_login_time=La réduction des temps de connexion réduit les retards et améliore l’efficacité de l’utilisateur lors de l'accès au système.
wex.fleet.mgmt.recommended.desc.excessive_os_shutdown_time=L'optimisation des temps d'arrêt minimise les périodes d'attente et assure des arrêts efficaces du système.
wex.fleet.mgmt.recommended.desc.excessive_os_startup_time=Un temps de démarrage plus rapide permet d'accélérer l’accès au système d’exploitation et accroît l’efficacité et la productivité de l’utilisateur.
wex.fleet.mgmt.recommended.desc.firewall_disabled=L'activation du pare-feu Windows permet de bloquer les accès non autorisés et de protéger votre réseau des menaces potentielles.
wex.fleet.mgmt.recommended.desc.firewall_signature_outdated=La mise à jour régulière des signatures de pare-feu assure une protection contre les menaces nouvelles et évolutives qui pèsent sur les réseaux.
wex.fleet.mgmt.recommended.desc.frequent_bsod_occured=La résolution des erreurs d’écran bleu assure la stabilité du système, prévient les arrêts inattendus et préserve la fiabilité.
wex.fleet.mgmt.recommended.desc.frequent_kernel_panic_error=La résolution des erreurs de panique du noyau améliore la stabilité du système, renforce la sécurité et prévient la perte de données.
wex.fleet.mgmt.recommended.desc.frequent_network_disconnection=Une absence totale de déconnexions du réseau permet de renforcer la fiabilité, d'améliorer l’expérience utilisateur et de garantir un accès ininterrompu aux services et aux applications.
wex.fleet.mgmt.recommended.desc.gpu_health_issue=La correction des problèmes liés au processeur graphique empêche les problèmes de performance graphique et préserve un fonctionnement fluide des applications visuelles.
wex.fleet.mgmt.recommended.desc.high_collaboration_sw_errors=La résolution des problèmes liés aux logiciels de collaboration assure un travail d'équipe transparent et une productivité préservée. Nous avons constaté plus de 10 erreurs logicielles au cours des 7 derniers jours dans Teams, Outlook, Zoom, Webex, Chrome, Office.
wex.fleet.mgmt.recommended.desc.high_windows_crash=La résolution des pannes d’OS assure la stabilité du système, des performances constantes et une productivité ininterrompue des utilisateurs.
wex.fleet.mgmt.recommended.desc.kernel_panic_error=La résolution des erreurs de panique du noyau améliore la stabilité du système, renforce la sécurité et prévient la perte de données.
wex.fleet.mgmt.recommended.desc.last_reboot_more_than_21_days=Le redémarrage des appareils efface les fichiers temporaires et actualise les processus système, tout en améliorant les performances et la stabilité globales.
wex.fleet.mgmt.recommended.desc.linux_disk_encryption_not_enabled=L’activation du chiffrement du disque renforce considérablement la sécurité des données en protégeant le contenu de vos périphériques de stockage.
wex.fleet.mgmt.recommended.desc.linux_firewall_disabled=L'activation du pare-feu Linux permet de bloquer les accès non autorisés et de protéger votre réseau des menaces potentielles.
wex.fleet.mgmt.recommended.desc.linux_secure_boot_not_enabled=L’activation du Démarrage sécurisé permet d’autoriser uniquement le chargement d’un logiciel fiable au démarrage, renforçant ainsi la sécurité du système.
wex.fleet.mgmt.recommended.desc.memory_utilization_high=L'analyse d'une utilisation élevée de la mémoire permet d'identifier et de résoudre les problèmes susceptibles d'impacter la performance et la stabilité du système.
wex.fleet.mgmt.recommended.desc.missing_critical_bios_updates=L'application des mises à jour du BIOS garantit la stabilité du système et sa compatibilité avec des nouveaux matériels ou logiciels.
wex.fleet.mgmt.recommended.desc.missing_critical_driver_updates=La mise à jour des pilotes évite les dysfonctionnements matériels et assure le fonctionnement d'un système haute-performance sécurisé et stable.
wex.fleet.mgmt.recommended.desc.missing_linux_security_updates=L’application des mises à jour de sécurité vous permet de vous protéger contre les malwares et les codes d’exploitation, de réduire la surface d’attaque et d’améliorer l’intégrité du système.
wex.fleet.mgmt.recommended.desc.missing_linux_updates=L’installation des dernières mises à jour corrige les vulnérabilités du noyau, des bibliothèques système et des applications. Cette mesure vous permet de protéger votre système contre les codes d’exploitation, les malwares et tout accès non autorisé.
wex.fleet.mgmt.recommended.desc.missing_windows_security_updates=L'application des mises à jour de sécurité assure une protection contre les toutes dernières menaces et vulnérabilités, en gardant votre système sécurisé contre les attaques.
wex.fleet.mgmt.recommended.desc.missing_windows_updates=L’installation des toutes dernières mises à jour corrige les vulnérabilités et garantit la préservation de la sécurité et de la fonctionnalité de votre système.
wex.fleet.mgmt.recommended.desc.poor_network_signal_strength=Une force du signal solide assure une connexion stable et fiable, ce qui minimise les interruptions et les décrochages durant les activités en ligne.
wex.fleet.mgmt.recommended.desc.poor_nominal_speed=Des débits Internet fiables et rapides sont essentiels pour accomplir efficacement les tâches, accéder aux services cloud et collaborer avec des collègues sans interruptions.
wex.fleet.mgmt.recommended.desc.unauthenticated_connection=En demandant une authentification, les entreprises peuvent empêcher les appareils non conformes de se connecter au réseau, ce qui réduit le risque de failles de sécurité potentielles.
wex.fleet.mgmt.recommended.desc.windows_secure_boot_not_enabled=L'activation du démarrage sécurisé empêche les modifications non autorisées du microprogramme et du système d’exploitation, d’où une sécurité renforcée du système.
