asset_details_last_restart=Dernier redémarrage
asset_details_last_restart.advantage1=A full boot ensures all drivers, services, and hardware states are reset, helping prevent lingering issues from partial restarts or cached sessions.
asset_details_last_restart.advantage2=Recommandé lors du dépannage de problèmes système ou après des mises à jour majeures afin de garantir un démarrage propre.
asset_details_last_restart.advantage3=Produces a more accurate measure of system performance compared to Fast Startup.
asset_details_last_restart.cause1=Redémarrage initié par l’utilisateur (Démarrer > Redémarrer)
asset_details_last_restart.cause2=Full shutdown via Start menu (Start > Shift + Shutdown)
asset_details_last_restart.cause3=Shutdown via press and hold of the Power button
asset_details_last_restart.cause4=Shutdown triggered by Power button settings (if configured to shut down when Last Fast Startup is disabled)
asset_details_last_restart.cause5=Shutdown triggered by Lid Close settings (if configured to shutdown when Last Fast Startup is disabled)
asset_details_last_restart.cause6=Automatic shutdown due to battery drain
asset_details_last_restart.cause7=Unexpected OS shutdowns (such as BSOD, or forced shutdown)
asset_details_last_restart.cause8=User-initiated or Windows Update-initiated pending restart due to Windows Update installation
asset_details_last_restart.cause9=Démarrage initié par l’utilisateur (via un script ou une requête programmatique)
asset_details_last_restart.description1=Windows closes apps, stops services, unloads drivers, and reinitializes the OS kernel before booting fresh.
asset_details_last_restart.description2=Le redémarrage permet d’appliquer les mises à jour, de corriger les problèmes de performances et de vider la mémoire.
asset_details_last_restart.description3=Windows does not use Fast Startup during restart. Instead it performs a clean OS restart but keeps certain hardware states warm.
asset_details_last_restart.full_boot=Démarrage complet
asset_details_last_restart.full_boot.description=Lorsque Windows effectue un redémarrage complet, il recharge entièrement le système d’exploitation et réinitialise les composants matériels. Contrairement à un redémarrage standard ou à un arrêt avec démarrage rapide, ce processus ne conserve pas la session du noyau. Tout redémarre à zéro, comme après un arrêt complet.
asset_details_last_restart.full_boot.timestamp=This timestamp is the start of the last full system boot (cold boot or warm boot), regardless of what caused the Startup.
asset_details_last_restart.note1=Cet horodatage se met à jour uniquement lorsqu’un démarrage/redémarrage complet a lieu, c’est-à-dire lorsque Windows initialise complètement une nouvelle session.
asset_details_last_restart.note2=Lorsque le démarrage rapide est activé, ce champ ne se met pas à jour pour les sessions hybrides/démarrage rapide. Il ne reflète que le dernier redémarrage complet réel.
