dnto.subscriptions.workforce_experience_pro.features.realtime_visibility.desc=Obtenir des informations instantanées avec la surveillance en temps réel de la performance et de la santé des systèmes dans l’ensemble de votre réseau, et découvrir des problèmes qui étaient cachés jusqu'à alors
