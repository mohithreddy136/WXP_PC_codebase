side_panal.smart_refresh.help_sec1_description=Les 3 étapes : Identifier, Catégoriser, Recommander
side_panal.smart_refresh.help_sec1_header=Fonctionnement
side_panal.smart_refresh.help_sec1_point_1_desc=Évaluez chaque appareil en fonction de 9 critères pour calculer une note d’urgence de la réactualisation*. Cette note vous aide à prioriser les appareils à risque et éviter les interruptions de productivité pour les utilisateurs.
side_panal.smart_refresh.help_sec1_point_1_title=1. Identifier
side_panal.smart_refresh.help_sec1_point_2_desc=Un modèle d’IA regroupe les appareils en images matérielles et logicielles distinctes, basées sur leur utilisation. Ces profils permettent de vous orienter vers le bon appareil de remplacement.
side_panal.smart_refresh.help_sec1_point_2_title=2. Catégorisation
side_panal.smart_refresh.help_sec1_point_3_desc1=Si vous travaillez avec un partenaire HP, Smart Refresh vous recommandera des appareils de remplacement. Ces recommandations sont issues des modèles les plus performants de la persona concernée disponibles dans le catalogue téléchargé par votre partenaire. Si vous ne voyez pas de recommandations pour les appareils, ou si les appareils que vous voyez sont obsolètes, veuillez contacter votre partenaire et lui demander de mettre à jour le catalogue.
side_panal.smart_refresh.help_sec1_point_3_desc2=Si vous ne travaillez pas avec un partenaire HP, aucune recommandation d’appareils ne sera affichée dans Smart Refresh. Veuillez contacter votre représentant HP pour obtenir les meilleurs appareils de remplacement.
side_panal.smart_refresh.help_sec1_point_3_desc3=Date de la dernière mise à jour du catalogue :
side_panal.smart_refresh.help_sec1_point_3_title=3. Recommandation
side_panal.smart_refresh.help_sec1_point_4_desc=Utilisez le statut « Terminé » pour supprimer les ordinateurs qui n’ont pas besoin d’une mise à jour ou qui ne peuvent pas être mis à jour pour le moment. Vous pouvez afficher ces périphériques et rétablir leur statut sur « Requiert une action » pour les retrouver dans la liste des ordinateurs
side_panal.smart_refresh.help_sec1_point_4_title=4. Statuts
side_panal.smart_refresh.help_sec2_description=Comment nous déterminons le moment où un périphérique doit être remplacé
side_panal.smart_refresh.help_sec2_header=Niveau d’urgence de la réactualisation
side_panal.smart_refresh.help_sec2_sub_text=La note d’urgence de la réactualisation est calculée à partir des données de performance d’un appareil dans 9 domaines. Le niveau de sévérité correspond au résultat chiffré calculé comme suit :
