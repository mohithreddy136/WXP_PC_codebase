exp.FrequentWindowsBsodsHaveOccurred.option4Step1=Ouvrir le rapport des « erreurs d'écran bleu » pour obtenir plus d'informations.
exp.FrequentWindowsBsodsHaveOccurred.option4Step2=La colonne Description du code d’erreur contient des liens vers les références des codes d’erreur Microsoft
