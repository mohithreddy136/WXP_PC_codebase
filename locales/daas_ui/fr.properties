wex.remediate.side.bar.content.parameter=Les paramètres vous permettent d’intégrer des valeurs personnalisées dans le script sans le modifier.<br>Vous pouvez les utiliser à des fins de correction flexibles et réutilisables.<br><br>Par exemple, pour définir des chemins de fichiers, des clés de registre ou des seuils.<br><br>
wex.remediate.side.bar.content.review=Vérifiez les informations de correction et sélectionnez Corriger si vous êtes prêt.<br><br>
wex.remediate.side.bar.content.script=Déployez une correction pour corriger les problèmes dans l’ensemble de votre parc.<br><br> L’action recommandée rassemble des périphériques répondant aux critères du problème. Les corrections sont en mesure de résoudre ce problème pour les périphériques sélectionnés.<br><br> Sélectionnez un script recommandé par HP dans HP Gallery ou sélectionnez-en un qui vous appartient.<br><br> Une fois le déploiement lancé, la progression et l'achèvement de la correction apparaissent sous Corrections > Activité.<br><br>
wex.remediate.side.bar.p1=Déployez une correction pour corriger les problèmes dans l’ensemble de votre parc.
wex.remediate.side.bar.p2=L’action recommandée rassemble des périphériques répondant aux critères du problème. Les corrections sont en mesure de résoudre ce problème pour les périphériques sélectionnés.
