exp.FrequentWindowsBsodsHaveOccurred.option2LinkText=https://ftp.ext.hp.com/pub/caps-softpaq/cmit/HPIA.html
exp.FrequentWindowsBsodsHaveOccurred.option3=Opção 3: Use o HP Connect e o Microsoft Intune para atualizar o BIOS e o firmware.
exp.FrequentWindowsBsodsHaveOccurred.option3Link=https://connect.admin.hp.com/
exp.FrequentWindowsBsodsHaveOccurred.option4Step1=Abra o relatório 'Erros de tela azul' para ver mais informações.
exp.FrequentWindowsBsodsHaveOccurred.option4Step2=A coluna 'Descrição da verificação de bugs' contém links para a Referência de códigos de verificação de bugs da Microsoft
exp.FrequentWindowsBsodsHaveOccurred.option4Title=Opção 4:
exp.FrequentWindowsBsodsHaveOccurred.possibleCauses=Causas possíveis:
