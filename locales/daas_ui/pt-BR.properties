exp.mgmt.troubleshoot.description.antivirus_not_enabled_other=O dispositivo está configurado para usar um antivírus de terceiros não Microsoft para ajudar a proteger o dispositivo contra vírus, malware e outras ameaças, mas a proteção antivírus não está ativa no dispositivo.
