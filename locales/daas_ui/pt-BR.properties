account_management.subscriptions.addon.anyware.azure_notice=Atualmente, a licença é oferecida apenas no Azure Marketplace. A licença HP Anyware Standard inclui acesso ao HP Anyware Manager Enterprise.
account_management.subscriptions.addon.anyware.desc=Gerencie e provisione desktops remotos para sua equipe. Os usuários finais terão acesso seguro aos desktops sem precisarem de uma rede privada virtual (VPN). Monitore sua frota remota em um lugar, integrando o HP Anyware ao WXP
account_management.subscriptions.addon.anyware.desc.short=Acesse, gerencie e monitore desktops com segurança
account_management.subscriptions.addon.anyware.enterprise.header=HP Anyware Manager Enterprise
account_management.subscriptions.addon.anyware.features.automation=Automatização de tarefas
account_management.subscriptions.addon.anyware.features.automation.desc=Integre perfeitamente seu fluxo de trabalho de administrador personalizado ao plano de gerenciamento
account_management.subscriptions.addon.anyware.features.multitenant_rbac=Controle de acesso baseado na função e vários locatários
account_management.subscriptions.addon.anyware.features.multitenant_rbac.desc=Gerencie várias organizações com uma única instância do HP Anyware Manager Enterprise. Atribua permissões aos administradores com base em suas funções
account_management.subscriptions.addon.anyware.features.productivity=Ativar a produtividade do usuário final
account_management.subscriptions.addon.anyware.features.productivity.desc=O usuário final terá uma experiência com os desktops como se estes fossem locais, independentemente de suas necessidades de desempenho ou condições de rede.
account_management.subscriptions.addon.anyware.features.provision_desktops=Gerenciar desktops físicos e virtuais
account_management.subscriptions.addon.anyware.features.provision_desktops.desc=A equipe de TI pode configurar e monitorar desktops remotos por meio do HP Anyware Manager Enterprise. Também pode fornecer desktops virtuais aos usuários finais a qualquer momento.
account_management.subscriptions.addon.anyware.features.remote_access=Fornecer acesso remoto seguro aos usuários finais
account_management.subscriptions.addon.anyware.features.remote_access.desc=Os usuários finais terão acesso seguro aos desktops sem precisarem de VPN. O HP Anyware oferece acesso simplificado por meio de gateways de nuvem.
account_management.subscriptions.addon.anyware.features.role_access.desc=Execute a atribuição de usuários e o roteamento de sessões sem a necessidade de instalar um gateway em outros ambientes
account_management.subscriptions.addon.anyware.features.role_cloud_gateways=Acesso simplificado via gateways de nuvem
account_management.subscriptions.addon.anyware.features.setup=Qualquer ambiente de TI e configuração simples
account_management.subscriptions.addon.anyware.features.setup.desc=Uma solução flexível e intuitiva que simplifica a implantação e o gerenciamento em infraestruturas diversas, incluindo ambientes no local, na nuvem e híbridos, ao mesmo tempo que reduz a complexidade e o espaço ocupado pela TI.
account_management.subscriptions.addon.anyware.features.workforce_integration=Integração da Workforce Experience
account_management.subscriptions.addon.anyware.features.workforce_integration.desc=A TI pode centralizar os dados de desktops remotos na Workforce Experience Platform, fornecendo uma visão central de sua frota.
account_management.subscriptions.addon.anyware.header=HP Anyware
account_management.subscriptions.addon.anyware.overview.desc1=O HP Anyware é uma solução de software de alto desempenho que fornece aos usuários acesso seguro a seus desktops remotos ou virtuais sem uma rede privada virtual (VPN). O HP Anyware inclui acesso a um plano de gerenciamento de TI chamado HP Anyware Manager Enterprise.
account_management.subscriptions.addon.anyware.overview.desc2=O HP Anyware Manager Enterprise (AME) é um plano de gerenciamento de vários locatários que permite que a TI gerencie desktops físicos e virtuais.
account_management.subscriptions.addon.anyware.required_components.header=Componentes necessários para integração da Workforce Experience
account_management.subscriptions.addon.anyware.required_components.li1=HP Anyware Standard
account_management.subscriptions.addon.anyware.required_components.li2=HP Anyware Manager Enterprise
account_management.subscriptions.addon.anyware.security_compliance=Segurança e conformidade
account_management.subscriptions.addon.anyware.security_compliance.desc1=O HP Anyware prioriza a segurança e a conformidade em suas ofertas de produtos para garantir uma proteção robusta e adesão aos padrões do setor. Os principais recursos incluem criptografia de ponta a ponta, acesso remoto seguro e autenticação multifator, protegendo a integridade e a confidencialidade dos dados.
account_management.subscriptions.addon.anyware.security_compliance.desc2=O HP Anyware também integra recursos avançados de detecção e resposta a ameaças para reduzir os riscos de forma proativa. A conformidade com normas como GDPR, HIPAA e SOC 2 ressalta o compromisso do HP Anyware em manter protocolos de segurança rigorosos. O monitoramento contínuo e as auditorias de segurança regulares garantem que os produtos HP Anyware permaneçam resilientes contra ameaças cibernéticas emergentes, proporcionando aos usuários uma experiência de gerenciamento de TI segura e confiável.
account_management.subscriptions.addon.anyware.technology=Tecnologia de acesso remoto
account_management.subscriptions.addon.anyware.technology.desc=A premiada tecnologia de exibição remota PCoIP® do HP Anyware proporciona uma experiência de computação de alta definição e altamente responsiva em condições de rede desafiadoras.
account_management.subscriptions.addon.anyware.technology.desc.li1=A PCoIP® codifica, compacta, criptografa e transporta pixels da imagem de uma estação de trabalho ou um servidor central.
account_management.subscriptions.addon.anyware.technology.desc.li2=Em seguida, descriptografa e descompacta a imagem para usuários praticamente em qualquer dispositivo.
account_management.subscriptions.addon.connect_accounts=Conectar contas
account_management.subscriptions.addon.oob.desc.short=Controle remoto no nível do BIOS para diagnóstico e remediação avançados
account_management.subscriptions.addon.oob.desclaimer1=1. O diagnóstico e a remediação fora da banda estão disponíveis como licenças de duração variáveis e serve para PCs de qualquer fornecedor que aceitem Intel® vPro® Enterprise ou Intel® AMT. Inclui e exige a Workforce Experience Platform Starter para administrar e gerenciar a solução de software. Disponibilizado por representantes da HP ou revendedores autorizados HP nos EUA, Canadá e UE. Veja detalhes em (adicione a url para os termos de licença/eula).
account_management.subscriptions.addon.oob.desclaimer2=2. Com base na análise interna da HP de fabricantes de PC e controle de ciclo de alimentação, controle não do SO, controle da BIOS e o controle de nova imagem em 24/9/2024.
account_management.subscriptions.addon.oob.desclaimer3=3. O agente do HP Insights é necessário – trata-se de um aplicativo de telemetria e análise que oferece dados críticos de dispositivos e aplicativos, não é vendido como um serviço independente e tem as certificações ISO27001, ISO27701, ISO27017 e SOC2 Type2 de Segurança da Informação. É necessário ter acesso à Internet com conexão ao portal. Para todos os requisitos do sistema, por favor, visite http://www.hpdaas.com/requirements. A aquisição de qualquer serviço pronto para o agente do HP Insights exige a ativação do software para execução em cada dispositivo. O HP Services Scan é fornecido por meio do Windows Update em hardware HP selecionado e verificará a qualificação de cada dispositivo de hardware para determinar se um serviço ativado foi adquirido, além de baixar o software aplicável automaticamente. Para desativar esse recurso, por favor, siga as instruções em <a target='_blank' href='http://www.hpdaas.com/requirements' style=\"text-decoration:none; color:#4D52E5\">http://www.hpdaas.com/requirements</a>
account_management.subscriptions.addon.oob.desclaimer4=4. O WXP Starter está incluso e é necessário para administrar e gerenciar a solução de software.
account_management.subscriptions.addon.oob.features.remote_control=Remote control - even when the Operating System is down
account_management.subscriptions.addon.oob.features.remote_control.desc=A TI pode acessar remotamente o BIOS para reinicializar, refazer a imagem e recuperar PCs com peças de várias marcas sempre que o trabalho aparecer.
account_management.subscriptions.addon.oob.features.scalable=Gerenciamento escalado, centralizado
account_management.subscriptions.addon.oob.features.scalable.desc=Simplifique o provisionamento de PCs, o controle de licenças em lote e o acesso baseado em funções com esse recurso que integra o WXP para implantação, utilização e gerenciamento empresariais.
account_management.subscriptions.addon.oob.features.secure=Experiências seguras para o usuário final
account_management.subscriptions.addon.oob.features.secure.desc=Os usuários têm visibilidade das sessões remotas e podem interromper a conexão a qualquer momento. Suporte seguro e perfeito cria confiança para uma experiência melhor para o usuário.
account_management.subscriptions.addon.oob.header=Conexão remota fora da banda
account_management.subscriptions.addon.oob.overview.desc1=Quer melhorar as experiências digitais de uma força de trabalho híbrida? O HP Out-of-band Remote Connect oferece, aos técnicos de suporte, acesso remoto ao BIOS para reinicializar, refazer a imagem e recuperar PCs, mesmo que o SO não esteja funcionando. Nenhum envolvimento do usuário, nenhuma visita de técnico.
account_management.subscriptions.addon.vyopta.connect_accounts.error=Não pudemos conectar sua conta. Por favor, verifique sua conexão e tente novamente.
account_management.subscriptions.addon.vyopta.connect_accounts.found=Detectamos uma conta Vyopta "<b>{orgName}</b>". Deseja conectá-la ao WXP?
account_management.subscriptions.addon.vyopta.connect_accounts.no_permissions=Você não tem permissões. Por favor, entre em contato com o administrador da conta Vyopta para obter assistência.
account_management.subscriptions.addon.vyopta.connect_accounts.not_found=Não pudemos detectar automaticamente sua conta no {service}. Por favor, fale com {support_link} para nos ajudar a configurarmos essa conexão se você já for um cliente {service}.
account_management.subscriptions.addon.vyopta.connect_accounts.org_already_mapped=Esta ID Vyopta já está vinculada a outro locatário. Por favor, fale com o seu administrador da conta para pedir ajuda.
account_management.subscriptions.addon.vyopta.connect_accounts.request_support=Por favor, fale com o seu administrador da conta do {service} para ajuda.
account_management.subscriptions.addon.vyopta.connect_accounts.success=Conectamos sua conta com sucesso.
account_management.subscriptions.addon.vyopta.connect_accounts.unauthorized=Detectamos a sua organização no {service}, mas parece que você não tem as permissões necessárias para conectar as contas.
account_management.subscriptions.addon.vyopta.desc=Otimize a colaboração com insights tem tempo real. Monitore a qualidade das chamadas, o uso das salas de reunião e o desempenho do sistema no Microsoft Teams, Zoom, Poly e Webex. Quando integrado ao WXP, ele ajuda a TI a melhorar as experiências digitais e estimular a eficiência do local de trabalho.
account_management.subscriptions.addon.vyopta.features.comprehensive_monitoring=Monitoramento abrangente entre plataformas de colaboração
account_management.subscriptions.addon.vyopta.features.comprehensive_monitoring.desc=Tenha visibilidade holística do seu ambiente de comunicações unificadas (UC) multifornecedor, capacitando o gerenciamento eficiente das ferramentas de colaboração por vídeo e voz.
account_management.subscriptions.addon.vyopta.features.deep_integration=Integração profunda com o WXP
account_management.subscriptions.addon.vyopta.features.deep_integration.desc=Os dados de análise e monitoramento da Vyopta são integrados perfeitamente ao WXP, capacitando as equipes de TI a gerenciarem o desempenho da colaboração junto a outras tecnologias de local de trabalho. Essa abordagem centralizada melhora a eficiência da TI, reduzi a complexidade e melhora o gerenciamento da experiência digital.
account_management.subscriptions.addon.vyopta.features.enhance_user_engagement=Melhore o envolvimento e o bem-estar dos usuários
account_management.subscriptions.addon.vyopta.features.enhance_user_engagement.desc=Utilize as análises de colaboração para identificar barreiras à produtividade, fomentando a melhoria nas experiências e bem-estar dos funcionários.
account_management.subscriptions.addon.vyopta.features.optimize_meeting_space=Otimize a utilização do espaço de reuniões
account_management.subscriptions.addon.vyopta.features.optimize_meeting_space.desc=Analise os padrões de ocupação e uso da sala para maximizar os investimentos em imóveis e melhorar a eficiência da sala de reuniões.
account_management.subscriptions.addon.vyopta.features.proactive_issue_detection=Detecção e resolução proativos de problemas
account_management.subscriptions.addon.vyopta.features.proactive_issue_detection.desc=Aproveite o monitoramento em tempo real para identificar e lidar com os problemas de qualidade na colaboração antes de que eles impactem usuários, reduzindo o tempo de solução de problemas.
account_management.subscriptions.addon.vyopta.header=Experiência de colaboração pela Vyopta
account_management.subscriptions.addon.vyopta.overview=Capacite as equipes de TI com monitoramento e análise avançadas para ferramentas de colaboração. A integração da Vyopta dentro do WXP oferece visibilidade em tempo real do uso das salas de reunião, qualidade das chamadas e desempenho do sistema em plataformas como Microsoft Teams, Zoom, Poly e Webex. Melhore a produtividade dos funcionários, lidando proativamente com os problemas de colaboração e otimizando as experiências de local de trabalho.
account_management.subscriptions.addon.vyopta.short_desc=Valiosos insights de análises e salas para otimizar os ambientes de colaboração
account_management.subscriptions.addon.wolf.desc=Implantação, visibilidade e proteção de ponta a ponta usando a segurança integrada ao PC e ao software para fortalecer as defesas do PC.
account_management.subscriptions.addon.wolf_security=HP Wolf Security
account_management.subscriptions.addon.wolf_security.desc=Proteção de dispositivos inigualável contra ataques cibernéticos com a tecnologia HP Wolf. Visualize a telemetria na Workforce Experience para uma segurança aprimorada.
account_management.subscriptions.addon.wpt.desc=Monitore, bloqueie e proteja remotamente dispositivos perdidos ou roubados. Quando integrado ao WXP, ele ajuda as equipes de TI a monitorarem os ativos de PC e reduzirem os riscos de perda de dispositivos - mesmo com os dispositivos desligados.
account_management.subscriptions.addon.wpt.features.always_available=Sempre disponível
account_management.subscriptions.addon.wpt.features.always_available.desc=Aproveita hardware e software personalizados para encontrar/bloquear/apagar mesmo com o PC desligado, fora da internet ou não inicializado.
account_management.subscriptions.addon.wpt.features.message_customization=Personalização de mensagens
account_management.subscriptions.addon.wpt.features.message_customization.desc=Transmita uma mensagem personalizada ao PC de destino para instruções de desbloqueio
account_management.subscriptions.addon.wpt.features.remote_lock_and_erase=Bloqueio e apagamento remotos
account_management.subscriptions.addon.wpt.features.remote_lock_and_erase.desc=Bloqueie o dispositivo no nível do firmware para proteger dados e inutilizar dispositivos roubados. Apague o armazenamento principal de dispositivos perdidos ou roubados para evitar vazamento de dados.
account_management.subscriptions.addon.wpt.features.seamless_integration=Integração perfeita com o WXP
account_management.subscriptions.addon.wpt.features.seamless_integration.desc=Gerencie a segurança dos dispositivos diretamente no WXP, agilizando as operações de TI e o gerenciamento de dispositivos.
account_management.subscriptions.addon.wpt.features.separations_of_duties=Separação de funções
account_management.subscriptions.addon.wpt.features.separations_of_duties.desc=A aprovação de várias pessoas necessária para bloquear/apagar evita erros e ameaças internas.
account_management.subscriptions.addon.wpt.features.strong_audit_trail=Trilha de auditoria robusta
account_management.subscriptions.addon.wpt.features.strong_audit_trail.desc=Registra em log a execução bem-sucedida de bloqueio e execução na plataforma WXP como prova de conformidade.
account_management.subscriptions.addon.wpt.header=HP Wolf Protect and Trace with Wolf Connect
account_management.subscriptions.addon.wpt.overview=Melhore o gerenciamento de ativos e reduza os riscos de vazamento de dados com o HP Wolf Protect & Trace. Integrada ao WXP, essa solução exclusiva capacita as equipes de TI a localizarem, bloquearem e apagarem dispositivos perdidos ou roubados - mesmo quando desligados. Cobertura global e administração simples adequadas a clientes de todos os tamanhos.
account_management.subscriptions.addon.wpt.requirements.purchase=Requer a compra de um novo computador HP de seu representante de vendas ou parceiro de canal autorizado da HP.<br> Requer um computador compatível com a opção de exibição “WWAN”. Computadores compatíveis em: https://www.hpwolf.com/en/legal/ptwc/platforms
account_management.subscriptions.addon.wpt.short_desc=Monitore, bloqueie e apague remotamente um PC globalmente, mesmo desligado
