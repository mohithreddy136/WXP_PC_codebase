exp.MemoryUtilizationIsHighForAnExtendedTime.causeHungApp=Um aplicativo em execução travou/não responde.
exp.MemoryUtilizationIsHighForAnExtendedTime.causeInsufficientMemory=O computador não tem uma memória adequada para seu uso.
exp.MemoryUtilizationIsHighForAnExtendedTime.causeLongRunningApp=Um aplicativo em execução requer um grande volume de memória por um longo tempo para concluir uma tarefa, como uma varredura do antivírus.
exp.MemoryUtilizationIsHighForAnExtendedTime.causeMemoryLeak=Um aplicativo instalado pode ter um bug de vazamento de memória.
exp.MemoryUtilizationIsHighForAnExtendedTime.option1Detail=Para ajudar os clientes a prolongarem a vida útil do dispositivo e a melhorarem a experiência do usuário final, uma prática comum para PCs cuja memória é superutilizada é adicionar memória ao dispositivo.
exp.MemoryUtilizationIsHighForAnExtendedTime.option1Title=Opção 1: Aumente a memória do dispositivo.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail1=Abra o relatório Utilização do dispositivo.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail2=Os aplicativos que consumirem mais memória serão identificados na coluna Aplicativos causando uso alto da memória.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail3=Com base no aplicativo em questão, as opções de resposta variam. Se os aplicativos envolvidos forem críticos para os negócios, atualizar a memória poderá amenizar o problema. Aplicativos que não sejam críticos para os negócios podem ser removidos do dispositivo ou terem suas configurações ajustadas para reduzir a carga no dispositivo.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Title=Opção 2: Identifique e desinstale aplicativos.
exp.MemoryUtilizationIsHighForAnExtendedTime.option3Detail=Reinicie o computador para fechar completamente todos os aplicativos em execução.
exp.MemoryUtilizationIsHighForAnExtendedTime.option3Title=Opção 3: Reiniciar o dispositivo.
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Detail1=Use o Gerenciador de tarefas para visualizar os aplicativos em execução por utilização de memória.
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Detail2=Feche os aplicativos que estejam usando mais a memória.
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Title=Opção 4: Fechar aplicativos.
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Detail1=Use Task Manager to identify an application where the Memory utilization is steadily increasing to unusual proportions, but never decreasing.
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Detail2=Verifique se há atualizações para o aplicativo com o fabricante dele.
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Title=Opção 5: Identifique o possível vazamento de memória e atualize.
