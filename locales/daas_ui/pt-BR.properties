side_panal.smart_refresh.hardware_personas_sub_text=Identificado por clusters de dispositivos baseados em IA, com base na utilização de hardware
side_panal.smart_refresh.help_sec1_description=As três etapas: Identificar, categorizar, recomendar
side_panal.smart_refresh.help_sec1_header=Como funciona
side_panal.smart_refresh.help_sec1_point_1_desc=Avalie cada dispositivo em nove pontos de dados resumidos em uma Pontuação de urgência da atualização*. Essa pontuação ajuda a priorizar dispositivos individuais em risco para evitar interrupções na produtividade do usuário.
side_panal.smart_refresh.help_sec1_point_1_title=1. Identificar
side_panal.smart_refresh.help_sec1_point_2_desc=Um modelo de IA agrupa os dispositivos em personas distintas de hardware e software, com base no uso. Essas personas podem ajudar a orientar você para o dispositivo de substituição correto.
side_panal.smart_refresh.help_sec1_point_2_title=2. Categorizar
side_panal.smart_refresh.help_sec1_point_3_desc1=Se você trabalha com um parceiro HP, a Atualização inteligente recomendará substituições para cada dispositivo. Essas recomendações vêm dos modelos de melhor desempenho para a persona relevante disponíveis dentro do catálogo carregado do seu parceiro. Se você não vir recomendações de dispositivos ou se os dispositivos que você vir estiverem desatualizados, por favor, entre em contato com seu parceiro e peça a ele para carregar o catálogo mais recente.
side_panal.smart_refresh.help_sec1_point_3_desc2=Se você não trabalha com um Parceiro HP, não verá recomendações de dispositivos na Smart Refresh. Entre em contato com o representante de sua conta HP para obter os melhores modelos de substituição.
side_panal.smart_refresh.help_sec1_point_3_desc3=Última data de atualização de catálogo:
side_panal.smart_refresh.help_sec1_point_3_title=3. Recomendar
side_panal.smart_refresh.help_sec1_point_4_desc=Use o Status de atualização "completo" para remover quaisquer PCs que não precisem de uma atualização ou não possam ser atualizados agora. Você pode visualizar esses dispositivos e alterar seu status de volta para "Requer ação", para vê-los novamente na lista de PCs
side_panal.smart_refresh.help_sec1_point_4_title=4. Status
side_panal.smart_refresh.help_sec2_description=Como determinamos quando um dispositivo precisa de substituição
side_panal.smart_refresh.help_sec2_header=Pontuação de urgência da atualização
side_panal.smart_refresh.help_sec2_sub_text=A Pontuação de urgência da atualização é calculada a partir dos dados de desempenho de um dispositivo em nove áreas. A gravidade corresponde à pontuação numérica da seguinte forma:
side_panal.smart_refresh.help_sec2_table_col1=Urgência da atualização
side_panal.smart_refresh.help_sec2_table_col2=Pontuação da atualização
side_panal.smart_refresh.help_sec2_table_high=Atualizar agora
side_panal.smart_refresh.help_sec2_table_low=Em bom estado
side_panal.smart_refresh.help_sec2_table_medium=Atualizar em breve
side_panal.smart_refresh.help_sec3_header=Fatores
side_panal.smart_refresh.help_sec3_point_1=Uso da CPU: Porcentagem média usada nos últimos 30 dias
side_panal.smart_refresh.help_sec3_point_2=Uso de memória: Porcentagem média usada nos últimos 30 dias
side_panal.smart_refresh.help_sec3_point_3=Uso do disco: Última porcentagem usada gravada
side_panal.smart_refresh.help_sec3_point_4=Travamentos do SO: Total de travamentos do sistema operacional nos últimos sete dias
side_panal.smart_refresh.help_sec3_point_5=BSODs: Total de telas azuis da morte nos últimos sete dias
side_panal.smart_refresh.help_sec3_point_6=Duração da inicialização: Último tempo registrado em minutos
side_panal.smart_refresh.help_sec3_point_7=Duração do desligamento: Último tempo registrado em minutos
side_panal.smart_refresh.help_sec3_point_8=Erros de software para aplicativos de colaboração: Total de erros nos últimos sete dias
side_panal.smart_refresh.help_sec3_point_9=Status da alimentação do dock: Últimos dados gravados, Sim/Não
side_panal.smart_refresh.help_sec3_sub_text=Os nove fatores a seguir contribuem para a pontuação e incluem descrições de como cada um é medido:
side_panal.smart_refresh.help_sub_title=Atualize os PCs no momento certo com a HP Smart Refresh. Veja como funciona:
side_panal.smart_refresh.personas_header=Personas
side_panal.smart_refresh.personas_sub_text=Grupos de dispositivos baseados em IA, determinados pelos padrões de uso
side_panal.smart_refresh.point_1_desc=Avalie do estado atual dos PCs em termos de desempenho de hardware, usabilidade de software e segurança.
side_panal.smart_refresh.point_1_title=1. Avaliação
side_panal.smart_refresh.point_2_desc=Priorize os PCs que precisam de atenção imediata com base em uso, importância para operações de negócios ou nível de obsolescência.
side_panal.smart_refresh.point_2_title=2. Priorização
side_panal.smart_refresh.point_3_desc=Execute as atualizações ou substituições planejadas com eficiência, minimizando as paralisações e as interrupções para os usuários.
side_panal.smart_refresh.point_3_title=3. Implementação
side_panal.smart_refresh.point_4_desc=Assegure-se de que os PCs atualizados estejam equipados com as mais recentes medidas de segurança para proteção contra ameaças cibernéticas.
side_panal.smart_refresh.point_4_title=4 Segurança
side_panal.smart_refresh.point_5_desc=Monitore regularmente os PCs atualizados, para garantir que eles continuem a funcionar com o melhor desempenho, e execute a manutenção necessária.
side_panal.smart_refresh.point_5_title=5. Monitoramento e manutenção
side_panal.smart_refresh.software_persona_1=Inativo: Usuários que não usam frequentemente seus dispositivos
side_panal.smart_refresh.software_persona_2=Office 365: Usuários que usam frequentemente os aplicativos do Office, como o Excel e o Word
side_panal.smart_refresh.software_persona_3=Programador avançado: usuário que frequentemente usa ferramentas de desenvolvedor para programar
side_panal.smart_refresh.software_persona_4=Productivity Coder: Users who frequently use developer tools for coding
side_panal.smart_refresh.software_persona_5=Remote Worker: Users who frequently use productivity software, such as OneNote and Adobe Acrobat
side_panal.smart_refresh.software_persona_6=Healthcare Worker: Users who typically use their devices remotely
side_panal.smart_refresh.software_persona_7=Cloud Strategist: Users who frequently use medical professional software, such as ICU monitoring and hospital management systems
side_panal.smart_refresh.software_persona_8=Utility Expert: Users who use extensive cloud services
side_panal.smart_refresh.software_persona_9=Media Consumer: Users who frequently use utility software, such as WinRAR and System Monitor
side_panal.smart_refresh.software_personas_header=Personas de software
side_panal.smart_refresh.software_personas_sub_text=Identificado por clusters de dispositivos baseados em IA, com base na utilização de software
