banner.iot.update.description=Uma mudança na infraestrutura da plataforma TechPulse será implementada na segunda-feira, 27 de fevereiro de 2023. Talvez você tenha que atualizar as configurações de proxy, firewall e software de inspeção de SSL. Execute a ferramenta de avaliação de rede em <a href='https://www.hpdaas.com/software' target='_blank'>HP TechPulse - Software (hpdaas.com)</a> e verifique se qualquer um dos quatro (4) destinos de testes *.IoT retorna uma mensagem de “Falha”. Se os testes falharem, siga as instruções contidas aqui “<b><a href='https://hp.service-now.com/techpulse_kb?id=kb_article&sysparm_article=KB0011291' target='_blank'>KB0011291</a> - Configurando um proxy ou firewall”</b> e <b>faça essas alterações até quinta-feira, 23 de fevereiro de 2023</b>.
