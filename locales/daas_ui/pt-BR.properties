exp.FrequentWindowsBsodsHaveOccurred.causeThirdPartyDriver=Problemas com drivers de terceiros
exp.FrequentWindowsBsodsHaveOccurred.description=Houve mais que três Verificações de bugs (eventos de BSOD) nos últimos sete dias. As Verificações de bugs também são chamadas de eventos de 'Tela azul' ou 'BSOD' ('Blue Screen of Death' ou 'Tela Azul da Morte').
exp.FrequentWindowsBsodsHaveOccurred.option1=Opção 1: Atualize drivers e firmware do sistema usando o Windows Update.
exp.FrequentWindowsBsodsHaveOccurred.option2=Opção 2: Atualize drivers e firmware do sistema usando o Assistente de imagem HP.
