welcome.daas.presence.terms=Os planos e/ou componentes incluídos do {app_name} podem variar de acordo com a região ou por Parceiro de serviço {app_name} autorizado. Entre em contato com o seu representante local da HP ou Parceiro {app_name_short} autorizado para obter detalhes específicos sobre o seu local. Os serviços da HP são regidos pelos termos e condições HP de serviços aplicáveis fornecidos ou indicados ao cliente no momento da compra. Os clientes podem ter direitos legais adicionais conforme as leis locais aplicáveis, e esses direitos não são afetados de maneira alguma pelos termos e condições de serviço HP ou pela garantia limitada HP que acompanha seu produto HP.
