btg.addon.description=A HP IQ combina reconhecimento de contexto, colaboração sem esforço e uma interface de usuário personalizada com segurança de nível empresarial para aumentar a eficiência da força de trabalho e o fluxo pessoal.
btg.addon.list.feature_five.description=Com o HP Poly Studio trabalhando junto ao Poly Lens, os usuários podem personalizar seus dispositivos e manter conectividade perfeita de qualquer local.
