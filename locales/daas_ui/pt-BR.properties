poly.lens.actions=Ações
poly.lens.addon.details.description=Gerencie sua frota de dispositivos de colaboração HP em toda a sua empresa com confiança e clareza. Desde a implantação simplificada e manutenção sem esforço até o monitoramento proativo e os insights significativos, as equipes de TI obtêm controle centralizado em todos os espaços, salas e dispositivos. Com gerenciamento seguro baseado na nuvem e suporte contínuo para trabalho híbrido, você pode reduzir as despesas operacionais, permanecer à frente dos problemas e oferecer uma experiência consistente e confiável onde quer que suas equipes trabalhem.
poly.lens.addon.feature.centralized.header=Gerenciamento centralizado de dispositivos pessoais
poly.lens.addon.feature.centralized.text=Com os aplicativos HP Poly Studio, ofereça uma experiência de autoatendimento perfeita para os usuários finais, enquanto as equipes de TI mantêm visibilidade e controle centralizados sobre os dispositivos pessoais. Gerencie o inventário, as atualizações, o monitoramento e os insights com confiança, onde quer que suas equipes trabalhem.
poly.lens.addon.feature.effortless.maintenance.header=Manutenção sem esforço
poly.lens.addon.feature.effortless.maintenance.text=Gerencie atualizações de software, recursos e configurações em toda a sua frota com o mínimo de esforço. Aplique configurações, prepare atualizações e ajuste configurações em escala sem sacrificar o controle ou a precisão.
poly.lens.addon.feature.meaningful.measurement.header=Medição significativa
poly.lens.addon.feature.meaningful.measurement.text=Entenda como os dispositivos, espaços e pessoas estão realmente trabalhando. Transforme dados de uso e desempenho em decisões mais inteligentes e conduzidas por dados sobre seus investimentos em colaboração.
poly.lens.addon.feature.proactive.monitoring.header=Monitoramento proativo
poly.lens.addon.feature.proactive.monitoring.text=Permaneça à frente dos problemas com clara visibilidade da integridade e do status dos dispositivos. Receba alertas quando algo não estiver certo, para que os problemas sejam resolvidos antes que interrompam as reuniões.
poly.lens.addon.feature.secure.header=Controle seguro baseado na nuvem
poly.lens.addon.feature.secure.text=Gerencie tudo a partir de uma plataforma confiável baseada na nuvem que se adapta ao crescimento de sua empresa, atendendo às necessidades de segurança e conformidade corporativas.
poly.lens.addon.feature.simplified.deployment.header=Implantação simplificada
poly.lens.addon.feature.simplified.deployment.text=Prepare, pré-configure e implante dispositivos com confiança. Os fluxos de trabalho de integração automatizados reduzem o tempo de configuração, eliminam erros e preparam os dispositivos antes mesmo que cheguem ao usuário ou à sala.
poly.lens.addon.subtitle=Gerenciamento e insights baseados na nuvem em espaços de colaboração, salas e dispositivos.
