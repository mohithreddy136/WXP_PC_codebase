wex.fleet.mgmt.troubleshoot.linux_firewall_disabled.description=Ativar o firewall ajuda a proteger o sistema de acessos não autorizados, ataques baseados na rede e tráfego indesejado, controlando as conexões de entrada e saída. Essa é uma etapa crítica na proteção de sistemas Linux, especialmente aqueles expostos a redes públicas ou empresariais.
