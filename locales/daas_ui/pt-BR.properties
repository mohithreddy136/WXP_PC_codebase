wex.remediate.side.bar.content.script=Implante uma Remediação para corrigir problemas em toda a sua frota.<br><br> A Ação recomendada reúne dos dispositivos que correspondem aos critérios dos problemas. As Remediações conseguem lidar com o problema para os dispositivos selecionados.<br><br> Selecione um Script recomendado HP da Galeria HP ou selecione um dos seus próprios.<br><br> Uma vez implantada, o andamento e a conclusão da Remediação aparecem em Remediações > Atividade.<br><br>
