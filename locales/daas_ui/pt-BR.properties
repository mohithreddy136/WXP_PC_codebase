dnto.subscriptions.privacy_statement.desc1=A HP reconhece que a privacidade é um direito humano fundamental e reconhece ainda a importância da privacidade, segurança e proteção de dados para nossos clientes e parceiros em todo o mundo. Como organização global, com entidades legais, processos de negócios, estruturas de gerenciamento e sistemas técnicos que atravessam fronteiras internacionais, nos esforçamos para fornecer proteções em todas as nossas operações que excedam os mínimos legais e para implementar políticas e procedimentos consistentes e rigorosos.
dnto.subscriptions.privacy_statement.desc2=Como utilizados nesta declaração, termos como "nós", "nos", "nosso" e "Empresa" referem-se às empresas da marca HP e afiliados atuais e futuros, conforme definidos pela lei local (aqui "HP"). Informações de contato para o Oficial de proteção de dados da HP aparecem na seção "{0}" abaixo.
dnto.subscriptions.privacy_statement.exercise_rights=Exercendo seus direitos e entrando em contato conosco
dnto.subscriptions.privacy_statement.heading=Declaração de privacidade HP
dnto.subscriptions.section.details.desc1=Os funcionários estão acostumados a terem flexibilidade para trabalharem como e onde quiserem, chegando até a exigir isso. Com as equipes de TI forçadas além dos limites, a experiência, a produtividade e o envolvimento dos funcionários estão sendo prejudicados.
dnto.subscriptions.section.details.desc2=A HP Workforce Experience Pro inteligentemente antecipa e elimina a fricção digital com uma plataforma consolidada e modular.
dnto.subscriptions.section.details.desc3=Esteja você gerenciando uma pequena equipe em um só local ou navegando as complexidades de uma força de trabalho híbrida global, a HP Workforce Experience Pro oferece uma plataforma unificada para suportar e otimizar as experiências digitais dos seus funcionários.
dnto.subscriptions.section.details.desc4=Aumente a produtividade dos funcionários, resolvendo proativamente os problemas de TI antes de estes ocorrerem. Reduza as horas e custos de suporte usando IA avançada. Fortaleça a segurança das extremidades antecipando e resolvendo ameaças.
dnto.subscriptions.section.details.desc5=Melhore o sentimento dos funcionários com insights práticos obtidos das pesquisas de Pulso. Otimize os custos com atualizações inteligentes de hardware. Faça integrações suaves aos ambientes já existentes com vários fornecedores e sistemas operacionais.
dnto.subscriptions.section.details.heading=Detalhes da assinatura
dnto.subscriptions.sign_in=Entrar na HP Workforce Experience
dnto.subscriptions.thank_you.desc=Agradecemos a você por escolher a HP Workforce Experience. Temos certeza de que você conseguirá mais produtividade e colaboração. Se você tiver alguma dúvida para começar, não hesite, por favor, em visitar nossos abrangentes recursos de suporte ou entrar em contato com nossa prestativa equipe de atendimento ao cliente.
