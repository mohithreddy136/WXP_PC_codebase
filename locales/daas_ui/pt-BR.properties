azureonboard.marketing.disclaimer.content=As informações contidas neste documento estão sujeitas a alterações sem aviso. As únicas garantias para produtos e serviços HP estão definidas nas declarações de garantia expressa que acompanham tais produtos e serviços. Nenhuma parte deste documento deve ser interpretada como constituindo uma garantia adicional. A HP não se responsabiliza por nenhum erro técnico ou editorial ou omissões aqui contidos.
azureonboard.marketing.disclaimer.contentlist1=O HP Proactive Insights e/ou os componentes incluídos podem variar de acordo com a região, sistema operacional ou parceiro de serviço autorizado da HP. Entre em contato com o seu representante local da HP ou parceiro autorizado para obter detalhes específicos sobre o seu local. Os serviços da HP são regidos pelos termos e condições HP de serviços aplicáveis fornecidos ou indicados ao cliente no momento da compra. Os clientes podem ter direitos legais adicionais conforme as leis locais aplicáveis, e esses direitos não são afetados de maneira alguma pelos termos e condições de serviço HP ou pela garantia limitada HP que acompanha seu produto HP.
azureonboard.marketing.disclaimer.contentlist2=O HP {appName} é uma plataforma de telemetria e análise que fornece dados críticos sobre dispositivos e aplicativos e não é vendida como um serviço independente. O HP {appName} segue rigorosos regulamentos de privacidade GDPR e é certificado pela ISO27001, ISO27701, ISO27017 e SOC2 Type2 quanto à segurança da informação. É necessário ter acesso à internet com conexão ao {appName}. Para ver todos os requisitos do sistema, por favor, visite <a target='_blank' href={link}>{text}</a>.
azureonboard.marketing.disclaimer.contentlist3=As atualizações do BIOS estão disponíveis apenas em dispositivos HP.
azureonboard.marketing.disclaimer.contentlist4=Para ver detalhes sobre a cobertura do sistema operacional, por favor, visite <a target='_blank' href={link}>{text}</a>.
azureonboard.marketing.employeesection.description=Colete, meça e gerencie a experiência digital de seus funcionários por meio de uma correlação de hardware, aplicativos e pesquisas de experiência de funcionários em todos os seus dispositivos.
azureonboard.marketing.employeesection.heading=Proactive Employee Insight
azureonboard.marketing.hardwaresection.description=Monitore proativamente as unidades de disco rígido do dispositivo, o uso da CPU, os níveis térmicos e a integridade da bateria, permitindo que você preveja os impactos potenciais ao analisar seus dados em um data lake de mais de 20 milhões de dispositivos.
azureonboard.marketing.hardwaresection.heading=Proactive Hardware Insight
azureonboard.marketing.insightsection.description=Tenha o diagnóstico de problemas de desempenho, erros de software, falhas de tela azul e uso do sistema, enquanto atualiza drivers e patches para garantir que você tenha perfis de segurança seguros.
azureonboard.marketing.insightsection.heading=Proactive Application Insight
azureonboard.marketing.learnmoresection.content=Agregando conhecimento de mais de 20 milhões de dispositivos e bilhões de pontos de dados, o HP Proactive Insights aproveita a plataforma analítica HP TechPulse para identificar e resolver problemas antes que afetem os funcionários.
azureonboard.marketing.learnmoresection.description=Estamos ajudando você a mudar seu paradigma de gerenciamento de dispositivos por meio do controle proativo baseado em IA do desempenho do computador, segurança, custos, tempo de inatividade e satisfação dos funcionários. Você aproveitará a inteligência adquirida em mais de 20 milhões de outros dispositivos de computação para melhorar sua organização.
azureonboard.marketing.learnmoresection.heading=HP Proactive Insights oferece análises significativas com base em bilhões de pontos de dados
