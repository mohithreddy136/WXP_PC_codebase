side_panal.smart_refresh.hardware_persona_1=Uso intenso da CPU: Dispositivos que usam muita CPU
side_panal.smart_refresh.hardware_persona_2=Pesado em armazenamento: Dispositivos que usam muito armazenamento
side_panal.smart_refresh.hardware_persona_3=Perfil padrão: Dispositivos com métricas de uso correspondentes a um perfil normal
side_panal.smart_refresh.hardware_persona_4=Dock moderado: Dispositivos que usam um dock e/ou outros periféricos frequentemente
