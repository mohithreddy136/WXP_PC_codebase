exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.responseOptions=Dependendo do aplicativo em questão, as opções de resposta variam. Se o aplicativo for crítico para os negócios, atualizar CPU pode aliviar o problema. Para aplicativos não críticos para os negócios, você poderá removê-los do dispositivo ou ajustar suas configurações para reduzir a carga no dispositivo.
