exp.NetworkConnectionNotSecure.recStrongPasswords=Defina senhas robustas e únicas para proteger o acesso à rede.
exp.NetworkConnectionNotSecure.recUpdateFirmware=Atualize regularmente o firmware do roteador e do dispositivo para garantir proteção contra vulnerabilidades.
exp.NetworkConnectionNotSecure.recUpgradeRouter=Faça um upgrade do roteador ou ponto de acesso antigo para padrões de segurança mais novos.
exp.NetworkDisconnections.causeInsufficientSpeed=Velocidade de internet insuficiente
exp.NetworkDisconnections.causeInsufficientSpeed.detail1=Baixa largura de banda durante o pico do uso pode causar instabilidades e quedas frequentes.
exp.NetworkDisconnections.causeInsufficientSpeed.detail2=Recomendação: Execute testes de velocidade e faça o upgrade do plano de serviço se a largura de banda fornecida for inadequada.
exp.NetworkDisconnections.causeInterference=Interferência no sem fio ou obstáculos físicos.
exp.NetworkDisconnections.causeOutdatedRouter=Roteador ou modem desatualizado em casa
exp.NetworkDisconnections.causeOutdatedRouter.detail1=Um roteador desatualizado pode não ser compatível com os padrões mais recentes ou com muitos dispositivos conectados, causando desconexões e congestionamento na rede
exp.NetworkDisconnections.causeOutdatedRouter.detail2=Recomendação: Mantenha o equipamento de rede atualizado; experimente uma redefinição de fábrica para limpar as configurações corrompidas.
exp.NetworkDisconnections.causeOutdatedRouter.detail3=Se os problemas persistirem ou o hardware for antigo, faça um upgrade para um modelo mais novo, para confiabilidade.
exp.NetworkDisconnections.causePoorWifiSignal=Sinal Wi-Fi ruim
exp.NetworkDisconnections.causePoorWifiSignal.detail1=Sinal fraco ou obstruído leva a uma conexão instável do dispositivo.
exp.NetworkDisconnections.causePoorWifiSignal.detail2=Recomendação: Coloque o roteador numa posição central e ajuste o canal/frequência para reduzir a interferência.
exp.NetworkDisconnections.causeRouterIssues=Problemas de firmware ou hardware no roteador.
exp.NetworkDisconnections.causeSoftwareDriverIssues=Problemas de software ou drive
exp.NetworkDisconnections.causeSoftwareDriverIssues.detail1=Firmware/drivers desatualizados ou corrompidos podem piorar a estabilidade da conexão.
exp.NetworkDisconnections.causeSoftwareDriverIssues.detail2=Recomendação: Ative as atualizações automáticas e mantenha atualizado todo o software relacionado à rede.
exp.NetworkDisconnections.causeUnprotectedNetwork=Rede não protegida
exp.NetworkDisconnections.causeUnprotectedNetwork.detail1=Usuários não autorizados consumindo largura de banda podem causar desconexões e perda de desempenho.
exp.NetworkDisconnections.causeUnprotectedNetwork.detail2=Recomendação: Use uma senha Wi-Fi forte e exclusiva para impedir o acesso não autorizado.
