asset_details_last_fast_startup.description=Allows Windows to start faster by saving part of the system state to disk (hiberfile), instead of performing a complete initialization
asset_details_last_fast_startup.enable_step1a=Abra o Painel de controle
asset_details_last_fast_startup.enable_step1b=Vá para Hardware e sons
asset_details_last_fast_startup.enable_step1c=Opções de alimentação.
asset_details_last_fast_startup.enable_step2=Click Choose what the power buttons do.
asset_details_last_fast_startup.enable_step3=Click Change settings that are currently unavailable.
asset_details_last_fast_startup.enable_step4=Nas configurações de Desligamento, marque Ativar inicialização rápida (recomendado).
asset_details_last_fast_startup.enable_step5=Click Save changes.
asset_details_last_fast_startup.final_note=Fast startup only applies to Shutdown > Start, not to restarts.
asset_details_last_fast_startup.hibernation_note=A inicialização rápida requer que a hibernação esteja ativada. Se a opção estiver ausente, execute esse comando em um prompt de comando elevado.
asset_details_last_fast_startup.note.description=Essa marca de data/hora indica o início da sessão de inicialização rápida mais recente, que ocorre quando:
asset_details_last_fast_startup.note.point1=O sistema é desligado com a inicialização rápida ativada (desligamento híbrido)
asset_details_last_fast_startup.note.point2=When Fast Startup is disabled, then Last Fast Startup will display Disabled
asset_details_last_fast_startup.note.point3=Important: In Fast Startup, Last restart remains unchanged and reflects the last full boot or restart.
asset_details_last_logon=Last Login
asset_details_last_logon_duration=Last logon duration
asset_details_last_restart=Última reinicialização
asset_details_last_restart.advantage1=A full boot ensures all drivers, services, and hardware states are reset, helping prevent lingering issues from partial restarts or cached sessions.
asset_details_last_restart.advantage2=Recomendada ao solucionar problemas do sistema ou após atualizações importantes para garantir um início limpo.
asset_details_last_restart.advantage3=Produces a more accurate measure of system performance compared to Fast Startup.
asset_details_last_restart.cause1=Reinicialização iniciada pelo usuário (Iniciar > Reiniciar)
asset_details_last_restart.cause2=Full shutdown via Start menu (Start > Shift + Shutdown)
asset_details_last_restart.cause3=Shutdown via press and hold of the Power button
asset_details_last_restart.cause4=Shutdown triggered by Power button settings (if configured to shut down when Last Fast Startup is disabled)
asset_details_last_restart.cause5=Shutdown triggered by Lid Close settings (if configured to shutdown when Last Fast Startup is disabled)
asset_details_last_restart.cause6=Automatic shutdown due to battery drain
asset_details_last_restart.cause7=Unexpected OS shutdowns (such as BSOD, or forced shutdown)
asset_details_last_restart.cause8=User-initiated or Windows Update-initiated pending restart due to Windows Update installation
asset_details_last_restart.cause9=Reinicialização iniciada por processo do usuário (via script ou solicitação programática)
asset_details_last_restart.description1=Windows closes apps, stops services, unloads drivers, and reinitializes the OS kernel before booting fresh.
asset_details_last_restart.description2=A reinicialização pode aplicar atualizações, corrigir problemas de desempenho e limpar a memória.
asset_details_last_restart.description3=Windows does not use Fast Startup during restart. Instead it performs a clean OS restart but keeps certain hardware states warm.
asset_details_last_restart.full_boot=Inicialização completa
asset_details_last_restart.full_boot.description=Quando o Windows executa uma reinicialização com inicialização completa, ele recarrega completamente o sistema operacional e reinicializa os componentes de hardware. Ao contrário de uma reinicialização padrão ou de um desligamento com Inicialização rápida, esse processo não preserva a sessão do kernel. Tudo é iniciado novamente, de forma semelhante a ligar após um desligamento total.
asset_details_last_restart.full_boot.timestamp=This timestamp is the start of the last full system boot (cold boot or warm boot), regardless of what caused the Startup.
asset_details_last_restart.note1=Essa marca de data/hora é atualizada apenas quando ocorre uma inicialização/reinicialização completa, ou seja, quando o Windows inicializa completamente uma nova sessão.
asset_details_last_restart.note2=Quando a Inicialização rápida está ativada, esse campo não é atualizado para sessões híbridas/de Inicialização rápida; ele reflete apenas a última reinicialização completa verdadeira.
