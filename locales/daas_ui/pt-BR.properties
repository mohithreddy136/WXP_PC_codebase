wex.labs.remediation.ai.description=A remediação com IA guia você até a solução mais eficiente. Ela filtra inteligentemente as opções para que sua equipe possa resolver problemas eficiente e consistentemente.
wex.labs.remediation.ai.description.disclaimer=You are about to interact with an AI solution. Content generated by AI might contain inaccuracies and should be verified against the details provided. Please note that AI-generated responses might be incomplete or incorrect, and HP assumes no responsibility for actions taken based on this content.
wex.labs.remediation.ai.details.analyzesAvailableRemediations.desc=O algoritmo analisa as remediações existentes na plataforma, incluindo scripts, políticas e ações/atualizações de dispositivos, para recomendar a remediação mais relevante.<br/><br/>Ele observa o histórico de uso e as taxas de sucesso para entender o que normalmente resolve esse tipo de problema em sua empresa. Os usuários podem gastar menos tempo determinando o curso de ação correto e permitir que a IA faça o trabalho.
wex.labs.remediation.ai.details.analyzesAvailableRemediations.title=Analisa remediações disponíveis
wex.labs.remediation.ai.details.applyOrReview.desc=Dependendo da remediação, os administradores podem optar por: <br/><div class=remediation-ai-ui><ul><li>Aplicar imediatamente nos dispositivos selecionados</li><li>Programar para outra hora, para minimizar as interrupções</li><li>Revisar os detalhes antes de confirmar a ação</li></ul></div><br/>Uma vez aplicada, a atividade e os resultados são monitorados quanto à transparência e o aprendizado contínuo.
wex.labs.remediation.ai.details.applyOrReview.title=Aplicar, programar ou revisar
wex.labs.remediation.ai.details.continuousLearning.desc=Com o tempo, as recomendações ganham precisão e confiança.
wex.labs.remediation.ai.details.continuousLearning.title=Aprendizado contínuo
wex.labs.remediation.ai.details.howItWorks.title=Como funciona
wex.labs.remediation.ai.details.issueToRemediation.desc=Quando um problema ultrapassa um limite definido, ele aparece em seu painel com uma descrição clara do que está acontecendo e como isso pode afetar seus dispositivos. A plataforma WXP agora permite a remediação direta, e o recurso de remediação por IA ajuda a identificar a melhor opção para corrigir o problema.
wex.labs.remediation.ai.details.issueToRemediation.title=Enviar para remediação
wex.labs.remediation.ai.details.learnsandImproves.desc=O algoritmo aprimora continuamente sua compreensão do que funciona melhor para sua organização.<br/>Cada vez que uma correção é aplicada, o sistema aprende:<div class=remediation-ai-ui><ul><li>O quanto foi eficaz</li><li>Quanto tempo levou para resolver o problema</li><li>Se problemas semelhantes ocorreram novamente</li></ul></div><br/>Esse ciclo de feedback fortalece as recomendações futuras, tornando-as mais precisas e personalizadas ao longo do tempo.
wex.labs.remediation.ai.details.learnsandImproves.title=Aprende e melhora com o tempo
wex.labs.remediation.ai.details.overview.desc=O recurso de remediação com IA ajuda os administradores de TI a passar rapidamente da detecção para a resolução. Ele analisa os dados de sua frota e recomenda a política, o script ou a atualização de dispositivo mais eficaz para o problema em questão. O algoritmo usa padrões de remediações existentes em seu ambiente para sugerir o que provavelmente funcionará melhor.
wex.labs.remediation.ai.details.recommendBestFix.desc=Cada recomendação inclui: <br/><div class=remediation-ai-ui><ul><li>Tipo de ação: Script, política ou atualização</li><li>Por que isso é relevante: A remediação e a automação corrigem problemas em tempo real, aumentam a produtividade dos funcionários, aprimoram a experiência digital, economizam tempo e diminuem a vulnerabilidade.</li></ul></div>
wex.labs.remediation.ai.details.recommendBestFix.title=Recomenda a melhor correção
