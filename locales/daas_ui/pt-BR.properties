partner.exp.mgmt.recommended.desc.DOCKING_STATION_AC_ADAPTER_FAILED=Uma falha no adaptador de CA da estação de acoplamento pode indicar problemas de hardware que podem fazer com que o dispositivo perca alimentação ou funcione intermitentemente.
partner.exp.mgmt.recommended.desc.DOCKING_STATION_FIRMWARE_OUT_OF_DATE=Um firmware antigo de uma estação de acoplamento pode causar problemas de compatibilidade, limitar a funcionalidade ou expor lacunas de segurança.
partner.exp.mgmt.recommended.desc.EXCESSIVE_OS_SHUTDOWN_TIME=Se o desligamento demorar muito, isso pode indicar que há aplicativos travados, hardware lento, atualizações de política, scripts longos ou tarefas não terminadas do Windows.
partner.exp.mgmt.recommended.desc.EXCESSIVE_OS_STARTUP_TIME=Demoras na atualização podem se dever a conflitos de software ou problemas de hardware subjacentes.
partner.exp.mgmt.recommended.desc.FIREWALL_DISABLED=Se o Firewall do Windows Defender estiver desativado, os dispositivos podem ficar expostos a ataques prejudiciais na sua rede.
partner.exp.mgmt.recommended.desc.FIREWALL_SIGNATURE_OUTDATED=Definições antigas do firewall deixam os dispositivos vulneráveis a malware e outras ameaças novas.
partner.exp.mgmt.recommended.desc.GPU_HEALTH_ISSUE=Um problema de GPU detectado pode levar a defeitos visuais, problemas de desempenho ou até uma falha completa na exibição.
partner.exp.mgmt.recommended.desc.HIGH_COLLABORATION_SW_ERRORS=Erros persistentes no software de colaboração podem interromper os ciclos de trabalho das equipes, além de poderem prejudicar a comunicação e o progresso dos projetos.
partner.exp.mgmt.recommended.desc.HIGH_WINDOWS_CRASH=Travamentos e reinicializações inesperados indicam uma instabilidade subjacente que pode levar a perda de dados ou danos permanentes ao hardware.
partner.exp.mgmt.recommended.desc.LAST_REBOOT_MORE_THAN_21_DAYS=Dispositivos não reiniciados após um longo período podem ter problemas de estabilidade e desempenho do SO.
partner.exp.mgmt.recommended.desc.MAXIMISE_MY_BATTERY_HEALTH_NOT_ENABLED=O fato de o Gerenciador de integridade da bateria não estar ativado pode afetar a duração atual da bateria.
partner.exp.mgmt.recommended.desc.MEMORY_UTILIZATION_HIGH=A utilização alta da memória do dispositivo por muito tempo pode desacelerar um dispositivo, impactando o desempenho do funcionário.
partner.exp.mgmt.recommended.desc.MISSING_CRITICAL_DRIVER_UPDATES=Sem atualizações críticas dos drivers, o hardware dos dispositivos poderá apresentar mau funcionamento ou não funcionar.
partner.exp.mgmt.recommended.desc.MISSING_WINDOWS_SECURITY_UPDATES=Atualizações antigas de segurança podem deixar os dispositivos vulneráveis a hackers e vírus.
partner.exp.mgmt.recommended.desc.MISSING_WINDOWS_UPDATES=Atualizações antigas do Windows expõem dispositivos a vulnerabilidades e possíveis infecções por malware.
partner.exp.mgmt.recommended.desc.PC_REFRESH=Dê início a uma atualização inteligente de todos eles ou desmarque na tabela abaixo os PCs que você não substituirá agora.
partner.exp.mgmt.recommended.desc.PC_REFRESH_SELECT=Verifique os dispositivos e prossiga com a solicitação.
partner.exp.mgmt.recommended.desc.security=Resolva todos ou desmarque na tabela abaixo os PCs que você não ativará agora.
partner.exp.mgmt.recommended.desc.WINDOWS_SECURE_BOOT_NOT_ENABLED=Ativar a Inicialização segura do Windows garante que um dispositivo se inicialize usando apenas software confiável.
partner.exp.mgmt.recommended.disk_utilization_high=Libere espaço no disco rígido.
partner.exp.mgmt.recommended.docking_station_ac_adapter_failed=Investigue uma falha no adaptador de CA da estação de acoplamento.
partner.exp.mgmt.recommended.docking_station_firmware_out_of_date=Atualize o firmware da estação de acoplamento.
