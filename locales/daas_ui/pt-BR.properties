exp.NetworkSpeedSlow.recUpdateDrivers.detail=Instale os drivers mais recentes do adaptador para resolver problemas de desempenho.
exp.NetworkSpeedSlow.recUpdateFirmware=Atualize o firmware do seu roteador.
exp.NetworkSpeedSlow.recUpdateFirmware.detail=Aplique o mais recente firmware do fornecedor para corrigir bugs e melhorar o desempenho.
