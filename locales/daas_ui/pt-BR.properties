wex.ra.remediation.antivirus_not_enabled=O Microsoft Defender Antivirus é um software antivírus que vem com o Windows e pode ajudar a proteger seu dispositivo de vírus, malware e outras ameaças.
wex.ra.remediation.antivirus_signature_outdated=Para garantir a proteção ideal, os arquivos de definições antivírus devem ser mantidos atualizados.
wex.ra.remediation.antivirus_signature_outdated_other=O dispositivo está configurado para usar um antivírus de terceiros, que não seja da Microsoft, para ajudar a proteger o dispositivo contra vírus, malware e outras ameaças, mas são necessárias atualizações da assinatura do antivírus no dispositivo.
wex.ra.remediation.app_crash=Mais de dez erros de software nos últimos sete dias no Teams, Outlook, Zoom, Webex, Chrome, Office.
wex.ra.remediation.avg_fan_speed_high=A velocidade média da ventoinha está alta por um longo tempo.
wex.ra.remediation.battery_calibrate=A bateria precisa ser calibrada.
wex.ra.remediation.battery_early_detection_wear=A previsão é de que a bateria tenha menos de 70% de capacidade de carga total restante em 30 dias.
wex.ra.remediation.battery_needs_attention=Workforce Experience Platform displays records of battery warnings and failures that can be used to obtain service for a battery that is experiencing issues
wex.ra.remediation.bitlocker_encryption_not_enabled=Para proteger os dados em repouso, recomendamos enfaticamente a criptografia do disco.
wex.ra.remediation.bsod=Houve mais que três Verificações de bugs (eventos de BSOD) nos últimos sete dias.
wex.ra.remediation.bsod_occured=O dispositivo teve um ou mais eventos de Verificação de bugs nos últimos sete dias.
wex.ra.remediation.cpu_utilization_high=Causas possíveis: Um aplicativo em execução travou/não responde.
wex.ra.remediation.disk_needs_attention=A Workforce Experience Platform mostra registros de avisos e falhas de disco que podem ser usados para se obter serviço para um disco que esteja passando por problemas.
wex.ra.remediation.disk_utilization_high=Hard disk is near full disk capacity and low in free space.
wex.ra.remediation.docking_station_ac_adapter_failed=The Docking Station AC Adapter is having a hardware issue.
wex.ra.remediation.docking_station_ac_adapter_running_at_reduced_perofmance=O adaptador de CA da estação de acoplamento não está funcionando corretamente.
wex.ra.remediation.docking_station_firmware_out_of_date=Possible Causes: The docking station may require a Firmware or Driver update.
wex.ra.remediation.excessive_os_shutdown_time=O desligamento completo demora três minutos ou mais.
wex.ra.remediation.excessive_os_startup_time=A inicialização do sistema demora mais de três minutos para terminar.
wex.ra.remediation.firewall_disabled=O firewall ajuda a evitar que hackers e software prejudicial consigam acesso ao seu PC por meio da internet ou de uma rede.
wex.ra.remediation.firewall_signature_outdated=O firewall requer atualizações regulares para garantir a proteção ideal contra ataques baseados na rede.
wex.ra.remediation.frequent_bsod_occured=Houve mais que três Verificações de bugs (eventos de BSOD) nos últimos sete dias.
wex.ra.remediation.frequent_network_disconnection=Para as redes domésticas, assegure-se de que o firmware do roteador esteja atualizado e coloque o roteador em um local central para minimizar a interferência. Além disso, reduza o número de dispositivos conectados e considere usar uma conexão com fio para dispositivos críticos mantendo uma rede estável e confiável.
wex.ra.remediation.gpu_health_issue=A Workforce Experience Platform detectou um problema com a GPU que requer atenção imediata.
wex.ra.remediation.high_collaboration_sw_errors=Mais de 10 erros de software nos últimos sete dias no Teams, Outlook, Zoom, Webex, Chrome, Office.
wex.ra.remediation.high_windows_crash=O sistema operacional experimentou um ou mais travamentos ou reinicializações inesperados nos últimos sete dias.
wex.ra.remediation.last_reboot_more_than_21_days=A última reinicialização foi há mais de 21 dias.
wex.ra.remediation.maximise_my_battery_health_not_enabled=HP Battery Health Manager is available on all HP business notebooks since 2016. To improve battery life, it is recommended that Battery Health Manager be enabled
wex.ra.remediation.memory_utilization_high=The average Memory utilization over the last 30 days is 85% or greater.
wex.ra.remediation.missing_critical_bios_updates=Atualize o BIOS de dispositivos compatíveis por meio da plataforma, selecionando os dispositivos abaixo e selecionando "Aplicar política". No caso de dispositivos incompatíveis, atualize os drivers e o firmware do sistema usando o Windows Update ou o HP Image Assistant.
wex.ra.remediation.missing_critical_driver_updates=O Relatório de inventário de driver contém um inventário detalhado de dispositivos que estão sem atualizações críticas de driver.
wex.ra.remediation.missing_windows_security_updates=O painel da Workforce Experience Platform Security contém KPIs mostrando o número de dispositivos sem atualizações de segurança do Windows.
wex.ra.remediation.os_crash=O sistema operacional experimentou um ou mais travamentos ou reinicializações inesperados nos últimos sete dias.
wex.ra.remediation.poor_network_signal_strength=Para redes domésticas, reiniciar seu roteador ou movê-lo para reduzir o número de obstáculos entre o ponto de acesso e o PC podem ajudar a melhorar a intensidade do sinal de Wi-Fi.
wex.ra.remediation.poor_nominal_speed=Para redes domésticas, é recomendável atualizar seu roteador para um modelo mais novo que suporte os mais recentes padrões de Wi-Fi, como o Wi-Fi 6. Além disso, otimize o layout da sua rede, colocando o roteador em um local central, reduzindo a interferência de outros dispositivos e usando conexões com fio, onde possível, para um desempenho mais estável.
wex.ra.remediation.unauthenticated_connection=Para redes domésticas, selecione um protocolo de criptografia robusto, como WPA2 ou WPA3, e defina uma senha forte e única para acesso. Além disso, considere implementar a filtragem de endereço MAC e atualizar regularmente o firmware do seu roteador para aumentar a segurança e evitar conexões não autorizadas.
wex.ra.remediation.windows_secure_boot_not_enabled=A Inicialização segura é um padrão de segurança desenvolvido por membros do setor de PCs para garantir que um dispositivo se inicialize usando apenas software de confiança do fabricante do equipamento original (OEM).
