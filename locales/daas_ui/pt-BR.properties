exp.NetworkDisconnections.recommendationsHeader=Recomendações:
exp.NetworkDisconnections.recReduceInterference=Reduza a interferência na rede sem fio.
exp.NetworkDisconnections.recReduceInterference.detail=Mova os dispositivos ou mude o canal para evitar sobreposição de sinais.
exp.NetworkDisconnections.recRestartRouter=Reinicie o modem e o roteador.
exp.NetworkDisconnections.recRestartRouter.step1=Primeiro, desligue o modem; depois, o roteador; espere um pouco antes de religá-los.
exp.NetworkDisconnections.recUpdateFirmware=Atualize o firmware do seu roteador.
exp.NetworkDisconnections.recUpdateFirmware.detail=Verifique o site do fornecedor e aplique o firmware estável mais recente.
