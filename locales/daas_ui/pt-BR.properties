requirements.list.hp_print_fleetproxy.desc1=O Print Fleet Proxy exige que o HP Web Jetadmin seja instalado no mesmo PC. A HP recomenda enfaticamente que você atualize o Web Jetadmin para a mais recente versão antes de instalar o HP Fleet Proxy.
requirements.list.hp_print_fleetproxy.desc2=Atualmente, a HP está somente testando o HP Fleet Proxy quanto ao HP Web Jetadmin 10.5 SR4. Apesar de o HP Fleet Proxy poder funcionar com as versões anteriores do HP Web Jetadmin, a HP não garante que todos os recursos funcionarão como o esperado.
requirements.list.hp_print_fleetproxy.desc3=O Web Jetadmin é um serviço que consume muitos recursos. Enquanto o HP Fleet Proxy não deve adicionar muita carga, poderá haver um impacto no desempenho se o servidor host não tiver poder computacional suficiente para suportar ambos os serviços de suporte e os dispositivos que eles gerenciam. Você deve garantir que o servidor hospedando o HP Web Jetadmin e o HP Fleet Proxy sejam robustos o suficiente e tenham núcleos de processador suficientes para mitigarem quaisquer problemas de desempenho.
requirements.list.hp_print_fleetproxy.desc4=Testando 2000 dispositivos, a HP concluiu que as seguintes especificações de hardware são uma base suficiente para resultados de desempenho aceitáveis. Se você perceber um desempenho lento ou se gerenciar mais de 2000 dispositivos, poderá precisar de um servidor com mais poder computacional.
requirements.list.hp_print_fleetproxy.desc5=O Print Fleet Proxy é um serviço local que se comunica com um serviço baseado na nuvem. Assim, você deverá configurar seu firewall para permitir comunicações de entrada e saída entre o servidor do WJA e o HP Command Center, seja por filtragem de DNS ou listas de IPs permitidos.
requirements.list.hp_print_fleetproxy.desc6=Você pode encontrar essa lista aqui:
requirements.list.hp_print_fleetproxy.hp-nf1=Filtragem de DNS: Configure o seu firewall para permitir solicitações de HTTPS de saída pela porta 443 aos seguintes pontos de extremidade:
requirements.list.hp_print_fleetproxy.hp-nf2=Listas de IPs permitidos: Para colocar IPs na lista de permitidos, você precisará incluir o endereço IP de todo e qualquer servidor de nuvem com o qual o HP Fleet Proxy possa precisar se comunicar.
requirements.list.hp_print_fleetproxy.hp-sh1=4 ou mais núcleos de processamento
