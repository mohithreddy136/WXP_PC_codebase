partner.exp.mgmt.recommended.high_windows_crash=Reduza os travamentos inesperados do sistema operacional.
partner.exp.mgmt.recommended.last_reboot_more_than_21_days=Implemente uma reinicialização preventiva do dispositivo.
partner.exp.mgmt.recommended.maximise_my_battery_health_not_enabled=Ative o Gerenciador de integridade da bateria HP.
partner.exp.mgmt.recommended.memory_utilization_high=Investigue o alto uso de memória do dispositivo.
