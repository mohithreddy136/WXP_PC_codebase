exp.NetworkConnectionNotSecure.recAccessControl=Implemente software de controle de acesso de rede para restringir o acesso.
exp.NetworkConnectionNotSecure.recChangeSecurity=Alterar a configuração de segurança do Wi-Fi doméstico
exp.NetworkConnectionNotSecure.recChangeSecurity.step1=Faça login no roteador usando o software de gerenciamento dele.
