exp.NetworkConnectionNotSecure.recCheckSSID=Verifique se você está na SSID correta.
exp.NetworkConnectionNotSecure.recCheckSSID.detail=Verifique se o nome da rede corresponde ao ponto de acesso confiável.
exp.NetworkConnectionNotSecure.recEnableEncryption=Ative a criptografia da rede para proteger a transmissão de dados.
exp.NetworkConnectionNotSecure.recMacFiltering=Use filtragem de endereço MAC para permitir somente dispositivos aprovados.
exp.NetworkConnectionNotSecure.recMonitorActivity=Monitore a atividade da rede para detectar dispositivos não autorizados.
