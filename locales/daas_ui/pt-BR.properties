requirements.list.proSecurity.windows.supportLifecycle.content1=O Objetivo de nível de serviço da HP é fornecer suporte para as três versões do canal semestral do Windows 10 mais recentes.
requirements.list.proSecurity.windows.supportLifecycle.content2=O objetivo da HP é lançar suporte para a nova versão do sistema operacional para o recurso de Contenção de ameaças do Wolf Pro Security dentro de 30 dias após a sua disponibilidade para o Canal Semestral (\"SAC\"). Não há suporte para compilações provisórias ou de pré-lançamento do Windows Insider. Para obter mais informações sobre versões do sistema operacional Windows, consulte <a href='https://docs.microsoft.com/en-us/windows/release-information/' target='_blank'>https://docs.microsoft.com/en-us/windows/release-information/</a>.
requirements.list.proSecurity.windows.supportLifecycle.content3=Para garantir que os clientes com versões mais antigas do Windows tenham tempo adequado para atualizar para as versões mais atuais, a HP continuará a oferecer suporte à quarta versão mais atual (atualmente Windows 10 v1903) por pelo menos 90 dias após o suporte para a versão do canal semestral mais recente estar disponível no Wolf Pro Security. Após este período, o suporte para a versão mais antiga do sistema operacional terminará. A mesma política de suporte se aplica às versões do Canal de serviço de longo prazo do Windows 10. Portanto, esses sistemas também precisarão ser atualizados de acordo com a política listada acima.
requirements.list.proSecurity.windows.supportLifecycle.content4=O suporte do Sure Click Pro para Windows 10 v2004 foi lançado em 31 de julho de 2020. O suporte para Windows 10 v1809 será retirado a partir de 31 de outubro de 2020.
requirements.list.proSecurity.windows.supportLifecycle.content5=O Windows 7 e o 8.1 não são compatíveis com o HP Proactive Security
requirements.list.proSecurity.windows.supportLifecycle.content6=O suporte do Sure Click Pro para Windows 10 v20H2 foi lançado em 18 de novembro de 2020. O suporte para Windows 10 v1903 terminou em 16 de fevereiro de 2021.
requirements.list.proSecurity.windows.supportLifecycle.content7=A HP lançou o suporte da contenção de ameaças Sure Click Pro para Windows 10 v21H1 em 5 de junho de 2021. O suporte ao Windows 10 v1909 será encerrado em 3 de outubro de 2021.
