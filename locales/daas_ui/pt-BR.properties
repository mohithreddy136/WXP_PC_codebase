exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.moreInfo=Mais informações:
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.moreInfoLink=https://support.microsoft.com/en-us/windows/wi-fi-network-not-secure-in-windows-9170b675-921b-3aa5-7e43-fcb2059d159c
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option1=Opção 1: Se você estiver se conectando à sua rede Wi-Fi doméstica, considere alterar o tipo de segurança que o seu roteador ou ponto de acesso usa.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option1.step1=Faça login no seu roteador usando o software dele.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option1.step2=Altere o tipo de segurança da sua rede Wi-Fi doméstica.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option2=Opção 2: Se você tiver um roteador ou ponto de acesso mais velho, considere um roteador novo que suporte os mais recentes padrões e aperfeiçoamentos de segurança.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.recommendations=Recomendações:
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.title=A conexão Wi-Fi não é segura
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.cause1=O layout da sua casa pode causar problemas de Wi-Fi.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.cause2=O ponto de acesso pode estar atrás de paredes e obstáculos.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.description=A intensidade do sinal do Wi-Fi foi relatada como lenta nas últimas 24 horas.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.moreInfo=Mais informações:
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.moreInfoLink=https://support.microsoft.com/en-us/windows/wi-fi-problems-and-your-home-layout-e1ed42e7-a3c5-d1be-2abb-e8fad00ad32a#WindowsVersion=Windows_11
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.possibleCauses=Possíveis causas para o comportamento da rede doméstica:
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1=Opção 1: Reiniciar o roteador
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step1=Tire o modem e o roteador da tomada.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step2=Espere 15 segundos, pelo menos.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step3=Coloque o modem na tomada, aguarde de 1 a 2 minutos e ligue o roteador.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step4=Espere que todas as luzes do seu cable modem fiquem verdes antes de testar a conexão de internet.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2=Opção 2: Mova seu ponto de acesso.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step1=Mova seu ponto de acesso, se possível, para reduzir o número de pareces ou obstáculos outros que fiquem entre o ponto de acesso e o PC.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step2=Mova o PC para mais perto do ponto de acesso, se possível.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step3=Mova o ponto de acesso mais para o centro da sua casa ou cômodo e mais alto, se possível. Colocá-lo em um canto ou sob uma mesa pode reduzir a intensidade do sinal Wi-Fi.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendations=Recomendações:
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.title=O sinal de Wi-Fi está fraco
exp.mgmt.troubleshoot.network.wifispeedisslow.cause1=O ponto de acesso pode estar atrás de paredes e obstáculos.
exp.mgmt.troubleshoot.network.wifispeedisslow.cause2=O roteador do firmware pode estar desatualizado.
exp.mgmt.troubleshoot.network.wifispeedisslow.description=A velocidade nominal do Wi-Fi foi relatada como lenta nas últimas 24 horas.
exp.mgmt.troubleshoot.network.wifispeedisslow.possibleCauses=Possíveis causas para o comportamento da rede doméstica:
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation1=Reinicie o modem e o roteador
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation1.step1=Primeiro, desligue seu modem, depois, seu roteador.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation2=Mova seu roteador
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation2.step1=Tente mover seu roteador para um local diferente, na sua casa ou escritório, ou aponte as antenas para uma direção diferente.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation3=Atualize o firmware do seu roteador
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation3.step1=Atualizar regularmente o firmware do seu roteador pode ajudar a corrigir bugs e problemas de conectividade. Mesmo que alguns roteadores tenham atualizações automáticas, a maioria exige atualizações manuais.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation4=Altere a frequência do seu roteador
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation4.step1=Os roteadores Wi-Fi selecionam automaticamente uma banda de frequência, mas você pode experimentar alterá-la de 2,4 GHz para 5 GHz, para ver se isso melhora as velocidades. Entretanto, você deve verificar se o seu roteador suporta 5 GHz antes de fazer isso.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation5=Atualize seus drivers de Wi-Fi
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation5.step1=Drivers desatualizados ou corrompidos podem causar problemas de rede. Assegure-se de manter seu adaptador de Wi-Fi atualizado.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation6=Evite interferências
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation6.step1=A interferência no canal pode reduzir significativamente o rendimento e deixar a transferência de dados mais lenta, então, tente eliminar qualquer interferência que possa estar acontecendo.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation7=Verifique outros dispositivos
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation7.step1=Veja quais outros dispositivos estão conectados à sua rede e o que eles estão fazendo. Por exemplo, se outro dispositivo estiver baixando muitos dados, poderá afetar as velocidades.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendations=Recomendações:
exp.mgmt.troubleshoot.network.wifispeedisslow.title=O Wi-Fi está lento
