wex.fleet.mgmt.remediation.kernel_panic_error.desc=Ocorreu um kernel panic, indicando um erro crítico do sistema, um erro do qual o kernel Linux não pode se recuperar. Isso pode ser causado por falhas de hardware, drivers corrompidos, parâmetros de kernel mal configurados ou módulos de kernel incompatíveis. É necessária uma investigação imediata para identificar a causa raiz.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt1=Consulte os logs do sistema (/var/log/messages, /var/log/syslog ou journalctl) para ver as mensagens de erro antes do kernel panic.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt2=Verifique a integridade do hardware, especialmente a integridade da memória (RAM) e do disco, usando ferramentas como memtest86 e smartctl.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt3=Verifique as alterações recentes no sistema (por exemplo, atualizações do kernel, instalações de driver ou mudanças na configuração).
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt4=Faça login em um modo de resgate ou recuperação para acessar o sistema, se não for possível inicializá-lo.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt5=Reverta ou atualize os módulos ou drivers do kernel se houver a suspeita de que eles são incompatíveis.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt6=Fale com o suporte do fornecedor ou da comunidade, se o problema persistir ou for específico do hardware.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.desc=Ativar a criptografia de disco protege os dados confidenciais em repouso, garantindo que todas as informações armazenadas no disco fiquem ilegíveis sem a autenticação adequada. Essa é uma medida de segurança crítica para sistemas lidando com dados confidenciais ou regulamentados.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step1=Implemente a criptografia em todo o disco, usando ferramentas como o LUKS (Linux Unified Key Setup) ou o dm-crypt, dependendo da sua distribuição Linux.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step2=Criptografe partições confidenciais (por exemplo, /home, /var ou /data) se não for possível criptografar o disco todo.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step3=Configure o gerenciamento seguro de chave, incluindo senhas ou integração com o TPM (Trusted Platform Module), se disponível.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step4=Faça um backup seguro das chaves de criptografia para evitar perdas de dados no caso de perda da chave.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step5=Teste as configurações de criptografia para garantir que o sistema inicialize corretamente e que os dados possam ser acessados após a autenticação.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step6=Documente os procedimentos de configuração e recuperação da criptografia para conformidade e continuidade operacional.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step1=Instale e configure um ferramenta de firewall, como o firewalld, ufw ou iptables, dependendo da sua distribuição Linux.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step2=Ative o serviço de firewall para se executar na inicialização
wex.fleet.mgmt.remediation.linux_firewall_disabled.step3=Defina as regras de firewall para permitir somente os serviços necessários (por exemplo, SSH, HTTP/HTTPS) e bloquear todos os outros.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step4=Verifique o status e as regras do firewall usando: sudo firewall-cmd --list-all (para firewalld), sudo ufw status (para ufw)
wex.fleet.mgmt.remediation.linux_firewall_disabled.step5=Faça audições regulares nas configurações do firewall, para garantir que elas estejam alinhadas às políticas de segurança e necessidades operacionais.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.desc=Ativar a Inicialização segura ajuda a proteger o sistema contra códigos prejudiciais ou não autorizados durante o processo de inicialização, verificando as assinaturas digitais dos bootloaders, módulos do kernel e drivers. Isso melhora a integridade e a segurança do sistema, especialmente em ambientes empresariais ou conduzidos por conformidade.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step1=Verifique o suporte do firmware UEFI para Inicialização segura e assegure-se de que ela esteja ativada nas configurações do UEFI.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step2=Instale e configure bootloaders assinados e pacotes de kernel compatíveis com a Inicialização segura (por exemplo, usando shim e GRUB assinado).
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step3=Verifique se o kernel, os módulos e todos os componentes necessários estão assinados.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step4=Reinicialize e confirme o status da Inicialização segura usando o mokutil.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step5=Inscreva as chaves personalizadas, se você estiver usando componentes não padrão.
wex.fleet.mgmt.remediation.missing_linux_security_updates.desc=Uma ou mais atualizações críticas estão faltando no sistema. Essas atualizações lidam com vulnerabilidades conhecidas no sistema operacional, kernel e pacotes instalados. Não aplicar essas atualizações pode expor o sistema a acessos não autorizados, vazamentos de dados ou interrupções no serviço.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step1=Revise e identifique correções de segurança faltando usando o gerenciado de pacotes do sistema (por exemplo, apt, yum, dnf, zypper).
wex.fleet.mgmt.remediation.missing_linux_security_updates.step2=Aplique todas as atualizações de segurança críticas imediatamente, para mitigar ameaças e vulnerabilidades conhecidas.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step3=Reinicie o sistema, se necessário, especialmente após atualizações dos serviços de kernel ou núcleo.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step4=Ative as atualizações automáticas de segurança ou configure uma horário de correção regular para garantir a proteção oportuna.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step5=Verifique se a atualização foi bem-sucedida, verificando os registros e confirmando as versões dos pacotes.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step6=Execute uma verificação de vulnerabilidade após a atualização para garantir que não reste nenhum risco.
wex.fleet.mgmt.remediation.missing_linux_updates.desc=Uma ou mais atualizações críticas do Linux estão faltando no sistema. Essas atualizações podem incluir correções de segurança, correções de kernel e melhorias na estabilidade. Usar um sistema desatualizado aumenta o risco de vulnerabilidades, travamentos do sistema e problemas de compatibilidade.
wex.fleet.mgmt.remediation.missing_linux_updates.step1=Veja se há atualizações disponíveis usando seu gerenciador de pacotes (por exemplo, yum, dnf, apt ou zypper) para identificar as correções críticas faltando.
wex.fleet.mgmt.remediation.missing_linux_updates.step2=Aplique todas as atualizações de segurança e kernel assim que possível, para mitigar vulnerabilidades conhecidas.
wex.fleet.mgmt.remediation.missing_linux_updates.step3=Reinicie o sistema, se necessário, especialmente após atualizações de kernel ou núcleo.
wex.fleet.mgmt.remediation.missing_linux_updates.step4=Ative as atualizações automáticas ou configure horários para correções regulares, para garantir a aplicação oportunidade de atualizações futuras.
wex.fleet.mgmt.remediation.missing_linux_updates.step5=Verifique o sucesso da atualização, verificando os registros do sistema e confirmando as verões atuais do kernel e do pacote.
wex.fleet.mgmt.remediation.network_connection_not_secure.desc=Foi relatado que a conexão de rede estava sem a segurança esperada nas últimas 24 horas.
wex.fleet.mgmt.remediation.network_connection_not_secure.desc1=Conexão não autenticada detectada nos últimos 7 dias.
wex.fleet.mgmt.remediation.network_disconnections.desc=Os dispositivos reportaram repetidas desconexões de rede nas últimas 24 horas.
wex.fleet.mgmt.remediation.network_disconnections.desc1=Foram detectadas desconexões de rede nos últimos 7 dias.
wex.fleet.mgmt.remediation.network_speed_slow.desc=A velocidade nominal da rede relatada estava lenta nas últimas 24 horas.
wex.fleet.mgmt.remediation.wifi_signal_strength_weak.desc=A intensidade do sinal do Wi-Fi foi relatada como lenta nas últimas 24 horas.
