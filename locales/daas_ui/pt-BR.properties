bios.bsod.tooltip.context=Esse impacto do BIOS é determinado pelo peso, em que ocorrências de BSOD mais próximas ao upgrade nos outros dispositivos do mesmo modelo têm peso mais alto. Adicionalmente, modelos de dispositivos específicos com um peso acima de X% são classificados como “alto impacto”. O impacto é calculado por cada modelo de dispositivo e aplica-se a todos os dispositivos recomendados para aquela versão do BIOS específica, se as ocorrências de BSOD forem menores para o modelo, o peso será menor e daí o impacto.
