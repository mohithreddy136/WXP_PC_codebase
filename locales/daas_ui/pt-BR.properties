wpt.details.desc=De forma confiável, proteja dados, rastreie sua frota de dispositivos HP e impeça que usuários não autorizados acessem seus arquivos e documentos em sua rede com o HP {appName}, o serviço de localização, bloqueio e exclusão mais seguro do mundo. Equipado com a HP Workforce Experience Platform, o HP {appName} oferece um serviço completo aplicado por hardware para localizar, bloquear e apagar dispositivos, mesmo quando os PCs estiverem offline ou desligados.
wpt.details.header=Estabeleça sua primeira linha de defesa
wpt.disclaimer.point1=Com base na análise interna da HP dos serviços de software de busca, bloqueio e exclusão. Mais seguro com base em criptografia e persistência (incluindo persistência reforçada por hardware) a partir de outubro de 2021.
wpt.disclaimer.point2=O HP {appName} está disponível em alguns notebooks Elite Dragonfly HP 600, 800 e 1000 baseados em Windows, alguns desktops 800 e estações de trabalho Z1 G8, e funcionará quando o dispositivo estiver ligado e conectado à internet.
wpt.disclaimer.point3=A HP Workforce Experience Platform é uma plataforma de telemetria e análise que fornece dados críticos sobre dispositivos e aplicativos e não é vendida como um serviço independente. A HP Workforce Experience Platform segue rigorosos regulamentos de privacidade GDPR e é certificada pela ISO27001, ISO27701, ISO27017 e SOC2 Type2 quanto à segurança da informação. É necessário ter acesso à Internet com conexão ao portal da Workforce Experience Platform. Para ver todos os requisitos do sistema, por favor, acesse <a href=\"{link}\" target=\"_blank\" style=\"text-decoration: none; color: #027aae; cursor: pointer;\">{text}</a>.
wpt.disclaimer.point4=O reforço por hardware refere-se ao HP Sure Run Gen4 e superior, que está disponível em computadores HP compatíveis com este serviço e requer o Windows 10 e superior.
wpt.disclaimer.point5=Os níveis dos serviços e os tempos de resposta dos suportes a hardware HP podem variar de acordo com sua localização geográfica. O serviço tem início na data da compra do hardware. Restrições e limitações se aplicam. Para detalhes, visite <a href="https://www.hp.com/go/cpc" target="_blank" style="text-decoration: none; color: #027aae; cursor: pointer;">www.hp.com/go/cpc</a>. Os Serviços da HP são regidos pelos termos e condições de serviço HP aplicáveis fornecidos ou indicados ao cliente no momento da compra. Os clientes podem ter direitos legais adicionais conforme as leis locais aplicáveis, e esses direitos não são afetados de maneira alguma pelos termos e condições de serviço HP ou pela garantia limitada HP que acompanha seu produto HP.
wpt.explore.header=Explorar solução
