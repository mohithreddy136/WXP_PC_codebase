exp.AntivirusSignatureUpdatesNeeded.description=O dispositivo está configurado para usar um antivírus de terceiros, que não seja da Microsoft, para ajudar a proteger o dispositivo contra vírus, malware e outras ameaças, mas são necessárias atualizações da assinatura do antivírus no dispositivo.
exp.AntivirusSignatureUpdatesNeeded.deviceRemediation=Remediação do dispositivo:
exp.AntivirusSignatureUpdatesNeeded.option1=Opção 1: Para soluções antivírus que não sejam da Microsoft gerenciadas centralmente, o administrador do pacote antivírus da organização deve definir a política de atualização para, pelo menos, uma vez por semana (recomendado).
exp.AntivirusSignatureUpdatesNeeded.option2=Opção 2: Para soluções antivírus gerenciadas pelo usuário, é necessário abrir o console de administração do antivírus e seguir o procedimento para agendar ou acionar uma atualização de assinatura. Recomenda-se que a solução antivírus seja configurada para baixar atualizações pelo menos uma vez por semana.
