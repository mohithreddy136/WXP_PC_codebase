exp.FrequentWindowsBsodsHaveOccurred.relatedArticlesText=Solução de problemas de erro de parada, verificação de bugs ou erro de tela azul – Cliente Windows | Microsoft Learn
exp.FrequentWindowsBsodsHaveOccurred.suggestedRemediations=Remediação do dispositivo:
exp.FrequentWindowsBsodsHaveOccurred.title=BSODs do Windows ocorreram frequentemente.
exp.GpuHealthIssue.blueScreenLink=https://docs.microsoft.com/en-us/windows-hardware/drivers/debugger/-analyze
exp.GpuHealthIssue.blueScreenLinkText=https://docs.microsoft.com/en-us/windows-hardware/drivers/debugger/-analyze
exp.GpuHealthIssue.causeBlueScreenErrors=Erros de tela azul: Os erros de tela azul podem se dever a um número alto de programas usando muito os gráficos ou efeitos visuais funcionando simultaneamente ou a problemas de hardware e driver.
exp.GpuHealthIssue.causeDoubleBitEcc=Erros de memória ECC de bit duplo: A placa de vídeo está com erros de memória ECC de bit duplo, o que poderia indicar problemas de hardware ou falhas na memória.
exp.GpuHealthIssue.causeHighDoubleBitEccOverTime=Um alto número de erros de memória ECC de bit duplo em um determinado período: A placa de vídeo está apresentando um grande número de erros de memória ECC de bit duplo, e o número médio de erros está aumentando há, pelo menos, três semanas.
exp.GpuHealthIssue.causeHighTdrEvents=Alto número de eventos de TDR (display driver timeout and recovery, tempo limite e recuperação de driver do monitor): A placa de vídeo teve um alto número de eventos TDR, indicando possíveis problemas de driver ou hardware.
exp.GpuHealthIssue.causeMissingDriverUpdate=Atualização crítica de driver faltando: A placa de vídeo está sem uma atualização crítica de driver, o que pode afetar o desempenho e a estabilidade.
exp.GpuHealthIssue.causeThermalIssues=Problemas térmicos: A placa de vídeo está com um número alto de problemas térmicos, e a temperatura da GPU ou da memória está acima da temperatura de operação máxima.
exp.GpuHealthIssue.driverOption1=Opção 1: Usar o HP Image Assistant para atualizar os drivers
exp.GpuHealthIssue.driverOption2=Opção 2: Usar o Windows Update para atualizar os drivers
exp.GpuHealthIssue.possibleCauses=Causas possíveis:
exp.GpuHealthIssue.remediationBlueScreenPrefix=Para erros de tela azul: Verifique se muitos programas com uso intenso de gráficos ou efeitos visuais estão sendo executados ao mesmo tempo. Atualize o driver da placa de vídeo, redefina as configurações com overclock aos padrões, execute uma instalação limpa do driver ou redefina as configurações aos padrões de fábrica, assegure-se de que a fonte de alimentação seja adequada e limpe as entradas de ventilação e a ventoinha. Analise o miniarquivo de despejo para ver instruções específicas de remediação:
exp.GpuHealthIssue.remediationDoubleBitEcc=Para erros de memória ECC de bit duplo: Continue a monitorar a situação e verifique se o desempenho continua a piorar. Se o número de erros permanecer alto, talvez seja necessário trocar a placa de vídeo.
exp.GpuHealthIssue.remediationMissingDriver=Para atualizar o driver faltando: Atualize o driver da placa de vídeo para a versão mais recente, para lidar com problemas de desempenho.
exp.GpuHealthIssue.remediationTdr=Para eventos TDR: Continue monitorando e atualize o driver da placa de vídeo se o problema persistir. Redefina as configurações gráficas ao padrão, redefina as configurações com overclock aos padrões, atualize o BIOS, se houver uma atualização para ele, e verifique se há fonte de alimentação suficiente e fluxo de ar adequado. Limpe as entradas de ventilação e a ventoinha.
exp.GpuHealthIssue.remediationThermal=Para problemas térmicos: Verifique se há restrições ao fluxo de ar, limpe as entradas de ventilação e assegure-se de que a ventoinha esteja limpa e funcionando adequadamente.
exp.GpuHealthIssue.suggestedRemediations=Remediações sugeridas:
exp.GpuHealthIssue.title=Cuidar da integridade da GPU
exp.HpBatteryHealthManagerNotEnabled.causeNotCompatible=O dispositivo não é compatível com o Gerenciador de Integridade da Bateria HP.
exp.HpBatteryHealthManagerNotEnabled.causeRequiresBiosUpdate=O dispositivo requer uma atualização de BIOS.
exp.HpBatteryHealthManagerNotEnabled.description=O Gerenciador de Integridade da Bateria HP está disponível em todos os notebooks de negócios HP desde 2016. Para melhorar a duração da bateria, é recomendável ativar o Gerenciador de Integridade da Bateria.
exp.HpBatteryHealthManagerNotEnabled.option1Detail=A HP recomenda que habilitar o Gerenciador de Integridade da Bateria HP para 'Permitir que a HP gerencie o carregamento da minha bateria' ou 'Maximizar a integridade da minha bateria' dependendo do uso ou idade do dispositivo.
exp.HpBatteryHealthManagerNotEnabled.option1Title=Opção 1: Atualizar o BIOS para a versão mais recente
exp.HpBatteryHealthManagerNotEnabled.possibleCauses=Causas possíveis:
exp.HpBatteryHealthManagerNotEnabled.reference1Link=https://support.hp.com/us-en/document/ish_4449597-3519507-16
exp.HpBatteryHealthManagerNotEnabled.reference1Text=Gerenciador de Integridade da Bateria HP – Suporte
exp.HpBatteryHealthManagerNotEnabled.references=Referências:
exp.HpBatteryHealthManagerNotEnabled.settingLetDetail1=Altera dinamicamente como o sistema carrega a bateria com base nas condições de uso e na temperatura com o passar do tempo.
exp.HpBatteryHealthManagerNotEnabled.settingLetTitle=Permitir que a HP gerencie o carregamento da minha bateria
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases1=Ambientes de uso misto em que o notebook é regularmente tirado da tomada e a bateria começa a ser usada, descarregando-se.
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases2=Prefira um processo único para a sua organização.
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases3=O notebook tem menos de um ano.
exp.HpBatteryHealthManagerNotEnabled.settingMaxDetail1=Limita o estado da carga máximo a 80%, para otimizar a integridade da bateria e mitigar o inchaço.
exp.HpBatteryHealthManagerNotEnabled.settingMaxTitle=Maximizar a integridade da minha bateria
exp.HpBatteryHealthManagerNotEnabled.settingMaxUseCases1=Ambientes em que notebooks estão continuamente conectados à alimentação de CA.
exp.HpBatteryHealthManagerNotEnabled.settingMaxUseCases2=Notebooks com um ano ou mais.
exp.HpBatteryHealthManagerNotEnabled.suggestedRemediations=Remediações sugeridas:
exp.HpBatteryHealthManagerNotEnabled.title=O Gerenciador de Integridade da Bateria HP não foi ativado
