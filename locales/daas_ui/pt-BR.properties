exp.CollaborationSoftwareErrorsAreHigh.causeConflicts=Conflitos entre diferentes aplicativos ou extensões, como as de navegador ou complementos, podem interferir com o funcionamento adequado das ferramentas de colaboração e resultar em vários erros.
exp.CollaborationSoftwareErrorsAreHigh.causeNetwork=Problemas de conectividade da rede, como conexões de internet lentas ou instáveis, podem causar interrupções e erros em ferramentas de colaboração que dependem de comunicações e transferência de dados em tempo real.
exp.CollaborationSoftwareErrorsAreHigh.causeUpdates=Patches ou atualizações de software frequentes podem trazer novos bugs ou problemas de compatibilidade, levando a um maior número de erros em aplicativos como Teams, Outlook, Zoom, Webex, Chrome e Office.
exp.CollaborationSoftwareErrorsAreHigh.possibleCauses=Causas possíveis:
exp.CollaborationSoftwareErrorsAreHigh.remediationConflicts=Resolva conflitos desativando ou removendo extensões ou complementos problemáticos e garantindo a compatibilidade entre diferentes aplicativos.
exp.CollaborationSoftwareErrorsAreHigh.remediationNetwork=Melhore a estabilidade da rede atualizando as conexões de internet, solucionando problemas de conectividade e garantindo uma largura de banda adequada para as ferramentas de colaboração.
exp.CollaborationSoftwareErrorsAreHigh.remediationUpdates=Verifique regularmente se há patches e atualizações de software e aplique-os para garantir que eles resolvam bugs e problemas de compatibilidade conhecidos.
exp.CollaborationSoftwareErrorsAreHigh.suggestedRemediations=Remediações sugeridas:
exp.CollaborationSoftwareErrorsAreHigh.title=Resolver erros do software de colaboração
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.appsCausingHighCpu=Os aplicativos que consumirem mais CPU serão identificados na coluna Aplicativos causando uso alto da CPU.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeBackgroundProcesses=Vários processos e serviços em segundo plano, incluindo atualizações do sistema, antivírus e outras tarefas de manutenção, podem usar mais capacidade da CPU e levar ao Alto uso.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeFirmwareBug=Um bug no firmware pode fazer com que a CPU funcione a níveis maiores do que os esperados.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeMalfunctioningSoftware=Software defeituoso ou mal feito pode levar a uso excessivo da CPU, especialmente se ele ficar preso em um loop ou consumir recursos ineficientemente.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeResourceIntensiveApps=Executar aplicativos que consomem muitos recursos, como editores de vídeo, máquinas virtuais ou cálculos complexos, pode consumir uma quantidade significativa de recursos da CPU, levando ao Alto uso.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.closeHighCpuApps=Feche os aplicativos que estejam usando mais a CPU.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.connectAcAdapter=Conecte um adaptador de CA, pois a CPU pode ter um desempenho menor quando se usa a bateria, dependendo das configurações de alimentação do dispositivo.
