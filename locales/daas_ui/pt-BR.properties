exp.ExcessiveOsShutdownTime.possibleCauses=Causas possíveis:
exp.ExcessiveOsShutdownTime.removeStartupApps=Remova, da inicialização automática, aplicativos desnecessários ou que não sejam críticos de negócios.
exp.ExcessiveOsShutdownTime.suggestedRemediations=Remediações sugeridas:
exp.ExcessiveOsShutdownTime.title=Melhorar o tempo de desligamento do SO
exp.ExcessiveOsStartupTime.causeAntivirus=Os serviços antivírus e outros aplicativos que fazem uso intenso do disco estão demorando muito tempo para se carregarem.
exp.ExcessiveOsStartupTime.causeGroupPolicyDownload=O download de objetos de política de grupo, durante a reinicialização do sistema, demora muito para terminar.
exp.ExcessiveOsStartupTime.causeSlowDomainLink=O PC pode ter um link lento para a controladora de domínio da qual os GPOs são baixados durante a inicialização.
exp.ExcessiveOsStartupTime.causeStartupScripts=Os scripts de atualização levam bastante tempo para serem concluídos.
exp.ExcessiveOsStartupTime.option1=Opção 1: Windows 11 - Aplicativos de inicialização nas configurações
exp.ExcessiveOsStartupTime.option1Guide=Para melhorar o desempenho do dispositivo e para resolver a lentidão do login, remover aplicativos da inicialização quando você faz login é o que tem mais impacto. Para dispositivos com Windows 11, a Microsoft oferece um guia para controlar a inicialização do Windows.
exp.ExcessiveOsStartupTime.option1GuideLink=https://www.microsoft.com/en-us/windows/learning-center/take-control-of-windows-startup
exp.ExcessiveOsStartupTime.option1GuideLinkText=https://www.microsoft.com/en-us/windows/learning-center/take-control-of-windows-startup
exp.ExcessiveOsStartupTime.option1StepApps=No lado esquerdo da janela, selecione Aplicativos.
exp.ExcessiveOsStartupTime.option1Steps=by changing the Windows startup programs using the following steps:
exp.ExcessiveOsStartupTime.option1StepSettings=Selecione Configurações.
exp.ExcessiveOsStartupTime.option1StepStart=Selecione o botão Iniciar, que se parece com o logotipo da Microsoft.
exp.ExcessiveOsStartupTime.option1StepStartup=Selecione Inicialização, na parte de baixo da janela Aplicativos.
exp.ExcessiveOsStartupTime.option1StepToggles=Use os controles para determinar quais aplicativos você quer que sejam executados na inicialização. Coloque o controle na posição Ligado, se você quiser que o aplicativo seja executado na inicialização, ou na Desligado, se você não quiser.
exp.ExcessiveOsStartupTime.option2=Opção 2: Windows 11 - Aplicativos de inicialização no Gerenciador de Tarefas
exp.ExcessiveOsStartupTime.option2Guide=Os Aplicativos de inicialização também podem ser ativados e desativados no Gerenciador de Tarefas do Windows, seguindo-se estas instruções:
exp.ExcessiveOsStartupTime.option2StepDisable=Clique com o botão direito no aplicativo e selecione Desativar (se a coluna Status mostrar Ativo).
exp.ExcessiveOsStartupTime.option2StepStart=Selecione o botão Iniciar, que se parece com o logotipo da Microsoft.
exp.ExcessiveOsStartupTime.option2StepStartupApps=Selecione "Aplicativos de inicialização", na navegação à esquerda.
exp.ExcessiveOsStartupTime.option2StepTaskManager=Digite "Gerenciador de Tarefas" e pressione Enter para abrir o Gerenciador de Tarefas do Windows.
exp.ExcessiveOsStartupTime.option3=Opção 3: Desinstalar aplicativos
exp.ExcessiveOsStartupTime.option3Guide=Os aplicativos que não são abertos automaticamente na inicialização também podem contribuir para um maior tempo de login, pois eles podem conter arquivos, serviços e entradas de registro que podem ser parcialmente carregadas. Os aplicativos da bandeja do sistema são exemplos de aplicativos que estão em execução mesmo que não haja uma janela aberta com o aplicativo em execução. Para revisar e remover os aplicativos desnecessários, siga estas instruções. Observação: Alguns aplicativos podem exigir direitos administrativos para serem removidos.
exp.ExcessiveOsStartupTime.option3StepControlPanel=Digite "Controle" e pressione Enter para abrir o Painel de Controle.
exp.ExcessiveOsStartupTime.option3StepPrograms=Abra Programas e Recursos.
exp.ExcessiveOsStartupTime.option3StepStart=Selecione o botão Iniciar, que se parece com o logotipo da Microsoft.
exp.ExcessiveOsStartupTime.option3StepUninstall=Selecione um aplicativo para remover e selecione Desinstalar.
exp.ExcessiveOsStartupTime.option4=Opção 4: Use o PowerShell e o módulo ActiveDirectory para executar Get-GpResultantSetofPolicy, para analisar políticas e ver quanto tempo elas levam para se aplicarem às máquinas afetadas, para identificar possíveis melhorias.
