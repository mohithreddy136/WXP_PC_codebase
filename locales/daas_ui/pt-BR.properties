wex.fleet.mgmt.recommended.desc.antivirus_not_enabled=Ativar o Microsoft Defender oferece proteção essencial contra malware e outras ameaças à segurança.
wex.fleet.mgmt.recommended.desc.antivirus_not_enabled_other=Ativar o software antivírus protege os dispositivos contra malware e garante a segurança do sistema contra ataques.
wex.fleet.mgmt.recommended.desc.antivirus_signature_outdated=Atualizar regularmente as assinaturas de malware garante que o Windows Defender possa detectar e proteger contra as ameaças mais recentes.
wex.fleet.mgmt.recommended.desc.antivirus_signature_outdated_other=Manter as assinaturas do malware atualizadas garante uma proteção abrangente contra as mais recentes ameaças.
wex.fleet.mgmt.recommended.desc.avg_fan_speed_high=Lidar com as velocidades altas da ventoinha ajuda a evitar superaquecimento e danos em potencial aos componentes internos do dispositivo.
wex.fleet.mgmt.recommended.desc.battery_calibrate=Calibrar a bateria melhora a precisão da leitura de alimentação e aperfeiçoa a duração e o desempenho da bateria.
wex.fleet.mgmt.recommended.desc.battery_early_detection_wear=Resolver o desgaste da bateria garante a operação eficiente do dispositivo, o desempenho consistente e a duração mais longa da bateria.
wex.fleet.mgmt.recommended.desc.battery_needs_attention=Replacement of defective batteries can ensure good device performance, and system health. Devices which are covered by warranty may be eligible for battery replacement.
wex.fleet.mgmt.recommended.desc.bitlocker_encryption_not_enabled=Ativar o BitLocker protege os dados confidenciais criptografando sua unidade e melhorando a segurança em geral contra acesso não autorizado.
wex.fleet.mgmt.recommended.desc.bsod_occured=Resolver erros de tela azul garante a estabilidade do sistema, evita desligamentos inesperados e mantém a confiabilidade.
wex.fleet.mgmt.recommended.desc.cpu_utilization_high=Analisar a utilização alta da CPU ajuda a evitar gargalos no desempenho e mantém o sistema funcionando suavemente.
wex.fleet.mgmt.recommended.desc.disk_needs_attention=Disk performance is degrading and may soon lead to slower performance or instability if not addressed.
wex.fleet.mgmt.recommended.desc.disk_utilization_high=Liberar espaço no disco rígido evita lentidão e garante a operação suave evitando a sobrecarga no armazenamento.
wex.fleet.mgmt.recommended.desc.docking_station_ac_adapter_failed=Corrigir as falhas no adaptador garante um fornecimento de alimentação consistente para as estações de acoplamento, evitando problemas de conectividade.
wex.fleet.mgmt.recommended.desc.docking_station_ac_adapter_running_at_reduced_perofmance=Melhorar o desempenho do adaptador garante conexões confiáveis e o funcionamento ideal das estações de acoplamento.
wex.fleet.mgmt.recommended.desc.docking_station_firmware_out_of_date=As atualizações do firmware da estação de acoplamento garantem a compatibilidade do dispositivo e melhoram o desempenho do sistema em geral.
wex.fleet.mgmt.recommended.desc.excessive_os_login_time=Reduzir os tempos de login reduz os atrasos e melhora a eficiência do usuário no acesso ao sistema.
wex.fleet.mgmt.recommended.desc.excessive_os_shutdown_time=Otimizar os tempos de desligamento minimiza os períodos de espera e garante desligamentos do sistema eficientes.
wex.fleet.mgmt.recommended.desc.excessive_os_startup_time=A inicialização mais rápida acelera o acesso ao sistema e melhora a eficiência e a produtividade do usuário.
wex.fleet.mgmt.recommended.desc.firewall_disabled=Ativar o Firewall do Windows ajuda a bloquear acessos não autorizados e protege sua rede contra ameaças em potencial.
wex.fleet.mgmt.recommended.desc.firewall_signature_outdated=Atualizar regularmente as assinaturas do firewall protege contra as novas e evoluídas ameaças à rede.
wex.fleet.mgmt.recommended.desc.frequent_bsod_occured=Resolver erros de tela azul garante a estabilidade do sistema, evita desligamentos inesperados e mantém a confiabilidade.
wex.fleet.mgmt.recommended.desc.frequent_kernel_panic_error=Resolver erros de pânico de kernel melhora a estabilidade do sistema, aumenta a segurança e evita a perda de dados.
wex.fleet.mgmt.recommended.desc.frequent_network_disconnection=Não sofrer desconexões de rede aumenta a confiabilidade, melhora a experiência do usuário e garante o acesso ininterrupto a serviços e aplicativos.
wex.fleet.mgmt.recommended.desc.gpu_health_issue=Corrigir os problemas da GPU evita problemas de desempenho gráfico e mantém uma operação suave dos aplicativos visuais.
wex.fleet.mgmt.recommended.desc.high_collaboration_sw_errors=Resolver erros do software de colaboração garante a tranquilidade no trabalho em equipe e a produtividade sustentada. Houve mais de 10 erros de software nos últimos sete dias no Teams, Outlook, Zoom, Webex, Chrome, Office.
wex.fleet.mgmt.recommended.desc.high_windows_crash=Resolver os travamentos do SO garante a estabilidade do sistema, o desempenho consistente e a produtividade ininterrupta do usuário.
wex.fleet.mgmt.recommended.desc.kernel_panic_error=Resolver erros de pânico de kernel melhora a estabilidade do sistema, aumenta a segurança e evita a perda de dados.
wex.fleet.mgmt.recommended.desc.last_reboot_more_than_21_days=Reiniciar os dispositivos limpa os arquivos temporários e atualiza os processos do sistema, melhorando o desempenho e a estabilidade em geral.
wex.fleet.mgmt.recommended.desc.linux_disk_encryption_not_enabled=Ativar a criptografia de disco aumenta significativamente a segurança dos dados, protegendo o conteúdo de seus dispositivos de armazenamento.
wex.fleet.mgmt.recommended.desc.linux_firewall_disabled=Ativar o firewall do Linux ajuda a bloquear acessos não autorizados e protege sua rede contra ameaças em potencial.
wex.fleet.mgmt.recommended.desc.linux_secure_boot_not_enabled=Ativar a Inicialização segura garante que apenas softwares confiáveis sejam carregados durante o processo de inicialização, aumentando a segurança do sistema.
wex.fleet.mgmt.recommended.desc.memory_utilization_high=Analisar o alto uso de memória ajuda a identificar e resolver problemas que podem afetar o desempenho e a estabilidade do sistema.
wex.fleet.mgmt.recommended.desc.missing_critical_bios_updates=Aplicar as atualizações do BIOS garante a estabilidade e a compatibilidade do sistema com novos hardware ou software.
wex.fleet.mgmt.recommended.desc.missing_critical_driver_updates=Atualizar drivers evita erros no funcionamento do hardware e garante um sistema seguro, estável e de alto desempenho.
wex.fleet.mgmt.recommended.desc.missing_linux_security_updates=Aplicar atualizações de segurança protege contra malware e explorações, reduz a superfície de ataque e melhora a integridade do sistema.
wex.fleet.mgmt.recommended.desc.missing_linux_updates=Instalar as atualizações mais recentes corrige vulnerabilidades no kernel, nas bibliotecas do sistema e nos aplicativos. Isso protege seu sistema contra explorações, malware e acesso não autorizado.
wex.fleet.mgmt.recommended.desc.missing_windows_security_updates=Aplicar atualizações de segurança protege contra as mais recentes ameaças e vulnerabilidades, mantendo o sistema seguro no caso de ataques.
wex.fleet.mgmt.recommended.desc.missing_windows_updates=Instalar as mais recentes atualizações corrige vulnerabilidades e garante que o seu sistema continue seguro e funcional.
wex.fleet.mgmt.recommended.desc.poor_network_signal_strength=A intensidade alta do sinal garante uma conexão estável e confiável, minimizando as interrupções e quedas durante as atividades on-line.
wex.fleet.mgmt.recommended.desc.poor_nominal_speed=As velocidades altas e confiáveis de internet são cruciais para concluir tarefas, acessar serviços na nuvem e colaborar, sem interrupções, com colegas.
wex.fleet.mgmt.recommended.desc.unauthenticated_connection=Exigindo autenticação, as empresas podem evitar que dispositivos não autorizados se conectem à rede, reduzindo o risco de brechas de segurança em potencial.
wex.fleet.mgmt.recommended.desc.windows_secure_boot_not_enabled=Ativar a Inicialização segura evita modificações não autorizadas no firmware e no sistema operacional, aumentando a segurança do sistema.
