welcome.banner.description=O TechPulse é uma plataforma de telemetria e análise que fornece dados críticos sobre dispositivos e aplicativos, colocando deep learning ao alcance da TI para que eles forneçam aos funcionários o computador, o software e os serviços certos para o sucesso. O HP TechPulse identifica proativamente os problemas, permite soluções em grande escala e minimiza as ameaças, monitorando ativamente a postura de segurança da organização.
welcome.banner.description_p=O {app_name} é uma plataforma de telemetria e análise que fornece dados críticos sobre dispositivos e aplicativos, colocando deep learning ao alcance da TI para que ela forneça aos funcionários o computador, o software e os serviços certos para o sucesso. O {app_name} identifica proativamente os problemas, permite soluções em grande escala e minimiza as ameaças, monitorando ativamente a postura de segurança da organização.
welcome.banner.description_p1={app_name} é uma plataforma de telemetria e análise, baseada em nuvem, que agrega configuração crítica e dados de integridade de seus dispositivos e aplicativos. Usando IA e deep learning, ele analisa esses dados para identificar problemas de maneira proativa, fornecer soluções em escala e minimizar ameaças à segurança.
welcome.banner.title=Plataforma de automação que fornece serviços de classe mundial por meio de insights significativos gerados por bilhões de pontos de dados
welcome.banner.title1={app_name} coloca insights profundos ao seu alcance para prever e resolver problemas do dispositivo antes que eles aconteçam
