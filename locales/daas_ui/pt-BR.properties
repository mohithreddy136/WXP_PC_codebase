exp.NetworkSpeedSlow.recChangeFrequency=Altere a frequência de banda do seu roteador.
exp.NetworkSpeedSlow.recChangeFrequency.detail=Alterne entre 2,4 GHz e 5 GHz (ou 6 GHz, se suportado) para otimizar a velocidade.
exp.NetworkSpeedSlow.recCheckOtherDevices=Verifique o uso dos outros dispositivos.
exp.NetworkSpeedSlow.recCheckOtherDevices.detail=Downloads grandes ou dispositivos fazendo streaming em outro lugar podem reduzir a largura de banda disponível.
exp.NetworkSpeedSlow.recMoveRouter=Mova seu roteador.
exp.NetworkSpeedSlow.recMoveRouter.detail=Reposicione-o para ter uma linha de visão mais clara e menos obstruções.
