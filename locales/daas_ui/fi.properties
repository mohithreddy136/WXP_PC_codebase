wex.ra.remediation.missing_critical_bios_updates=Päivitä BIOS yhteensopivissa laitteissa alustan kautta valitsemalla laitteet alta ja valitsemalla Ota käytäntö käyttöön. Yhteensopimattomien laitteiden kohdalla päivitä järjestelmän ohjaimet ja laiteohjelmisto Windows Updaten tai HP Image Assistant -palvelun kautta.
