side_panal.smart_refresh.personas_header=Persoonat
side_panal.smart_refresh.personas_sub_text=Tekoälypohjaiset laiteryhmät, jotka määräytyvät käytön perusteella
side_panal.smart_refresh.point_1_desc=Arvioi tietokoneiden nykyinen tila laitteiston suorituskyvyn, ohjelmistojen käytettävyyden ja tietoturvan osalta.
side_panal.smart_refresh.point_1_title=1. Arviointi
side_panal.smart_refresh.point_2_desc=Priorisoi ne tietokoneet, jotka tarvitsevat välitöntä huomiota käytön, operatiivisen liiketoiminnallisen merkittävyytensä tai vanhenemistasonsa mukaan.
side_panal.smart_refresh.point_2_title=2. Priorisointi
side_panal.smart_refresh.point_3_desc=Suorita suunnitellut päivitykset tai vaihdot tehokkaasti minimoiden käyttämättömyysaika ja käyttäjille aiheutuvat häiriöt.
side_panal.smart_refresh.point_3_title=3. Käyttöönotto
side_panal.smart_refresh.point_4_desc=Varmista, että päivitetyissä tietokoneissa on käytössä uusimmat tietoturvatoimenpiteet kyberuhilta suojautumiseksi.
side_panal.smart_refresh.point_4_title=4. Tietoturva
side_panal.smart_refresh.point_5_desc=Seuraa päivitettyjä tietokoneita säännöllisesti sen varmistamiseksi, että ne toimivat jatkuvasti optimaalisesti, ja suorita vaadittavat ylläpitotoimet tarpeen mukaan.
side_panal.smart_refresh.point_5_title=5. Seuranta ja ylläpito
side_panal.smart_refresh.software_persona_1=Ei aktiivinen: Käyttäjät, jotka eivät käytä laitettaan toistuvasti
