dnto.subscriptions.privacy_statement.desc1=HP ymmärtää, että tietosuoja on olennaisen tärkeä ihmisoikeus. HP ymmärtää myös, miten tärkeitä yksityisyys, tietoturva ja tietosuoja ovat asiakkaillemme ja yhteistyökumppaneillemme eri puolilla maailmaa. Olemme globaali organisaatio, jonka oikeudelliset yksiköt, liiketoiminnalliset prosessit, hallinnolliset rakenteet ja tekniset järjestelmät toimivat kansainvälisesti. Tästä syystä pyrimme tarjoamaan kaikessa toiminnassamme lainsäädännön vähimmäisvaatimukset ylittäviä suojauskeinoja ja ottamaan käyttöön yhdenmukaisia ja tehokkaita käytäntöjä ja menettelytapoja.
dnto.subscriptions.privacy_statement.desc2=Tässä lausunnossa termit ”me”, ”meitä”, ”meidän” ja ”yritys” viittaavat HP-brändättyihin yrityksiin ja nykyisiin ja tuleviin yhteistyökumppaneihin paikallisen lainsäädännön määritelmän mukaisesti (jäljempänä ”HP”). HP:n tietosuojavastaavan yhteystiedot ovat alla kohdassa ”{0}”.
dnto.subscriptions.privacy_statement.exercise_rights=Oikeuksiesi harjoittaminen ja yhteydenotto
dnto.subscriptions.privacy_statement.heading=HP:n tietosuojakäytäntö
dnto.subscriptions.section.details.desc1=Työntekijät ovat tottuneet ja jopa vaativat joustavuutta työskennellä missä ja milloin haluavat. Kun IT-tiimien kapasiteetti on venytetty maksimiinsa, työntekijöiden käyttökokemus, tuottavuus ja sitoutuminen kärsivät.
dnto.subscriptions.section.details.desc2=HP Workforce Experience Pro ennakoi ja ratkaisee digitaaliset kitkatekijät älykkäästi konsolidoidun ja modulaarisen alustan avulla.
dnto.subscriptions.section.details.desc3=Hallinnoitpa pientä tiimiä yhdessä sijainnissa tai navigoit maailmanlaajuisen hybridityövoiman monimutkaisessa maailmassa, HP Workforce Experience Pro tarjoaa yhtenäistetyn alustan työntekijöiden digitaalisten kokemusten tukemiseksi ja optimoimiseksi.
dnto.subscriptions.section.details.desc4=Tehosta työntekijöiden tuottavuutta ratkaisemalla IT-ongelmia ennakoivasti ennen niiden ilmenemistä. Vähennä IT-tukeen käytettäviä tunteja ja kustannuksia edistyneellä tekoälyllä. Vahvista päätelaitteiden tietoturvaa ennakoimalla ja ratkaisemalla uhkia.
dnto.subscriptions.section.details.desc5=Paranna työntekijöiden tyytyväisyyttä pulse-kyselyiden tuomilla toimikelpoisilla näkemyksillä. Optimoi kustannuksia älykkäillä laitteistojen uusimisilla. Integroi saumattomasti olemassa oleviin monen myyjän ja monen käyttöjärjestelmän ympäristöihin.
dnto.subscriptions.section.details.heading=Tilaustiedot
