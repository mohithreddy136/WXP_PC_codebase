account_management.subscriptions.addon.anyware.desc=Hallinnoi ja määritä etätietokoneita tiimillesi. Loppukäyttäjät voivat käyttää tietokoneita etänä suojatusti ilman VPN:ää. Valvo etälaitekantaasi yhdessä paikassa, kun integroit HP Anywaren WXP:n kanssa
