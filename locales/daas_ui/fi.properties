wpt.details.desc=Suojaa luotettavasti tiedot, seuraa HP-laitekantaasi ja pidä valtuuttamattomat käyttäjät poissa tiedostoistasi ja asiakirjoistasi verkossasi HP {appName} -palvelulla, maailman turvallisimmalla etsimis-, lukitus- ja tyhjennyspalvelulla. HP Workforce Experience Platform -alustalla toimiva HP {appName} tarjoaa täydellisen laitteistopohjaisen palvelun laitteiden paikantamiseen, lukitsemiseen ja tyhjentämiseen, vaikka tietokoneet olisivat poissa verkosta tai sammutettuna.
wpt.details.header=Ota käyttöön ensimmäinen suojakerros
wpt.disclaimer.point1=Perustuu HP:n omiin testeihin, joissa testattiin Etsi, lukitse ja tyhjennä -ohjelmistopalveluita. Tietoturvallisin perustuen salaukseen ja vikasietoisuuteen (sisältäen laitetasolla toteutetun vikasietoisuuden) lokakuun 2021 tietojen perusteella.
wpt.disclaimer.point2=HP {appName} on saatavilla valituissa HP 600-, 800- ja 1000-sarjan Windows-pohjaisissa Elite Dragonfly -kannettavissa, valituissa 800-sarjan pöytäkoneissa ja Z1 G8 -tehotyöasemissa, ja se on käytössä, kun laite on päällä ja yhdistettynä internetiin.
wpt.disclaimer.point3=HP Workforce Experience Platform on mittaus- ja analyysialusta, josta saa kriittisiä tietoja laitteista ja sovelluksista. Sitä ei myydä erillisenä palveluna. HP Workforce Experience Platform noudattaa tiukkoja yleisen tietosuoja-asetuksen (GDPR) määräyksiä ja on ISO27001, ISO27701, ISO27017 ja SOC2 Type2 -sertifioitu tietosuojan osalta. Edellyttää internetyhteyden yhteydellä Workforce Experience Platform -portaaliin. Kaikki järjestelmävaatimukset ovat nähtävillä osoitteessa <a href=\"{link}\" target=\"_blank\" style=\"text-decoration: none; color: #027aae; cursor: pointer;\">{text}</a>.
wpt.disclaimer.point4=”Laitetasolla toteutettu” viittaa HP Sure Runin 4. sukupolveen ja uudempaan, joka on saatavilla yhteensopiviin HP-tietokoneisiin, joissa on tämä palvelu, ja edellyttää Windows 10 -käyttöjärjestelmää tai uudempaa.
wpt.disclaimer.point5=HP:n laitteistotuen palvelutasot ja vasteajat saattavat vaihdella alueittain. Palvelun voimassaolo alkaa laitteiston ostopäivästä. Rajoitukset ovat voimassa. Lisätietoja on osoitteessa <a href="https://www.hp.com/go/cpc" target="_blank" style="text-decoration: none; color: #027aae; cursor: pointer;">www.hp.com/go/cpc</a>. HP:n palveluihin sovelletaan ostohetkellä asiakkaalle toimitettavia tai asiakkaan tietoon annettavia HP:n palveluehtoja. Asiakkaalla voi lisäksi olla muita sovellettavien lakien mukaisia oikeuksia, joihin HP:n palveluehdot tai HP-tuotteeseen kuuluva rajoitettu takuu eivät vaikuta millään tapaa.
wpt.explore.header=Tutustu ratkaisuun
wpt.feature.cost.desc=Tärkeän tietokoneen kadottaminen voi maksaa enemmän kuin vain rahaa. Auta vähentämään riskiä ja vähennä tietokoneen katoamisen aiheuttamia kustannuksia HP {appName} -palvelulla. Nyt sinulla on kattava tapa paikantaa kadonnut tai varastettu tietokone ja lukita se tai poistaa sen tietoja helposti.
wpt.feature.cost.title=Vähennä kustannuksia ja huolia
wpt.feature.data.desc=Hyödynnä turvallisinta palveluamme kynnyssuojauksella etsiäksesi, lukitaksesi ja poistaaksesi tietoja kaikista HP-laitteistasi, jotta arkaluonteiset tietosi pysyvät varmasti suojattuna.
wpt.feature.data.title=Suojele laitteitasi ja tietojasi
wpt.feature.monitoring.desc=HP Workforce Experience Platformin yksinkertaistetun käyttäjien ohjauspaneelin avulla ITDM:t voivat reagoida laitteiden katoamiseen tai varastamiseen nopeammin ja valvoa kaikkien laitteiden kuntoa ja suojauksen tilaa yhdellä käyttäjäystävällisellä alustalla.
