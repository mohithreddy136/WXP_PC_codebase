requirements.list.hp_print_fleetproxy.desc1=Print Fleet Proxy vaatii, että HP Web Jetadmin on asennettuna samalle tietokoneelle. HP suosittelee vahvasti, että päivität Web Jetadminin uusimpaan versioon ennen HP Fleet Proxyn asennusta.
requirements.list.hp_print_fleetproxy.desc2=Tällä hetkellä HP testaa HP Fleet Proxy -palvelua vain versiossa HP Web Jetadmin 10.5 SR4. HP Fleet Proxy -palvelu voi toimia aiemmissakin HP Web Jetadmin -versioissa, mutta HP ei takaa, että kaikki toiminnot toimivat odotetusti.
requirements.list.hp_print_fleetproxy.desc3=Web Jetadmin on paljon resursseja käyttävä palvelu. Vaikka HP Fleet Proxy -palvelun ei pitäisi lisätä paljon resurssien käyttöä, suorituskykyyn saattaa kohdistua vaikutuksia, jos isäntäpalvelimessa ei ole riittävästi laskentatehoa molempien palvelujen ja niiden hallitsemien laitteiden tukemiseen. Varmista, että HP Web Jetadminia ja HP Fleet Proxya isännöivä palvelin on riittävän vankka ja siinä on riittävästi prosessoriytimiä suorituskykyongelmien minimoimiseksi.
requirements.list.hp_print_fleetproxy.desc4=Testattuaan 2 000 laitetta HP havaitsi, että seuraavien laitteistomääritysten pitäisi riittää hyväksyttävien suorituskykytulosten tuottamiseen. Jos suorituskyky on heikkoa tai jos hallinnoit yli 2 000 laitetta, saatat tarvita palvelimen korkeammalla laskentateholla.
requirements.list.hp_print_fleetproxy.desc5=Print Fleet Proxy on paikallinen palvelu, joka kommunikoi pilvipohjaisen palvelun kanssa. Tämän johdosta sinun on määritettävä palomuuri sallimaan saapuvat ja lähtevät yhteydet WJA-palvelimen ja HP Command Centerin välillä, joko DNS-suodatuksella tai IP-hyväksyntäluettelon kautta.
requirements.list.hp_print_fleetproxy.desc6=Kyseinen luettelo löytyy täältä:
requirements.list.hp_print_fleetproxy.hp-nf1=DNS-suodatus: Määritä palomuuri sallimaan lähtevät HTTPS-pyynnöt portin 443 kautta seuraaviin päätelaitteisiin:
requirements.list.hp_print_fleetproxy.hp-nf2=IP-hyväksyntäluettelo: Lisätäksesi IP-osoitteita hyväksyntäluetteloon sinun on lisättävä jokaisen HP Fleet Proxy -palvelun käyttämän pilvipalvelimen IP-osoite.
