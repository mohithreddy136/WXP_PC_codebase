partner.exp.mgmt.recommended.desc.AV_WD_SIGNATURE=Haittaohjelmistojen varmenteiden pitäminen ajan tasalla varmistaa kattavan suojauksen uusimpia uhkia vastaan.
partner.exp.mgmt.recommended.desc.AVG_FAN_SPEED_HIGH=Pitkäkestoinen korkea tuulettimen nopeus viittaa siihen, että laite ylikuumenee, mikä voi vahingoittaa komponentteja ja lyhentää niiden käyttöikää.
partner.exp.mgmt.recommended.desc.BITLOCKER_ENCRYPTION_NOT_ENABLED=Salaamattomien laitteiden tiedot saattavat paljastua, jos laite katoaa tai varastetaan.
partner.exp.mgmt.recommended.desc.DISK_UTILIZATION_HIGH=Laitteet, joissa on vain vähän vapaata levytilaa, voivat hidastua eivätkä enää suoriudu oleellisista tehtävistä.
partner.exp.mgmt.recommended.desc.DOCKING_STATION_AC_ADAPTER_FAILED=Telakointiaseman verkkovirtalaitteen vika voi kertoa laitteisto-ongelmista, jotka voivat aiheuttaa sen, että laitteesta katoaa virta tai se ei toimi ajoittain.
partner.exp.mgmt.recommended.desc.DOCKING_STATION_FIRMWARE_OUT_OF_DATE=Telakointiaseman vanhentunut laiteohjelmisto voi aiheuttaa yhteensopivuusongelmia, rajoittaa toiminnallisuuksia tai jättää tietoturva-aukkoja avoimeksi.
partner.exp.mgmt.recommended.desc.EXCESSIVE_OS_SHUTDOWN_TIME=Pitkä sammutusaika voi kertoa jumittuneista sovelluksista, jumittavasta laitteistosta, käytäntöpäivityksistä, pitkistä komentosarjoista tai keskeneräisistä Windows-tehtävistä.
partner.exp.mgmt.recommended.desc.EXCESSIVE_OS_STARTUP_TIME=Pitkän käynnistymisajan taustalla voi olla ohjelmistoristiriitoja tai laitteisto-ongelmia.
partner.exp.mgmt.recommended.desc.FIREWALL_DISABLED=Käytöstä poistettu Windows Defender -palomuuri voi jättää laitteet alttiiksi verkkoosi kohdistuville pahasuoville hyökkäyksille.
partner.exp.mgmt.recommended.desc.FIREWALL_SIGNATURE_OUTDATED=Vanhentuneet palomuurin määritelmät jättävät laitteet haavoittuvaisiksi uusille haittaohjelmille ja kyberuhkille.
partner.exp.mgmt.recommended.desc.GPU_HEALTH_ISSUE=Havaittu näytönohjaimen ongelma voi johtaa visuaalisiin häiriöihin, suorituskykyongelmiin tai jopa siihen, että grafiikka ei näy ollenkaan.
partner.exp.mgmt.recommended.desc.HIGH_COLLABORATION_SW_ERRORS=Jatkuvat virheet yhteistyöohjelmistoissa voivat häiritä tiimin työnkulkuja, haitata viestintää ja projektien etenemistä.
partner.exp.mgmt.recommended.desc.HIGH_WINDOWS_CRASH=Odottamattomat kaatumiset ja uudelleenkäynnistymiset kertovat piilevästä epävakaudesta, joka voi johtaa tietojen katoamiseen tai pysyviin laitteistovahinkoihin.
partner.exp.mgmt.recommended.desc.LAST_REBOOT_MORE_THAN_21_DAYS=Pitkään uudelleenkäynnistämättömänä olleissa laitteissa voi esiintyä käyttöjärjestelmän epävakaus- ja suorituskykyongelmia.
partner.exp.mgmt.recommended.desc.MAXIMISE_MY_BATTERY_HEALTH_NOT_ENABLED=Jos Akun kuntohallinta ei ole käytössä, se voi vaikuttaa nykyiseen akunkestoon.
partner.exp.mgmt.recommended.desc.MEMORY_UTILIZATION_HIGH=Laitteen pitkäkestoinen korkea muistin käyttöaste voi hidastaa laitetta, mikä vaikuttaa työntekijän suorituskykyyn.
partner.exp.mgmt.recommended.desc.MISSING_CRITICAL_DRIVER_UPDATES=Ilman kriittisiä ohjainpäivityksiä laitteiden komponentit eivät välttämättä toimi oikein tai ollenkaan.
partner.exp.mgmt.recommended.desc.MISSING_WINDOWS_SECURITY_UPDATES=Vanhentuneet tietoturvapäivitykset voivat jättää laitteet haavoittuvaksi hakkereille ja viruksille.
partner.exp.mgmt.recommended.desc.MISSING_WINDOWS_UPDATES=Vanhentuneet Windows-päivitykset altistavat laitteet haavoittuvuuksille ja mahdollisille haittaohjelmatartunnoille.
partner.exp.mgmt.recommended.desc.PC_REFRESH=Käynnistä kaikkien älykäs päivitys tai poista alla olevasta taukukosta niiden tietokoneiden valinta, joita et vaihda nyt.
