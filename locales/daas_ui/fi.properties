exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail3=Ratkaisuvaihtoehdot voivat vaihdella sovelluksen mukaan. Jos nämä ovat yritystoiminnan kannalta välttämättömiä sovelluksia, muistin päivitys voi lievittää ongelmaa. Sovellukset, jotka eivät ole yritystoiminnan kannalta välttämättömiä, voidaan poistaa laitteelta, tai niiden asetuksia voidaan muuttaa siten, että ne eivät kuormita laitetta niin paljon.
