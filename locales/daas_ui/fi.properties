exp.ExcessiveOsStartupTime.option1StepToggles=Valitse kytkinpainikkeilla, minkä sovellusten haluat käynnistyvän laitteen käynnistyksen yhteydessä. Kytke painike päälle, jos haluat, että sovellus käynnistyy laitteen käynnistyksen yhteydessä, tai kytke painike pois päältä, jos et halua, että sovellus käynnistyy laitteen käynnistyksen yhteydessä.
