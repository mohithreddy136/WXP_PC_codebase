applicationInv.help.content=Sovellusten etsinnän hallintapaneeli tarjoaa keskitetyn arkiston organisaation ohjelmistosovelluksista. Se sisältää tarkkoja tietoja, kuten kuvaukset ja versionumerot. Se tarjoaa yhdistetyn näkymän sovellusympäristöstä ja mahdollistaa paremman suojauksen, vaatimustenmukaisuuden ja tietoihin perustuvan IT-suunnittelun. Lisäksi hallintapaneeli tekee sovellusten ylläpidosta, päivityksistä ja siirroista yksinkertaisempaa tehden prosessista tehokkaamman ja suoraviivaisemman.
