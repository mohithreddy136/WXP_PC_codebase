account_management.subscriptions.addon.vyopta.connect_accounts.not_found=Emme pystyneet automaattisesti tunnistamaan palvelun {service} tiliäsi. Ota yhteyttä tukeen {support_link} saadaksesi apua tämän yhteyden muodostamiseen, jos olet jo palvelun {service} asiakas.
account_management.subscriptions.addon.vyopta.connect_accounts.org_already_mapped=Vyopta-tunnus on jo liitetty toiseen vuokralaiseen. Ota yhteyttä tilisi järjestelmänvalvojaan saadaksesi apua.
account_management.subscriptions.addon.vyopta.connect_accounts.request_support=Ota yhteyttä palvelun {service} tilisi järjestelmänvalvojaan saadaksesi apua.
account_management.subscriptions.addon.vyopta.connect_accounts.success=Tilisi yhdistäminen onnistui.
account_management.subscriptions.addon.vyopta.connect_accounts.unauthorized=Havaitsimme, että palvelu {service} on organisaatiosi käytössä, mutta vaikuttaa siltä, että sinulla ei ole tarvittavia oikeuksia tilien yhdistämiseksi.
account_management.subscriptions.addon.vyopta.desc=Optimoi yhteistyötä reaaliaikaisilla oivalluksilla. Valvo puheluiden laatua, kokoushuoneiden käyttöä ja järjestelmän suorituskykyä Microsoft Teamsissä, Zoomissa, Polyssa ja Webexissä. Kun se on integroitu WXP:n kanssa, se auttaa IT-tiimiä parantamaan digitaalisia kokemuksia ja tehostamaan tehokkuutta työpaikalla.
account_management.subscriptions.addon.vyopta.features.comprehensive_monitoring=Kattava valvonta yhteistyöalustojen välillä
account_management.subscriptions.addon.vyopta.features.comprehensive_monitoring.desc=Saa kattava näkyvyys usean toimittajan yhdistettyyn viestintäympäristöön (UC), jotta voit hallita tehokkaasti video- ja ääniyhteistyötyökaluja.
account_management.subscriptions.addon.vyopta.features.deep_integration=Syvä integrointi WXP:n kanssa
account_management.subscriptions.addon.vyopta.features.deep_integration.desc=Vyoptan analytiikka- ja valvontatiedot on sulautettu saumattomasti WXP:hen, joten IT-tiimit voivat hallinnoida yhteistyön tehokkuutta muiden työpaikkateknologioiden rinnalla. Tämä keskitetty tapa parantaa IT-tiimin tehokkuutta, tekee toiminnasta yksinkertaisempaa ja parantaa digitaalisen kokemuksen hallintaa.
account_management.subscriptions.addon.vyopta.features.enhance_user_engagement=Paranna käyttäjien sitoutumista ja hyvinvointia
account_management.subscriptions.addon.vyopta.features.enhance_user_engagement.desc=Käytä yhteistyön analytiikkatietoja tunnistaaksesi tuottavuuden esteet ja parantaaksesi työntekijöiden kokemusta ja hyvinvointia.
account_management.subscriptions.addon.vyopta.features.optimize_meeting_space=Optimoi kokoustilan käyttöä
account_management.subscriptions.addon.vyopta.features.optimize_meeting_space.desc=Analysoi huoneen käyttöastetta ja -tottumuksia maksimoidaksesi kiinteistöinvestointien arvon ja parantaaksesi kokoushuoneiden tehokkuutta.
account_management.subscriptions.addon.vyopta.features.proactive_issue_detection=Ennakoiva ongelmien tunnistus ja korjaus
account_management.subscriptions.addon.vyopta.features.proactive_issue_detection.desc=Hyödynnä reaaliaikaista valvontaa tunnistaaksesi ja ratkaistaksesi yhteistyöhön liittyviä laatuongelmia, ennen kuin ne vaikuttavat käyttäjiin, mikä vähentää vianmääritykseen kuluvaa aikaa.
account_management.subscriptions.addon.vyopta.header=Vyoptan tarjoama yhteistyökokemus
account_management.subscriptions.addon.vyopta.overview=Tarjoa IT-tiimeille edistynyt valvonta ja analytiikka yhteistyötyökaluille. Vyopta-integraatio WXP:ssä tarjoaa reaaliaikaisen näkyvyyden kokoushuoneiden käyttöön, puheluiden laatuun ja järjestelmän suorituskykyyn alustoilla, kuten Microsoft Teams, Zoom, Poly ja Webex. Tehosta työntekijöiden tuottavuutta ratkaisemalla ennakkoon yhteistyöhön liittyviä ongelmia ja optimoimalla työpaikkakokemuksia.
account_management.subscriptions.addon.vyopta.short_desc=Arvokkaat analytiikkatiedot ja huoneiden oivallukset auttavat optimoimaan yhteistyöympäristöjä
account_management.subscriptions.addon.wolf.desc=Käyttöönotto, näkyvyys ja päästä päähän -suojaus, joka käyttää sekä sulautettua tietokoneen että ohjelmiston tietoturvaa vahvistaakseen tietokoneen suojausta.
account_management.subscriptions.addon.wolf_security=HP Wolf Security
account_management.subscriptions.addon.wolf_security.desc=HP Wolf -palvelun tarjoama kyberhyökkäyksiltä suojaava verraton päätelaitesuojaus. Katso telemetriatietoja Workforce Experience -alustalla parannettua tietoturvaa varten.
account_management.subscriptions.addon.wpt.desc=Seuraa, lukitse ja suojaa kadonneita tai varastettuja laitteita etänä. Kun se on integroituna WXP:hen, se auttaa IT-tiimejä seuraamaan tietokoneresursseja ja pienentämään laitteen katoamiseen liittyviä riskejä – vaikka laitteet olisivat pois päältä.
account_management.subscriptions.addon.wpt.features.always_available=Aina käytettävissä
account_management.subscriptions.addon.wpt.features.always_available.desc=Hyödyntää mukautettua laitteistoa ja ohjelmistoa tietokoneen etsimiseksi/lukitsemiseksi/tyhjentämiseksi, vaikka tietokone olisi pois päältä, vaikka siinä ei olisi Internet-yhteyttä ja vaikka se ei käynnistyisi.
account_management.subscriptions.addon.wpt.features.message_customization=Viestin mukauttaminen
account_management.subscriptions.addon.wpt.features.message_customization.desc=Lähetä kohdetietokoneelle mukautettu viesti, joka sisältää lukituksen avaamisen ohjeet
account_management.subscriptions.addon.wpt.features.remote_lock_and_erase=Etälukitus ja -tyhjennys
account_management.subscriptions.addon.wpt.features.remote_lock_and_erase.desc=Lukitse laitteet laiteohjelmistotasolla suojellaksesi tietoja ja tehdäksesi varastetuista laitteista hyödyttömiä. Tyhjennä kadonneiden tai varastettujen laitteiden päätallennusasema tietovuotojen välttämiseksi.
account_management.subscriptions.addon.wpt.features.seamless_integration=Saumaton integrointi WXP:n kanssa
account_management.subscriptions.addon.wpt.features.seamless_integration.desc=Hallinnoi laiteturvallisuutta suoraan WXP:ssä. Tämä suoraviivaistaa IT-työtä ja päätelaitteiden hallintaa.
account_management.subscriptions.addon.wpt.features.separations_of_duties=Tehtävien erottelu
