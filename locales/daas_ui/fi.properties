azureonboard.marketing.disclaimer.content=Näitä tietoja voidaan muuttaa ilman erillistä ilmoitusta. Ainoat HP:n tuotteita ja palveluja koskevat takuut mainitaan erikseen kyseisten tuotteiden ja palveluiden mukana toimitettavissa takuuehdoissa. Tässä aineistossa olevat tiedot eivät oikeuta lisätakuisiin. HP ei vastaa tässä esiintyvistä mahdollisista teknisistä tai toimituksellisista virheistä tai puutteista.
azureonboard.marketing.disclaimer.contentlist1=HP Proactive Insights ja/tai sisältyvät komponentit vaihtelevat alueittain, käyttöjärjestelmittäin tai valtuutettujen HP:n palvelukumppanien mukaan. Kysy lisätietoja sijaintiasi koskien paikalliselta HP:n edustajalta tai valtuutetulta kumppanilta. HP:n palveluita määrittävät palvelukohtaiset ehdot, jotka on luovutettu tai joiden sijainti on ilmoitettu asiakkaalle ostotapahtuman yhteydessä. Asiakkaalla voi lisäksi olla muita sovellettavien lakien mukaisia oikeuksia, joihin HP:n palveluehdot tai HP-tuotteeseen kuuluva rajoitettu takuu eivät vaikuta millään tapaa.
azureonboard.marketing.disclaimer.contentlist2=HP {appName} on mittaus- ja analyysialusta, josta saa kriittisiä tietoja laitteista ja sovelluksista. Sitä ei myydä erillisenä palveluna. HP {appName} noudattaa tiukkoja yleisen tietosuoja-asetuksen (GDPR) määräyksiä ja on ISO27001, ISO27701, ISO27017 ja SOC2 Type2 -sertifioitu tietosuojan osalta. Edellyttää Internet-yhteyttä, jolla pääsee sovellukseen {appName}. Täydet järjestelmävaatimukset ovat saatavilla täällä: <a target='_blank' href={link}>{text}</a>.
azureonboard.marketing.disclaimer.contentlist3=BIOS-päivitykset ovat saatavilla vain HP-laitteille.
azureonboard.marketing.disclaimer.contentlist4=Tuetut käyttöjärjestelmät ovat saatavilla täällä: <a target='_blank' href={link}>{text}</a>.
azureonboard.marketing.employeesection.description=Kerää, mittaa ja hallitse työntekijöiden digitaalista kokemusta laitteisto-, sovellus- ja työntekijäkyselyiden kautta kaikilla laitteillasi.
azureonboard.marketing.employeesection.heading=Proactive Employee Insight
azureonboard.marketing.hardwaresection.description=Valvo laitteiden kiintolevyjä, prosessorin käyttöä, lämpötiloja ja akun kuntoa ennakoivasti, jotta voit ennakoida mahdollisia vaikutuksia analysoimalla tietoja yli 20 miljoonan laitteen tietovirtaan verraten.
azureonboard.marketing.hardwaresection.heading=Proactive Hardware Insight
azureonboard.marketing.insightsection.description=Diagnosoi suorituskykyongelmia, ohjelmistovirheitä, blue-screen-of-death-kaatumisia ja laitteiston käyttöasteita päivittäen samalla ajureita ja asentaen korjaustiedostoja varmistaen suojausprofiilien turvallisuus.
azureonboard.marketing.insightsection.heading=Proactive Application Insight
azureonboard.marketing.learnmoresection.content=HP Proactive Insights kokoaa tietoja yli 20 miljoonasta laitteesta ja miljardeista datapisteistä. Se hyödyntää HP TechPulsen analytiikka-alustaa tunnistaakseen ja ratkaistakseen ongelmia ennen kuin ne vaikuttavat työntekijöihin.
azureonboard.marketing.learnmoresection.description=Autamme sinua muuttamaan laitehallintaasi tekoälypohjaisella proaktiivisella tietokoneen suorituskyvyn, turvallisuuden, kustannusten, häiriöajan ja työntekijöiden tyytyväisyyden hallinnalla. Pääset hyödyntämään tietoja, jotka on kerätty yli 20 miljoonalta laitteelta, organisaatiosi parantamiseksi.
azureonboard.marketing.learnmoresection.heading=HP Proactive Insights antaa merkityksellisiä analyysejä, jotka perustuvat miljardeihin datapisteisiin
