wex.fleet.mgmt.remediation.kernel_panic_error.desc=Kernel Panic esiintyi, mikä osoittaa kriittisen järjestelmävirheen, josta Linux-ydin ei voi palautua. Tämä voi johtua laitteistovirheistä, vioittuneista ohjaimista, väärin määritetyistä ytimen parametreista tai epäyhteensopivista ydinmoduuleista. Välitön tarkastus vaaditaan juurisyyn tunnistamiseksi.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt1=Tarkista panic-virhettä edeltävät virheilmoitukset järjestelmälokeista (/var/log/messages, /var/log/syslog tai journalctl).
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt2=Tarkista laitteiston, erityisesti muistin (keskusmuisti) kunto ja levyn eheys työkaluilla, kuten memtest86 ja smartctl.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt3=Katso viimeaikaiset muutokset järjestelmään (esim. ydinpäivitykset, ohjainten asennukset tai määritysten muutokset).
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt4=Käynnistä pelastus- tai palautustila, jotta pääset järjestelmään, jos se ei käynnisty.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt5=Palauta tai päivitä ydinmoduulit tai ohjaimet, jos niiden epäillään olevan epäyhteensopivia.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt6=Kysy myyjältä tai yhteisötuelta, onko ongelma yleinen vai liittyykö se laitteistoon.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.desc=Levyn salaus suojaa arkaluontoisia tietoja varmistamalla, että kaikki levylle tallennetut tiedot ovat lukukelvottomia ilman asianmukaista todennusta. Tämä on kriittinen tietoturvakeino järjestelmille, jotka sisältävät luottamuksellisia tai säänneltyjä tietoja.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step1=Ota käyttöön täysi levyn salaus työkaluilla, kuten LUKS (Linux Unified Key Setup) tai dm-crypt, riippuen Linux-versiostasi.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step2=Salaa arkaluonteiset osiot (esim. /home, /var tai /data), jos täysi levyn salaus ei sovi.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step3=Määritä suojausavaimien hallinta, mukaan lukien tunnuslauseet tai integrointi TPM:n (Trusted Platform Module) kanssa, mikäli käytettävissä.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step4=Tee salausavaimista varmuuskopio turvallisesti estääksesi tietojen menetyksen, jos avain katoaa.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step5=Testaa salausasetukset sen varmistamiseksi, että järjestelmä käynnistyy oikein ja tietoja voidaan käyttää todennuksen jälkeen.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step6=Asiakirjojen salauksen määritys- ja palautuskäytännöt vaatimustenmukaisuutta ja operationaalista jatkuvuutta varten.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step1=Asenna ja määritä palomuurityökalu, kuten firewalld, ufw tai iptables Linux-versiostasi riippuen.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step2=Salli palomuuripalvelun käynnistyä laitteen käynnistyksen yhteydessä
wex.fleet.mgmt.remediation.linux_firewall_disabled.step3=Määritä palomuuri sallimaan vain tarvittavat palvelut (esim. SSH, HTTP/HTTPS) ja estämään kaikki muut.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step4=Tarkista palomuurin tila ja säännöt komennolla: sudo firewall-cmd --list-all (jos käytössä firewalld), sudo ufw status (jos käytössä ufw)
wex.fleet.mgmt.remediation.linux_firewall_disabled.step5=Tarkista säännöllisesti palomuurin määritykset varmistaaksesi, että ne ovat linjassa tietoturvakäytäntöjen ja operationaalisten tarpeiden kanssa.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.desc=Suojatun käynnistyksen ottaminen käyttöön auttaa suojaamaan järjestelmää luvattomalta tai haitalliselta koodilta käynnistysprosessin aikana tarkistamalla käynnistysohjelmien, ydinmoduulien ja ohjainten digitaalisen varmenteen. Tämä parantaa järjestelmän eheyttä ja tietoturvaa, erityisesti yritys- tai vaatimustenmukaisuuslähtöisissä ympäristöissä.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step1=Tarkista UEFI-laiteohjelmistotuki Suojatulle käynnistykselle ja varmista, että se on käytössä UEFI-asetuksissa.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step2=Asenna ja määritä Suojatun käynnistyksen kanssa yhteensopivat varmennetut käynnistysohjelmat ja ydinpaketit (esim. käyttäen shim-ohjelmaa ja varmennettua GRUBia).
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step3=Varmista, että ydin, moduulit ja kaikki tarvittavat komponentit ovat varmennettuja.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step4=Käynnistä laite uudelleen ja tarkista Suojatun käynnistyksen tila mokutil-ohjelmalla.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step5=Rekisteröi mukautetut avaimet, jos käytät standardista poikkeavia komponentteja.
wex.fleet.mgmt.remediation.missing_linux_security_updates.desc=Järjestelmästä puuttuu yksi tai useampi kriittinen tietoturvapäivitys. Nämä päivitykset korjaavat käyttöjärjestelmän, ytimen ja asennettujen pakettien tunnetut haavoittuvuudet. Niiden asentamatta jättäminen voi altistaa järjestelmän luvattomalle käytölle, tietoturvaloukkauksille tai palveluhäiriöille.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step1=Tarkasta ja tunnista puuttuvat tietoturvan korjauspäivitykset järjestelmän paketinhallintaohjelmalla (esim. apt, yum, dnf, zypper).
wex.fleet.mgmt.remediation.missing_linux_security_updates.step2=Asenna kaikki kriittiset tietoturvapäivitykset välittömästi tunnettujen tietoturvauhkien ja haavoittuvuuksien korjaamiseksi.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step3=Tarvittaessa käynnistä järjestelmä uudelleen, erityisesti ytimen tai ydinpalvelun päivitysten jälkeen.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step4=Ota käyttöön automaattiset tietoturvapäivitykset tai määritä säännöllinen korjauspäivitysaikataulu oikea-aikaisen suojauksen varmistamiseksi.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step5=Tarkasta päivityksen onnistuminen katsomalla lokit ja tarkastamalla pakettiversiot.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step6=Suorita päivityksen jälkeinen haavoittuvuustarkistus varmistaaksesi, ettei jäljelle jää riskejä.
wex.fleet.mgmt.remediation.missing_linux_updates.desc=Järjestelmästä puuttuu yksi tai useampi kriittinen Linux-päivitys. Nämä päivitykset voivat sisältää tietoturvapäivityksiä, ydinkorjauksia ja vakauden parannuksia. Vanhentuneen järjestelmän käyttäminen lisää haavoittuvuuksien, järjestelmän kaatumisten ja yhteensopivuusongelmien riskiä.
wex.fleet.mgmt.remediation.missing_linux_updates.step1=Tarkasta saatavilla olevat päivitykset paketinhallintaohjelmalla (esim. yum, dnf, apt tai zypper) tunnistaaksesi puuttuvat kriittiset korjauspäivitykset.
wex.fleet.mgmt.remediation.missing_linux_updates.step2=Asenna kaikki tietoturva- ja ydinpäivitykset mahdollisimman pian tunnettujen haavoittuvuuksien korjaamiseksi.
wex.fleet.mgmt.remediation.missing_linux_updates.step3=Tarvittaessa käynnistä järjestelmä uudelleen, erityisesti ytimen tai ydinjärjestelmän päivitysten jälkeen.
wex.fleet.mgmt.remediation.missing_linux_updates.step4=Ota käyttöön automaattiset päivitykset tai määritä säännölliset korjauspäivitysaikataulut varmistaaksesi tulevien päivitysten käyttöönoton ajoissa.
wex.fleet.mgmt.remediation.missing_linux_updates.step5=Vahvista, että päivitys onnistui tarkastamalla järjestelmälokit ja katsomalla nykyiset ydin- ja pakettiversiot.
wex.fleet.mgmt.remediation.network_connection_not_secure.desc=Viimeisen 24 tunnin aikana on raportoitu verkkoyhteys, jonka suojaus ei ole odotetunlainen.
wex.fleet.mgmt.remediation.network_connection_not_secure.desc1=Todentamaton yhteys havaittu viimeisen 7 päivän aikana.
wex.fleet.mgmt.remediation.network_disconnections.desc=Laitteissa on ilmoitettu toistuvia yhteyskatkoksia viimeisen 24 tunnin aikana.
wex.fleet.mgmt.remediation.network_disconnections.desc1=Verkkoyhteyden katkaisuja on havaittu viimeisen 7 päivän aikana.
wex.fleet.mgmt.remediation.network_speed_slow.desc=Raportoitu verkon nimellisnopeus oli hidas viimeisen 24 tunnin aikana.
wex.fleet.mgmt.remediation.wifi_signal_strength_weak.desc=Ilmoituksen mukaan Wi-Fi-signaali on ollut heikko viimeisen 24 tunnin aikana.
