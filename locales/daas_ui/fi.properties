account_management.subscriptions.addon.anyware.features.provision_desktops=Hallinnoi fyysisiä ja virtuaalisia tietokoneita
account_management.subscriptions.addon.anyware.features.provision_desktops.desc=IT-tiimi voi määrittää ja valvoa etätietokoneita HP Anyware Manager Enterprisen kautta. He voivat myös määrittää virtuaalisia tietokoneita loppukäyttäjille koska tahansa.
