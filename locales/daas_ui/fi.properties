wex.ra.remediation.poor_network_signal_strength=Kotiverkkojen osalta reitittimen käynnistäminen uudelleen tai sen siirtäminen toiseen paikkaan yhteyspisteen ja tietokoneen välisten esteiden vähentämiseksi voi auttaa parantamaan Wi-Fi-signaalin vahvuutta.
wex.ra.remediation.poor_nominal_speed=Harkitse kotiverkkojen osalta reitittimen päivittämistä uudempaan malliin, joka tukee uusimpia Wi-Fi-standardeja, kuten Wi-Fi 6. Optimoi myös verkkosi peittoalue sijoittamalla reititin keskeiseen sijaintiin, vähentäen muiden laitteiden aiheuttamaa häiriötä ja käyttämällä langallista yhteyttä aina, kun se on mahdollista vakaamman suorituskyvyn saamiseksi.
wex.ra.remediation.unauthenticated_connection=Valitse kotiverkoille vahva salausprotokolla, kuten WPA2 tai WPA3, ja määritä vahva, yksilöllinen salasana. Harkitse myös MAC-osoitesuodatuksen ottamista käyttöön ja päivitä reitittimesi laiteohjelmisto säännöllisesti suojauksen parantamiseksi ja luvattomien yhteyksien estämiseksi.
wex.ra.remediation.windows_secure_boot_not_enabled=Suojattu käynnistys on tietokonevalmistajien kehittämä tietoturvastandardi, joka varmistaa, että laite käynnistyy vain käyttäen ohjelmistoa, johon alkuperäinen laitteistovalmistaja (OEM) luottaa.
