exp.EarlyDetectionWear.causeConstantCharge=Akun pitäminen jatkuvasti 100-prosenttisesti ladattuna erityisesti silloin, kun se on pitkiä aikoja kytkettynä verkkovirtaan, voi nopeuttaa sen kulumista ja lyhentää sen käyttöikää.
exp.EarlyDetectionWear.causeDeepDischarge=Jos akun annetaan usein tyhjentyä kokonaan ennen uudelleenlatausta, tämä voi kiihdyttää akun kulumista ja lyhentää sen kokonaiskäyttöikää.
