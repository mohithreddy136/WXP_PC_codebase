exp.GpuHealthIssue.blueScreenLink=https://docs.microsoft.com/en-us/windows-hardware/drivers/debugger/-analyze
exp.GpuHealthIssue.blueScreenLinkText=https://docs.microsoft.com/en-us/windows-hardware/drivers/debugger/-analyze
exp.GpuHealthIssue.causeBlueScreenErrors=Siniset virhenäytöt. Siniset virhenäytöt voivat johtua liian monen graafisesti vaativan ohjelman tai visuaalisen tehosteen samanaikaisesta suorituksesta tai ohjain- tai laitteisto-ongelmista.
exp.GpuHealthIssue.causeDoubleBitEcc=ECC-muistin kahden bitin virheet: Näytönohjaimessa esiintyy ECC-muistin kahden bitin virheitä, mikä voi olla osoitus laitteisto-ongelmista tai viallisesta muistista.
exp.GpuHealthIssue.causeHighDoubleBitEccOverTime=Suuri määrä ECC-muistin kahden bitin virheitä ajan kuluessa: Näytönohjaimessa esiintyy runsaasti ECC-muistin kahden bitin virheitä, ja virheiden keskimäärä on kasvanut vähintään kolmen viikon ajan.
exp.GpuHealthIssue.causeHighTdrEvents=Suuri määrä TDR (näytönohjaimen aikakatkaisu ja palautus) -tapahtumia: Näytönohjaimessa on esiintynyt runsaasti TDR-tapahtumia, mikä voi olla osoitus ohjain- tai laitteisto-ongelmista.
exp.GpuHealthIssue.causeMissingDriverUpdate=Tärkeä ohjainpäivitys puuttuu: Näytönohjaimen tärkeä päivitys puuttuu, mikä voi heikentää suorituskykyä ja vakautta.
exp.GpuHealthIssue.causeThermalIssues=Lämpöongelmat: Näytönohjaimessa esiintyy runsaasti lämpöongelmia, ja näytönohjaimen tai muistin lämpötila ylittää suurimman sallitun käyttölämpötilan.
exp.GpuHealthIssue.driverOption1=Vaihtoehto 1: Käytä HP Image Assistantia ohjainten päivittämiseen
exp.GpuHealthIssue.driverOption2=Vaihtoehto 2: Käytä Windows Updatea ohjainten päivittämiseen
exp.GpuHealthIssue.possibleCauses=Mahdolliset syyt:
exp.GpuHealthIssue.remediationBlueScreenPrefix=Sinisiä virhenäyttöjä varten: Tarkista, onko käynnissä liian monta graafisesti vaativaa ohjelmaa tai visuaalista tehostetta samanaikaisesti. Päivitä näytönohjaimen ohjain, palauta ylikellotetut asetukset oletusasetuksiin, asenna ohjain kokonaan uudelleen tai palauta asetukset oletusasetuksiin, varmista riittävä virransaanti ja puhdista tuuletusaukot sekä tuuletin. Analysoi mini-dump-tiedosto tarkkojen korjaustoimien selvittämistä varten:
exp.GpuHealthIssue.remediationDoubleBitEcc=ECC-muistin kahden bitin virheitä varten: Jatka tilanteen valvontaa ja tarkkaile, jatkuuko suorituskyvyn heikentyminen. Jos virheiden määrä pysyy suurena, näytönohjain on ehkä vaihdettava.
exp.GpuHealthIssue.remediationMissingDriver=Puuttuvaa ohjainpäivitystä varten: Jos suorituskykyongelmia esiintyy, päivitä näytönohjaimen ohjain uusimpaan versioon.
exp.GpuHealthIssue.remediationTdr=TDR-tapahtumia varten: Jatka tilanteen seuraamista ja päivitä näytönohjaimen ohjain, jos ongelma jatkuu. Palauta grafiikka-asetukset oletusasetuksiin, palauta ylikellotetut asetukset oletusasetuksiin, päivitä BIOS (jos päivitys on saatavilla) ja tarkista riittävä virransaanti sekä ilmanvirtaus. Puhdista tuuletusaukot ja tuuletin.
exp.GpuHealthIssue.remediationThermal=Lämpöongelmia varten: Tarkista, että ilma pääsee virtaamaan vapaasti, puhdista tuuletusaukot ja varmista, että tuuletin toimii oikein ja on puhdas.
exp.GpuHealthIssue.suggestedRemediations=Ehdotetut korjaustoimet:
exp.GpuHealthIssue.title=Tarkista näytönohjaimen kunto
