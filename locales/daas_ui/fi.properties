wex.labs.remediation.ai.description=Korjaus tekoälyllä kertoo tehokkaimman ratkaisun. Se rajaa älykkäästi vaihtoehtoja, jotta tiimisi voi ratkaista ongelmat tehokkaasti ja yhdenmukaisesti.
wex.labs.remediation.ai.description.disclaimer=You are about to interact with an AI solution. Content generated by AI might contain inaccuracies and should be verified against the details provided. Please note that AI-generated responses might be incomplete or incorrect, and HP assumes no responsibility for actions taken based on this content.
wex.labs.remediation.ai.details.analyzesAvailableRemediations.desc=Algoritmi skannaa alustan olemassa olevat korjaukset, mukaan lukien komentosarjat, käytännöt ja laitteiden toiminnan/päivitykset, sekä suosittelee kaikkein relevanteimpia korjaustoimia.<br/><br/>Se tarkastelee historiallista käyttöä ja onnistumisasteita ymmärtääkseen, mikä yleensä ratkaisee tämän tyyppisen ongelman organisaatiossasi. Käyttäjät voivat käyttää vähemmän aikaa oikean toimintatavan määrittämiseen ja antaa tekoälyn hoitaa homman.
wex.labs.remediation.ai.details.analyzesAvailableRemediations.title=Analysoi käytettävissä olevia korjaustoimia
wex.labs.remediation.ai.details.applyOrReview.desc=Korjaustoimesta riippuen järjestelmänvalvojat voivat toimia seuraavasti: <br/><div class=remediation-ai-ui><ul><li>Ottaa välittömästi käyttöön valituilla laitteilla</li><li>Ajastaa myöhemmäksi keskeytysten minimoimiseksi</li><li>Tarkistaa tiedot ennen toiminnon vahvistamista</li></ul></div><br/>Kun ominaisuus on otettu käyttöön, toimintoja ja tuloksia seurataan läpinäkyvyyden ja jatkuvan oppimisen mahdollistamiseksi.
wex.labs.remediation.ai.details.applyOrReview.title=Ota käyttöön, ajasta tai uudista
wex.labs.remediation.ai.details.continuousLearning.desc=Ajan saatossa suosituksista tulee tarkempia ja luotettavampia.
wex.labs.remediation.ai.details.continuousLearning.title=Jatkuva oppiminen
wex.labs.remediation.ai.details.howItWorks.title=Miten se toimii
wex.labs.remediation.ai.details.issueToRemediation.desc=Kun ongelma ylittää määritetyn rajan, se näkyy kojelaudassasi. Siinä on selkeä kuvaus tapahtuneesta ja tavoista, joilla se saattaa vaikuttaa laitteisiisi. WXP-alusta mahdollistaa nyt suorat korjaustoimet ja tekoälykorjaustoiminto auttaa selvittämään parhaan vaihtoehdon ongelman korjaamiseen.
wex.labs.remediation.ai.details.issueToRemediation.title=Korjattava ongelma
wex.labs.remediation.ai.details.learnsandImproves.desc=Algoritmi kehittää jatkuvasti ymmärrystään organisaatiossanne parhaiten toimivista keinoista.<br/>Järjestelmä oppii aina kun korjaustoimi toteutetaan:<div class=remediation-ai-ui><ul><li>Toimen tehokkuus</li><li>Ongelman ratkaisuun kulunut aika</li><li>Ilmenikö samantapaisia ongelmia.</li></ul></div><br/>Tämä palautesilmukka vahvistaa tulevia suosituksia, minkä ansiosta niiden virheettömyys ja räätälöinti kehittyy ajan mittaan.
wex.labs.remediation.ai.details.learnsandImproves.title=Oppii ja parantaa toimintaansa ajan mittaan
wex.labs.remediation.ai.details.overview.desc=Tekoälyavusteisten korjaustoimien avulla IT-järjestelmänvalvojat voivat siirtyä nopeasti havaitsemisesta ratkaisemiseen. Toiminto analysoi laitekannan tiedot ja suosittelee tehokkainta käytäntöä, komentosarjaa tai laitepäivitystä kulloiseenkin ongelmaan. Algoritmi ehdottaa todennäköisimmin toimivaa ratkaisua käyttämällä mallina ympäristössä aiemmin käytettyjä korjausratkaisuja.
wex.labs.remediation.ai.details.recommendBestFix.desc=Kunkin suosituksen sisältö: <br/><div class=remediation-ai-ui><ul><li>Toiminnan tyyppi: komentosarja, käytäntö tai päivitys</li><li>Syy olennaisuuteen: korjaustoimet ja automaatio korjaavat ongelmia reaaliaikaisesti, parantavat työntekijöiden tuottavuutta ja digitaalista käyttökokemusta sekä säästävät aikaa ja vähentävät haavoittuvuutta.</li></ul></div>
wex.labs.remediation.ai.details.recommendBestFix.title=Suosittelee parasta korjaustapaa
wex.labs.remediation.ai.details.relevance.desc=Tekoäly toimii organisaatiosi oman korjauskirjaston kanssa.
