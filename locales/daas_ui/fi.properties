wex.fleet.mgmt.recommended.desc.bitlocker_encryption_not_enabled=BitLocker-salauksen käyttöönotto suojaa arkaluonteisia tietoja salaamalla laitteesi ja parantamalla yleistä suojausta luvatonta käyttöä vastaan.
wex.fleet.mgmt.recommended.desc.bsod_occured=Sinisten virhenäyttöjen virheiden korjaaminen takaa järjestelmän vakauden, estää odottamattomia sammutuksia ja pitää järjestelmän luotettavana.
wex.fleet.mgmt.recommended.desc.cpu_utilization_high=Prosessorin korkean käyttöasteen analysointi auttaa ehkäisemään suorituskyvyn pullonkauloja ja pitää järjestelmän sulavasti toimivana.
