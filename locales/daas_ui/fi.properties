exp.HpBatteryHealthManagerNotEnabled.description=HP:n akun kuntohallinta on saatavilla kaikissa HP-yrityskannettavissa vuodesta 2016 alkaen. Akun kuntohallinta on suositeltavaa pitää käytössä akun käyttöiän pidentämistä varten.
