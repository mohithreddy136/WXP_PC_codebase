dnto.subscriptions.about_hp.desc1=OIemme teknologiayritys, joka on syntynyt sen ajatuksen pohjalta, että yritysten tulisi tehdä muutakin kuin voittoa. Niiden tulisi tehdä maailmasta parempi paikka. Pyrkimyksemme ilmastonmuutosasioissa, ihmisoikeusasioissa ja digitaalisessa yhdenvertaisuudessa todistavat, että teemme kaiken voitavamme asian eteen.
dnto.subscriptions.about_hp.desc2=Takanamme on 80 vuotta tavoitteemme todistavia toimia, ja voimme luottavaisin mielin kuvitella maailman, jossa innovaatio tuo ihmiskunnalle upeita asioita.
dnto.subscriptions.about_hp.desc3=Teknologiamme – tuote- ja palveluvalikoima, jossa on henkilökohtaisia järjestelmiä, tulostimia ja 3D-tulostusratkaisuja – luotiin inspiroimaan tätä merkittävää edistystä.
dnto.subscriptions.about_hp.desc4=Tiedämme, että syvällisiä ideoita voi tulla keneltä tahansa, mistä tahansa ja milloin tahansa.
dnto.subscriptions.about_hp.desc5=Jo yksi henkilö voi muuttaa maailmaa.
