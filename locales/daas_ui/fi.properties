exp.CollaborationSoftwareErrorsAreHigh.causeConflicts=Eri ohjelmistosovellusten tai laajennusten, kuten selainlaajennusten tai lisäosien, väliset ristiriidat voivat haitata yhteistyötä tukevien työkalujen asianmukaista toimintaa ja johtaa lukuisiin virheisiin.
exp.CollaborationSoftwareErrorsAreHigh.causeNetwork=Verkon yhteysongelmat, kuten hitaat tai epävakaat internetyhteydet, voivat aiheuttaa häiriöitä ja virheitä yhteistyötä tukevissa työkaluissa, jotka ovat riippuvaisia reaaliaikaisesta tiedonsiirrosta.
exp.CollaborationSoftwareErrorsAreHigh.causeUpdates=Toistuvat ohjelmistopäivitykset tai korjaustiedostot voivat aiheuttaa uusia vikoja tai yhteensopivuusongelmia, mikä johtaa entistä suurempaan virheiden määrään esimerkiksi Teams-, Outlook-, Zoom-, Webex-, Chrome- ja Office-sovelluksissa.
exp.CollaborationSoftwareErrorsAreHigh.possibleCauses=Mahdolliset syyt:
exp.CollaborationSoftwareErrorsAreHigh.remediationConflicts=Ratkaise ristiriitoja poistamalla käytöstä tai poistamalla kokonaan ongelmalliset laajennukset tai lisäosat ja varmistamalla eri ohjelmistosovellusten välinen yhteensopivuus.
exp.CollaborationSoftwareErrorsAreHigh.remediationNetwork=Paranna verkon vakautta päivittämällä internetyhteydet uudempiin versioihin, tekemällä vianmäärityksen yhteysongelmille ja varmistamalla riittävän kaistanleveyden yhteistyötä tukeville työkaluille.
exp.CollaborationSoftwareErrorsAreHigh.remediationUpdates=Tarkista ja asenna säännöllisesti ohjelmistopäivitykset ja korjaustiedostot sen varmistamiseksi, että tunnetut virheet ja yhteensopivuusongelmat korjataan.
exp.CollaborationSoftwareErrorsAreHigh.suggestedRemediations=Ehdotetut korjaustoimet:
exp.CollaborationSoftwareErrorsAreHigh.title=Yhteistyöohjelmiston virheiden korjaaminen
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.appsCausingHighCpu=Eniten prosessoritehoa käyttävät sovellukset näytetään Runsaasti prosessoria käyttävät sovellukset -sarakkeessa.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeBackgroundProcesses=Useat taustaprosessit ja -palvelut, kuten järjestelmäpäivitykset, virustorjunta ja muut ylläpitotehtävät, voivat käyttää prosessorin kapasiteettia ja aiheuttaa korkean käyttöasteen.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeFirmwareBug=Laiteohjelmistovirhe voi aiheuttaa sen, että prosessorin käyttöaste on odotettua korkeampi.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeMalfunctioningSoftware=Heikosti optimoitu tai virheellisesti toimiva ohjelmisto voi aiheuttaa liiallista prosessorin käyttöä, etenkin jos se on juuttunut silmukkaan tai käyttää resursseja tehottomasti.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeResourceIntensiveApps=Runsaasti resursseja käyttävien sovellusten, kuten videoeditorien, virtuaalikoneiden tai monimutkaisten laskelmien, suorittaminen voi kuluttaa merkittävästi suorittimen resursseja, mikä puolestaan johtaa korkeaan käyttöasteeseen.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.closeHighCpuApps=Sulje sovellukset, jotka käyttävät eniten prosessoria.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.connectAcAdapter=Kytke verkkovirtalaitteeseen, sillä prosessorin suorituskyky saattaa olla heikompi akun varassa, riippuen laitteen virta-asetuksista.
