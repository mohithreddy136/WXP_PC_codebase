welcome.daas.presence.terms=Palvelun {app_name} tilaukset ja/tai siihen kuuluvat komponentit voivat vaihdella alueittain tai valtuutettujen palvelun {app_name} huoltokumppanien mukaan. Kysy lisätietoja oman käyttöpaikkasi tarjonnasta paikalliselta HP-edustajalta tai valtuutetulta palvelun {app_name_short} kumppanilta. HP:n palveluita määrittävät palvelukohtaiset ehdot, jotka on luovutettu tai joiden sijainti on ilmoitettu asiakkaalle ostotapahtuman yhteydessä. Asiakkaalla voi lisäksi olla muita sovellettavien lakien mukaisia oikeuksia, joihin HP:n palveluehdot tai HP-tuotteeseen kuuluva rajoitettu takuu eivät vaikuta millään tapaa.
welcome.daas.presence.terms_p=Palvelun {app_name} tilaukset ja/tai siihen kuuluvat komponentit voivat vaihdella alueittain tai valtuutettujen palvelun {app_name} huoltokumppanien mukaan. Kysy lisätietoja oman käyttöpaikkasi tarjonnasta paikalliselta HP-edustajalta tai valtuutetulta palvelun {app_name} kumppanilta. HP:n palveluita määrittävät palvelukohtaiset ehdot, jotka on luovutettu tai joiden sijainti on ilmoitettu asiakkaalle ostotapahtuman yhteydessä. Asiakkaalla voi lisäksi olla muita sovellettavien lakien mukaisia oikeuksia, joihin HP:n palveluehdot tai HP-tuotteeseen kuuluva rajoitettu takuu eivät vaikuta millään tapaa.
