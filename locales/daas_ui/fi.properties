poly.lens.addon.details.description=Hallitse koko organisaation HP:n yhteistyölaitekantaa selkeästi ja luottavaisin mielin. Virtaviivaisesta käyttöönotosta ja vaivattomasta ylläpidosta aina proaktiiviseen seurantaan ja merkityksellisiin syvällisiin tietoihin – IT-tiimit saavat keskitetyn hallinnan tiloihin, huoneisiin ja laitteisiin. Turvallinen, pilvipohjainen hallinta ja saumaton tuki hybridityölle takaavat, että voit vähentää operatiivisia kustannuksia, ennakoida ongelmia ja tarjota yhdenmukaisen ja luotettavan käyttökokemuksen, työskentelivätpä tiimisi missä tahansa.
poly.lens.addon.feature.centralized.header=Keskitetty henkilökohtaisten laitteiden hallinta
poly.lens.addon.feature.centralized.text=Tarjoa HP Poly Studio -sovellusten avulla saumaton itsepalvelukokemus loppukäyttäjille samalla, kun IT-tiimit ylläpitävät keskitettyä näkyvyyttä ja hallintaa henkilökohtaisiin laitteisiin. Hallitse varastoja, päivityksiä, seurantaa ja syvällisiä tietoja luottavaisin mielin, työskentelivätpä tiimisi missä tahansa.
poly.lens.addon.feature.effortless.maintenance.header=Vaivaton ylläpito
poly.lens.addon.feature.effortless.maintenance.text=Hallitse koko laitekannan asetuksia, ominaisuuksia ja ohjelmistopäivityksiä mahdollisimman vähäisellä vaivalla. Ota käyttöön asetuksia, valmistelupäivityksiä ja kokoonpanojen hienosäätöä laajassa mittakaavassa tinkimättä hallinnasta tai tarkkuudesta.
poly.lens.addon.feature.meaningful.measurement.header=Merkitykselliset mittaukset
poly.lens.addon.feature.meaningful.measurement.text=Ymmärrä, miten laitteet, tilat ja ihmiset aidosti toimivat. Muuta käyttö- ja suorituskykytiedot älykkäämmiksi, yhteistyöinvestointeja koskeviksi datapohjaisiksi päätöksiksi.
poly.lens.addon.feature.proactive.monitoring.header=Proaktiivinen seuranta
poly.lens.addon.feature.proactive.monitoring.text=Ennakoi ongelmia selkeällä näkyvyydellä laitteen kunnon ja tilan osalta. Saat hälytyksen, kun jokin on vialla, joten ongelmat voidaan korjata, ennen kuin ne keskeyttävät tapaamisia.
poly.lens.addon.feature.secure.header=Turvallinen, pilvipohjainen hallinta
poly.lens.addon.feature.secure.text=Hallitse kaikkea luotettavalta pilvipohjaiselta alustalta, joka skaalautuu organisaatiosi kasvun mukaan ja täyttää samalla yrityksesi tietoturva- ja vaatimustenmukaisuustarpeet.
poly.lens.addon.feature.simplified.deployment.header=Yksinkertaistettu käyttöönotto
poly.lens.addon.feature.simplified.deployment.text=Valmistele, esimääritä ja ota laitteita käyttöön luottavaisin mielin. Automatisoidut perehdytystyönkulut vähentävät määritykseen kuluvaa aikaa, vähentävät virheitä ja saavat laitteet käyttövalmiiksi, ennen kuin ne saapuvat käyttäjän luo tai huoneeseen.
poly.lens.addon.subtitle=Pilvipohjainen hallinta ja oivaltavat tiedot yhteistyötiloissa, huoneissa ja laitteissa.
