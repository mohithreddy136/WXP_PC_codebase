requirements.list.proSecurity.windows.supportLifecycle.content1=HP:n palvelutasotavoitteena on tarjota tukea kolmelle uusimmalle Windows 10:n osavuosittaisen kanavan julkaisulle.
requirements.list.proSecurity.windows.supportLifecycle.content2=HP:n tavoitteena on, että Wolf Pro Security alkaa tukea uutta käyttöjärjestelmäjulkaisua 30 päivän kuluessa siitä, kun kyseinen julkaisu on tullut saataville osavuosittaisen kanavan (\"SAC\") kautta. Väliaikaisia tai ennakkoon julkaistavia Windows Insider -koontiversioita ei tueta. Lisätietoja Windows-käyttöjärjestelmien julkaisuista on osoitteessa <a href='https://docs.microsoft.com/en-us/windows/release-information/' target='_blank'>https://docs.microsoft.com/en-us/windows/release-information/</a>.
requirements.list.proSecurity.windows.supportLifecycle.content3=Jotta vanhoja Windows-versioita käyttävillä asiakkailla olisi riittävästi aikaa päivittää uudempiin julkaisuihin, HP jatkaa neljänneksi uusimman julkaisun (tällä hetkellä Windows 10 v1903) tukemista vähintään 90 päivää sen jälkeen, kun Wolf Pro Securityyn on lisätty tuki uusimmalle osavuosittaisen kanavan julkaisulle. Tämän jälkeen vanhojen käyttöjärjestelmäjulkaisujen tuki päättyy. Sama tukikäytäntö koskee myös Windows 10:n pitkän aikavälin ylläpitokanavan julkaisuja. Kyseiset järjestelmät täytyy siis myös päivittää yllä kuvaillun käytännön mukaisesti.
requirements.list.proSecurity.windows.supportLifecycle.content4=Sure Click Pron tuki Windows 10 v2004:lle julkaistiin 31.7.2020. Windows 10 v1809:n tuki lopetetaan 31.10.2020.
requirements.list.proSecurity.windows.supportLifecycle.content5=HP Proactive Security ei tue Windows 7- tai 8.1 -versioita
requirements.list.proSecurity.windows.supportLifecycle.content6=Sure Click Pron tuki Windows 10 v20H2:lle julkaistiin 18. marraskuuta 2020. Windows 10 v1903:n tuki päättyi 16. helmikuuta 2021.
requirements.list.proSecurity.windows.supportLifecycle.content7=HP julkaisi Sure Click Pro -uhkien rajoitustuen Windows 10 -versiolle 21H1 5.7.2021. Windows 10 -version 1909 tuki loppuu 3.10.2021.
