azureonboard.marketing.signupsection.description=Ennakoivien tietojen ansiosta saat käyttöösi tietokoneen kuntotiedot ja ennakoivat tiedot kaikista rekisteröidyistä laitteista, joilla pystyt tekemään parempia päätöksiä ja tunnistamaan ongelmia, jotta ne voidaan ratkaista ennen kuin ne vaikuttavat liiketoimintaan.
azureonboard.marketing.signupsection.heading=Rekisteröidy nyt!
banner.iot.update.description=TechPulse-alustan infrarakenteen muutos otetaan käyttöön maanantaina 27.2.2023. Sinua voidaan pyytää päivittämään välityspalvelin, palomuuri ja SSL:n tarkastusohjelmiston asetukset. Suorita verkon arviontityökalu kohteessa <a href='https://www.hpdaas.com/software' target='_blank'>HP TechPulse - Software (hpdaas.com)</a> ja tarkista, palauttaako joku neljästä (4) *.IoT -testikohteista viestin ‘Fail’. Jos testi epäonnistuu, seuraa seuraavia ohjeita: ”<b><a href='https://hp.service-now.com/techpulse_kb?id=kb_article&sysparm_article=KB0011291' target='_blank'>KB0011291</a> - Välityspalvelimen tai palomuurin konfigurointi”</b> ja <b>tee muutokset torstaihin 23.2.2023 mennessä</b>.
