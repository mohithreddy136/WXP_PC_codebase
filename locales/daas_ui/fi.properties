wex.ra.remediation.missing_windows_security_updates=Workforce Experience Platform -alustan tietoturvan koontinäyttö sisältää KPI:t, jotka näyttävät niiden laitteiden määrän, joista puuttuu Windowsin tietoturvapäivityksiä.
