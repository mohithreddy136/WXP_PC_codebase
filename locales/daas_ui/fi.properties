requirements.proactive_security_system.para1=The HP Service Level Objective is to provide support for the most current 3 Windows 10 Semi-Annual Channel releases.
requirements.proactive_security_system.para2=HP's objective is to release support of the new OS release for Sure Click Advanced within 30 days of its availability to the Semi-Annual Channel ("SAC"). Interim or pre-release Windows Insider builds are not supported. For more information about Windows OS releases, please see https://docs.microsoft.com/en-us/windows/release-information/.
requirements.proactive_security_system.para3=To ensure customers on older Windows ver sions have adequate time to upgrade to the more current releases, HP will continue to support the 4th most current release (currently Windows 10 v1809) for at least 90 days after support for the newest Semi-Annual Channel release is available in Sure Click Advanced. After this period, support for the older OS release will end. The same support policy applies to Long Term Service Channel releases of Windows 10. Thus, those systems will also need to be updated according to the policy listed above.
requirements.proactive_security_system.para4=Sure Click Advanced support for Windows 10 v20H2 was released on November 18, 2020. Support will be withdrawn for Windows 10 v1903 effective February 16, 2021.
requirements.proactive_security_system.para5=Sure Click Advanced support for Windows 10 v2004 was released on July 31, 2020. Support will be withdrawn for Windows 10 v1809 effective October 31, 2020.
