exp.AntivirusSignatureUpdatesNeeded.deviceRemediation=Laitteen korjaus:
exp.AntivirusSignatureUpdatesNeeded.option1=Vaihtoehto 1: Muun kuin Microsoftin keskitetyn hallinnan virustorjuntaratkaisuissa organisaation virustorjuntaohjelmiston järjestelmänvalvojan tulisi määrittää käytäntö siten, että päivitys tehdään vähintään kerran viikossa (suositus).
exp.AntivirusSignatureUpdatesNeeded.option2=Vaihtoehto 2: Käyttäjän hallitsemien virustorjuntaratkaisujen tapauksessa käyttäjän tulisi avata virustorjunnan järjestelmänvalvojakonsoli ja noudattaa ohjeita allekirjoituspäivityksen ajastamiseksi tai käynnistämiseksi. On suositeltavaa, että virustorjuntaratkaisu määritetään lataamaan päivitykset vähintään kerran viikossa.
