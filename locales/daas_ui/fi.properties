exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation3.step1=Reitittimen laiteohjelmiston säännöllinen päivittäminen voi auttaa korjaamaan häiriöitä ja yhteysongelmia. Jotkin reitittimet voivat asentaa päivitykset automaattisesti, mutta useimmat edellyttävät manuaalisia päivityksiä.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation4=Muuta reitittimen taajuutta
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation4.step1=Wi-Fi-reitittimet määrittävät automaattisesti taajuusalueen, mutta voit kokeilla muuttaa sen 2,4 GHz:stä 5 GHz:iin ja katsoa, kasvattaako se nopeuksia. Tarkista ennen tämän tekemistä, tukeeko reitittimesi 5 GHz:n taajuutta.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation5=Päivitä Wi-Fi-ohjaimet
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation5.step1=Vanhentuneet tai vioittuneet ohjaimet voivat aiheuttaa verkko-ongelmia, joten varmista, että Wi-Fi-sovittimesi on ajan tasalla.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation6=Vältä häiriöitä
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation6.step1=Kanavahäiriöt voivat heikentää merkittävästi nopeuksia ja hidastaa tiedonsiirtoa, joten yritä poistaa mahdolliset häiriötekijät.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation7=Tarkista muut laitteet
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation7.step1=Katso, mitä muita laitteita on yhdistettynä verkkoosi ja mitä ne tekevät. Jos toinen laite esimerkiksi lataa paljon tietoja, se voi vaikuttaa nopeuksiin.
