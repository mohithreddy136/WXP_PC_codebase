exp.ExcessiveOsStartupTime.option3Guide=Sovellukset, jotka eivät käynnisty automaattisesti käynnistyksen yhteydessä, voivat myös hidastaa kirjautumiseen kuluvaa aikaa, sillä nämä sovellukset voivat sisältää tiedostoja, palveluita ja rekisterimerkintöjä, jotka on saatettu ladata osittain. Ilmaisinalueen sovellukset ovat esimerkkejä käynnissä olevista sovelluksista, vaikka sovellus ei olisikaan käynnissä avoinna olevassa ikkunassa. Tarkasta ja poista tarpeettomat sovellukset seuraavien ohjeiden mukaan. Huomautus: Joidenkin sovellusten poistaminen saattaa edellyttää järjestelmänvalvojan oikeuksia.
