side_panal.smart_refresh.help_sec1_header=Miten se toimii
side_panal.smart_refresh.help_sec1_point_1_desc=Arvioi jokaista laitetta yhdeksän datapisteen kautta, ja arvioinnin yhteenveto näytetään Päivityksen kiireellisyyspisteinä*. Tämä pisteytys auttaa sinua priorisoimaan yksittäisiä riskialttiita laitteita välttyäksesi käyttäjien tuottavuuden häiriöiltä.
side_panal.smart_refresh.help_sec1_point_1_title=1. Tunnista
side_panal.smart_refresh.help_sec1_point_2_desc=Tekoälymalli ryhmittää laitteet erillisiksi laitteisto- ja ohjelmistopersooniksi käytön perusteella. Nämä persoonat voivat auttaa opastamaan, mikä on oikea vaihtolaite.
side_panal.smart_refresh.help_sec1_point_2_title=2. Luokittele
side_panal.smart_refresh.help_sec1_point_3_desc1=Jos työskentelet HP-kumppanin kanssa, Smart Refresh suosittelee vaihtamista laitekohtaisesti. Nämä suositukset ovat peräisin kyseisen henkilön tehokkaimmista malleista, jotka ovat saatavilla kumppanisi lataamasta luettelosta. Jos et näe laitesuosituksia tai näkemäsi laitteet ovat vanhentuneita, ota yhteyttä kumppaniisi ja pyydä uutta luetteloa.
side_panal.smart_refresh.help_sec1_point_3_desc2=Jos et työskentele HP-kumppanin kanssa, et näe laitesuosituksia Älykkäässä päivityksessä. Ota yhteyttä HP-tilivastaavaan saadaksesi tiedon parhaista vaihtomalleista.
side_panal.smart_refresh.help_sec1_point_3_desc3=Viimeisin luettelon latauspäivämäärä:
side_panal.smart_refresh.help_sec1_point_3_title=3. Suosittele
side_panal.smart_refresh.help_sec1_point_4_desc=Käytä Valmis-päivitystilaa poistaaksesi tietokoneet, jotka eivät vaadi päivitystä tai joita ei voida juuri nyt päivittää. Voit tarkastella näitä laitteita ja muuttaa niiden tilan takaisin Edellyttää toimenpiteitä -tilaan, jolloin ne näkyvät taas tietokoneluettelossa
side_panal.smart_refresh.help_sec1_point_4_title=4. Tilat
side_panal.smart_refresh.help_sec2_description=Miten määrittelemme, milloin laite tulee vaihtaa
