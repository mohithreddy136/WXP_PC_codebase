azureonboard.marketing.signupcard.description=Saat käyttöösi PC Health -ohjelmiston ja ennakoivia tietoja, joiden avulla saat tehtyä parempia päätöksiä ja ratkaistua ongelmia ennen kuin ne vaikuttavat liiketoimintaasi.
azureonboard.marketing.signupcard.footertext=Valitsemalla painikkeen hyväksyn <a target='_blank' href={termsLink}>käyttöehdot</a> ja suostun antamaan tiedot, joita vaaditaan tilin rekisteröimiseen. Suostun myös vastaanottamaan kokeilujaksoa koskevia sähköpostiviestejä HP:lta tai HP:n kumppaneilta.
