account_management.subscriptions.addon.anyware.features.remote_access.desc=Loppukäyttäjät voivat käyttää tietokoneita etänä suojatusti ilman VPN:ää. HP Anyware tarjoaa yksinkertaistetun pääsyn pilviyhdyskäytävien kautta.
account_management.subscriptions.addon.anyware.features.role_access.desc=Suorita käyttäjien määrityksiä ja istuntojen reitityksiä ilman tarvetta asentaa porttia muihin ympäristöihin
account_management.subscriptions.addon.anyware.features.role_cloud_gateways=Yksinkertaistettu pääsy pilviporttien kautta
account_management.subscriptions.addon.anyware.features.setup=Mikä tahansa IT-ympäristö ja vaivaton asennus
account_management.subscriptions.addon.anyware.features.setup.desc=Joustava, helppokäyttöinen ratkaisu, joka yksinkertaistaa käyttöönottoa ja hallintaa erinäisten infrastruktuurien välillä, mukaan lukien paikallisen, pilvipohjaisen ja hybridiympäristön välillä, vähentäen samalla IT:n monimutkaisuutta ja rasitusta.
account_management.subscriptions.addon.anyware.features.workforce_integration=Workforce Experience -integraatio
account_management.subscriptions.addon.anyware.features.workforce_integration.desc=IT-osasto voi keskittää etätyöpöytätiedot Workforce Experience Platform -alustalle ja tarjota näin keskitetyn näkymän laitekannasta.
account_management.subscriptions.addon.anyware.header=HP Anyware
account_management.subscriptions.addon.anyware.overview.desc1=HP Anyware on korkean suorituskyvyn ohjelmistoratkaisu, joka tarjoaa käyttäjille suojatun pääsyn etä- tai virtuaalitietokoneisiinsa ilman VPN-yhteyttä. HP Anyware sisältää käyttöoikeuden HP Anyware Manager Enterprise -nimiseen IT-hallintaympäristöön.
account_management.subscriptions.addon.anyware.overview.desc2=HP Anyware Manager Enterprise (AME) on usean vuokraajan hallintapaneeli, jossa IT-tiimi voi hallinnoida sekä fyysisiä että virtuaalisia tietokoneita.
account_management.subscriptions.addon.anyware.required_components.header=Workforce Experience -integraation edellyttämät komponentit
account_management.subscriptions.addon.anyware.required_components.li1=HP Anyware Standard
account_management.subscriptions.addon.anyware.required_components.li2=HP Anyware Manager Enterprise
account_management.subscriptions.addon.anyware.security_compliance=Tietoturva ja vaatimustenmukaisuus
account_management.subscriptions.addon.anyware.security_compliance.desc1=HP Anyware priorisoi tietoturvan ja vaatimustenmukaisuuden kaikissa tuotteissaan varmistaakseen vankan suojauksen ja alan standardien noudattamisen. Tärkeimpiä ominaisuuksia ovat päästä päähän -salaus, turvallinen etäkäyttö ja monivaiheinen todennus, jotka turvaavat tietojen eheyden ja luottamuksellisuuden.
account_management.subscriptions.addon.anyware.security_compliance.desc2=HP Anyware integroi myös kehittyneet uhkien havaitsemis- ja reagointiominaisuudet riskien ennakoivaan vähentämiseen. Säännösten, kuten GDPR, HIPAA ja SOC 2, noudattaminen korostaa HP Anywaren sitoumusta ylläpitää tiukkoja tietoturvaprotokollia. Jatkuva valvonta ja säännölliset tietoturvatarkastukset varmistavat, että HP Anyware -tuotteet pysyvät vastustuskykyisinä uusia verkkouhkia vastaan ja tarjoavat käyttäjille turvallisen ja luotettavan IT-hallintakokemuksen.
account_management.subscriptions.addon.anyware.technology=Etäkäyttötekniikka
account_management.subscriptions.addon.anyware.technology.desc=HP Anywaren palkittu PCoIP®-etänäyttötekniikka tarjoaa korkealaatuisen ja erittäin responsiivisen tietokoneiden käyttökokemuksen myös haastavissa verkko-olosuhteissa.
account_management.subscriptions.addon.anyware.technology.desc.li1=PCoIP® koodaa, pakkaa, salaa ja siirtää kuvapikselit keskuspalvelimelta tai työasemalta.
account_management.subscriptions.addon.anyware.technology.desc.li2=Sitten se purkaa kuvan salauksen ja pakkauksen käyttäjille lähes millä tahansa päätelaitteella.
account_management.subscriptions.addon.connect_accounts=Yhdistä tilit
account_management.subscriptions.addon.oob.desc.short=BIOS-tason etähallinta kehittynyttä diagnostiikkaa ja korjaustoimenpiteitä varten
account_management.subscriptions.addon.oob.desclaimer1=1. Kaistan ulkopuolinen diagnostiikka ja korjaus ovat saatavilla lisenssinä eri pituisina kausina, ja ne ovat toimittajasta riippumattomia kaikille tietokoneille, joissa on Intel® vPro® Enterprise- ja Intel® AMT -tuki. Sisältää ja edellyttää Workforce Experience Platform Starter -palvelun ohjelmistoratkaisun hallinnointia ja ylläpitoa varten. Saatavilla Yhdysvalloissa, Kanadassa ja EU:ssa HP-edustajilta tai HP:n valtuutetuilta jälleenmyyjiltä. Katso lisätietoja osoitteesta (lisää URL-linkki lisenssin käyttöehtoihin/EULAan).
account_management.subscriptions.addon.oob.desclaimer2=2. Perustuu HP:n omiin testeihin, joissa analysoitiin PC-valmistajia, joilla on virrankatkaisun valvonta, ei-OS-ohjaus, BIOS-ohjaus ja näennäistiedostojen ohjaus; tiedot 24.9.2024.
account_management.subscriptions.addon.oob.desclaimer3=3. HP Insights agentti on pakollinen ja se on telemetria- ja analytiikkasovellus, joka tarjoaa laitteita ja sovelluksia koskevia kriittisiä tietoja. Sitä ei myydä erillisenä palveluna, ja se on ISO27001-, ISO27701-, ISO27017- ja SOC2 Type2 -sertifioitu tietoturvan osalta. Edellyttää Internet-yhteyttä, jolla pääsee portaaliin. Täydet järjestelmävaatimukset ovat nähtävillä osoitteessa http://www.hpdaas.com/requirements. Kaikkien HP Insightsia tukevien palveluiden osto vaatii, että ohjelmiston suorittaminen sallitaan kullakin laitteella. HP-palveluskannaus toimitetaan tietyissä HP-laitteissa Windows Update -toiminnon kautta, joka tarkastaa kelpoisuuden kullakin laitteella sen määrittämiseksi, onko ominaisuutta tukeva palvelu ostettu ja lataa soveltuvan ohjelmiston automaattisesti. Poistaaksesi toiminnon käytöstä seuraa ohjeita osoitteessa <a target='_blank' href='http://www.hpdaas.com/requirements' style=\"text-decoration:none; color:#4D52E5\">http://www.hpdaas.com/requirements</a>
account_management.subscriptions.addon.oob.desclaimer4=4. WXP Starter sisältyy ja vaaditaan ohjelmistoratkaisun hallinnointia ja ylläpitoa varten.
account_management.subscriptions.addon.oob.features.remote_control=Remote control - even when the Operating System is down
account_management.subscriptions.addon.oob.features.remote_control.desc=IT pääsee etänä käsiksi BIOSiin ja voi käynnistää uudelleen, uudelleenasentaa ja palauttaa erimerkkisiä tietokoneita siellä, missä työ tehdään.
account_management.subscriptions.addon.oob.features.scalable=Skaalattava, keskitetty hallinta
account_management.subscriptions.addon.oob.features.scalable.desc=Yksinkertaista tietokoneiden hankintaa, lisenssien joukkohallintaa ja roolipohjaista käyttöoikeuksien hallintaa tällä ominaisuudella, joka integroituu WXP:hen yrityksille käyttöönottoon, hyödyntämiseen ja hallintaan.
account_management.subscriptions.addon.oob.features.secure=Suojattu loppukäyttäjäkokemus
account_management.subscriptions.addon.oob.features.secure.desc=Käyttäjät näkevät etäistunnot ja voivat katkaista yhteyden koska tahansa. Turvallinen, saumaton tuki rakentaa luottamusta ja parantaa käyttökokemusta.
account_management.subscriptions.addon.oob.header=Kaistan ulkopuolinen etäyhteys
account_management.subscriptions.addon.oob.overview.desc1=Etsitkö parannettuja digitaalisia kokemuksia hybridityöhön? HP:n kaistan ulkopuolinen etäyhteys antaa teknisen tuen henkilöstölle BIOS-etäyhteyden, jonka avulla he voivat käynnistää uudelleen, asentaa uudelleen ja palauttaa tietokoneita, vaikka käyttöjärjestelmä ei toimisi. Ei käyttäjän väliintuloa, ei käyntiä paikan päällä.
