wex.onboarding.coachmark.alerts.active.desc=Alle aktiven Warnmeldungen für Ihr Unternehmen sind hier zu finden, mit wichtigen Informationen wie Status, Schweregrad und Auslösungszeitpunkt. IT-Administratoren können die Alarme an die Bedürfnisse der Organisation anpassen: Ändern Sie Schwellenwerte und Schweregrade und deaktivieren Sie Alarme, die Sie nicht benötigen.
wex.onboarding.coachmark.alerts.desc=Überwachen Sie aktive Probleme in Ihrer Flotte, die konfigurierte Grenzwerte überschritten haben. Überprüfen Sie schnell wichtige Details wie Problemübersichten, Schweregrade und Auswirkungen, bevor Sie Maßnahmen zur Behebung ergreifen.
wex.onboarding.coachmark.alerts.managed.desc=Hier können mehr als 30 vorkonfigurierte Warnmeldungen angezeigt werden, um besser auf die Bedürfnisse Ihres Unternehmens eingehen zu können.
wex.onboarding.coachmark.alerts.mangagedHover=Bewegen Sie den Mauszeiger über eine beliebige Meldung, um die Optionen aufzurufen. Passen Sie die Warnungen an die Bedürfnisse Ihres Unternehmens an, indem Sie den Inhalt, den Schweregrad und den flottenweiten Grenzwert, der die Warnung auslöst, anpassen.
wex.onboarding.coachmark.alerts.options=Bewegen Sie den Mauszeiger über eine beliebige Meldung, um das Optionsmenü aufzurufen. Passen Sie die Warnungen an die Bedürfnisse Ihres Unternehmens an, indem Sie den Inhalt, den Schweregrad und den flottenweiten Grenwzert, der die Warnung auslöst, anpassen.
wex.onboarding.coachmark.alerts.title=Benachrichtigungen verwalten
wex.onboarding.coachmark.alerts.viewAlerts=Sie können die bestehenden Warnmeldungen Ihrer Organisation jederzeit einsehen. Eine Warnung wird automatisch erstellt, wenn voreingestellte Schwellenwerte überschritten werden.
wex.onboarding.coachmark.alerts.viewAll=Anzeigen der von Ihrem Unternehmen konfigurierten Warnmeldungen. Verwalten Sie die Warnmeldungen selbst und wählen Sie sogar aus, welche Rollen Alarmbenachrichtigungen erhalten sollen.
