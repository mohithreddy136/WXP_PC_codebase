exp.ExcessiveOsShutdownTime.causeEventLog=Das Schließen des Windows-Ereignisprotokolls nimmt übermäßig viel Zeit in Anspruch.
exp.ExcessiveOsShutdownTime.causeGroupPolicy=Die Aktualisierung der Gruppenrichtlinien nimmt viel Zeit in Anspruch.
exp.ExcessiveOsShutdownTime.causeShutdownScripts=Die Ausführung von Skripten zum Herunterfahren nimmt übermäßig viel Zeit in Anspruch.
exp.ExcessiveOsShutdownTime.causeSlowDrive=Eine langsame Festplatte benötigt übermäßig viel Zeit, um den Inhalt der Auslagerungsdatei aus dem virtuellen Speicher zu löschen.
