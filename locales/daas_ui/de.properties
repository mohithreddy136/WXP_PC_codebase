digitalExpScore.dashboard.coachmark.step1.msg1=1. Widget-Bewertungen zeigen den Zustand des Gerätebestands in drei Kategorien an.
digitalExpScore.dashboard.coachmark.step1.msg2=2. Bewertungen werden täglich aktualisiert.
digitalExpScore.dashboard.coachmark.step1.msg3=3. Benchmarks und Wochenvergleiche werden wöchentlich aktualisiert.
digitalExpScore.dashboard.coachmark.step2.msg1=Wenn Sie auf eine beliebige Stelle innerhalb einer Karte klicken, wird die Registerkarte „Erfahrungsmanagement“ geöffnet, auf der Sie Details zu Komponenten sehen, die den Wert beeinflussen, und erfahren, wie Sie den Wert verbessern können.
digitalExpScore.dashboard.coachmark.step3.msg1=1. Weitere Informationen zu dieser Funktion finden Sie im Wissensartikel.
digitalExpScore.dashboard.coachmark.step3.msg2=2. Starten Sie dieses Tutorial erneut über das Menü „Hilfe und Information“.
digitalExpScore.dashboard.coachmark.step3.msg3=3. Navigieren Sie direkt zum Bereich "Hilfe und Support" im Navigationsbereich.
digitalExpScore.dashboard.coachmark.title1=NEU! Bewertungen für Experience-Management
digitalExpScore.dashboard.coachmark.title2=Weitere Informationen
digitalExpScore.experienceMgmt.coachmark.grid.msg1=1. Bewertungen basieren auf Analysen aus mehreren Telemetriequellen.
digitalExpScore.experienceMgmt.coachmark.grid.msg2=2. The table shows telemetry components, telemetry weighting, week to week change and each component's current score.
digitalExpScore.experienceMgmt.coachmark.recommendedActions.msg1=1. Empfohlene Aktionen bieten Optionen zur Abhilfe.
digitalExpScore.experienceMgmt.coachmark.recommendedActions.msg2=2. Die Auswahl von "Störung anzeigen" führt zu den Proactive Insights-Störungen, wo ein Support-Ticket erstellt werden kann.
digitalExpScore.experienceMgmt.coachmark.recommendedReports.msg1=1. Clicking View Report provides a report sorted by severity of devices needing improvements for the named telemetry component.
digitalExpScore.experienceMgmt.coachmark.recommendedReports.msg2=2. Der ausgewählte Bericht wird in einem neuen Browserfenster geöffnet.
digitalExpScore.experienceMgmt.coachmark.tabs=Unterregisterkarten enthalten zusätzliche Informationen für jeden Digital Experience Score.
digitalExpScore.experienceMgmt.coachmark.trendChart.msg1=1. Widgets mit Zeitinformationen visualisieren Trends im Lauf der Zeit.
digitalExpScore.experienceMgmt.coachmark.trendChart.msg2=2. Mit diesem Widget können Sie visuell anzeigen, ob ergriffene Maßnahmen den Digital Experience Score verbessern.
