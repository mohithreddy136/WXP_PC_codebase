wex.fleet.mgmt.score.tooltip=Die Erfahrung basiert auf der niedrigsten Erfahrung von allen Werten.
wex.fleet.mgmt.troubleshoot.linux_firewall_disabled.description=Durch das Aktivieren der Firewall wird das System vor unbefugtem Zugriff, netzwerkbasierten Angriffen und unerwünschtem Datenverkehr geschützt, indem eingehende und ausgehende Verbindungen kontrolliert werden. Dies ist ein entscheidender Schritt zur Absicherung von Linux-Systemen, insbesondere solcher, die öffentlichen oder Unternehmensnetzwerken ausgesetzt sind.
