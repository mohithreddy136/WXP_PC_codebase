dnto.subscriptions.privacy_statement.desc1=HP erkennt an, dass der Schutz der Privatsphäre ein grundlegendes Menschenrecht ist; des Weiteren erkennt HP die Bedeutung des Schutzes der Privatsphäre sowie von Sicherheit und Datenschutz für unsere Kunden und Partner weltweit an. Als globale Organisation mit juristischen Einheiten, Geschäftsprozessen, Managementstrukturen und technischen Systemen, die internationale Grenzen überschreiten, sind wir bemüht, für alle unsere Tätigkeiten Schutz zu bieten, der über das rechtliche Minimum hinausgeht, und konsistente, strenge Richtlinien und Verfahren bereitzustellen.
dnto.subscriptions.privacy_statement.desc2=Begriffe wie „wir“, „uns“, „unser“ und „Unternehmen“, wie sie in dieser Erklärung verwendet werden, beziehen sich gemäß lokaler Gesetzgebung auf HP Anbieter sowie auf aktuelle und künftige Partner (nachstehend „HP“). Kontaktinformationen des HP Datenschutzbeauftragten finden Sie im Abschnitt „{0}“ unten.
dnto.subscriptions.privacy_statement.exercise_rights=Ausübung Ihrer Rechte und Kontaktaufnahme
dnto.subscriptions.privacy_statement.heading=HP Datenschutzerklärung
dnto.subscriptions.section.details.desc1=Die Arbeitnehmerinnen und Arbeitnehmer sind an flexibles Arbeiten gewöhnt und fordern diese Flexibilität in Bezug auf Arbeitsmethoden und Arbeitszeiten auch ein. IT-Teams, die über ihre Grenzen hinaus belastet sind, beeinträchtigen die Mitarbeitererfahrung, die Produktivität und das Engagement.
dnto.subscriptions.section.details.desc2=HP Workforce Experience Pro antizipiert digitale Reibung auf intelligente Art und behebt sie auf einer konsolidierten und modularen Plattform.
dnto.subscriptions.section.details.desc3=Ob Sie nun ein kleines Team an einem Standort leiten oder durch die Komplexität einer globalen und hybriden Belegschaft navigieren, HP Workforce Experience Pro bietet Ihnen eine vereinheitlichte Plattform, um die digitale Erfahrung Ihrer Mitarbeiterinnen und Mitarbeiter zu unterstützen und zu optimieren.
dnto.subscriptions.section.details.desc4=Steigern Sie die Mitarbeiterproduktivität, indem Sie IT-Probleme lösen, bevor sie entstehen. Reduzieren Sie mithilfe fortschrittlicher KI die Arbeitszeit und die Kosten des IT-Supports. Stärken Sie die Endpunkt-Sicherheit durch Vorhersage und Beseitigungen von Bedrohungen.
dnto.subscriptions.section.details.desc5=Verbessern Sie das Mitarbeiterklima mit umsetzbaren Erkenntnissen von Pulse-Umfragen. Optimieren Sie Kosten mit intelligenten Hardware-Aktualisierungen. Nutzen Sie die nahtlose Integration in vorhandene Multivendor- und Multi-OS-Umgebungen.
dnto.subscriptions.section.details.heading=Abonnementdetails
dnto.subscriptions.sign_in=Bei HP Workforce Experience anmelden
dnto.subscriptions.thank_you.desc=Vielen Dank, dass Sie sich für HP Workforce Experience entschieden haben. Wir sind zuversichtlich, dass Sie höhere Produktivität und bessere Zusammenarbeit erreichen werden. Zögern Sie bei Fragen nicht, unsere umfassenden Support-Ressourcen zu konsultieren oder unser hilfreiches Kundenservice-Team zu kontaktieren.
