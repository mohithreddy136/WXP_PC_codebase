wex.onboarding.coachmark.add.devices.AddOption=Es gibt zwei Methoden, um Geräteidentitätsdaten wie Seriennummer und Hersteller in WXP zu laden. Entscheiden Sie sich für die richtige Lösung, dann wird dieser Arbeitsablauf äußerst effektiv sein.
