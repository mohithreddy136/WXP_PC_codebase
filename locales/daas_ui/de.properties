wex.onboarding.coachmark.add.devices.SelectGroup=Hier können Sie die zu synchronisierenden Gruppen und Betriebssysteme auswählen.
wex.onboarding.coachmark.add.devices.SlectConnectionType=Werden diese PCs Telemetriedaten senden oder nicht? Telemetriegeräte liefern Daten, die WXP für Bewertungen, Einblicke und Warnungen verwendet. Fügen Sie auch Nicht-Telemetrie-Geräte hinzu, um ein vollständigeres Inventar zu erhalten.
