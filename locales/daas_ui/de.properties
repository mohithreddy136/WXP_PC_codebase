exp.DiskUtilizationHigh.skipInUse=Wenn Sie darauf hingewiesen werden, dass eine Datei oder ein Ordner in Gebrauch ist, markieren Sie das Kontrollkästchen „Dies für alle aktuellen Elemente tun“ und wählen Sie die Schaltfläche Überspringen.
