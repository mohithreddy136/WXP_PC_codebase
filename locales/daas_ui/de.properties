wex.fleet.mgmt.recommended.desc.antivirus_not_enabled=Die Aktivierung von Microsoft Defender bietet wichtigen Schutz vor Malware und anderen Sicherheitsbedrohungen.
wex.fleet.mgmt.recommended.desc.antivirus_not_enabled_other=Die Aktivierung von Antiviren-Software schützt Geräte vor Malware und sichert Ihr System gegen Angriffe.
wex.fleet.mgmt.recommended.desc.antivirus_signature_outdated=Durch die regelmäßige Aktualisierung der Malware-Signaturen wird sichergestellt, dass Windows Defender die neuesten Bedrohungen erkennen und abwehren kann.
wex.fleet.mgmt.recommended.desc.antivirus_signature_outdated_other=Die ständige Aktualisierung der Malware-Signaturen gewährleistet einen umfassenden Schutz vor den neuesten Bedrohungen.
wex.fleet.mgmt.recommended.desc.avg_fan_speed_high=Hohe Lüftergeschwindigkeiten helfen, Überhitzung und mögliche Schäden an den internen Komponenten Ihres Geräts zu vermeiden.
wex.fleet.mgmt.recommended.desc.battery_calibrate=Die Kalibrierung der Batterie verbessert die Genauigkeit der Leistungsmessung und erhöht die Lebensdauer und Leistung der Batterie.
wex.fleet.mgmt.recommended.desc.battery_early_detection_wear=Die Vermeidung von Batterieverschleiß sorgt für einen effizienten Gerätebetrieb, gleichbleibende Leistung und eine längere Lebensdauer der Batterie.
wex.fleet.mgmt.recommended.desc.battery_needs_attention=Replacement of defective batteries can ensure good device performance, and system health. Devices which are covered by warranty may be eligible for battery replacement.
wex.fleet.mgmt.recommended.desc.bitlocker_encryption_not_enabled=Durch die Aktivierung von BitLocker werden sensible Daten durch Verschlüsselung des Laufwerks geschützt und die allgemeine Sicherheit vor unbefugtem Zugriff erhöht.
wex.fleet.mgmt.recommended.desc.bsod_occured=Die Behebung von Bluescreen-Fehlern gewährleistet die Systemstabilität, verhindert ein unerwartetes Herunterfahren und erhält die Zuverlässigkeit.
wex.fleet.mgmt.recommended.desc.cpu_utilization_high=Die Analyse der hohen CPU-Auslastung hilft, Leistungsengpässe zu vermeiden und das System reibungslos zu betreiben.
wex.fleet.mgmt.recommended.desc.disk_needs_attention=Disk performance is degrading and may soon lead to slower performance or instability if not addressed.
wex.fleet.mgmt.recommended.desc.disk_utilization_high=Das Freigeben von Speicherplatz verhindert eine Verlangsamung des Systems und sorgt für einen reibungslosen Betrieb, indem eine Überlastung des Speichers vermieden wird.
wex.fleet.mgmt.recommended.desc.docking_station_ac_adapter_failed=Durch die Behebung von Adapterfehlern wird eine konsistente Stromversorgung der Docking-Stationen gewährleistet, wodurch Verbindungsprobleme vermieden werden.
wex.fleet.mgmt.recommended.desc.docking_station_ac_adapter_running_at_reduced_perofmance=Die Verbesserung der Adapterleistung gewährleistet zuverlässige Verbindungen und eine optimale Funktionalität der Dockingstationen.
wex.fleet.mgmt.recommended.desc.docking_station_firmware_out_of_date=Firmware-Updates für Dockingstationen gewährleisten die Kompatibilität der Geräte und verbessern die Gesamtleistung des Systems.
wex.fleet.mgmt.recommended.desc.excessive_os_login_time=Durch die Verkürzung der Anmeldezeiten werden Verzögerungen reduziert und die Effizienz der Benutzer beim Systemzugang verbessert.
wex.fleet.mgmt.recommended.desc.excessive_os_shutdown_time=Die Optimierung der Abschaltzeiten minimiert die Wartezeiten und gewährleistet eine effiziente Systemabschaltung.
wex.fleet.mgmt.recommended.desc.excessive_os_startup_time=Die schnellere Startzeit beschleunigt den Zugriff auf das System und steigert die Effizienz und Produktivität der Benutzer.
wex.fleet.mgmt.recommended.desc.firewall_disabled=Die Aktivierung der Windows-Firewall hilft, unbefugten Zugriff zu verhindern und Ihr Netzwerk vor potenziellen Bedrohungen zu schützen.
wex.fleet.mgmt.recommended.desc.firewall_signature_outdated=Regelmäßig aktualisierte Firewall-Signaturen schützen vor neuen und sich weiterentwickelnden Netzwerkbedrohungen.
wex.fleet.mgmt.recommended.desc.frequent_bsod_occured=Die Behebung von Bluescreen-Fehlern gewährleistet die Systemstabilität, verhindert ein unerwartetes Herunterfahren und erhält die Zuverlässigkeit.
wex.fleet.mgmt.recommended.desc.frequent_kernel_panic_error=Das Beheben von Kernel Panic-Fehlern verbessert die Systemstabilität, fördert die Sicherheit und verhindert Datenverlust.
wex.fleet.mgmt.recommended.desc.frequent_network_disconnection=Die Vermeidung von Netzunterbrechungen erhöht die Zuverlässigkeit, verbessert die Benutzerfreundlichkeit und gewährleistet einen unterbrechungsfreien Zugang zu Diensten und Anwendungen.
wex.fleet.mgmt.recommended.desc.gpu_health_issue=Die Behebung von GPU-Problemen verhindert Probleme mit der grafischen Leistung und sorgt für einen reibungslosen Betrieb von visuellen Anwendungen.
wex.fleet.mgmt.recommended.desc.high_collaboration_sw_errors=Die Lösung von Problemen mit der Collaboration-Software sorgt für nahtlose Teamarbeit und anhaltende Produktivität. Wir haben mehr als 10 Softwarefehler in den letzten 7 Tagen in Teams, Outlook, Zoom, Webex, Chrome, Office festgestellt.
wex.fleet.mgmt.recommended.desc.high_windows_crash=Die Behebung von Betriebssystemabstürzen gewährleistet Systemstabilität, konsistente Leistung und ununterbrochene Benutzerproduktivität.
wex.fleet.mgmt.recommended.desc.kernel_panic_error=Das Beheben von Kernel Panic-Fehlern verbessert die Systemstabilität, fördert die Sicherheit und verhindert Datenverlust.
wex.fleet.mgmt.recommended.desc.last_reboot_more_than_21_days=Durch den Neustart von Geräten werden temporäre Dateien gelöscht und Systemprozesse aktualisiert, was die Gesamtleistung und Stabilität verbessert.
wex.fleet.mgmt.recommended.desc.linux_disk_encryption_not_enabled=Die Aktivierung der Festplattenverschlüsselung verbessert die Datensicherheit erheblich, indem sie den Inhalt Ihrer Speichergeräte schützt.
wex.fleet.mgmt.recommended.desc.linux_firewall_disabled=Die Aktivierung der Linux-Firewall hilft, nicht autorisierten Zugriff zu verhindern und Ihr Netzwerk vor potenziellen Bedrohungen zu schützen.
wex.fleet.mgmt.recommended.desc.linux_secure_boot_not_enabled=Die Aktivierung von Secure Boot stellt sicher, dass nur vertrauenswürdige Software während des Systemstarts geladen wird, was die Systemsicherheit verbessert.
wex.fleet.mgmt.recommended.desc.memory_utilization_high=Die Analyse der hohen Speichernutzung hilft bei der Identifizierung und Behebung von Problemen, die sich auf die Systemleistung und -stabilität auswirken können.
wex.fleet.mgmt.recommended.desc.missing_critical_bios_updates=Die Anwendung von BIOS-Updates gewährleistet die Systemstabilität und Kompatibilität mit neuer Hardware oder Software.
wex.fleet.mgmt.recommended.desc.missing_critical_driver_updates=Die Aktualisierung von Treibern vermeidet Hardware-Fehlfunktionen und sorgt für ein sicheres, stabiles und leistungsfähiges System.
wex.fleet.mgmt.recommended.desc.missing_linux_security_updates=Die Anwendung von Sicherheitsupdates schützt vor Malware und Angriffen, reduziert die Angriffsfläche und verbessert die Systemintegrität.
wex.fleet.mgmt.recommended.desc.missing_linux_updates=Durch die Installation der neuesten Updates werden Schwachstellen im Kernel, in den Systembibliotheken und in Anwendungen behoben. So wird Ihr System vor Angriffen, Malware und nicht autorisiertem Zugriff geschützt.
wex.fleet.mgmt.recommended.desc.missing_windows_security_updates=Die Anwendung von Sicherheitsupdates schützt vor den neuesten Bedrohungen und Schwachstellen und bewahrt Ihr System vor Angriffen.
wex.fleet.mgmt.recommended.desc.missing_windows_updates=Die Installation der neuesten Updates behebt Sicherheitslücken und gewährleistet, dass Ihr System sicher und funktionsfähig bleibt.
wex.fleet.mgmt.recommended.desc.poor_network_signal_strength=Die hohe Signalstärke sorgt für eine stabile und zuverlässige Verbindung und minimiert Unterbrechungen und Aussetzer bei Online-Aktivitäten.
wex.fleet.mgmt.recommended.desc.poor_nominal_speed=Eine zuverlässige und schnelle Internetgeschwindigkeit ist entscheidend für die effiziente Erledigung von Aufgaben, den Zugriff auf Cloud-Dienste und die unterbrechungsfreie Zusammenarbeit mit Kollegen.
wex.fleet.mgmt.recommended.desc.unauthenticated_connection=Indem Unternehmen eine Authentifizierung anfordern, können sie verhindern, dass sich unseriöse Geräte mit dem Netzwerk verbinden, und so das Risiko potenzieller Sicherheitsverletzungen verringern.
wex.fleet.mgmt.recommended.desc.windows_secure_boot_not_enabled=Die Aktivierung von Secure Boot verhindert unbefugte Änderungen der Firmware und des Betriebssystems und erhöht die Systemsicherheit.
