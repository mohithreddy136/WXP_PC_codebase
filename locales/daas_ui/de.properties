wex.fleet.mgmt.remediation.kernel_panic_error.desc=Es ist eine Kerne Panic aufgetreten, die auf einen kritischen Systemfehler hinweist, von dem sich der Linux-Kernel nicht erholen kann. Das kann durch Hardware-Fehler, beschädigte Treiber, falsch konfigurierte Kernel-Parameter oder inkompatible Kernel-Module verursacht werden. Eine sofortige Untersuchung ist erforderlich, um die Ursache zu ermitteln.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt1=Überprüfen Sie die Systemprotokolle (/var/log/messages, /var/log/syslog oder journalctl) auf Fehlermeldungen, die dem Panic-Ereignis vorausgingen.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt2=Überprüfen Sie den Hardwarezustand, insbesondere Arbeitsspeicher (RAM) und Festplattenintegrität, mithilfe von Tools wie memtest86 und smartctl.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt3=Prüfen Sie kürzlich vorgenommene Systemänderungen (z. B. Kernel-Updates, Treiberinstallationen oder Konfigurationsänderungen).
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt4=Starten Sie im Rettungs- oder Wiederherstellungsmodus, um auf das System zuzugreifen, falls es nicht bootfähig ist.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt5=Setzen Sie verdächtige Kernel-Module oder Treiber zurück oder deinstallieren Sie diejenigen,, die möglicherweise inkompatibel sind.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt6=Wenn das Problem bestehen bleibt oder mit der Hardware zusammenhängt, kontaktieren Sie den Hersteller oder die Community.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.desc=Die Aktivierung der Festplattenverschlüsselung schützt ruhende Daten, indem alle auf der Festplatte gespeicherten Informationen ohne ordnungsgemäße Authentifizierung unlesbar gemacht werden. Dies ist eine entscheidende Sicherheitsmaßnahme für Systeme, die vertrauliche oder regulierte Daten verarbeiten.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step1=Implementieren Sie eine vollständige Festplattenverschlüsselung mit Tools wie LUKS (Linux Unified Key Setup) oder dm-crypt, abhängig von Ihrer Linux-Distribution.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step2=Verschlüsseln Sie sensible Partitionen (z. B. /home, /var oder /data), falls eine vollständige Laufwerksverschlüsselung nicht möglich ist.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step3=Richten Sie ein sicheres Schlüsselmanagement ein, einschließlich Passphrasen oder Integration mit TPM (Trusted Platform Module), sofern verfügbar.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step4=Bewahren Sie Ihre Verschlüsselungsschlüssel sicher auf, um Datenverlust durch Verlust oder Beschädigung zu vermeiden.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step5=Testen Sie die Verschlüsselungseinstellungen, um so sicherzustellen, dass das System korrekt startet und nach der Authentifizierung auf die Daten zugegriffen werden kann.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step6=Erfassen Sie die Konfiguration der Verschlüsselung sowie die Wiederherstellungsprozesse, um Compliance-Anforderungen und den fortlaufenden Betrieb sicherzustellen.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step1=Installieren und konfigurieren Sie ein Firewall-Tool wie firewalld, ufw oder iptables, was von Ihrer Linux-Distribution abhängig ist.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step2=Aktivieren Sie den Firewall-Dienst so, dass er beim Systemstart automatisch gestartet wird
wex.fleet.mgmt.remediation.linux_firewall_disabled.step3=Definieren Sie Firewall-Regeln, um nur notwendige Dienste (z. B. SSH, HTTP/HTTPS) zuzulassen und alle anderen zu blockieren.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step4=Prüfen Sie Status und Konfiguration der Firewall mithilfe folgender Befehle: sudo firewall-cmd --list-all (für firewalld), sudo ufw status (für ufw)
wex.fleet.mgmt.remediation.linux_firewall_disabled.step5=Überprüfen Sie regelmäßig die Firewall-Konfigurationen, um sicherzustellen, dass sie den Sicherheitsrichtlinien und betrieblichen Anforderungen entsprechen.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.desc=Die Aktivierung von Secure Boot schützt das System vor unbefugtem oder schädlichem Code während des Startvorgangs, indem die digitalen Signaturen von Bootloadern, Kernel-Modulen und Treibern überprüft werden. Dadurch werden Integrität und Sicherheit des Systems verbessert, insbesondere in Unternehmensumgebungen oder bei Compliance-Anforderungen.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step1=Stellen Sie sicher, dass die UEFI-Firmware Secure Boot unterstützt und aktivieren Sie die Funktion in den UEFI-Einstellungen.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step2=Installieren und konfigurieren Sie signierte Bootloader und Kernel-Pakete, die mit Secure Boot kompatibel sind (z. B. shim und signierten GRUB).
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step3=Verifizieren Sie, dass Kernel, Module und alle erforderlichen Komponenten signiert sind.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step4=Starten Sie das System neu und überprüfen Sie den Secure Boot-Status mit mokutil.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step5=Melden Sie benutzerdefinierte Schlüssel an, wenn nicht standardisierte Komponenten verwendet werden.
wex.fleet.mgmt.remediation.missing_linux_security_updates.desc=Ein oder mehrere sicherheitsrelevante Updates fehlen auf dem System. Diese Updates schließen bekannte Sicherheitslücken in Betriebssystem, Kernel und Softwarepaketen. Es zu versäumen, diese Updates zu installieren, kann zu unautorisiertem Zugriff, Datenverlust oder Systemausfällen führen.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step1=Nutzen Sie den Paketmanager des Systems (apt, yum, dnf, zypper), um fehlende Sicherheitspatches zu identifizieren.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step2=Installieren Sie alle Sicherheits-Updates sofort, um bekannte Risiken und Schwachstellen zu minimieren.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step3=Führen Sie bei Bedarf einen Neustart durch, insbesondere nach Kernel- oder zentralen Service-Updates.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step4=Aktivieren Sie automatische Sicherheits-Updates oder planen Sie regelmäßige Patches, um einen kontinuierlichen Schutz zu gewährleisten.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step5=Überprüfen Sie nach der Aktualisierung die Systemprotokolle und Versionsnummern, um den Erfolg des Updates zu bestätigen.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step6=Führen Sie nach dem Update einen Schwachstellenscan durch, um sicherzustellen, dass keine verbleibenden Risiken bestehen.
wex.fleet.mgmt.remediation.missing_linux_updates.desc=Es fehlen kritische Linux-Updates, die Sicherheits-, Kernel- und Stabilitätskorrekturen beinhalten können. Diese Updates können wichtige Sicherheitskorrekturen, Kernel-Fixes und Verbesserungen der Systemstabilität enthalten. Ein veraltetes System birgt ein erhöhtes Risiko für Sicherheitslücken, Abstürze und Inkompatibilitäten.
wex.fleet.mgmt.remediation.missing_linux_updates.step1=Nutzen Sie Ihren Paketmanager (yum, dnf, apt, zypper), um verfügbare Updates zu prüfen und fehlende Patches zu identifizieren.
wex.fleet.mgmt.remediation.missing_linux_updates.step2=Installieren Sie alle sicherheitsrelevanten und Kernel-bezogenen Updates umgehend, um Risiken zu minimieren.
wex.fleet.mgmt.remediation.missing_linux_updates.step3=Führen Sie einen Neustart durch, falls das Update Kernel- oder Systemkomponenten betrifft.
wex.fleet.mgmt.remediation.missing_linux_updates.step4=Richten Sie automatische Updates oder einen regelmäßigen Patch-Zeitplan ein, um sicherzustellen, dass zukünftige Aktualisierungen rechtzeitig angewendet werden.
wex.fleet.mgmt.remediation.missing_linux_updates.step5=Verifizieren Sie die erfolgreiche Aktualisierung durch Prüfung der Systemprotokolle und der aktuell installierten Kernel- und Paketversionen.
wex.fleet.mgmt.remediation.network_connection_not_secure.desc=In den letzten 24 Stunden wurde eine Netzwerkverbindung ohne die erwartete Sicherheit gemeldet.
wex.fleet.mgmt.remediation.network_connection_not_secure.desc1=In den letzten 7 Tagen wurde eine nicht authentisierte Verbindung erkannt.
wex.fleet.mgmt.remediation.network_disconnections.desc=In den vergangenen 24 Stunden wurden von Geräten mehrfach Netzwerkunterbrechungen gemeldet.
wex.fleet.mgmt.remediation.network_disconnections.desc1=In den letzten 7 Tagen wurden Netzwerkunterbrechungen erkannt.
wex.fleet.mgmt.remediation.network_speed_slow.desc=Die in den letzten 24 Stunden gemeldete nominale Netzwerkgeschwindigkeit war niedrig.
wex.fleet.mgmt.remediation.wifi_signal_strength_weak.desc=Die Wi-Fi-Signalstärke wurde in den letzten 24 Stunden als schwach gemeldet.
