wex.ra.remediation.antivirus_not_enabled=Microsoft Defender Antivirus ist eine Antivirus-Software, die in Windows enthalten ist und Ihr Gerät vor Viren, Malware und anderen Bedrohungen schützen kann.
wex.ra.remediation.antivirus_signature_outdated=Um einen optimalen Schutz zu gewährleisten, sollten die Antivirus-Definitionsdateien immer aktualisiert werden.
wex.ra.remediation.antivirus_signature_outdated_other=Das Gerät ist für die Verwendung eines Antivirenprogramms von einem Drittanbieter konfiguriert, um das Gerät vor Viren, Malware und anderen Bedrohungen zu schützen, jedoch müssen die Antivirensignaturen auf dem Gerät aktualisiert werden.
wex.ra.remediation.app_crash=Mehr als 10 Softwarefehler in den letzten 7 Tagen in Teams, Outlook, Zoom, Webex, Chrome, Office.
wex.ra.remediation.avg_fan_speed_high=Die durchschnittliche Lüftergeschwindigkeit ist über einen längeren Zeitraum hinweg hoch.
wex.ra.remediation.battery_calibrate=Der Akku muss kalibriert werden.
wex.ra.remediation.battery_early_detection_wear=Innerhalb der letzten 30 Tage wurde vorausberechnet, dass der Akku innerhalb weniger als 70 % der vollen Berechnungskapazität aufweisen wird.
wex.ra.remediation.battery_needs_attention=Workforce Experience Platform displays records of battery warnings and failures that can be used to obtain service for a battery that is experiencing issues
wex.ra.remediation.bitlocker_encryption_not_enabled=Zum Schutz der Daten im Ruhezustand wird dringend eine Festplattenverschlüsselung empfohlen.
wex.ra.remediation.bsod=In den letzten 7 Tagen gab es mehr als 3 Fehlerüberprüfungen (BSOD-Fehler).
wex.ra.remediation.bsod_occured=Auf dem Gerät sind innerhalb der letzten 7 Tage 1 oder mehr Fehlerprüfungsereignisse aufgetreten.
wex.ra.remediation.cpu_utilization_high=Mögliche Ursachen: Eine laufende Anwendung wird nicht ausgeführt.
wex.ra.remediation.disk_needs_attention=Workforce Experience Platform zeigt Aufzeichnungen über Festplattenwarnungen und -ausfälle an, die Sie verwenden können, um Service für eine Festplatte zu erhalten, bei der Probleme auftreten.
wex.ra.remediation.disk_utilization_high=Hard disk is near full disk capacity and low in free space.
wex.ra.remediation.docking_station_ac_adapter_failed=The Docking Station AC Adapter is having a hardware issue.
wex.ra.remediation.docking_station_ac_adapter_running_at_reduced_perofmance=Der Netzadapter der Dockingstation funktioniert nicht richtig.
wex.ra.remediation.docking_station_firmware_out_of_date=Possible Causes: The docking station may require a Firmware or Driver update.
wex.ra.remediation.excessive_os_shutdown_time=Das Herunterfahren dauert über 3 Minuten.
wex.ra.remediation.excessive_os_startup_time=Der Start des Systems dauert länger als 3 Minuten.
wex.ra.remediation.firewall_disabled=Die Firewall verhindert, dass Hacker und bösartige Software über das Internet oder ein Netzwerk Zugriff auf Ihren PC erhalten.
wex.ra.remediation.firewall_signature_outdated=Die Firewall muss regelmäßig aktualisiert werden, um einen optimalen Schutz vor netzwerkbasierten Angriffen zu gewährleisten.
wex.ra.remediation.frequent_bsod_occured=In den letzten 7 Tagen gab es mehr als 3 Fehlerüberprüfungen (BSDO-Fehler).
wex.ra.remediation.frequent_network_disconnection=Stellen Sie bei Heimnetzwerken sicher, dass Ihre Router-Firmware auf dem neuesten Stand ist, und stellen Sie den Router an einem zentralen Ort auf, um Störungen zu minimieren. Reduzieren Sie außerdem die Anzahl der angeschlossenen Geräte und erwägen Sie die Verwendung einer kabelgebundenen Verbindung für kritische Geräte, um ein stabiles und zuverlässiges Netzwerk zu erhalten.
wex.ra.remediation.gpu_health_issue=Workforce Experience Platform hat ein Problem mit der GPU entdeckt, das umgehend behoben werden muss.
wex.ra.remediation.high_collaboration_sw_errors=Mehr als 10 Softwarefehler in den letzten 7 Tagen in Teams, Outlook, Zoom, Webex, Chrome, Office.
wex.ra.remediation.high_windows_crash=Das Betriebssystem ist in den letzten sieben Tagen mindestens einmal unerwartet abgestürzt oder neu gestartet worden.
wex.ra.remediation.last_reboot_more_than_21_days=Der Ohne war vor mehr als 21 Tagen.
wex.ra.remediation.maximise_my_battery_health_not_enabled=HP Battery Health Manager is available on all HP business notebooks since 2016. To improve battery life, it is recommended that Battery Health Manager be enabled
wex.ra.remediation.memory_utilization_high=The average Memory utilization over the last 30 days is 85% or greater.
wex.ra.remediation.missing_critical_bios_updates=Aktualisieren Sie das BIOS für kompatible Geräte über die Plattform, indem Sie die Geräte unten auswählen und "Richtlinie anwenden" auswählen. Aktualisieren Sie bei inkompatiblen Geräten die Systemtreiber und die Firmware mit Windows Update oder HP Image Assistant.
wex.ra.remediation.missing_critical_driver_updates=Der Treiberinventarbericht enthält ein detailliertes Inventar der Geräte, für die wichtige Gerätetreiber-Updates fehlen.
wex.ra.remediation.missing_windows_security_updates=Im Security-Dashboard von Workforce Experience Platform werden KPIs angezeigt, die die Zahl der Geräte ohne installierte Windows-Sicherheitsupdates darstellen.
wex.ra.remediation.os_crash=Das Betriebssystem ist in den letzten sieben Tagen mindestens einmal unerwartet abgestürzt oder neu gestartet worden.
wex.ra.remediation.poor_network_signal_strength=Bei Heimnetzwerken kann ein Neustart des Routers oder ein Umstellen des Routers, um die Anzahl der Hindernisse zwischen dem Zugangspunkt und dem PC zu verringern, die Wi-Fi-Signalstärke verbessern.
wex.ra.remediation.poor_nominal_speed=Für Heimnetzwerke sollten Sie ein Upgrade Ihres Routers auf ein neueres Modell in Betracht ziehen, das die neuesten Wi-Fi-Standards unterstützt, z. B. Wi-Fi 6. Optimieren Sie außerdem Ihr Netzwerk-Layout, indem Sie den Router an einem zentralen Ort platzieren, Störungen durch andere Geräte reduzieren und nach Möglichkeit kabelgebundene Verbindungen für eine stabilere Leistung nutzen.
wex.ra.remediation.unauthenticated_connection=Wählen Sie für Heimnetzwerke ein robustes Verschlüsselungsprotokoll, wie z. B. WPA2 oder WPA3, und legen Sie ein sicheres, eindeutiges Kennwort für den Zugriff fest. Darüber hinaus sollten Sie die MAC-Adressfilterung und die regelmäßige Aktualisierung der Router-Firmware in Betracht ziehen, um die Sicherheit zu erhöhen und unautorisierte Verbindungen zu verhindern.
wex.ra.remediation.windows_secure_boot_not_enabled=Secure Boot ist ein Sicherheitsstandard, der von Mitgliedern der Computerindustrie entwickelt wurde, um sicherzustellen, dass ein Gerät nur mit Software startet, die vom Originalhersteller (OEM) als vertrauenswürdig eingestuft wurde.
