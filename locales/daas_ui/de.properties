welcome.banner.description=TechPulse ist eine Telemetrie- und Analyseplattform, die kritische Daten zu Geräten und Anwendungen liefert. Die IT kann so von Deep Learning profitieren und den Mitarbeitern optimale Computer, Software und Services bereitstellen. HP TechPulse identifiziert proaktiv Probleme, ermöglicht Lösungen und minimiert Bedrohungen, indem die Sicherheitssituation der Organisation aktiv überwacht wird.
welcome.banner.description_p={app_name} ist eine Telemetrie- und Analyseplattform, die kritische Daten zu Geräten und Anwendungen liefert. Die IT kann so von Deep Learning profitieren und den Mitarbeitern optimale PCs, Software und Services bereitstellen. {app_name} identifiziert proaktiv Probleme, ermöglicht Lösungen und minimiert Bedrohungen, indem die Sicherheitssituation der Organisation aktiv überwacht wird.
welcome.banner.description_p1={app_name} ist eine cloudbasierte Telemetrie- und Analyseplattform, die wichtige Daten zu Konfiguration und Systemzustand von Ihren Geräten und Anwendungen aggregiert. Diese Daten werden mithilfe von KI und Deep Learning analysiert, um Probleme proaktiv zu identifizieren, Korrekturmaßnahmen im großen Umfang bereitzustellen und Sicherheitsbedrohungen zu minimieren.
welcome.banner.title=Automatisierungsplattform, die über aussagekräftige Erkenntnisse, die auf Milliarden von Datenpunkten basieren, erstklassige Services bietet
welcome.banner.title1={app_name} bietet Ihnen sofortigen Zugriff auf detaillierte Einblicke, sodass Sie Geräteprobleme vorhersehen und beheben können, noch bevor sie auftreten.
