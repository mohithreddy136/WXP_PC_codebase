azureonboard.marketing.signupcard.description=Erhalten Sie Zugriff auf die Systemintegrität Ihres PCs und vorausschauende Einblicke, sodass Sie fundiertere Entscheidungen treffen und entstehende Probleme lösen können, bevor diese sich auf das Business auswirken.
azureonboard.marketing.signupcard.footertext=Durch Auswahl dieser Schaltfläche akzeptiere ich die <a target='_blank' href={termsLink}>Nutzungsbedingungen</a> und stimme zu, die erforderlichen Daten für die Kontoeinrichtung anzugeben und die E-Mail-Kommunikation mit HP oder HP Partnern zu der Testversion zu akzeptieren.
azureonboard.marketing.signupcard.heading=Registrieren Sie sich für einen kostenlosen 60-tägigen Test
azureonboard.marketing.signupcard.tryitnow=Jetzt testen*
azureonboard.marketing.signupsection.description=Mit Proactive Insights erhalten Sie Zugriff auf die Systemintegrität Ihrer PCs und vorausschauende Einblicke für alle registrierten Geräte, sodass Sie fundierte Entscheidungen treffen und entstehende Probleme identifizieren können, bevor diese sich auf das Business auswirken.
azureonboard.marketing.signupsection.heading=Registrieren Sie sich jetzt!
banner.iot.update.description=Eine Änderung der TechPulse-Plattforminfrastruktur erfolgt am Montag, 27. Februar 2023. Möglicherweise müssen Sie die Einstellungen von Proxy-, Firewall- und SSL-Inspektionssoftware aktualisieren. Führen Sie das Netzwerkbewertungstool auf <a href='https://www.hpdaas.com/software' target='_blank'>HP TechPulse - Software (hpdaas.com)</a> aus und prüfen Sie, ob eines der vier (4) *.IoT-Testziele die Meldung „Fehlgeschlagen“ zurückgibt. Wenn der Test zu einem Fehlschlag führt, folgen Sie den Anweisungen hier '<b><a href='https://hp.service-now.com/techpulse_kb?id=kb_article&sysparm_article=KB0011291' target='_blank'>KB0011291</a> - Konfigurieren eines Proxys oder einer Firewall'</b> und <b>nehmen Sie diese Änderungen bis Donnerstag, 23. Februar 2023, vor</b>.
banner.iot.update.title=AKTION ERFORDERLICH
