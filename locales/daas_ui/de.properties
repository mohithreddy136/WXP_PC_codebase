exp.AntivirusSignatureUpdatesNeeded.option2=Option 2: Bei von Benutzern verwalteten Antivirenlösungen sollte der Benutzer die Verwaltungskonsole der jeweiligen Lösung öffnen und die Schritte zur Planung oder Auslösung eines Signatur-Updates durchführen. Es wird empfohlen, die Antivirenlösung so zu konfigurieren, dass Updates mindestens einmal pro Woche heruntergeladen werden.
