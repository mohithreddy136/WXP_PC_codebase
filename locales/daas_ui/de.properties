side_panal.smart_refresh.help_sec1_header=Funktionsweise
side_panal.smart_refresh.help_sec1_point_1_desc=Bewerten Sie jedes Gerät anhand von 9 Datenpunkten, die in einem Refresh Urgency Score* zusammengefasst werden. Mit diesem Score können Sie die einzelnen gefährdeten Geräte priorisieren, um Unterbrechungen der Benutzerproduktivität zu vermeiden.
side_panal.smart_refresh.help_sec1_point_1_title=1. Identifizieren
side_panal.smart_refresh.help_sec1_point_2_desc=Ein KI-Modell gruppiert Geräte in verschiedene Hardware- und Software-Personas, die auf der Nutzung basieren. Diese Personas können Ihnen helfen, das richtige Ersatzgerät zu finden.
side_panal.smart_refresh.help_sec1_point_2_title=2. Kategorisieren
side_panal.smart_refresh.help_sec1_point_3_desc1=Wenn Sie mit einem HP Partner zusammenarbeiten, wird Smart Refresh für jedes Gerät einen Ersatz empfehlen. Diese Empfehlungen stammen von den leistungsstärksten Modellen der jeweiligen Persona, die im hochgeladenen Katalog Ihres Partners verfügbar sind. Wenn keine Geräteempfehlungen angezeigt werden oder die angezeigten Geräte veraltet sind, wenden Sie sich bitte an Ihren Partner und bitten ihn, den neuesten Katalog hochzuladen.
side_panal.smart_refresh.help_sec1_point_3_desc2=Wenn Sie nicht mit einem HP Partner zusammenarbeiten, werden in Smart Refresh keine Geräteempfehlungen angezeigt. Bitte wenden Sie sich an Ihren HP Kundenbetreuer, um die besten Ersatzmodelle zu erhalten.
side_panal.smart_refresh.help_sec1_point_3_desc3=Datum des letzten Katalog-Uploads:
side_panal.smart_refresh.help_sec1_point_3_title=3. Empfehlen
side_panal.smart_refresh.help_sec1_point_4_desc=Verwenden Sie den Aktualisierungsstatus "Abgeschlossen", um alle PCs zu entfernen, die nicht aktualisiert werden müssen oder zu diesem Zeitpunkt nicht aktualisiert werden können. Sie können diese Geräte anzeigen und ihren Status auf "Handlungsbedarf" zurücksetzen, um sie wieder in der PC-Liste anzuzeigen
side_panal.smart_refresh.help_sec1_point_4_title=4. Status
side_panal.smart_refresh.help_sec2_description=Wie wir feststellen, wann ein Gerät ersetzt werden muss
side_panal.smart_refresh.help_sec2_header=Dringlichkeit Score aktualisieren
side_panal.smart_refresh.help_sec2_sub_text=Der Dringlichkeit aktualisieren Score wird anhand der Leistungsdaten eines Geräts in 9 Bereichen berechnet. Der Schweregrad entspricht der numerischen Punktzahl wie folgt:
