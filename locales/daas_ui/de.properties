adminx.welcome.disclaimer=*Essential Insights ist nur für gewerbliche HP Kunden erhältlich und erfordert HP {appName} sowie kommerzielle Hardware zur Unterstützung der Anwendung. Die vollständigen Systemanforderungen finden Sie unter <a target='_blank' href={link}>{text}</a>.
adminx.welcome.header=Ein zentraler Ort, an dem Sie Ihre HP Lösungen entdecken, konfigurieren, verwalten und überwachen können.
adminx.welcome.header.description=Der Kontozugriff bietet Ihnen die Möglichkeit, Ihr Service-Erlebnis, <br> IT-Managementfunktionen und umsetzbare Erkenntnisse zu Geräten zu verwalten.
