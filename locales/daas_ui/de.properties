wex.remediate.side.bar.content.script=Beheben Sie Probleme in Ihrer gesamten Flotte mit einer Korrektur.<br><br> Die empfohlene Maßnahme sammelt Geräte, die die Kriterien für das Problem erfüllen. Die Korrekturen können dieses Problem für die ausgewählten Geräte beheben.<br><br> Wählen Sie ein von HP empfohlenes Skript aus der HP Gallery oder wählen Sie ein eigenes Skript.<br><br> Nach der Bereitstellung werden der Fortschritt und der Abschluss der Korrektur unter Korrekturen > Aktivität angezeigt.<br><br>
