partner.exp.mgmt.recommended.desc.AV_NOT_ENABLED=Lösen Sie alle auf oder heben Sie in der Tabelle unten die Auswahl der PCs auf, die Sie jetzt nicht aktivieren wollen.
partner.exp.mgmt.recommended.desc.AV_WD_SIGNATURE=Die ständige Aktualisierung der Malware-Signaturen gewährleistet einen umfassenden Schutz vor den neuesten Bedrohungen.
partner.exp.mgmt.recommended.desc.AVG_FAN_SPEED_HIGH=Eine hohe Lüfterdrehzahl über einen längeren Zeitraum hinweg deutet auf eine Überhitzung des Geräts hin, die die Komponenten beschädigen und die Lebensdauer des Geräts verkürzen kann.
partner.exp.mgmt.recommended.desc.BITLOCKER_ENCRYPTION_NOT_ENABLED=Geräte ohne Verschlüsselung können bei Verlust oder Diebstahl ihre Daten preisgeben.
partner.exp.mgmt.recommended.desc.DISK_UTILIZATION_HIGH=Geräte mit wenig freiem Speicherplatz können träge werden und Schwierigkeiten haben, wichtige Aufgaben auszuführen.
partner.exp.mgmt.recommended.desc.DOCKING_STATION_AC_ADAPTER_FAILED=Der Ausfall des Netzteils der Docking-Station kann auf Hardware-Probleme hinweisen, die dazu führen können, dass das Gerät nicht mehr mit Strom versorgt wird oder nur noch sporadisch funktioniert.
partner.exp.mgmt.recommended.desc.DOCKING_STATION_FIRMWARE_OUT_OF_DATE=Veraltete Dockingstation-Firmware kann Kompatibilitätsprobleme verursachen, die Funktionalität einschränken oder Sicherheitslücken aufdecken.
partner.exp.mgmt.recommended.desc.EXCESSIVE_OS_SHUTDOWN_TIME=Ein lang dauerndes Herunterfahren kann ein Zeichen für hängen bleibende Anwendungen, schleppende Hardware, Richtlinien-Updates, langwierige Skripte oder nicht abgeschlossene Windows-Aufgaben sein.
partner.exp.mgmt.recommended.desc.EXCESSIVE_OS_STARTUP_TIME=Ein langer Startvorgang könnte auf Softwarekonflikte oder Hardwareprobleme zurückzuführen sein.
partner.exp.mgmt.recommended.desc.FIREWALL_DISABLED=Eine deaktivierte Windows Defender Firewall kann dazu führen, dass Geräte in Ihrem Netzwerk bösartigen Angriffen ausgesetzt sind.
partner.exp.mgmt.recommended.desc.FIREWALL_SIGNATURE_OUTDATED=Veraltete Firewall-Definitionen machen Geräte anfällig für neue Malware und Cyber-Bedrohungen.
partner.exp.mgmt.recommended.desc.GPU_HEALTH_ISSUE=Ein erkanntes GPU-Problem kann zu visuellen Störungen, Leistungsproblemen oder sogar zum vollständigen Ausfall der Grafikanzeige führen.
partner.exp.mgmt.recommended.desc.HIGH_COLLABORATION_SW_ERRORS=Anhaltende Fehler in der Software für die Zusammenarbeit können die Arbeitsabläufe im Team stören, die Kommunikation behindern und den Projektfortschritt beeinträchtigen.
partner.exp.mgmt.recommended.desc.HIGH_WINDOWS_CRASH=Unerwartete Abstürze und Neustarts deuten auf eine zugrunde liegende Instabilität hin, die zu Datenverlust oder dauerhaften Hardwareschäden führen kann.
partner.exp.mgmt.recommended.desc.LAST_REBOOT_MORE_THAN_21_DAYS=Bei Geräten, die über einen längeren Zeitraum nicht neu gestartet werden, können Probleme mit der Stabilität und Leistung des Betriebssystems auftreten.
partner.exp.mgmt.recommended.desc.MAXIMISE_MY_BATTERY_HEALTH_NOT_ENABLED=Wenn die Akku-Zustandsverwaltung nicht aktiviert ist, kann dies Auswirkungen auf die aktuelle Akkulaufzeit haben.
partner.exp.mgmt.recommended.desc.MEMORY_UTILIZATION_HIGH=Eine hohe Speichernutzung über einen längeren Zeitraum kann ein Gerät verlangsamen und die Leistung der Mitarbeiter beeinträchtigen.
partner.exp.mgmt.recommended.desc.MISSING_CRITICAL_DRIVER_UPDATES=Ohne wichtige Treiberaktualisierungen kann es zu Fehlfunktionen oder gar zum Ausfall von Geräten kommen.
partner.exp.mgmt.recommended.desc.MISSING_WINDOWS_SECURITY_UPDATES=Veraltete Sicherheitsupdates können Geräte anfällig für Hacker und Viren machen.
partner.exp.mgmt.recommended.desc.MISSING_WINDOWS_UPDATES=Veraltete Windows-Updates setzen Geräte Schwachstellen und potenziellen Malware-Infektionen aus.
partner.exp.mgmt.recommended.desc.PC_REFRESH=Starten Sie eine intelligente Aktualisierung aller PCs, oder heben Sie in der Tabelle unten die Auswahl aller PCs auf, die Sie jetzt nicht ersetzen wollen.
partner.exp.mgmt.recommended.desc.PC_REFRESH_SELECT=Überprüfen Sie die Geräte und fahren Sie mit der Anfrage fort.
partner.exp.mgmt.recommended.desc.security=Lösen Sie alle auf oder heben Sie in der Tabelle unten die Auswahl der PCs auf, die Sie jetzt nicht aktivieren wollen.
partner.exp.mgmt.recommended.desc.WINDOWS_SECURE_BOOT_NOT_ENABLED=Durch die Aktivierung von Windows Secure Boot wird sichergestellt, dass ein Gerät nur mit vertrauenswürdiger Software startet.
partner.exp.mgmt.recommended.disk_utilization_high=Geben Sie Festplattenspeicher frei.
