asset_details_last_restart.cause7=Unexpected OS shutdowns (such as BSOD, or forced shutdown)
asset_details_last_restart.cause8=User-initiated or Windows Update-initiated pending restart due to Windows Update installation
asset_details_last_restart.cause9=Vom Benutzer eingeleiteter Neustart (über Skript oder programmatische Anforderung)
asset_details_last_restart.description1=Windows closes apps, stops services, unloads drivers, and reinitializes the OS kernel before booting fresh.
asset_details_last_restart.description2=Durch einen Neustart können Updates angewendet, Leistungsprobleme behoben und der Arbeitsspeicher geleert werden.
asset_details_last_restart.description3=Windows does not use Fast Startup during restart. Instead it performs a clean OS restart but keeps certain hardware states warm.
asset_details_last_restart.full_boot=Vollständiger Systemstart
asset_details_last_restart.full_boot.description=Wenn Windows einen Neustart mit vollständigem Systemstart durchführt, wird das Betriebssystem vollständig neu geladen und alle Hardwarekomponenten werden neu initialisiert. Anders als bei einem Standardneustart oder einem Herunterfahren mit Schnellstart wird die Kernel-Sitzung nicht beibehalten – der Start erfolgt vollständig neu, ähnlich wie nach einem kompletten Ausschalten.
asset_details_last_restart.full_boot.timestamp=This timestamp is the start of the last full system boot (cold boot or warm boot), regardless of what caused the Startup.
asset_details_last_restart.note1=Dieser Zeitstempel wird nur aktualisiert, wenn ein vollständiger Start/Neustart erfolgt, d. h. wenn Windows eine neue Sitzung vollständig initialisiert.
asset_details_last_restart.note2=Wenn Schnellstart aktiviert ist, wird dieses Feld bei Hybrid-/Schnellstart-Sitzungen nicht aktualisiert; es spiegelt nur den letzten echten vollständigen Neustart wider.
