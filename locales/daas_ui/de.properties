wex.labs.remediation.ai.description=Remediation mit KI führt Sie zur effektivsten Lösung. Sie grenzt die Optionen auf intelligente Weise ein, sodass Ihr Team Probleme effizient und einheitlich lösen kann.
wex.labs.remediation.ai.description.disclaimer=You are about to interact with an AI solution. Content generated by AI might contain inaccuracies and should be verified against the details provided. Please note that AI-generated responses might be incomplete or incorrect, and HP assumes no responsibility for actions taken based on this content.
wex.labs.remediation.ai.details.analyzesAvailableRemediations.desc=Der Algorithmus analysiert existierende Behebungen innerhalb der Plattform, darunter Skripte, Richtlinien sowie Geräteaktionen und -Updates, und empfiehlt darauf basierend die passendste Maßnahme.<br/><br/>Dabei werden historische Nutzungsdaten und Erfolgsraten ausgewertet, um zu verstehen, was diesen Problemtyp in Ihrer Organisation typischerweise löst. Die Benutzer reduzieren den Zeitaufwand für Entscheidungsfindung und überlassen der KI die Auswahl der geeigneten Maßnahme.
wex.labs.remediation.ai.details.analyzesAvailableRemediations.title=Analysiert verfügbare Remediations
wex.labs.remediation.ai.details.applyOrReview.desc=Je nach Remediation können die Administratoren folgende Maßnahmen ergreifen: <br/><div class=remediation-ai-ui><ul><li>Sofort auf ausgewählte Geräte anwenden</li><li>Für einen späteren Zeitpunkt planen, um Unterbrechungen zu minimieren</li><li>Details überprüfen, bevor die Aktion bestätigt wird</li></ul></div><br/>Nach der Anwendung werden die Aktivität und die Ergebnisse für Transparenz und kontinuierliches Lernen verfolgt.
wex.labs.remediation.ai.details.applyOrReview.title=Übernehmen, planen oder überprüfen
wex.labs.remediation.ai.details.continuousLearning.desc=Mit der Zeit gewinnen die Empfehlungen an Genauigkeit und Sicherheit.
wex.labs.remediation.ai.details.continuousLearning.title=Kontinuierliches Lernen
wex.labs.remediation.ai.details.howItWorks.title=Funktionsweise
wex.labs.remediation.ai.details.issueToRemediation.desc=Überschreitet ein Problem einen festgelegten Schwellenwert, erscheint er in Ihrem Dashboard mit einer eindeutigen Beschreibung dessen, was passiert, und wie sich dies auf Ihre Geräte auswirken könnte. Die WXP-Plattform unterstützt inzwischen die direkte Abhilfemaßnahme und die KI-Remediation-Funktion hilft dabei, die geeignetste Maßnahme zur Behebung des Problems einzugrenzen.
wex.labs.remediation.ai.details.issueToRemediation.title=Vom Problem zur Remediation
wex.labs.remediation.ai.details.learnsandImproves.desc=Der Algorithmus entwickelt kontinuierlich ein immer genaueres Verständnis dafür, welche Maßnahmen für Ihre Organisation am effektivsten sind.<br/>Mit jeder durchgeführten Abhilfemaßnahme lernt das System:<div class=remediation-ai-ui><ul><li>Deren Wirksamkeit</li><li>Die Dauer bis zur Problemlösung</li><li>Das erneute Auftreten vergleichbarer Probleme</li></ul></div><br/>Dieser Feedback-Mechanismus verbessert künftige Empfehlungen nachhaltig und erhöht deren Genauigkeit und Relevanz.
wex.labs.remediation.ai.details.learnsandImproves.title=Lernt und verbessert sich mit der Zeit
wex.labs.remediation.ai.details.overview.desc=Die Funktion „Abhilfemaßnahmen mit KI“ ermöglicht es IT-Administratoren, zügig von der Problemerkennung zur Lösung zu gelangen. Sie analysiert die Daten Ihrer Geräteflotte und empfiehlt die jeweils effektivste Richtlinie, das passende Skript oder ein geeignetes Geräteupdate für das vorliegende Problem. Der Algorithmus nutzt Muster aus bestehenden Abhilfemaßnahmen in Ihrer Umgebung, um das vorzuschlagen, was mit hoher Wahrscheinlichkeit erfolgreich sein wird.
wex.labs.remediation.ai.details.recommendBestFix.desc=Jede Empfehlung umfasst: <br/><div class=remediation-ai-ui><ul><li>Typ von Aktion: Skript, Richtlinie oder Update</li><li>Warum dies von Bedeutung ist: Durch Abhilfemaßnahmen und Automatisierung werden Probleme in Echtzeit gelöst, die Produktivität der Mitarbeitenden erhöht, die digitale Nutzererfahrung verbessert, Zeit eingespart und die Anfälligkeit verringert.</li></ul></div>
wex.labs.remediation.ai.details.recommendBestFix.title=Empfiehlt die beste Lösung
wex.labs.remediation.ai.details.relevance.desc=Die KI arbeitet mit der organisationsinternen Remediation-Bibliothek.
wex.labs.remediation.ai.details.relevance.title=Relevanz
wex.labs.remediation.ai.details.scriptInfo.desc=For faster saving of your script, the system reads it and auto-fills metadata fields such as title, description, synopsis, and any input parameters detected allowing you to quickly review and save your new script.
wex.labs.remediation.ai.details.scriptInfo.title=Script Information Autofill
