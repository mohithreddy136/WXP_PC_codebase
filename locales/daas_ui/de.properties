requirements.list.proSecurity.windows.supportLifecycle.content1=Das HP Service Level Objective ist, Support für die aktuellsten 3 Windows 10 Releases im Semi-Annual Channel zu leisten.
requirements.list.proSecurity.windows.supportLifecycle.content2=HP verfolgt das Ziel, den Support des neuen Betriebssystem-Release für die Wolf Pro Security-Funktion zur Eindämmung von Bedrohungen innerhalb von 30 Tagen nach dessen Verfügbarkeit im Semi-Annual Channel (\"SAC\") aufzunehmen. Zwischenzeitlich oder vor dem Release veröffentlichte Windows Insider Builds werden nicht unterstützt. Weitere Informationen zu Releases von Windows Betriebssystemen finden Sie unter <a href='https://docs.microsoft.com/en-us/windows/release-information/' target='_blank'>https://docs.microsoft.com/en-us/windows/release-information/</a>.
requirements.list.proSecurity.windows.supportLifecycle.content3=Um sicherzustellen, dass Kunden mit älteren Windows Versionen ausreichend Zeit für ein Upgrade auf aktuellere Releases haben, leistet HP auch Support für das viertneueste Release (derzeit Windows 10 v1903). Dies gilt für mindestens 90 Tage, nachdem Support für das neueste Release im Semi-Annual Channel in Wolf Pro Security verfügbar ist. Nach diesem Zeitraum endet der Support für das ältere Betriebssystem-Release. Die gleiche Support-Richtlinie gilt für Releases im Long-Term Servicing Channel von Windows 10. Folglich müssen diese Systeme auch gemäß der oben aufgeführten Richtlinie aktualisiert werden.
requirements.list.proSecurity.windows.supportLifecycle.content4=Sure Click Pro Support für Windows 10 v2004 wurde am 31. Juli 2020 aufgenommen. Support wurde für Windows 10 v1809 am 31. Oktober 2020 beendet.
requirements.list.proSecurity.windows.supportLifecycle.content5=Windows 7 und 8.1 werden von HP Proactive Security nicht unterstützt.
requirements.list.proSecurity.windows.supportLifecycle.content6=Sure Click Pro Support für Windows 10 v20H2 wurde am 18. November 2020 aufgenommen. Support für Windows 10 v1903 wurde am 16. Februar 2021 beendet.
requirements.list.proSecurity.windows.supportLifecycle.content7=HP hat den Support für Sure Click Pro zur Abwehr von Bedrohungen für Windows 10 v21H1 am 5. Juli 2021 bereitgestellt. Die Unterstützung für Windows 10 v1909 wird zum 3. Oktober 2021 eingestellt.
requirements.list.proSecurity.windows.supportLifecycle.heading=Richtlinie zum Support-Lebenszyklus für neue Betriebssystem-Releases und ältere Windows 10 Releases.
requirements.list.proSecurity.windows.supportLifecycle.windows=HP Wolf Pro Security unterstützt Windows Betriebssysteme für RPOS-Geräte, HP Thin Client-Geräte oder Bereitstellungen in virtuellen Desktopumgebungen nicht.
