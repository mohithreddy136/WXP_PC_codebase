wex.onboarding.skipTour.desc1=Verfolgen Sie Ihren Fortschritt und erledigen Sie diese wichtigen Aufgaben, um das Beste aus unserer Plattform herauszuholen. Das Hinzufügen von Geräten und Benutzern, das Einrichten Ihres Unternehmensprofils und das Erstellen von Stimmungs-Pulses sind alles entscheidende Schritte.
