exp.CollaborationSoftwareErrorsAreHigh.causeConflicts=Konflikte zwischen unterschiedlichen Softwareanwendungen oder -erweiterungen, wie Browser-Erweiterungen oder Add-Ins, können die ordnungsgemäße Funktion von Tools für die Zusammenarbeit beeinträchtigen und zu mehreren Fehlern führen.
exp.CollaborationSoftwareErrorsAreHigh.causeNetwork=Probleme der Netzwerkkonnektivität, wie langsame oder instabile Internetverbindungen, können Unterbrechungen und Fehler bei Tools für die Zusammenarbeit verursachen, die auf Echtzeit-Kommunikation und -Datenübertragung angewiesen sind.
exp.CollaborationSoftwareErrorsAreHigh.causeUpdates=Häufige Software-Updates oder -Patches können neue Fehler oder Kompatibilitätsprobleme verursachen und zu einer erhöhten Anzahl von Fehlern in Anwendungen wie Teams, Outlook, Zoom, Webex, Chrome und Office führen.
exp.CollaborationSoftwareErrorsAreHigh.possibleCauses=Mögliche Ursachen:
exp.CollaborationSoftwareErrorsAreHigh.remediationConflicts=Beheben Sie Konflikte, indem Sie problematische Erweiterungen oder Add-Ins deaktivieren oder entfernen und die Kompatibilität zwischen verschiedenen Softwareanwendungen sicherstellen.
exp.CollaborationSoftwareErrorsAreHigh.remediationNetwork=Verbessern Sie die Netzwerkstabilität, indem Sie die Internetverbindungen aktualisieren, die Konnektivitätsprobleme beheben und ausreichend Bandbreite für Tools für die Zusammenarbeit gewährleisten.
exp.CollaborationSoftwareErrorsAreHigh.remediationUpdates=Prüfen Sie bitte regelmäßig auf Software-Updates und Patches und installieren Sie diese, um sicherzustellen, dass bekannte Fehler und Kompatibilitätsprobleme behoben werden.
exp.CollaborationSoftwareErrorsAreHigh.suggestedRemediations=Empfohlene Behebung:
exp.CollaborationSoftwareErrorsAreHigh.title=Beheben Sie Fehler in der Kollaborationssoftware
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.appsCausingHighCpu=Anwendungen, die die meiste CPU-Leistung beanspruchen, werden in der Spalte Apps, die eine hohe CPU-Auslastung verursachen, angezeigt.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeBackgroundProcesses=Zahlreiche Hintergrundprozesse und -dienste, einschließlich Systemaktualisierungen, Antivirus-Scans und andere Wartungsaufgaben, können die CPU-Kapazität beanspruchen und zu einer hohen Auslastung führen.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeFirmwareBug=Ein Fehler in der Firmware kann dazu führen, dass die CPU stärker als vorgesehen ausgelastet ist.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeMalfunctioningSoftware=Schlecht optimierte oder fehlerhafte Software kann zu einer übermäßigen CPU-Auslastung führen, insbesondere wenn sie in einer Schleife hängen oder Ressourcen ineffizient verbraucht.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeResourceIntensiveApps=Die Ausführung von ressourcen-intensiven Anwendungen, wie Video-Editors, virtuelle Maschinen oder komplexe Berechnungen, können eine erhebliche Menge an CPU-Ressourcen verbrauchen und so zu einer hohen Auslastung führen.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.closeHighCpuApps=Schließen Sie Anwendungen, die die meiste CPU verbrauchen.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.connectAcAdapter=Schließen Sie das Gerät an einen Netzadapter an, da die CPU je nach den Energieeinstellungen des Geräts möglicherweise mit einer geringeren Leistung läuft als im Akkubetrieb.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.openDeviceUtilizationReport=Öffnen Sie den Bericht zur Geräteauslastung.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.option1=Option 1:
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.option2=Option 2:
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.option3=Option 3:
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.option4=Option 4:
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.option5=Option 5: Aktualisieren Sie die BIOS-Firmware, indem Sie eine BIOS-Richtlinie erstellen oder HP Image Assistant verwenden.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.possibleCauses=Mögliche Ursachen:
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.responseOptions=Je nach Anwendung gibt es unterschiedliche Möglichkeiten zur Behebung dieses Problems. Falls es sich um eine geschäftskritische Anwendung handelt, könnte ein CPU-Upgrade das Problem deutlich reduzieren. Bei nicht geschäftskritischen Anwendungen besteht die Möglichkeit, sie vom Gerät zu löschen oder die Einstellungen so zu ändern, dass die Gerätebelastung reduziert wird.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.restartComputer=Starten Sie den Computer neu, um alle laufenden Anwendungen vollständig zu schließen.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.suggestedRemediations=Empfohlene Behebung:
