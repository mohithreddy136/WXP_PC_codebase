exp.GpuHealthIssue.blueScreenLink=https://docs.microsoft.com/en-us/windows-hardware/drivers/debugger/-analyze
exp.GpuHealthIssue.blueScreenLinkText=https://docs.microsoft.com/en-us/windows-hardware/drivers/debugger/-analyze
exp.GpuHealthIssue.causeBlueScreenErrors=Bluescreen-Fehler: Bluescreen-Fehler können durch zu viele grafikintensive Programme, gleichzeitig laufende visuelle Effekte oder Treiber- und Hardwareprobleme verursacht werden.
exp.GpuHealthIssue.causeDoubleBitEcc=Doppelbit-Fehler im ECC-Speicher: Die Grafikkarte weist Doppelbit-Fehler im ECC-Speicher auf, die möglicherweise auf Hardwareprobleme oder Fehler im Speicher hinweisen.
exp.GpuHealthIssue.causeHighDoubleBitEccOverTime=Viele Doppelbit-Fehler im ECC-Speicher im Laufe der Zeit: Die Grafikkarte weist eine hohe Anzahl von Doppelbit-ECC-Speicherfehlern auf und die durchschnittliche Anzahl der Fehler nimmt seit mindestens 3 Wochen zu.
exp.GpuHealthIssue.causeHighTdrEvents=Viele TDR-(Timeout-Erkennung und Wiederherstellung des Display-Treibers) Ereignisse: Die Grafikkarte weist eine hohe Anzahl an TDR-Ereignissen auf. Dies deutet auf mögliche Treiber- oder Hardwareprobleme hin.
exp.GpuHealthIssue.causeMissingDriverUpdate=Fehlendes wichtiges Treiber-Update: Der Grafikkarte fehlt ein wichtiges Treiber-Update, dies kann sich auf die Leistung und Stabilität auswirken.
exp.GpuHealthIssue.causeThermalIssues=Thermische Probleme: Die Grafikkarte weist viele thermische Probleme auf und die GPU- oder Speichertemperatur liegt über der maximalen Betriebstemperatur.
exp.GpuHealthIssue.driverOption1=Option 1: Verwenden Sie HP Image Assistant, um Treiber zu aktualisieren
exp.GpuHealthIssue.driverOption2=Option 2: Verwenden Sie den Windows Update-Manager, um Treiber zu aktualisieren
exp.GpuHealthIssue.possibleCauses=Mögliche Ursachen:
exp.GpuHealthIssue.remediationBlueScreenPrefix=Bei Bluescreen-Fehlern: Prüfen Sie, ob zu viele grafikintensive Programme oder visuelle Effekte gleichzeitig ausgeführt werden. Aktualisieren Sie die Treiber der Grafikkarte, setzen Sie die übertakteten Einstellungen auf Standardwerte zurück, installieren Sie den Treiber neu oder setzen Sie die Einstellungen auf Werkseinstellungen zurück, stellen Sie eine geeignete Stromversorgung sicher und reinigen Sie die Lüftungsschlitze und den Lüfter. Analysieren Sie die Mini-Dump-Datei auf spezifische Behebungsschritte:
exp.GpuHealthIssue.remediationDoubleBitEcc=Bei Doppelbit-Fehlern im ECC-Speicher: Überwachen Sie die Situation weiterhin und prüfen Sie, ob die Leistung weiterhin abnimmt. Bleibt die Anzahl der Fehler auf hohem Niveau, erwägen Sie einen Austausch der Grafikkarte.
exp.GpuHealthIssue.remediationMissingDriver=Bei fehlendem Treiber-Update: Aktualisieren Sie den Grafikkartentreiber auf die neueste Version, um Leistungsprobleme zu beheben.
exp.GpuHealthIssue.remediationTdr=Bei TDR-Ereignissen: Beobachten Sie dies weiter und aktualisieren Sie den Grafikkartentreiber, wenn das Problem weiterhin besteht. Setzen Sie die Grafikeinstellungen auf Standard zurück, setzen Sie die übertakteten Einstellungen auf Standard zurück, aktualisieren Sie das BIOS, falls ein Update vorhanden ist, und prüfen Sie auf ausreichende Stromversorgung und ordnungsgemäßen Luftstrom. Lüftungsschlitze und Lüfter reinigen.
exp.GpuHealthIssue.remediationThermal=Bei thermischen Problemen: Prüfen Sie auf begrenzten Luftstrom, saubere Lüftungsschlitze und stellen Sie sicher, dass der Lüfter ordnungsgemäß läuft und sauber ist.
exp.GpuHealthIssue.suggestedRemediations=Empfohlene Behebung:
exp.GpuHealthIssue.title=GPU-Zustand angehen
exp.HpBatteryHealthManagerNotEnabled.causeNotCompatible=Das Gerät ist nicht mit dem HP Akkuzustandsmanager kompatibel.
exp.HpBatteryHealthManagerNotEnabled.causeRequiresBiosUpdate=Das Gerät benötigt ein BIOS-Update.
exp.HpBatteryHealthManagerNotEnabled.description=Der HP Akkuzustandsmanager ist seit 2016 auf allen HP Business-Notebooks verfügbar. Um die Akkulaufzeit zu verbessern, wird empfohlen, den Akkuzustandsmanager zu aktivieren.
exp.HpBatteryHealthManagerNotEnabled.option1Detail=HP empfiehlt, den HP Akkuzustandsmanager zu aktivieren, um den Akkuzustand entweder von HP verwalten zu lassen oder je nach Nutzung oder Alter des Geräts zu maximieren.
