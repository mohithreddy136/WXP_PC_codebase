poly.lens.actions=Aktionen
poly.lens.addon.details.description=Verwalten Sie Ihre Flotte von HP Collaboration-Geräten in Ihrem gesamten Unternehmen mit Sicherheit und Klarheit. Durch vereinfachte Bereitstellung, effiziente Wartung, proaktive Überwachung und aussagekräftige Einblicke erhalten IT-Teams eine einheitliche, zentrale Kontrolle. Dank sicherer, cloudbasierter Verwaltung und durchgängiger Unterstützung für hybrides Arbeiten lassen sich der operative Aufwand senken, potenzielle Probleme frühzeitig adressieren und eine einheitliche, verlässliche Nutzungserfahrung sicherstellen – überall dort, wo Ihre Teams arbeiten.
poly.lens.addon.feature.centralized.header=Zentrale Verwaltung persönlicher Geräte
poly.lens.addon.feature.centralized.text=Unterstützt durch die HP Poly Studio-Anwendungen erhalten Endnutzer eine reibungslose Self-Service-Nutzung, während IT-Teams die zentrale Sichtbarkeit und Steuerung persönlicher Geräte sicherstellen. Steuern Sie Bestände, Aktualisierungen, Überwachung und Analysen souverän an jedem Arbeitsort Ihres Teams.
poly.lens.addon.feature.effortless.maintenance.header=Unkomplizierte Wartung
poly.lens.addon.feature.effortless.maintenance.text=Verwalten Sie Einstellungen, Funktionen und Software-Updates für Ihre gesamte Flotte mit nur minimalem Aufwand. Wenden Sie Einstellungen an, stellen Sie Updates bereit und optimieren Sie Konfigurationen skalierbar, ohne Kontrolle oder Genauigkeit einzubüßen.
poly.lens.addon.feature.meaningful.measurement.header=Aussagekräftige Messung
poly.lens.addon.feature.meaningful.measurement.text=Gewinnen Sie ein klares Verständnis darüber, wie Geräte, Räume und Personen wirklich arbeiten. Nutzen Sie Auslastungs- und Leistungsdaten, um fundierte, datenbasierte Entscheidungen über Ihre Kollaborationsinvestitionen zu treffen.
poly.lens.addon.feature.proactive.monitoring.header=Proaktive Überwachung
poly.lens.addon.feature.proactive.monitoring.text=Bleiben Sie Problemen einen Schritt voraus – mit klarer Transparenz über Gerätezustand und -status. Lassen Sie sich benachrichtigen, wenn Abweichungen auftreten, damit Störungen behoben werden, bevor sie Meetings beeinflussen.
poly.lens.addon.feature.secure.header=Sichere und Cloud-basierte Kontrolle
poly.lens.addon.feature.secure.text=Steuern Sie sämtliche Funktionen über eine sichere, cloudbasierte Plattform, die mit Ihrer Organisation mitwächst und höchste Anforderungen an Sicherheit und Compliance erfüllt.
poly.lens.addon.feature.simplified.deployment.header=Vereinfachte Bereitstellung
poly.lens.addon.feature.simplified.deployment.text=Problemloses Vorbereiten, Vorkonfigurieren und Bereitstellen von Geräten. Automatisierte Onboarding-Prozesse verkürzen die Bereitstellungszeit, beseitigen Fehler und bereiten Geräte vor, bevor sie beim Benutzer oder im Raum ankommen.
