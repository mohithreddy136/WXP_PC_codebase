adminx.welcome.services.header=HP Services & Solutions
adminx.welcome.services.hpActiveCare=Eine vollständige Suite von Services für Geräteschutz, -support und -reparaturen für Unternehmenskundinnen und -kunden, die sowohl im Büro als auch unterwegs und an Remotestandorten arbeiten.
adminx.welcome.services.hpConnect=Erstellen Sie Richtlinien zur automatischen Verwaltung von BIOS-Einstellungen, BIOS-Authentifizierung und BIOS-Updates für Ihre über MEM verwalteten Endpunkte.
adminx.welcome.services.hpPresence=Unterstützen Sie die Zusammenarbeitsanforderungen Ihrer Mitarbeiterinnen und Mitarbeiter und sorgen Sie für einen nahtlosen Betrieb von Konferenzräumen mit Einblicken, Echtzeitüberwachung und schnellem Support.
adminx.welcome.services.hpProactiveInsights=Identifizieren und beheben Sie Geräteprobleme proaktiv, damit Ihre Mitarbeiterinnen und Mitarbeiter so gut wie möglich produktiv bleiben.
adminx.welcome.services.hpWolfProtectTrace=Lokalisieren und sperren Sie PCs bzw. löschen Sie sicher die Daten von PCs von einem entfernten, selbstverwalteten Standort aus.
adminx.welcome.services.introduction=Durch unser Portfolio an Services und Lösungen kann die IT-Abteilung Mitarbeiterinnen und Mitarbeiter im Büro, zu Hause und überall dazwischen unterstützen. Mit einer Reihe von Services für jede Phase im Lebenszyklus Ihrer Geräte sowie zur Unterstützung der IT mit intelligenten Managed Services ist HP Ihr Partner, wenn es darum geht, die Leistungsfähigkeit Ihrer Mitarbeiter zu steigern.
adminx.welcome.tools.header=Kostenlose Tools zur Erweiterung Ihres Workflows.
adminx.welcome.wfc.description=Mit den HP Workforce Solutions kann das IT-Team Mitarbeiterinnen und Mitarbeiter im Büro, zu Hause und überall dazwischen unterstützen.
adminx.welcome.wfc.header=Machen Sie Ihre Arbeitskräfte zu Wachstumskräften
adminx.welcome.wfe.description=Profitieren Sie von dem sofortigen Zugriff auf Analysen und Erkenntnisse, die bei jedem Kauf von kommerzieller HP Hardware verfügbar sind.* Vom ersten Tag an bietet HP Erkenntnisse, die unerlässlich sind, um mit dem Management Ihrer Flotte loszulegen.
adminx.welcome.wfe.header=Den besten Durchblick liefern Erkenntnisse
