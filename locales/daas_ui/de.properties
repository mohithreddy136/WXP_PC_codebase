exp.DiskUtilizationHigh.causeLargeFiles=Große Dateien und Ordner, wie Videos, Sicherungen oder Datenbankdateien, können schnell Festplattenspeicher belegen.
exp.DiskUtilizationHigh.causeMisconfiguredApps=Fehlkonfigurierte Anwendungen, die übermäßig viele Daten oder Protokolldateien speichern, können erheblichen Speicherplatz belegen.
exp.DiskUtilizationHigh.causeTempFiles=Die Anhäufung von temporären Dateien, Browser- oder System-Cache führen oft zu einem vollen Festplattenspeicher. Die regelmäßige Verwendung integrierter Bereinigungstools oder manueller Methoden zum Entfernen dieser temporären Dateien kann dazu beitragen, den verfügbaren Speicherplatz auf der Festplatte freizuhalten.
