exp.HpBatteryHealthManagerNotEnabled.references=Referenzen:
exp.HpBatteryHealthManagerNotEnabled.settingLetDetail1=Ändert dynamisch, wie das System den Akku lädt, je nach Auslastungsbedingungen und Temperatur im Laufe der Zeit.
exp.HpBatteryHealthManagerNotEnabled.settingLetTitle=Den Zustand meines Akkus von HP verwalten lassen
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases1=Umgebungen mit gemischter Nutzung, in denen das Notebook regelmäßig ausgeschaltet und der Akku nicht verwendet wird.
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases2=Sie bevorzugen ein einziges Verfahren für Ihr Unternehmen.
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases3=Das Notebook ist weniger als ein Jahr alt.
exp.HpBatteryHealthManagerNotEnabled.settingMaxDetail1=Begrenzt den maximalen Ladezustand auf 80 %, um den Akkuzustand zu optimieren und Aufblähung zu verhindern.
exp.HpBatteryHealthManagerNotEnabled.settingMaxTitle=Meinen Akkuzustand optimieren
exp.HpBatteryHealthManagerNotEnabled.settingMaxUseCases1=Umgebungen, in denen Notebooks dauerhaft an Wechselstrom angeschlossen sind.
exp.HpBatteryHealthManagerNotEnabled.settingMaxUseCases2=Notebooks ein Jahr alt oder älter.
