ee_experienceScore_para1_description4=Die Gerätebewertung wird aus Telemetriedaten des Flottenmanagement-Moduls gewonnen und setzt sich aus der Zustandsbewertung des Systems (60 %) und der Bewertung des Betriebssystems und der Systemzuverlässigkeit (40 %) zusammen.
