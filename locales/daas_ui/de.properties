exp.mgmt.troubleshoot.description.antivirus_not_enabled_other=Das Gerät ist für die Verwendung eines Antivirenprogramms von einem Drittanbieter konfiguriert, um das Gerät vor Viren, Malware und anderen Bedrohungen zu schützen, jedoch ist der Virenschutz auf dem Gerät deaktiviert.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.description=Nicht authentifizierte Verbindung erkannt.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.moreInfo=Weitere Informationen:
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.moreInfoLink=https://support.microsoft.com/en-us/windows/wi-fi-network-not-secure-in-windows-9170b675-921b-3aa5-7e43-fcb2059d159c
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option1=Option 1: Wenn Sie eine Verbindung zu Ihrem Heim-Wi-Fi-Netzwerk herstellen, sollten Sie überlegen, ob Sie die Art der Sicherheit, die Ihr Router oder Zugangspunkt verwendet, ändern.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option1.step1=Melden Sie sich mit der entsprechenden Software bei Ihrem Router an.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option1.step2=Ändern Sie den Sicherheitstyp für Ihr Wi-Fi-Heimnetzwerk.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option2=Option 2: Wenn Sie einen älteren Router oder Zugangspunkt haben, sollten Sie einen neueren Router erwerben, der die neuesten Sicherheitsstandards und Verbesserungen unterstützt.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.recommendations=Empfehlungen:
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.title=Wi-Fi-Verbindung ist nicht sicher
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.cause1=Der Grundriss Ihrer Wohnung kann Wi-Fi-Probleme verursachen.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.cause2=Der Zugangspunkt könnte sich hinter Mauern und Hindernissen befinden.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.description=Die Wi-Fi-Signalstärke wurde in den letzten 24 Stunden als schwach gemeldet.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.moreInfo=Weitere Informationen:
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.moreInfoLink=https://support.microsoft.com/en-us/windows/wi-fi-problems-and-your-home-layout-e1ed42e7-a3c5-d1be-2abb-e8fad00ad32a#WindowsVersion=Windows_11
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.possibleCauses=Mögliche Ursachen für das Heimnetzwerk:
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1=Option 1: Router neustarten
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step1=Trennen Sie Modem und Router vom Stromnetz.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step2=Warten Sie mindestens 15 Sekunden.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step3=Stecken Sie zuerst das Modem wieder in die Netzsteckdose, warten Sie ein bis zwei Minuten und schalten Sie dann den Router ein.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step4=Warten Sie, bis alle Kontrollleuchten an Ihrem Kabelmodem grün leuchten, bevor Sie die Internetverbindung testen.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2=Option 2: Stellen Sie ihren Zugangspunkt an einem anderen Ort auf.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step1=Stellen Sie Ihren Zugangspunkt ggfs. an einem anderen Ort auf, um die Anzahl der Wände oder anderer Hindernisse zwischen Ihrem Zugangspunkt und Ihrem PC zu verringern.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step2=Stellen Sie Ihren PC näher zum Zugangspunkt auf, falls möglich.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step3=Stellen Sie den Zugangspunkt möglichst in die Mitte Ihrer Wohnung oder Ihres Zimmers auf und wenn möglich, etwas höher. Wenn Sie ihn in einer Ecke oder unter einem Schreibtisch aufstellen, kann sich die Wi-Fi-Signalstärke verringern.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendations=Empfehlungen:
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.title=Wi-Fi-Signalstärke ist schwach
exp.mgmt.troubleshoot.network.wifispeedisslow.cause1=Der Zugangspunkt könnte sich hinter Mauern und Hindernissen befinden.
exp.mgmt.troubleshoot.network.wifispeedisslow.cause2=Die Router-Firmware könnte veraltet sein.
exp.mgmt.troubleshoot.network.wifispeedisslow.description=Die nominale Wi-Fi-Geschwindigkeit wurde in den letzten 24 Stunden als langsam gemeldet.
exp.mgmt.troubleshoot.network.wifispeedisslow.possibleCauses=Mögliche Ursachen für das Heimnetzwerk:
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation1=Starten Sie Ihr Modem und Ihren Router neu
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation1.step1=Schalten Sie zuerst Ihr Modem, dann Ihren Router aus.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation2=Stellen Sie den Router an einem anderen Ort auf
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation2.step1=Stellen Sie den Router an einem anderen Ort in Ihrer Wohnung oder Ihrem Büro auf, oder richten Sie die Antennen in eine andere Richtung aus.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation3=Aktualisieren Sie die Firmware Ihres Routers
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation3.step1=Regelmäßiges Aktualisieren Ihrer Router-Firmware kann dazu beitragen, Fehler und Konnektivitätsprobleme zu beheben. Während einige Router sich automatisch aktualisieren, erfordern andere manuelle Updates.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation4=Ändern Sie die Frequenz Ihres Routers
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation4.step1=Wi-Fi-Router wählen automatisch ein Frequenzband aus, aber Sie können versuchen, es von 2,4 GHz auf 5 GHz zu ändern, um zu sehen, ob sich Ihre Geschwindigkeit dadurch verbessert. Sie sollten jedoch vorher prüfen, ob Ihr Router 5 GHz unterstützt.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation5=Aktualisieren Sie Ihre Wi-Fi-Treiber
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation5.step1=Veraltete oder beschädigte Treiber können Netzwerkprobleme verursachen. Stellen Sie sicher, dass Ihr Wi-Fi-Adapter auf dem neuesten Stand ist.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation6=Vermeiden Sie Störungen
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation6.step1=Kanalstörungen können den Durchsatz erheblich verringern und die Datenübertragung verlangsamen. Versuchen Sie daher, etwaige Störungen zu beseitigen.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation7=Andere Geräte prüfen
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation7.step1=Stellen Sie fest, welche anderen Geräte mit Ihrem Netzwerk verbunden sind und was sie gerade tun. Wenn beispielsweise ein anderes Gerät viele Daten herunterlädt, kann dies Ihre Geschwindigkeit beeinträchtigen.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendations=Empfehlungen:
exp.mgmt.troubleshoot.network.wifispeedisslow.title=Wi-Fi-Geschwindigkeit ist gering
