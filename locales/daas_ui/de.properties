adminx.welcome.hp_connect.section.text3=In Kürze wird HP Connect Teil der neuen App HP {appName} sein – einem zentralen Ort, an dem Sie alle Ihre HP Services und Lösungen verwalten können.
adminx.welcome.introduction=HP {appName} ermöglicht es Kunden, HP Services und Lösungen an einem Ort zu entdecken, zu konfigurieren, zu verwalten und zu überwachen. Mit einer einzigen Anmeldung, die einen zentralen Zugriff auf viele Tools bietet, können Sie schnell auf Ihre Serviceerfahrung, IT-Verwaltungsfunktionen und umsetzbare Geräteinformationen zugreifen.
