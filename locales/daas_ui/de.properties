dnto.subscriptions.about_hp.desc1=Wir sind ein Technologieunternehmen, das aus der Überzeugung heraus gegründet wurde, dass Unternehmen mehr als nur Gewinn erwirtschaften sollten. Unternehmen sollten die Welt verbessern. Unsere Bemühungen in den Bereichen Klimaschutz, Menschenrechte und digitale Gerechtigkeit zeigen, dass wir unser Möglichstes tun, um dies zu erreichen.
dnto.subscriptions.about_hp.desc2=Mehr als 80 Jahre Tätigkeit sind ein Beweis für unsere Absichten. Wir glauben an eine Welt, in der Innovationen herausragende Beiträge für die Menschheit leisten.
dnto.subscriptions.about_hp.desc3=Und unsere Technologie – ein Produkt- und Serviceportfolio an persönlichen Systemen, Druckern und 3D-Drucklösungen – ist die Triebfeder für diesen sinnvollen Fortschritt.
dnto.subscriptions.about_hp.desc4=Wir wissen, dass jeder Mensch gute Ideen haben kann – überall und zu jeder Zeit.
dnto.subscriptions.about_hp.desc5=Und es braucht nur eine Idee, um die Welt zu verändern.
