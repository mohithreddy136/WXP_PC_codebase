requirements.list.hp_print_fleetproxy.desc1=Für den Print Fleet Proxy muss HP Web Jetadmin auf demselben PC installiert sein. HP empfiehlt dringend, dass Sie vor der Installation von HP Fleet Proxy auf die neueste Version von Web Jetadmin aktualisieren.
requirements.list.hp_print_fleetproxy.desc2=Derzeit testet HP den HP Fleet Proxy nur mit HP Web Jetadmin 10.5 SR4. Auch wenn HP Fleet Proxy mit früheren Versionen von HP Web Jetadmin funktionieren kann, garantiert HP nicht, dass alle Funktionen wie erwartet funktionieren.
requirements.list.hp_print_fleetproxy.desc3=Web Jetadmin ist ein ressourcenintensiver Dienst. Auch wenn HP Fleet Proxy keinen großen zusätzlichen Overhead verursachen sollte, kann es zu Leistungseinbußen kommen, wenn der Hostserver nicht über genügend Rechenleistung verfügt, um beide Dienste und die von ihnen verwalteten Geräte zu unterstützen. Sie sollten sicherstellen, dass der Server, auf dem HP Web Jetadmin und HP Fleet Proxy gehostet werden, stabil genug ist und über genügend Prozessorkerne verfügt, um etwaige Leistungsprobleme zu bewältigen.
requirements.list.hp_print_fleetproxy.desc4=Beim Testen von 2000 Geräten stellte HP fest, dass die folgenden Basis-Hardware-Spezifikationen ausreichen sollten, um akzeptable Leistungsergebnisse zu erzielen. Wenn Sie eine langsame Leistung feststellen oder wenn Sie mehr als 2.000 Geräte verwalten, benötigen Sie möglicherweise einen Server mit mehr Rechenleistung.
requirements.list.hp_print_fleetproxy.desc5=Print Fleet Proxy ist ein Vor-Ort-Service, der mit einem Cloud-basierten Dienst kommuniziert. Daher müssen Sie Ihre Firewall so konfigurieren, dass sie eingehende und ausgehende Kommunikation zwischen dem WJA-Server und dem HP Command Center zulässt, entweder durch DNS-Filterung oder IP-Whitelisting.
requirements.list.hp_print_fleetproxy.desc6=Sie finden diese Liste hier:
requirements.list.hp_print_fleetproxy.hp-nf1=DNS-Filterung: Konfigurieren Sie Ihre Firewall so, dass ausgehende HTTPS-Anfragen über Port 443 an die folgenden Endpunkte zugelassen werden:
requirements.list.hp_print_fleetproxy.hp-nf2=IP-Whitelisting: Um IP-Adressen auf die Whitelist zu setzen, müssen Sie die IP-Adresse jedes möglichen Cloud-Servers angeben, mit dem HP Fleet Proxy möglicherweise kommunizieren muss.
