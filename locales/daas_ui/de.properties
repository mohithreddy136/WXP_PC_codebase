bios.bsod.tooltip.context=Diese Auswirkung des BIOS wird durch eine Gewichtung bestimmt, bei der das Auftreten von BSOD in der Nähe des Upgrades in anderen Geräten desselben Modells eine höhere Gewichtung hat. Darüber hinaus werden bestimmte Gerätemodelle mit einer Gewichtung von mehr als X % als „hochwirksam“ eingestuft. Die Auswirkung wird für jedes Gerätemodell berechnet und gilt für alle Geräte, die für diese spezifische BIOS-Version empfohlen werden. Wenn das Auftreten von BSOD für ein Modell geringer ist, ist die Gewichtung geringer und somit auch die Auswirkung.
