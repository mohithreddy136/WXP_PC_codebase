exp.NetworkDisconnections.causeOutdatedRouter.detail2=Empfehlung: Halten Sie die Netzwerkausrüstung auf dem neuesten Stand; Führen Sie eine Rücksetzung auf die Werkseinstellungen durch, um fehlerhafte Einstellungen zu löschen.
