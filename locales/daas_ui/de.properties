wex.onboarding.coachmark.pulse.sentiment.desc=Mit dieser schlüsselfertigen Umfrage können Sie die Stimmung Ihrer Mitarbeiter gegenüber der Technologie messen. Die Antworten der Mitarbeiter fließen in den Sentiment-Score ein, ein Schlüsselelement des Experience Score.
