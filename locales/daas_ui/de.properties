exp.DiskUtilizationHigh.emptyRecycleBin=Papierkorb leeren.
exp.DiskUtilizationHigh.enterTemp=Geben Sie „%temp%“ (ohne die Anführungszeichen) in die Adressleiste ein und drücken Sie auf die Eingabetaste.
exp.DiskUtilizationHigh.freeUpDiskSpace=Drücken Sie in Sync und Backup auf „Speicherplatz freigeben“.
