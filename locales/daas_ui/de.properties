welcome.whats_new.line1=Jonathan Nikols, VP und Global Head von HP TechPulse
welcome.whats_new.line2=Wir bei HP haben eben unseren ersten Jahrestag seit der ersten Bereitstellung unserer TechPulse Tarife für unsere Kunden und Partner gefeiert – und was für eine Jubiläumsfeier das war! Im Oktober 2018 wurde HP von der Technology Services Industry Association (TSIA) mit dem 2018 STAR Award for Innovation für ein Standardangebot für Managed Services und/oder den Katalog für die HP TechPulse Lösung ausgezeichnet. Das war ein besonders bedeutsames Ereignis, da es die 15. TSIA-Auszeichnung insgesamt für HP ist und HP dadurch in der Hall of Fame der TSIA-Preisträger ein Stück vorrücken konnte.
welcome.whats_new.line3=Mit dem in den HP TechPulse Tarifen enthaltenen Proactive Management können unsere Kunden zur Verbesserung der Geschäftsergebnisse noch besser von bereits getätigten IT-Investitionen profitieren, Unterstützung beim Umstieg auf Windows 10 erhalten und bessere, intelligentere Entscheidungen treffen. Für Partner verbessern wir in Ergänzung zum gewünschten TechPulse Tarif die Bereitstellung des TechPulse Service, bieten mehr adressierbaren Speicherplatz für die TechPulse Lösung und vereinfachen die Unterstützung von Kunden bei der Suche nach den passenden Lebenszyklusservices.
welcome.whats_new.line4=Wichtig für den Gesamterfolg von TechPulse ist eine kontinuierliche Konzentration auf Plattform, Technologie und Prozesse zur Realisierung von innovativen Services. HP Proactive Management mit TechPulse ist intelligenter, schneller und leistungsfähiger denn je und legt den Grundstein für eine erfolgreiche gemeinsame Zukunft.
welcome.whats_new.line5=Vielen Dank, dass Sie uns bei dieser spannenden Reise begleiten. Wir freuen uns auf viele weitere Jahre erfolgreicher Zusammenarbeit mit Ihnen!
