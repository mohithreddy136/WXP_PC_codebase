azureonboard.marketing.disclaimer.content=Änderungen vorbehalten. Die einzigen Garantien für HP Produkte und Services sind ausschließlich in der entsprechenden, zum Produkt und den Services gehörigen Garantieerklärung beschrieben. Aus dem vorliegenden Dokument sind keine weiterreichenden Gewährleistungsansprüche abzuleiten, HP übernimmt keine Haftung für technische oder redaktionelle Fehler oder für die Vollständigkeit der Angaben in diesem Dokument.
azureonboard.marketing.disclaimer.contentlist1=HP Proactive Insights und/oder darin enthaltene Komponenten können je nach Region, Betriebssystem oder autorisiertem HP Servicepartner variieren. Informationen für Ihren Standort erhalten Sie bei Ihrem lokalen HP Ansprechpartner oder autorisierten Partner. Für HP Services gelten die anwendbaren allgemeinen Geschäftsbedingungen für HP Services, die dem Kunden zum Zeitpunkt des Kaufs bereitgestellt oder genannt werden. Der Kunde kann möglicherweise gemäß länderspezifischen Gesetzen zusätzliche Ansprüche geltend machen, diese Ansprüche bleiben durch die HP Geschäftsbedingungen des Service oder die HP Herstellergarantie des HP Produkts unberührt.
azureonboard.marketing.disclaimer.contentlist2=HP {appName} ist eine Telemetrie- und Analyseplattform, die wichtige Daten zu Geräten und Anwendungen liefert und nicht als eigenständiger Service verkauft wird. HP {appName} befolgt die strengen Datenschutzbestimmungen der Datenschutz-Grundverordnung und ist nach ISO27001, ISO27701, ISO27017 und SOC2 Type2 für Informationssicherheit zertifiziert. Ein Internetzugang mit Verbindung zu {appName} ist erforderlich. Die vollständigen Systemanforderungen finden Sie unter <a target='_blank' href={link}>{text}</a>.
azureonboard.marketing.disclaimer.contentlist3=BIOS-Updates sind nur auf HP Geräten verfügbar.
azureonboard.marketing.disclaimer.contentlist4=Einzelheiten zur Betriebssystemabdeckung finden Sie unter <a target='_blank' href={link}>{text}</a>.
azureonboard.marketing.employeesection.description=Erfassen, messen und verwalten Sie das digitale Benutzererlebnis Ihrer Mitarbeiter anhand von Umfragen zu Hardware, Anwendungen und Benutzererlebnis für all Ihre Geräte.
azureonboard.marketing.employeesection.heading=Proactive Employee Insight
azureonboard.marketing.hardwaresection.description=Überwachen Sie Festplattenlaufwerke, CPU-Auslastung, Temperatur und Akkuleistung – so können Sie mögliche Auswirkungen vorhersagen, indem Sie Ihre Daten anhand von Daten von mehr als 20 Millionen Geräten analysieren.
azureonboard.marketing.hardwaresection.heading=Proactive Hardware Insight
azureonboard.marketing.insightsection.description=Diagnostizieren Sie Leistungsprobleme, Softwarefehler, Systemabstürze mit blauem Bildschirm sowie die Systemnutzung, und aktualisieren Sie Treiber und Patches, um Ihre Sicherheitsprofile jederzeit aktuell zu halten.
azureonboard.marketing.insightsection.heading=Proactive Application Insight
azureonboard.marketing.learnmoresection.content=HP Proactive Insights kann auf Erkenntnisse von mehr als 20 Millionen Geräten und Milliarden von Datenpunkten zurückgreifen und nutzt die HP TechPulse Analyseplattform, um Probleme zu identifizieren und zu beheben, bevor sie sich auf die Mitarbeiter auswirken können.
azureonboard.marketing.learnmoresection.description=Wir unterstützen Sie bei Ihrem Paradigmenwechsel in Bezug auf die Geräteverwaltung mithilfe der KI-gestützten Steuerung von Computerleistung, Sicherheit, Kosten, Ausfallzeiten und Zufriedenheit Ihrer Mitarbeiter. Sie profitieren von Erfahrungswerten mit mehr als 20 Millionen Computing-Geräten, um Ihre Organisation zu verbessern.
azureonboard.marketing.learnmoresection.heading=HP Proactive Insights liefert aussagekräftige Analysen basierend auf Milliarden von Datenpunkten
