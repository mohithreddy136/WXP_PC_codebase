exp.ExcessiveOsStartupTime.causeAntivirus=Antivirusdienste oder andere speicherintensive Anwendungen benötigen übermäßig viel Zeit zum Laden.
exp.ExcessiveOsStartupTime.causeGroupPolicyDownload=Der Download von Gruppenrichtlinienobjekten während des Systemneustarts dauert sehr lange.
exp.ExcessiveOsStartupTime.causeSlowDomainLink=Der PC hat möglicherweise eine langsame Verbindung zu dem Domain-Controller, von dem die GPO während des Starts heruntergeladen werden.
exp.ExcessiveOsStartupTime.causeStartupScripts=Startskripte nehmen übermäßig viel Zeit in Anspruch.
exp.ExcessiveOsStartupTime.option1=Option 1: Windows 11 - Startanwendungen in Einstellungen
exp.ExcessiveOsStartupTime.option1Guide=Zur Leistungssteigerung des Geräts und zur Verkürzung der Anmeldezeit ist das Entfernen von Programmen aus dem automatischen Startvorgang am wirkungsvollsten. Microsoft stellt für Windows 11-Geräte eine Anleitung bereit, mit der sich der Start von Windows gezielt steuern lässt.
exp.ExcessiveOsStartupTime.option1GuideLink=https://www.microsoft.com/en-us/windows/learning-center/take-control-of-windows-startup
exp.ExcessiveOsStartupTime.option1GuideLinkText=https://www.microsoft.com/en-us/windows/learning-center/take-control-of-windows-startup
exp.ExcessiveOsStartupTime.option1StepApps=Wählen Sie „Anwendungen“ auf der linken Seite des Fensters.
exp.ExcessiveOsStartupTime.option1Steps=by changing the Windows startup programs using the following steps:
exp.ExcessiveOsStartupTime.option1StepSettings=Einstellungen auswählen.
exp.ExcessiveOsStartupTime.option1StepStart=Wählen Sie die Start-Schaltfläche, die dem Microsoft-Logo ähnelt.
exp.ExcessiveOsStartupTime.option1StepStartup=Wählen Sie „Start“ unten auf dem Anwendungsfenster.
exp.ExcessiveOsStartupTime.option1StepToggles=Mit dem Umschalter können Sie auswählen, welche Apps beim Start ausgeführt werden. Aktivieren Sie den Schalter, wenn die App beim Start geöffnet werden soll, und deaktivieren Sie ihn, wenn sie nicht automatisch gestartet werden soll.
exp.ExcessiveOsStartupTime.option2=Option 2: Windows 11 - Startanwendungen im Task-Manager
exp.ExcessiveOsStartupTime.option2Guide=Startanwendungen können mit den folgenden Schritten auch über den Windows Task-Manager aktiviert und deaktiviert werden:
exp.ExcessiveOsStartupTime.option2StepDisable=Klicken Sie mit der rechten Maustaste auf eine App und wählen Sie Deaktivieren, falls in der Spalte "Status" die Option "Aktiviert" angezeigt wird.
exp.ExcessiveOsStartupTime.option2StepStart=Wählen Sie die Start-Schaltfläche, die dem Microsoft-Logo ähnelt.
exp.ExcessiveOsStartupTime.option2StepStartupApps=Wählen Sie „Startanwendungen“ aus der linken Navigation.
exp.ExcessiveOsStartupTime.option2StepTaskManager=Geben Sie „Task-Manager“ ein und drücken Sie die Eingabetaste, um den Windows Task-Manager zu öffnen.
exp.ExcessiveOsStartupTime.option3=Option 3: Anwendungen deinstallieren
exp.ExcessiveOsStartupTime.option3Guide=Anwendungen, die nicht automatisch beim Hochfahren starten, können auch zu einer langsamen Anmeldung beitragen, da diese Anwendungen Dateien, Dienste und Registrierungseinträge enthalten, die möglicherweise teilweise geladen werden. Anwendungen im Infobereich sind Beispiele von Anwendungen, die laufen, auch wenn kein Fenster mit der laufenden Anwendung vorhanden ist. Um unnötige Anwendungen zu prüfen und zu entfernen, führen Sie die folgenden Schritte aus: Hinweis: Für die Entfernung einiger Anwendungen sind möglicherweise Administratorrechte erforderlich.
exp.ExcessiveOsStartupTime.option3StepControlPanel=Geben Sie „System“ ein und drücken Sie die Eingabetaste, um die Systemsteuerung zu öffnen.
exp.ExcessiveOsStartupTime.option3StepPrograms=Öffnen Sie Programme und Funktionen.
exp.ExcessiveOsStartupTime.option3StepStart=Wählen Sie die Start-Schaltfläche, die dem Microsoft-Logo ähnelt.
exp.ExcessiveOsStartupTime.option3StepUninstall=Wählen Sie eine zu entfernende Anwendung aus, um sie zu deinstallieren.
exp.ExcessiveOsStartupTime.option4=Option 4: Verwenden Sie PowerShell und das Modul ActiveDirectory, um Get-GpResultantSetofPolicy auszuführen. Analysieren Sie dann die Richtlinien und die Dauer ihrer Anwendung auf dem/n betroffenen Rechner/n, um mögliche Verbesserungen zu ermitteln.
