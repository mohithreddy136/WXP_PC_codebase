sustainability.dashboard.info_message=Die Daten zum Stromverbrauch werden auf zwei Arten erfasst: Messung des Stromverbrauchs (PCM) über einen eingebetteten Chip und (Estimated Consumption, EC) basierend auf einem aktuellen BIOS-Update für neuere HP-PCs. Die Genauigkeit der Daten hängt von der Methode ab, die der betreffende PC unterstützt.
sustainability.dashboard.info_message_data=Mit dieser Methode wird der gesamte Stromverbrauch eines Geräts in Kilowattstunden (kWh) berechnet, unabhängig von seinem Zustand (aktiv, Ruhezustand, Herunterfahren). Durch die Verarbeitung aller erfassten Daten am Ende einer Woche bietet es einen umfassenden Überblick über den Energieverbrauch des Geräts. Außerdem wird der Gesamtstromverbrauch der laufenden Woche in Echtzeit bis zum aktuellen Zeitpunkt berechnet und angezeigt.
