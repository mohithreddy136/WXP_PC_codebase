exp.FrequentWindowsBsodsHaveOccurred.description=In den letzten 7 Tagen gab es mehr als 3 Fehlerüberprüfungen (BSOD-Fehler). Fehlerüberprüfungen (Bugchecks) werden auch als „Blue Screen“- oder „BSOD-Fehler“ bezeichnet.
