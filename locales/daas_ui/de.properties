btg.addon.description=HP IQ kombiniert Kontextsensitivität, nahtlose Zusammenarbeit und eine personalisierte Benutzeroberfläche mit Sicherheitsstandards auf Enterprise-Niveau zur Steigerung der Produktivität und des persönlichen Workflows.
btg.addon.list.feature_five.description=Mit HP Poly Studio in Kombination mit Poly Lens können Benutzer ihre Geräte personalisieren und von jedem Standort aus eine nahtlose Verbindung aufrechterhalten.
btg.addon.list.feature_five.title=Deployment something something
