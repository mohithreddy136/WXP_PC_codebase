exp.EarlyDetectionWear.causeConstantCharge=Eine dauerhafte Aufladung des Akkus auf 100 %, insbesondere bei Anschluss an das Stromnetz über einen längeren Zeitraum, kann zu Verschleiß führen und die Lebensdauer verkürzen.
exp.EarlyDetectionWear.causeDeepDischarge=Häufige Tiefentladungen, bei denen der Akku vor dem Wiederaufladen vollständig entladen wird, können den Verschleiß beschleunigen und die gesamte Akkunutzungsdauer verringern.
exp.EarlyDetectionWear.causeHighTemp=Hohe Temperaturen, ob durch Gerätebetrieb in heißer Umgebung oder durch Hitzeeinwirkungen, kann thermischen Stress verursachen und die Akkuleistung im Laufe der Zeit verschlechtern.
exp.EarlyDetectionWear.changeHealthManager=Wechseln Sie die Geräteeinstellung des Akkuzustands zu einer der folgenden Einstellungen, je nach Alter des Geräts:
