wpt.details.desc=Mit HP {appName}, dem weltweit sichersten Dienst zum Suchen, Sperren und Löschen von Daten, können Sie Ihre Daten zuverlässig schützen, Ihre HP Geräteflotte überwachen und unbefugte Benutzer vom Zugriff auf Ihre Dateien und Dokumente in Ihrem Netzwerk abhalten. Unterstützt von HP Workforce Experience Platform bietet HP {appName} einen umfassenden, hardwaregestützten Dienst zum Auffinden und Sperren von Geräten sowie zum Löschen von Daten, selbst wenn PCs offline oder ausgeschaltet sind.
wpt.details.header=Einrichten der ersten Verteidigungslinie
wpt.disclaimer.point1=Basierend auf HPs interner Analyse der Software-Services Suchen, Sperren und Löschen. Höchste Sicherheit auf der Grundlage von Kryptographie und Persistency (einschließlich Hardwaregestützter Persistency) ab Oktober 2021.
wpt.disclaimer.point2=HP {appName} ist auf ausgewählten HP 600, 800, 1000, Windows-basierten Elite Dragonfly Laptops, ausgewählten 800 Desktops und Z1 G8 Workstations verfügbar und funktioniert, wenn das Gerät eingeschaltet und mit dem Internet verbunden ist.
wpt.disclaimer.point3=HP Workforce Experience Platform ist eine Telemetrie- und Analyseplattform, die wichtige Daten zu Geräten und Anwendungen liefert und nicht als eigenständiger Dienst verkauft wird. HP Workforce Experience Platform befolgt die strengen Datenschutzbestimmungen der Datenschutz-Grundverordnung und ist nach ISO27001, ISO27701, ISO27017 und SOC2 Type2 für Informationssicherheit zertifiziert. Ein Internetzugang mit Verbindung zum Workforce Experience Platform-Portal ist erforderlich. Die vollständigen Systemanforderungen finden Sie unter <a href=\"{link}\" target=\"_blank\" style=\"text-decoration: none; color: #027aae; cursor: pointer;\">{text}</a>.
wpt.disclaimer.point4=Hardware-gestützt bezieht sich auf HP Sure Run Gen4 und höher, das auf kompatiblen HP PCs mit diesem Service verfügbar ist und Windows 10 und höher erfordert.
wpt.disclaimer.point5=Servicelevel und Reaktionszeiten für HP Hardware Supports können je nach geografischem Standort variieren. Der Service beginnt mit dem Datum des Kaufs der Hardware. Es gelten Beschränkungen und Einschränkungen. Weitere Informationen finden Sie unter <a href="https://www.hp.com/go/cpc" target="_blank" style="text-decoration: none; color: #027aae; cursor: pointer;">www.hp.com/go/cpc</a>. Für HP Services gelten die anwendbaren allgemeinen Geschäftsbedingungen für HP Services, die dem Kunden zum Zeitpunkt des Kaufs bereitgestellt oder genannt werden. Der Kunde kann möglicherweise gemäß länderspezifischen Gesetzen zusätzliche Ansprüche geltend machen, diese Ansprüche bleiben durch die HP Geschäftsbedingungen des Service oder die HP Herstellergarantie des HP Produkts unberührt.
wpt.explore.header=Lösung erkunden
wpt.feature.cost.desc=Der Wert eines PC wird nicht nur durch Geld bestimmt. Mit HP {appName} können Sie das Risiko minimieren und die mit einem PC verbundenen Kosten senken. Jetzt haben Sie eine umfassende Möglichkeit, einen PC zu lokalisieren und Daten problemlos zu sperren oder zu löschen.
wpt.feature.cost.title=Kosten und Risiken reduzieren
wpt.feature.data.desc=Nutzen Sie unseren sichersten Service mit Schwellenwertverschlüsselung, um Daten auf all Ihren HP Geräten zu finden, zu sperren und zu löschen und so sicherzustellen, dass Ihre vertraulichen Informationen geschützt bleiben.
wpt.feature.data.title=Schutz für Ihre Geräte und Daten
wpt.feature.monitoring.desc=Mit dem vereinfachten Benutzer-Dashboard von HP Workforce Experience Platform können ITDMs schneller Schutzmaßnahmen für Geräte ergreifen und den Zustand und Schutzstatus aller Geräte auf einer benutzerfreundlichen Plattform überwachen.
