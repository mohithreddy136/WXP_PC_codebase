exp.MemoryUtilizationIsHighForAnExtendedTime.causeHungApp=Eine laufende Anwendung ist abgestürzt / reagiert nicht.
exp.MemoryUtilizationIsHighForAnExtendedTime.causeInsufficientMemory=Der Computer verfügt nicht über ausreichend Speicher für die Nutzung.
exp.MemoryUtilizationIsHighForAnExtendedTime.causeLongRunningApp=Eine laufende Anwendung benötigt über einen längeren Zeitraum eine große Menge an Arbeitsspeicher, um eine Aufgabe zu erledigen, wie etwa die Ausführung von Antivirenscans.
exp.MemoryUtilizationIsHighForAnExtendedTime.causeMemoryLeak=Eine installierte Anwendung hat ein Speicherleck.
exp.MemoryUtilizationIsHighForAnExtendedTime.option1Detail=Um die Lebensdauer von Geräten zu verlängern und die Benutzerfreundlichkeit zu verbessern, wird bei PCs, deren Arbeitsspeicher übermäßig ausgelastet ist, häufig Arbeitsspeicher hinzugefügt.
exp.MemoryUtilizationIsHighForAnExtendedTime.option1Title=Option 1: Erweitern Sie den Arbeitsspeicher des Geräts.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail1=Öffnen Sie den Bericht zur Geräteauslastung.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail2=Die Anwendungen, die den meisten Arbeitsspeicher belegen, werden in der Spalte „Apps, die einen hohen Speicherverbrauch verursachen“, angezeigt.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail3=Je nach Anwendung gibt es unterschiedliche Möglichkeiten zur Behebung dieses Problems. Wenn es sich um geschäftskritische Anwendungen handelt, kann das Upgraden des Speichers das Problem beheben. Nicht geschäftskritische Anwendungen können vom Gerät entfernt oder ihre Einstellungen angepasst werden, um die Auslastung des Geräts zu verringern.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Title=Option 2: Identifizieren und deinstallieren Sie Anwendungen.
exp.MemoryUtilizationIsHighForAnExtendedTime.option3Detail=Starten Sie den Computer neu, um alle laufenden Anwendungen vollständig zu schließen.
exp.MemoryUtilizationIsHighForAnExtendedTime.option3Title=Option 3: Starten Sie das Gerät neu.
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Detail1=Verwenden Sie den Task-Manager, um laufende Anwendungen nach Speicherauslastung sortiert anzuzeigen.
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Detail2=Schließen Sie die Anwendungen, die den meisten Speicherplatz belegen.
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Title=Option 4: Schließen Sie Anwendungen.
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Detail1=Use Task Manager to identify an application where the Memory utilization is steadily increasing to unusual proportions, but never decreasing.
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Detail2=Prüfen Sie, ob Aktualisierungen für die Anwendung vom Hersteller verfügbar sind.
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Title=Option 5: Ermitteln Sie mögliche Speicherlecks und aktualisieren Sie diese.
