wex.remediate.side.bar.content.parameter=Mit Parametern können Sie benutzerdefinierte Werte an das Skript übergeben, ohne das Skript selbst zu ändern.<br>Nutzen Sie sie, um die Abhilfemaßnahmen flexibel und wiederverwendbar zu machen.<br><br>Zum Beispiel, um Dateipfade, Registrierungsschlüssel oder Grenzwerte zu definieren.<br><br>
