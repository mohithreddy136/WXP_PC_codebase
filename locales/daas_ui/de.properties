btg.addon.list.feature_one.description=DCT bildet die zugrunde liegende Mesh-Technologie, die es HP-Geräten ermöglicht, sich zu erkennen, zu verbinden und zusammenzuarbeiten, während situative Übergänge auf intelligente Weise verwaltet und vereinfacht werden. Sie erlaubt den Austausch von Kontext, Status und Funktionen in Echtzeit und verwandelt eigenständige Produkte in ein eng integriertes, adaptives Ökosystem.
btg.addon.list.feature_one.title=Nahtlose Konnektivitätsschicht
