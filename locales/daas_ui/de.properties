ee_experienceScore_para1_description8=Wenn das Modul Mitarbeiter-Engagement nicht zugänglich ist, kein Sentiment-Pulse durchgeführt wurde oder der Mindestgrenzwert für Sentiment-Pulse-Antworten nicht erreicht wurde, passt sich die Gewichtung der Punkte an:
