account_management.subscriptions.addon.anyware.azure_notice=Die Lizenz wird derzeit nur in Azure Marketplace angeboten. Die HP Anyware Standard-Lizenz beinhaltet den Zugang zu HP Anyware Manager Enterprise.
account_management.subscriptions.addon.anyware.desc=Verwalten und Bereitstellen von Remote-Desktops für Ihr Team. Die Endbenutzer haben einen sicheren Zugang zu den Desktops, ohne dass ein VPN erforderlich ist. Überwachen Sie Ihre Remote-Geräteflotte an einem Ort, wenn Sie HP Anyware in WXP integrieren
account_management.subscriptions.addon.anyware.desc.short=Sicherer Zugriff, Verwaltung und Überwachung von Desktops
account_management.subscriptions.addon.anyware.enterprise.header=HP Anyware Manager Enterprise
account_management.subscriptions.addon.anyware.features.automation=Automatisierung von Aufgaben
account_management.subscriptions.addon.anyware.features.automation.desc=Nahtlose Integration Ihres benutzerdefinierten Verwaltungsablaufs in die Verwaltungsebene
account_management.subscriptions.addon.anyware.features.multitenant_rbac=Mandantenübergreifende und rollenbasierte Zugriffskontrolle
account_management.subscriptions.addon.anyware.features.multitenant_rbac.desc=Verwalten mehrerer Unternehmen mit einer einzigen Instanz von HP Anyware Manager Enterprise. Zuweisung von Berechtigungen an Admins auf der Grundlage ihrer Rolle
account_management.subscriptions.addon.anyware.features.productivity=Endbenutzer-Produktivität aktivieren
account_management.subscriptions.addon.anyware.features.productivity.desc=Die Endbenutzer erleben die Desktops so, als ob sie lokal wären, unabhängig von ihren Leistungsanforderungen oder Netzwerkbedingungen.
account_management.subscriptions.addon.anyware.features.provision_desktops=Verwaltung physischer und virtueller Desktops
account_management.subscriptions.addon.anyware.features.provision_desktops.desc=Remote-Desktops können über HP Anyware Manager Enterprise von der IT konfiguriert und überwacht werden. Außerdem können damit den Endnutzern jederzeit virtuelle Desktops zur Verfügung gestellt werden.
account_management.subscriptions.addon.anyware.features.remote_access=Sicherer Remote-Zugriff für Endbenutzer
account_management.subscriptions.addon.anyware.features.remote_access.desc=Die Endbenutzer haben einen sicheren Zugang zu den Desktops, ohne dass ein VPN erforderlich ist. HP Anyware bietet einen vereinfachten Zugang über Cloud Gateways.
account_management.subscriptions.addon.anyware.features.role_access.desc=Benutzerzuweisung und Sitzungsweiterleitung ohne Installation eines Gateways in anderen Umgebungen
account_management.subscriptions.addon.anyware.features.role_cloud_gateways=Vereinfachter Zugriff über Cloud Gateways
account_management.subscriptions.addon.anyware.features.setup=Jede IT-Umgebung und einfache Einrichtung
account_management.subscriptions.addon.anyware.features.setup.desc=Eine flexible, intuitive Lösung, die die Bereitstellung und Verwaltung in verschiedenen Infrastrukturen, einschließlich lokaler, Cloud- und hybrider Umgebungen, vereinfacht und gleichzeitig die Komplexität und den Platzbedarf der IT reduziert.
account_management.subscriptions.addon.anyware.features.workforce_integration=Integration in Workforce Experience
account_management.subscriptions.addon.anyware.features.workforce_integration.desc=Die IT kann die Remote-Desktop-Daten innerhalb der Workforce Experience Platform zentralisieren und so einen zentralen Überblick über ihre Flotte erhalten.
account_management.subscriptions.addon.anyware.header=HP Anyware
account_management.subscriptions.addon.anyware.overview.desc1=HP Anyware ist eine leistungsstarke Softwarelösung, die Anwendern einen sicheren Zugriff auf ihre Remote- oder virtuellen Desktops ohne VPN ermöglicht. HP Anyware beinhaltet den Zugang zu einer IT-Management-Ebene namens HP Anyware Manager Enterprise.
account_management.subscriptions.addon.anyware.overview.desc2=Bei HP Anyware Manager Enterprise (AME) handelt es sich um eine mandantenfähige Verwaltungsebene, mit der die IT-Abteilung sowohl physische als auch virtuelle Desktops verwalten kann.
account_management.subscriptions.addon.anyware.required_components.header=Erforderliche Komponenten für die Integration der Mitarbeitererfahrung
account_management.subscriptions.addon.anyware.required_components.li1=HP Anyware Standard
account_management.subscriptions.addon.anyware.required_components.li2=HP Anyware Manager Enterprise
account_management.subscriptions.addon.anyware.security_compliance=Sicherheit und Compliance
account_management.subscriptions.addon.anyware.security_compliance.desc1=HP Anyware legt bei seinen Produkten größten Wert auf Sicherheit und Compliance, um einen zuverlässigen Schutz und die Einhaltung von Branchenstandards zu gewährleisten. Zu den wichtigsten Funktionen gehören die Ende-zu-Ende-Verschlüsselung, der sichere Fernzugriff und die Multi-Faktor-Authentifizierung zum Schutz der Integrität und Vertraulichkeit von Daten.
account_management.subscriptions.addon.anyware.security_compliance.desc2=HP Anyware integriert zudem fortschrittliche Funktionen zur Erkennung von und Reaktion auf Bedrohungen, um Risiken proaktiv zu minimieren. Die Einhaltung von Vorschriften wie GDPR, HIPAA und SOC 2 unterstreicht das Engagement von HP Anyware für die Einhaltung strenger Sicherheitsprotokolle. Kontinuierliche Überwachung und regelmäßige Sicherheitsprüfungen sorgen dafür, dass HP Anyware-Produkte gegen neue Cyber-Bedrohungen gewappnet sind und den Benutzern ein sicheres und vertrauenswürdiges IT-Management bieten.
account_management.subscriptions.addon.anyware.technology=Remoting-Technologie
account_management.subscriptions.addon.anyware.technology.desc=Die preisgekrönte PCoIP® Remote-Display-Technologie von HP Anyware bietet ein hochauflösendes und reaktionsschnelles Computererlebnis unter schwierigen Netzwerkbedingungen.
account_management.subscriptions.addon.anyware.technology.desc.li1=PCoIP® kodiert, komprimiert, verschlüsselt und transportiert Bildpixel von einem zentralen Server oder einer Workstation.
account_management.subscriptions.addon.anyware.technology.desc.li2=Anschließend entschlüsselt und dekomprimiert es das Bild für Benutzer auf praktisch jedem Endgerät.
account_management.subscriptions.addon.connect_accounts=Konten verknüpfen
account_management.subscriptions.addon.oob.desc.short=Remote-Steuerung auf BIOS-Ebene für erweiterte Diagnose und Fehlerbehebung
account_management.subscriptions.addon.oob.desclaimer1=1. Die Out-of-Band-Diagnose und -Behebung ist als Lizenz mit unterschiedlichen Laufzeiten erhältlich und herstellerunabhängig für alle PCs, die Intel® vPro® Enterprise und Intel® AMT unterstützen. Umfasst und setzt Workforce Experience Platform Starter für die Administration und das Management der Softwarelösung voraus. Verfügbar in den USA, Kanada und der EU über HP-Vertreter oder autorisierte HP-Fachhändler. Weitere Informationen finden Sie unter (URL-Link zu den Lizenzbedingungen/EULA einfügen).
account_management.subscriptions.addon.oob.desclaimer2=2. Basierend auf einer internen Analyse von HP zu PC-Herstellern mit Power Cycle-, Non-OS-, BIOS- und Reimaging-Steuerung, Stand vom 24.09.2024.
account_management.subscriptions.addon.oob.desclaimer3=3. Der HP Insights Agent ist erforderlich, eine Telemetrie- und Analyseanwendung, die wichtige Daten zu Geräten und Anwendungen liefert. Dieser wird nicht als eigenständiger Dienst angeboten und ist nach ISO 27001, ISO 27701, ISO 27017 sowie SOC 2 Type 2 für Informationssicherheit zertifiziert.t. Ein Internetzugang mit Verbindung zum Portal ist erforderlich. Die vollständigen Systemanforderungen finden Sie unter http://www.hpdaas.com/requirements. Beim Kauf eines HP Insights Agent-gestützten Dienstes muss die entsprechende Software auf jedem Gerät aktiviert werden. HP Services Scan wird über Windows Update auf ausgewählter HP-Hardware bereitgestellt und überprüft auf jedem Gerät die Berechtigung, um festzustellen, ob ein entsprechender Dienst erworben wurde. Die erforderliche Software wird anschließend automatisch heruntergeladen. Um diese Funktion zu deaktivieren, folgen Sie bitte den Anweisungen unter <a target='_blank' href='http://www.hpdaas.com/requirements' style=\"text-decoration:none; color:#4D52E5\">http://www.hpdaas.com/requirements</a>
account_management.subscriptions.addon.oob.desclaimer4=4. WXP Starter ist enthalten und erforderlich, um die Softwarelösung zu verwalten und zu administrieren.
account_management.subscriptions.addon.oob.features.remote_control=Remote control - even when the Operating System is down
account_management.subscriptions.addon.oob.features.remote_control.desc=Die IT-Abteilung kann per Remote auf das BIOS zugreifen, um PCs verschiedener Marken neu zu starten, zu sichern und wiederherzustellen, wo auch immer die Arbeit stattfindet.
account_management.subscriptions.addon.oob.features.scalable=Skalierbare und zentrale Verwaltung
account_management.subscriptions.addon.oob.features.scalable.desc=Diese in WXP integrierte Funktion erleichtert die PC-Bereitstellung, die zentrale Lizenzkontrolle und den rollenbasierten Zugriff für unternehmensweite Implementierung, Nutzung und Verwaltung.
account_management.subscriptions.addon.oob.features.secure=Sichere Erfahrungen der Endbenutzer
account_management.subscriptions.addon.oob.features.secure.desc=Die Benutzer haben Einblick in Remote-Sitzungen und können die Verbindung jederzeit beenden. Ein sicherer, nahtloser Support schafft Vertrauen und verbessert die Benutzerfreundlichkeit.
account_management.subscriptions.addon.oob.header=Out-Of-Band Remote-Verbindung
account_management.subscriptions.addon.oob.overview.desc1=Suchen Sie nach Möglichkeiten, die digitalen Erfahrungen Ihres hybriden Teams zu optimieren? Mit HP Out-of-Band Remote-Verbindung erhalten Supportmitarbeiter Zugriff auf das BIOS per Remote, sodass sie Computer neu starten, neu abbilden und wiederherstellen können, auch wenn das Betriebssystem einmal ausgefallen ist. Ohne Benutzereingriff, ohne Vor-Ort-Besuch am Schreibtisch.
account_management.subscriptions.addon.vyopta.connect_accounts.error=Wir konnten Ihr Konto nicht verknüpfen. Bitte überprüfen Sie Ihre Verbindung und versuchen Sie es erneut.
account_management.subscriptions.addon.vyopta.connect_accounts.found=Wir haben ein Vyopta-Konto erkannt "<b>{orgName}</b>". Möchten Sie es mit WXP verknüpfen?
account_management.subscriptions.addon.vyopta.connect_accounts.no_permissions=Sie haben keine Berechtigungen. Bitte wenden Sie sich an den Vyopta-Administrator, um Hilfe zu erhalten.
account_management.subscriptions.addon.vyopta.connect_accounts.not_found=Wir konnten Ihr {service} Konto nicht automatisch erkennen. Wenden Sie sich bitte an {support_link}, um Unterstützung für die Einrichtung dieser Verbindung zu erhalten, wenn Sie bereits ein {service} Kunde sind.
account_management.subscriptions.addon.vyopta.connect_accounts.org_already_mapped=Diese Vyopta-ID ist bereits mit einem anderen Mandanten verknüpft. Wenden Sie sich für Unterstützung bitte an Ihren Konto-Administrator.
account_management.subscriptions.addon.vyopta.connect_accounts.request_support=Wenden Sie sich für Unterstützung bitte an Ihren {service} Konto-Administrator.
account_management.subscriptions.addon.vyopta.connect_accounts.success=Wir haben Ihr Konto erfolgreich verknüpft.
account_management.subscriptions.addon.vyopta.connect_accounts.unauthorized=Wir haben Ihr Unternehmen in {service} erkannt. Es scheint jedoch, dass Sie nicht über die notwendigen Berechtigungen zur Verknüpfung von Konten verfügen.
account_management.subscriptions.addon.vyopta.desc=Optimieren Sie die Zusammenarbeit mit Echtzeit-Einblicken. Überwachen Sie die Gesprächsqualität, die Nutzung von Besprechungsräumen und die Systemleistung von Microsoft Teams, Zoom, Poly und Webex. In WXP integriert, unterstützt es die IT dabei, digitale Erfahrungen zu verbessern und die Effizienz am Arbeitsplatz zu fördern.
account_management.subscriptions.addon.vyopta.features.comprehensive_monitoring=Umfassende Überwachung über Kooperationsplattformen hinweg
account_management.subscriptions.addon.vyopta.features.comprehensive_monitoring.desc=Erhalten Sie ganzheitliche Transparenz in Ihre UC-Umgebung (Unified Communications) mit mehreren Anbietern und verwalten Sie Video- und Anruf-Tools effizient.
account_management.subscriptions.addon.vyopta.features.deep_integration=Enge Integration mit WXP
account_management.subscriptions.addon.vyopta.features.deep_integration.desc=Die Analyse- und Überwachungsdaten von Vyopta sind nahtlos in WXP integriert und ermöglichen es IT-Teams, die Leistung bei der Zusammenarbeit und andere Arbeitsplatz-Technologien zu verwalten. Dieser zentralisierte Ansatz steigert die IT-Effizienz, reduziert die Komplexität und verbessert das Management der digitalen Erfahrung.
account_management.subscriptions.addon.vyopta.features.enhance_user_engagement=Engagement und Wohlbefinden der Benutzer fördern
account_management.subscriptions.addon.vyopta.features.enhance_user_engagement.desc=Nutzen Sie Kooperationsanalysen für die Teamarbeit, um Hindernisse der Produktivität zu ermitteln, verbesserte Mitarbeitererfahrung und Wohlbefinden zu fördern.
account_management.subscriptions.addon.vyopta.features.optimize_meeting_space=Nutzung der Besprechungsräume optimieren
account_management.subscriptions.addon.vyopta.features.optimize_meeting_space.desc=Analysieren Sie die Raumbelegung und die Nutzungsmuster, um so die Immobilieninvestitionen zu maximieren und die Effizienz der Besprechungsräume zu verbessern.
account_management.subscriptions.addon.vyopta.features.proactive_issue_detection=Proaktive Problemerkennung und -lösung
account_management.subscriptions.addon.vyopta.features.proactive_issue_detection.desc=Nutzen Sie die Echtzeit-Überwachung, um Qualitätsprobleme bei der Teamarbeit zu erkennen und zu beheben, ehe sie die Benutzer beeinträchtigen, und reduzieren Sie so die Zeit zur Fehlerbehebung.
account_management.subscriptions.addon.vyopta.header=Kooperationserfahrung mit Vyopta
account_management.subscriptions.addon.vyopta.overview=Statten Sie IT-Teams mit erweiterter Überwachung und Analytik für Kooperationstools aus. Die Integration von Vyopta in WXP bietet Echtzeit-Einsichten in die Nutzung von Besprechungsräumen, Gesprächsqualität und Systemleistung über Plattformen wie Microsoft Teams, Zoom, Poly und Webex. Verbessern Sie die Mitarbeiterproduktivität, indem Sie Probleme bei der Zusammenarbeit proaktiv angehen und die Erfahrung am Arbeitsplatz optimieren.
account_management.subscriptions.addon.vyopta.short_desc=Nützliche Raumanalytik und -einblicke zur Optimierung von Kooperationsumgebungen
account_management.subscriptions.addon.wolf.desc=Deployment, Transparenz und durchgängiger Schutz durch die Verwendung von integrierter PC- und Softwaresicherheit, um die PC-Abwehr zu stärken.
account_management.subscriptions.addon.wolf_security=HP Wolf Security
account_management.subscriptions.addon.wolf_security.desc=Unübertroffener Endpunktschutz von Geräten vor Cyberangriffen durch HP Wolf. Telemetrie in Workforce Experience anzeigen, um die Sicherheit zu erhöhen.
account_management.subscriptions.addon.wpt.desc=Verfolgen, sperren und sichern Sie verlorene oder gestohlene Geräte per Remote. Durch die Integration in WXP können IT-Teams PC-Bestände nachverfolgen und das Risiko von Geräteverlusten verringern – selbst wenn die Geräte ausgeschaltet sind.
account_management.subscriptions.addon.wpt.features.always_available=Immer verfügbar
account_management.subscriptions.addon.wpt.features.always_available.desc=Nutzen Sie kundenspezifische Hardware und Software zum Suchen/Sperren/Löschen, auch wenn der PC ausgeschaltet oder offline ist oder nicht startet.
account_management.subscriptions.addon.wpt.features.message_customization=Nachrichtenanpassung
account_management.subscriptions.addon.wpt.features.message_customization.desc=Kundenspezifische Nachricht an Ziel-PC für Anweisungen zur Entsperrung übertragen
account_management.subscriptions.addon.wpt.features.remote_lock_and_erase=Remote sperren und löschen
account_management.subscriptions.addon.wpt.features.remote_lock_and_erase.desc=Sperren Sie Geräte zum Schutz von Daten auf Firmware-Ebene und machen Sie gestohlene Geräte unbrauchbar. Löschen Sie den Primärspeicher auf gestohlenen oder verlorenen Geräten, um Datenschutzverletzungen zu verhindern.
account_management.subscriptions.addon.wpt.features.seamless_integration=Nahtlose Integration in WXP
account_management.subscriptions.addon.wpt.features.seamless_integration.desc=Verwalten Sie die Gerätesicherheit direkt in WXP und optimieren Sie so den IT-Betrieb und das Endgerätemanagement.
account_management.subscriptions.addon.wpt.features.separations_of_duties=Aufgabentrennung
account_management.subscriptions.addon.wpt.features.separations_of_duties.desc=Es sind mehrere Genehmiger zum Sperren/Löschen erforderlich, um Fehler oder interne Bedrohungen zu verhindern.
account_management.subscriptions.addon.wpt.features.strong_audit_trail=Starker Audit-Pfad
account_management.subscriptions.addon.wpt.features.strong_audit_trail.desc=Protokolliert erfolgreiche Sperr- und Löschvorgänge auf der WXP Plattform als Compliance-Nachweis.
account_management.subscriptions.addon.wpt.header=HP Wolf Protect and Trace with Wolf Connect
account_management.subscriptions.addon.wpt.overview=Verbessern Sie das Bestandsmanagement und reduzieren Sie das Risiko von Datenverletzungen mit HP Wolf Protect & Trace. Diese in WXP integrierte Lösung ermöglicht es IT-Teams, verlorene oder gestohlene Geräte zu lokalisieren, zu sperren und zu löschen – auch im ausgeschalteten Zustand. Globale Abdeckung und einfache Verwaltung für alle Kundengrößen.
account_management.subscriptions.addon.wpt.requirements.purchase=Erfordert den Kauf eines neuen HP PCs bei Ihrem HP Vertriebsmitarbeiter oder einem autorisierten Channel-Partner.<br> Es wird ein unterstützter PC mit "WWAN" Anzeigeoption benötigt. Unterstützte PCs finden Sie unter: https://www.hpwolf.com/en/legal/ptwc/platforms
account_management.subscriptions.addon.wpt.short_desc=Einen PC weltweit remote verfolgen, sperren und löschen – selbst, wenn dieser ausgeschaltet ist
