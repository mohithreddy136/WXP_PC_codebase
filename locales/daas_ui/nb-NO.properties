poly.lens.actions=Handlinger
poly.lens.addon.details.description=Administrer HP-enhetsflåten for samarbeid på tvers av hele organisasjonen med trygghet og klarhet. Fra effektiv distribusjon og uanstrengt vedlikehold til proaktiv overvåking og betydningsfull innsikt, kan IT-team få sentralisert kontroll på tvers av områder, rom og enheter. Med sikker, skybasert administrasjon og sømløs støtte for hybrid arbeid, kan du redusere driftskostnader, være i forkant av problemer og levere en konsistent, pålitelig opplevelsen uansett hvor teamet jobber.
poly.lens.addon.feature.centralized.header=Sentralisert personlig enhetsbehandling
poly.lens.addon.feature.centralized.text=Aktivert av HP Poly Studio-apper, og leverer en sømløs, selvbetjent opplevelse for sluttbrukere, mens IT-team opprettholder sentralisert synlighet og kontroll over personlige enheter. Administrer beholdningen, oppdateringer, overvåking og innsikt selvsikkert, uansett hvor teamet jobber.
poly.lens.addon.feature.effortless.maintenance.header=Uanstrengt vedlikehold
poly.lens.addon.feature.effortless.maintenance.text=Administrer innstillinger, funksjoner og programvareoppdateringer i hele flåten med minimal innsats. Ta i bruk innstillinger, iscenesett oppdateringer og fininnstill konfigurasjoner i skala uten å ofre kontroll eller presisjon.
poly.lens.addon.feature.meaningful.measurement.header=Meningsfull måling
poly.lens.addon.feature.meaningful.measurement.text=Forstå hvordan enheter, områder og folk faktisk jobber. Gjør bruks- og ytelsesdata om til smarte, datadrevne avgjørelser om samarbeidsinvesteringene dine.
poly.lens.addon.feature.proactive.monitoring.header=Proaktiv overvåking
poly.lens.addon.feature.proactive.monitoring.text=Vær i forkant av problemer med full oversikt over enhetstilstand og status. Bli varslet når noe er feil, slik at problemer håndteres før de forstyrrer møter.
poly.lens.addon.feature.secure.header=Sikker, skybasert kontroll
poly.lens.addon.feature.secure.text=Administrer alt fra en klarert, skybasert plattform som skaleres etter hvert som organisasjonen vokser, samtidig som sikkerhets- og overholdelsesbehov for bedriften oppfylles.
poly.lens.addon.feature.simplified.deployment.header=Forenklet distribusjon
poly.lens.addon.feature.simplified.deployment.text=Iscenesett, forhåndskonfigurer og distribuer enheter med selvsikkerhet. Automatiserte pålastingsarbeidsflyter reduserer oppsettiden, eliminerer feil og klargjør enheter før de i det hele tatt når en bruker eller et rom.
poly.lens.addon.subtitle=Skybasert administrasjon og innsikt på tvers av samarbeidsområder, -rom og -enheter.
