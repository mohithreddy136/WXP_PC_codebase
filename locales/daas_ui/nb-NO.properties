account_management.subscriptions.addon.anyware.features.multitenant_rbac=Rollebasert tilgangskontroll og tilgangskontroll for flere leietakere
account_management.subscriptions.addon.anyware.features.multitenant_rbac.desc=Administrer flere organisasjoner med en enkel forekomst av HP Anyware Manager Enterprise. Tilordne tillatelser til administratorer basert på rollen de har
account_management.subscriptions.addon.anyware.features.productivity=Aktiver produktivitet for sluttbruker
account_management.subscriptions.addon.anyware.features.productivity.desc=Sluttbruker vil oppleve skrivebordet som lokalt, uavhengig av ytelsesbehov eller nettverksforhold.
account_management.subscriptions.addon.anyware.features.provision_desktops=Administrer fysiske og virtuelle skrivebord
account_management.subscriptions.addon.anyware.features.provision_desktops.desc=IT kan konfigurere og overvåke eksterne skrivebord gjennom HP Anyware Manager Enterprise. De kan også klargjøre virtuelle skrivebord for sluttbrukere når som helst.
account_management.subscriptions.addon.anyware.features.remote_access=Gi sluttbrukere sikker fjerntilgang
account_management.subscriptions.addon.anyware.features.remote_access.desc=Sluttbrukere vil ha sikker tilgang til skrivebord uten behov for et VPN. HP Anyware tilbyr forenklet tilgang via skybaserte gatewayer.
account_management.subscriptions.addon.anyware.features.role_access.desc=Utfør brukertilordninger og øktsruting uten å måtte installere en gateway i andre miljøer
account_management.subscriptions.addon.anyware.features.role_cloud_gateways=Forenklet tilgang via skybaserte gatewayer
account_management.subscriptions.addon.anyware.features.setup=Et hvilket som helst IT-miljø og enkelt oppsett
account_management.subscriptions.addon.anyware.features.setup.desc=En fleksibel, intuitiv løsning som forenkler distribusjonen og administrasjonen på tvers av forskjellige infrastrukturer, inkludert på stedet, i skyen og i hybride miljøer, samtidig som IT-kompleksitet og -fotavtrykk reduseres.
account_management.subscriptions.addon.anyware.features.workforce_integration=Workforce Experience-integrering
account_management.subscriptions.addon.anyware.features.workforce_integration.desc=IT kan sentralisere eksterne skrivebordsdata i Workforce Experience Platform, noe som til slutt gir en sentral oversikt over flåten.
account_management.subscriptions.addon.anyware.header=HP Anyware
account_management.subscriptions.addon.anyware.overview.desc1=HP Anyware er en høytytende programvareløsning som gir brukere sikker tilgang til eksterne eller virtuelle skrivebord uten et VPN. HP Anyware inkluderer tilgang til en IT-administrasjonsplan kalt HP Anyware Manager Enterprise.
account_management.subscriptions.addon.anyware.overview.desc2=HP Anyware Manager Enterprise (AME) er en administrasjonsplan for flere leietakere som gir IT muligheten til å administrere både fysiske og virtuelle skrivebord.
account_management.subscriptions.addon.anyware.required_components.header=Påkrevde komponenter for Workforce Experience-integrering
account_management.subscriptions.addon.anyware.required_components.li1=HP Anyware Standard
account_management.subscriptions.addon.anyware.required_components.li2=HP Anyware Manager Enterprise
account_management.subscriptions.addon.anyware.security_compliance=Sikkerhet og samsvar
account_management.subscriptions.addon.anyware.security_compliance.desc1=HP Anyware prioriterer sikkerhet og samsvar på tvers av produkttilbudet for å sikre robust beskyttelse og overholdelse av bransjestandarder. Hovedfunksjoner inkluderer ende-til-ende-kryptering, sikker fjerntilgang, flerfaktorautentisering og sikring av dataintegritet og konfidensialitet.
account_management.subscriptions.addon.anyware.security_compliance.desc2=I tillegg integrerer HP Anyware avansert trusseldeteksjon og responsegenskaper for å redusere risikofaktorer på en proaktiv måte. Overholdelse av forskrifter som GDPR, HIPAA og SOC 2 understreker HP Anywares forpliktelse til å opprettholde strenge sikkerhetsprotokoller. Kontinuerlig overvåking og regelmessige sikkerhetsrevisjoner sørger for at HP Anyware-produkter forblir motstandsdyktige mot cybertrusler under utvikling, noe som gir brukere en sikker og pålitelig IT-administrasjonsopplevelse.
account_management.subscriptions.addon.anyware.technology=Fjernteknologi
account_management.subscriptions.addon.anyware.technology.desc=HP Anywares prisvinnende PCoIP® ekstern skjermteknologi leverer en svært responsiv databehandlingsopplevelse med høy oppløsning gjennom utfordrende nettverksforhold.
account_management.subscriptions.addon.anyware.technology.desc.li1=PCoIP® koder, komprimerer, krypterer og transporterer bildepiksler fra en sentral server eller arbeidsstasjon.
account_management.subscriptions.addon.anyware.technology.desc.li2=Deretter krypteres og dekomprimeres bildet for brukere på praktisk talt alle endepunkter.
account_management.subscriptions.addon.connect_accounts=Koble til kontoer
account_management.subscriptions.addon.oob.desc.short=Fjernstyring på BIOS-nivå for avansert diagnostikk og utbedring
account_management.subscriptions.addon.oob.desclaimer1=1. Utenforliggende diagnostikk og utbedring er tilgjengelig som en lisens med varierende terminlengder, og er leverandøruavhengig for PC-er som er Intel® vPro® Enterprise- og Intel® AMT-aktivert. Inkluderer og krever Workforce Experience Platform Starter for å administrere programvareløsningen. Tilgjengelig i USA, Canada og EU fra HP-representanter eller HP-autoriserte forhandlere. For detaljer, se (legg til url-adresse til lisensvilkår/eula).
account_management.subscriptions.addon.oob.desclaimer2=2. Basert på HPs interne analyser av PC-produsenter med strømsykluskontroll, ikke-operativsystemkontroll, BIOS-kontroll og ny avbildningskontroll per 24.09.2024.
account_management.subscriptions.addon.oob.desclaimer3=3. HP Insights-agenten kreves og er en telemetri- og analyse-app som leverer kritiske data om enheter og programmer. Selges ikke som en frittstående tjeneste og er ISO27001-, ISO27701-, ISO27017- og SOC2 Type2-sertifisert for informasjonssikkerhet. Internettilgang med tilknytning til portalen kreves. Du finner fullstendige systemkrav på http://www.hpdaas.com/requirements. Kjøp av en hvilken som helst HP Insights agent-aktivert tjeneste krever at programvaren aktiveres og kjøres på hver enhet. HP Services Scan leveres gjennom Windows Update på utvalgt HP-maskinvare, og vil kontrollere rettigheter på hver maskinvareenhet for å avgjøre om en aktivert tjeneste er kjøpt, og laster ned relevant programvare automatisk. For å deaktivere denne funksjonen, følger du instruksjonene på <a target='_blank' href='http://www.hpdaas.com/requirements' style=\"text-decoration:none; color:#4D52E5\">http://www.hpdaas.com/requirements</a>
account_management.subscriptions.addon.oob.desclaimer4=4. WXP Starter er inkludert og kreves for å administrere programvareløsningen.
account_management.subscriptions.addon.oob.features.remote_control=Remote control - even when the Operating System is down
account_management.subscriptions.addon.oob.features.remote_control.desc=IT kan få fjerntilgang til BIOS slik at de kan starte PC-er på nytt, lage ny avbildning og gjenopprette PC-er fra forskjellige merker, uansett hvor arbeidet utføres.
account_management.subscriptions.addon.oob.features.scalable=Skalerbar, sentralisert administrasjon
account_management.subscriptions.addon.oob.features.scalable.desc=Med denne funksjonen, som integreres i WXP for distribusjon, bruk og administrasjon i bedrifter, kan du forenkle PC-klargjøringen, rollebasert tilgang og kontroll av flere lisenser.
account_management.subscriptions.addon.oob.features.secure=Sikre sluttbrukeropplevelser
account_management.subscriptions.addon.oob.features.secure.desc=Brukere har synlighet i eksterne økter og kan stoppe tilkoblingen når som helst. Sikker, sømløs støtte bygger tillit for en forbedret brukeropplevelse.
account_management.subscriptions.addon.oob.header=Utenforliggende fjerntilkobling
account_management.subscriptions.addon.oob.overview.desc1=Vil du forbedre digitale opplevelser for en hybrid arbeidsstyrke? Med HP utenforliggende fjerntilkobling får støtteteknikere fjerntilgang til BIOS slik at de kan starte PC-er på nytt, lage ny avbildning og gjenopprette PC-er, selv om operativsystemet ikke fungerer. Ingen brukerinvolvering, ingen besøk hos brukerstøtte.
account_management.subscriptions.addon.vyopta.connect_accounts.error=Vi kunne ikke koble til kontoen. Kontroller tilkoblingen og prøv på nytt.
account_management.subscriptions.addon.vyopta.connect_accounts.found=Vi har oppdaget en Vyopta-konto «<b>{orgName}</b>». Vil du koble den til WXP?
account_management.subscriptions.addon.vyopta.connect_accounts.no_permissions=Du har ingen tillatelser. Ta kontakt med Vyopta-kontoadministratoren for å få hjelp.
account_management.subscriptions.addon.vyopta.connect_accounts.not_found=Vi kunne ikke oppdage {service}-kontoen din automatisk. Ta kontakt med {support_link} for å få hjelp med å sette opp denne tilkoblingen hvis du allerede er en {service}-kunde.
account_management.subscriptions.addon.vyopta.connect_accounts.org_already_mapped=Vyopta-ID-en er allerede knyttet til en annen leier. Ta kontakt med kontoadministratoren din for å få hjelp.
account_management.subscriptions.addon.vyopta.connect_accounts.request_support=Ta kontakt med {service}-kontoadministratoren din for å få hjelp.
account_management.subscriptions.addon.vyopta.connect_accounts.success=Vi har koblet til kontoen.
account_management.subscriptions.addon.vyopta.connect_accounts.unauthorized=Vi oppdaget organisasjonen din i {service}, men det ser ut til at du mangler nødvendige tillatelser til å koble til kontoer.
account_management.subscriptions.addon.vyopta.desc=Optimaliser samarbeidet med innsikt i sanntid. Overvåk samtalekvalitet, møterombruk og systemytelse på tvers av Microsoft Teams, Zoom, Poly og Webex. Når programmet er integrert med WXP, hjelper det IT med å forbedre digitale opplevelser og drive effektiviteten på arbeidsplassen.
account_management.subscriptions.addon.vyopta.features.comprehensive_monitoring=Omfattende overvåking på tvers av samarbeidsplattformer
account_management.subscriptions.addon.vyopta.features.comprehensive_monitoring.desc=Oppnå holistisk synlighet i enhetlige kommunikasjonsmiljøer (UC) fra flere leverandører, og muliggjør effektiv administrasjon av samarbeidsverktøy for video og tale.
account_management.subscriptions.addon.vyopta.features.deep_integration=Dyp integrering med WXP
account_management.subscriptions.addon.vyopta.features.deep_integration.desc=Vyoptas analyse- og overvåkingsdata bygges sømløst inn i WXP, noe som gir IT-team muligheten til å administrere samarbeidsytelsen sammen med andre teknologier på arbeidsplassen. Denne sentraliserte tilnærmingen forbedrer IT-effektiviteten, reduserer kompleksitet og forbedrer administrasjonen av digitale opplevelser.
account_management.subscriptions.addon.vyopta.features.enhance_user_engagement=Forbedre brukerengasjementet og velværet
account_management.subscriptions.addon.vyopta.features.enhance_user_engagement.desc=Utnytt samarbeidsanalyser for å identifisere barrierer i produktiviteten, noe som fremmer forbedrer opplevelsene og velværet for de ansatte.
account_management.subscriptions.addon.vyopta.features.optimize_meeting_space=Optimaliser utnyttingen av møterom
account_management.subscriptions.addon.vyopta.features.optimize_meeting_space.desc=Analyser rombelegget og bruksmønstre for å maksimere investeringer i fast eiendom og forbedre møteromeffektiviteten.
account_management.subscriptions.addon.vyopta.features.proactive_issue_detection=Proaktiv problemdeteksjon og -løsning
account_management.subscriptions.addon.vyopta.features.proactive_issue_detection.desc=Utnytt sanntidsovervåking for å identifisere og håndtere kvalitetsproblemer under samarbeid før de påvirker brukere, noe som reduserer feilsøkingstiden.
account_management.subscriptions.addon.vyopta.header=Samarbeidsopplevelse av Vyopta
account_management.subscriptions.addon.vyopta.overview=Styrk IT-team med avansert overvåking og analyser for samarbeidsverktøy. Vyopta-integrering i WXP gir sanntids synlighet i møterombruk, samtalekvalitet og systemytelse på tvers av plattformer som Microsoft Teams, Zoom, Poly og Webex. Forbedre de ansattes produktivitet ved å håndtere samarbeidsproblemer proaktivt og optimalisere arbeidsplassopplevelsene.
account_management.subscriptions.addon.vyopta.short_desc=Verdifulle analyser og rominnsikt for optimalisering av samarbeidsmiljøer
account_management.subscriptions.addon.wolf.desc=Distribusjon, synlighet og ende-til-ende-beskyttelse bruker både innebygd PC- og programvaresikkerhet for å styrke PC-beskyttelsen.
account_management.subscriptions.addon.wolf_security=HP Wolf Security
account_management.subscriptions.addon.wolf_security.desc=Uovertruffen endepunktsbeskyttelse for enheter mot cyberangrep drevet av HP Wolf. Vis telemetri i Workforce Experience for forbedret sikkerhet.
account_management.subscriptions.addon.wpt.desc=Spor, lås og sikre bortkomne eller stjålne enheter ekstern. Når løsningen er integrert i WXP, bidrar den til at IT-team kan spore PC-aktiva og redusere risikoen for tap av enheter – selv når enhetene er slått av.
account_management.subscriptions.addon.wpt.features.always_available=Alltid tilgjengelig
account_management.subscriptions.addon.wpt.features.always_available.desc=Utnytter tilpasset maskinvare og programvare til å finne/låse/slette selv når PC-en er avslått, ikke er på nett eller ikke vil starte opp.
account_management.subscriptions.addon.wpt.features.message_customization=Tilpassing av meldinger
account_management.subscriptions.addon.wpt.features.message_customization.desc=Overfør en tilpasset melding til mål-PC-en for opplåsingsinstruksjoner
account_management.subscriptions.addon.wpt.features.remote_lock_and_erase=Fjernlås og -slett
account_management.subscriptions.addon.wpt.features.remote_lock_and_erase.desc=Lås enheten på fastvarenivå for å beskytte data og gjøre den stjålne enheten ubrukelig. Slett primærlagring på bortkommen eller stålet enhet for å unngå databrudd.
account_management.subscriptions.addon.wpt.features.seamless_integration=Sømløs integrering med WXP
account_management.subscriptions.addon.wpt.features.seamless_integration.desc=Administrer enhetssikkerheten direkte i WXP, noe som effektiviserer IT-operasjoner og endepunktsadministrasjonen.
account_management.subscriptions.addon.wpt.features.separations_of_duties=Separasjon av oppgaver
account_management.subscriptions.addon.wpt.features.separations_of_duties.desc=Flere påkrevde godkjennere for låsing/sletting forhindrer feil eller innsidetrusler.
account_management.subscriptions.addon.wpt.features.strong_audit_trail=Sterkt revisjonsspor
account_management.subscriptions.addon.wpt.features.strong_audit_trail.desc=Loggfører vellykket Lås- og slettutføring på WXP-plattformen som bevis på overholdelse.
account_management.subscriptions.addon.wpt.header=HP Wolf Protect and Trace with Wolf Connect
account_management.subscriptions.addon.wpt.overview=Forbedre administrasjonen av aktiva og reduser risikoen for databrudd med HP Wolf Protect & Trace. Denne unike løsningen er integrert i WXP og gir IT-team muligheten til å finne, låse og slette bortkomne eller stjålne enheter – selv når de er slått av. Global dekning og enkel administrasjon som passer kunder i alle størrelser.
account_management.subscriptions.addon.wpt.requirements.purchase=Krever kjøp av en ny HP PC fra en HP-salgsrepresentant eller autorisert kanalpartner.<br> Krever en støttet PC med «WWAN»-skjermalternativ. PC-er som støttes på: https://www.hpwolf.com/en/legal/ptwc/platforms
account_management.subscriptions.addon.wpt.short_desc=Fjernspor, -lås og -slett en PC globalt, selv når den er avslått
