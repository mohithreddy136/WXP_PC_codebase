btg.addon.list.feature_one.description=DCT er den underliggende mesh-teknologien som gjør det mulig for HP-enheter å oppdage, koble til og samarbeide, og samtidig administrere og forenkle situasjonsbetingede overganger på en intelligent måte. Det muliggjør deling av kontekst, tilstand og egenskaper i sanntid, og transformerer frittstående produkter til et tett integrert, adaptivt økosystem.
