side_panal.smart_refresh.help_sec1_header=Slik fungerer det
side_panal.smart_refresh.help_sec1_point_1_desc=Vurder hver enhet på tvers av ni datapunkter, oppsummert i en oppdatert nødvendighetsgrad*. Denne poengsummen hjelper deg med å prioritere individuelle risikoutsatte enheter for å unngå avbrudd i brukerens produktivitet.
side_panal.smart_refresh.help_sec1_point_1_title=1. Identifiser
side_panal.smart_refresh.help_sec1_point_2_desc=En KI-modell grupperer enheter i distinkte maskinvare- og programvarepersonaer, basert på bruk. Disse personaene kan hjelpe deg med å finne riktig erstatningsenhet.
side_panal.smart_refresh.help_sec1_point_2_title=2. Kategoriser
side_panal.smart_refresh.help_sec1_point_3_desc1=Hvis du samarbeider med en HP-partner, vil Smart Refresh anbefale erstatninger for hver enhet. Disse anbefalingene kommer fra relevante, toppytende modeller som er tilgjengelige i katalogen partneren din har lastet opp. Hvis du ikke ser enhetsanbefalinger, eller enhetene du ser et utdaterte, kan du kontakte partneren din og be vedkommende om å laste opp den nyeste katalogen.
side_panal.smart_refresh.help_sec1_point_3_desc2=Hvis du ikke samarbeider med en HP-partner, vil du ikke se enhetsanbefalinger i smart oppdatering. Kontakt en HP-kontorepresentant for de beste erstatningsmodellene.
side_panal.smart_refresh.help_sec1_point_3_desc3=Siste katalogopplastingsdato:
side_panal.smart_refresh.help_sec1_point_3_title=3. Anbefal
side_panal.smart_refresh.help_sec1_point_4_desc=Bruk oppdateringsstatusen «Fullfør» for å fjerne eventuelle PC-er som ikke trenger en oppdatering eller ikke kan oppdateres på dette tidspunktet. Du kan vise disse enhetene og endre statusen tilbake til «Krever handling» for å se enhetene på PC-listen igjen
side_panal.smart_refresh.help_sec1_point_4_title=4. Statuser
side_panal.smart_refresh.help_sec2_description=Slik avgjør vi om en enhet trenger utskifting
side_panal.smart_refresh.help_sec2_header=Oppdatering haster-poengsum
side_panal.smart_refresh.help_sec2_sub_text=Poengsum for oppdateringshastighet beregnes basert på en enhets ytelsesdata i ni områder. Alvorlighetsgraden korresponderer med en numerisk poengsum på følgende måte:
