dnto.subscriptions.privacy_statement.desc1=HP anerkjenner at personvern er en grunnleggende menneskerettighet og anerkjenner videre viktigheten av personvern, sikkerhet og databeskyttelse for våre kunder og partnere over hele verden. Som en global organisasjon, med juridiske enheter, forretningsprosesser, ledelsesstrukturer og tekniske systemer som krysser internasjonale grenser, streber vi etter å gi beskyttelse på tvers av alle våre virksomheter, som overstiger lovlige minimum og å implementere konsekvente, strenge retningslinjer og prosedyrer.
dnto.subscriptions.privacy_statement.desc2=Begreper som brukes i denne erklæringen, som «vi», «oss», «vår» og «Selskap», viser til HP-merkede selskaper og nåværende og fremtidige tilknyttede selskaper, som definert av lokale lover (heri «HP»). Kontaktinformasjon for HPs personvernombud vises i delen «{0}» nedenfor.
dnto.subscriptions.privacy_statement.exercise_rights=Utøve dine rettigheter og kontakte oss
dnto.subscriptions.privacy_statement.heading=Personvernerklæring for HP
dnto.subscriptions.section.details.desc1=Ansatte er vant til, og krever til og med, fleksibiliteten til å jobbe hvordan de vil, der de vil. De ansattes opplevelser, produktivitet og engasjement lider når IT-teamets kapasitet ikke strekker til.
dnto.subscriptions.section.details.desc2=HP Workforce Experience Pro forutser og løser digital friksjon gjennom en konsolidert og modulær plattform på en intelligent måte.
dnto.subscriptions.section.details.desc3=Enten du administrerer et lite team på et enkelt sted, eller navigerer kompleksitetene i en global hybrid arbeidsstyrke, gir HP Workforce Experience Pro deg en enhetlig plattform som støtter og optimaliserer de digitale opplevelsene til dine medarbeidere.
dnto.subscriptions.section.details.desc4=Øk de ansattes produktivitet ved å proaktivt løse IT-problemer før de oppstår. Reduser IT-støttetimer og kostnader med avansert KI. Styrk endepunktssikkerheten ved å forutse og løse trusler.
dnto.subscriptions.section.details.desc5=Forbedre medarbeidersentimenter med handlingskraftig innsikt fra pulsundersøkelser. Optimaliser kostnadene med smarte maskinvareoppdateringer. Kan integreres sømløst i eksisterende miljøer med flere leverandører og operativsystemer.
dnto.subscriptions.section.details.heading=Abonnementsdetaljer
