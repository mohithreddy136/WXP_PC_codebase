wex.fleet.mgmt.remediation.kernel_panic_error.desc=Det har oppstått en kjernepanikk, noe som indikerer en kritisk systemfeil Linux-kjernen ikke kan gjenopprettes fra. Dette kan være forårsaket av maskinvarefeil, ødelagte drivere, feilkonfigurerte kjerneparametere eller ikke kompatible kjernemoduler. Må undersøkes umiddelbart for å identifisere rotårsaken.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt1=Gå gjennom systemlogger (/var/logg/meldinger, /var/logg/syslogg, eller journalctl) for å finne feilmeldinger før panikken.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt2=Kontroller maskinvaretilstand, spesielt minne (RAM) og diskintegritet ved hjelp av verktøy som memtest86 og smartctl.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt3=Bekreft nylige endringer i systemet (f.eks. kjerneoppdateringer, driverinstallasjoner eller konfigurasjonsendringer).
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt4=Start opp i rednings- eller gjenopprettingsmodus for å få tilgang til systemet hvis det ikke kan startes opp.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt5=Tilbakestill eller oppdater kjernemoduler eller drivere hvis det mistenkes at de ikke er kompatible.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt6=Kontakt leverandør eller fellesskapsstøtte hvis problemet vedvarer eller er maskinvarespesifikk.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.desc=Aktivering av diskkryptering beskytter sensitive data under hvile ved å sikre at all informasjon lagret på disken er uleselig uten riktig autentisering. Dette er et kritisk sikkerhetstiltak for systemer som håndterer konfidensielle eller regulerte data.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step1=Implementer full diskkryptering ved bruk av verktøy som LUKS (Linux Unified Key Setup) eller dm-crypt, avhengig av Linux-distribusjon.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step2=Krypter sensitive partisjoner (f.eks. /home, /var eller /data) hvis full diskkryptering ikke er gjennomførbart.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step3=Konfigurer sikker nøkkeladministrasjon, inkludert passfraser eller integrering med TPM (Trusted Platform Module) hvis tilgjengelig.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step4=Sikkerhetskopier krypteringsnøkler for å hindre datatap i tilfelle feilplassering av nøkkel.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step5=Test krypteringsinnstillingene for å sikre at systemet starter opp på riktig måte og at du har tilgang ti data etter godkjenning.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step6=Konfigurasjon av dokumentkryptering og gjenopprettingsprosedyrer for samsvar og driftskontinuitet.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step1=Installer og konfigurer et brannmurverktøy som firewalld, ufw eller iptables, avhengig av Linux-distribusjon.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step2=Aktiver brannmurtjenesten slik at den starter ved oppstart
wex.fleet.mgmt.remediation.linux_firewall_disabled.step3=Definer brannmurregler for å tillate kun nødvendige tjenester (f.eks. SSH, HTTP/HTTPS) og blokkere alle andre.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step4=Bekreft brannmurstatus og regler ved bruk av: sudo firewall-cmd --list-all (for firewalld), sudo ufw-status (for ufw)
wex.fleet.mgmt.remediation.linux_firewall_disabled.step5=Revider brannmurkonfigurasjoner regelmessig for å sikre at de er i tråd med sikkerhetspolicyer og driftsbehov.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.desc=Aktivering av sikker oppstart bidrar til å beskytte systemet mot uautorisert eller skadelig kode under oppstartsprosessen ved å bekrefte digitale signaturer for oppstartslastere, kjernemoduler og drivere. Dette forbedrer systemintegriteten og sikkerheten, spesielt i bedriftsmiljøer eller samsvarsdrevne miljøer.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step1=Bekreft UEFI-fastvarestøtte for sikker oppstart og sørg for at dette er aktivert i UEFI-innstillingene.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step2=Installer og konfigurer signerte oppstartslastere og kjernepakker kompatible med sikker oppstart (f.eks. ved bruk av shim og signert GRUB).
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step3=Bekreft at kjerne, moduler og alle nødvendige komponenter er signert.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step4=Start på nytt og bekreft sikker oppstart-status ved bruk av mokutil.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step5=Registrer egendefinerte nøkler hvis det brukes komponenter som ikke er standard.
wex.fleet.mgmt.remediation.missing_linux_security_updates.desc=Systemet mangler én eller flere kritiske sikkerhetsoppdateringer. Disse oppdateringene adresserer kjente sårbarheter i operativsystemet, kjernen og installerte pakker. Manglende bruk av oppdateringer kan eksponere systemet for uautorisert tilgang, datainnbrudd eller tjenesteavbrudd.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step1=Gå gjennom og identifiser manglende sikkerhetsoppdateringer ved hjelp av systemets pakkebehandling (f.eks. apt, yum, dnf, zypper).
wex.fleet.mgmt.remediation.missing_linux_security_updates.step2=Ta i bruk alle kritiske sikkerhetsoppdateringer umiddelbart for å redusere kjente trusler og sårbarheter.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step3=Start systemet på nytt om nødvendig, spesielt etter kjerne- eller kjernetjenesteoppdateringer.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step4=Aktiver automatiske sikkerhetsoppdateringer eller konfigurer en tidsplan for regelmessige oppdateringer for å sikre rettidig beskyttelse.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step5=Bekreft at oppdateringen var vellykket ved å kontrollere logger og bekrefte pakkeversjoner.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step6=Utfør en sårbarhetsskanning etter oppdateringen for å sikre at ingen gjenværende risikoer gjenstår.
wex.fleet.mgmt.remediation.missing_linux_updates.desc=Systemet mangler én eller flere kritiske Linux-oppdateringer. Disse oppdateringene kan inkludere sikkerhetsoppdateringer, kjernereparasjoner og stabilitetsforbedringer. Kjøring av et utdatert system øker risikoen for sårbarheter, systemkrasjer og kompatibilitetsproblemer.
wex.fleet.mgmt.remediation.missing_linux_updates.step1=Gå gjennom tilgjengelige oppdateringer ved hjelp av pakkebehandling (f.eks. jum, dnf, apt eller zypper) for å identifisere manglende kritiske oppdateringer.
wex.fleet.mgmt.remediation.missing_linux_updates.step2=Ta i bruk alle sikkerhets- og kjerneoppdateringer snarest mulig for å redusere kjente sårbarheter.
wex.fleet.mgmt.remediation.missing_linux_updates.step3=Start systemet på nytt om nødvendig, spesielt etter kjerne- eller kjernesystemoppdateringer.
wex.fleet.mgmt.remediation.missing_linux_updates.step4=Aktiver automatiske oppdateringer eller konfigurer tidsplaner for regelmessige oppdateringer for å sikre rettidig bruk av fremtidige oppdateringer.
wex.fleet.mgmt.remediation.missing_linux_updates.step5=Bekreft vellykket oppdatering ved å sjekke systemlogger og bekrefte gjeldende kjerne- og pakkeversjoner.
wex.fleet.mgmt.remediation.network_connection_not_secure.desc=En nettverkstilkobling ble rapportert uten forventet sikkerhet i løpet av de siste 24 timer.
wex.fleet.mgmt.remediation.network_connection_not_secure.desc1=Ikke godkjent tilkobling oppdaget de siste 7 dagene.
wex.fleet.mgmt.remediation.network_disconnections.desc=Enheter rapporterte gjentatte nettverksfrakoblinger i løpet av de siste 24 timene.
wex.fleet.mgmt.remediation.network_disconnections.desc1=Nettverksfrakoblinger er oppdaget i løpet av de siste 7 dagene.
wex.fleet.mgmt.remediation.network_speed_slow.desc=Rapportert nominell nettverkshastighet var treg i løpet av de siste 24 timene.
wex.fleet.mgmt.remediation.wifi_signal_strength_weak.desc=Wi-Fi-signalstyrken ble rapportert som svak de siste 24 timene.
wex.fleet.mgmt.score.no.data=Ingen data
wex.fleet.mgmt.score.overall_exp=Generell opplevelse
wex.fleet.mgmt.score.tooltip=Opplevelse er basert på den laveste opplevelsen av alle poengsummene.
wex.fleet.mgmt.troubleshoot.linux_firewall_disabled.description=Aktivering av brannmuren bidrar til å beskytte systemet mot uautorisert tilgang, nettverksbaserte angrep og uønsket trafikk ved å kontrollere inngående og utgående tilkoblinger. Dette trinnet er kritisk i sikringen av Linux-systemer, spesielt de som eksponeres for offentlige nettverk eller bedriftsnettverk.
wex.fleetExplorer.cancelResponse=Avbryt respons
wex.fleetExplorer.feedbackMessage=Tilbakemelding
