wex.ra.remediation.poor_network_signal_strength=Du kan forbedre Wi-Fi-signalstyrken for hjemmenettverket ved å starte ruteren på nytt eller flytte ruteren for å redusere antallet hindringer mellom tilgangspunktet og PC-en.
wex.ra.remediation.poor_nominal_speed=For hjemmenettverk bør du vurdere å oppgradere ruteren til en nyere modell som støtter den nyeste Wi-fi-standarden, som Wi-Fi 6. I tillegg kan du optimalisere nettverksoppsettet ved å gi ruteren en sentral plassering, redusere forstyrrelser fra andre enheter og bruke kablede tilkoblinger der dette er mulig for å få en mer stabil ytelse.
wex.ra.remediation.unauthenticated_connection=For hjemmenettverk velger du en robust krypteringsprotokoll, som WPA2 eller WPA3, og angir et sterkt, unikt passord for tilgang. I tillegg bør du vurdere å implementere MAC-adressefiltrering og regelmessig oppdatering av ruterens fastvare for å forbedre sikkerheten og forhindre uautoriserte tilkoblinger.
wex.ra.remediation.windows_secure_boot_not_enabled=Secure Boot er en sikkerhetsstandard som er utviklet av medlemmer av PC-bransjen for å sikre at en enhet bare starter opp ved bruk av programvare som er klarert av den opprinnelige utstyrsprodusenten (OEM).
