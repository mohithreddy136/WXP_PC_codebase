exp.MemoryUtilizationIsHighForAnExtendedTime.causeHungApp=Et program som kjører henger / svarer ikke.
exp.MemoryUtilizationIsHighForAnExtendedTime.causeInsufficientMemory=Datamaskinen har ikke tilstrekkelig minne til bruken.
exp.MemoryUtilizationIsHighForAnExtendedTime.causeLongRunningApp=Et program som kjører krever en stor mengde minne over lengre tid for å fullføre en oppgave, som f.eks. antivirusskanning.
exp.MemoryUtilizationIsHighForAnExtendedTime.causeMemoryLeak=En installert applikasjon kan ha en minnelekkasjefeil.
exp.MemoryUtilizationIsHighForAnExtendedTime.option1Detail=For PC-er der minnet blir overutnyttet, er det vanlig å legge til minne i enheten for å hjelpe kunder med å forlenge enhetens levetid og forbedre sluttbrukeropplevelsen.
exp.MemoryUtilizationIsHighForAnExtendedTime.option1Title=Alternativ 1: Øk enhetens minne.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail1=Åpne Enhetsbruk-rapporten.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail2=Programmer som forbruker mest minne blir identifisert i kolonnen Apper som forårsaker høyt minne-bruk.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail3=Responsalternativene vil variere basert på det aktuelle programmet. Hvis dette er et virksomhetskritisk program, kan en oppgradering av minnet avhjelpe problemet. Ikke-virksomhetskritiske programmer kan fjernes fra enheten, eller innstillingene kan justeres for å redusere belastningen på enheten.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Title=Alternativ 2: Identifiser og avinstaller programmer.
exp.MemoryUtilizationIsHighForAnExtendedTime.option3Detail=Start datamaskinen på nytt for å lukke alle programmer som kjører fullstendig.
exp.MemoryUtilizationIsHighForAnExtendedTime.option3Title=Alternativ 3: Start enheten på nytt.
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Detail1=Bruk Oppgavebehandling for å se programmer som kjører etter minnebruk.
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Detail2=Lukk programmer som bruker mest minne.
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Title=Alternativ 4: Lukk programmer.
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Detail1=Use Task Manager to identify an application where the Memory utilization is steadily increasing to unusual proportions, but never decreasing.
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Detail2=Se etter oppdateringer fra produsenten for dette programmet.
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Title=Alternativ 5: Identifiser en potensiell minnelekkasje og oppdater.
