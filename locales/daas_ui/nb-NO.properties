dnto.subscriptions.about_hp.desc1=Vi er et teknologiselskap opprettet i troen om at selskaper ikke bare bør oppnå fortjeneste. De bør gjøre verden til et bedre sted. Vår innsats innen klimatiltak, menneskerettigheter og digital rettferdighet, beviser at vi gjør alt vi kan for å oppnå dette.
dnto.subscriptions.about_hp.desc2=Med over 80 år med tiltak som beviser intensjonene våre, er vi trygge på at vi kan forestille oss en verden der innovasjoner driver frem ekstraordinære bidrag til menneskeheten.
dnto.subscriptions.about_hp.desc3=Og vår teknologi – en produkt- og tjenesteportefølje med personlige systemer, skrivere og 3D-utskriftsløsninger – ble opprettet for å gi inspirasjon til denne betydningsfulle fremgangen.
dnto.subscriptions.about_hp.desc4=Vi vet at hvem som helst, uansett hvor de er, til enhver tid kan komme med gjennomtenkte ideer.
dnto.subscriptions.about_hp.desc5=Og alt vi trenger er én som kan endre verden.
