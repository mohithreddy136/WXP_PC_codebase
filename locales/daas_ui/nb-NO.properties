asset_details_last_restart.description1=Windows closes apps, stops services, unloads drivers, and reinitializes the OS kernel before booting fresh.
asset_details_last_restart.description2=Omstart kan ta i bruk oppdateringer, fikse ytelsesproblemer og tømme minnet.
asset_details_last_restart.description3=Windows does not use Fast Startup during restart. Instead it performs a clean OS restart but keeps certain hardware states warm.
asset_details_last_restart.full_boot=Full oppstart
asset_details_last_restart.full_boot.description=Når Windows utfører en omstart med full oppstart, lastes hele operativsystemet inn på nytt og maskinvarekomponenter initialiseres på nytt. I motsetning til en standard omstart, eller en avslutning med Rask oppstart, bevarer ikke denne prosessen kjerneøkten. Alt startes opp på nytt, tilsvarende en oppstart etter en fullstendig avslutning.
asset_details_last_restart.full_boot.timestamp=This timestamp is the start of the last full system boot (cold boot or warm boot), regardless of what caused the Startup.
asset_details_last_restart.note1=Dette tidsstempelet oppdateres kun når en full oppstart / omstart finner sted, dvs. når Windows initialiserer en ny økt fullstendig.
asset_details_last_restart.note2=Når Rask oppstart er aktivert, oppdateres ikke dette feltet for hybride økter / hurtigoppstartsøkter; Det reflekterer kun den siste ekte fullstendige omstarten.
