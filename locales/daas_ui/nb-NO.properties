banner.iot.update.description=En endring i infrastrukturen for TechPulse-plattformen blir implementert mandag 27. feb. 2023. Det kan være nødvendig å oppdatere proxy, brannmur og programvareinnstillinger for SSL-inspeksjon. Kjør verktøyet for nettverksvurdering på <a href='https://www.hpdaas.com/software' target='_blank'>HP TechPulse – Programvare (hpdaas.com)</a> og kontroller om noen av de fire (4) *.IoT-testmålene returnerer en «Feil»-melding. Hvis test resulterer i en feil, følger du instruksjonene her <b><a href='https://hp.service-now.com/techpulse_kb?id=kb_article&sysparm_article=KB0011291' target='_blank'>KB0011291</a> – Konfigurering av proxy eller brannmur</b> og <b>utfører disse endringene innen torsdag 23. feb. 2023</b>.
banner.iot.update.title=HANDLING NØDVENDIG
