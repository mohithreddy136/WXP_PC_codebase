exp.HpBatteryHealthManagerNotEnabled.reference1Text=HP batteritilstandsstyring – Støtte
exp.HpBatteryHealthManagerNotEnabled.references=Referanser:
exp.HpBatteryHealthManagerNotEnabled.settingLetDetail1=Endrer dynamisk hvordan systemet lader batteriet basert på bruksforhold og temperatur over tid.
exp.HpBatteryHealthManagerNotEnabled.settingLetTitle=La HP styre batteriladingen min
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases1=Miljøer med blandet bruk der bærbare datamaskiner fjernes regelmessig fra vekselstrømmen og batteriet får lades ut.
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases2=Foretrekk én enkelt prosess for organisasjonen din.
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases3=Den bærbare datamaskinen er mindre enn ett år gammel.
exp.HpBatteryHealthManagerNotEnabled.settingMaxDetail1=Begrenser maksimal ladetilstand til 80 % for å optimalisere batteritilstanden og redusere hevelse.
exp.HpBatteryHealthManagerNotEnabled.settingMaxTitle=Maksimer batteritilstanden
exp.HpBatteryHealthManagerNotEnabled.settingMaxUseCases1=Miljøer der bærbare datamaskiner er koblet til vekselstrøm kontinuerlig.
exp.HpBatteryHealthManagerNotEnabled.settingMaxUseCases2=Bærbare datamaskiner som er ett år gamle eller mer.
