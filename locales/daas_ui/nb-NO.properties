exp.GpuHealthIssue.blueScreenLink=https://docs.microsoft.com/en-us/windows-hardware/drivers/debugger/-analyze
exp.GpuHealthIssue.blueScreenLinkText=https://docs.microsoft.com/en-us/windows-hardware/drivers/debugger/-analyze
exp.GpuHealthIssue.causeBlueScreenErrors=Blåskjermfeil: Blåskjermfeil kan forårsakes av at for mange grafikkrevende programmer eller visuelle effekter kjører samtidig, eller av driver- og maskinvareproblemer.
exp.GpuHealthIssue.causeDoubleBitEcc=To-bits ECC-minnefeil: Grafikkortet opplever to-bits ECC-minnefeil, noe som kan indikere maskinvareproblemer eller feil i minnet.
exp.GpuHealthIssue.causeHighDoubleBitEccOverTime=Stort antall to-bits ECC-minnefeil over tid: Grafikkortet har et stort antall to-bits ECC-minnefeil, og gjennomsnittlig antall feil har økt i minst tre uker.
exp.GpuHealthIssue.causeHighTdrEvents=Et høyt antall TDR-hendelser (tidsavbrudd for skjermdriver og gjenoppretting): Skjermkortet har opplevd et høyt antall TDR-hendelser, noe som indikerer potensielle driver- eller maskinvareproblemer.
exp.GpuHealthIssue.causeMissingDriverUpdate=Mangler kritisk driveroppdatering: Grafikkortet mangler en kritisk driveroppdatering, noe som kan påvirke ytelse og stabilitet.
exp.GpuHealthIssue.causeThermalIssues=Termiske problemer: Grafikkortet opplever et stort antall termiske problemer, og GPU- eller minnetemperaturer er høyere enn maksimal driftstemperatur.
exp.GpuHealthIssue.driverOption1=Alternativ 1: Bruk HP Image Assistant for å oppdatere driverne.
exp.GpuHealthIssue.driverOption2=Alternativ 2: Bruk Windows Update for å oppdatere driverne.
exp.GpuHealthIssue.possibleCauses=Mulige årsaker:
exp.GpuHealthIssue.remediationBlueScreenPrefix=For blåskjermfeil: Kontroller om for mange grafikkrevende programmer eller visuelle effekter kjører samtidig. Oppgrader grafikkortdriveren, tilbakestill overklokkede innstillinger til standard, utfør en ren installasjon av driveren eller tilbakestill innstillingene til fabrikkstandard, sørg for tilstrekkelig strømforsyning og rengjør luftventiler og viften. Analyser minidumpfilen for spesifikke utbedringstrinn:
exp.GpuHealthIssue.remediationDoubleBitEcc=For to-bits ECC-minnefeil: Fortsett å overvåke situasjonen og kontroller om ytelsen fortsetter å forverres. Hvis antallet feil forblir høyt, bør du vurdere å erstatte grafikkortet.
exp.GpuHealthIssue.remediationMissingDriver=For manglende driveroppdateringer: Oppdater grafikkortdriveren til den nyeste versjonen for å håndtere ytelsesproblemer.
exp.GpuHealthIssue.remediationTdr=For TDR-hendelser: Fortsett overvåkingen og oppdater grafikkortdriveren hvis problemet vedvarer. Tilbakestill grafikkinnstillinger til standard, tilbakestill overklokkede innstillinger til standard, oppdater BIOS hvis en oppdatering er tilgjengelig, og sjekk for tilstrekkelig strømforsyning og riktig luftstrøm. Rengjør luftventiler og vifte.
exp.GpuHealthIssue.remediationThermal=For termiske problemer: Sjekk om luftstrømmen er begrenset, rengjør luftventiler og sørg for at viften fungerer som den skal og er ren.
exp.GpuHealthIssue.suggestedRemediations=Foreslåtte utbedringer:
exp.GpuHealthIssue.title=Håndter GPU-tilstand
exp.HpBatteryHealthManagerNotEnabled.causeNotCompatible=Enhet er ikke kompatible med HP batteritilstandsstyring.
exp.HpBatteryHealthManagerNotEnabled.causeRequiresBiosUpdate=Enhet krever en BIOS-oppdatering.
exp.HpBatteryHealthManagerNotEnabled.description=Siden 2016 er HP batteritilstandsstyring tilgjengelig på alle bærbare bedrifts-PC-er fra HP. For å forbedre batteriets levetid, anbefales det at batteritilstandsstyring er aktivert.
exp.HpBatteryHealthManagerNotEnabled.option1Detail=HP anbefaler at HP batteritilstandsstyring aktiveres, enten for å «La HP styre batteriladingen min», eller for å «Maksimere batteritilstanden basert på bruk av eller alder på datamaskinen».
exp.HpBatteryHealthManagerNotEnabled.option1Title=Alternativ 1: Oppdater BIOS til en versjon som støttes
exp.HpBatteryHealthManagerNotEnabled.possibleCauses=Mulige årsaker:
