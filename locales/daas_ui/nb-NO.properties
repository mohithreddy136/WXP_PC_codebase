account_management.subscriptions.addon.anyware.azure_notice=Lisens tilbys for tiden bare gjennom Azure Marketplace. HP Anyware standardlisens inkluderer tilgang til HP Anyware Manager Enterprise.
account_management.subscriptions.addon.anyware.desc=Administrer og klargjør eksterne skrivebord for teamet ditt. Sluttbrukere vil ha sikker tilgang til skrivebord uten behov for et VPN. Overvåk den eksterne flåten fra ett sted når du integrerer HP Anyware med WXP.
account_management.subscriptions.addon.anyware.desc.short=Få tilgang til, administrer og overvåk stasjonære datamaskiner på en sikker måte.
