requirements.list.hp_print_fleetproxy.desc1=Print Fleet Proxy krever at HP Web Jetadmin er installert på samme PC. HP anbefaler at du oppgraderer til den nyeste versjonen av Web Jetadmin før du installerer HP Fleet Proxy.
requirements.list.hp_print_fleetproxy.desc2=HP tester for tiden bare HP Fleet Proxy mot HP Web Jetadmin 10.5 SR4. Selv om HP Fleet Proxy kan fungere med tidligere versjoner av HP Web Jetadmin, gir HP ingen garanti for at alle funksjoner vil fungere som forventet.
requirements.list.hp_print_fleetproxy.desc3=Web Jetadmin er en ressurskrevende tjeneste. Selv om HP Fleet Proxy ikke bør legge til mye ekstra ressurser, kan ytelsen påvirkes hvis vertsserveren ikke har nok databehandlingskraft til å støtte begge tjenester og enhetene de administrerer. Du bør forsikre deg om at serveren som drifter HP Web Jetadmin og HP Fleet Proxy, er robust nok og har nok behandlingskjerner til å redusere ytelsesproblemer.
requirements.list.hp_print_fleetproxy.desc4=Under testing av 2000 enheter, fant HP ut at følgende grunnleggende maskinvarespesifikasjoner bør være tilstrekkelig for å produsere akseptable ytelsesresultater. Hvis du merker at ytelsen er treg, eller hvis du administrerer mer enn 2000 enheter, kan du ha behov for en server med mer databehandlingskraft.
requirements.list.hp_print_fleetproxy.desc5=Print Fleet Proxy er en lokal tjeneste som kommuniserer med en skybasert tjeneste. Som følge av dette må du konfigurere brannmuren slik at den tillater inngående og utgående kommunikasjon mellom WJA-serveren og HP Command Center, enten gjennom DNS-filtrering eller IP-hvitlisting.
requirements.list.hp_print_fleetproxy.desc6=Du kan finne denne listen her:
requirements.list.hp_print_fleetproxy.hp-nf1=DNS-filtrering: Konfigurer brannmuren slik at den tillater utgående HTTPS-forespørsler over port 443 til følgende endepunkter:
requirements.list.hp_print_fleetproxy.hp-nf2=IP-hvitlisting: For å hvitliste IP-adresser, må du inkludere IP-adressen til alle skybaserte servere HP Fleet Proxy kanskje må kommunisere med.
