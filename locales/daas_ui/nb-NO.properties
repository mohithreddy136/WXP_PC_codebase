exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option1=Alternativ 1: Hvis du kobler til Wi-Fi-nettverket hjemme, bør du vurdere å endre sikkerhetstypen ruteren eller tilgangspunktet ditt bruker.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option1.step1=Logg deg på ruteren via ruterens programvare.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option1.step2=Endre sikkerhetstypen for Wi-Fi-hjemmenettverket.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option2=Alternativ 2: Hvis du har en eldre ruter eller et eldre tilgangspunkt, bør du vurdere å skaffe deg en nyere ruter som støtter de nyeste sikkerhetsstandarder og -forbedringer.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.recommendations=Anbefalinger:
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.title=Wi-Fi-tilkobling ikke sikker
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.cause1=Planløsningen i hjemmet ditt kan forårsake Wi-Fi-problemer.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.cause2=Tilgangspunktet kan befinne seg bak vegger og hindringer.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.description=Wi-Fi-signalstyrken ble rapportert som svak de siste 24 timene.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.moreInfo=Mer informasjon:
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.moreInfoLink=https://support.microsoft.com/en-us/windows/wi-fi-problems-and-your-home-layout-e1ed42e7-a3c5-d1be-2abb-e8fad00ad32a#WindowsVersion=Windows_11
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.possibleCauses=Mulige årsaker for hjemmenettverket:
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1=Alternativ 1: Start ruter på nytt
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step1=Koble modemet og ruteren fra strømuttaket.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step2=Vent i minst 15 sekunder.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step3=Først kobler du modemet til vekselstrømuttaket igjen, venter 1–2 minutter og slår deretter på ruteren.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step4=Vent til alle panellampene på kabelmodemet lyser grønt før du tester internettilkoblingen.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2=Alternativ 2: Flytt tilgangspunktet.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step1=Flytt tilgangspunktet, hvis du kan, for å redusere antallet vegger eller andre hindringer mellom tilgangspunktet og PC-en.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step2=Flytt PC-en nærmere tilgangspunktet hvis du kan.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step3=Flytt tilgangspunktet mot midten av hjemmet eller rommet hvis du kan, og høyere hvis dette er mulig. Wi-Fi-signalstyrken kan reduseres hvis du plasserer det i et hjørne eller under et skrivebord.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendations=Anbefalinger:
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.title=Wi-Fi-signalstyrken er svak
exp.mgmt.troubleshoot.network.wifispeedisslow.cause1=Tilgangspunktet kan befinne seg bak vegger og hindringer.
exp.mgmt.troubleshoot.network.wifispeedisslow.cause2=Ruterens fastvare kan være utdatert.
exp.mgmt.troubleshoot.network.wifispeedisslow.description=Nominell hastighet for Wi-Fi ble rapportert som sakte de siste 24 timene.
exp.mgmt.troubleshoot.network.wifispeedisslow.possibleCauses=Mulige årsaker for hjemmenettverket:
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation1=Start modem og ruter på nytt
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation1.step1=Slå av modemet først, og deretter ruteren.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation2=Flytt ruteren
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation2.step1=Prøv å flytte ruteren til en annen plassering hjemme eller på kontoret, eller juster antennen i en annen retning.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation3=Oppdater ruterens fastvare
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation3.step1=Regelmessig oppdatering av ruterens fastvare kan bidra til å fikse feil og tilkoblingsproblemer. Noen rutere kan oppdateres automatisk, men de fleste krever manuelle oppdateringer.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation4=Endre ruterens frekvens
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation4.step1=Wi-Fi-rutere velger et frekvensbånd automatisk, men du kan prøve å endre det fra 2,4 GHz til 5 GHz for å se om hastigheten forbedres. Du bør imidlertid sjekke om ruteren støtter 5 GHz før du gjør dette.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation5=Oppdater Wi-Fi-driverne
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation5.step1=Utdaterte eller ødelagte drivere kan føre til nettverksproblemer. Forsikre deg om at Wi-Fi-adapteren er oppdatert.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation6=Unngå forstyrrelser
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation6.step1=Kanalforstyrrelser kan redusere gjennomførings- og dataoverføringshastigheten betydelig, så prøv å eliminere eventuelle forstyrrelser du opplever.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation7=Sjekk andre enheter
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation7.step1=Finn ut hvilke andre enheter som er koblet til nettverket og hva disse gjør. Hvis en annen enhet laster ned store mengder data, kan dette påvirke hastigheten.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendations=Anbefalinger:
exp.mgmt.troubleshoot.network.wifispeedisslow.title=Wi-Fi-hastighet er lav
