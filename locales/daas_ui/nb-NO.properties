bios.bsod.tooltip.context=Denne innvirkningen på BIOS avgjøres av vekting, der forekomster av BSOD tetter opptil oppgradering i andre enheter av samme modell, har høyere vekting. I tillegg klassifiseres spesifikke enhetsmodeller med en vekting på over X %, som «høy innvirkning». Innvirkningen beregnes for hver enhetsmodell, og gjelder alle enheter som anbefales for den spesifikke BIOS-versjonen. Hvis forekomster av BSOD er mindre for modellen, vil både vektingen og innvirkningen være mindre.
