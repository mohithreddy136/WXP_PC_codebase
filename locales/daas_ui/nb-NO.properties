exp.ExcessiveOsStartupTime.option1=Alternativ 1: Windows 11 – Oppstarts-apper i innstillingene
exp.ExcessiveOsStartupTime.option1Guide=For å forbedre enhetens ytelse og løse en treg påloggingstid, vil fjerning av programmer som starter opp når du logger på ha størst innvirkning. For Windows 11-enheter, gir Microsoft deg en veiledning som gir deg kontrollen over Windows-oppstarten.
