exp.ExcessiveOsStartupTime.option1Steps=by changing the Windows startup programs using the following steps:
exp.ExcessiveOsStartupTime.option1StepSettings=Velg Innstillinger.
exp.ExcessiveOsStartupTime.option1StepStart=Velg Start-knappen, som ser ut som Windows-logoen.
exp.ExcessiveOsStartupTime.option1StepStartup=Velg Oppstart i bunnen av Apper-vinduet.
exp.ExcessiveOsStartupTime.option1StepToggles=Bruk vekslebryterne for å bestemme hvilke apper som skal kjøre under oppstart. Slå på hvis du vil at appen skal åpnes under oppstart, eller slå av hvis du ikke vil at appen skal åpnes under oppstart.
exp.ExcessiveOsStartupTime.option2=Alternativ 2: Windows 11 – Oppstarts-apper i Oppgavebehandling
exp.ExcessiveOsStartupTime.option2Guide=Oppstarts-apper kan også aktiveres eller deaktiveres fra Windows oppgavebehandling, ved bruk av følgende trinn:
exp.ExcessiveOsStartupTime.option2StepDisable=Høyreklikk på en app og velg Deaktiver (hvis statuskolonnen viser Aktivert).
exp.ExcessiveOsStartupTime.option2StepStart=Velg Start-knappen, som ser ut som Windows-logoen.
exp.ExcessiveOsStartupTime.option2StepStartupApps=Velg «Oppstarts-apper» fra venstre navigasjon.
exp.ExcessiveOsStartupTime.option2StepTaskManager=Skriv inn «Oppgavebehandling» og trykk på Enter for å åpne Windows oppgavebehandling.
exp.ExcessiveOsStartupTime.option3=Alternativ 3: Avinstaller programmer
exp.ExcessiveOsStartupTime.option3Guide=Programmer som ikke startes automatisk ved oppstart, kan også bidra til treg påloggingstid siden disse programmene kan inneholde filer, tjenester og registeroppføringer som kan være delvis lastet inn. Systemstatusfeltprogrammer er noen eksempler på programmer som kjører, selv om det kanskje ikke er et åpent vindu der programmet kjører. For å gå gjennom og fjerne unødvendige programmer, fullfører du følgende trinn. Merk: Noen programmer kan kreve administrative rettigheter for å fjernes.
exp.ExcessiveOsStartupTime.option3StepControlPanel=Skriv inn «Kontroll» og trykk på Enter for å åpne kontrollpanelet.
exp.ExcessiveOsStartupTime.option3StepPrograms=Åpne Programmer og funksjoner.
exp.ExcessiveOsStartupTime.option3StepStart=Velg Start-knappen, som ser ut som Windows-logoen.
exp.ExcessiveOsStartupTime.option3StepUninstall=Velg et program som skal fjernes og velg Avinstaller.
exp.ExcessiveOsStartupTime.option4=Alternativ 4: Bruk PowerShell og ActiveDirectory-modulen for å kjøre Get-GpResultantSetofPolicy for å analysere policyer og hvor lang tid det tar før de tas i bruk på de berørte maskinene for å identifisere mulige forbedringer.
