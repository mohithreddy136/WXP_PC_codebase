btg.addon.list.feature_three.description=The HP IQ App is a universal multi-modal interface, fluidly spanning devices, context, location, and intent, enabling seamless, adaptive access to AI regardless of form factor. It also delivers a consistent and personal interaction model across the HP product ecosystem - making products feel simpler, more intuitive and intelligent.
btg.addon.list.feature_three.title=Universelt UX-/UI-lag
btg.addon.list.feature_two.description=IQ’s AI orchestrator dynamically blends local and cloud AI to deliver fast, private, and personal context-aware computing. It intelligently and seamlessly routes tasks to the right model in the right place while optimizing for privacy and personalization. Powered by HP’s hybrid architecture, it keeps workflows always available, and fluid.
btg.addon.list.feature_two.title=Kraftig AI-orkestrator
btg.addon.section.description=Gi de ansatte muligheten til å samarbeide bedre med HP-enheter.
btg.addon.section.overview.description=HP’s powerful AI orchestrator for all of its AI-enabled products, HP IQ combines context awareness, effortless Collaboration, and a personalized UI with enterprise-grade security to enhance workforce Efficiency and personal Flow.
