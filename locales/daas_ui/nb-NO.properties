requirements.list.proSecurity.windows.supportLifecycle.content1=Målet for HP-tjenestenivået er å støtte de tre nyeste utgavene av Windows 10-halvårskanalen.
requirements.list.proSecurity.windows.supportLifecycle.content2=HPs mål er å utgi støtte for den nye OS-utgivelsen for Wolf Pro Securitys trusseloppbevaringsfunksjonen innen 30 dager etter at den er tilgjengelig i den halvårlige kanalen (\"SAC\"). Midlertidige eller forhåndsutgivelser av Windows Insider-versjoner støttes ikke. Hvis du vil ha mer informasjon om Windows OS-versjoner, kan du se <a href='https://docs.microsoft.com/en-us/windows/release-information/' target='_blank'>https://docs.microsoft.com/en-us/windows/release-information/</a>.
requirements.list.proSecurity.windows.supportLifecycle.content3=For å sikre at kunder på eldre Windows-versjoner får tilstrekkelig med tid til å oppgradere til de nyere utgavene, fortsetter HP å støtte den fjerde nyeste utgaven (for tiden Windows 10 v1903) i minst 90 dager etter at støtte for den nyeste halvårlige kanalutgaven blir tilgjengelig i Wolf Pro Security. Etter denne perioden avsluttes støtte for den eldre OS-utgaven. Den samme støttepolicyen gjelder for den langsiktige tjenestekanalen for Windows 10-versjoner. Disse systemene må også oppdateres i henhold til policyen ovenfor.
requirements.list.proSecurity.windows.supportLifecycle.content4=Sure Click Pro-støtte for Windows 10 v2004 ble utgitt 31. juli 2020. Støtte for Windows 10 v1809 trekkes tilbake fra 31. oktober 2020.
requirements.list.proSecurity.windows.supportLifecycle.content5=Windows 7 og 8.1 støttes ikke av HP Proactive Security
requirements.list.proSecurity.windows.supportLifecycle.content6=Sure Click Pro-støtte for Windows 10 v20H2 ble utgitt 18. november 2020. Støtte for Windows 10 v1903 ble avsluttet 16. februar 2021.
requirements.list.proSecurity.windows.supportLifecycle.content7=HP utga Sure Click Pro trusselbegrensningsstøtte for Windows 10 v21H1 den 5. juli 2021. Støtte trekkes tilbake for Windows 10 v1909 fra 3. oktober 2021.
