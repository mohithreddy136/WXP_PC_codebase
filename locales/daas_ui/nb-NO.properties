wpt.details.desc=Med HP {appName}, verdens sikreste finn-, lås- og slett-tjeneste, kan du beskytte data, spore flåten med HP-enheter og hindre uautoriserte brukere i å få tilgang til filer og dokumenter på ditt nettverk. HP {appName} drives av HP Workforce Experience Platform, og gir deg en fullstendig maskinvarestyrt tjeneste for å finne, låse og slette enheter, selv når PC-er er frakoblet eller avslått.
wpt.details.header=Opprett din første forsvarslinje
wpt.disclaimer.point1=Basert på HPs interne analyser av Finn-, lås- og slett-programvareløsninger. Sikrest basert på kryptografi og utholdenhet (inkludert maskinvarestyrt utholdenhet) per oktober 2021.
wpt.disclaimer.point2=HP {appName} er tilgjengelig på utvalgte HP 600, 800, 1000, Windows-baserte Elite Dragonfly bærbare PC-er, utvalgte 800 stasjonære PC-er og Z1 G8-arbeidsstasjoner, og vil fungere når enheten er slått på og koblet til internett.
wpt.disclaimer.point3=HP Workforce Experience Platform er en telemetri- og analyseplattform som leverer kritiske data om enheter og programmer. Selges ikke som en frittstående tjeneste. HP Workforce Experience Platform følger strenge GDPR-reguleringer og er ISO27001-, ISO27701-, ISO27017- og SOC2 Type2-sertifisert for informasjonssikkerhet. Internettilgang med tilknytning til Workforce Experience Platform-portalen kreves. Du finner fullstendige systemkrav på <a href=\"{link}\" target=\"_blank\" style=\"text-decoration: none; color: #027aae; cursor: pointer;\">{text}</a>.
wpt.disclaimer.point4=Maskinvarestyrt refererer til HP Sure Run Gen4 og høyere, som er tilgjengelig på kompatible HP PC-er med denne tjenesten, og krever Windows 10 og høyere.
wpt.disclaimer.point5=Tjenestenivåer og responstider for HPs maskinvarestøtte kan variere avhengig av geografisk plassering. Tjenesten starter på datoen for maskinvarekjøpet. Begrensninger gjelder. For detaljer, se <a href="https://www.hp.com/go/cpc" target="_blank" style="text-decoration: none; color: #027aae; cursor: pointer;">www.hp.com/go/cpc</a>. HP-tjenester er underlagt HPs gjeldende tjenestevilkår som er oppgitt eller angitt til kunden på kjøpstidspunktet. Kunden kan ha ytterligere lovbestemte rettigheter i henhold til gjeldende lokale lover, og slike rettigheter påvirkes ikke på noen måte av HPs vilkår for bruk eller HPs begrensede garanti som følger med HP-produktet.
wpt.explore.header=Utforsk løsning
wpt.feature.cost.desc=Tap av en viktig PC kan koste mye mer enn penger. HP {appName} bidrar til å redusere risikoen og kostnadene knyttet til tap av en PC. Nå har du en omfattende måte å lokalisere en tapt eller stjålet PC og slette eller låse data.
wpt.feature.cost.title=Bidra til mindre uro og reduserte kostnader
wpt.feature.data.desc=Bruk vår sikreste tjeneste med terskelkryptografi til å finne, låse og slette data fra alle HP-enheter, noe som bidrar til å sikre at sensitiv informasjon er beskyttet.
wpt.feature.data.title=Beskytt dine enheter og data
wpt.feature.monitoring.desc=Med det forenklede instrumentbordet i HP Workforce Experience Platform kan ITDM-er respondere raskere i forbindelse med bortkomne eller stjålne enheter, samt overvåke helse- og beskyttelsestilstanden for alle enheter via én brukervennlig plattform.
