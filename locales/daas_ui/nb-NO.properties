btg.addon.description=HP IQ kombinerer kontekstbevissthet, uanstrengt samarbeid og et tilpasset brukergrensesnitt med sikkerhet i enterprise-klassen for å forbedre arbeidsstyrkens effektivitet og personlige flyt.
btg.addon.list.feature_five.description=Med HP Poly Studio sammen med Poly Lens, kan brukere tilpasse enhetene sine og opprettholde sømløse tilkoblingsmuligheter fra en hvilken som helst lokasjon.
