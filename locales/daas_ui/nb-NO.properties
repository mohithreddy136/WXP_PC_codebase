wex.labs.remediation.ai.description=Utbedring med KI veileder deg til den mest effektive løsningen. Den begrenser alternativene på en intelligent måte, slik at teamet ditt kan løse problemer effektivt og konsistent.
wex.labs.remediation.ai.description.disclaimer=You are about to interact with an AI solution. Content generated by AI might contain inaccuracies and should be verified against the details provided. Please note that AI-generated responses might be incomplete or incorrect, and HP assumes no responsibility for actions taken based on this content.
wex.labs.remediation.ai.details.analyzesAvailableRemediations.desc=Algoritmen skanner eksisterende utbedringer i plattformen, inkludert skript, policyer og enhetshandlinger/-oppdateringer, for å anbefale dem mest relevante utbedringen.<br/><br/>Den ser på historisk bruk og suksessrater for å forstå hva som vanligvis løser denne typen problemer i organisasjonen din. Brukere kan bruke mindre tid på å avgjøre riktig handlingsforløp og tillate at AI gjør jobben.
wex.labs.remediation.ai.details.analyzesAvailableRemediations.title=Analyserer tilgjengelige utbedringer
wex.labs.remediation.ai.details.applyOrReview.desc=Avhengig av utbedringen, kan administratorer velge å: <br/><div class=remediation-ai-ui><ul><li>Bruke umiddelbart på valgte enheter</li><li>Planlegg til senere for å minimere avbrudd</li><li>Gå gjennom detaljer før handling bekreftes</li></ul></div><br/>Så snart det tas i bruk, spores aktivitet og resultater for gjennomsiktighet og kontinuerlig læring.
wex.labs.remediation.ai.details.applyOrReview.title=Bruk, planlegg eller gå gjennom
wex.labs.remediation.ai.details.continuousLearning.desc=Over tid blir anbefalinger mer nøyaktige og sikre.
wex.labs.remediation.ai.details.continuousLearning.title=Kontinuerlig læring
wex.labs.remediation.ai.details.howItWorks.title=Slik fungerer det
wex.labs.remediation.ai.details.issueToRemediation.desc=Når et problem krysser en definert terskel, dukker det opp på dashbordet ditt med en tydelig beskrivelse over hva som skjer og hvordan det kan påvirke enhetene dine. WXP-plattformen tillater nå direkte utbedring og AI-utbedringsfunksjonen bidrar til å finne det beste alternativet for å fikse problemet.
wex.labs.remediation.ai.details.issueToRemediation.title=Problem til utbedring
wex.labs.remediation.ai.details.learnsandImproves.desc=Algoritmen forbedrer kontinuerlig sin forståelse av hva som fungerer best for organisasjonen din.<br/>Hver gang en utbedring tas i bruk, lærer systemet:<div class=remediation-ai-ui><ul><li>Hvor effektiv den var</li><li>Hvor lang tid det tok å løse problemet</li><li>Om liknende problemer har forekommet på nytt</li></ul></div><br/>Denne tilbakemeldingssløyfen styrker fremtidige anbefalinger, og gjør dem mer nøyaktige og skreddersydde over tid.
wex.labs.remediation.ai.details.learnsandImproves.title=Lærer og forbedres over tid
wex.labs.remediation.ai.details.overview.desc=Utbedring med AI-funksjon bidrar til at IT-administratorer raskt kan gå fra deteksjon til løsning. Den analyserer flåtens data og anbefaler den mest effektive policy-, skript- eller enhetsoppdateringen for det aktuelle problemet. Algoritmen bruker mønstre fra eksisterende utbedringer i miljøet ditt, og foreslår hva som mest sannsynlig vil fungere.
wex.labs.remediation.ai.details.recommendBestFix.desc=Hver anbefaling inkluderer: <br/><div class=remediation-ai-ui><ul><li>Type handling: Skript, policy eller oppdatering</li><li>Hvorfor dette er relevant: Utbedring og automatisering fikser problemer i sanntid, forbedrer den digitale opplevelsen og de ansattes produktivitet, sparer tid og reduserer sårbarheten.</li></ul></div>
wex.labs.remediation.ai.details.recommendBestFix.title=Anbefaler beste reparasjon
wex.labs.remediation.ai.details.relevance.desc=KI jobber i organisasjonens eget utbedringsbibliotek.
wex.labs.remediation.ai.details.relevance.title=Relevans
wex.labs.remediation.ai.details.scriptInfo.desc=For faster saving of your script, the system reads it and auto-fills metadata fields such as title, description, synopsis, and any input parameters detected allowing you to quickly review and save your new script.
