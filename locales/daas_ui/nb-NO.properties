side_panal.smart_refresh.help_sub_title=Oppgrader PC-er på riktig tidspunkt med HPs smarte oppdatering. Slik fungerer det:
side_panal.smart_refresh.personas_header=Identiteter
side_panal.smart_refresh.personas_sub_text=KI-baserte grupper med enheter, avgjort basert på bruksmønstre
side_panal.smart_refresh.point_1_desc=Evaluer gjeldende status for PC-er i forhold til maskinvareytelse, programvarens brukervennlighet og sikkerhet.
side_panal.smart_refresh.point_1_title=1. Vurdering
side_panal.smart_refresh.point_2_desc=Prioriter PC-er med behov for umiddelbar oppmerksomhet basert på bruk, betydning for forretningsdriften eller foreldelsesnivå.
side_panal.smart_refresh.point_2_title=2. Prioritering
