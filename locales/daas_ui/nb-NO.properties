exp.FrequentWindowsBsodsHaveOccurred.description=Mer enn tre feilsjekk-hendelser (BSOD-hendelser) har funnet sted i løpet av de siste syv dagene. Feilsjekk-hendelser kalles også «Blåskjerm»- eller «BSOD»-hendelser.
