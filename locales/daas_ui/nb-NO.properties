azureonboard.marketing.disclaimer.content=Informasjonen i dette dokumentet kan endres uten varsel. De eneste garantiene for HP-produktene og -tjenestene er uttrykkelig angitt i garantierklæringene som følger med produktene og tjenestene. Ingenting i dette dokumentet skal kunne tolkes som en tilleggsgaranti. HP skal ikke holdes ansvarlig for tekniske eller innholdsmessige feil eller utelatelser i dette dokumentet.
azureonboard.marketing.disclaimer.contentlist1=HP Proactive Insights og/eller inkluderte komponenter kan variere avhengig av region, operativsystem eller autorisert HP-servicepartner. Ta kontakt med din lokale HP-representant eller en autorisert partner for området du befinner deg i. HP-tjenester er underlagt de gjeldende vilkår og betingelser, fra HP, for tjenesten som er oppgitt eller angitt til kunden på kjøpstidspunktet. Kunden kan ha ytterligere lovbestemte rettigheter i henhold til gjeldende lokale lover, og slike rettigheter påvirkes ikke på noen måte av HPs vilkår for bruk eller HPs begrensede garanti som følger med HP-produktet.
azureonboard.marketing.disclaimer.contentlist2=HP {appName} er en telemetri- og analyseplattform som leverer kritiske data om enheter og programmer. Selges ikke som en frittstående tjeneste. HP {appName} følger strenge GDPR-reguleringer og er ISO27001-, ISO27701-, ISO27017- og SOC2 Type2-sertifisert for informasjonssikkerhet. Internettilgang med tilknytning til {appName} kreves. Du finner fullstendige systemkrav på <a target='_blank' href={link}>{text}</a>.
azureonboard.marketing.disclaimer.contentlist3=BIOS-oppdateringer er kun tilgjengelige på HP-enheter.
azureonboard.marketing.disclaimer.contentlist4=Du finner informasjon om operativsystemdekning på <a target='_blank' href={link}>{text}</a>.
azureonboard.marketing.employeesection.description=Samle inn, mål og styr ansattes digitale opplevelse gjennom en kombinasjon av undersøkelser av maskinvare, applikasjon og ansatte fra alle enhetene dine.
azureonboard.marketing.employeesection.heading=Proactive Employee Insight
azureonboard.marketing.hardwaresection.description=Proaktiv overvåkning av harddisker på enhet, CPU-forbruk, termiske nivåer og batterihelse lar deg forutsi potensielle innvirkninger ved å analysere dataene dine mot 20+ millioner enhetsdata.
azureonboard.marketing.hardwaresection.heading=Proactive Hardware Insight
azureonboard.marketing.insightsection.description=Diagnostiser problemer med ytelse, programvarefeil, blåskjerm og systemforbruk samtidig som du oppdaterer drivere og installerer reparasjoner for trygge sikkerhetsprofiler.
azureonboard.marketing.insightsection.heading=Proactive Application Insight
azureonboard.marketing.learnmoresection.content=Med innsikt fra 20+ millioner enheter og flere milliarder datapunkter, bruker HP Proactive Insights HP TechPulse analytisk plattform til å identifisere og løse problemer før de påvirker ansatte.
azureonboard.marketing.learnmoresection.description=Vi hjelper deg med å endre enhetsstyringsparadigmen gjennom AI-drevet kontroll av datamaskinens ytelse, sikkerhet, kostnader, nedetid og hvor fornøyde ansatte er. Du vil bruke intelligens samlet fra 20+ millioner andre dataenheter til å forbedre organisasjonen din.
azureonboard.marketing.learnmoresection.heading=HP Proactive Insights gir meningsfull analyse fra flere milliarder datapunkter
