welcome.whats_new.line2=HP heeft zojuist de eerste verjaardag van TechPulse-plannen voor onze klanten en partners gevierd, op een grootse manier! In oktober 2018 ontving HP met trots de 2018 STAR Award for Innovation in a Standard Managed Services Offering and/or Catalog van Technology Services Industry Association (TSIA) voor onze TechPulse-oplossing. Dit was een bijzonder gedenkwaardig moment omdat het de 15e TSIA-award voor HP was en HP hiermee in de eregalerij van TSIA kwam te staan.
welcome.whats_new.line3=Proactive Management met HP TechPulse plannen helpen onze klanten meer uit hun bestaande IT-investeringen te halen, ondersteuning te krijgen bij Windows 10 en deuren te openen naar betere en slimmere besluitvorming voor nog betere bedrijfsresultaten. Voor partners verbeteren wij de ervaring van TechPulse-servicelevering, waarbij we de adresseerbare TechPulse-oplossingsruimte uitbreiden en de ondersteuning voor klanten vereenvoudigen bij het vinden van de juiste levenscyclusservices ter aanvulling van hun gewenste TechPulse-plan.
welcome.whats_new.line4=Een belangrijk aspect van het succes van TechPulse is de blijvende focus op het platform, de technologie en de processen die service-innovatie mogelijk maken. HP Proactive Management met TechPulse is slimmer, snelle en krachtiger dan ooit tevoren, en vormt een uitstekende basis voor een rooskleurige toekomst.
welcome.whats_new.line5=Ik wil iedereen nogmaals hartelijk bedanken en ik kijk uit naar nog vele jaren succesvolle samenwerking!
