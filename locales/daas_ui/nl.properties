wex.remediate.side.bar.content.script=Implementeer een herstelactie om kwesties en problemen in uw vloot op te lossen.<br><br> Met de aanbevolen actie worden apparaten verzameld die voldoen aan de criteria voor het probleem. Herstelacties kunnen dat probleem verhelpen voor de geselecteerde apparaten.<br><br> Selecteer een door HP aanbevolen script uit de HP galerij of selecteer er zelf een.<br><br> Na implementatie verschijnen de voortgang en voltooiing van de herstelactie onder Herstelacties > Activiteit.<br><br>
