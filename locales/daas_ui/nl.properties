dnto.subscriptions.about_hp.desc1=Wij zijn een technologiebedrijf dat is ontstaan uit de overtuiging dat bedrijven niet alleen maar winst moeten maken. Ze moeten de wereld ook beter maken. Onze inspanningen op het gebied van klimaatactie, mensenrechten en digitale gelijkheid laten zien dat wij al het mogelijke doen om dat te bereiken.
dnto.subscriptions.about_hp.desc2=Met meer dan 80 jaar aan acties die onze intenties bewijzen, hebben wij er vertrouwen in een wereld voor te kunnen stellen waarin innovatie een buitengewone bijdrage aan de mensheid levert.
dnto.subscriptions.about_hp.desc3=En onze technologie – een product- en serviceportfolio van personal systems, printers en 3D-printoplossingen – is gecreëerd als inspiratie voor deze zinvolle vooruitgang.
