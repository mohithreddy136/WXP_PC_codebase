wpt.details.desc=Met HP {appName}, de veiligste service ter wereld voor het zoeken, vergrendelen en wissen van gegevens, kunt u uw gegevens beschermen, uw HP apparaten volgen en voorkomen dat ongeautoriseerde gebruikers toegang krijgen tot de bestanden en documenten in uw netwerk. Met HP Workforce Experience Platform biedt HP {appName} een volledige hardwarematige service voor het vinden, vergrendelen en wissen van apparaten, ook als de pc's offline of uitgeschakeld zijn.
wpt.details.header=Stel uw eerste verdedigingslinie in
wpt.disclaimer.point1=Op basis van een interne analyse van HP van softwareservices voor vinden, vergrendelen en wissen. De veiligste op het gebied van cryptografie en persistentie (inclusief hardwaregebaseerde persistentie) vanaf oktober 2021.
wpt.disclaimer.point2=HP {appName} is beschikbaar op bepaalde HP 600, 800, 1000, Elite Dragonfly laptops met Windows, bepaalde 800 desktops en Z1 G8 werkstations, en functioneert wanneer het apparaat is ingeschakeld en verbinding heeft met internet.
wpt.disclaimer.point3=HP Workforce Experience Platform is een telemetrie- en analyseplatform dat essentiële gegevens levert over apparaten en applicaties en dat niet afzonderlijk wordt verkocht. HP Workforce Experience Platform volgt de strikte AVG-regelgeving inzake privacy en is gecertificeerd voor ISO 27001, ISO 27701, ISO 27017 en SOC 2 type 2 voor Informatiebeveiliging. Internettoegang met verbinding met het Workforce Experience Platform-portaal is vereist. Kijk voor de volledige systeemvereisten op <a href=\"{link}\" target=\"_blank\" style=\"text-decoration: none; color: #027aae; cursor: pointer;\">{text}</a>.
wpt.disclaimer.point4=Hardwaregebaseerd verwijst naar HP Sure Run Gen4 en hoger, dat beschikbaar is op compatibele HP pc’s met deze service, en dat Windows 10 en hoger vereist.
wpt.disclaimer.point5=Serviceniveaus en reactietijden voor HP hardwareondersteuningen kunnen variëren, afhankelijk van het land of de regio. De service gaat in op de datum van aanschaf van de hardware. Er gelden bepaalde voorwaarden en beperkingen. Kijk voor meer informatie op <a href="https://www.hp.com/go/cpc" target="_blank" style="text-decoration: none; color: #027aae; cursor: pointer;">www.hp.com/go/cpc</a>. Voor HP Services gelden de van toepassing zijnde algemene Voorwaarden van HP, die bij aankoop aan de klant worden verstrekt of getoond. Mogelijk heeft de klant volgens de geldende lokale wetgeving nog andere rechten. De algemene voorwaarden van HP en de HP garantie op uw HP product maken geen inbreuk op deze wettelijk vastgelegde rechten.
wpt.explore.header=Oplossing verkennen
wpt.feature.cost.desc=Het kwijtraken van een belangrijke pc kost veel meer dan alleen geld. Met HP {appName} beperkt u de risico’s en verlaagt u de kosten wanneer u een pc verliest. U kunt een gestolen of kwijtgeraakte pc nu eenvoudig traceren en gemakkelijk gegevens vergrendelen of wissen.
wpt.feature.cost.title=Verlaag uw kosten en verminder uw zorgen
wpt.feature.data.desc=Gebruik onze veiligste serviceoplossing met drempelcryptografie om gegevens te zoeken, te vergrendelen en te wissen op al uw HP apparaten en zo uw gevoelige informatie te beschermen.
wpt.feature.data.title=Bescherm uw apparaten en gegevens
wpt.feature.monitoring.desc=Met het vereenvoudigde gebruikersdashboard van HP Workforce Experience Platform kunnen ITDM’s sneller reageren op verloren of gestolen apparaten en kunnen ze de toestand en beschermingsstatus van alle apparaten bekijken op één gebruiksvriendelijk platform.
