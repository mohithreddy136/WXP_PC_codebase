account_management.subscriptions.addon.anyware.azure_notice=Licentie wordt momenteel alleen aangeboden in Azure Marketplace. HP Anyware Standard-licentie omvat toegang tot HP Anyware Manager Enterprise.
account_management.subscriptions.addon.anyware.desc=Beheer en richt desktops op afstand in voor uw team. Eindgebruikers krijgen veilige toegang tot desktops zonder dat ze een VPN nodig hebben. Bewaak uw externe vloot op één plek wanneer u HP Anyware integreert met WXP
account_management.subscriptions.addon.anyware.desc.short=Veilige toegang, beheer en bewaking van desktops
account_management.subscriptions.addon.anyware.enterprise.header=HP Anyware Manager Enterprise
account_management.subscriptions.addon.anyware.features.automation=Taken automatiseren
account_management.subscriptions.addon.anyware.features.automation.desc=Integreer uw aangepaste beheerworkflow naadloos in het beheervlak
account_management.subscriptions.addon.anyware.features.multitenant_rbac=Multi-tenant en rolgebaseerde toegangscontrole
account_management.subscriptions.addon.anyware.features.multitenant_rbac.desc=Beheer meerdere organisaties met één instantie van HP Anyware Manager Enterprise. Wijs machtigingen toe aan beheerders op basis van hun rol
account_management.subscriptions.addon.anyware.features.productivity=Eindgebruikersproductiviteit inschakelen
account_management.subscriptions.addon.anyware.features.productivity.desc=Eindgebruikers ervaren de desktops alsof ze lokaal zijn, ongeacht hun prestatiebehoeften of netwerkomstandigheden.
account_management.subscriptions.addon.anyware.features.provision_desktops=Fysieke en virtuele desktops beheren
account_management.subscriptions.addon.anyware.features.provision_desktops.desc=IT kan desktops op afstand configureren en bewaken via HP Anyware Manager Enterprise. Zij kunnen ook op elk moment virtuele desktops inrichten voor eindgebruikers.
account_management.subscriptions.addon.anyware.features.remote_access=Eindgebruikers veilige toegang op afstand bieden
account_management.subscriptions.addon.anyware.features.remote_access.desc=Eindgebruikers krijgen veilige toegang tot desktops zonder dat ze een VPN nodig hebben. HP Anyware biedt vereenvoudigde toegang via cloudgateways.
account_management.subscriptions.addon.anyware.features.role_access.desc=Voer gebruikerstoewijzing en sessieroutering uit zonder dat u een gateway in andere omgevingen hoeft te installeren
account_management.subscriptions.addon.anyware.features.role_cloud_gateways=Vereenvoudigde toegang via cloud-gateways
account_management.subscriptions.addon.anyware.features.setup=Elke IT-omgeving en eenvoudige installatie
account_management.subscriptions.addon.anyware.features.setup.desc=Een flexibele, intuïtieve oplossing die implementatie en beheer in verschillende infrastructuren vereenvoudigt, waaronder on-premises, cloud en hybride omgevingen, terwijl de IT-complexiteit en -voetafdruk worden verminderd.
account_management.subscriptions.addon.anyware.features.workforce_integration=Integratie van medewerkerservaring
account_management.subscriptions.addon.anyware.features.workforce_integration.desc=IT kan gegevens van externe desktops centraliseren binnen het Workforce Experience Platform, zodat er uiteindelijk een centraal overzicht van het park ontstaat.
account_management.subscriptions.addon.anyware.header=HP Anyware
account_management.subscriptions.addon.anyware.overview.desc1=HP Anyware is een krachtige softwareoplossing die gebruikers zonder VPN beveiligde toegang tot hun externe of virtuele desktops biedt. HP Anyware omvat toegang tot een IT-beheerplatform genaamd HP Anyware Manager Enterprise.
account_management.subscriptions.addon.anyware.overview.desc2=HP Anyware Manager Enterprise (AME) is een beheerplatform voor meerdere tenants waarmee IT zowel fysieke als virtuele desktops kan beheren.
account_management.subscriptions.addon.anyware.required_components.header=Vereiste componenten voor Workforce Experience-integratie
account_management.subscriptions.addon.anyware.required_components.li1=HP Anyware Standard
account_management.subscriptions.addon.anyware.required_components.li2=HP Anyware Manager Enterprise
account_management.subscriptions.addon.anyware.security_compliance=Beveiliging en naleving
account_management.subscriptions.addon.anyware.security_compliance.desc1=HP Anyware geeft prioriteit aan beveiliging en naleving in zijn productaanbod om robuuste bescherming en naleving van industrienormen te garanderen. De belangrijkste functies zijn end-to-endversleuteling, veilige externe toegang en multifactorauthenticatie om de integriteit en vertrouwelijkheid van gegevens te beschermen.
account_management.subscriptions.addon.anyware.security_compliance.desc2=HP Anyware integreert ook geavanceerde detectie- en responsmogelijkheden voor bedreigingen om risico's proactief te beperken. Naleving van regelgeving zoals GDPR, HIPAA en SOC 2 onderstreept de inzet van HP Anyware om strenge beveiligingsprotocollen te handhaven. Voortdurende bewaking en regelmatige beveiligingsaudits zorgen ervoor dat HP Anyware-producten bestand blijven tegen opkomende cyberbedreigingen en bieden gebruikers een veilige en betrouwbare IT-beheerervaring.
account_management.subscriptions.addon.anyware.technology=Remotingtechnologie
account_management.subscriptions.addon.anyware.technology.desc=HP Anyware's bekroonde PCoIP® remote display-technologie levert een high-definition en zeer responsieve computerervaring onder uitdagende netwerkomstandigheden.
account_management.subscriptions.addon.anyware.technology.desc.li1=PCoIP® codeert, comprimeert, versleutelt en transporteert beeldpixels vanaf een centrale server of workstation.
account_management.subscriptions.addon.anyware.technology.desc.li2=Vervolgens wordt het beeld gedecodeerd en gedecomprimeerd voor gebruikers op vrijwel elk eindpunt.
account_management.subscriptions.addon.connect_accounts=Accounts verbinden
account_management.subscriptions.addon.oob.desc.short=Extern beheer op BIOS-niveau voor geavanceerde diagnose en herstel
account_management.subscriptions.addon.oob.desclaimer1=1. Out-of-band diagnose en herstel is beschikbaar als licentie met verschillende looptijden en is geschikt voor pc’s van alle merken met Intel® vPro® Enterprise en Intel® AMT. Bevat en vereist Workforce Experience Platform Starter voor het beheren van de softwareoplossing. Verkrijgbaar in de VS, Canada en de EU via HP vertegenwoordigers of erkende HP resellers. Zie voor meer informatie (URL-koppeling naar licentievoorwaarden/eula toevoegen).
account_management.subscriptions.addon.oob.desclaimer2=2. Op basis van een interne analyse van HP van pc-fabrikanten met voedingsbeheer, niet-OS-beheer, BIOS-beheer en herinstallatiebeheer vanaf 24 september 2024.
account_management.subscriptions.addon.oob.desclaimer3=3. HP Insights Agent is vereist. Deze telemetrie- en analyse-app biedt cruciale gegevens over apparaten en applicaties, wordt niet afzonderlijk verkocht en is gecertificeerd is volgens ISO27001, ISO27701, ISO27017 en SOC2 Type 2 voor informatiebeveiliging. Internettoegang met verbinding met het portaal is vereist. Kijk voor de volledige systeemvereisten op http://www.hpdaas.com/requirements. Na aankoop van HP Insights Agent moet deze software worden ingeschakeld op elk apparaat. HP Services Scan wordt via Windows Update beschikbaar gesteld op geselecteerde HP apparaten en controleert voor elk apparaat of een geactiveerde service is aangeschaft. De relevante software wordt automatisch gedownload. Als u deze functie wilt uitschakelen, volgt u de instructies op <a target='_blank' href='http://www.hpdaas.com/requirements' style=\"text-decoration:none; color:#4D52E5\">http://www.hpdaas.com/requirements</a>
account_management.subscriptions.addon.oob.desclaimer4=4. WXP Starter is inbegrepen en vereist voor het beheren van de softwareoplossing.
account_management.subscriptions.addon.oob.features.remote_control=Remote control - even when the Operating System is down
account_management.subscriptions.addon.oob.features.remote_control.desc=IT-medewerkers hebben op afstand toegang tot het BIOS om pc's van verschillende merken, ongeacht hun locatie, opnieuw op te starten, opnieuw te installeren en te herstellen.
account_management.subscriptions.addon.oob.features.scalable=Schaalbaar, gecentraliseerd beheer
account_management.subscriptions.addon.oob.features.scalable.desc=Met deze in WXP geïntegreerde functie voor implementatie, gebruik en beheer binnen uw onderneming kunt u eenvoudig pc’s configureren, bulklicenties beheren en toegang controleren op basis van rollen.
account_management.subscriptions.addon.oob.features.secure=Veilige gebruikerservaring
account_management.subscriptions.addon.oob.features.secure.desc=Gebruikers hebben inzicht in externe sessies en kunnen de verbinding op elk gewenst moment verbreken. Betrouwbare en efficiënte ondersteuning versterkt het vertrouwen en verbetert de gebruikerservaring.
account_management.subscriptions.addon.oob.header=Out-of-band extern verbinden
account_management.subscriptions.addon.oob.overview.desc1=Wilt u de digitale beleving van uw hybride werknemers verbeteren? Met HP Out-of-band extern verbinden hebben ondersteuningsmedewerkers op afstand toegang tot het BIOS en kunnen ze pc's opnieuw opstarten, opnieuw installeren en herstellen, zelfs als het besturingssysteem niet werkt. Zonder tussenkomst van de gebruiker en zonder locatiebezoek.
account_management.subscriptions.addon.vyopta.connect_accounts.error=We konden uw account niet verbinden. Controleer uw verbinding en probeer het opnieuw.
account_management.subscriptions.addon.vyopta.connect_accounts.found=We hebben een Vyopta-account "<b>{orgName}</b>" gedetecteerd. Wilt u deze nu verbinden met WXP?
account_management.subscriptions.addon.vyopta.connect_accounts.no_permissions=U hebt geen rechten. Neem voor hulp contact op met de Vyopta-accountbeheerder.
account_management.subscriptions.addon.vyopta.connect_accounts.not_found=We konden uw {service}-account niet automatisch detecteren. Neem contact op met {support_link} om deze verbinding tot stand te helpen brengen als u al klant bij {service} bent.
account_management.subscriptions.addon.vyopta.connect_accounts.org_already_mapped=De Vyopta-ID is al gekoppeld aan een andere tenant. Neem voor assistentie contact op met uw accountbeheerder.
account_management.subscriptions.addon.vyopta.connect_accounts.request_support=Neem voor hulp contact op met de accountbeheerder van {service}.
account_management.subscriptions.addon.vyopta.connect_accounts.success=We hebben uw account verbonden.
account_management.subscriptions.addon.vyopta.connect_accounts.unauthorized=We hebben uw organisatie gedetecteerd in {service}, maar het lijkt erop dat u niet over de benodigde machtigingen beschikt om accounts te verbinden.
account_management.subscriptions.addon.vyopta.desc=Optimaliseer samenwerking met realtime inzichten. Bewaak de gesprekskwaliteit, het gebruik van vergaderruimtes en de systeemprestaties in Microsoft Teams, Zoom, Poly en Webex. Wanneer het met WXP is geïntegreerd, kan IT digitale ervaringen verbeteren en de efficiëntie van de werkplek verhogen.
account_management.subscriptions.addon.vyopta.features.comprehensive_monitoring=Uitgebreide monitoring op samenwerkingsplatforms
account_management.subscriptions.addon.vyopta.features.comprehensive_monitoring.desc=Krijg een holistisch inzicht in uw multi-vendor UC-omgeving (Unified Communications), wat een efficiënt beheer van video- en spraaksamenwerkingstools mogelijk maakt.
account_management.subscriptions.addon.vyopta.features.deep_integration=Diepe integratie met WXP
account_management.subscriptions.addon.vyopta.features.deep_integration.desc=De analyse- en bewakingsgegevens van Vyopta zijn naadloos geïntegreerd in WXP zodat IT-teams de samenwerkingsprestaties naast andere werkplektechnologieën kunnen beheren. Deze gecentraliseerde aanpak verbetert de IT-efficiëntie, vermindert de complexiteit en verbetert het beheer van digitale ervaringen.
account_management.subscriptions.addon.vyopta.features.enhance_user_engagement=Verbeter de betrokkenheid en het welzijn van gebruikers
account_management.subscriptions.addon.vyopta.features.enhance_user_engagement.desc=Gebruik samenwerkingsanalyses om belemmeringen voor de productiviteit te identificeren en de ervaringen en het welzijn van werknemers te verbeteren.
account_management.subscriptions.addon.vyopta.features.optimize_meeting_space=Optimaliseer het gebruik van vergaderruimtes
account_management.subscriptions.addon.vyopta.features.optimize_meeting_space.desc=Analyseer de bezetting en gebruikspatronen van ruimtes om investeringen in vastgoed te maximaliseren en de efficiëntie van vergaderruimtes te verbeteren.
account_management.subscriptions.addon.vyopta.features.proactive_issue_detection=Proactieve detectie en oplossing van problemen
account_management.subscriptions.addon.vyopta.features.proactive_issue_detection.desc=Maak gebruik van realtime bewaking om kwaliteitsproblemen in de samenwerking te identificeren en aan te pakken voordat ze gevolgen hebben voor gebruikers, wat de tijd voor het oplossen van problemen verkort.
account_management.subscriptions.addon.vyopta.header=Samenwerkingservaring door Vyopta
account_management.subscriptions.addon.vyopta.overview=Geef IT-teams de mogelijkheden met geavanceerde monitoring en analyses voor samenwerkingstools. Vyopta-integratie binnen WXP biedt realtime inzicht in het gebruik van vergaderruimtes, de gesprekskwaliteit en de systeemprestaties op platforms zoals Microsoft Teams, Zoom, Poly en Webex. Verhoog de productiviteit van werknemers door samenwerkingsproblemen proactief aan te pakken en de werkplekervaringen te optimaliseren.
account_management.subscriptions.addon.vyopta.short_desc=Waardevolle analyses en ruimte-inzichten om samenwerkingsomgevingen te optimaliseren
account_management.subscriptions.addon.wolf.desc=Versterk de end-to-end bescherming van uw pc met zowel ingebouwde pc-beveiliging als softwarebeveiliging.
account_management.subscriptions.addon.wolf_security=HP Wolf Security
account_management.subscriptions.addon.wolf_security.desc=Ongeëvenaarde eindpuntbescherming van apparaten tegen cyberaanvallen, aangestuurd door HP Wolf. Bekijk telemetrie in Workforce Experience voor uitgebreide beveiliging.
account_management.subscriptions.addon.wpt.desc=Volg, vergrendel en beveilig verloren of gestolen apparaten op afstand. Bij integratie met WXP kunnen IT-teams pc-activa volgen en risico's op apparaatverlies verminderen, ook als de apparaten zijn uitgeschakeld.
account_management.subscriptions.addon.wpt.features.always_available=Altijd beschikbaar
account_management.subscriptions.addon.wpt.features.always_available.desc=Maakt gebruik van aangepaste hardware en software om de pc te vinden/vergrendelen/wissen, zelfs als deze uit staat, niet op internet is of niet wil opstarten.
account_management.subscriptions.addon.wpt.features.message_customization=Aanpassing van berichten
account_management.subscriptions.addon.wpt.features.message_customization.desc=Verstuur een aangepast bericht naar de doel-pc voor ontgrendelingsinstructies
account_management.subscriptions.addon.wpt.features.remote_lock_and_erase=Vergrendelen en wissen op afstand
account_management.subscriptions.addon.wpt.features.remote_lock_and_erase.desc=Vergrendel een apparaat op firmwareniveau om gegevens te beschermen en een gestolen apparaat onbruikbaar te maken. Wis de primaire opslag op een verloren of gestolen apparaat om gegevensinbreuken te voorkomen.
account_management.subscriptions.addon.wpt.features.seamless_integration=Naadloze integratie met WXP
account_management.subscriptions.addon.wpt.features.seamless_integration.desc=Beheer de apparaatbeveiliging direct binnen WXP en stroomlijn zo IT-bewerkingen en eindpuntbeheer.
account_management.subscriptions.addon.wpt.features.separations_of_duties=Scheiding van taken
account_management.subscriptions.addon.wpt.features.separations_of_duties.desc=Als er meerdere goedkeurders zijn vereist voor vergrendelen/wissen, worden fouten of bedreigingen van binnenuit voorkomen.
account_management.subscriptions.addon.wpt.features.strong_audit_trail=Sterk auditspoor
account_management.subscriptions.addon.wpt.features.strong_audit_trail.desc=Registreert een succesvolle uitvoering van vergrendelen en wissen op het WXP-platform als bewijs van naleving.
account_management.subscriptions.addon.wpt.header=HP Wolf Protect and Trace with Wolf Connect
account_management.subscriptions.addon.wpt.overview=Verbeter activabeheer en verminder risico's op gegevensinbreuk met HP Wolf Protect & Trace. Met deze unieke, in WXP geïntegreerde oplossing kunnen IT-teams verloren of gestolen apparaten lokaliseren, vergrendelen en wissen, ook als ze zijn uitgeschakeld. Wereldwijde dekking en eenvoudig beheer dat geschikt is voor klanten van elke omvang.
account_management.subscriptions.addon.wpt.requirements.purchase=Vereist de aanschaf van een nieuwe HP pc van uw HP vertegenwoordiger of geautoriseerde kanaalpartner.<br> Vereist een ondersteunde pc met weergaveoptie "WWAN". Ondersteunde pc's op: https://www.hpwolf.com/en/legal/ptwc/platforms
account_management.subscriptions.addon.wpt.short_desc=Volg, vergrendel en wis een pc wereldwijd op afstand, zelfs als deze uit staat
