requirements.list.hp_print_fleetproxy.desc1=Voor Print Fleet Proxy moet HP Web Jetadmin op dezelfde pc zijn geïnstalleerd. HP raadt u sterk aan om te upgraden naar de nieuwste versie van Web Jetadmin voordat u HP Fleet Proxy installeert.
requirements.list.hp_print_fleetproxy.desc2=Momenteel test HP de HP Fleet Proxy alleen met HP Web Jetadmin 10.5 SR4. Hoewel HP Fleet Proxy mogelijk werkt met eerdere versies van HP Web Jetadmin, garandeert HP niet dat alle functies werken zoals verwacht.
requirements.list.hp_print_fleetproxy.desc3=Web Jetadmin is een resource-intensieve service. Hoewel HP Fleet Proxy niet veel extra overhead zou moeten toevoegen, is er mogelijk wel sprake van een impact op de prestaties als de hostserver niet genoeg rekenkracht heeft om zowel services als de apparaten die ze beheren te ondersteunen. U moet ervoor zorgen dat de server die HP Web Jetadmin en HP Fleet Proxy host robuust genoeg is en voldoende processorkernen heeft om eventuele prestatieproblemen te beperken.
requirements.list.hp_print_fleetproxy.desc4=Bij het testen van 2000 apparaten kwam HP tot de conclusie dat de volgende baseline hardwarespecificaties voldoende zouden moeten zijn om aanvaardbare prestatieresultaten te leveren. Als u trage prestaties opmerkt, of als u meer dan 2000 apparaten beheert, hebt u mogelijk een server met meer rekenkracht nodig.
requirements.list.hp_print_fleetproxy.desc5=Print Fleet Proxy is een on-premise service die communiceert met een cloudservice. Daarom moet u uw firewall configureren om inkomende en uitgaande communicatie tussen de WJA-server en HP Command Center toe te staan, door middel van DNS-filtering of IP-whitelisting.
requirements.list.hp_print_fleetproxy.desc6=Die lijst kunt u hier vinden:
requirements.list.hp_print_fleetproxy.hp-nf1=DNS-filters: Configureer uw firewall om uitgaande HTTPS-verzoeken via poort 443 toe te staan naar de volgende eindpunten:
requirements.list.hp_print_fleetproxy.hp-nf2=IP-whitelisting: Om IP-adressen te whitelisten, moet u het IP-adres van elke mogelijke cloudserver opnemen waarmee HP Fleet Proxy mogelijk moet communiceren.
