exp.ExcessiveOsStartupTime.option1=Optie 1: Windows 11 - Opstart-apps in Instellingen
exp.ExcessiveOsStartupTime.option1Guide=Om de prestaties van het apparaat te verbeteren en een lange inlogtijd te voorkomen, wordt u aangeraden applicaties uit te schakelen die automatisch worden opgestart tijdens het inloggen. Voor Windows 11-apparaten biedt Microsoft een handleiding voor het beheren van het opstartproces van Windows.
exp.ExcessiveOsStartupTime.option1GuideLink=https://www.microsoft.com/en-us/windows/learning-center/take-control-of-windows-startup
exp.ExcessiveOsStartupTime.option1GuideLinkText=https://www.microsoft.com/en-us/windows/learning-center/take-control-of-windows-startup
exp.ExcessiveOsStartupTime.option1StepApps=Selecteer Apps aan de linkerzijde van het venster.
exp.ExcessiveOsStartupTime.option1Steps=by changing the Windows startup programs using the following steps:
exp.ExcessiveOsStartupTime.option1StepSettings=Selecteer Instellingen.
exp.ExcessiveOsStartupTime.option1StepStart=Klik op de knop Start met het Microsoft-logo.
exp.ExcessiveOsStartupTime.option1StepStartup=Selecteer Opstarten onderaan in het venster Apps.
exp.ExcessiveOsStartupTime.option1StepToggles=Gebruik de schakelaars om te bepalen welke apps moeten worden uitgevoerd tijdens het opstarten. Zet de schakelaar op Aan als u wilt dat de app tijdens het opstarten wordt geopend. Zet de schakelaar op Uit als u niet wilt dat de app tijdens het opstarten wordt geopend.
exp.ExcessiveOsStartupTime.option2=Optie 2: Windows 11 - Opstart-apps in Taakbeheer
exp.ExcessiveOsStartupTime.option2Guide=Opstart-apps kunnen ook worden in- en uitgeschakeld via Windows Taakbeheer. Voer hiertoe de volgende stappen uit:
exp.ExcessiveOsStartupTime.option2StepDisable=Klik met de rechtermuisknop op een app en selecteer Uitschakelen (als de kolom Status de waarde Ingeschakeld bevat).
exp.ExcessiveOsStartupTime.option2StepStart=Klik op de knop Start met het Microsoft-logo.
exp.ExcessiveOsStartupTime.option2StepStartupApps=Selecteer ‘Opstart-apps’ in het linkernavigatievenster.
exp.ExcessiveOsStartupTime.option2StepTaskManager=Typ ‘Taakbeheer’ en druk op Enter om Windows Taakbeheer te openen.
exp.ExcessiveOsStartupTime.option3=Optie 3: Verwijder applicaties
exp.ExcessiveOsStartupTime.option3Guide=Ook applicaties die niet automatisch worden geopend bij het opstarten, kunnen de inlogtijd vertragen omdat ze bestanden, services en registerinvoer kunnen bevatten die mogelijk slechts gedeeltelijk worden geladen. Applicaties in het systeemvak zijn voorbeelden van programma’s die actief zijn zonder dat er een applicatievenster zichtbaar is. Voer de onderstaande stappen uit om overbodige applicaties te bekijken en te verwijderen. Opmerking: Sommige applicaties kunnen alleen worden verwijderd door een beheerder.
exp.ExcessiveOsStartupTime.option3StepControlPanel=Typ ‘Control’ en druk op Enter om het Configuratiescherm te openen.
exp.ExcessiveOsStartupTime.option3StepPrograms=Open Programma’s en onderdelen.
exp.ExcessiveOsStartupTime.option3StepStart=Klik op de knop Start met het Microsoft-logo.
exp.ExcessiveOsStartupTime.option3StepUninstall=Selecteer de applicatie die u wilt verwijderen en kies vervolgens Verwijderen.
exp.ExcessiveOsStartupTime.option4=Optie 4: Gebruik PowerShell en de module ActiveDirectory om Get-GpResultantSetofPolicy uit te voeren en het beleid te analyseren. U ziet hoe lang het duurt om mogelijke verbeteringen te identificeren voor de betrokken apparaten.
