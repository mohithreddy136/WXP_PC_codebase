exp.GpuHealthIssue.blueScreenLink=https://docs.microsoft.com/en-us/windows-hardware/drivers/debugger/-analyze
exp.GpuHealthIssue.blueScreenLinkText=https://docs.microsoft.com/en-us/windows-hardware/drivers/debugger/-analyze
exp.GpuHealthIssue.causeBlueScreenErrors=Fouten met een blauw scherm: Fouten met een blauw scherm kunnen het gevolg zijn van te veel grafisch intensieve programma's of visuele effecten die tegelijkertijd worden uitgevoerd, of van problemen met stuurprogramma's en hardware.
exp.GpuHealthIssue.causeDoubleBitEcc=ECC-geheugenfouten met dubbele bits: De grafische kaart heeft ECC-geheugenfouten met dubbele bits, wat kan wijzen op hardwareproblemen of fouten in het geheugen.
exp.GpuHealthIssue.causeHighDoubleBitEccOverTime=Hoog aantal ECC-geheugenfouten met dubbele bits in de loop der tijd: De videokaart heeft een groot aantal ECC-geheugenfouten met dubbele bits en het gemiddelde aantal fouten neemt al minstens 3 weken toe.
exp.GpuHealthIssue.causeHighTdrEvents=Groot aantal TDR-gebeurtenissen (time-out beeldschermstuurprogramma en herstel): De grafische kaart heeft een groot aantal TDR-gebeurtenissen ervaren, wat wijst op mogelijke problemen met het stuurprogramma of de hardware.
exp.GpuHealthIssue.causeMissingDriverUpdate=Ontbrekende kritieke driverupdate: Er ontbreekt een kritieke stuurprogramma-update voor de grafische kaart, wat van invloed kan zijn op de prestaties en stabiliteit.
exp.GpuHealthIssue.causeThermalIssues=Thermische problemen: De grafische kaart ervaart een groot aantal thermische problemen en de temperatuur van de GPU of het geheugen ligt boven de maximale bedrijfstemperatuur.
exp.GpuHealthIssue.driverOption1=Optie 1: Gebruik HP Image Assistant om stuurprogramma's bij te werken
exp.GpuHealthIssue.driverOption2=Optie 2: Gebruik Windows Update om stuurprogramma's bij te werken
exp.GpuHealthIssue.possibleCauses=Mogelijke oorzaken:
exp.GpuHealthIssue.remediationBlueScreenPrefix=Voor fouten met een blauw scherm: Kijk of er niet te veel grafisch intensieve programma's of visuele effecten op hetzelfde moment actief zijn. Werk het stuurprogramma van de grafische kaart bij, zet de overgeklokte instellingen terug naar de standaardwaarden, voer een schone installatie uit van het stuurprogramma of zet de instellingen terug naar de fabriekswaarden, zorg voor voldoende voeding en reinig de ventilatieopeningen en ventilator. Analyseer het minidumpbestand voor specifieke herstelstappen:
exp.GpuHealthIssue.remediationDoubleBitEcc=Voor ECC-geheugenfouten met dubbele bits: Blijf de situatie in de gaten houden en controleer of de prestaties blijven verslechteren. Als het aantal fouten hoog blijft, kunt u overwegen de grafische kaart te vervangen.
exp.GpuHealthIssue.remediationMissingDriver=Voor een ontbrekende stuurprogramma-update: Werk het stuurprogramma van de videokaart bij naar de laatste versie om problemen met de prestaties aan te pakken.
exp.GpuHealthIssue.remediationTdr=Voor TDR-gebeurtenissen: Hou het stuurprogramma van de videokaart in de gaten en werk dit bij als het probleem zich blijft voordoen. Zet de grafische instellingen terug naar de standaardwaarden, zet de overgeklokte instellingen terug naar de standaardwaarden, werk het BIOS bij als er een update beschikbaar is en controleer of er voldoende voeding en een goede luchtstroom is. Reinig de ventilatieopeningen en de ventilator.
exp.GpuHealthIssue.remediationThermal=Voor thermische problemen: Controleer of de luchtstroom wordt beperkt, reinig de ventilatieopeningen en zorg ervoor dat de ventilator goed werkt en schoon is.
exp.GpuHealthIssue.suggestedRemediations=Voorgestelde oplossingen:
exp.GpuHealthIssue.title=GPU-status aanpakken
