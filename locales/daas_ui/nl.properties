side_panal.smart_refresh.hardware_personas_header=Hardwarepersona's
side_panal.smart_refresh.hardware_personas_sub_text=Geïdentificeerd door AI-gestuurde apparaatclusters op basis van hardwaregebruik
side_panal.smart_refresh.help_sec1_description=De 3 stappen: Identificeren, categoriseren, aanbevelen
side_panal.smart_refresh.help_sec1_header=Zo werkt het
side_panal.smart_refresh.help_sec1_point_1_desc=Beoordeel elk apparaat op 9 gegevenspunten, samengevat in een Refresh Urgency Score*. Deze score helpt u om prioriteit te geven aan individuele apparaten met een risico om onderbrekingen in de productiviteit van gebruikers te voorkomen.
side_panal.smart_refresh.help_sec1_point_1_title=1. Identificeren
side_panal.smart_refresh.help_sec1_point_2_desc=Een AI-model groepeert apparaten in verschillende hardware- en softwarepersona's op basis van gebruik. Deze persona's kunnen u helpen om het juiste vervangende apparaat te vinden.
side_panal.smart_refresh.help_sec1_point_2_title=2. Categoriseer
side_panal.smart_refresh.help_sec1_point_3_desc1=Als u met een HP partner werkt, zal Smart Refresh vervangingen aanbevelen voor elk apparaat. Deze aanbevelingen zijn afkomstig van de best presterende modellen van de relevante persona die beschikbaar zijn in de geüploade catalogus van uw partner. Als u geen apparaataanbevelingen ziet of als de apparaten die u ziet verouderd zijn, kunt u contact opnemen met uw partner en vragen om de nieuwste catalogus te uploaden.
side_panal.smart_refresh.help_sec1_point_3_desc2=Als u niet met een HP Partner werkt, ziet u geen apparaataanbevelingen in Smart Refresh. Neem contact op met uw HP vertegenwoordiger voor de beste vervangende modellen.
side_panal.smart_refresh.help_sec1_point_3_desc3=Laatste uploaddatum catalogus:
side_panal.smart_refresh.help_sec1_point_3_title=3. Aanbevelen
side_panal.smart_refresh.help_sec1_point_4_desc=Gebruik de status vernieuwen 'Voltooid' om pc's te verwijderen die niet vernieuwd moeten worden of op dit moment niet vernieuwd kunnen worden. U kunt deze apparaten bekijken en hun status terugzetten naar 'Vereist actie' om deze weer in de pc-lijst te zien.
side_panal.smart_refresh.help_sec1_point_4_title=4. Statussen
side_panal.smart_refresh.help_sec2_description=Hoe we bepalen wanneer een apparaat moet worden vervangen
side_panal.smart_refresh.help_sec2_header=Urgentiescore vernieuwen
side_panal.smart_refresh.help_sec2_sub_text=Refresh Urgency Score wordt berekend op basis van de prestatiegegevens van een apparaat op 9 gebieden. De urgentie komt als volgt overeen met de numerieke score:
