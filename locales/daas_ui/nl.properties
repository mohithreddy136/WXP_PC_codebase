wex.ra.remediation.antivirus_not_enabled=Microsoft Defender Antivirus is antivirussoftware die bij Windows wordt geleverd en uw apparaat kan beschermen tegen virussen, malware en andere bedreigingen.
wex.ra.remediation.antivirus_signature_outdated=Voor een optimale bescherming moeten antivirusdefinitiebestanden up-to-date worden gehouden.
wex.ra.remediation.antivirus_signature_outdated_other=Om het apparaat tegen virussen, malware en andere bedreigingen te beschermen, is het apparaat geconfigureerd voor gebruik van een antivirus van een andere partij dan Microsoft. Er zijn echter updates van antivirushandtekeningen nodig op het apparaat.
wex.ra.remediation.app_crash=Meer dan 10 softwarefouten in de afgelopen 7 dagen in Teams, Outlook, Zoom, Webex, Chrome, Office.
wex.ra.remediation.avg_fan_speed_high=De gemiddelde ventilatorsnelheid is gedurende langere tijd hoog.
