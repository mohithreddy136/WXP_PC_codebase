wex.fleet.mgmt.recommended.windows_secure_boot_not_enabled=Windows veilig opstarten inschakelen
wex.fleet.mgmt.remediation.kernel_panic_error.desc=Er is een ‘kernel panic’ opgetreden. Dit wijst op een kritieke systeemfout waarvan de Linux-kernel niet kan herstellen. Mogelijke oorzaken zijn defecte hardware, beschadigde stuurprogramma’s, verkeerd geconfigureerde kernelparameters of incompatibele kernelmodules. Onmiddellijk onderzoek is vereist om de oorzaak te achterhalen.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt1=Controleer de systeemlogboeken (/var/log/messages, /var/log/syslog of journalctl) op foutberichten voorafgaand aan de kritieke systeemfout.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt2=Controleer de status van de hardware, het RAM-geheugen en de harde schijf met hulpprogramma’s zoals memtest86 en smartctl.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt3=Controleer recente systeemwijzigingen, zoals kernelupdates, geïnstalleerde stuurprogramma’s of configuratiewijzigingen.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt4=Start op in een herstelmodus om toegang te krijgen tot het systeem als dit niet opstart.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt5=Herstel of werk kernelmodules of stuurprogramma’s bij als deze mogelijk incompatibel zijn.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt6=Neem contact op met de leverancier of een helpdesk als het probleem aanhoudt of hardware-gerelateerd is.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.desc=Schakel schijfversleuteling in om gevoelige gegevens te beschermen. De informatie op de schijf is dan alleen toegankelijk na geldige verificatie. Dit is een essentiële beveiligingsmaatregel voor systemen die vertrouwelijke of gereguleerde gegevens verwerken.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step1=Implementeer volledige schijfversleuteling met hulpprogramma’s zoals LUKS (Linux Unified Key Setup) of dm-crypt, afhankelijk van uw Linux-distributie.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step2=Versleutel gevoelige partities (bijv. /home, /var of /data) als volledige schijfversleuteling niet haalbaar is.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step3=Configureer een veilige sleutelbeheeromgeving, inclusief wachtwoordzinnen of integratie met TPM (Trusted Platform Module), indien beschikbaar.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step4=Maak een veilige back-up van encryptiesleutels om gegevensverlies bij het kwijtraken van sleutels te voorkomen.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step5=Test de coderingsinstellingen om ervoor te zorgen dat het systeem correct opstart en de gegevens na verificatie toegankelijk zijn.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step6=Documenteer de encryptieconfiguratie en herstelprocedures voor naleving en bedrijfscontinuïteit.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step1=Installeer en configureer een firewallprogramma zoals firewalld, ufw of iptables, afhankelijk van uw Linux-distributie.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step2=Configureer de firewallservice zodat deze bij het opstarten automatisch wordt gestart.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step3=Definieer firewallregels om alleen noodzakelijke services zoals SSH en HTTP/HTTPS toe te staan en alle andere te blokkeren.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step4=Controleer de status en regels van de firewall met behulp van: sudo firewall-cmd --list-all (voor firewalld), sudo ufw status (voor ufw).
wex.fleet.mgmt.remediation.linux_firewall_disabled.step5=Controleer regelmatig de firewallconfiguraties om er zeker van te zijn dat ze voldoen aan het beveiligingsbeleid en de behoeften van uw bedrijf.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.desc=Schakel Secure Boot in om het systeem te beschermen tegen ongeautoriseerde of schadelijke code tijdens het opstartproces door de digitale handtekeningen van bootloaders, kernelmodules en stuurprogramma’s te verifiëren. Dit versterkt de systeemintegriteit en -beveiliging, met name in omgevingen waar naleving of bedrijfszekerheid centraal staat.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step1=Controleer of Secure Boot wordt ondersteund door de UEFI-firmware en zorg ervoor dat deze functie is ingeschakeld in de UEFI-instellingen.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step2=Installeer en configureer ondertekende bootloaders en kernelpakketten die compatibel zijn met Secure Boot (bijv. met behulp van shim en ondertekende GRUB).
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step3=Controleer of de kernel, modules en alle vereiste componenten zijn voorzien van een handtekening.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step4=Start opnieuw op en bevestig de status van Secure Boot met behulp van mokutil.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step5=Registreer aangepaste sleutels als u niet-standaardcomponenten gebruikt.
wex.fleet.mgmt.remediation.missing_linux_security_updates.desc=Eén of meerdere kritieke beveiligingsupdates ontbreken in het systeem. Deze updates verhelpen bekende kwetsbaarheden in het besturingssysteem, de kernel en de geïnstalleerde pakketten. Als deze updates niet worden toegepast, kan dit leiden tot ongeautoriseerde toegang tot het systeem, gegevenslekken of onderbrekingen van services.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step1=Controleer en identificeer ontbrekende beveiligingspatches met behulp van de pakketbeheerder van het systeem (bijv. apt, yum, dnf of zypper).
wex.fleet.mgmt.remediation.missing_linux_security_updates.step2=Installeer direct alle kritieke beveiligingsupdates om bekende bedreigingen en kwetsbaarheden te beperken.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step3=Start het systeem opnieuw op wanneer dat is vereist, met name na kernelupdates of belangrijke service-updates.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step4=Schakel automatische beveiligingsupdates in of stel een regelmatig updateschema in om de beveiliging up-to-date te houden.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step5=Controleer of de update is voltooid door de logboeken te raadplegen en de pakketversies te bevestigen.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step6=Voer na de update een kwetsbaarheidsscan uit om te verzekeren dat er geen resterende risico’s zijn.
wex.fleet.mgmt.remediation.missing_linux_updates.desc=Eén of meerdere kritieke Linux-updates ontbreken in het systeem. Deze updates bevatten mogelijk beveiligingspatches, kernelreparaties en stabiliteitsverbeteringen. Het gebruik van een verouderd systeem vergroot de kans op kwetsbaarheden, systeemcrashes en compatibiliteitsproblemen.
wex.fleet.mgmt.remediation.missing_linux_updates.step1=Controleer beschikbare updates via uw pakketbeheerder (bijv. yum, dnf, apt of zypper) om ontbrekende kritieke patches te identificeren.
wex.fleet.mgmt.remediation.missing_linux_updates.step2=Installeer alle beveiligings- en kernelupdates zo snel mogelijk om bekende beveiligingslekken te verhelpen.
wex.fleet.mgmt.remediation.missing_linux_updates.step3=Start het systeem opnieuw op wanneer dat is vereist, met name na kernelupdates of belangrijke systeemupdates.
wex.fleet.mgmt.remediation.missing_linux_updates.step4=Schakel automatische updates in of stel een regelmatig updateschema in om toekomstige updates tijdig toe te passen.
wex.fleet.mgmt.remediation.missing_linux_updates.step5=Controleer of de updates succesvol zijn toegepast door de systeemlogboeken te bekijken en de actuele kernel- en pakketversies te bevestigen.
wex.fleet.mgmt.remediation.network_connection_not_secure.desc=In de afgelopen 24 uur is een onbeveiligde netwerkverbinding gedetecteerd.
wex.fleet.mgmt.remediation.network_connection_not_secure.desc1=In de afgelopen 7 dagen is een niet-geautoriseerde verbinding gedetecteerd.
wex.fleet.mgmt.remediation.network_disconnections.desc=In de afgelopen 24 uur hebben apparaten verschillende netwerkstoringen gemeld.
wex.fleet.mgmt.remediation.network_disconnections.desc1=De afgelopen 7 dagen zijn er verbroken netwerkverbindingen gedetecteerd.
wex.fleet.mgmt.remediation.network_speed_slow.desc=In de afgelopen 24 uur is een trage nominale netwerksnelheid gemeld.
wex.fleet.mgmt.remediation.wifi_signal_strength_weak.desc=De Wi-Fi-signaalsterkte is de afgelopen 24 uur gemeld als zwak.
wex.fleet.mgmt.score.no.data=Geen gegevens
wex.fleet.mgmt.score.overall_exp=Totale ervaring
wex.fleet.mgmt.score.tooltip=Ervaring is gebaseerd op de laagste ervaring van alle scores.
wex.fleet.mgmt.troubleshoot.linux_firewall_disabled.description=Door een firewall in te schakelen voor het beheren van inkomende en uitgaande verbindingen, wordt het systeem beschermd tegen ongeautoriseerde toegang, netwerkgerichte aanvallen en ongewenst verkeer. Dit is een essentiële stap in het beveiligen van Linux-systemen, met name systemen die verbonden zijn met openbare of bedrijfsnetwerken.
