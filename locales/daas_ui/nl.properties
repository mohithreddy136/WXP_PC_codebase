wex.fleet.mgmt.recommended.desc.antivirus_not_enabled=Het inschakelen van Microsoft Defender biedt essentiële bescherming tegen malware en andere beveiligingsbedreigingen.
wex.fleet.mgmt.recommended.desc.antivirus_not_enabled_other=Het inschakelen van antivirussoftware beschermt apparaten tegen malware en beveiligt uw systeem tegen aanvallen.
wex.fleet.mgmt.recommended.desc.antivirus_signature_outdated=Als u malwarehandtekeningen regelmatig bijwerkt, kan Windows Defender de nieuwste bedreigingen detecteren en er bescherming tegen bieden.
wex.fleet.mgmt.recommended.desc.antivirus_signature_outdated_other=Het actueel houden van malwarehandtekeningen zorgt voor uitgebreide bescherming tegen de nieuwste bedreigingen.
wex.fleet.mgmt.recommended.desc.avg_fan_speed_high=Het aanpakken van hoge ventilatorsnelheden helpt oververhitting en mogelijke schade aan interne onderdelen van uw apparaat voorkomen.
wex.fleet.mgmt.recommended.desc.battery_calibrate=Het kalibreren van de batterij verbetert de nauwkeurigheid van de stroomaflezing en verbetert de levensduur en prestaties van de batterij.
wex.fleet.mgmt.recommended.desc.battery_early_detection_wear=Het aanpakken van batterijslijtage zorgt voor een efficiënte werking van het apparaat, consistente prestaties en een langere levensduur van de batterij.
wex.fleet.mgmt.recommended.desc.battery_needs_attention=Replacement of defective batteries can ensure good device performance, and system health. Devices which are covered by warranty may be eligible for battery replacement.
wex.fleet.mgmt.recommended.desc.bitlocker_encryption_not_enabled=Het inschakelen van BitLocker beschermt gevoelige gegevens door uw schijf te versleutelen, wat de algehele beveiliging tegen onbevoegde toegang verbetert.
wex.fleet.mgmt.recommended.desc.bsod_occured=Het oplossen van fouten met een blauw scherm zorgt voor systeemstabiliteit, voorkomt onverwacht uitschakelen en houdt de betrouwbaarheid in stand.
wex.fleet.mgmt.recommended.desc.cpu_utilization_high=Het analyseren van een hoog CPU-gebruik helpt prestatieproblemen voorkomen en zorgt ervoor dat het systeem soepel blijft werken.
wex.fleet.mgmt.recommended.desc.disk_needs_attention=Disk performance is degrading and may soon lead to slower performance or instability if not addressed.
wex.fleet.mgmt.recommended.desc.disk_utilization_high=Als u schijfruimte vrijmaakt, voorkomt u systeemvertragingen en zorgt u voor een soepele werking door overbelasting van de opslagruimte te voorkomen.
wex.fleet.mgmt.recommended.desc.docking_station_ac_adapter_failed=Het verhelpen van adapterstoringen zorgt voor een consistente stroomvoorziening naar dockingstations, wat connectiviteitsproblemen voorkomt.
wex.fleet.mgmt.recommended.desc.docking_station_ac_adapter_running_at_reduced_perofmance=Het verbeteren van adapterprestaties zorgt voor betrouwbare verbindingen en een optimale functionaliteit van docking stations.
wex.fleet.mgmt.recommended.desc.docking_station_firmware_out_of_date=Firmware-updates voor dockingstations zorgen voor apparaatcompatibiliteit en verbeteren algehele systeemprestaties.
wex.fleet.mgmt.recommended.desc.excessive_os_login_time=Het verkorten van aanmeldingstijden reduceert vertragingen en verbetert de efficiëntie voor de gebruiker tijdens systeemtoegang.
wex.fleet.mgmt.recommended.desc.excessive_os_shutdown_time=Het optimaliseren van afsluittijden minimaliseert wachttijden en zorgt ervoor dat het systeem efficiënt wordt uitgeschakeld.
wex.fleet.mgmt.recommended.desc.excessive_os_startup_time=Een snellere opstarttijd versnelt de toegang tot het systeem en verbetert de efficiëntie en productiviteit van de gebruiker.
wex.fleet.mgmt.recommended.desc.firewall_disabled=Door Windows Firewall in te schakelen kunt u onbevoegde toegang blokkeren en uw netwerk beschermen tegen mogelijke bedreigingen.
wex.fleet.mgmt.recommended.desc.firewall_signature_outdated=Het regelmatig bijwerken van firewallhandtekeningen biedt bescherming tegen nieuwe en zich ontwikkelende netwerkbedreigingen.
wex.fleet.mgmt.recommended.desc.frequent_bsod_occured=Het oplossen van fouten met een blauw scherm zorgt voor systeemstabiliteit, voorkomt onverwacht uitschakelen en houdt de betrouwbaarheid in stand.
wex.fleet.mgmt.recommended.desc.frequent_kernel_panic_error=Het oplossen van Kernel Panic-fouten verbetert de stabiliteit en beveiliging van het systeem en voorkomt gegevensverlies.
wex.fleet.mgmt.recommended.desc.frequent_network_disconnection=Zonder netwerkonderbrekingen worden de betrouwbaarheid, gebruikerservaring en een ononderbroken toegang tot diensten en applicaties verbeterd.
wex.fleet.mgmt.recommended.desc.gpu_health_issue=GPU-problemen oplossen voorkomt grafische prestatieproblemen en zorgt voor een soepele werking van visuele applicaties.
wex.fleet.mgmt.recommended.desc.high_collaboration_sw_errors=Het oplossen van problemen met samenwerkingssoftware zorgt voor naadloos teamwerk en een duurzame productiviteit. We hebben meer dan 10 softwarefouten gezien in de afgelopen 7 dagen in Teams, Outlook, Zoom, Webex, Chrome, Office.
wex.fleet.mgmt.recommended.desc.high_windows_crash=Het oplossen van een vastlopend besturingssysteem zorgt voor systeemstabiliteit, consistente prestaties en een ononderbroken productiviteit van de gebruiker.
wex.fleet.mgmt.recommended.desc.kernel_panic_error=Het oplossen van Kernel Panic-fouten verbetert de stabiliteit en beveiliging van het systeem en voorkomt gegevensverlies.
wex.fleet.mgmt.recommended.desc.last_reboot_more_than_21_days=Door apparaten opnieuw op te starten worden tijdelijke bestanden gewist en systeemprocessen vernieuwd, wat de algehele prestaties en stabiliteit verbetert.
wex.fleet.mgmt.recommended.desc.linux_disk_encryption_not_enabled=Het inschakelen van schijfcodering verhoogt de gegevensbeveiliging aanzienlijk en beschermt de inhoud van uw opslagapparaten.
wex.fleet.mgmt.recommended.desc.linux_firewall_disabled=Door Linux Firewall in te schakelen, kunt u ongeautoriseerde toegang blokkeren en uw netwerk beschermen tegen mogelijke bedreigingen.
wex.fleet.mgmt.recommended.desc.linux_secure_boot_not_enabled=Wanneer u Beveiligd opstarten inschakelt, wordt tijdens het opstartproces alleen vertrouwde software geladen. Dit versterkt de algehele systeembeveiliging.
wex.fleet.mgmt.recommended.desc.memory_utilization_high=Door een hoog geheugengebruik te analyseren, kunt u problemen identificeren en oplossen die van invloed kunnen zijn op de prestaties en stabiliteit van het systeem.
wex.fleet.mgmt.recommended.desc.missing_critical_bios_updates=Het toepassen van BIOS-updates zorgt voor stabiliteit en compatibiliteit van het systeem met nieuwe hardware of software.
wex.fleet.mgmt.recommended.desc.missing_critical_driver_updates=Het bijwerken van stuurprogramma's voorkomt hardwarestoringen en zorgt voor een veilig, stabiel en goed presterend systeem.
wex.fleet.mgmt.recommended.desc.missing_linux_security_updates=Beveiligingsupdates bieden bescherming tegen malware en kwetsbaarheden, verkleinen het aanvalsoppervlak en verbeteren de integriteit van het systeem.
wex.fleet.mgmt.recommended.desc.missing_linux_updates=Installeer de nieuwste updates om kwetsbaarheden in de kernel, systeembibliotheken en applicaties op te lossen. Zo beschermt u uw systeem tegen aanvallen, malware en ongeautoriseerde toegang.
wex.fleet.mgmt.recommended.desc.missing_windows_security_updates=Het installeren van beveiligingsupdates beschermt tegen de nieuwste bedreigingen en kwetsbaarheden, wat uw systeem veilig houdt voor aanvallen.
wex.fleet.mgmt.recommended.desc.missing_windows_updates=Het installeren van de nieuwste updates lost kwetsbaarheden op en zorgt ervoor dat uw systeem veilig en functioneel blijft.
wex.fleet.mgmt.recommended.desc.poor_network_signal_strength=Een sterk signaal zorgt voor een stabiele en betrouwbare verbinding, wat onderbrekingen en uitval tijdens online activiteiten minimaliseert.
wex.fleet.mgmt.recommended.desc.poor_nominal_speed=Betrouwbare en snelle internetsnelheden zijn cruciaal om taken efficiënt uit te voeren, toegang te krijgen tot cloudservices en zonder onderbrekingen samen te werken met collega's.
wex.fleet.mgmt.recommended.desc.unauthenticated_connection=Door middel van verificatie kunnen organisaties voorkomen dat kwaadwillende apparaten verbinding maken met het netwerk. Zo neemt het risico op mogelijke beveiligingsinbreuken af.
wex.fleet.mgmt.recommended.desc.windows_secure_boot_not_enabled=Het inschakelen van Veilig opstarten voorkomt onbevoegde wijzigingen aan de firmware en het besturingssysteem, wat de systeembeveiliging verbetert.
