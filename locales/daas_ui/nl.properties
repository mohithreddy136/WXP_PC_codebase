wex.labs.remediation.ai.description=Herstel met AI leidt u naar de meest effectieve oplossing. Opties worden op slimme wijze beperkt zodat uw team problemen efficiënt en consistent kunt oplossen.
wex.labs.remediation.ai.description.disclaimer=You are about to interact with an AI solution. Content generated by AI might contain inaccuracies and should be verified against the details provided. Please note that AI-generated responses might be incomplete or incorrect, and HP assumes no responsibility for actions taken based on this content.
wex.labs.remediation.ai.details.analyzesAvailableRemediations.desc=Het algoritme scant bestaande herstelmaatregelen in het platform, zoals scripts, beleidsregels en acties/updates voor apparaten, om zo de meest relevante oplossing aan te bevelen.<br/><br/>Er wordt gekeken naar historisch gebruik en succespercentages om te bepalen hoe dit type probleem doorgaans wordt opgelost binnen uw organisatie. Gebruikers zijn minder tijd kwijt aan het bepalen van de juiste aanpak en kunnen alles overlaten aan AI.
wex.labs.remediation.ai.details.analyzesAvailableRemediations.title=Analyseert beschikbare hersteloplossingen
wex.labs.remediation.ai.details.applyOrReview.desc=Afhankelijk van het herstel kan beheer voor het volgende kiezen: <br/><div class=remediation-ai-ui><ul><li>Onmiddellijk toepassen op geselecteerde apparaten</li><li>Plannen voor later om storingen te minimaliseren</li><li>Details bekijken voordat u de actie bevestigt</li></ul></div><br/>Na toepassing worden de activiteit en resultaten gevolgd voor transparantie en voortdurend leren.
wex.labs.remediation.ai.details.applyOrReview.title=Toepassen, plannen of bekijken
wex.labs.remediation.ai.details.continuousLearning.desc=Na verloop van tijd worden aanbevelingen nauwkeuriger en betrouwbaarder.
wex.labs.remediation.ai.details.continuousLearning.title=Voortdurend leren
wex.labs.remediation.ai.details.howItWorks.title=Zo werkt het
wex.labs.remediation.ai.details.issueToRemediation.desc=Wanneer een probleem een bepaalde drempel overschrijdt, wordt het weergegeven op uw dashboard met een duidelijke beschrijving van wat er gebeurt en welke impact dit kan hebben op uw apparaten. Het WXP-platform kan nu direct worden hersteld en de AI-herstelfunctie bepaalt de beste oplossing voor het probleem.
wex.labs.remediation.ai.details.issueToRemediation.title=Van probleem naar herstel
wex.labs.remediation.ai.details.learnsandImproves.desc=Het algoritme leert voortdurend en optimaliseert wat het beste werkt voor uw organisatie.<br/>Bij elke herstelbewerking leert het systeem het volgende:<div class=remediation-ai-ui><ul><li>Hoe effectief de herstelbewerking was</li><li>Hoe lang het duurde om het probleem op te lossen</li><li>Of vergelijkbare problemen zijn opgetreden</li></ul></div><br/>Door deze feedback worden toekomstige aanbevelingen steeds preciezer en zijn ze beter afgestemd op uw omgeving.
wex.labs.remediation.ai.details.learnsandImproves.title=Leert en verbetert continu
wex.labs.remediation.ai.details.overview.desc=Met de AI-herstelfunctie kunnen IT-beheerders sneller schakelen van probleemdetectie naar probleemoplossing. De gegevens van al uw bedrijfsapparaten worden geanalyseerd en het meest effectieve beleid of script of de beste apparaatupdate wordt aanbevolen om het probleem op te lossen. Het algoritme gebruikt patronen uit eerdere herstelbewerkingen in uw omgeving en adviseert de oplossing die de grootste kans van slagen heeft.
wex.labs.remediation.ai.details.recommendBestFix.desc=Elke aanbeveling bevat het volgende: <br/><div class=remediation-ai-ui><ul><li>Type actie: Script, beleid of update</li><li>Waarom dit relevant is: Herstel en automatisering lossen problemen in realtime op, verhogen de productiviteit van werknemers, verbeteren de digitale ervaring en besparen tijd terwijl risico’s worden verminderd.</li></ul></div>
wex.labs.remediation.ai.details.recommendBestFix.title=Beveelt de beste oplossing aan
