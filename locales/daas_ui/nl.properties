sustainability.dashboard.info_message=Gegevens over het stroomverbruik worden op twee manieren verzameld: PCM (Power Consumption Measurement) via een geïntegreerde chip en geschat verbruik op basis van een recente BIOS-update voor nieuwere HP pc's. De nauwkeurigheid van de gegevens hangt af van de methode die door de betreffende pc wordt ondersteund.
sustainability.dashboard.info_message_data=Deze methode berekent het totale energieverbruik in kilowattuur (kWh) voor elk apparaat, ongeacht de status (actief, slaapstand, uitgeschakeld). Door alle vastgelegde gegevens aan het einde van elke week te verwerken, geeft deze methode een volledig beeld van het energieverbruik van het apparaat. Daarnaast wordt het totale energieverbruik voor de huidige week in real time tot op het huidige moment berekend en weergegeven.
