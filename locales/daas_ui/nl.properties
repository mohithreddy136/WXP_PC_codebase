wex.ra.remediation.battery_early_detection_wear=Binnen 30 dagen zal de batterij naar verwachting minder dan 70% van de maximale oplaadcapaciteit over hebben.
wex.ra.remediation.battery_needs_attention=Workforce Experience Platform displays records of battery warnings and failures that can be used to obtain service for a battery that is experiencing issues
wex.ra.remediation.bitlocker_encryption_not_enabled=Om gegevens in rust te beschermen, wordt schijfversleuteling sterk aanbevolen.
wex.ra.remediation.bsod=Er waren de afgelopen 7 dagen meer dan 3 foutcontroles (BSOD-gebeurtenissen).
wex.ra.remediation.bsod_occured=Het apparaat heeft de afgelopen 7 dagen 1 of meer foutcontroles ondergaan.
wex.ra.remediation.cpu_utilization_high=Mogelijke oorzaken: Een actieve toepassing blijft hangen / reageert niet.
wex.ra.remediation.disk_needs_attention=Workforce Experience Platform geeft records weer van Schijfwaarschuwingen en -storingen die kunnen worden gebruikt voor onderhoud van een schijf die problemen ondervindt.
wex.ra.remediation.disk_utilization_high=Hard disk is near full disk capacity and low in free space.
wex.ra.remediation.docking_station_ac_adapter_failed=The Docking Station AC Adapter is having a hardware issue.
wex.ra.remediation.docking_station_ac_adapter_running_at_reduced_perofmance=De netvoedingsadapter van het dockingstation werkt niet naar behoren.
wex.ra.remediation.docking_station_firmware_out_of_date=Possible Causes: The docking station may require a Firmware or Driver update.
wex.ra.remediation.excessive_os_shutdown_time=Het uitschakelen duurt 3 minuten of langer.
wex.ra.remediation.excessive_os_startup_time=Het opstarten van het systeem duurt meer dan 3 minuten.
wex.ra.remediation.firewall_disabled=Firewall voorkomt dat hackers en kwaadaardige software toegang krijgen tot uw pc via internet of een netwerk.
wex.ra.remediation.firewall_signature_outdated=Firewall moet regelmatig worden bijgewerkt om optimale bescherming tegen netwerkaanvallen te garanderen.
wex.ra.remediation.frequent_bsod_occured=Er waren de afgelopen 7 dagen meer dan 3 foutcontroles (BSOD-gebeurtenissen).
wex.ra.remediation.frequent_network_disconnection=Zorg er voor thuisnetwerken voor dat de firmware van uw router up-to-date is en plaats de router op een centrale locatie om storing te minimaliseren. Verminder daarnaast het aantal aangesloten apparaten en overweeg voor kritieke apparaten een bekabelde verbinding te gebruiken voor een stabiel en betrouwbaar netwerk.
wex.ra.remediation.gpu_health_issue=Workforce Experience Platform heeft een probleem met de GPU gedetecteerd dat onmiddellijke aandacht vereist.
wex.ra.remediation.high_collaboration_sw_errors=Meer dan 10 softwarefouten in de afgelopen 7 dagen in Teams, Outlook, Zoom, Webex, Chrome, Office.
wex.ra.remediation.high_windows_crash=Het besturingssysteem is de afgelopen 7 dagen 1 keer of vaker onverwacht vastgelopen of opnieuw opgestart.
wex.ra.remediation.last_reboot_more_than_21_days=De laatste herstart was meer dan 21 dagen geleden.
wex.ra.remediation.maximise_my_battery_health_not_enabled=HP Battery Health Manager is available on all HP business notebooks since 2016. To improve battery life, it is recommended that Battery Health Manager be enabled
wex.ra.remediation.memory_utilization_high=The average Memory utilization over the last 30 days is 85% or greater.
wex.ra.remediation.missing_critical_bios_updates=Selecteer de apparaten hieronder en selecteer "Beleid toepassen" om het BIOS voor compatibele apparaten via het platform bij te werken. Werk voor incompatibele apparaten systeemdrivers en firmware bij met Windows Update of HP Image Assistant.
wex.ra.remediation.missing_critical_driver_updates=Het rapport Stuurprogramma-inventaris bevat een gedetailleerde inventaris van apparaten waarvoor updates van kritieke stuurprogramma's ontbreken.
wex.ra.remediation.missing_windows_security_updates=Het beveiligingsdashboard van het Workforce Experience Platform bevat KPI's die het aantal apparaten met ontbrekende Windows-beveiligingsupdates weergeeft.
wex.ra.remediation.os_crash=Het besturingssysteem is de afgelopen 7 dagen 1 keer of vaker onverwacht vastgelopen of opnieuw opgestart.
wex.ra.remediation.poor_network_signal_strength=Voor thuisnetwerken kan het opnieuw opstarten van uw router of het verplaatsen van de router om het aantal obstakels tussen het toegangspunt en de pc te verminderen helpen om de sterkte van het Wi-Fi-signaal te verbeteren.
wex.ra.remediation.poor_nominal_speed=Overweeg voor thuisnetwerken om uw router te upgraden naar een nieuwer model dat de nieuwste Wi-Fi-normen ondersteunt, zoals Wi-Fi 6. Optimaliseer daarnaast uw netwerkindeling door de router op een centrale locatie te plaatsen, storing van andere apparaten te verminderen en waar mogelijk bekabelde verbindingen te gebruiken voor stabielere prestaties.
wex.ra.remediation.unauthenticated_connection=Selecteer voor thuisnetwerken een robuust versleutelingsprotocol, zoals WPA2 of WPA3, en stel een sterk, uniek wachtwoord in voor toegang. Overweeg daarnaast om MAC-adresfiltering te implementeren en de firmware van uw router regelmatig bij te werken om de beveiliging te verbeteren en ongeautoriseerde verbindingen te voorkomen.
wex.ra.remediation.windows_secure_boot_not_enabled=Veilig opstarten is een veiligheidsnorm die is ontwikkeld door leden van de pc-branche en zorgt ervoor dat een apparaat alleen wordt opgestart met software die vertrouwd wordt door de Original Equipment Manufacturer (OEM).
