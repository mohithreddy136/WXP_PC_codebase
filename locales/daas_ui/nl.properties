exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation6.step1=Storing op het kanaal kan de doorvoer aanzienlijk verminderen en de gegevensoverdracht vertragen. Probeer eventuele storing dus te voorkomen.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation7=Controleer andere apparaten
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation7.step1=Bekijk welke andere apparaten verbonden zijn met uw netwerk en wat deze doen. Als een ander apparaat bijvoorbeeld veel gegevens downloadt, kan dat invloed hebben op uw snelheid.
