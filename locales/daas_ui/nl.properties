azureonboard.marketing.disclaimer.content=De informatie in dit document kan zonder voorafgaande kennisgeving worden gewijzigd. De van toepassing zijnde garanties voor producten en diensten van HP zijn vastgelegd in de uitdrukkelijke garantiebepalingen die bij dergelijke producten en diensten worden meegeleverd. Niets in dit document mag als een aanvullende garantie worden opgevat. HP is niet aansprakelijk voor technische fouten, drukfouten of weglatingen in dit document.
azureonboard.marketing.disclaimer.contentlist1=HP Proactive Insights en/of inbegrepen onderdelen kunnen variëren per regio, besturingssysteem of geautoriseerde HP servicepartner. Neem contact op met uw lokale HP vertegenwoordiger of geautoriseerde partner voor specifieke informatie omtrent uw locatie. Voor HP services gelden de van toepassing zijnde HP servicevoorwaarden, die bij aankoop aan de klant worden verstrekt of getoond. Mogelijk heeft de klant volgens de geldende lokale wetgeving nog andere rechten. De HP servicevoorwaarden en de HP garantie op uw HP product maken geen inbreuk op deze wettelijk vastgelegde rechten.
azureonboard.marketing.disclaimer.contentlist2=HP {appName} is een telemetrie- en analyseplatform dat essentiële gegevens levert over apparaten en applicaties en dat niet afzonderlijk wordt verkocht. HP {appName} volgt de strikte AVG-regelgeving inzake privacy en is gecertificeerd voor ISO27001, ISO27701, ISO27017 en SOC2 Type2 voor Informatiebeveiliging. Internettoegang met verbinding met {appName} is vereist. Ga voor de volledige systeemvereisten naar <a target='_blank' href={link}>{text}</a>.
azureonboard.marketing.disclaimer.contentlist3=BIOS-updates zijn alleen beschikbaar op HP apparaten.
azureonboard.marketing.disclaimer.contentlist4=Ga voor informatie over OS-dekking naar <a target='_blank' href={link}>{text}</a>.
azureonboard.marketing.employeesection.description=Verzamel, meet en beheer de digitale ervaring van uw werknemers via een correlatie van onderzoeken naar hardware-, applicatie- en werknemerservaringen op al uw apparaten.
azureonboard.marketing.employeesection.heading=Proactive Employee Insight
azureonboard.marketing.hardwaresection.description=Bewaak proactief de harde schijven van het apparaat, het CPU-gebruik, de thermische niveaus en de accustatus, zodat u potentiële gevolgen kunt voorspellen door uw gegevens te analyseren op basis van een data lake van meer dan 20 miljoen apparaten.
azureonboard.marketing.hardwaresection.heading=Proactive Hardware Insight
azureonboard.marketing.insightsection.description=Stel prestatieproblemen, softwarefouten, vastlopen met een blauw scherm en systeemgebruik vast terwijl u stuurprogramma's en patches bijwerkt om ervoor te zorgen dat u veilige beveiligingsprofielen hebt.
azureonboard.marketing.insightsection.heading=Proactive Application Insight
