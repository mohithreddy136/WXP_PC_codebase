banner.iot.update.description=Op maandag 27 februari 2023 wordt er een wijziging in de infrastructuur van het TechPulse-platform doorgevoerd. Mogelijk moet u proxy-, firewall- en SSL-inspectiesoftware-instellingen bijwerken. Voer de netwerkbeoordelingstool uit op <a href='https://www.hpdaas.com/software' target='_blank'>HP TechPulse - Software (hpdaas.com)</a> en controleer of een van de vier (4) *.IoT-testdoelen een bericht 'Mislukt' teruggeeft. Als de test resulteert in een storing, volg dan de instructies hier '<b><a href='https://hp.service-now.com/techpulse_kb?id=kb_article&sysparm_article=KB0011291' target='_blank'>KB0011291</a> - Een proxy of firewall configureren'</b> en <b>en breng deze wijzigingen aan voor donderdag 23 februari 2023</b>.
