requirements.list.proSecurity.windows.supportLifecycle.content1=Het HP Service Level Objective is om ondersteuning te bieden voor de 3 meest actuele Windows 10 halfjaarlijkse Channel-versies.
requirements.list.proSecurity.windows.supportLifecycle.content2=Het doel van HP is om ondersteuning voor de nieuwe OS-versie voor het detecteren van bedreigingen door Wolf Pro Security binnen 30 dagen na beschikbaarheid te bieden aan het Semi-Annual Channel (\"SAC\"). Tussentijdse of pre-release Windows Insider-builds worden niet ondersteund. Raadpleeg voor meer informatie over Windows OS-versies <a href='https://docs.microsoft.com/en-us/windows/release-information/' target='_blank'>https://docs.microsoft.com/en-us/windows/release-information/</a>.
requirements.list.proSecurity.windows.supportLifecycle.content3=Om ervoor te zorgen dat klanten met oudere Windows-versies voldoende tijd hebben om te upgraden naar een nieuwere versie, zal HP de 4e meest actuele versie (momenteel Windows 10 v1903) ten minste 90 dagen lang blijven ondersteunen nadat de ondersteuning voor de nieuwste halfjaarlijkse Channel-versie beschikbaar is in Wolf Pro Security. Na deze periode wordt de ondersteuning voor de oudere versie van het besturingssysteem beëindigd. Hetzelfde ondersteuningsbeleid is van toepassing op Channel-versies van Windows 10 met een langdurige service. Het is dus ook noodzakelijk dat deze systemen worden bijgewerkt overeenkomstig het hierboven vermelde beleid.
requirements.list.proSecurity.windows.supportLifecycle.content4=Ondersteuning voor Sure Click Pro voor Windows 10 v2004 is uitgebracht op 31 juli 2020. Ondersteuning voor Windows 10 v1809 wordt met ingang van 31 oktober 2020 ingetrokken.
requirements.list.proSecurity.windows.supportLifecycle.content5=Windows 7 en 8.1 worden niet ondersteund door HP Proactive Security
requirements.list.proSecurity.windows.supportLifecycle.content6=Ondersteuning voor Sure Click Pro voor Windows 10 v20H2 is uitgebracht op woensdag 18 november 2020. Ondersteuning voor Windows 10 v1903 is met ingang van dinsdag 16 februari 2021 beëindigd.
requirements.list.proSecurity.windows.supportLifecycle.content7=HP heeft op 5 juli 2021 Sure Click Pro-ondersteuning voor het beheersen van bedreigingen uitgebracht voor Windows 10 v21H1. Ondersteuning voor Windows 10 v1909 wordt met ingang van 3 oktober 2021 ingetrokken.
