poly.lens.actions=Acties
poly.lens.addon.details.description=Zorg voor betrouwbaar en transparant beheer van uw HP samenwerkingsapparatuur in de hele organisatie. Van gestroomlijnde implementatie en efficiënt onderhoud tot proactieve bewaking en waardevolle inzichten, IT-teams hebben volledige controle over alle apparaten, vergaderruimtes en andere ruimtes. Dankzij veilig beheer in de cloud en perfecte ondersteuning van hybride werknemers kunt u de operationele druk verminderen, problemen tijdig signaleren en overal een consistente, betrouwbare ervaring bieden, waar uw teams ook werken.
poly.lens.addon.feature.centralized.header=Centraal en persoonlijk apparaatbeheer
poly.lens.addon.feature.centralized.text=Kies voor HP Poly Studio-apps en bied eindgebruikers een probleemloze selfservice-ervaring terwijl IT-teams centraal overzicht en controle behouden over persoonlijke apparaten. Houd grip op uw inventaris, updates, controles en inzichten, waar uw teams ook werken.
poly.lens.addon.feature.effortless.maintenance.header=Efficiënt onderhoud
poly.lens.addon.feature.effortless.maintenance.text=Beheer snel en efficiënt instellingen, functies en updates voor alle apparaten in uw bedrijf. Pas instellingen toe, bereid updates voor en optimaliseer configuraties op schaal zonder in te leveren op controle of precisie.
poly.lens.addon.feature.meaningful.measurement.header=Betekenisvolle gegevens
poly.lens.addon.feature.meaningful.measurement.text=Krijg inzicht in de prestaties van apparaten, ruimtes en mensen. Gebruik gebruiks- en prestatiegegevens om slimmere, datagestuurde investeringsbeslissingen te nemen.
poly.lens.addon.feature.proactive.monitoring.header=Proactieve controle
poly.lens.addon.feature.proactive.monitoring.text=Voorkom problemen met duidelijk inzicht in de status van apparaten. Ontvang een waarschuwing als er iets niet klopt zodat problemen kunnen worden opgelost voordat ze vergaderingen verstoren.
poly.lens.addon.feature.secure.header=Veilig beheer in de cloud
poly.lens.addon.feature.secure.text=Beheer alles via een vertrouwd, cloudgebaseerd platform dat meegroeit met uw organisatie en voldoet aan de hoogste beveiligings- en nalevingseisen.
poly.lens.addon.feature.simplified.deployment.header=Vereenvoudigde implementatie
poly.lens.addon.feature.simplified.deployment.text=Bereid apparaten voor, configureer ze vooraf en implementeer ze met volledige zekerheid. Geautomatiseerde onboarding-workflows verkorten de installatietijd, voorkomen fouten en zorgen ervoor dat apparaten volledig klaar zijn voordat ze worden gebruikt.
poly.lens.addon.subtitle=Cloudbeheer en inzichten in al uw apparaten, vergaderruimtes en andere ruimtes.
