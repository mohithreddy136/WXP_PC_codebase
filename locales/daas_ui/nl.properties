exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step3=Verplaats het toegangspunt zo mogelijk naar het midden van uw huis of kamer en als het kan ook hoger. Als u het in een hoek of onder een bureau plaatst, kan de sterkte van uw Wi-Fi-signaal afnemen.
