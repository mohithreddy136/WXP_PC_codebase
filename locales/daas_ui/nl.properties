bios.bsod.tooltip.context=Deze impact van BIOS wordt bepaald aan de hand van de weging, waarbij BSOD's die dichter bij de upgrade voorkomen in andere apparaten van hetzelfde model een hogere weging hebben. Daarnaast worden specifieke apparaatmodellen met een weging van meer dan X% geclassificeerd als "grote impact". De impact wordt berekend voor elk apparaatmodel en is van toepassing op alle apparaten die voor die specifieke BIOS-versie worden aanbevolen. Als BSOD minder vaak voorkomt bij een bepaald model, is de weging lager en dus ook de impact.
