dnto.subscriptions.privacy_statement.desc1=HP erkent dat privacy een fundamenteel mensenrecht is en erkent verder het belang van privacy, veiligheid en gegevensbescherming voor onze klanten en partners wereldwijd. Als mondiaal bedrijf met grensoverschrijdende juridische entiteiten, bedrijfsprocessen, bestuursstructuren en technische systemen streven wij ernaar bij al onze activiteiten bescherming te bieden die het wettelijke minimum overschrijdt en hanteren wij consistente, strenge beleidsregels en procedures.
dnto.subscriptions.privacy_statement.desc2=Zoals gebruikt in deze verklaring verwijzen termen als "wij", "we", "ons", "onze" en "bedrijf" naar bedrijven met de merknaam HP en huidige en toekomstige filialen, zoals gedefinieerd door lokale wetgeving (hierna "HP"). Contactgegevens voor de functionaris voor gegevensbescherming van HP vindt u in het gedeelte "{0}" hieronder.
dnto.subscriptions.privacy_statement.exercise_rights=Gebruik maken van uw rechten en contact opnemen met ons
dnto.subscriptions.privacy_statement.heading=HP Privacyverklaring
dnto.subscriptions.section.details.desc1=Werknemers zijn gewend aan en eisen zelfs de flexibiliteit om te werken hoe en waar ze willen. Omdat het uiterste gevergd wordt van IT-teams, gaat dat ten koste van de ervaring, productiviteit en betrokkenheid van werknemers.
dnto.subscriptions.section.details.desc2=HP Workforce Experience Pro anticipeert op intelligente wijze op digitale frictie en lost deze op vanaf een geconsolideerd en modulair platform.
dnto.subscriptions.section.details.desc3=Of u nu een klein team op één locatie beheert of door de complexiteiten van een wereldwijd hybride personeelsbestand navigeert, HP Workforce Experience Pro biedt een uniform platform om de digitale ervaringen van uw werknemers te ondersteunen en te optimaliseren.
dnto.subscriptions.section.details.desc4=Verhoog de productiviteit van uw werknemers door IT-problemen proactief op te lossen voordat deze zich voordoen. Verminder het aantal ondersteuningsuren en verlaag de kosten voor IT met geavanceerde AI. Versterk de beveiliging van eindpunten door te anticiperen op bedreigingen en deze op te lossen.
dnto.subscriptions.section.details.desc5=Verbeter het sentiment van werknemers met bruikbare inzichten uit pulsoverzichten. Optimaliseer de kosten met slimme hardwareverversingen. Naadloze integratie met bestaande omgevingen met meerdere leveranciers en besturingssystemen.
dnto.subscriptions.section.details.heading=Abonnementsdetails
dnto.subscriptions.sign_in=Aanmelden bij HP Workforce Experience
dnto.subscriptions.thank_you.desc=Bedankt dat u voor HP Workforce Experience hebt gekozen. Wij zijn ervan overtuigd dat u een hogere productiviteit en meer samenwerking zult bereiken. Als u vragen hebt terwijl u aan de slag gaat, aarzel dan niet om onze uitgebreide ondersteuningsbronnen te bezoeken of neem contact op met ons behulpzame klantenserviceteam.
