exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail3=Op basis van de toepassing in kwestie variëren de antwoordopties. Als dit bedrijfskritische toepassingen zijn, kan upgraden van het geheugen het probleem verhelpen. Niet-bedrijfskritische toepassingen worden mogelijk van het apparaat verwijderd of hun instellingen kunnen worden aangepast om de belasting op het apparaat te verminderen.
