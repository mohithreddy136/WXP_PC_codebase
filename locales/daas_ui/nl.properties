side_panal.smart_refresh.hardware_persona_1=CPU-intensief: Apparaten die veel CPU gebruiken
side_panal.smart_refresh.hardware_persona_2=Opslag-zwaar: Apparaten die veel opslagruimte gebruiken
side_panal.smart_refresh.hardware_persona_3=Standaardprofiel: Apparaten met gemiddelde gebruiksmeetwaarden die overeenkomen met een normaal profiel
side_panal.smart_refresh.hardware_persona_4=Matige docking: Apparaten die regelmatig een dockingstation en/of andere randapparatuur gebruiken
