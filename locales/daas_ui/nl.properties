side_panal.smart_refresh.help_sec3_header=Factoren
side_panal.smart_refresh.help_sec3_point_1=CPU-gebruik: Gemiddeld percentage gebruikt in de afgelopen 30 dagen
side_panal.smart_refresh.help_sec3_point_2=Geheugengebruik: Gemiddeld percentage gebruikt in de afgelopen 30 dagen
side_panal.smart_refresh.help_sec3_point_3=Schijfgebruik: Laatst geregistreerde gebruikte percentage
side_panal.smart_refresh.help_sec3_point_4=OS-crashes: Totaal aantal crashes van het besturingssysteem in de afgelopen 7 dagen
side_panal.smart_refresh.help_sec3_point_5=BSOD's: Totaal aantal Blue Screen of Deaths in de afgelopen 7 dagen
side_panal.smart_refresh.help_sec3_point_6=Opstartduur: Laatst geregistreerde tijd in minuten
side_panal.smart_refresh.help_sec3_point_7=Duur van uitschakelen: Laatst geregistreerde tijd in minuten
side_panal.smart_refresh.help_sec3_point_8=Softwarefouten voor samenwerkingsapp: Totaal aantal fouten in de afgelopen 7 dagen
side_panal.smart_refresh.help_sec3_point_9=Energiestatus dockingstation: Laatst geregistreerde gegevens, Ja/Nee
side_panal.smart_refresh.help_sec3_sub_text=De volgende negen factoren dragen bij aan de score en bevatten beschrijvingen van hoe elke factor wordt gemeten:
side_panal.smart_refresh.help_sub_title=Upgrade pc's op het juiste moment met HP's Smart Refresh. Zo werkt het:
side_panal.smart_refresh.personas_header=Persona's
side_panal.smart_refresh.personas_sub_text=AI-gebaseerde groepen apparaten, vastgesteld aan de hand van gebruikspatronen
side_panal.smart_refresh.point_1_desc=Evalueer de huidige staat van de pc's op het gebied van hardwareprestaties, bruikbaarheid van software en beveiliging.
side_panal.smart_refresh.point_1_title=1. Beoordeling
side_panal.smart_refresh.point_2_desc=Geef prioriteit aan de pc's die onmiddellijke aandacht nodig hebben op basis van hun gebruik, belang voor de bedrijfsvoering of mate van veroudering.
side_panal.smart_refresh.point_2_title=2. Prioritering
side_panal.smart_refresh.point_3_desc=Voer de geplande upgrades of vervangingen efficiënt uit met zo weinig mogelijk downtime en onderbrekingen voor gebruikers.
side_panal.smart_refresh.point_3_title=3. Implementatie
side_panal.smart_refresh.point_4_desc=Zorg ervoor dat de vernieuwde pc's zijn uitgerust met de laatste beveiligingsmaatregelen om ze te beschermen tegen cyberbedreigingen.
side_panal.smart_refresh.point_4_title=4. Beveiliging
side_panal.smart_refresh.point_5_desc=Controleer regelmatig de vernieuwde pc's om ervoor te zorgen dat ze optimaal blijven presteren en voer zo nodig onderhoud uit.
side_panal.smart_refresh.point_5_title=5. Controle en onderhoud
side_panal.smart_refresh.software_persona_1=Slaapstand: Gebruikers die hun apparaat niet vaak gebruiken
side_panal.smart_refresh.software_persona_2=Office 365: Gebruikers die vaak Office-applicaties gebruiken, zoals Excel en Word
side_panal.smart_refresh.software_persona_3=Power coder: Gebruikers die regelmatig ontwikkelhulpprogramma's gebruiken voor codering
side_panal.smart_refresh.software_persona_4=Productivity Coder: Users who frequently use developer tools for coding
side_panal.smart_refresh.software_persona_5=Remote Worker: Users who frequently use productivity software, such as OneNote and Adobe Acrobat
side_panal.smart_refresh.software_persona_6=Healthcare Worker: Users who typically use their devices remotely
side_panal.smart_refresh.software_persona_7=Cloud Strategist: Users who frequently use medical professional software, such as ICU monitoring and hospital management systems
side_panal.smart_refresh.software_persona_8=Utility Expert: Users who use extensive cloud services
side_panal.smart_refresh.software_persona_9=Media Consumer: Users who frequently use utility software, such as WinRAR and System Monitor
side_panal.smart_refresh.software_personas_header=Softwarepersona's
side_panal.smart_refresh.software_personas_sub_text=Geïdentificeerd door AI-gestuurde apparaatclusters op basis van softwaregebruik
side_panal.smart_refresh.sub_title=Smart Refresh verwijst naar het proces om personal computers (pc's) op een slimme of efficiënte manier te upgraden. Hierbij zijn verschillende aspecten betrokken:
side_panal.smart_refresh.title=Smart Refresh
