requirements.list.hp_print_fleetproxy.desc1=Print Fleet Proxy 要求在同一台电脑上安装 HP Web Jetadmin。HP 强烈建议您在安装 HP Fleet Proxy 前将 Web Jetadmin 升级到最新版本。
requirements.list.hp_print_fleetproxy.desc2=目前，HP 仅针对 HP Web Jetadmin 10.5 SR4 测试 HP Fleet Proxy。虽然 HP Fleet Proxy 可以与早期版本的 HP Web Jetadmin 配合使用，但 HP 不保证所有功能都能按预期运行。
requirements.list.hp_print_fleetproxy.desc3=Web Jetadmin 是一项资源密集型服务。虽然 HP Fleet Proxy 不会增加太多额外开销，但是如果主机服务器没有足够的计算能力来支持这两项服务及其管理的设备，则可能会影响性能。您应该确保用于托管 HP Web Jetadmin 和 HP Fleet Proxy 的服务器的功能足够强大，并配有足够的处理器内核来缓解任何性能问题。
requirements.list.hp_print_fleetproxy.desc4=在对 2,000 台设备进行的测试中，HP 发现以下基本硬件规格足以提供可接受的性能结果。如果您发现性能缓慢，或者如果您管理的设备超过 2,000 台，则您可能需要一台计算能力更强大的服务器。
requirements.list.hp_print_fleetproxy.desc5=Print Fleet Proxy 是在本地部署的服务，可与基于云的服务进行通信。因此，您必须相应配置防火墙，以便通过 DNS 过滤技术或 IP 白名单功能在 WJA 服务器和 HP Command Center 之间进行入站和出站通信。
requirements.list.hp_print_fleetproxy.desc6=您可以在此处找到该列表:
requirements.list.hp_print_fleetproxy.hp-nf1=DNS 过滤: 配置防火墙以允许通过端口 443 向以下端点发出出站 HTTPS 请求:
requirements.list.hp_print_fleetproxy.hp-nf2=IP 白名单: 要将 IP 地址列入白名单，需将 HP Fleet Proxy 可能需要与之通信的每台可能云服务器的 IP 地址包括在内。
