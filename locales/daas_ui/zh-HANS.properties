requirements.list.proSecurity.windows.supportLifecycle.content2=HP 的目标是在 Wolf Pro Security 威胁遏制功能的半年期渠道(\"SAC\")可用后的 30 天内为其提供新操作系统版本支持。不支持临时或预发布的 Windows 预览体验版本。有关 Windows 操作系统版本的详细信息，请参阅 <a href='https://docs.microsoft.com/en-us/windows/release-information/' target='_blank'>https://docs.microsoft.com/en-us/windows/release-information/</a>。
requirements.list.proSecurity.windows.supportLifecycle.content3=为确保使用较旧 Windows 版本的客户有足够时间升级到最新版本，在 Wolf Pro Security 中提供对最新“半年期渠道”版本的支持后，HP 将至少在 90 天内继续支持第四个最新版本(当前为 Windows 10 v1903)。在此期间后，将不再支持较旧操作系统版本。相同支持策略适用于 Windows 10 的长期服务渠道版本。因此，这些系统也需要根据上面列出的策略进行更新。
requirements.list.proSecurity.windows.supportLifecycle.content4=Sure Click Pro 对 Windows 10 v2004 的支持已于 2020 年 7 月 31 日发布。将从 2020 年 10 月 31 日起取消对 Windows 10 v1809 的支持。
requirements.list.proSecurity.windows.supportLifecycle.content5=HP Proactive Security 不支持 Windows 7 和 8.1
requirements.list.proSecurity.windows.supportLifecycle.content6=Sure Click Pro 对 Windows 10 v20H2 的支持已于 2020 年 11 月 18 日发布。将从 2021 年 2 月 16 日起结束对 Windows 10 v1903 的支持。
requirements.list.proSecurity.windows.supportLifecycle.content7=HP 于 2021 年 7 月 5 日发布了适用于 Windows 10 v21H1 的 Sure Click Pro 威胁遏制支持。将从 2021 年 10 月 3 日起取消对 Windows 10 v1909 的支持。
requirements.list.proSecurity.windows.supportLifecycle.heading=支持新操作系统版本和较旧 Windows 10 版本的生命周期策略。
requirements.list.proSecurity.windows.supportLifecycle.windows=HP Wolf Pro Security 不支持零售销售点设备、HP 瘦客户端设备或虚拟桌面环境中的部署的 Windows 操作系统。
