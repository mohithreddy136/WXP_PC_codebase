exp.MemoryUtilizationIsHighForAnExtendedTime.causeHungApp=正在运行的应用程序挂起/无响应。
exp.MemoryUtilizationIsHighForAnExtendedTime.causeInsufficientMemory=计算机没有足够的内存供其使用。
exp.MemoryUtilizationIsHighForAnExtendedTime.causeLongRunningApp=正在运行的应用程序需要大量内存并花费较长时间来完成某项任务，如防病毒扫描。
exp.MemoryUtilizationIsHighForAnExtendedTime.causeMemoryLeak=已安装的应用程序可能存在内存泄漏错误。
exp.MemoryUtilizationIsHighForAnExtendedTime.option1Detail=为帮助客户延长设备使用寿命并改善最终用户体验，对于内存使用率过高的电脑，一种常见的解决方案是增加设备的内存。
exp.MemoryUtilizationIsHighForAnExtendedTime.option1Title=选项 1: 增加设备内存。
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail1=打开“设备使用率”报告。
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail2=内存使用率最高的应用程序将在“导致高内存使用率的应用程序”列中标出。
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail3=根据相关应用程序的不同，响应选项也会有所不同。如果是业务关键型应用程序，则升级内存可能会缓解问题。可以删除设备中的非业务关键型应用程序，或者调整其设置以减少设备上的负载。
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Title=选项 2: 识别并卸载应用程序。
exp.MemoryUtilizationIsHighForAnExtendedTime.option3Detail=重新启动计算机，完全关闭所有正在运行的应用程序。
exp.MemoryUtilizationIsHighForAnExtendedTime.option3Title=选项 3: 重新启动设备。
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Detail1=使用任务管理器，按照内存使用率查看正在运行的应用程序。
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Detail2=关闭内存使用率最高的应用程序。
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Title=选项 4: 关闭应用程序。
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Detail1=Use Task Manager to identify an application where the Memory utilization is steadily increasing to unusual proportions, but never decreasing.
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Detail2=从制造商处检查该应用程序的更新。
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Title=选项 5: 识别潜在内存泄漏并更新。
