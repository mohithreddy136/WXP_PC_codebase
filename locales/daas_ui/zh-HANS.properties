welcome.whats_new.line1=Jonathan Nikols，HP TechPulse 的副总裁和全球负责人
welcome.whats_new.line2=HP 刚刚庆祝了我们向客户和合作伙伴提交 TechPulse 计划的一周年纪念日，真是一场令人难忘的周年庆! 在 2018 年 10 月，HP 自豪地宣布，其 TechPulse 解决方案荣获技术服务行业协会 (TSIA) 颁发的标准托管服务产品和/或目录 2018 年创新明星奖。这是一个具有重要意义的时刻，因为它标志着 HP 的第 15 个 TSIA 奖项，提升了 HP 在 TSIA 名人堂中的地位。
welcome.whats_new.line3=Proactive Management（含 HP TechPulse）计划将帮助客户从现有 IT 投资中获得更多价值，协助客户转到 Windows 10 并开启了以更好、更智能的决策推动实现业务成果的大门。对于合作伙伴，我们正不断改善 TechPulse 服务交付体验、扩大 TechPulse 解决方案的应用领域并简化帮助流程，协助客户找到合适的生命周期服务以补充其首选 TechPulse 计划。
welcome.whats_new.line4=TechPulse 要取得全面成功，重点在于持续关注可帮助我们实现服务创新的平台、技术和流程。HP Proactive Management（含 TechPulse）比以往更智能、更快捷且功能更强大，我们正在为走向光明的未来奠定基础。
welcome.whats_new.line5=再次感谢您在这一令人激动的旅程中与我们携手同行，期望未来始终与您合作成功！
