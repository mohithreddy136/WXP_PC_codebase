account_management.subscriptions.addon.anyware.azure_notice=目前仅在 Azure Marketplace 中提供许可证。HP Anyware Standard 许可证包括对 HP Anyware Manager Enterprise 的访问权限。
account_management.subscriptions.addon.anyware.desc=为您的团队管理和配置远程桌面。最终用户无需 VPN 即可安全地访问桌面。将 HP Anyware 与 WXP 集成后，您可以在一个位置监控自己的远程设备组
account_management.subscriptions.addon.anyware.desc.short=安全地访问、管理和监控桌面
account_management.subscriptions.addon.anyware.enterprise.header=HP Anyware Manager Enterprise
account_management.subscriptions.addon.anyware.features.automation=自动执行任务
account_management.subscriptions.addon.anyware.features.automation.desc=将自定义管理工作流程无缝集成到管理平面中
account_management.subscriptions.addon.anyware.features.multitenant_rbac=多租户及基于角色的访问控制
account_management.subscriptions.addon.anyware.features.multitenant_rbac.desc=利用单个 HP Anyware Manager Enterprise 实例管理多个组织。根据管理员的角色为其分配权限
account_management.subscriptions.addon.anyware.features.productivity=提高最终用户的工作效率
account_management.subscriptions.addon.anyware.features.productivity.desc=无论性能需求或网络条件如何，最终用户都能获享可媲美本地的桌面体验。
account_management.subscriptions.addon.anyware.features.provision_desktops=管理物理和虚拟桌面
account_management.subscriptions.addon.anyware.features.provision_desktops.desc=IT 人员可以通过 HP Anyware Manager Enterprise 配置和监控远程桌面。他们还可以随时为最终用户配置虚拟桌面。
account_management.subscriptions.addon.anyware.features.remote_access=为最终用户提供安全的远程访问
account_management.subscriptions.addon.anyware.features.remote_access.desc=最终用户无需 VPN 即可安全地访问桌面。HP Anyware 通过云网关提供简洁的访问体验。
account_management.subscriptions.addon.anyware.features.role_access.desc=执行用户任务和会话路由操作，而无需在其他环境中安装网关
account_management.subscriptions.addon.anyware.features.role_cloud_gateways=通过云网关简化访问流程
account_management.subscriptions.addon.anyware.features.setup=任何 IT 环境均可轻松设置
account_management.subscriptions.addon.anyware.features.setup.desc=灵活、直观的解决方案，可简化包括本地、云和混合环境在内的各种基础架构的部署和管理，同时降低 IT 的复杂性和资源占用。
account_management.subscriptions.addon.anyware.features.workforce_integration=Workforce Experience Integration
account_management.subscriptions.addon.anyware.features.workforce_integration.desc=IT 人员可以在 Workforce Experience Platform 内集中管理远程桌面数据，从而提供其设备组的集中视图。
account_management.subscriptions.addon.anyware.header=HP Anyware
account_management.subscriptions.addon.anyware.overview.desc1=HP Anyware 是一款高性能软件解决方案，让用户无需 VPN 即可安全访问其远程或虚拟桌面。HP Anyware 中包括对名为 HP Anyware Manager Enterprise 的 IT 管理平面的访问权限。
account_management.subscriptions.addon.anyware.overview.desc2=HP Anyware Manager Enterprise (AME) 是一款多租户管理平台，可帮助 IT 人员同时管理物理和虚拟桌面。
account_management.subscriptions.addon.anyware.required_components.header=Workforce Experience Integration 所需的组件
account_management.subscriptions.addon.anyware.required_components.li1=HP Anyware Standard
account_management.subscriptions.addon.anyware.required_components.li2=HP Anyware Manager Enterprise
account_management.subscriptions.addon.anyware.security_compliance=安全性和合规性
account_management.subscriptions.addon.anyware.security_compliance.desc1=HP Anyware 将其产品的安全性和合规性作为优先考虑要素，确保提供强大的保护功能并符合各种行业标准。主要功能包括端到端加密、安全远程访问和多因素身份验证，力求保障数据的完整性和保密性。
account_management.subscriptions.addon.anyware.security_compliance.desc2=HP Anyware 还集成了高级威胁检测和响应功能，可主动降低风险。符合 GDPR、HIPAA 和 SOC 2 等法规的要求，彰显出 HP Anyware 对维护严格安全协议的承诺。持续监控和定期安全审计流程可确保 HP Anyware 产品能够抵御新出现的各种网络威胁，为用户提供安全可靠的 IT 管理体验。
account_management.subscriptions.addon.anyware.technology=远程技术
account_management.subscriptions.addon.anyware.technology.desc=HP Anyware 屡获殊荣的 PCoIP® 远程显示技术可在严苛网络条件下提供清晰度高、响应速度快的计算体验。
account_management.subscriptions.addon.anyware.technology.desc.li1=PCoIP® 可对来自中央服务器或工作站的图像像素进行编码、压缩、加密和传输，
account_management.subscriptions.addon.anyware.technology.desc.li2=然后可为几乎任何端点上的用户解密和解压缩图像。
account_management.subscriptions.addon.connect_accounts=连接账户
account_management.subscriptions.addon.oob.desc.short=用于高级诊断和修复的 BIOS 级远程控制
account_management.subscriptions.addon.oob.desclaimer1=1. 带外诊断和修复功能以不同期限的许可证形式提供，并且与供应商无关，适用于所有启用 Intel® vPro® Enterprise 和 Intel® AMT 的电脑。包含并需要 Workforce Experience Platform Starter 来管理和维护软件解决方案。在美国、加拿大和欧盟地区，可通过 HP 代表或 HP 授权经销商购买。详情请参阅 (添加许可条款/最终用户许可协议的 URL 链接)。
account_management.subscriptions.addon.oob.desclaimer2=2. 根据 HP 截至 2024 年 9 月 24 日对具备电源循环控制、非操作系统控制、BIOS 控制和重新映像控制功能的电脑制造商的内部分析。
account_management.subscriptions.addon.oob.desclaimer3=3. HP Insights 代理是必需的，它是一款遥测和分析应用程序，提供有关设备和应用程序的关键数据，不作为独立服务出售，并且已获得 ISO27001、ISO27701、ISO27017 和 SOC2 Type2 信息安全认证。需要 Internet 访问权限和门户连接。有关完整的系统要求，请访问 http://www.hpdaas.com/requirements。购买任何支持 HP Insights 代理的服务都需要在每台设备上启用相应的软件才能运行。HP Services Scan 可通过 Windows Update 在特定 HP 硬件上提供，它会检查每个硬件设备的授权情况，以确定是否已购买启用服务，并自动下载适用的软件。要禁用此功能，请按照以下说明操作: <a target='_blank' href='http://www.hpdaas.com/requirements' style=\"text-decoration:none; color:#4D52E5\">http://www.hpdaas.com/requirements</a>
account_management.subscriptions.addon.oob.desclaimer4=4. WXP Starter 包含在内，并且是管理和维护该软件解决方案所必需的。
account_management.subscriptions.addon.oob.features.remote_control=Remote control - even when the Operating System is down
account_management.subscriptions.addon.oob.features.remote_control.desc=IT 人员可以远程访问 BIOS，无论在何处工作，都可以重启、重新映像和恢复各种品牌的电脑。
account_management.subscriptions.addon.oob.features.scalable=可扩展的集中管理
account_management.subscriptions.addon.oob.features.scalable.desc=此功能集成到 WXP 中，可简化电脑配置、批量许可证控制和基于角色的访问，从而实现企业部署、利用和管理。
account_management.subscriptions.addon.oob.features.secure=安全的最终用户体验
account_management.subscriptions.addon.oob.features.secure.desc=用户可以查看远程会话，并可以随时停止连接。安全、无缝的支持能够建立信任，从而改善用户体验。
account_management.subscriptions.addon.oob.header=带外远程连接
account_management.subscriptions.addon.oob.overview.desc1=想改善混合办公模式下员工的数字体验? HP 带外远程连接功能使技术人员能够远程访问 BIOS，从而重启、重新映像和恢复电脑 (即使操作系统无法正常工作)。无需用户参与，无需现场巡查。
account_management.subscriptions.addon.vyopta.connect_accounts.error=我们无法连接您的账户。请检查连接，然后重试。
account_management.subscriptions.addon.vyopta.connect_accounts.found=我们已检测到 Vyopta 账户“<b>{orgName}</b>”。您要将它连接到 WXP 吗?
account_management.subscriptions.addon.vyopta.connect_accounts.no_permissions=您尚无权限。请联系 Vyopta 账户管理员获取帮助。
account_management.subscriptions.addon.vyopta.connect_accounts.not_found=我们无法自动检测您的 {service} 账户。如果您已经是 {service} 客户，请联系 {support_link} 以协助设置此连接。
account_management.subscriptions.addon.vyopta.connect_accounts.org_already_mapped=此 Vyopta ID 已关联到另一个租户。请联系您的账户管理员以寻求帮助。
account_management.subscriptions.addon.vyopta.connect_accounts.request_support=请联系您的 {service} 账户管理员寻求帮助。
account_management.subscriptions.addon.vyopta.connect_accounts.success=我们已成功连接您的账户。
account_management.subscriptions.addon.vyopta.connect_accounts.unauthorized=我们在 {service} 中检测到贵组织，但您似乎没有连接账户所需的权限。
account_management.subscriptions.addon.vyopta.desc=通过实时洞察优化协作。监控 Microsoft Teams、Zoom、Poly 和 Webex 平台上的通话质量、会议室使用情况及系统性能。在与 WXP 集成后，它可以帮助 IT 部门改善数字体验，并提高工作效率。
account_management.subscriptions.addon.vyopta.features.comprehensive_monitoring=在多个协作平台中实现全面监控
account_management.subscriptions.addon.vyopta.features.comprehensive_monitoring.desc=全面了解由多家供应商提供的产品组成的统一通信 (UC) 环境，从而高效管理视频和语音协作工具。
account_management.subscriptions.addon.vyopta.features.deep_integration=与 WXP 深度集成
account_management.subscriptions.addon.vyopta.features.deep_integration.desc=Vyopta 的分析和监控数据无缝嵌入 WXP 中，使 IT 团队能够在管理其他各种工作场所技术的同时轻松管理协作性能。此集中式方法可提高 IT 效率、降低复杂性和增强数字化体验管理。
account_management.subscriptions.addon.vyopta.features.enhance_user_engagement=提升用户的参与度和健康水平
account_management.subscriptions.addon.vyopta.features.enhance_user_engagement.desc=利用协作分析功能找出各种会影响工作效率的障碍，提升员工的体验和身心健康水平。
account_management.subscriptions.addon.vyopta.features.optimize_meeting_space=优化会议空间利用率
account_management.subscriptions.addon.vyopta.features.optimize_meeting_space.desc=分析会议室占用率和使用模式，最大限度地利用固定资产投资，提高会议室效率。
account_management.subscriptions.addon.vyopta.features.proactive_issue_detection=主动检测和解决问题
account_management.subscriptions.addon.vyopta.features.proactive_issue_detection.desc=利用实时监控功能，提前发现和解决会对用户造成影响的协作质量问题，从而缩短故障排除时间。
account_management.subscriptions.addon.vyopta.header=Vyopta 提供的协作体验
account_management.subscriptions.addon.vyopta.overview=为 IT 团队提供针对协作工具的高级监控和分析功能，赋予他们更多能力。借助 WXP 中的 Vyopta 集成功能，可实时了解 Microsoft Teams、Zoom、Poly 和 Webex 等平台上的会议室使用情况、通话质量及系统性能。通过主动解决各种协作问题和优化工作场所体验，提高员工的工作效率。
account_management.subscriptions.addon.vyopta.short_desc=有价值的分析和会议室洞察可优化协作环境
account_management.subscriptions.addon.wolf.desc=运用嵌入式电脑和软件安全技术实现部署、可见性和端到端保护，以加强电脑防御能力。
account_management.subscriptions.addon.wolf_security=HP Wolf Security
account_management.subscriptions.addon.wolf_security.desc=HP Wolf 为设备提供无与伦比的端点保护功能，使其免受网络攻击。在 Workforce Experience 中查看遥测数据，以增强安全性。
account_management.subscriptions.addon.wpt.desc=远程跟踪、锁定和保护丢失或被盗的设备。与 WXP 集成后，即使设备关机，也能帮助 IT 团队跟踪电脑资产并降低设备丢失风险。
account_management.subscriptions.addon.wpt.features.always_available=随时可用
account_management.subscriptions.addon.wpt.features.always_available.desc=利用定制的硬件和软件，找到/锁定/擦除数据，即使电脑处于关机、未联网或无法启动状态亦如此。
account_management.subscriptions.addon.wpt.features.message_customization=自定义消息
account_management.subscriptions.addon.wpt.features.message_customization.desc=向目标电脑传输自定义消息，以获取解锁说明
account_management.subscriptions.addon.wpt.features.remote_lock_and_erase=远程锁定和擦除
account_management.subscriptions.addon.wpt.features.remote_lock_and_erase.desc=在固件级别锁定设备以保护数据，并使被盗设备无法使用。擦除丢失或被盗设备上的主存储，以免数据泄露。
account_management.subscriptions.addon.wpt.features.seamless_integration=与 WXP 无缝集成
account_management.subscriptions.addon.wpt.features.seamless_integration.desc=直接在 WXP 中管理设备安全性，简化 IT 操作和端点管理。
account_management.subscriptions.addon.wpt.features.separations_of_duties=职责分离
account_management.subscriptions.addon.wpt.features.separations_of_duties.desc=锁定/擦除操作需由多名审批者批准，以防出现错误或者内部人员造成的威胁。
account_management.subscriptions.addon.wpt.features.strong_audit_trail=强大的审计跟踪记录
account_management.subscriptions.addon.wpt.features.strong_audit_trail.desc=在 WXP 平台上记录成功的锁定和擦除执行情况，以此作为合规证明。
account_management.subscriptions.addon.wpt.header=HP Wolf Protect and Trace with Wolf Connect
account_management.subscriptions.addon.wpt.overview=借助 HP Wolf Protect & Trace 增强资产管理并降低数据泄露风险。这一独特的解决方案集成到 WXP 中，即使设备断电，IT 团队也能定位、锁定并擦除丢失或被盗的设备。覆盖全球，管理简单，适合各种规模的客户。
account_management.subscriptions.addon.wpt.requirements.purchase=需要从您的 HP 销售代表或授权渠道合作伙伴处购买新 HP 电脑。<br>需要一台具有“WWAN”显示选项的受支持电脑。受支持电脑: https://www.hpwolf.com/en/legal/ptwc/platforms
account_management.subscriptions.addon.wpt.short_desc=在全球范围内远程跟踪、锁定和擦除电脑，即使电脑处于关闭状态也是如此
