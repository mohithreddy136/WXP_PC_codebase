dnto.subscriptions.about_hp.desc1=作为一家科技公司，我们认为盈利不是企业经营的唯一目的。企业有责任让世界变得更加美好。我们在气候行动、人权和数字公平方面所做的努力证明，我们在竭尽全力实现这一目标。
dnto.subscriptions.about_hp.desc2=80 多年来，我们一直在用实际行动推进我们的愿景，我们坚信，科技创新将为人类发展做出卓越贡献。
dnto.subscriptions.about_hp.desc3=我们的技术涵盖个人系统、打印机和 3D 打印解决方案等一系列产品和服务，其目的正是为了推动这种有意义的进步。
dnto.subscriptions.about_hp.desc4=我们深知，任何人在任何时间和任何地点都有可能提出伟大的创意。
dnto.subscriptions.about_hp.desc5=一个创意或许就能改变世界。
