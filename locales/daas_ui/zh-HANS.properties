exp.GpuHealthIssue.blueScreenLink=https://docs.microsoft.com/en-us/windows-hardware/drivers/debugger/-analyze
exp.GpuHealthIssue.blueScreenLinkText=https://docs.microsoft.com/en-us/windows-hardware/drivers/debugger/-analyze
exp.GpuHealthIssue.causeBlueScreenErrors=蓝屏错误: 蓝屏错误可能由于同时运行过多图形密集型程序或视觉特效导致，也可能与驱动程序及硬件问题有关。
exp.GpuHealthIssue.causeDoubleBitEcc=双位 ECC 内存错误: 显卡出现双位 ECC 内存错误，可能表明存在硬件问题或内存故障。
exp.GpuHealthIssue.causeHighDoubleBitEccOverTime=长期高频双位 ECC 内存错误: 显卡出现大量双位 ECC 内存错误，且平均错误数量持续增长至少已达 3 周。
exp.GpuHealthIssue.causeHighTdrEvents=高频率 TDR (显示驱动程序超时与恢复)事件: 显卡频繁发生 TDR 事件，表明可能存在驱动程序或硬件问题。
exp.GpuHealthIssue.causeMissingDriverUpdate=缺少关键驱动程序更新: 显卡缺少关键驱动程序更新，可能影响性能和稳定性。
exp.GpuHealthIssue.causeThermalIssues=散热问题: 显卡出现大量散热问题，GPU 或内存温度超过最高工作温度。
exp.GpuHealthIssue.driverOption1=选项 1: 使用 HP Image Assistant 更新驱动程序
exp.GpuHealthIssue.driverOption2=选项 2: 使用 Windows Update 更新驱动程序
exp.GpuHealthIssue.possibleCauses=可能原因包括:
exp.GpuHealthIssue.remediationBlueScreenPrefix=蓝屏错误: 检查是否同时运行过多图形密集型程序或视觉特效。更新显卡驱动程序，将超频设置重置为默认值，执行驱动程序干净安装或将设置恢复出厂默认值，确保电源供应充足，并清理通风口和风扇。分析小型转储文件以获取具体修复步骤:
exp.GpuHealthIssue.remediationDoubleBitEcc=双位 ECC 内存错误: 继续监控情况，并检查性能是否继续恶化。如果错误数量持续居高不下，建议更换显卡。
exp.GpuHealthIssue.remediationMissingDriver=缺失驱动程序更新: 将显卡驱动程序更新至最新版本以解决性能问题。
exp.GpuHealthIssue.remediationTdr=TDR 事件: 如果问题仍然存在，请继续监控并更新显卡驱动程序。将图形设置重置为默认值，将超频设置重置为默认值，如有可用更新则更新 BIOS，并检查电源供应是否充足和通风是否正常。清洁通风口和风扇。
exp.GpuHealthIssue.remediationThermal=散热问题: 检查气流是否受阻，清理通风口，并确保风扇正常工作且保持清洁。
exp.GpuHealthIssue.suggestedRemediations=建议的补救措施:
exp.GpuHealthIssue.title=解决 GPU 运行状况问题
exp.HpBatteryHealthManagerNotEnabled.causeNotCompatible=设备与 HP 电池运行状况管理器不兼容。
exp.HpBatteryHealthManagerNotEnabled.causeRequiresBiosUpdate=设备需要更新 BIOS。
exp.HpBatteryHealthManagerNotEnabled.description=HP 电池运行状况管理器自 2016 年起在所有 HP 商用笔记本电脑上可用。为延长电池使用时间，建议启用电池运行状况管理器
exp.HpBatteryHealthManagerNotEnabled.option1Detail=HP 建议根据使用情况和设备使用年限，启用 HP 电池运行状况管理器并将其设置为“让 HP 管理我的电池充电”或“最大限度地改善电池运行状况”。
exp.HpBatteryHealthManagerNotEnabled.option1Title=选项 1: 将 BIOS 更新至支持的版本
exp.HpBatteryHealthManagerNotEnabled.possibleCauses=可能原因包括:
exp.HpBatteryHealthManagerNotEnabled.reference1Link=https://support.hp.com/us-en/document/ish_4449597-3519507-16
exp.HpBatteryHealthManagerNotEnabled.reference1Text=HP 电池运行状况管理器 - 支持
exp.HpBatteryHealthManagerNotEnabled.references=参考:
exp.HpBatteryHealthManagerNotEnabled.settingLetDetail1=根据使用条件和温度情况随时间动态更改系统为电池充电的方式。
exp.HpBatteryHealthManagerNotEnabled.settingLetTitle=让 HP 管理我的电池充电
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases1=在混合使用环境中，笔记本电脑经常与交流电源断开，从而允许电池放电。
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases2=贵组织希望采用单一流程。
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases3=笔记本电脑的使用时长不足一年。
exp.HpBatteryHealthManagerNotEnabled.settingMaxDetail1=将最大充电容量限制为 80%，以优化电池运行状况并减轻电池膨胀问题。
exp.HpBatteryHealthManagerNotEnabled.settingMaxTitle=最大限度地改善电池运行状况
exp.HpBatteryHealthManagerNotEnabled.settingMaxUseCases1=长期连接交流电源使用的笔记本环境。
exp.HpBatteryHealthManagerNotEnabled.settingMaxUseCases2=使用一年或更长时间的笔记本。
exp.HpBatteryHealthManagerNotEnabled.suggestedRemediations=建议的补救措施:
