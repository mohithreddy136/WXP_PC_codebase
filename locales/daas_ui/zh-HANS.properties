azureonboard.marketing.signupsection.description=借助 Proactive Insights，您将可以获得所有已注册设备的电脑运行状况和预测性洞见，以改进决策制定过程，并及时发现和解决可能影响业务的新问题。
azureonboard.marketing.signupsection.heading=立即注册!
banner.iot.update.description=TechPulse 平台基础架构变更将于 2023 年 2 月 27 日(星期一)实施。您可能需要更新代理、防火墙和 SSL 检测软件设置。在 <a href='https://www.hpdaas.com/software' target='_blank'>HP TechPulse - 软件(hpdaas.com)</a>上运行网络评估工具，并检查四(4)个 *.IoT 测试目标中是否有任何一个返回“失败”消息。如果测试结果为失败，请遵循“<b><a href='https://hp.service-now.com/techpulse_kb?id=kb_article&sysparm_article=KB0011291' target='_blank'>KB0011291</a> - 配置代理或防火墙”</b>中的说明，<b>并在 2023 年 2 月 23 日(星期四)之前进行这些变更。</b>
