wex.fleet.mgmt.recommended.desc.antivirus_not_enabled=启用 Microsoft Defender 可针对恶意软件和其他安全威胁提供必要的保护。
wex.fleet.mgmt.recommended.desc.antivirus_not_enabled_other=启用防病毒软件可保护设备免受恶意软件的侵害，并保护系统免受攻击。
wex.fleet.mgmt.recommended.desc.antivirus_signature_outdated=定期更新恶意软件签名可确保 Windows Defender 能够检测并防范最新威胁。
wex.fleet.mgmt.recommended.desc.antivirus_signature_outdated_other=让恶意软件签名保持最新状态可确保全面防范最新威胁。
wex.fleet.mgmt.recommended.desc.avg_fan_speed_high=解决高风扇转速问题有助于防止设备过热和设备内部组件的潜在损坏。
wex.fleet.mgmt.recommended.desc.battery_calibrate=校准电池可提高功率读数的准确性，并延长电池续航时间、改善性能。
wex.fleet.mgmt.recommended.desc.battery_early_detection_wear=解决电池损耗问题可确保设备高效运行、性能稳定并延长电池使用寿命。
wex.fleet.mgmt.recommended.desc.battery_needs_attention=Replacement of defective batteries can ensure good device performance, and system health. Devices which are covered by warranty may be eligible for battery replacement.
wex.fleet.mgmt.recommended.desc.bitlocker_encryption_not_enabled=启用 BitLocker 后，可以通过加密驱动器来保护敏感数据，从而提高整体安全性，防止未经授权的访问。
wex.fleet.mgmt.recommended.desc.bsod_occured=解决蓝屏错误可确保系统稳定性、防止意外关机并保持可靠性。
wex.fleet.mgmt.recommended.desc.cpu_utilization_high=分析高 CPU 使用率有助于防止出现性能瓶颈并保持系统平稳运行。
wex.fleet.mgmt.recommended.desc.disk_needs_attention=Disk performance is degrading and may soon lead to slower performance or instability if not addressed.
wex.fleet.mgmt.recommended.desc.disk_utilization_high=释放磁盘空间可避免系统运行缓慢，并通过避免存储过载来确保运行顺畅。
wex.fleet.mgmt.recommended.desc.docking_station_ac_adapter_failed=修复适配器故障可确保为扩展坞提供一致的电源，防止出现连接问题。
wex.fleet.mgmt.recommended.desc.docking_station_ac_adapter_running_at_reduced_perofmance=增强适配器性能可确保坞站实现可靠的连接并提供最佳功能。
wex.fleet.mgmt.recommended.desc.docking_station_firmware_out_of_date=更新坞站固件可确保设备兼容性并提高整体系统性能。
wex.fleet.mgmt.recommended.desc.excessive_os_login_time=缩短登录时间可减少延迟，并提高用户访问系统的效率。
wex.fleet.mgmt.recommended.desc.excessive_os_shutdown_time=优化关机时间可最大限度地减少等待时间，并确保高效的系统关闭。
wex.fleet.mgmt.recommended.desc.excessive_os_startup_time=启动时间更短，系统访问速度更快，用户效率和生产力更高。
wex.fleet.mgmt.recommended.desc.firewall_disabled=启用 Windows 防火墙有助于阻止未经授权的访问，并保护您的网络免受潜在威胁。
wex.fleet.mgmt.recommended.desc.firewall_signature_outdated=定期更新防火墙签名可防范新出现的网络威胁。
wex.fleet.mgmt.recommended.desc.frequent_bsod_occured=解决蓝屏错误可确保系统稳定性、防止意外关机并保持可靠性。
wex.fleet.mgmt.recommended.desc.frequent_kernel_panic_error=解决内核崩溃错误可以提高系统稳定性、增强安全性并防止数据丢失。
wex.fleet.mgmt.recommended.desc.frequent_network_disconnection=实现零网络断开连接数可提升可靠性，改善用户体验，并确保不间断地访问服务和应用程序。
wex.fleet.mgmt.recommended.desc.gpu_health_issue=修复 GPU 问题可防止图形性能问题，并保持可视化应用程序的平稳运行。
wex.fleet.mgmt.recommended.desc.high_collaboration_sw_errors=解决协作软件问题可确保无缝的团队合作和持续的生产力。在过去的 7 天里，Teams、Outlook、Zoom、Webex、Chrome 和 Office 出现了 10 多个软件错误。
wex.fleet.mgmt.recommended.desc.high_windows_crash=解决操作系统崩溃可确保系统提供出色的稳定性、一致的性能和不间断的用户工作效率。
wex.fleet.mgmt.recommended.desc.kernel_panic_error=解决内核崩溃错误可以提高系统稳定性、增强安全性并防止数据丢失。
wex.fleet.mgmt.recommended.desc.last_reboot_more_than_21_days=重启设备会清除临时文件并刷新系统进程，从而提高整体性能和稳定性。
wex.fleet.mgmt.recommended.desc.linux_disk_encryption_not_enabled=启用磁盘加密可以保护存储设备的内容，从而显著增强数据安全性。
wex.fleet.mgmt.recommended.desc.linux_firewall_disabled=启用 Linux 防火墙有助于阻止未经授权的访问，并保护您的网络免受潜在威胁。
wex.fleet.mgmt.recommended.desc.linux_secure_boot_not_enabled=启用安全启动可确保在启动过程中仅加载受信任的软件，从而增强系统安全性。
wex.fleet.mgmt.recommended.desc.memory_utilization_high=分析高内存使用率将有助于发现和解决可能会影响系统性能和稳定性的问题。
wex.fleet.mgmt.recommended.desc.missing_critical_bios_updates=应用 BIOS 更新可确保系统稳定性以及与新硬件或软件的兼容性。
wex.fleet.mgmt.recommended.desc.missing_critical_driver_updates=更新驱动程序可以避免硬件故障，并确保系统具备出色的安全性、稳定性和性能。
wex.fleet.mgmt.recommended.desc.missing_linux_security_updates=应用安全更新可以防御恶意软件和漏洞，减小攻击面，并提高系统完整性。
wex.fleet.mgmt.recommended.desc.missing_linux_updates=安装最新更新可修复内核、系统库和应用程序中的漏洞。这可以保护您的系统免受漏洞、恶意软件和未经授权的访问。
wex.fleet.mgmt.recommended.desc.missing_windows_security_updates=应用安全更新可以防范最新的威胁和漏洞，确保您的系统免受攻击。
wex.fleet.mgmt.recommended.desc.missing_windows_updates=安装最新更新可修复漏洞并确保系统保持安全和正常运行。
wex.fleet.mgmt.recommended.desc.poor_network_signal_strength=出色的信号强度可确保连接稳定可靠，最大限度减少在线活动期间的中断和掉线情况。
wex.fleet.mgmt.recommended.desc.poor_nominal_speed=可靠而快速的网速对于高效完成任务、访问云服务以及与同事持续开展流畅协作至关重要。
wex.fleet.mgmt.recommended.desc.unauthenticated_connection=通过要求身份验证，组织可以防止恶意设备连接到网络，从而降低潜在的安全漏洞风险。
wex.fleet.mgmt.recommended.desc.windows_secure_boot_not_enabled=启用安全启动可防止未经授权的固件和操作系统修改，从而增强系统安全性。
