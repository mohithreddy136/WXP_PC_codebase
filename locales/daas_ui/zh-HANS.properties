exp.NetworkDisconnections.causeInsufficientSpeed=互联网速度不足
exp.NetworkDisconnections.causeInsufficientSpeed.detail1=高峰使用时段带宽过低可能导致网络不稳定和频繁中断。
exp.NetworkDisconnections.causeInsufficientSpeed.detail2=建议: 运行速度测试，若实际带宽不足，请升级服务套餐。
exp.NetworkDisconnections.causeInterference=无线干扰或物理障碍物。
exp.NetworkDisconnections.causeOutdatedRouter=家用路由器或调制解调器过时
exp.NetworkDisconnections.causeOutdatedRouter.detail1=过时的路由器可能不支持较新的网络标准，也无法承载大量已连接设备，进而导致网络拥堵与频繁断连。
exp.NetworkDisconnections.causeOutdatedRouter.detail2=建议: 保持网络设备为最新版本; 尝试恢复出厂设置以清除损坏的设置。
exp.NetworkDisconnections.causeOutdatedRouter.detail3=若问题仍然存在或硬件老旧，建议升级到更新的型号以保障稳定性。
exp.NetworkDisconnections.causePoorWifiSignal=Wi-Fi 信号差
exp.NetworkDisconnections.causePoorWifiSignal.detail1=信号弱或受阻会导致设备连接不稳定。
exp.NetworkDisconnections.causePoorWifiSignal.detail2=建议: 将路由器放置在中央位置，并调整信道/频率以减少干扰。
exp.NetworkDisconnections.causeRouterIssues=路由器固件或硬件问题。
exp.NetworkDisconnections.causeSoftwareDriverIssues=软件或驱动程序问题
exp.NetworkDisconnections.causeSoftwareDriverIssues.detail1=驱动程序/固件过时或损坏会降低连接稳定性。
exp.NetworkDisconnections.causeSoftwareDriverIssues.detail2=建议: 开启自动更新，保持所有网络相关软件为最新版本。
exp.NetworkDisconnections.causeUnprotectedNetwork=无保护的网络
exp.NetworkDisconnections.causeUnprotectedNetwork.detail1=未授权用户占用带宽可能引发断开连接和性能下降。
exp.NetworkDisconnections.causeUnprotectedNetwork.detail2=建议: 使用强度高且独一无二的 Wi-Fi 密码，防止未经授权的访问。
