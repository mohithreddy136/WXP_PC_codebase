wpt.details.desc=借助世界上最安全的查找、锁定和擦除服务 HP {appName}，可靠地保护数据、跟踪 HP 设备群，并防止未经授权的用户访问网络上的文件和文档。HP {appName} 由 HP Workforce Experience Platform 提供支持，可为定位、锁定和擦除设备提供完整的硬件强制服务，甚至适用于电脑离线或关机的情况。
wpt.details.header=建立您的第一道安全防线
wpt.disclaimer.point1=基于 HP 对“查找”、“锁定”和“擦除”软件服务的内部分析。截至 2021 年 10 月，有关“最安全”的表述基于加密和持久性(包括“硬件强制持久性”)。
wpt.disclaimer.point2=HP {appName} 在部分 HP 600、800、1000、基于 Windows 的 Elite Dragonfly 笔记本电脑、部分 800 台式机和 Z1 G8 工作站上可用，并将在设备打开并连接到 Internet 时运行。
wpt.disclaimer.point3=HP Workforce Experience Platform 是一个遥测和分析平台，可提供有关设备和应用程序的重要数据。该平台不作为单独服务销售。HP Workforce Experience Platform 遵循严格的 GDPR 隐私法规，并通过了 ISO27001、ISO27701、ISO27017 和 SOC2 Type2 信息安全认证。需要 Internet 访问权限并连接 Workforce Experience Platform 门户。有关完整的系统要求，请访问 <a href=\"{link}\" target=\"_blank\" style=\"text-decoration: none; color: #027aae; cursor: pointer;\">{text}</a>。
wpt.disclaimer.point4=“硬件强制”适用于 HP Sure Run Gen4 和更高版本，在具有此服务的兼容 HP 电脑上可用，并需要使用 Windows 10 和更高版本。
wpt.disclaimer.point5=HP 硬件支持的服务级别和响应时间可能会有所不同，具体取决于您的地理位置。服务时间自购买硬件之日起开始计算。适用相关限制和约束。如需详细信息，请访问 <a href="https://www.hp.com/go/cpc" target="_blank" style="text-decoration: none; color: #027aae; cursor: pointer;">www.hp.com/go/cpc</a>。HP 服务受购买时提供给客户或向客户指示的 HP 适用服务条款和条件的制约。根据当地适用法律，客户可能享有额外的法定权利，此类权利任何情况下都不会受到 HP 服务条款和条件或 HP 产品附带的 HP 有限保修的影响。
wpt.explore.header=浏览解决方案
wpt.feature.cost.desc=如果您不幸丢失一台重要的电脑，所造成的损失可能远远大于电脑本身的价值。HP {appName} 有助于减轻风险并降低与丢失电脑相关的成本。您现在能够通过综合性方法找到丢失或被窃的电脑，并能轻松地锁定或擦除数据。
wpt.feature.cost.title=帮助减少成本和免去不必要的担忧
wpt.feature.data.desc=利用我们最安全的阈值加密服务，在您所有的 HP 设备中查找、锁定和擦除数据，这有助于确保您的敏感信息安全无虞。
