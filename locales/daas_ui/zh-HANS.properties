azureonboard.marketing.disclaimer.content=本文包含的信息如有更改，恕不另行通知。HP 产品和服务附带的明确保修声明中阐明了此类产品和服务的全部保修服务。本文档中的任何内容均不构成任何额外保证。HP 对本文中出现的技术错误、编辑错误或遗漏之处概不负责。
azureonboard.marketing.disclaimer.contentlist1=HP Proactive Insights 和/或内含组件可能因地区、操作系统或授权 HP 服务合作伙伴而异。有关适用于您所在位置的特定详细信息，请联系当地 HP 代表或授权合作伙伴。HP 服务受购买时提供给客户或向客户指示的 HP 适用服务条款和条件的制约。根据当地适用法律，客户可能享有额外的法定权利，此类权利任何情况下都不会受到 HP 服务条款和条件或 HP 产品附带的 HP 有限保修的影响。
azureonboard.marketing.disclaimer.contentlist2=HP {appName} 是一个遥测和分析平台，可提供有关设备和应用程序的重要数据。该平台不作为单独服务销售。HP {appName} 遵循严格的 GDPR 隐私法规，并通过了 ISO27001、ISO27701、ISO27017 和 SOC2 Type2 信息安全认证。需要 Internet 访问权限和 {appName} 连接。有关完整的系统要求，请访问 <a target='_blank' href={link}>{text}</a>。
azureonboard.marketing.disclaimer.contentlist3=BIOS 更新仅适用于 HP 设备。
azureonboard.marketing.disclaimer.contentlist4=有关操作系统覆盖范围的详细信息，请访问 <a target='_blank' href={link}>{text}</a>。
azureonboard.marketing.employeesection.description=将在所有设备上进行的硬件、应用程序和员工体验调查关联起来，借此收集、衡量和管理员工的数字体验。
azureonboard.marketing.employeesection.heading=Proactive Employee Insight
azureonboard.marketing.hardwaresection.description=主动监控设备硬盘驱动器、CPU 使用率、温度和电池运行状况，使您能够利用巨大的数据湖(由来自 2000 多万台设备的数据构成)分析自身数据，进而对可能受到的影响进行有效预测。
azureonboard.marketing.hardwaresection.heading=Proactive Hardware Insight
azureonboard.marketing.insightsection.description=诊断性能问题、软件错误、蓝屏死机和系统使用情况，同时更新驱动程序和修补程序，确保您拥有安全无虞的安全配置文件。
azureonboard.marketing.insightsection.heading=Proactive Application Insight
azureonboard.marketing.learnmoresection.content=通过聚合 2000 多万台设备和数十亿个数据点中的信息，HP Proactive Insights 利用 HP TechPulse 分析平台在问题影响到员工之前发现并解决这些问题。
azureonboard.marketing.learnmoresection.description=我们通过人工智能技术主动控制计算机性能、安全性、成本、停机时间和员工满意度，帮助您改变设备管理模式。您将能够利用从其他 2000 多万台计算设备中获得的智能来改进自己的组织。
azureonboard.marketing.learnmoresection.heading=HP Proactive Insights 可基于数十亿个数据点提供有意义的分析
