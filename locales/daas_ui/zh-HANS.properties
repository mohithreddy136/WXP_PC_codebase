wex.fleet.mgmt.remediation.kernel_panic_error.desc=内核崩溃已发生，表明系统出现严重错误，Linux 内核无法恢复运作。这可能是由硬件故障、驱动程序损坏、内核参数配置错误或内核模块不兼容引起的。必须立即展开调查，找出根本原因。
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt1=查看系统日志 (/var/log/messages、/var/log/syslog 或 journalctl) 中关于崩溃之前出现的错误消息。
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt2=使用 memtest86 和 smartctl 等工具检查硬件运行状况，特别是内存 (RAM) 和磁盘完整性。
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt3=验证系统最近的更改 (例如，内核更新、驱动程序安装或配置更改)。
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt4=如果系统无法启动，请启动到救援或恢复模式以访问系统。
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt5=如果怀疑内核模块或驱动程序不兼容，请回滚或更新它们。
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt6=如果问题仍然存在或与硬件有关，请咨询供应商或社区支持。
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.desc=启用磁盘加密可以保护静态敏感数据，确保存储在磁盘上的所有信息未经适当身份验证都无法读取。对于处理机密或受监管数据的系统而言，这是一项至关重要的安全措施。
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step1=使用 LUKS (Linux 统一密钥设置) 或 dm-crypt 等工具实施全盘加密，具体取决于您的 Linux 发行版。
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step2=如果无法进行全盘加密，则对敏感分区 (例如 /home、/var 或 /data) 进行加密。
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step3=配置安全密钥管理，包括密码短语或与 TPM (可信平台模块) 集成 (如果可用)。
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step4=妥善备份加密密钥，防止因密钥遗失导致数据丢失。
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step5=测试加密设置以确保系统可正确启动，且认证后数据可正常访问。
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step6=文档加密配置和恢复程序，用以确保合规性和运营连续性。
wex.fleet.mgmt.remediation.linux_firewall_disabled.step1=根据您的 Linux 发行版，安装并配置防火墙工具，例如 firewalld、ufw 或 iptables。
wex.fleet.mgmt.remediation.linux_firewall_disabled.step2=启用防火墙服务并设置为开机启动
wex.fleet.mgmt.remediation.linux_firewall_disabled.step3=定义防火墙规则，仅允许必要的服务 (例如 SSH、HTTP/HTTPS)，并阻止所有其他服务。
wex.fleet.mgmt.remediation.linux_firewall_disabled.step4=使用以下命令验证防火墙状态和规则: sudo firewall-cmd --list-all (用于 firewalld)，sudo ufw status (用于 ufw)
wex.fleet.mgmt.remediation.linux_firewall_disabled.step5=定期审核防火墙配置，确保其符合安全策略和运行需求。
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.desc=启用安全启动功能，可通过验证引导加载程序、内核模块和驱动程序的数字签名，帮助保护系统在启动过程中免受未经授权或恶意代码的侵害。这可以增强系统的完整性和安全性，尤其是在企业或合规性驱动的环境中。
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step1=验证 UEFI 固件是否支持安全启动，并确保已在 UEFI 设置中启用该功能。
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step2=安装并配置与安全启动兼容的已签名引导加载程序和内核包 (例如，使用 shim 和已签名 GRUB)。
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step3=验证内核、模块和所有必需组件是否已签名。
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step4=重启并使用 mokutil 确认安全启动状态。
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step5=如果使用非标准组件，请注册自定义密钥。
wex.fleet.mgmt.remediation.missing_linux_security_updates.desc=系统缺少一个或多个关键安全更新。这些更新修复了操作系统、内核和已安装包中已知的漏洞。不应用更新可能会使系统面临未经授权的访问、数据泄露或服务中断的风险。
wex.fleet.mgmt.remediation.missing_linux_security_updates.step1=使用系统包管理器 (例如 apt、yum、dnf、zypper) 检查并识别缺失的安全补丁。
wex.fleet.mgmt.remediation.missing_linux_security_updates.step2=立即应用所有关键安全更新，以缓解已知威胁和漏洞。
wex.fleet.mgmt.remediation.missing_linux_security_updates.step3=必要时重启系统，尤其是在内核或核心服务更新之后。
wex.fleet.mgmt.remediation.missing_linux_security_updates.step4=启用自动安全更新或配置定期补丁计划，以确保及时获得保护。
wex.fleet.mgmt.remediation.missing_linux_security_updates.step5=通过检查日志和确认包版本来验证更新是否成功。
wex.fleet.mgmt.remediation.missing_linux_security_updates.step6=执行更新后漏洞扫描，以确保不存在任何残留风险。
wex.fleet.mgmt.remediation.missing_linux_updates.desc=系统缺少一个或多个关键的 Linux 更新。这些更新可能包括安全补丁、内核修复和稳定性改进。运行过时的系统会增加系统漏洞、崩溃和兼容性问题的风险。
wex.fleet.mgmt.remediation.missing_linux_updates.step1=使用包管理器 (例如 yum、dnf、apt 或 zypper) 查看可用的更新，以识别缺失的关键补丁。
wex.fleet.mgmt.remediation.missing_linux_updates.step2=尽快应用所有安全更新和内核更新，以缓解已知漏洞。
wex.fleet.mgmt.remediation.missing_linux_updates.step3=必要时重启系统，尤其是在内核或核心系统更新之后。
wex.fleet.mgmt.remediation.missing_linux_updates.step4=启用自动更新或配置定期补丁计划，以确保及时应用未来的更新。
wex.fleet.mgmt.remediation.missing_linux_updates.step5=通过检查系统日志并确认当前内核和包版本来验证更新是否成功。
wex.fleet.mgmt.remediation.network_connection_not_secure.desc=过去 24 小时内，检测到网络连接未达到预期的安全标准。
wex.fleet.mgmt.remediation.network_connection_not_secure.desc1=过去 7 天内检测到未认证的连接。
wex.fleet.mgmt.remediation.network_disconnections.desc=过去 24 小时内，设备多次报告网络断开连接。
wex.fleet.mgmt.remediation.network_disconnections.desc1=过去 7 天内检测到的网络断开连接数。
wex.fleet.mgmt.remediation.network_speed_slow.desc=过去 24 小时内，已上报网络标称速度较慢。
wex.fleet.mgmt.remediation.wifi_signal_strength_weak.desc=经报告，过去 24 小时内发生 Wi-Fi 信号强度弱的问题。
