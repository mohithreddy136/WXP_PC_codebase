welcome.banner.description=TechPulse 是一个遥测及分析平台，可提供设备和应用程序的重要数据，使 IT 部门能够轻松利用深度学习功能，从而为员工提供正确的 PC、软件和服务，帮助员工顺利完成工作。HP TechPulse 通过主动监视组织的安全状况来主动发现问题、采取大规模补救措施，并最大程度减少威胁。
welcome.banner.description_p={app_name} 是一个遥测及分析平台，可提供设备和应用程序的重要数据，使 IT 部门能够轻松利用深度学习功能，从而为员工提供正确的 PC、软件和服务，帮助员工顺利完成工作。{app_name} 通过主动监视组织的安全状况来主动发现问题，采取大规模补救措施，并最大程度减少威胁。
welcome.banner.description_p1={app_name} 是一个基于云的遥测和分析平台，可聚合来自设备和应用程序的关键配置及运行状况数据。它使用人工智能和深度学习来分析这些数据，以主动发现问题、采取大规模补救措施，并最大限度减少安全威胁。
