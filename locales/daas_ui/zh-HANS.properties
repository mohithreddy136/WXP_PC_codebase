wex.fleet.mgmt.troubleshoot.linux_firewall_disabled.description=启用防火墙有助于通过控制入站和出站连接来保护系统免受未经授权的访问、基于网络的攻击和不必要的流量。这是保护 Linux 系统 (尤其是暴露于公共网络或企业网络的 Linux 系统) 的关键步骤。
