side_panal.smart_refresh.help_sec1_point_1_desc=根据刷新紧急性分数* 中汇总的 9 个数据点评估每台设备。此分数可帮助您优先处理有风险的设备，以免影响用户的工作效率。
side_panal.smart_refresh.help_sec1_point_1_title=1. 识别
side_panal.smart_refresh.help_sec1_point_2_desc=AI 模型根据使用情况将设备分组为不同的硬件角色和软件角色。这些内容可以帮助您找到正确的替换设备。
side_panal.smart_refresh.help_sec1_point_2_title=2. 分类
side_panal.smart_refresh.help_sec1_point_3_desc1=如果您与 HP 合作伙伴协作，智能刷新功能将为每台设备推荐更换方案。这些建议来自相关角色的最佳模型，这些模型可在合作伙伴上传的目录中找到。如果没有显示设备建议，或者所示设备已过期，请联系您的合作伙伴并要求他们上传最新的目录。
side_panal.smart_refresh.help_sec1_point_3_desc2=如果不与 HP 合作伙伴合作，您将不会在“智能刷新”中看到设备建议。请联系您的 HP 客户代表，获取理想的替换型号。
side_panal.smart_refresh.help_sec1_point_3_desc3=上次目录上传日期:
side_panal.smart_refresh.help_sec1_point_3_title=3. 推荐
side_panal.smart_refresh.help_sec1_point_4_desc=使用“完成”刷新状态，可删除任何无需刷新或当前无法刷新的电脑。您可以查看这些设备，并将其状态恢复为“需执行操作”，以便在电脑列表中再次查看它们
