exp.mgmt.troubleshoot.description.antivirus_not_enabled_other=此设备已配置为使用第三方非 Microsoft 防病毒软件来保护设备免受病毒、恶意软件和其他威胁的侵害，但该设备上的防病毒保护未处于活动状态。
