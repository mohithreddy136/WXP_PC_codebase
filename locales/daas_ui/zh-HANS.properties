partner.exp.mgmt.recommended.desc.MAXIMISE_MY_BATTERY_HEALTH_NOT_ENABLED=不启用“电池运行状况管理器”可能会影响当前电池续航时间。
partner.exp.mgmt.recommended.desc.MEMORY_UTILIZATION_HIGH=设备内存使用率长时间过高可能会降低设备速度，从而影响员工绩效。
