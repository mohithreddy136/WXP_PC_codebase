azureonboard.marketing.signupcard.description=获得电脑运行状况信息和预测性洞见，借此做出更明智的决策，并及时解决新出现的问题，避免业务受到影响。
azureonboard.marketing.signupcard.footertext=选择此按钮即表示我接受<a target='_blank' href={termsLink}>条款和条件</a>，同意提供完成账户设置所需的数据，并接收 HP 或 HP 合作伙伴发送的有关试用版的电子邮件通讯。
