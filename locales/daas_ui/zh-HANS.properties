dnto.subscriptions.privacy_statement.desc1=HP 认识到隐私权是一项基本人权，并进一步认识到隐私、安全和数据保护对我们的全球客户和合作伙伴而言至关重要。作为一家拥有跨国法律实体、业务流程、管理结构及技术体系的全球性组织，我们致力于在所有业务中提供超出法律最低要求的保护，并实施一致而严格的政策与程序。
dnto.subscriptions.privacy_statement.desc2=在本声明中，“我们”、“我们的”和“公司”等词语是指根据当地法律所定义的 HP 品牌公司及其当前和未来的关联公司(此处统称“HP”)。HP 数据保护官的联系信息请见下文的“{0}”部分。
dnto.subscriptions.privacy_statement.exercise_rights=行使您的权利并联系我们
dnto.subscriptions.privacy_statement.heading=HP 隐私声明
dnto.subscriptions.section.details.desc1=员工习惯甚至要求灵活地选择工作方式和地点。如果 IT 团队在超负荷状态下工作，员工的体验、工作效率和参与度都会受到影响。
dnto.subscriptions.section.details.desc2=HP Workforce Experience Pro 可以通过综合模块化平台智能地预测和消除数字摩擦。
dnto.subscriptions.section.details.desc3=无论您是在单一地点管理一个小型团队，还是在全球范围内管理复杂的多元化团队，HP Workforce Experience Pro 都能为您提供统一的平台来支持和优化员工的数字体验。
dnto.subscriptions.section.details.desc4=通过主动预防 IT 问题的发生来提高员工的工作效率。通过先进的 AI 技术减少 IT 支持时间和成本。通过预测和解决威胁来加强端点安全。
dnto.subscriptions.section.details.desc5=通过脉冲调查获得切实可行的洞见，以提升员工情绪。通过智能硬件更新优化成本。与现有的多供应商和多操作系统环境无缝集成。
dnto.subscriptions.section.details.heading=订阅详细信息
