exp.ExcessiveOsStartupTime.option1Steps=by changing the Windows startup programs using the following steps:
exp.ExcessiveOsStartupTime.option1StepSettings=选择“设置”。
exp.ExcessiveOsStartupTime.option1StepStart=选择“开始”按钮(与 Microsoft 徽标相似)
exp.ExcessiveOsStartupTime.option1StepStartup=选择“应用程序”窗口底部的“启动”。
exp.ExcessiveOsStartupTime.option1StepToggles=使用开关来确定要在启动时运行哪些应用程序。如果希望应用程序在启动时自动打开，请开启此选项; 如果不希望应用程序在启动时自动打开，请关闭此选项。
exp.ExcessiveOsStartupTime.option2=选项 2: Windows 11 - 任务管理器中的启动应用程序
exp.ExcessiveOsStartupTime.option2Guide=启动应用程序也可以通过 Windows 任务管理器启用和禁用，步骤如下:
exp.ExcessiveOsStartupTime.option2StepDisable=右键单击应用程序并选择“禁用”(如果“状态”列显示“已启用”)。
exp.ExcessiveOsStartupTime.option2StepStart=选择“开始”按钮(与 Microsoft 徽标相似)
exp.ExcessiveOsStartupTime.option2StepStartupApps=从左侧导航中选择“启动应用程序”。
exp.ExcessiveOsStartupTime.option2StepTaskManager=输入“任务管理器”并按 Enter 打开 Windows 任务管理器。
exp.ExcessiveOsStartupTime.option3=选项 3: 卸载应用程序
exp.ExcessiveOsStartupTime.option3Guide=启动时未自动启动的应用程序也会导致登录速度慢，因为这些应用程序可能包含部分加载的文件、服务和注册表项。例如，系统托盘应用即使没有打开窗口，也可能处于运行状态。要查看并删除不必要的应用程序，请完成以下步骤。注意: 某些应用程序可能需要管理权限才能删除。
exp.ExcessiveOsStartupTime.option3StepControlPanel=输入“Control”并按 Enter 打开控制面板。
exp.ExcessiveOsStartupTime.option3StepPrograms=打开“程序和功能”。
exp.ExcessiveOsStartupTime.option3StepStart=选择“开始”按钮(与 Microsoft 徽标相似)
exp.ExcessiveOsStartupTime.option3StepUninstall=选择要删除的应用程序，然后选择“卸载”。
exp.ExcessiveOsStartupTime.option4=选项 4: 使用 PowerShell 和 ActiveDirectory 模块运行 Get-GpResultantSetofPolicy 以分析策略及其在受影响的机器上应用所需的时间，从而确定可能的改进措施。
