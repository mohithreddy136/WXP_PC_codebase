azure.onboard.message=HP TechPulse 是一个遥测及分析平台，可提供设备和应用程序的重要数据，使 IT 部门能够轻松利用深度学习功能，从而为员工提供正确的电脑、软件和服务，帮助员工顺利完成工作。HP TechPulse 通过主动监视组织的安全状况来主动发现问题、采取大规模补救措施，并最大程度减少威胁。
