poly.lens.addon.details.description=清晰掌控、信心运维，全组织范围内统一管理您的 HP 协同设备组。从高效部署、便捷维护到主动监控与深度洞察，IT 团队可获得跨空间、会议室与设备的集中管控能力。依托安全的云端管理及对混合办公模式的无缝支持，您可降低运营负担，防患于未然，为团队在任何工作场所提供持续可靠的协同体验。
poly.lens.addon.feature.centralized.header=集中式个人设备管理
poly.lens.addon.feature.centralized.text=借助 HP Poly Studio 应用，为最终用户提供无缝的自助服务体验，同时 IT 团队保持对个人设备的集中可见性和控制。无论您的团队在何处工作，都能自信地管理库存、更新、监控和洞察。
poly.lens.addon.feature.effortless.maintenance.header=轻松维护
poly.lens.addon.feature.effortless.maintenance.text=以最小的精力跨设备组管理设置、功能和软件更新。大规模应用设置、阶段性更新和微调配置，同时确保控制力与精准度不受影响。
poly.lens.addon.feature.meaningful.measurement.header=有意义的评估
poly.lens.addon.feature.meaningful.measurement.text=了解设备、空间和人员的实际工作情况。将利用率和性能数据转化为更明智、数据驱动的协作投资决策。
poly.lens.addon.feature.proactive.monitoring.header=主动监控
poly.lens.addon.feature.proactive.monitoring.text=清晰了解设备运行状况和状态，提前发现问题。在异常情况出现时获得警报，以便在问题干扰会议前得到解决。
poly.lens.addon.feature.secure.header=安全、基于云的控制
poly.lens.addon.feature.secure.text=从一个可信赖的、基于云的平台管理一切，该平台可随着组织的发展而扩展，同时满足企业安全和合规性需求。
poly.lens.addon.feature.simplified.deployment.header=简化部署
poly.lens.addon.feature.simplified.deployment.text=可放心地进行设备筹备、预配置和部署。自动化入职流程可减少设置时间、消除错误，并在设备到达用户或会议室之前使其准备就绪。
poly.lens.addon.subtitle=实现跨协同空间、会议室与设备的云端管理与深度洞察。
