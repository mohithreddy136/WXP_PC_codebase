exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option1=选项 1: 如果正在连接家庭 Wi-Fi 网络，请考虑更改路由器或接入点所使用的安全类型。
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option1.step1=使用路由器专用软件登录到路由器。
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option1.step2=更改家庭 Wi-Fi 网络的安全类型。
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option2=选项 2: 如果路由器或接入点比较老旧，请考虑改用可支持最新安全标准和改进的路由器。
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.recommendations=建议:
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.title=Wi-Fi 连接不安全
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.cause1=家庭设施的布局可能会导致 Wi-Fi 问题。
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.cause2=接入点可能位于墙壁或障碍物后面。
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.description=经报告，过去 24 小时内发生 Wi-Fi 信号强度弱的问题。
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.moreInfo=更多信息:
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.moreInfoLink=https://support.microsoft.com/en-us/windows/wi-fi-problems-and-your-home-layout-e1ed42e7-a3c5-d1be-2abb-e8fad00ad32a#WindowsVersion=Windows_11
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.possibleCauses=对于家庭网络，可能的原因如下:
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1=选项 1: 重启路由器
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step1=从电源插座拔下调制解调器和路由器的插头。
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step2=请至少等待 15 秒。
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step3=先将调制解调器重新插入交流电源插座，等待 1-2 分钟，然后打开路由器。
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step4=等待电缆调制解调器上的所有面板指示灯变为绿色，然后再测试 Internet 连接。
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2=选项 2: 移动接入点。
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step1=如果可以，请移动接入点的位置，减少接入点和电脑之间的墙壁或其他障碍物。
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step2=如果可以，请将电脑移近接入点。
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step3=如果可以，请将接入点移到家中或房间的中间位置，并尽可能移高一些。如果将其放在角落或桌子底下，可能会降低 Wi-Fi 信号强度。
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendations=建议:
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.title=Wi-Fi 信号强度较弱
exp.mgmt.troubleshoot.network.wifispeedisslow.cause1=接入点可能位于墙壁或障碍物后面。
exp.mgmt.troubleshoot.network.wifispeedisslow.cause2=路由器固件可能已过时。
exp.mgmt.troubleshoot.network.wifispeedisslow.description=经报告，过去 24 小时内出现 Wi-Fi 标称速度缓慢的问题。
exp.mgmt.troubleshoot.network.wifispeedisslow.possibleCauses=对于家庭网络，可能的原因如下:
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation1=重新启动调制解调器和路由器
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation1.step1=先关闭调制解调器，然后关闭路由器。
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation2=移动路由器
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation2.step1=尝试将路由器移到家中或办公室的其他位置，或将天线调向不同的方向。
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation3=更新路由器固件
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation3.step1=定期更新路由器的固件可以帮助修复错误和连接问题。虽然有些路由器可能有自动更新，但大多数需要手动更新。
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation4=更改路由器频率
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation4.step1=Wi-Fi 路由器会自动选择一个频段，但您也可以尝试将其从 2.4 GHz 更改为 5 GHz，看看是否能提高速度。但是，在执行此操作前，需要检查路由器是否支持 5 GHz。
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation5=更新 Wi-Fi 驱动程序
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation5.step1=过时或损坏的驱动程序可能会导致网络问题，请确保您的 Wi-Fi 适配器是最新的。
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation6=避免干扰
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation6.step1=信道干扰会大大降低吞吐量并减慢数据传输速度，因此应尽量消除可能存在的任何干扰。
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation7=检查其他设备
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation7.step1=查看连接到网络的其他设备及其正在执行的操作。例如，如果其他设备正在下载大量数据，则可能会影响速度。
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendations=建议:
exp.mgmt.troubleshoot.network.wifispeedisslow.title=Wi-Fi 速度较慢
