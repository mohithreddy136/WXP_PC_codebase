bios.bsod.tooltip.context=BIOS 的这种影响由权重决定，在同一型号的其他设备中，BSOD 的发生与升级越相关，权重就越高。此外，权重超过 X% 的特定设备型号被归为“高影响”类别。针对每个设备型号计算得出影响结果，其适用于为特定 BIOS 版本推荐的所有设备。如果某个型号的 BSOD 发生率较低，则权重就较小，因此影响也较小。
