wex.ra.remediation.unauthenticated_connection=对于家庭网络，请选择一种可靠的加密协议(如 WPA2 或 WPA3)，并设置强健的唯一访问密码。此外，请考虑实施 MAC 地址过滤并定期更新路由器的固件，以增强安全性并防止未经授权的连接。
wex.ra.remediation.windows_secure_boot_not_enabled=安全启动是由电脑行业成员共同开发的一种安全标准，旨在确保只能使用原始设备制造商(OEM)信任的软件来启动设备。
