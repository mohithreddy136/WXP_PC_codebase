wex.labs.remediation.ai.description=借助 AI 修复功能会引导您找到最有效的解决方案。它会以智能方式缩小选项范围，让您的团队能够高效、一致地解决问题。
wex.labs.remediation.ai.description.disclaimer=You are about to interact with an AI solution. Content generated by AI might contain inaccuracies and should be verified against the details provided. Please note that AI-generated responses might be incomplete or incorrect, and HP assumes no responsibility for actions taken based on this content.
wex.labs.remediation.ai.details.analyzesAvailableRemediations.desc=算法将扫描平台现有修复方案(包括脚本、策略及设备操作/更新)，推荐最相关的修复措施。<br/><br/>它通过分析历史使用数据与成功率，判断贵组织内通常解决此类问题的最佳方案。用户可大幅减少决策时间，让人工智能为您完成分析工作。
wex.labs.remediation.ai.details.analyzesAvailableRemediations.title=分析可用的修复
wex.labs.remediation.ai.details.applyOrReview.desc=根据修复方案，管理员可以选择: <br/><div class=remediation-ai-ui><ul><li>立即在所选设备上应用</li><li>安排后续执行以减少干扰</li><li>确认操作前先查看详情</li></ul></div><br/>应用后，会跟踪相关活动和结果，以确保透明度并支持持续学习。
wex.labs.remediation.ai.details.applyOrReview.title=应用、安排或审核
wex.labs.remediation.ai.details.continuousLearning.desc=随着时间推移，建议的准确性和可信度会不断提升。
wex.labs.remediation.ai.details.continuousLearning.title=持续学习
wex.labs.remediation.ai.details.howItWorks.title=工作方式
wex.labs.remediation.ai.details.issueToRemediation.desc=当问题超过设定的阈值时，它会显示在您的仪表板上，并清楚地描述正在发生的事情以及它可能对您的设备产生的影响。WXP 平台现在支持直接修复，而 AI 修复功能有助于缩小范围，找到解决问题的最佳方案。
wex.labs.remediation.ai.details.issueToRemediation.title=待修复问题
wex.labs.remediation.ai.details.learnsandImproves.desc=该算法会不断改进对贵组织最佳运作方式的理解。<br/>每次实施修复时，系统都会学习: <div class=remediation-ai-ui><ul><li>它的效果如何</li><li>解决问题花了多长时间</li><li>类似问题是否再次发生</li></ul></div><br/>这种反馈循环能够强化未来的建议，使其随着时间的推移变得更加准确和更有针对性。
wex.labs.remediation.ai.details.learnsandImproves.title=随着时间推移不断学习和改进
wex.labs.remediation.ai.details.overview.desc=利用人工智能进行修复的功能可以帮助 IT 管理员快速从检测阶段过渡到问题解决阶段。它会分析您的设备组数据，并针对当前问题推荐最有效的策略、脚本或设备更新。该算法利用您环境中现有修复措施的模式来建议最有可能有效的措施。
wex.labs.remediation.ai.details.recommendBestFix.desc=每项建议都包含: <br/><div class=remediation-ai-ui><ul><li>操作类型: 脚本、策略或更新</li><li>重要性: 修复和自动化可以实时解决问题、提高员工生产力、增强数字体验、节省时间以及降低漏洞风险。</li></ul></div>
