digitalExpScore.dashboard.coachmark.step1.msg1=1. I punteggi widget mostrano l’integrità della flotta in tre categorie
digitalExpScore.dashboard.coachmark.step1.msg2=2. Punteggi aggiornati quotidianamente
digitalExpScore.dashboard.coachmark.step1.msg3=3. Benchmark e confronti di settimana in settimana aggiornati settimanalmente.
digitalExpScore.dashboard.coachmark.step2.msg1=Selezionando un punto qualsiasi all’interno di una scheda si apre la scheda Gestione esperienza, così da visualizzare i dettagli sui componenti che influiscono sul punteggio e su come è possibile migliorarlo.
digitalExpScore.dashboard.coachmark.step3.msg1=1. Consultare l’articolo sulla conoscenza per saperne di più su questa funzione.
digitalExpScore.dashboard.coachmark.step3.msg2=2. Riavvia questo tutorial dal menu Guida e Informazioni.
digitalExpScore.dashboard.coachmark.step3.msg3=3. Passare direttamente alla sezione Guida a Supporto nel riquadro di spostamento.
digitalExpScore.dashboard.coachmark.title1=NUOVO! Punteggio di gestione dell’esperienza
digitalExpScore.dashboard.coachmark.title2=Ulteriori informazioni
digitalExpScore.experienceMgmt.coachmark.grid.msg1=1. I punteggi sono basati sull’analisi di diverse fonti di telemetria.
digitalExpScore.experienceMgmt.coachmark.grid.msg2=2. The table shows telemetry components, telemetry weighting, week to week change and each component's current score.
digitalExpScore.experienceMgmt.coachmark.recommendedActions.msg1=1. Le azioni raccomandate forniscono percorsi di rimedio.
digitalExpScore.experienceMgmt.coachmark.recommendedActions.msg2=2. Selezionando Visualizza incidente si accede agli incidenti con approfondimenti predittivi in cui è possibile creare un ticket di supporto.
digitalExpScore.experienceMgmt.coachmark.recommendedReports.msg1=1. Clicking View Report provides a report sorted by severity of devices needing improvements for the named telemetry component.
digitalExpScore.experienceMgmt.coachmark.recommendedReports.msg2=2. Il report selezionato si apre in una nuova finestra del browser.
digitalExpScore.experienceMgmt.coachmark.tabs=Le schede secondarie contengono informazioni aggiuntive per ogni punteggio di esperienza digitale.
digitalExpScore.experienceMgmt.coachmark.trendChart.msg1=1. I widget Nel tempo visualizzano le tendenze basate sul tempo.
digitalExpScore.experienceMgmt.coachmark.trendChart.msg2=2. Il widget aiuta a visualizzare se le azioni intraprese migliorano il punteggio di esperienza digitale.
