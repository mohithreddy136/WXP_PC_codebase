exp.DiskUtilizationHigh.causeMisconfiguredApps=Le applicazioni configurate in modo errato che salvano quantità eccessive di dati o file di registro possono consumare una quantità significativa di spazio su disco.
exp.DiskUtilizationHigh.causeTempFiles=Un disco pieno è spesso causato dall'accumulo di file temporanei, cache del browser o cache del sistema. L'utilizzo regolare di strumenti di pulizia integrati o metodi manuali per la rimozione di questi file temporanei può aiutare a mantenere spazio su disco disponibile.
