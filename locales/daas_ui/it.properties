poly.lens.actions=Azioni
poly.lens.addon.details.description=Il parco dei dispositivi di collaborazione HP può essere gestito con fiducia e chiarezza a livello dell'intera organizzazione. Dalla distribuzione semplificata alla manutenzione agevole, dal monitoraggio proattivo agli approfondimenti utili, i team IT possono usufruire di un controllo centralizzato su spazi, sale e dispositivi. La gestione basata su cloud sicura e il supporto continuo per il lavoro ibrido consentono di ridurre il sovraccarico operativo, restare al passo dei problemi e offrire un'esperienza coerente e affidabile in ogni ambiente di lavoro dei team.
poly.lens.addon.feature.centralized.header=Gestione centralizzata dei dispositivi personali
poly.lens.addon.feature.centralized.text=Le app HP Poly Studio offrono un'esperienza self-service agevole per gli utenti finali e consentono ai team IT di mantenere la visibilità e il controllo centralizzato sui dispositivi personali. È possibile gestire l'inventario, gli aggiornamenti, il monitoraggio e gli approfondimenti con sicurezza, ovunque si trovino i team.
poly.lens.addon.feature.effortless.maintenance.header=Manutenzione semplificata
poly.lens.addon.feature.effortless.maintenance.text=È possibile gestire impostazioni, funzionalità e aggiornamenti del software nell'intero parco con un minimo sforzo. L'applicazione delle impostazioni, la gestione degli aggiornamenti e il perfezionamento delle configurazioni possono essere eseguiti su larga scala senza sacrificare il controllo o la precisione.
poly.lens.addon.feature.meaningful.measurement.header=Misurazione significativa
poly.lens.addon.feature.meaningful.measurement.text=È possibile valutare le effettive modalità di lavoro di dispositivi, spazi e persone. I dati sull'utilizzo e sulle prestazioni possono essere trasformati in decisioni più intelligenti e basate sui dati relativi agli investimenti nella collaborazione.
poly.lens.addon.feature.proactive.monitoring.header=Monitoraggio proattivo
poly.lens.addon.feature.proactive.monitoring.text=È possibile anticipare i problemi con una chiara visibilità dello stato e dell'integrità dei dispositivi. Quando qualcosa non va, è possibile ricevere avvisi in modo da affrontare i problemi prima che interrompano le riunioni.
poly.lens.addon.feature.secure.header=Controllo sicuro basato su cloud
poly.lens.addon.feature.secure.text=È possibile gestire ogni aspetto da una piattaforma affidabile basata su cloud che cresce insieme all'organizzazione per soddisfare ogni esigenza di sicurezza e conformità aziendale.
poly.lens.addon.feature.simplified.deployment.header=Distribuzione semplificata
poly.lens.addon.feature.simplified.deployment.text=È possibile gestire, preconfigurare e distribuire i dispositivi in tutta sicurezza. I flussi di lavoro di onboarding automatizzati riducono i tempi di configurazione, eliminano gli errori e preparano i dispositivi prima che vengano consegnati a un utente o una sala.
poly.lens.addon.subtitle=Gestione basata su cloud e approfondimenti per spazi, sale e dispositivi di collaborazione.
