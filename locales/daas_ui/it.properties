requirements.list.hp_print_fleetproxy.desc1=Print Fleet Proxy richiede che sullo stesso PC sia installato HP Web Jetadmin. HP consiglia vivamente di eseguire l'aggiornamento all'ultima versione di Web Jetadmin prima di installare HP Fleet Proxy.
requirements.list.hp_print_fleetproxy.desc2=Attualmente, HP è impegnata a testare solo HP Fleet Proxy rispetto ad HP Web Jetadmin 10.5 SR4. Anche se HP Fleet Proxy potrebbe funzionare con le versioni meno recenti di HP Web Jetadmin, HP non garantisce che tutte le funzioni si comportino come previsto.
requirements.list.hp_print_fleetproxy.desc3=Web Jetadmin è un servizio a uso intensivo di risorse. Mentre HP Fleet Proxy non dovrebbe aggiungere un forte sovraccarico ulteriore, tutto questo potrebbe incidere sulle prestazioni se il server host non dispone di sufficiente potenza di elaborazione da supportare sia i servizi che i dispositivi gestiti. È consigliabile assicurarsi che il server con HP Web Jetadmin e HP Fleet Proxy in hosting sia abbastanza solido e abbia un numero sufficiente di core nel processore da attenuare gli eventuali problemi di prestazioni.
requirements.list.hp_print_fleetproxy.desc4=Testando 2.000 dispositivi, HP è giunta alla conclusione che le seguenti specifiche hardware di base dovrebbero essere sufficienti a ottenere risultati accettabili in termini di prestazioni. Se le prestazioni risultano rallentate o se si gestiscono più di 2.000 dispositivi, potrebbe essere necessario un server con maggiore potenza di elaborazione.
requirements.list.hp_print_fleetproxy.desc5=Print Fleet Proxy è un servizio on-premise che comunica con un servizio basato su cloud. È necessario quindi configurare il firewall per consentire le comunicazioni in entrata e in uscita tra il server WJA e HP Command Center, mediante filtri DNS o l’inserimento degli indirizzi IP nell’elenco di elementi consentiti.
requirements.list.hp_print_fleetproxy.desc6=L'elenco è disponibile qui:
requirements.list.hp_print_fleetproxy.hp-nf1=Filtraggio DNS: configurare il firewall per consentire le richieste HTTPS in uscita sulla porta 443 ai seguenti endpoint:
requirements.list.hp_print_fleetproxy.hp-nf2=Inserimento degli indirizzi IP nell’elenco di elementi consentiti: per inserire indirizzi IP nell’elenco degli elementi consentiti, sarà necessario includere l’indirizzo IP di ogni possibile server cloud con cui HP Fleet Proxy potrebbe avere necessità di comunicare.
