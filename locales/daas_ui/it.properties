ee_experienceScore_para1_description3=Derivato dalle risposte al Pulse sul sentiment.
ee_experienceScore_para1_description4=Informazioni ottenute dai dati di telemetria del modulo di gestione del parco dispositivi; il punteggio del dispositivo è formato dal punteggio di integrità del sistema (60%) e dal punteggio di affidabilità del sistema operativo e del sistema (40%).
ee_experienceScore_para1_description5=In base ai dati di antivirus, firewall, crittografia e aggiornamenti di sicurezza critici.
ee_experienceScore_para1_description6=In base alla stabilità delle app desktop (percentuale di arresti anomali/blocchi) per tutte le applicazioni installate nel parco dispositivi.
ee_experienceScore_para1_description7=Quando il punteggio di Sentiment non è disponibile:
ee_experienceScore_para1_description8=Se il modulo di coinvolgimento dei dipendenti non è accessibile, un Pulse sul sentiment non è stato eseguito o la soglia minima di risposte al Pulse sul sentiment non è stata raggiunta, la ponderazione del punteggio viene modificata in base a:
