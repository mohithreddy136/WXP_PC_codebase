exp.ExcessiveOsStartupTime.option1Steps=by changing the Windows startup programs using the following steps:
exp.ExcessiveOsStartupTime.option1StepSettings=Selezionare Impostazioni.
exp.ExcessiveOsStartupTime.option1StepStart=Selezionare il pulsante Start, uguale al logo Microsoft.
exp.ExcessiveOsStartupTime.option1StepStartup=Selezionare Avvio nella parte inferiore della finestra App.
exp.ExcessiveOsStartupTime.option1StepToggles=Utilizzare gli interruttori per determinare le app da eseguire all'avvio. Attivare l'interruttore per aprire l'app all'avvio oppure disattivarlo se l'app non deve essere aperta all'avvio.
exp.ExcessiveOsStartupTime.option2=Opzione 2: Windows 11 - App di avvio in Gestione attività
exp.ExcessiveOsStartupTime.option2Guide=Le app di avvio possono anche essere abilitate e disabilitate in Gestione attività, seguendo questa procedura:
exp.ExcessiveOsStartupTime.option2StepDisable=Fare clic con il pulsante destro del mouse su un'app e selezionare Disabilita (se nella colonna Stato è indicato Abilitato).
exp.ExcessiveOsStartupTime.option2StepStart=Selezionare il pulsante Start, uguale al logo Microsoft.
exp.ExcessiveOsStartupTime.option2StepStartupApps=Selezionare "App di avvio" nel riquadro di spostamento sinistro.
exp.ExcessiveOsStartupTime.option2StepTaskManager=Digitare "Gestione attività" e premere INVIO per aprire Gestione attività di Windows.
exp.ExcessiveOsStartupTime.option3=Opzione 3: Disinstallare le applicazioni
exp.ExcessiveOsStartupTime.option3Guide=Anche le applicazioni che non vengono eseguite automaticamente all'avvio possono contribuire a tempi di accesso lenti, perché possono contenere file, servizi e voci del registro parzialmente caricati. Le applicazioni dell'area delle notifiche sono alcuni esempi di applicazioni in esecuzione, anche se potrebbero non comparire in una finestra aperta. Per rivedere e rimuovere le applicazioni non necessarie, completare questa procedura. Nota: la rimozione di alcune applicazioni potrebbe richiedere diritti di amministratore.
exp.ExcessiveOsStartupTime.option3StepControlPanel=Digitare "Controllo" e premere INVIO per aprire il Pannello di controllo.
exp.ExcessiveOsStartupTime.option3StepPrograms=Aprire Programmi e funzionalità.
exp.ExcessiveOsStartupTime.option3StepStart=Selezionare il pulsante Start, uguale al logo Microsoft.
exp.ExcessiveOsStartupTime.option3StepUninstall=Selezionare un'applicazione da rimuovere e quindi Disinstalla.
exp.ExcessiveOsStartupTime.option4=Opzione 4: Utilizzare PowerShell e il modulo ActiveDirectory per eseguire Get-GpResultantSetofPolicy per analizzare i criteri e il tempo richiesto per applicarli sui computer interessati, in modo da identificare possibili miglioramenti.
