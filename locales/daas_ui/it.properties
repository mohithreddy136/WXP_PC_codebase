wex.labs.fleet-explorer.description1=Uno strumento basato sull'intelligenza artificiale che risponde alle domande sulla gestione, la manutenzione e l'ottimizzazione del parco dispositivi.
wex.labs.fleet-explorer.description2=Fleet Explorer può aiutarvi con approfondimenti, informazioni generali o capacità di risoluzione dei problemi di un singolo dispositivo.
wex.labs.fleet-explorer.english-only=Fleet Explorer al momento è disponibile solo in inglese.
wex.labs.fleet-explorer.title=Fleet Explorer
wex.labs.more-features.subText=Le nuove funzionalità germoglieranno per prime qui nei laboratori
wex.labs.more-features.title=Altre funzionalità sono in lavorazione
wex.labs.remediation.ai.description=La correzione con l'intelligenza artificiale guida l'utente verso la soluzione più efficace. La funzione limita in modo intelligente le opzioni in modo che il team possa risolvere i problemi in modo efficiente e coerente.
wex.labs.remediation.ai.description.disclaimer=You are about to interact with an AI solution. Content generated by AI might contain inaccuracies and should be verified against the details provided. Please note that AI-generated responses might be incomplete or incorrect, and HP assumes no responsibility for actions taken based on this content.
wex.labs.remediation.ai.details.analyzesAvailableRemediations.desc=L'algoritmo analizza le correzioni esistenti nella piattaforma, compresi script, criteri e azioni/aggiornamenti per i dispositivi, al fine di consigliare la correzione più pertinente.<br/><br/>Vengono esaminati l'utilizzo storico e le percentuali di successo per comprendere quali interventi riescono in genere a risolvere questo tipo di problema all'interno dell'organizzazione. Gli utenti possono dedicare meno tempo all'individuazione della giusta linea d'azione consentendo all'AI di svolgere il lavoro.
wex.labs.remediation.ai.details.analyzesAvailableRemediations.title=Analizza le correzioni disponibili
wex.labs.remediation.ai.details.applyOrReview.desc=A seconda della correzione, gli amministratori possono scegliere di: <br/><div class=remediation-ai-ui><ul><li>Applicarla immediatamente ai dispositivi selezionati</li><li>Programmarla in un secondo momento per dopo per ridurre al minimo le interruzioni</li><li>Esaminare i dettagli prima di confermare l'azione</li></ul></div><br/>Dopo l'applicazione, l'attività e i risultati vengono monitorati per garantire la trasparenza e l'apprendimento continuo.
wex.labs.remediation.ai.details.applyOrReview.title=Applica, programma o rivedi
wex.labs.remediation.ai.details.continuousLearning.desc=Nel corso del tempo, aumentano l'accuratezza e il livello di sicurezza delle raccomandazioni.
wex.labs.remediation.ai.details.continuousLearning.title=Apprendimento continuo
wex.labs.remediation.ai.details.howItWorks.title=Come funziona
wex.labs.remediation.ai.details.issueToRemediation.desc=Quando un problema supera una soglia definita, viene visualizzato nel dashboard con una descrizione chiara di ciò che sta accadendo e di come potrebbe influire sui dispositivi. La piattaforma WXP ora consente la correzione diretta, mentre la funzione di correzione AI aiuta a individuare l'opzione migliore per risolvere il problema.
wex.labs.remediation.ai.details.issueToRemediation.title=Problema da correggere
wex.labs.remediation.ai.details.learnsandImproves.desc=L'algoritmo perfeziona continuamente la sua comprensione delle soluzioni adatte per l'organizzazione.<br/>Ogni volta che viene applicata una correzione il sistema impara:<div class=remediation-ai-ui><ul><li>Quando è efficace</li><li>Quando ha impiegato per risolvere il problema</li><li>Se si sono verificati nuovamente problemi simili</li></ul></div><br/>Questo ciclo di feedback rafforza le raccomandazioni future, rendendole più accurate e personalizzate nel tempo.
wex.labs.remediation.ai.details.learnsandImproves.title=Apprende e migliora nel tempo
wex.labs.remediation.ai.details.overview.desc=La correzione con le funzionalità AI aiuta gli amministratori IT a passare rapidamente dal rilevamento alla risoluzione. Analizza i dati del parco dispositivi e consiglia i criteri, gli script o gli aggiornamenti dei dispositivi più efficaci per il problema in questione. L'algoritmo usa gli schemi delle correzioni esistenti nell'ambiente per suggerire le soluzioni probabilmente funzionanti.
wex.labs.remediation.ai.details.recommendBestFix.desc=Ogni raccomandazione include: <br/><div class=remediation-ai-ui><ul><li>Tipo di azione: script, criteri o aggiornamento</li><li>Perché è rilevante: La correzione e l'automazione risolvono i problemi in tempo reale, aumentano la produttività dei dipendenti, migliorano l'esperienza digitale, consentono di risparmiare tempo e riducono le vulnerabilità.</li></ul></div>
wex.labs.remediation.ai.details.recommendBestFix.title=Raccomanda la soluzione migliore
wex.labs.remediation.ai.details.relevance.desc=L'intelligenza artificiale opera all'interno della libreria di correzioni dell'organizzazione.
wex.labs.remediation.ai.details.relevance.title=Rilevanza
wex.labs.remediation.ai.details.scriptInfo.desc=For faster saving of your script, the system reads it and auto-fills metadata fields such as title, description, synopsis, and any input parameters detected allowing you to quickly review and save your new script.
wex.labs.remediation.ai.details.scriptInfo.title=Script Information Autofill
wex.labs.remediation.ai.details.Speed.desc=È possibile risolvere i problemi più velocemente con le raccomandazioni guidate.
wex.labs.remediation.ai.details.Speed.title=Velocità
wex.labs.remediation.ai.details.transparency.desc=Per ogni raccomandazione vengono indicati i motivi alla base della scelta.
wex.labs.remediation.ai.details.transparency.title=Trasparenza
