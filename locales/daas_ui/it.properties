exp.HpBatteryHealthManagerNotEnabled.reference1Text=HP Battery Health Manager - Supporto
exp.HpBatteryHealthManagerNotEnabled.references=Riferimenti:
exp.HpBatteryHealthManagerNotEnabled.settingLetDetail1=Modifica dinamicamente la modalità di ricarica della batteria del sistema in base alle condizioni di utilizzo e alla temperatura nel tempo.
exp.HpBatteryHealthManagerNotEnabled.settingLetTitle=Consenti ad HP di gestire la ricarica della batteria
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases1=Ambienti di utilizzo misto in cui il notebook viene regolarmente scollegato dall'alimentazione CA e la batteria viene lasciata scaricare.
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases2=Preferire un unico processo per la propria organizzazione.
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases3=Il notebook ha meno di un anno.
exp.HpBatteryHealthManagerNotEnabled.settingMaxDetail1=Limita lo stato di ricarica massimo all'80% per ottimizzare lo stato della batteria e ridurne il rigonfiamento.
exp.HpBatteryHealthManagerNotEnabled.settingMaxTitle=Ottimizza integrità della batteria
exp.HpBatteryHealthManagerNotEnabled.settingMaxUseCases1=Ambienti in cui i notebook sono continuamente collegati all'alimentazione CA.
exp.HpBatteryHealthManagerNotEnabled.settingMaxUseCases2=Notebook con un anno o più.
