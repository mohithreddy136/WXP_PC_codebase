partner.customerlist.invites.acceptinvite.popup.bottom.description.line2=Il partner IT potrà accedere ai dati dell'azienda per facilitare la gestione dei dispositivi, l'esecuzione dei report, l'applicazione delle soluzioni, la fornitura del supporto tecnico e altro ancora. L'utente manterrà il controllo completo e potrà revocare l'accesso in qualsiasi momento dalle impostazioni di amministrazione di WXP.
