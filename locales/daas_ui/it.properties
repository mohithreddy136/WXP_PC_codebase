exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option1=Opzione 1: In caso di connessione alla rete Wi-Fi domestica, valuta la possibilità di cambiare il tipo di sicurezza utilizzato dal router o dal punto di accesso.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option1.step1=Accedi al router utilizzando il software dedicato.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option1.step2=Cambia il tipo di sicurezza per la rete Wi-Fi domestica.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option2=Opzione 2: Se possiedi un router o un punto di accesso più vecchio, valuta la possibilità di procurarti un router più recente che supporti i più recenti standard e miglioramenti di sicurezza.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.recommendations=Raccomandazioni:
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.title=Connessione Wi-Fi non sicura
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.cause1=La disposizione della casa può causare problemi Wi-Fi.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.cause2=Il punto di accesso potrebbe essere ubicato dietro pareti e ostacoli.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.description=La potenza del segnale Wi-Fi è stata segnalata come debole nelle ultime 24 ore.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.moreInfo=Ulteriori informazioni:
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.moreInfoLink=https://support.microsoft.com/en-us/windows/wi-fi-problems-and-your-home-layout-e1ed42e7-a3c5-d1be-2abb-e8fad00ad32a#WindowsVersion=Windows_11
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.possibleCauses=Possibili cause per la rete domestica:
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1=Opzione 1: riavvio del router
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step1=Scollega il modem e il router dalla presa di corrente.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step2=Attendi almeno 15 secondi.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step3=Ricollegare il modem alla presa di rete CA, attendere 1-2 minuti e infine accendere il router.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step4=Attendi che tutte le spie del pannello sul modem via cavo diventino verdi prima di testare la connessione Internet.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2=Opzione 2: Sposta il punto di accesso.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step1=Sposta il punto di accesso, se possibile, per ridurre il numero di pareti o altri ostacoli tra il punto di accesso e il PC.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step2=Sposta, se possibile, il PC più vicino al punto di accesso.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step3=Sposta il punto di accesso, se possibile, verso il centro della casa o stanza e in una posizione più in alto. Il posizionamento in un angolo o sotto una scrivania può ridurre la potenza del segnale Wi-Fi.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendations=Raccomandazioni:
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.title=Segnale Wi-Fi debole
exp.mgmt.troubleshoot.network.wifispeedisslow.cause1=Il punto di accesso potrebbe essere ubicato dietro pareti e ostacoli.
exp.mgmt.troubleshoot.network.wifispeedisslow.cause2=Il firmware del router potrebbe essere obsoleto.
exp.mgmt.troubleshoot.network.wifispeedisslow.description=La velocità nominale del Wi-Fi è stata segnalata come lenta nelle ultime 24 ore.
exp.mgmt.troubleshoot.network.wifispeedisslow.possibleCauses=Possibili cause per la rete domestica:
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation1=Riavvia il modem e il router
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation1.step1=Spegnere prima il modem e poi il router.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation2=Sposta il router
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation2.step1=Prova a spostare il router in un punto diverso della casa o dell’ufficio, oppure regola le antenne in modo da orientarle verso una direzione diversa.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation3=Aggiorna il firmware del router
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation3.step1=L'aggiornamento regolare del firmware del router può contribuire a risolvere gli errori e i problemi di connettività. Sebbene alcuni router dispongano di aggiornamenti automatici, la maggior parte necessita di aggiornamenti manuali.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation4=Cambia la frequenza del router
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation4.step1=I router Wi-Fi selezionano automaticamente una banda di frequenza, ma puoi provare a cambiarla da 2,4 GHz a 5 GHz per vedere se la velocità migliora. Verifica tuttavia se il router supporta 5 GHz prima di agire.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation5=Aggiorna i driver Wi-Fi
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation5.step1=I driver obsoleti o danneggiati possono causare problemi di rete; verificare che il proprio adattatore Wi-Fi sia aggiornato.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation6=Evita eventuali interferenze
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation6.step1=Le interferenze di canale possono ridurre significativamente la velocità effettiva, rallentando il trasferimento dei dati; prova quindi a eliminare ogni eventuale interferenza.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation7=Controlla altri dispositivi
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation7.step1=Vedi quali altri dispositivi sono connessi alla rete e qual è il loro comportamento. Ad esempio, se è presente un altro dispositivo che sta scaricando molti dati, questa azione potrebbe influire sulla velocità.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendations=Raccomandazioni:
