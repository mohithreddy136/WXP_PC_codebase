requirements.list.proSecurity.windows.supportLifecycle.content1=L'obiettivo del livello di servizio di HP è fornire il supporto per le 3 versioni più recenti di Windows 10 facenti parte del canale semestrale.
requirements.list.proSecurity.windows.supportLifecycle.content2=L'obiettivo di HP è mettere a disposizione il supporto della funzione Threat Containment di Wolf Pro Security per le nuove versioni dei sistemi operativi entro 30 giorni dalla relativa disponibilità nel canale semi-annuale (\"SAC\"). Le build provvisorie o pre-release di Windows Insider non sono supportate. Per ulteriori informazioni sulle release del sistema operativo Windows OS, visitare <a href='https://docs.microsoft.com/en-us/windows/release-information/' target='_blank'>https://docs.microsoft.com/en-us/windows/release-information/</a>.
requirements.list.proSecurity.windows.supportLifecycle.content3=Per assicurare che i clienti con versioni di Windows precedenti abbiano il tempo necessario per eseguire l'upgrade alle versioni più aggiornate, HP continuerà a supportare la quarta delle versioni più recenti (attualmente Windows 10 v1903) per almeno 90 giorni dopo la disponibilità del supporto per la più recente versione facente parte del canale semestrale in Wolf Pro Security. Al termine di questo periodo, il supporto per la versione del sistema operativo meno recente non sarà più disponibile. La stessa politica di supporto si applica anche alle versioni di Windows 10 facenti parte del canale di assistenza a lungo termine. Pertanto, anche questi sistemi dovranno essere aggiornati nel rispetto della politica sopra riportata.
requirements.list.proSecurity.windows.supportLifecycle.content4=Il supporto di Sure Click Pro per Windows 10 v2004 è stato rilasciato il 31 luglio 2020. Il supporto per Windows 10 v1809 non sarà più disponibile a partire dal 31 ottobre 2020.
requirements.list.proSecurity.windows.supportLifecycle.content5=Windows 7 e 8.1 non sono supportati dalla sicurezza proattiva di HP
requirements.list.proSecurity.windows.supportLifecycle.content6=Il supporto di Sure Click Pro per Windows 10 v20H2 è stato rilasciato il 18 novembre 2020. Il supporto per Windows 10 v1903 è terminato a partire dal 16 febbraio 2021.
requirements.list.proSecurity.windows.supportLifecycle.content7=HP ha rilasciato il supporto per il contenimento delle minacce Sure Click Pro per Windows 10 v21H1 il 5 luglio 2021. Il supporto sarà ritirato per Windows 10 v1909 a partire dal 3 ottobre 2021.
