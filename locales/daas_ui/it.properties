exp.ExcessiveOsShutdownTime.causeEventLog=La chiusura del registro eventi di Windows richiede un tempo eccessivo.
exp.ExcessiveOsShutdownTime.causeGroupPolicy=Gli aggiornamenti dei criteri di gruppo richiedono molto tempo per il completamento.
exp.ExcessiveOsShutdownTime.causeShutdownScripts=Gli script di arresto richiedono un tempo eccessivo per il completamento.
exp.ExcessiveOsShutdownTime.causeSlowDrive=Un disco rigido lento impiega un tempo eccessivo per cancellare il contenuto del file di paging dalla memoria virtuale.
exp.ExcessiveOsShutdownTime.causeSlowLink=Il dispositivo è su un collegamento lento.
exp.ExcessiveOsShutdownTime.causeWindowsUpdates=Il dispositivo sta installando gli aggiornamenti di Windows.
