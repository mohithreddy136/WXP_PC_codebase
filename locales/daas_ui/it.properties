partner.exp.mgmt.recommended.button.guide_me=Guidami
partner.exp.mgmt.recommended.desc.AV_NOT_ENABLED=Risolvi tutti i problemi, oppure deseleziona nella tabella in basso i PC che non devono essere abilitati ora.
partner.exp.mgmt.recommended.desc.AV_WD_SIGNATURE=L'aggiornamento delle definizioni del malware assicura una protezione completa contro le ultime minacce.
partner.exp.mgmt.recommended.desc.AVG_FAN_SPEED_HIGH=Un'elevata velocità della ventola per un tempo prolungato suggerisce che il dispositivo si sta surriscaldando, danneggiando i componenti e abbreviando la sua vita utile.
partner.exp.mgmt.recommended.desc.BITLOCKER_ENCRYPTION_NOT_ENABLED=I dati dei dispositivi non crittografati potrebbero venire persi o rubati.
partner.exp.mgmt.recommended.desc.DISK_UTILIZATION_HIGH=I dispositivi con poco spazio libero su disco possono diventare lenti e rendere complicata l'esecuzione delle attività essenziali.
partner.exp.mgmt.recommended.desc.DOCKING_STATION_AC_ADAPTER_FAILED=Un errore dell'adattatore CA della docking station indica problemi hardware che possono causare una perdita di alimentazione o un funzionamento intermittente del dispositivo.
partner.exp.mgmt.recommended.desc.DOCKING_STATION_FIRMWARE_OUT_OF_DATE=Il firmware obsoleto della docking station può causare problemi di compatibilità, limitare le funzionalità o esporre le lacune in termini di sicurezza.
partner.exp.mgmt.recommended.desc.EXCESSIVE_OS_SHUTDOWN_TIME=Un tempo di arresto elevato potrebbe indicare applicazioni bloccate, hardware con forte latenza, aggiornamenti delle policy, script lunghi o attività di Windows non completate.
partner.exp.mgmt.recommended.desc.EXCESSIVE_OS_STARTUP_TIME=Un lungo avvio potrebbe segnalare conflitti software o problemi hardware.
partner.exp.mgmt.recommended.desc.FIREWALL_DISABLED=La disabilitazione di Windows Defender Firewall può esporre i dispositivi ad attacchi dannosi sulla rete.
partner.exp.mgmt.recommended.desc.FIREWALL_SIGNATURE_OUTDATED=Le definizioni del firewall obsolete rendono i dispositivi vulnerabili a malware e minacce informatiche.
partner.exp.mgmt.recommended.desc.GPU_HEALTH_ISSUE=Un problema rilevato della GPU potrebbe causare difetti visivi, problemi di prestazioni o persino la mancata visualizzazione degli elementi grafici.
partner.exp.mgmt.recommended.desc.HIGH_COLLABORATION_SW_ERRORS=Gli errori persistenti nel software di collaborazione possono disturbare i flussi di lavoro del team e mettere a repentaglio la comunicazione e l'avanzamento dei progetti.
partner.exp.mgmt.recommended.desc.HIGH_WINDOWS_CRASH=Arresti anomali e riavvii imprevisti indicano un'instabilità di base che potrebbe causare perdite di dati o danni permanenti all'hardware.
partner.exp.mgmt.recommended.desc.LAST_REBOOT_MORE_THAN_21_DAYS=I dispositivi che non vengono riavviati per un lungo periodo potrebbero riscontrare problemi di prestazioni e stabilità del sistema operativo.
partner.exp.mgmt.recommended.desc.MAXIMISE_MY_BATTERY_HEALTH_NOT_ENABLED=La mancata abilitazione di Gestione integrità batteria potrebbe incidere sulla durata della batteria.
partner.exp.mgmt.recommended.desc.MEMORY_UTILIZATION_HIGH=Un utilizzo elevato della memoria del dispositivo per un periodo prolungato può rallentare il dispositivo influenzando le prestazioni del dipendente.
partner.exp.mgmt.recommended.desc.MISSING_CRITICAL_DRIVER_UPDATES=Senza gli aggiornamenti critici dei driver, l'hardware dei dispositivi potrebbe non funzionare correttamente o non funzionare del tutto.
