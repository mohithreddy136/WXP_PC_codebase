exp.MemoryUtilizationIsHighForAnExtendedTime.causeHungApp=un'applicazione in esecuzione è bloccata o non risponde.
exp.MemoryUtilizationIsHighForAnExtendedTime.causeInsufficientMemory=Il computer non dispone di una memoria adeguata al suo utilizzo.
exp.MemoryUtilizationIsHighForAnExtendedTime.causeLongRunningApp=Un'applicazione in esecuzione richiede una grande quantità di memoria, per un tempo prolungato, per completare un'attività, come la scansione antivirus.
exp.MemoryUtilizationIsHighForAnExtendedTime.causeMemoryLeak=Un'applicazione installata potrebbe presentare un bug che provoca la perdita di memoria.
exp.MemoryUtilizationIsHighForAnExtendedTime.option1Detail=Per aiutare i clienti a prolungare la durata dei dispositivi e migliorare l'esperienza dell'utente finale, una pratica comune per i PC la cui memoria è sovrautilizzata è l'aggiunta di memoria al dispositivo.
exp.MemoryUtilizationIsHighForAnExtendedTime.option1Title=Opzione 1: aumentare la memoria del dispositivo.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail1=Aprire il report Utilizzo dispositivi.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail2=Le applicazioni che consumano il maggior quantitativo di memoria saranno identificate nella colonna App che causano un elevato utilizzo della memoria.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail3=In base all'applicazione in questione, le opzioni di risposta variano. Nel caso di applicazioni business-critical, un upgrade della memoria potrebbe risolvere il problema. Le applicazioni non business-critical possono essere rimosse dal dispositivo oppure è possibile modificarne le impostazioni essere modificate per ridurre il carico sul dispositivo.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Title=Opzione 2: identificare e disinstallare le applicazioni.
exp.MemoryUtilizationIsHighForAnExtendedTime.option3Detail=Riavviare il computer per chiudere completamente tutte le applicazioni in esecuzione.
exp.MemoryUtilizationIsHighForAnExtendedTime.option3Title=Opzione 3: riavviare il dispositivo.
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Detail1=Utilizzare Gestione attività per visualizzare le applicazioni in esecuzione in base all'utilizzo della memoria.
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Detail2=Chiudere le applicazioni che utilizzano il maggior quantitativo di memoria.
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Title=Opzione 4: chiudere le applicazioni.
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Detail1=Use Task Manager to identify an application where the Memory utilization is steadily increasing to unusual proportions, but never decreasing.
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Detail2=Verificare la disponibilità di aggiornamenti del produttore per tale applicazione.
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Title=Opzione 5: identificare le potenziali perdite di memoria e aggiornare il sistema.
