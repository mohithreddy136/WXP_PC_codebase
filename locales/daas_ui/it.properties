exp.GpuHealthIssue.blueScreenLink=https://docs.microsoft.com/en-us/windows-hardware/drivers/debugger/-analyze
exp.GpuHealthIssue.blueScreenLinkText=https://docs.microsoft.com/en-us/windows-hardware/drivers/debugger/-analyze
exp.GpuHealthIssue.causeBlueScreenErrors=Errori con schermata blu: gli errori con schermata blu potrebbero essere dovuti a troppi programmi ad uso intensivo della grafica o effetti visivi in esecuzione contemporaneamente, oppure a problemi di driver e hardware.
exp.GpuHealthIssue.causeDoubleBitEcc=Errori della memoria ECC a doppio bit: la scheda grafica presenta errori di memoria ECC a doppio bit, che potrebbero indicare problemi hardware o errori della memoria.
exp.GpuHealthIssue.causeHighDoubleBitEccOverTime=Numero elevato di errori della memoria ECC a doppio bit nel tempo: la scheda grafica presenta un numero elevato di errori della memoria ECC a doppio bit e il numero medio di errori è risultato in aumento nelle ultime 3 settimane.
exp.GpuHealthIssue.causeHighTdrEvents=Numero elevato di eventi TDR (timeout e ripristino del driver del display): la scheda grafica ha riscontrato un elevato numero di eventi TDR, che indicano potenziali problemi di driver o hardware.
exp.GpuHealthIssue.causeMissingDriverUpdate=Aggiornamenti critici dei driver mancanti: alla scheda grafica manca un aggiornamento critico dei driver, che potrebbe influire sulle prestazioni e sulla stabilità.
exp.GpuHealthIssue.causeThermalIssues=Problemi termici: la scheda grafica sta riscontrando un elevato numero di problemi termici e la temperatura della GPU o della memoria è superiore alla temperatura di esercizio massima.
exp.GpuHealthIssue.driverOption1=Opzione 1: utilizzare HP Image Assistant per aggiornare i driver
exp.GpuHealthIssue.driverOption2=Opzione 2: utilizzare Windows Update per aggiornare i driver
exp.GpuHealthIssue.possibleCauses=Possibili cause:
exp.GpuHealthIssue.remediationBlueScreenPrefix=Per gli errori con schermata blu: controllare se sono in esecuzione contemporaneamente troppi programmi ad alta intensità grafica o effetti visivi. Aggiornare il driver della scheda grafica, ripristinare le impostazioni di overclock predefinite, eseguire un'installazione pulita dei driver o ripristinare le impostazioni predefinite di fabbrica, garantire un'alimentazione adeguata e pulire le prese d'aria e la ventola. Analizzare il file mini-dump per le fasi di risoluzione specifiche:
exp.GpuHealthIssue.remediationDoubleBitEcc=Per gli errori della memoria ECC a doppio bit: continuare a monitorare la situazione e controllare se le prestazioni continuano a deteriorarsi. Se il numero di errori rimane elevato, valutare la possibilità di sostituire la scheda grafica.
exp.GpuHealthIssue.remediationMissingDriver=Per gli aggiornamenti dei driver mancanti: aggiornare il driver della scheda grafica alla versione più recente per risolvere i problemi di prestazioni.
exp.GpuHealthIssue.remediationTdr=Per gli eventi TDR: continuare a monitorare la situazione e, se il problema persiste, aggiornare il driver della scheda grafica. Ripristinare le impostazioni predefinite della scheda grafica, ripristinare le impostazioni di overclock predefinite, aggiornare il BIOS se è disponibile un aggiornamento e verificare che l'alimentazione sia sufficiente e il flusso d'aria sia adeguato. Pulire le prese d'aria e la ventola.
exp.GpuHealthIssue.remediationThermal=Per i problemi termici: verificare che il flusso d'aria non sia ostacolato, pulire le prese d'aria e accertarsi che la ventola funzioni correttamente e sia pulita.
exp.GpuHealthIssue.suggestedRemediations=Soluzioni suggerite:
exp.GpuHealthIssue.title=Affrontare i problemi di integrità della GPU
exp.HpBatteryHealthManagerNotEnabled.causeNotCompatible=Il dispositivo non è compatibile con HP Battery Health Manager.
exp.HpBatteryHealthManagerNotEnabled.causeRequiresBiosUpdate=Il dispositivo richiede un aggiornamento del BIOS.
exp.HpBatteryHealthManagerNotEnabled.description=HP Battery Health Manager è disponibile su tutti i notebook aziendali HP dal 2016. Per migliorare la durata della batteria, si raccomanda di abilitare Battery Health Manager.
exp.HpBatteryHealthManagerNotEnabled.option1Detail=HP raccomanda di abilitare HP Battery Health Manager con l'opzione "Consenti ad HP di gestire la ricarica della batteria" o "Ottimizza integrità della batteria" in base all'uso o all'età del computer.
exp.HpBatteryHealthManagerNotEnabled.option1Title=Opzione 1: aggiornare il BIOS a una versione supportata
