side_panal.smart_refresh.hardware_persona_1=Uso intensivo della CPU: dispositivi che usano la CPU in modo intensivo
side_panal.smart_refresh.hardware_persona_2=Uso intensivo delle unità di archiviazione: dispositivi che usano le unità di archiviazione in modo intensivo
side_panal.smart_refresh.hardware_persona_3=Profilo standard: dispositivi con metriche di utilizzo medie corrispondenti a un profilo normale
side_panal.smart_refresh.hardware_persona_4=Docking moderato: dispositivi che usano spesso una docking station e/o altre periferiche
side_panal.smart_refresh.hardware_persona_5=Sessioni lunghe del display: dispositivi il cui display rimane acceso per un lungo periodo di tempo
side_panal.smart_refresh.hardware_personas_header=Utenti tipo Hardware
side_panal.smart_refresh.hardware_personas_sub_text=Identificati dai cluster di dispositivi basati sull'intelligenza artificiale in base all'utilizzo dell'hardware
side_panal.smart_refresh.help_sec1_description=I 3 passaggi: identificare, classificare, consigliare
side_panal.smart_refresh.help_sec1_header=Come funziona
side_panal.smart_refresh.help_sec1_point_1_desc=Ogni dispositivo viene valutato in base a 9 dati, riepilogati in un punteggio di urgenza dell'aggiornamento*. Questo punteggio aiuta a dare priorità ai singoli dispositivi a rischio per evitare interruzioni della produttività degli utenti.
side_panal.smart_refresh.help_sec1_point_1_title=1. Identificazione
side_panal.smart_refresh.help_sec1_point_2_desc=Un modello AI raggruppa i dispositivi in utenti tipo Hardware e Software distinti in base all'utilizzo. Questi utenti tipo possono contribuire a trovare il giusto dispositivo sostitutivo.
side_panal.smart_refresh.help_sec1_point_2_title=2. Classificazione
side_panal.smart_refresh.help_sec1_point_3_desc1=Se collabori con un partner HP, Aggiornamento smart raccomanda le sostituzioni per ciascun dispositivo. Queste raccomandazioni provengono dai modelli ad alte prestazioni per l'utente tipo pertinente, disponibili nel catalogo caricato dal partner. Se le raccomandazioni sui dispositivi non sono visualizzate, o se i dispositivi visibili sono obsoleti, contatta il partner e richiedi il caricamento dell'ultimo catalogo.
side_panal.smart_refresh.help_sec1_point_3_desc2=Se non collaborate con un partner HP, non vedrete le raccomandazioni sui dispositivi in Smart Refresh. Contattate il vostro rappresentante HP per conoscere i migliori modelli sostitutivi.
side_panal.smart_refresh.help_sec1_point_3_desc3=Data ultimo caricamento catalogo:
side_panal.smart_refresh.help_sec1_point_3_title=3. Raccomandazione
side_panal.smart_refresh.help_sec1_point_4_desc=Utilizzare lo stato di aggiornamento "Completo" per rimuovere tutti i PC che non necessitano di un aggiornamento o che non possono essere aggiornati in questo momento. È possibile visualizzare questi dispositivi e modificarne lo stato in "Richiede azione" per visualizzarli nuovamente nell'elenco dei PC
side_panal.smart_refresh.help_sec1_point_4_title=4. Stati
side_panal.smart_refresh.help_sec2_description=Come si stabilisce se un dispositivo deve essere sostituito
side_panal.smart_refresh.help_sec2_header=Aggiorna punteggio di urgenza
side_panal.smart_refresh.help_sec2_sub_text=Il punteggio di urgenza dell'aggiornamento viene calcolato dai dati sulle prestazioni del dispositivo in 9 aree. La gravità corrisponde al punteggio numerico come indicato di seguito:
side_panal.smart_refresh.help_sec2_table_col1=Aggiorna urgenza
side_panal.smart_refresh.help_sec2_table_col2=Punteggio di aggiornamento
