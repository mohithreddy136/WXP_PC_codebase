wex.fleet.mgmt.remediation.kernel_panic_error.desc=Si è verificato un panic del kernel, ossia un errore di sistema critico da cui il kernel Linux non può effettuare il ripristino. Potrebbe essere causato da errori hardware, driver danneggiati, parametri del kernel configurati in modo errato o moduli del kernel incompatibili. È necessaria un'indagine immediata per identificare la causa principale.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt1=Esaminare i log di sistema (/var/log/messages, /var/log/syslog o journalctl) per i messaggi di errore precedenti al panic.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt2=Controllare l'integrità dell'hardware, in particolare della memoria (RAM) e del disco, utilizzando strumenti come memtest86 e smartctl.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt3=Verificare le modifiche recenti al sistema (ad esempio aggiornamenti del kernel, installazioni di driver o modifiche alla configurazione).
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt4=Se il sistema non è avviabile, eseguire l'avvio in una modalità di salvataggio o ripristino per accedere.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt5=Ripristinare o aggiornare i driver o i moduli del kernel se si sospetta che siano incompatibili.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt6=Se il problema persiste o è dovuto all'hardware, consultare il supporto del fornitore o della community.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.desc=L'abilitazione della crittografia del disco protegge i dati sensibili a riposo garantendo che tutte le informazioni memorizzate sul disco siano illeggibili senza un'adeguata autenticazione. È una misura di sicurezza critica per i sistemi che gestiscono dati riservati o regolamentati.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step1=Implementare la crittografia completa del disco utilizzando strumenti come LUKS (Linux Unified Key Setup) o dm-crypt, a seconda della distribuzione di Linux in uso.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step2=Se la crittografia completa del disco non è fattibile, crittografare le partizioni sensibili (ad esempio /home, /var o /data).
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step3=Configurare la gestione sicura delle chiavi, anche mediante passphrase o l'integrazione con TPM (Trusted Platform Module), se disponibile.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step4=Eseguire il backup delle chiavi di crittografia per evitare la perdita di dati in caso di posizionamento errato delle chiavi.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step5=Eseguire un test delle impostazioni di crittografia per verificare che il sistema si avvii correttamente e che sia possibile accedere ai dati dopo l'autenticazione.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step6=Documentare la configurazione della crittografia e le procedure di ripristino per la conformità e la continuità operativa.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step1=Installare e configurare uno strumento firewall come firewalld, ufw o iptables, a seconda della distribuzione di Linux in uso.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step2=Abilitare l'attivazione del servizio firewall all'avvio
wex.fleet.mgmt.remediation.linux_firewall_disabled.step3=Definire le regole del firewall per consentire solo i servizi necessari (ad esempio SSH, HTTP/HTTPS) e bloccare tutti gli altri.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step4=Verificare lo stato e le regole del firewall utilizzando: sudo firewall-cmd --list-all (per firewalld), sudo ufw status (per ufw)
wex.fleet.mgmt.remediation.linux_firewall_disabled.step5=Controllare regolarmente le configurazioni del firewall per garantire che siano in linea con i criteri di sicurezza e le esigenze operative.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.desc=L'abilitazione dell'avvio protetto contribuisce a proteggere il sistema dal codice non autorizzato o dannoso durante il processo di avvio verificando le firme digitali di bootloader, moduli del kernel e driver. Permette di migliorare l'integrità e la sicurezza del sistema, soprattutto negli ambienti aziendali o orientati alla conformità.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step1=Verificare che l'avvio protetto sia supportato dal firmware UEFI e controllare che sia abilitato nelle impostazioni UEFI.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step2=Installare e configurare bootloader e pacchetti del kernel firmati e compatibili con l'avvio protetto (ad esempio utilizzando shim e signed GRUB).
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step3=Verificare che il kernel, i moduli e tutti i componenti richiesti siano firmati.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step4=Riavviare e confermare lo stato dell'avvio protetto utilizzando mokutil.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step5=Registrare le chiavi personalizzate, se si utilizzano componenti non standard.
wex.fleet.mgmt.remediation.missing_linux_security_updates.desc=Nel sistema mancano uno o più aggiornamenti critici di sicurezza. Questi aggiornamenti risolvono le vulnerabilità note nel sistema operativo, nel kernel e nei pacchetti installati. La mancata applicazione può esporre il sistema ad accessi non autorizzati, violazioni dei dati o interruzioni del servizio.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step1=Esaminare e identificare le patch di sicurezza mancanti utilizzando il gestore di pacchetti del sistema (ad esempio apt, yum, dnf, zypper).
wex.fleet.mgmt.remediation.missing_linux_security_updates.step2=Applicare subito tutti gli aggiornamenti critici della sicurezza per mitigare le minacce e le vulnerabilità note.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step3=Riavviare il sistema, se necessario, soprattutto dopo gli aggiornamenti del kernel o del servizio principale.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step4=Abilitare gli aggiornamenti automatici della sicurezza o configurare una programmazione regolari di applicazione delle patch per garantire una protezione tempestiva.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step5=Verificare la riuscita dell'aggiornamento controllando i log e le versioni del pacchetto.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step6=Eseguire una scansione delle vulnerabilità post-aggiornamento per verificare che non vi siano rischi residui.
wex.fleet.mgmt.remediation.missing_linux_updates.desc=Nel sistema mancano uno o più aggiornamenti critici di Linux. Questi aggiornamenti possono comprendere patch di sicurezza, correzioni del kernel e miglioramenti della stabilità. L'esecuzione di un sistema obsoleto aumenta il rischio di vulnerabilità, arresti anomali del sistema e problemi di compatibilità.
wex.fleet.mgmt.remediation.missing_linux_updates.step1=Esaminare gli aggiornamenti disponibili utilizzando il gestore di pacchetti (ad esempio yum, dnf, apt o zypper) per identificare le patch critiche mancanti.
wex.fleet.mgmt.remediation.missing_linux_updates.step2=Applicare il prima possibile tutti gli aggiornamenti di sicurezza e del kernel per mitigare le vulnerabilità note.
wex.fleet.mgmt.remediation.missing_linux_updates.step3=Riavviare il sistema, se necessario, soprattutto dopo gli aggiornamenti del kernel o del sistema principale.
wex.fleet.mgmt.remediation.missing_linux_updates.step4=Abilitare gli aggiornamenti automatici o configurare programmazioni regolari di applicazione delle patch per garantire l'applicazione tempestiva degli aggiornamenti futuri.
wex.fleet.mgmt.remediation.missing_linux_updates.step5=Verificare la riuscita dell'aggiornamento controllando i log del sistema e le versioni attuali del kernel e del pacchetto.
wex.fleet.mgmt.remediation.network_connection_not_secure.desc=Nelle ultime 24 ore è stata segnalata una connessione di rete senza la sicurezza prevista.
wex.fleet.mgmt.remediation.network_connection_not_secure.desc1=Negli ultimi 7 giorni è stata rilevata una connessione non autenticata.
wex.fleet.mgmt.remediation.network_disconnections.desc=Nelle ultime 24 ore i dispositivi hanno segnalato ripetute disconnessioni dalla rete.
wex.fleet.mgmt.remediation.network_disconnections.desc1=Negli ultimi 7 giorni sono state rilevate disconnessioni dalla rete.
wex.fleet.mgmt.remediation.network_speed_slow.desc=La velocità di rete nominale comunicata nelle ultime 24 ore è risultata lenta.
wex.fleet.mgmt.remediation.wifi_signal_strength_weak.desc=La potenza del segnale Wi-Fi è risultata debole nelle ultime 24 ore.
wex.fleet.mgmt.score.no.data=Nessun dato
wex.fleet.mgmt.score.overall_exp=Esperienza complessiva
wex.fleet.mgmt.score.tooltip=L'esperienza si basa sul punteggio minimo.
wex.fleet.mgmt.troubleshoot.linux_firewall_disabled.description=L'abilitazione del firewall aiuta a proteggere il sistema da accessi non autorizzati, attacchi basati sulla rete e traffico indesiderato controllando le connessioni in entrata e in uscita. È un passaggio cruciale nella protezione dei sistemi Linux, soprattutto di quelli esposti a reti pubbliche o aziendali.
