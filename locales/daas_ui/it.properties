wex.fleet.mgmt.recommended.desc.antivirus_not_enabled=Abilitando Microsoft Defender è possibile ottenere una protezione essenziale contro malware e altre minacce alla sicurezza.
wex.fleet.mgmt.recommended.desc.antivirus_not_enabled_other=L'abilitazione del software antivirus consente di proteggere i dispositivi dal malware e i sistemi dagli attacchi.
wex.fleet.mgmt.recommended.desc.antivirus_signature_outdated=L'aggiornamento regolare delle definizioni del malware consente a Windows Defender di rilevare e proteggere il sistema dalle ultime minacce.
wex.fleet.mgmt.recommended.desc.antivirus_signature_outdated_other=L'aggiornamento delle definizioni del malware assicura una protezione completa contro le ultime minacce.
wex.fleet.mgmt.recommended.desc.avg_fan_speed_high=Risolvendo i problemi di velocità elevata della ventola è possibile prevenire il surriscaldamento e i danni ai componenti interni del dispositivo.
wex.fleet.mgmt.recommended.desc.battery_calibrate=La calibrazione della batteria migliora l'accuratezza delle misure dell'alimentazione e permette di aumentare la durata e le prestazioni della batteria.
wex.fleet.mgmt.recommended.desc.battery_early_detection_wear=Risolvendo i problemi di usura della batteria è possibile garantire un funzionamento efficiente dei dispositivi, prestazioni uniformi e un'autonomia prolungata.
wex.fleet.mgmt.recommended.desc.battery_needs_attention=Replacement of defective batteries can ensure good device performance, and system health. Devices which are covered by warranty may be eligible for battery replacement.
wex.fleet.mgmt.recommended.desc.bitlocker_encryption_not_enabled=L'abilitazione di BitLocker consente di proteggere i dati sensibili crittografando l'unità e migliorando la protezione complessiva contro gli accessi non autorizzati.
wex.fleet.mgmt.recommended.desc.bsod_occured=La risoluzione degli errori su schermata blu consente di garantire la stabilità del sistema, prevenire arresti inaspettati e mantenere l'affidabilità.
wex.fleet.mgmt.recommended.desc.cpu_utilization_high=L'analisi dell'utilizzo elevato della CPU consente di prevenire potenziali colli di bottiglia e di assicurare un funzionamento ininterrotto del sistema.
wex.fleet.mgmt.recommended.desc.disk_needs_attention=Disk performance is degrading and may soon lead to slower performance or instability if not addressed.
wex.fleet.mgmt.recommended.desc.disk_utilization_high=Liberando spazio su disco è possibile prevenire i rallentamenti del sistema e garantire un funzionamento uniforme evitando il sovraccarico dello storage.
wex.fleet.mgmt.recommended.desc.docking_station_ac_adapter_failed=La risoluzione degli errori dell'adattatore consente di garantire un'alimentazione costante alle docking station per evitare problemi di connettività.
wex.fleet.mgmt.recommended.desc.docking_station_ac_adapter_running_at_reduced_perofmance=Migliorando le prestazioni dell'adattatore è possibile ottenere connessioni affidabili e una funzionalità ottimale delle docking station.
wex.fleet.mgmt.recommended.desc.docking_station_firmware_out_of_date=Gli aggiornamenti del firmware per le docking station assicurano la compatibilità dei dispositivi e migliorano le prestazioni di sistema complessive.
wex.fleet.mgmt.recommended.desc.excessive_os_login_time=L'abbreviazione dei tempi di accesso riduce i ritardi e migliorare l'efficienza degli utenti durante l'accesso al sistema.
wex.fleet.mgmt.recommended.desc.excessive_os_shutdown_time=L'ottimizzazione dei tempi di arresto riduce i periodi di attesa e assicura l'efficienza degli arresti del sistema.
wex.fleet.mgmt.recommended.desc.excessive_os_startup_time=Un tempo di avvio più rapido consente di accelerare l'accesso al sistema e migliorare l'efficienza e la produttività degli utenti.
wex.fleet.mgmt.recommended.desc.firewall_disabled=L'abilitazione di Windows Firewall consente di bloccare l'accesso non autorizzato e di proteggere la rete da eventuali minacce.
wex.fleet.mgmt.recommended.desc.firewall_signature_outdated=L'aggiornamento regolare delle definizioni del firewall consente di difendersi dalle minacce di rete nuove e in evoluzione.
wex.fleet.mgmt.recommended.desc.frequent_bsod_occured=La risoluzione degli errori su schermata blu consente di garantire la stabilità del sistema, prevenire arresti inaspettati e mantenere l'affidabilità.
wex.fleet.mgmt.recommended.desc.frequent_kernel_panic_error=La risoluzione degli errori di panico del kernel migliora la stabilità del sistema, aumenta la sicurezza e previene la perdita di dati.
wex.fleet.mgmt.recommended.desc.frequent_network_disconnection=L'assenza di disconnessioni dalla rete migliora l'affidabilità e l'esperienza degli utenti e assicura un accesso ininterrotto a servizi e applicazioni.
wex.fleet.mgmt.recommended.desc.gpu_health_issue=La risoluzione dei problemi della GPU consente di evitare problemi di prestazioni grafiche e di mantenere un corretto funzionamento delle applicazioni visive.
wex.fleet.mgmt.recommended.desc.high_collaboration_sw_errors=La risoluzione dei problemi del software di collaborazione favorisce il lavoro di squadra ininterrotto e sostiene la produttività. Negli ultimi 7 giorni sono stati riscontrati oltre 10 errori software in Teams, Outlook, Zoom, Webex, Chrome, Office.
wex.fleet.mgmt.recommended.desc.high_windows_crash=La risoluzione degli arresti anomali del sistema operativo permette di garantire la stabilità del sistema, la costanza delle prestazioni e la continuità della produttività degli utenti.
wex.fleet.mgmt.recommended.desc.kernel_panic_error=La risoluzione degli errori di panico del kernel migliora la stabilità del sistema, aumenta la sicurezza e previene la perdita di dati.
wex.fleet.mgmt.recommended.desc.last_reboot_more_than_21_days=Riavviando i dispositivi è possibile cancellare i file temporanei e aggiornare i processi di sistema, migliorando le prestazioni e la stabilità complessive.
wex.fleet.mgmt.recommended.desc.linux_disk_encryption_not_enabled=L'abilitazione della crittografia del disco aumenta notevolmente la sicurezza dei dati proteggendo i contenuti dei dispositivi di archiviazione.
wex.fleet.mgmt.recommended.desc.linux_firewall_disabled=L'abilitazione del firewall Linux contribuisce a bloccare gli accessi non autorizzati e protegge la rete da potenziali minacce.
wex.fleet.mgmt.recommended.desc.linux_secure_boot_not_enabled=L'abilitazione dell'avvio protetto consente di garantire che durante il processo di avvio sia caricato solo il software considerato attendibile, migliorando così la sicurezza del sistema.
wex.fleet.mgmt.recommended.desc.memory_utilization_high=L'analisi dell'elevato utilizzo della memoria contribuisce a individuare e risolvere i problemi che potrebbero influire sulle prestazioni e sulla stabilità del sistema.
wex.fleet.mgmt.recommended.desc.missing_critical_bios_updates=L'applicazione degli aggiornamenti del BIOS garantisce la stabilità del sistema e la compatibilità con nuovi componenti hardware o software.
wex.fleet.mgmt.recommended.desc.missing_critical_driver_updates=L'aggiornamento dei driver consente di evitare malfunzionamenti dell'hardware e assicura che il sistema sia protetto, stabile e performante.
wex.fleet.mgmt.recommended.desc.missing_linux_security_updates=L'applicazione degli aggiornamenti di protezione permette di proteggere il sistema da malware ed exploit, ridurre la superficie di attacco e migliorare l'integrità del sistema.
wex.fleet.mgmt.recommended.desc.missing_linux_updates=L'installazione degli ultimi aggiornamenti risolve le vulnerabilità nel kernel, nelle librerie di sistema e nelle applicazioni. Il sistema viene protetto da exploit, malware e accessi non autorizzati.
wex.fleet.mgmt.recommended.desc.missing_windows_security_updates=L'applicazione degli aggiornamenti di sicurezza consente di proteggersi dalle più recenti minacce e vulnerabilità per tutelare il sistema dagli attacchi.
wex.fleet.mgmt.recommended.desc.missing_windows_updates=L'installazione degli ultimi aggiornamenti consente di correggere le vulnerabilità e garantire che il sistema sia sempre sicuro e funzionale.
wex.fleet.mgmt.recommended.desc.poor_network_signal_strength=Una potenza elevata del segnale assicura una connessione stabile e affidabile, che riduce al minimo le interruzioni e le disconnessioni durante le attività online.
wex.fleet.mgmt.recommended.desc.poor_nominal_speed=Velocità di Internet elevate e affidabili sono fondamentali per completare i task con efficienza, accedere ai servizi cloud e collaborare con i colleghi senza interruzioni.
wex.fleet.mgmt.recommended.desc.unauthenticated_connection=Richiedendo l'autenticazione, le organizzazioni possono impedire a dispositivi non autorizzati di connettersi alla rete, riducendo così il rischio di potenziali violazioni della sicurezza.
wex.fleet.mgmt.recommended.desc.windows_secure_boot_not_enabled=L'abilitazione di Secure Boot consente di impedire modifiche non autorizzate al firmware e al sistema operativo, migliorando la sicurezza del sistema.
