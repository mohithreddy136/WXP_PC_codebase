exp.AntivirusSoftwareIsNotEnabled.option3=Opzione 3: Se non è possibile abilitare la soluzione antivirus con le opzioni standard, riavviare il dispositivo. Se anche così non si avvia, seguire la documentazione dell'antivirus o contattare il supporto del prodotto del fornitore.
