sustainability.dashboard.info_message=I dati sul consumo energetico vengono raccolti in due modi: misurazione del consumo energetico (PCM, Power Consumption Measurement) tramite un chip integrato e consumo stimato (EC, Estimated Consumption) in base a un recente aggiornamento del BIOS per i PC HP più recenti. L'accuratezza dei dati dipende dal metodo supportato dal PC interessato.
sustainability.dashboard.info_message_data=Questo metodo calcola il consumo energetico totale in kilowattora (kWh) per ciascun dispositivo, indipendentemente dal suo stato (attivo, in sospensione, spento). Elaborando tutti i dati acquisiti alla fine di ogni settimana, fornisce una visione completa del consumo energetico del dispositivo. Inoltre, calcola e visualizza il consumo energetico totale per la settimana corrente in tempo reale, fino al momento presente.
