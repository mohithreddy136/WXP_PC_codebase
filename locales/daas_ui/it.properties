exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.responseOptions=Le opzioni di risposta variano in base all'applicazione. Se l'applicazione è business-critical, l'upgrade della CPU potrebbe risolvere il problema. Le applicazioni non business-critical possono essere rimosse dal dispositivo oppure è possibile modificarne le impostazioni essere modificate per ridurre il carico sul dispositivo.
