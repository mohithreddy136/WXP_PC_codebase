wex.labs.smart-refresh.description1=Smart Refresh consente agli amministratori IT di ottimizzare la gestione del ciclo di vita del parco dispositivi identificando i dispositivi che necessitano di aggiornamenti.
wex.labs.smart-refresh.description2=Raccomanda le sostituzioni ideali per garantire che i dipendenti dispongano sempre dei dispositivi più adatti alle loro esigenze IT.
wex.labs.smart-refresh.title=Smart Refresh
wex.labs.sub-title=Qui potete sperimentare le funzionalità Beta basate sull'intelligenza artificiale prima del lancio. Attenzione: la maggior parte dei laboratori non è definitiva, sebbene i risultati utilizzino i dati effettivi della vostra organizzazione. Date un'occhiata e fate sapere ad HP cosa ne pensate.
