bios.bsod.tooltip.context=L’impatto del BIOS è determinato dalla ponderazione, dove le occorrenze di BSOD più vicine all’upgrade in altri dispositivi dello stesso modello hanno una ponderazione maggiore. Inoltre, i modelli di dispositivi specifici con una ponderazione superiore a X% sono classificati come “ad alto impatto”. L’impatto è calcolato per ogni modello di dispositivo e si applica a tutti i dispositivi raccomandati per quella specifica versione del BIOS; se le occorrenze di BSOD sono minori per modello, la ponderazione è minore, quindi lo sarà anche l’impatto.
