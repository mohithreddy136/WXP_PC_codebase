wex.remediate.side.bar.content.script=Distribuire una correzione per risolvere i problemi nel parco dispositivi.<br><br> L'azione consigliata riunisce i dispositivi che soddisfano i criteri del problema. Le correzioni possono affrontare il problema per i dispositivi selezionati.<br><br> Selezionare uno script consigliato da HP dalla raccolta HP, oppure selezionare uno script personale.<br><br> Dopo la distribuzione, l'avanzamento e il completamento della correzione vengono visualizzati in Correzioni > Attività.<br><br>
