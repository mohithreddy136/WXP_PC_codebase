wex.onboarding.coachmark.alerts.mangagedHover=Posizionare il puntatore del mouse su un avviso per accedere alle opzioni. Gli avvisi possono essere personalizzati in base alle esigenze dell'organizzazione modificando il contenuto, il livello di gravità e la soglia di attivazione dell'avviso valida per l'intero parco dispositivi.
wex.onboarding.coachmark.alerts.options=Passa il mouse su qualsiasi avviso per accedere al menu Opzioni. Personalizza gli avvisi in base alle esigenze della tua organizzazione modificando il contenuto, regolando il livello di gravità e la soglia che innesca l’avviso valida per l’intero parco dispositivi.
wex.onboarding.coachmark.alerts.title=Gestione avvisi
wex.onboarding.coachmark.alerts.viewAlerts=È possibile visualizzare gli avvisi esistenti dell'organizzazione in qualsiasi momento. Un avviso viene creato automaticamente al superamento delle soglie preimpostate.
wex.onboarding.coachmark.alerts.viewAll=Visualizza gli avvisi configurati dell'organizzazione. È possibile gestire gli avvisi e selezionare quali ruoli dovranno ricevere le notifiche di avviso.
