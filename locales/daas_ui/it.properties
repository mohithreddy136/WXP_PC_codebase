exp.ExcessiveOsStartupTime.causeAntivirus=I servizi antivirus o altre applicazioni a uso intensivo del disco richiedono un tempo eccessivo per il caricamento.
exp.ExcessiveOsStartupTime.causeGroupPolicyDownload=Il download degli oggetti dei criteri di gruppo durante il riavvio del sistema richiede molto tempo per il completamento.
exp.ExcessiveOsStartupTime.causeSlowDomainLink=Il PC potrebbe presentare un collegamento lento al controller di dominio da cui vengono scaricati i GPO durante l'avvio.
exp.ExcessiveOsStartupTime.causeStartupScripts=Gli script di avvio richiedono un tempo eccessivo per il completamento.
exp.ExcessiveOsStartupTime.option1=Opzione 1: Windows 11 - App di avvio in Impostazioni
exp.ExcessiveOsStartupTime.option1Guide=Per migliorare le prestazioni del dispositivo e risolvere il problema del tempo di accesso lento, la soluzione migliore è rimuovere le applicazioni dall'avvio in fase di accesso. Per i dispositivi Windows 11, Microsoft offre una guida per il controllo dell'avvio di Windows.
