exp.NetworkConnectionNotSecure.moreInfo.linkText=Guida per le reti Wi-Fi non sicure (Microsoft Learn)
exp.NetworkConnectionNotSecure.moreInfo.linkText1=Ulteriori informazioni sulla protezione della rete
exp.NetworkConnectionNotSecure.moreInfoHeader=Ulteriori informazioni:
exp.NetworkConnectionNotSecure.moreInformationHeader=Ulteriori informazioni:
exp.NetworkConnectionNotSecure.recAccessControl=Implementare un software di controllo degli accessi alla rete per limitare l'accesso.
exp.NetworkConnectionNotSecure.recChangeSecurity=Modifica configurazione di sicurezza rete Wi-Fi domestica
exp.NetworkConnectionNotSecure.recChangeSecurity.step1=accedere al router utilizzando il relativo software di gestione.
exp.NetworkConnectionNotSecure.recChangeSecurity.step2=Consente di modificare il tipo di sicurezza per la rete Wi-Fi domestica.
exp.NetworkConnectionNotSecure.recChangeSecurity.step3=Selezionare un protocollo di autenticazione moderno (ad esempio WPA2 o WPA3).
exp.NetworkConnectionNotSecure.recCheckPCSettings=Esaminare le impostazioni di rete del dispositivo.
exp.NetworkConnectionNotSecure.recCheckPCSettings.detail=Verificare che il firewall sia abilitato e che la rete sia contrassegnata come privata, se del caso.
exp.NetworkConnectionNotSecure.recCheckRouterSettings=Esaminare le impostazioni di sicurezza del router.
exp.NetworkConnectionNotSecure.recCheckRouterSettings.detail=Abilitare la crittografia, impostare una password di amministratore complessa e disabilitare WPS se non è necessario.
exp.NetworkConnectionNotSecure.recCheckSecurityProtocol=Controllare il protocollo di sicurezza wireless.
exp.NetworkConnectionNotSecure.recCheckSecurityProtocol.detail=Utilizzare WPA2 o WPA3; evitare le reti aperte o WEP.
exp.NetworkConnectionNotSecure.recCheckSSID=Verificare che il SSID sia corretto.
exp.NetworkConnectionNotSecure.recCheckSSID.detail=Verificare che il nome della rete corrisponda al punto di accesso attendibile.
exp.NetworkConnectionNotSecure.recEnableEncryption=Abilitare la crittografia di rete per proteggere la trasmissione dei dati.
exp.NetworkConnectionNotSecure.recMacFiltering=Utilizzare il filtraggio degli indirizzi MAC per consentire solo i dispositivi approvati.
exp.NetworkConnectionNotSecure.recMonitorActivity=Monitorare l'attività di rete per rilevare i dispositivi non autorizzati.
exp.NetworkConnectionNotSecure.recommendationsHeader=Raccomandazioni:
exp.NetworkConnectionNotSecure.recommendationsHeader1=Raccomandazioni:
exp.NetworkConnectionNotSecure.recStrongPasswords=Impostare password complesse e univoche per proteggere l'accesso alla rete.
exp.NetworkConnectionNotSecure.recUpdateFirmware=Aggiornare regolarmente il firmware del router e del dispositivo contro le vulnerabilità.
exp.NetworkConnectionNotSecure.recUpgradeRouter=Effettuare l'upgrade di un router o un punto di accesso obsoleto agli standard di sicurezza più recenti.
exp.NetworkDisconnections.causeInsufficientSpeed=Velocità Internet insufficiente
exp.NetworkDisconnections.causeInsufficientSpeed.detail1=Una larghezza di banda ridotta durante i picchi di utilizzo può creare instabilità e interruzioni frequenti.
exp.NetworkDisconnections.causeInsufficientSpeed.detail2=Raccomandazione: eseguire i test di velocità e aggiornare il piano di servizio se la larghezza di banda disponibile è inadeguata.
exp.NetworkDisconnections.causeInterference=Interferenze wireless o ostacoli fisici.
exp.NetworkDisconnections.causeOutdatedRouter=Router o modem non aggiornato presso l'abitazione
exp.NetworkDisconnections.causeOutdatedRouter.detail1=Un router obsoleto potrebbe non supportare gli standard più recenti o un numero elevato di dispositivi connessi, causando congestione della rete e disconnessioni
exp.NetworkDisconnections.causeOutdatedRouter.detail2=Raccomandazione: mantenere aggiornate le apparecchiature di rete; eseguire un ripristino delle impostazioni di fabbrica per cancellare le impostazioni danneggiate.
exp.NetworkDisconnections.causeOutdatedRouter.detail3=Se i problemi persistono o se l'hardware è obsoleto, effettuare l'upgrade a un modello più recente per garantire l'affidabilità.
exp.NetworkDisconnections.causePoorWifiSignal=Segnale Wi-Fi scadente
exp.NetworkDisconnections.causePoorWifiSignal.detail1=Un segnale debole o ostruito può causare una connettività instabile del dispositivo.
exp.NetworkDisconnections.causePoorWifiSignal.detail2=Raccomandazione: collocare il router in una posizione centrale e regolare il canale o la frequenza per ridurre le interferenze.
exp.NetworkDisconnections.causeRouterIssues=Problemi del firmware o dell'hardware del router.
exp.NetworkDisconnections.causeSoftwareDriverIssues=Problemi del software o dei driver
exp.NetworkDisconnections.causeSoftwareDriverIssues.detail1=Il firmware o i driver obsoleti o danneggiati possono compromettere la stabilità della connessione.
exp.NetworkDisconnections.causeSoftwareDriverIssues.detail2=Raccomandazione: abilitare gli aggiornamenti automatici e mantenere aggiornato tutto il software relativo alla rete.
exp.NetworkDisconnections.causeUnprotectedNetwork=Rete non protetta
exp.NetworkDisconnections.causeUnprotectedNetwork.detail1=Gli utenti non autorizzati che consumano larghezza di banda possono causare disconnessioni e perdite di prestazioni.
exp.NetworkDisconnections.causeUnprotectedNetwork.detail2=Raccomandazione: utilizzare una password del Wi-Fi univoca e complessa per impedire l'accesso non autorizzato.
exp.NetworkDisconnections.possibleCauses=Possibili cause
exp.NetworkDisconnections.possibleCausesHeader=Possibili cause:
exp.NetworkDisconnections.recCheckCables=Controllare i cavi di rete fisici.
exp.NetworkDisconnections.recCheckCables.detail=Verificare che tutti i cavi siano collegati saldamente e non siano danneggiati.
exp.NetworkDisconnections.recommendationsHeader=Raccomandazioni:
exp.NetworkDisconnections.recReduceInterference=Ridurre le interferenze wireless.
exp.NetworkDisconnections.recReduceInterference.detail=Spostare i dispositivi o cambiare il canale per evitare la sovrapposizione dei segnali.
exp.NetworkDisconnections.recRestartRouter=Riavviare il modem e il router.
exp.NetworkDisconnections.recRestartRouter.step1=Spegnere prima il modem e poi il router; attendere prima di riaccenderli.
exp.NetworkDisconnections.recUpdateFirmware=Aggiornare il firmware del router.
exp.NetworkDisconnections.recUpdateFirmware.detail=Controllare il sito del fornitore e applicare il firmware stabile più recente.
exp.NetworkSpeedSlow.causeObstacles=Punto di accesso dietro muri o ostacoli.
exp.NetworkSpeedSlow.causeOutdatedFirmware=Il firmware del router potrebbe essere obsoleto.
exp.NetworkSpeedSlow.possibleCausesHeader=Possibili cause:
exp.NetworkSpeedSlow.recAvoidInterference=Evitare le interferenze tra canali.
exp.NetworkSpeedSlow.recAvoidInterference.detail=Cambiare il canale wireless per ridurre la sovrapposizione con le reti vicine.
exp.NetworkSpeedSlow.recChangeFrequency=Cambiare la banda di frequenza del router.
exp.NetworkSpeedSlow.recChangeFrequency.detail=Spostarsi tra 2,4 GHz e 5 GHz (o 6 GHz, se supportato) per ottimizzare la velocità.
exp.NetworkSpeedSlow.recCheckOtherDevices=Controllare l'utilizzo di altri dispositivi.
exp.NetworkSpeedSlow.recCheckOtherDevices.detail=I download di grandi dimensioni o lo streaming altrove possono ridurre la larghezza di banda disponibile.
exp.NetworkSpeedSlow.recMoveRouter=Spostare il router.
exp.NetworkSpeedSlow.recMoveRouter.detail=Riposizionarlo in modo da ridurre le ostruzioni ed evitare ostacoli in linea d'aria.
exp.NetworkSpeedSlow.recommendationsHeader=Raccomandazioni:
exp.NetworkSpeedSlow.recRestartRouter=Riavviare il modem e il router.
exp.NetworkSpeedSlow.recRestartRouter.step1=Spegnere il modem e poi il router; attendere; accendere il modem e poi il router.
exp.NetworkSpeedSlow.recUpdateDrivers=Aggiornare i driver di rete/Wi-Fi.
exp.NetworkSpeedSlow.recUpdateDrivers.detail=Installare i driver più recenti della scheda di rete per risolvere i problemi di prestazioni.
exp.NetworkSpeedSlow.recUpdateFirmware=Aggiornare il firmware del router.
exp.NetworkSpeedSlow.recUpdateFirmware.detail=Applicare il firmware più recente del fornitore per correggere i bug e migliorare le prestazioni.
