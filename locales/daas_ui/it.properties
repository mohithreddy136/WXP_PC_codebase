welcome.whats_new.line1=Jonathan Nikols, VP e Responsabile globale di HP TechPulse
welcome.whats_new.line2=HP ha appena celebrato il primo anniversario della distribuzione di TechPulse Plans ai nostri clienti e partner, ed è stato davvero un grande anniversario! Nell'ottobre 2018, HP è stata orgogliosa di ricevere dalla Technology Services Industry Association (TSIA) il riconoscimento STAR Award for Innovation 2018 per l'offerta e/o il catalogo di servizi gestiti standard per la nostra soluzione TechPulse. È stato un evento particolarmente importante: si è trattato, infatti, del quindicesimo riconoscimento TSIA attribuito ad HP e ha innalzato la posizione di HP nella Hall of Fame dei vincitori dei premi di TSIA.
welcome.whats_new.line3=Proactive Management unito ad HP TechPulse Plans consentirà ai nostri clienti di ottenere maggiori risultati dagli investimenti IT esistenti, li supporterà nel loro percorso verso Windows 10 e aprirà le porte a processi decisionali migliori e più intelligenti per dare nuovo impulso ai risultati di business. Per i partner, il nostro obiettivo attuale è migliorare l'esperienza della fornitura di servizi TechPulse, aumentando lo spazio della soluzione TechPulse indirizzabile e semplificando il processo di supporto ai clienti nell'individuazione dei servizi più adeguati per il ciclo di vita, da integrare nel proprio TechPulse Plan preferito.
welcome.whats_new.line4=Fondamentale per il successo globale di TechPulse è l'attenzione alla piattaforma, alla tecnologia e ai processi che ci consentono di realizzare servizi innovativi. HP Proactive Management con TechPulse è intelligente, veloce e potente come mai prima e insieme stiamo gettando le basi di un futuro davvero luminoso.
welcome.whats_new.line5=Ancora grazie per averci seguito in questo viaggio entusiasmante e siamo sicuri che ci attenderanno ancora molti anni di proficua collaborazione!
