exp.AntivirusSignatureUpdatesNeeded.option2=Opzione 2: Per le soluzioni antivirus gestite dall'utente, l'utente dovrà aprire la console di amministrazione dell'antivirus e seguire la procedura per pianificare o attivare un aggiornamento delle firme. È consigliabile configurare la soluzione antivirus in modo che scarichi gli aggiornamenti almeno una volta alla settimana.
