wex.onboarding.coachmark.alerts.active.desc=Tutti gli avvisi attivi per l'organizzazione sono visualizzati qui, insieme a informazioni importanti quali stato, gravità e ultima attivazione. Gli amministratori IT possono personalizzare gli avvisi in base alle esigenze dell'organizzazione, cambiando soglie e livelli di gravità, nonché disabilitando gli avvisi non necessari.
wex.onboarding.coachmark.alerts.desc=Consente di monitorare i problemi attivi nel parco dispositivi in cui sono state superate le soglie configurate. È possibile esaminare rapidamente dettagli importanti come riepiloghi dei problemi, livelli di gravità e impatto, prima di intraprendere le azioni di correzione.
