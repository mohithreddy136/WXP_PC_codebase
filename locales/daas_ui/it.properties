azureonboard.marketing.signupcard.description=Ottieni l’accesso a PC Health e agli approfondimenti predittivi per favorire un migliore processo decisionale e risolvere i problemi emergenti prima che abbiano un impatto sul business.
azureonboard.marketing.signupcard.footertext=Selezionando il pulsante, accetto i <a target='_blank' href={termsLink}>Termini e condizioni</a>, acconsento a fornire i dati richiesti per la configurazione dell'account e accetto di ricevere comunicazioni e-mail da HP o dai partner HP riguardo alla versione di prova.
