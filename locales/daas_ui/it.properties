wex.ra.remediation.antivirus_not_enabled=Microsoft Defender Antivirus è un software antivirus incluso in Windows che può aiutare a proteggere il dispositivo da virus, malware e altre minacce.
wex.ra.remediation.antivirus_signature_outdated=Per garantire una protezione ottimale, i file di definizione dell'antivirus devono essere aggiornati.
wex.ra.remediation.antivirus_signature_outdated_other=Per proteggere il dispositivo da virus, malware e altre minacce, il dispositivo è configurato per l'utilizzo di un antivirus di terze parti non Microsoft, ma è necessario aggiornare le definizioni antivirus sul dispositivo.
wex.ra.remediation.app_crash=Oltre 10 errori software in Teams, Outlook, Zoom, Webex, Chrome, Office negli ultimi 7 giorni.
wex.ra.remediation.avg_fan_speed_high=La velocità media della ventola è elevata per un periodo di tempo prolungato.
wex.ra.remediation.battery_calibrate=La batteria richiede una calibrazione.
wex.ra.remediation.battery_early_detection_wear=Secondo le previsioni, entro 30 giorni la batteria avrà una capacità di carica completa inferiore al 70%.
wex.ra.remediation.battery_needs_attention=Workforce Experience Platform displays records of battery warnings and failures that can be used to obtain service for a battery that is experiencing issues
wex.ra.remediation.bitlocker_encryption_not_enabled=Per proteggere i dati a riposo, è fortemente consigliata la crittografia del disco.
wex.ra.remediation.bsod=Si sono verificati più di 3 eventi di controllo dei bug (eventi BSOD) negli ultimi 7 giorni.
wex.ra.remediation.bsod_occured=Il dispositivo ha registrato 1 o più eventi di controllo dei bug negli ultimi 7 giorni.
wex.ra.remediation.cpu_utilization_high=Possibili cause: un'applicazione in esecuzione è bloccata o non risponde.
wex.ra.remediation.disk_needs_attention=Workforce Experience Platform visualizza i registri delle avvertenze e dei guasti del disco, utilizzabili per ottenere l'assistenza per un disco che presenta problemi.
wex.ra.remediation.disk_utilization_high=Hard disk is near full disk capacity and low in free space.
wex.ra.remediation.docking_station_ac_adapter_failed=The Docking Station AC Adapter is having a hardware issue.
wex.ra.remediation.docking_station_ac_adapter_running_at_reduced_perofmance=L'alimentatore CA della docking station non funziona correttamente.
wex.ra.remediation.docking_station_firmware_out_of_date=Possible Causes: The docking station may require a Firmware or Driver update.
wex.ra.remediation.excessive_os_shutdown_time=L'arresto richiede 3 o più minuti.
wex.ra.remediation.excessive_os_startup_time=L'avvio del sistema richiede più di 3 minuti.
wex.ra.remediation.firewall_disabled=Firewall impedisce agli hacker e al software dannoso di accedere al PC attraverso Internet o una rete.
wex.ra.remediation.firewall_signature_outdated=Il firewall richiede aggiornamenti regolari per garantire una protezione ottimale contro gli attacchi di rete.
wex.ra.remediation.frequent_bsod_occured=Negli ultimi 7 giorni si sono verificati più di 3 eventi di controllo dei bug (eventi BSOD).
wex.ra.remediation.frequent_network_disconnection=Per le reti domestiche, occorre verificare che il firmware del router sia aggiornato e collocare il router in una posizione centrale per ridurre al minimo le interferenze. Inoltre, è possibile ridurre il numero di dispositivi connessi e valutare la possibilità di impiegare un collegamento via cavo per i dispositivi più importanti in modo che la connessione alla rete sia stabile e affidabile.
wex.ra.remediation.gpu_health_issue=Workforce Experience Platform ha rilevato un problema della GPU che richiede attenzione immediata.
wex.ra.remediation.high_collaboration_sw_errors=Negli ultimi 7 giorni, oltre 10 errori software in Teams, Outlook, Zoom, Webex, Chrome, Office.
wex.ra.remediation.high_windows_crash=Il sistema operativo ha subito 1 o più arresti anomali o riavvii negli ultimi 7 giorni.
wex.ra.remediation.last_reboot_more_than_21_days=L'ultimo riavvio risale a più di 21 giorni fa.
wex.ra.remediation.maximise_my_battery_health_not_enabled=HP Battery Health Manager is available on all HP business notebooks since 2016. To improve battery life, it is recommended that Battery Health Manager be enabled
wex.ra.remediation.memory_utilization_high=The average Memory utilization over the last 30 days is 85% or greater.
wex.ra.remediation.missing_critical_bios_updates=Per i dispositivi compatibili, aggiorna il BIOS dalla piattaforma selezionando i dispositivi in basso e facendo clic su "Applica policy". Per i dispositivi incompatibili, aggiorna i driver di sistema e il firmware utilizzando Windows Update o HP Image Assistant.
wex.ra.remediation.missing_critical_driver_updates=Il report sull'inventario dei driver contiene un inventario dettagliato dei dispositivi che non dispongono di aggiornamenti critici dei driver.
wex.ra.remediation.missing_windows_security_updates=Il dashboard Sicurezza di Workforce Experience Platform contiene KPI che visualizzano il numero di dispositivi in cui non sono installati gli aggiornamenti di sicurezza di Windows.
wex.ra.remediation.os_crash=Il sistema operativo ha subito 1 o più arresti anomali o riavvii negli ultimi 7 giorni.
wex.ra.remediation.poor_network_signal_strength=Per le reti domestiche, è consigliabile riavviare il router o riposizionarlo in modo da ridurre il numero di ostacoli tra il punto e di accesso e il PC, migliorando così la potenza del segnale Wi-Fi.
wex.ra.remediation.poor_nominal_speed=Per le reti domestiche, è utile effettuare l'upgrade del router a un nuovo modello che supporti gli standard Wi-Fi più recenti, ad esempio Wi-Fi 6. Inoltre, è possibile ottimizzare il layout della rete collocando il router in una posizione centrale, riducendo le interferenze prodotte da altri dispositivi e utilizzando ove possibile collegamenti via cavo per assicurare la stabilità delle prestazioni.
wex.ra.remediation.unauthenticated_connection=Per le reti domestiche, è utile selezionare un protocollo di crittografia robusto, ad esempio WPA2 o WPA3, e impostare una password complessa per l'accesso. Inoltre, è possibile valutare l'implementazione del filtraggio degli indirizzi MAC e l'aggiornamento regolare del firmware del router per migliorare la sicurezza e impedire connessioni non autorizzate.
wex.ra.remediation.windows_secure_boot_not_enabled=Avvio protetto è uno standard di sicurezza sviluppato dai membri del settore informativo per garantire che un dispositivo venga avviato usando solo software considerato attendibile dal relativo OEM (Original Equipment Manufacturer).
