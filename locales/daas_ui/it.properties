exp.CollaborationSoftwareErrorsAreHigh.causeConflicts=Conflitti tra applicazioni software diverse o estensioni, ad esempio estensioni o componenti aggiuntivi del browser, possono interferire con il corretto funzionamento degli strumenti di collaborazione e generare numerosi errori.
exp.CollaborationSoftwareErrorsAreHigh.causeNetwork=Problemi di connettività di rete, come connessioni Internet lente o instabili, possono causare interruzioni ed errori negli strumenti di collaborazione che richiedono comunicazioni e trasferimenti di dati in tempo reale.
exp.CollaborationSoftwareErrorsAreHigh.causeUpdates=Operazioni frequenti di aggiornamento del software o applicazione di patch possono introdurre nuovi bug o problemi di compatibilità, con conseguente aumento del numero di errori in applicazioni come Teams, Outlook, Zoom, Webex, Chrome e Office.
exp.CollaborationSoftwareErrorsAreHigh.possibleCauses=Possibili cause:
exp.CollaborationSoftwareErrorsAreHigh.remediationConflicts=Risolvere i conflitti disabilitando o rimuovendo le estensioni o i componenti aggiuntivi problematici e garantendo la compatibilità tra applicazioni software diverse.
exp.CollaborationSoftwareErrorsAreHigh.remediationNetwork=Migliorare la stabilità della rete aggiornando le connessioni Internet, risolvendo i problemi di connettività e garantendo una larghezza di banda adeguata per gli strumenti di collaborazione.
exp.CollaborationSoftwareErrorsAreHigh.remediationUpdates=Controllare regolarmente la disponibilità e applicare aggiornamenti del software e patch per assicurarsi che risolvano bug e problemi di compatibilità noti.
exp.CollaborationSoftwareErrorsAreHigh.suggestedRemediations=Correzioni suggerite:
exp.CollaborationSoftwareErrorsAreHigh.title=Risolvi errori software di collaborazione
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.appsCausingHighCpu=Le applicazioni con l'utilizzo più elevato della CPU saranno identificate nella colonna Applicazioni che causano un elevato utilizzo della CPU.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeBackgroundProcesses=Numerosi processi e servizi eseguiti in background, tra cui aggiornamenti di sistema, scansioni antivirus e altre attività di manutenzione, possono utilizzare la CPU fino alla capacità massima e generare un utilizzo elevato.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeFirmwareBug=Un bug del firmware potrebbe provocare il funzionamento della CPU a livelli superiori a quelli previsti.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeMalfunctioningSoftware=Il software scarsamente ottimizzato o malfunzionante può causare un utilizzo elevato della CPU, in particolare se è bloccato in un loop o consuma risorse in modo inefficiente.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeResourceIntensiveApps=L'esecuzione di applicazioni a uso intensivo di risorse, come editor di video, macchine virtuali o calcoli complessi, può comportare un consumo significativo di risorse della CPU, con conseguente utilizzo elevato.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.closeHighCpuApps=Chiudere le applicazioni con l'utilizzo più elevato della CPU.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.connectAcAdapter=Effettuare il collegamento a un adattatore CA perché, a seconda delle impostazioni di alimentazione del dispositivo, la CPU alimentata a batteria potrebbe funzionare a prestazioni ridotte.
