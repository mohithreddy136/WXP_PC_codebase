exp.EarlyDetectionWear.causeDeepDischarge=Frequenti operazioni di scarica profonda, in cui la batteria viene scaricata completamente prima della ricarica, possono accelerare l'usura e ridurre la durata complessiva della batteria.
exp.EarlyDetectionWear.causeHighTemp=Alte temperature, derivanti dal funzionamento del dispositivo in ambiente caldo o dall'esposizione al calore, possono causare stress termico e degradare le prestazioni della batteria nel corso del tempo.
