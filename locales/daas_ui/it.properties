wpt.details.desc=Proteggi i dati in modo affidabile, monitora il tuo parco dispositivi HP e impedisci a utenti non autorizzati l’accesso a file e documenti in rete con HP {appName}, il miglior servizio al mondo di individuazione, blocco e cancellazione. Con tecnologia HP Workforce Experience Platform, HP {appName} fornisce un servizio completo basato su hardware per individuare, bloccare e cancellare i dispositivi, anche quando i PC sono offline o spenti.
wpt.details.header=Stabilire la prima linea di difesa
wpt.disclaimer.point1=Sulla base di un'analisi interna HP relativa ai servizi software di ricerca, blocco e cancellazione. Massima sicurezza basata su crittografia e persistenza (inclusa la persistenza applicata tramite hardware) a partire da ottobre 2021.
wpt.disclaimer.point2=HP {appName} è disponibile su specifici laptop HP Elite Dragonfly 600, 800, 1000 con sistema operativo Windows, su determinati desktop 800 e Workstation Z1 G8 che funzioneranno quando il dispositivo è acceso e connesso a Internet.
wpt.disclaimer.point3=HP Workforce Experience Platform è una piattaforma di telemetria e analisi che fornisce dati critici sui dispositivi e sulle applicazioni e non è in vendita come servizio indipendente. HP Workforce Experience Platform segue le rigorose norme sulla privacy del regolamento GDPR ed è certificata ISO27001, ISO27701, ISO27017 e SOC2 Type2 per la sicurezza delle informazioni. È richiesto l'accesso a Internet con connessione al portale Workforce Experience Platform. Per i requisiti di sistema completi, visita <a href=\"{link}\" target=\"_blank\" style=\"text-decoration: none; color: #027aae; cursor: pointer;\">{text}</a>.
wpt.disclaimer.point4=L'applicazione tramite hardware è disponibile per HP Sure Run Gen4 e versioni successive, nei PC HP compatibili con questo servizio che richiede Windows 10 e versioni superiori.
wpt.disclaimer.point5=I livelli di servizio e i tempi di risposta per l'assistenza hardware HP possono variare in base all'area geografica. Il servizio prende il via dalla data di acquisto dell'hardware. Sono applicabili restrizioni e limitazioni. Per i dettagli, visitare <a href="https://www.hp.com/go/cpc" target="_blank" style="text-decoration: none; color: #027aae; cursor: pointer;">www.hp.com/go/cpc</a>. I servizi HP sono disciplinati dai termini e dalle condizioni del servizio HP forniti o indicati al cliente al momento dell'acquisto. Il cliente potrebbe disporre di ulteriori diritti legali ai sensi delle leggi locali in vigore; tali diritti non sono in alcun modo influenzati dai termini e dalle condizioni del servizio HP o dalla garanzia limitata HP fornita con il prodotto HP.
wpt.explore.header=Esplora soluzione
wpt.feature.cost.desc=Il danno economico non è l’unica conseguenza della perdita di un PC, né l'aspetto più importante. Con HP {appName} attenuerai i rischi e ridurrai i costi associati alla perdita di un PC. Avrai finalmente a disposizione un sistema completo per rintracciare un PC smarrito o rubato e bloccare o cancellare facilmente i dati.
wpt.feature.cost.title=Ridurre i costi e le problematiche
wpt.feature.data.desc=Utilizzate il nostro servizio più sicuro con crittografia a soglia per individuare, bloccare e cancellare i dati da tutti i vostri dispositivi HP, garantendo la protezione delle informazioni riservate.
wpt.feature.data.title=Proteggere i propri dispositivi e i dati
wpt.feature.monitoring.desc=Con il dashboard utente semplificato di HP Workforce Experience Platform, gli ITDM possono intervenire più velocemente in caso di smarrimento o furto di dispositivi, monitorando lo stato di integrità e protezione di tutti i dispositivi su un’unica piattaforma intuitiva.
