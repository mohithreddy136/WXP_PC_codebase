asset_details_last_fast_startup=Ultimo avvio rapido
asset_details_last_fast_startup.cause1=Shutdown triggered by Power button settings (if configured to shutdown when Fast Boot is disabled)
asset_details_last_fast_startup.cause2=Shutdown triggered by Lid Close settings (if configured to shutdown when Fast Boot is disabled)
asset_details_last_fast_startup.cause3=Shutdown triggered by Start > Shutdown
asset_details_last_fast_startup.description=Allows Windows to start faster by saving part of the system state to disk (hiberfile), instead of performing a complete initialization
asset_details_last_fast_startup.enable_step1a=Aprire il Pannello di controllo
asset_details_last_fast_startup.enable_step1b=Accedere a Hardware e suoni
asset_details_last_fast_startup.enable_step1c=Opzioni risparmio energia.
asset_details_last_fast_startup.enable_step2=Click Choose what the power buttons do.
asset_details_last_fast_startup.enable_step3=Click Change settings that are currently unavailable.
asset_details_last_fast_startup.enable_step4=Nelle impostazioni di arresto, selezionare Attiva avvio rapido (consigliato).
asset_details_last_fast_startup.enable_step5=Click Save changes.
asset_details_last_fast_startup.final_note=Fast startup only applies to Shutdown > Start, not to restarts.
asset_details_last_fast_startup.hibernation_note=L'avvio rapido richiede che sia abilitata l'ibernazione. Se l'opzione non è presente, eseguire questo comando da un prompt dei comandi con privilegi elevati.
asset_details_last_fast_startup.note.description=Questo timestamp indica l'inizio della sessione di avvio rapido più recente, che si verifica quando:
asset_details_last_fast_startup.note.point1=Il sistema viene arrestato con l'avvio rapido abilitato (arresto ibrido)
asset_details_last_fast_startup.note.point2=When Fast Startup is disabled, then Last Fast Startup will display Disabled
asset_details_last_fast_startup.note.point3=Important: In Fast Startup, Last restart remains unchanged and reflects the last full boot or restart.
asset_details_last_logon=Last Login
asset_details_last_logon_duration=Last logon duration
asset_details_last_restart=Ultimo riavvio
asset_details_last_restart.advantage1=A full boot ensures all drivers, services, and hardware states are reset, helping prevent lingering issues from partial restarts or cached sessions.
asset_details_last_restart.advantage2=Consigliato durante la risoluzione dei problemi di sistema o dopo aggiornamenti importanti per garantire un avvio pulito.
asset_details_last_restart.advantage3=Produces a more accurate measure of system performance compared to Fast Startup.
asset_details_last_restart.cause1=Riavvio avviato dall'utente (Start > Riavvia)
asset_details_last_restart.cause2=Full shutdown via Start menu (Start > Shift + Shutdown)
asset_details_last_restart.cause3=Shutdown via press and hold of the Power button
asset_details_last_restart.cause4=Shutdown triggered by Power button settings (if configured to shut down when Last Fast Startup is disabled)
asset_details_last_restart.cause5=Shutdown triggered by Lid Close settings (if configured to shutdown when Last Fast Startup is disabled)
asset_details_last_restart.cause6=Automatic shutdown due to battery drain
asset_details_last_restart.cause7=Unexpected OS shutdowns (such as BSOD, or forced shutdown)
asset_details_last_restart.cause8=User-initiated or Windows Update-initiated pending restart due to Windows Update installation
asset_details_last_restart.cause9=Riavvio avviato da un processo utente (tramite script o richiesta programmata)
asset_details_last_restart.description1=Windows closes apps, stops services, unloads drivers, and reinitializes the OS kernel before booting fresh.
asset_details_last_restart.description2=Al riavvio possono essere applicati aggiornamenti, corretti i problemi di prestazioni e cancellata la memoria.
asset_details_last_restart.description3=Windows does not use Fast Startup during restart. Instead it performs a clean OS restart but keeps certain hardware states warm.
asset_details_last_restart.full_boot=Avvio completo
asset_details_last_restart.full_boot.description=Quando si esegue un riavvio con avvio completo, Windows ricarica completamente il sistema operativo e reinizializza i componenti hardware. A differenza di un riavvio standard, o di un arresto con avvio rapido, questo processo non preserva la sessione del kernel: tutto inizia da zero, in maniera simile all'accensione dopo un arresto completo.
asset_details_last_restart.full_boot.timestamp=This timestamp is the start of the last full system boot (cold boot or warm boot), regardless of what caused the Startup.
asset_details_last_restart.note1=Questo timestamp viene aggiornato solo quando si verifica un avvio completo/riavvio, ovvero quando Windows inizializza completamente una nuova sessione.
asset_details_last_restart.note2=Quando è abilitato l'avvio rapido, questo campo non si aggiorna per le sessioni ibride/di avvio rapido; riflette unicamente l'ultimo riavvio completo.
