dnto.subscriptions.privacy_statement.desc1=HP riconosce che la privacy è un diritto umano fondamentale e riconosce altresì l'importanza della privacy, della sicurezza e della protezione dei dati dei suoi clienti e partner in tutto il mondo. In qualità di organizzazione globale, con entità legali, processi aziendali, strutture di gestione e sistemi tecnici che attraversano i confini internazionali, ci impegniamo ad assicurare per tutte le nostre operazioni dispongano di livelli di protezione che superano i requisiti legali minimi e a distribuire politiche e procedure rigorose e coerenti.
dnto.subscriptions.privacy_statement.desc2=Nel presente documento, termini come "noi" e "azienda" si riferiscono alle aziende a marchio HP e alle consociate attuali e future, come definito dalla legge locale (di seguito "HP"). I recapiti del Data Protection Officer di HP sono disponibili nella sezione "{0}" che segue.
