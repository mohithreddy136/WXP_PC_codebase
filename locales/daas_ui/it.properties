dnto.subscriptions.about_hp.desc1=Siamo un'azienda tecnologica che ritiene che le società non dovrebbero pensare unicamente al profitto. Dovrebbero rendere il mondo un posto migliore. Il nostro impegno nell'azione per il clima, nei diritti umani e nella digital equity dimostra che stiamo facendo tutto quanto in nostro potere per raggiungere tale obiettivo.
dnto.subscriptions.about_hp.desc2=Oltre 80 anni di attività dimostrano le nostre intenzioni: per questo, siamo in grado di immaginare un mondo in cui l'innovazione assicura contributi straordinari all'umanità.
dnto.subscriptions.about_hp.desc3=La nostra tecnologia, una gamma di prodotti e servizi per sistemi personali, stampanti e soluzioni di stampa 3D, è stata creata per ispirare questo importante progresso.
dnto.subscriptions.about_hp.desc4=Sappiamo che le idee geniali possono venire a chiunque, in qualsiasi luogo e in qualsiasi momento.
dnto.subscriptions.about_hp.desc5=Ne basta una per cambiare il mondo.
