welcome.banner.description=TechPulse è una piattaforma di analisi e telemetria che fornisce dati cruciali su dispositivi e applicazioni, mettendo l'apprendimento automatico a disposizione del reparto IT per consentire la fornitura ai dipendenti dei PC, del software e dei servizi necessari per avere successo. HP TechPulse identifica i problemi in modo proattivo, mette a disposizione le soluzioni idonee e riduce al minimo le minacce monitorando attivamente l'atteggiamento dell'organizzazione nei confronti della sicurezza.
welcome.banner.description_p={app_name} è una piattaforma di analisi e telemetria che fornisce dati cruciali su dispositivi e applicazioni, mettendo l'apprendimento automatico a disposizione del reparto IT per consentire la fornitura ai dipendenti dei PC, del software e dei servizi necessari per raggiungere i propri obiettivi. {app_name} individua i problemi in modo proattivo, mette a disposizione le soluzioni idonee e riduce al minimo le minacce monitorando attivamente il livello di sicurezza dell'organizzazione.
welcome.banner.description_p1={app_name} è una piattaforma di telemetria e analisi basata sul cloud che aggrega dati critici di configurazione e integrità dai propri dispositivi e applicazioni. Utilizzando IA e deep learning, analizza questi dati per identificare proattivamente i problemi, fornire rimedi specifici e ridurre al minimo le minacce alla sicurezza.
welcome.banner.title=Piattaforma di automazione che fornisce servizi di prima classe attraverso dati significativi reperiti da miliardi di punti dati
welcome.banner.title1={app_name} mette a disposizione informazioni strategiche per prevedere e risolvere i problemi ai dispositivi prima che si verifichino
