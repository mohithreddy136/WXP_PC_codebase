account_management.subscriptions.addon.anyware.azure_notice=La licenza attualmente è offerta solo in Azure Marketplace. La licenza di HP Anyware Standard comprende l'accesso ad HP Anyware Manager Enterprise.
account_management.subscriptions.addon.anyware.desc=Eseguite la gestione e il provisioning dei desktop remoti per il team. Gli utenti finali avranno accesso protetto ai desktop senza che sia necessaria una VPN. Monitorate il parco dispositivi remoto da un'unica posizione integrando HP Anyware con WXP
account_management.subscriptions.addon.anyware.desc.short=Accedi, gestisci e monitora in sicurezza i desktop
account_management.subscriptions.addon.anyware.enterprise.header=HP Anyware Manager Enterprise
account_management.subscriptions.addon.anyware.features.automation=Automazione delle attività
account_management.subscriptions.addon.anyware.features.automation.desc=Integra agevolmente il flusso di lavoro di amministrazione personalizzato nel piano di gestione
account_management.subscriptions.addon.anyware.features.multitenant_rbac=Controllo di accesso basato su ruoli e multi-tenant
account_management.subscriptions.addon.anyware.features.multitenant_rbac.desc=Gestisci più organizzazioni con una sola istanza di HP Anyware Manager Enterprise. Assegna le autorizzazioni agli amministratori in base al ruolo
account_management.subscriptions.addon.anyware.features.productivity=Abilita produttività utente finale
account_management.subscriptions.addon.anyware.features.productivity.desc=L'utente finale vedrà i desktop come se fossero locali, a prescindere dalle esigenze di prestazioni o dalle condizioni di rete.
account_management.subscriptions.addon.anyware.features.provision_desktops=Gestione di desktop fisici e virtuali
account_management.subscriptions.addon.anyware.features.provision_desktops.desc=L'IT può configurare e monitorare i desktop remoti con HP Anyware Manager Enterprise. Può altresì eseguire il provisioning dei desktop virtuali agli utenti finali in qualsiasi momento.
account_management.subscriptions.addon.anyware.features.remote_access=Fornire agli utenti finali l'accesso remoto protetto
account_management.subscriptions.addon.anyware.features.remote_access.desc=Gli utenti finali avranno accesso protetto ai desktop senza che sia necessaria una VPN. HP Anyware offre l'accesso semplificato tramite gateway cloud.
account_management.subscriptions.addon.anyware.features.role_access.desc=Esegui l'assegnazione degli utenti e il routing delle sessioni senza dover installare un gateway in altri ambienti
account_management.subscriptions.addon.anyware.features.role_cloud_gateways=Accesso semplificato tramite gateway cloud
account_management.subscriptions.addon.anyware.features.setup=Qualsiasi ambiente IT e configurazione semplice
account_management.subscriptions.addon.anyware.features.setup.desc=Una soluzione flessibile e intuitiva che semplifica la distribuzione e la gestione su infrastrutture diverse, ad esempio ambienti locali, cloud e ibridi, riducendo la complessità IT e l'ingombro.
account_management.subscriptions.addon.anyware.features.workforce_integration=Integrazione di Workforce Experience
account_management.subscriptions.addon.anyware.features.workforce_integration.desc=L'IT può centralizzare i dati dei desktop remoti in Workforce Experience Platform per ottenere una visualizzazione centrale del parco dispositivi.
account_management.subscriptions.addon.anyware.header=HP Anyware
account_management.subscriptions.addon.anyware.overview.desc1=HP Anyware è una soluzione software ad alte prestazioni che assicura agli utenti l'accesso protetto ai desktop remoti o virtuali senza necessità di una VPN. HP Anyware comprende l'accesso a un piano di gestione IT chiamato HP Anyware Manager Enterprise.
account_management.subscriptions.addon.anyware.overview.desc2=HP Anyware Manager Enterprise (AME) è un piano di gestione multi-tenant che consente all'IT di gestire i desktop fisici e virtuali.
account_management.subscriptions.addon.anyware.required_components.header=Componenti necessari per l'integrazione di Workforce Experience
account_management.subscriptions.addon.anyware.required_components.li1=HP Anyware Standard
account_management.subscriptions.addon.anyware.required_components.li2=HP Anyware Manager Enterprise
account_management.subscriptions.addon.anyware.security_compliance=Sicurezza e conformità
account_management.subscriptions.addon.anyware.security_compliance.desc1=HP Anyware dà priorità alla sicurezza e alla conformità nelle sue offerte di prodotti, per garantire sia una protezione robusta sia il rispetto delle norme di settore. Le funzioni principali comprendono la crittografia end-to-end, l'accesso remoto protetto e l'autenticazione a più fattori, che tutelano l'integrità e la riservatezza dei dati.
account_management.subscriptions.addon.anyware.security_compliance.desc2=HP Anyware integra inoltre il rilevamento avanzato delle minacce e capacità di risposta utili ad attenuare proattivamente i rischi. La conformità a regolamenti quali GDPR, HIPAA e SOC 2 sottolinea l'impegno di HP Anyware a mantenere protocolli di sicurezza rigorosi. Il monitoraggio continuo e gli audit di sicurezza periodici assicurano che i prodotti HP Anyware siano sempre resilienti contro le minacce informatiche emergenti, per assicurare agli utenti un'esperienza di gestione IT protetta e affidabile.
account_management.subscriptions.addon.anyware.technology=Tecnologia di gestione remota
account_management.subscriptions.addon.anyware.technology.desc=La premiata tecnologia per display remoti PCoIP® di HP Anyware assicura un'esperienza di elaborazione ad alta definizione e fortemente reattiva anche in condizioni di rete difficili.
account_management.subscriptions.addon.anyware.technology.desc.li1=PCoIP® codifica, comprime, crittografa e trasporta i pixel delle immagini da una workstation o da un server centrale.
account_management.subscriptions.addon.anyware.technology.desc.li2=Dopodiché, decritta e decomprime l'immagine per gli utenti su qualsiasi endpoint.
account_management.subscriptions.addon.connect_accounts=Connetti account
account_management.subscriptions.addon.oob.desc.short=Controllo remoto a livello del BIOS per la diagnostica e la correzione avanzate
account_management.subscriptions.addon.oob.desclaimer1=1. La diagnostica e la correzione all'esterno della banda sono disponibili con licenze di varie durate e sono indipendenti dal fornitore per tutti i PC abilitati Intel® vPro® Enterprise e Intel® AMT. Comprendono e richiedono Workforce Experience Platform Starter per amministrare e gestire la soluzione software. Disponibili negli Stati Uniti, in Canada e nell'UE presso i rappresentanti HP o i rivenditori autorizzati HP. Per i dettagli, vedere (add url link to license terms/eula).
account_management.subscriptions.addon.oob.desclaimer2=2. In base all'analisi interna di HP svolta sui produttori di PC con controllo del ciclo di alimentazione, senza controllo del sistema operativo, con controllo del BIOS e con controllo di reimaging al 24/09/2024.
account_management.subscriptions.addon.oob.desclaimer3=3. L'agente HP Insights è necessario ed è un'app di telemetria e analisi che fornisce dati critici su dispositivi e applicazioni; non è in vendita come servizio autonomo ed è certificato ISO27001, ISO27701, ISO27017 e SOC2 Type2 per la sicurezza delle informazioni. È richiesto l'accesso a Internet con connessione al portale. Per i requisiti di sistema completi, visitare http://www.hpdaas.com/requirements. L'acquisto di qualsiasi servizio abilitato per gli agenti HP Insights richiede l'abilitazione del software per l'esecuzione su ogni dispositivo. HP Services Scan, fornito tramite Windows Update su determinati componenti hardware HP, verifica i diritti di ciascun dispositivo hardware per determinare se è stato acquistato un servizio abilitato e scaricare automaticamente il software pertinente. Per disabilitare questa funzionalità, seguire le istruzioni all'indirizzo <a target='_blank' href='http://www.hpdaas.com/requirements' style=\"text-decoration:none; color:#4D52E5\">http://www.hpdaas.com/requirements</a>
account_management.subscriptions.addon.oob.desclaimer4=4. WXP Starter è incluso e necessario per amministrare e gestire la soluzione software.
account_management.subscriptions.addon.oob.features.remote_control=Remote control - even when the Operating System is down
account_management.subscriptions.addon.oob.features.remote_control.desc=L'IT può accedere in remoto al BIOS per riavviare, riapplicare l'immagine e ripristinare i PC ovunque si svolta il lavoro.
account_management.subscriptions.addon.oob.features.scalable=Gestione scalabile e centralizzata
account_management.subscriptions.addon.oob.features.scalable.desc=Questa funzionalità si integra in WXP per favorire la distribuzione, l'utilizzo e la gestione aziendale, semplificando il provisioning dei PC, il controllo in blocco delle licenze e l'accesso basato su ruoli.
account_management.subscriptions.addon.oob.features.secure=Esperienze sicure degli utenti finali
account_management.subscriptions.addon.oob.features.secure.desc=Gli utenti vedono le sessioni remote e possono interrompere la connessione in qualsiasi momento. Il supporto sicuro e senza intoppi aumenta la fiducia e consente un'esperienza utente migliore.
account_management.subscriptions.addon.oob.header=Connessione remota esterna alla banda
account_management.subscriptions.addon.oob.overview.desc1=Per migliorare le esperienze digitali di una forza lavoro ibrida, Connessione remota esterna alla banda HP offre al supporto tecnico l'accesso remoto al BIOS per riavviare, riapplicare l'immagine e ripristinare i PC anche quando il sistema operativo non funziona. Gli utenti non vengono coinvolti e non è necessario l'intervento in sede.
account_management.subscriptions.addon.vyopta.connect_accounts.error=Non è stato possibile connettere l'account. Controllare la connessione e riprovare.
account_management.subscriptions.addon.vyopta.connect_accounts.found=È stato rilevato un account Vyopta "<b>{orgName}</b>". Connetterlo a WXP?
account_management.subscriptions.addon.vyopta.connect_accounts.no_permissions=Non disponi delle autorizzazioni. Per ottenere assistenza, contatta l'amministratore dell'account Vyopta.
account_management.subscriptions.addon.vyopta.connect_accounts.not_found=Non è stato possibile rilevare automaticamente l'account {service}. I clienti {service} possono contattare {support_link} per ottenere assistenza nella configurazione di questa connessione.
account_management.subscriptions.addon.vyopta.connect_accounts.org_already_mapped=Questo ID Vyopta è già collegato a un altro tenant. Per ottenere assistenza, contattare l'amministratore dell'account.
account_management.subscriptions.addon.vyopta.connect_accounts.request_support=Per ottenere assistenza, contattare l'amministratore dell'account {service}.
account_management.subscriptions.addon.vyopta.connect_accounts.success=La connessione dell'account è riuscita.
account_management.subscriptions.addon.vyopta.connect_accounts.unauthorized=L'organizzazione è stata rilevata in {service}, ma sembra che non siano disponibili le autorizzazioni necessarie per connettere gli account.
account_management.subscriptions.addon.vyopta.desc=Ottimizzate la collaborazione con gli approfondimenti in tempo reale. Monitorate la qualità delle chiamate, l'uso delle sale riunioni e le prestazioni dei sistemi in Microsoft Teams, Zoom, Poly e Webex. Se integrato con WXP, aiuta il reparto IT a migliorare le esperienze digitali e a promuovere l'efficienza sul posto di lavoro.
account_management.subscriptions.addon.vyopta.features.comprehensive_monitoring=Monitoraggio completo sulle piattaforme di collaborazione
account_management.subscriptions.addon.vyopta.features.comprehensive_monitoring.desc=Ottenete una visibilità olistica nel vostro ambiente multi-vendor di comunicazioni unificate (UC), consentendo la gestione efficace degli strumenti di collaborazione basati su video e voce.
account_management.subscriptions.addon.vyopta.features.deep_integration=Integrazione profonda con WXP
account_management.subscriptions.addon.vyopta.features.deep_integration.desc=I dati di analisi e monitoraggio di Vyopta sono perfettamente integrati all'interno di WXP e permettono ai team IT di gestire le prestazioni di collaborazione insieme ad altre tecnologie sul posto di lavoro. Questo approccio centralizzato migliora l'efficienza dell'IT, riduce la complessità e favorisce la gestione dell'esperienza digitale.
account_management.subscriptions.addon.vyopta.features.enhance_user_engagement=Miglioramento del coinvolgimento e del benessere degli utenti
account_management.subscriptions.addon.vyopta.features.enhance_user_engagement.desc=Utilizzate l'analisi della collaborazione per identificare gli ostacoli alla produttività, promuovendo il miglioramento dell'esperienza e il benessere dei dipendenti.
account_management.subscriptions.addon.vyopta.features.optimize_meeting_space=Ottimizzazione dell'utilizzo delle sale riunioni
account_management.subscriptions.addon.vyopta.features.optimize_meeting_space.desc=Analizzate l'occupazione delle sale e i modelli di utilizzo per ottimizzare gli investimenti immobiliari e migliorare l'efficienza delle sale riunioni.
account_management.subscriptions.addon.vyopta.features.proactive_issue_detection=Rilevamento e risoluzione proattivi dei problemi
account_management.subscriptions.addon.vyopta.features.proactive_issue_detection.desc=Sfruttate il monitoraggio in tempo reale per identificare e affrontare i problemi di qualità della collaborazione prima che influiscano sugli utenti, abbreviando i tempi della risoluzione dei problemi.
account_management.subscriptions.addon.vyopta.header=Esperienza di collaborazione offerta da Vyopta
account_management.subscriptions.addon.vyopta.overview=Potenziate i team IT con il monitoraggio e l'analisi avanzati per gli strumenti di collaborazione. L'integrazione di Vyopta in WXP consente la visibilità in tempo reale sull'utilizzo delle sale riunioni, la qualità delle chiamate e le prestazioni dei sistemi su piattaforme come Microsoft Teams, Zoom, Poly e Webex. Migliorate la produttività dei dipendenti affrontando in modo proattivo i problemi di collaborazione e ottimizzando le esperienze sul posto di lavoro.
account_management.subscriptions.addon.vyopta.short_desc=Analisi preziose e approfondimenti sulle sale per ottimizzare gli ambienti di collaborazione
account_management.subscriptions.addon.wolf.desc=La distribuzione, la visibilità e la protezione end-to-end sfruttano la sicurezza incorporata del PC e del software per rafforzare le difese del PC.
account_management.subscriptions.addon.wolf_security=HP Wolf Security
account_management.subscriptions.addon.wolf_security.desc=Protezione ineguagliata dei dispositivi endpoint dagli attacchi informatici con tecnologia HP Wolf. Visualizza la telemetria in Workforce Experience per una maggiore sicurezza.
account_management.subscriptions.addon.wpt.desc=Monitoraggio, blocco e protezione da remoto dei dispositivi rubati o smarriti. Grazie all'integrazione con WXP, aiuta i team IT a monitorare le risorse del PC e a ridurre i rischi legati allo smarrimento del dispositivo, anche se spento.
account_management.subscriptions.addon.wpt.features.always_available=Sempre disponibile
account_management.subscriptions.addon.wpt.features.always_available.desc=Sfruttate l'hardware e il software personalizzati per trovare/bloccare/cancellare il PC, anche se è spento, non è connesso a Internet o non si avvia.
account_management.subscriptions.addon.wpt.features.message_customization=Personalizzazione dei messaggi
account_management.subscriptions.addon.wpt.features.message_customization.desc=Trasmettete un messaggio personalizzato al PC di destinazione con le istruzioni per lo sblocco
account_management.subscriptions.addon.wpt.features.remote_lock_and_erase=Blocco e cancellazione da remoto
account_management.subscriptions.addon.wpt.features.remote_lock_and_erase.desc=Bloccate il dispositivo a livello di firmware per proteggere i dati e rendere inutilizzabile il dispositivo sottratto. Cancellate lo storage primario sui dispositivi smarriti o sottratti onde evitare violazioni dei dati.
account_management.subscriptions.addon.wpt.features.seamless_integration=Integrazione agevole con WXP
account_management.subscriptions.addon.wpt.features.seamless_integration.desc=Gestite la sicurezza dei dispositivi direttamente da WXP, semplificando le operazioni IT e la gestione degli endpoint.
account_management.subscriptions.addon.wpt.features.separations_of_duties=Separazione dei compiti
account_management.subscriptions.addon.wpt.features.separations_of_duties.desc=La richiesta di più approvatori per il blocco/cancellazione consente di evitare errori o minacce interne.
account_management.subscriptions.addon.wpt.features.strong_audit_trail=Audit trail robusto
account_management.subscriptions.addon.wpt.features.strong_audit_trail.desc=Registra l'esecuzione riuscita delle operazioni di blocco e cancellazione sulla piattaforma WXP come prova di conformità.
account_management.subscriptions.addon.wpt.header=HP Wolf Protect and Trace with Wolf Connect
account_management.subscriptions.addon.wpt.overview=Con HP Wolf Protect & Trace è possibile migliorare la gestione delle risorse e ridurre i rischi di violazione dei dati. Questa soluzione unica, integrata in WXP, consente ai team IT di individuare, bloccare e cancellare i dispositivi rubati o smarriti, anche se spenti. Copertura globale e amministrazione semplice per clienti di ogni dimensione.
account_management.subscriptions.addon.wpt.requirements.purchase=Richiede l'acquisto di un nuovo PC HP dal rappresentante commerciale HP o dal partner di canale autorizzato.<br> Richiede un PC supportato con opzione di visualizzazione "WWAN". I PC supportati sono elencati all'indirizzo: https://www.hpwolf.com/en/legal/ptwc/platforms
account_management.subscriptions.addon.wpt.short_desc=Monitoraggio, blocco e cancellazione totale di un PC da remoto, anche a dispositivo spento
