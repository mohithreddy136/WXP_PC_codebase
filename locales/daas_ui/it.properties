azureonboard.marketing.disclaimer.content=Le informazioni contenute in questo documento sono soggette a modifica senza preavviso. Le uniche garanzie sui prodotti e sui servizi HP sono esposte nelle dichiarazioni di garanzia esplicita che accompagnano i suddetti prodotti e servizi. Nulla di quanto contenuto nel presente documento va interpretato come costituente una garanzia aggiuntiva. HP non risponde per eventuali omissioni o errori tecnici o editoriali contenuti nel presente documento.
azureonboard.marketing.disclaimer.contentlist1=HP Proactive Insights e/o i componenti inclusi possono variare a seconda della regione, del sistema operativo o del partner autorizzato per i servizi HP. Contatta il tuo rappresentante locale HP o un partner autorizzato per dettagli specifici per la tua area. I servizi HP sono disciplinati dai termini e dalle condizioni del servizio HP in questione o sono indicati al cliente al momento dell’acquisto. Il cliente potrebbe disporre di ulteriori diritti legali ai sensi delle leggi locali in vigore; tali diritti non sono in alcun modo influenzati dai termini e dalle condizioni del servizio HP o dalla garanzia limitata HP fornita con il prodotto HP.
azureonboard.marketing.disclaimer.contentlist2=HP {appName} è una piattaforma di telemetria e analisi che fornisce dati critici sui dispositivi e sulle applicazioni e non è in vendita come servizio indipendente. HP {appName} segue le rigorose norme in materia di privacy del regolamento GDPR ed è certificato ISO27001, ISO27701, ISO27017 e SOC2 Type2 per la sicurezza delle informazioni. È richiesto l'accesso a Internet con connessione a {appName}. Per i requisiti di sistema completi, visitare <a target='_blank' href={link}>{text}</a>.
azureonboard.marketing.disclaimer.contentlist3=Gli aggiornamenti del BIOS sono disponibili solo sui dispositivi HP.
azureonboard.marketing.disclaimer.contentlist4=Per maggiori dettagli sulla copertura del sistema operativo, visita il sito <a target='_blank' href={link}>{text}</a>.
azureonboard.marketing.employeesection.description=Raccogli, misura e gestisci l’esperienza digitale dei tuoi dipendenti attraverso una correlazione di hardware, applicazioni e sondaggi sull’esperienza dei dipendenti su tutti i tuoi dispositivi.
azureonboard.marketing.employeesection.heading=Proactive Employee Insight
azureonboard.marketing.hardwaresection.description=Monitora proattivamente i dischi rigidi dei dispositivi, l’utilizzo della CPU, i livelli termici e lo stato della batteria, permettendoti di prevedere i potenziali impatti analizzando i tuoi dati rispetto a un data lake di oltre 20 milioni di dispositivi.
azureonboard.marketing.hardwaresection.heading=Proactive Hardware Insight
azureonboard.marketing.insightsection.description=Diagnostica problemi di prestazioni, errori software, blocchi con schermata blu di errore e utilizzo del sistema, mentre aggiorni i driver e le patch per assicurarti di disporre di profili di protezione sicuri.
azureonboard.marketing.insightsection.heading=Proactive Application Insight
azureonboard.marketing.learnmoresection.content=Aggregando la conoscenza da più di 20 milioni di dispositivi e miliardi di punti dati, HP Proactive Insights sfrutta la piattaforma di analisi HP TechPulse per identificare e risolvere i problemi prima che abbiano un impatto sui dipendenti.
azureonboard.marketing.learnmoresection.description=Ti stiamo aiutando a cambiare il paradigma della gestione dei dispositivi attraverso il controllo proattivo alimentato dall’IA delle prestazioni del computer, della sicurezza, dei costi, dei tempi di inattività e della soddisfazione dei tuoi dipendenti. Sfrutterai l’intelligenza acquisita su oltre 20 milioni di altri dispositivi informatici per migliorare la tua organizzazione.
azureonboard.marketing.learnmoresection.heading=HP Proactive Insights offre un’analisi significativa basata su miliardi di punti dati
