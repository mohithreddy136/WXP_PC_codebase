btg.addon.list.feature_one.description=DCT è la tecnologia mesh sottostante che consente di scoprire, connettere e collaborare sui dispositivi HP attraverso una gestione intelligente e una semplificazione delle transizioni situazionali. Permette la condivisione in tempo reale di contesto, stato e capacità, trasformando i prodotti autonomi in un ecosistema adattivo strettamente integrato.
