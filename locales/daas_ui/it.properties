side_panal.smart_refresh.help_sec2_table_low=Integro
side_panal.smart_refresh.help_sec2_table_medium=Aggiorna a breve
side_panal.smart_refresh.help_sec3_header=Fattori
side_panal.smart_refresh.help_sec3_point_1=Utilizzo CPU: percentuale di utilizzo media negli ultimi 30 giorni
side_panal.smart_refresh.help_sec3_point_2=Utilizzo memoria: percentuale di utilizzo media negli ultimi 30 giorni
side_panal.smart_refresh.help_sec3_point_3=Utilizzo disco: ultima percentuale di utilizzo registrata
side_panal.smart_refresh.help_sec3_point_4=Arresti anomali SO: arresti anomali del sistema operativo negli ultimi 7 giorni
side_panal.smart_refresh.help_sec3_point_5=BSOD: arresti con schermata blu negli ultimi 7 giorni
side_panal.smart_refresh.help_sec3_point_6=Durata avvio: ultimo tempo registrato in minuti
side_panal.smart_refresh.help_sec3_point_7=Durata arresto: ultimo tempo registrato in minuti
side_panal.smart_refresh.help_sec3_point_8=Errori software per app di collaborazione: errori negli ultimi 7 giorni
side_panal.smart_refresh.help_sec3_point_9=Stato alimentazione docking station: ultimi dati registrati, sì/no
side_panal.smart_refresh.help_sec3_sub_text=I nove fattori che seguono contribuiscono al punteggio e includono le descrizioni delle relative modalità di misurazione:
side_panal.smart_refresh.help_sub_title=Aggiornate i PC al momento giusto con Smart Refresh di HP. Ecco come funziona:
side_panal.smart_refresh.personas_header=Utenti tipo
side_panal.smart_refresh.personas_sub_text=Gruppi di dispositivi basati sull'intelligenza artificiale, determinati dai modelli di utilizzo
side_panal.smart_refresh.point_1_desc=Valutare lo stato attuale dei PC in termini di prestazioni hardware, semplicità di utilizzo del software e sicurezza.
side_panal.smart_refresh.point_1_title=1. Valutazione
side_panal.smart_refresh.point_2_desc=Dare la priorità ai PC che richiedono attenzione immediata in base al loro utilizzo, importanza delle operazioni aziendali o livello di obsolescenza.
side_panal.smart_refresh.point_2_title=2. Definizione delle priorità
side_panal.smart_refresh.point_3_desc=Eseguire in modo efficiente gli upgrade o le sostituzioni in programma, riducendo al minimo i downtime e i disservizi per gli utenti.
side_panal.smart_refresh.point_3_title=3. Implementazione
side_panal.smart_refresh.point_4_desc=Assicurarsi che i PC aggiornati siano dotati delle misure di sicurezza più recenti per la protezione dalle minacce informatiche.
side_panal.smart_refresh.point_4_title=4. Sicurezza
side_panal.smart_refresh.point_5_desc=Monitorare periodicamente i PC aggiornati per garantirne il funzionamento ottimale ed effettuare la manutenzione necessaria come richiesto.
side_panal.smart_refresh.point_5_title=5. Monitoraggio e manutenzione
side_panal.smart_refresh.software_persona_1=Inattivi: utenti che non usano spesso il loro dispositivo
side_panal.smart_refresh.software_persona_2=Office 365: utenti che usano spesso le applicazioni Office, come Excel e Word
side_panal.smart_refresh.software_persona_3=Programmatore esperto: utente che utilizza spesso gli strumenti per sviluppatori per la scrittura di codice
side_panal.smart_refresh.software_persona_4=Productivity Coder: Users who frequently use developer tools for coding
side_panal.smart_refresh.software_persona_5=Remote Worker: Users who frequently use productivity software, such as OneNote and Adobe Acrobat
side_panal.smart_refresh.software_persona_6=Healthcare Worker: Users who typically use their devices remotely
side_panal.smart_refresh.software_persona_7=Cloud Strategist: Users who frequently use medical professional software, such as ICU monitoring and hospital management systems
side_panal.smart_refresh.software_persona_8=Utility Expert: Users who use extensive cloud services
side_panal.smart_refresh.software_persona_9=Media Consumer: Users who frequently use utility software, such as WinRAR and System Monitor
side_panal.smart_refresh.software_personas_header=Utenti tipo Software
side_panal.smart_refresh.software_personas_sub_text=Identificati dai cluster di dispositivi basati sull'intelligenza artificiale in base all'utilizzo del software
side_panal.smart_refresh.sub_title=Smart Refresh fa riferimento al processo di upgrade dei personal computer (PC) in modo intelligente o efficace. Occorre considerare vari aspetti:
