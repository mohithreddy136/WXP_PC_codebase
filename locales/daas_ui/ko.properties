poly.lens.addon.details.description=전체 조직에서 HP 협업 장치 플릿을 자신 있고 명확하게 관리하십시오. 간소화된 배포와 손쉬운 유지 관리부터 선제적 모니터링과 유의미한 인사이트까지, IT 팀은 공간, 회의실, 장치 전반에 걸쳐 중앙 집중식 제어 권한을 확보할 수 있습니다. 안전한 클라우드 기반 관리와 하이브리드 업무에 대한 원활한 지원을 통해 운영 비용을 절감하고, 문제를 미리 예방하며, 팀이 어디서 일하든 언제나 안정적이고 일관된 업무 환경을 제공할 수 있습니다.
poly.lens.addon.feature.centralized.header=중앙 집중식 개인 장치 관리
poly.lens.addon.feature.centralized.text=HP Poly Studio 앱을 통해 최종 사용자에게 끊김 없는 셀프 서비스 경험을 제공하고, IT 팀은 개인 장치에 대한 중앙 집중식 가시성과 제어 권한을 유지할 수 있습니다. 팀의 업무 환경과 관계없이 인벤토리, 업데이트, 모니터링, 인사이트를 자신 있게 관리하십시오.
poly.lens.addon.feature.effortless.maintenance.header=손쉬운 유지 관리
poly.lens.addon.feature.effortless.maintenance.text=최소한의 노력으로 플릿 전체에 대한 설정, 기능, 소프트웨어 업데이트를 관리하십시오. 제어 기능과 정밀도를 유지하면서 대규모로 설정 적용, 업데이트 스테이징, 구성 미세 조정을 수행할 수 있습니다.
poly.lens.addon.feature.meaningful.measurement.header=의미 있는 측정
poly.lens.addon.feature.meaningful.measurement.text=장치, 공간, 사람들이 실제로 어떻게 운용되고 있는지 파악하십시오. 활용률과 성과 데이터를 통해 협업 투자에 대해 데이터를 기반으로 더욱 현명한 의사 결정을 내릴 수 있습니다.
poly.lens.addon.feature.proactive.monitoring.header=사전 예방적 모니터링
poly.lens.addon.feature.proactive.monitoring.text=장치 상태와 현황을 명확히 파악하여 문제 발생에 선제적으로 대응하십시오. 문제가 발생하면 경고를 받아 회의에 지장이 생기기 전에 해결할 수 있습니다.
poly.lens.addon.feature.secure.header=클라우드 기반의 안전한 제어
poly.lens.addon.feature.secure.text=조직이 성장하면서 확장되는 신뢰할 수 있는 클라우드 기반 플랫폼에서 모든 것을 관리하고, 엔터프라이즈 보안 및 규정 준수 요구 사항을 충족하십시오.
poly.lens.addon.feature.simplified.deployment.header=간소화된 배포
poly.lens.addon.feature.simplified.deployment.text=장치를 안심하고 스테이징, 사전 구성 및 배포하십시오. 자동화된 온보딩 워크플로를 통해 설정 시간을 단축하고, 오류를 방지하며, 장치가 사용자에게 전달되거나 회의실에 도착하기 전에 준비를 마칠 수 있습니다.
poly.lens.addon.subtitle=클라우드 기반 관리 및 협업 공간, 회의실, 장치를 아우르는 인사이트를 누리십시오.
