azureonboard.marketing.employeesection.description=모든 장치에 걸쳐 하드웨어, 애플리케이션, 직원 경험 설문 조사를 진행하여 직원 디지털 경험을 수집, 측정 및 관리할 수 있습니다.
azureonboard.marketing.employeesection.heading=사전 예방적 직원 인사이트
azureonboard.marketing.hardwaresection.description=장치 하드 드라이브, CPU 사용 현황, 온도 수준, 배터리 상태를 사전 예방적으로 모니터링하여 2,000만 개 이상의 장치 데이터 레이크의 데이터 분석을 통해 잠재적인 영향을 예측할 수 있습니다.
azureonboard.marketing.hardwaresection.heading=사전 예방적 하드웨어 인사이트
azureonboard.marketing.insightsection.description=성능 문제, 소프트웨어 오류, 블루스크린 충돌, 시스템 사용 현황을 진단하면서 드라이버와 패치를 업데이트하여 안전한 보안 프로파일을 확보할 수 있습니다.
azureonboard.marketing.insightsection.heading=사전 예방적 애플리케이션 인사이트
azureonboard.marketing.learnmoresection.content=HP Proactive Insights는 HP TechPulse 분석 플랫폼을 통해 2,000만 대 이상의 장치와 수십억 개의 데이터 포인트에서 얻은 정보를 종합하여 직원에게 영향을 미치기 전에 문제를 파악하고 해결합니다.
azureonboard.marketing.learnmoresection.description=HP는 컴퓨터 성능, 보안, 비용, 다운타임, 직원 만족도에 대한 AI 기반의 사전 제어를 통해 장치 관리 패러다임을 바꿀 수 있는 기회를 선사합니다. 2,000만 대 이상의 다른 컴퓨팅 장치에서 얻은 인텔리전스를 활용하여 조직을 개선할 수 있습니다.
azureonboard.marketing.learnmoresection.heading=수십억 개의 데이터 포인트를 기반으로 유의미한 분석 정보를 제공하는 HP Proactive Insights
