requirements.list.proSecurity.windows.supportLifecycle.content1=HP 서비스 레벨 목표는 3개의 최신 Windows 10 반기 채널 릴리스를 지원하는 것입니다.
requirements.list.proSecurity.windows.supportLifecycle.content2=HP의 목표는 Wolf Pro Security의 위협 억제 기능에 대한 새로운 OS 릴리스 지원을 반기 채널(\"SAC\")에 제공된 후 30일 이내에 릴리스하는 것입니다. 임시 또는 릴리스 전 Windows Insider 빌드는 지원되지 않습니다. Windows OS 릴리스에 대한 자세한 내용은 <a href='https://docs.microsoft.com/en-us/windows/release-information/' target='_blank'>https://docs.microsoft.com/en-us/windows/release-information/</a>을 참고하십시오.
requirements.list.proSecurity.windows.supportLifecycle.content3=이전 Windows 버전의 고객이 충분한 시간을 가지고 최신 릴리스로 업그레이드할 수 있도록, HP는 Wolf Pro Security에서 최신 반기 채널 릴리스를 지원한 후 최소 90일 동안 현재 기준으로 4번째 전까지의 릴리스(현재 Windows 10 v1903)를 계속 지원합니다. 이 기간이 지나면 이전 OS 릴리스에 대한 지원이 종료됩니다. 동일한 지원 정책이 Windows 10의 장기 서비스 채널 릴리스에도 적용되므로, 앞서 나열된 정책에 따라 해당 시스템도 업데이트해야 합니다.
requirements.list.proSecurity.windows.supportLifecycle.content4=Windows 10 v2004에 대한 Sure Click Pro 지원은 2020년 7월 31일에 릴리스되었습니다. Windows 10 v1809에 대한 지원은 2020년 10월 31일부터 종료됩니다.
requirements.list.proSecurity.windows.supportLifecycle.content5=Windows 7 및 8.1은 HP Proactive Security에서 지원되지 않습니다.
requirements.list.proSecurity.windows.supportLifecycle.content6=Windows 10 v20H2에 대한 Sure Click Pro 지원은 2020년 11월 18일에 릴리스되었습니다. Windows 10 v1903에 대한 지원은 2021년 2월 16일부터 종료되었습니다.
requirements.list.proSecurity.windows.supportLifecycle.content7=HP는 2021년 7월 5일 Windows 10 v21H1에 대한 Sure Click Pro 위협 억제 지원을 릴리스했습니다. Windows 10 v1909에 대한 지원은 2021년 10월 3일부터 종료됩니다.
