azureonboard.marketing.disclaimer.content=이 설명서의 내용은 조건에 따라 사전 통지 없이 변경될 수 있습니다. HP 제품 및 서비스에 대한 유일한 보증은 제품 및 서비스와 함께 동봉된 보증서에 명시되어 있습니다. 이 설명서에는 어떠한 추가 보증 내용도 들어 있지 않습니다. HP는 이 설명서의 기술상 또는 편집상 오류나 누락에 대해 책임지지 않습니다.
azureonboard.marketing.disclaimer.contentlist1=HP Proactive Insights 및/또는 포함된 구성 요소는 지역, 운영 체제 또는 공인 HP 서비스 파트너에 따라 다를 수 있습니다. 체류 지역의 구체적인 정보는 현지 HP 담당자 또는 공인 파트너에 문의하십시오. HP 서비스는 구매 시 고객에게 제공되거나 표시되는 관련 HP 서비스 약관에 따라 관리됩니다. 고객은 현지 법률에 따라 추가적인 법적 권리를 가질 수 있으며, 이러한 권리는 HP 제품과 함께 제공되는 HP 서비스 약관 또는 HP 제한 보증의 영향을 받지 않습니다.
azureonboard.marketing.disclaimer.contentlist2=HP {appName}은(는) 중요한 장치 및 애플리케이션 데이터를 제공하는 원격 측정 및 분석 플랫폼으로, 독립형 서비스로 판매되지 않습니다. HP {appName}은(는) 엄격한 GDPR 개인 정보 보호 규정을 준수하며 ISO27001, ISO27701, ISO27017, SOC2 Type2 정보 보안 인증을 받았습니다. {appName}에 연결된 인터넷 액세스가 필요합니다. 전체 시스템 요구사항에 대한 자세한 내용은 <a target='_blank' href={link}>{text}</a>에서 확인하십시오.
