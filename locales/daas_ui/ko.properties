bios.bsod.tooltip.context=BIOS의 이러한 영향은 가중치에 의해 결정되는데, 동일한 모델의 다른 장치에서 업그레이드와 밀접한 BSOD가 발생한 경우 가중치가 더 높습니다. 또한, 가중치가 X%를 초과하는 특정 장치 모델은 '고영향'으로 분류됩니다. 영향은 장치 모델마다 계산되며, 해당 특정 BIOS 버전에 대해 권장되는 모든 장치에 적용됩니다. BSOD의 발생이 모델에 대한 임대인 경우 가중치가 낮아 영향이 적습니다.
