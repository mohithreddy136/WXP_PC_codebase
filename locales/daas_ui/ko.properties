wex.fleet.mgmt.remediation.kernel_panic_error.desc=커널 패닉이 발생했으며, Linux 커널이 복구할 수 없는 중요한 시스템 오류를 나타냅니다. 이는 하드웨어 결함, 손상된 드라이버, 잘못 구성된 커널 매개변수 또는 호환되지 않는 커널 모듈로 인해 발생할 수 있습니다. 근본 원인을 파악하려면 즉각적인 조사가 필요합니다.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt1=시스템 로그(/var/log/messages, /var/log/syslog 또는 journalctl)에서 패닉 이전의 오류 메시지를 검토하십시오.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt2=하드웨어 상태, 특히 메모리(RAM)와 디스크 무결성을 확인하려면 memtest86 및 smartctl과 같은 도구를 사용하면 됩니다.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt3=시스템의 최근 변경 사항(예: 커널 업데이트, 드라이버 설치 또는 구성 변경)을 확인하십시오.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt4=시스템을 부팅할 수 없는 경우 구조 또는 복구 모드로 부팅하여 시스템에 액세스하십시오.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt5=커널 모듈이나 드라이버가 호환되지 않는 것으로 의심되는 경우 되돌리거나 업데이트하십시오.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt6=문제가 지속되거나 특정 하드웨어와 관련이 있는 경우 공급업체 또는 커뮤니티 지원팀에 문의하십시오.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.desc=디스크 암호화를 활성화하면 적절한 인증 없이도 디스크에 저장된 모든 정보를 읽을 수 없도록 하여 저장된 민감한 데이터를 보호할 수 있습니다. 이는 기밀 또는 규제 대상 데이터를 처리하는 시스템에 꼭 필요한 보안 조치입니다.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step1=Linux 배포 환경에 따라 Linux 통합 키 설정(LUKS) 또는 dm-crypt와 같은 도구를 사용하여 전체 디스크 암호화를 구현하십시오.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step2=전체 디스크 암호화가 실현 불가능한 경우 민감한 파티션(예: /home, /var 또는 /data)을 암호화하십시오.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step3=지원되는 경우 암호나 신뢰할 수 있는 플랫폼 모듈(TPM)과의 통합을 포함하여 안전한 키 관리를 구성하십시오.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step4=키가 잘못 배치될 경우 데이터 손실을 방지하도록 암호화 키를 안전하게 백업하십시오.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step5=암호화 설정을 테스트하여 시스템이 정상적으로 부팅되고 인증 후 데이터에 액세스할 수 있는지 확인하십시오.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step6=규정 준수 및 운영 연속성을 위한 암호화 구성 및 복구 절차를 문서화하십시오.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step1=Linux 배포 환경에 따라 firewalld, ufw, iptables 등의 방화벽 도구를 설치하고 구성하십시오.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step2=부팅 시 방화벽 서비스를 시작하도록 활성화
wex.fleet.mgmt.remediation.linux_firewall_disabled.step3=방화벽 규칙을 정의하여 필요한 서비스(예: SSH, HTTP/HTTPS)만 허용하고 나머지 모든 서비스는 차단합니다.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step4=방화벽 상태 및 규칙을 확인하려면 sudo firewall-cmd --list-all(firewalld용), sudo ufw status(ufw용)를 사용하십시오.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step5=방화벽 구성을 정기적으로 감사하여 보안 정책 및 운영 요구 사항에 부합하도록 하십시오.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.desc=보안 부팅을 활성화하면 부트로더, 커널 모듈, 드라이버의 디지털 서명을 확인하여 부팅 과정에서 무단 또는 악성 코드로부터 시스템을 보호하는 데 도움이 됩니다. 이는 특히 엔터프라이즈 또는 규정 준수 중심 환경에서 시스템 무결성과 보안을 강화합니다.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step1=UEFI 펌웨어에서 보안 부팅 지원을 확인하고 UEFI 설정에서 활성화되었는지 확인하십시오.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step2=보안 부팅과 호환되는 서명된 부트로더 및 커널 패키지를 설치하고 구성하십시오(예: shim 및 서명된 GRUB 사용).
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step3=커널, 모듈 및 모든 필수 구성 요소가 서명되었는지 확인하십시오.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step4=mokutil을 사용하여 재부팅하고 보안 부팅 상태를 확인하십시오.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step5=비표준 구성 요소를 사용하는 경우 사용자 지정 키를 등록하십시오.
wex.fleet.mgmt.remediation.missing_linux_security_updates.desc=시스템에 하나 이상의 중요 보안 업데이트가 누락되어 있습니다. 이러한 업데이트는 운영 체제, 커널 및 설치된 패키지에서 알려진 취약성을 해결합니다. 이를 적용하지 않으면 시스템이 무단 액세스, 데이터 유출 또는 서비스 중단에 노출될 수 있습니다.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step1=시스템 패키지 관리자(예: apt, yum, dnf, zypper)를 사용하여 누락된 보안 패치를 검토하고 식별하십시오.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step2=알려진 위협과 취약성을 완화하려면 모든 중요 보안 업데이트를 즉시 적용하십시오.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step3=필요한 경우, 특히 커널 또는 코어 서비스 업데이트 후에 시스템을 재부팅하십시오.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step4=자동 보안 업데이트를 활성화하거나 정기적인 패치 적용 일정을 구성하여 보호 기능을 적시에 적용할 수 있습니다.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step5=로그를 검토하고 패키지 버전을 확인하여 업데이트 성공 여부를 확인하십시오.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step6=업데이트 후 취약성 스캔을 수행하여 위험 요소가 남아 있지 않도록 하십시오.
wex.fleet.mgmt.remediation.missing_linux_updates.desc=시스템에 하나 이상의 중요한 Linux 업데이트가 없습니다. 이러한 업데이트에는 보안 패치, 커널 수정 및 안정성 개선 사항이 포함될 수 있습니다. 오래된 시스템을 실행하면 취약점, 시스템 충돌 및 호환성 문제가 발생할 위험이 증가합니다.
wex.fleet.mgmt.remediation.missing_linux_updates.step1=패키지 관리자(예: yum, dnf, apt 또는 zypper)를 통해 지원되는 업데이트를 검토하여 누락된 중요 패치를 파악하십시오.
wex.fleet.mgmt.remediation.missing_linux_updates.step2=알려진 취약점을 완화하려면 가능한 한 빨리 모든 보안 및 커널 업데이트를 적용하십시오.
wex.fleet.mgmt.remediation.missing_linux_updates.step3=필요한 경우, 특히 커널 또는 코어 시스템 업데이트 후에 시스템을 재부팅하십시오.
wex.fleet.mgmt.remediation.missing_linux_updates.step4=자동 업데이트를 활성화하거나 정기적인 패치 적용 일정을 구성하여 향후 업데이트를 적시에 적용할 수 있습니다.
wex.fleet.mgmt.remediation.missing_linux_updates.step5=시스템 로그를 검토하고 현재 커널 및 패키지 버전을 확인하여 업데이트 성공 여부를 확인하십시오.
wex.fleet.mgmt.remediation.network_connection_not_secure.desc=지난 24시간 동안 예상된 보안 조치 없이 네트워크 연결이 보고되었습니다.
wex.fleet.mgmt.remediation.network_connection_not_secure.desc1=지난 7일 동안 인증되지 않은 연결이 감지되었습니다.
wex.fleet.mgmt.remediation.network_disconnections.desc=지난 24시간 동안 여러 장치에서 반복적으로 네트워크 연결이 해제되었다고 보고했습니다.
wex.fleet.mgmt.remediation.network_disconnections.desc1=지난 7일 동안 네트워크 연결 해제가 감지되었습니다.
wex.fleet.mgmt.remediation.network_speed_slow.desc=보고된 명목상 네트워크 속도가 지난 24시간 동안 느렸습니다.
wex.fleet.mgmt.remediation.wifi_signal_strength_weak.desc=최근 24시간 동안 Wi-Fi 신호 강도가 약한 것으로 보고되었습니다.
wex.fleet.mgmt.score.no.data=데이터 없음
wex.fleet.mgmt.score.overall_exp=전체적 경험
wex.fleet.mgmt.score.tooltip=경험치는 모든 점수 중 가장 낮은 경험치를 기준으로 합니다.
wex.fleet.mgmt.troubleshoot.linux_firewall_disabled.description=방화벽을 활성화하면 인바운드 및 아웃바운드 연결을 제어하여 무단 액세스, 네트워크 기반 공격 및 원치 않는 트래픽으로부터 시스템을 보호하는 데 도움이 됩니다. 이는 Linux 시스템, 특히 공개 또는 엔터프라이즈 네트워크에 노출된 시스템을 보호하는 데 있어 중요한 단계입니다.
