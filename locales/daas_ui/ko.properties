welcome.whats_new.line1=Jonathan Nikols, HP TechPulse 부사장 겸 글로벌 책임자
welcome.whats_new.line2=HP가 고객과 파트너에게 TechPulse Plan을 선보인 지 1년이 지났습니다. 감격스러운 순간이죠! 2018년 10월, HP는 TechPulse 솔루션 덕분에 Technology Services Industry Association(TSIA)에서 표준 관리형 서비스 제품 및/또는 카탈로그 부문 2018 STAR Award for Innovation 상을 수상했습니다. HP가 TSIA 상을 총 15번째 받고 TSIA 수상자 명예의 전당에 등극한 아주 역사적인 순간이었죠.
welcome.whats_new.line3=HP TechPulse Plan을 통한 사전 예방적 관리는 고객이 기존 IT 투자로 더 많은 가치를 뽑아내고 비즈니스 성과를 창출하기 위한 더 현명하고 효과적인 의사 결정을 내릴 수 있도록 지원하며 Windows 10으로 전환하는 여정을 돕습니다. 파트너는 TechPulse 서비스 제공 환경을 개선하고, 처리 가능한 TechPulse 솔루션 공간을 늘리고, 적합한 수명 주기 서비스를 찾아 고객이 선호하는 TechPulse Plan을 보완하는 프로세스를 간소화하고 있습니다.
welcome.whats_new.line4=TechPulse가 거둔 전반적인 성공은 서비스 혁신을 실현하는 데 도움이 되는 플랫폼, 기술, 프로세스에 지속적으로 초점을 맞추었기에 가능했습니다. TechPulse를 사용한 HP Proactive Management는 그 어느 때보다 똑똑하고 빠르고 강력합니다. 저희는 함께 구름 한 점 없이 밝은 미래로 나아갈 수 있는 기반을 마련하고 있습니다.
welcome.whats_new.line5=기분 좋은 여정에 함께해 주셔서 다시 한번 감사드리며, 앞으로도 여러분과 같이 성공적인 협업을 이어갈 수 있기를 기대합니다!
