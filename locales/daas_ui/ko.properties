wex.fleet.mgmt.recommended.desc.antivirus_not_enabled=Microsoft Defender를 활성화하면 맬웨어 및 기타 보안 위협으로부터 필수적인 보호 기능을 제공합니다.
wex.fleet.mgmt.recommended.desc.antivirus_not_enabled_other=바이러스 백신 소프트웨어를 활성화하면 맬웨어로부터 장치를 보호하고 공격으로부터 시스템을 안전하게 보호할 수 있습니다.
wex.fleet.mgmt.recommended.desc.antivirus_signature_outdated=정기적으로 맬웨어 서명을 업데이트하면 Windows Defender가 최신 위협을 탐지하고 보호할 수 있습니다.
wex.fleet.mgmt.recommended.desc.antivirus_signature_outdated_other=멀웨어 서명을 최신 상태로 유지하면 최신 위협에 대한 포괄적인 보호가 보장됩니다.
wex.fleet.mgmt.recommended.desc.avg_fan_speed_high=팬 속도를 높이면 과열을 방지하고 장치 내부 구성 요소의 잠재적 손상을 방지하는 데 도움이 됩니다.
wex.fleet.mgmt.recommended.desc.battery_calibrate=배터리를 보정하면 전원 판독 정확도가 향상되고 배터리 수명과 성능이 향상됩니다.
wex.fleet.mgmt.recommended.desc.battery_early_detection_wear=배터리 마모 문제를 해결하면 효율적인 장치 작동, 일관된 성능 및 연장된 배터리 수명을 보장합니다.
wex.fleet.mgmt.recommended.desc.battery_needs_attention=Replacement of defective batteries can ensure good device performance, and system health. Devices which are covered by warranty may be eligible for battery replacement.
wex.fleet.mgmt.recommended.desc.bitlocker_encryption_not_enabled=BitLocker를 활성화하면 드라이브를 암호화하여 중요한 데이터를 보호하므로 무단 액세스에 대한 전반적인 보안을 강화할 수 있습니다.
wex.fleet.mgmt.recommended.desc.bsod_occured=블루 스크린 오류를 해결하면 시스템 안정성이 보장되고, 예기치 않은 종료가 방지되며 신뢰성이 유지됩니다.
wex.fleet.mgmt.recommended.desc.cpu_utilization_high=높은 CPU 사용률을 분석하면 성능 병목 현상을 방지하고 시스템을 원활하게 실행하는 데 도움이 됩니다.
wex.fleet.mgmt.recommended.desc.disk_needs_attention=Disk performance is degrading and may soon lead to slower performance or instability if not addressed.
wex.fleet.mgmt.recommended.desc.disk_utilization_high=디스크 공간을 확보하면 시스템 속도 저하를 방지하고 스토리지 과부하를 방지하여 원활한 작동을 보장할 수 있습니다.
wex.fleet.mgmt.recommended.desc.docking_station_ac_adapter_failed=어댑터 고장을 해결하면 도킹 스테이션에 일관된 전원 공급을 보장하여 연결 문제를 방지할 수 있습니다.
wex.fleet.mgmt.recommended.desc.docking_station_ac_adapter_running_at_reduced_perofmance=어댑터 성능을 향상시키면 도킹 스테이션의 연결이 안정적으로 유지되고 기능이 최적화됩니다.
wex.fleet.mgmt.recommended.desc.docking_station_firmware_out_of_date=도킹 스테이션의 펌웨어 업데이트를 통해 장치 호환성이 보장되고 전반적인 시스템 성능이 향상됩니다.
wex.fleet.mgmt.recommended.desc.excessive_os_login_time=로그인 시간을 단축하면 시스템 접속 중 지연이 줄어들고 사용자 효율성이 향상됩니다.
wex.fleet.mgmt.recommended.desc.excessive_os_shutdown_time=시스템 종료 시간을 최적화하면 대기 시간을 최소화하고 효율적인 시스템 종료를 보장할 수 있습니다.
wex.fleet.mgmt.recommended.desc.excessive_os_startup_time=시작 시간이 빨라지면 시스템 접속 속도가 빨라지고 사용자 효율성과 생산성이 향상됩니다.
wex.fleet.mgmt.recommended.desc.firewall_disabled=Windows 방화벽을 활성화하면 무단 액세스를 차단하고 잠재적인 위협으로부터 네트워크를 보호할 수 있습니다.
wex.fleet.mgmt.recommended.desc.firewall_signature_outdated=방화벽 서명을 정기적으로 업데이트하면 새롭고 진화하는 네트워크 위협을 방어할 수 있습니다.
wex.fleet.mgmt.recommended.desc.frequent_bsod_occured=블루 스크린 오류를 해결하면 시스템 안정성이 보장되고, 예기치 않은 종료가 방지되며 신뢰성이 유지됩니다.
wex.fleet.mgmt.recommended.desc.frequent_kernel_panic_error=커널 패닉 오류를 해결하면 시스템의 안정성이 향상되고, 보안이 강화되며, 데이터 손실을 예방할 수 있습니다.
wex.fleet.mgmt.recommended.desc.frequent_network_disconnection=중단 없는 네트워크는 안정성과 사용자 경험을 개선하고, 서비스와 애플리케이션에 중단 없이 액세스할 수 있습니다.
wex.fleet.mgmt.recommended.desc.gpu_health_issue=GPU 문제를 해결하면 그래픽 성능 문제를 방지하고 시각적 애플리케이션이 원활하게 작동합니다.
wex.fleet.mgmt.recommended.desc.high_collaboration_sw_errors=협업 소프트웨어 문제를 해결하면 원활한 팀워크와 지속적인 생산성을 보장할 수 있습니다. 지난 7일간 Teams, Outlook, Zoom, Webex, Chrome, Office에서 소프트웨어 오류 수가 10회가 넘었습니다.
wex.fleet.mgmt.recommended.desc.high_windows_crash=OS 충돌을 해결하면 시스템 안정성, 일관된 성능, 중단 없는 사용자 생산성이 보장됩니다.
wex.fleet.mgmt.recommended.desc.kernel_panic_error=커널 패닉 오류를 해결하면 시스템의 안정성이 향상되고, 보안이 강화되며, 데이터 손실을 예방할 수 있습니다.
wex.fleet.mgmt.recommended.desc.last_reboot_more_than_21_days=장치를 다시 시작하면 임시 파일이 삭제되고 시스템 프로세스가 새로 고쳐져 전반적인 성능과 안정성이 향상됩니다.
wex.fleet.mgmt.recommended.desc.linux_disk_encryption_not_enabled=디스크 암호화를 활성화하면 저장 장치의 콘텐츠를 보호하여 데이터 보안을 크게 개선할 수 있습니다.
wex.fleet.mgmt.recommended.desc.linux_firewall_disabled=Linux 방화벽을 활성화하면 무단 액세스를 차단하고 잠재적인 위협으로부터 네트워크를 보호할 수 있습니다.
wex.fleet.mgmt.recommended.desc.linux_secure_boot_not_enabled=보안 부팅을 활성화하면 부팅 과정에서 신뢰할 수 있는 소프트웨어만 로드되어 시스템 보안이 강화됩니다.
wex.fleet.mgmt.recommended.desc.memory_utilization_high=높은 메모리 사용량을 분석하면 시스템 성능과 안정성에 영향을 미칠 수 있는 문제를 식별하고 해결하는 데 도움이 됩니다.
wex.fleet.mgmt.recommended.desc.missing_critical_bios_updates=BIOS 업데이트를 적용하면 시스템 안정성은 물론, 새로운 하드웨어나 소프트웨어와의 호환성이 보장됩니다.
wex.fleet.mgmt.recommended.desc.missing_critical_driver_updates=드라이버를 업데이트하면 하드웨어 오작동을 방지하고 안전하고 안정적이며 고성능 시스템을 보장할 수 있습니다.
wex.fleet.mgmt.recommended.desc.missing_linux_security_updates=보안 업데이트를 적용하면 악성 코드와 악용으로부터 보호하고, 공격 표면을 줄이며, 시스템의 무결성을 강화할 수 있습니다.
wex.fleet.mgmt.recommended.desc.missing_linux_updates=최신 업데이트를 설치하면 커널, 시스템 라이브러리, 애플리케이션의 취약점이 해결됩니다. 이는 악용, 악성 코드, 무단 액세스로부터 시스템을 보호합니다.
wex.fleet.mgmt.recommended.desc.missing_windows_security_updates=보안 업데이트를 적용하면 최신 위협과 취약점으로부터 보호하여 시스템을 공격으로부터 안전하게 보호할 수 있습니다.
wex.fleet.mgmt.recommended.desc.missing_windows_updates=최신 업데이트를 설치하면 취약점이 수정되고 시스템이 안전하고 정상적으로 작동하도록 보장할 수 있습니다.
wex.fleet.mgmt.recommended.desc.poor_network_signal_strength=강력한 신호 강도는 안정적이고 신뢰할 수 있는 연결을 보장하고, 온라인 활동 중 중단이나 멈춤을 최소화합니다.
wex.fleet.mgmt.recommended.desc.poor_nominal_speed=작업을 효율적으로 완료하고, 클라우드 서비스에 액세스하고, 중단 없이 동료와 협업하기 위해서는 안정적이고 빠른 인터넷 속도가 중요합니다.
wex.fleet.mgmt.recommended.desc.unauthenticated_connection=조직은 인증을 요구함으로써 악성 장치가 네트워크에 연결하지 못하도록 하며, 잠재적 보안 유출 위험을 줄일 수 있습니다.
wex.fleet.mgmt.recommended.desc.windows_secure_boot_not_enabled=보안 부팅을 활성화하면 승인되지 않은 펌웨어 및 운영 체제 수정을 방지하여 시스템 보안을 강화할 수 있습니다.
