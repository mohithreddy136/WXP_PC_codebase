side_panal.smart_refresh.help_sec2_table_low=양호
side_panal.smart_refresh.help_sec2_table_medium=곧 새로 고침
side_panal.smart_refresh.help_sec3_header=요인
side_panal.smart_refresh.help_sec3_point_1=CPU 사용량: 최근 30일 내 사용된 평균 사용률
side_panal.smart_refresh.help_sec3_point_2=메모리 사용량: 최근 30일 내 사용된 평균 사용률
side_panal.smart_refresh.help_sec3_point_3=디스크 사용량: 마지막으로 기록된 사용률
side_panal.smart_refresh.help_sec3_point_4=OS 충돌: 지난 7일 동안의 총 운영 체제 충돌 수
side_panal.smart_refresh.help_sec3_point_5=BSOD: 지난 7일 동안 발생한 총 블루 스크린 수
side_panal.smart_refresh.help_sec3_point_6=시작 지속 시간: 마지막으로 기록된 시간(분)
side_panal.smart_refresh.help_sec3_point_7=종료 지속 시간: 마지막으로 기록된 시간(분)
side_panal.smart_refresh.help_sec3_point_8=협업 앱에 대한 소프트웨어 오류: 지난 7일 동안의 총 오류 수
side_panal.smart_refresh.help_sec3_point_9=도킹 스테이션 전원 상태: 마지막으로 기록된 데이터, 예/아니오
side_panal.smart_refresh.help_sec3_sub_text=다음 9가지 요인이 점수에 기여하며 각각 어떻게 측정되는지에 대한 설명을 포함합니다.
side_panal.smart_refresh.help_sub_title=HP Smart Refresh로 적절한 때에 PC를 업그레이드합니다. 다음과 같은 방식으로 진행됩니다.
side_panal.smart_refresh.personas_header=페르소나
side_panal.smart_refresh.personas_sub_text=사용 패턴에 따라 결정되는 AI 기반 장치 그룹
side_panal.smart_refresh.point_1_desc=하드웨어 성능, 소프트웨어 유용성 및 보안의 측면에서 PC의 현재 상태를 평가합니다.
side_panal.smart_refresh.point_1_title=1. 평가
side_panal.smart_refresh.point_2_desc=PC의 사용량, 비즈니스 운영에서의 중요도 또는 노후화 수준을 기반으로 즉각적인 주의가 필요한 PC의 우선 순위를 지정합니다.
side_panal.smart_refresh.point_2_title=2. 우선 순위 지정
side_panal.smart_refresh.point_3_desc=계획된 업그레이드나 교체를 효율적으로 수행하여 가동 준단과 사용자의 혼란을 최소화합니다.
side_panal.smart_refresh.point_3_title=3. 구현
side_panal.smart_refresh.point_4_desc=새로 고쳐진 PC가 사이버 위협으로부터 보호하기 위한 최신 보안 조치를 갖추도록 합니다.
side_panal.smart_refresh.point_4_title=4 보안
side_panal.smart_refresh.point_5_desc=새로 고쳐진 PC를 정기적으로 모니터링하여 계속 최적의 성능을 내도록 하고 필요에 따라 유지 관리를 수행합니다.
side_panal.smart_refresh.point_5_title=5. 모니터링 및 유지 관리
side_panal.smart_refresh.software_persona_1=휴면 상태: 장치를 자주 이용하지 않는 사용자
side_panal.smart_refresh.software_persona_2=Office 365: Excel 및 Word와 같은 Office 애플리케이션을 자주 이용하는 사용자
side_panal.smart_refresh.software_persona_3=파워 코더: 코딩을 위해 개발자 도구를 자주 이용하는 사용자
side_panal.smart_refresh.software_persona_4=Productivity Coder: Users who frequently use developer tools for coding
