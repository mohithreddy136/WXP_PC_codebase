exp.LastReboot21Days.possibleCauses=가능한 원인:
exp.LastReboot21Days.remediationScheduleRestart=Microsoft Intune 또는 PowerShell과 같은 시스템 관리 도구를 사용하여 다시 시작을 예약합니다.
