dnto.subscriptions.privacy_statement.desc1=HP는 개인정보 보호가 기본적인 인권임을 인식하고 있으며, 나아가 전 세계 고객과 파트너에 대한 개인정보 보호, 보안 및 데이터 보호의 중요성을 인식하고 있습니다. 국경을 넘나드는 법인체, 비즈니스 프로세스, 관리 구조 및 기술 시스템을 갖춘 글로벌 조직으로서 당사는 모든 운영 전반에 걸쳐 법적으로 규정하는 수준 이상의 보호를 제공하고 일관되고 엄격한 정책과 절차를 갖추기 위해 노력하고 있습니다.
dnto.subscriptions.privacy_statement.desc2=본 정책에 사용된 "당사", "당사의" 및 "회사"와 같은 용어는 현지 법률에 정의된 대로 HP 브랜드 회사와 현재 및 향후의 계열사(이하 "HP")를 의미합니다. HP 데이터 보호 책임자의 연락처 정보는 아래 "{0}" 섹션에 나와 있습니다.
dnto.subscriptions.privacy_statement.exercise_rights=권리 행사 및 당사에 연락하기
dnto.subscriptions.privacy_statement.heading=HP 개인 정보 보호 정책
dnto.subscriptions.section.details.desc1=직원들은 원하는 장소에서 원하는 방식으로 유연하게 일하는 데에 익숙해져 있고 심지어 요구하기도 합니다. IT 팀이 경계를 넘어 확장되면서 직원 경험, 생산성 및 참여도가 저하되고 있습니다.
dnto.subscriptions.section.details.desc2=HP Workforce Experience Pro는 통합된 모듈식 플랫폼에서 디지털 마찰을 지능적으로 예측하고 해결합니다.
dnto.subscriptions.section.details.desc3=단일 위치에서 소규모 팀을 관리하든 글로벌 하이브리드 인력의 복잡성을 탐색하든 HP Workforce Experience Pro는 직원의 디지털 경험을 지원하고 최적화할 수 있는 통합 플랫폼을 제공합니다.
dnto.subscriptions.section.details.desc4=IT 문제가 발생하기 전에 사전에 해결하여 직원 생산성 향상 고급 AI로 IT 지원 시간과 비용 절감 위협을 예측하고 해결하여 엔드포인트 보안 강화
dnto.subscriptions.section.details.desc5=펄스 설문조사에서 얻은 실행 가능한 인사이트로 직원 정서에 부응 스마트한 하드웨어 교체로 비용 최적화 기존의 다중 공급업체 및 다중 OS 환경과 원활하게 통합
dnto.subscriptions.section.details.heading=가입 세부 정보
