exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.possibleCauses=가능한 원인:
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.responseOptions=문제의 애플리케이션에 따라 응답 옵션이 달라질 수 있습니다. 애플리케이션이 비즈니스에 중요한 경우 CPU를 업그레이드하면 문제가 완화될 수 있습니다. 비즈니스에 중요하지 않은 애플리케이션의 경우, 장치에서 제거하거나 설정을 조정하여 장치의 부하를 줄일 수 있습니다.
