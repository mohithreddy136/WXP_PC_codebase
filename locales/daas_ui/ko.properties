adminx.onboarding.termsAndCondition=<div classname=duns-info-content><div classname=title>1. Check if Your Company Already Has a DUNS Number</div><div classname=content>Before applying, check if a DUNS number already exists for your company:</div><ul classname=list-ul><li>Go to the <span classname=bold>Dun & Bradstreet DUNS Lookup Tool:</span><ul classname=list-ul><li><span classname=bold>US/Global:</span>{' '} <a classname=link href={usLookUpUrl} rel="noopener noreferrer"target=_blank>https://www.dnb.com/duns-number/lookup.html</a><li><span classname=bold>UK:</span>{' '} <a classname=link href={ukLookUpUrl} rel="noopener noreferrer"target=_blank>https://www.dnb.co.uk/duns-number.html</a></ul></ul><div classname=sub-title>You’ll need:</div><ul classname=list-ul><li>Business name<li>Address<li>City and state (or country)</ul><div classname=title>2. If You Don’t Have One, Request a DUNS Number</div><div classname=content>You can apply for free, especially if you’re doing business with the U.S. government or registering on systems like <span classname=bold>SAM.gov</span>.</div><div classname=sub-title><span classname=bold>✅ Steps:</span></div><ol classname=list-ol><li>Go to the official DUNS number request page:<br><a classname=link href={getDunsUrl} rel="noopener noreferrer"target=_blank>https://www.dnb.com/duns-number/get-a-duns.html</a><li>Select your country and follow the instructions.<li>Prepare the following information:<ul classname=list-ul><li>Legal name of your business<li>Business address<li>Phone number<li>Name of the owner/executive<li>Legal structure (e.g., LLC, Corp)<li>Number of employees<li>Type of business</ul><li>Submit the form.</ol><div classname=sub-title><span classname=bold>⏰ Timeline:</span></div><ul classname=list-ul><li>Usually 1–5 <span classname=italic>business days</span>, faster if for the U.S. government.</ul><div classname=title>3. Track or Contact Support</div><ul classname=list-ul><li>If needed, contact <span classname=bold>Duns & Bradstreet Customer Support</span><ul classname=list-ul><li><span classname=bold>US:</span> 1-866-705-5711<li><span classname=bold>Global:</span> Contact details vary by country{' '} <a classname=link href={supportUrl} rel="noopener noreferrer"target=_blank>(contact Page)</a></ul></ul></div>
