asset_details_last_restart.cause9=사용자 프로세스 개시 재시작(스크립트 또는 프로그래밍 요청을 통해)
asset_details_last_restart.description1=Windows closes apps, stops services, unloads drivers, and reinitializes the OS kernel before booting fresh.
asset_details_last_restart.description2=재시작하면 업데이트를 적용하고, 성능 문제를 해결하며, 메모리를 정리할 수 있습니다.
asset_details_last_restart.description3=Windows does not use Fast Startup during restart. Instead it performs a clean OS restart but keeps certain hardware states warm.
asset_details_last_restart.full_boot=전체 부팅
asset_details_last_restart.full_boot.description=Windows가 전체 부팅을 통해 재시작할 때, 운영체제를 완전히 다시 로딩하고 하드웨어 구성 요소를 다시 초기화합니다. 표준 재시작이나 빠른 시작을 통한 종료와는 달리, 이 과정은 커널 세션을 유지하지 않습니다. 완전히 종료한 후 다시 켜는 것처럼 모두 새로 시작됩니다.
asset_details_last_restart.full_boot.timestamp=This timestamp is the start of the last full system boot (cold boot or warm boot), regardless of what caused the Startup.
asset_details_last_restart.note1=이 타임스탬프는 전체 부팅/재시작이 발생할 때만 업데이트되며, 이는 Windows에서 새 세션을 완전히 초기화했음을 의미합니다.
asset_details_last_restart.note2=빠른 시작이 활성화된 경우, 이 필드는 하이브리드/빠른 시작 세션에서는 업데이트되지 않습니다. 마지막 진정한 전체 재시작만을 반영합니다.
