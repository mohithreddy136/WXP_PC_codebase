dnto.subscriptions.about_hp.desc1=HP는 기업이 단순한 이익 창출 이상의 것을 해야 한다는 믿음에서 탄생한 기술 회사입니다. 기업들은 세상을 더 나은 곳으로 만들어야 합니다. 기후 행동, 인권, 디지털 형평성에 대한 우리의 노력은 우리가 이를 실현하기 위해 최선을 다하고 있음을 증명합니다.
dnto.subscriptions.about_hp.desc2=이러한 의도를 입증해 온 80년 이상의 세월을 통해 HP는 혁신이 인류에 크나큰 기여를 할 수 있는 세상을 확신을 가지고 구상합니다.
dnto.subscriptions.about_hp.desc3=그리고 개인용 시스템, 프린터, 3D 프린팅 솔루션으로 구성된 제품 및 서비스 포트폴리오의 집약체라 할 수 있는 HP의 기술은 이러한 의미 있는 발전에 영감을 불어넣습니다.
dnto.subscriptions.about_hp.desc4=HP는 언제나, 어디서나, 누구에게서나 사려 깊은 아이디어가 나올 수 있다는 것을 알고 있습니다.
dnto.subscriptions.about_hp.desc5=그리고 그것이 바로 세상을 바꾸는 것입니다.
