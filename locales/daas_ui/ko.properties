account_management.subscriptions.addon.vyopta.desc=실시간 인사이트를 통해 협업을 최적화하세요. Microsoft Teams, Zoom, Poly, Webex에서 통화 품질, 회의실 사용량 및 시스템 성능을 모니터링할 수 있습니다. WXP와 통합되면 IT 팀이 디지털 경험을 개선하고 업무 효율성을 높이는 데 도움이 됩니다.
account_management.subscriptions.addon.vyopta.features.comprehensive_monitoring=협업 플랫폼 전반에 걸친 종합적인 모니터링
account_management.subscriptions.addon.vyopta.features.comprehensive_monitoring.desc=멀티벤더 통합 커뮤니케이션(UC) 환경을 전체적으로 파악하여 영상 및 음성 협업 도구를 효율적으로 관리할 수 있습니다.
account_management.subscriptions.addon.vyopta.features.deep_integration=WXP와의 심층　통합
account_management.subscriptions.addon.vyopta.features.deep_integration.desc=Vyopta의 분석 및 모니터링 데이터는 WXP에 원활하게 내장되어 있어 IT 팀이 다른 업무 환경 기술과 함께　사용하여 협업 성과를 관리할 수 있습니다. 이 중앙 집중식 접근 방식은 IT 효율성을 개선하고, 복잡성을 줄이며, 디지털 경험 관리를 강화합니다.
account_management.subscriptions.addon.vyopta.features.enhance_user_engagement=사용자 참여도 향상 및 복지 개선
account_management.subscriptions.addon.vyopta.features.enhance_user_engagement.desc=협업 분석을 활용하여 생산성을 저해하는 장벽을 파악하고 직원 경험과 복지를 개선할 수 있습니다.
account_management.subscriptions.addon.vyopta.features.optimize_meeting_space=회의 공간 활용 최적화
account_management.subscriptions.addon.vyopta.features.optimize_meeting_space.desc=회의실 점유율과 사용 패턴을 분석하여 공간 투자를 극대화하고 회의실 효율성을 높입니다.
account_management.subscriptions.addon.vyopta.features.proactive_issue_detection=사전 예방적 문제 감지 및 해결
account_management.subscriptions.addon.vyopta.features.proactive_issue_detection.desc=실시간 모니터링을 활용하여 협업 품질 문제가 사용자에게 영향을 미치기 전에 식별 후 해결하여 문제 해결 시간을 줄입니다.
account_management.subscriptions.addon.vyopta.header=Vyopta의 협업 경험
account_management.subscriptions.addon.vyopta.overview=협업 도구용 고급 모니터링 및 분석을 통해 IT 팀의 역량을 강화하세요. WXP 내 Vyopta 통합 기능은 Microsoft Teams, Zoom, Poly, Webex 등의 플랫폼에서 회의실 사용량, 통화 품질, 시스템 성능을 실시간으로 파악할 수 있는 기능을 제공합니다. 협업 관련 문제를 적극적으로 해결하고 업무 공간 경험을 최적화하여 직원 생산성을 높여보세요.
account_management.subscriptions.addon.vyopta.short_desc=협업 환경을 최적화하기 위한 유용한 분석 정보 및 공간 인사이트
account_management.subscriptions.addon.wolf.desc=PC 보안을 강화하기 위해 내장 PC 및 소프트웨어 보안을 모두 활용하여 배포와 가시성을 개선하고 종합적인 보호를 제공합니다.
account_management.subscriptions.addon.wolf_security=HP Wolf Security
account_management.subscriptions.addon.wolf_security.desc=사이버 공격으로부터 장치를 보호하는 HP Wolf 기반의 탁월한 보호 기능을 제공합니다. 보안 강화를 위해 Workforce Experience에서 원격 측정을 확인하십시오.
account_management.subscriptions.addon.wpt.desc=원격으로 분실 또는 도난 장치를 추적, 잠금, 보안 처리합니다. WXP와 통합해 장치 전원이 꺼진 상태에서도 IT 팀이 PC 자산을 추적하고 장치 분실 위험을 줄이도록 합니다.
account_management.subscriptions.addon.wpt.features.always_available=항상 이용 가능
account_management.subscriptions.addon.wpt.features.always_available.desc=사용자　지정 하드웨어와 소프트웨어를 활용하여 PC가 꺼져 있거나, 인터넷에　연결되어　있지　않거나, 부팅되지 않았더라도 찾고 잠그고 지울 수 있습니다.
account_management.subscriptions.addon.wpt.features.message_customization=메시지 사용자　지정
account_management.subscriptions.addon.wpt.features.message_customization.desc=대상 PC에 잠금 해제 지침용　사용자 지정 메시지 전송
account_management.subscriptions.addon.wpt.features.remote_lock_and_erase=원격 잠금 및 지우기
account_management.subscriptions.addon.wpt.features.remote_lock_and_erase.desc=펌웨어 수준에서 장치를 잠그면 데이터를 보호하고 도난당한 장치는 사용하지　못하게　할　수　있습니다. 데이터 유출을 방지하려면 분실되거나 도난당한 장치의 기본 스토리지를 지우세요.
account_management.subscriptions.addon.wpt.features.seamless_integration=WXP와의 원활한 통합
account_management.subscriptions.addon.wpt.features.seamless_integration.desc=WXP 내에서 장치　보안을 직접 관리하여 IT 운영 및 엔드포인트 관리를 간소화합니다.
account_management.subscriptions.addon.wpt.features.separations_of_duties=업무 분리
account_management.subscriptions.addon.wpt.features.separations_of_duties.desc=잠금/지우기 시 여러 승인자를　두어 실수나 내부자 위협을 방지합니다.
account_management.subscriptions.addon.wpt.features.strong_audit_trail=강력한 감사 추적
account_management.subscriptions.addon.wpt.features.strong_audit_trail.desc=WXP 플랫폼에서 성공적으로　수행한 잠금 및 지우기　실행　내역을 규정　준수 증거로 기록합니다.
account_management.subscriptions.addon.wpt.header=HP Wolf Protect and Trace with Wolf Connect
account_management.subscriptions.addon.wpt.overview=HP Wolf Protect & Trace로 자산 관리를 개선하고 데이터 누출 위험을 줄입니다. WXP로 통합된 특별한 솔루션은 전원이 꺼진 상태에서도 IT 팀이 장치의 위치 파악, 잠금, 분실 또는 도난 장치 삭제를 가능하게 합니다. 모든 규모의 고객에게 적합한 글로벌 커버리지 및 간단한 관리
account_management.subscriptions.addon.wpt.requirements.purchase=HP 영업 담당자 또는 공인 채널 파트너로부터 새 HP PC를 구매해야 합니다.<br> "WWAN" 디스플레이 옵션이 있는 지원되는 PC가 필요합니다. 지원되는 PC: https://www.hpwolf.com/en/legal/ptwc/platforms
