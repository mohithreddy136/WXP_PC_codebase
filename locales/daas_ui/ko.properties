partner.exp.mgmt.recommended.desc.MISSING_CRITICAL_DRIVER_UPDATES=중요한 드라이버 업데이트가 없으면 장치 하드웨어가 오작동하거나 전혀 작동하지 않을 수 있습니다.
partner.exp.mgmt.recommended.desc.MISSING_WINDOWS_SECURITY_UPDATES=오래된 보안 업데이트는 장치를 해커와 바이러스에 취약하게 만들 수 있습니다.
