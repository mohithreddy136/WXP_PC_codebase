exp.GpuHealthIssue.causeBlueScreenErrors=블루스크린 오류: 블루스크린 오류는 그래픽을 많이 사용하는 프로그램이나 비주얼 효과가 동시에 실행되거나, 드라이버 및 하드웨어 문제로 인해 발생할 수 있습니다.
exp.GpuHealthIssue.causeDoubleBitEcc=이중 비트 ECC 메모리 오류: 그래픽 카드에서 이중 비트 ECC 메모리 오류가 발생하고 있으며, 이는 하드웨어 문제나 메모리 결함이 있음을 나타낼 수 있습니다.
exp.GpuHealthIssue.causeHighDoubleBitEccOverTime=시간이 흐를수록 대량의 이중 비트 ECC 메모리 오류 발생: 그래픽 카드에서 이중 비트 ECC 메모리 오류가 많이 발생하고 있으며, 평균 오류 수가 3주 이상 증가하고 있습니다.
exp.GpuHealthIssue.causeHighTdrEvents=대량의 TDR(디스플레이 드라이버 시간 초과 및 복구) 이벤트 발생: 그래픽 카드에서 많은 TDR 이벤트가 발생하고 있으며, 이는 드라이버나 하드웨어에 문제가 있음을 나타낼 수 있습니다.
exp.GpuHealthIssue.causeMissingDriverUpdate=핵심 드라이버 업데이트 누락: 그래픽 카드에 중요한 드라이버 업데이트가 빠져 있어 성능과 안정성에 영향을 줄 수 있습니다.
exp.GpuHealthIssue.causeThermalIssues=발열 오류: 그래픽 카드에서 발열 오류가 많이 발생하고 있으며, GPU 또는 메모리 온도가 최대 작동 온도를 초과하고 있습니다.
exp.GpuHealthIssue.driverOption1=옵션 1: HP Image Assistant를 사용하여 드라이버 업데이트
exp.GpuHealthIssue.driverOption2=옵션 2: Windows 업데이트를 사용하여 드라이버 업데이트
exp.GpuHealthIssue.possibleCauses=가능한 원인:
exp.GpuHealthIssue.remediationBlueScreenPrefix=블루스크린 오류의 경우: 그래픽을 많이 사용하는 프로그램이나 비주얼 효과가 동시에 실행되고 있는지 확인합니다. 그래픽 카드 드라이버를 업데이트하고 오버클럭 설정을 기본값으로 재설정한 뒤, 드라이버를 새로 설치하십시오. 아니면 설정을 공장 초기값으로 되돌리고, 전원 공급이 적절한지 확인한 후 공기 배출구와 팬을 깨끗하게 청소하십시오. 특정 수정 단계를 위한 미니 덤프 파일 분석:
exp.GpuHealthIssue.remediationDoubleBitEcc=이중 비트 ECC 메모리 오류의 경우: 상황을 꾸준히 모니터링하며 성능이 계속해서 저하되는지 확인합니다. 오류 발생 빈도가 높을 경우 그래픽 카드 교체를 고려해 보십시오.
exp.GpuHealthIssue.remediationMissingDriver=드라이버 업데이트가 누락된 경우: 그래픽 카드 드라이버를 최신 버전으로 업데이트하여 성능 문제를 해결하십시오.
exp.GpuHealthIssue.remediationTdr=TDR 이벤트의 경우: 문제가 지속되는 경우 그래픽 카드 드라이버를 지속적으로 모니터링하고 업데이트합니다. 그래픽 설정을 기본값으로 재설정하고, 오버클럭 설정을 기본값으로 되돌리십시오. 업데이트가 이용　가능하다면 BIOS를 업데이트하고, 전원 공급이 충분하고 공기가 적절히 흐르는지 확인하십시오. 공기 통풍구와 팬을 청소합니다.
exp.GpuHealthIssue.remediationThermal=발열 오류의 경우: 공기 흐름이 제한되어 있는지 확인하고, 공기 통풍구를 청소하고, 팬이 제대로 작동하고 청결한지 확인하십시오.
exp.GpuHealthIssue.suggestedRemediations=추천 해결 방법:
exp.GpuHealthIssue.title=GPU 상태 해결
exp.HpBatteryHealthManagerNotEnabled.causeNotCompatible=장치가 HP 배터리 상태 관리자와 호환되지 않습니다.
exp.HpBatteryHealthManagerNotEnabled.causeRequiresBiosUpdate=장치에서 BIOS 업데이트가 필요합니다.
exp.HpBatteryHealthManagerNotEnabled.description=2016년 이후부터 HP의 모든 비즈니스 노트북에서 HP 배터리 상태 관리자가 제공됩니다. 배터리 수명을 늘리려면 배터리 상태 관리자를 활성화하는 것이 좋습니다.
exp.HpBatteryHealthManagerNotEnabled.option1Detail=HP는 사용량과 장치　상태에 따라 'HP에서 배터리 충전을 관리하도록 하기' 또는 '배터리 상태 최적화'로 HP 배터리 상태 관리자를 활성화하기를 권장합니다.
exp.HpBatteryHealthManagerNotEnabled.option1Title=옵션 1: BIOS를 지원되는 버전으로 업데이트
exp.HpBatteryHealthManagerNotEnabled.possibleCauses=가능한 원인:
exp.HpBatteryHealthManagerNotEnabled.reference1Link=https://support.hp.com/us-en/document/ish_4449597-3519507-16
exp.HpBatteryHealthManagerNotEnabled.reference1Text=HP 배터리 상태 관리자 - 지원
exp.HpBatteryHealthManagerNotEnabled.references=참조:
exp.HpBatteryHealthManagerNotEnabled.settingLetDetail1=시간이 흐를수록 사용 조건과 온도에 따라 시스템의 배터리 충전 방식이 동적으로 변경됩니다.
exp.HpBatteryHealthManagerNotEnabled.settingLetTitle=HP에서 배터리 충전을 관리하도록 하기
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases1=노트북을 자주 AC 전원에서 분리하고 배터리가 방전되도록 허용하는 혼합 사용 환경
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases2=조직에서 단일 프로세스 선호
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases3=노트북이 1년 미만인 신제품
exp.HpBatteryHealthManagerNotEnabled.settingMaxDetail1=배터리의 최대 충전 상태를 80%로 제한하여 배터리 상태를 최적화하고 부풀어 오르는 현상을 완화합니다.
exp.HpBatteryHealthManagerNotEnabled.settingMaxTitle=배터리 상태 최적화
exp.HpBatteryHealthManagerNotEnabled.settingMaxUseCases1=노트북이 지속적으로 AC 전원에 연결되어 있는 환경
exp.HpBatteryHealthManagerNotEnabled.settingMaxUseCases2=1년 이상 된 노트북
exp.HpBatteryHealthManagerNotEnabled.suggestedRemediations=추천 해결 방법:
