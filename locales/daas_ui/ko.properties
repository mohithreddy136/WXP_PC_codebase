requirements.list.hp_print_fleetproxy.desc1=Print Fleet Proxy를 동일한 PC에 설치하려면 HP Web Jetadmin이 필요합니다. HP에서는 HP Fleet Proxy를 설치하기 전 Web Jetadmin을 최신 버전으로 업그레이드하도록 강력하게 권장합니다.
requirements.list.hp_print_fleetproxy.desc2=현재 HP는 HP Web Jetadmin 10.5 SR4에 대해서만 HP Fleet Proxy를 테스트하고 있습니다. HP Fleet Proxy는 이전 버전의 HP Web Jetadmin에서 작동할 수도 있지만 HP는 모든 기능이 예상대로 작동한다고 보장하지 않습니다.
requirements.list.hp_print_fleetproxy.desc3=Web Jetadmin은 리소스 집약적인 서비스입니다. HP Fleet Proxy는 별도의 오버헤드를 많이 추가하지 않아야 하지만, 호스트 서버가 서비스와 관리하는 장치를 모두 지원하기에 충분한 컴퓨팅 성능을 갖추지 못하면 성능에 영향을 미칠 수 있습니다. HP Web Jetadmin 및 HP Fleet Proxy를 호스팅하는 서버가 성능 문제를 완화할 수 있을 만큼 견고하고 프로세서 코어가 충분한지 확인해야 합니다.
requirements.list.hp_print_fleetproxy.desc4=2000개 장치를 테스트하면서 HP는 다음과 같은 기본 하드웨어 사양이면 허용 가능한 성능 결과를 얻기에 충분하다는 사실을 확인했습니다. 성능이 저하되거나 2,000개 이상의 장치를 관리하는 경우 더 많은 컴퓨팅 성능을 갖춘 서버가 필요할 수 있습니다.
requirements.list.hp_print_fleetproxy.desc5=Print Fleet Proxy는 클라우드 기반 서비스와 통신하는 온프레미스 서비스입니다. 따라서 DNS 필터링이나 IP 화이트리스트를 통해 WJA 서버와 HP Command Center 간의 인바운드 및 아웃바운드 통신을 허용하도록 방화벽을 구성해야 합니다.
requirements.list.hp_print_fleetproxy.desc6=여기에서 목록을 확인할 수 있습니다.
requirements.list.hp_print_fleetproxy.hp-nf1=DNS 필터링: 포트 443을 통해 다음 엔드포인트로 외부 HTTPS 요청을 허용하도록 방화벽을 구성하십시오.
requirements.list.hp_print_fleetproxy.hp-nf2=IP 화이트리스트: IP 주소를 화이트리스트에 추가하려면 HP Fleet Proxy가 통신해야 할 수 있는 모든 클라우드 서버의 IP 주소를 포함해야 합니다.
