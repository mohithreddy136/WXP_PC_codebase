applicationInv.help.content=애플리케이션 탐색기 대시보드는 설명 및 버전 번호와 같은 심층적인 세부 정보를 제공하는 조직 소프트웨어 애플리케이션의 중앙 집중식 저장소를 제공합니다. 애플리케이션 환경에 대한 통합된 보기를 제공함으로써 향상된 보안, 규정 준수 및 정보에 입각한 IT 계획을 지원합니다. 또한 대시보드는 애플리케이션 유지 관리, 업데이트 및 마이그레이션 관리를 단순화하여 보다 효율적이고 간소화된 프로세스를 보장합니다.
