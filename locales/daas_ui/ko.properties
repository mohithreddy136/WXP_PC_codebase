exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.appsCausingHighCpu=높은 CPU 사용량을 일으키는 앱 열에서 CPU를 많이 사용하는 애플리케이션을 식별합니다.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeBackgroundProcesses=시스템 업데이트, 바이러스 백신 검사 및 기타 유지보수 작업을 포함한 수많은 백그라운드 프로세스와 서비스는 CPU 용량을 소모하여 사용률이 높아질 수 있습니다.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeFirmwareBug=펌웨어 버그로 인해 CPU가 예상보다 높은 수준으로 실행될 수 있습니다.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeMalfunctioningSoftware=잘못 최적화되거나 오작동하는 소프트웨어가 특히 루프에 갇히거나 비효율적으로 리소스를 소비할 경우 CPU 사용량을 과도하게 증가시킬 수 있습니다.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeResourceIntensiveApps=비디오 편집기, 가상 머신, 복잡한 계산과 같은 리소스 집약적인 애플리케이션을 실행하면 CPU 리소스를 많이 이용하게 되어 사용률이 높아집니다.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.closeHighCpuApps=CPU를 많이 사용하는 애플리케이션을 닫습니다.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.connectAcAdapter=장치 전원 설정에 따라 배터리로 작동 시 CPU가 낮은 성능으로 실행될 수 있으므로 AC 어댑터에 연결합니다.
