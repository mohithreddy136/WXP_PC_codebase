exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1=옵션 1: 라우터 재시작
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step1=모뎀과 라우터의 전원 플러그를 콘센트에서 분리합니다.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step2=15초 이상 기다립니다.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step3=먼저 모뎀을 AC 콘센트에 다시　연결하고 1~2분 기다린 후 라우터를 켜십시오.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step4=케이블 모뎀의 모든 패널 표시등이 녹색으로 바뀔 때까지 기다린 후 인터넷 연결을 테스트합니다.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2=옵션 2: 액세스 지점을 이동합니다.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step1=할 수 있는 경우 액세스 지점을 이동하여 액세스 지점과 PC 사이에 있는 벽이나 기타 장애물의 수를 줄입니다.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step2=가능한 경우 PC를 액세스 지점에 더 가깝게 이동합니다.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step3=가능한 경우 액세스 지점을 집이나 방의 가운데로, 최대한 높은 위치로 이동합니다. 구석이나 책상 아래에 두면 Wi-Fi 신호 강도가 줄 수 있습니다.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendations=권장 사항:
