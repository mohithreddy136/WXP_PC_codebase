asset_details_last_fast_startup.hibernation_note=빠른 시작을 사용하려면 최대 절전 모드가 활성화되어 있어야 합니다. 옵션이 누락된 경우 고급 명령 프롬프트에서 이 명령을 실행하십시오.
asset_details_last_fast_startup.note.description=이 타임스탬프는 가장 최근의 빠른 부팅 세션이 시작된 시점을 나타내며, 이는 다음과 같은 상황에서 발생합니다.
