account_management.subscriptions.addon.anyware.azure_notice=라이선스는 현재 Azure Marketplace에서만 제공됩니다. HP Anyware Standard 라이선스에는 HP Anyware Manager Enterprise에 대한 액세스 권한이 포함되어 있습니다.
account_management.subscriptions.addon.anyware.desc=팀을 위한 원격 데스크톱을 관리하고 프로비저닝하세요. 최종 사용자는 VPN 없이 안전하게 데스크톱에 액세스할 수 있습니다. HP Anyware와 WXP 통합 시 한 곳에서 원격 플릿 모니터링
account_management.subscriptions.addon.anyware.desc.short=데스크탑에 대한 안전한 액세스, 관리 및 모니터링
account_management.subscriptions.addon.anyware.enterprise.header=HP Anyware Manager Enterprise
account_management.subscriptions.addon.anyware.features.automation=작업 자동화
account_management.subscriptions.addon.anyware.features.automation.desc=맞춤 관리 워크플로를 관리 플레인에 원활하게 통합
account_management.subscriptions.addon.anyware.features.multitenant_rbac=다중 테넌트 및 역할 기반 액세스 제어
account_management.subscriptions.addon.anyware.features.multitenant_rbac.desc=HP Anyware Manager Enterprise의 단일 인스턴스로 여러 조직을 관리합니다. 역할에 따른 관리자 권한 할당
account_management.subscriptions.addon.anyware.features.productivity=최종 사용자 생산성 활성화
account_management.subscriptions.addon.anyware.features.productivity.desc=최종 사용자는 필요한 성능이나 네트워크 조건에 상관없이 데스크톱을 로컬처럼 경험할 수 있습니다.
account_management.subscriptions.addon.anyware.features.provision_desktops=물리 및 가상 데스크톱 관리
account_management.subscriptions.addon.anyware.features.provision_desktops.desc=IT 부서에서는 HP Anyware Manager Enterprise를 통해 원격 데스크톱을 구성하고 모니터링할 수 있습니다. 또한 언제나 최종 사용자에게 가상 데스크톱을 프로비저닝할 수 있습니다.
account_management.subscriptions.addon.anyware.features.remote_access=최종 사용자에게 안전한 원격 액세스 제공
account_management.subscriptions.addon.anyware.features.remote_access.desc=최종 사용자는 VPN 없이 안전하게 데스크톱에 액세스할 수 있습니다. HP Anyware는 클라우드 게이트웨이를 통해 간편한 액세스를 제공합니다.
account_management.subscriptions.addon.anyware.features.role_access.desc=다른 환경에 게이트웨이를 설치할 필요 없이 사용자 할당 및 세션 라우팅 수행
account_management.subscriptions.addon.anyware.features.role_cloud_gateways=클라우드 게이트웨이를 통한 간소화된 액세스
account_management.subscriptions.addon.anyware.features.setup=어떤 IT 환경에서도 간단하게 설정
account_management.subscriptions.addon.anyware.features.setup.desc=온프레미스, 클라우드, 하이브리드 환경을 포함한 다양한 인프라에서 IT의 복잡함과 규모를 줄이면서 배포와 관리를 간소화할 수 있는 유연하고 직관적인 솔루션입니다.
account_management.subscriptions.addon.anyware.features.workforce_integration=Workforce Experience 통합
account_management.subscriptions.addon.anyware.features.workforce_integration.desc=IT 팀은 원격 데스크톱 데이터를 Workforce Experience Platform 내에서 중앙 집중화하여 궁극적으로 플릿을 종합적으로 파악할 수 있도록 지원합니다.
account_management.subscriptions.addon.anyware.header=HP Anyware
account_management.subscriptions.addon.anyware.overview.desc1=HP Anyware는 VPN 없이도 사용자에게 원격 또는 가상 데스크탑에 대한 보안 액세스를 제공하는 고성능 소프트웨어 솔루션입니다. HP Anyware에는 HP Anyware Manager Enterprise라는 IT 관리 플레인에 대한 액세스가 포함되어 있습니다.
account_management.subscriptions.addon.anyware.overview.desc2=HP Anyware Manager Enterprise(AME)는 IT 부서에서 물리 및 가상 데스크톱을 모두 관리할 수 있는 다중 테넌트 관리 플레인입니다.
account_management.subscriptions.addon.anyware.required_components.header=Workforce Experience 통합을 위한 필수 구성 요소
account_management.subscriptions.addon.anyware.required_components.li1=HP Anyware Standard
account_management.subscriptions.addon.anyware.required_components.li2=HP Anyware Manager Enterprise
account_management.subscriptions.addon.anyware.security_compliance=보안 및 규정 준수
account_management.subscriptions.addon.anyware.security_compliance.desc1=HP Anyware는 강력한 보호와 업계 표준 준수를 보장하기 위해 제품 제공 전반에 걸쳐 보안과 규정 준수를 우선시합니다. 주요 기능에는 엔드투엔드 암호화, 보안 원격 액세스, 멀티 팩터 인증이 포함되어 데이터 무결성과 기밀성을 보호합니다.
account_management.subscriptions.addon.anyware.security_compliance.desc2=HP Anyware는 또한 고급 위협 탐지 및 대응 기능을 통합하여 위험을 사전에 완화합니다. GDPR, HIPAA, SOC 2와 같은 규정을 준수한다는 것은 엄격한 보안 프로토콜을 유지하려는 HP Anyware의 노력을 대변합니다. 지속적인 모니터링과 정기적인 보안 감사를 통해 HP Anyware 제품이 새로운 사이버 위협에 대해 복원력을 유지하도록 보장하여 사용자에게 안전하고 신뢰할 수 있는 IT 관리 경험을 제공합니다.
account_management.subscriptions.addon.anyware.technology=원격 기술
account_management.subscriptions.addon.anyware.technology.desc=HP Anyware의 수상 경력에 빛나는 PCoIP® 원격 디스플레이 기술은 까다로운 네트워크 조건에서도 고화질의 응답성이 뛰어난 컴퓨팅 경험을 제공합니다.
account_management.subscriptions.addon.anyware.technology.desc.li1=PCoIP®는 중앙 서버 또는 워크스테이션에서 이미지 픽셀을 인코딩, 압축, 암호화 및 전송합니다.
account_management.subscriptions.addon.anyware.technology.desc.li2=그런 다음 거의 모든 엔드포인트의 사용자를 위해 이미지의 암호를 해독하고 압축을 해제합니다.
account_management.subscriptions.addon.connect_accounts=계정 연결
account_management.subscriptions.addon.oob.desc.short=고급 진단 및 문제 해결을 위한 BIOS 수준의 원격 제어
account_management.subscriptions.addon.oob.desclaimer1=1. 대역 외 진단 및 문제 해결은 다양한 기간 동안 라이선스로 제공되며, 인텔® vPro® 엔터프라이즈 및 인텔® AMT가 활성화된 모든 공급업체 PC에 적용됩니다. 소프트웨어 솔루션을 운영하고 관리하기 위해 Workforce Experience Platform Starter가 필수로 포함되어 있어야 합니다. 미국, 캐나다 및 EU에서 HP 담당자 또는 HP 공인 리셀러로부터 구매할 수 있습니다. 자세한 내용은 (라이선스 약관/eula에 대한 URL 링크 추가)에서 참조하십시오.
account_management.subscriptions.addon.oob.desclaimer2=2. HP의 PC 제조업체 내부 분석에 따르면, 2024년 9월 24일 기준으로 전력 주기 제어, 비OS 제어, BIOS 제어 및 이미지 재설정 제어 기능을 갖추고 있습니다.
account_management.subscriptions.addon.oob.desclaimer3=3. 장치와 애플리케이션에 대한 중요 데이터를 제공하는 원격 측정 및 분석 앱인 HP Insights 에이전트가 필요합니다. 독립형 서비스로 판매되지 않으며 ISO27001, ISO27701, ISO27017, SOC2 Type2 정보 보안 인증을 받았습니다. 포털에 연결된 인터넷 액세스가 필요합니다. 전체 시스템 요구 사항을 보려면 http://www.hpdaas.com/requirements를 방문하십시오. HP Insights 에이전트 지원 서비스를 구매하려면 각 장치에서 소프트웨어를 실행할 수 있어야 합니다. HP Services Scan은 일부 HP 하드웨어에서 Windows 업데이트를 통해 제공되며, 각 하드웨어 장치에서 자격을 검토하여 활성화된 서비스가 구매되었는지 확인하고 해당 소프트웨어를 자동으로 다운로드합니다. 이 기능을 비활성화하려면 <a target='_blank' href='http://www.hpdaas.com/requirements' style=\"text-decoration:none; color:#4D52E5\">http://www.hpdaas.com/requirements</a>의 지침을 따르십시오.
account_management.subscriptions.addon.oob.desclaimer4=4. 소프트웨어 솔루션을 운영하고 관리하기 위해 WXP Starter가 포함되어 있습니다.
account_management.subscriptions.addon.oob.features.remote_control=Remote control - even when the Operating System is down
account_management.subscriptions.addon.oob.features.remote_control.desc=IT 팀은 BIOS에 원격으로 액세스하여 작업이 진행되는 어디에서나 혼합 브랜드 PC를 재부팅, 이미지 재설정 및 복구할 수 있습니다.
account_management.subscriptions.addon.oob.features.scalable=확장 가능한 중앙 집중형 관리
account_management.subscriptions.addon.oob.features.scalable.desc=엔터프라이즈 배포, 활용 및 관리를 위해 WXP에 통합된 이 기능을 바탕으로 PC 프로비저닝, 대량 라이선스 제어 및 역할 기반 액세스를 간소화할 수 있습니다.
account_management.subscriptions.addon.oob.features.secure=안전한 최종 사용자 경험
account_management.subscriptions.addon.oob.features.secure.desc=사용자는 원격 세션을 볼 수 있으며 언제든지 연결을 중지할 수 있습니다. 안전하고 매끄러운 지원은 신뢰를 쌓아 더 나은 사용자 경험을 제공합니다.
account_management.subscriptions.addon.oob.header=대역 외 원격 연결
account_management.subscriptions.addon.oob.overview.desc1=하이브리드 인력을 위한 디지털 경험을 개선하고 싶으십니까? HP Out-of-band Remote Connect는 지원 기술자에게 원격 BIOS 액세스 권한을 제공하여 운영 체제가 작동하지 않더라도 재부팅, 이미지 재설정 및 PC 복구를 지원합니다. 사용자 참여도, 데스크 방문도 필요 없습니다.
account_management.subscriptions.addon.vyopta.connect_accounts.error=계정을 연결할 수 없습니다. 연결을 확인한 후 다시 시도해 주세요.
account_management.subscriptions.addon.vyopta.connect_accounts.found=Vyopta 계정('<b>{orgName}</b>')을 감지했습니다. WXP에 연결하시겠습니까?
account_management.subscriptions.addon.vyopta.connect_accounts.no_permissions=구jㄴ한이 없습니다. 지원이 필요한 경우 Vyopta 계정 관리자에 문의하십시오.
