wpt.disclaimer.point1=HP의 찾기, 잠금 및 와이프 소프트웨어 서비스에 대한 내부 분석을 기반으로 합니다. 2021년 10월 현재 대부분의 보안은 암호화 및 지속성(하드웨어 강제 지속성 포함)을 기반으로 합니다.
wpt.disclaimer.point2=HP {appName}은(는) 일부 HP 600, 800, 1000, Windows 기반 Elite Dragonfly 노트북, 일부 800 데스크탑, Z1 G8 워크스테이션에서 사용할 수 있으며, 장치를 켜고 인터넷에 연결할 때 작동합니다.
wpt.disclaimer.point3=HP Workforce Experience Platform은 장치 및 애플리케이션 관련 중요한 데이터를 제공하는 원격 측정 및 분석 플랫폼으로, 독립형 서비스로 판매되지 않습니다. HP Workforce Experience Platform은 엄격한 GDPR 개인 정보 보호 규정을 준수하며 ISO27001, ISO27701, ISO27017, SOC2 Type2 정보 보안 인증을 받았습니다. Workforce Experience Platform 포털에 연결된 인터넷 액세스가 필요합니다. 전체 시스템 요구 사항을 보려면 <a href=\"{link}\" target=\"_blank\" style=\"text-decoration: none; color: #027aae; cursor: pointer;\">{text}</a>을(를) 방문하십시오.
wpt.disclaimer.point4=하드웨어 강제란 HP Sure Run Gen4 이상을 의미하며, HP Sure Run Gen4는 이 서비스와 호환되는 HP PC에서 사용할 수 있고 Windows 10 이상이 필요합니다.
wpt.disclaimer.point5=HP 하드웨어 지원의 서비스 수준과 응답 시간은 사용자의 지역에 따라 달라질 수 있습니다. 서비스는 하드웨어 구매일로부터 시작됩니다. 제한과 제약이 적용됩니다. 자세한 사항은 <a href="https://www.hp.com/go/cpc" target="_blank" style="text-decoration: none; color: #027aae; cursor: pointer;">www.hp.com/go/cpc</a>를 참조하십시오. HP 서비스는 구매 시 고객에게 제공되거나 표시되는 관련 HP 서비스 약관에 따라 관리됩니다. 고객은 현지 법률에 따라 추가적인 법적 권리를 가질 수 있으며, 이러한 권리는 HP 제품과 함께 제공되는 HP 서비스 약관 또는 HP 제한 보증의 영향을 받지 않습니다.
