exp.mgmt.troubleshoot.network.wifispeedisslow.cause1=액세스 지점이 벽과 장애물 뒤에 있을 수 있습니다.
exp.mgmt.troubleshoot.network.wifispeedisslow.cause2=라우터 펌웨어가 오래되었을 수 있습니다.
exp.mgmt.troubleshoot.network.wifispeedisslow.description=최근 24시간 동안 Wi-Fi 정격 속도가 느린 것으로 보고되었습니다.
exp.mgmt.troubleshoot.network.wifispeedisslow.possibleCauses=홈 네트워크에 대한 가능한 원인:
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation1=모뎀 및 라우터 다시 시작
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation1.step1=먼저 모뎀을 끈 후 라우터를 끄십시오.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation2=라우터 이동
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation2.step1=라우터를 집이나 사무실의 다른 위치로 이동해 보거나 안테나를 다른 방향을 향하도록 조정하십시오.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation3=라우터의 펌웨어 업데이트
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation3.step1=라우터의 펌웨어를 주기적으로 업데이트하면 버그와 연결 문제를 해결하는 데 도움이 됩니다. 일부 라우터는 자동 업데이트가 가능하지만, 대다수는 수동 업데이트가 필요합니다.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation4=라우터의 주파수 변경
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation4.step1=Wi-Fi 라우터에서는 주파수 대역을 자동으로 선택하지만, 2.4GHz에서 5GHz로 변경하여 속도가 향상되는지 확인할 수 있습니다. 하지만 먼저 라우터에서 5GHz를 지원하는지 확인해야 합니다.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation5=Wi-Fi 드라이버 업데이트
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation5.step1=구식 또는 손상된 드라이버는 네트워크 문제를 일으킬 수 있으니 Wi-Fi 어댑터가 최신 버전인지 확인하십시오.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation6=간섭 방지
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation6.step1=채널 간섭이 있으면 처리량이 크게 감소하고 데이터 전송이 느려질 수 있으므로 발생할 수 있는 간섭을 제거해 보십시오.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation7=기타 장치 확인
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation7.step1=네트워크에 연결된 다른 장치가 있는지, 이 장에서 어떤 작업을 수행하는지 확인하십시오. 예를 들어 다른 장치가 많은 데이터를 다운로드하고 있는 경우 속도에 영향을 줄 수 있습니다.
