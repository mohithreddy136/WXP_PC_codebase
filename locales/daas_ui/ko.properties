exp.MemoryUtilizationIsHighForAnExtendedTime.causeHungApp=실행 중인 애플리케이션이 멈추었거나 응답하지 않습니다.
exp.MemoryUtilizationIsHighForAnExtendedTime.causeInsufficientMemory=컴퓨터에 사용량에 맞는 메모리가 부족합니다.
exp.MemoryUtilizationIsHighForAnExtendedTime.causeLongRunningApp=실행 중인 애플리케이션에서 바이러스 백신 스캔과 같은 작업을 완료하기 위해 장기간 많은 양의 메모리를 필요로 합니다.
exp.MemoryUtilizationIsHighForAnExtendedTime.causeMemoryLeak=설치된 애플리케이션에 메모리 누수 버그가 있습니다.
exp.MemoryUtilizationIsHighForAnExtendedTime.option1Detail=고객이 장치 수명을 늘리고 최종 사용자 경험을 향상하도록 도우려면 메모리가 과도하게 사용되는 PC의 경우 장치에 메모리를 추가하는 것이 가장 일반적입니다.
exp.MemoryUtilizationIsHighForAnExtendedTime.option1Title=옵션 1: 장치 메모리를 늘립니다.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail1=장치 사용률 보고서를 엽니다.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail2=높은 메모리 사용량을 일으키는 앱 열에서 메모리를 많이 사용하는 애플리케이션을 식별합니다.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail3=문제의 애플리케이션에 따라 대응 옵션이 다릅니다. 비즈니스에 중요한 애플리케이션인 경우 메모리를 업그레이드하여 문제를 완화할 수 있습니다. 비즈니스와 관련이 없는 중요 애플리케이션인 경우 장치에서 제거하거나 장치에서 로드를 줄이도록 설정을 조정할 수 있습니다.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Title=옵션 2: 애플리케이션을 식별하고 제거합니다.
exp.MemoryUtilizationIsHighForAnExtendedTime.option3Detail=컴퓨터를 다시 시작하여 실행 중인 애플리케이션을 모두 닫습니다.
exp.MemoryUtilizationIsHighForAnExtendedTime.option3Title=옵션 3: 장치를 다시 시작합니다.
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Detail1=작업 관리자를 사용하여 메모리 사용률을 기준으로 실행 중인 애플리케이션을 확인합니다.
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Detail2=많은 메모리를 사용하는 애플리케이션을 닫습니다.
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Title=옵션 4: 애플리케이션을 닫습니다.
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Detail1=Use Task Manager to identify an application where the Memory utilization is steadily increasing to unusual proportions, but never decreasing.
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Detail2=제조사에서 해당 애플리케이션의 업데이트를 확인하십시오.
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Title=옵션 5: 잠재적인 메모리 누수를 파악하고 업데이트합니다.
