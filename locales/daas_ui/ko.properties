wex.labs.remediation.ai.description=AI를 활용한 문제 해결은 가장 효과적인 솔루션을 안내합니다. 이 기능은 팀원이 문제를 효율적이고 일관되게 해결할 수 있도록 옵션 범위를 지능적으로 좁혀줍니다.
wex.labs.remediation.ai.description.disclaimer=You are about to interact with an AI solution. Content generated by AI might contain inaccuracies and should be verified against the details provided. Please note that AI-generated responses might be incomplete or incorrect, and HP assumes no responsibility for actions taken based on this content.
wex.labs.remediation.ai.details.analyzesAvailableRemediations.desc=알고리즘은 스크립트, 정책, 장치의 동작/업데이트 등을 포함하여 플랫폼 내 기존 문제 해결 조치를 스캔함으로써 가장 관련성이 높은 조치를 추천합니다.<br/><br/>과거 사용 사례와 성공률을 살펴보며 조직 내에서 이러한 문제 유형을 해결하는 데 보통 어떤 방법이 효과적인지 파악합니다. 사용자는 적절한 행동 방안을 결정하는 데 시간을 덜 들이고 이를 AI에 맡길 수 있습니다.
wex.labs.remediation.ai.details.analyzesAvailableRemediations.title=사용 가능한 문제 해결 방안 분석
wex.labs.remediation.ai.details.applyOrReview.desc=관리자는 문제 해결 방식에 따라 다음과 같은 선택지를 고려할 수 있습니다. <br/><div class=remediation-ai-ui><ul><li>선택한 장치 전체에 즉시 적용</li><li>추후 일정을 잡아 혼란 최소화</li><li>작업 확인 전에 세부 정보 검토</li></ul></div><br/>적용 후에는 활동과 결과를 투명하게 추적하여 지속적인 학습을 지원합니다.
wex.labs.remediation.ai.details.applyOrReview.title=적용, 일정 관리 또는 검토
wex.labs.remediation.ai.details.continuousLearning.desc=시간이 지나면서 권장 사항의 정확도와 신뢰도가 높아집니다.
wex.labs.remediation.ai.details.continuousLearning.title=지속적인 학습
wex.labs.remediation.ai.details.howItWorks.title=이용 방법
wex.labs.remediation.ai.details.issueToRemediation.desc=문제가 정해진 임계값에서 벗어나면 대시보드에 해당 문제가 표시되며, 무슨 일이 일어나고 있는지와 문제가 장치에 어떤 영향을 미칠 수 있는지에 대한 명확한 설명이 함께 나타납니다. WXP 플랫폼은 이제 직접적인 개선 조치를 지원하며, AI 개선 기능은 문제 해결에 가장 적합한 옵션을 가려내는 데 유용합니다.
wex.labs.remediation.ai.details.issueToRemediation.title=문제 해결
wex.labs.remediation.ai.details.learnsandImproves.desc=알고리즘은 조직에 가장 적합한 방식을 지속적으로 개선합니다.<br/>각 개선 조치가 적용될 때마다 시스템은 다음과 같이 학습합니다.<div class=remediation-ai-ui><ul><li>효과적인 정도</li><li>문제를 해결하는 데 걸린 시간</li><li>유사한 문제가 재발생했는지 여부</li></ul></div><br/>이 피드백 루프를 통해 권장 사항이 개선되어 시간이 지날수록 향후 추천 정확도가 높아지며 맞춤화 수준이 강화됩니다.
wex.labs.remediation.ai.details.learnsandImproves.title=시간 경과에 따른 학습 및 개선
wex.labs.remediation.ai.details.overview.desc=AI 기능을 활용한 개선 작업은 IT 관리자가 탐지 단계에서 해결 단계로 신속하게 나아갈 수 있도록 도와줍니다. 이 기능은 사용자의 플릿 데이터를 분석하여 현재 발생한 문제에 가장 효과적인 정책, 스크립트 또는 장치 업데이트를 추천합니다. 알고리즘이 사용자 환경의 기존 개선 패턴을 활용하여 가장 효과적일 것으로 예상되는 방법을 제안합니다.
wex.labs.remediation.ai.details.recommendBestFix.desc=각 권장 사항에는 다음과 같은 내용이 포함되어 있습니다. <br/><div class=remediation-ai-ui><ul><li>작업 유형: 스크립트, 정책 또는 업데이트</li><li>관련 있는 이유: 개선과 자동화를 통해 실시간으로 문제를 해결하고, 직원 생산성을 향상하고, 디지털 경험을 개선하고, 시간을 절약하고, 취약성을 줄일 수 있습니다.</li></ul></div>
