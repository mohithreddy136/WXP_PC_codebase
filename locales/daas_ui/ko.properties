side_panal.smart_refresh.hardware_personas_header=하드웨어 페르소나
side_panal.smart_refresh.hardware_personas_sub_text=하드웨어 활용을 바탕으로 한 AI 기반 장치 클러스터로 식별
side_panal.smart_refresh.help_sec1_description=3단계: 식별, 분류, 추천
side_panal.smart_refresh.help_sec1_header=이용 방법
side_panal.smart_refresh.help_sec1_point_1_desc=9개 데이터 점수로 각 장치를 평가하여 Refresh 긴급도 점수*로 요약합니다. 이 점수는 사용자 생산성에 방해가 되는 개별 위험 장치의 우선 순위를 지정하는 데 도움을 줍니다.
side_panal.smart_refresh.help_sec1_point_1_title=1. 식별
side_panal.smart_refresh.help_sec1_point_2_desc=AI 모델이 각 장치의 사용을 기준으로 구체적인 하드웨어 및 소프트웨어 페르소나로 그룹화합니다. 이 페르소나는 적절한 교체 장치를 파악하는 데 도움을 줍니다.
side_panal.smart_refresh.help_sec1_point_2_title=2. 카테고리 분류
side_panal.smart_refresh.help_sec1_point_3_desc1=HP 파트너와 함께하는 경우 스마트 새로 고침에서 각 장치의 교체를 추천합니다. 이 추천은 파트너가 업로드한 카탈로그 내에서 사용 가능한 연관 인물의 최고 성능 모델을 기준으로 합니다. 장치 추천이 표시되지 않거나 표시된 장치가 오래된 경우, 파트너에게 문의하여 최신 카탈로그 업로드를 요청하십시오.
side_panal.smart_refresh.help_sec1_point_3_desc2=HP 파트너와 함께하지 않는 경우, 스마트 새로 고침에서 장치 추천을 볼 수 없습니다. 최고의 교체 모델을 알아보려면 HP 계정 담당자에게 문의하십시오.
side_panal.smart_refresh.help_sec1_point_3_desc3=마지막 카탈로그 업로드 날짜:
side_panal.smart_refresh.help_sec1_point_3_title=3. 추천
side_panal.smart_refresh.help_sec1_point_4_desc='완료' 새로 고침 상태를 사용하여 새로 고칠 필요가 없거나 현재 새로 고칠 수 없는 PC를 제거합니다. 이러한 장치를 보고 상태를 '행동 필요'로 되돌려 PC 목록에서 다시 볼 수 있습니다.
side_panal.smart_refresh.help_sec1_point_4_title=4. 상태
side_panal.smart_refresh.help_sec2_description=장치 교체가 필요한 시기를 파악하는 방법
side_panal.smart_refresh.help_sec2_header=긴급도 새로 고침 점수
side_panal.smart_refresh.help_sec2_sub_text=새로 고침 긴급도 점수는 장치 성능 데이터를 9개 영역으로 계산합니다. 이 심각도는 다음과 같은 점수로 계산됩니다.
side_panal.smart_refresh.help_sec2_table_col1=긴급도 새로 고침
side_panal.smart_refresh.help_sec2_table_col2=새로 고침 점수
