welcome.banner.description=TechPulse는 장치와 애플리케이션 관련 중요한 데이터를 제공하는 텔레메트리 및 분석 플랫폼으로, IT 부서에서 직접 심층 학습을 하여 직원의 성공을 이끄는 올바른 PC, 소프트웨어 및 서비스를 제공할 수 있도록 지원합니다. HP TechPulse는 조직의 보안 태세를 능동적으로 모니터링하여 문제를 사전에 파악하고, 대규모로 교정하며, 위협을 최소화합니다.
welcome.banner.description_p={app_name}은(는) 장치와 애플리케이션 관련 중요한 데이터를 제공하는 텔레메트리 및 분석 플랫폼으로, IT 부서에서 직접 심층 학습을 하여 직원의 성공을 이끄는 올바른 PC, 소프트웨어 및 서비스를 제공할 수 있도록 지원합니다. {app_name}은(는) 조직의 보안 태세를 능동적으로 모니터링하여 문제를 사전에 파악하고, 대규모로 교정하며, 위협을 최소화합니다.
welcome.banner.description_p1={app_name}은(는) 장치와 애플리케이션의 중요 구성 및 상태 데이터를 집계하는 클라우드 기반 텔레메트리 및 분석 플랫폼입니다. AI와 딥 러닝을 통해 관련 데이터를 분석하여 문제를 사전에 파악하고, 해결책을 대규모로 제공하며, 보안 위협을 최소화합니다.
