wex.labs.fleet-explorer.description1=플릿을 관리, 유지, 최적화하기 위한 사용자의 질문에 대답하는 AI 기반 도구입니다.
wex.labs.fleet-explorer.description2=한 장치에 대한 인사이트, 일반 정보, 문제 해결을 원하는 경우 플릿 탐색기로 도움을 받을 수 있습니다.
