partner.exp.mgmt.recommended.desc.DISK_UTILIZATION_HIGH=여유 디스크 공간이 부족한 장치는 느려지고 필수 작업을 수행하는 데 어려움을 겪을 수 있습니다.
partner.exp.mgmt.recommended.desc.DOCKING_STATION_AC_ADAPTER_FAILED=도킹 스테이션 AC 어댑터 고장은 하드웨어 문제를 나타낼 수 있으며, 이로 인해 장치의 전원이 중단되거나 간헐적으로 작동할 수 있습니다.
partner.exp.mgmt.recommended.desc.DOCKING_STATION_FIRMWARE_OUT_OF_DATE=오래된 도킹 스테이션 펌웨어로 인해 호환성 문제가 발생하고, 기능이 제한되거나 보안 격차가 발생할 수 있습니다.
