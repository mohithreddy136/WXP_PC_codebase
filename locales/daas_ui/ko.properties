banner.iot.update.description=2023년 2월 27일 월요일부터 TechPulse 플랫폼 인프라 변경이 시행됩니다. 프록시, 방화벽 및 SSL 검사 소프트웨어 설정을 업데이트해야 할 수 있습니다. <a href='https://www.hpdaas.com/software' target='_blank'>HP TechPulse - 소프트웨어(hpdaas.com)</a>에서 네트워크 평가 도구를 실행하여 4개의 *.IoT 테스트 대상 중 '실패' 메시지가 반환되는지 확인하십시오. 테스트에서 오류가 발생하면 여기에 있는 '<b><a href='https://hp.service-now.com/techpulse_kb?id=kb_article&sysparm_article=KB0011291' target='_blank'>KB0011291</a> - 프록시 또는 방화벽 구성'</b> 지침에 따라 <b>2023년 2월 23일 목요일까지 변경해야 합니다</b>.
