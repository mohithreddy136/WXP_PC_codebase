exp.AntivirusSignatureUpdatesNeeded.description=장치는 바이러스, 맬웨어 및 기타 위협으로부터 장치를 보호하기 위해 Microsoft가 아닌 타사 바이러스 백신을 사용하도록 구성되어 있지만 장치에 바이러스 백신 서명 업데이트가 필요합니다.
exp.AntivirusSignatureUpdatesNeeded.deviceRemediation=장치 수정:
exp.AntivirusSignatureUpdatesNeeded.option1=옵션 1: Microsoft가 아닌 타사의 중앙 관리형 바이러스 백신 솔루션을 사용하는 경우 조직의 바이러스 백신 제품군 관리자는 일주일에 한 번 이상 업데이트되도록 정책을 설정해야 합니다(권장).
exp.AntivirusSignatureUpdatesNeeded.option2=옵션 2: 사용자 관리형 바이러스 백신 솔루션의 경우 사용자는 바이러스 백신 관리 콘솔을 열고 절차에 따라 서명 업데이트를 예약하거나 트리거해야 합니다. 일주일에 한 번 이상 업데이트를 다운로드하도록 바이러스 백신 솔루션을 구성하는 것이 좋습니다.
