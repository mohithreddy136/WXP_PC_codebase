exp.NetworkConnectionNotSecure.recAccessControl=Implemente software de controlo de acesso à rede para restringir o acesso.
exp.NetworkConnectionNotSecure.recChangeSecurity=Altere a configuração de segurança do Wi-Fi doméstico.
