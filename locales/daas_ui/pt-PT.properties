requirements.list.proSecurity.windows.supportLifecycle.content1=O objetivo do nível de serviço HP é fornecer suporte às 3 versões mais recentes do Canal semestral do Windows 10.
requirements.list.proSecurity.windows.supportLifecycle.content2=O objetivo da HP é oferecer suporte para a nova versão do SO para a funcionalidade de contenção de ameaças do Wolf Pro Security, num período de 30 dias depois de ter sido disponibilizado no Semi-Annual Channel (\"SAC\"). Não são suportadas versões temporárias ou pré-lançamentos de versões do Windows Insider. Para mais informações sobre as versões do SO Windows, aceda a <a href='https://docs.microsoft.com/en-us/windows/release-information/' target='_blank'>https://docs.microsoft.com/en-us/windows/release-information/</a>.
requirements.list.proSecurity.windows.supportLifecycle.content3=Para garantir que os clientes com versões mais antigas do Windows têm o tempo necessário para atualizarem para as versões mais atuais, a HP irá continuar a dar suporte à 4.ª versão mais recente (atualmente, Windows 10 v1903) durante, pelo menos, 90 dias após ser disponibilizado o suporte para a versão mais recente do Semi-Annual Channel no Wolf Pro Security. Após este período, irá terminar o suporte para a versão mais antiga do SO. A mesma política de suporte é aplicável às versões do Long Term Service Channel do Windows 10. Por isso, estes sistemas também terão de ser atualizados de acordo com a política acima descrita.
requirements.list.proSecurity.windows.supportLifecycle.content4=O suporte Sure Click Pro para o Windows 10 v2004 foi disponibilizado a 31 de julho de 2020. O suporte será retirado ao Windows 10 v1809 a partir de 31 de outubro de 2020.
requirements.list.proSecurity.windows.supportLifecycle.content5=O Windows 7 e 8.1 não são suportados pelo HP Proactive Security
requirements.list.proSecurity.windows.supportLifecycle.content6=O suporte Sure Click Pro para o Windows 10 v20H2 foi disponibilizado a 18 de novembro de 2020. O suporte para o Windows 10 v1903 terminará a 16 de fevereiro de 2021.
requirements.list.proSecurity.windows.supportLifecycle.content7=A HP lançou suporte para a contenção de ameaças Sure Click Pro para o Windows 10 v21H1 a 5 de julho de 2021. O suporte para o Windows 10 v1909 será retirado a partir de 3 de outubro de 2021.
requirements.list.proSecurity.windows.supportLifecycle.heading=Política do ciclo de vida do suporte para novas versões do SO e versões mais antigas do Windows 10.
