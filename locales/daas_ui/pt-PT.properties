exp.NetworkConnectionNotSecure.recStrongPasswords=Defina palavras-passe fortes e exclusivas para proteger o acesso à rede.
exp.NetworkConnectionNotSecure.recUpdateFirmware=Atualize regularmente o firmware do router e dos dispositivos contra vulnerabilidades.
exp.NetworkConnectionNotSecure.recUpgradeRouter=Atualize o router ou ponto de acesso antigo para padrões de segurança mais recentes.
exp.NetworkDisconnections.causeInsufficientSpeed=Velocidade de Internet insuficiente
exp.NetworkDisconnections.causeInsufficientSpeed.detail1=A baixa largura de banda durante o pico de utilização pode criar instabilidade e quedas frequentes.
exp.NetworkDisconnections.causeInsufficientSpeed.detail2=Recomendação: Execute testes de velocidade e atualize o plano de serviço se a largura de banda fornecida for inadequada.
exp.NetworkDisconnections.causeInterference=Interferência no sistema sem fios ou obstáculos físicos.
exp.NetworkDisconnections.causeOutdatedRouter=Router ou modem desatualizado em casa
exp.NetworkDisconnections.causeOutdatedRouter.detail1=Um router desatualizado pode não suportar os padrões mais recentes ou muitos dispositivos ligados, levando a congestionamento da rede e desconexões
exp.NetworkDisconnections.causeOutdatedRouter.detail2=Recomendação: Mantenha o equipamento de rede atualizado; tente uma reposição de fábrica para limpar configurações corrompidas.
exp.NetworkDisconnections.causeOutdatedRouter.detail3=Se os problemas persistirem ou se o hardware for antigo, atualize para um modelo mais recente para garantir a fiabilidade.
exp.NetworkDisconnections.causePoorWifiSignal=Sinal Wi-Fi fraco
exp.NetworkDisconnections.causePoorWifiSignal.detail1=Um sinal fraco ou obstruído leva a uma conectividade instável do dispositivo.
exp.NetworkDisconnections.causePoorWifiSignal.detail2=Recomendação: Posicione o router centralmente e ajuste o canal/frequência para reduzir a interferência.
exp.NetworkDisconnections.causeRouterIssues=Problemas de firmware ou hardware do router.
exp.NetworkDisconnections.causeSoftwareDriverIssues=Problemas de software ou controlador
exp.NetworkDisconnections.causeSoftwareDriverIssues.detail1=Os controladores/firmware desatualizados ou corrompidos podem prejudicar a estabilidade da ligação.
exp.NetworkDisconnections.causeSoftwareDriverIssues.detail2=Recomendação: Ative as atualizações automáticas e mantenha atualizados todos os softwares relacionados com a rede.
exp.NetworkDisconnections.causeUnprotectedNetwork=Rede desprotegida
exp.NetworkDisconnections.causeUnprotectedNetwork.detail1=Os utilizadores não autorizados que consomem largura de banda podem provocar desconexões e perda de desempenho.
exp.NetworkDisconnections.causeUnprotectedNetwork.detail2=Recomendação: Utilize uma palavra-passe de Wi-Fi forte e exclusiva para impedir o acesso não autorizado.
