partner.exp.mgmt.recommended.desc.EXCESSIVE_OS_SHUTDOWN_TIME=Um tempo de encerramento longo pode indicar aplicações bloqueadas, hardware atrasado, atualizações de políticas, scripts longos ou tarefas inacabadas do Windows.
partner.exp.mgmt.recommended.desc.EXCESSIVE_OS_STARTUP_TIME=Um arranque demorado pode ter subjacente conflitos de software ou problemas de hardware.
partner.exp.mgmt.recommended.desc.FIREWALL_DISABLED=Uma firewall do Windows Defender desativada pode deixar os dispositivos expostos a ataques maliciosos na sua rede.
partner.exp.mgmt.recommended.desc.FIREWALL_SIGNATURE_OUTDATED=As definições de firewall desatualizadas deixam os dispositivos vulneráveis a novo malware e ameaças cibernéticas.
partner.exp.mgmt.recommended.desc.GPU_HEALTH_ISSUE=Um problema detetado na GPU pode levar a falhas visuais, problemas de desempenho ou mesmo a uma falha total na apresentação de gráficos.
partner.exp.mgmt.recommended.desc.HIGH_COLLABORATION_SW_ERRORS=Erros persistentes no software de colaboração podem perturbar os fluxos de trabalho da equipa, dificultar a comunicação e o progresso dos projetos.
partner.exp.mgmt.recommended.desc.HIGH_WINDOWS_CRASH=As falhas e reinícios inesperados indicam uma instabilidade subjacente que pode levar à perda de dados ou a danos permanentes no hardware.
partner.exp.mgmt.recommended.desc.LAST_REBOOT_MORE_THAN_21_DAYS=Os dispositivos que não são reiniciados durante um longo período de tempo podem ter problemas de estabilidade e desempenho do SO.
partner.exp.mgmt.recommended.desc.MAXIMISE_MY_BATTERY_HEALTH_NOT_ENABLED=O facto de não ter o Gestor de Estado da Bateria ativado pode ter um impacto na duração atual da bateria.
partner.exp.mgmt.recommended.desc.MEMORY_UTILIZATION_HIGH=A utilização elevada da memória do dispositivo durante um período de tempo prolongado pode tornar o dispositivo mais lento, afetando o desempenho dos colaboradores.
partner.exp.mgmt.recommended.desc.MISSING_CRITICAL_DRIVER_UPDATES=Sem atualizações críticas de controladores, o hardware dos dispositivos pode funcionar mal ou não funcionar de todo.
partner.exp.mgmt.recommended.desc.MISSING_WINDOWS_SECURITY_UPDATES=As atualizações de segurança que não são realizadas podem deixar os dispositivos vulneráveis a hackers e vírus.
partner.exp.mgmt.recommended.desc.MISSING_WINDOWS_UPDATES=As atualizações do Windows que não são realizadas, expõem os dispositivos a vulnerabilidades e a potenciais infeções por malware.
partner.exp.mgmt.recommended.desc.PC_REFRESH=Inicie uma atualização inteligente de todos, ou anule a seleção na tabela abaixo de quaisquer PCs que não vai substituir agora.
partner.exp.mgmt.recommended.desc.PC_REFRESH_SELECT=Reveja os dispositivos e prossiga com o pedido.
partner.exp.mgmt.recommended.desc.security=Resolver todos, ou anular a seleção na tabela abaixo de quaisquer PCs que não vai ativar agora.
partner.exp.mgmt.recommended.desc.WINDOWS_SECURE_BOOT_NOT_ENABLED=A ativação do Windows Secure Boot garante que um dispositivo arranca utilizando apenas software de confiança.
