welcome.banner.description=O TechPulse é uma plataforma de telemetria e análise que fornece dados críticos sobre dispositivos e aplicações, colocando uma análise profunda à disposição do departamento de TI para que possam proporcionar aos funcionários os PCs, o software e os serviços adequados para terem sucesso. O HP TechPulse identifica proativamente problemas, disponibiliza soluções proporcionais, para além de minimizar as ameaças através de uma monitorização ativa da postura de segurança da organização.
welcome.banner.description_p=O {app_name} é uma plataforma de telemetria e análise que fornece dados críticos sobre dispositivos e aplicações, colocando uma análise profunda à disposição do departamento de TI para que este possa fornecer aos funcionários os PCs, o software e os serviços adequados para terem sucesso. O {app_name} identifica proativamente problemas, disponibiliza soluções proporcionais, para além de minimizar as ameaças através de uma monitorização ativa da postura de segurança da organização.
welcome.banner.description_p1={App_name} é uma plataforma de telemetria e análise com base na cloud que fornece dados críticos de configuração e estado dos dispositivos e aplicações. Com a utilização de IA e uma aprendizagem profunda, analisa os dados para identificar de forma proativa os problemas, fornecer soluções à escala e minimizar as ameaças de segurança.
welcome.banner.title=Plataforma de automatização que presta serviços de classe mundial através de informações relevantes impulsionadas por milhares de milhões de pontos de dados
welcome.banner.title1={app_name} coloca ao seu alcance informações aprofundadas para prever e resolver problemas de dispositivos antes de ocorrerem
