exp.NetworkSpeedSlow.recRestartRouter.step1=Desligue o modem e, em seguida, o router; aguarde; ligue o modem e, em seguida, o router.
exp.NetworkSpeedSlow.recUpdateDrivers=Atualize os controladores de Wi-Fi/rede.
exp.NetworkSpeedSlow.recUpdateDrivers.detail=Instale os controladores mais recentes do adaptador para resolver problemas de desempenho.
exp.NetworkSpeedSlow.recUpdateFirmware=Atualize o firmware do router.
exp.NetworkSpeedSlow.recUpdateFirmware.detail=Aplique o firmware mais recente do fornecedor para corrigir erros e melhorar o desempenho.
