wex.fleet.mgmt.troubleshoot.linux_firewall_disabled.description=Ativar a firewall ajuda a proteger o sistema contra acessos não autorizados, ataques baseados na rede e tráfego indesejado, controlando as ligações de entrada e saída. Este é um passo fundamental para proteger os sistemas Linux, especialmente os que estão expostos a redes públicas ou empresariais.
