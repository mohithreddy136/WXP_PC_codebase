exp.DiskUtilizationHigh.causeLargeFiles=Ficheiros ou pastas grandes, como vídeos, cópias de segurança ou ficheiros de bases de dados, podem encher rapidamente o espaço em disco.
exp.DiskUtilizationHigh.causeMisconfiguredApps=As aplicações mal configuradas que guardam quantidades excessivas de dados ou ficheiros de registo podem consumir muito espaço em disco.
exp.DiskUtilizationHigh.causeTempFiles=A acumulação de ficheiros temporários, a cache do navegador ou a cache do sistema leva, frequentemente, a um disco cheio. A utilização regular de ferramentas de limpeza incorporadas ou de métodos manuais para remover estes ficheiros temporários pode ajudar a manter o espaço disponível no disco.
