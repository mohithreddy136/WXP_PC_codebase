exp.GpuHealthIssue.blueScreenLink=https://docs.microsoft.com/en-us/windows-hardware/drivers/debugger/-analyze
exp.GpuHealthIssue.blueScreenLinkText=https://docs.microsoft.com/en-us/windows-hardware/drivers/debugger/-analyze
exp.GpuHealthIssue.causeBlueScreenErrors=Erros de ecrã azul: Os erros de ecrã azul podem dever-se a demasiados programas com elevada utilização gráfica ou efeitos visuais executados em simultâneo, ou a problemas de controladores e hardware.
exp.GpuHealthIssue.causeDoubleBitEcc=Erros de memória ECC de dois bit: A placa gráfica está a apresentar erros de memória ECC de dois bits, o que pode indicar problemas de hardware ou falhas na memória.
exp.GpuHealthIssue.causeHighDoubleBitEccOverTime=Número elevado de erros de memória ECC de dois bits ao longo do tempo: A placa gráfica tem um número elevado de erros de memória ECC em dois bits e o número médio de erros tem vindo a aumentar há, pelo menos, 3 semanas.
exp.GpuHealthIssue.causeHighTdrEvents=Elevado número de eventos TDR (tempo limite e recuperação do controlador do ecrã): A placa gráfica registou um número elevado de eventos TDR, indicando potenciais problemas de controlador ou hardware.
exp.GpuHealthIssue.causeMissingDriverUpdate=Atualização crítica do controlador em falta: A placa gráfica tem falta de uma atualização crítica do controlador, o que pode afetar o desempenho e a estabilidade.
exp.GpuHealthIssue.causeThermalIssues=Problemas térmicos: A placa gráfica está a ter um número elevado de problemas térmicos e a temperatura da GPU ou da memória está acima da temperatura máxima de funcionamento.
exp.GpuHealthIssue.driverOption1=Opção 1: Utilize o HP Image Assistant para atualizar os controladores
exp.GpuHealthIssue.driverOption2=Opção 2: Utilize o Windows Update para atualizar os controladores
exp.GpuHealthIssue.possibleCauses=Possíveis causas:
exp.GpuHealthIssue.remediationBlueScreenPrefix=Para erros de ecrã azul: Verifique se demasiados programas que requerem muitos recursos gráficos ou efeitos visuais estão em funcionamento ao mesmo tempo. Atualize o controlador da placa gráfica, reponha as definições de overclock para as predefinições, execute uma instalação limpa do controlador ou reponha as definições para as predefinições de fábrica, assegure uma fonte de alimentação adequada e limpe as saídas de ar e a ventoinha. Analise o ficheiro de mini-dump para passos de correção específicos:
exp.GpuHealthIssue.remediationDoubleBitEcc=Para erros de memória ECC de dois bits: Continue a monitorizar a situação e verifique se o desempenho continua a deteriorar-se. Se o número de erros continuar elevado, considere a hipótese de substituir a placa gráfica.
exp.GpuHealthIssue.remediationMissingDriver=Para atualização de controladores em falta: Atualize o controlador da placa gráfica para a versão mais recente para solucionar problemas de desempenho.
exp.GpuHealthIssue.remediationTdr=Para eventos TDR: Continue a monitorizar e atualize o controlador da placa gráfica se o problema persistir. Reponha as definições da placa gráfica para as predefinições, reponha as definições de overclock para as predefinições, atualize o BIOS, se estiver disponível uma atualização, e verifique se a fonte de alimentação é suficiente e se o fluxo de ar é adequado. Limpe as saídas de ar e a ventoinha.
exp.GpuHealthIssue.remediationThermal=Para os problemas térmicos: Verifique se o fluxo de ar é restrito, limpe as saídas de ar e certifique-se de que a ventoinha está a funcionar corretamente e está limpa.
exp.GpuHealthIssue.suggestedRemediations=Sugestões de correção:
exp.GpuHealthIssue.title=Abordar o estado de funcionamento da GPU
exp.HpBatteryHealthManagerNotEnabled.causeNotCompatible=O dispositivo não é compatível com o Gestor de Estado da Bateria HP.
exp.HpBatteryHealthManagerNotEnabled.causeRequiresBiosUpdate=O dispositivo requer uma atualização do BIOS.
exp.HpBatteryHealthManagerNotEnabled.description=O Gestor de Estado da Bateria HP está disponível em todos os portáteis empresarias HP desde 2016. Para melhorar a duração da bateria, é recomendado que o Gestor de Estado da Bateria esteja ativado.
exp.HpBatteryHealthManagerNotEnabled.option1Detail=A HP recomenda ativar o Gestor de Estado da Bateria para Permitir à HP Gerir o Carregamento da Bateria ou Maximizar o Estado da Bateria dependendo da utilização ou da idade.
exp.HpBatteryHealthManagerNotEnabled.option1Title=Opção 1: Atualizar o BIOS para a versão suportada
exp.HpBatteryHealthManagerNotEnabled.possibleCauses=Possíveis causas:
exp.HpBatteryHealthManagerNotEnabled.reference1Link=https://support.hp.com/us-en/document/ish_4449597-3519507-16
exp.HpBatteryHealthManagerNotEnabled.reference1Text=Gestor de Integridade da Bateria HP - Suporte
exp.HpBatteryHealthManagerNotEnabled.references=Referências:
exp.HpBatteryHealthManagerNotEnabled.settingLetDetail1=Altera dinamicamente a forma como o sistema carrega a bateria com base nas condições de utilização e na temperatura ao longo do tempo.
exp.HpBatteryHealthManagerNotEnabled.settingLetTitle=Permitir à HP Gerir o Carregamento da Bateria
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases1=Ambientes de utilização mista em que o portátil é regularmente removido da alimentação CA e a bateria é descarregada.
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases2=Preferência por um processo único para a sua organização.
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases3=O portátil tem menos de um ano.
exp.HpBatteryHealthManagerNotEnabled.settingMaxDetail1=Limita o estado máximo de carga a 80% para otimizar a saúde da bateria e reduzir o inchaço.
exp.HpBatteryHealthManagerNotEnabled.settingMaxTitle=Maximizar o Estado da Bateria
exp.HpBatteryHealthManagerNotEnabled.settingMaxUseCases1=Ambientes onde os portáteis estão continuamente ligados à alimentação CA.
exp.HpBatteryHealthManagerNotEnabled.settingMaxUseCases2=Portáteis com um ano ou mais.
exp.HpBatteryHealthManagerNotEnabled.suggestedRemediations=Sugestões de correção:
