exp.mgmt.troubleshoot.description.antivirus_not_enabled_other=O dispositivo está configurado para utilizar um antivírus não Microsoft de terceiros para ajudar a proteger o dispositivo de vírus, malware e outras ameaças, mas a proteção antivírus não está ativa no dispositivo.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.description=Foi detetada uma ligação não autenticada.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.moreInfo=Mais informações:
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.moreInfoLink=https://support.microsoft.com/en-us/windows/wi-fi-network-not-secure-in-windows-9170b675-921b-3aa5-7e43-fcb2059d159c
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option1=Opção 1: Se estiver a ligar à sua rede Wi-Fi doméstica, considere alterar o tipo de segurança utilizado pelo seu router ou ponto de acesso.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option1.step1=Inicie sessão no seu router utilizando o software para o mesmo.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option1.step2=Altere o tipo de segurança para a sua rede Wi-Fi doméstica.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option2=Opção 2: Se tiver um router ou ponto de acesso mais antigo, considere adquirir um router mais recente que suporte as mais recentes normas e melhorias de segurança.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.recommendations=Recomendações:
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.title=A ligação de Wi-Fi não é segura
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.cause1=A disposição da sua casa pode causar problemas de Wi-Fi.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.cause2=O ponto de acesso pode estar atrás de paredes e obstáculos.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.description=A intensidade do sinal Wi-Fi foi considerada fraca nas últimas 24 horas.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.moreInfo=Mais informações:
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.moreInfoLink=https://support.microsoft.com/en-us/windows/wi-fi-problems-and-your-home-layout-e1ed42e7-a3c5-d1be-2abb-e8fad00ad32a#WindowsVersion=Windows_11
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.possibleCauses=Causas possíveis para a rede doméstica:
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1=Opção 1: A reiniciar o router
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step1=Desligue o modem e o router da tomada elétrica.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step2=Aguarde pelo menos 15 segundos.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step3=Volte a ligar o modem à tomada de CA, aguarde 1-2 minutos e, em seguida, ligue o router.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step4=Aguarde até que todas as luzes do painel do modem por cabo fiquem verdes antes de testar a ligação à Internet.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2=Opção 2: Desloque o ponto de acesso.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step1=Desloque o ponto de acesso, se possível, para reduzir o número de paredes ou outros obstáculos que se encontram entre o ponto de acesso e o PC.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step2=Desloque o PC para mais perto do ponto de acesso, se possível.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step3=Se possível, desloque o ponto de acesso para o centro da casa ou da divisão e, se possível, para uma posição mais elevada. Colocá-lo num canto ou debaixo de uma secretária pode reduzir a intensidade do sinal Wi-Fi.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendations=Recomendações:
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.title=A força do sinal Wi-Fi é fraca
exp.mgmt.troubleshoot.network.wifispeedisslow.cause1=O ponto de acesso pode estar atrás de paredes e obstáculos.
exp.mgmt.troubleshoot.network.wifispeedisslow.cause2=O firmware do router pode estar desatualizado.
exp.mgmt.troubleshoot.network.wifispeedisslow.description=A velocidade nominal do Wi-Fi foi registada como lenta nas últimas 24 horas.
exp.mgmt.troubleshoot.network.wifispeedisslow.possibleCauses=Causas possíveis para a rede doméstica:
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation1=Reinicie o modem e o router
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation1.step1=Desligue primeiro o modem e depois o router.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation2=Desloque o router
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation2.step1=Experimente deslocar o router para um local diferente na sua casa ou escritório, ou ajuste as antenas de forma a ficarem viradas para uma direção diferente.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation3=Atualize o firmware do router
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation3.step1=A atualização regular do firmware do router pode ajudar a corrigir erros e problemas de conetividade. Embora alguns routers possam ter atualizações automáticas, a maioria requer atualizações manuais.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation4=Mude a frequência do router
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation4.step1=Os routers Wi-Fi selecionam automaticamente uma banda de frequência, mas pode tentar mudá-la de 2,4 GHz para 5 GHz para ver se melhora a velocidade. No entanto, deve verificar se o seu router suporta 5 GHz antes de o fazer.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation5=Atualize os controladores de Wi-Fi
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation5.step1=Os controladores desatualizados ou corrompidos podem causar problemas de rede, por isso certifique-se de que o seu adaptador Wi-Fi está atualizado.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation6=Evite interferências
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation6.step1=A interferência de canal pode reduzir significativamente o débito e abrandar a transferência de dados, por isso tente eliminar qualquer interferência que possa estar a sentir.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation7=Verifique outros dispositivos
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation7.step1=Veja que outros dispositivos estão ligados à sua rede e o que estão a fazer. Por exemplo, se outro dispositivo estiver a descarregar uma quantidade de dados elevada, isso pode estar a afetar as suas velocidades.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendations=Recomendações:
exp.mgmt.troubleshoot.network.wifispeedisslow.title=A velocidade do Wi-Fi é lenta
