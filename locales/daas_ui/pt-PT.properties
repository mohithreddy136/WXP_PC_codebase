exp.MemoryUtilizationIsHighForAnExtendedTime.causeHungApp=Uma aplicação em execução está suspensa/não responde.
exp.MemoryUtilizationIsHighForAnExtendedTime.causeInsufficientMemory=O computador não tem memória adequada para a sua utilização.
exp.MemoryUtilizationIsHighForAnExtendedTime.causeLongRunningApp=Uma aplicação em execução requer uma quantidade elevada de memória por um longo período de tempo para concluir uma tarefa, como uma análise de Antivírus.
exp.MemoryUtilizationIsHighForAnExtendedTime.causeMemoryLeak=Uma aplicação instalada pode ter um erro de fuga de memória.
exp.MemoryUtilizationIsHighForAnExtendedTime.option1Detail=Para ajudar os clientes a prolongar a vida útil do dispositivo e melhorar a experiência do utilizador final, uma prática comum para os PCs cuja memória está sobreutilizada é adicionar memória ao dispositivo.
exp.MemoryUtilizationIsHighForAnExtendedTime.option1Title=Opção 1: Aumentar a memória do dispositivo.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail1=Abrir o relatório de Utilização do Dispositivo.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail2=As aplicações que consomem a maioria da memória serão identificadas na coluna de Aplicações Com Elevada Utilização da Memória.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail3=Com base na aplicação em questão, as opções de resposta irão variar. Se forem aplicações críticas para a empresa, atualizar a memória pode aliviar o problema. Aplicações não críticas podem ser removidas do dispositivo ou as suas definições ajustadas para reduzir a carga no dispositivo.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Title=Opção 2: Identificar e desinstalar aplicações.
exp.MemoryUtilizationIsHighForAnExtendedTime.option3Detail=Reiniciar o computador para fechar completamente todas as aplicações em execução.
exp.MemoryUtilizationIsHighForAnExtendedTime.option3Title=Opção 3: Reiniciar o dispositivo.
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Detail1=Utilizar o Gestor de Tarefas para ver as aplicações em execução com base na utilização de memória.
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Detail2=Fechar as aplicações utilizando a maioria da memória.
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Title=Opção 4: Fechar aplicações.
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Detail1=Use Task Manager to identify an application where the Memory utilization is steadily increasing to unusual proportions, but never decreasing.
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Detail2=Verifique se existem atualizações para essa aplicação por parte do fabricante.
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Title=Opção 5: Identificar potenciais fugas de memória e atualizar.
