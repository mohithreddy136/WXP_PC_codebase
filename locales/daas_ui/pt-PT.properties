account_management.subscriptions.addon.anyware.azure_notice=Atualmente, a licença só é oferecida no Azure Marketplace. A licença HP Anyware Standard inclui acesso ao Anyware Manager Enterprise.
account_management.subscriptions.addon.anyware.desc=Gira e aprovisione ambientes de trabalho remotos para a sua equipa. Os utilizadores finais terão um acesso seguro aos ambientes de trabalho sem necessidade de VPN. Monitorize o seu parque remoto num único lugar quando integrar o HP Anyware com o WXP
account_management.subscriptions.addon.anyware.desc.short=Aceder, gerir e monitorizar desktops de forma segura
account_management.subscriptions.addon.anyware.enterprise.header=HP Anyware Manager Enterprise
account_management.subscriptions.addon.anyware.features.automation=Tarefas automatizadas
account_management.subscriptions.addon.anyware.features.automation.desc=Integrar o seu fluxo de trabalho de administrador personalizado sem problemas no plano de gestão
account_management.subscriptions.addon.anyware.features.multitenant_rbac=Controlo de acesso multi-inquilino e baseado em funções
account_management.subscriptions.addon.anyware.features.multitenant_rbac.desc=Gerir várias organizações com uma única instância do HP Anyware Manager Enterprise. Atribuir permissões aos administradores com base na sua função
account_management.subscriptions.addon.anyware.features.productivity=Ativar a produtividade do utilizador final
account_management.subscriptions.addon.anyware.features.productivity.desc=O utilizador final irá experimentar os desktops como se fossem locais, independentemente das suas necessidades de desempenho ou condições de rede.
account_management.subscriptions.addon.anyware.features.provision_desktops=Gerir desktop físicos e virtuais
account_management.subscriptions.addon.anyware.features.provision_desktops.desc=As TI podem configurar e monitorizar desktop remotos através do HP Anyware Manager Enterprise. Podem também fornecer desktop virtuais aos utilizadores finais em qualquer altura.
account_management.subscriptions.addon.anyware.features.remote_access=Fornecer aos utilizadores finais um acesso remoto seguro
account_management.subscriptions.addon.anyware.features.remote_access.desc=Os utilizadores finais terão um acesso seguro aos desktops sem necessidade de VPN. O HP Anyware oferece acesso simplificado através de gateways na nuvem.
account_management.subscriptions.addon.anyware.features.role_access.desc=Efetuar a atribuição de utilizadores e o encaminhamento de sessões sem necessidade de instalar uma gateway noutros ambientes
account_management.subscriptions.addon.anyware.features.role_cloud_gateways=Acesso simplificado através de gateways da nuvem
account_management.subscriptions.addon.anyware.features.setup=Qualquer ambiente de TI e configuração simples
account_management.subscriptions.addon.anyware.features.setup.desc=Uma solução flexível e intuitiva que simplifica a implementação e a gestão em diversas infraestruturas, incluindo ambientes locais, na nuvem e híbridos, ao mesmo tempo que reduz a complexidade e a pegada de TI.
account_management.subscriptions.addon.anyware.features.workforce_integration=Integração de Workforce Experience
account_management.subscriptions.addon.anyware.features.workforce_integration.desc=A equipa de TI pode centralizar os dados do ambiente de trabalho remoto na Workforce Experience Platform, fornecendo uma visão central do parque.
account_management.subscriptions.addon.anyware.header=HP Anyware
account_management.subscriptions.addon.anyware.overview.desc1=O HP Anyware é uma solução de software de elevado desempenho que fornece aos utilizadores acesso seguro aos seus ambientes de trabalho remotos ou virtuais sem uma VPN. O HP Anyware inclui acesso a um plano de gestão de TI denominado HP Anyware Manager Enterprise.
account_management.subscriptions.addon.anyware.overview.desc2=O HP Anyware Manager Enterprise (AME) é um plano de gestão de vários inquilinos que permite às TI gerir desktop físicos e virtuais.
account_management.subscriptions.addon.anyware.required_components.header=Componentes necessários para a integração do Workforce Experience
account_management.subscriptions.addon.anyware.required_components.li1=HP Anyware Standard
account_management.subscriptions.addon.anyware.required_components.li2=HP Anyware Manager Enterprise
account_management.subscriptions.addon.anyware.security_compliance=Segurança e conformidade
account_management.subscriptions.addon.anyware.security_compliance.desc1=O HP Anyware dá prioridade à segurança e à conformidade em todas as suas ofertas de produtos para garantir uma proteção robusta e a adesão às normas do setor. As principais funcionalidades incluem encriptação de ponta a ponta, acesso remoto seguro e autenticação multi-fator, salvaguardando a integridade e a confidencialidade dos dados.
account_management.subscriptions.addon.anyware.security_compliance.desc2=O HP Anyware também integra capacidades avançadas de deteção e resposta a ameaças para mitigar proativamente os riscos. A conformidade com regulamentos como GDPR, HIPAA e SOC 2 ressalta o compromisso do HP Anyware em manter protocolos de segurança rigorosos. A monitorização contínua e as auditorias de segurança regulares garantem que os produtos HP Anyware permanecem resilientes contra ameaças cibernéticas emergentes, proporcionando aos utilizadores uma experiência de gestão de TI segura e fiável.
account_management.subscriptions.addon.anyware.technology=Tecnologia de utilização remota
account_management.subscriptions.addon.anyware.technology.desc=A tecnologia de visualização remota premiada PCoIP® do HP Anyware proporciona uma experiência de computação de alta definição e altamente reativa em condições de rede difíceis.
account_management.subscriptions.addon.anyware.technology.desc.li1=O PCoIP® codifica, comprime, encripta e transporta píxeis de imagem a partir de um servidor central ou workstation.
account_management.subscriptions.addon.anyware.technology.desc.li2=Em seguida, desencripta e descomprime a imagem para os utilizadores em praticamente qualquer terminal.
account_management.subscriptions.addon.connect_accounts=Ligar contas
account_management.subscriptions.addon.oob.desc.short=Controlo remoto ao nível da BIOS para diagnóstico avançado e correção
account_management.subscriptions.addon.oob.desclaimer1=1. O diagnóstico e a correção fora da banda estão disponíveis como uma licença com prazos variados e são independentes do fornecedor para qualquer PC compatível com Intel® vPro® Enterprise e Intel® AMT. Inclui e requer a Workforce Experience Platform Starter para administrar e gerir a solução de software. Disponível nos EUA, Canadá e UE através de representantes da HP ou revendedores autorizados pela HP. Para mais detalhes, consulte (adicionar ligação url link aos termos da licença/eula).
account_management.subscriptions.addon.oob.desclaimer2=2. Com base numa análise interna da HP sobre os fabricantes de PCs com controlo do ciclo de energia, controlo sem SO, controlo do BIOS e controlo de reimagem em 24/09/2024.
account_management.subscriptions.addon.oob.desclaimer3=3. É necessário o agente HP Insights que é uma aplicação de telemetria e análise que fornece dados críticos sobre dispositivos e aplicações, não é vendido como um serviço independente e possui certificação ISO27001, ISO27701, ISO27017 e SOC2 Tipo 2 para a Segurança da Informação. É necessário acesso à Internet com ligação ao portal. Para saber os requisitos completos do sistema, consulte http://www.hpdaas.com/requirements. A aquisição de qualquer serviço ativado para o agente HP Insights requer a ativação do software para execução em cada dispositivo. O HP Services Scan é fornecido através do Windows Update em determinados equipamentos HP e verificará os direitos de cada dispositivo, para determinar se um serviço ativado foi adquirido, e faz automaticamente a transferência do software aplicável. Para desativar esta funcionalidade, siga as instruções em <a target='_blank' href='http://www.hpdaas.com/requirements' style=\"text-decoration:none; color:#4D52E5\">http://www.hpdaas.com/requirements</a>
account_management.subscriptions.addon.oob.desclaimer4=4. O WXP Starter está incluído e é necessário para administrar e gerir a solução de software.
account_management.subscriptions.addon.oob.features.remote_control=Remote control - even when the Operating System is down
account_management.subscriptions.addon.oob.features.remote_control.desc=A equipa de TI pode aceder remotamente ao BIOS para reiniciar, recriar a imagem e recuperar PCs de marcas diferentes, onde quer que o trabalho seja realizado.
account_management.subscriptions.addon.oob.features.scalable=Gestão escalável e centralizada
account_management.subscriptions.addon.oob.features.scalable.desc=Simplifique o provisionamento de PCs, o controlo de licenças em massa e o acesso baseado em funções com esta funcionalidade que se integra no WXP para implementação, utilização e gestão empresarial.
account_management.subscriptions.addon.oob.features.secure=Experiências seguras do utilizador final
account_management.subscriptions.addon.oob.features.secure.desc=Os utilizadores têm visibilidade nas sessões remotas e podem interromper a ligação a qualquer momento. Um suporte seguro e contínuo gera confiança para uma melhor experiência do utilizador.
account_management.subscriptions.addon.oob.header=Out-of-band Remote Connect
account_management.subscriptions.addon.oob.overview.desc1=Pretende melhorar as experiências digitais para uma força de trabalho híbrida? O HP Out-of-band Remote Connect oferece aos técnicos de suporte acesso remoto à BIOS para reiniciar, recriar a imagem e recuperar PCs, mesmo que o sistema operativo não esteja a funcionar. Sem envolvimento do utilizador, sem visitas ao balcão.
account_management.subscriptions.addon.vyopta.connect_accounts.error=Não foi possível ligar a sua conta. Verifique a sua ligação e tente novamente.
account_management.subscriptions.addon.vyopta.connect_accounts.found=Detetámos uma conta Vyopta "<b>{orgName}</b>". Pretende ligá-la ao WXP?
account_management.subscriptions.addon.vyopta.connect_accounts.no_permissions=Não tem permissões. Contacte o administrador da conta Vyopta para obter assistência.
account_management.subscriptions.addon.vyopta.connect_accounts.not_found=Não foi possível detetar automaticamente a sua conta de {service}. Contacte {support_link} para o ajudar a estabelecer esta ligação se já for um cliente de {service}.
account_management.subscriptions.addon.vyopta.connect_accounts.org_already_mapped=Esta ID Vuopta já está ligado a outro inquilino. Contacte o seu administrador da conta para obter ajuda.
account_management.subscriptions.addon.vyopta.connect_accounts.request_support=Contacte o seu administrador da conta de {service} para obter ajuda.
account_management.subscriptions.addon.vyopta.connect_accounts.success=Ligámos a sua conta com êxito.
account_management.subscriptions.addon.vyopta.connect_accounts.unauthorized=Detetámos a sua organização em {service}, mas parece que não tem as permissões necessárias para ligar contas.
account_management.subscriptions.addon.vyopta.desc=Otimize a colaboração com conhecimentos em tempo real. Monitorize a qualidade das chamadas, a utilização da sala de reuniões e o desempenho do sistema no Microsoft Teams, Zoom, Poly e Webex. Quando integrado com o WXP, ajuda as TI a melhorar as experiências digitais e a aumentar a eficiência do local de trabalho.
account_management.subscriptions.addon.vyopta.features.comprehensive_monitoring=Monitorização abrangente em todas as plataformas de colaboração
account_management.subscriptions.addon.vyopta.features.comprehensive_monitoring.desc=Obtenha uma visibilidade holística do seu ambiente de Comunicações Unificadas (UC) de vários fornecedores, permitindo uma gestão eficiente das ferramentas de colaboração de vídeo e voz.
account_management.subscriptions.addon.vyopta.features.deep_integration=Integração profunda com o WXP
account_management.subscriptions.addon.vyopta.features.deep_integration.desc=Os dados analíticos e de monitorização da Vyopta estão perfeitamente integrados no WXP, permitindo às equipas de TI gerir o desempenho da colaboração juntamente com outras tecnologias do local de trabalho. Esta abordagem centralizada melhora a eficiência das TI, reduz a complexidade e melhora a gestão da experiência digital.
account_management.subscriptions.addon.vyopta.features.enhance_user_engagement=Melhore o envolvimento e o bem-estar dos utilizadores
account_management.subscriptions.addon.vyopta.features.enhance_user_engagement.desc=Utilize a análise de colaboração para identificar barreiras à produtividade, promovendo melhores experiências e o bem-estar dos colaboradores.
account_management.subscriptions.addon.vyopta.features.optimize_meeting_space=Otimizar a utilização do espaço de reunião
account_management.subscriptions.addon.vyopta.features.optimize_meeting_space.desc=Analise a ocupação das salas e os padrões de utilização para maximizar os investimentos imobiliários e melhorar a eficiência das salas de reunião.
account_management.subscriptions.addon.vyopta.features.proactive_issue_detection=Deteção e resolução proativa de problemas
account_management.subscriptions.addon.vyopta.features.proactive_issue_detection.desc=Utilize a monitorização em tempo real para identificar e resolver problemas de qualidade de colaboração antes que estes afetem os utilizadores, reduzindo o tempo de resolução de problemas.
account_management.subscriptions.addon.vyopta.header=Experiência de colaboração da Vyopta
account_management.subscriptions.addon.vyopta.overview=Capacite as equipas de TI com monitorização e análise avançadas para ferramentas de colaboração. A integração da Vyopta com o WXP proporciona visibilidade em tempo real sobre a utilização da sala de reuniões, da qualidade das chamadas e do desempenho do sistema em plataformas como o Microsoft Teams, Zoom, Poly e Webex. Aumente a produtividade dos colaboradores abordando proativamente os problemas de colaboração e otimizando as experiências no local de trabalho.
account_management.subscriptions.addon.vyopta.short_desc=Análises valiosas e conhecimentos sobre as salas para otimizar os ambientes de colaboração
account_management.subscriptions.addon.wolf.desc=Implementação, visibilidade e proteção de ponta a ponta utilizando a segurança do PC e do software incorporada para reforçar as defesas do PC.
account_management.subscriptions.addon.wolf_security=HP Wolf Security
account_management.subscriptions.addon.wolf_security.desc=Proteção inigualável dos terminais contra ciberataques com a tecnologia HP Wolf. Veja a telemetria no Workforce Experience para uma segurança melhorada.
account_management.subscriptions.addon.wpt.desc=Rastreie, bloqueie e proteja remotamente dispositivos perdidos ou roubados. Quando integrada no WXP, ajuda as equipas de TI a controlar os ativos do PC e a reduzir os riscos de perda de dispositivos, mesmo quando os dispositivos estão desligados.
account_management.subscriptions.addon.wpt.features.always_available=Sempre disponível
account_management.subscriptions.addon.wpt.features.always_available.desc=Utiliza hardware e software personalizados para localizar/bloquear/apagar mesmo que o PC esteja desligado, não esteja na Internet ou não arranque.
account_management.subscriptions.addon.wpt.features.message_customization=Personalização de mensagens
account_management.subscriptions.addon.wpt.features.message_customization.desc=Transmita uma mensagem personalizada para o PC de destino com instruções de desbloqueio
account_management.subscriptions.addon.wpt.features.remote_lock_and_erase=Bloqueio e eliminação remotos
account_management.subscriptions.addon.wpt.features.remote_lock_and_erase.desc=Bloqueie o dispositivo ao nível do firmware para proteger os dados e inutilize o dispositivo roubado. Apague o armazenamento primário no dispositivo perdido ou roubado para evitar a violação de dados.
account_management.subscriptions.addon.wpt.features.seamless_integration=Integração perfeita com o WXP
account_management.subscriptions.addon.wpt.features.seamless_integration.desc=Gira a segurança do dispositivo diretamente no WXP, simplificando as operações de TI e a gestão de pontos finais.
account_management.subscriptions.addon.wpt.features.separations_of_duties=Separação de funções
account_management.subscriptions.addon.wpt.features.separations_of_duties.desc=A utilização de vários aprovadores necessários para bloquear/apagar evita erros ou ameaças internas.
account_management.subscriptions.addon.wpt.features.strong_audit_trail=Registo de auditoria forte
account_management.subscriptions.addon.wpt.features.strong_audit_trail.desc=Regista a execução bem-sucedida de Bloqueio e Apagamento na plataforma WXP como prova de conformidade.
account_management.subscriptions.addon.wpt.header=HP Wolf Protect and Trace with Wolf Connect
account_management.subscriptions.addon.wpt.overview=Melhore a gestão de ativos e reduza os riscos de violação de dados com o HP Wolf Protect & Trace. Integrada no WXP, esta solução exclusiva possibilita às equipas de TI localizar, bloquear e apagar dispositivos perdidos ou roubados, mesmo quando desligados. Cobertura global e administração simples adequada a todas as dimensões de clientes.
account_management.subscriptions.addon.wpt.requirements.purchase=Requer a compra de um novo PC HP do seu representante de vendas HP ou parceiro de canal autorizado.<br> Requer um PC suportado com a opção de ecrã “WWAN”. PCs suportados em: https://www.hpwolf.com/en/legal/ptwc/platforms
account_management.subscriptions.addon.wpt.short_desc=Localize, bloqueie e apague remotamente um PC a nível global, mesmo quando está desligado
