applicationInv.help.content=O dashboard do explorador de aplicações oferece um repositório centralizado das aplicações de software da organização, com detalhes aprofundados, como descrições e números de versão. Ao fornecer uma visão unificada do panorama de aplicações, permite uma maior segurança, conformidade e planeamento de TI informado. Além disso, o dashboard simplifica a gestão da manutenção, das atualizações e das migrações de aplicações, garantindo um processo mais eficiente e simplificado.
