exp.AntivirusSoftwareIsNotEnabled.option3=Opção 3: Se a solução antivírus não pode ser ativada utilizando as opções normais, reinicie o dispositivo. Se continuar a não iniciar, siga a documentação do antivírus ou contacte o suporte do produto do fornecedor.
