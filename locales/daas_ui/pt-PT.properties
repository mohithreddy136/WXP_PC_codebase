dnto.subscriptions.about_hp.desc1=Somos uma empresa de tecnologia nascida da crença de que as empresas devem fazer mais do que apenas obter lucro. Devem tornar o mundo num lugar melhor. Os nossos esforços em matéria de ação climática, direitos humanos e equidade digital provam que estamos a fazer tudo o que está ao nosso alcance para que assim seja.
