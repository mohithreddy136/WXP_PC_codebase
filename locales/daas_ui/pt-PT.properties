exp.CollaborationSoftwareErrorsAreHigh.causeConflicts=Os conflitos entre diferentes aplicações ou extensões de software, como extensões ou suplementos do browser, podem interferir com o funcionamento correto das ferramentas de colaboração e resultar em vários erros.
exp.CollaborationSoftwareErrorsAreHigh.causeNetwork=Problemas de conetividade de rede, como ligações à Internet lentas ou instáveis, podem causar interrupções e erros em ferramentas de colaboração que dependem da comunicação e transferência de dados em tempo real.
exp.CollaborationSoftwareErrorsAreHigh.causeUpdates=As atualizações ou correções de software frequentes podem introduzir novos bugs ou problemas de compatibilidade, levando a um aumento do número de erros em aplicações como o Teams, Outlook, Zoom, Webex, Chrome e Office.
exp.CollaborationSoftwareErrorsAreHigh.possibleCauses=Possíveis causas:
exp.CollaborationSoftwareErrorsAreHigh.remediationConflicts=Resolva conflitos desativando ou removendo extensões ou suplementos problemáticos e assegurando a compatibilidade entre diferentes aplicações de software.
exp.CollaborationSoftwareErrorsAreHigh.remediationNetwork=Melhore a estabilidade da rede atualizando as ligações à Internet, resolvendo problemas de conetividade e assegurando uma largura de banda adequada para as ferramentas de colaboração.
exp.CollaborationSoftwareErrorsAreHigh.remediationUpdates=Verifique regularmente se existem atualizações e correções de software e aplique-as para garantir que resolvem os erros conhecidos e os problemas de compatibilidade.
exp.CollaborationSoftwareErrorsAreHigh.suggestedRemediations=Correções sugeridas:
exp.CollaborationSoftwareErrorsAreHigh.title=Resolver erros de software de colaboração
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.appsCausingHighCpu=As aplicações que consomem a maioria da CPU serão identificadas na coluna de Aplicações Com Elevada Utilização da CPU.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeBackgroundProcesses=Vários processos e serviços em segundo plano, incluindo atualizações do sistema, verificações antivírus e outras tarefas de manutenção, podem utilizar a capacidade da CPU e causar uma utilização elevada.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeFirmwareBug=Um erro no firmware pode fazer com que a CPU funcione em níveis mais elevados do que o esperado.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeMalfunctioningSoftware=O software mal otimizado ou com mau funcionamento pode causar uma utilização excessiva da CPU, especialmente se estiver preso num ciclo ou a consumir recursos de forma ineficiente.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeResourceIntensiveApps=A execução de aplicações que consomem muitos recursos, como editores de vídeo, máquinas virtuais ou cálculos complexos, pode consumir uma quantidade significativa de recursos da CPU, levando a uma utilização elevada.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.closeHighCpuApps=Fechar as aplicações utilizando a maioria da CPU.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.connectAcAdapter=Ligue a um transformador CA, uma vez que a CPU pode funcionar com um desempenho inferior quando utiliza a bateria, consoante as definições de energia do dispositivo.
