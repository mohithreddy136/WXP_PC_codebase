exp.NetworkSpeedSlow.recAvoidInterference.detail=Altere o canal do sistema sem fios para reduzir a sobreposição com redes vizinhas.
exp.NetworkSpeedSlow.recChangeFrequency=Mude a banda de frequência do router.
exp.NetworkSpeedSlow.recChangeFrequency.detail=Alterne entre 2,4 GHz e 5 GHz (ou 6 GHz, se suportado) para otimizar a velocidade.
exp.NetworkSpeedSlow.recCheckOtherDevices=Verifique a utilização de outros dispositivos.
exp.NetworkSpeedSlow.recCheckOtherDevices.detail=As transferências grandes ou o streaming noutros locais podem reduzir a largura de banda disponível.
exp.NetworkSpeedSlow.recMoveRouter=Mova o router.
exp.NetworkSpeedSlow.recMoveRouter.detail=Reposicione para obter uma linha de visão mais clara e reduzir as obstruções.
exp.NetworkSpeedSlow.recommendationsHeader=Recomendações:
