exp.NetworkDisconnections.recCheckCables.detail=Certifique-se de que todos os cabos estão bem ligados e que não estão danificados.
exp.NetworkDisconnections.recommendationsHeader=Recomendações:
exp.NetworkDisconnections.recReduceInterference=Reduza a interferência do sistema sem fios.
