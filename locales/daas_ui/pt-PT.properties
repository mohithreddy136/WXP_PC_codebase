exp.FrequentWindowsBsodsHaveOccurred.description=Existem mais do que 3 Verificações de Erro (eventos BSOD) nos últimos 7 dias. Os eventos de Verificação de Erros são também referidos como eventos “Ecrã Azul” ou “BSOD”.
