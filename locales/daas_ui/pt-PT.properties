wex.ra.remediation.antivirus_not_enabled=O Antivírus Microsoft Defender é um software antivírus que está incluído no Windows e pode ajudar a proteger o seu dispositivo de vírus, malware e outras ameaças.
wex.ra.remediation.antivirus_signature_outdated=Para assegurar uma melhor proteção, os ficheiros de definição de antivírus devem ser mantidos atualizados.
wex.ra.remediation.antivirus_signature_outdated_other=O dispositivo está configurado para utilizar um antivírus não Microsoft de terceiros para ajudar a proteger o dispositivo de vírus, malware e outras ameaças, mas as atualizações da assinatura antivírus são necessárias no dispositivo.
wex.ra.remediation.app_crash=Mais de 10 erros de software nos últimos 7 dias em Teams, Outlook, Zoom, Webex, Chrome, Office.
wex.ra.remediation.avg_fan_speed_high=A velocidade média da ventoinha é elevada para um período de tempo alargado.
wex.ra.remediation.battery_calibrate=A bateria requer uma calibração.
wex.ra.remediation.battery_early_detection_wear=Nos últimos 30 dias, foi previsto que a bateria tem menos do que 70% da capacidade total restante.
wex.ra.remediation.battery_needs_attention=Workforce Experience Platform displays records of battery warnings and failures that can be used to obtain service for a battery that is experiencing issues
wex.ra.remediation.bitlocker_encryption_not_enabled=Para proteger os dados em repouso, a encriptação do disco é fortemente recomendada.
wex.ra.remediation.bsod=Existem mais do que 3 Verificações de Erro (eventos BSOD) nos últimos 7 dias.
wex.ra.remediation.bsod_occured=O dispositivo experienciou 1 ou mais eventos de Verificação de Erros nos últimos 7 dias.
wex.ra.remediation.cpu_utilization_high=Possíveis Causas: Uma aplicação em execução está suspensa/não responde.
wex.ra.remediation.disk_needs_attention=A Workforce Experience Platform exibe os registos de avisos e falhas do Disco que podem ser utilizados para obter assistência para um disco que está com problemas.
wex.ra.remediation.disk_utilization_high=Hard disk is near full disk capacity and low in free space.
wex.ra.remediation.docking_station_ac_adapter_failed=The Docking Station AC Adapter is having a hardware issue.
wex.ra.remediation.docking_station_ac_adapter_running_at_reduced_perofmance=O transformador da estação de ancoragem não está a funcionar corretamente.
wex.ra.remediation.docking_station_firmware_out_of_date=Possible Causes: The docking station may require a Firmware or Driver update.
wex.ra.remediation.excessive_os_shutdown_time=O tempo de encerramento demora 3 ou mais minutos a concluir.
wex.ra.remediation.excessive_os_startup_time=O tempo de arranque do sistema demora mais do que 3 minutos a concluir.
wex.ra.remediation.firewall_disabled=A firewall ajuda a impedir hackers e software malicioso de obter acesso ao seu PC através da Internet ou de uma rede
wex.ra.remediation.firewall_signature_outdated=A firewall requer atualizações regulares para garantir uma proteção ótima contra ataques baseados na rede.
wex.ra.remediation.frequent_bsod_occured=Existem mais do que 3 Verificações de Erro (eventos BSOD) nos últimos 7 dias.
wex.ra.remediation.frequent_network_disconnection=Para redes domésticas, certifique-se de que o firmware do router está atualizado e coloque-o num local central para minimizar as interferências. Além disso, reduza o número de dispositivos ligados e considere a utilização de uma ligação com fios para dispositivos críticos, de modo a manter uma rede estável e fiável.
wex.ra.remediation.gpu_health_issue=A Workforce Experience Platform detetou um problema com a GPU que requer atenção imediata.
wex.ra.remediation.high_collaboration_sw_errors=Mais de 10 erros de software nos últimos 7 dias em Teams, Outlook, Zoom, Webex, Chrome, Office.
wex.ra.remediation.high_windows_crash=O sistema operativo experienciou 1 ou mais falhas inesperadas ou reinícios nos últimos 7 dias.
wex.ra.remediation.last_reboot_more_than_21_days=O último reinício foi há mais de 21 dias.
wex.ra.remediation.maximise_my_battery_health_not_enabled=HP Battery Health Manager is available on all HP business notebooks since 2016. To improve battery life, it is recommended that Battery Health Manager be enabled
wex.ra.remediation.memory_utilization_high=The average Memory utilization over the last 30 days is 85% or greater.
wex.ra.remediation.missing_critical_bios_updates=Atualize o BIOS para dispositivos compatíveis através da plataforma, selecionando os dispositivos abaixo e selecionando “Aplicar política”. Para dispositivos incompatíveis, atualize os controladores e o firmware do sistema utilizando o Windows Update ou o HP Image Assistant.
wex.ra.remediation.missing_critical_driver_updates=O Relatório de Inventário dos Controladores contém um inventário detalhado de dispositivos que têm atualizações críticas de controlador de dispositivo em falta.
wex.ra.remediation.missing_windows_security_updates=O dashboard da Workforce Experience Platform Security contém KPIs que exibem a contagem de dispositivos que não possuem atualizações de segurança do Windows.
wex.ra.remediation.os_crash=O sistema operativo experienciou 1 ou mais falhas inesperadas ou reinícios nos últimos 7 dias.
wex.ra.remediation.poor_network_signal_strength=Para redes domésticas, reiniciar o router ou deslocá-lo para reduzir o número de obstáculos entre o ponto de acesso e o PC, pode ajudar a melhorar a força do sinal Wi-Fi.
wex.ra.remediation.poor_nominal_speed=Para redes domésticas, considere atualizar o seu router para um modelo mais recente que suporte as normas Wi-Fi mais recentes, como o Wi-Fi 6. Além disso, otimize a disposição da rede colocando o router numa localização central, reduzindo a interferência de outros dispositivos e utilizando ligações com fios sempre que possível para um desempenho mais estável.
wex.ra.remediation.unauthenticated_connection=Para redes domésticas, selecione um protocolo de encriptação robusto, como WPA2 ou WPA3, e defina uma palavra-passe forte e única para o acesso. Além disso, considere implementar a filtragem de endereços MAC e atualizar regularmente o firmware do router para aumentar a segurança e evitar ligações não autorizadas.
wex.ra.remediation.windows_secure_boot_not_enabled=O Arranque Seguro é uma norma de segurança desenvolvida pelos membros da indústria de PCs para assegurar que um dispositivo é iniciado utilizando apenas software que tem a confiança do fabricante do equipamento original (OEM).
