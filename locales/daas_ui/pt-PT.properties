exp.FrequentWindowsBsodsHaveOccurred.option4Step1=Abrir o “Relatório de Erros de Ecrã Azul” para ver mais informações.
exp.FrequentWindowsBsodsHaveOccurred.option4Step2=A coluna “Descrição de Verificação de Erros” contém ligações para o Código de Referência de Verificação de Erros do Microsoft
