exp.AntivirusSignatureUpdatesNeeded.deviceRemediation=Correção do Dispositivo:
exp.AntivirusSignatureUpdatesNeeded.option1=Opção 1: Para as soluções antivírus não Microsoft geridas centralmente, o administrador do pacote do antivírus da organização deve definir a política para atualizar pelo menos uma vez por semana (recomendado).
exp.AntivirusSignatureUpdatesNeeded.option2=Opção 2: Para soluções antivírus geridas pelo utilizador, o utilizador deve abrir a consola de administração do antivírus e seguir o procedimento para agendar ou acionar uma atualização da assinatura. É recomendado que a solução antivírus esteja configurada para transferir atualizações pelo menos uma vez por semana.
