side_panal.smart_refresh.hardware_persona_1=Intensivo em termos de CPU: Dispositivos que utilizam muita CPU
side_panal.smart_refresh.hardware_persona_2=Armazenamento pesado: Dispositivos que utilizam muito espaço de armazenamento
side_panal.smart_refresh.hardware_persona_3=Perfil padrão: Dispositivos com métricas de utilização média que correspondem a um perfil normal
side_panal.smart_refresh.hardware_persona_4=Estação de ancoragem moderada: Dispositivos que utilizam frequentemente uma estação de ancoragem e/ou outros periféricos
side_panal.smart_refresh.hardware_persona_5=Ecrã de sessão longa: Dispositivos que normalmente têm os seus ecrãs ligados durante um longo período de tempo
side_panal.smart_refresh.hardware_personas_header=Personas de hardware
side_panal.smart_refresh.hardware_personas_sub_text=Identificadas por grupos de dispositivos baseados em IA com base na utilização de hardware
side_panal.smart_refresh.help_sec1_description=Os 3 passos: Identificar, Categorizar, Recomendar
side_panal.smart_refresh.help_sec1_header=Como funciona
side_panal.smart_refresh.help_sec1_point_1_desc=Avalie cada dispositivo em 9 pontos de dados, resumidos numa Pontuação de Urgência da Atualização*. Esta pontuação ajuda-o a dar prioridade a dispositivos individuais em risco para evitar interrupções na produtividade do utilizador.
side_panal.smart_refresh.help_sec1_point_1_title=1. Identificar
side_panal.smart_refresh.help_sec1_point_2_desc=Um modelo de IA agrupa os dispositivos em personas distintas de hardware e software, com base na utilização. Estas personas podem ajudar a orientá-lo para o dispositivo de substituição correto.
side_panal.smart_refresh.help_sec1_point_2_title=2. Categorizar
side_panal.smart_refresh.help_sec1_point_3_desc1=Se trabalhar com um parceiro HP, o Smart Refresh recomendará substituições para cada dispositivo. Estas recomendações são provenientes dos modelos de melhor desempenho da pessoa relevante, que estão disponíveis no catálogo carregado do seu parceiro. Se não vir as recomendações do dispositivo, ou se os dispositivos que vê estiverem desatualizados, contacte o seu parceiro e peça-lhe que carregue o catálogo mais recente.
side_panal.smart_refresh.help_sec1_point_3_desc2=Se não trabalhar com um Parceiro HP, não verá recomendações de dispositivos no Smart Refresh. Contacte o seu representante de conta HP para obter os melhores modelos de substituição.
side_panal.smart_refresh.help_sec1_point_3_desc3=Data do último carregamento do catálogo:
side_panal.smart_refresh.help_sec1_point_3_title=3. Recomendar
side_panal.smart_refresh.help_sec1_point_4_desc=Utilize o estado de atualização "Completo" para remover quaisquer PCs que não necessitem de uma atualização ou que não possam ser atualizados neste momento. Pode ver estes dispositivos e alterar o seu estado para "Requer ação" para os ver novamente na lista de PCs
side_panal.smart_refresh.help_sec1_point_4_title=4. Estados
side_panal.smart_refresh.help_sec2_description=Como determinamos quando é que um dispositivo precisa de ser substituído
side_panal.smart_refresh.help_sec2_header=Pontuação de urgência da atualização
side_panal.smart_refresh.help_sec2_sub_text=A Pontuação da Urgência é calculada a partir dos dados de desempenho de um dispositivo em 9 áreas. A gravidade corresponde à pontuação numérica da seguinte forma:
