banner.iot.update.description=Uma alteração à infraestrutura da plataforma TechPulse será implementada na segunda-feira, 27 de fevereiro de 2023. Poderá ter de atualizar a proxy, a firewall e as definições de software de inspeção SSL. Execute a ferramenta de avaliação da rede em <a href='https://www.hpdaas.com/software' target='_blank'>HP TechPulse - Software (hpdaas.com)</a> e verifique se qualquer um dos quatro (4) alvos de teste *.IoT devolvem uma mensagem de “Falha”. Se o teste resultar numa falha, siga as instruções aqui “<b><a href='https://hp.service-now.com/techpulse_kb?id=kb_article&sysparm_article=KB0011291' target='_blank'>KB0011291</a> - Configurar uma Proxy ou Firewall”</b> e <b>efetue estas alterações até quinta-feira, 23 de fevereiro de 2023</b>.
