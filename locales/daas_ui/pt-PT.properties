side_panal.smart_refresh.help_sec3_point_1=Utilização da CPU: percentagem média utilizada nos últimos 30 dias
side_panal.smart_refresh.help_sec3_point_2=Utilização de Memória: percentagem média utilizada nos últimos 30 dias
side_panal.smart_refresh.help_sec3_point_3=Utilização do disco: Última percentagem registada utilizada
side_panal.smart_refresh.help_sec3_point_4=Falhas do SO: Total de falhas do sistema operativo nos últimos 7 dias
side_panal.smart_refresh.help_sec3_point_5=BSODs: Total de Ecrãs Azuis de Erro Fatal nos últimos 7 dias
side_panal.smart_refresh.help_sec3_point_6=Duração do arranque: Última hora registada em minutos
side_panal.smart_refresh.help_sec3_point_7=Duração do encerramento: Última hora registada em minutos
side_panal.smart_refresh.help_sec3_point_8=Erros de software para aplicações de colaboração: Total de erros nos últimos 7 dias
side_panal.smart_refresh.help_sec3_point_9=Estado de alimentação da estação de ancoragem: Últimos dados registados, Sim/Não
side_panal.smart_refresh.help_sec3_sub_text=Os nove fatores seguintes contribuem para a pontuação e incluem descrições de como cada um é medido:
side_panal.smart_refresh.help_sub_title=Atualize os PCs na altura certa com o Smart Refresh da HP. Eis como funciona:
side_panal.smart_refresh.personas_header=Pessoas
side_panal.smart_refresh.personas_sub_text=Grupos de dispositivos baseados em IA, determinados por padrões de utilização
side_panal.smart_refresh.point_1_desc=Avaliar o estado atual dos PCs em termos de desempenho do hardware, usabilidade do software e segurança.
side_panal.smart_refresh.point_1_title=1. Avaliação
side_panal.smart_refresh.point_2_desc=Dar prioridade aos PCs que necessitam de atenção imediata com base na sua utilização, importância para as operações da empresa ou nível de obsolescência.
side_panal.smart_refresh.point_2_title=2. Definição de prioridades
side_panal.smart_refresh.point_3_desc=Realizar as atualizações ou substituições planeadas de forma eficiente, minimizando o tempo de inatividade e as interrupções para os utilizadores.
side_panal.smart_refresh.point_3_title=3. Implementação
side_panal.smart_refresh.point_4_desc=Assegurar que os PCs renovados estão equipados com as mais recentes medidas de segurança para proteção contra ciberameaças.
side_panal.smart_refresh.point_4_title=4. Segurança
side_panal.smart_refresh.point_5_desc=Monitorizar regularmente os PCs atualizados para garantir que continuam a ter um desempenho ótimo e efetuar a manutenção necessária, se for caso disso.
side_panal.smart_refresh.point_5_title=5. Monitorização e manutenção
side_panal.smart_refresh.software_persona_1=Adormecido: Utilizadores que não utilizam frequentemente o seu dispositivo
side_panal.smart_refresh.software_persona_2=Office 365: Utilizadores que utilizam frequentemente aplicações do Office, como o Excel e o Word
side_panal.smart_refresh.software_persona_3=Codificador de energia: Utilizadores que utilizam frequentemente ferramentas de desenvolvimento para codificação
side_panal.smart_refresh.software_persona_4=Productivity Coder: Users who frequently use developer tools for coding
side_panal.smart_refresh.software_persona_5=Remote Worker: Users who frequently use productivity software, such as OneNote and Adobe Acrobat
side_panal.smart_refresh.software_persona_6=Healthcare Worker: Users who typically use their devices remotely
side_panal.smart_refresh.software_persona_7=Cloud Strategist: Users who frequently use medical professional software, such as ICU monitoring and hospital management systems
side_panal.smart_refresh.software_persona_8=Utility Expert: Users who use extensive cloud services
side_panal.smart_refresh.software_persona_9=Media Consumer: Users who frequently use utility software, such as WinRAR and System Monitor
side_panal.smart_refresh.software_personas_header=Personas de software
side_panal.smart_refresh.software_personas_sub_text=Identificadas por grupos de dispositivos baseados em IA com base na utilização de software
side_panal.smart_refresh.sub_title=Smart Refresh refere-se ao processo para atualização dos computadores pessoais (PCs) de uma forma inteligente ou eficiente. Isto envolve vários aspetos:
