wpt.details.desc=Proteja com segurança os dados, monitorize a sua frota de dispositivos HP e impeça utilizadores não autorizados de obterem acesso aos ficheiros e documentos na sua rede com o HP {appName}, o serviço mais seguro do mundo para localizar, bloquear e apagar. Com a tecnologia HP Workforce Experience Platform, o HP {appName} fornece um serviço completo aplicado por hardware para localizar, bloquear e apagar dispositivos, mesmo quando os PCs estão offline ou desligados.
wpt.details.header=Crie a Sua Primeira Linha de Defesa
wpt.disclaimer.point1=Com base numa análise interna da HP de serviços de software de Localização, Bloqueio e Eliminação. Mais seguro com base na criptografia e persistência (incluindo persistência imposta por hardware) em outubro de 2021.
wpt.disclaimer.point2=O HP {appName} está disponível em determinados HP 600, 800, 1000, portáteis Elite Dragonfly com Windows, determinados desktops 800 e Workstations Z1 G8, e funcionará quando o dispositivo estiver ligado e conetado à Internet.
wpt.disclaimer.point3=A HP Workforce Experience Platform é uma plataforma de telemetria e análise que fornece dados críticos de dispositivos e aplicações e não é vendida como um serviço autónomo. A HP Workforce Experience Platform cumpre rigorosos regulamentos de privacidade GDPR e possui certificação ISO27001, ISO27701, ISO27017 e SOC2 Type2 para a Segurança de Informações. É necessário acesso à Internet com ligação ao portal Workforce Experience Platform. Para saber os requisitos completos do sistema, visite <a href=\"{link}\" target=\"_blank\" style=\"text-decoration: none; color: #027aae; cursor: pointer;\">{text}</a>.
wpt.disclaimer.point4=Imposto por hardware refere-se ao HP Sure Run Gen4 e mais recente, que está disponível em PCs HP compatíveis com este serviço e requer o Windows 10 ou mais recente.
wpt.disclaimer.point5=Os níveis de serviço e tempos de resposta para HP Hardware Supports podem variar de acordo com a sua localização geográfica. O serviço inicia na data de aquisição do hardware. Podem aplicar-se restrições e limitações. Para mais detalhes, visite <a href="https://www.hp.com/go/cpc" target="_blank" style="text-decoration: none; color: #027aae; cursor: pointer;">www.hp.com/go/cpc</a>. Os Serviços HP regem-se pelos termos e condições de serviço HP aplicáveis fornecidos ou indicados ao Cliente no momento da compra. O cliente pode ter direitos estatutários adicionais de acordo com as leis locais aplicáveis, e esses direitos não serão de forma alguma afetados pelos termos e condições de serviço HP ou pela garantia limitada HP fornecidos com o seu produto HP.
wpt.explore.header=Explorar a solução
wpt.feature.cost.desc=Perder um PC importante pode custar mais do que dinheiro. Reduza o risco e os custos associados a perder um PC com o HP {appName}. Agora tem uma forma abrangente de localizar um PC perdido ou furtado e facilmente bloquear ou apagar os dados.
