exp.EarlyDetectionWear.causeConstantCharge=Manter a bateria constantemente carregada a 100%, especialmente quando ligada à corrente durante longos períodos, pode contribuir para o desgaste e reduzir a sua vida útil.
exp.EarlyDetectionWear.causeDeepDischarge=As descargas profundas frequentes, em que se deixa a bateria descarregar completamente antes de a recarregar, podem acelerar o desgaste e reduzir a vida útil global da bateria.
exp.EarlyDetectionWear.causeHighTemp=As temperaturas elevadas resultantes do funcionamento do dispositivo num ambiente quente ou da exposição ao calor, podem causar stress térmico e degradar o desempenho da bateria ao longo do tempo.
