azureonboard.marketing.disclaimer.content=As informações aqui contidas estão sujeitas a alterações sem aviso prévio. As únicas garantias que cobrem os produtos e serviços da HP são exclusivamente as que estão estabelecidas na documentação de garantia que os acompanha. Neste documento, nenhuma declaração deverá ser interpretada como a constituição de garantia adicional. A HP não se responsabiliza por erros técnicos e editoriais ou por omissões neste documento.
azureonboard.marketing.disclaimer.contentlist1=O HP Proactive Insights e/ou componentes incluídos podem variar de acordo com a região, o sistema operativo ou o parceiro de serviços HP autorizado. Contacte o seu representante HP local ou o parceiro autorizado para obter detalhes específicos sobre a sua localização. Os serviços HP regem-se pelos termos e condições de serviço HP aplicáveis fornecidos ou indicados ao Cliente no momento da compra. O cliente pode ter direitos estatutários adicionais de acordo com as leis locais aplicáveis, e esses direitos não serão de forma alguma afetados pelos termos e condições de serviço HP ou pela garantia limitada HP fornecidos com o seu produto HP.
azureonboard.marketing.disclaimer.contentlist2=HP {appName} é uma plataforma de telemetria e análise que fornece dados críticos de dispositivos e aplicações e não é vendida como um serviço autónomo. HP {appName} cumpre rigorosos regulamentos de privacidade RGDP e possui certificação ISO27001, ISO27701, ISO27017 e SOC2 Type2 para a Segurança de Informações. É necessário acesso à Internet com ligação ao {appName}. Para obter os requisitos completos do sistema, visite <a target='_blank' href={link}>{text}</a>.
azureonboard.marketing.disclaimer.contentlist3=As atualizações do BIOS estão apenas disponíveis nos dispositivos HP.
azureonboard.marketing.disclaimer.contentlist4=Para obter os detalhes sobre a cobertura do sistema operativo, visite <a target='_blank' href={link}>{text}</a>.
azureonboard.marketing.employeesection.description=Recolha, meça e efetue a gestão da experiência digital dos seus funcionários através da correlação de hardware, aplicação e inquéritos sobre a experiência dos funcionários em todos os seus dispositivos.
azureonboard.marketing.employeesection.heading=Proactive Employee Insight
azureonboard.marketing.hardwaresection.description=Monitorize de forma proativa as unidades de disco rígido dos dispositivos, a utilização da CPU, os níveis térmicos e o estado da bateria, permitindo-lhe prever potenciais impactos ao analisar os seus dados em oposição a mais de 20 milhões de dispositivos.
azureonboard.marketing.hardwaresection.heading=Proactive Hardware Insight
azureonboard.marketing.insightsection.description=Diagnostique problemas de desempenho, erros de software, falhas de ecrã azul e utilização do sistema, enquanto atualiza controladores e patches para assegurar que tem perfis de segurança seguros.
azureonboard.marketing.insightsection.heading=Proactive Application Insight
azureonboard.marketing.learnmoresection.content=Ao agregar a informação de mais de 20 milhões de dispositivos e mil milhões de pontos de dados, o HP Proactive Insights tira partido da plataforma de análise da HP TechPulse para identificar e resolver problemas antes de afetarem os funcionários.
azureonboard.marketing.learnmoresection.description=Estamos a ajudá-lo a mudar o paradigma da gestão de dispositivos através do controlo proativo com tecnologia IA do desempenho do computador, da segurança, dos custos, do tempo de inatividade e da satisfação dos funcionários. Terá a vantagem de informações obtidas através de mais de 20 milhões de outros dispositivos de computação para melhorar a sua organização.
azureonboard.marketing.learnmoresection.heading=O HP Proactive Insights fornece uma análise importante de mil milhões de pontos de dados
