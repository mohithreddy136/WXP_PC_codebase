wex.fleet.mgmt.remediation.kernel_panic_error.desc=Ocorreu um pânico de kernel, indicando um erro crítico do sistema do qual o kernel Linux não consegue recuperar. Isso pode ser causado por falhas de hardware, controladores corrompidos, parâmetros do kernel mal configurados ou módulos do kernel incompatíveis. É necessária uma investigação imediata para identificar a causa raiz.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt1=Verifique os registos do sistema (/var/log/messages, /var/log/syslog ou journalctl) para ver se há mensagens de erro anteriores ao pânico.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt2=Verifique o estado de funcionamento do hardware, especialmente a memória (RAM) e a integridade do disco, utilizando ferramentas como memtest86 e smartctl.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt3=Verifique alterações recentes ao sistema (por exemplo, atualizações do kernel, instalações de controladores ou alterações de configuração).
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt4=Inicie o computador no modo de recuperação ou resgate para aceder ao sistema, caso ele não consiga arrancar.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt5=Reverta ou atualize os módulos ou controladores do kernel se houver suspeita de incompatibilidade.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt6=Consulte o fornecedor ou o suporte da comunidade se o problema persistir ou for específico do hardware.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.desc=A ativação da encriptação do disco protege os dados confidenciais em repouso, garantindo que todas as informações armazenadas no disco são ilegíveis sem a autenticação adequada. Esta é uma medida de segurança crítica para sistemas que lidam com dados confidenciais ou regulamentados.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step1=Implemente a encriptação completa do disco utilizando ferramentas como LUKS (Linux Unified Key Setup) ou dm-crypt, dependendo da sua distribuição Linux.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step2=Encripte partições confidenciais (por exemplo, /home, /var ou /data) se não for viável a encriptação completa do disco.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step3=Configure a gestão segura de chaves, incluindo frases-passe ou integração com TPM (Trusted Platform Module), se disponível.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step4=Faça cópias de segurança das chaves de encriptação de forma segura para evitar a perda de dados em caso de extravio das chaves.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step5=Teste as definições de encriptação para garantir que o sistema arranca corretamente e que os dados podem ser acedidos após a autenticação.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step6=Documente a configuração da encriptação e os procedimentos de recuperação para conformidade e continuidade operacional.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step1=Instale e configure uma ferramenta de firewall, como firewalld, ufw ou iptables, dependendo da sua distribuição Linux.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step2=Ative o serviço de firewall para arrancar na inicialização
wex.fleet.mgmt.remediation.linux_firewall_disabled.step3=Defina as regras da firewall para permitir apenas os serviços necessários (por exemplo, SSH, HTTP/HTTPS) e bloquear todos os outros.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step4=Verifique o estado e as regras da firewall utilizando: sudo firewall-cmd --list-all (para firewalld), sudo ufw status (para ufw)
wex.fleet.mgmt.remediation.linux_firewall_disabled.step5=Audite regularmente as configurações da firewall para garantir que estão alinhadas com as políticas de segurança e as necessidades operacionais.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.desc=A ativação da inicialização segura ajuda a proteger o sistema contra códigos não autorizados ou maliciosos durante o processo de inicialização, verificando as assinaturas digitais dos carregadores de inicialização, módulos de kernel e controladores. Isto aumenta a integridade e a segurança do sistema, especialmente em ambientes empresariais ou orientados para a conformidade.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step1=Verifique se o firmware UEFI suporta o Secure Boot e certifique-se de que está ativado nas definições UEFI.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step2=Instale e configure bootloaders assinados e pacotes de kernel compatíveis com Secure Boot (por exemplo, usando shim e GRUB assinado).
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step3=Verifique se o kernel, os módulos e todos os componentes necessários estão assinados.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step4=Reinicie e confirme o estado do Secure Boot usando o mokutil.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step5=Registe chaves personalizadas se estiver a utilizar componentes não padrão.
wex.fleet.mgmt.remediation.missing_linux_security_updates.desc=O sistema tem uma ou mais atualizações críticas de segurança em falta. Estas atualizações corrigem vulnerabilidades conhecidas no sistema operativo, no kernel e nos pacotes instalados. A não aplicação dessas medidas pode expor o sistema a acessos não autorizados, violações de dados ou interrupções no serviço.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step1=Reveja e identifique patches de segurança em falta utilizando o gestor de pacotes do sistema (por exemplo, apt, yum, dnf, zypper).
wex.fleet.mgmt.remediation.missing_linux_security_updates.step2=Aplique imediatamente todas as atualizações críticas de segurança para mitigar ameaças e vulnerabilidades conhecidas.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step3=Reinicie o sistema se necessário, especialmente após atualizações do kernel ou do serviço central.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step4=Ative as atualizações automáticas de segurança ou configure um agendamento regular de patches, para garantir a proteção atempada.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step5=Verifique se a atualização foi bem-sucedida, verificando os registos e confirmando as versões dos pacotes.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step6=Realize uma verificação de vulnerabilidades após a atualização para garantir que não permanecem riscos residuais.
wex.fleet.mgmt.remediation.missing_linux_updates.desc=O sistema tem uma ou mais atualizações críticas do Linux em falta. Estas atualizações podem incluir patches de segurança, correções do kernel e melhorias de estabilidade. Executar um sistema desatualizado aumenta o risco de vulnerabilidades, falhas no sistema e problemas de compatibilidade.
wex.fleet.mgmt.remediation.missing_linux_updates.step1=Verifique as atualizações disponíveis usando o seu gestor de pacotes (por exemplo, yum, dnf, apt ou zypper) para identificar patches críticos em falta.
wex.fleet.mgmt.remediation.missing_linux_updates.step2=Aplique todas as atualizações de segurança e do kernel o mais rapidamente possível para mitigar vulnerabilidades conhecidas.
wex.fleet.mgmt.remediation.missing_linux_updates.step3=Reinicie o sistema se necessário, especialmente após atualizações do kernel ou do sistema central.
wex.fleet.mgmt.remediation.missing_linux_updates.step4=Ative as atualizações automáticas ou configure os agendamentos regulares de patches, para garantir a aplicação atempada de atualizações futuras.
wex.fleet.mgmt.remediation.missing_linux_updates.step5=Verifique se a atualização foi bem-sucedida, observando os registos do sistema e confirmando as versões atuais do kernel e dos pacotes.
wex.fleet.mgmt.remediation.network_connection_not_secure.desc=Foi reportada uma ligação de rede sem a segurança esperada nas últimas 24 horas.
wex.fleet.mgmt.remediation.network_connection_not_secure.desc1=Foi detetada uma ligação não autenticada nos últimos 7 dias.
wex.fleet.mgmt.remediation.network_disconnections.desc=Os dispositivos reportaram desconexões repetidas da rede nas últimas 24 horas.
wex.fleet.mgmt.remediation.network_disconnections.desc1=Foram detetadas desconexões de rede nos últimos 7 dias.
wex.fleet.mgmt.remediation.network_speed_slow.desc=A velocidade nominal da rede reportada foi lenta nas últimas 24 horas.
wex.fleet.mgmt.remediation.wifi_signal_strength_weak.desc=A intensidade do sinal Wi-Fi foi considerada fraca nas últimas 24 horas.
