exp.ExcessiveOsStartupTime.causeGroupPolicyDownload=A transferência de objetos da política de grupo durante o reinício do sistema demora muito tempo a concluir.
exp.ExcessiveOsStartupTime.causeSlowDomainLink=O PC poderá ter uma ligação lenta ao controlador do domínio a partir do qual os GPOs são transferidos durante o arranque.
exp.ExcessiveOsStartupTime.causeStartupScripts=Os scripts de arranque demoram uma quantidade de tempo excessiva para serem concluídos.
exp.ExcessiveOsStartupTime.option1=Opção 1: Windows 11 – Aplicações de arranque em Definições
exp.ExcessiveOsStartupTime.option1Guide=Para melhorar o desempenho do dispositivo e resolver um tempo de início de sessão lento, remover aplicações do arranque quando inicia sessão tem o maior impacto. Para dispositivos Windows 11, a Microsoft oferece um guia para conseguir ter o controlo do arranque do Windows.
exp.ExcessiveOsStartupTime.option1GuideLink=https://www.microsoft.com/en-us/windows/learning-center/take-control-of-windows-startup
exp.ExcessiveOsStartupTime.option1GuideLinkText=https://www.microsoft.com/en-us/windows/learning-center/take-control-of-windows-startup
exp.ExcessiveOsStartupTime.option1StepApps=No lado esquerdo da janela, selecione Aplicações.
exp.ExcessiveOsStartupTime.option1Steps=by changing the Windows startup programs using the following steps:
exp.ExcessiveOsStartupTime.option1StepSettings=Selecione Definições.
exp.ExcessiveOsStartupTime.option1StepStart=Selecione o botão Iniciar, que parece o logótipo da Microsoft.
exp.ExcessiveOsStartupTime.option1StepStartup=Selecione Arranque na parte inferior da janela Aplicações.
exp.ExcessiveOsStartupTime.option1StepToggles=Utilize os botões de alternância para determinar quais as aplicações que pretende executar no arranque. Alternar para ligado se pretender que a aplicação abra no arranque ou para desligado se não pretender que a aplicação abra no arranque.
exp.ExcessiveOsStartupTime.option2=Opção 2: Windows 11 – Aplicações de arranque no Gestor de tarefas
exp.ExcessiveOsStartupTime.option2Guide=As Aplicações de arranque também podem ser ativadas e desativadas a partir do Gestor de tarefas do Windows, utilizando os seguintes passos:
exp.ExcessiveOsStartupTime.option2StepDisable=Clique com o botão direito do rato numa aplicação e selecione Desativar (se a coluna de Estado mostrar Ativado).
exp.ExcessiveOsStartupTime.option2StepStart=Selecione o botão Iniciar, que parece o logótipo da Microsoft.
exp.ExcessiveOsStartupTime.option2StepStartupApps=Selecione "Aplicações de arranque" no painel de navegação esquerdo.
exp.ExcessiveOsStartupTime.option2StepTaskManager=Digite "Gestor de tarefas" e prima Enter para abrir o Gestor de tarefas do Windows.
exp.ExcessiveOsStartupTime.option3=Opção 3: Desinstalar aplicações
exp.ExcessiveOsStartupTime.option3Guide=As aplicações que não são iniciadas automaticamente no arranque também podem contribuir para um tempo de início de sessão lento, uma vez que estas aplicações podem conter ficheiros, serviços e entradas de registo que podem estar parcialmente carregados. As aplicações do tabuleiro do sistema são alguns exemplos de aplicações que estão em execução, mesmo que não exista uma janela aberta com a aplicação em execução. Para rever e remover aplicações desnecessárias, conclua os seguintes passos. Nota: Algumas aplicações podem exigir direitos de administrador para serem removidas.
exp.ExcessiveOsStartupTime.option3StepControlPanel=Digite "Controlo" e prima Enter para abrir o Painel de controlo.
exp.ExcessiveOsStartupTime.option3StepPrograms=Abra Programas e funcionalidades.
exp.ExcessiveOsStartupTime.option3StepStart=Selecione o botão Iniciar, que parece o logótipo da Microsoft.
exp.ExcessiveOsStartupTime.option3StepUninstall=Selecione uma aplicação a remover e selecione Desinstalar.
exp.ExcessiveOsStartupTime.option4=Opção 4: Utilize o PowerShell e o módulo ActiveDirectory para executar Get-GpResultantSetofPolicy para analisar as políticas e o tempo que demoram a ser aplicadas no(s) computador(es) afetado(s) para identificar possíveis melhorias.
exp.ExcessiveOsStartupTime.possibleCauses=Possíveis Causas:
exp.ExcessiveOsStartupTime.suggestedRemediations=Correções sugeridas:
exp.ExcessiveOsStartupTime.title=Melhorar o tempo de arranque do SO
