poly.lens.addon.details.description=Gira o seu parque de dispositivos de colaboração da HP em toda a sua organização com confiança e clareza. Desde a implementação simplificada e a manutenção sem esforço até à monitorização proativa e conhecimentos significativos, as equipas de TI obtêm controlo centralizado em todos os espaços, salas e dispositivos. Com uma gestão segura, baseada na nuvem, e suporte contínuo para o trabalho híbrido, pode reduzir as despesas operacionais, antecipar-se aos problemas e oferecer uma experiência consistente e confiável onde quer que as suas equipas trabalhem.
poly.lens.addon.feature.centralized.header=Gestão centralizada de dispositivos pessoais
poly.lens.addon.feature.centralized.text=Com as aplicações HP Poly Studio, proporcione uma experiência contínua e de autoatendimento aos utilizadores finais, enquanto as equipas de TI mantêm visibilidade e controlo centralizado sobre os dispositivos pessoais. Gira o inventário, atualizações, monitorização e conhecimentos com confiança, onde quer que as suas equipas trabalhem.
poly.lens.addon.feature.effortless.maintenance.header=Manutenção sem esforço
poly.lens.addon.feature.effortless.maintenance.text=Gira as definições, funcionalidades e atualizações de software em todo o seu parque com o mínimo de esforço. Aplique definições, prepare atualizações e aperfeiçoe configurações em escala sem sacrificar o controlo ou a precisão.
poly.lens.addon.feature.meaningful.measurement.header=Medição significativa
poly.lens.addon.feature.meaningful.measurement.text=Compreenda como os dispositivos, os espaços e as pessoas estão realmente a trabalhar. Transforme os dados de utilização e desempenho em decisões mais inteligentes e baseadas em dados sobre os seus investimentos em colaboração.
poly.lens.addon.feature.proactive.monitoring.header=Monitorização proativa
poly.lens.addon.feature.proactive.monitoring.text=Mantenha-se à frente dos problemas, com visibilidade clara do estado de funcionamento e do estado dos dispositivos. Receba alertas quando algo não estiver bem, para que os problemas sejam resolvidos antes de perturbarem as reuniões.
poly.lens.addon.feature.secure.header=Controlo seguro baseado na nuvem
poly.lens.addon.feature.secure.text=Gira tudo a partir de uma plataforma confiável baseada na nuvem que se adapta ao crescimento da sua organização, atendendo às necessidades de segurança e conformidade da empresa.
poly.lens.addon.feature.simplified.deployment.header=Implementação simplificada
poly.lens.addon.feature.simplified.deployment.text=Prepare, pré-configure e implemente dispositivos com confiança. Os fluxos de trabalho de integração automatizados reduzem o tempo de configuração, eliminam erros e preparam os dispositivos antes mesmo de chegarem ao utilizador ou à sala.
poly.lens.addon.subtitle=Gestão e conhecimentos baseados na nuvem em espaços de colaboração, salas e dispositivos.
