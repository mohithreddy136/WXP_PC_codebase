wex.fleet.mgmt.recommended.desc.antivirus_not_enabled=A ativação do Microsoft Defender proporciona uma proteção essencial contra malware e outras ameaças à segurança.
wex.fleet.mgmt.recommended.desc.antivirus_not_enabled_other=A ativação do software antivírus protege os dispositivos contra malware e protege o seu sistema contra ataques.
wex.fleet.mgmt.recommended.desc.antivirus_signature_outdated=A atualização regular das assinaturas de malware garante que o Windows Defender consegue detetar e proteger contra as ameaças mais recentes.
wex.fleet.mgmt.recommended.desc.antivirus_signature_outdated_other=Manter as assinaturas de malware atualizadas garante uma proteção abrangente contra as ameaças mais recentes.
wex.fleet.mgmt.recommended.desc.avg_fan_speed_high=A resolução de problemas relacionados com a velocidade elevada das ventoinhas ajuda a evitar o sobreaquecimento e potenciais danos nos componentes internos do dispositivo.
wex.fleet.mgmt.recommended.desc.battery_calibrate=A calibração da bateria melhora a precisão da leitura de energia e aumenta a vida útil e o desempenho da bateria.
wex.fleet.mgmt.recommended.desc.battery_early_detection_wear=A resolução do problema do desgaste da bateria assegura um funcionamento eficiente do dispositivo, um desempenho consistente e uma vida útil prolongada da bateria.
wex.fleet.mgmt.recommended.desc.battery_needs_attention=Replacement of defective batteries can ensure good device performance, and system health. Devices which are covered by warranty may be eligible for battery replacement.
wex.fleet.mgmt.recommended.desc.bitlocker_encryption_not_enabled=A ativação do BitLocker protege os dados sensíveis através da encriptação da unidade, melhorando a segurança geral contra o acesso não autorizado.
wex.fleet.mgmt.recommended.desc.bsod_occured=A resolução dos erros de ecrã azul garante a estabilidade do sistema, evita o encerramento inesperado e mantém a fiabilidade.
wex.fleet.mgmt.recommended.desc.cpu_utilization_high=A análise da utilização elevada da CPU ajuda a evitar estrangulamentos no desempenho e mantém o sistema a funcionar sem problemas.
wex.fleet.mgmt.recommended.desc.disk_needs_attention=Disk performance is degrading and may soon lead to slower performance or instability if not addressed.
wex.fleet.mgmt.recommended.desc.disk_utilization_high=A libertação de espaço em disco evita o abrandamento do sistema e assegura um funcionamento suave, evitando a sobrecarga de armazenamento.
wex.fleet.mgmt.recommended.desc.docking_station_ac_adapter_failed=A correção de falhas nos adaptadores garante uma alimentação de energia consistente nas estações de ancoragem, evitando problemas de conetividade.
wex.fleet.mgmt.recommended.desc.docking_station_ac_adapter_running_at_reduced_perofmance=A melhoria do desempenho do transformador assegura ligações fiáveis e uma funcionalidade ótima das estações de ancoragem.
wex.fleet.mgmt.recommended.desc.docking_station_firmware_out_of_date=As atualizações do firmware das estações de ancoragem garantem a compatibilidade do dispositivo e melhoram o desempenho geral do sistema.
wex.fleet.mgmt.recommended.desc.excessive_os_login_time=A redução dos tempos de início de sessão diminui os atrasos e melhora a eficiência do utilizador durante o acesso ao sistema.
wex.fleet.mgmt.recommended.desc.excessive_os_shutdown_time=A otimização dos tempos de encerramento minimiza os períodos de espera e assegura encerramentos eficientes do sistema.
wex.fleet.mgmt.recommended.desc.excessive_os_startup_time=Um tempo de arranque mais rápido acelera o acesso ao sistema e aumenta a eficiência e a produtividade do utilizador.
wex.fleet.mgmt.recommended.desc.firewall_disabled=A ativação da Firewall do Windows ajuda a bloquear o acesso não autorizado e protege a sua rede contra potenciais ameaças.
wex.fleet.mgmt.recommended.desc.firewall_signature_outdated=A atualização regular das assinaturas de firewall defende contra ameaças de rede novas e em evolução.
wex.fleet.mgmt.recommended.desc.frequent_bsod_occured=A resolução dos erros de ecrã azul garante a estabilidade do sistema, evita o encerramento inesperado e mantém a fiabilidade.
wex.fleet.mgmt.recommended.desc.frequent_kernel_panic_error=A resolução dos Erros de Pânico de Kernel melhora a estabilidade do sistema, aumenta a segurança e evita a perda de dados.
wex.fleet.mgmt.recommended.desc.frequent_network_disconnection=Ter zero desconexões de rede aumenta a fiabilidade, melhora a experiência do utilizador e garante o acesso ininterrupto a serviços e aplicações.
wex.fleet.mgmt.recommended.desc.gpu_health_issue=A correção dos problemas da GPU evita problemas de desempenho gráfico e mantém o bom funcionamento das aplicações visuais.
wex.fleet.mgmt.recommended.desc.high_collaboration_sw_errors=A resolução de problemas de software de colaboração assegura um trabalho de equipa sem falhas e uma produtividade sustentada. Reconhecemos mais de 10 erros de software nos últimos 7 dias no Teams, Outlook, Zoom, Webex, Chrome, Office.
wex.fleet.mgmt.recommended.desc.high_windows_crash=A resolução de falhas do SO garante a estabilidade do sistema, um desempenho consistente e uma produtividade ininterrupta do utilizador.
wex.fleet.mgmt.recommended.desc.kernel_panic_error=A resolução dos Erros de Pânico de Kernel melhora a estabilidade do sistema, aumenta a segurança e evita a perda de dados.
wex.fleet.mgmt.recommended.desc.last_reboot_more_than_21_days=A reinicialização dos dispositivos limpa os ficheiros temporários e atualiza os processos do sistema, melhorando o desempenho geral e a estabilidade.
wex.fleet.mgmt.recommended.desc.linux_disk_encryption_not_enabled=A ativação da encriptação do disco melhora significativamente a segurança dos dados, protegendo o conteúdo dos seus dispositivos de armazenamento.
wex.fleet.mgmt.recommended.desc.linux_firewall_disabled=A ativação da Firewall do Linux ajuda a bloquear o acesso não autorizado e protege a sua rede contra potenciais ameaças.
wex.fleet.mgmt.recommended.desc.linux_secure_boot_not_enabled=A ativação do Arranque Seguro garante que apenas o software fiável é carregado durante o processo de arranque, aumentando a segurança do sistema.
wex.fleet.mgmt.recommended.desc.memory_utilization_high=Analisar a utilização elevada de memória ajuda a identificar e solucionar problemas que podem ter um impacto no desempenho e estabilidade do sistema.
wex.fleet.mgmt.recommended.desc.missing_critical_bios_updates=A aplicação de atualizações do BIOS assegura a estabilidade do sistema e a compatibilidade com novo hardware ou software.
wex.fleet.mgmt.recommended.desc.missing_critical_driver_updates=A atualização dos controladores evita avarias no hardware e garante um sistema seguro, estável e de elevado desempenho.
wex.fleet.mgmt.recommended.desc.missing_linux_security_updates=A aplicação de atualizações de segurança protege contra malware e exploits, reduz a superfície de ataque e melhora a integridade do sistema.
wex.fleet.mgmt.recommended.desc.missing_linux_updates=A instalação das atualizações mais recentes corrige as vulnerabilidades do Kernel, das bibliotecas do sistema e das aplicações. Isto protege o seu sistema contra exploits, malware e acesso não autorizado.
wex.fleet.mgmt.recommended.desc.missing_windows_security_updates=A aplicação de atualizações de segurança protege contra as ameaças e vulnerabilidades mais recentes, mantendo o seu sistema protegido contra ataques.
wex.fleet.mgmt.recommended.desc.missing_windows_updates=A instalação das atualizações mais recentes corrige as vulnerabilidades e garante que o seu sistema permanece seguro e funcional.
wex.fleet.mgmt.recommended.desc.poor_network_signal_strength=A forte intensidade do sinal assegura uma ligação estável e fiável, minimizando as interrupções e as falhas durante as atividades online.
wex.fleet.mgmt.recommended.desc.poor_nominal_speed=As velocidades de Internet fiáveis e rápidas são cruciais para concluir tarefas de forma eficiente, aceder a serviços na nuvem e colaborar com colegas sem interrupções.
wex.fleet.mgmt.recommended.desc.unauthenticated_connection=Ao exigir autenticação, as organizações podem impedir que dispositivos não autorizados se liguem à rede, reduzindo o risco de potenciais violações de segurança.
wex.fleet.mgmt.recommended.desc.windows_secure_boot_not_enabled=A ativação do arranque seguro impede modificações não autorizadas do firmware e do sistema operativo, aumentando a segurança do sistema.
