btg.addon.list.feature_one.description=A DCT é a tecnologia de rede subjacente que permite aos dispositivos HP descobrir, ligar e colaborar, ao mesmo tempo que gere e simplifica de forma inteligente as transições situacionais. Permite a partilha em tempo real de contexto, estado e capacidades, transformando produtos autónomos num ecossistema adaptável e fortemente integrado.
