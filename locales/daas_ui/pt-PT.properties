bios.bsod.tooltip.context=Este impacto do BIOS é determinado por importância, em que as ocorrências de BSOD mais próximas da atualização noutros dispositivos do mesmo modelo têm uma importância superior. Adicionalmente, os modelos de dispositivos específicos com uma importância acima de X% são classificados como "elevado impacto". O impacto é calculado para cada modelo de dispositivo e aplica-se a todos os dispositivos recomendados para essa versão do BIOS específica, se as ocorrências de BSOD forem inferiores para o modelo, a importância é inferior e, consequentemente, o impacto,
