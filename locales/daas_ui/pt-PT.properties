btg.addon.description=O HP IQ combina reconhecimento de contexto, colaboração sem esforço e uma interface de utilizador personalizada com segurança de nível empresarial para aumentar a eficiência da força de trabalho e o fluxo pessoal.
btg.addon.list.feature_five.description=Com o HP Poly Studio a funcionar em conjunto com o Poly Lens, os utilizadores podem personalizar os seus dispositivos e manter uma conectividade perfeita a partir de qualquer lugar.
