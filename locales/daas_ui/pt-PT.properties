ee_experienceScore_para1_description1=A pontuação de Experiência fornece uma visão geral abrangente da experiência digital da sua força de trabalho, destilada num único número fácil de entender que varia de 0 a 100. A pontuação é atualizada diariamente, garantindo informações atempadas.
