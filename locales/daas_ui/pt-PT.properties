azureonboard.marketing.signupcard.description=Obtenha acesso ao PC Health e a informações preditivas para uma melhor tomada de decisões e a resolução de problemas emergentes antes de afetarem a empresa.
azureonboard.marketing.signupcard.footertext=*Ao selecionar o botão, eu aceito os <a target='_blank' href={termsLink}>Termos e Condições</a>, e concordo fornecer os dados necessários para a configuração da conta e aceitar a comunicação por e-mail da HP ou de parceiros da HP sobre o período de avaliação.
