exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.option5=Opção 5: Atualize o firmware do BIOS criando uma política de BIOS ou utilizando o HP Image Assistant.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.possibleCauses=Possíveis causas:
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.responseOptions=Dependendo da aplicação em questão, as opções de resposta irão variar. Se a aplicação for essencial para a empresa, atualizar a CPU pode suavizar o problema. No que se refere às aplicações não essenciais para a empresa, pode removê-las do dispositivo ou ajustar as suas definições para reduzir a carga no dispositivo.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.restartComputer=Reiniciar o computador para fechar completamente todas as aplicações em execução.
