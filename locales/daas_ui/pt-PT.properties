wex.labs.remediation.ai.description=A remediação com a IA orienta-o para a solução mais eficaz. A IA restringe as opções de forma inteligente para que a sua equipa possa resolver os problemas de forma eficiente e consistente.
wex.labs.remediation.ai.description.disclaimer=You are about to interact with an AI solution. Content generated by AI might contain inaccuracies and should be verified against the details provided. Please note that AI-generated responses might be incomplete or incorrect, and HP assumes no responsibility for actions taken based on this content.
wex.labs.remediation.ai.details.analyzesAvailableRemediations.desc=O algoritmo analisa as correções existentes na plataforma, incluindo os scripts, políticas e ações/atualizações de dispositivos, para recomendar a correção mais relevante.<br/><br/>Ele analisa o histórico de utilização e as taxas de sucesso para compreender o que é que normalmente resolve esse tipo de problema na sua organização. Os utilizadores podem gastar menos tempo a determinar o curso de ação correto e permitir que a IA faça o trabalho.
wex.labs.remediation.ai.details.analyzesAvailableRemediations.title=Analisa as remediações disponíveis
wex.labs.remediation.ai.details.applyOrReview.desc=Dependendo da remediação, os administradores podem optar por: <br/><div class=remediation-ai-ui><ul><li>Aplicar imediatamente nos dispositivos selecionados</li><li>Agendar para mais tarde para minimizar a interrupção</li><li>Rever os detalhes antes de confirmar a ação</li></ul></div><br/>Uma vez aplicada, a atividade e os resultados são acompanhados para garantir a transparência e aprendizagem contínua.
wex.labs.remediation.ai.details.applyOrReview.title=Aplicar, agendar ou rever
wex.labs.remediation.ai.details.continuousLearning.desc=Com o tempo, as recomendações ganham precisão e confiança.
wex.labs.remediation.ai.details.continuousLearning.title=Aprendizagem contínua
wex.labs.remediation.ai.details.howItWorks.title=Como funciona
wex.labs.remediation.ai.details.issueToRemediation.desc=Quando um problema ultrapassa um limite definido, ele aparece no seu dashboard com uma descrição clara do que está a acontecer e como isso pode afetar os seus dispositivos. A plataforma WXP agora permite a correção direta e a funcionalidade de correção por IA ajuda a restringir a melhor opção para resolver o problema.
wex.labs.remediation.ai.details.issueToRemediation.title=Problema para remediação
wex.labs.remediation.ai.details.learnsandImproves.desc=O algoritmo refina continuamente a sua compreensão do que funciona melhor para a sua organização.<br/>Cada vez que uma correção é aplicada, o sistema aprende:<div class=remediation-ai-ui><ul><li>Quão eficaz foi</li><li>Quanto tempo demorou a resolver o problema</li><li>Se voltaram a ocorrer problemas semelhantes</li></ul></div><br/>Este ciclo de feedback fortalece as recomendações futuras, tornando-as mais precisas e personalizadas ao longo do tempo.
wex.labs.remediation.ai.details.learnsandImproves.title=Aprende e melhora com o tempo
wex.labs.remediation.ai.details.overview.desc=A funcionalidade de correção com IA ajuda os administradores de TI a passar rapidamente da deteção à resolução. Analisa os dados do seu parque e recomenda a atualização de dispositivo, política ou script mais eficaz para o problema em questão. O algoritmo utiliza padrões de correções existentes no seu ambiente para sugerir o que tem mais probabilidades de funcionar.
