requirements.list.hp_print_fleetproxy.desc1=O Print Fleet Proxy requer que o HP Web Jetadmin esteja instalado no mesmo PC. A HP recomenda vivamente que atualize para a última versão da Web Jetadmin antes de instalar o HP Fleet Proxy.
requirements.list.hp_print_fleetproxy.desc2=Atualmente, a HP está apenas a testar o HP Fleet Proxy em relação ao HP Web Jetadmin 10.5 SR4. Embora o HP Fleet Proxy possa funcionar com versões anteriores do HP Web Jetadmin, a HP não garante que todas as funcionalidades funcionem conforme o esperado.
requirements.list.hp_print_fleetproxy.desc3=O Web Jetadmin é um serviço que consome muitos recursos. Embora o HP Fleet Proxy não deva acrescentar muita sobrecarga adicional, poderá haver um impacto no desempenho se o servidor anfitrião não tiver capacidade de computação suficiente para suportar ambos os serviços e os dispositivos que gerem. Deve certificar-se de que o servidor que aloja o HP Web Jetadmin e o HP Fleet Proxy é suficientemente robusto e tem núcleos de processador suficientes para mitigar quaisquer problemas de desempenho.
requirements.list.hp_print_fleetproxy.desc4=Ao testar 2000 dispositivos, a HP concluiu que as seguintes especificações de hardware de base devem ser suficientes para produzir resultados de desempenho aceitáveis. Se sentir um desempenho lento, ou se gerir mais de 2000 dispositivos, poderá necessitar de um servidor com mais capacidade de computação.
requirements.list.hp_print_fleetproxy.desc5=O Print Fleet Proxy é um serviço no local que comunica com o serviço baseado na nuvem. Como resultado, tem de configurar a sua firewall para permitir a entrada e saída de comunicações com o servidor WJA e o HP Command Center, quer através da filtragem de DNS ou da tecnologia de whitelisting de IP (criação de lista branca).
requirements.list.hp_print_fleetproxy.desc6=Pode encontrar essa lista aqui:
requirements.list.hp_print_fleetproxy.hp-nf1=Filtragem DNS: Configure a sua firewall para permitir pedidos HTTPS de saída através da porta 443 para os seguintes pontos finais:
requirements.list.hp_print_fleetproxy.hp-nf2=Whitelisting de IP: Para criar uma lista branca dos endereços de IP, tem de incluir todos os servidores de nuvem possíveis que o HP Fleet Proxy possa necessitar e com os quais tenha de comunicar.
