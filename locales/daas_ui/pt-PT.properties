dnto.subscriptions.privacy_statement.desc1=A HP reconhece que a privacidade constitui um direito fundamental do ser humano e reconhece igualmente a importância da privacidade, da segurança e da proteção dos dados para os nossos clientes e parceiros espalhados pelo mundo. Enquanto organização global, com entidades jurídicas, processos comerciais, estruturas administrativas e sistemas técnicos que cruzam as fronteiras internacionais, o nosso objetivo é assegurar uma proteção em todas as nossas operações que exceda os requisitos jurídicos mínimos e implementar políticas e procedimentos rigorosos e consistentes.
dnto.subscriptions.privacy_statement.desc2=Conforme utilizado nesta declaração, termos como “nós”, “nos”, “nosso” e “Empresa” referem-se a empresas com a marca HP e afiliadas atuais e futuras, conforme definido pela legislação local (doravante “HP”). As informações de contacto do responsável pela proteção de dados da HP são apresentadas na secção “{0}” abaixo.
dnto.subscriptions.privacy_statement.exercise_rights=Exercer os seus direitos e Contactar-nos
dnto.subscriptions.privacy_statement.heading=Declaração de Privacidade da HP
dnto.subscriptions.section.details.desc1=Os colaboradores estão habituados e até exigem a flexibilidade para trabalharem como e onde quiserem. Com as equipas de TI sobrecarregadas para além dos seus limites, a experiência, a produtividade e o envolvimento dos funcionários estão a sofrer.
dnto.subscriptions.section.details.desc2=O HP Workforce Experience Pro antecipa e resolve de forma inteligente as fricções digitais a partir de uma plataforma consolidada e modular.
dnto.subscriptions.section.details.desc3=Quer esteja a gerir uma pequena equipa num único local ou a navegar pelas complexidades de uma força de trabalho híbrida global, o HP Workforce Experience Pro fornece uma plataforma unificada para apoiar e otimizar as experiências digitais dos seus colaboradores.
dnto.subscriptions.section.details.desc4=Aumente a produtividade dos colaboradores resolvendo proativamente os problemas de TI antes que eles ocorram. Reduza as horas e os custos de suporte de TI com IA avançada. Reforce a segurança dos terminais antecipando e resolvendo ameaças.
dnto.subscriptions.section.details.desc5=Melhore a sensibilidade dos colaboradores com conhecimentos acionáveis de pesquisas de impulsos. Otimize os custos com atualizações inteligentes de hardware. Integração perfeita com ambientes existentes de vários fornecedores e vários sistemas operativos.
dnto.subscriptions.section.details.heading=Detalhes da subscrição
dnto.subscriptions.sign_in=Iniciar sessão no HP Workforce Experience
dnto.subscriptions.thank_you.desc=Obrigado por escolher o HP Workforce Experience. Estamos confiantes de que conseguirá uma maior produtividade e colaboração. Se tiver alguma dúvida quando começar, não hesite em visitar os nossos recursos de suporte abrangentes ou contactar a nossa prestável equipa de apoio ao cliente.
