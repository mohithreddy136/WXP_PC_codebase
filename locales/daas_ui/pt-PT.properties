azure.onboard.message=A HP TechPulse é uma plataforma de telemetria e análise que fornece dados críticos sobre dispositivos e aplicações, colocando uma análise profunda à disposição do departamento de TI para que possam proporcionar aos funcionários os PCs, o software e os serviços adequados para terem sucesso. A HP TechPulse identifica proativamente problemas, disponibiliza soluções proporcionais, para além de minimizar as ameaças através de uma monitorização ativa da postura de segurança da organização.
