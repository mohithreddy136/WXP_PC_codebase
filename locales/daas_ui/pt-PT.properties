welcome.daas.presence.terms=Os planos do {app_name} e/ou os componentes incluídos podem variar consoante a região ou o Parceiro de Serviços do {app_name} Autorizado. Contacte o seu Representante HP local ou o Parceiro do {app_name_short} Autorizado para obter detalhes específicos sobre a sua localização. Os serviços HP regem-se pelos termos e condições de serviço HP aplicáveis fornecidos ou indicados ao Cliente no momento da compra. O cliente pode ter direitos estatutários adicionais de acordo com as leis locais aplicáveis, e esses direitos não serão de forma alguma afetados pelos termos e condições de serviço HP ou pela garantia limitada HP fornecidos com o seu produto HP.
welcome.daas.presence.terms_p=Os planos do {app_name} e/ou os componentes incluídos podem variar consoante a região ou o parceiro de serviços do {app_name} autorizado. Contacte o seu representante HP local ou o parceiro do {app_name_short} autorizado para obter detalhes específicos sobre a sua localização. Os serviços HP regem-se pelos termos e condições de serviço HP aplicáveis fornecidos ou indicados ao Cliente no momento da compra. O cliente pode ter direitos estatutários adicionais de acordo com as leis locais aplicáveis, e esses direitos não serão de forma alguma afetados pelos termos e condições de serviço HP ou pela garantia limitada HP fornecidos com o seu produto HP.
