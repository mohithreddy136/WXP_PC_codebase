exp.NetworkDisconnections.recRestartRouter.step1=Desligue primeiro o modem e, em seguida, o router; Aguarde antes de ligar novamente.
exp.NetworkDisconnections.recUpdateFirmware=Atualize o firmware do router.
exp.NetworkDisconnections.recUpdateFirmware.detail=Verifique o site do fornecedor e aplique o firmware estável mais recente.
