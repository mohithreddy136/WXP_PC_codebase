wpt.details.desc=Beskyt dine data pålideligt, og registrer din flåde af HP-enheder, og afhold uautoriserede brugere fra at få adgang til dine dokumenter og filer på dit netværk med HP {appName} ─ verdens mest sikre tjeneste til af finde, låse og slette med. HP {appName} drives af HP Workforce Experience Platform og leverer en komplet hardwareforstærket tjeneste til lokalisering, låsning og sletning af enheder, selv når pc'erne er offline eller slukket.
wpt.details.header=Etabler din første forsvarslinje
wpt.disclaimer.point1=Baseret på HP's interne analyse af Find, lås og slet-softwaretjenester. Mest sikre er baseret på kryptografi og fastholdelse (herunder hardwareforstærket fastholdelse) pr. oktober 2021.
wpt.disclaimer.point2=HP {appName} fås på udvalgte HP 600, 800, 1000, Windows-baserede Elite Dragonfly-laptops, udvalgt 800-desktops og Z1 G8-workstations og fungerer, når enheden er tændt og sluttet til internettet.
wpt.disclaimer.point3=HP Workforce Experience Platform er en telemetrisk og analytisk platform, som giver kritiske data om enheder og programmer, og som ikke kan købes som en individuel tjeneste. HP Workforce Experience Platform følger stringent GDPR-forordningen og er ISO27001-, ISO27701-, ISO27017- og SOC2 Type2-certificeret for informationssikkerhed. Internetadgang med forbindelse til Workforce Experience Platform-portalen er påkrævet. Se de fulde systemkrav på <a href=\"{link}\" target=\"_blank\" style=\"text-decoration: none; color: #027aae; cursor: pointer;\">{text}</a>.
wpt.disclaimer.point4=Harwareforstærket refererer til HP Sure Run Gen4 og nyere, som får på kompatible HP-pc'er med denne tjeneste og kræver Windows 10 eller nyere.
wpt.disclaimer.point5=Serviceniveauet og svartiderne for HP-hardwaresupport afhænger af din geografiske placering. Tjenesten starter den dag, hardwaren bliver købt. Restriktioner og begrænsninger gælder. Se flere oplysninger på <a href="https://www.hp.com/go/cpc" target="_blank" style="text-decoration: none; color: #027aae; cursor: pointer;">www.hp.com/go/cpc</a>. HP Services er omfattet af HP’s gældende vilkår og betingelser for service, som kunden er gjort bekendt med i forbindelse med købet. Kunden kan have yderligere lovpligtige rettigheder i henhold til gældende lokal lovgivning, og disse rettigheder påvirkes på ingen måder af HP's vilkår og betingelser for tjenesten eller HP's begrænsede garanti, der gælder for dit HP-produkt.
wpt.explore.header=Udforsk løsning
wpt.feature.cost.desc=Hvis du mister en vigtig pc, kan det ende med at koste mere end kun penge. Medvirk til at fjerne risikoen, og begræns de omkostninger, en mistet pc medfører, med HP {appName}. Du har nu en vidtspændende måde at finde en mistet eller stjålet pc på, og du kan nemt låse eller slette data.
wpt.feature.cost.title=Medvirk til at begrænse omkostningerne og bekymringerne
