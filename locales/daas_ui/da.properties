requirements.list.proSecurity.windows.supportLifecycle.content1=HP's målsætninger for serviceniveau er at yde support til de seneste 3 halvårlige kanalversioner af Windows 10 .
requirements.list.proSecurity.windows.supportLifecycle.content2=HP's mål er at tilbyde support på den nye OS-version for Wolf Pro Securitys trusselbegrænsningsfunktion inden for 30 dage efter, at den bliver tilgængelig på den halvårlige kanal (\"SAC\"). Midlertidige versioner eller Windows Insider-versioner før frigivelse understøttes ikke. Få flere oplysninger om Windows-operativsystemversioner på <a href='https://docs.microsoft.com/da-dk/windows/release-information/' target='_blank'>https://docs.microsoft.com/da-dk/windows/release-information/</a>.
requirements.list.proSecurity.windows.supportLifecycle.content3=For at sikre, at kunder med ældre Windows-versioner får tid nok til at opgradere til nyere versioner, vil HP fortsat yde support til den 4. nyeste version (som i øjeblikket er Windows 10 v1903) i mindst 90 dage efter, at support til den nyeste halvårlige kanalversion er tilgængelig i Wolf Pro Security. Efter dette tidsrum ophører supporten til den ældre OS-version. Samme supportpolitik gælder for langfristede servicekanalversioner af Windows 10. Derfor skal disse systemer også opdateres i henhold til den ovenfor beskrevne politik.
requirements.list.proSecurity.windows.supportLifecycle.content4=Sure Click Pro-support til Windows 10 v2004 blev frigivet den 31. juli 2020. Supporten ophører for Windows 10 v1809 med virkning fra den 31. oktober 2020.
requirements.list.proSecurity.windows.supportLifecycle.content5=Windows 7 og 8.1 understøttes ikke af HP Proactive Security.
requirements.list.proSecurity.windows.supportLifecycle.content6=Sure Click Pro-support til Windows 10 v20H2 blev frigivet den 18. november 2020. Supporten ophørte for Windows 10 v1903 med virkning fra den 16. februar 2021.
requirements.list.proSecurity.windows.supportLifecycle.content7=HP frigivet Sure Click Pro trusselsinddæmningssupport til Windows 10 v21H1 den 5. juli 2021. Understøttelse for Windows 10 v1909 ophører fra 3. oktober 2021.
requirements.list.proSecurity.windows.supportLifecycle.heading=Levetidspolitik for support for nye OS-versioner og ældre Windows 10-versioner.
requirements.list.proSecurity.windows.supportLifecycle.windows=HP Wolf Pro Security understøtter ikke Windows-operativsystemer til enheder til kassesystemer til detailhandel og HP tynd klient-enheder eller udrulninger på desktopenheder i virtuelle miljøer.
