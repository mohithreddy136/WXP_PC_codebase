side_panal.smart_refresh.help_sec1_description=De 3 trin: Identificer, kategoriser, anbefal
side_panal.smart_refresh.help_sec1_header=Sådan fungerer det
side_panal.smart_refresh.help_sec1_point_1_desc=Vurder hver enhed ud fra 9 datapunkter, der opsummeres i Refresh-uopsættelighedscoren*. Denne score hjælper dig med at prioritere individuelle farenheder for at undgå afbrydelser i brugernes produktivitet.
side_panal.smart_refresh.help_sec1_point_1_title=1. Identificer
side_panal.smart_refresh.help_sec1_point_2_desc=En AI-model grupperer enheder i forskellige hardware- og softwarepersonaer baseret på brug. Disse personaer kan hjælpe dig med at finde den rigtige erstatningsenhed.
side_panal.smart_refresh.help_sec1_point_2_title=2. Kategoriser
side_panal.smart_refresh.help_sec1_point_3_desc1=Hvis du samarbejder med en HP-partner, vil Smart Refresh anbefale udskiftninger til hver enhed. Disse anbefalinger er baseret på den relevante personas bedst præsterende modeller, som er tilgængelige i din partners uploadede katalog. Hvis du ikke kan se de anbefalede enheder, eller hvis de enheder, du kan se, er forældede, så kontakt din partner og bed dem om at uploade det nyeste katalog.
side_panal.smart_refresh.help_sec1_point_3_desc2=Hvis du ikke arbejder med en HP-partner, vil du ikke se enhedsanbefalinger i Smart Refresh. Kontakt din HP-repræsentant for at få de bedste erstatningsmodeller.
side_panal.smart_refresh.help_sec1_point_3_desc3=Seneste katalog-uploaddato:
side_panal.smart_refresh.help_sec1_point_3_title=3. Anbefal
side_panal.smart_refresh.help_sec1_point_4_desc=Brug ”Udfør” opdateringsstatus for at fjerne enhver pc, der ikke har brug for en opdatering eller ikke kan opdateres på nuværende tidspunkt. Du kan se disse enheder og ændre deres status tilbage til ”Handling påkrævet” for at se dem på pc-listen igen.
side_panal.smart_refresh.help_sec1_point_4_title=4. Statusser
side_panal.smart_refresh.help_sec2_description=Hvordan man afgør, om en enhed skal udskiftes
side_panal.smart_refresh.help_sec2_header=Refresh-hasterscore
side_panal.smart_refresh.help_sec2_sub_text=Refresh-uopsættelighedscore beregnes ud fra en enheds ydelsesdata på 9 områder. Alvorlighedsgraden svarer til den numeriske score på følgende måde:
