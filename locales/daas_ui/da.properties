exp.MemoryUtilizationIsHighForAnExtendedTime.causeHungApp=Et program, der kører, hænger/svarer ikke.
exp.MemoryUtilizationIsHighForAnExtendedTime.causeInsufficientMemory=Computeren har ikke nok hukommelse til dens brug.
exp.MemoryUtilizationIsHighForAnExtendedTime.causeLongRunningApp=Et program, der kører, kræver en stor mængde hukommelse i længere tid for at gennemføre en opgave, som f.eks. antivirusscanning.
exp.MemoryUtilizationIsHighForAnExtendedTime.causeMemoryLeak=Et installeret program kan have en fejl, der forårsager lækage af hukommelse.
exp.MemoryUtilizationIsHighForAnExtendedTime.option1Detail=For at hjælpe kunder med at forlænge deres enheders levetid og forbedre deres brugeroplevelser er det almindelig praksis for pc'er, hvis hukommelser bruges for meget, at føje ekstra hukommelse til enheden.
exp.MemoryUtilizationIsHighForAnExtendedTime.option1Title=Mulighed 1: Øg enhedshukommelse.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail1=Åbn rapporten Enhedsudnyttelse.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail2=De programmer, der bruger mest hukommelse, kan ses i kolonnen, Programmer med stort forbrug af hukommelse.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail3=Afhængigt at de pågældende programmer kan der være forskellige valgmuligheder. Hvis der er tale om programmer, som er kritiske for virksomheden, kan en opgradering af hukommelsen muligvis løse problemet. Ikke-forretningskritiske programmer kan fjernes fra enheden, eller deres indstillinger kan justeres for at reducere belastningen på enheden.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Title=Mulighed 2: Identificer, og fjern programmer.
exp.MemoryUtilizationIsHighForAnExtendedTime.option3Detail=Genstart computeren for helt at lukke alle de programmer, der kører.
exp.MemoryUtilizationIsHighForAnExtendedTime.option3Title=Mulighed 3: Genstart enheden.
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Detail1=Brug Jobliste til at se, hvilke af de programmer, der kører, der bruger hukommelsen.
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Detail2=Luk de programmer, der bruger mest hukommelse.
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Title=Mulighed 4: Luk programmer.
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Detail1=Use Task Manager to identify an application where the Memory utilization is steadily increasing to unusual proportions, but never decreasing.
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Detail2=Tjek for opdateringer fra producenten til det pågældende program.
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Title=Mulighed 5: Identificer potentielle hukommelseslækager og opdater.
