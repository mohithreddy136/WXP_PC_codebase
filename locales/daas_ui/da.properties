azureonboard.marketing.disclaimer.content=Oplysningerne indeholdt heri kan ændres uden varsel. De eneste garantier for HP-produkter og -serviceydelser er angivet i de udtrykkelige garantierklæringer, som følger med de pågældende produkter og tjenester. Intet heri må fortolkes som udgørende en yderligere garanti. HP kan ikke holdes ansvarlig for tekniske eller redaktionelle fejl eller udeladelser i dokumentet.
azureonboard.marketing.disclaimer.contentlist1=HP Proactive Insights og/eller medfølgende komponenter kan variere fra region til region ud fra operativsystem eller via en autoriseret af en HP-servicepartner. Kontakt din lokale HP-repræsentant eller din autoriserede partner for at få nærmere oplysninger om, hvad der gælder for dit område. HP's serviceydelser er underlagt HP's gældende vilkår og betingelser for den relevante serviceydelse, eller som kunden er blevet gjort opmærksom på ved købet. Kunden kan have yderligere lovpligtige rettigheder i henhold til gældende lokal lovgivning, og disse rettigheder påvirkes på ingen måder af HP's vilkår og betingelser for tjenesten eller HP's begrænsede garanti, der gælder for dit HP-produkt.
azureonboard.marketing.disclaimer.contentlist2=HP {appName} er en telemetrisk og analytisk platform, som giver kritiske data om enheder og programmer, og som ikke kan købes som en individuel tjeneste. HP {appName} følger stringent GDPR-forordningen og er ISO27001-, ISO27701-, ISO27017- og SOC2 Type2-certificeret for informationssikkerhed. Kræver internetadgang med forbindelse til {appName}. Se de fulde systemkrav på <a target='_blank' href={link}>{text}</a>.
azureonboard.marketing.disclaimer.contentlist3=BIOS-opdateringer fås kun på HP-enheder.
azureonboard.marketing.disclaimer.contentlist4=Få oplysninger om omfattede operativsystemer på <a target='_blank' href={link}>{text}</a>.
azureonboard.marketing.employeesection.description=Indsaml, mål og administrer medarbejdernes digitale oplevelse via korrelation af undersøgelser af hardware, programmer og medarbejdernes oplevelser på tværs af alle enheder.
azureonboard.marketing.employeesection.heading=Proactive Employee Insight
azureonboard.marketing.hardwaresection.description=Overvåg proaktivt skærme og harddiske, brug af CPU, termiske niveauer og batteriets tilstand, så du kan forudsige eventuel påvirkning ved at analysere dine data i forhold til en datasø på op til 20+ millioner enheder.
azureonboard.marketing.hardwaresection.heading=Proactive Hardware Insight
azureonboard.marketing.insightsection.description=Diagnosticer problemer med ydeevne, softwarefejl, nedbrud og systemudnyttelse, samtidig med at drivere og mønstre opdateres for at sikre, at du har en tryg sikkerhedsprofil.
azureonboard.marketing.insightsection.heading=Proactive Application Insight
azureonboard.marketing.learnmoresection.content=Sammenligning af viden fra 20+ millioner af enheder og milliarder af datapunkter gør, at HP Proactive Insights kan udnytte HP TechPulse-analyseplatformen til at identificere og løse problemer, inden de påvirker medarbejderne.
azureonboard.marketing.learnmoresection.description=Vi hjælper med at ændre paradigmet ved enhedsadministration via AI-drevne, proaktiv kontrol af computerens ydeevne, sikkerhed, omkostninger, nedetid og medarbejdertilfredshed. Du kan udnytte intelligens, som er indsamlet fra 20+ millioner af andre computere til fordel for din organisation.
azureonboard.marketing.learnmoresection.heading=HP Proactive Insights leverer meningsfulde analyser, som genereres af milliarder af datapunkter
