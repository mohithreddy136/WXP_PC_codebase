exp.mgmt.troubleshoot.description.antivirus_not_enabled_other=Enheden er konfigureret til at bruge et antivirusprogram fra en tredjepart, der ikke er fra Microsoft, til at beskytte enheden mod virus, malware og andre trusler, men antivirusbeskyttelsen er ikke aktiv på enheden.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.description=Uautentificeret forbindelse opdaget.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.moreInfo=Flere oplysninger:
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.moreInfoLink=https://support.microsoft.com/en-us/windows/wi-fi-network-not-secure-in-windows-9170b675-921b-3aa5-7e43-fcb2059d159c
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option1=Mulighed 1: Hvis du opretter forbindelse til dit Wi-Fi-hjemmenetværk, kan du overveje at ændre den sikkerhedstype, som din router eller dit adgangspunkt bruger.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option1.step1=Log ind på din router ved hjælp af softwaren til den.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option1.step2=Skift sikkerhedstype for dit Wi-Fi-hjemmenetværk.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option2=Mulighed 2: Hvis du har en ældre router eller adgangspunkt, kan du overveje at købe en nyere router, der understøtter de nyeste sikkerhedsstandarder og -forbedringer.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.recommendations=Anbefalinger:
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.title=Wi-Fi-forbindelse er ikke sikker
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.cause1=Indretningen af dit hjem kan forårsage Wi-Fi-problemer.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.cause2=Adgangspunktet kan være bag vægge og forhindringer.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.description=Wi-Fi-signalstyrken er blevet rapporteret som svag inden for de sidste 24 timer.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.moreInfo=Flere oplysninger:
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.moreInfoLink=https://support.microsoft.com/en-us/windows/wi-fi-problems-and-your-home-layout-e1ed42e7-a3c5-d1be-2abb-e8fad00ad32a#WindowsVersion=Windows_11
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.possibleCauses=Mulige årsager til hjemmenetværk:
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1=Mulighed 1: Genstart router
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step1=Tag modem og router ud af stikkontakten.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step2=Vent mindst 15 sekunder.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step3=Tilslut først modemet til stikkontakten igen, vent 1-2 minutter, og tænd derefter routeren.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step4=Vent på, at alle panellamper på dit kabelmodem bliver grønne, før du tester din internetforbindelse.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2=Mulighed 2: Flyt dit adgangspunkt.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step1=Flyt dit adgangspunkt, hvis du kan, for at reducere antallet af vægge eller andre forhindringer, der er mellem dit adgangspunkt og din pc.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step2=Flyt din pc tættere på adgangspunktet, hvis du kan.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step3=Flyt adgangspunktet ind mod midten af hjemmet eller rummet, hvis du kan, og højere op, hvis det er muligt. Hvis du placerer det i et hjørne eller under et skrivebord, kan det reducere Wi-Fi-signalstyrken.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendations=Anbefalinger:
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.title=Wi-Fi-signalstyrken er svag
exp.mgmt.troubleshoot.network.wifispeedisslow.cause1=Adgangspunktet kan være bag vægge og forhindringer.
exp.mgmt.troubleshoot.network.wifispeedisslow.cause2=Routerens firmware kan være forældet.
exp.mgmt.troubleshoot.network.wifispeedisslow.description=Den nominelle Wi-Fi-hastighed er blevet rapporteret som langsom inden for de sidste 24 timer.
exp.mgmt.troubleshoot.network.wifispeedisslow.possibleCauses=Mulige årsager til hjemmenetværk:
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation1=Genstart dit modem og din router
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation1.step1=Sluk først dit modem og derefter din router.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation2=Flyt din router
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation2.step1=Prøv at flytte routeren til et andet sted i hjemmet eller på kontoret, eller juster antennerne, så de vender i en anden retning.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation3=Opdater din routers firmware
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation3.step1=Regelmæssig opdatering af din routers firmware kan hjælpe med at løse fejl og forbindelsesproblemer. Nogle routere opdateres automatisk, men de fleste kræver manuelle opdateringer.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation4=Skift din routers frekvens
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation4.step1=Wi-Fi-routere vælger automatisk et frekvensbånd, men du kan prøve at ændre det fra 2,4 GHz til 5 GHz for at se, om det forbedrer dine hastigheder. Du bør dog tjekke, om din router understøtter 5 GHz, før du gør det.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation5=Opdater dine Wi-Fi-drivere
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation5.step1=Forældede eller korrupte drivere kan forårsage netværksproblemer. Sørg for, at din Wi-Fi-adapter er opdateret.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation6=Undgå interferens
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation6.step1=Kanalinterferens kan reducere gennemstrømningen betydeligt og gøre dataoverførslen langsommere, så prøv at fjerne enhver interferens, du måtte opleve.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation7=Tjek andre enheder
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation7.step1=Se, hvilke andre enheder der er forbundet til dit netværk, og hvad de laver. Hvis en anden enhed f.eks. downloader en masse data, kan det påvirke dine hastigheder.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendations=Anbefalinger:
exp.mgmt.troubleshoot.network.wifispeedisslow.title=Wi-Fi-hastighed er langsom
