banner.iot.update.description=En ændring af infrastruktur på TechPulse implementeres mandag den 27. februar 2023. Det er muligt, at du skal opdatere indstillingerne for proxy, firewall og SSL-inspektionssoftware. Kør værktøjet til netværksvurdering på <a href='https://www.hpdaas.com/software' target='_blank'>HP TechPulse ─ software (hpdaas.com)</a>, og kontroller, om et eller flere af de fire (4) testresultater for *.IoT viser en fejlmeddelelse. Hvis testresultatet viser fejl, skal du følgende disse instruktioner "<b><a href='https://hp.service-now.com/techpulse_kb?id=kb_article&sysparm_article=KB0011291' target='_blank'>KB0011291</a> ─ Konfigurering af en Proxy eller firewall"</b> og <b>foretage disse ændringer senest torsdag den 23. februar 2023</b>.
