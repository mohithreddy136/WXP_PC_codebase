exp.HpBatteryHealthManagerNotEnabled.reference1Text=HP's Batteritilstandsstyring – support
exp.HpBatteryHealthManagerNotEnabled.references=Referencer:
exp.HpBatteryHealthManagerNotEnabled.settingLetDetail1=Ændrer dynamisk, hvordan systemet oplader batteriet, baseret på brugsforhold og temperatur over tid.
exp.HpBatteryHealthManagerNotEnabled.settingLetTitle=Lad HP styre opladningen af mit batteri
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases1=Blandede brugsmiljøer, hvor notebooken med jævne mellemrum ikke er på vekselstrøm, og batteriet derfor har mulighed for at aflade.
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases2=Samme proces foretrækkes for hele din organisation.
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases3=Notebooken er mindre end et år gammel.
exp.HpBatteryHealthManagerNotEnabled.settingMaxDetail1=Begrænser den maksimale opladningstilstand til 80 % for at optimere batteriets levetid og mindske opsvulmning.
exp.HpBatteryHealthManagerNotEnabled.settingMaxTitle=Maksimer batteriets levetid
exp.HpBatteryHealthManagerNotEnabled.settingMaxUseCases1=Miljøer, hvor bærbare computere konstant er tilsluttet vekselstrøm.
exp.HpBatteryHealthManagerNotEnabled.settingMaxUseCases2=Notebooks, der er et år gamle eller ældre.
exp.HpBatteryHealthManagerNotEnabled.suggestedRemediations=Foreslåede afhjælpninger:
exp.HpBatteryHealthManagerNotEnabled.title=HP's batteritilstandsstyring er ikke aktiveret
