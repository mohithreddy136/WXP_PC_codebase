account_management.subscriptions.addon.anyware.azure_notice=Licensen tilbydes i øjeblikket kun på Azure Marketplace. HP Anyware Standard-licens inkluderer adgang til HP Anyware Manager Enterprise.
account_management.subscriptions.addon.anyware.desc=Administrer og forsyn dit team med fjernarbejdspladser. Slutbrugerne får sikker adgang til deres computere uden brug af VPN. Overvåg din eksterne flåde på ét sted, når du integrerer HP Anyware med WXP
account_management.subscriptions.addon.anyware.desc.short=Sikker adgang, administration og overvågning af desktops
account_management.subscriptions.addon.anyware.enterprise.header=HP Anyware Manager Enterprise
account_management.subscriptions.addon.anyware.features.automation=Automatiser opgaver
account_management.subscriptions.addon.anyware.features.automation.desc=Integrer din tilpassede administratorarbejdsgang problemfrit i administrationsplanen
account_management.subscriptions.addon.anyware.features.multitenant_rbac=Multi-lejer- og rollebaseret adgangskontrol
account_management.subscriptions.addon.anyware.features.multitenant_rbac.desc=Administrer flere organisationer med en enkelt forekomst af HP Anyware Manager Enterprise. Tildel tilladelser til administratorer baseret på deres rolle
account_management.subscriptions.addon.anyware.features.productivity=Understøt slutbrugerens produktivitet
account_management.subscriptions.addon.anyware.features.productivity.desc=Slutbrugeren vil opleve skrivebordene, som om de var lokale, uanset deres ydelsesbehov eller netværksforhold.
account_management.subscriptions.addon.anyware.features.provision_desktops=Administrer fysiske og virtuelle desktops
account_management.subscriptions.addon.anyware.features.provision_desktops.desc=IT-afdelingen kan konfigurere og overvåge fjernarbejdspladser med HP Anyware Manager Enterprise. De kan også til enhver tid stille virtuelle desktops til rådighed for slutbrugerne.
account_management.subscriptions.addon.anyware.features.remote_access=Giv slutbrugerne sikker fjernadgang
account_management.subscriptions.addon.anyware.features.remote_access.desc=Slutbrugerne får sikker adgang til deres computere uden brug af VPN. HP Anyware giver forenklet adgang via cloud-gateways.
account_management.subscriptions.addon.anyware.features.role_access.desc=Udfør brugertildeling og sessionsrouting uden at skulle installere en gateway i andre miljøer
account_management.subscriptions.addon.anyware.features.role_cloud_gateways=Forenklet adgang via cloud-gateways
account_management.subscriptions.addon.anyware.features.setup=Ethvert IT-miljø og enkel opsætning
account_management.subscriptions.addon.anyware.features.setup.desc=En fleksibel, intuitiv løsning, der forenkler implementering og administration på tværs af forskellige infrastrukturer, herunder lokale, cloud- og hybridmiljøer, samtidig med at IT-kompleksitet og -fodaftryk reduceres.
account_management.subscriptions.addon.anyware.features.workforce_integration=Integration af Workforce Experience
account_management.subscriptions.addon.anyware.features.workforce_integration.desc=IT kan centralisere fjernskrivebordsdata i Workforce Experience Platform og dermed få et centralt overblik over deres flåde.
account_management.subscriptions.addon.anyware.header=HP Anyware
account_management.subscriptions.addon.anyware.overview.desc1=HP Anyware er en højtydende softwareløsning, der giver brugerne sikker adgang til deres eksterne eller virtuelle desktops uden VPN. HP Anyware inkluderer adgang til en IT-administrationsplan kaldet HP Anyware Manager Enterprise.
account_management.subscriptions.addon.anyware.overview.desc2=HP Anyware Manager Enterprise (AME) er et administrationsløsning til flere operatører, som giver IT-afdelingen mulighed for at administrere både fysiske og virtuelle desktops.
account_management.subscriptions.addon.anyware.required_components.header=Nødvendige komponenter til integration af Workforce Experience
account_management.subscriptions.addon.anyware.required_components.li1=HP Anyware Standard
account_management.subscriptions.addon.anyware.required_components.li2=HP Anyware Manager Enterprise
account_management.subscriptions.addon.anyware.security_compliance=Sikkerhed og overholdelse
account_management.subscriptions.addon.anyware.security_compliance.desc1=HP Anyware prioriterer sikkerhed og overholdelse på tværs af sine produkttilbud for at sikre robust beskyttelse og overholdelse af branchestandarder. Nøglefunktionerne omfatter end-to-end-kryptering, sikker fjernadgang og totrinsbekræftelse, der sikrer dataintegritet og -fortrolighed.
account_management.subscriptions.addon.anyware.security_compliance.desc2=HP Anyware integrerer også avancerede funktioner til at opdage og reagere på trusler for proaktivt at mindske risici. Overholdelse af regler som GDPR, HIPAA og SOC 2 understreger HP Anywares forpligtelse til at opretholde strenge sikkerhedsprotokoller. Kontinuerlig overvågning og regelmæssige sikkerhedsrevisioner sikrer, at HP Anywares produkter forbliver modstandsdygtige over for nye cybertrusler, hvilket giver brugerne en sikker og troværdig IT-administrationsoplevelse.
account_management.subscriptions.addon.anyware.technology=Fjernstyringsteknologi
account_management.subscriptions.addon.anyware.technology.desc=HP Anywares prisbelønnede PCoIP®-fjernskærmsteknologi leverer en højopløselig og meget responsiv computeroplevelse under udfordrende netværksforhold.
account_management.subscriptions.addon.anyware.technology.desc.li1=PCoIP® koder, komprimerer, krypterer og transporterer billedpixels fra en central server eller arbejdsstation.
account_management.subscriptions.addon.anyware.technology.desc.li2=Derefter dekrypterer og dekomprimerer den billedet for brugere på stort set alle slutpunkter.
account_management.subscriptions.addon.connect_accounts=Forbind konti
account_management.subscriptions.addon.oob.desc.short=Fjernstyring på BIOS-niveau til avanceret diagnosticering og afhjælpning
account_management.subscriptions.addon.oob.desclaimer1=1. Out-of-band- diagnosticering og -afhjælpning er tilgængelig som en licens med forskellige varigheder og er leverandøruafhængig for alle pc'er, der er Intel® vPro® Enterprise- og Intel® AMT-kompatible. Inkluderer og kræver Workforce Experience Platform Starter til at administrere softwareløsningen. Fås i USA, Canada og EU hos HP-repræsentanter eller HP-autoriserede forhandlere. Se flere oplysninger på (tilføj url-link til licensbetingelser/eula).
account_management.subscriptions.addon.oob.desclaimer2=2. Baseret på HP's interne analyse af pc-producenter med tænd/sluk-kontrol, ikke-OS-kontrol, BIOS-kontrol og reimaging-kontrol pr. 24. september 2024.
account_management.subscriptions.addon.oob.desclaimer3=3. HP Insights-agenten er påkrævet og er en telemetri- og analyseapp, der leverer vigtige data om enheder og programmer. Den sælges ikke som en selvstændig tjeneste og er ISO27001-, ISO27701-, ISO27017- og SOC2 Type2-certificeret til informationssikkerhed. Internetadgang med forbindelse til portalen er påkrævet. Se de fulde systemkrav på http://www.hpdaas.com/requirements. Køb af en HP Insights-agenttjeneste nødvendiggør, at softwaren køres på hver enkelt enhed. HP Services Scan leveres via Windows Update på udvalgte HP-enheder og vil kontrollere hver enkelt enhed, for at fastslå, om en aktiveret tjeneste er blevet købt, og vil automatisk downloade den pågældende software. Hvis du vil deaktivere denne funktion, så følg vejledningen på <a target='_blank' href='http://www.hpdaas.com/requirements' style=\"text-decoration:none; color:#4D52E5\">http://www.hpdaas.com/requirements</a>
account_management.subscriptions.addon.oob.desclaimer4=4. WXP Starter er inkluderet og er påkrævet for at administrere softwareløsningen.
account_management.subscriptions.addon.oob.features.remote_control=Remote control - even when the Operating System is down
account_management.subscriptions.addon.oob.features.remote_control.desc=IT kan få fjernadgang til BIOS, så de kan genstarte, geninstallere og gendanne pc'er af forskellige mærker, uanset hvor arbejdet foregår.
account_management.subscriptions.addon.oob.features.scalable=Skalerbar, centraliseret administration
account_management.subscriptions.addon.oob.features.scalable.desc=Gør det nemmere at klargøre pc'er, administrere mange licenser og give rollebaseret adgang med denne funktion, der integreres i WXP til implementering, anvendelse og administration i virksomheder.
account_management.subscriptions.addon.oob.features.secure=Sikre brugeroplevelser
account_management.subscriptions.addon.oob.features.secure.desc=Brugere kan følge med i fjernsessioner og kan afbryde forbindelsen når som helst. Sikker, gnidningsfri support skaber tillid og forbedrer brugeroplevelsen.
account_management.subscriptions.addon.oob.header=Out-of-band-fjernforbindelse
account_management.subscriptions.addon.oob.overview.desc1=Søger du at gøre den digitale oplevelse bedre for en hybrid arbejdsstyrke? HP Out-of-band-fjernforbindelse giver supportteknikere fjernadgang til BIOS, som gør det muligt at genstarte, gendanne og reparere pc'er, også selvom operativsystemet ikke fungerer. Ingen involvering af brugeren, intet besøg på kontoret.
account_management.subscriptions.addon.vyopta.connect_accounts.error=Vi kunne ikke forbinde din konto. Kontroller din forbindelse, og prøv igen.
account_management.subscriptions.addon.vyopta.connect_accounts.found=Vi har fundet en Vyopta-konto "<b>{orgName}</b>". Vil du forbinde den til WXP?
account_management.subscriptions.addon.vyopta.connect_accounts.no_permissions=Du har ikke tilladelse. Kontakt Vyopta-kontoadministratoren for at få hjælp.
account_management.subscriptions.addon.vyopta.connect_accounts.not_found=Vi var ikke i stand til automatisk at finde din {service}-konto. Kontakt {support_link} for at få hjælp til at oprette denne forbindelse, hvis du allerede er kunde hos {service}.
account_management.subscriptions.addon.vyopta.connect_accounts.org_already_mapped=Dette Vyopta-id er allerede knyttet til en anden lejer. Kontakt din kontoadministrator for at få hjælp.
account_management.subscriptions.addon.vyopta.connect_accounts.request_support=Kontakt din {service}-kontoadministrator for at få hjælp.
account_management.subscriptions.addon.vyopta.connect_accounts.success=Vi har forbundet din konto.
account_management.subscriptions.addon.vyopta.connect_accounts.unauthorized=Vi fandt din organisation hos {service}, men det ser ud til, at du ikke har de nødvendige tilladelser til at forbinde konti.
account_management.subscriptions.addon.vyopta.desc=Optimer samarbejdet med indsigt i realtid. Overvåg opkaldskvalitet, brug af mødelokaler og systemets ydeevne på tværs af Microsoft Teams, Zoom, Poly og Webex. Når det er integreret med WXP, hjælper det IT-afdelingen med at forbedre digitale oplevelser og øge effektiviteten på arbejdspladsen.
account_management.subscriptions.addon.vyopta.features.comprehensive_monitoring=Omfattende overvågning på tværs af samarbejdsplatforme
account_management.subscriptions.addon.vyopta.features.comprehensive_monitoring.desc=Få holistisk indsigt i dit UC-miljø (Unified Communications) med flere leverandører, hvilket muliggør effektiv styring af video- og stemmesamarbejdsværktøjer.
account_management.subscriptions.addon.vyopta.features.deep_integration=Dyb integration med WXP
account_management.subscriptions.addon.vyopta.features.deep_integration.desc=Vyoptas analyse- og overvågningsdata er problemfrit integreret i WXP, hvilket gør det muligt for IT-teams at styre samarbejdsydeevnen sammen med andre arbejdspladsteknologier. Denne centraliserede tilgang forbedrer IT-effektiviteten, reducerer kompleksiteten og forbedrer styringen af den digitale oplevelse.
account_management.subscriptions.addon.vyopta.features.enhance_user_engagement=Forbedr brugernes engagement og velvære
account_management.subscriptions.addon.vyopta.features.enhance_user_engagement.desc=Udnyt samarbejdsanalyser til at identificere barrierer for produktivitet, hvilket fremmer forbedrede medarbejderoplevelser og trivsel.
account_management.subscriptions.addon.vyopta.features.optimize_meeting_space=Optimer udnyttelsen af mødelokaler
account_management.subscriptions.addon.vyopta.features.optimize_meeting_space.desc=Analysér belægnings- og brugsmønstre for at maksimere ejendomsinvesteringer og forbedre effektiviteten i mødelokalerne.
account_management.subscriptions.addon.vyopta.features.proactive_issue_detection=Proaktiv opdagelse og løsning af problemer
account_management.subscriptions.addon.vyopta.features.proactive_issue_detection.desc=Udnyt overvågning i realtid til at identificere og løse problemer med samarbejdskvaliteten, før de påvirker brugerne, hvilket reducerer fejlfindingstiden.
account_management.subscriptions.addon.vyopta.header=Samarbejdsoplevelse fra Vyopta
account_management.subscriptions.addon.vyopta.overview=Styrk IT-teams med avanceret overvågning og analyse af samarbejdsværktøjer. Vyopta-integrationen i WXP giver synlighed i realtid om brugen af mødelokaler, opkaldskvalitet og systemydeevne på tværs af platforme som Microsoft Teams, Zoom, Poly og Webex. Forbedr medarbejdernes produktivitet ved proaktivt at løse samarbejdsproblemer og optimere oplevelsen på arbejdspladsen.
account_management.subscriptions.addon.vyopta.short_desc=Værdifulde analyser og lokaleindsigt til optimering af samarbejdsmiljøer
account_management.subscriptions.addon.wolf.desc=Udrulning, synlighed og ende-til-ende-beskyttelse ved hjælp af både indbygget pc-sikkerhed og softwaresikkerhed, der forstærker pc'ens forsvar.
account_management.subscriptions.addon.wolf_security=HP Wolf Security
account_management.subscriptions.addon.wolf_security.desc=Uovertruffen slutpunktsbeskyttelse af enheder mod cyberangreb drevet af HP Wolf. Se telemetri i Workforce Experience for forbedret sikkerhed.
account_management.subscriptions.addon.wpt.desc=Du kan spore, låse og sikre mistede eller stjålne enheder på afstand. Når det er integreret med WXP, kan det hjælpe IT-teams med at finde pc-aktiver og reducere risikoen for tab af enheder – selv når enhederne er slukket.
account_management.subscriptions.addon.wpt.features.always_available=Altid tilgængelig
account_management.subscriptions.addon.wpt.features.always_available.desc=Udnytter brugerdefineret hardware og software til at finde/låse/rydde, selv om pc'en er slukket, ikke er på internettet eller ikke vil starte.
account_management.subscriptions.addon.wpt.features.message_customization=Tilpasning af beskeder
account_management.subscriptions.addon.wpt.features.message_customization.desc=Send en brugerdefineret besked til mål-pc'en med instruktioner om oplåsning.
account_management.subscriptions.addon.wpt.features.remote_lock_and_erase=Låsning og rydning på afstand
account_management.subscriptions.addon.wpt.features.remote_lock_and_erase.desc=Lås enheden på firmwareniveau for at beskytte data og gøre den stjålne enhed ubrugelig. Ryd det primære lager på en mistet eller stjålet enhed for at undgå databrud.
account_management.subscriptions.addon.wpt.features.seamless_integration=Problemfri integration med WXP
account_management.subscriptions.addon.wpt.features.seamless_integration.desc=Administrer enhedssikkerhed direkte i WXP, og strømlin IT-driften og slutpunkt-administrationen.
account_management.subscriptions.addon.wpt.features.separations_of_duties=Adskillelse af opgaver
account_management.subscriptions.addon.wpt.features.separations_of_duties.desc=Der kræves flere godkendelser til låsning/rydning for at undgå fejl eller insidertrusler.
account_management.subscriptions.addon.wpt.features.strong_audit_trail=Stærkt revisionsspor
account_management.subscriptions.addon.wpt.features.strong_audit_trail.desc=Registrerer vellykket låsning og rydning på WXP-platformen som bevis på overholdelse.
account_management.subscriptions.addon.wpt.header=HP Wolf Protect and Trace with Wolf Connect
account_management.subscriptions.addon.wpt.overview=Forbedr administrationen af aktiver og reducer risici for databrud med HP Wolf Protect og Trace. Denne unikke løsning, som er integreret i WXP, gør det muligt for IT-teams at finde, låse og slette data på mistede eller stjålne enheder – selv når de er slukket. Global dækning og enkel administration velegnet til alle kundestørrelser.
account_management.subscriptions.addon.wpt.requirements.purchase=Kræver køb af en ny HP-pc fra din HP-salgskonsulent eller autoriserede kanalpartner.<br> Kræver en understøttet pc med WWAN-skærmekstraudstyret. Understøttede pc'er findes på: https://www.hpwolf.com/en/legal/ptwc/platforms
account_management.subscriptions.addon.wpt.short_desc=Spor, lås og ryd en pc globalt på afstand, selv når den er slukket
