exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.responseOptions=Afhængigt at det pågældende program kan der være forskellige valgmuligheder. Hvis programmet er kritisk for virksomheden, kan en opgradering af CPU'en muligvis afhjælpe problemet. Hvis der er tale om programmer, der ikke er kritiske for virksomheden, kan du fjerne dem fra enheden eller justere deres indstillinger for at reducere belastningen på enheden.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.restartComputer=Genstart computeren for helt at lukke alle de programmer, der kører.
