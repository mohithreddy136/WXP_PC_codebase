exp.GpuHealthIssue.blueScreenLink=https://docs.microsoft.com/en-us/windows-hardware/drivers/debugger/-analyze
exp.GpuHealthIssue.blueScreenLinkText=https://docs.microsoft.com/en-us/windows-hardware/drivers/debugger/-analyze
exp.GpuHealthIssue.causeBlueScreenErrors=Fejl med blå skærm: Fejl med blå skærm kan skyldes, at der kører for mange grafikintensive programmer eller visuelle effekter samtidigt, eller problemer med drivere og hardware.
exp.GpuHealthIssue.causeDoubleBitEcc=Dobbeltbit-ECC-hukommelsesfejl: Grafikkortet oplever dobbeltbit-ECC-hukommelsesfejl, hvilket kan indikere hardwareproblemer eller fejl i hukommelsen.
exp.GpuHealthIssue.causeHighDoubleBitEccOverTime=Et højt antal dobbeltbit-ECC-hukommelsesfejl over tid: Grafikkortet oplever et højt antal dobbeltbit-ECC-hukommelsesfejl, og det gennemsnitlige antal fejl er vokset i mindst 3 uger.
exp.GpuHealthIssue.causeHighTdrEvents=Højt antal TDR-hændelser (skærmdriver-timeout og -gendannelse): Grafikkortet har oplevet et højt antal TDR-hændelser, hvilket indikerer potentielle driver- eller hardwareproblemer.
exp.GpuHealthIssue.causeMissingDriverUpdate=Manglende kritisk driveropdatering: Grafikkortet mangler en vigtig driveropdatering, hvilket kan påvirke ydeevnen og stabiliteten.
exp.GpuHealthIssue.causeThermalIssues=Termiske problemer: Grafikkortet oplever ofte termiske problemer, og GPU- eller hukommelsestemperaturen er over den maksimale driftstemperatur.
exp.GpuHealthIssue.driverOption1=Mulighed 1: Brug HP Image Assistant til at opdatere drivere
exp.GpuHealthIssue.driverOption2=Mulighed 2: Brug Windows Update til at opdatere drivere
exp.GpuHealthIssue.possibleCauses=Mulige årsager:
exp.GpuHealthIssue.remediationBlueScreenPrefix=For fejl med blå skærm: Kontrollér, om der kører for mange grafikintensive programmer eller visuelle effekter på samme tid. Opdater grafikkortdriveren, nulstil overclockede indstillinger til standardindstillinger, foretag en ren installation af driveren eller nulstil indstillingerne til fabriksindstillingerne, sørg for tilstrækkelig strømforsyning, og rengør ventilationsåbninger og blæser. Analyser mini-dump-filen for specifikke afhjælpende foranstaltninger:
exp.GpuHealthIssue.remediationDoubleBitEcc=For dobbeltbit-ECC-hukommelsesfejl: Fortsæt med at holde øje med situationen og se, om ydeevnen bliver ved med at blive dårligere. Hvis antallet af fejl fortsat er højt, bør du overveje at udskifte grafikkortet.
exp.GpuHealthIssue.remediationMissingDriver=For manglende driveropdatering: Opdater grafikkortdriveren til den nyeste version for at løse ydeevneproblemer.
exp.GpuHealthIssue.remediationTdr=For TDR-hændelser: Fortsæt med at overvåge og opdatere grafikkortets driver, hvis problemet fortsætter. Nulstil grafikindstillingerne til standardindstillingerne, nulstil overclockede indstillinger til standardindstillingerne, opdater BIOS, hvis en opdatering er tilgængelig, og kontroller, at strømforsyningen er tilstrækkelig, og at luftgennemstrømningen ikke er hæmmet. Rengør ventilationsåbninger og blæser.
exp.GpuHealthIssue.remediationThermal=For termiske problemer: Kontroller, om luftstrømmen er hæmmet, rengør ventilationsåbningerne, og sørg for, at blæseren fungerer korrekt og er ren.
exp.GpuHealthIssue.suggestedRemediations=Foreslåede afhjælpninger:
exp.GpuHealthIssue.title=Adressér GPU-tilstand
exp.HpBatteryHealthManagerNotEnabled.causeNotCompatible=Enhed er ikke kompatibel med HP's Batteritilstandsstyring.
exp.HpBatteryHealthManagerNotEnabled.causeRequiresBiosUpdate=Enhed kræver en BIOS-opdatering.
exp.HpBatteryHealthManagerNotEnabled.description=HP's batteritilstandsstyring har været tilgængeligt på alle HP-notebooks til erhverv siden 2016. For at forbedre batteritiden anbefales det, at batteritilstandsstyring aktiveres.
exp.HpBatteryHealthManagerNotEnabled.option1Detail=HP anbefaler, at du aktiverer HP's batteritilstandsstyring og indstiller den til "Lad HP styre opladningen af mit batteri" eller "Maksimer batteriets levetid" afhængigt af brug og enhedens alder.
exp.HpBatteryHealthManagerNotEnabled.option1Title=Mulighed 1: Opdater BIOS'en til en understøttet version
exp.HpBatteryHealthManagerNotEnabled.possibleCauses=Mulige årsager:
