exp.FrequentWindowsBsodsHaveOccurred.description=Der har været mere end 3 fejlkontroller (BSOD-hændelser) inden for de seneste 7 dage. Fejlkontrolhændelser kaldes også "Blå skærm"- eller "BSOD"-hændelser.
