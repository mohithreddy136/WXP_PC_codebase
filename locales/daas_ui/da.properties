poly.lens.actions=Handlinger
poly.lens.addon.details.description=Administrer med ro og overblik din flåde af HP-samarbejdsenheder på tværs af hele organisationen. IT-teams får centraliseret kontrol over rum, lokaler og enheder, lige fra strømlinet implementering og nem vedligeholdelse til proaktiv overvågning og meningsfuld indsigt. Med sikker, cloudbaseret administration og gnidningsfri support til hybrid arbejde kan du reducere driftsomkostningerne, være på forkant med problemer og få en konsistent, pålidelig arbejdsoplevelse, uanset hvor dine teams befinder sig.
poly.lens.addon.feature.centralized.header=Centraliseret administration af personlige enheder
poly.lens.addon.feature.centralized.text=Med HP Poly Studio-programmer kan du levere en gnidningsfri selvbetjeningsoplevelse til slutbrugerne, mens IT-teamet har centraliseret overblik og kontrol over personlige enheder. Administrer lagerbeholdning, opdateringer, overvågning og indsigt med ro i sindet, uanset hvor dine teams arbejder.
poly.lens.addon.feature.effortless.maintenance.header=Ubesværet vedligeholdelse
poly.lens.addon.feature.effortless.maintenance.text=Administrer indstillinger, funktioner og softwareopdateringer på tværs af din flåde med minimal anstrengelse. Anvend indstillinger, sæt opdateringer i gang og finjuster konfigurationer i stor skala uden at gå på kompromis med kontrol eller præcision.
poly.lens.addon.feature.meaningful.measurement.header=Meningsfuld måling
poly.lens.addon.feature.meaningful.measurement.text=Forstå, hvordan enheder, rum og mennesker rent faktisk fungerer. Brug data om udnyttelse og ydeevne til at træffe smartere, datadrevne beslutninger om dine samarbejdsinvesteringer.
poly.lens.addon.feature.proactive.monitoring.header=Proactive Monitoring
poly.lens.addon.feature.proactive.monitoring.text=Vær på forkant med problemer med tydelig indsigt i enhedens tilstand og status. Få besked, når noget ikke er i orden, så problemerne løses, inden de forstyrrer møderne.
poly.lens.addon.feature.secure.header=Sikker cloudbaseret kontrol
poly.lens.addon.feature.secure.text=Administrer det hele fra en pålidelig, cloudbaseret platform, der kan skaleres i takt med din organisations vækst, alt imens den opfylder virksomhedens sikkerheds- og lovkrav.
poly.lens.addon.feature.simplified.deployment.header=Forenklet implementering
poly.lens.addon.feature.simplified.deployment.text=Klargør, forudkonfigurer og implementer enheder med ro i sindet. Automatiserede onboarding-flows reducerer opsætningstiden, undgår fejl og gør enhederne klar, inden de overhovedet når frem til en bruger eller lokale.
poly.lens.addon.subtitle=Cloudbaseret administration og indsigt på tværs af samarbejdsrum, lokaler og enheder.
