dnto.subscriptions.about_hp.desc1=Vi er en teknologivirksomhed, der er født ud af den overbevisning, at virksomheder skal gøre mere end bare at tjene penge. De skal gøre verden til et bedre sted. Vores indsats inden for klima, menneskerettigheder og digital retfærdighed beviser, at vi gør alt, hvad der står i vores magt for at gøre det.
dnto.subscriptions.about_hp.desc2=Med over 80 års handlinger, der beviser vores intentioner, har vi selvtilliden til at forestille os en verden, hvor innovation driver ekstraordinære bidrag til menneskeheden.
dnto.subscriptions.about_hp.desc3=Og vores teknologi – en produkt- og serviceportefølje af personlige systemer, printere og 3D-printløsninger – blev skabt for at inspirere til disse meningsfulde fremskridt.
