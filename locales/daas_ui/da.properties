welcome.banner.description=TechPulse er en telemetri- og analyseplatform, som leverer kritiske data omkring enheder og applikationer og giver it-afdelingen mulighed for deep learning, så de kan give medarbejderne de rigtige redskaber i form af pc, software og tjenester, så de kan udføre deres arbejde optimalt. HP TechPulse identificerer problemer proaktivt, muliggør løsninger i stor skala og minimerer trusler ved aktivt at monitorere organisationens sikkerhed.
welcome.banner.description_p={app_name} er en telemetri- og analyseplatform, som leverer afgørende data om enheder og applikationer og forsyner it-afdelingen med deep learning, så de kan give medarbejderne de rigtige redskaber i form af pc'er, software og tjenester, som sætter dem i stand til at udføre deres arbejde optimalt. {app_name} identificerer problemer proaktivt, muliggør løsninger i stor skala og minimerer trusler gennem aktiv overvågning af organisationens sikkerhed.
welcome.banner.description_p1={app_name} er en cloud-baseret, telemetrisk og analytisk platform, som indsamler kritiske konfigurations og tilstandsoplysninger fra dine enheder og programmer. Ved hjælp af AI og dyb læring analyseres disse data for proaktivt at identificere problemer, sørge for afhjælpning efter behov og minimere sikkerhedstrusler.
welcome.banner.title=Automatiseringsplatform, som leverer tjenester i verdensklasse via meningsfyldt information drevet af milliarder af datapunkter
welcome.banner.title1={app_name} giver dig dybe indsigter lige ved hånden, som kan forudsige og løse problemer med enheder, inden de opstår
