wex.labs.remediation.ai.description=Afhjælpning med AI hjælper dig med at finde den mest effektive løsning. Det indsnævrer intelligent mulighederne, så dit team kan løse problemer effektivt og konsistent.
wex.labs.remediation.ai.description.disclaimer=You are about to interact with an AI solution. Content generated by AI might contain inaccuracies and should be verified against the details provided. Please note that AI-generated responses might be incomplete or incorrect, and HP assumes no responsibility for actions taken based on this content.
wex.labs.remediation.ai.details.analyzesAvailableRemediations.desc=Algoritmen gennemgår eksisterende afhjælpninger i platformen, herunder scripts, politikker og enhedsaktioner/opdateringer, for at anbefale den mest relevante.<br/><br/>Den ser på tidligere anvendelse og succesrater for at forstå, hvad der typisk løser denne type problemer i din organisation. Brugere kan bruge mindre tid på at finde frem til den rigtige løsning og lade AI gøre arbejdet.
wex.labs.remediation.ai.details.analyzesAvailableRemediations.title=Analyser tilgængelige afhjælpninger
wex.labs.remediation.ai.details.applyOrReview.desc=Administratoren kan, afhængigt af afhjælpningen, vælge at: <br/><div class=remediation-ai-ui><ul><li>Anvend straks på valgte enheder</li><li>Planlæg til senere for at minimere forstyrrelser</li><li>Gennemgå detaljerne, før du bekræfter handlingen</li></ul></div><br/>Når den er anvendt, overvåges aktiviteten og resultaterne for at sikre gennemsigtighed og kontinuerlig læring.
wex.labs.remediation.ai.details.applyOrReview.title=Anvend, planlæg eller gennemgå
wex.labs.remediation.ai.details.continuousLearning.desc=Anbefalingerne bliver med tiden mere præcise og pålidelige.
wex.labs.remediation.ai.details.continuousLearning.title=Kontinuerlig læring
wex.labs.remediation.ai.details.howItWorks.title=Sådan fungerer det
wex.labs.remediation.ai.details.issueToRemediation.desc=Når et problem overskrider en fastlagt tærskel, kan du se det på dit dashboard sammen med en klar beskrivelse af, hvad der foregår, og hvordan det kan påvirke dine enheder. WXP-platformen kan nu direkte løse problemer, og AI-afhjælpningsfunktionen hjælper med at finde den bedste løsning på problemet.
wex.labs.remediation.ai.details.issueToRemediation.title=Problem til afhjælpning
wex.labs.remediation.ai.details.learnsandImproves.desc=Algoritmen finjusterer løbende sin forståelse af, hvad der fungerer bedst for din organisation.<br/>For hver gang en afhjælpning anvendes, lærer systemet:<div class=remediation-ai-ui><ul><li>Hvor effektiv den var</li><li>Hvor lang tid det tog at løse problemet</li><li>Om der er opstået lignende problemer igen</li></ul></div><br/>Dette feedback-loop forbedrer fremtidige anbefalinger, så de bliver mere præcise og individualiserede over tid.
wex.labs.remediation.ai.details.learnsandImproves.title=Lærer og forbedrer sig over tid
wex.labs.remediation.ai.details.overview.desc=Afhjælpning med AI-funktionen hjælper IT-administratorer med hurtigt at komme fra opdagelse til løsning. Den analyserer dine flådedata og anbefaler den mest effektive politik, det mest effektive script eller den mest effektive enhedsopdatering i forhold til det aktuelle problem. Algoritmen gør brug af mønstre fra eksisterende afhjælpninger i dit miljø til at foreslå, hvad der med størst sandsynlighed vil virke.
wex.labs.remediation.ai.details.recommendBestFix.desc=Hver anbefaling indeholder: <br/><div class=remediation-ai-ui><ul><li>Handlingstype: Script, politik eller opdatering</li><li>Hvorfor det er relevant: Afhjælpning og automatisering løser problemer i realtid, øger medarbejdernes produktivitet, forbedrer den digitale oplevelse, sparer tid og minimerer sårbarheder.</li></ul></div>
