exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.connectAcAdapter=Tilslut en strømadapter, da CPU'en kan køre med lavere ydeevne, når enheden kører på batteri, afhængigt af enhedens strømindstillinger.
