exp.MissingCriticalBiosUpdates.remediationCreatePolicies=Opret BIOS-opdateringspolitikker for at opdatere BIOS på kompatible enheder direkte via platformen. Vælg enhederne i tabellen nederst på denne side, og vælg Anvend politik.
