dnto.subscriptions.privacy_statement.desc1=HP anerkender, at privatlivets fred er en grundlæggende menneskeret, og anerkender endvidere betydningen af privatlivets fred, sikkerhed og databeskyttelse for vores kunder og partnere på verdensplan. Som en global organisation med juridiske enheder, forretningsprocesser, administrationsstrukturer og tekniske systemer, der krydser internationale grænser, bestræber vi os på at yde beskyttelse på tværs af alle vores aktiviteter, som overskrider juridiske minimumsgrænser, og at implementere ensartede, strenge politikker og procedurer.
dnto.subscriptions.privacy_statement.desc2=Som anvendt i denne erklæring henviser udtryk som "vi", "os", "vores" og "virksomhed" til HP-brandede virksomheder og nuværende og fremtidige datterselskaber, som defineret i lokal lovgivning (heri "HP"). Kontaktoplysninger til HP's databeskyttelsesansvarlige findes i afsnittet "{0}" nedenfor.
dnto.subscriptions.privacy_statement.exercise_rights=Udøvelse af dine rettigheder og kontakt til os
dnto.subscriptions.privacy_statement.heading=HP Fortrolighedserklæring
dnto.subscriptions.section.details.desc1=Medarbejderne er vant til og kræver endda fleksibilitet til at arbejde, hvordan og hvor de vil. Med it-teams, der er strakt ud over deres grænser, lider medarbejdernes oplevelse, produktivitet og engagement.
dnto.subscriptions.section.details.desc2=HP Workforce Experience Pro forudser og løser intelligent digital friktion fra en konsolideret og modulær platform.
dnto.subscriptions.section.details.desc3=Uanset om du administrerer et lille team på et enkelt sted eller navigerer i kompleksiteten i en global hybrid arbejdsstyrke, giver HP Workforce Experience Pro en samlet platform til at understøtte og optimere dine medarbejderes digitale oplevelser.
dnto.subscriptions.section.details.desc4=Øg medarbejdernes produktivitet ved proaktivt at løse it-problemer, før de opstår. Reducer IT-supporttimer og -omkostninger med avanceret AI. Styrk slutpunktssikkerheden ved at forudse og løse trusler.
dnto.subscriptions.section.details.desc5=Forbedr medarbejdernes stemning med brugbar indsigt fra pulsundersøgelser. Optimer omkostningerne med smarte hardwareopdateringer. Sømløs integration med eksisterende miljøer med flere leverandører og flere operativsystemer.
dnto.subscriptions.section.details.heading=Abonnementsoplysninger
dnto.subscriptions.sign_in=Log ind på HP Workforce Experience
dnto.subscriptions.thank_you.desc=Tak, fordi du har valgt HP Workforce Experience. Vi er sikre på, at du vil opnå større produktivitet og samarbejde. Hvis du har spørgsmål, når du kommer i gang, er du velkommen til at besøge vores omfattende supportressourcer eller kontakte vores hjælpsomme kundeserviceteam.
