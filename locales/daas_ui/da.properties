exp.MissingCriticalBiosUpdates.remediationReviewInventory=Gennemgå BIOS-oversigtsdetaljerrapporten for at få et overblik over BIOS-versionen efter enhedsmodel, seneste tilgængelige BIOS-version og opdateringskritikalitet.
