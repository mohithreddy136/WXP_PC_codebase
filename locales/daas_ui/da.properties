exp.ExcessiveOsStartupTime.option1=Mulighed 1: Windows 11 – Startapps i Indstillinger
exp.ExcessiveOsStartupTime.option1Guide=Hvis du vil forbedre enhedens ydeevne og afhjælpe langsom login-tid, har det størst effekt at stoppe programmer fra at starte, når du logger ind. Microsoft har udarbejdet en vejledning til Windows 11-enheder, der hjælper dig med at få kontrol over opstarten af Windows.
exp.ExcessiveOsStartupTime.option1GuideLink=https://www.microsoft.com/en-us/windows/learning-center/take-control-of-windows-startup
exp.ExcessiveOsStartupTime.option1GuideLinkText=https://www.microsoft.com/en-us/windows/learning-center/take-control-of-windows-startup
exp.ExcessiveOsStartupTime.option1StepApps=Vælg Apps i venstre side af vinduet.
exp.ExcessiveOsStartupTime.option1Steps=by changing the Windows startup programs using the following steps:
exp.ExcessiveOsStartupTime.option1StepSettings=Vælg Indstillinger.
exp.ExcessiveOsStartupTime.option1StepStart=Vælg Start-knappen, der ligner Microsoft-logoet.
exp.ExcessiveOsStartupTime.option1StepStartup=Vælg Start i bunden af Apps-vinduet.
exp.ExcessiveOsStartupTime.option1StepToggles=Brug til/fra-knapperne til at vælge, hvilke programmer du gerne vil køre ved opstart. Aktivér, hvis du ønsker, at programmet skal startes ved opstart, eller deaktivér, hvis du ikke ønsker dette.
exp.ExcessiveOsStartupTime.option2=Mulighed 2: Windows 11 – Startapps i Jobliste
exp.ExcessiveOsStartupTime.option2Guide=Startapps kan også aktiveres og deaktiveres via Windows Jobliste ved at følge disse trin:
exp.ExcessiveOsStartupTime.option2StepDisable=Højreklik på et program, og vælg Deaktiver (hvis kolonnen Status siger Aktiveret).
exp.ExcessiveOsStartupTime.option2StepStart=Vælg Start-knappen, der ligner Microsoft-logoet.
exp.ExcessiveOsStartupTime.option2StepStartupApps=Vælg "Startapps" i venstre navigationspanel.
exp.ExcessiveOsStartupTime.option2StepTaskManager=Skriv "Jobliste" og tryk på Enter for at åbne Windows Jobliste.
exp.ExcessiveOsStartupTime.option3=Mulighed 3: Afinstaller programmer
exp.ExcessiveOsStartupTime.option3Guide=Programmer, der ikke starter automatisk ved opstart, kan også bidrage til langsom login-tid, da disse programmer kan indeholde filer, tjenester og registreringsdatabaseposter, der muligvis er delvist indlæst. Systembakkeprogrammer er nogle eksempler på programmer, der kører, selvom der måske ikke er et åbent vindue med programmet kørende. Udfør nedenstående skridt for at gennemgå og fjerne unødvendige programmer. Bemærk: Nogle programmer kræver muligvis administratorrettigheder for at kunne fjernes.
exp.ExcessiveOsStartupTime.option3StepControlPanel=Indtast Kontrol, and tryk på Enter for at åbne kontrolpanelet.
exp.ExcessiveOsStartupTime.option3StepPrograms=Åbn Programmer og funktioner.
exp.ExcessiveOsStartupTime.option3StepStart=Vælg Start-knappen, der ligner Microsoft-logoet.
exp.ExcessiveOsStartupTime.option3StepUninstall=Vælg et program du vil fjerne, og vælg Afinstaller.
exp.ExcessiveOsStartupTime.option4=Mulighed 4: Brug PowerShell og ActiveDirectory-modulet til at køre Get-GpResultantSetofPolicy for at analysere politikker og hvor lang tid det tager at anvende dem på de berørte maskiner for at identificere mulige forbedringer.
