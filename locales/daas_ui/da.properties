bios.bsod.tooltip.context=BIOS' indvirkning afgøres ud fra vægtning, når der forekommer BSOD, der er tættere på opgradering af andre enheder af samme model, der har højere vægtning. Desuden klassificeres specifikke enhedsmodeller med en højere vægtning over X% som "høj indvirkning". Indvirkningen beregnes for de enkelte enhedsmodeller og anvendes på alle enheder, der anbefales at have den specifikke BIOS version. Hvis der er tilfælde, hvor BSOD er af mindre betydning for modellen, er vægtningen mindre og dermed også indvirkningen.
