side_panal.smart_refresh.software_persona_5=Remote Worker: Users who frequently use productivity software, such as OneNote and Adobe Acrobat
side_panal.smart_refresh.software_persona_6=Healthcare Worker: Users who typically use their devices remotely
side_panal.smart_refresh.software_persona_7=Cloud Strategist: Users who frequently use medical professional software, such as ICU monitoring and hospital management systems
side_panal.smart_refresh.software_persona_8=Utility Expert: Users who use extensive cloud services
side_panal.smart_refresh.software_persona_9=Media Consumer: Users who frequently use utility software, such as WinRAR and System Monitor
