wex.ra.remediation.frequent_network_disconnection=For hjemmenetværk skal du sikre dig, at routerens firmware er opdateret, og placere routeren et centralt sted for at minimere interferens. Reducer også antallet af tilsluttede enheder, og overvej at bruge en kablet forbindelse til kritiske enheder for at opretholde et stabilt og pålideligt netværk.
wex.ra.remediation.gpu_health_issue=Workforce Experience Platform har registreret et problem med GPU'en, som kræver omgående opmærksomhed.
wex.ra.remediation.high_collaboration_sw_errors=Der har været mere end 10 softwarefejl inden for de seneste 7 dage i Teams, Outlook, Zoom, Webex, Chrome, Office.
wex.ra.remediation.high_windows_crash=Operativsystemet har haft 1 eller flere uventede nedbrud eller genstarter inden for de seneste 7 dage.
wex.ra.remediation.last_reboot_more_than_21_days=Seneste genstart blev foretaget for mere end 21 dage siden.
wex.ra.remediation.maximise_my_battery_health_not_enabled=HP Battery Health Manager is available on all HP business notebooks since 2016. To improve battery life, it is recommended that Battery Health Manager be enabled
wex.ra.remediation.memory_utilization_high=The average Memory utilization over the last 30 days is 85% or greater.
wex.ra.remediation.missing_critical_bios_updates=Opdater BIOS for kompatible enheder via platformen ved at vælge enhederne nedenfor og vælge "Anvend politik". For inkompatible enheder skal du opdatere systemdrivere og firmware ved hjælp af Windows Update eller HP Image Assistant.
wex.ra.remediation.missing_critical_driver_updates=Rapporten over driverlager indeholder en detaljeret liste over de enheder, der mangler vigtige opdateringer til enhedsdrivere.
wex.ra.remediation.missing_windows_security_updates=Workforce Experience Platforms sikkerhedsdashboard viser KPI'er for antallet af enheder, der mangler Windows-sikkerhedsopdateringer.
wex.ra.remediation.os_crash=Operativsystemet har haft 1 eller flere uventede nedbrud eller genstarter inden for de seneste 7 dage.
wex.ra.remediation.poor_network_signal_strength=På hjemmenetværk kan det hjælpe med at forbedre Wi-Fi-signalstyrken at genstarte din router eller flytte routeren for at reducere antallet af forhindringer mellem adgangspunktet og pc'en.
wex.ra.remediation.poor_nominal_speed=For hjemmenetværk bør du overveje at opgradere din router til en nyere model, der understøtter de nyeste Wi-Fi-standarder, såsom Wi-Fi 6. Du kan også optimere dit netværkslayout ved at placere routeren et centralt sted, reducere interferens fra andre enheder og bruge kablede forbindelser, hvor det er muligt, for at få en mere stabil ydeevne.
wex.ra.remediation.unauthenticated_connection=Til hjemmenetværk vælges en robust krypteringsprotokol, f.eks. WPA2 eller WPA3, og der indstilles en stærk, unik adgangskode til adgang. Overvej også at implementere MAC-adressefiltrering og regelmæssigt at opdatere din routers firmware for at forbedre sikkerheden og forhindre uautoriserede forbindelser.
wex.ra.remediation.windows_secure_boot_not_enabled=Secure Boot er en sikkerhedsstandard, som skal sikre, at en enhed kun starter op med software, som producenten af udstyret (OEM) har tillid til.
