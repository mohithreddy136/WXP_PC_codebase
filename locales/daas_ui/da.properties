side_panal.smart_refresh.help_sub_title=Opgrader pc'er på det rigtige tidspunkt med HP's Smart Refresh. Sådan her fungerer det:
side_panal.smart_refresh.personas_header=Karakter
side_panal.smart_refresh.personas_sub_text=AI-baserede grupper af enheder, baseret på brugermønstre
side_panal.smart_refresh.point_1_desc=Evaluer pc'ernes aktuelle tilstand med hensyn til hardwareydelse, softwareanvendelighed og sikkerhed.
side_panal.smart_refresh.point_1_title=1. Vurdering
side_panal.smart_refresh.point_2_desc=Prioriter de pc'er, der har brug for opmærksomhed nu, baseret på deres brug, betydning for forretningsdriften eller graden af forældelse.
side_panal.smart_refresh.point_2_title=2. Prioritering
side_panal.smart_refresh.point_3_desc=Udfør de planlagte opgraderinger eller udskiftninger effektivt og minimer nedetid og forstyrrelser for brugerne.
side_panal.smart_refresh.point_3_title=3. Implementering
side_panal.smart_refresh.point_4_desc=Sørg for, at de opdaterede pc'er er udstyret med de nyeste sikkerhedsforanstaltninger for at beskytte mod cybertrusler.
side_panal.smart_refresh.point_4_title=4. Sikkerhed
side_panal.smart_refresh.point_5_desc=Overvåg regelmæssigt de opdaterede pc'er for at sikre, at de fortsat fungerer optimalt, og udfør nødvendig vedligeholdelse efter behov.
side_panal.smart_refresh.point_5_title=5. Overvågning og vedligeholdelse
side_panal.smart_refresh.software_persona_1=I dvale: Brugere, der ikke ofte bruger deres enhed
side_panal.smart_refresh.software_persona_2=Office 365: Brugere, der ofte bruger office-programmer, såsom Excel og Word
