wex.fleet.mgmt.remediation.kernel_panic_error.desc=En kernel panic er opstået, som indikerer en kritisk systemfejl, som Linux-kernen ikke kan udbedre. Dette kan være forårsaget af hardwarefejl, beskadigede drivere, forkert konfigurerede kernel-parametre eller inkompatible kernel-moduler. Øjeblikkelig undersøgelse er nødvendig for at identificere årsagen.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt1=Gennemgå systemlogfiler (/var/log/messages, /var/log/syslog eller journalctl) for fejlmeddelelser, der opstod før kernel panic.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt2=Undersøg hardwarens tilstand, især hukommelsen (RAM) og diskens integritet, ved hjælp af værktøjer som memtest86 og smartctl.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt3=Kontroller nylige ændringer i systemet (f.eks. kernel-opdateringer, driverinstallationer eller konfigurationsændringer).
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt4=Start op i en rednings- eller gendannelsestilstand for at få adgang til systemet, hvis det ikke vil starte op.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt5=Tilbagefør eller opdater kernel-moduler eller drivere, hvis de mistænkes for at være inkompatible.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt6=Kontakt leverandøren eller fællesskabets support, hvis problemet fortsætter eller er hardwarespecifikt.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.desc=Aktivering af diskkryptering beskytter følsomme data på disken ved at sikre, at alle oplysninger er ulæselige uden korrekt godkendelse. Dette er en vigtig sikkerhedsforanstaltning for systemer, der håndterer fortrolige eller lovregulerede data.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step1=Implementer fuld diskkryptering med værktøjer som LUKS (Linux Unified Key Setup) eller dm-crypt, afhængigt af din Linux-distribution.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step2=Krypter følsomme partitioner (f.eks. /home, /var eller /data), hvis kryptering af hele disken ikke er mulig.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step3=Konfigurer sikker nøgleadministration, herunder adgangskoder eller integration med TPM (Trusted Platform Module), hvis tilgængelig.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step4=Sikkerhedskopier krypteringsnøgler for at forebygge tab af data i tilfælde af, at nøglen går tabt.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step5=Test krypteringsindstillingerne for at sikre, at systemet startes korrekt, og at der er adgang til data efter godkendelse.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step6=Konfiguration af dokumentkryptering og procedurer for gendannelse til overholdelse af lovgivning og sikring af driftskontinuitet.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step1=Installer og konfigurer et firewall-værktøj som f.eks. firewalld, ufw eller iptables, afhængigt af din Linux-distribution.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step2=Indstil firewall-tjenesten til at starte ved opstart
wex.fleet.mgmt.remediation.linux_firewall_disabled.step3=Indstil firewall-regler, så kun nødvendige tjenester (f.eks. SSH, HTTP/HTTPS) tillades, og alle andre blokeres.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step4=Kontroller firewallstatus og -regler med: sudo firewall-cmd --list-all (for firewalld), sudo ufw status (for ufw)
wex.fleet.mgmt.remediation.linux_firewall_disabled.step5=Kontroller regelmæssigt firewallkonfigurationer for at sikre, at de stemmer overens med sikkerhedspolitikker og driftsmæssige behov.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.desc=Aktivering af Secure Boot hjælper med at beskytte systemet mod uautoriseret eller skadelig kode under opstartsprocessen ved at verificere de digitale signaturer for bootloadere, kernel-moduler og drivere. Dette bidrager til systemets integritet og sikkerhed, især i virksomheder eller miljøer, hvor overholdelse af regler er afgørende.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step1=Kontroller, at UEFI-firmwaren understøtter Secure Boot, og at det er aktiveret i UEFI-indstillingerne.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step2=Installer og konfigurer signerede bootloadere og kernel-pakker, der er kompatible med Secure Boot (f.eks. ved hjælp af shim og signeret GRUB).
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step3=Kontroller, at kernel, moduler og alle nødvendige komponenter er signeret.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step4=Genstart og bekræft status for Secure Boot med mokutil.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step5=Registrer brugerdefinerede nøgler, hvis du bruger komponenter, der ikke er standard.
wex.fleet.mgmt.remediation.missing_linux_security_updates.desc=Systemet mangler en eller flere kritiske sikkerhedsopdateringer. Disse opdateringer løser kendte sårbarheder i operativsystemet, kernel og installerede pakker. Hvis de ikke installeres, kan systemet bringes i fare for uautoriseret adgang, databrud eller serviceforstyrrelser.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step1=Gennemgå og identificer manglende sikkerhedsrettelser via systemets pakkeadministrator (f.eks. apt, yum, dnf, zypper).
wex.fleet.mgmt.remediation.missing_linux_security_updates.step2=Installer alle vigtige sikkerhedsopdateringer med det samme for at afbøde kendte trusler og sårbarheder.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step3=Genstart systemet, hvis nødvendigt, især efter opdateringer af kernel eller kernetjenester.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step4=Aktivér automatiske sikkerhedsopdateringer, eller konfigurer regelmæssige programrettelsestidspunkter for at sikre rettidig beskyttelse.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step5=Kontroller, at opdateringen blev gennemført, ved at tjekke logfilerne og bekræfte pakkeversionerne.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step6=Udfør en sårbarhedsscanning efter opdateringen for at sikre, at der ikke er nogen tilbageværende risici.
wex.fleet.mgmt.remediation.missing_linux_updates.desc=Systemet mangler en eller flere kritiske Linux-opdateringer. Disse opdateringer kan bestå af sikkerhedsrettelser, kernel-fejlrettelser og stabilitetsforbedringer. At køre et forældet system øger risikoen for sårbarheder, systemnedbrud og kompatibilitetsproblemer.
wex.fleet.mgmt.remediation.missing_linux_updates.step1=Gennemgå tilgængelige opdateringer i din pakkeadministrator (f.eks. yum, dnf, apt eller zypper) for at identificere manglende kritiske rettelser.
wex.fleet.mgmt.remediation.missing_linux_updates.step2=Installer alle sikkerheds- og kernel-opdateringer hurtigst muligt for at afbøde kendte sårbarheder.
wex.fleet.mgmt.remediation.missing_linux_updates.step3=Genstart systemet, hvis nødvendigt, især efter opdateringer af kernel eller kernesystemer.
wex.fleet.mgmt.remediation.missing_linux_updates.step4=Aktivér automatiske opdateringer eller konfigurer regelmæssige programrettelsestidspunkter for at sikre rettidig installation af fremtidige opdateringer.
wex.fleet.mgmt.remediation.missing_linux_updates.step5=Kontroller, at opdateringen er gennemført, ved at tjekke systemlogfilerne og bekræfte aktuelle kernel- og pakkeversioner.
wex.fleet.mgmt.remediation.network_connection_not_secure.desc=En netværksforbindelse uden den forventede sikkerhed er blevet rapporteret inden for de sidste 24 timer.
wex.fleet.mgmt.remediation.network_connection_not_secure.desc1=Ikke-autentificeret forbindelse registreret inden for de sidste 7 dage.
wex.fleet.mgmt.remediation.network_disconnections.desc=Enheder har rapporteret gentagne netværksafbrydelser inden for de sidste 24 timer.
wex.fleet.mgmt.remediation.network_disconnections.desc1=Der er blevet registreret netværksafbrydelser i løbet af de sidste 7 dage.
wex.fleet.mgmt.remediation.network_speed_slow.desc=Den nominelle netværkshastighed blev rapporteret som langsom i løbet af de sidste 24 timer.
wex.fleet.mgmt.remediation.wifi_signal_strength_weak.desc=Wi-Fi-signalstyrken er blevet rapporteret som svag inden for de sidste 24 timer.
