requirements.list.hp_print_fleetproxy.desc1=Print Fleet Proxy kræver, at HP Web Jetadmin er installeret på samme pc. HP anbefaler stærkt, at du opgraderer til den nyeste version af Web Jetadmin, før du installerer HP Fleet Proxy.
requirements.list.hp_print_fleetproxy.desc2=I øjeblikket tester HP kun HP Fleet Proxy mod HP Web Jetadmin 10.5 SR4. Selvom HP Fleet Proxy kan fungere med tidligere versioner af HP Web Jetadmin, garanterer HP ikke, at alle funktioner vil fungere som forventet.
requirements.list.hp_print_fleetproxy.desc3=Web Jetadmin er en ressourceintensiv tjeneste. Selvom HP Fleet Proxy ikke burde tilføje meget ekstra belastning, kan det påvirke ydeevnen, hvis værtsserveren ikke har nok computerkraft til at understøtte begge tjenester og de enheder, de administrerer. Du bør sikre dig, at den server, der hoster HP Web Jetadmin og HP Fleet Proxy, er robust nok og har nok processorkerner til at afbøde eventuelle problemer med ydeevnen.
requirements.list.hp_print_fleetproxy.desc4=HP fandt ud af ved test af 2000 enheder, at følgende grundlæggende hardwarespecifikationer burde være tilstrækkelige til at give acceptabel ydeevne. Hvis du bemærker langsom ydeevne, eller hvis du administrerer mere end 2.000 enheder, har du måske brug for en server med mere regnekraft.
requirements.list.hp_print_fleetproxy.desc5=Print Fleet Proxy er en tjeneste lokalt på stedet, som kommunikerer med en cloud-baseret tjeneste. Derfor skal du konfigurere din firewall til at tillade indgående og udgående kommunikation mellem WJA-serveren og HP Command Center, enten via DNS-filtrering eller IP-hvidlistning.
requirements.list.hp_print_fleetproxy.desc6=Du kan finde listen her:
requirements.list.hp_print_fleetproxy.hp-nf1=DNS-filtrering: Konfigurer din firewall til at tillade udgående HTTPS-anmodninger over port 443 til følgende endpoints:
requirements.list.hp_print_fleetproxy.hp-nf2=IP-hvidlistning: For at hvidliste IP-adresser skal du inkludere IP-adressen på alle tænkelige cloud-servere, som HP Fleet Proxy kan få brug for at kommunikere med.
