btg.addon.description=HP IQ kombinerer sammenhængsbevidsthed, nemt samarbejde og en personlig brugergrænseflade med sikkerhed i virksomhedsklasse og øger dermed medarbejdernes effektivitet og personlige arbejdsflow.
