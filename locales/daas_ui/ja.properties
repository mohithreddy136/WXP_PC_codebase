wex.labs.remediation.ai.description=AIによる修復は、最も有効な解決策をガイドします。これはオプションをインテリジェントに絞り込むため、チームは一貫した方法で効率的に問題を解決できるようになります。
wex.labs.remediation.ai.description.disclaimer=You are about to interact with an AI solution. Content generated by AI might contain inaccuracies and should be verified against the details provided. Please note that AI-generated responses might be incomplete or incorrect, and HP assumes no responsibility for actions taken based on this content.
wex.labs.remediation.ai.details.analyzesAvailableRemediations.desc=このアルゴリズムは、スクリプト、ポリシー、デバイスのアクション/更新など、プラットフォームの既存の修復をスキャンし、最も妥当な修復を提案します。<br/><br/>このアルゴリズムでは、過去の使用状況と成功率を参照して、組織内でのこの種類の問題の一般的な解決方法を把握します。ユーザーはより短時間で適切な方針を見極めて、AIにその作業を委ねることができます。
wex.labs.remediation.ai.details.analyzesAvailableRemediations.title=利用可能な修復の分析
wex.labs.remediation.ai.details.applyOrReview.desc=修復に応じて、管理者は次のことを選択できます。<br/><div class=remediation-ai-ui><ul><li>選択したデバイス全体に直ちに適用する</li><li>中断を最小限に抑えるために後で実行するようにスケジュールする</li><li>操作を確定する前に詳細を確認する</li></ul></div><br/>適用後は、透明性と継続的な学習のために操作と結果が追跡されます。
wex.labs.remediation.ai.details.applyOrReview.title=適用、スケジュール、または確認
wex.labs.remediation.ai.details.continuousLearning.desc=時間の経過とともに、推奨事項の精度と信頼性が向上します。
wex.labs.remediation.ai.details.continuousLearning.title=継続的な学習
wex.labs.remediation.ai.details.howItWorks.title=ご利用手順
wex.labs.remediation.ai.details.issueToRemediation.desc=定義されたしきい値を超えた問題は、ダッシュボードに表示され、何が起きているかと、デバイスにどのように影響する可能性があるかが明確に示されます。[WXP]プラットフォームで直接の修復が可能になりました。また、AI修復機能により、問題解決のための最善の方法を絞り込むことができます。
wex.labs.remediation.ai.details.issueToRemediation.title=修復する問題
wex.labs.remediation.ai.details.learnsandImproves.desc=アルゴリズムは、組織内で最も有効な方法についての理解を継続的に改善していきます。<br/>修復が適用されるたびに、システムは次のことを学習します。<div class=remediation-ai-ui><ul><li>どれだけ効果的だったか</li><li>問題の解決にどれだけ時間がかかったか</li><li>類似の問題が再発したかどうか</li></ul></div><br/>このフィードバック ループにより、以後の提案が強化され、時間とともに精度と適合性が向上します。
wex.labs.remediation.ai.details.learnsandImproves.title=時間とともに学習して向上します
wex.labs.remediation.ai.details.overview.desc=AIによる修復機能は、IT管理者が検出から解決へすばやく移行するうえで役立ちます。この機能は、フリートのデータを分析し、現在の問題に対して最も効果的なポリシー、スクリプト、またはデバイスの更新を提案します。このアルゴリズムは、環境内の既存の修復のパターンを使用して、成功の可能性が最も高い方法を提案します。
wex.labs.remediation.ai.details.recommendBestFix.desc=提案には以下のものが含まれます。<br/><div class=remediation-ai-ui><ul><li>アクションの種類：スクリプト、ポリシー、または更新</li><li>それが有効である理由：修復および自動化は、リアルタイムで問題を解決し、従業員の生産性を高め、デジタル体験を向上させ、時間を節約して脆弱性を低減します。</li></ul></div>
wex.labs.remediation.ai.details.recommendBestFix.title=最適な解決策を推奨
wex.labs.remediation.ai.details.relevance.desc=AIは、組織固有の修復ライブラリ内で機能します。
wex.labs.remediation.ai.details.relevance.title=関連性
