banner.iot.update.description=[TechPulse]プラットフォームのインフラストラクチャ変更が2023年2月27日（月）に実施されます。これにより、お客様のプロキシ、ファイアウォール、およびSSL検証ソフトウェアの設定の更新が必要になる場合があります。<a href='https://www.hpdaas.com/software' target='_blank'>[HP TechPulse]ソフトウェア（hpdaas.com）</a>のネットワーク評価ツールを実行し、4つの*.IoTテスト対象が「失敗」のメッセージを返すかどうかを確認してください。テスト結果が失敗になった場合は、「<b><a href='https://hp.service-now.com/techpulse_kb?id=kb_article&sysparm_article=KB0011291' target='_blank'>KB0011291</a> - プロキシまたはファイアウォールの構成</b>」の手順に従い、<b>2023年2月23日（木）までに変更を行ってください</b>。
