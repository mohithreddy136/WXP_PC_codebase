sustainability.dashboard.info_message=消費電力データは、次の2つの方法で収集されます。組み込みチップによる消費電力測定（PCM）、および新しいHPコンピューターの最新のBIOS更新に基づく推定消費電力（EC）です。データの精度は、特定のPCでサポートされる方法によって異なります。
sustainability.dashboard.info_message_data=この方法では、各デバイスの状態（アクティブ、スリープ モード、シャットダウン）に関係なく、デバイスの合計消費電力量をキロワット時（kWh）で計算します。毎週末に取得されたすべてのデータを処理することで、デバイスのエネルギー使用量を包括的に把握できます。さらに、現在の週の合計消費電力量をリアルタイムで計算し、現時点までの消費電力量を表示します。
