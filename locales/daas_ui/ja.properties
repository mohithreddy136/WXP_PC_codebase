exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.cause1=自宅のレイアウトがWi-Fiの問題の原因となっている可能性があります。
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.cause2=アクセス ポイントが壁や障害物の陰になっている可能性があります。
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.description=過去24時間以内にWi-Fi信号強度が弱いと報告されました。
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.moreInfo=詳細情報：
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.moreInfoLink=https://support.microsoft.com/en-us/windows/wi-fi-problems-and-your-home-layout-e1ed42e7-a3c5-d1be-2abb-e8fad00ad32a#WindowsVersion=Windows_11
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.possibleCauses=自宅のネットワークで考えられる原因：
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1=方法1：ルーターを再起動する
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step1=モデムおよびルーターの電源プラグをコンセントから抜きます。
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step2=少なくとも15秒以待ちます。
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step3=モデムを電源コンセントに接続し、1～2分待ってからルーターの電源をオンにします。
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step4=ケーブル モデムのすべてのパネル ライトが緑色に変わるまで待ってから、インターネット接続をテストします。
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2=方法2：アクセス ポイントを移動します。
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step1=可能であれば、アクセス ポイントを移動し、アクセス ポイントおよびコンピューターの間にある壁などの障害物の数を減らします。
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step2=可能であれば、コンピューターをアクセス ポイントに近づけます。
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step3=可能であれば、アクセス ポイントを自宅や部屋の中央に移動し、可能であれば高い位置に移動します。隅や机の下に置くと、Wi-Fi信号強度が低下することがあります。
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendations=おすすめ：
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.title=Wi-Fi信号強度が弱いです
exp.mgmt.troubleshoot.network.wifispeedisslow.cause1=アクセス ポイントが壁や障害物の陰になっている可能性があります。
exp.mgmt.troubleshoot.network.wifispeedisslow.cause2=ルーターのファームウェアが古くなっている可能性があります。
exp.mgmt.troubleshoot.network.wifispeedisslow.description=過去24時間以内にWi-Fiの公称速度が遅いと報告されました。
exp.mgmt.troubleshoot.network.wifispeedisslow.possibleCauses=自宅のネットワークで考えられる原因：
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation1=モデムおよびルーターを再起動する
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation1.step1=最初にモデムの電源をオフにしてから、ルーターの電源をオフにします。
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation2=ルーターを移動する
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation2.step1=ルーターを自宅やオフィスの別の場所に移動するか、アンテナを調整して向きを変えてください。
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation3=ルーターのファームウェアを更新する
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation3.step1=ルーターのファームウェアを定期的に更新することで、バグを修正して接続の問題を解消することができます。一部のルーターでは自動更新が行われますが、ほとんどのルーターでは手動で更新を行う必要があります。
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation4=ルーターの周波数を変更する
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation4.step1=Wi-Fiルーターは自動的に周波数帯域を選択しますが、2.4 GHzから5 GHzに変更してみて、速度が向上するかどうかを確認することができます。ただし、その前にお使いのルーターが5 GHzに対応しているかどうかを確認してください。
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation5=Wi-Fiドライバーを更新する
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation5.step1=ドライバーが古い場合や破損している場合は、ネットワークに問題が生じる原因になることがあります。必ずWi-Fiアダプターが最新であることを確認してください。
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation6=干渉を避ける
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation6.step1=チャネルの干渉が発生すると、スループットが大幅に低下し、データ転送が遅くなる場合があるため、干渉の可能性がある場合はなくすようにしてください。
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation7=他のデバイスを確認する
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation7.step1=ネットワークに接続されている他のデバイスおよびその動作を確認します。たとえば、別のデバイスが大量のデータをダウンロードしている場合、速度に影響を及ぼしている可能性があります。
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendations=おすすめ：
exp.mgmt.troubleshoot.network.wifispeedisslow.title=Wi-Fiが低速です
