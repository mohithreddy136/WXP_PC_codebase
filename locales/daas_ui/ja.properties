wex.fleet.mgmt.recommended.desc.antivirus_not_enabled=[Microsoft Defender]を有効にすると、マルウェアなどのセキュリティ脅威に対する基本的な保護機能が提供されます。
wex.fleet.mgmt.recommended.desc.antivirus_not_enabled_other=ウイルス対策ソフトウェアを有効にすることで、デバイスをマルウェアから保護し、システムを攻撃から安全に保つことができます。
wex.fleet.mgmt.recommended.desc.antivirus_signature_outdated=マルウェア シグネチャを定期的に更新することで、[Windows Defender]が最新の脅威を検出して保護することができます。
wex.fleet.mgmt.recommended.desc.antivirus_signature_outdated_other=マルウェア シグネチャを最新の状態に保つことで、最新の脅威に対する包括的な保護を実現できます。
wex.fleet.mgmt.recommended.desc.avg_fan_speed_high=ファンの速度が高くなる問題に対処することで、過熱およびデバイスの内部コンポーネントの損傷を防ぐことができます。
wex.fleet.mgmt.recommended.desc.battery_calibrate=バッテリを調整することで、電力の読み取り精度が向上し、バッテリの寿命およびパフォーマンスが改善されます。
wex.fleet.mgmt.recommended.desc.battery_early_detection_wear=バッテリ消耗の問題に対処することで、デバイスの効率的な動作、一貫性のあるパフォーマンス、およびバッテリ寿命の延長が可能になります。
wex.fleet.mgmt.recommended.desc.battery_needs_attention=Replacement of defective batteries can ensure good device performance, and system health. Devices which are covered by warranty may be eligible for battery replacement.
wex.fleet.mgmt.recommended.desc.bitlocker_encryption_not_enabled=BitLockerを有効にすることで、ドライブの暗号化により機密データが保護され、不正アクセスに対する全体的なセキュリティが強化されます。
wex.fleet.mgmt.recommended.desc.bsod_occured=ブルー スクリーン エラーを解決することで、システムの安定性の確保、予期しないシャットダウンの防止、および信頼性の維持を実現できます。
wex.fleet.mgmt.recommended.desc.cpu_utilization_high=CPU使用率が高い問題を分析することで、パフォーマンスのボトルネックを防止し、システムのスムーズな動作を維持できます。
wex.fleet.mgmt.recommended.desc.disk_needs_attention=Disk performance is degrading and may soon lead to slower performance or instability if not addressed.
wex.fleet.mgmt.recommended.desc.disk_utilization_high=ディスク容量を解放することで、システムの速度低下が防止され、ストレージの過負荷を回避してスムーズな動作が可能になります。
wex.fleet.mgmt.recommended.desc.docking_station_ac_adapter_failed=アダプターの障害を修正することで、ドッキング ステーションへの一貫した電力の供給を確保し、接続の問題を防止することができます。
wex.fleet.mgmt.recommended.desc.docking_station_ac_adapter_running_at_reduced_perofmance=アダプターのパフォーマンスを強化することで、ドッキング ステーションにおける信頼性に優れた接続および最適な機能性を実現できます。
wex.fleet.mgmt.recommended.desc.docking_station_firmware_out_of_date=ドッキング ステーションのファームウェアを更新することで、デバイスの互換性が確保され、システム全体のパフォーマンスが向上します。
wex.fleet.mgmt.recommended.desc.excessive_os_login_time=ログイン時間を短縮することで、システム アクセス時の遅延が低減し、ユーザーの効率が向上します。
wex.fleet.mgmt.recommended.desc.excessive_os_shutdown_time=シャットダウン時間を最適化することで、待ち時間が最小限に抑えられ、システムのシャットダウンが効率的に行われます。
wex.fleet.mgmt.recommended.desc.excessive_os_startup_time=起動時間を短縮することで、システムへのアクセスが高速化され、ユーザーの効率および生産性が向上します。
wex.fleet.mgmt.recommended.desc.firewall_disabled=Windowsファイアウォールを有効にすることで、不正アクセスをブロックし、潜在的な脅威からネットワークを保護することができます。
wex.fleet.mgmt.recommended.desc.firewall_signature_outdated=ファイアウォール シグネチャを定期的に更新することで、進化を続ける新たなネットワークの脅威から防御できます。
wex.fleet.mgmt.recommended.desc.frequent_bsod_occured=ブルー スクリーン エラーを解決することで、システムの安定性の確保、予期しないシャットダウンの防止、および信頼性の維持を実現できます。
wex.fleet.mgmt.recommended.desc.frequent_kernel_panic_error=カーネル パニック エラーを解決すると、システムの安定性が向上し、セキュリティが強化され、データ損失を防ぐことができます。
wex.fleet.mgmt.recommended.desc.frequent_network_disconnection=ネットワークの切断が発生しないことで、信頼性を高め、ユーザー体験を向上させ、サービスおよびアプリケーションへの中断のないアクセスが確保されます。
wex.fleet.mgmt.recommended.desc.gpu_health_issue=GPUの問題を修正することで、グラフィックスのパフォーマンスの問題を防止し、ビジュアル アプリケーションのスムーズな動作を維持できます。
wex.fleet.mgmt.recommended.desc.high_collaboration_sw_errors=コラボレーション ソフトウェアの問題を解決することで、シームレスなチームワークおよび持続的な生産性を実現できます。過去7日間に、Teams、Outlook、Zoom、Webex、Chrome、Officeで10回以上ソフトウェア エラーが発生しています。
wex.fleet.mgmt.recommended.desc.high_windows_crash=OSのクラッシュの問題を解決することで、システムの安定性、一貫したパフォーマンス、および中断のないユーザー生産性を実現できます。
wex.fleet.mgmt.recommended.desc.kernel_panic_error=カーネル パニック エラーを解決すると、システムの安定性が向上し、セキュリティが強化され、データ損失を防ぐことができます。
wex.fleet.mgmt.recommended.desc.last_reboot_more_than_21_days=デバイスを再起動すると、一時ファイルの消去およびシステムプロセスの更新が行われ、全体的なパフォーマンスおよび安定性が向上します。
wex.fleet.mgmt.recommended.desc.linux_disk_encryption_not_enabled=ディスク暗号化を有効にすることで、ストレージ デバイスの内容を保護してデータ セキュリティを大幅に向上させることができます。
wex.fleet.mgmt.recommended.desc.linux_firewall_disabled=Linuxファイアウォールを有効にすることで、不正アクセスをブロックし、潜在的な脅威からネットワークを保護することができます。
wex.fleet.mgmt.recommended.desc.linux_secure_boot_not_enabled=セキュア ブートを有効にすることで、起動プロセスで信頼できるソフトウェアのみがロードされるようにして、システムのセキュリティを強化することができます。
wex.fleet.mgmt.recommended.desc.memory_utilization_high=メモリ使用率が高い原因の分析は、システム パフォーマンスや安定性に影響を与える可能性がある問題を見極め、解決する上で役立ちます。
wex.fleet.mgmt.recommended.desc.missing_critical_bios_updates=BIOSの更新を適用すると、システムの安定性、および新しいハードウェアまたはソフトウェアとの互換性が確保されます。
wex.fleet.mgmt.recommended.desc.missing_critical_driver_updates=ドライバーを更新することで、ハードウェアの誤動作を回避し、安全で安定した高性能なシステムを実現できます。
wex.fleet.mgmt.recommended.desc.missing_linux_security_updates=セキュリティ更新プログラムを適用することで、マルウェアやエクスプロイトから保護し、攻撃対象領域を縮小して、システムの保全性を向上させることができます。
wex.fleet.mgmt.recommended.desc.missing_linux_updates=最新の更新プログラムをインストールすることで、カーネル、システム ライブラリー、アプリケーションの脆弱性が修正されます。これにより、お使いのシステムをエクスプロイト、マルウェア、不正アクセスから保護できます。
wex.fleet.mgmt.recommended.desc.missing_windows_security_updates=セキュリティ更新プログラムを適用することで、最新の脅威および脆弱性から保護し、システムを攻撃から安全に保つことができます。
wex.fleet.mgmt.recommended.desc.missing_windows_updates=最新の更新プログラムをインストールすることで、脆弱性が修正され、システムの安全性および機能性が維持されます。
wex.fleet.mgmt.recommended.desc.poor_network_signal_strength=高い信号強度によって安定した信頼性の高い接続を確保し、オンライン アクティビティの中断を最小限に抑えることができます。
wex.fleet.mgmt.recommended.desc.poor_nominal_speed=タスクの効率的な実行、クラウド サービスへのアクセス、および中断のない同僚とのコラボレーションには、信頼性の高い高速インターネットが不可欠です。
wex.fleet.mgmt.recommended.desc.unauthenticated_connection=認証を求めることで、組織は不正デバイスのネットワーク接続を防ぎ、潜在的なセキュリティ違反のリスクを軽減することができます。
wex.fleet.mgmt.recommended.desc.windows_secure_boot_not_enabled=セキュア ブートを有効にすることで、ファームウェアおよびオペレーティング システムの不正な変更が防止され、システムのセキュリティが強化されます。
