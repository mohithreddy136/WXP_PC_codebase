account_management.subscriptions.addon.anyware.azure_notice=現在、ライセンスは[Azure Marketplace]でのみ提供されています。HP Anyware Standardライセンスには、[HP Anyware Manager Enterprise]へのアクセス権が含まれています。
account_management.subscriptions.addon.anyware.desc=チームのリモート デスクトップの管理およびプロビジョニングを行います。エンド ユーザーはVPNを使用せずにデスクトップに安全にアクセスできます。[HP Anyware]を[WXP]と統合すると、リモート フリートを1か所で監視できます。
account_management.subscriptions.addon.anyware.desc.short=デスクトップへの安全なアクセス、管理、および監視
account_management.subscriptions.addon.anyware.enterprise.header=HP Anyware Manager Enterprise
account_management.subscriptions.addon.anyware.features.automation=タスクの自動化
account_management.subscriptions.addon.anyware.features.automation.desc=独自の管理者ワークフローを管理プレーンにシームレスに統合します
account_management.subscriptions.addon.anyware.features.multitenant_rbac=マルチテナントおよび役割ベースアクセス制御
account_management.subscriptions.addon.anyware.features.multitenant_rbac.desc=[HP Anyware Manager Enterprise]の単一のインスタンスで複数の組織を管理します。役割に基づいて管理者に権限を割り当てます
account_management.subscriptions.addon.anyware.features.productivity=エンド ユーザーの生産性を実現
account_management.subscriptions.addon.anyware.features.productivity.desc=エンド ユーザーは、パフォーマンス ニーズやネットワーク条件に関係なく、ローカルにあるかのようにデスクトップを扱うことができます。
account_management.subscriptions.addon.anyware.features.provision_desktops=物理デスクトップおよび仮想デスクトップの管理
account_management.subscriptions.addon.anyware.features.provision_desktops.desc=IT部門は、[HP Anyware Manager Enterprise]で、リモート デスクトップの構成および監視を行えます。また、エンド ユーザーへの仮想デスクトップのプロビジョニングをいつでも行えます。
account_management.subscriptions.addon.anyware.features.remote_access=エンド ユーザーに安全なリモート アクセスを提供
account_management.subscriptions.addon.anyware.features.remote_access.desc=エンド ユーザーはVPNを使用せずにデスクトップに安全にアクセスできます。HP Anywareは、クラウド ゲートウェイを介した簡素化されたアクセスを提供します。
account_management.subscriptions.addon.anyware.features.role_access.desc=他の環境にゲートウェイを設置することなく、ユーザー割り当てとセッション ルーティングを実行します
account_management.subscriptions.addon.anyware.features.role_cloud_gateways=クラウド ゲートウェイを介した簡素化されたアクセス
account_management.subscriptions.addon.anyware.features.setup=IT環境を選ばず、セットアップがシンプルに
account_management.subscriptions.addon.anyware.features.setup.desc=オンプレミス、クラウド、およびハイブリッド環境などの多様なインフラストラクチャでの導入および管理を簡素化し、ITの複雑さおよびフットプリントを削減する柔軟で直感的なソリューションです。
account_management.subscriptions.addon.anyware.features.workforce_integration=Workforce Experience統合
account_management.subscriptions.addon.anyware.features.workforce_integration.desc=IT部門は、リモート デスクトップ データを[Workforce Experience Platform]内で一元管理し、最終的にはフリートを一元的に把握できます。
account_management.subscriptions.addon.anyware.header=HP Anyware
account_management.subscriptions.addon.anyware.overview.desc1=[HP Anyware]は、VPNを使わずに、ユーザーにリモート デスクトップや仮想デスクトップへのセキュリティ保護されたアクセスを提供する高性能なソフトウェア ソリューションです。[HP Anyware]には、[HP Anyware Manager Enterprise]と呼ばれるIT管理プレーンへのアクセスが含まれています。
account_management.subscriptions.addon.anyware.overview.desc2=[HP Anyware Manager Enterprise]（AME）は、IT部門が物理デスクトップおよび仮想デスクトップの両方の管理を行うためのマルチテナント管理プレーンです。
account_management.subscriptions.addon.anyware.required_components.header=Workforce Experience統合に必要なコンポーネント
account_management.subscriptions.addon.anyware.required_components.li1=HP Anyware Standard
account_management.subscriptions.addon.anyware.required_components.li2=HP Anyware Manager Enterprise
account_management.subscriptions.addon.anyware.security_compliance=セキュリティおよびコンプライアンス
account_management.subscriptions.addon.anyware.security_compliance.desc1=[HP Anyware]は、信頼性の高い保護と業界標準の順守を確実に実現できるように、すべての提供製品でセキュリティとコンプライアンスを重視しています。主な機能には、エンドツーエンドの暗号化、安全なリモート アクセス、多要素認証、データの完全性と機密性の保護などがあります。
account_management.subscriptions.addon.anyware.security_compliance.desc2=また、[HP Anyware]はリスクをプロアクティブに緩和するために、高度な脅威の検知と対応の機能と連携します。GDPR、HIPAA、SOC2などの法規制を遵守することは、厳しいセキュリティ上の取り決めを支持することに対する[HP Anyware]のコミットメントを明確に示しています。継続的な監視と定期的なセキュリティ監査により、[HP Anyware]製品は新たに現れるサイバー攻撃の脅威に対するレジリエンスを維持することで、ユーザーに安全で信頼性の高いIT管理環境を提供しています。
account_management.subscriptions.addon.anyware.technology=リモーティングテクノロジー
account_management.subscriptions.addon.anyware.technology.desc=[HP Anyware]の受賞歴のあるPCoIP®リモート ディスプレイ テクノロジーは、厳しいネットワーク条件でも高精細かつ応答性の高いコンピューティング環境を実現します。
account_management.subscriptions.addon.anyware.technology.desc.li1=PCoIP®は、中央のサーバーまたはワークステーションからの画像画素のエンコード、圧縮、暗号化、および伝送を行います。
account_management.subscriptions.addon.anyware.technology.desc.li2=その後、ほとんどすべてのエンドポイントでユーザー向けに画像の復号と圧縮解除を行います。
account_management.subscriptions.addon.connect_accounts=アカウントの接続
account_management.subscriptions.addon.oob.desc.short=BIOSレベルのリモート制御による高度な診断と修復
account_management.subscriptions.addon.oob.desclaimer1=1. アウトオブバンド診断および修復機能は、ライセンスとして提供され、契約期間は選択できます。また、Intel® vPro® EnterpriseおよびIntel® AMT対応のコンピューターではベンダーに依存しません。ソフトウェア ソリューションの管理と運用には、[Workforce Experience Platform Starter]が必要です。米国、カナダ、EUでは、HPの担当者またはHP販売代理店で購入できます。詳細は、（使用許諾条件/使用許諾契約書（EULA）へのURLリンクを追加）を参照してください。
account_management.subscriptions.addon.oob.desclaimer2=2. 2024年9月24日時点において、電源サイクル制御、非OS制御、BIOS制御、再イメージングを使用しているコンピューター メーカーに関するHPの内部分析に基づきます。
account_management.subscriptions.addon.oob.desclaimer3=3. [HP Insights Agent]は必須であり、これは、デバイスとアプリケーションに関する重要なデータを提供するテレメトリおよび分析アプリケーションです。単独のサービスとしては販売されておりません。また、情報セキュリティに関して、ISO27001、ISO27701、ISO27017、およびSOC2 Type2の認証を取得しています。インターネットにアクセスして、ポータルに接続する必要があります。詳細なシステム要件については、http://www.hpdaas.com/requirementsをご覧ください。[HP Insights Agent]に対応するサービスを購入するには、各デバイスでソフトウェアを有効化して実行する必要があります。[HP Services Scan]は、特定のHPハードウェアにおいてWindows Updateを通じて提供されます。権利情報に基づいて、各ハードウェア デバイスで有効化されたサービスが購入済みかどうかを確認し、該当するソフトウェアを自動的にダウンロードします。この機能を無効化するには、<a target='_blank' href='http://www.hpdaas.com/requirements' style=\"text-decoration:none; color:#4D52E5\">http://www.hpdaas.com/requirements</a>に記載されている手順を実行します。
account_management.subscriptions.addon.oob.desclaimer4=4. [WXP Starter]が付属しており、これはソフトウェア ソリューションの管理と運用に必要です。
account_management.subscriptions.addon.oob.features.remote_control=Remote control - even when the Operating System is down
account_management.subscriptions.addon.oob.features.remote_control.desc=IT部門は、作業する場所にかかわらずリモートでBIOSにアクセスし、異なる機種が混在するコンピューターの再起動、再イメージング、復旧を行うことができます。
account_management.subscriptions.addon.oob.features.scalable=スケーラブルで一元化された管理
account_management.subscriptions.addon.oob.features.scalable.desc=この機能により、WXPに統合されたエンタープライズ向けの展開、利用、管理で、コンピューターのプロビジョニング、一括ライセンス管理、ロールベースのアクセスを簡素化します。
account_management.subscriptions.addon.oob.features.secure=セキュアなエンド ユーザー体験
account_management.subscriptions.addon.oob.features.secure.desc=ユーザーはリモート セッションを監視して、いつでも接続を切断できます。セキュアでシームレスなサポートによって信頼を構築し、ユーザー体験を向上させます。
account_management.subscriptions.addon.oob.header=アウトオブバンド リモート接続
account_management.subscriptions.addon.oob.overview.desc1=ハイブリッド ワークフォースのデジタル体験の向上をご検討ですか？HPのアウトオブバンド リモート接続では、サポートする技術者がリモートでBIOSにアクセスし、OSが動作していない場合でもコンピューターの再起動、再イメージング、復旧を行うことができます。ユーザーの関与は不要で、リモートで対応できます。
account_management.subscriptions.addon.vyopta.connect_accounts.error=アカウントに接続できませんでした。接続を確認して、もう一度試してください。
account_management.subscriptions.addon.vyopta.connect_accounts.found=[Vyopta]アカウント"<b>{orgName}</b>"が検出されました。[WXP]と接続しますか？
account_management.subscriptions.addon.vyopta.connect_accounts.no_permissions=権限がありません。Vyoptaアカウント管理者連絡してサポートを依頼してください。
account_management.subscriptions.addon.vyopta.connect_accounts.not_found=[{service}]アカウントを自動的に検出することができませんでした。すでに[{service}]カスタマーである場合は、この接続のセットアップをサポートいたしますので、{support_link}にお問い合わせください。
account_management.subscriptions.addon.vyopta.connect_accounts.org_already_mapped=このVyopta IDは、すでに別のテナントにリンクされています。アカウント管理者にお問い合わせの上、サポートを依頼してください。
account_management.subscriptions.addon.vyopta.connect_accounts.request_support={service}アカウント管理者にお問い合わせの上、サポートを依頼してください。
account_management.subscriptions.addon.vyopta.connect_accounts.success=アカウントに正常に接続されました。
account_management.subscriptions.addon.vyopta.connect_accounts.unauthorized=[{service}]で組織が検出されましたが、アカウントの接続に必要な権限をお持ちでないようです。
account_management.subscriptions.addon.vyopta.desc=リアルタイムのインサイトによってコラボレーションを最適化します。Microsoft Teams、Zoom、Poly、Webexにおける通話品質、会議室の使用状況、システム パフォーマンスを監視します。[WXP]と統合すると、IT部門のデジタル操作環境を向上させ、職場の効率性を高める上で役立ちます。
account_management.subscriptions.addon.vyopta.features.comprehensive_monitoring=コラボレーション プラットフォーム全体の包括的な監視
account_management.subscriptions.addon.vyopta.features.comprehensive_monitoring.desc=マルチベンダーによる統合コミュニケーション（UC）環境を包括的に可視化して、ビデオおよび音声コラボレーション ツールの効率的な管理を可能にします。
account_management.subscriptions.addon.vyopta.features.deep_integration=[WXP]との緊密な統合
account_management.subscriptions.addon.vyopta.features.deep_integration.desc=Vyoptaの分析および監視データは[WXP]内にシームレスに組み込まれており、ITチームは他のワークプレース テクノロジーと並行してコラボレーションのパフォーマンスを管理できます。この一元化アプローチにより、IT効率が高まり、複雑さが軽減され、デジタル操作環境の管理が向上します。
account_management.subscriptions.addon.vyopta.features.enhance_user_engagement=ユーザーのエンゲージメントとウェルネスの向上
account_management.subscriptions.addon.vyopta.features.enhance_user_engagement.desc=コラボレーション分析を使用して、生産性の阻害要因を特定し、従業員のエクスペリエンスとウェルビーイングの向上を促進します。
account_management.subscriptions.addon.vyopta.features.optimize_meeting_space=ミーティング スペース使用率の最適化
account_management.subscriptions.addon.vyopta.features.optimize_meeting_space.desc=会議室の稼動率と使用パターンを分析して、不動産投資を最大限に活用し、会議室の効率を向上させます。
account_management.subscriptions.addon.vyopta.features.proactive_issue_detection=プロアクティブな問題検出および解決
account_management.subscriptions.addon.vyopta.features.proactive_issue_detection.desc=リアルタイムの監視機能を活用して、コラボレーション品質の問題をユーザーに影響が及ぶ前に特定および解決し、トラブルシューティングの時間を短縮します。
account_management.subscriptions.addon.vyopta.header=Vyoptaによるコラボレーション環境
account_management.subscriptions.addon.vyopta.overview=コラボレーション ツールの高度な監視機能と分析により、ITチームを後押しします。Vyoptaを[WXP]に統合することで、Microsoft Teams、Zoom、Poly、Webexなどの各種プラットフォームにおける会議室の使用状況、通話品質、システム パフォーマンスをリアルタイムで可視化できます。コラボレーションの問題にプロアクティブに対処し、職場環境を最適化することで、従業員の生産性を向上させます。
account_management.subscriptions.addon.vyopta.short_desc=コラボレーション環境を最適化するための貴重な分析と会議室に関するインサイト
account_management.subscriptions.addon.wolf.desc=コンピューターおよびソフトウェアの組み込みのセキュリティを使用した、展開、可視性、およびエンドツーエンドの保護により、コンピューターの防御を強化します。
account_management.subscriptions.addon.wolf_security=HP Wolf Security
account_management.subscriptions.addon.wolf_security.desc=[HP Wolf]を使用してサイバー攻撃からデバイスを守る卓越したエンドポイント保護。[Workforce Experience]でテレメトリを表示してセキュリティを強化します。
account_management.subscriptions.addon.wpt.desc=紛失または盗難にあったデバイスをリモートで追跡、ロック、保護します。WXPと統合すると、デバイスの電源がオフの場合でも、ITチームがコンピューター資産を追跡し、デバイス紛失のリスクを軽減するのに役立ちます。
account_management.subscriptions.addon.wpt.features.always_available=いつでも使用可能
account_management.subscriptions.addon.wpt.features.always_available.desc=コンピューターの電源がオフの場合やインターネットに接続されていない場合、起動しない場合でも、カスタム ハードウェアおよびソフトウェアを活用して、検索/ロック/消去を実行します。
account_management.subscriptions.addon.wpt.features.message_customization=メッセージのカスタマイズ
account_management.subscriptions.addon.wpt.features.message_customization.desc=ロック解除手順を対象コンピューターにカスタム メッセージで送信
account_management.subscriptions.addon.wpt.features.remote_lock_and_erase=リモート ロックおよび消去
account_management.subscriptions.addon.wpt.features.remote_lock_and_erase.desc=ファームウェア レベルでデバイスをロックしてデータを保護するとともに、盗難に遭ったデバイスを使用不能にします。紛失または盗難に遭ったデバイスのプライマリ ストレージを消去して、データの侵害を防ぎます。
account_management.subscriptions.addon.wpt.features.seamless_integration=[WXP]とのシームレスな統合
account_management.subscriptions.addon.wpt.features.seamless_integration.desc=[WXP]内でデバイスのセキュリティを直接管理し、IT運用とエンドポイント管理を合理化します。
account_management.subscriptions.addon.wpt.features.separations_of_duties=責務の分離
account_management.subscriptions.addon.wpt.features.separations_of_duties.desc=ロック/消去には複数の承認者が必要なため、誤操作や内部からの脅威を防ぐことができます。
account_management.subscriptions.addon.wpt.features.strong_audit_trail=強力な監査証跡
account_management.subscriptions.addon.wpt.features.strong_audit_trail.desc=コンプライアンスの証明として、[WXP]プラットフォームにおけるロックおよび消去の実行が成功したことをログに記録します。
account_management.subscriptions.addon.wpt.header=HP Wolf Protect and Trace with Wolf Connect
account_management.subscriptions.addon.wpt.overview=[HP Wolf Protect & Trace]により、資産管理を強化し、データ侵害のリスクを低減します。WXPに統合されたこのユニークなソリューションにより、ITチームは、電源がオフの場合でも、紛失または盗難に遭ったデバイスの位置の特定、ロック、データ消去が可能です。グローバルなカバレッジおよびシンプルな管理は、あらゆる規模のお客様に最適です。
account_management.subscriptions.addon.wpt.requirements.purchase=HPの営業担当者または認定チャネル パートナーから新しいHP製コンピューターを購入する必要があります。<br>「無線WAN」表示オプションを搭載したサポートされているコンピューターが必要です。サポートされているコンピューター： https://www.hpwolf.com/en/legal/ptwc/platforms
account_management.subscriptions.addon.wpt.short_desc=コンピューターの電源がオフのときでも、リモートで追跡、ロック、および消去
