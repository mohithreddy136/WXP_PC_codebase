azureonboard.marketing.employeesection.description=すべてのデバイスに関するハードウェア、アプリケーション、および従業員エクスペリエンスの調査の相関関係を通じて、従業員のデジタル エクスペリエンスを収集、測定、および管理します。
azureonboard.marketing.employeesection.heading=Proactive Employee Insight
azureonboard.marketing.hardwaresection.description=デバイスのハード ドライブ、CPU使用状況、温度レベル、およびバッテリの状態をプロアクティブに監視し、2000万台以上のデバイス データ レイクと比較してデータを分析することで潜在的な影響を予測することができます。
azureonboard.marketing.hardwaresection.heading=Proactive Hardware Insight
azureonboard.marketing.insightsection.description=パフォーマンスの問題、ソフトウェア エラー、ブルースクリーンによるクラッシュ、およびシステムの使用状況を診断し、同時にドライバーおよびパッチをアップデートして、安全なセキュリティ プロファイルを確実に維持します。
azureonboard.marketing.insightsection.heading=Proactive Application Insight
azureonboard.marketing.learnmoresection.content=2000万台以上のデバイスおよび数十億のデータ ポイントから知識を収集する[HP Proactive Insights]は、[HP TechPulse]分析プラットフォームを活用して、従業員に影響がおよぶ前に問題を特定して解決します。
azureonboard.marketing.learnmoresection.description=HPは、コンピューターのパフォーマンス、セキュリティ、コスト、ダウンタイム、および従業員の満足度を、AIを利用してプロアクティブに管理することで、デバイス管理のパラダイムを変えることができるように支援します。2000万台以上の他のコンピューティング デバイスから取得したインテリジェンスを活用して組織を改善できます。
azureonboard.marketing.learnmoresection.heading=[HP Proactive Insights]は、数十億のデータ ポイントを基にした有意義な分析を提供します。
