wex.fleet.mgmt.recommended.windows_secure_boot_not_enabled=Windowsセキュア ブートの有効化
wex.fleet.mgmt.remediation.kernel_panic_error.desc=カーネル パニックが発生しました。これは、Linuxカーネルで復旧不可能なシステム エラーが発生したことを示しています。これは、ハードウェアの故障、ドライバーの破損、カーネル パラメーターの誤設定、またはカーネル モジュールに互換性がないことが原因である可能性があります。ただちに調査して、根本原因を特定する必要があります。
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt1=パニック発生前のエラー メッセージについては、システム ログ（/var/log/messages、/var/log/syslog、またはjournalctl）を確認してください。
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt2=memtest86やsmartctlなどのツールを使用して、ハードウェアの状態、特にメモリ（RAM）とディスクの整合性を確認します。
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt3=システムの最近の変更（カーネルの更新、ドライバーのインストール、または構成の変更など）を確認します。
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt4=システムが起動できない場合は、レスキュー モードまたはリカバリ モードで起動し、システムにアクセスします。
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt5=互換性が疑われる場合は、カーネル モジュールまたはドライバーを元に戻すか更新してください。
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt6=問題が解決しない場合またはハードウェア固有の問題の場合は、ベンダーまたはコミュニティ サポートにお問い合わせください。
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.desc=ディスクの暗号化保護を有効化すると、ディスクに保存されたすべての情報が適切な認証なしでは読み取れない状態となり、保存中の機密データを保護します。これは、機密データや規制データを扱うシステムでは重要なセキュリティ対策です。
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step1=お使いのLinuxディストリビューションに応じて、LUKS（Linux Unified Key Setup）やdm-cryptなどのツールを使用して、ディスク全体の暗号化を実装します。
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step2=ディスク全体の暗号化が不可能な場合、機密性の高いパーティション（/home、/var、または/data）を暗号化します。
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step3=セキュアなキーの管理を設定します。これにはパスフレーズ、または利用可能な場合はTPM（Trusted Platform Module）との統合が含まれます。
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step4=暗号化キーを安全にバックアップすることで、キーの紛失時のデータ損失を防止します。
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step5=暗号化の設定をテストして、システムが正常に起動し、認証後にデータにアクセスできることを確認します。
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step6=コンプライアンスおよび事業継続のための文書暗号化の構成と復旧手順。
wex.fleet.mgmt.remediation.linux_firewall_disabled.step1=お使いのLinuxディストリビューションに応じて、firewalld、ufw、iptablesなどのファイアウォール ツールをインストールして設定してください。
wex.fleet.mgmt.remediation.linux_firewall_disabled.step2=ファイアウォール サービスを起動時に開始するように設定する
wex.fleet.mgmt.remediation.linux_firewall_disabled.step3=ファイアウォール ルールを定義し、必要なサービス（SSH、HTTP/HTTPSなど）のみを許可し、その他はすべてブロックします。
wex.fleet.mgmt.remediation.linux_firewall_disabled.step4=次のように、ファイアウォールの状態とルールを確認します。sudo firewall-cmd --list-all（firewalldの場合）、sudo ufw status（ufwの場合）
wex.fleet.mgmt.remediation.linux_firewall_disabled.step5=ファイアウォールの設定を定期的に監査し、セキュリティ ポリシーと運用の必要性に合致していることを確認します。
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.desc=セキュア ブートを有効化すると、ブートローダー、カーネル モジュール、およびドライバーのデジタル署名を検証することで、起動プロセス中に不正または悪意のあるコードからシステムを保護する効果があります。これにより、特にエンタープライズ環境やコンプライアンス重視の環境で、システムの完全性とセキュリティが強化されます。
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step1=UEFIファームウェアのセキュア ブートの対応を確認し、UEFI設定で有効化されていることを確認します。
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step2=セキュア ブートに対応した署名済みブートローダーとカーネル パッケージをインストールして設定します（shimおよび署名済みGRUBなどを使用）。
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step3=カーネル、モジュール、および必要なすべてのコンポーネントが署名済みであることを確認します。
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step4=mokutilを使用して再起動し、セキュア ブートの状態を確認します。
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step5=非標準コンポーネントを使用する場合は、カスタム キーを登録します。
wex.fleet.mgmt.remediation.missing_linux_security_updates.desc=システムに1つ以上の重要なセキュリティ更新プログラムが適用されていません。これらの更新プログラムは、オペレーティング システム、カーネル、およびインストール済みのパッケージにおける既知の脆弱性に対処します。これらを適用しない場合、システムが不正アクセス、データ侵害、またはサービス中断にさらされる恐れがあります。
wex.fleet.mgmt.remediation.missing_linux_security_updates.step1=システムのパッケージ マネージャー（apt、yum、dnf、zypperなど）を使用して、適用されていないセキュリティ パッチを確認し、特定してください。
wex.fleet.mgmt.remediation.missing_linux_security_updates.step2=既知の脅威や脆弱性を軽減するため、すべての重要なセキュリティ更新プログラムをただちに適用してください。
wex.fleet.mgmt.remediation.missing_linux_security_updates.step3=必要に応じてシステムを再起動します。特に、カーネルやコア サービスの更新後は必ず再起動してください。
wex.fleet.mgmt.remediation.missing_linux_security_updates.step4=自動セキュリティ更新を有効にするか、定期的なパッチ適用スケジュールを設定して、適時に保護されるようにします。
wex.fleet.mgmt.remediation.missing_linux_security_updates.step5=ログでパッケージのバージョンを調べ、更新が正常に行われたことを確認してください。
wex.fleet.mgmt.remediation.missing_linux_security_updates.step6=更新後に脆弱性スキャンを実行して、残存リスクがないことを確認します。
wex.fleet.mgmt.remediation.missing_linux_updates.desc=システムに重要なLinux更新プログラムが1つ以上不足しています。これらの更新には、セキュリティ パッチ、カーネル修正、安定性の改善などが含まれている場合があります。古いシステムを実行し続けると、脆弱性、システム クラッシュ、互換性の問題が発生するリスクが高まります。
wex.fleet.mgmt.remediation.missing_linux_updates.step1=パッケージ マネージャー（yum、dnf、apt、zypperなど）を使用して、利用可能な更新を確認し、不足している重要なパッチを特定します。
wex.fleet.mgmt.remediation.missing_linux_updates.step2=既知の脆弱性を軽減するために、すべてのセキュリティとカーネルの更新をできる限り早く適用してください。
wex.fleet.mgmt.remediation.missing_linux_updates.step3=必要に応じてシステムを再起動します。特に、カーネルやコア システムの更新後は必ず再起動してください。
wex.fleet.mgmt.remediation.missing_linux_updates.step4=自動更新を有効にするか、定期的なパッチ適用スケジュールを設定して、今後の更新が適時に適用されるようにしてください。
wex.fleet.mgmt.remediation.missing_linux_updates.step5=システム ログで現在のカーネルとパッケージのバージョンを確認し、更新が正常に行われたことを検証します。
wex.fleet.mgmt.remediation.network_connection_not_secure.desc=過去24時間以内に、期待されるセキュリティが確保されていないネットワーク接続が報告されました。
wex.fleet.mgmt.remediation.network_connection_not_secure.desc1=過去7日間に、認証されていない接続が検出されました。
wex.fleet.mgmt.remediation.network_disconnections.desc=デバイスが過去24時間以内にネットワークの切断が繰り返し発生したことを報告しました。
wex.fleet.mgmt.remediation.network_disconnections.desc1=過去7日間に、ネットワークの切断が検出されました。
wex.fleet.mgmt.remediation.network_speed_slow.desc=過去24時間以内にネットワークの公称速度が遅いことが報告されました。
