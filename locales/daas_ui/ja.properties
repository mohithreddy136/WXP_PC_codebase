wpt.details.desc=世界で最も安全な検索、ロック、消去サービスの[HP {appName}]で、データを確実に保護し、HPデバイスのフリートを追跡し、ネットワーク上のファイルおよびドキュメントに権限のないユーザーがアクセスできないようにします。[HP Workforce Experience Platform]を使用する[HP {appName}]は、PCがオフラインまたは電源オフのときでも機能する、ハードウェア強制型のデバイスの位置探索、ロック、消去に関する包括的なサービスを提供します。
wpt.details.header=防御の最前線を確立
wpt.disclaimer.point1=検索、ロック、およびワイプのソフトウェア サービスに関するHPの社内分析に基づきます。2021年10月の時点において、暗号および持続性（ハードウェア強制型持続性を含む）に基づく、最も安全なもの。
wpt.disclaimer.point2=[HP {appName}]は、一部のHP 600、800、1000、WindowsベースのElite Dragonflyノートパソコン、一部の800デスクトップ、Z1 G8ワークステーションで利用でき、デバイスの電源をオンにし、インターネットに接続すると機能します。
wpt.disclaimer.point3=[HP Workforce Experience Platform]は、デバイスおよびアプリケーションに関する重要なデータを提供する遠隔測定および分析プラットフォームであり、単体のサービスとしては販売されていません。[HP Workforce Experience Platform]は、厳格なGDPRプライバシー規制に従っており、情報セキュリティに関してISO27001、ISO27701、ISO27017およびSOC2 Type2の認証を受けています。インターネットにアクセスして[Workforce Experience Platform]ポータルに接続する必要があります。詳細なシステム要件については、<a href=\"{link}\" target=\"_blank\" style=\"text-decoration: none; color: #027aae; cursor: pointer;\">{text}</a>をご覧ください。
wpt.disclaimer.point4=ハードウェア強制型とは、本サービスと互換性のあるHP PCで利用できる[HP Sure Run]第4世代以降を指し、Windows 10以降が必要です。
wpt.disclaimer.point5=HPハードウェア サポートのサービス レベルおよび応答時間は、お客様の地域によって異なる場合があります。サービスの開始日は、ハードウェアの購入日です。制限事項および制約事項が適用されます。詳しくは、<a href="https://www.hp.com/go/cpc" target="_blank" style="text-decoration: none; color: #027aae; cursor: pointer;">www.hp.com/go/cpc</a> を参照してください。HPのサービスは、ご購入時にお客様に提供または提示される、適用可能なHPサービス使用条件に準拠します。お客様は、該当する現地の法律によっては、さらに法令上の権利を有する可能性があります。その権利は、いかなる形でも、サービスのHPの販売条件やHP製品に付属するHP限定保証によって影響されません。
wpt.explore.header=ソリューションを探す
wpt.feature.cost.desc=大切なPCを紛失すると、購入費用以上のコストがかかります。[HP {appName}]は、PCの紛失に関連するリスクおよびコストを軽減するのに役立ちます。紛失または盗難にあったPCの場所を特定し、データを簡単にロックまたは消去するための総合的な方法が利用できるようになりました。
wpt.feature.cost.title=コストも心配も減らします
wpt.feature.data.desc=しきい値暗号を用いた最も安全なサービスを利用し、すべてのHPデバイスのデータを検出、ロック、消去することで、お客様の機密情報を確実に保護することができます。
wpt.feature.data.title=ユーザー デバイスおよびデータの保護
wpt.feature.monitoring.desc=[HP Workforce Experience Platform]の簡素化されたユーザー ダッシュボードを使用すると、ITDMはデバイスの紛失や盗難に迅速に対応し、使いやすい1つのプラットフォームからすべてのデバイスの状態と保護の状況を監視することができます。
