side_panal.smart_refresh.hardware_personas_sub_text=ハードウェアの使用状況に基づいてAI駆動型デバイス クラスターによって識別されました
side_panal.smart_refresh.help_sec1_description=3つの手順：識別、分類、推奨
side_panal.smart_refresh.help_sec1_header=ご利用手順
side_panal.smart_refresh.help_sec1_point_1_desc=[緊急度スコアの更新]で要約されている、9つのデータ ポイントで各デバイスを評価します*。このスコアにより、ユーザーに生産性の中断が発生しないように、リスクのある個別デバイスを優先させることができます。
side_panal.smart_refresh.help_sec1_point_1_title=1. 特定
side_panal.smart_refresh.help_sec1_point_2_desc=使用率に基づいて、AIモデルがデバイスをハードウェア ペルソナとソフトウェア ペルソナに分けてグループ化します。これらのペルソナにより、適切な交換デバイスを特定できます。
side_panal.smart_refresh.help_sec1_point_2_title=2. 分類
side_panal.smart_refresh.help_sec1_point_3_desc1=HPパートナーと連携している場合、[スマートリフレッシュ]に各デバイスの交換が表示されます。これらの推奨事項は、貴社のパートナーがアップロードしたカタログに掲載されている、関連ペルソナのトップ パフォーマンス モデルに関するものです。デバイスの推奨事項が表示されない場合、または表示されているデバイスが古い場合は、貴社のパートナーに問い合わせて最新カタログをアップロードするよう依頼してください。
side_panal.smart_refresh.help_sec1_point_3_desc2=HPパートナーと連携していない場合、[スマートリフレッシュ]にデバイスの推奨事項は表示されません。HPアカウント担当者に連絡して、最適な交換モデルを確認してください。
side_panal.smart_refresh.help_sec1_point_3_desc3=最後のカタログ アップロード日：
side_panal.smart_refresh.help_sec1_point_3_title=3. 推奨
side_panal.smart_refresh.help_sec1_point_4_desc=[完了]の更新ステータスを使用して、更新する必要がないコンピューターや現時点で更新できないコンピューターを削除します。これらのデバイスを表示し、ステータスを[操作が必要]に戻すと、コンピューター リストに再び表示されます。
side_panal.smart_refresh.help_sec1_point_4_title=4. ステータス
side_panal.smart_refresh.help_sec2_description=デバイスを交換する必要があるタイミングを判断する方法
side_panal.smart_refresh.help_sec2_header=緊急度スコアの更新
side_panal.smart_refresh.help_sec2_sub_text=[緊急度スコアの更新]は、9つの領域のデバイスのパフォーマンス データから計算されます。重大度は以下のように数値スコアに対応します。
side_panal.smart_refresh.help_sec2_table_col1=更新の緊急度
side_panal.smart_refresh.help_sec2_table_col2=スコアの更新
