side_panal.smart_refresh.help_sec2_table_low=問題はありません
side_panal.smart_refresh.help_sec2_table_medium=まもなく更新
side_panal.smart_refresh.help_sec3_header=要因
side_panal.smart_refresh.help_sec3_point_1=CPUの使用状況：過去30日間の平均使用割合
side_panal.smart_refresh.help_sec3_point_2=メモリの使用状況：過去30日間の平均使用割合
side_panal.smart_refresh.help_sec3_point_3=ディスクの使用状況：最後に記録された使用割合
side_panal.smart_refresh.help_sec3_point_4=OSクラッシュ：過去7日間のオペレーティング システム クラッシュの合計数
side_panal.smart_refresh.help_sec3_point_5=BSOD：過去7日間のブルー スクリーンの合計数
side_panal.smart_refresh.help_sec3_point_6=起動時間：最後に記録された時間（分単位）
side_panal.smart_refresh.help_sec3_point_7=シャットダウン期間：最後に記録された時間（分単位）
side_panal.smart_refresh.help_sec3_point_8=コラボレーション アプリケーションのソフトウェア エラー：過去7日間のエラーの合計数
side_panal.smart_refresh.help_sec3_point_9=ドッキング ステーションの電源の状態：最後に記録されたデータ、はい/いいえ
side_panal.smart_refresh.help_sec3_sub_text=次の9個の要因がスコアに影響します。それぞれの測定方法についても説明します。
side_panal.smart_refresh.help_sub_title=HPの[スマートリフレッシュ]を使用して、夜間にコンピューターをアップグレードします。ご利用手順について説明します。
side_panal.smart_refresh.personas_header=ペルソナ
side_panal.smart_refresh.personas_sub_text=使用パターンに基づいて決定されたAIベースのデバイス グループ
side_panal.smart_refresh.point_1_desc=ハードウェアの性能、ソフトウェアの可用性、およびセキュリティの観点から、PCの現在の状態を評価します。
side_panal.smart_refresh.point_1_title=1. 評価
side_panal.smart_refresh.point_2_desc=使用状況、業務上の重要性、または経年劣化レベルに基づき、ただちに対処する必要があるPCを優先させます。
side_panal.smart_refresh.point_2_title=2. 優先順位付け
side_panal.smart_refresh.point_3_desc=予定しているアップグレードまたは交換を効率的に実施し、ユーザーが被るダウンタイムおよび中断を最小限に抑えます。
side_panal.smart_refresh.point_3_title=3. 実施
side_panal.smart_refresh.point_4_desc=更新されたPCに、サイバー脅威から保護するための最新のセキュリティ対策機能が搭載されていることを確認します。
side_panal.smart_refresh.point_4_title=4. セキュリティ
side_panal.smart_refresh.point_5_desc=更新したPCが引き続き最適に動作していることを確認するために定期的に監視し、必要に応じて必要なメンテナンスを実行します。
side_panal.smart_refresh.point_5_title=5. 監視およびメンテナンス
