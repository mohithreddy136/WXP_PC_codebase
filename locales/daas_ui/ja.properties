bios.bsod.tooltip.context=BIOSのこの影響は重み付けによって判断され、同じモデルの他のデバイスでアップグレードに近い時期にBSODが発生した場合、重み付けは大きくなります。さらに、重み付けがX%を超える特定のデバイス モデルは「影響高」に分類されます。この影響はデバイス モデルごとに計算され、特定のBIOSバージョンで推奨されるすべてのデバイスに適用されます。BSODの発生が少ないモデルであれば重み付けは小さくなり、よって影響も低くなります。
