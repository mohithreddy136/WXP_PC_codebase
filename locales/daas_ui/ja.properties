dnto.subscriptions.privacy_statement.heading=HPのプライバシーに関する声明
dnto.subscriptions.section.details.desc1=従業員は各自が望むやり方や場所で柔軟に働くことに慣れており、こうした働き方を求めています。ITチームが限界を超えている状態では、従業員のエクスペリエンス、生産性、およびエンゲージメントに支障が生じます。
dnto.subscriptions.section.details.desc2=[HP Workforce Experience Pro]は、統合されたモジュラー式プラットフォームのデジタル フリクションをインテリジェントに予測して解消します。
dnto.subscriptions.section.details.desc3=1つの場所で小規模なチームを管理する場合でも、複雑なグローバル規模のハイブリッド ワークフォースを管理する場合でも、[HP Workforce Experience Pro]は、従業員のデジタル エクスペリエンスをサポートし最適化するための統一的なプラットフォームを提供します。
dnto.subscriptions.section.details.desc4=ITの問題を顕在化する前にプロアクティブに解消することで、従業員の生産性を向上させます。高度なAIを活用してITサポートの時間とコストを削減します。脅威を予測して解消することでエンドポイント セキュリティを強化します。
dnto.subscriptions.section.details.desc5=パルス サーベイの実用的なインサイトを活用して従業員のセンチメントを改善します。ハードウェアのスマートリフレッシュによりコストを最適化します。既存のマルチベンダーおよびマルチOS環境とシームレスに統合できます。
