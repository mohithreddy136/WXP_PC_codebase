exp.GpuHealthIssue.blueScreenLink=https://docs.microsoft.com/en-us/windows-hardware/drivers/debugger/-analyze
exp.GpuHealthIssue.blueScreenLinkText=https://docs.microsoft.com/en-us/windows-hardware/drivers/debugger/-analyze
exp.GpuHealthIssue.causeBlueScreenErrors=ブルー スクリーン エラー：ブルー スクリーン エラーは、グラフィックスを多用するプログラムや視覚効果が多すぎること、またはドライバーやハードウェアの問題が原因で発生する可能性があります。
exp.GpuHealthIssue.causeDoubleBitEcc=ダブル ビットECCメモリ エラー：グラフィックス カードでダブル ビットECCメモリ エラーが発生しています。これは、ハードウェアの問題またはメモリの故障を示している可能性があります。
exp.GpuHealthIssue.causeHighDoubleBitEccOverTime=長期にわたって多数のダブル ビットECCメモリ エラーが発生：グラフィックス カードで多数のダブル ビットECCメモリ エラーが発生しており、エラーの平均回数が3週間以上にわたって増加しています。
exp.GpuHealthIssue.causeHighTdrEvents=多数のTDR（ディスプレイ ドライバーのタイムアウトおよび復元）イベント：グラフィックス カードで多数のTDRイベントが発生しています。これは、ドライバーやハードウェアに問題がある可能性を示しています。
exp.GpuHealthIssue.causeMissingDriverUpdate=重要なドライバーの更新が適用されていない：グラフィックス カード ドライバーの重要な更新が適用されていません。これは、パフォーマンスや安定性に影響を及ぼす可能性があります。
exp.GpuHealthIssue.causeThermalIssues=温度に関する問題：グラフィックス カードで多数の温度の問題が発生しており、GPUまたはメモリの温度が最大動作温度を超えています。
exp.GpuHealthIssue.driverOption1=方法1：[HP Image Assistant]を使用してドライバーを更新します
exp.GpuHealthIssue.driverOption2=方法2：[Windows Update]を使用してドライバーを更新します
exp.GpuHealthIssue.possibleCauses=考えられる原因：
exp.GpuHealthIssue.remediationBlueScreenPrefix=ブルー スクリーン エラーの場合：同時に動作しているグラフィックスを多用するプログラムや視覚効果が多すぎないか確認します。グラフィックス カード ドライバーを更新し、オーバークロック設定を初期設定にリセットして、ドライバーをクリーン インストールするか、設定を出荷時の初期設定にリセットして、電源供給が適切であることを確認し、通気口とファンを清掃します。ミニダンプ ファイルを分析し、修復手順を確認します。
exp.GpuHealthIssue.remediationDoubleBitEcc=ダブル ビットECCメモリ エラーの場合：状況の監視を続け、パフォーマンスの低下が続くかどうかを確認します。エラーの数が多い状態が続く場合は、グラフィックス カードの交換を検討します。
exp.GpuHealthIssue.remediationMissingDriver=ドライバーの更新が適用されていない場合：パフォーマンスの問題に対処するには、グラフィックス カード ドライバーを最新バージョンに更新します。
exp.GpuHealthIssue.remediationTdr=TDRイベントの場合：監視を続け、問題が解消しない場合はグラフィックス カード ドライバーを更新します。グラフィックス設定を初期設定にリセットし、オーバークロック設定を初期設定にリセットして、BIOSを更新し（更新が利用可能な場合）、電源供給が十分で空気の流れが適切であることを確認します。通気口とファンを清掃します。
exp.GpuHealthIssue.remediationThermal=温度に関する問題の場合：通気が妨げられていないか確認し、通気口を清掃します。ファンが正しく動作し、汚れていないことを確認します。
exp.GpuHealthIssue.suggestedRemediations=推奨修復案：
exp.GpuHealthIssue.title=GPUの状態への対処
exp.HpBatteryHealthManagerNotEnabled.causeNotCompatible=デバイスがHPバッテリ状態マネージャーと互換性がない。
exp.HpBatteryHealthManagerNotEnabled.causeRequiresBiosUpdate=デバイスのBIOSアップデートが必要。
exp.HpBatteryHealthManagerNotEnabled.description=HPバッテリ状態マネージャーは、2016年以降、すべてのHPビジネス ノートブックで利用可能です。バッテリ寿命を改善するには、バッテリ状態マネージャーを有効にすることをお勧めします。
exp.HpBatteryHealthManagerNotEnabled.option1Detail=HPでは、HPバッテリ状態マネージャーを有効にし、使用状況またはデバイスの使用年数に応じて、[HPのバッテリ充電管理を有効にする]または[バッテリの状態を最適化する]のどちらかを選択することをお勧めします。
