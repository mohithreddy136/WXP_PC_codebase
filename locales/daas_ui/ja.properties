dnto.subscriptions.privacy_statement.desc1=HPは、プライバシーが基本的人権の1つであることを認識するとともに、全世界の当社のお客様とパートナー様にとってのプライバシー、セキュリティ、およびデータ保護の重要性を認識しています。当社はグローバル企業であり、国境を越える法人組織、ビジネス プロセス、管理構造、および技術的システムを有しているため、当社のすべての事業にわたって法的最低限を超える保護を提供するとともに、一貫した厳格なポリシーと手順を導入することを目指します。
dnto.subscriptions.privacy_statement.desc2=本声明で使用される、「当社」および「会社」などの用語は、地域の法律の規定に従い、HPブランドの企業および現在および将来の関連会社を指します（本声明では「HP」という）。HPのデータ保護責任者の連絡先情報は、以下の「{0}」セクションに記載されています。
