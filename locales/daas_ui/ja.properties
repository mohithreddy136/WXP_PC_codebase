dnto.subscriptions.about_hp.desc1=HPは、企業が果たすべき役割は利益を得ることだけではないという信念のもとに生まれたテクノロジー企業です。企業は世界をより良いものにしていく必要があります。気候変動対策、人権、およびデジタル エクイティにおける当社の取り組みは、HPがこのことを全力で体現しようとしていることを実証しています。
dnto.subscriptions.about_hp.desc2=これまでの80年以上にわたる活動の実績から、HPはイノベーションが人類に多大な貢献をもたらす世界が実現することに自信を持っています。
dnto.subscriptions.about_hp.desc3=HPのテクノロジー（パーソナル システム、プリンター、および3Dプリント ソリューションの製品およびサービス ポートフォリオ）は、こうした有意義な進歩を促進するために開発されています。
dnto.subscriptions.about_hp.desc4=思慮深いアイデアは、いつでも、どこでも、誰でも思いつくでしょう。
dnto.subscriptions.about_hp.desc5=必要なのは世界を変えることだけです。
