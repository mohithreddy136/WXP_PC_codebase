requirements.list.proSecurity.windows.supportLifecycle.content1=HPのサービス レベル目標（SLO）では、Windows 10の半期チャネル リリースのうち、最新の3リリースに対するサポートを提供します。
requirements.list.proSecurity.windows.supportLifecycle.content2=HPでは、[HP Wolf Pro Security]の脅威封じ込め機能の新しいOSリリースに対するサポートを、半期チャネル（\"SAC\"）が利用可能になってから30日以内に提供することを目標としています。中間リリースまたはプレリリースのWindows Insiderのビルドはサポート対象外です。Windows OSリリースについて詳しくは、<a href='https://docs.microsoft.com/en-us/windows/release-information/' target='_blank'>https://docs.microsoft.com/en-us/windows/release-information/</a>を参照してください。
requirements.list.proSecurity.windows.supportLifecycle.content3=古いWindowsのバージョンをお使いのお客様が新しいバージョンにアップグレードするために十分な時間を確保できるよう、HPでは最新の半期チャネル リリースが[HP Wolf Pro Security]で利用できるようになってから少なくとも90日間、最新の4リリース（現時点でWindows 10 v1903まで）に対するサポートを継続します。この期間が経過すると、古いOSリリースでのサポートが終了します。同様のサポート ポリシーが、Windows 10の長期サービス チャネル リリースに対するサポートにも適用されます。従って、前述のポリシーに沿ってシステムをアップデートする必要があります。
requirements.list.proSecurity.windows.supportLifecycle.content4=[HP Sure Click Pro]のWindows 10 v2004に対するサポートは、2020年7月31日に提供開始されました。Windows 10 v1809に対するサポートは、2020年10月31日をもって提供終了します。
requirements.list.proSecurity.windows.supportLifecycle.content5=Windows 7および8.1は、[HPプロアクティブ セキュリティ]ではサポートされません
requirements.list.proSecurity.windows.supportLifecycle.content6=[HP Sure Click Pro]のWindows 10 v20H2に対するサポートは、2020年11月18日に提供開始されました。Windows 10 v1903に対するサポートは、2021年2月16日をもって提供を終了しました。
requirements.list.proSecurity.windows.supportLifecycle.content7=HPは、2021年7月5日に、Windows 10 v21H1向けの[HP Sure Click Pro]の脅威封じ込めサポートをリリースしました。2021年10月3日以降、Windows 10 v1909のサポートは終了します。
