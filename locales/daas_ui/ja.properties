poly.lens.addon.details.description=組織全体のHPコラボレーション デバイス フリートを確実かつ明確に管理します。効率的な展開、容易なメンテナンス、プロアクティブな監視、有意義なインサイトなどにより、ITチームはスペース、部屋、デバイス全体を一元的に管理できます。セキュアなクラウドベースの管理とハイブリッド ワークのシームレスなサポートにより、運用上のオーバーヘッドを削減し、問題を事前に把握して、チームがどこで作業していても一貫した信頼性の高い操作環境を提供できます。
poly.lens.addon.feature.centralized.header=一元的なパーソナル デバイス管理
poly.lens.addon.feature.centralized.text=[HP Poly Studio]のアプリを利用することで、ITチーム側でパーソナル デバイスに対する一元的な可視化と管理を維持しながら、エンド ユーザーにシームレスなセルフサービス体験を提供します。チームがどこで作業していても、インベントリ、更新、監視、インサイトを確実に管理できます。
poly.lens.addon.feature.effortless.maintenance.header=容易なメンテナンス
poly.lens.addon.feature.effortless.maintenance.text=最小限の労力でフリート全体の設定、機能、ソフトウェア更新を管理できます。管理および精度を犠牲にすることなく、設定の適用、更新のステージング、構成の微調整を行うことができます。
poly.lens.addon.feature.meaningful.measurement.header=有意義な測定
poly.lens.addon.feature.meaningful.measurement.text=デバイス、スペース、人員が実際にどのように機能しているかを把握できます。使用率とパフォーマンスのデータを利用し、コラボレーション投資についてのデータに基づいたスマートな意思決定を行うことができます。
poly.lens.addon.feature.proactive.monitoring.header=プロアクティブな監視
poly.lens.addon.feature.proactive.monitoring.text=デバイスの状態とステータスを明確に可視化して、問題を事前に把握できます。問題が発生した場合にアラートが届くため、問題に事前に対処して会議の中断を未然に防ぐことができます。
poly.lens.addon.feature.secure.header=セキュアなクラウドベースの管理
poly.lens.addon.feature.secure.text=企業のセキュリティおよびコンプライアンス ニーズに応えながら、組織の成長に合わせて拡張できる信頼性の高いクラウドベースのプラットフォームですべてを管理できます。
poly.lens.addon.feature.simplified.deployment.header=簡素化された展開
poly.lens.addon.feature.simplified.deployment.text=デバイスのステージング、事前設定、展開を確実に行うことができます。自動化されたオンボーディング ワークフローにより、セットアップ時間が短縮され、エラーをなくし、デバイスがユーザーや部屋に届く前にデバイスを使用可能な状態にします。
poly.lens.addon.subtitle=コラボレーション スペース、部屋、デバイス全体のクラウドベースの管理とインサイト。
