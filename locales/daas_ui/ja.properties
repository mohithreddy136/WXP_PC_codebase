btg.addon.list.feature_one.description=DCTは、HPデバイスが、状況の変化をインテリジェントに管理し、簡素化しながら、発見、接続、コラボレーションを行うための基盤となるメッシュ テクノロジーです。これにより、コンテキスト、状態、機能のリアルタイムの共有が可能になり、スタンドアロンの製品群が、緊密に統合された適応型のエコシステムに変化します。
