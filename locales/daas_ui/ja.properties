exp.CollaborationSoftwareErrorsAreHigh.causeConflicts=各種ソフトウェア アプリケーションや拡張機能（ブラウザー拡張機能やアドインなど）の間に競合が存在すると、コラボレーション ツールの正常な機能を妨げ、複数のエラーが発生する原因になることがあります。
exp.CollaborationSoftwareErrorsAreHigh.causeNetwork=ネットワーク接続に問題（インターネット接続が遅い、安定しないなど）があると、リアルタイムの通信やデータ伝送に依拠しているコラボレーション ツールで中断やエラーが発生する原因になることがあります。
exp.CollaborationSoftwareErrorsAreHigh.causeUpdates=ソフトウェアの更新やパッチ適用を頻繁に行うと、別のバグや新たな互換性の問題が生じ、Teams、Outlook、Zoom、Webex、Chrome、Officeなどのアプリケーションでエラーの発生が増える原因になることがあります。
exp.CollaborationSoftwareErrorsAreHigh.possibleCauses=考えられる原因：
exp.CollaborationSoftwareErrorsAreHigh.remediationConflicts=競合を解決するため、問題のある拡張機能やアドインを無効化または削除し、各種ソフトウェア アプリケーション間の互換性を確保するようにしてください。
exp.CollaborationSoftwareErrorsAreHigh.remediationNetwork=ネットワークの安定性を向上させるため、インターネット接続のアップグレード、接続の問題のトラブルシューティング、およびコラボレーション ツールに適した帯域幅の確保を行うようにしてください。
exp.CollaborationSoftwareErrorsAreHigh.remediationUpdates=ソフトウェアの更新やパッチを定期的にチェックして適用し、ソフトウェアの既知のバグや互換性の問題を解消するようにしてください。
exp.CollaborationSoftwareErrorsAreHigh.suggestedRemediations=推奨修復案：
exp.CollaborationSoftwareErrorsAreHigh.title=コラボレーション ソフトウェアのエラーへの対処
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.appsCausingHighCpu=最も多くのCPUを消費するアプリケーションは、[CPU使用率を上げているアプリ]列で特定できます。
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeBackgroundProcesses=システムの更新、ウイルス対策スキャン、その他のメンテナンス タスクなどのバックグラウンド プロセスやサービスがいくつも動いていると、CPUリソースが大量に使用され、CPU使用率が高くなることがあります。
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeFirmwareBug=ファームウェアのバグにより、CPUが想定レベル以上で動作する可能性があります。
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeMalfunctioningSoftware=適切に最適化されていないソフトウェアや正しく動作していないソフトウェアがあり、ソフトウェアがループから抜け出せなくなったり、リソースが非効率な形で消費されたりすると、CPU使用率が過度に大きくなることがあります。
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeResourceIntensiveApps=ビデオ編集機能、仮想マシン、複雑な計算など、リソースを多用するアプリケーションを実行すると、大量のCPUリソースが消費され、CPU使用率が高くなることがあります。
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.closeHighCpuApps=最も多くのCPUを使用しているアプリケーションを閉じます。
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.connectAcAdapter=デバイスの電源設定によっては、バッテリで駆動しているときにCPUのパフォーマンスが通常より低下する可能性があるため、外部電源アダプターに接続してください。
