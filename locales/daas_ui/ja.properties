partner.exp.mgmt.recommended.desc.AV_NOT_ENABLED=すべてを解決するか、以下の表で今すぐ有効にしないPCを選択解除します。
partner.exp.mgmt.recommended.desc.AV_WD_SIGNATURE=マルウェア シグネチャを最新の状態に保つことで、最新の脅威に対する包括的な保護を実現できます。
partner.exp.mgmt.recommended.desc.AVG_FAN_SPEED_HIGH=ファンの速度が長時間高い場合、デバイスが過熱している可能性があり、コンポーネントが損傷し、寿命が短くなる可能性があります。
partner.exp.mgmt.recommended.desc.BITLOCKER_ENCRYPTION_NOT_ENABLED=暗号化されていないデバイスは、紛失または盗難時にデータが漏洩する可能性があります。
partner.exp.mgmt.recommended.desc.DISK_UTILIZATION_HIGH=空きディスク容量が少ないデバイスは動作が遅くなり、重要なタスクの実行に支障をきたす可能性があります。
partner.exp.mgmt.recommended.desc.DOCKING_STATION_AC_ADAPTER_FAILED=ドッキング ステーションの外部電源アダプターの故障は、ハードウェアの問題を示している可能性があり、デバイスが電源を失ったり、機能が断続的に停止したりする原因となることがあります。
partner.exp.mgmt.recommended.desc.DOCKING_STATION_FIRMWARE_OUT_OF_DATE=ドッキング ステーションのファームウェアが古いと、互換性の問題、機能の制限、またはセキュリティの脆弱性の露呈が生じる可能性があります。
partner.exp.mgmt.recommended.desc.EXCESSIVE_OS_SHUTDOWN_TIME=シャットダウンに時間がかかる場合、アプリケーションが停止している、ハードウェアの動作速度が低下している、ポリシーの更新、スクリプトが長すぎる、またはWindowsタスクが完了していないなどの問題が発生している可能性があります。
partner.exp.mgmt.recommended.desc.EXCESSIVE_OS_STARTUP_TIME=起動に時間がかかる場合、根本的なソフトウェアの競合やハードウェアの問題がある可能性があります。
partner.exp.mgmt.recommended.desc.FIREWALL_DISABLED=[Windows Defenderファイアウォール]が無効になっていると、デバイスがネットワーク上の悪意のある攻撃にさらされる可能性があります。
partner.exp.mgmt.recommended.desc.FIREWALL_SIGNATURE_OUTDATED=ファイアウォールの定義が古いと、デバイスが新しいマルウェアおよびサイバー脅威に対して脆弱になります。
partner.exp.mgmt.recommended.desc.GPU_HEALTH_ISSUE=GPUに問題が検出された場合、視覚的な不具合またはパフォーマンスの問題が発生する可能性や、グラフィックスが完全に表示されなくなる可能性があります。
partner.exp.mgmt.recommended.desc.HIGH_COLLABORATION_SW_ERRORS=コラボレーション ソフトウェアにエラーが頻発すると、チームのワークフローが混乱し、コミュニケーションおよびプロジェクトの進行に支障をきたす可能性があります。
partner.exp.mgmt.recommended.desc.HIGH_WINDOWS_CRASH=予期しないクラッシュおよび再起動は、潜在的な不安定性を示しており、データの損失やハードウェアの恒久的な損傷につながる可能性があります。
partner.exp.mgmt.recommended.desc.LAST_REBOOT_MORE_THAN_21_DAYS=長期間再起動されていないデバイスは、OSの安定性およびパフォーマンスに問題が生じる可能性があります。
partner.exp.mgmt.recommended.desc.MAXIMISE_MY_BATTERY_HEALTH_NOT_ENABLED=バッテリ状態マネージャーが有効になっていない場合、現在のバッテリ寿命に影響が生じることがあります。
partner.exp.mgmt.recommended.desc.MEMORY_UTILIZATION_HIGH=デバイスのメモリ使用率が高い状態が長時間続くと、デバイスの速度が低下し、従業員のパフォーマンスに影響を及ぼす可能性があります。
partner.exp.mgmt.recommended.desc.MISSING_CRITICAL_DRIVER_UPDATES=重要なドライバーの更新が適用されていないと、デバイスのハードウェアが正しく動作しない場合やまったく機能しない場合があります。
partner.exp.mgmt.recommended.desc.MISSING_WINDOWS_SECURITY_UPDATES=セキュリティ更新プログラムが古いと、デバイスがハッカーおよびウイルスに対して脆弱になる可能性があります。
partner.exp.mgmt.recommended.desc.MISSING_WINDOWS_UPDATES=Windowsの更新プログラムが古いと、デバイスが脆弱性およびマルウェア感染の危険にさらされます。
