welcome.banner.description=[HP TechPulse]はデバイスとアプリケーションに関する重大なデータを提供する、遠隔測定と分析のプラットフォームです。IT部門はすぐにディープ ラーニングを利用できるため、ビジネスの成功に欠かせない適切なコンピューター、ソフトウェア、およびサービスを従業員に提供できるようになります。[HP TechPulse]はプロアクティブに問題を特定し、大規模な修正を可能にし、組織のセキュリティに対する体勢をアクティブに監視することによって脅威を最小限に抑えます。
welcome.banner.description_p=[{app_name}]はデバイスとアプリケーションに関する重大なデータを提供する、遠隔測定と分析のプラットフォームです。IT部門はすぐにディープ ラーニングを利用できるため、ビジネスの成功に欠かせない適切なコンピューター、ソフトウェア、およびサービスを従業員に提供できるようになります。[{app_name}]はプロアクティブに問題を特定し、大規模な修正を可能にし、組織のセキュリティに対する体勢をアクティブに監視することによって脅威を最小限に抑えます。
welcome.banner.description_p1={app_name}は、デバイスおよびアプリケーションの重要な構成データおよび状態データを集約する、クラウドベースの遠隔測定および分析のプラットフォームです。AIおよびディープ ラーニングを使用してこれらのデータを分析することで、問題を事前に特定し、大規模な修正を行い、セキュリティ上の脅威を最小限に抑えることができます。
welcome.banner.title=数十億のデータポイントを基盤とした有意義な識見により、世界最大級のサービスを提供する自動化プラットフォーム
