welcome.whats_new.line1=VP兼HP TechPulse担当Global Head、Jonathan Nikols
welcome.whats_new.line2=HPは、お客様およびパートナー様へのHP TechPulseのプランのご提供を開始してからちょうど一周年を迎えることができました。2018年10月には、HP TechPulseソリューションがTSIA（Technology Services Industry Association）の2018年STAR Awards賞を「Standard Managed Services Offering and/or Catalog」（標準的な管理サービス製品およびカタログの技術革新）部門でいただき、光栄に感じています。この受賞は、極めて重大なできごとになりました。これがHPの通算15度目のTSIA Awards受賞であり、TSIA受賞者殿堂の中でさらに高い栄誉にあずかることができたからです。
welcome.whats_new.line3=[HP TechPulseプロアクティブ管理]のプランを使用することで、お客様はITへのこれまでの投資の価値を高め、Windows 10の操作性を向上させ、ビジネスの成果を推進するための意思決定をより適切かつスマートに行えるようになります。パートナー様に対しては、HP TechPulseのサービス提供の環境の向上、HP TechPulseソリューションの市場の拡大、およびお客様が選ばれたHP TechPulseのプランを補完する適切なライフサイクル サービスを見つけられるように支援する作業の簡素化への取り組みを進めています。
welcome.whats_new.line4=HP TechPulse全般の成功にとって重要な点は、サービスの技術革新の実現に役立つプラットフォーム、テクノロジ、およびプロセスに重点を置き続けることです。[HP TechPulseプロアクティブ管理]は以前にも増してスマートで高速かつ強力になり、それに合わせてHPでは輝かしい未来に向けた基盤作りにも取り組んでいます。
welcome.whats_new.line5=この刺激的な道のりをともに歩んでくださいまして、誠にありがとうございます。この先何年も皆様との素晴らしい協力関係が続くことを期待しています。
