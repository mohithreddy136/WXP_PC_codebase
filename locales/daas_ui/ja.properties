requirements.list.hp_print_fleetproxy.desc1=[Print Fleet Proxy]では、[HP Web Jetadmin]を同じコンピューターにインストールする必要があります。[HP Fleet Proxy]をインストールする前に、[HP Web Jetadmin]の最新バージョンにアップグレードすることを強く推奨します。
requirements.list.hp_print_fleetproxy.desc2=現在、HPでは[HP Fleet Proxy]を[HP Web Jetadmin] 10.5 SR4に対してのみテストしています。[HP Fleet Proxy]はそれより前のバージョンの[HP Web Jetadmin]でも動作する可能性がありますが、HPではすべての機能が期待どおりに機能することは保証していません。
requirements.list.hp_print_fleetproxy.desc3=[Web Jetadmin]は、リソース集約型のサービスです。[HP Fleet Proxy]では、あまり大きな追加のオーバーヘッドが発生することはありませんが、サービスおよびサービスが管理するデバイスの両方をホスト サーバーがサポートするためのコンピューティング能力が十分ではない場合、パフォーマンスに影響が出る可能性があります。[HP Web Jetadmin]および[HP Fleet Proxy]をホストするサーバーが十分に強力で、パフォーマンスの問題を軽減するのに十分なプロセッサー コアが搭載されていることを確認してください。
requirements.list.hp_print_fleetproxy.desc4=2,000台のデバイスをテストした結果、HPでは以下のベースライン ハードウェア仕様で十分に許容可能なパフォーマンス結果が得られることを確認しました。パフォーマンスが遅いと感じた場合や、2,000台以上のデバイスを管理する場合は、コンピューティング性能がより高いサーバーが必要になる可能性があります。
requirements.list.hp_print_fleetproxy.desc5=[Print Fleet Proxy]は、クラウドベースのサービスと通信するオンプレミスのサービスです。そのため、DNSフィルタリングまたはIPホワイトリストを使用して、WJAサーバーと[HP Command Center]の間で内向き通信と外向き通信を許可するようにファイアウォールを構成する必要があります。
requirements.list.hp_print_fleetproxy.desc6=そのリストはこちらにあります：
requirements.list.hp_print_fleetproxy.hp-nf1=DNSフィルタリング：ファイアウォールを構成し、次のエンドポイントへのポート443経由のアウトバウンドHTTPSリクエストを許可します：
requirements.list.hp_print_fleetproxy.hp-nf2=IPホワイトリスト：IPアドレスをホワイトリストに登録するには、[HP Fleet Proxy]が通信する必要がある可能性のあるすべてのクラウド サーバーのIPアドレスを含める必要があります。
