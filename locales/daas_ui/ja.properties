welcome.daas.presence.terms=[{app_name}]のプランやそれに含まれる内容は、国または地域、および[{app_name}]サービスの認定パートナーによって異なる場合があります。ご利用になる地域での詳しい内容については、お近くのHPの販売担当者または[{app_name_short}]の認定パートナーにお問い合わせください。HPのサービスは、ご購入時にお客様に提供または提示される、適用可能なHPサービス使用条件に準拠します。お客様は、該当する現地の法律によっては、さらに法令上の権利を有する可能性があります。その権利は、いかなる形でも、サービスのHPの販売条件やHP製品に付属するHP限定保証によって影響されません。
