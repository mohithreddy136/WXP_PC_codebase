exp.DiskUtilizationHigh.causeLargeFiles=ビデオ、バックアップ、データベース ファイルなどの大きなファイルやフォルダーがあると、短期間でディスク領域がいっぱいになることがあります。
exp.DiskUtilizationHigh.causeMisconfiguredApps=設定が不適切なアプリケーションがあり、過剰な量のデータやログ ファイルの保存が行われると、ディスク領域が大量に消費されることがあります。
exp.DiskUtilizationHigh.causeTempFiles=一時ファイル、ブラウザー キャッシュ、またはシステム キャッシュが蓄積されて、ディスクがいっぱいになることがよくあります。内蔵されたクリーンアップ ツールを定期的に使用するか、手動でクリーンアップを行ってこれらの一時ファイルを削除することで、使用可能なディスク領域を維持することができます。
exp.DiskUtilizationHigh.closeApps=実行中のすべてのアプリケーションを閉じます。
exp.DiskUtilizationHigh.deleteAllFiles=すべてのファイルを選択して削除します。
