wex.ra.remediation.antivirus_not_enabled=[Microsoft Defenderウイルス対策]は、Windowsに搭載されているウイルス対策ソフトウェアで、ウイルス、マルウェア、およびその他の脅威からデバイスを保護するために役立ちます。
wex.ra.remediation.antivirus_signature_outdated=最適な保護を確実に行うには、ウイルス対策の定義ファイルを常に最新の状態に保つ必要があります。
wex.ra.remediation.antivirus_signature_outdated_other=デバイスは、ウイルス、マルウェアなどの脅威から保護するために、Microsoft以外のサードパーティ製ウイルス対策を使用するように設定されていますが、デバイス上でウイルス対策のシグネチャを更新する必要があります。
wex.ra.remediation.app_crash=過去7日間に、Teams、Outlook、Zoom、Webex、Chrome、Officeで10回以上ソフトウェア エラーが発生しています。
wex.ra.remediation.avg_fan_speed_high=ファンの平均速度が長時間にわたって高くなっています。
wex.ra.remediation.battery_calibrate=バッテリは調整が必要です。
wex.ra.remediation.battery_early_detection_wear=バッテリは、30日以内にフル容量の70%未満に低下すると予測されています。
wex.ra.remediation.battery_needs_attention=Workforce Experience Platform displays records of battery warnings and failures that can be used to obtain service for a battery that is experiencing issues
wex.ra.remediation.bitlocker_encryption_not_enabled=保存データを保護するために、ディスクの暗号化を強くお勧めします。
wex.ra.remediation.bsod=過去7日間に、3件を超えるバグ チェック（BSODイベント）が発生しています。
wex.ra.remediation.bsod_occured=過去7日間に、デバイスで複数のバグ チェック イベントが発生しました。
wex.ra.remediation.cpu_utilization_high=考えられる原因：実行中のアプリケーションがハングしているか応答していません。
wex.ra.remediation.disk_needs_attention=[Workforce Experience Platform]には、ディスクの警告および障害の記録が表示され、これらを使用して問題が発生しているディスクのサービスを受けることができます。
wex.ra.remediation.disk_utilization_high=Hard disk is near full disk capacity and low in free space.
wex.ra.remediation.docking_station_ac_adapter_failed=The Docking Station AC Adapter is having a hardware issue.
wex.ra.remediation.docking_station_ac_adapter_running_at_reduced_perofmance=ドッキング ステーションの外部電源アダプターが適切に動作していません。
wex.ra.remediation.docking_station_firmware_out_of_date=Possible Causes: The docking station may require a Firmware or Driver update.
wex.ra.remediation.excessive_os_shutdown_time=シャットダウンの完了に3分以上かかっています。
wex.ra.remediation.excessive_os_startup_time=システムの起動の完了に3分以上かかっています。
wex.ra.remediation.firewall_disabled=ファイアウォールは、ハッカーおよび悪意のあるソフトウェアがインターネットやネットワークを介してコンピューターにアクセスすることを防ぎます。
wex.ra.remediation.firewall_signature_outdated=ネットワーク ベースの攻撃からの保護を最適化するために、ファイアウォールを定期的に更新する必要があります。
wex.ra.remediation.frequent_bsod_occured=過去7日間に、3件を超えるバグ チェック（BSODイベント）が発生しています。
wex.ra.remediation.frequent_network_disconnection=ホーム ネットワークの場合、ルーターのファームウェアを最新にし、ルーターを中央に配置して干渉を最小限に抑えてください。さらに、ネットワークの安定性および信頼性を維持するために、接続するデバイスを減らし、重要なデバイスには有線接続の使用を検討してください。
wex.ra.remediation.gpu_health_issue=[Workforce Experience Platform]が、GPUにすぐに対処が必要な問題を検出しました。
wex.ra.remediation.high_collaboration_sw_errors=過去7日間に、Teams、Outlook、Zoom、Webex、Chrome、Officeで10回以上ソフトウェア エラーが発生しています。
wex.ra.remediation.high_windows_crash=過去7日間に、OSで1回以上の予期しないクラッシュまたは再起動が発生しています。
wex.ra.remediation.last_reboot_more_than_21_days=前回の再起動は21日以上前でした。
wex.ra.remediation.maximise_my_battery_health_not_enabled=HP Battery Health Manager is available on all HP business notebooks since 2016. To improve battery life, it is recommended that Battery Health Manager be enabled
wex.ra.remediation.memory_utilization_high=The average Memory utilization over the last 30 days is 85% or greater.
wex.ra.remediation.missing_critical_bios_updates=以下のデバイスを選択し、[ポリシーの適用]を選択することで、プラットフォームを通じて互換性のあるデバイスのBIOSを更新します。互換性のないデバイスについては、Windows Updateまたは[HP Image Assistant]を使用してシステム ドライバーとファームウェアを更新します。
wex.ra.remediation.missing_critical_driver_updates=[ドライバー在庫]レポートには、重要なデバイス ドライバーの更新が不足しているデバイスの詳細なインベントリが含まれています。
wex.ra.remediation.missing_windows_security_updates=[Workforce Experience Platform]のセキュリティ ダッシュボードには、Windowsセキュリティ更新プログラムが不足しているデバイスの数を表示するKPIが含まれています。
wex.ra.remediation.os_crash=過去7日間に、OSで1回以上の予期しないクラッシュまたは再起動が発生しています。
wex.ra.remediation.poor_network_signal_strength=ホーム ネットワークの場合、ルーターを再起動したり、ルーターを移動してアクセス ポイントとコンピューターの間にある障害物の数を減らしたりすると、Wi-Fiの信号強度が改善される場合があります。
wex.ra.remediation.poor_nominal_speed=ホーム ネットワークの場合、Wi-Fi 6などの最新Wi-Fi規格対応の新モデルにルーターをアップグレードすることを検討してください。さらに、ルーターを中央に配置してネットワークのレイアウトを最適化し、他のデバイスからの干渉を軽減し、できるだけ有線接続を使用してパフォーマンスの安定化を図ってください。
wex.ra.remediation.unauthenticated_connection=ホーム ネットワークの場合、WPA2やWPA3などの強力な暗号化プロトコルを選択し、アクセスのために強い独自のパスワードを設定します。さらに、セキュリティの強化および不正接続の防止のために、MACアドレス フィルタリングの実装およびルーターのファームウェアの定期的な更新を検討してください。
wex.ra.remediation.windows_secure_boot_not_enabled=セキュア ブートは、OEM（Original Equipment Manufacturer）によって信頼されているソフトウェアのみを使用してデバイスが起動することを保証するために、PC業界のメンバーによって開発されたセキュリティ スタンダードです。
