requirements.list.proSecurity.windows.supportLifecycle.content1=El Objetivo de nivel de servicio HP es brindar compatibilidad con las tres versiones más actuales del Canal semestral de Windows 10.
requirements.list.proSecurity.windows.supportLifecycle.content2=El objetivo de HP es poner a disposición soporte para la nueva versión del SO para el recurso Threat Containment de Wolf Pro Security dentro de los 30 días a partir de la publicación en el Semi-Annual Channel (\"SAC\"). Compilaciones provisorias o previas de Windows Insider no son admitidas. Para obtener más información sobre las versiones de SO Windows, consulte <a href='https://docs.microsoft.com/en-us/windows/release-information/' target='_blank'>https://docs.microsoft.com/en-us/windows/release-information/</a>.
requirements.list.proSecurity.windows.supportLifecycle.content3=Para garantizar que los clientes con versiones antiguas de Windows tengan el tiempo adecuado para actualizarse con las versiones más recientes, HP seguirá admitiendo la 4.ª versión más actual (Windows 10 v1903) durante al menos 90 días después de que esté disponible la última versión del Semi-Annual Channel en Wolf Pro Security. Después de este periodo, terminará la compatibilidad con la versión del SO antigua. La misma política con respecto a la compatibilidad se aplica a las versiones del Canal de servicio de largo plazo de Windows 10. Por lo tanto, esos sistemas también tendrán que actualizarse según la política mencionada.
requirements.list.proSecurity.windows.supportLifecycle.content4=La compatibilidad de Sure Click Pro con Windows 10 v2004 se lanzó el 31 de julio de 2020. La compatibilidad con Windows 10 v1809 se retiró el 31 de octubre de 2020.
requirements.list.proSecurity.windows.supportLifecycle.content5=Windows 7 y 8.1 no son compatibles con HP Proactive Security.
requirements.list.proSecurity.windows.supportLifecycle.content6=El soporte de Sure Click Pro con Windows 10 v20H2 se lanzó el 18 de noviembre de 2020. El soporte con Windows 10 v1903 finalizó el 16 de febrero de 2021.
requirements.list.proSecurity.windows.supportLifecycle.content7=HP lanzó soporte para el protector de amenazas Sure Click Pro para Windows 10 v21H1 el 5 de julio de 2021. Se retirará el soporte para Windows 10 v1909 a partir del 3 de octubre de 2021.
requirements.list.proSecurity.windows.supportLifecycle.heading=Política del ciclo de vida de la compatibilidad referente a las nuevas versiones del SO y las antiguas de Windows 10.
requirements.list.proSecurity.windows.supportLifecycle.windows=HP Wolf Pro Security no admite SO Windows para dispositivos de puntos de venta minoristas, dispositivos HP thin client o implementación en entornos de escritorio virtual.
