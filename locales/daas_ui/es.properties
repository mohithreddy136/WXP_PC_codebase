exp.ExcessiveOsStartupTime.causeAntivirus=Los servicios antivirus u otras aplicaciones que consumen mucho disco tardan demasiado en cargarse.
exp.ExcessiveOsStartupTime.causeGroupPolicyDownload=La descarga de objetos de política de grupo durante el reinicio del sistema tarda mucho tiempo en completarse.
exp.ExcessiveOsStartupTime.causeSlowDomainLink=El equipo puede tener un enlace lento con el controlador de dominio desde el que se descargan los GPO durante el inicio.
exp.ExcessiveOsStartupTime.causeStartupScripts=Los scripts de inicio tardan demasiado tiempo en completarse.
exp.ExcessiveOsStartupTime.option1=Opción 1: Windows 11 - Aplicaciones del inicio en Configuración
exp.ExcessiveOsStartupTime.option1Guide=Para mejorar el rendimiento del dispositivo y resolver la lentitud en el inicio de sesión, lo más eficaz es eliminar las aplicaciones que se inician al iniciar sesión. Para los dispositivos con Windows 11, Microsoft ofrece una guía para controlar el inicio de Windows.
exp.ExcessiveOsStartupTime.option1GuideLink=https://www.microsoft.com/en-us/windows/learning-center/take-control-of-windows-startup
exp.ExcessiveOsStartupTime.option1GuideLinkText=https://www.microsoft.com/en-us/windows/learning-center/take-control-of-windows-startup
exp.ExcessiveOsStartupTime.option1StepApps=Del lado izquierdo de la ventana, seleccione Aplicaciones.
exp.ExcessiveOsStartupTime.option1Steps=by changing the Windows startup programs using the following steps:
exp.ExcessiveOsStartupTime.option1StepSettings=Seleccione Configuración.
exp.ExcessiveOsStartupTime.option1StepStart=Seleccione el botón de Inicio, que parece el logotipo de Microsoft.
exp.ExcessiveOsStartupTime.option1StepStartup=Seleccione Inicio en la parte inferior de la ventana de Aplicaciones.
exp.ExcessiveOsStartupTime.option1StepToggles=Utilice los interruptores para determinar qué aplicaciones desea que se inicien automáticamente. Active el interruptor si desea que la aplicación se abra al inicio o desactívelo si no desea que se abra al inicio.
exp.ExcessiveOsStartupTime.option2=Opción 2: Windows 11 - Aplicaciones del inicio en el Administrador de tareas
exp.ExcessiveOsStartupTime.option2Guide=Las aplicaciones del Inicio también se pueden activar o desactivar en el Administrador de tareas de Windows, siguiendo estos pasos:
exp.ExcessiveOsStartupTime.option2StepDisable=Haga clic con el botón derecho en una aplicación y seleccione Desactivar (si la columna Estado muestra Activado).
exp.ExcessiveOsStartupTime.option2StepStart=Seleccione el botón de Inicio, que parece el logotipo de Microsoft.
exp.ExcessiveOsStartupTime.option2StepStartupApps=Seleccione "Aplicaciones del Inicio" del lado izquierdo de la navegación.
exp.ExcessiveOsStartupTime.option2StepTaskManager=Escriba "Administrador de tareas" y presione Intro para abrir el Administrador de tareas de Windows.
exp.ExcessiveOsStartupTime.option3=Opción 3: Desinstalar aplicaciones
exp.ExcessiveOsStartupTime.option3Guide=Las aplicaciones que no se abren automáticamente en el Inicio pueden contribuir para la lentitud del inicio de sesión, ya que esas aplicaciones pueden contener archivos, servicios y entradas de registro que pueden estar parcialmente cargados. Las aplicaciones de la bandeja del sistema son ejemplos de aplicaciones que están en ejecución aunque no haya ninguna ventana abierta. Para revisar y eliminar aplicaciones innecesarias, complete los siguientes pasos. Nota: Algunas aplicaciones pueden requerir privilegios de administrador para ser eliminadas.
exp.ExcessiveOsStartupTime.option3StepControlPanel=Escriba "Control" y presione Intro para abrir el Panel de control.
exp.ExcessiveOsStartupTime.option3StepPrograms=Abra Programas y características.
exp.ExcessiveOsStartupTime.option3StepStart=Seleccione el botón de Inicio, que parece el logotipo de Microsoft.
exp.ExcessiveOsStartupTime.option3StepUninstall=Seleccione una aplicación para eliminar y seleccione Desinstalar.
exp.ExcessiveOsStartupTime.option4=Opción 4: Use PowerShell y el módulo ActiveDirectory para ejecutar Get-GpResultantSetofPolicy para analizar políticas y cuánto tardan en aplicarse a las máquinas afectadas para identificar mejoras necesarias.
