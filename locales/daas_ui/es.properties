side_panal.smart_refresh.hardware_persona_1=Uso intensivo de CPU: Dispositivos que utilizan mucha CPU
side_panal.smart_refresh.hardware_persona_2=Almacenamiento intensivo: Dispositivos que utilizan mucho almacenamiento
side_panal.smart_refresh.hardware_persona_3=Perfil estándar: Dispositivos con métricas de uso promedio que coinciden con un perfil normal
side_panal.smart_refresh.hardware_persona_4=Acoplamiento moderado: Dispositivos que utilizan con frecuencia una estación de acoplamiento u otros periféricos
side_panal.smart_refresh.hardware_persona_5=Pantalla de sesión larga: Dispositivos que suelen tener la pantalla encendida durante largos periodos de tiempo
side_panal.smart_refresh.hardware_personas_header=Personas de hardware
side_panal.smart_refresh.hardware_personas_sub_text=Clústeres de dispositivos identificados por la IA, de acuerdo con la utilización del hardware
side_panal.smart_refresh.help_sec1_description=Los 3 pasos: Identificar, Categorizar, Recomendar
side_panal.smart_refresh.help_sec1_header=Cómo funciona
side_panal.smart_refresh.help_sec1_point_1_desc=Evalúa cada dispositivo en 9 puntos de datos, resumidos en una Puntuación de la urgencia de la actualización*. Esta puntuación lo ayuda a priorizar los dispositivos individuales en riesgo para evitar interrupciones en la productividad del usuario.
side_panal.smart_refresh.help_sec1_point_1_title=1. Identificar
side_panal.smart_refresh.help_sec1_point_2_desc=Un modelo de IA agrupa los dispositivos en diferentes Hardware y Software, de acuerdo con el uso. Estos grupos pueden ayudar a guiarlo al dispositivo de reemplazo correcto.
side_panal.smart_refresh.help_sec1_point_2_title=2. Categorizar
side_panal.smart_refresh.help_sec1_point_3_desc1=Si trabaja con un socio HP, la Actualización inteligente recomendará sustituciones para cada dispositivo. Esas recomendaciones vienen de los modelos con mejor rendimiento -según las personas más relevantes- que están disponibles dentro del catálogo que cargó su socio. Si no ve recomendaciones de dispositivos o si los dispositivos que ve son obsoletos, comuníquese con su socio y solicite que cargue el catálogo más reciente.
side_panal.smart_refresh.help_sec1_point_3_desc2=Si no trabaja con un Socio HP, no verá recomendaciones de dispositivos en Smart Refresh. Comuníquese con su representante de cuenta HP para conocer los mejores modelos de reemplazo.
side_panal.smart_refresh.help_sec1_point_3_desc3=Fecha de la última carga del catálogo:
side_panal.smart_refresh.help_sec1_point_3_title=3. Recomendar
side_panal.smart_refresh.help_sec1_point_4_desc=Use el estado de actualización 'Completa' para eliminar cualquier PC que no necesite actualizarse o no pueda actualizarse en este momento. Puede ver estos dispositivos y cambiar su estado a 'Requiere una acción' para verlo de nuevo en la lista de PC
side_panal.smart_refresh.help_sec1_point_4_title=4. Estados
side_panal.smart_refresh.help_sec2_description=Cómo determinamos que un dispositivo necesita reemplazo
side_panal.smart_refresh.help_sec2_header=Puntuación de la urgencia de la actualización
side_panal.smart_refresh.help_sec2_sub_text=La Puntuación de la urgencia de la actualización se calcula a partir de los datos de rendimiento de un dispositivo en 9 áreas. La gravedad corresponde a la puntuación numérica de la siguiente forma:
side_panal.smart_refresh.help_sec2_table_col1=Urgencia de actualización
side_panal.smart_refresh.help_sec2_table_col2=Puntuación de la actualización
side_panal.smart_refresh.help_sec2_table_high=Actualizar ahora
side_panal.smart_refresh.help_sec2_table_low=En buen estado
side_panal.smart_refresh.help_sec2_table_medium=Actualizar en breve
side_panal.smart_refresh.help_sec3_header=Factores
side_panal.smart_refresh.help_sec3_point_1=Uso de la CPU: Porcentaje promedio de uso en los últimos 30 días
side_panal.smart_refresh.help_sec3_point_2=Uso de la memoria: Porcentaje promedio de uso en los últimos 30 días
side_panal.smart_refresh.help_sec3_point_3=Utilización de disco: Último porcentaje de uso registrado
side_panal.smart_refresh.help_sec3_point_4=Errores del sistema operativo: Total de fallos del sistema operativo en los últimos 7 días
side_panal.smart_refresh.help_sec3_point_5=Pantallas azules (BSOD): Total de pantallas azules de la muerte en los últimos 7 días
side_panal.smart_refresh.help_sec3_point_6=Duración de inicio: Último tiempo registrado en minutos
side_panal.smart_refresh.help_sec3_point_7=Duración del apagado: Último tiempo registrado en minutos
side_panal.smart_refresh.help_sec3_point_8=Errores de software para aplicaciones de colaboración: Total de errores en los últimos 7 días
side_panal.smart_refresh.help_sec3_point_9=Estado de energía de la estación de acoplamiento: Últimos datos registrados, Sí/No
side_panal.smart_refresh.help_sec3_sub_text=Los siguientes nueve factores contribuyen a la puntuación y se incluyen descripciones de cómo se mide cada uno:
side_panal.smart_refresh.help_sub_title=Actualice las PC en el momento correcto con Smart Refresh de HP. Así es como funciona:
side_panal.smart_refresh.personas_header=Personas
side_panal.smart_refresh.personas_sub_text=Grupos de dispositivos basados en IA, determinados por patrones de uso
side_panal.smart_refresh.point_1_desc=Evalúe el estado actual de los PC en términos de rendimiento del hardware.
side_panal.smart_refresh.point_1_title=1. Evaluación
side_panal.smart_refresh.point_2_desc=Priorice los PC que necesitan atención inmediata con base en su uso, importancia para las operaciones comerciales o el nivel de obsolescencia.
side_panal.smart_refresh.point_2_title=2. Priorización
side_panal.smart_refresh.point_3_desc=Realice actualizaciones o sustituciones planificadas de modo eficiente, minimizando el tiempo de inactividad e interrupciones para los usuarios.
side_panal.smart_refresh.point_3_title=3. Implementación
side_panal.smart_refresh.point_4_desc=Asegúrese de que los PC actualizados tengan las últimas medidas de seguridad para protección contra ciberataques.
side_panal.smart_refresh.point_4_title=4. Seguridad
side_panal.smart_refresh.point_5_desc=Supervise con regularidad los PC actualizados para garantizar que continúen con rendimiento óptimo, y realice el mantenimiento requerido.
side_panal.smart_refresh.point_5_title=5. Supervisión y mantenimiento
side_panal.smart_refresh.software_persona_1=Latente: Usuarios que no usan su dispositivo con frecuencia
side_panal.smart_refresh.software_persona_2=Office 365: Usuarios que utilizan con frecuencia aplicaciones de oficina, como Excel y Word
side_panal.smart_refresh.software_persona_3=Programador avanzado: usuario que usa con frecuencia herramientas de desarrollo para programación
side_panal.smart_refresh.software_persona_4=Productivity Coder: Users who frequently use developer tools for coding
