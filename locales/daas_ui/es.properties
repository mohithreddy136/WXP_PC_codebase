welcome.daas.presence.terms=Los planes y/o componentes incluidos de {app_name} pueden variar según la región o el Socio de servicio autorizado de {app_name}. Comuníquese con su representante local de HP o con el Socio autorizado de {app_name_short} para obtener los detalles específicos de su ubicación. Los servicios HP se rigen por los términos y condiciones de servicio de HP aplicables, brindados o indicados al Cliente en el momento de la compra. El Cliente podría tener derechos legales adicionales de acuerdo con las leyes locales aplicables, y tales derechos no se ven afectados de ninguna forma por los términos y condiciones de servicio de HP o la Garantía limitada de HP que se brinda con su producto HP.
