account_management.subscriptions.addon.anyware.azure_notice=La licencia actualmente se ofrece solo en Azure Marketplace. La licencia estándar de HP Anyware incluye acceso a HP Anyware Manager Enterprise.
account_management.subscriptions.addon.anyware.desc=Administre y proporcione escritorios remotos para su equipo. Los usuarios finales tendrán acceso seguro a los escritorios sin necesidad de una VPN. Supervise su flota remota en un único lugar integrando HP Anyware con WXP
account_management.subscriptions.addon.anyware.desc.short=Acceda, administre y supervise equipos con seguridad
account_management.subscriptions.addon.anyware.enterprise.header=HP Anyware Manager Enterprise
account_management.subscriptions.addon.anyware.features.automation=Tareas automatizadas
account_management.subscriptions.addon.anyware.features.automation.desc=Integre su flujo de trabajo personalizado de administrador de forma fluida en el plano de administración
account_management.subscriptions.addon.anyware.features.multitenant_rbac=Control de acceso multi-inquilino y basado en roles
account_management.subscriptions.addon.anyware.features.multitenant_rbac.desc=Administre varias organizaciones con una única instancia de HP Anyware Manager Enterprise. Asigne permisos para Administradores con base en sus roles
account_management.subscriptions.addon.anyware.features.productivity=Habilitar productividad de usuario final
account_management.subscriptions.addon.anyware.features.productivity.desc=El usuario experimentará los escritorios como si fuesen locales, independientemente de sus necesidades de rendimiento o condiciones de red.
account_management.subscriptions.addon.anyware.features.provision_desktops=Administre escritorios físicos y virtuales
account_management.subscriptions.addon.anyware.features.provision_desktops.desc=El equipo de TI puede configurar y supervisar escritorios remotos a través de HP Anyware Manager Enterprise. También pueden proporcionar escritorios virtuales a los usuarios finales en cualquier momento.
account_management.subscriptions.addon.anyware.features.remote_access=Proporcione a los usuarios finales n acceso remoto seguro
account_management.subscriptions.addon.anyware.features.remote_access.desc=Los usuarios finales tendrán acceso seguro a los escritorios sin necesidad de una VPN. HP Anyware ofrece acceso simplificado a través de puertas de enlace en la nube.
account_management.subscriptions.addon.anyware.features.role_access.desc=Realice asignación de usuarios y enrutamiento de sesiones sin necesidad de instalar una puerta de enlace en otros entornos
account_management.subscriptions.addon.anyware.features.role_cloud_gateways=Acceso simplificado a través de puertas de enlace de nube
account_management.subscriptions.addon.anyware.features.setup=Cualquier entorno de TI con configuración sencilla
account_management.subscriptions.addon.anyware.features.setup.desc=Una solución flexible e intuitiva que simplifica la implementación y gestión de diversas infraestructuras, incluyendo las instalaciones, la nube y entornos híbridos, al tiempo que se reduce la complejidad de la TI y el espacio físico que ocupa.
account_management.subscriptions.addon.anyware.features.workforce_integration=Integración de Workforce Experience
account_management.subscriptions.addon.anyware.features.workforce_integration.desc=Los equipos de TI pueden centralizar datos de escritorios remotes en la Plataforma Workforce Experience,  ofreciendo una vista central de su flota. 
account_management.subscriptions.addon.anyware.header=HP Anyware
account_management.subscriptions.addon.anyware.overview.desc1=HP Anyware es una solución de software de alto rendimiento que proporciona a los usuarios acceso seguro a sus equipos remotos sin usar una VPN. HP Anyware incluye acceso a un plano de administración de TI llamado HP Anyware Manager Enterprise.
account_management.subscriptions.addon.anyware.overview.desc2=HP Anyware Manager Enterprise (AME) es un plano de administración multi-inquilino que permite al equipo de TI gestionar los escritorios físicos y virtuales.
account_management.subscriptions.addon.anyware.required_components.header=Componentes requeridos para integración de Workforce Experience
account_management.subscriptions.addon.anyware.required_components.li1=HP Anyware Standard
account_management.subscriptions.addon.anyware.required_components.li2=HP Anyware Manager Enterprise
account_management.subscriptions.addon.anyware.security_compliance=Seguridad y cumplimiento
account_management.subscriptions.addon.anyware.security_compliance.desc1=HP Anyware prioriza la seguridad y el cumplimiento en todas las ofertas de productos para asegurar una protección sólida y la conformidad con estándares del sector. Las principales características incluyen cifrado de punta a punta, acceso remoto seguro y autenticación multifactor para proteger la integridad y confidencialidad de los datos.
account_management.subscriptions.addon.anyware.security_compliance.desc2=HP Anyware también integra detección avanzada de amenazas y capacidades de respuesta para mitigar riesgos de modo proactivo. El cumplimiento con normas como GDPR, HIPAA y SOC 2 enfatiza el compromiso de HP Anyware de mantener protocolos de seguridad rígidos. La supervisión continua y las auditorías de seguridad regulares garantizan que los productos HP Anyware mantengan su resiliencia frente a ciberamenazas, proporcionando a los usuarios una experiencia de administración de TI segura y confiable.
account_management.subscriptions.addon.anyware.technology=Tecnología de acceso remoto
account_management.subscriptions.addon.anyware.technology.desc=La premiada tecnología de pantalla remota PCoIP® de HP Anyware ofrece una experiencia de computación de alta definición y rápida respuesta en condiciones de red difíciles.
account_management.subscriptions.addon.anyware.technology.desc.li1=PCoIP® codifica, comprime, cifra y transporta píxeles de imagen de un servidor central o una estación de trabajo.
account_management.subscriptions.addon.anyware.technology.desc.li2=Después, descifra y descomprime la imagen para usuarios en prácticamente cualquier punto de conexión.
account_management.subscriptions.addon.connect_accounts=Conectar cuentas
account_management.subscriptions.addon.oob.desc.short=Control remoto a nivel del BIOS para diagnósticos avanzados y corrección de errores
account_management.subscriptions.addon.oob.desclaimer1=1. El diagnóstico y la reparación fuera de banda están disponibles como licencia con diferentes plazos de vigencia y son independientes del proveedor para cualquier PC que sea compatible con Intel® vPro® Enterprise e Intel® AMT. Incluye y requiere Workforce Experience Platform Starter para administrar y gestionar la solución de software. Disponible en EE. UU., Canadá y la UE a través de representantes de HP o revendedores autorizados por HP. Para obtener más información, consulte (añadir el enlace URL a los términos de la licencia/cluf).
account_management.subscriptions.addon.oob.desclaimer2=2. Según el análisis interno de HP sobre fabricantes de PC con control del ciclo de encendido, control sin sistema operativo, control del BIOS y control de reimágenes a fecha de 24/9/2024.
account_management.subscriptions.addon.oob.desclaimer3=3. El agente HP Insights es necesario y es una aplicación de telemetría y análisis que proporciona datos críticos sobre dispositivos y aplicaciones, no se vende como un servicio independiente y cuenta con las certificaciones ISO27001, ISO27701, ISO27017 y SOC2 Tipo 2 para la seguridad de la información. Requiere acceso a Internet con conexión al portal. Para obtener todos los requisitos de sistema, visite http://www.hpdaas.com/requirements. La compra de cualquier servicio habilitado para el agente HP Insights requiere habilitar el software para que se ejecute en cada dispositivo. HP Services Scan se proporciona a través de Windows Update en determinados equipos HP y comprueba los derechos de cada dispositivo para determinar si se ha adquirido un servicio habilitado, descargando automáticamente el software correspondiente. Para desactivar esta función, siga las instrucciones que se indican en <a target='_blank' href='http://www.hpdaas.com/requirements' style=\"text-decoration:none; color:#4D52E5\">http://www.hpdaas.com/requirements</a>
account_management.subscriptions.addon.oob.desclaimer4=4. WXP Starter está incluido y es necesario para administrar y gestionar la solución de software.
account_management.subscriptions.addon.oob.features.remote_control=Remote control - even when the Operating System is down
account_management.subscriptions.addon.oob.features.remote_control.desc=El departamento de TI puede acceder de forma remota a la BIOS para reiniciar, volver a crear imágenes y recuperar PC de diferentes marcas, independientemente del lugar en el que se trabaje.
account_management.subscriptions.addon.oob.features.scalable=Gestión escalable y centralizada
account_management.subscriptions.addon.oob.features.scalable.desc=Simplifique el aprovisionamiento de PC, el control de licencias masivas y el acceso basado en roles con esta función que se integra en WXP para la implementación, utilización y gestión empresarial.
account_management.subscriptions.addon.oob.features.secure=Experiencias seguras para los usuarios finales
account_management.subscriptions.addon.oob.features.secure.desc=Los usuarios tienen visibilidad de las sesiones remotas y pueden detener la conexión en cualquier momento. Un soporte seguro y fluido genera confianza y mejora la experiencia del usuario.
account_management.subscriptions.addon.oob.header=Conexión remota fuera de banda
account_management.subscriptions.addon.oob.overview.desc1=¿Quiere mejorar las experiencias digitales de una plantilla híbrida? HP Out-of-band Remote Connect proporciona a los técnicos de soporte acceso remoto a la BIOS para reiniciar, volver a crear imágenes y recuperar PC, incluso si el sistema operativo no funciona. Sin participación de los usuarios, sin visitas al mostrador.
account_management.subscriptions.addon.vyopta.connect_accounts.error=No pudimos conectar su cuenta. Verifique su conexión y vuelva a intentarlo.
account_management.subscriptions.addon.vyopta.connect_accounts.found=Hemos detectado la cuenta Vyopta "<b>{orgName}</b>". ¿Le gustaría conectarla a WXP?
account_management.subscriptions.addon.vyopta.connect_accounts.no_permissions=No tiene permisos. Comuníquese con el administrador de la cuenta Vyopta para obtener asistencia.
account_management.subscriptions.addon.vyopta.connect_accounts.not_found=No pudimos detectar automáticamente su cuenta {service}. Póngase en contacto con {support_link} para ayudar a establecer esta conexión si ya es un cliente de {service}.
account_management.subscriptions.addon.vyopta.connect_accounts.org_already_mapped=Esta ID Vyopta ya está vinculada a otro inquilino. Póngase en contacto con el administrador de su cuenta para obtener ayuda.
account_management.subscriptions.addon.vyopta.connect_accounts.request_support=Póngase en contacto con el administrador de su cuenta {service} para obtener ayuda.
account_management.subscriptions.addon.vyopta.connect_accounts.success=Hemos conectado su cuenta correctamente.
account_management.subscriptions.addon.vyopta.connect_accounts.unauthorized=Hemos detectado su empresa en {service}, pero parece que no tiene los permisos necesarios para conectar cuentas.
account_management.subscriptions.addon.vyopta.desc=Optimice la colaboración con información en tiempo real. Supervise la calidad de la llamada, el uso de la sala de reuniones y el rendimiento del sistema en Microsoft Teams, Zoom, Poly y Webex. Cuando se integra con WXP, ayuda al personal de TI a mejorar las experiencias digitales e impulsar la eficiencia en el lugar de trabajo.
account_management.subscriptions.addon.vyopta.features.comprehensive_monitoring=Supervisión completa de todas las plataformas de colaboración
account_management.subscriptions.addon.vyopta.features.comprehensive_monitoring.desc=Obtenga una visión holística de su entorno multiproveedor de Comunicaciones Unificadas (UC), habilitando una administración eficiente de herramientas de colaboración de video y voz.
account_management.subscriptions.addon.vyopta.features.deep_integration=Integración profunda con WXP
account_management.subscriptions.addon.vyopta.features.deep_integration.desc=El análisis y supervisión de datos de Vyopta se integran perfectamente dentro de WXP, permitiendo que los equipos de TI gestionen el rendimiento de la colaboración junto con otras tecnologías del lugar de trabajo. Este enfoque centralizado aumenta la eficiencia de TI, reduce la complejidad y mejora la gestión de la experiencia digital.
account_management.subscriptions.addon.vyopta.features.enhance_user_engagement=Mejore la participación y bienestar de los usuarios
account_management.subscriptions.addon.vyopta.features.enhance_user_engagement.desc=Utilice el análisis de colaboración para identificar obstáculos a la productividad, fomentando mejores experiencias y bienestar para los empleados.
account_management.subscriptions.addon.vyopta.features.optimize_meeting_space=Optimice la utilización del espacio de reuniones
account_management.subscriptions.addon.vyopta.features.optimize_meeting_space.desc=Analice los patrones de ocupación y uso de las salas para maximizar la inversión en espacio.
account_management.subscriptions.addon.vyopta.features.proactive_issue_detection=Detección y resolución proactiva de problemas
account_management.subscriptions.addon.vyopta.features.proactive_issue_detection.desc=Aproveche la supervisión en tiempo real para identificar y solucionar problemas de calidad en la colaboración antes de que afecte a los usuarios, reduciendo el tiempo de solución de problemas.
account_management.subscriptions.addon.vyopta.header=Experiencia de colaboración por Vyopta
account_management.subscriptions.addon.vyopta.overview=Empodere a los equipos de TI con supervisión y análisis avanzados para herramientas de colaboración. La integración de Vyopta dentro de WXP proporciona visibilidad en tiempo real del uso de las salas de reunión, calidad de las llamadas y rendimiento del sistema entre plataformas como Microsoft Teams, Zoom, Poly y Webex. Mejore la productividad de los empleados abordando problemas de colaboración proactivamente y optimizando la experiencia en el lugar de trabajo.
account_management.subscriptions.addon.vyopta.short_desc=Análisis valioso e información sobre las salas para optimizar los entornos de colaboración
account_management.subscriptions.addon.wolf.desc=Implementación, visibilidad y protección de punta a punta usando seguridad integrada de PC y software para fortalecer las defensas del PC.
account_management.subscriptions.addon.wolf_security=HP Wolf Security
account_management.subscriptions.addon.wolf_security.desc=Protección inigualable de los puntos de conexión contra ciberataques impulsada por HP Wolf. Vea la telemetría en Workforce Experience para seguridad mejorada.
account_management.subscriptions.addon.wpt.desc=Localice, bloquee y proteja dispositivos extraviados o robados. Cuando se integra en WXP, ayuda a los equipos de TI a ubicar PC y reducir el riesgo de pérdida del dispositivo -incluso cuando los dispositivos están apagados.
account_management.subscriptions.addon.wpt.features.always_available=Siempre disponible
account_management.subscriptions.addon.wpt.features.always_available.desc=Aprovecha el hardware y software personalizado para encontrar/bloquear/borrar datos incluso cuando el PC está apagado, desconectado de Internet o si no arranca.
account_management.subscriptions.addon.wpt.features.message_customization=Personalización de mensajes
account_management.subscriptions.addon.wpt.features.message_customization.desc=Transmita mensajes personalizados a los PC de destino para instrucciones de desbloqueo
account_management.subscriptions.addon.wpt.features.remote_lock_and_erase=Bloqueo y borrado remotos
account_management.subscriptions.addon.wpt.features.remote_lock_and_erase.desc=Bloquee un dispositivo en el nivel del firmware para proteger los datos y hacer que un dispositivo robado se vuelva inutilizable. Borre el almacenamiento principal de dispositivos perdidos o robados para evitar pérdida de datos.
account_management.subscriptions.addon.wpt.features.seamless_integration=Integración perfecta con WXP
account_management.subscriptions.addon.wpt.features.seamless_integration.desc=Gestione la seguridad de dispositivos directamente dentro de WXP, optimizando las operaciones de TI y la administración de puntos de conexión.
account_management.subscriptions.addon.wpt.features.separations_of_duties=Separación de tareas
account_management.subscriptions.addon.wpt.features.separations_of_duties.desc=Requiere múltiples aprobadores para evitar errores al bloquear/borrar datos, o amenazas internas.
account_management.subscriptions.addon.wpt.features.strong_audit_trail=Fuerte seguimiento de auditoría
account_management.subscriptions.addon.wpt.features.strong_audit_trail.desc=Registra correctamente la ejecución de Bloqueo y Borrado en la plataforma WXP como prueba de cumplimiento de normas.
account_management.subscriptions.addon.wpt.header=HP Wolf Protect and Trace with Wolf Connect
account_management.subscriptions.addon.wpt.overview=Mejora la administración de activos y reduce los riesgos de filtración de datos con HP Wolf Protect & Trace. Integrada en WXP, esta solución única permite que los equipos de TI ubiquen, bloqueen y borren datos de dispositivos que fueron robados -aunque estén apagados. Cobertura global y administración simple, ideal para clientes de todos los tamaños.
account_management.subscriptions.addon.wpt.requirements.purchase=Requiere la compra de un nuevo PC de su representante de ventas HP un socio de canal autorizado.<br> Requiere un PC compatible con la opción de pantalla "WWAN". PC compatibles en: https://www.hpwolf.com/en/legal/ptwc/platforms
account_management.subscriptions.addon.wpt.short_desc=Rastree, bloquee y borre los datos de un PC de forma remota en todo el mundo, incluso si está apagado
