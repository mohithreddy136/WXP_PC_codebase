wex.labs.remediation.ai.description=La Corrección con IA lo guía a la solución más efectiva. Reduce las opciones de modo inteligente para que su equipo pueda resolver problemas con más eficiencia y uniformidad.
wex.labs.remediation.ai.description.disclaimer=You are about to interact with an AI solution. Content generated by AI might contain inaccuracies and should be verified against the details provided. Please note that AI-generated responses might be incomplete or incorrect, and HP assumes no responsibility for actions taken based on this content.
wex.labs.remediation.ai.details.analyzesAvailableRemediations.desc=El algoritmo busca soluciones existentes en la plataforma, incluyendo scripts, políticas y actualizaciones/acciones de dispositivos para recomendar las soluciones más relevantes.<br/><br/>Busca en el historial de uso y las tasas de éxito para comprender lo que generalmente resuelve ese tipo de problema dentro de su organización. Los usuarios gastarán menos tiempo determinando la acción adecuada al permitir que la IA haga el trabajo.
wex.labs.remediation.ai.details.analyzesAvailableRemediations.title=Analiza correcciones disponibles
wex.labs.remediation.ai.details.applyOrReview.desc=Dependiendo de la corrección, los administradores pueden elegir: <br/><div class=remediation-ai-ui><ul><li>Aplicar inmediatamente en todos los dispositivos seleccionados</li><li>Programarla para más tarde para minimizar interrupciones</li><li>Revisar detalles antes de confirmar la acción</li></ul></div><br/>Una vez aplicada, se hace seguimiento de la actividad y sus resultados para transparencia y aprendizaje continuo.
wex.labs.remediation.ai.details.applyOrReview.title=Aplicar, Programar o Revisar
wex.labs.remediation.ai.details.continuousLearning.desc=Con el tiempo, las recomendaciones adquieren precisión y confianza.
wex.labs.remediation.ai.details.continuousLearning.title=Aprendizaje continuo
wex.labs.remediation.ai.details.howItWorks.title=Cómo funciona
wex.labs.remediation.ai.details.issueToRemediation.desc=Cuando un problema supera un umbral definido, aparece en su panel con una descripción clara de lo que pasa y cómo afectará a sus dispositivos. La plataforma WXP ahora permite corrección directa y la función de corrección por IA ayuda a refinar la mejor opción para solucionar el problema.
wex.labs.remediation.ai.details.issueToRemediation.title=Problema para corregir
wex.labs.remediation.ai.details.learnsandImproves.desc=El algoritmo refina continuamente su comprensión de lo que funciona mejor para su empresa.<br/>Cada vez que se aplica una corrección, el sistema aprende:<div class=remediation-ai-ui><ul><li>El grado de eficacia</li><li>Cuánto tardó solucionar el problema</li><li>Si ocurrieron problemas similares más de una vez</li></ul></div><br/>Este feedback constante fortalece las recomendaciones futuras al hacerlas cada vez más precisas y personalizadas.
wex.labs.remediation.ai.details.learnsandImproves.title=Aprende y mejora con el tiempo
wex.labs.remediation.ai.details.overview.desc=Las correcciones con la función de IA ayuda a los administradores de TI a pasar rápidamente de la detección a la solución. Analiza los datos de su flota y recomienda la política, script o actualización de dispositivo más eficaz para el problema en cuestión. El algoritmo usa patrones de correcciones existentes en su entorno para sugerir lo que tiene más probabilidad de funcionar.
wex.labs.remediation.ai.details.recommendBestFix.desc=Cada recomendación incluye: <br/><div class=remediation-ai-ui><ul><li>Tipo de acción: Script, política o actualización</li><li>Por qué es relevante: La corrección y la automatización solucionan errores en tiempo real, aumentando la productividad de los empleados, mejorando la experiencia digital, ahorrando tiempo y reduciendo la vulnerabilidad.</li></ul></div>
wex.labs.remediation.ai.details.recommendBestFix.title=Recomienda le Mejor solución
wex.labs.remediation.ai.details.relevance.desc=La IA funciona dentro de la biblioteca de correcciones de su organización.
wex.labs.remediation.ai.details.relevance.title=Relevancia
wex.labs.remediation.ai.details.scriptInfo.desc=For faster saving of your script, the system reads it and auto-fills metadata fields such as title, description, synopsis, and any input parameters detected allowing you to quickly review and save your new script.
wex.labs.remediation.ai.details.scriptInfo.title=Script Information Autofill
wex.labs.remediation.ai.details.Speed.desc=Solucione problemas con más rapidez usando las recomendaciones guiadas.
