btg.addon.list.feature_one.description=DCT es una tecnología de malla subyacente que permite que los dispositivos HP descubran, conecten y y colaboren, al mismo tiempo que gestionan y simplifican transiciones de situación. Permite compartir en tiempo real contexto, estado y capacidades, transformando productos independientes en un ecosistema adaptable estrechamente integrado.
