exp.EarlyDetectionWear.causeDeepDischarge=Las frecuentes descargas profundas, en que la batería se deja agotar totalmente antes de recargar, pueden acelerar el desgaste y reducir la vida útil de la batería.
exp.EarlyDetectionWear.causeHighTemp=Las altas temperaturas, ya sea por que el dispositivo se encuentra en un entorno caluroso o por exposición al calor, pueden causar daños térmicos y degradación del rendimiento de la batería con el paso del tiempo.
