exp.ExcessiveOsShutdownTime.causeSlowDrive=Un disco duro lento tarda demasiado tiempo en borrar el contenido del archivo de página de la memoria virtual.
exp.ExcessiveOsShutdownTime.causeSlowLink=El dispositivo está en un enlace lento.
