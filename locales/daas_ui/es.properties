poly.lens.addon.details.description=Gestione toda su flota de dispositivos de colaboración de HP en toda la organización con confianza y claridad. Desde la implementación perfeccionada y el fácil mantenimiento hasta la supervisión proactiva y la información útil, los equipos de TI obtienen control centralizado de espacios, salas y dispositivos. Con gestión segura basada en la nube y soporte fluido para trabajo híbrido, puede reducir los costos operativos generales, prevenir problemas y ofrecer una experiencia uniforme y confiable a sus equipos de trabajo.
poly.lens.addon.feature.centralized.header=Gestión centralizada de dispositivos personales
poly.lens.addon.feature.centralized.text=Con aplicaciones HP Poly Studio, ofrezca una experiencia de autoservicio fluida parta usuarios finales mientras los equipos de TI mantienen visibilidad y control centralizados sobre los dispositivos personales. Gestione inventario, actualizaciones, supervisión e información con confianza, dondequiera que sus equipos trabajen.
poly.lens.addon.feature.effortless.maintenance.header=Fácil mantenimiento
poly.lens.addon.feature.effortless.maintenance.text=Gestiona configuración, funciones y actualizaciones de software en toda la flota con esfuerzo mínimo. Aplica configuraciones, organiza actualizaciones y optimiza ajustes a escala sin sacrificar el control o la precisión.
poly.lens.addon.feature.meaningful.measurement.header=Medidas significativas
poly.lens.addon.feature.meaningful.measurement.text=Comprenda cómo los dispositivos, espacios y personas están realmente trabajando. Transforme datos de utilización y rendimiento en decisiones impulsadas por datos más inteligentes sobre las inversiones en colaboración.
poly.lens.addon.feature.proactive.monitoring.header=Supervisión proactiva
poly.lens.addon.feature.proactive.monitoring.text=Prevenga problemas con clara visibilidad del estado y estatus del dispositivo. Reciba alertas si algo está mal para corregir problemas antes de que interrumpan reuniones.
poly.lens.addon.feature.secure.header=Control seguro basado en la nube
poly.lens.addon.feature.secure.text=Gestione todo desde una plataforma confiable basada en la nube que se escala a medida que crece su organización al mismo tiempo que cumple los requisitos de seguridad y cumplimiento empresariales.
poly.lens.addon.feature.simplified.deployment.header=Implementación simplificada
poly.lens.addon.feature.simplified.deployment.text=Organice, preconfigure e implemente dispositivos con confianza. La integración automatizada de flujos de trabajo reduce el tiempo de configuración, elimina errores y permite que los dispositivos estén listos antes de llegar a un usuario o a una sala.
poly.lens.addon.subtitle=Gestión basada en la nube con información en todos los espacios, salas y dispositivos de colaboración.
