wex.fleet.mgmt.recommended.desc.antivirus_not_enabled=La activación de Microsoft Defender proporciona protección esencial contra malware y otras amenazas de seguridad.
wex.fleet.mgmt.recommended.desc.antivirus_not_enabled_other=La habilitación de software antivirus protege a los dispositivos del malware y defiende a su sistema de ataques.
wex.fleet.mgmt.recommended.desc.antivirus_signature_outdated=La actualización regular de firmas de malware asegura que Windows Defender pueda detectar las últimas amenazas y protegerlo de ellas.
wex.fleet.mgmt.recommended.desc.antivirus_signature_outdated_other=El mantenimiento de las firmas de malware asegura una protección completa contra las últimas amenazas.
wex.fleet.mgmt.recommended.desc.avg_fan_speed_high=Conocer el motivo de la alta velocidad del ventilador ayuda a prevenir sobrecalentamiento y otros posibles daños de los componentes internos de su dispositivo.
wex.fleet.mgmt.recommended.desc.battery_calibrate=La calibración mejora la precisión de lectura de la carga de la batería y aumenta la vida útil y el rendimiento.
wex.fleet.mgmt.recommended.desc.battery_early_detection_wear=La solución de problemas por desgaste de la batería asegura el funcionamiento eficiente del dispositivo, rendimiento uniforme y mayor vida útil de la batería.
wex.fleet.mgmt.recommended.desc.battery_needs_attention=Replacement of defective batteries can ensure good device performance, and system health. Devices which are covered by warranty may be eligible for battery replacement.
wex.fleet.mgmt.recommended.desc.bitlocker_encryption_not_enabled=La activación de BitLocker protege datos confidenciales cifrando su unidad, mejorando la seguridad general contra el acceso no autorizado.
wex.fleet.mgmt.recommended.desc.bsod_occured=La solución de errores de pantalla azul garantiza la estabilidad del sistema, evita que se apague inesperadamente y mantiene la confiabilidad.
wex.fleet.mgmt.recommended.desc.cpu_utilization_high=El análisis del uso alto de CPU ayuda a prevenir cuellos de botella en el rendimiento y mantiene el sistema funcionando bien.
wex.fleet.mgmt.recommended.desc.disk_needs_attention=Disk performance is degrading and may soon lead to slower performance or instability if not addressed.
wex.fleet.mgmt.recommended.desc.disk_utilization_high=La liberación de espacio en disco previene que se ralentize el sistema y asegura la operación fluida al evitar la sobrecarga de almacenamiento.
wex.fleet.mgmt.recommended.desc.docking_station_ac_adapter_failed=La corrección de fallas garantiza suministro de energía uniforme para las bases de conexión, lo que evita problemas de conectividad.
wex.fleet.mgmt.recommended.desc.docking_station_ac_adapter_running_at_reduced_perofmance=La mejora del rendimiento del adaptador asegura conexiones confiables y funcionamiento óptimo de las bases de conexión.
wex.fleet.mgmt.recommended.desc.docking_station_firmware_out_of_date=La actualización de firmware para bases de conexión asegura la compatibilidad del dispositivo y mejora el rendimiento general del sistema.
wex.fleet.mgmt.recommended.desc.excessive_os_login_time=La reducción del tiempo de inicio de sesión evita retrasos y aumenta la eficiencia del usuario durante el acceso al sistema.
wex.fleet.mgmt.recommended.desc.excessive_os_shutdown_time=La optimización del tiempo de apagado minimiza los períodos de espera y asegura que el sistema se apague con eficiencia.
wex.fleet.mgmt.recommended.desc.excessive_os_startup_time=La aceleración del tiempo de arranque permite acceder con más rapidez al sistema y aumenta la eficiencia y la productividad del usuario.
wex.fleet.mgmt.recommended.desc.firewall_disabled=La activación del Firewall de Windows. ayuda a bloquear el acceso no autorizado y protege a su red de posibles ataques.
wex.fleet.mgmt.recommended.desc.firewall_signature_outdated=La actualización regular de firmas de firewall protege de las amenazas de red nuevas y en evolución.
wex.fleet.mgmt.recommended.desc.frequent_bsod_occured=La solución de errores de pantalla azul garantiza la estabilidad del sistema, evita que se apague inesperadamente y mantiene la confiabilidad.
wex.fleet.mgmt.recommended.desc.frequent_kernel_panic_error=Resolver los errores de Kernel Panic mejora la estabilidad del sistema, aumenta la seguridad y evita la pérdida de datos.
wex.fleet.mgmt.recommended.desc.frequent_network_disconnection=Tener cero desconexiones de red aumenta la confiabilidad, mejora la experiencia del usuario y asegura el acceso sin interrupción a los servicios y aplicaciones.
wex.fleet.mgmt.recommended.desc.gpu_health_issue=La corrección de errores de la GPU evita problemas de rendimiento gráfico y mantiene la buena operación de aplicaciones visuales.
wex.fleet.mgmt.recommended.desc.high_collaboration_sw_errors=La solución de problemas de software de colaboración asegura la fluidez en el trabajo de equipo y la productividad constante. Hemos visto más de 10 errores de software en los últimos 7 días en Teams, Outlook, Zoom, Webex, Chrome, Office.
wex.fleet.mgmt.recommended.desc.high_windows_crash=La solución de los bloqueos del So garantiza la estabilidad del sistema, el rendimiento constante y la productividad del usuario sin interrupciones.
wex.fleet.mgmt.recommended.desc.kernel_panic_error=Resolver los errores de Kernel Panic mejora la estabilidad del sistema, aumenta la seguridad y evita la pérdida de datos.
wex.fleet.mgmt.recommended.desc.last_reboot_more_than_21_days=Al reiniciar los dispositivos, se eliminan los archivos temporales y se actualizan los procesos del sistema, lo que mejora el rendimiento y la estabilidad en general.
wex.fleet.mgmt.recommended.desc.linux_disk_encryption_not_enabled=Habilitar el cifrado de disco mejora significativamente la seguridad de los datos al proteger el contenido de sus dispositivos de almacenamiento.
wex.fleet.mgmt.recommended.desc.linux_firewall_disabled=La activación del firewall de Linux ayuda a bloquear el acceso no autorizado y protege su red de posibles ataques.
wex.fleet.mgmt.recommended.desc.linux_secure_boot_not_enabled=Habilitar el arranque seguro garantiza que solo se cargue software de confianza durante el proceso de arranque, lo que mejora la seguridad del sistema.
wex.fleet.mgmt.recommended.desc.memory_utilization_high=Analizar el alto uso de memoria ayuda a identificar y resolver problemas que pueden afectar al rendimiento y estabilidad del sistema. 
wex.fleet.mgmt.recommended.desc.missing_critical_bios_updates=La aplicación de actualizaciones de BIOS garantiza la estabilidad del sistema y la compatibilidad con nuevo hardware o software.
wex.fleet.mgmt.recommended.desc.missing_critical_driver_updates=La actualización de controladores evita el mal funcionamiento del hardware y garantiza que el sistema permanezca seguro, estable y con alto rendimiento.
wex.fleet.mgmt.recommended.desc.missing_linux_security_updates=La aplicación de actualizaciones de seguridad protege contra el malware y los exploits, reduce la superficie de ataque y mejora la integridad del sistema.
wex.fleet.mgmt.recommended.desc.missing_linux_updates=La instalación de las últimas actualizaciones corrige vulnerabilidades en el kernel, las bibliotecas del sistema y las aplicaciones. Esto protege su sistema contra exploits, malware y accesos no autorizados.
wex.fleet.mgmt.recommended.desc.missing_windows_security_updates=La aplicación de actualizaciones de seguridad protege contra las últimas amenazas y vulnerabilidades, lo que mantiene al sistema a salvo de ataques.
wex.fleet.mgmt.recommended.desc.missing_windows_updates=La instalación de las últimas actualizaciones corrige vulnerabilidades y garantiza que su sistema permanezca seguro y funcionando bien.
wex.fleet.mgmt.recommended.desc.poor_network_signal_strength=Una alta intensidad de la señal asegura y confiabilidad de la conexión, minimizando las interrupciones durante las actividades en línea.
wex.fleet.mgmt.recommended.desc.poor_nominal_speed=Internet confiable y de alta velocidad es crucial para completar tareas con eficiencia, acceder a servicios en la nube y colaborar con colegas sin interrupciones.
wex.fleet.mgmt.recommended.desc.unauthenticated_connection=Al requerir autenticación, las empresas pueden evitar que dispositivos malintencionados se conecten a la red, lo que reduce el riesgo de violaciones de seguridad.
wex.fleet.mgmt.recommended.desc.windows_secure_boot_not_enabled=La habilitación del arranque seguro evita modificaciones no autorizadas de firmware y sistema operativo, lo que aumenta la seguridad del sistema.
