welcome.whats_new.line1=Jonathan Nikols, VP y Líder mundial de HP TechPulse
welcome.whats_new.line2=HP acaba de celebrar el primer aniversario de la entrega de los Planes de TechPulse a los clientes y socios y ¡fue una conmemoración espectacular! En octubre de 2018, HP tuvo el orgullo de recibir el Premio 2018 STAR por la innovación en la Oferta y/o catálogo de servicios administrados estándar de la Technology Services Industry Association (TSIA), gracias a nuestra solución TechPulse. Este fue un momento muy especial, en la medida en que constituyó el 15° premio general de la TSIA y mejoró la posición de HP en el Salón de la Fama de premiados de la TSIA.
welcome.whats_new.line3=Proactive Management con los planes de HP TechPulse ayudará a los clientes a obtener más valor de sus inversiones de TI existentes, les brindará asistencia en su jornada hacia Windows 10 y posibilitará una toma de decisiones más inteligente para impulsar los resultados comerciales. En el caso de los socios, estamos mejorando la experiencia de entrega de servicios de TechPulse, aumentando el espacio de solución direccionable de TechPulse y simplificando el proceso de ayudar a los clientes a encontrar los servicios de ciclo de vida correctos para complementar su plan preferido de TechPulse.
welcome.whats_new.line4=En el centro del éxito general de TechPulse hay un enfoque continuo en la plataforma, la tecnología y los procesos que nos ayudan a generar la innovación de los servicios. HP Proactive Management con TechPulse ahora es más inteligente, más rápido y más poderoso que nunca, y estamos sentando las bases para un futuro exitoso juntos.
welcome.whats_new.line5=Una vez más: gracias por acompañarnos en esta interesante jornada. ¡Esperamos celebrar muchos años más de colaboración exitosa con usted!
