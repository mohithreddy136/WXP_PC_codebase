wpt.details.desc=Proteja sus datos con confianza, rastree su flota de dispositivos HP y evite el acceso de usuarios no autorizados a sus archivos y documentos con HP {appName}, el mejor servicio de localización, bloqueo y borrado del mundo. Impulsado por HP Workforce Experience Platform, HP {appName} proporciona un completo servicio realizado por hardware para ubicar, bloquear y borrar el contenido de dispositivos, aunque los PC estén desconectados y apagados.
wpt.details.header=Establezca su primera línea de defensa
wpt.disclaimer.point1=Basado en análisis internos de los servicios de software de encontrar, bloquear y borrar. Más seguro basado en cifrado y persistencia (incluyendo persistencia basada en hardware) a octubre de 2021.
wpt.disclaimer.point2=HP {appName} está disponible en algunos HP 600, 800, 1000, en los laptops Elite Dragonfly con Windows, en algunos desktops 800 y en las estaciones de trabajo Z1 G8, y funcionará cuando el dispositivo esté encendido y conectado a Internet.
wpt.disclaimer.point3=HP Workforce Experience Platform es una plataforma de telemetría y análisis que proporciona datos críticos sobre dispositivos y aplicaciones, y no se vende como un servicio separado. HP Workforce Experience Platform sigue las rigurosas normas de privacidad GDPR y posee certificación ISO27001, ISO27701, ISO27017 y SOC2 Type2 para seguridad de la información. Requiere acceso a Internet con conexión al portal de Workforce Experience Platform. Para obtener todos los requisitos de sistema, visite <a href=\"{link}\" target=\"_blank\" style=\"text-decoration: none; color: #027aae; cursor: pointer;\">{text}</a>.
wpt.disclaimer.point4=Protegido por hardware se refiere a HP Sure Run Gen4 y posterior, que está disponible en equipos HP compatibles con este servicio, y requiere Windows 10 y posterior.
wpt.disclaimer.point5=Los niveles de servicio y tiempos de respuesta para los soportes de hardware HP pueden variar según la región geográfica. El servicio tiene inicio en la fecha de compra del hardware. Se aplican restricciones y limitaciones. Para obtener más información, visite <a href="https://www.hp.com/go/cpc" target="_blank" style="text-decoration: none; color: #027aae; cursor: pointer;">www.hp.com/go/cpc</a>. Los Servicios HP se rigen por los términos y condiciones de servicio de HP aplicables, brindados o indicados al Cliente en el momento de la compra. El Cliente podría tener derechos legales adicionales de acuerdo con las leyes locales aplicables, y tales derechos no se ven afectados de ninguna forma por los términos y condiciones de servicio de HP o la Garantía limitada de HP que se brinda con su producto HP.
wpt.explore.header=Explorar la solución
wpt.feature.cost.desc=La pérdida de un PC puede costar mucho más que dinero. Ayude a mitigar riesgos y reducir costos asociados a la pérdida de un PC con HP {appName}. Ahora existe una manera de localizar un PC extraviado o robado y bloquear el acceso o borrar los datos.
wpt.feature.cost.title=Menos costos y menos preocupaciones
wpt.feature.data.desc=Utilice el servicio más seguro con criptografía con umbral para encontrar, bloquear y borrar datos de todos sus dispositivos HP, para ayudar a proteger información confidencial.
wpt.feature.data.title=Proteja sus dispositivos y datos
wpt.feature.monitoring.desc=Con el panel del usuario simplificado de HP Workforce Experience Platform, las personas que toman decisiones de TI pueden responder ante la pérdida o el robo de dispositivos más rápido, supervisando el estado de protección de todos los dispositivos en una única plataforma fácil de usar.
