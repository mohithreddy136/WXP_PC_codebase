exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.appsCausingHighCpu=Las aplicaciones que consumen más CPU se identificarán en la columna Aplicaciones que consumen mucha CPU.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeBackgroundProcesses=Un gran número de procesos y servicios en segundo plano, incluyendo actualizaciones del sistema, análisis antivirus y otras tareas de mantenimiento, pueden consumir recursos de la CPU y causar una alta utilización.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeFirmwareBug=Un error en el firmware podría provocar que la CPU funcionara a niveles superiores a los esperados.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeMalfunctioningSoftware=El software que no se ha optimizado o que funciona mal puede causar un uso excesivo de la CPU, especialmente si está atascado en un bucle o consumiendo recursos de modo ineficiente.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeResourceIntensiveApps=La ejecución de aplicaciones que necesitan muchos recursos, como los editores de video, máquinas virtuales o cálculos complejos, pueden consumir una cantidad significativa de recursos de la CPU, llevando a una alta utilización.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.closeHighCpuApps=Cierre las aplicaciones que consumen más CPU.
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.connectAcAdapter=Conéctelo a un adaptador de CA, ya que la CPU puede funcionar con un rendimiento inferior cuando se utiliza la batería, según la configuración de energía del dispositivo.
