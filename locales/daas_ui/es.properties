bios.bsod.tooltip.context=Este impacto del BIOS se determina por ponderación, donde los casos de BSOD más cercanos a la actualización en otros dispositivos del mismo modelo tienen mayor ponderación. Además, los modelos de dispositivos específicos con una ponderación superior a X% se clasifican con de "alto impacto". El impacto se calcula para cada modelo de dispositivo y se aplica a todos los dispositivos recomendados para esa versión de BIOS específica; si las ocurrencias de BSOD son menores para el modelo, la ponderación es menor y, por lo tanto, el impacto.
