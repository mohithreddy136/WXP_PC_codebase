exp.MemoryUtilizationIsHighForAnExtendedTime.causeHungApp=Una aplicación en ejecución se bloquea / no responde.
exp.MemoryUtilizationIsHighForAnExtendedTime.causeInsufficientMemory=El equipo no dispone de la memoria adecuada para su uso.
exp.MemoryUtilizationIsHighForAnExtendedTime.causeLongRunningApp=Una aplicación en ejecución requiere una gran cantidad de memoria durante un tiempo prolongado para completar una tarea, como el análisis antivirus.
exp.MemoryUtilizationIsHighForAnExtendedTime.causeMemoryLeak=Una aplicación instalada puede tener un error de fuga de memoria.
exp.MemoryUtilizationIsHighForAnExtendedTime.option1Detail=Para ayudar a los clientes a extender la vida útil de sus dispositivos y a mejorar la experiencia de los usuarios finales, es común agregar memoria en los PC que la usan en exceso.
exp.MemoryUtilizationIsHighForAnExtendedTime.option1Title=Opción 1: Aumente la memoria del dispositivo.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail1=Abra el informe Utilización de dispositivos.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail2=Las aplicaciones que consumen más memoria se identificarán en la columna Aplicaciones que consumen mucha memoria.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail3=En función de la aplicación de que se trate, las opciones de respuesta variarán. Si se trata de aplicaciones críticas para la empresa, una actualización de la memoria puede mitigar el problema. Las aplicaciones no críticas para la empresa pueden eliminarse del dispositivo o ajustarse para reducir su carga.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Title=Opción 2: Identifique y desinstale aplicaciones.
exp.MemoryUtilizationIsHighForAnExtendedTime.option3Detail=Reinicie el equipo para cerrar completamente todas las aplicaciones en ejecución.
exp.MemoryUtilizationIsHighForAnExtendedTime.option3Title=Opción 3: Reinicie el dispositivo.
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Detail1=Utilice el Administrador de tareas para ver las aplicaciones en ejecución según la utilización de la memoria.
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Detail2=Cierre las aplicaciones que consumen más memoria.
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Title=Opción 4: Cierre las aplicaciones.
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Detail1=Use Task Manager to identify an application where the Memory utilization is steadily increasing to unusual proportions, but never decreasing.
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Detail2=Verifique si hay actualizaciones del fabricante para esa aplicación.
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Title=Opción 5: Identifique una posible fuga de memoria y actualícela.
