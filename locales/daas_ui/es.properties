welcome.banner.description=TechPulse es una plataforma de telemetría y análisis que brinda datos críticos en torno de dispositivos y aplicaciones, coloca el aprendizaje profundo al alcance de la TI y, de esta forma, brinda a los empleados el equipo, el software y los servicios correctos para tener éxito. HP TechPulse identifica de forma proactiva los problemas, habilita soluciones a escala y minimiza las amenazas mediante la supervisión activa de la postura de seguridad de la organización.
welcome.banner.description_p={app_name} es una plataforma de telemetría y análisis que brinda datos críticos en torno de dispositivos y aplicaciones, coloca el aprendizaje profundo al alcance de la TI y, de esta forma, proporciona a los empleados el equipo, el software y los servicios correctos para tener éxito. {app_name} identifica de forma proactiva los problemas, habilita soluciones a escala y minimiza las amenazas mediante la supervisión activa de la postura de seguridad de la organización.
welcome.banner.description_p1={app_name} es una plataforma basada en telemetría y análisis que agrega datos críticos de configuración y estado de sus dispositivos y aplicaciones. Usando IA y aprendizaje profundo, analiza los datos de forma proactiva para identificar problemas proporcionar soluciones adecuadas y minimizar las amenazas de seguridad.
welcome.banner.title=Plataforma de automatización que brinda servicios de clase mundial mediante perspectivas significativas, con la potencia de miles de millones de puntos de datos
