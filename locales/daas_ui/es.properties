azureonboard.marketing.signupcard.footertext=Al seleccionar el botón, acepto los <a target='_blank' href={termsLink}>Términos y condiciones</a>, acepto proporcionar los datos requeridos para configurar una cuenta y acepto la comunicación por correo electrónico de HP o sus socios con relación a esta prueba.
