requirements.list.hp_print_fleetproxy.desc1=Print Fleet Proxy requiere que HP Web Jetadmin esté instalado en el mismo PC. HP recomienda enfáticamente que actualice a la última versión de Web Jetadmin antes de instalar HP Fleet Proxy.
requirements.list.hp_print_fleetproxy.desc2=Actualmente, HP solo está probando HP Fleet Proxy y HP Web Jetadmin 10.5 SR4. Aunque HP Fleet Proxy puede funcionar con versiones más antiguas de HP Web Jetadmin, HP no garantiza que todos los recursos funcionen como esperado.
requirements.list.hp_print_fleetproxy.desc3=Web Jetadmin es un servicio que requiere muchos recursos. Aunque HP Fleet Proxy no debería añadir una sobrecarga significativa, podría afectar el rendimiento si el servidor host no tiene suficiente potencia de cómputo para soportar tanto los servicios como los dispositivos que administra. Debería asegurarse de que el servidor que aloja HP Web Jetadmin y HP Fleet Proxy es lo suficientemente robusto y tiene suficientes núcleos de procesador para mitigar cualquier problema de rendimiento.
requirements.list.hp_print_fleetproxy.desc4=Al probar 2000 dispositivos, HP encontró que las siguientes especificaciones básicas de hardware deben ser suficientes para producir resultados de rendimiento aceptables. Si nota un rendimiento más lento o gestiona más de 2000 dispositivos, tal vez necesite un servidor con más potencia de computación.
requirements.list.hp_print_fleetproxy.desc5=Print Fleet Proxy es un servicio en las instalaciones que se comunica con el servicio basado en la nube. Como resultado, puede configurar su firewall para permitir comunicación entrante y saliente del servidor WJA y HP Command Center, ya sea a través de filtrado DNS o inclusión en la lista de IP permitidos.
requirements.list.hp_print_fleetproxy.desc6=Puede encontrar la lista aquí:
requirements.list.hp_print_fleetproxy.hp-nf1=Filtrado DNS: Configure su firewall para permitir solicitudes entrantes HTTPS en el puerto 443 para los siguientes puntos de conexión:
requirements.list.hp_print_fleetproxy.hp-nf2=Lista de IP permitidos: Para agregar direcciones IP en la lista de permitidos, necesita incluir la dirección IP de todos los servidores de nube posibles que HP Fleet Proxy pueda necesitar establecer comunicación.
