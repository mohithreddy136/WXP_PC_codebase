partner.exp.mgmt.recommended.button.guide_me=Guíeme
partner.exp.mgmt.recommended.desc.AV_NOT_ENABLED=Solucione todo o desmarque en la tabla de abajo los PC que no habilitará ahora.
partner.exp.mgmt.recommended.desc.AV_WD_SIGNATURE=El mantenimiento de las firmas de malware asegura una protección completa contra las últimas amenazas.
partner.exp.mgmt.recommended.desc.AVG_FAN_SPEED_HIGH=El ventilador funcionando en alta velocidad por demasiado tiempo sugiere que el dispositivo se está sobrecalentando, lo que puede dañar los componentes y acortar la vida útil.
partner.exp.mgmt.recommended.desc.BITLOCKER_ENCRYPTION_NOT_ENABLED=Los dispositivos sin cifrado pueden sufrir exposición de los datos si se extravían o son robados.
partner.exp.mgmt.recommended.desc.DISK_UTILIZATION_HIGH=Los dispositivos con poco espacio libre en el disco pueden volverse lentos y tener dificultad de realizar tareas esenciales.
partner.exp.mgmt.recommended.desc.DOCKING_STATION_AC_ADAPTER_FAILED=La falla del adaptador de CA de la base de conexión puede indicar problemas de hardware que hacen que el dispositivo pierda energía o funcione de modo intermitente.
partner.exp.mgmt.recommended.desc.DOCKING_STATION_FIRMWARE_OUT_OF_DATE=El firmware desactualizado de la base de conexión puede causar problemas de compatibilidad, limitación de funcionalidad y brechas de seguridad.
partner.exp.mgmt.recommended.desc.EXCESSIVE_OS_SHUTDOWN_TIME=Un proceso de apagado más largo puede significar que hay aplicaciones bloqueadas, hardware con retraso, scripts demasiado largos o tareas de Windows incompletas.
partner.exp.mgmt.recommended.desc.EXCESSIVE_OS_STARTUP_TIME=SI el inicio es demasiado largo, puede significar que hay conflictos de software o problemas de hardware.
partner.exp.mgmt.recommended.desc.FIREWALL_DISABLED=El firewall Windows Defender desactivado puede exponer los dispositivos a ataques maliciosos en su red.
partner.exp.mgmt.recommended.desc.FIREWALL_SIGNATURE_OUTDATED=Las definiciones de firewall obsoletas pueden dejar los dispositivos vulnerables a nuevos malware y ciberamenazas.
partner.exp.mgmt.recommended.desc.GPU_HEALTH_ISSUE=Un problema de GPU detectado puede causar defectos visuales, problemas de rendimiento e incluso falta de imagen.
partner.exp.mgmt.recommended.desc.HIGH_COLLABORATION_SW_ERRORS=Los errores persistentes en software de colaboración pueden afectar los flujos de trabajo de los equipos, dificultar la comunicación y el progreso de los proyectos.
partner.exp.mgmt.recommended.desc.HIGH_WINDOWS_CRASH=Bloqueos y reinicios inesperados indican una inestabilidad subyacente que puede llevar a una pérdida de datos o daños de hardware permanentes.
partner.exp.mgmt.recommended.desc.LAST_REBOOT_MORE_THAN_21_DAYS=Los dispositivos que no fueron reiniciados por un largo período pueden experimentar inestabilidad del SO y problemas de rendimiento.
partner.exp.mgmt.recommended.desc.MAXIMISE_MY_BATTERY_HEALTH_NOT_ENABLED=Si no activa el Administrador de estado de la batería, puede verse afectada la vida útil de la batería.
partner.exp.mgmt.recommended.desc.MEMORY_UTILIZATION_HIGH=La alta utilización de memoria del dispositivo por demasiado tiempo puede lentificar el dispositivo, lo que afecta el rendimiento de los empleados.
partner.exp.mgmt.recommended.desc.MISSING_CRITICAL_DRIVER_UPDATES=Sin las actualizaciones críticas de controlador, el hardware de los dispositivos puede presentar mal funcionamiento o no funcionar.
partner.exp.mgmt.recommended.desc.MISSING_WINDOWS_SECURITY_UPDATES=Las actualizaciones de seguridad obsoletas pueden hacer que los dispositivos queden vulnerables a hackers y virus.
partner.exp.mgmt.recommended.desc.MISSING_WINDOWS_UPDATES=Las actualizaciones de Windows obsoletas exponen los dispositivos a vulnerabilidades y potenciales ataques de malware.
partner.exp.mgmt.recommended.desc.PC_REFRESH=Inicie una actualización inteligente o desmarque en la tabla de abajo los PC que no habilitará ahora.
partner.exp.mgmt.recommended.desc.PC_REFRESH_SELECT=Revise los dispositivos y continúe con la solicitud.
partner.exp.mgmt.recommended.desc.security=Solucione todo o desmarque en la tabla de abajo los PC que no habilitará ahora.
partner.exp.mgmt.recommended.desc.WINDOWS_SECURE_BOOT_NOT_ENABLED=La habilitación del arranque seguro de Windows asegura que el dispositivo arranque usando solo software de confianza.
partner.exp.mgmt.recommended.disk_utilization_high=Libere espacio en disco.
partner.exp.mgmt.recommended.docking_station_ac_adapter_failed=Investigue la falla del adaptador de CA de la base de conexión.
partner.exp.mgmt.recommended.docking_station_firmware_out_of_date=Actualice el firmware de la base de conexión.
partner.exp.mgmt.recommended.excessive_os_shutdown_time=Optimice el tiempo de apagado del sistema operativo.
partner.exp.mgmt.recommended.excessive_os_startup_time=Optimice el tiempo de arranque del sistema operativo.
