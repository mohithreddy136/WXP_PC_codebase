dnto.subscriptions.privacy_statement.desc1=HP reconoce que la privacidad es un derecho humano fundamental y comprende la importancia de la privacidad, seguridad y protección de los datos de nuestros clientes y socios en todo el mundo. Como organización internacional, con entidades legales, procesos comerciales, estructuras de administración y sistemas técnicos que cruzan fronteras, nos esforzamos para proporcionar protección en todas nuestras operaciones que superen los requisitos legales mínimos e implementar políticas y procedimientos rigurosos y coherentes.
dnto.subscriptions.privacy_statement.desc2=Como usados en esta declaración, los términos "nosotros," "a nosotros," "nuestro" y "empresa" se refieren a las empresas con la marca HP y las afiliadas -actuales y futuras- como definido por las leyes locales (aquí llamados "HP"). La información de contacto del Director de protección de datos de HP aparece en la sección "{0}" a continuación.
dnto.subscriptions.privacy_statement.exercise_rights=Ejercicio de sus derechos y contacto
dnto.subscriptions.privacy_statement.heading=Declaración de privacidad de HP
dnto.subscriptions.section.details.desc1=Los empleados están acostumbrados con -e incluso exigen- flexibilidad para trabajar cómo y cuándo lo desean. Los equipos de TI están sobrecargados, lo que afecta la experiencia de los empleados, la productividad y la participación.
dnto.subscriptions.section.details.desc2=HP Workforce Experience Pro puede prever y resolver de modo inteligente la fricción digital desde una plataforma modular consolidada.
dnto.subscriptions.section.details.desc3=Ya sea que gestione un pequeño equipo en un solo lugar o una fuerza laboral híbrida internacional con todas sus complejidades, HP Workforce Experience Pro proporciona una plataforma unificada para dar soporte y optimizar las experiencias digitales de sus empleados.
dnto.subscriptions.section.details.desc4=Impulse la productividad de los empleados solucionando proactivamente problemas de TI antes de que ocurran. Reduzca los costos y las horas de soporte de TI con IA avanzada. Refuerce la seguridad de los puntos de conexión al predecir y resolver amenazas.
dnto.subscriptions.section.details.desc5=Mejore el sentimiento de sus empleados con información utilizable de las encuestas de pulso. Optimice los costos con actualizaciones de hardware inteligentes. Integre perfectamente los entornos con varios proveedores y diferentes SO existentes.
dnto.subscriptions.section.details.heading=Detalles de la suscripción
dnto.subscriptions.sign_in=Inicie sesión en HP Workforce Experience
dnto.subscriptions.thank_you.desc=Gracias por elegir HP Workforce Experience. Estamos seguros de que obtendrá más productividad y colaboración. Si tiene preguntas sobre los primeros pasos, no deje de visitar nuestros completos recursos de soporte o contacte a nuestro equipo de servicio al cliente.
