azureonboard.marketing.disclaimer.content=La información contenida en el presente documento está sujeta a cambios sin previo aviso. Las únicas garantías para los productos y servicios de HP están estipuladas en las declaraciones expresas de garantía que acompañan a dichos productos y servicios. La información contenida en este documento no se debe interpretar como una garantía adicional. HP no se responsabilizará por errores técnicos o de edición ni por omisiones contenidas en el presente documento.
azureonboard.marketing.disclaimer.contentlist1=HP Proactive Insights y/o los componentes incluidos pueden variar según la región, el sistema operativo o el partner de servicios autorizado de HP. Comuníquese con su representante local de HP o con el partner autorizado para obtener los detalles específicos de su ubicación. Los servicios HP se rigen por los términos y condiciones de servicio de HP aplicables, brindados o indicados al Cliente en el momento de la compra. El Cliente podría tener derechos legales adicionales de acuerdo con las leyes locales aplicables, y tales derechos no se ven afectados de ninguna forma por los términos y condiciones de servicio de HP o la Garantía limitada de HP que se brinda con su producto HP.
azureonboard.marketing.disclaimer.contentlist2=HP {appName} es una plataforma de telemetría y análisis que proporciona datos críticos sobre dispositivos y aplicaciones, y no se vende como un servicio separado. HP {appName} sigue las rigurosas normas de privacidad GDPR y posee certificación ISO27001, ISO27701, ISO27017 y SOC2 Type2 para seguridad de la información. Requiere acceso a Internet con conexión a {appName}. Para conocer todos los requisitos del sistema, visite <a target='_blank' href={link}>{text}</a>.
azureonboard.marketing.disclaimer.contentlist3=Las actualizaciones de BIOS solo están disponibles para dispositivos HP.
azureonboard.marketing.disclaimer.contentlist4=Para obtener información sobre la cobertura del SO, visite <a target='_blank' href={link}>{text}</a>.
azureonboard.marketing.employeesection.description=Recopile, mida y administre la experiencia digital de sus empleados mediante una correlación de hardware, aplicación y encuestas sobre la experiencia de los empleados en todos los dispositivos.
azureonboard.marketing.employeesection.heading=Proactive Employee Insight
azureonboard.marketing.hardwaresection.description=Supervise proactivamente unidades de disco de dispositivos, uso de la CPU, niveles de temperatura y estado de la batería, con capacidad de predecir problemas potenciales mediante el análisis de sus datos, al compararlos con un almacén de datos de más de 20 millones de dispositivos.
azureonboard.marketing.hardwaresection.heading=Proactive Hardware Insight
azureonboard.marketing.insightsection.description=Diagnostique problemas de rendimiento, errores de software, bloqueos con pantalla azul y uso de recursos del sistema, al mismo tiempo que actualiza controladores y parches para asegurar la protección de los perfiles.
azureonboard.marketing.insightsection.heading=Proactive Application Insight
azureonboard.marketing.learnmoresection.content=Al agregar conocimiento de más de 20 millones de dispositivos y miles de millones de puntos de datos, HP Proactive Insights aprovecha la plataforma de análisis HP TechPulse para identificar y solucionar errores antes de que causen problemas.
azureonboard.marketing.learnmoresection.description=Lo ayudamos a cambiar el paradigma de su administración de dispositivos mediante un control proactivo con IA del rendimiento de los equipos, la seguridad, los costos, el tiempo de inactividad y el nivel de satisfacción de los empleados. Podrá aprovechar la información adquirida de más de 20 millones de dispositivos de computación para mejorar su organización.
azureonboard.marketing.learnmoresection.heading=HP Proactive Insights ofrece un análisis importante con miles de millones de puntos de datos
