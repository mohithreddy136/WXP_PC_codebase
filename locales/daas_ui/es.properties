wex.fleet.mgmt.remediation.kernel_panic_error.desc=Se ha producido un kernel panic, lo que indica un error crítico del sistema del cual el kernel de Linux no puede recuperarse. Esto podría deberse a fallos de hardware, controladores dañados, parámetros del kernel mal configurados o módulos del kernel incompatibles. Es necesario realizar una investigación inmediata para identificar la causa raíz.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt1=Revise los registros del sistema (/var/log/messages, /var/log/syslog o journalctl) para identificar mensajes de error anteriores al kernel panic.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt2=Compruebe el estado del hardware, especialmente la memoria (RAM) y la integridad del disco, utilizando herramientas como memtest86 y smartctl.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt3=Verifique los cambios recientes en el sistema (por ejemplo, actualizaciones del núcleo, instalaciones de controladores o cambios en la configuración).
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt4=Arranque en modo de rescate o recuperación para acceder al sistema en caso de que no sea arrancable.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt5=Restaure o actualice los módulos del kernel y los controladores que se consideren incompatibles.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt6=Consulte al soporte del proveedor o a la comunidad si el problema persiste o si está relacionado con el hardware.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.desc=Activar el cifrado de disco protege los datos sensibles en reposo, al garantizar que toda la información almacenada en el disco sea ilegible sin la autenticación adecuada. Esta es una medida de seguridad fundamental para los sistemas que manejan información confidencial o sujeta a regulación.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step1=Implemente el cifrado completo de disco utilizando herramientas como LUKS (Linux Unified Key Setup) o dm-crypt, según la distribución de Linux que utilice.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step2=Cifre las particiones confidenciales (por ejemplo, /home, /var o /data) si no es posible cifrar todo el disco.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step3=Configure una gestión segura de claves, incluidas frases de contraseña o integración con TPM (Módulo de plataforma de confianza) si está disponible.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step4=Realice una copia de seguridad de las claves de cifrado de forma segura para evitar la pérdida de datos en caso de extravío de las claves.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step5=Pruebe los ajustes de cifrado para asegurar que el sistema arranque correctamente y pueda acceder a los datos después de la autenticación.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step6=Documente la configuración del cifrado y los procedimientos de recuperación para garantizar el cumplimiento normativo y la continuidad operativa.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step1=Instale y configure una herramienta de firewall, como firewalld, ufw o iptables, según la distribución de Linux que utilice.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step2=Active el servicio de firewall para que se inicie al arrancar el sistema
wex.fleet.mgmt.remediation.linux_firewall_disabled.step3=Defina reglas de firewall para permitir solo los servicios necesarios (por ejemplo, SSH, HTTP/HTTPS) y bloquear todos los demás.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step4=Verifique el estado y las reglas del firewall utilizando: sudo firewall-cmd --list-all (para firewalld) o sudo ufw status (para ufw)
wex.fleet.mgmt.remediation.linux_firewall_disabled.step5=Audite periódicamente las configuraciones del firewall para asegurarse de que estén alineadas con las políticas de seguridad y las necesidades operativas.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.desc=Activar Secure Boot ayuda a proteger el sistema contra código no autorizado o malicioso durante el proceso de arranque, mediante la verificación de las firmas digitales de los cargadores de arranque, módulos del kernel y controladores. Esto mejora la integridad y la seguridad del sistema, especialmente en entornos empresariales o con requisitos de cumplimiento normativo.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step1=Verifique que el firmware UEFI sea compatible con Secure Boot y asegúrese de que esté activado en la configuración de UEFI.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step2=Instale y configure cargadores de arranque y paquetes del kernel firmados que sean compatibles con Secure Boot (p. ej., utilizando shim y GRUB firmado).
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step3=Verifique que el kernel, los módulos y todos los componentes necesarios estén firmados digitalmente.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step4=Reinicie el sistema y confirme el estado de Secure Boot utilizando mokutil.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step5=Registre claves personalizadas si utiliza componentes no estándar.
wex.fleet.mgmt.remediation.missing_linux_security_updates.desc=Faltan actualizaciones críticas de seguridad en el sistema. Estas actualizaciones corrigen vulnerabilidades conocidas en el sistema operativo, el kernel y los paquetes instalados. Omitir la instalación de estas actualizaciones puede incrementar el riesgo de accesos indebidos, compromisos de datos o fallos en la disponibilidad del servicio.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step1=Revise e identifique los parches de seguridad faltantes mediante el gestor de paquetes del sistema (por ejemplo, apt, yum, dnf o zypper).
wex.fleet.mgmt.remediation.missing_linux_security_updates.step2=Aplique de inmediato todas las actualizaciones críticas de seguridad para mitigar amenazas y vulnerabilidades conocidas.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step3=Reinicie el sistema si es necesario, especialmente después de actualizaciones del kernel o de servicios principales.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step4=Active las actualizaciones automáticas de seguridad o configure un programa regular de aplicación de parches para garantizar una protección oportuna.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step5=Verifique que la actualización se haya realizado correctamente revisando los registros y confirmando las versiones de los paquetes.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step6=Realice un análisis de vulnerabilidades posterior a la actualización para asegurarse de que no queden riesgos residuales.
wex.fleet.mgmt.remediation.missing_linux_updates.desc=Faltan actualizaciones críticas de Linux en el sistema. Estas actualizaciones pueden incluir parches de seguridad, correcciones del kernel y mejoras de estabilidad. Ejecutar un sistema desactualizado aumenta el riesgo de vulnerabilidades, fallos del sistema y problemas de compatibilidad.
wex.fleet.mgmt.remediation.missing_linux_updates.step1=Revise las actualizaciones disponibles mediante su gestor de paquetes (por ejemplo, yum, dnf, apt o zypper) para identificar los parches críticos que faltan.
wex.fleet.mgmt.remediation.missing_linux_updates.step2=Aplique todas las actualizaciones de seguridad y del kernel lo antes posible para mitigar las vulnerabilidades conocidas.
wex.fleet.mgmt.remediation.missing_linux_updates.step3=Reinicie el sistema si es necesario, especialmente después de actualizaciones del kernel o del sistema principal.
wex.fleet.mgmt.remediation.missing_linux_updates.step4=Active las actualizaciones automáticas o configure una programación regular de parches para garantizar la aplicación oportuna de futuras actualizaciones.
wex.fleet.mgmt.remediation.missing_linux_updates.step5=Verifique que la actualización se haya completado correctamente revisando los registros del sistema y confirmando las versiones actuales del kernel y de los paquetes instalados.
wex.fleet.mgmt.remediation.network_connection_not_secure.desc=Se informó una conexión de red sin la seguridad esperada en las últimas 24 horas.
wex.fleet.mgmt.remediation.network_connection_not_secure.desc1=Conexión no autenticada detectada en los últimos 7 días.
wex.fleet.mgmt.remediation.network_disconnections.desc=Los dispositivos informaron repetidas desconexiones de red en las últimas 24 horas.
wex.fleet.mgmt.remediation.network_disconnections.desc1=Se han detectado desconexiones de red en los últimos 7 días.
wex.fleet.mgmt.remediation.network_speed_slow.desc=La velocidad de red nominal informada era baja en las últimas 24 horas.
wex.fleet.mgmt.remediation.wifi_signal_strength_weak.desc=La señal de Wi-Fi se informó como débil en las últimas 24 horas.
