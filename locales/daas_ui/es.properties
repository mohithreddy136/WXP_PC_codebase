wex.fleet.mgmt.troubleshoot.linux_firewall_disabled.description=Activar el firewall ayuda a proteger el sistema contra accesos no autorizados, ataques basados en la red y tráfico no deseado, al controlar las conexiones entrantes y salientes. Este es un paso fundamental para asegurar los sistemas Linux, especialmente aquellos expuestos a redes públicas o empresariales.
