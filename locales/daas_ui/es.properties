exp.NetworkConnectionNotSecure.moreInfoHeader=Más información:
exp.NetworkConnectionNotSecure.moreInformationHeader=Más información:
exp.NetworkConnectionNotSecure.recAccessControl=Implemente software de control de acceso a la red para restringir el acceso.
exp.NetworkConnectionNotSecure.recChangeSecurity=Cambie la configuración de seguridad de Wi-Fi en el hogar
exp.NetworkConnectionNotSecure.recChangeSecurity.step1=Inicie sesión en el enrutador usando su software de administración.
exp.NetworkConnectionNotSecure.recChangeSecurity.step2=Cambie el tipo de seguridad de la red Wi-Fi doméstica.
exp.NetworkConnectionNotSecure.recChangeSecurity.step3=Seleccione un protocolo de autenticación moderno (como WPA2 o WPA3).
exp.NetworkConnectionNotSecure.recCheckPCSettings=Revise la configuración de red del dispositivo.
exp.NetworkConnectionNotSecure.recCheckPCSettings.detail=Asegúrese de que el firewall esté habilitado y la red esté marcada como privada, cuando sea apropiado.
exp.NetworkConnectionNotSecure.recCheckRouterSettings=Revise la configuración de seguridad del enrutador.
exp.NetworkConnectionNotSecure.recCheckRouterSettings.detail=Habilite el cifrado, establezca una contraseña de administrador fuerte y desactive WPS si no es necesario.
exp.NetworkConnectionNotSecure.recCheckSecurityProtocol=Verifique el protocolo de seguridad inalámbrica.
exp.NetworkConnectionNotSecure.recCheckSecurityProtocol.detail=Use WPA2 o WPA3; evite redes abiertas o WEP.
exp.NetworkConnectionNotSecure.recCheckSSID=Verifique si está en el SSID correcto.
exp.NetworkConnectionNotSecure.recCheckSSID.detail=Confirme si el nombre de la red coincide con el punto de acceso de confianza.
exp.NetworkConnectionNotSecure.recEnableEncryption=Habilite cifrado de red para proteger la transmisión de datos.
exp.NetworkConnectionNotSecure.recMacFiltering=Use un filtro de dirección MAC para permitir solo dispositivos aprobados.
exp.NetworkConnectionNotSecure.recMonitorActivity=Supervise la actividad de red para detectar dispositivos no autorizados.
exp.NetworkConnectionNotSecure.recommendationsHeader=Recomendaciones:
exp.NetworkConnectionNotSecure.recommendationsHeader1=Recomendaciones:
exp.NetworkConnectionNotSecure.recStrongPasswords=Establezca contraseñas fuertes y únicas para proteger el acceso a la red.
exp.NetworkConnectionNotSecure.recUpdateFirmware=Actualice con regularidad el firmware del enrutador y el firmware para evitar vulnerabilidades.
exp.NetworkConnectionNotSecure.recUpgradeRouter=Actualice los enrutadores o puntos de acceso antiguos con nuevos estándares de seguridad.
exp.NetworkDisconnections.causeInsufficientSpeed=Velocidad de Internet insuficiente
exp.NetworkDisconnections.causeInsufficientSpeed.detail1=Un ancho de banda bajo en horario pico de uso puede crear inestabilidad e interrupciones frecuentes.
exp.NetworkDisconnections.causeInsufficientSpeed.detail2=Recomendación: Ejecute pruebas de velocidad y actualice el plan de servicio si el ancho de bando recibido es inadecuado.
