exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option1=Opción 1: Si está conectado a la red Wi-Fi de su hogar, se aconseja cambiar el tipo de seguridad que usa su enrutador o punto de acceso.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option1.step1=Acceda al enrutador usando el software.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option1.step2=Cambie el tipo de seguridad de su red Wi-Fi doméstica.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option2=Opción 2: Si tiene un enrutador o punto de acceso antiguos, es recomendable obtener un enrutador más nuevo que sea compatible con los estándares y las mejoras de seguridad más recientes.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.recommendations=Recomendaciones:
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.title=La conexión Wi-Fi no es segura
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.cause1=La ubicación del enrutador en su casa puede ser la causa de los problemas de Wi-Fi.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.cause2=El punto de acceso podría estar detrás de paredes u otros obstáculos.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.description=La fuerza de la señal de Wi-Fi se informó como lenta en las últimas 24 horas.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.moreInfo=Más información:
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.moreInfoLink=https://support.microsoft.com/en-us/windows/wi-fi-problems-and-your-home-layout-e1ed42e7-a3c5-d1be-2abb-e8fad00ad32a#WindowsVersion=Windows_11
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.possibleCauses=Causas posibles para la red doméstica:
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1=Opción 1: Reinicie el enrutador
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step1=Desconecte el módem y el enrutador de la toma eléctrica.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step2=Espere 15 segundos como mínimo.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step3=Primero, conecte el módem de nuevo en la toma de CA; espere de 1 a 2 minutos y luego encienda el enrutador.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step4=Espere que todas las luces de su módem por cable se iluminen de verde antes de probar la conexión de Internet.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2=Opción 2: Cambie de lugar el punto de acceso.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step1=Si es posible, cambie de lugar el punto de acceso para reducir el número de paredes y otros obstáculos entre el punto de acceso y su PC.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step2=Si es posible, acerque el PC al punto de acceso.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step3=Aproxime el punto de acceso al centro de la casa o de la habitación y colóquelo en un lugar más alto, si fuese posible. Si lo pone en un rincón o debajo de un escritorio, puede debilitar la señal de Wi-Fi.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendations=Recomendaciones:
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.title=La señal de Wi-Fi es débil
exp.mgmt.troubleshoot.network.wifispeedisslow.cause1=El punto de acceso podría estar detrás de paredes u otros obstáculos.
exp.mgmt.troubleshoot.network.wifispeedisslow.cause2=El firmware del enrutador podría estar desactualizado.
exp.mgmt.troubleshoot.network.wifispeedisslow.description=La velocidad nominal del Wi-Fi se informó como lenta en las últimas 24 horas.
exp.mgmt.troubleshoot.network.wifispeedisslow.possibleCauses=Causas posibles para la red doméstica:
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation1=Reinicie su módem y su enrutador
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation1.step1=Apague primero su módem y después el enrutador.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation2=Cambie de lugar su enrutador
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation2.step1=Intente colocar el enrutador en otro lugar de su casa u oficina, o mueva las antenas.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation3=Actualice el firmware de su enrutador
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation3.step1=La actualización periódica del firmware del enrutador puede corregir errores y problemas de conectividad. Algunos enrutadores pueden tener actualizaciones automáticas, pero la mayoría requiere actualización manual.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation4=Cambie la frecuencia de su enrutador
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation4.step1=Los enrutadores Wi-Fi seleccionan una banda de frecuencia automáticamente, pero puede intentar cambiarla de 2,4 GHz a 5 GHz para ver si mejora la velocidad. Sin embargo, necesita verificar si su enrutador admite 5 GHz antes de hacerlo.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation5=Actualice los controladores de Wi-Fi
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation5.step1=Los controladores obsoletos o dañados pueden causar problemas de red; asegúrese de que el adaptador de Wi-Fi esté actualizado.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation6=Evite interferencias
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation6.step1=La interferencia de canal puede reducir significativamente el rendimiento y disminuir la velocidad de transferencia de datos; intente eliminar cualquier interferencia existente.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation7=Verifique otros dispositivos
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation7.step1=Revise otros dispositivos conectados a su red y sus actividades. Por ejemplo, si otro dispositivo está descargando muchos datos, podría estar afectando sus velocidades.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendations=Recomendaciones:
exp.mgmt.troubleshoot.network.wifispeedisslow.title=La velocidad de Wi-Fi es lenta
