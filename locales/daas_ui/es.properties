wex.onboarding.skipTour.desc1=Siga su progreso y complete estas tareas esenciales para aprovechar al máximo nuestra plataforma. Agregar dispositivos y usuarios, configurar el perfil de su empresa y crear pulsos de opinión son pasos fundamentales.
