sustainability.dashboard.info_message=Los datos de consumo de energía se recopilan de dos maneras: la medida de consumo de energía (PCM) mediante el chip integrado y el consumo estimado (EC) con base en una reciente actualización del BIOS para PC HP más nuevos. La precisión de los datos depende del método admitido por el PC específico.
sustainability.dashboard.info_message_data=Este método calcula el consumo de energía total en kilovatios-hora (kWh) de un dispositivo, independientemente de su estado (activo, en suspensión, apagado). Al procesar todos los datos capturados al final de cada semana, proporciona una visión completa del uso de energía del dispositivo. Además, calcula y muestra el consumo de energía total de la semana en curso, en tiempo real, hasta el momento presente.
