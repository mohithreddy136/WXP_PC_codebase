banner.iot.update.description=Se implementará un cambio en la infraestructura de la plataforma TechPulse el lunes 27 de febrero de 2023. Tal vez se le pida que actualice las configuraciones de proxy, firewall y el software de inspección de SSL. Ejecute la herramienta de evaluación de la red en <a href='https://www.hpdaas.com/software' target='_blank'>HP TechPulse - Software (hpdaas.com)</a> y verifique si alguno de los cuatro (4) * objetivos de prueba .IoT devuelve un mensaje de error. Si el resultado de la prueba indica un error, siga las instrucciones que se ofrecen aquí: '<b><a href='https://hp.service-now.com/techpulse_kb?id=kb_article&sysparm_article=KB0011291' target='_blank'>KB0011291</a> - Configuración de un Proxy o Firewall'</b> y <b>haga estos cambios hasta el jueves 23 de febrero de 2023</b>.
banner.iot.update.title=SE REQUIERE UNA ACCIÓN
