exp.GpuHealthIssue.causeBlueScreenErrors=Errores de pantalla azul: Los errores de pantalla azul pueden ocurrir debido a programas con uso intensivo de gráficos o efectos visuales ejecutándose al mismo tiempo, o problemas de controlador o hardware.
exp.GpuHealthIssue.causeDoubleBitEcc=Errores de memoria ECC de doble bit: La tarjeta gráfica está experimentando errores de memoria ECC de doble bit, lo que puede indicar problemas de hardware o fallas de la memoria.
exp.GpuHealthIssue.causeHighDoubleBitEccOverTime=Alto número de errores de memoria ECC de doble bit con el paso del tiempo: La tarjeta gráfica presenta una gran cantidad de errores de memoria ECC de doble bit, y el número promedio de errores viene aumentando por lo menos durante 3 semanas.
exp.GpuHealthIssue.causeHighTdrEvents=Gran cantidad de eventos TDR (tiempo de espera y recuperación de controlador de pantalla): La tarjeta gráfica ha experimentado un gran número de eventos TDR, lo que indica posibles problemas de controlador o hardware.
exp.GpuHealthIssue.causeMissingDriverUpdate=Faltan actualizaciones críticas del controlador: La tarjeta gráfica necesita una actualización de controlador crítica, lo que puede afectar el rendimiento y la estabilidad.
exp.GpuHealthIssue.causeThermalIssues=Problemas de temperatura: La tarjeta gráfica presenta una gran cantidad de problemas térmicos y la temperatura de la GPU o de la memoria supera el límite máximo de la temperatura operativa.
exp.GpuHealthIssue.driverOption1=Opción 1: Use HP Image Assistant para actualizar controladores
exp.GpuHealthIssue.driverOption2=Opción 2: Utilice Windows Update para actualizar los controladores
exp.GpuHealthIssue.possibleCauses=Causas posibles:
exp.GpuHealthIssue.remediationBlueScreenPrefix=Para errores de pantalla azul: Compruebe si se están ejecutando programas con uso intensivo de gráficos o efectos visuales al mismo tiempo. Actualice el controlador de la tarjeta gráfica, restaure los ajustes con aumento de frecuencia de reloj a los valores predeterminados, realice una instalación limpia del controlador o restaure los ajustes a la configuración de fábrica; confirme si el suministro de energía es correcto, y limpie los orificios de ventilación y el ventilador. Analice el archivo minidump para ver pasos específicos de solución:
exp.GpuHealthIssue.remediationDoubleBitEcc=Para errores de memoria ECC de doble bit: Continúe supervisando la situación y verifique si el rendimiento sigue disminuyendo. Si el número de errores permanece alto, se aconseja reemplazar la tarjeta gráfica.
exp.GpuHealthIssue.remediationMissingDriver=Para actualización de controlador faltante: Actualice el controlador de la tarjeta gráfica a la última versión para solucionar problemas de rendimiento.
exp.GpuHealthIssue.remediationTdr=Para eventos TDR: Continúe supervisando y actualice el controlador de la tarjeta gráfica si el problema persiste. Restaure los ajustes de gráficos a los valores predeterminados, restaure los ajustes con aumento de frecuencia de reloj a los valores predeterminados, actualice el BIOS (si hay una actualización disponible), verifique si el suministro de energía es suficiente y el flujo de aire es adecuado. Limpie los orificios de ventilación y el ventilador.
exp.GpuHealthIssue.remediationThermal=Para problemas de temperatura: Verifique obstrucciones del flujo de aire, limpie los orificios de ventilación y asegúrese de que el ventilador esté limpio y funcione correctamente.
exp.GpuHealthIssue.suggestedRemediations=Soluciones sugeridas:
exp.GpuHealthIssue.title=Verificar el estado de la GPU
exp.HpBatteryHealthManagerNotEnabled.causeNotCompatible=El dispositivo no es compatible con el Administrador de estado de batería de HP.
exp.HpBatteryHealthManagerNotEnabled.causeRequiresBiosUpdate=El dispositivo requiere una actualización del BIOS.
exp.HpBatteryHealthManagerNotEnabled.description=El Administrador de estado de batería de HP está disponible en todos los notebooks HP de uso empresarial desde 2016. Para mejorar la vida útil de la batería, se recomienda activar el Administrador de estado de batería de HP.
exp.HpBatteryHealthManagerNotEnabled.option1Detail=HP recomienda la activación del Administrador de estado de batería de HP con la opción 'Dejar que HP administre la carga de mi batería' o 'Maximizar el estado de mi batería' según el uso o la antigüedad del equipo.
exp.HpBatteryHealthManagerNotEnabled.option1Title=Opción 1: Actualice el BIOS a una versión compatible
exp.HpBatteryHealthManagerNotEnabled.possibleCauses=Causas posibles:
exp.HpBatteryHealthManagerNotEnabled.reference1Link=https://support.hp.com/us-en/document/ish_4449597-3519507-16
exp.HpBatteryHealthManagerNotEnabled.reference1Text=Administrador de estado de la batería HP - Soporte
exp.HpBatteryHealthManagerNotEnabled.references=Referencias:
exp.HpBatteryHealthManagerNotEnabled.settingLetDetail1=Cambia dinámicamente cómo el sistema carga la batería con base en las condiciones de uso y la temperatura con el paso del tiempo.
exp.HpBatteryHealthManagerNotEnabled.settingLetTitle=Dejar que HP administre la carga de mi batería
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases1=Entornos de uso mixto, en que el notebook regularmente se desconecta de la alimentación CA y se deja descargar la batería.
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases2=Dé preferencia a un proceso único para su empresa.
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases3=El notebook tiene menos de un año de uso.
exp.HpBatteryHealthManagerNotEnabled.settingMaxDetail1=Limita el estado de carga máxima al 80 % para optimizar el buen funcionamiento de la batería y evitar que se hinche.
exp.HpBatteryHealthManagerNotEnabled.settingMaxTitle=Maximizar el estado de mi batería
exp.HpBatteryHealthManagerNotEnabled.settingMaxUseCases1=Entornos en que los notebooks están siempre conectados a la alimentación de CA.
exp.HpBatteryHealthManagerNotEnabled.settingMaxUseCases2=Notebooks con un año o más de antigüedad.
exp.HpBatteryHealthManagerNotEnabled.suggestedRemediations=Soluciones sugeridas:
