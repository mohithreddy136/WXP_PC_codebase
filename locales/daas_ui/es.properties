wex.ra.remediation.antivirus_not_enabled=El Antivirus Microsoft Defender es un software antivirus incluido en Windows que puede ayudarlo a proteger su dispositivo de virus, malware y otras amenazas.
wex.ra.remediation.antivirus_signature_outdated=Para garantizar una protección óptima, los archivos de definición de los antivirus deben mantenerse actualizados.
wex.ra.remediation.antivirus_signature_outdated_other=El dispositivo está configurado para utilizar un antivirus de terceros que no sea de Microsoft para ayudar a proteger el dispositivo de virus, malware y otras amenazas, pero se necesitan actualizaciones de firma del antivirus en este dispositivo.
wex.ra.remediation.app_crash=Más de 10 errores de software en los últimos 7 días en Teams, Outlook, Zoom, Webex, Chrome, Office.
wex.ra.remediation.avg_fan_speed_high=La velocidad media del ventilador es alta durante un periodo de tiempo prolongado.
wex.ra.remediation.battery_calibrate=La batería requiere calibración.
wex.ra.remediation.battery_early_detection_wear=Se prevé que la batería tenga menos del 70 % de la capacidad de carga total restante dentro de los últimos 30 días.
wex.ra.remediation.battery_needs_attention=Workforce Experience Platform displays records of battery warnings and failures that can be used to obtain service for a battery that is experiencing issues
wex.ra.remediation.bitlocker_encryption_not_enabled=Para proteger los datos en reposo, se recomienda encarecidamente el cifrado de discos.
wex.ra.remediation.bsod=Se han producido más de 3 comprobaciones de errores (eventos de pantalla azul) en los últimos 7 días.
wex.ra.remediation.bsod_occured=El dispositivo ha experimentado de 1 o más eventos de comprobación de errores en los últimos 7 días.
wex.ra.remediation.cpu_utilization_high=Causas posibles: Una aplicación en ejecución se bloquea / no responde.
wex.ra.remediation.disk_needs_attention=Workforce Experience Platform muestra registros de advertencias y fallas de disco que se pueden utilizar para obtener servicio para un disco que está experimentando problemas.
wex.ra.remediation.disk_utilization_high=Hard disk is near full disk capacity and low in free space.
wex.ra.remediation.docking_station_ac_adapter_failed=The Docking Station AC Adapter is having a hardware issue.
wex.ra.remediation.docking_station_ac_adapter_running_at_reduced_perofmance=El adaptador de CA de la base de conexión no funciona correctamente.
wex.ra.remediation.docking_station_firmware_out_of_date=Possible Causes: The docking station may require a Firmware or Driver update.
wex.ra.remediation.excessive_os_shutdown_time=El proceso de apagado tarda 3 o más minutos en completarse.
wex.ra.remediation.excessive_os_startup_time=El sistema tarda más de 3 minutos en iniciarse.
wex.ra.remediation.firewall_disabled=El firewall ayuda a evitar que los hackers y el software malintencionado accedan a su PC a través de Internet o de una red.
wex.ra.remediation.firewall_signature_outdated=El firewall requiere actualizaciones regulares para garantizar protección óptima contra ataques basados en la red.
wex.ra.remediation.frequent_bsod_occured=Se han producido más de 3 comprobaciones de errores (eventos de pantalla azul) en los últimos 7 días.
wex.ra.remediation.frequent_network_disconnection=Para redes domésticas, asegúrese de que el firmware del enrutador esté actualizado. Además, coloque el enrutador en una ubicación central para minimizar la interferencia. También reduzca el número de dispositivos conectados y considere usar una conexión cableada para dispositivos críticos para mantener la estabilidad y confiabilidad de la red.
wex.ra.remediation.gpu_health_issue=Workforce Experience Platform ha detectado un problema con la GPU que requiere atención inmediata.
wex.ra.remediation.high_collaboration_sw_errors=Más de 10 errores de software en los últimos 7 días en Teams, Outlook, Zoom, Webex, Chrome, Office.
wex.ra.remediation.high_windows_crash=El sistema operativo ha experimentado 1 o más fallas o reinicios inesperados en los últimos 7 días.
wex.ra.remediation.last_reboot_more_than_21_days=El último reinicio fue hace más de 21 días.
wex.ra.remediation.maximise_my_battery_health_not_enabled=HP Battery Health Manager is available on all HP business notebooks since 2016. To improve battery life, it is recommended that Battery Health Manager be enabled
wex.ra.remediation.memory_utilization_high=The average Memory utilization over the last 30 days is 85% or greater.
wex.ra.remediation.missing_critical_bios_updates=Actualice el BIOS para dispositivos compatibles a través de la plataforma seleccionando los dispositivos a continuación y seleccionando "Aplicar política". Para dispositivos incompatibles, actualice los controladores del sistema usando Windows Update o HP Image Assistant.
wex.ra.remediation.missing_critical_driver_updates=El informe de inventario de controladores contiene un inventario detallado de los dispositivos a los que les faltan actualizaciones críticas de controladores de dispositivos.
wex.ra.remediation.missing_windows_security_updates=El panel de seguridad de Workforce Experience Platform contiene KPI que muestran el número de dispositivos ausentes en las actualizaciones de seguridad de Windows.
wex.ra.remediation.os_crash=El sistema operativo ha experimentado 1 o más fallas o reinicios inesperados en los últimos 7 días.
wex.ra.remediation.poor_network_signal_strength=Para redes domésticas, reiniciar el enrutador o cambiarlo de lugar puede reducir los obstáculos entre el punto de acceso y el PC, lo que puede aumentar la fuerza de la señal de Wi-Fi.
wex.ra.remediation.poor_nominal_speed=Para redes domésticas, es aconsejable cambiar el enrutador por un modelo más reciente que admita los últimos estándares de Wi-Fi, como Wi-Fi 6. Además, optimice su red colocando el enrutador en una ubicación central para reducir la interferencia de otros dispositivos, y use conexiones cableadas siempre que sea posible para un desempeño más estable.
wex.ra.remediation.unauthenticated_connection=Para redes domésticas, seleccione un protocolo de encriptación fuerte, como WPA2 o WPA3, y establezca una contraseña fuerte y exclusiva para acceder a la red. Considere también implementar un filtro de dirección MAC y actualizar con regularidad el firmware del enrutador para aumentar la seguridad y evitar conexiones no autorizadas.
wex.ra.remediation.windows_secure_boot_not_enabled=El arranque seguro es un estándar de seguridad desarrollado por los miembros de la industria de PC para garantizar que un dispositivo se inicie utilizando únicamente software de confianza del fabricante del equipo original (OEM).
