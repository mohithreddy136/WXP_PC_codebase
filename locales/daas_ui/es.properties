dnto.subscriptions.about_hp.desc1=Somos una empresa de tecnología que nació de la convicción de que las empresas pueden hacer más que obtener ganancias. Deberían hacer del mundo un lugar mejor. Nuestros esfuerzos para la acción climática, los derechos humanos y la equidad digital prueban que hacemos todo lo posible para lograrlo.
dnto.subscriptions.about_hp.desc2=Con más de 80 años de acciones para probar nuestras intenciones, tenemos la confianza para visualizar un mundo en que la innovación impulsa contribuciones extraordinarias para la humanidad.
dnto.subscriptions.about_hp.desc3=Y nuestra tecnología - un portafolio de productos y servicios para PC, impresoras y soluciones de impresión 3D - fue creada para inspirar este progreso significativo.
dnto.subscriptions.about_hp.desc4=Sabemos que las ideas para el bien de la humanidad pueden venir de cualquier persona, en cualquier lugar y en cualquier momento.
dnto.subscriptions.about_hp.desc5=Y se necesita solo una para cambiar el mundo.
