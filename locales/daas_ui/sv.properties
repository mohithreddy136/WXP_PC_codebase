exp.HpBatteryHealthManagerNotEnabled.references=Referenser:
exp.HpBatteryHealthManagerNotEnabled.settingLetDetail1=Systemet ändrar dynamiskt hur batteriet laddas baserat på användningsförhållanden och temperaturer, över tid.
exp.HpBatteryHealthManagerNotEnabled.settingLetTitle=Låt HP hantera batteriladdningen
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases1=Omgivningar med blandad användning där den bärbara datorn regelbundet kopplas bort från nätströmmen och batteriet laddas ur.
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases2=Föredra en enda process för organisationen.
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases3=Den bärbara datorn är mindre än ett år gammal.
exp.HpBatteryHealthManagerNotEnabled.settingMaxDetail1=Begränsar den maximala laddningen till 80 % för att optimera batteriets hälsa och reducera svullnad.
exp.HpBatteryHealthManagerNotEnabled.settingMaxTitle=Maximera batteristatusen
exp.HpBatteryHealthManagerNotEnabled.settingMaxUseCases1=Omgivningar där bärbara datorer är kontinuerligt anslutna till nätström.
exp.HpBatteryHealthManagerNotEnabled.settingMaxUseCases2=Bärbara datorer som är ett år gamla eller äldre.
