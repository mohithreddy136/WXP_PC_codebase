wex.application.inventory.sidepanel.help.text=Den här rapporten tillhandahåller en mer centraliserad översikt över alla programvaror som är installerade på hela maskinparken. Den tillhandahåller information om de detekterade programvaruversionerna och respektive enheter som använder dem. Detta gör det enklare att spåra och hantera programvaror. IT-team kan använda den här enhetliga kontrollpanelen för att förbättra säkerheten, garantera efterlevnad och planera mer effektivt.
