wex.labs.remediation.ai.description=Du kan använda AI för att korrigera och få vägledning till den mest effektiva lösningen. Den kan intelligent begränsa olika alternativ för att hjälpa teamet att hantera problem både effektivt och konsekvent.
wex.labs.remediation.ai.description.disclaimer=You are about to interact with an AI solution. Content generated by AI might contain inaccuracies and should be verified against the details provided. Please note that AI-generated responses might be incomplete or incorrect, and HP assumes no responsibility for actions taken based on this content.
wex.labs.remediation.ai.details.analyzesAvailableRemediations.desc=Den avancerade algoritmen söker igen pågående åtgärder på plattformen inklusive skript som körs, policyer som tillämpas och enhetsåtgärder/-uppdateringar och kan rekommendera korrigeringar som anpassas efter varje händelse.<br/><br/>Den har historisk användning och framtida åtgärder i åtanke för att kunna föreslå de korrigeringar som kan hantera den här typen av problem inom organisationen. Istället för att spendera tid på att komma fram till rätt handlingsplan kan användare låta AI göra jobbet.
wex.labs.remediation.ai.details.analyzesAvailableRemediations.title=Analyserar tillgängliga korrigeringar
wex.labs.remediation.ai.details.applyOrReview.desc=Beroende på korrigeringen kan administratörer välja att: <br/><div class=remediation-ai-ui><ul><li>Tillämpa omedelbart på markerade enheter.</li><li>Schemalägg till senare för att minimera mängden störningar.</li><li>Granska mer information innan åtgärden bekräftas.</li></ul></div><br/>När åtgärden väl har verkställts spåras förloppet och resultaten beträffande transparens och fortlöpande inlärning.
wex.labs.remediation.ai.details.applyOrReview.title=Verkställ, schemalägg eller granska
wex.labs.remediation.ai.details.continuousLearning.desc=Allt eftersom blir rekommendationerna noggrannare och mer exakta.
wex.labs.remediation.ai.details.continuousLearning.title=Fortlöpande inlärning
wex.labs.remediation.ai.details.howItWorks.title=Så fungerar det
wex.labs.remediation.ai.details.issueToRemediation.desc=När ett problem inte håller sig inom gränsvärdena visas det på kontrollpanelen tillsammans med en tydlig beskrivning av händelsen och hur det kan påverka enheter. Med WXP-plattformen är det nu möjligt att utföra direkta åtgärder och den AI-drivna korrigeringen visar det bästa alternativet för att åtgärda problemet.
wex.labs.remediation.ai.details.issueToRemediation.title=Problem att korrigera
wex.labs.remediation.ai.details.learnsandImproves.desc=Algoritmen kan kontinuerligt förbättra förståelsen för de åtgärder som är bäst anpassade för organisationen.<br/>Systemet kan lära sig något nytt varje gång en åtgärd tillämpas:<div class=remediation-ai-ui><ul><li>Hur effektiv åtgärden var</li><li>Tiden det tog att korrigera problemet</li><li>Om liknande problem uppstod igen</li></ul></div><br/>Den här återkopplingen skapar bättre framtida rekommendationer som är mer exakta och bättre anpassade.
wex.labs.remediation.ai.details.learnsandImproves.title=Lär sig och blir bättre med tiden
wex.labs.remediation.ai.details.overview.desc=AI kan samarbeta med korrigeringar för att underlätta för IT-administratörer och hjälpa dem att snabbt detektera och lösa problem. Funktionen analyserar data från hela maskinparken och rekommenderar den mest effektiva uppdateringen av policyer, skript eller enheter för problemet som har uppstått. Algoritmen använder sig av mönster från redan befintliga åtgärder i miljön och ger förslag på de åtgärder som är mest sannolika att fungera.
wex.labs.remediation.ai.details.recommendBestFix.desc=Varje rekommendation inkluderar: <br/><div class=remediation-ai-ui><ul><li>Typ av åtgärd: Skript, policy eller uppdatering</li><li>Därför är de relevanta: Korrigeringar och automatisering kan i realtid åtgärda problem, maximera medarbetares produktivitet och erbjuda en bättre digital upplevelse men även spara tid och reducera attackvektorer.</li></ul></div>
wex.labs.remediation.ai.details.recommendBestFix.title=Rekommenderar de bästa lösningarna
wex.labs.remediation.ai.details.relevance.desc=AI arbetar tillsammans med organisationens eget bibliotek över korrigeringar.
wex.labs.remediation.ai.details.relevance.title=Relevans
