azureonboard.marketing.disclaimer.content=Informationen i detta dokument kan komma att bli inaktuell utan föregående meddelande. De enda garantier som gäller för HPs produkter och tjänster finns i garantimeddelandena som medföljer produkten eller tjänsten. Ingen information i detta dokument ska tolkas som utgörande ytterligare garanti. HP ansvarar inte för tekniska fel, redaktionella fel eller utelämnanden i detta dokument.
azureonboard.marketing.disclaimer.contentlist1=HP Proactive Insights och/eller inkluderade komponenter kan variera beroende på region, operativsystem eller auktoriserad HP-servicepartner. Kontakta en lokal HP-representant eller auktoriserad partner för mer information om vad som gäller där du befinner dig. HPs tjänster regleras av de HP-villkor som är tillämpliga för den tillhandahållna tjänsten eller som specificeras för kunden vid köptillfället. Kunden kan ha ytterligare lagstadgade rättigheter enligt gällande lokal lagstiftning, och sådana rättigheter påverkas inte på något sätt av HPs villkor eller av HPs begränsade garanti, som medföljer din produkt från HP.
azureonboard.marketing.disclaimer.contentlist2=HP {appName} är en telemetri- och analysplattform som tillhandahåller kritiska data om enheter och applikationer. Den säljs inte som en fristående tjänst. HP {appName} följer strikta GDPR-integritetsbestämmelser och är ISO27001-, ISO27701-, ISO27017- och SOC2 Type2-certifierat för informationssäkerhet. Internetåtkomst med anslutning till {appName} krävs. Fullständiga systemkrav finns på <a target='_blank' href={link}>{text}</a>.
azureonboard.marketing.disclaimer.contentlist3=BIOS-uppdateringar finns endast tillgängliga på HP-enheter.
azureonboard.marketing.disclaimer.contentlist4=Du hittar information om operativsystem som stöds på <a target='_blank' href={link}>{text}</a>.
azureonboard.marketing.employeesection.description=Samla in, beräkna och hantera dina anställdas digitala upplevelse genom att föra samman undersökningar av hårdvara, applikationer och anställdas upplevelse, över alla dina enheter.
azureonboard.marketing.employeesection.heading=Proactive Employee Insight
azureonboard.marketing.hardwaresection.description=Övervaka proaktivt enhetens hårddiskar, CPU-användning, temperaturer och batteritillstånd. Allt tillsammans låter dig förutsäga potentiella effekter genom att analysera dina data mot en datasjö med över 20 miljoner enheter.
azureonboard.marketing.hardwaresection.heading=Proactive Hardware Insight
azureonboard.marketing.insightsection.description=Diagnostisera prestandaproblem, programvarufel, krascher med blue-screen-of-death och systemanvändning. Du kan dessutom samtidigt uppdatera drivrutiner och korrigeringar för att garantera att du har säkerhetsprofiler som är anpassade för din verksamhet.
azureonboard.marketing.insightsection.heading=Proactive Application Insight
azureonboard.marketing.learnmoresection.content=HP Proactive Insights samlar in data från över 20 miljoner enheter och miljarder olika datapunkter och nyttjar HP TechPulse-analysplattformen för att identifiera och lösa problem innan de påverkar dina anställda.
azureonboard.marketing.learnmoresection.description=Vi hjälper dig att transformera hur din enhetshantering fungerar genom AI-driven proaktiv kontroll av datorers prestanda, säkerhet, kostnader, driftstopp och även anställdas tillfredsställelse. Du nyttjar intelligens som har erhållits från över 20 miljoner andra databehandlingsenheter för att förbättra din verksamhet.
