bios.bsod.tooltip.context=Den här inverkan av BIOS fastställa av allvarlighetsgraden, där förekomster av BSOD närmare uppgraderingen i andra enheter av samma modell är av större allvarlighetsgrad. Dessutom klassificeras specifika enhetsmodeller med en allvarlighetsgrad över X % som ”stor allvarlighetsgrad”. Inverkan beräknas per enhetsmodell och gäller för alla enheter som rekommenderas för den specifika BIOS-versionen. Om förekomsterna av BSOD är mindre för en modell är allvarlighetsgraden mindre och därmed även dess inverkan.
