dnto.subscriptions.privacy_statement.desc1=HP erkänner att integritet är en grundläggande mänsklig rättighet och erkänner vidare vikten av integritet, säkerhet och dataskydd för våra kunder och partner runt om i världen. Som en global organisation, med juridiska enheter, verksamhetsprocesser, ledningsstrukturer och tekniska system som verkar över internationella gränser strävar vi efter att tillhandahålla skydd i all vår verksamhet som överskrider de minimala lagstadgade kraven och att använda konsekventa, strikta policyer och rutiner.
dnto.subscriptions.privacy_statement.desc2=Såsom de används i detta meddelande hänvisar termer som ”vi”, ”oss”, ”vårt” och ”Företag” till HP-märkta företag samt nuvarande och framtida dotterbolag, enligt definitionen i lokal lagstiftning (häri ”HP”). Kontaktinformation för HPs dataskyddsombud visas i avsnittet ”{0}” nedan.
