exp.GpuHealthIssue.blueScreenLink=https://docs.microsoft.com/en-us/windows-hardware/drivers/debugger/-analyze
exp.GpuHealthIssue.blueScreenLinkText=https://docs.microsoft.com/en-us/windows-hardware/drivers/debugger/-analyze
exp.GpuHealthIssue.causeBlueScreenErrors=Blåskärmsfel: Blåskärmsfel kan uppstå på grund av att för många grafikintensiva program eller visuella effekter körs samtidigt. Alternativt kan det finnas problem med drivrutiner och hårdvaran.
exp.GpuHealthIssue.causeDoubleBitEcc=ECC-minnesfel med dubbla bits: Grafikkortet upplever ett ECC-minnesfel med dubbla bits vilket kan innebära hårdvaruproblem eller fel på minnet.
exp.GpuHealthIssue.causeHighDoubleBitEccOverTime=Högt antal ECC-minnesfel med dubbla bits över en tidsperiod: Grafikkortet har upplevt ett stort antal ECC-minnesfel med dubbla bits och det genomsnittliga antalet fel har ökat under minst tre veckor.
exp.GpuHealthIssue.causeHighTdrEvents=Ett stort antal TDR-händelser (timeout och återställning av bildskärmsdrivrutinen): Grafikkortet har upplevt ett stort antal TDR-händelser. Detta indikerar att potentiella problem kan finnas med drivrutiner eller hårdvaran.
exp.GpuHealthIssue.causeMissingDriverUpdate=Kritiska uppdateringar av drivrutiner saknas: Grafikkortet saknar en kritisk uppdateringar av drivrutinerna vilket kan påverka dess prestanda och stabilitet.
exp.GpuHealthIssue.causeThermalIssues=Temperaturproblem: Grafikkortet upplever ett stort antal temperaturproblem och grafikprocessorns eller minnets temperaturer är över den maximala driftstemperaturen.
exp.GpuHealthIssue.driverOption1=Alternativ 1: Använd HP Image Assistant för att uppdatera drivrutinerna
exp.GpuHealthIssue.driverOption2=Alternativ 2: Använd Windows Update för att uppdatera drivrutinerna
exp.GpuHealthIssue.possibleCauses=Möjliga orsaker:
exp.GpuHealthIssue.remediationBlueScreenPrefix=För blåskärmsfel: Kontrollera om för många grafikintensiva program eller visuella effekter körs samtidigt. Uppdatera grafikkortets drivrutiner, återställ eventuella överklockade inställningar till standardinställningarna, utför en ny installation av drivrutinerna eller återställ inställningarna till fabriksinställningarna, säkerställ att strömförsörjningen är tillräcklig samt rengör luftventilerna och fläkten. Analysera mini dump-filen för specifika åtgärdssteg:
exp.GpuHealthIssue.remediationDoubleBitEcc=För ECC-minnesfel med dubbla bits: Fortsätt övervaka situationen och se efter om prestandan fortsätter att försämras. Om antalet fel fortsätter att vara högt bör du överväg att byta ut grafikkortet.
exp.GpuHealthIssue.remediationMissingDriver=För drivrutinsuppdateringar som saknas: Uppdatera grafikkortets drivrutin till den senaste versionen för att åtgärda prestandaproblem.
exp.GpuHealthIssue.remediationTdr=För TDR-händelser: Fortsätt att övervaka och uppdatera grafikkortets drivrutin om problemet kvarstår. Återställ grafikkortets inställningar till standardinställningarna, återställ eventuella överklockade inställningar till standardinställningarna, uppdatera BIOS om en sådan finns tillgänglig och säkerställ att strömförsörjningen och luftflödet är tillräckligt. Rengör luftventilerna och fläktar.
exp.GpuHealthIssue.remediationThermal=För temperaturproblem: Kontrollera om luftflödet är begränsat, rengör luftventilerna och säkerställ att fläkten fungerar och är ren.
exp.GpuHealthIssue.suggestedRemediations=Föreslagna åtgärder:
exp.GpuHealthIssue.title=Åtgärda grafikkortets status
exp.HpBatteryHealthManagerNotEnabled.causeNotCompatible=Enheten är inte kompatibel med HP Battery Health Manager.
exp.HpBatteryHealthManagerNotEnabled.causeRequiresBiosUpdate=Enheten kräver en BIOS-uppdatering.
exp.HpBatteryHealthManagerNotEnabled.description=HP Battery Health Manager har funnits tillgänglig på alla bärbara HP-företagsdatorer sedan 2016. Det rekommenderas att kontrollpanel för batteristatus är aktiverad för att förbättra batteritiden.
exp.HpBatteryHealthManagerNotEnabled.option1Detail=HP rekommenderar att HP Battery Health Manager konfigureras till antingen ”Låt HP hantera batteriladdningen” eller ”Maximera batteristatusen” baserat på användningen eller datorns ålder.
