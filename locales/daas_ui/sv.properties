welcome.banner.description=TechPulse är en telemetri- och analysplattform som tillhandahåller kritiska data om enheter och program och ger IT-avdelningarna tillgång till djupa insikter så att de kan hjälpa medarbetarna med rätt datorer, programvara och tjänster för att lyckas. HP TechPulse identifierar problem proaktivt, möjliggör lösningar i större skala och minimerar hot genom att aktivt övervaka organisationens säkerhetstillstånd.
welcome.banner.description_p={app_name} är en telemetri- och analysplattform som tillhandahåller kritiska data om enheter och program och ger IT-avdelningarna tillgång till djupa insikter så att de kan hjälpa medarbetarna med rätt datorer, programvara och tjänster för att lyckas. {app_name} identifierar problem proaktivt, möjliggör lösningar i större skala och minimerar hot genom att aktivt övervaka organisationens säkerhetstillstånd.
welcome.banner.description_p1={app_name} är en molnbaserad telemetri- och analysplattform som samlar in kritisk konfigurations- och hälsoinformation från enheter och applikationer. Med hjälp av AI och djupinlärning analyserar den denna information för att proaktivt identifiera problem, tillhandahålla åtgärder i stor skala och minimera säkerhetshot.
welcome.banner.title=Automationsplattform som levererar tjänster i världsklass genom värdefulla insikter från flera miljarder datapunkter
welcome.banner.title1={app_name} erbjuder djupa insikter som alltid finns till hands för att förutsäga och lösa enhetsproblem innan de inträffar
