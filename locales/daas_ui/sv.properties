banner.iot.update.description=En förändring i TechPulse-plattformens infrastruktur implementeras 27 februari 2023. Du kan behöva uppdatera inställningarna för proxy, brandvägg och SSL-inspektionsprogram. Kör nätverkets utvärderingsverktyg på <a href='https://www.hpdaas.com/software' target='_blank'>HP TechPulse – programvara (hpdaas.com)</a> och kontrollera om något av de fyra (4) *.IoT-testmålen returnerar ett meddelande med ”Misslyckades”. Följ instruktionerna här ”<b><a href='https://hp.service-now.com/techpulse_kb?id=kb_article&sysparm_article=KB0011291' target='_blank'>KB0011291</a> – konfigurera en proxy eller brandvägg”</b> om testet resulterar i ett misslyckande. <b>Utför dessa ändringar senast torsdagen 23 feb 2023.</b>
