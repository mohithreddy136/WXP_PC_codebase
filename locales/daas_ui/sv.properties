btg.addon.list.feature_one.description=DCT är den bakomliggande mesh-tekniken låter HP-enheter detektera, ansluta och samarbeta men även intelligent hantera och förenkla övergångar mellan olika händelser. Systemet gör det möjligt att dela sammanhang, tillstånd och funktioner, i realtid – fristående produkter kan enkelt integreras till ett anpassningsbart ekosystem.
