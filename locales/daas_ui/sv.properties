side_panal.smart_refresh.hardware_personas_sub_text=Identifierade av AI-baserade enhetskluster baserat på respektive hårdvaruanvändning
side_panal.smart_refresh.help_sec1_description=Tre steg: Identifiera, kategorisera, rekommendera
side_panal.smart_refresh.help_sec1_header=Så fungerar det
side_panal.smart_refresh.help_sec1_point_1_desc=Utvärderar varje enhet över nio olika datapunkter som sedan sammanfattas i ett Uppdaterat akutbetyg*. Det här betyget hjälper till att prioritera enskilda riskfyllda enheter för att undvika driftstopp i användarnas produktivitet.
side_panal.smart_refresh.help_sec1_point_1_title=1. Identifiera
side_panal.smart_refresh.help_sec1_point_2_desc=En AI-modell grupperar enheter i distinkta hårdvaru- och programvaruprofiler baserat på användningen. Dessa profiler kan sedan hjälpa till att välja bästa möjliga enhet som ersättning.
side_panal.smart_refresh.help_sec1_point_2_title=2. Kategorisera
side_panal.smart_refresh.help_sec1_point_3_desc1=Om ni samarbetar med en HP-partner rekommenderar Smart Refresh ersättningar för alla enheter. Dessa rekommendationer kommer från den relevanta personens högpresterande modeller som finns tillgängliga i din partners uppladdade katalog. Om enhetsrekommendationer inte visas eller om de enheter som visas är inaktuella bör du kontakta din partner och be om den senaste katalogen.
side_panal.smart_refresh.help_sec1_point_3_desc2=Enhetsrekommendationer visas endast i Smart Refresh om du arbetar med en HP-partner. Kontakta din HP-kontoansvarig för de bästa ersättningsmodellerna.
side_panal.smart_refresh.help_sec1_point_3_desc3=Datum för den senaste kataloguppladdningen:
side_panal.smart_refresh.help_sec1_point_3_title=3. Rekommendera
side_panal.smart_refresh.help_sec1_point_4_desc=Använd uppdateringsstatusen ”Slutförd” för att ta bort de datorer som inte behöver uppdateras eller inte kan uppdateras vid detta tillfälle. Du kan se dessa enheter och ändra respektive status tillbaka till ”Kräver åtgärd” för att se dem igen i listan över datorer.
side_panal.smart_refresh.help_sec1_point_4_title=4. Statusar
side_panal.smart_refresh.help_sec2_description=Så fastställer vi när en enhet behöver bytas ut
side_panal.smart_refresh.help_sec2_header=Uppdatera statusen Betyg
side_panal.smart_refresh.help_sec2_sub_text=Uppdaterat nödsituationsbetyg beräknas från en enhets prestandadata över nio olika områden. Risken motsvarar det numeriska betyget enligt följande:
side_panal.smart_refresh.help_sec2_table_col1=Uppdatera statusen Brådskande
side_panal.smart_refresh.help_sec2_table_col2=Uppdaterat betyg
side_panal.smart_refresh.help_sec2_table_high=Uppdatera statusen Nu
side_panal.smart_refresh.help_sec2_table_low=Felfri
side_panal.smart_refresh.help_sec2_table_medium=Uppdatera statusen Snart
side_panal.smart_refresh.help_sec3_header=Faktorer
side_panal.smart_refresh.help_sec3_point_1=CPU-användning: Genomsnittlig procentandel som har använts under de senaste 30 dagarna
side_panal.smart_refresh.help_sec3_point_2=Minnesanvändning: Genomsnittlig procentandel som har använts under de senaste 30 dagarna
side_panal.smart_refresh.help_sec3_point_3=Diskanvändning: Senaste registrerade procentandel som har använts
side_panal.smart_refresh.help_sec3_point_4=OS-krascher: Totalt antal operativsystemskrascher de senaste sju dagarna
side_panal.smart_refresh.help_sec3_point_5=Stoppfel: Totalt antal stoppfel de senaste sju dagarna
side_panal.smart_refresh.help_sec3_point_6=Varaktighet för start: Senaste registrerade tiden i minuter
side_panal.smart_refresh.help_sec3_point_7=Varaktighet för avstängning: Senaste registrerade tiden i minuter
side_panal.smart_refresh.help_sec3_point_8=Programvarufel för samarbetsappar: Total antal fel de senaste sju dagarna
side_panal.smart_refresh.help_sec3_point_9=Dockningsstationens strömstatus: Senaste registrerade data, Ja/Nej
side_panal.smart_refresh.help_sec3_sub_text=Följande nio faktorer bidrar till betyget och inkluderar beskrivningar om hur de uppmäts:
side_panal.smart_refresh.help_sub_title=Uppgradera datorer vid rätt tidpunkt med HPs Smart Refresh. Så här fungerar det:
side_panal.smart_refresh.personas_header=Personas
side_panal.smart_refresh.personas_sub_text=AI-baserade grupper med enheter som fastställs utifrån deras användningsmönster
side_panal.smart_refresh.point_1_desc=Utvärdera datorernas nuvarande tillstånd beträffande hårdvarans prestanda, programvarans användbarhet samt säkerheten.
side_panal.smart_refresh.point_1_title=1. Utvärdera
side_panal.smart_refresh.point_2_desc=Prioritera de datorer som behöver omedelbar uppmärksamhet baserat på användningen, inverkan på affärsverksamheten eller hur gamla de är.
side_panal.smart_refresh.point_2_title=2. Prioritera
side_panal.smart_refresh.point_3_desc=Genomför planerade uppgraderingar eller utbyten på ett effektivt sätt för att minimera driftstopp och störningar för användare.
side_panal.smart_refresh.point_3_title=3. Implementera
side_panal.smart_refresh.point_4_desc=Garantera att de uppdaterade datorerna är utrustade med det senaste inom säkerhetsåtgärder som kan skydda mot olika cyberhot.
side_panal.smart_refresh.point_4_title=4. Säkerhet
side_panal.smart_refresh.point_5_desc=Övervaka de uppdaterade datorerna regelbundet för att garantera att de fortsätter med optimal drift och utför nödvändigt underhåll efter behov.
side_panal.smart_refresh.point_5_title=5. Övervaka och underhålla
side_panal.smart_refresh.software_persona_1=Overksam: Användare som inte använder sina enheter ofta
side_panal.smart_refresh.software_persona_2=Office 365: Användare som ofta använder Office-program, som Excel och Word
side_panal.smart_refresh.software_persona_3=Heltidskodare: En användare som ofta använder olika utvecklarverktyg för att skriva kod
side_panal.smart_refresh.software_persona_4=Productivity Coder: Users who frequently use developer tools for coding
side_panal.smart_refresh.software_persona_5=Remote Worker: Users who frequently use productivity software, such as OneNote and Adobe Acrobat
side_panal.smart_refresh.software_persona_6=Healthcare Worker: Users who typically use their devices remotely
side_panal.smart_refresh.software_persona_7=Cloud Strategist: Users who frequently use medical professional software, such as ICU monitoring and hospital management systems
side_panal.smart_refresh.software_persona_8=Utility Expert: Users who use extensive cloud services
side_panal.smart_refresh.software_persona_9=Media Consumer: Users who frequently use utility software, such as WinRAR and System Monitor
side_panal.smart_refresh.software_personas_header=Programvaru-personas
side_panal.smart_refresh.software_personas_sub_text=Identifierade av AI-baserade enhetskluster baserat på respektive programvaruanvändning
