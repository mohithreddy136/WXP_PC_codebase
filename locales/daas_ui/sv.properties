welcome.daas.presence.terms=Planer och/eller medföljande komponenter för {app_name} kan variera beroende på region eller auktoriserad {app_name}-servicepartner. Kontakta en lokal HP-representant eller auktoriserad {app_name_short}-partner för mer information om vad som gäller där du bor. HPs tjänster regleras av de HP-villkor som är tillämpliga för den tillhandahållna tjänsten eller som specificeras för kunden vid köptillfället. Kunden kan ha ytterligare lagstadgade rättigheter enligt gällande lokal lagstiftning, och sådana rättigheter påverkas inte på något sätt av HPs villkor eller av HPs begränsade garanti, som medföljer din HP-produkt.
