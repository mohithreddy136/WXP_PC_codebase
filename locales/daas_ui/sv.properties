poly.lens.actions=Åtgärder
poly.lens.addon.details.description=Hantera maskinparken med HP-samarbetsenheter över hela organisationen för att garantera sinnesro och säkerhet. IT-teamen får centraliserad kontroll över utrymmen, rum och enheter för att garantera allt från effektiv driftsättning och enkelt underhåll till proaktiv övervakning och meningsfulla insikter. Säker och molnbaserad hantering med smidig support möjliggör en hybrid arbetsplats för sänkta driftskostnader samtidigt som ni kan förutse problem och leverera en konsekvent och pålitlig upplevelse, oavsett var teamen arbetar.
poly.lens.addon.feature.centralized.header=Centraliserad hantering av personliga enheter
poly.lens.addon.feature.centralized.text=HP Poly Studio-apparna erbjuder en sömlös upplevelse med självbetjäning för slutanvändare. IT-teamen kan samtidigt ta vara på centraliserad insyn och kontroll över personliga enheter. Hantera lager och uppdateringar samt övervaka och få användbara insikter – oavsett var teamen arbetar.
poly.lens.addon.feature.effortless.maintenance.header=Enklare underhåll
poly.lens.addon.feature.effortless.maintenance.text=Hantera inställningar, funktioner och programuppdateringar över hela maskinparken med minimal insats. Tillämpa inställningar, förbered uppdateringar och anpassa konfigurationer i stor skala med samma kontroll eller precision som ni är vana vid.
poly.lens.addon.feature.meaningful.measurement.header=Meningsfulla mätvärden
poly.lens.addon.feature.meaningful.measurement.text=Förstå hur enheter, utrymmen och människor kan samarbeta på bästa sätt. Använd data om användning och prestanda för att skapa smartare och datadrivna beslut om olika samarbetsmöjligheter.
poly.lens.addon.feature.proactive.monitoring.header=Proaktiv övervakning
poly.lens.addon.feature.proactive.monitoring.text=Var alltid steget före problem med kristallklar insyn i enheters funktionalitet och status. Bli varnad när något inte fungerar perfekt för att kunna korrigera problem innan de stör möten.
poly.lens.addon.feature.secure.header=Säker och molnbaserad kontroll
poly.lens.addon.feature.secure.text=Allt kan hanteras via en pålitlig och molnbaserad plattform som kan skalas allt eftersom organisationen växer, för att uppfyller företagets krav på säkerhet och efterlevnad.
poly.lens.addon.feature.simplified.deployment.header=Förenklad driftsättning
poly.lens.addon.feature.simplified.deployment.text=Förbered, förkonfigurera och driftsätt enheter med säkerhet. Automatiserade arbetsflöden för registrering minimerar tiden som krävs, minimerar antal fel och gör enheter redo innan de skickas till användare eller ett rum.
poly.lens.addon.subtitle=Hantering och insikter som bearbetas i molnet för alla samarbetsutrymmen, -rum och -enheter.
