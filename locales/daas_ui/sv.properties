requirements.list.proSecurity.windows.supportLifecycle.content1=HPs servicenivåmål är att tillhandahålla support för de tre senaste halvårskanalversionerna för Windows 10.
requirements.list.proSecurity.windows.supportLifecycle.content2=HP strävar efter att lansera support för den nya operativsystemversionen av Wolf Pro Securitys kontrollfunktioner för hot inom 30 dagar från det att den är tillgänglig för halvårskanalen (\"SAC\"). Interim- eller förhandsversioner av Windows Insider stöds inte. Mer information om Windows operativsystemsversioner finns på <a href='https://docs.microsoft.com/en-us/windows/release-information/' target='_blank'>https://docs.microsoft.com/en-us/windows/release-information/</a>.
requirements.list.proSecurity.windows.supportLifecycle.content3=För att kunder med äldre Windows-versioner ska få tillräckligt med tid att uppgradera till senare versioner, fortsätter HP att även erbjuda support för den fjärde senaste versionen (för närvarande Windows 10 v1903) i minst 90 dagar efter att den senaste halvårskanalversionen finns tillgänglig i Wolf Pro Security. Efter den tidsperioden avslutas support för äldre operativsystem. Samma supportpolicy gäller för långsiktiga servicekanalversioner för Windows 10. Därför måste även de systemen uppdateras enligt policyn i listan ovan.
requirements.list.proSecurity.windows.supportLifecycle.content4=Sure Click Pro-support för Windows 10 v2004 lanserades den 31 juli 2020. Supporten avslutas för Windows 10 v1809 den 31 oktober 2020.
requirements.list.proSecurity.windows.supportLifecycle.content5=Windows 7 och 8.1 stöds inte av HP Proactive Security.
requirements.list.proSecurity.windows.supportLifecycle.content6=Sure Click Pro-support för Windows 10 v20H2 lanserades den 18 november 2020. Supporten avslutades för Windows 10 v1903 den 16 februari 2021.
requirements.list.proSecurity.windows.supportLifecycle.content7=HP släppte Sure Click Pro med stöd för hothantering för Windows 10 v21H1 den 5 juli 2021. Support för Windows 10 v1909 upphör från och med 3 oktober 2021.
