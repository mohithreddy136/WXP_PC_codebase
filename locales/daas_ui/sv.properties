exp.ExcessiveOsStartupTime.causeStartupScripts=Startskript kan ta överdrivet lång tid att slutföra.
exp.ExcessiveOsStartupTime.option1=Alternativ 1: Windows 11 – Startprogram i Inställningarna
exp.ExcessiveOsStartupTime.option1Guide=Störst effekt från åtgärder som förbättrar enhetsprestandan och korrigerar en långsam inloggningstid är att hindra applikationer från att starta när du loggar in. För Windows 11-enheter erbjuder Microsoft en handledning för att ta kontroll över starten av Windows.
exp.ExcessiveOsStartupTime.option1GuideLink=https://www.microsoft.com/en-us/windows/learning-center/take-control-of-windows-startup
exp.ExcessiveOsStartupTime.option1GuideLinkText=https://www.microsoft.com/en-us/windows/learning-center/take-control-of-windows-startup
exp.ExcessiveOsStartupTime.option1StepApps=Välj appar på vänster sida av fönstret.
exp.ExcessiveOsStartupTime.option1Steps=by changing the Windows startup programs using the following steps:
exp.ExcessiveOsStartupTime.option1StepSettings=Välj Inställningar.
exp.ExcessiveOsStartupTime.option1StepStart=Välj Startknappen som ser ut som Microsoft-logotypen.
exp.ExcessiveOsStartupTime.option1StepStartup=Välj Starta längst ner i appens fönster.
exp.ExcessiveOsStartupTime.option1StepToggles=Använd växlingsknapparna för att bestämma vilka appar som ska köras vid start. Aktivera för att öppna appen vid start eller inaktivera om appen inte ska öppnas vid start.
exp.ExcessiveOsStartupTime.option2=Alternativ 2: Windows 11 – Startprogram i Aktivitetshanteraren
exp.ExcessiveOsStartupTime.option2Guide=Startprogram kan även aktiveras och inaktiveras via Windows Aktivitetshanterare via följande steg:
exp.ExcessiveOsStartupTime.option2StepDisable=Högerklicka på en app och välj Inaktivera (om statuskolumnen visar Aktiverad).
exp.ExcessiveOsStartupTime.option2StepStart=Välj Startknappen som ser ut som Microsoft-logotypen.
exp.ExcessiveOsStartupTime.option2StepStartupApps=Välj ”Startprogram” från den vänstra navigeringspanelen.
exp.ExcessiveOsStartupTime.option2StepTaskManager=Skriv ”Aktivitetshanteraren” och tryck på Enter för att öppna Windows Aktivitetshanterare.
exp.ExcessiveOsStartupTime.option3=Alternativ 3: Avinstallera program
exp.ExcessiveOsStartupTime.option3Guide=Program som inte startas automatiskt vid uppstart kan även bidra till en långsam inloggning. Detta händer eftersom programmen kan innehålla filer, tjänster och registerposter som kan vara delvis inlästa. Program i systemfältet är exempel på program som körs, även om det kanske inte finns ett öppet fönster som indikerar att programmet körs. Utför följande steg för att granska och ta bort onödiga program. Obs! För att tas bort vissa program kan administratörsrättigheter krävas.
exp.ExcessiveOsStartupTime.option3StepControlPanel=Ange ”Control” och tryck på Enter för att öppna Kontrollpanelen.
exp.ExcessiveOsStartupTime.option3StepPrograms=Öppna på Program och funktioner.
exp.ExcessiveOsStartupTime.option3StepStart=Välj Startknappen som ser ut som Microsoft-logotypen.
exp.ExcessiveOsStartupTime.option3StepUninstall=Välj ett program som ska tas bort och välj Avinstallera.
exp.ExcessiveOsStartupTime.option4=Alternativ 4: Använd PowerShell och ActiveDirectory-modulen för att köra Get-GpResultantSetofPolicy som låter dig analysera policyer samt hur lång tid det tar för dem att tillämpas på berörda datorer. Detta låter dig identifiera möjliga förbättringar.
