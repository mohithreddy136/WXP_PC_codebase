wex.ra.remediation.frequent_network_disconnection=För hemmanätverk bör du se till att routerns inbyggda programvara är uppdaterad samt att den är placerad på en central plats för att reducera möjliga störningar. Försök även att reducera antalet anslutna enheter och överväg att använda en trådad anslutning för viktiga enheter då en sådan garanterar ett stabilt och pålitligt nätverk.
wex.ra.remediation.gpu_health_issue=Workforce Experience Platform har detekterat ett problem med grafikkortet som kräver omedelbara åtgärder.
wex.ra.remediation.high_collaboration_sw_errors=Mer än 10 programvarufel de senaste 7 dagarna i Teams, Outlook, Zoom, Webex, Chrome, Office.
wex.ra.remediation.high_windows_crash=Operativsystemet har upplevt 1 eller fler oväntade kraschar eller omstarter under de senaste 7 dagarna.
wex.ra.remediation.last_reboot_more_than_21_days=Den senaste omstarten var för mer än 21 dagar sedan.
wex.ra.remediation.maximise_my_battery_health_not_enabled=HP Battery Health Manager is available on all HP business notebooks since 2016. To improve battery life, it is recommended that Battery Health Manager be enabled
wex.ra.remediation.memory_utilization_high=The average Memory utilization over the last 30 days is 85% or greater.
wex.ra.remediation.missing_critical_bios_updates=Använd plattformen för att uppdatera BIOS för kompatibla enheter genom att välja enheterna nedan och sedan ”Tillämpa policy”. För inkompatibla enheter kan du använda Windows Update eller HP Image Assistant för att uppdatera systemets drivrutiner och inbyggda programvara.
wex.ra.remediation.missing_critical_driver_updates=Rapporten Drivrutinsinventarie innehåller en detaljerad inventarie av enheter som saknar viktiga uppdateringar av drivrutiner.
wex.ra.remediation.missing_windows_security_updates=Säkerhetskontrollpanelen i Workforce Experience Platform använder sig av KPI:er som visar antalet enheter som saknar säkerhetsuppdateringar för Windows.
wex.ra.remediation.os_crash=Operativsystemet har upplevt 1 eller fler oväntade kraschar eller omstarter under de senaste 7 dagarna.
wex.ra.remediation.poor_network_signal_strength=För att förbättra Wi-Fi-signalstyrkan i hemmanätverk kan du testa med en omstart av routern eller att den flyttas till en annan plats som reducerar antalet hinder mellan åtkomstpunkten och datorn.
wex.ra.remediation.poor_nominal_speed=För hemmanätverk bör du överväga att uppgradera routern till en nyare modell som har stöd för de senaste Wi-Fi-standarderna såsom Wi-Fi 6. Du kan även placera routern på en central plats för att optimera nätverkslayouten och reducera störningar från andra enheter samt använda trådade anslutningar där så är möjligt för en bättre och mer stabil prestanda.
wex.ra.remediation.unauthenticated_connection=För hemmanätverk bör du välja ett robust krypteringsprotokoll såsom WPA2 eller WPA3 samt ställ in ett starkt och unikt lösenord för säkrare åtkomst. Överväg även att implementera MAC-adressfiltrering och regelbundet uppdatera routerns inbyggda programvara för att maximera säkerheten och förhindra obehöriga anslutningar.
wex.ra.remediation.windows_secure_boot_not_enabled=Säker start är en säkerhetsstandard som har utvecklats av medlemmar i PC-branschen för att säkerställa att en enhet startar med endast programvara som är betrodd av originalutrustningstillverkaren (OEM).
