wpt.details.desc=Skydda data på ett tillförlitligt sätt, spåra enhetsparken med HP-enheter och hindra obehöriga användare från att komma åt både filer och dokument i nätverket med HP {appName}, världens säkraste sök-, spärrnings- och raderingstjänst. HP {appName} drivs av HP Workforce Experience Platform och erbjuder en komplett hårdvarubaserad tjänst som kan lokalisera, spärra och radera enheter, även när datorer är offline eller avstängda.
wpt.details.header=Etablera en första försvarslinje
wpt.disclaimer.point1=Baserat på HPs interna analys av sök-, lås- och raderingstjänster. Säkrast baserat på kryptografi och beständighet (inklusive hårdvaruförstärkt beständighet) från och med oktober 2021.
wpt.disclaimer.point2=HP {appName} finns tillgängligt på utvalda HP 600-, 800-, 1000- och Windows-baserade bärbara Elite Dragonfly-datorer, utvalda stationära 800-datorer och Z1 G8-workstations samt fungera medan enheten är påslagen och ansluten till internet.
wpt.disclaimer.point3=HP Workforce Experience Platform är en telemetri- och analysplattform som tillhandahåller kritiska data om enheter och applikationer. Den säljs inte som en fristående tjänst. HP Workforce Experience Platform följer strikta GDPR-integritetsbestämmelser och är ISO27001-, ISO27701-, ISO27017- och SOC2 Type2-certifierad för informationssäkerhet. Internetåtkomst med anslutning till Workforce Experience Platform-portalen krävs. Besök <a href=\"{link}\" target=\"_blank\" style=\"text-decoration: none; color: #027aae; cursor: pointer;\">{text}</a> för fullständiga systemkrav.
wpt.disclaimer.point4=Med hårdvaruförstärkt avses HP Sure Run Gen4 och senare som är tillgängligt på HP-datorer, som är kompatibla med den här tjänsten, och kräver Windows 10 och senare.
wpt.disclaimer.point5=Servicenivåer och svarstider för HP hårdvarusupport kan variera mellan olika geografiska områden. Tjänsten startar vid hårdvarans inköpsdatum. Restriktioner och begränsningar gäller. Mer information finns på <a href="https://www.hp.com/go/cpc" target="_blank" style="text-decoration: none; color: #027aae; cursor: pointer;">www.hp.com/go/cpc</a>. HP Services regleras av de HP-villkor som är tillämpliga för den tillhandahållna tjänsten eller som specificeras för kunden vid köptillfället. Kunden kan ha ytterligare lagstadgade rättigheter enligt gällande lokal lagstiftning, och sådana rättigheter påverkas inte på något sätt av HPs villkor eller av HPs begränsade garanti, som medföljer din HP-produkt.
wpt.explore.header=Utforska lösningen
wpt.feature.cost.desc=Att tappa bort en viktig dator kan kosta mycket mer än pengar. HP {appName} hjälper till att minimera riskerna och sänka kostnaderna som kan uppstå med att tappa bort en dator. Nu finns ett mångsidig sätt att lokalisera en borttappad eller stulen dator och enkelt spärra den eller radera data.
wpt.feature.cost.title=Hjälper till att sänka kostnader och ger sinnesro
wpt.feature.data.desc=Använd vår säkraste tjänst med tröskelkryptering för att hitta, låsa och radera data från alla HP-enheter. Detta hjälper till att garantera att känsliga uppgifter skyddas.
wpt.feature.data.title=Skydda enheter och data
wpt.feature.monitoring.desc=Med den förenklade användarkontrollpanelen i HP Workforce Experience Platform kan ITDM:er svara på borttappade eller stulna enheter snabbare och samtidigt övervaka hälso- och skyddsstatusen för alla enheter på en användarvänlig plattform.
