exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.responseOptions=Svarsalternativen varierar baserat på applikationen i fråga. Om applikationen är verksamhetskritisk kan en processoruppgradering korrigera problemet. Icke verksamhetskritiska applikationer kan tas bort från enheten eller deras inställningar justeras för att reducera enhetsbelastningen.
