exp.mgmt.troubleshoot.description.antivirus_not_enabled_other=Enheten är konfigurerad till att använda ett virusskydd från tredje part och inte från Microsoft för att skydda den från virus, malware och andra hot. Antivirusskyddet är dock inte aktivt på enheten.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.description=Icke autentiserad anslutning har detekterats.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.moreInfo=Mer information:
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.moreInfoLink=https://support.microsoft.com/en-us/windows/wi-fi-network-not-secure-in-windows-9170b675-921b-3aa5-7e43-fcb2059d159c
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option1=Alternativ 1: Om du ansluter till Wi-Fi på hemmanätverk bör du överväga att ändra säkerhetstypen som routern eller åtkomstpunkten använder.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option1.step1=Logga in på din router med dess programvara.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option1.step2=Ändra säkerhetstypen för Wi-Fi-anslutningen på hemmanätverket.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option2=Alternativ 2: Om du har en äldre router eller åtkomstpunkt bör du överväga att skaffa en nyare som har stöd för de senaste säkerhetsstandarderna.
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.recommendations=Rekommendationer:
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.title=Wi-Fi-anslutningen är inte säker
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.cause1=Upplägget på hemmet kan orsaka problem med Wi-Fi-anslutningen.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.cause2=Åtkomstpunkten kan befinna sig bakom väggar och hinder.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.description=Wi-Fi-signalstyrkan rapporterades som svag under de senaste 24 timmarna.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.moreInfo=Mer information:
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.moreInfoLink=https://support.microsoft.com/en-us/windows/wi-fi-problems-and-your-home-layout-e1ed42e7-a3c5-d1be-2abb-e8fad00ad32a#WindowsVersion=Windows_11
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.possibleCauses=Möjliga orsaker på hemmanätverk:
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1=Alternativ 1: Starta om routern
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step1=Koppla bort modemet och routern från eluttaget.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step2=Vänta i minst 15 sekunder.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step3=Anslut modemet först till vägguttaget, vänta 1–2 minuter och slå sedan på routern.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step4=Vänta till alla indikatorer på kabelmodemet lyser grönt innan du testar internetanslutningen.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2=Alternativ 2: Flytta på åtkomstpunkten.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step1=Om möjligt bör du flytta på åtkomstpunkten för att reducera antalet väggar eller hinder som finns mellan den och datorn.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step2=Om möjligt bör du flytta datorn närmare åtkomstpunkten.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step3=Om möjligt bör du flytta åtkomstpunkten mot mitten av hemmet eller rummet och även till en högre plats. Om åtkomstpunkten är placerad i ett hörn eller under ett skrivbord kan Wi-Fi-signalstyrkan reduceras.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendations=Rekommendationer:
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.title=Wi-Fi-signalstyrkan är svag
exp.mgmt.troubleshoot.network.wifispeedisslow.cause1=Åtkomstpunkten kan befinna sig bakom väggar och hinder.
exp.mgmt.troubleshoot.network.wifispeedisslow.cause2=Routerns fasta programvara kan vara gammal.
exp.mgmt.troubleshoot.network.wifispeedisslow.description=Den nominella hastigheten på Wi-Fi rapporterades som låg under de senaste 24 timmarna.
exp.mgmt.troubleshoot.network.wifispeedisslow.possibleCauses=Möjliga orsaker på hemmanätverk:
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation1=Starta om modemet och routern
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation1.step1=Stäng först av modemet och sedan routern.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation2=Flytta på routern
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation2.step1=Försök flytta routern till en annan plats i hemmet eller på kontoret. Alternativt kan du försöka justera antennerna och vända dem åt en annan riktning.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation3=Uppdatera routerns fasta programvara
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation3.step1=Om du regelbundet uppdaterar routerns inbyggda programvara kan det hjälpa till att korrigera buggar och problem att ansluta. Även om vissa routrar kan använda sig av automatiska uppdateringar kräver de flesta manuella åtgärder.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation4=Ändra routerns frekvensband
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation4.step1=Wi-Fi-routrar väljer automatiskt ett frekvensband. Du kan dock prova med att ändra det från 2,4 till 5 GHz för att se om hastigheterna blir bättre. Du bör dock kontrollera om routern har stöd för 5 GHz innan du gör ändringen.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation5=Uppdatera Wi-Fi-drivrutinerna
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation5.step1=Föråldrade eller skadade drivrutiner kan orsaka nätverksproblem. Du bör därför säkerställa att Wi-Fi-adaptern är helt uppdaterad.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation6=Undvik störningar
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation6.step1=Kanalstörningar kan avsevärt reducera genomströmningen och göra dataöverföringen långsammare. Försök därför att eliminera eventuella störningar som kan vara närvarande.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation7=Kontrollera andra enheter
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation7.step1=Hitta andra enheter som är anslutna till nätverket och se vad de gör. Om en annan enhet till exempel laddar ned stora mängder data kan det påverka hastigheten.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendations=Rekommendationer:
exp.mgmt.troubleshoot.network.wifispeedisslow.title=Wi-Fi-hastigheten är långsam
