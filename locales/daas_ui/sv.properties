dnto.subscriptions.about_hp.desc1=Vi är ett teknikföretag som har skapats med övertygan om att företag ska göra mer än bara vinst. De bör göra världen till en bättre plats. Våra ansträngningar inom olika klimatåtgärder, mänskliga rättigheter och digital rättvisa visar att vi gör allt vi kan för att forma en sådan värld.
dnto.subscriptions.about_hp.desc2=Med handlingar som sträcker sig över 80 år och som bevisar våra avsikter har vi förtroendet att se en värld där innovation driver extraordinära bidrag till mänskligheten.
