welcome.whats_new.line1=Jonathan Nikols, ordförande och global chef för HP TechPulse
welcome.whats_new.line2=HP firade nyligen att det gått ett år sedan vi levererade våra TechPulse-planer till våra kunder och partner, och vilket ettårsfirande det blev! I oktober 2018 kunde HP stolt ta emot 2018 års STAR-utmärkelse från TSIA (Technology Services Industry Association), för innovation i ett Standard Managed Services-erbjudande och/eller en Standard Managed Services-katalog för vår TechPulse-lösning. Det här var ett extra stort ögonblick, eftersom det markerade HPs 15:e utmärkelse totalt och lyfte fram HPs position i TSIA:s Hall of Fame för pristagare.
welcome.whats_new.line3=Proaktiv hantering med HP TechPulse Plans hjälper våra kunder att få ut mer värde av sina befintliga IT-investeringar, underlättar övergången till Windows 10 och öppnar samtidigt dörren till bättre, smartare beslutsfattande för bättre affärsresultat. För våra Partner förbättrar vi leveransupplevelsen för TechPulse-tjänsten, utökar TechPulse-lösningens adresserbara utrymme och förenklar processen för att hjälpa kunderna att hitta de rätta livscykeltjänsterna som kompletterar deras föredragna TechPulse-plan.
welcome.whats_new.line4=Centralt för att nå framgång med TechPulse som helhet är ett fortsatt fokus på plattformen, tekniken och de processer som hjälper oss att realisera tjänsteinnovation. HPs proaktiva hantering med TechPulse är smartare, snabbare och mer kraftfull än någonsin tidigare, och tillsammans lägger vi grunden för en mycket ljus framtid.
welcome.whats_new.line5=Återigen, tack för att ni vill följa med oss på denna spännande resa – vi ser fram emot många års framgångsrikt samarbete tillsammans med er!
