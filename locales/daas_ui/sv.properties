account_management.subscriptions.addon.anyware.azure_notice=Licenser erbjuds för närvarande endast för Azure Marketplace. Standardlicensen för HP Anyware inkluderar åtkomst till HP Anyware Manager Enterprise.
account_management.subscriptions.addon.anyware.desc=Hantera och provisionera fjärrskrivbord för hela teamet. Slutanvändare får säker åtkomst till stationära datorer utan behov av ett VPN. Integrerar HP Anyware med WXP för att kunna övervaka hela maskinparken på distans, från ett och samma ställe
account_management.subscriptions.addon.anyware.desc.short=Få säker åtkomst till, hantera och övervaka stationära datorer
account_management.subscriptions.addon.anyware.enterprise.header=HP Anyware Manager Enterprise
account_management.subscriptions.addon.anyware.features.automation=Automatisera uppgifter
account_management.subscriptions.addon.anyware.features.automation.desc=Integrera anpassade administratörsarbetsflöden i hanteringsplanen helt sömlöst
account_management.subscriptions.addon.anyware.features.multitenant_rbac=Rollbaserad åtkomstkontroll för flera klientorganisationer
account_management.subscriptions.addon.anyware.features.multitenant_rbac.desc=Hantera flera organisationer med en enda HP Anyware Manager Enterprise-instans. Tilldela rollbaserade behörigheter till administratörer
account_management.subscriptions.addon.anyware.features.productivity=Aktivera slutanvändarens produktivitet
account_management.subscriptions.addon.anyware.features.productivity.desc=Slutanvändarens upplevelse blir stationära datorer som om de vore lokala oavsett prestandabehoven eller nätverksförhållandena.
account_management.subscriptions.addon.anyware.features.provision_desktops=Hantera både fysiska och virtuella skrivbord
account_management.subscriptions.addon.anyware.features.provision_desktops.desc=IT-team kan konfigurera och övervaka skrivbord på distans med HP Anyware Manager Enterprise. De kan även enkelt och när som helst provisionera virtuella skrivbord till slutanvändare.
account_management.subscriptions.addon.anyware.features.remote_access=Erbjud slutanvändare en säker fjärråtkomst
account_management.subscriptions.addon.anyware.features.remote_access.desc=Slutanvändare får säker åtkomst till stationära datorer utan behov av ett VPN. HP Anyware erbjuder förenklad åtkomst via molnbaserade gateways.
account_management.subscriptions.addon.anyware.features.role_access.desc=Tilldela användare och dirigera sessioner utan att behöva installera en gateway i andra miljöer
account_management.subscriptions.addon.anyware.features.role_cloud_gateways=Förenklad åtkomst via molngateways
account_management.subscriptions.addon.anyware.features.setup=Valfri IT-miljö och enkel installation
account_management.subscriptions.addon.anyware.features.setup.desc=En flexibel och intuitiv lösning som förenklar driftsättningar och hanteringen över olika typer av infrastruktur inklusive lokala, molnbaserade och hybrida miljöer. Allt detta sker samtidigt som IT-komplexiteten och storleken reduceras.
account_management.subscriptions.addon.anyware.features.workforce_integration=Integrering med Workforce Experience
account_management.subscriptions.addon.anyware.features.workforce_integration.desc=IT-teamen kan centralisera data från fjärrskrivbord via Workforce Experience Platform vilket slutligen erbjuder en central bild över maskinparken.
account_management.subscriptions.addon.anyware.header=HP Anyware
account_management.subscriptions.addon.anyware.overview.desc1=HP Anyware är en högpresterande programvarulösning som erbjuder användare säker åtkomst till skrivbord, virtuella eller på distans, helt utan ett VPN. HP Anyware inkluderar åtkomst till HP Anyware Manager Enterprise som är en IT-hanteringsplan.
account_management.subscriptions.addon.anyware.overview.desc2=HP Anyware Manager Enterprise (AME) är en hanteringsplan för flera olika klientorganisation samtidigt som gör det möjligt för IT-team att hantera både fysiska och virtuella skrivbord.
account_management.subscriptions.addon.anyware.required_components.header=Komponenter som krävs för integrering med Workforce Experience
account_management.subscriptions.addon.anyware.required_components.li1=HP Anyware Standard
account_management.subscriptions.addon.anyware.required_components.li2=HP Anyware Manager Enterprise
account_management.subscriptions.addon.anyware.security_compliance=Säkerhet och efterlevnad
account_management.subscriptions.addon.anyware.security_compliance.desc1=HP Anyware prioriterar säkerheten och efterlevnaden i olika produkterbjudanden vilket garanterar ett gediget skydd och efterlevnad av branschstandarder. Grundläggande funktioner inkluderar komplett kryptering, säker fjärråtkomst och multifaktorautentisering vilket skyddar både dataintegritet och -sekretess.
account_management.subscriptions.addon.anyware.security_compliance.desc2=HP Anyware integrerar även avancerade funktioner med hotdetektering och olika åtgärder för att proaktivt reducera riskerna. Överensstämmelse med förordningar såsom GDPR, HIPAA och SOC 2 understryker HP Anywares åtagande att upprätthålla strikta säkerhetsprotokoll. Kontinuerlig övervakning med regelbundna säkerhetsgranskningar garanterar att HP Anyware-produkter kan motstå nya cyberhot vilket erbjuder användare en säker och tillförlitlig IT-hantering.
account_management.subscriptions.addon.anyware.technology=Teknik för distansarbete
account_management.subscriptions.addon.anyware.technology.desc=HP Anyware med sin prisbelönta PCoIP®-fjärrvisningsteknik erbjuder en högupplöst och responsiv datorupplevelse även under dåliga nätverksförhållanden.
account_management.subscriptions.addon.anyware.technology.desc.li1=PCoIP® kodar, komprimerar, krypterar och transporterar bildpixlarna från en central server eller workstation.
account_management.subscriptions.addon.anyware.technology.desc.li2=Den dekrypterar och packar sedan upp bilden vilket låter användare se den på i stort sett valfri enhet.
account_management.subscriptions.addon.connect_accounts=Ansluta konton
account_management.subscriptions.addon.oob.desc.short=Fjärrkontroll på BIOS-nivå för avancerad diagnostik och åtgärder
account_management.subscriptions.addon.oob.desclaimer1=1. Diagnostik och åtgärder på annan plats finns tillgänglig som en licens med varierande löptider samt är leverantörsoberoende för alla datorer med Intel® vPro® Enterprise och Intel® AMT. Den inkluderar och kräver Workforce Experience Platform Starter för att kunna hantera programvarulösningen. Finns tillgänglig i USA, Kanada och EU från HP-representanter eller HP-auktoriserade återförsäljare. Se (lägg till URL till licensvillkor/eula) för mer information.
account_management.subscriptions.addon.oob.desclaimer2=2. Baserat på HPs interna analys av datortillverkare med kontroll av påslagning/avstängning, kontroll utanför operativsystem, BIOS-kontroll och kontroll av images per 24 september 2024.
account_management.subscriptions.addon.oob.desclaimer3=3. HP Insights-agenten krävs och är en applikation för telemetri och analys som erbjuder kritiska data om enheter och applikationer. Den säljs inte som en fristående tjänst och är certifierad för informationssäkerhet enligt ISO27001, ISO27701, ISO27017 och SOC2 Type2. Internetåtkomst med anslutning till portalen krävs. Besök http://www.hpdaas.com/requirements för fullständiga systemkrav. Köp av en HP Insights-tjänst med agent kräver att programvaran aktiveras för att kunna köras på varje enhet. HP Services Scan kan erhållas via Windows Update på utvald HP-hårdvara och kontrollerar rättigheten på varje hårdvaruenhet för att avgöra om en aktiverad tjänst har köpts. Tillämplig programvara laddas sedan ned automatiskt. Följ anvisningarna på <a target='_blank' href='http://www.hpdaas.com/requirements' style=\"text-decoration:none; color:#4D52E5\">http://www.hpdaas.com/requirements</a> för att inaktivera den här funktionen.
account_management.subscriptions.addon.oob.desclaimer4=4. WXP Starter medföljer och krävs för att hantera programvarulösningen.
account_management.subscriptions.addon.oob.features.remote_control=Remote control - even when the Operating System is down
account_management.subscriptions.addon.oob.features.remote_control.desc=IT-teamet får fjärråtkomst till BIOS för att kunna starta om, installera images och återställa datorer av olika varumärken, oavsett var arbetet sker.
account_management.subscriptions.addon.oob.features.scalable=Skalbar och centraliserad hantering
account_management.subscriptions.addon.oob.features.scalable.desc=Förenkla provisioneringen av datorer, licenskontroll i parti och rollbaserad åtkomst med den här funktionen som integreras i WXP för driftsättning, användning och hantering på företagsnivå.
account_management.subscriptions.addon.oob.features.secure=Säkra upplevelser för slutanvändare
account_management.subscriptions.addon.oob.features.secure.desc=Användare får insyn i fjärrsessioner och kan när som helst koppla bort anslutningen. Säker och sömlös support som skapar förtroende för en bättre användarupplevelse.
account_management.subscriptions.addon.oob.header=Anslut på distans på annan plats
account_management.subscriptions.addon.oob.overview.desc1=Vill du förbättra de digitala upplevelserna för en hybrida arbetsstyrka? HP Anslut på distans på annan plats erbjuder supporttekniker fjärråtkomst till BIOS för att kunna starta om, installera images och återställa datorer – även om operativsystemet inte fungerar. Användaren behöver inte vara närvarande och inget fysiskt besök behövs.
account_management.subscriptions.addon.vyopta.connect_accounts.error=Det gick inte att länka kontot. Kontrollera anslutningen och försök igen.
account_management.subscriptions.addon.vyopta.connect_accounts.found=Vi har detekterat ett Vyopta-konto ”<b>{orgName}</b>”. Vill du ansluta det till WXP?
account_management.subscriptions.addon.vyopta.connect_accounts.no_permissions=Du har inte behörigheter. Kontakta Vyopta-kontoadministratören för hjälp.
account_management.subscriptions.addon.vyopta.connect_accounts.not_found=Det gick inte att automatiskt identifiera {service}-kontot. Kontakta {support_link} som kan hjälpa till att konfigurera den här anslutningen om ni redan är en {service}-kund.
account_management.subscriptions.addon.vyopta.connect_accounts.org_already_mapped=Vyopta-ID:et är redan länkat till en annan klientorganisation. Kontakta kontoadministratör för hjälp.
account_management.subscriptions.addon.vyopta.connect_accounts.request_support=Kontakta {service}-kontoadministratören för hjälp.
account_management.subscriptions.addon.vyopta.connect_accounts.success=Vi har anslutit kontot.
account_management.subscriptions.addon.vyopta.connect_accounts.unauthorized=Vi har detekterat er organisation i {service} men ni verkar inte ha de nödvändiga behörigheterna för att ansluta konton.
account_management.subscriptions.addon.vyopta.desc=Optimera samarbetslösningar med insikter i realtid. Övervaka samtalskvalitet, användningen av olika mötesrum och generell systemprestanda över Microsoft Teams, Zoom, Poly och Webex. När lösningen är integrerad med WXP hjälper den IT-teamet att förbättra de digitala upplevelserna och maximera arbetsplatsens effektivitet.
account_management.subscriptions.addon.vyopta.features.comprehensive_monitoring=Omfattande övervakning över många olika samarbetsplattformar
account_management.subscriptions.addon.vyopta.features.comprehensive_monitoring.desc=Få en komplett insyn i Unified Communications-miljöer (UC) från flera olika leverantörer vilket möjliggör en effektiv hantering av verktyg för video- och röstsamarbete.
account_management.subscriptions.addon.vyopta.features.deep_integration=Djupgående integrering med WXP
account_management.subscriptions.addon.vyopta.features.deep_integration.desc=Vyoptas analys- och övervakningsdata är sömlöst integrerad i WXP vilket gör det möjligt för IT-teamen att hantera samarbetsresultat tillsammans med annan teknik för arbetsplatser. Den här centraliserade strategin förbättrar IT-teamens effektivitet, reducerar komplexiteten och förbättrar den digitala upplevelsen.
account_management.subscriptions.addon.vyopta.features.enhance_user_engagement=Förbättra användarnas engagemang och välbefinnande
account_management.subscriptions.addon.vyopta.features.enhance_user_engagement.desc=Använd samarbetsanalyser för att identifiera problem som hindrar produktiviteten vilket låter er förbättra medarbetares upplevelser och välbefinnande.
account_management.subscriptions.addon.vyopta.features.optimize_meeting_space=Optimera användningen av mötesutrymmen
account_management.subscriptions.addon.vyopta.features.optimize_meeting_space.desc=Analysera hur olika mötesutrymmen används för att maximera investeringen i golvyta och förbättra effektiviteten.
account_management.subscriptions.addon.vyopta.features.proactive_issue_detection=Proaktiv problemdetektering och -lösning
account_management.subscriptions.addon.vyopta.features.proactive_issue_detection.desc=Ta vara på övervakning i realtid för att identifiera och korrigera problem som kan uppstå i samarbeten innan de påverkar användarna, vilket reducerar tiden det tar att hitta och hantera situationerna.
account_management.subscriptions.addon.vyopta.header=Samarbetsupplevelse av Vyopta
account_management.subscriptions.addon.vyopta.overview=Ge IT-teamen alla möjligheter med samarbetsverktyg för avancerad övervakning och analys. Vyopta-integreringen med WXP erbjuder insyn i realtid över användningen mötesrum, samtalskvaliteten och systemprestandan över olika plattformar såsom Microsoft Teams, Zoom, Poly och Webex. Var proaktiv i hanteringen av samarbetsproblem och optimera upplevelserna på arbetsplatsen för att förbättra medarbetares produktivitet.
account_management.subscriptions.addon.vyopta.short_desc=Värdefull analys och insikter om olika rum för att optimera de omgivningar som används för samarbete
account_management.subscriptions.addon.wolf.desc=Driftsättning, insyn och heltäckande skydd med både integrerad dator- och programvarusäkerhet som stärker alla försvarsmöjligheter.
account_management.subscriptions.addon.wolf_security=HP Wolf Security
account_management.subscriptions.addon.wolf_security.desc=HP Wolf erbjuder enhetsskydd mot cyberattacker på en helt ny nivå. Se telemetri i Workforce Experience för utökad säkerhet.
account_management.subscriptions.addon.wpt.desc=Det är nu enkelt att spåra, låsa och säkra borttappade eller stulna enheter på distans. När lösningen är integrerad med WXP hjälper den IT-team att spåra datorresurser och minimera riskerna för enhetsförlust – även om enheterna är avstängda.
account_management.subscriptions.addon.wpt.features.always_available=Alltid tillgänglig
account_management.subscriptions.addon.wpt.features.always_available.desc=Använder anpassad hårdvara och programvara för att hitta/spärra/radera datorn även om den är avstängd, inte är ansluten till internet eller inte startar.
account_management.subscriptions.addon.wpt.features.message_customization=Anpassa meddelanden
account_management.subscriptions.addon.wpt.features.message_customization.desc=Skicka anpassade meddelanden till måldatorn för anvisningar om upplåsning
account_management.subscriptions.addon.wpt.features.remote_lock_and_erase=Spärra och radera på distans
account_management.subscriptions.addon.wpt.features.remote_lock_and_erase.desc=Lås enheten med den inbyggda programvaran för att skydda data och gör en stulen enhet värdelös. Radera det primära lagringsutrymmet på borttappade eller stulna enheter för att undvika dataintrång.
account_management.subscriptions.addon.wpt.features.seamless_integration=Sömlös integrering med WXP
account_management.subscriptions.addon.wpt.features.seamless_integration.desc=Hantera enhetssäkerhet direkt i WXP för att effektivisera IT-drift och hanteringen av enheter.
account_management.subscriptions.addon.wpt.features.separations_of_duties=Uppdelning av arbetsuppgifter
account_management.subscriptions.addon.wpt.features.separations_of_duties.desc=Flera godkännare krävs för att spärra/radera enheter och förhindrar misstag eller hot från insidan.
account_management.subscriptions.addon.wpt.features.strong_audit_trail=Stark verifieringskedja
account_management.subscriptions.addon.wpt.features.strong_audit_trail.desc=Loggar lyckade spärrningar och raderingar på WXP-plattformen som bevis på efterlevnad.
account_management.subscriptions.addon.wpt.header=HP Wolf Protect and Trace with Wolf Connect
account_management.subscriptions.addon.wpt.overview=Förbättra resurshanteringen samtidigt som riskerna för dataintrång minimeras med HP Wolf Protect & Trace. Den här unika lösningen är integrerad direkt i WXP och låter IT-team lokalisera, låsa och radera borttappade eller stulna enheter – även om de är avstängda. Global täckning och enkel administration som passar kunder av alla storlekar.
account_management.subscriptions.addon.wpt.requirements.purchase=Kräver köpet av en ny HP-dator från din HP-återförsäljare eller auktoriserad kanalpartner.<br> Kräver en dator som stöds och har visningsalternativet ”WWAN”. Hitta datorer som stöd på: https://www.hpwolf.com/en/legal/ptwc/platforms
account_management.subscriptions.addon.wpt.short_desc=Det är möjligt att spåra, spärra och radera en dator på distans över hela världen, även när den är avstängd
