exp.MemoryUtilizationIsHighForAnExtendedTime.option5Detail1=Use Task Manager to identify an application where the Memory utilization is steadily increasing to unusual proportions, but never decreasing.
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Detail2=Sök efter uppdateringar till det programmet från dess tillverkare.
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Title=Alternativ 5: Identifiera en potentiell minnesläcka och uppdatera.
