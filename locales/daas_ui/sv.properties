exp.MemoryUtilizationIsHighForAnExtendedTime.causeLongRunningApp=Ett program som körs kräver en stor mängd minne under en längre tid för att genomföra en uppgift, såsom en antivirusgenomsökning.
exp.MemoryUtilizationIsHighForAnExtendedTime.causeMemoryLeak=Ett installerat program kan ha en bugg som skapar en minnesläcka.
exp.MemoryUtilizationIsHighForAnExtendedTime.option1Detail=För att hjälpa kunder att förlänga deras enheters livslängd och förbättra användarupplevelsen är det praxis – för datorer vars minne inte räcker till – att lägga till mer minne.
exp.MemoryUtilizationIsHighForAnExtendedTime.option1Title=Alternativ 1: Öka enhetens minne.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail1=Öppna rapporten Enhetsanvändning.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail2=Program som använder mest minne identifieras i kolumnen Program som orsakar hög minnesanvändning.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail3=Baserat på programmet i fråga varierar svarsalternativen. Om dessa är verksamhetskritiska program kan en uppgradering av minnet korrigera problemet. Program som inte är verksamhetskritiska kan avinstalleras från enheten. Alternativt kan dess inställningar justeras för att reducera belastningen på enheten.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Title=Alternativ 2: Identifiera och avinstallera program.
exp.MemoryUtilizationIsHighForAnExtendedTime.option3Detail=Starta om datorn för att helt och hållet stänga alla program som körs.
