wex.fleet.mgmt.remediation.kernel_panic_error.desc=En fel i kerneln har uppstått. Detta indikerar ett kritiskt systemfel som Linux-kerneln inte kan återhämtas från. Detta kan orsakas av ett hårdvarufel, skadade drivrutiner, felkonfigurerade kernel-parametrar eller inkompatibla kernel-moduler. Omedelbar utredning krävs för att fastställa grundorsaken.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt1=Granska systemloggarna (/var/log/messages, /var/log/syslog eller journalctl) beträffande felmeddelanden som föregår paniken.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt2=Kontrollera hårdvarans status och då särskilt minne (RAM) och diskintegritet med verktyg såsom memtest86 och smartctl.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt3=Verifiera de senaste systemändringarna (t.ex. kernel-uppdateringar, installationer av drivrutin eller konfigurationsändringar).
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt4=Om systemet inte kan startas ska du starta det i räddnings- eller återställningsläge för att få åtkomst.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt5=Återställ eller uppdatera kernel-moduler eller drivrutiner, om de misstänks vara inkompatibla.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt6=Om problemet kvarstår eller är specifikt för en hårdvara kan du kontakta support från leverantörer eller communityn.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.desc=Du kan aktivera diskkryptering för att skydda känsliga data i vila genom att garantera att all information som lagras på disken endast kan läsas med korrekt autentisering. Det åtgärden är en kritisk säkerhetsåtgärd för system som hanterar konfidentiella eller reglerade data.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step1=Implementera komplett diskkryptering med verktyg såsom LUKS (Linux Unified Key Setup) eller dm-crypt, beroende på Linuxdistributionen.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step2=Om komplett diskkryptering inte är möjlig bör du kryptera känsliga partitioner (såsom /home, /var eller /data).
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step3=Konfigurera säker nyckelhantering inklusive lösenfraser eller integreringen med en TPM-modul (Trusted Platform Module), om en sådan finns tillgänglig.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step4=Säkerhetskopiera krypteringsnycklar säkert för att förhindra dataförlust om någon tappas bort.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step5=Testa krypteringsinställningarna för att garantera en korrekt systemstart och att åtkomsten till data är korrekt efter autentisering.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step6=Konfiguration av dokumentkryptering och återställningsförfaranden för efterlevnad och driftskontinuitet.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step1=Installera och konfigurera ett verktyg för brandväggar såsom firewalld, ufw eller iptables – beroende på Linuxdistributionen.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step2=Aktivera brandväggstjänsten som ska starta vid uppstart
wex.fleet.mgmt.remediation.linux_firewall_disabled.step3=Definiera brandväggsreglerna till att endast tillåta obligatoriska tjänster (såsom SSH, HTTP/HTTPS) och blockera alla andra.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step4=Verifiera brandväggens status och regler med: sudo firewall-cmd --list-all (för firewalld), sudo ufw status (för ufw)
wex.fleet.mgmt.remediation.linux_firewall_disabled.step5=Granska brandväggens konfigurationer regelbundet för att garantera att de efterlever säkerhetspolicyer och företagets behov.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.desc=Du kan aktivera Säker start för att skydda systemet mot obehörig kod eller malware under uppstart tack vare verifieringar av de digitala signaturerna för bootloaders, kernel-moduler och drivrutiner. Detta maximerar systemets integritet och säkerhet och då särskilt i företagsmiljöer eller miljöer som kräver efterlevnad.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step1=Verifiera stöd för inbyggd UEFI-programvara för Säker start och säkerställ att alternativet är aktiverat i UEFI-inställningarna.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step2=Installera och konfigurera signerade bootloaders och kernel-paket som är kompatibla med Säker start (såsom shim och signerad GRUB).
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step3=Verifiera att kerneln, moduler och alla komponenter som krävs är signerade.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step4=Starta om och bekräfta statusen på Säker start med mokutil.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step5=Om du använder komponenter som inte är standardiserade ska du registrera anpassade nycklar.
wex.fleet.mgmt.remediation.missing_linux_security_updates.desc=Systemet saknar en eller flera kritiska säkerhetsuppdateringar. Dessa uppdateringar korrigerar kända sårbarheter i operativsystemet, kerneln och redan installerade paket. Om de inte tillämpas kan systemet utsättas för obehörig åtkomst, dataintrång eller tjänsteavbrott.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step1=Granska och identifiera säkerhetsuppdateringar som saknas med systemets pakethanterare (såsom apt, yum, dnf, zypper).
wex.fleet.mgmt.remediation.missing_linux_security_updates.step2=Tillämpa alla kritiska säkerhetsuppdateringar direkt för att reducera mängden kända hot och sårbarheter.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step3=Starta om systemet efter behov och då särskilt efter kernel- eller kritiska tjänsteuppdateringar.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step4=Aktivera automatiska uppdateringar eller konfigurera ett schema för regelbundna korrigeringar som garanterar skydd i god tid.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step5=Verifiera att uppdateringen slutförs genom att kontrollera loggar och bekräfta paketversionerna.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step6=Utför en skanning för sårbarhet efter uppdateringen för att garantera att det inte finns några kvarvarande risker.
wex.fleet.mgmt.remediation.missing_linux_updates.desc=Systemet saknar en eller flera kritiska Linux-uppdateringar. Dessa uppdateringar kanske inkluderar säkerhetsuppdateringar, korrigeringar i kerneln och stabilitetsförbättringar. Att använda ett föråldrat system ökar riskerna för sårbarheter, systemkrascher och problem med kompatibilitet.
wex.fleet.mgmt.remediation.missing_linux_updates.step1=Granska uppdateringar som finns tillgängliga med pakethanteraren (såsom yum, dnf, apt eller zypper) för att identifiera kritiska korrigeringar som saknas.
wex.fleet.mgmt.remediation.missing_linux_updates.step2=Installera alla säkerhets- och kernel-uppdateringar så snart som möjligt för att reducera mängden kända sårbarheter.
wex.fleet.mgmt.remediation.missing_linux_updates.step3=Starta om systemet efter behov och då särskilt efter kernel- eller kritiska systemuppdateringar.
wex.fleet.mgmt.remediation.missing_linux_updates.step4=Aktivera automatiska uppdateringar eller konfigurera scheman för regelbundna korrigeringar som garanterar att framtida uppdateringar installeras i tid.
wex.fleet.mgmt.remediation.missing_linux_updates.step5=Verifiera att uppdateringen slutfördes genom att kontrollera systemloggarna och bekräfta aktuella versioner på kerneln och paket.
wex.fleet.mgmt.remediation.network_connection_not_secure.desc=En nätverksanslutning utan förväntad säkerhet har rapporterats under de senaste 24 timmarna.
wex.fleet.mgmt.remediation.network_connection_not_secure.desc1=Icke autentiserade anslutningar har detekterats under de senaste 7 dagarna.
wex.fleet.mgmt.remediation.network_disconnections.desc=Enheter har rapporterat upprepade nätverksbortkopplingar under de senaste 24 timmarna.
wex.fleet.mgmt.remediation.network_disconnections.desc1=Nätverksavbrott har detekterats under de senaste 7 dagarna.
wex.fleet.mgmt.remediation.network_speed_slow.desc=Den rapporterade nominella nätverkshastigheten var långsam under de senaste 24 timmarna.
wex.fleet.mgmt.remediation.wifi_signal_strength_weak.desc=Wi-Fi-signalstyrkan rapporterades som svag under de senaste 24 timmarna.
