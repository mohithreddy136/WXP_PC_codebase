requirements.list.hp_print_fleetproxy.desc1=Print Fleet Proxy kräver att HP Web Jetadmin är installerad på samma dator. HP rekommenderar starkt att du uppgraderar till senaste versionen av Web Jetadmin innan du installerar HP Fleet Proxy.
requirements.list.hp_print_fleetproxy.desc2=För tillfället testar HP endast HP Fleet Proxy mot HP Web Jetadmin 10.5 SR4. Även om HP Fleet Proxy kanske fungerar med tidigare versioner av HP Web Jetadmin kan HP inte garantera att alla funktioner fungerar som förväntat.
requirements.list.hp_print_fleetproxy.desc3=Web Jetadmin är en resurskrävande tjänst. Även om HP Fleet Proxy inte kräver stora mängder extra resurser kan prestandan påverkas om värdservern inte har tillräckligt med databearbetningskraft för att stödja både tjänsterna och de enheter som hanteras. Se till att servern, som är värd för HP Web Jetadmin och HP Fleet Proxy, har tillräcklig prestanda och antal processorkärnor för att hantera eventuella problem.
requirements.list.hp_print_fleetproxy.desc4=2000 enheter testades och HP kom fram till att följande grundläggande specifikationer för hårdvara bör vara tillräckliga för att erbjuda acceptabla prestandaresultat. Du kan behöva en server med mer databehandlingskraft om du märker sämre prestanda eller om du hanterar fler än 2000 enheter.
requirements.list.hp_print_fleetproxy.desc5=Print Fleet Proxy är en lokal tjänst som kommunicerar med en molnbaserad tjänst. Som ett resultat måste brandväggen konfigureras till att tillåta inkommande och utgående kommunikation mellan WJA-servern och HP Command Center. Detta kan ske genom antingen DNS-filtrering eller en godkännandelista för IP-adresser.
requirements.list.hp_print_fleetproxy.desc6=Du hittar den listan här:
requirements.list.hp_print_fleetproxy.hp-nf1=DNS-filtrering: Konfigurera din firewall för att tillåta utgående HTTPS-förfrågningar över port 443 till följande slutpunkter:
requirements.list.hp_print_fleetproxy.hp-nf2=Godkännandelista för IP-adresser: För att godkänna IP-adresser måste du inkludera alla IP-adresser för alla möjliga molnservrar som HP Fleet Proxy kan tänkas kommunicera med.
