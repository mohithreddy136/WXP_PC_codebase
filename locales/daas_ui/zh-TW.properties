account_management.subscriptions.additional_features=其他功能
account_management.subscriptions.addon.anyware.azure_notice=該授權目前僅在 Azure Marketplace 提供。HP Anyware Standard 授權包含存取 HP Anyware Manager Enterprise 的權限。
account_management.subscriptions.addon.anyware.desc=為您的團隊管理及佈建遠端桌面。一般使用者無需 VPN 即可安全存取桌面。將 HP Anyware 與 WXP 整合後，即可在同一個地點監控您的遠端機群
account_management.subscriptions.addon.anyware.desc.short=安全地存取、管理及監控桌面
account_management.subscriptions.addon.anyware.enterprise.header=HP Anyware Manager Enterprise
account_management.subscriptions.addon.anyware.features.automation=自動執行任務
account_management.subscriptions.addon.anyware.features.automation.desc=將您的自訂管理 Workflow 無縫整合至管理平面
account_management.subscriptions.addon.anyware.features.multitenant_rbac=多個租用戶和以角色為基礎的存取控制
account_management.subscriptions.addon.anyware.features.multitenant_rbac.desc=IT 人員可透過 HP Anyware Manager Enterprise 的單一執行個體管理多個組織，並根據角色指派權限。
account_management.subscriptions.addon.anyware.features.productivity=提高一般使用者的生產力
account_management.subscriptions.addon.anyware.features.productivity.desc=一般使用者將會感受到如同本機一樣的桌面體驗，無論其效能需求或網路條件為何。
account_management.subscriptions.addon.anyware.features.provision_desktops=管理實體和虛擬桌面
account_management.subscriptions.addon.anyware.features.provision_desktops.desc=IT 人員可透過 HP Anyware Manager Enterprise 配置及監控遠端桌面。他們還可以隨時向一般使用者提供虛擬桌面。
account_management.subscriptions.addon.anyware.features.remote_access=為一般使用者提供安全遠端存取
account_management.subscriptions.addon.anyware.features.remote_access.desc=一般使用者無需 VPN 即可安全存取桌面。HP Anyware 透過雲端閘道提供簡化的存取。
account_management.subscriptions.addon.anyware.features.role_access.desc=無需在其他環境中安裝閘道，即可執行使用者指派和工作階段路由
account_management.subscriptions.addon.anyware.features.role_cloud_gateways=透過 Cloud Gateway 簡化存取
account_management.subscriptions.addon.anyware.features.setup=任何 IT 環境和簡易設定
account_management.subscriptions.addon.anyware.features.setup.desc=一個靈活且直觀的解決方案，可簡化在多樣化基礎架構中的部署與管理，包括內部部署、雲端與混合環境，同時降低 IT 複雜性和佔用空間。
account_management.subscriptions.addon.anyware.features.workforce_integration=Workforce Experience Integration
account_management.subscriptions.addon.anyware.features.workforce_integration.desc=此外還可以將遠端桌面資料集中於 Workforce Experience Platform 中，最終實現對於整個機群的集中檢視。
account_management.subscriptions.addon.anyware.header=HP Anyware
account_management.subscriptions.addon.anyware.overview.desc1=HP Anyware 是一款高效能的軟體解決方案，可讓一般使用者無需透過 VPN 即可安全存取其遠端或虛擬桌面。HP Anyware 包含「HP Anyware Manager Enterprise」IT 管理平台的存取權限。
account_management.subscriptions.addon.anyware.overview.desc2=HP Anyware Manager Enterprise (AME) 是一種多租用戶管理平面，可讓 IT 人員同時管理實體和虛擬桌面。
account_management.subscriptions.addon.anyware.required_components.header=Workforce Experience Integration 所需的元件
account_management.subscriptions.addon.anyware.required_components.li1=HP Anyware Standard
account_management.subscriptions.addon.anyware.required_components.li2=HP Anyware Manager Enterprise
account_management.subscriptions.addon.anyware.security_compliance=安全性與合規性
account_management.subscriptions.addon.anyware.security_compliance.desc1=HP Anyware 會優先考量其所有產品的安全性與合規性，以確保強大的防護能力並遵循業界標準。主要功能包括端對端加密、安全遠端存取以及多因素驗證，以全面保障資料的完整性與機密性。
account_management.subscriptions.addon.anyware.security_compliance.desc2=HP Anyware 還整合了進階威脅偵測和回應功能，以主動降低風險。GDPR、HIPAA 和 SOC 2 等法規的合規性彰顯了 HP Anyware 對於嚴格安全標準的承諾。持續監控與定期安全稽核確保 HP Anyware 產品能有效抵禦新興網路威脅，為使用者提供安全且值得信賴的 IT 管理體驗。
account_management.subscriptions.addon.anyware.technology=遠端技術
account_management.subscriptions.addon.anyware.technology.desc=HP Anyware 屢獲獎項肯定的 PCoIP® 遠端顯示技術，即使在嚴苛的網路條件下，也能提供具備高解析度和高靈活度的運算體驗。
account_management.subscriptions.addon.anyware.technology.desc.li1=PCoIP® 可透過中央伺服器或工作站進行影像像素的編碼、壓縮、加密和傳輸。
account_management.subscriptions.addon.anyware.technology.desc.li2=然後，它可在幾乎任何端點上為使用者解密並解壓縮影像。
account_management.subscriptions.addon.connect_accounts=連接帳戶
account_management.subscriptions.addon.oob.desc.short=用於進階診斷和修復的 BIOS 層級遠端控制
account_management.subscriptions.addon.oob.desclaimer1=1. 頻外診斷與修復功能以不同期限的授權形式提供，且為廠商中立，並可適用於任何支援 Intel® vPro® Enterprise 與 Intel® AMT 的電腦。內含且需搭配 Workforce Experience Platform Starter 來管理和維運軟體解決方案。在美國、加拿大及歐盟地區，可透過 HP 代表或 HP 授權經銷商購買。如需詳細資訊，請參閱 (新增授權條款/一般使用者授權合約的 URL 連結)。
account_management.subscriptions.addon.oob.desclaimer2=2. 根據 HP 截至 2024 年 9 月 24 日對具備電源循環控制、非作業系統層級控制、BIOS 控制，以及重新部署映像控制等能力之電腦製造商所進行的內部分析。
account_management.subscriptions.addon.oob.desclaimer3=3. HP Insights 代理程式是必要的遙測與分析應用程式，可提供有關裝置和應用程式的重要資料，且不做為單獨服務另售，並已獲得 ISO27001、ISO27701、ISO27017 與 SOC2 Type2 等資訊安全認證。需有網際網路並與入口網站連線。有關完整的系統要求，請造訪 http://www.hpdaas.com/requirements。凡購買支援 HP Insights 代理程式的任何服務，均須於各裝置上啟用相應的軟體才能運作。HP Services Scan 可透過 Windows Update 於特定 HP 硬體上提供，並會於各個硬體裝置上檢查權利資格，從而確定是否已購買支援的服務，並自動下載適用的軟體。若要停用此功能，請依照下列網頁中的指示操作: <a target='_blank' href='http://www.hpdaas.com/requirements' style=\"text-decoration:none; color:#4D52E5\">http://www.hpdaas.com/requirements</a>
account_management.subscriptions.addon.oob.desclaimer4=4. WXP Starter 已包括在內，並且為管理與維運軟體解決方案的必要項目。
account_management.subscriptions.addon.oob.features.remote_control=Remote control - even when the Operating System is down
account_management.subscriptions.addon.oob.features.remote_control.desc=無論是在何處作業，IT 人員都能遠端存取 BIOS，進而重新啟動、重新部署映像，以及復原不同品牌的電腦。
account_management.subscriptions.addon.oob.features.scalable=可擴充式集中管理
account_management.subscriptions.addon.oob.features.scalable.desc=此項整合於 WXP 中的功能，可簡化電腦佈建、批量管控授權，以及基於角色的存取權限，是專為企業部署、使用與管理所設計。
account_management.subscriptions.addon.oob.features.secure=安全的一般使用者體驗
account_management.subscriptions.addon.oob.features.secure.desc=使用者可以查看遠端工作階段，並可隨時停止連線。安全且順暢的支援，能有效建立信任，從而改善使用者體驗。
account_management.subscriptions.addon.oob.header=頻外遠端連接
account_management.subscriptions.addon.oob.overview.desc1=想改善混合式勞動力的數位體驗? HP 頻外遠端連接功能可讓技術支援人員遠端存取 BIOS，即便是遇到作業系統無法正常運作的情況，也能重新開機、重新部署映像，以及復原電腦。無需使用者介入，無需親臨現場。
account_management.subscriptions.addon.vyopta.connect_accounts.error=我們無法連接您的帳戶。請檢查您的連線，然後再試一次。
account_management.subscriptions.addon.vyopta.connect_accounts.found=我們偵測到一個 Vyopta 帳戶「<b>{orgName}</b>」。是否要將其連接至 WXP?
account_management.subscriptions.addon.vyopta.connect_accounts.no_permissions=您沒有權限。請聯絡 Vyopta 帳戶管理員以取得協助。
account_management.subscriptions.addon.vyopta.connect_accounts.not_found=我們無法自動偵測您的 {service} 帳戶。如果您已經是 {service} 客戶，請聯絡 {support_link} 來協助設定此連線。
account_management.subscriptions.addon.vyopta.connect_accounts.org_already_mapped=Vyopta ID 已與另一個租用戶連結。請聯絡您的帳戶管理員尋求協助。
account_management.subscriptions.addon.vyopta.connect_accounts.request_support=請聯絡您的 {service} 帳戶管理員以尋求協助。
account_management.subscriptions.addon.vyopta.connect_accounts.success=我們已成功連接您的帳戶。
account_management.subscriptions.addon.vyopta.connect_accounts.unauthorized=我們在 {service} 中偵測到您的組織，但您似乎沒有連接帳戶所需的權限。
account_management.subscriptions.addon.vyopta.desc=透過即時見解最佳化協作效率。監控 Microsoft Teams、Zoom、Poly 和 Webex 的通話品質、會議室使用情況和系統效能。當其與 WXP 整合時，可協助 IT 提升數位體驗並促進工作場所效率。
account_management.subscriptions.addon.vyopta.features.comprehensive_monitoring=跨協作平台的全面監控
account_management.subscriptions.addon.vyopta.features.comprehensive_monitoring.desc=全面掌握您的多廠商統一通訊 (UC) 環境，提升視訊與語音協作工具的管理效率。
account_management.subscriptions.addon.vyopta.features.deep_integration=與 WXP 深度整合
account_management.subscriptions.addon.vyopta.features.deep_integration.desc=Vyopta 的分析與監控資料已無縫整合於 WXP 中，使 IT 團隊能同時管理協作效能與其他工作場所技術。此集中化方式不僅提升了 IT 效率，還能降低複雜性並強化數位體驗管理。
account_management.subscriptions.addon.vyopta.features.enhance_user_engagement=增強使用者參與度和健全度
account_management.subscriptions.addon.vyopta.features.enhance_user_engagement.desc=利用協作分析找出影響生產力的障礙，進一步提升員工體驗與健全狀況。
account_management.subscriptions.addon.vyopta.features.optimize_meeting_space=最佳化會議空間使用率
account_management.subscriptions.addon.vyopta.features.optimize_meeting_space.desc=分析會議室的佔用率與使用模式，以最大化資產投資效益並提升會議室的使用效率。
account_management.subscriptions.addon.vyopta.features.proactive_issue_detection=主動問題偵測與解決
account_management.subscriptions.addon.vyopta.features.proactive_issue_detection.desc=利用即時監控來識別並解決協作品質問題以免影響使用者，可有效縮短疑難排解時間。
account_management.subscriptions.addon.vyopta.header=Vyopta 的協作體驗
account_management.subscriptions.addon.vyopta.overview=為 IT 團隊提供協作工具的進階監控和分析功能。WXP 中的 Vyopta 整合可在 Microsoft Teams、Zoom、Poly 和 Webex 等平台即時查看會議室使用情況、通話品質和系統效能。透過主動解決協作問題並最佳化工作場所體驗，提升員工生產力。
account_management.subscriptions.addon.vyopta.short_desc=具有價值的分析與會議室見解，有助於協作環境的最佳化
account_management.subscriptions.addon.wolf.desc=整合運用嵌入式電腦與軟體安全技術，實現部署、可視化及端對端防護，有效強化電腦防禦能力。
account_management.subscriptions.addon.wolf_security=HP Wolf Security
account_management.subscriptions.addon.wolf_security.desc=由 HP Wolf 提供無與倫比的端點防護，使裝置免於遭受網路攻擊。檢視 Workforce Experience 中的遙測資訊以增強安全性。
account_management.subscriptions.addon.wpt.desc=遠端追蹤、鎖定和保護遺失或遭竊的裝置。當與 WXP 整合時，它可以協助 IT 團隊追蹤電腦資產並降低裝置遺失風險 - 即使裝置在關機狀態下也能正常運作。
account_management.subscriptions.addon.wpt.features.always_available=可隨時使用
account_management.subscriptions.addon.wpt.features.always_available.desc=即使電腦關機、未連接網路或無法開機，也能利用自訂硬體與軟體進行尋找、鎖定與清除作業。
account_management.subscriptions.addon.wpt.features.message_customization=訊息自訂
account_management.subscriptions.addon.wpt.features.message_customization.desc=將自訂訊息傳輸至目標電腦以提供解鎖指示
account_management.subscriptions.addon.wpt.features.remote_lock_and_erase=遠端鎖定和清除
account_management.subscriptions.addon.wpt.features.remote_lock_and_erase.desc=在韌體層級鎖定裝置以保護資料，並使被竊裝置無法使用。清除遺失或遭竊裝置的主要儲存裝置，以防止資料外洩。
account_management.subscriptions.addon.wpt.features.seamless_integration=與 WXP 無縫整合
account_management.subscriptions.addon.wpt.features.seamless_integration.desc=直接在 WXP 內管理裝置安全性，以簡化 IT 作業和端點管理。
account_management.subscriptions.addon.wpt.features.separations_of_duties=職責分離
account_management.subscriptions.addon.wpt.features.separations_of_duties.desc=鎖定/刪除動作需要多個核准者，以防止錯誤或內部威脅。
account_management.subscriptions.addon.wpt.features.strong_audit_trail=強大的稽核追蹤
