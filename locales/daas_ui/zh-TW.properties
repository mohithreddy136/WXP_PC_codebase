exp.CollaborationSoftwareErrorsAreHigh.title=處理協作軟體錯誤
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.appsCausingHighCpu=在「導致 CPU 使用率過高的應用程式」欄位中，將列出消耗最多 CPU 資源的應用程式。
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeBackgroundProcesses=大量的背景程序與服務 (包含系統更新、防毒軟體掃描，以及其他維護任務等) 可能耗盡 CPU 效能並導致使用率過高。
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeFirmwareBug=韌體錯誤可能會導致 CPU 以高於預期的頻率運作。
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeMalfunctioningSoftware=最佳化效果不彰或運作異常的軟體可能造成 CPU 使用率過高，尤其在程式陷入迴圈或資源耗用效率低落時更為明顯。
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.causeResourceIntensiveApps=執行資源密集型應用程式 (例如影片編輯程式、虛擬機器或是複雜運算程式) 會耗用大量 CPU 資源，導致使用率過高。
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.closeHighCpuApps=關閉使用最多 CPU 資源的應用程式。
exp.CpuUtilizationIsHighForAnExtendedPeriodOfTime.connectAcAdapter=請連接 AC 變壓器，因為在使用電池供電時，依裝置電源設定的不同，CPU 的執行效能可能會降低。
