welcome.whats_new.line1=HP TechPulse 副總裁暨全球主管 Jonathan Nikols
welcome.whats_new.line2=HP 於近期歡度了 TechPulse 計畫的發佈週年紀念日，並與眾多客戶與合作夥伴一同慶祝這段精彩旅程，衷心感謝大家的一路相挺! 2018 年 10 月，HP 榮獲技術服務產業協會 (TSIA) 頒發的 2018 年 STAR 創新獎，以表彰我們的 TechPulse 解決方案在標準管理服務產品和/或項目方面的卓越創新。這是個意義重大的時刻，因為這代表著 HP 第十五度榮獲 TSIA 獎項，更使 HP 得以榮登 TSIA 得獎名人堂，可說是意義非凡。
welcome.whats_new.line3=採用搭配 Proactive Management 的 HP TechPulse 計畫，可協助客戶從既有 IT 投資中發掘出更多價值、加速導入 Windows 10，並促成更明智的商業決策，進而實現令人滿意的業務成果。針對合作夥伴，我們正在改善 TechPulse 的服務交付體驗、擴展 TechPulse 解決方案可應用情境，並有效簡化協助客戶挑選出與其屬意的 TechPulse 計畫互補之生命週期服務的過程。
welcome.whats_new.line4=而 TechPulse 整體成功的核心關鍵，在於持續專注於能協助我們實現服務創新的平台、技術與流程。搭配 TechPulse 的 HP Proactive Management，比以往更聰明、快速且強大，而且還有我們的共同努力，將能打造出更加光明璀璨的未來。
welcome.whats_new.line5=再次感謝各位夥伴的一路相伴，未來我們將會繼續並肩同行，攜手共創更多成功!
