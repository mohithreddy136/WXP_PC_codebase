requirements.proactive_security_system.hardwares=["在 BIOS 中啟用 Intel 虛擬化技術 (Intel VT) 和延伸分頁表 (EPT) 支援","至少 4 GB 的 RAM (建議 8 GB)","至少 6 GB 可用磁碟空間","對於非英文版本的 Windows 作業系統，必須安裝下列其中一種語言的支援語言套件: 英文、法文、德文、義大利文、日文、葡萄牙文 (巴西)、西班牙文、瑞典文。"]
requirements.proactive_security_system.para1=HP 服務等級目標是支援最新的 3 個 Windows 10 半年通道版本。
requirements.proactive_security_system.para2=HP 的目標是在新作業系統版本發佈至半年通道 (「SAC」) 後的 30 天內，提供 Sure Click Advanced 的相容支援。不支援臨時或預先發佈的 Windows Insider 組建版本。有關 Windows 作業系統版本的更多資訊，請參閱 https://docs.microsoft.com/en-us/windows/release-information/。
requirements.proactive_security_system.para3=為確保使用舊版 Windows 的客戶有足夠時間升級至較新版本，HP 將在 Sure Click Advanced 支援最新半年通道版本後，繼續支援第 4 新的版本 (目前為 Windows 10 v1809)，支援期限至少為 90 天。在此期間過後，對較舊作業系統版本的支援將會終止。相同的支援原則同樣適用於 Windows 10 的長期服務通道版本。因此，這些系統也必須依照上述原則進行更新。
requirements.proactive_security_system.para4=Sure Click Advanced 對 Windows 10 v20H2 的支援已於 2020 年 11 月 18 日發佈。對 Windows 10 v1903 (生效日: 2021 年 2 月 16 日) 的支援將終止。
requirements.proactive_security_system.para5=Sure Click Advanced 對 Windows 10 v2004 的支援已於 2020 年 7 月 31 日發佈。對 Windows 10 v1809 (生效日: 2020 年 10 月 31 日) 的支援將終止。
