azureonboard.marketing.disclaimer.content=本文件中所含資訊如有變更，恕不另行通知。HP 產品與服務的保固僅列於隨產品及服務所附的明確保固聲明中。本文件的任何部分都不可構成任何額外的保固。HP 不負責本文件在技術上或編輯上的錯誤或疏失。
azureonboard.marketing.disclaimer.contentlist1=HP Proactive Insights 和/或其包含的元件，可能會因地區、作業系統或 HP 授權服務合作夥伴而有所不同。如需您所在地區的特定詳細資訊，請聯絡您的當地 HP 代表或授權合作夥伴。HP 服務受購買之時向客戶提供或告知的 HP 適用服務條款與條件約束。當地適用法律可能會賦予客戶其他法定權利，此等權利一概不受 HP 服務條款與條件或隨 HP 產品提供的 HP 有限保固影響。
azureonboard.marketing.disclaimer.contentlist2=HP {appName} 是遙測與分析平台，可提供有關裝置和應用程式的重要資料，且不做為單獨服務另售。HP {appName} 遵循嚴格的 GDPR 隱私權法規，且通過 ISO27001、ISO27701、ISO27017 及 SOC2 Type2 資訊安全認證。需有網際網路並與 {appName} 連線。如需完整的系統需求，請造訪 <a target='_blank' href={link}>{text}</a>。
azureonboard.marketing.disclaimer.contentlist3=BIOS 更新僅適用於 HP 裝置。
azureonboard.marketing.disclaimer.contentlist4=有關作業系統涵蓋範圍的詳細資訊，請造訪 <a target='_blank' href={link}>{text}</a>。
azureonboard.marketing.employeesection.description=藉由整合您所有裝置的硬體、應用程式和員工體驗調查的資料關連，進而收集、衡量和管理員工的數位體驗。
azureonboard.marketing.employeesection.heading=主動式員工見解 (Proactive Employee Insight)
azureonboard.marketing.hardwaresection.description=主動監控裝置硬碟、CPU 使用率、散熱等級，以及電池健全狀況，並藉由對照超過 2,000 萬部裝置的數據湖來分析資料，進而預測潛在的影響。
azureonboard.marketing.hardwaresection.heading=主動式硬體見解 (Proactive Hardware Insight)
azureonboard.marketing.insightsection.description=可診斷效能問題、軟體錯誤、藍色畫面當機，以及系統使用情況，同時還能更新驅動程式及修補程式，確保您的安全性設定檔安全無虞。
azureonboard.marketing.insightsection.heading=主動式應用程式見解 (Proactive Application Insight)
azureonboard.marketing.learnmoresection.content=HP Proactive Insights 匯整了來自 2000 多萬部裝置及數十億個資料點的知識見解，並運用 HP TechPulse 分析平台在問題影響員工之前便加以識別並解決。
azureonboard.marketing.learnmoresection.description=我們透過 AI 支援的主動式控管來控制電腦效能、安全性、成本、停機時間，以及員工滿意度，協助您改變裝置管理模式。您將能運用來自逾 2,000 萬台運算裝置的智慧見解，協助您改善組織效能。
azureonboard.marketing.learnmoresection.heading=HP Proactive Insights 以數十億筆資料點作為基礎來提供具有實質意義的分析
