bios.bsod.tooltip.context=BIOS 的影響程度是根據權重來決定的，在相同機型的其他裝置中，若 BSOD 的發生時間越接近升級時間點，則其權重就越高。此外，權重超過 X% 的特定裝置型號會被歸類為「高影響力」。影響程度是針對每個裝置型號所計算，並適用於所有建議使用該 BIOS 版本的裝置。若該型號的 BSOD 發生次數較少，則權重較低，進而影響程度也較小。
