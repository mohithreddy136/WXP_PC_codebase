azure.onboard.message=HP TechPulse 是遙測與分析平台，可提供有關裝置和應用程式的重要資料，讓 IT 人員能夠輕鬆進行深度學習，從而為員工提供合適的電腦、軟體及服務以獲致成功。HP TechPulse 藉由主動監控全面掌握組織的安全態勢，主動發現問題、大規模實施補救措施，並盡可能地降低威脅。
