exp.MemoryUtilizationIsHighForAnExtendedTime.causeHungApp=正在執行的應用程式當機/無回應。
exp.MemoryUtilizationIsHighForAnExtendedTime.causeInsufficientMemory=電腦沒有足夠記憶體可供其使用。
exp.MemoryUtilizationIsHighForAnExtendedTime.causeLongRunningApp=執行中的應用程式需要使用大量記憶體並花費長時間來完成任務，例如防毒掃描。
exp.MemoryUtilizationIsHighForAnExtendedTime.causeMemoryLeak=已安裝的應用程式可能存在記憶體洩漏錯誤。
exp.MemoryUtilizationIsHighForAnExtendedTime.option1Detail=為協助客戶延長其裝置的使用年限並改善一般使用者的使用體驗，針對過度使用記憶體的電腦的常見改善做法是為該裝置加裝記憶體。
exp.MemoryUtilizationIsHighForAnExtendedTime.option1Title=選項 1: 增加裝置記憶體。
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail1=開啟裝置使用率報告。
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail2=在「導致記憶體使用率過高的應用程式」欄位中，將列出消耗最多記憶體資源的應用程式。
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail3=根據所涉及的應用程式，回應選項將會有所不同。如果這些屬於關鍵業務應用程式，則升級記憶體有可能緩解該問題。可從裝置移除非關鍵業務應用程式，或是調整其設定以減輕裝置負載。
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Title=選項 2: 識別並解除安裝應用程式。
exp.MemoryUtilizationIsHighForAnExtendedTime.option3Detail=重新啟動電腦以徹底關閉所有正在執行的應用程式。
exp.MemoryUtilizationIsHighForAnExtendedTime.option3Title=選項 3: 重新啟動裝置。
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Detail1=透過工作管理員檢視依記憶體使用率區分的目前執行中應用程式。
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Detail2=關閉使用最多記憶體資源的應用程式。
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Title=選項 4: 關閉應用程式。
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Detail1=Use Task Manager to identify an application where the Memory utilization is steadily increasing to unusual proportions, but never decreasing.
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Detail2=請檢查該應用程式是否有製造商提供的更新可用。
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Title=選項 5: 識別潛在的記憶體洩漏並加以更新。
