poly.lens.actions=動作
poly.lens.addon.details.description=在整個組織中管理您的 HP 協作裝置機群，讓您可以充滿自信且明確地進行管理。從簡化的部署和輕鬆維護到主動監控和有意義的見解，讓 IT 團隊得以集中控制空間、房間和裝置。透過安全的雲端管理和混合工作的順暢支援，您可以降低營運費用、預判潛在問題，並讓團隊無論身處何地皆能享有穩定可靠的工作體驗。
poly.lens.addon.feature.centralized.header=集中式個人裝置管理
poly.lens.addon.feature.centralized.text=在 HP Poly Studio 應用程式的支援下，為一般使用者提供順暢且自助式的使用體驗，同時讓 IT 團隊仍能對個人裝置維持集中式的可視性和控管能力。無論您的團隊在何處工作，都能充滿自信地管理清查、更新、監控和見解。
poly.lens.addon.feature.effortless.maintenance.header=輕鬆維護
poly.lens.addon.feature.effortless.maintenance.text=輕鬆管理整個機群的設定、功能和軟體更新。大規模套用設定、預先配置更新和微調組態，且無需犧牲控制力或精確度。
poly.lens.addon.feature.meaningful.measurement.header=有意義的測量
poly.lens.addon.feature.meaningful.measurement.text=了解裝置、空間與人員的實際運作方式。將使用率與效能資料轉化為有關協作投資且更具智慧的資料導向型決策。
poly.lens.addon.feature.proactive.monitoring.header=主動監控
poly.lens.addon.feature.proactive.monitoring.text=藉由清楚掌握裝置健全狀況及狀態，預先因應問題。當問題發生時會即時收到通知，因此能讓問題在影響會議運作之前就能受到妥善處理。
poly.lens.addon.feature.secure.header=安全的雲端式控制
poly.lens.addon.feature.secure.text=透過可隨著組織成長進行擴充的受信任雲端平台管理所有內容，同時滿足企業安全性和合規性需求。
poly.lens.addon.feature.simplified.deployment.header=簡化部署
poly.lens.addon.feature.simplified.deployment.text=自信地規劃、預先配置和部署裝置。自動化的上線工作流程可縮短設定時間、降低錯誤發生率，並在裝置交付給使用者或配置到房間之前便已準備就緒。
poly.lens.addon.subtitle=跨協作空間、房間和裝置的雲端管理和見解。
