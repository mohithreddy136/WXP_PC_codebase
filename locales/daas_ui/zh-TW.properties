dnto.subscriptions.about_hp.desc1=HP 是因應科技日新月異而創立的公司，突破只關注盈利的傳統企業經營理念。進而以科技為世人打造更優質的生活空間為己任。在氣候行動、人權與數位平等各方面的傾力投入，證明我們一直在竭盡所能，善盡職責。
dnto.subscriptions.about_hp.desc2=80 多年來的積極行動足以證明我們的心意，HP 有信心展望一個由創新帶來對人類非凡貢獻的世界。
dnto.subscriptions.about_hp.desc3=我們更為促進此富有意義的進步而打造了應用科技，包含個人系統、印表機和 3D 列印解決方案的產品與服務組合。
dnto.subscriptions.about_hp.desc4=我們知道，面面俱到的創意構思可以源自任何人、任何地點、任何時間。
dnto.subscriptions.about_hp.desc5=而只需一個即可改變世界。
