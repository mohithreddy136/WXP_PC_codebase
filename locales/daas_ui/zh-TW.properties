exp.GpuHealthIssue.blueScreenLink=https://docs.microsoft.com/en-us/windows-hardware/drivers/debugger/-analyze
exp.GpuHealthIssue.blueScreenLinkText=https://docs.microsoft.com/en-us/windows-hardware/drivers/debugger/-analyze
exp.GpuHealthIssue.causeBlueScreenErrors=藍色畫面錯誤: 藍色畫面錯誤可能是因為同時執行過多圖形密集型程式或視覺特效所引起，亦可能是驅動程式與硬體問題所造成。
exp.GpuHealthIssue.causeDoubleBitEcc=雙位元 ECC 記憶體錯誤: 顯示卡出現雙位元 ECC 記憶體錯誤，這可能表示硬體問題或記憶體故障。
exp.GpuHealthIssue.causeHighDoubleBitEccOverTime=隨著時間推移而出現雙位元 ECC 記憶體錯誤的次數增加: 顯示卡出現雙位元 ECC 記憶體錯誤次數偏高，且平均錯誤次數已持續增加至少 3 週。
exp.GpuHealthIssue.causeHighTdrEvents=大量 TDR (顯示器驅動程式逾時和復原) 事件: 顯示卡發生了大量的 TDR 事件，表示驅動程式或硬體可能存在問題。
exp.GpuHealthIssue.causeMissingDriverUpdate=缺少重大驅動程式更新: 顯示卡缺少重大驅動程式更新，這可能會影響效能和穩定性。
exp.GpuHealthIssue.causeThermalIssues=散熱問題: 顯示卡頻繁出現散熱問題，而且 GPU 或記憶體溫度高於作業溫度上限。
exp.GpuHealthIssue.driverOption1=選項 1: 使用 HP Image Assistant 更新驅動程式
exp.GpuHealthIssue.driverOption2=選項 2: 使用 Windows Update 來更新驅動程式
exp.GpuHealthIssue.possibleCauses=可能的原因:
exp.GpuHealthIssue.remediationBlueScreenPrefix=針對藍色畫面錯誤: 檢查是否因為同時執行了太多圖形密集型程式或視覺特效。更新顯示卡驅動程式、將超頻設定重設為預設值、執行驅動程式的乾淨安裝或將設定重置為出廠預設值、確保電源供應充足，並清潔通風孔和風扇。分析小型傾印檔案以了解具體的補救步驟:
exp.GpuHealthIssue.remediationDoubleBitEcc=針對雙位元 ECC 記憶體錯誤: 持續監控情況，並確認效能是否持續惡化。如果錯誤次數依然很高，請考慮更換顯示卡。
exp.GpuHealthIssue.remediationMissingDriver=針對缺少驅動程式更新: 將顯示卡驅動程式更新至最新版本，從而處理效能問題。
exp.GpuHealthIssue.remediationTdr=針對 TDR 事件: 如果問題仍然存在，請持續監控並更新顯示卡驅動程式。將顯示卡設定重設為預設值、將超頻設定重設為預設值、如有可用更新則更新 BIOS，以及檢查電源是否充足及氣流是否順暢。清潔通風孔和風扇。
exp.GpuHealthIssue.remediationThermal=針對散熱問題: 檢查是否有氣流受阻，以及清潔通風孔，並確保風扇運轉正常且保持清潔。
exp.GpuHealthIssue.suggestedRemediations=建議的修復:
exp.GpuHealthIssue.title=處理 GPU 健全狀況
exp.HpBatteryHealthManagerNotEnabled.causeNotCompatible=裝置與 HP 電池健全狀況管理員不相容。
exp.HpBatteryHealthManagerNotEnabled.causeRequiresBiosUpdate=裝置需要 BIOS 更新。
exp.HpBatteryHealthManagerNotEnabled.description=自 2016 年起，所有 HP 商用筆記型電腦均配備 HP 電池健全狀況管理員。為延長電池使用壽命，建議啟用電池健全狀況管理員功能。
exp.HpBatteryHealthManagerNotEnabled.option1Detail=HP 建議啟用 HP 電池健全狀況管理員以選用「讓 HP 管理我的電池充電」或「最佳化我的電池健全狀況」模式，具體取決於您的使用情況與裝置使用年限。
exp.HpBatteryHealthManagerNotEnabled.option1Title=選項 1: 將 BIOS 更新為支援的版本
exp.HpBatteryHealthManagerNotEnabled.possibleCauses=可能的原因:
exp.HpBatteryHealthManagerNotEnabled.reference1Link=https://support.hp.com/us-en/document/ish_4449597-3519507-16
exp.HpBatteryHealthManagerNotEnabled.reference1Text=HP 電池健全狀況管理員 - 支援
exp.HpBatteryHealthManagerNotEnabled.references=參考資料:
exp.HpBatteryHealthManagerNotEnabled.settingLetDetail1=該功能會根據系統經過一段時間後的使用狀況及溫度變化，動態變更電池充電方式。
exp.HpBatteryHealthManagerNotEnabled.settingLetTitle=讓 HP 管理我的電池充電
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases1=在混合使用環境中，筆記型電腦需要時常拔插 AC 電源，以及允許讓電池處於放電狀態。
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases2=建議貴組織採用單一流程。
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases3=該筆記型電腦使用還不到一年。
exp.HpBatteryHealthManagerNotEnabled.settingMaxDetail1=將最高充電狀態限制在 80%，從而最佳化電池健全狀況並減緩膨脹現象。
exp.HpBatteryHealthManagerNotEnabled.settingMaxTitle=最佳化我的電池健全狀況
exp.HpBatteryHealthManagerNotEnabled.settingMaxUseCases1=筆記型電腦持續連接 AC 電源的環境。
exp.HpBatteryHealthManagerNotEnabled.settingMaxUseCases2=筆記型電腦已使用一年以上。
