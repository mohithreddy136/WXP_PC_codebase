partner.exp.mgmt.recommended.desc.AV_WD_SIGNATURE=使惡意軟體特徵碼保持最新狀態可確保針對最新威脅的全面保護。
partner.exp.mgmt.recommended.desc.AVG_FAN_SPEED_HIGH=風扇長時間的高速運轉可能表示裝置過熱，進一步導致元件損壞並縮短其使用壽命。
partner.exp.mgmt.recommended.desc.BITLOCKER_ENCRYPTION_NOT_ENABLED=未加密的裝置若遺失或遭竊，資料可能會外洩。
partner.exp.mgmt.recommended.desc.DISK_UTILIZATION_HIGH=可用磁碟空間較少的裝置會變得緩慢，難以執行基本任務。
partner.exp.mgmt.recommended.desc.DOCKING_STATION_AC_ADAPTER_FAILED=銜接基座 AC 變壓器故障可能表示存在硬體問題，進而導致裝置斷電或間歇性運作。
partner.exp.mgmt.recommended.desc.DOCKING_STATION_FIRMWARE_OUT_OF_DATE=過時的銜接基座韌體可能會導致相容性問題、功能受限，甚至暴露安全漏洞。
partner.exp.mgmt.recommended.desc.EXCESSIVE_OS_SHUTDOWN_TIME=關機時間過長可能表示有應用程式卡住、硬體延遲、原則更新、指令碼執行超時，或是 Windows 任務尚未完成。
partner.exp.mgmt.recommended.desc.EXCESSIVE_OS_STARTUP_TIME=啟動時間過長可能具有潛在的軟體衝突或硬體問題。
partner.exp.mgmt.recommended.desc.FIREWALL_DISABLED=停用 Windows Defender 防火牆可能會使裝置遭受來自網路的惡意攻擊。
partner.exp.mgmt.recommended.desc.FIREWALL_SIGNATURE_OUTDATED=過時的防火牆定義會使裝置暴露在新型惡意軟體和網路威脅之下。
partner.exp.mgmt.recommended.desc.GPU_HEALTH_ISSUE=偵測到的 GPU 問題可能會導致視覺呈現出錯、效能問題，甚至無法顯示圖形。
partner.exp.mgmt.recommended.desc.HIGH_COLLABORATION_SW_ERRORS=協作軟體中持續存在的錯誤可能會干擾團隊工作流程、阻礙溝通並影響專案進度。
partner.exp.mgmt.recommended.desc.HIGH_WINDOWS_CRASH=非預期的當機與重新開機代表潛在的不穩定性，可能導致資料遺失或硬體永久損壞。
partner.exp.mgmt.recommended.desc.LAST_REBOOT_MORE_THAN_21_DAYS=長時間未重新開機的裝置可能會出現作業系統穩定性與效能問題。
partner.exp.mgmt.recommended.desc.MAXIMISE_MY_BATTERY_HEALTH_NOT_ENABLED=未啟用 Battery Health Manager 可能會影響目前電池壽命。
partner.exp.mgmt.recommended.desc.MEMORY_UTILIZATION_HIGH=裝置長時間記憶體使用率過高會導致運作速度變慢，進而影響員工績效。
partner.exp.mgmt.recommended.desc.MISSING_CRITICAL_DRIVER_UPDATES=如果缺少關鍵的驅動程式更新，裝置硬體可能會發生故障，甚至完全無法運作。
partner.exp.mgmt.recommended.desc.MISSING_WINDOWS_SECURITY_UPDATES=過時的安全性更新可能會使裝置容易受到駭客和病毒的攻擊。
partner.exp.mgmt.recommended.desc.MISSING_WINDOWS_UPDATES=過時的 Windows 更新會使裝置暴露於漏洞與潛在的惡意軟體感染風險之中。
partner.exp.mgmt.recommended.desc.PC_REFRESH=啟動所有裝置的 Smart Refresh，或在下方表格中取消選取目前不打算更換的電腦。
partner.exp.mgmt.recommended.desc.PC_REFRESH_SELECT=檢查裝置並繼續處理該要求。
partner.exp.mgmt.recommended.desc.security=解決所有問題，或在下方表格中取消選取目前不打算啟用的電腦。
partner.exp.mgmt.recommended.desc.WINDOWS_SECURE_BOOT_NOT_ENABLED=啟用 Windows 安全開機可確保裝置只會使用受信任的軟體進行開機。
partner.exp.mgmt.recommended.disk_utilization_high=釋放磁碟空間。
