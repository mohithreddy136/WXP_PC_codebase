wex.fleet.mgmt.remediation.missing_linux_updates.step4=啟用自動更新或安排定期修補排程，確保能及時套用未來的更新。
wex.fleet.mgmt.remediation.missing_linux_updates.step5=藉由檢查系統記錄並確認目前內核和套件版本的方式，驗證更新是否成功。
