side_panal.smart_refresh.help_sec1_point_1_desc=根據 9 個資料點評估每個裝置，並匯總為「更新急迫性分數」*。此分數可協助您優先處理風險較高的個別裝置，以避免影響使用者生產力。
side_panal.smart_refresh.help_sec1_point_1_title=1. 識別
side_panal.smart_refresh.help_sec1_point_2_desc=AI 模型會根據使用情況，將裝置區分為不同的硬體與軟體角色。這些角色可以協助您找到最合適的替代裝置。
side_panal.smart_refresh.help_sec1_point_2_title=2. 分類
side_panal.smart_refresh.help_sec1_point_3_desc1=如果您與 HP 合作夥伴合作，智慧更新將會推薦每個裝置的替代方案。具體而言，智慧更新會在合作夥伴上傳的目錄中找出相關角色效能最佳的機型，並據此提出建議。如果您並未看到推薦的裝置，或是該裝置已過時，請聯繫您的合作夥伴並要求他們上傳最新的目錄。
side_panal.smart_refresh.help_sec1_point_3_desc2=如果您並未與 HP 合作夥伴合作，將無法在智慧更新中看到裝置推薦。請聯繫您的 HP 客戶代表，以取得最合適的替代機型。
