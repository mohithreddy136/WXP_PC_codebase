wex.labs.remediation.ai.description=AI 修復可引導您找到最有效的解決方案。它能以智慧方式篩選方案，讓您的團隊能高效且一致地解決問題。
wex.labs.remediation.ai.description.disclaimer=You are about to interact with an AI solution. Content generated by AI might contain inaccuracies and should be verified against the details provided. Please note that AI-generated responses might be incomplete or incorrect, and HP assumes no responsibility for actions taken based on this content.
wex.labs.remediation.ai.details.analyzesAvailableRemediations.desc=演算法會掃描平台中現有的修復方式，包括指令碼、原則和裝置動作/更新，從而建議最相關的修復方式。<br/><br/>其會查看歷史使用情況及成功率，藉此了解通常在組織中解決這類問題的方法。讓使用者能花費更少時間即可決定正確的行動方式，並允許由 AI 完成工作。
wex.labs.remediation.ai.details.analyzesAvailableRemediations.title=分析可用的修復
wex.labs.remediation.ai.details.applyOrReview.desc=視修復方式而定，管理員可以選擇: <br/><div class=remediation-ai-ui><ul><li>立即套用至所選裝置</li><li>排程稍後執行以將干擾降至最低</li><li>在確認操作前查核細節</li></ul></div><br/>套用後將會追蹤活動與成效，確保透明化並促進持續學習。
wex.labs.remediation.ai.details.applyOrReview.title=套用、排程或檢查
wex.labs.remediation.ai.details.continuousLearning.desc=隨著時間的推移，建議的準確度與可信度會持續提升。
wex.labs.remediation.ai.details.continuousLearning.title=持續學習
wex.labs.remediation.ai.details.howItWorks.title=運作方式
wex.labs.remediation.ai.details.issueToRemediation.desc=當問題超過定義的閾值時，系統會在您的儀表板上顯示該問題，並清楚描述發生的狀況及其可能對裝置造成的影響。WXP 平台現在支援直接修復，且 AI 修復功能還可協助篩選出最佳方案來修正問題。
wex.labs.remediation.ai.details.issueToRemediation.title=從問題到修復
wex.labs.remediation.ai.details.learnsandImproves.desc=該演算法會持續精進其對於組織最佳運作模式的理解。<br/>每當執行一次修復措施，系統都能更了解:<div class=remediation-ai-ui><ul><li>其成效如何</li><li>解決問題所需的時間</li><li>類似問題是否再次發生</li></ul></div><br/>這樣的意見反應循環會強化未來的建議，使其隨時間變得更精準且更符合需求。
wex.labs.remediation.ai.details.learnsandImproves.title=持續學習與改進
wex.labs.remediation.ai.details.overview.desc=具備 AI 功能的修復措施可協助 IT 管理員快速從問題偵測過渡到問題解決。它會分析您的機群資料，並針對目前的問題推薦最有效的原則、指令碼或裝置更新。該演算法會利用環境中現有的修復模式，來建議最有可能奏效的解決方案。
wex.labs.remediation.ai.details.recommendBestFix.desc=每項建議都包含: <br/><div class=remediation-ai-ui><ul><li>動作類型: 指令碼、原則或更新</li><li>為何它如此重要: 修復與自動化能即時解決問題、提升員工生產力、強化數位體驗，節省時間並降低安全漏洞風險。</li></ul></div>
wex.labs.remediation.ai.details.recommendBestFix.title=推薦最佳修復
