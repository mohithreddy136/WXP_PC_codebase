banner.iot.update.description=TechPulse 平台基礎架構將於 2023 年 2 月 27 日 (週一) 進行變更。屆時您可能需要更新 Proxy、防火牆以及 SSL 檢查軟體設定。請前往 <a href='https://www.hpdaas.com/software' target='_blank'>HP TechPulse - 軟體 (hpdaas.com)</a> 執行網路評估工具，並檢查四 (4) 個 *.IoT 測試目標中是否有任何一項顯示「失敗」(Fail) 訊息。若測試結果顯示失敗，請依照「<b><a href='https://hp.service-now.com/techpulse_kb?id=kb_article&sysparm_article=KB0011291' target='_blank'>KB0011291</a> - 設定 Proxy 或防火牆</b>」中的指引執行，<b>並於 2023 年 2 月 23 日 (週四) 前完成相關設定變更</b>。
