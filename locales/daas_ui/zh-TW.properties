dnto.subscriptions.privacy_statement.desc1=HP 除了認同隱私權是一項基本人權外，同時更深切體認到，隱私權、安全性與資料保護對我們全球各地的客戶與合作夥伴的重要性。作為一個全球性機構，我們擁有跨越國界的法人實體、業務流程、管理結構與技術系統，致力於在所有業務領域提供高於最低法定標準的保護，並部署一致、嚴格的政策與措施。
dnto.subscriptions.privacy_statement.desc2=在本聲明中所使用的「我們」、「我們的」、「本公司」等詞彙，係指依據當地法規定義的 HP 品牌公司及現有與未來的附屬機構 (以下統稱為「HP」)。HP 資料保護長的聯絡資訊列於下方的「{0}」區段中。
