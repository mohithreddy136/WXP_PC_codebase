welcome.banner.description=TechPulse 是遙測與分析平台，可提供有關裝置和應用程式的重要資料，讓 IT 人員能夠輕鬆進行深度學習，從而為員工提供合適的電腦、軟體及服務以獲致成功。HP TechPulse 藉由主動監控全面掌握組織的安全態勢，主動發現問題、大規模實施補救措施，並盡可能地降低威脅。
welcome.banner.description_p={app_name} 是遙測與分析平台，可提供有關裝置和應用程式的重要資料，讓 IT 人員能夠輕鬆進行深度學習，從而為員工提供合適的電腦、軟體及服務以獲致成功。{app_name} 藉由主動監控全面掌握組織的安全態勢，主動發現問題、大規模實施補救措施，並盡可能地降低威脅。
welcome.banner.description_p1={app_name} 是一個以雲端為基礎的遙測和分析平台，其能匯總您裝置與應用程式中的關鍵組態與健全狀況資料。其運用 AI 與深度學習技術來分析這些資料，進而主動識別問題、提供大規模補救措施，以及最大限度地降低安全威脅。
