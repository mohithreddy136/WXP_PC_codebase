wpt.feature.monitoring.desc=透過 HP Workforce Experience Platform 簡化的使用者儀表板，一旦裝置遺失或遭竊，ITDM 將能更快速地進行回應，並透過一個使用者友善的平台監控所有裝置的健全狀況與防護狀況。
