exp.ExcessiveOsStartupTime.causeSlowDomainLink=電腦在啟動過程中，從網域控制器下載 GPO 時，可能存在連線速度緩慢的情況。
exp.ExcessiveOsStartupTime.causeStartupScripts=啟動指令碼需要耗費過多時間才能完成。
exp.ExcessiveOsStartupTime.option1=選項 1: Windows 11 - 設定中的啟動應用程式
exp.ExcessiveOsStartupTime.option1Guide=若想提升裝置效能並解決登入速度緩慢的問題，將登入時啟動的應用程式移除，效果會最為顯著。針對 Windows 11 裝置，Microsoft 提供了一份指南，可協助您有效掌控 Windows 啟動。
exp.ExcessiveOsStartupTime.option1GuideLink=https://www.microsoft.com/en-us/windows/learning-center/take-control-of-windows-startup
exp.ExcessiveOsStartupTime.option1GuideLinkText=https://www.microsoft.com/en-us/windows/learning-center/take-control-of-windows-startup
exp.ExcessiveOsStartupTime.option1StepApps=在視窗左側，選取「應用程式」。
exp.ExcessiveOsStartupTime.option1Steps=by changing the Windows startup programs using the following steps:
exp.ExcessiveOsStartupTime.option1StepSettings=選取設定。
exp.ExcessiveOsStartupTime.option1StepStart=選取「開始」按鈕，其外觀類似於 Microsoft 標誌。
exp.ExcessiveOsStartupTime.option1StepStartup=選取應用程式視窗底部的「啟動」。
exp.ExcessiveOsStartupTime.option1StepToggles=使用開關來決定哪些應用程式要在啟動時執行。如果您希望應用程式在啟動時自動開啟，請將其開啟，若不希望應用程式在啟動時自動開啟，則將其關閉。
exp.ExcessiveOsStartupTime.option2=選項 2: Windows 11 - 工作管理員中的啟動應用程式
exp.ExcessiveOsStartupTime.option2Guide=也可經由 Windows 工作管理員啟用和停用啟動應用程式，操作步驟如下:
exp.ExcessiveOsStartupTime.option2StepDisable=以滑鼠右鍵按一下應用程式並選取「停用」(如果「狀態」欄顯示「已啟用」)。
exp.ExcessiveOsStartupTime.option2StepStart=選取「開始」按鈕，其外觀類似於 Microsoft 標誌。
exp.ExcessiveOsStartupTime.option2StepStartupApps=在左側導覽列中選取「啟動應用程式」。
exp.ExcessiveOsStartupTime.option2StepTaskManager=輸入「工作管理員」並按下 Enter 鍵，開啟 Windows 工作管理員。
exp.ExcessiveOsStartupTime.option3=選項 3: 解除安裝應用程式
exp.ExcessiveOsStartupTime.option3Guide=未在系統啟動時自動啟動的應用程式也會導致登入時間變慢，因為這些應用程式可能包含已部分載入的檔案、服務及登錄項目等。其中一個例子便是系統匣應用程式，這類應用程式即使未開啟作用中視窗，也仍然在背景中運作。若要審核並移除不必要的應用程式，請完成下列步驟。附註: 部分應用程式可能需要管理權限才能移除。
exp.ExcessiveOsStartupTime.option3StepControlPanel=輸入「控制」並按下 Enter 鍵，開啟控制台。
exp.ExcessiveOsStartupTime.option3StepPrograms=開啟「程式和功能」。
exp.ExcessiveOsStartupTime.option3StepStart=選取「開始」按鈕，其外觀類似於 Microsoft 標誌。
exp.ExcessiveOsStartupTime.option3StepUninstall=選取要移除的應用程式，然後選取「解除安裝」。
exp.ExcessiveOsStartupTime.option4=選項 4: 使用 PowerShell 及 ActiveDirectory 模組執行 Get-GpResultantSetofPolicy，用以分析原則及其套用在受影響裝置上所需的時間，進而找出可行的改善方向。
