wex.ra.remediation.antivirus_not_enabled=Microsoft Defender Antivirus 是 Windows 內建的防毒軟體，能協助保護您的裝置防範各種病毒、惡意軟體及其他威脅。
wex.ra.remediation.antivirus_signature_outdated=為了確保最佳防護效能，防毒軟體定義檔應保持更新。
wex.ra.remediation.antivirus_signature_outdated_other=此裝置已配置為使用第三方非 Microsoft 的防毒軟體來協助其防範病毒、惡意程式及其他威脅，但裝置上需要進行防毒軟體特徵碼更新。
wex.ra.remediation.app_crash=過去 7 天內，在 Teams、Outlook、Zoom、Webex、Chrome、Office 中已發現 10 多個軟體錯誤。
wex.ra.remediation.avg_fan_speed_high=長時間保持較高的風扇平均轉速。
wex.ra.remediation.battery_calibrate=電池需要校準。
wex.ra.remediation.battery_early_detection_wear=在過去 30 天內，該電池的預估充飽容量已低於 70%。
wex.ra.remediation.battery_needs_attention=Workforce Experience Platform displays records of battery warnings and failures that can be used to obtain service for a battery that is experiencing issues
wex.ra.remediation.bitlocker_encryption_not_enabled=為了保護靜態資料，強烈建議您進行磁碟加密。
wex.ra.remediation.bsod=在過去 7 天內已發生超過 3 次錯誤檢查 (BSOD 事件)。
wex.ra.remediation.bsod_occured=該裝置在過去 7 天內經歷了 1 個或多個錯誤檢查事件。
wex.ra.remediation.cpu_utilization_high=可能的原因: 正在執行的應用程式當機/無回應。
wex.ra.remediation.disk_needs_attention=Workforce Experience Platform 會顯示磁碟警告與故障記錄，因此當磁碟發生問題時可使用該記錄取得維修服務。
wex.ra.remediation.disk_utilization_high=Hard disk is near full disk capacity and low in free space.
wex.ra.remediation.docking_station_ac_adapter_failed=The Docking Station AC Adapter is having a hardware issue.
wex.ra.remediation.docking_station_ac_adapter_running_at_reduced_perofmance=銜接基座 AC 變壓器並未正常運作。
wex.ra.remediation.docking_station_firmware_out_of_date=Possible Causes: The docking station may require a Firmware or Driver update.
wex.ra.remediation.excessive_os_shutdown_time=關機程序至少需要 3 分鐘或更長的時間完成。
wex.ra.remediation.excessive_os_startup_time=系統啟動至少需要 3 分鐘或更長的時間完成。
wex.ra.remediation.firewall_disabled=防火牆有助於防止駭客及惡意軟體透過網際網路或網路存取您的電腦。
wex.ra.remediation.firewall_signature_outdated=防火牆需定期更新，以確保最佳防護力來抵禦網路攻擊。
wex.ra.remediation.frequent_bsod_occured=在過去 7 天內已發生超過 3 次錯誤檢查 (BSOD 事件)。 
wex.ra.remediation.frequent_network_disconnection=針對家用網路，請確保路由器韌體為最新版本，並將路由器放置於中央位置以減少干擾。此外，減少連線裝置的數量，並考慮以實體線路連接關鍵裝置以維持穩定可靠的網路。
wex.ra.remediation.gpu_health_issue=Workforce Experience Platform 已偵測到 GPU 出現需立即處理的問題。
wex.ra.remediation.high_collaboration_sw_errors=過去 7 天內，在 Teams、Outlook、Zoom、Webex、Chrome、Office 中已發現 10 多個軟體錯誤。
wex.ra.remediation.high_windows_crash=作業系統在過去 7 天內經歷了 1 個或多個非預期當機/重新開機事件。
wex.ra.remediation.last_reboot_more_than_21_days=上次重新開機的時間已超過 21 天。
wex.ra.remediation.maximise_my_battery_health_not_enabled=HP Battery Health Manager is available on all HP business notebooks since 2016. To improve battery life, it is recommended that Battery Health Manager be enabled
wex.ra.remediation.memory_utilization_high=The average Memory utilization over the last 30 days is 85% or greater.
wex.ra.remediation.missing_critical_bios_updates=選取下方裝置，接著選取「套用原則」以透過平台更新相容裝置的 BIOS。對於不相容裝置，請使用 Windows Update 或 HP Image Assistant 更新系統驅動程式和韌體。
wex.ra.remediation.missing_critical_driver_updates=驅動程式清查報告包含一份詳細的裝置清查資料，其中列出了缺少的重大裝置驅動程式更新。
wex.ra.remediation.missing_windows_security_updates=Workforce Experience Platform 安全性儀表板所包含的 KPI 可顯示缺少 Windows 安全性更新的裝置數量。
wex.ra.remediation.os_crash=作業系統在過去 7 天內經歷了 1 個或多個非預期當機/重新開機事件。
wex.ra.remediation.poor_network_signal_strength=針對家用網路，將路由器重新開機或移動路由器以減少存取點與電腦之間的障礙物，也有助於提升 Wi-Fi 訊號強度。
wex.ra.remediation.poor_nominal_speed=針對家用網路，我們建議將路由器升級至可支援最新 Wi-Fi 標準 (例如 Wi-Fi 6) 的新型號。此外，可將路由器放置在中央位置、減少其他裝置的干擾，並盡可能使用有線連接以獲得更穩定的效能，使您能透過這些方式來最佳化網路配置。
wex.ra.remediation.unauthenticated_connection=針對家用網路，選擇強大的加密協議 (例如 WPA2 或 WPA3) 並設定複雜且獨特的密碼進行存取。此外，可考慮實施 MAC 位址篩選並定期更新路由器韌體，以提升安全性並防止未經授權的連線。
wex.ra.remediation.windows_secure_boot_not_enabled=安全開機是一項由電腦產業成員制定的安全標準，旨在確保裝置只會使用原始設備製造商 (OEM) 信任的軟體進行開機。
