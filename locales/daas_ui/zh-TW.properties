exp.mgmt.troubleshoot.description.antivirus_not_enabled_other=此裝置已配置為使用第三方非 Microsoft 的防毒軟體來協助其防範病毒、惡意程式及其他威脅，但目前裝置上的防毒保護未啟用。
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.description=偵測到未經驗證的連線。
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.moreInfo=詳細資訊:
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.moreInfoLink=https://support.microsoft.com/en-us/windows/wi-fi-network-not-secure-in-windows-9170b675-921b-3aa5-7e43-fcb2059d159c
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option1=選項 1: 若您正在連接家中的 Wi-Fi 網路，建議考慮變更路由器或無線存取點所使用的安全性類型。
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option1.step1=使用路由器隨附軟體來登入路由器。
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option1.step2=變更家用 Wi-Fi 網路的安全性類型。
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.option2=選項 2: 如果您使用的是較舊的路由器或存取點，建議考慮變更為支援最新安全標準與改善項目的新型路由器。
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.recommendations=建議:
exp.mgmt.troubleshoot.network.wificonnectionisnotsecure.title=Wi-Fi 連線不安全
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.cause1=您家中的格局可能會導致 Wi-Fi 問題。
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.cause2=存取點可能被牆壁或其他障礙物阻擋。
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.description=過去 24 小時內回報的 Wi-Fi 訊號強度變得較弱。
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.moreInfo=詳細資訊:
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.moreInfoLink=https://support.microsoft.com/en-us/windows/wi-fi-problems-and-your-home-layout-e1ed42e7-a3c5-d1be-2abb-e8fad00ad32a#WindowsVersion=Windows_11
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.possibleCauses=家用網路的可能原因:
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1=選項 1: 重新啟動路由器
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step1=將數據機和路由器從電源插座拔除。
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step2=至少等待 15 秒。
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step3=將數據機重新接回 AC 電源插座，等待 1-2 分鐘，然後再開啟路由器。
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step4=在測試您的網路連線之前，請等待數據機上的所有面板燈變為綠色。
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2=選項 2: 移動您的存取點。
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step1=如果可以的話，請移動您的存取點，以減少其與電腦之間的牆壁或其他障礙物數量。
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step2=如果可以的話，請將您的電腦移得更靠近存取點。
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step3=如果可以的話，請將存取點移至您家中或會議室的中央位置，並盡可能放置在較高處。將存取點放在角落或桌子下方可能會削弱 Wi-Fi 訊號強度。
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendations=建議:
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.title=Wi-Fi 訊號強度微弱
exp.mgmt.troubleshoot.network.wifispeedisslow.cause1=存取點可能被牆壁或其他障礙物阻擋。
exp.mgmt.troubleshoot.network.wifispeedisslow.cause2=路由器韌體可能已過時。
exp.mgmt.troubleshoot.network.wifispeedisslow.description=過去 24 小時內回報的 Wi-Fi 額定速度變得更為緩慢。
exp.mgmt.troubleshoot.network.wifispeedisslow.possibleCauses=家用網路的可能原因:
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation1=重新啟動您的數據機和路由器
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation1.step1=請先關閉數據機，然後關閉路由器。
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation2=移動您的路由器
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation2.step1=試著將路由器移到住家或辦公室的其他位置，或調整天線以朝向不同的方向。
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation3=更新您的路由器韌體
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation3.step1=定期更新路由器的韌體有助於修正錯誤及連線問題。雖然部分路由器可能有自動更新的功能，但大多數的路由器仍需要手動更新。
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation4=變更您的路由器頻率
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation4.step1=Wi-Fi 路由器會自動選擇頻段，但您可以嘗試將頻段從 2.4 GHz 換成 5 GHz，看看是否能提升速度。不過，在變更之前，請先確認您的路由器是否支援 5 GHz。
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation5=更新您的 Wi-Fi 驅動程式
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation5.step1=過時或損壞的驅動程式可能會導致網路問題，請確保您的 Wi-Fi 介面卡為最新版本。
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation6=避免干擾
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation6.step1=頻道干擾會大幅降低傳輸速率並減緩資料傳輸速度，因此請嘗試排除您可能遇到的任何干擾。
