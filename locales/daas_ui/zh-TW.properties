wex.fleet.mgmt.recommended.desc.antivirus_not_enabled=啟用 Microsoft Defender 可提供必要防護以防範惡意軟體和其他安全威脅。
wex.fleet.mgmt.recommended.desc.antivirus_not_enabled_other=啟用防毒軟體可保護裝置免受惡意軟體的侵害，並保護您的系統免受攻擊。
wex.fleet.mgmt.recommended.desc.antivirus_signature_outdated=定期更新惡意軟體特徵碼，可確保 Windows Defender 能偵測並防範最新的威脅。
wex.fleet.mgmt.recommended.desc.antivirus_signature_outdated_other=使惡意軟體特徵碼保持最新狀態可確保針對最新威脅的全面保護。
wex.fleet.mgmt.recommended.desc.avg_fan_speed_high=解決風扇轉速過高的問題有助於防止過熱及造成裝置內部元件的潛在損壞。
wex.fleet.mgmt.recommended.desc.battery_calibrate=校正電池可以提高電力讀數的準確性，並增強電池壽命和效能。
wex.fleet.mgmt.recommended.desc.battery_early_detection_wear=解決電池耗損問題可確保裝置高效運作、效能穩定並延長電池壽命。
wex.fleet.mgmt.recommended.desc.battery_needs_attention=Replacement of defective batteries can ensure good device performance, and system health. Devices which are covered by warranty may be eligible for battery replacement.
wex.fleet.mgmt.recommended.desc.bitlocker_encryption_not_enabled=啟用 BitLocker 以透過加密您的磁碟機來保護敏感性資料，從而增強整體安全性以防止未經授權的存取。
wex.fleet.mgmt.recommended.desc.bsod_occured=解決藍色畫面錯誤可確保系統穩定性、防止意外關閉並保持可靠性。
wex.fleet.mgmt.recommended.desc.cpu_utilization_high=分析偏高 CPU 使用率有助於防止效能瓶頸，並保持系統順暢運作。
wex.fleet.mgmt.recommended.desc.disk_needs_attention=Disk performance is degrading and may soon lead to slower performance or instability if not addressed.
wex.fleet.mgmt.recommended.desc.disk_utilization_high=釋放磁碟空間可防止系統變慢，並透過避免儲存空間超載來確保順暢運作。
wex.fleet.mgmt.recommended.desc.docking_station_ac_adapter_failed=修復變壓器故障可確保對銜接基座的穩定供電，以避免連線問題。
wex.fleet.mgmt.recommended.desc.docking_station_ac_adapter_running_at_reduced_perofmance=提升轉接器效能可確保穩定的連線，並發揮銜接基座的最佳效能。
wex.fleet.mgmt.recommended.desc.docking_station_firmware_out_of_date=銜接基座的韌體更新可確保裝置相容性並提高整體系統效能。
wex.fleet.mgmt.recommended.desc.excessive_os_login_time=縮短登入時間可減少延遲的情況，提升使用者在系統存取時的效率。
wex.fleet.mgmt.recommended.desc.excessive_os_shutdown_time=最佳化關機時間可將等待時間縮到最短，並確保系統高效關機。
wex.fleet.mgmt.recommended.desc.excessive_os_startup_time=更快的啟動時間可加快對系統的存取速度，並提高使用者效率和生產力。
wex.fleet.mgmt.recommended.desc.firewall_disabled=啟用 Windows 防火牆有助於阻止未經授權的存取並保護您的網路免受潛在威脅。
wex.fleet.mgmt.recommended.desc.firewall_signature_outdated=定期更新防火牆特徵碼以防禦新型態和不斷演變的網路威脅。
wex.fleet.mgmt.recommended.desc.frequent_bsod_occured=解決藍色畫面錯誤可確保系統穩定性、防止意外關閉並保持可靠性。
wex.fleet.mgmt.recommended.desc.frequent_kernel_panic_error=解決核心異常錯誤可以提高系統穩定性、增強安全性並防止資料遺失。
wex.fleet.mgmt.recommended.desc.frequent_network_disconnection=零網路中斷可提升可靠性、改善使用者體驗，並確保服務與應用程式的連線不中斷。
wex.fleet.mgmt.recommended.desc.gpu_health_issue=修復 GPU 問題可以防止圖形效能問題，並保持視覺應用程式的順暢運作。
wex.fleet.mgmt.recommended.desc.high_collaboration_sw_errors=解決協作軟體問題可確保順暢的團隊合作和持續的生產力。在過去 7 天內，我們在 Teams、Outlook、Zoom、Webex、Chrome、Office 中發現了 10 多個軟體錯誤。
wex.fleet.mgmt.recommended.desc.high_windows_crash=解決作業系統當機問題可確保系統穩定性、一致的效能，以及不間斷的使用者生產力。
wex.fleet.mgmt.recommended.desc.kernel_panic_error=解決核心異常錯誤可以提高系統穩定性、增強安全性並防止資料遺失。
wex.fleet.mgmt.recommended.desc.last_reboot_more_than_21_days=重新啟動裝置會清除暫存檔並更新系統處理程序，從而提高整體效能和穩定性。
wex.fleet.mgmt.recommended.desc.linux_disk_encryption_not_enabled=啟用磁碟加密可以保護儲存裝置的內容，從而大幅增強資料安全性。
wex.fleet.mgmt.recommended.desc.linux_firewall_disabled=啟用 Linux 防火牆有助於阻止未經授權的存取並保護您的網路免受潛在威脅。
wex.fleet.mgmt.recommended.desc.linux_secure_boot_not_enabled=啟用「安全開機」可確保在開機過程中僅載入受信任的軟體，從而增強系統安全性。
wex.fleet.mgmt.recommended.desc.memory_utilization_high=分析記憶體使用率偏高的情況，有助於識別並解決可能影響系統效能和穩定性的問題。
wex.fleet.mgmt.recommended.desc.missing_critical_bios_updates=套用 BIOS 更新可確保系統穩定性，以及與新硬體或軟體的相容性。
wex.fleet.mgmt.recommended.desc.missing_critical_driver_updates=更新驅動程式可避免硬體故障，並確保系統安全、穩定且高效能。
wex.fleet.mgmt.recommended.desc.missing_linux_security_updates=應用程式安全性更新可以防範惡意軟體和漏洞、減少攻擊面，並提高系統完整性。
wex.fleet.mgmt.recommended.desc.missing_linux_updates=安裝最新更新可修正核心、系統程式庫和應用程式中的漏洞。如此可保護您的系統免受漏洞、惡意軟體和未經授權存取的影響。
wex.fleet.mgmt.recommended.desc.missing_windows_security_updates=套用安全性更新可抵禦最新的威脅和漏洞，從而保護您的系統免受攻擊。
wex.fleet.mgmt.recommended.desc.missing_windows_updates=安裝最新更新可修正漏洞，並確保您的系統保持安全且正常運作。
wex.fleet.mgmt.recommended.desc.poor_network_signal_strength=高強度的訊號可確保穩定可靠的連線，將線上活動的干擾與斷線情況降至最低。
wex.fleet.mgmt.recommended.desc.poor_nominal_speed=穩定且快速的網路速度對於高效率完成任務、雲端服務存取以及與同事之間的順暢協作來說至關重要。
wex.fleet.mgmt.recommended.desc.unauthenticated_connection=透過驗證的要求，組織能防止未授權的裝置連接至網路，因此可降低潛在的安全漏洞風險。
wex.fleet.mgmt.recommended.desc.windows_secure_boot_not_enabled=啟用安全開機可防止未經授權的韌體和作業系統修改，從而提高系統安全性。
