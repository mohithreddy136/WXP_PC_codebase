requirements.list.proSecurity.windows.supportLifecycle.content1=HP 服務等級目標是支援最新的 3 個 Windows 10 半年通道版本。
requirements.list.proSecurity.windows.supportLifecycle.content2=HP 的目標是在新作業系統版本發佈至半年通道 (「SAC」) 後的 30 天內，提供 Wolf Pro Security 威脅封鎖功能的相容支援。不支援臨時或預先發佈的 Windows Insider 組建版本。有關 Windows 作業系統版本的更多資訊，請參閱 <a href='https://docs.microsoft.com/en-us/windows/release-information/' target='_blank'>https://docs.microsoft.com/en-us/windows/release-information/</a>。
requirements.list.proSecurity.windows.supportLifecycle.content3=為確保使用舊版 Windows 的客戶有足夠時間升級至較新版本，HP 將在 Wolf Pro Security 支援最新半年通道版本後，繼續支援第 4 新的版本 (目前為 Windows 10 v1903)，支援期限至少為 90 天。在此期間過後，對較舊作業系統版本的支援將會終止。相同的支援原則同樣適用於 Windows 10 的長期服務通道版本。因此，這些系統也必須依照上述原則進行更新。
requirements.list.proSecurity.windows.supportLifecycle.content4=Sure Click Pro 對 Windows 10 v2004 的支援已於 2020 年 7 月 31 日發佈。對 Windows 10 v1809 的支援將於 2020 年 10 月 31 日終止。
requirements.list.proSecurity.windows.supportLifecycle.content5=HP Proactive Security 不支援 Windows 7 和 8.1
requirements.list.proSecurity.windows.supportLifecycle.content6=Sure Click Pro 對 Windows 10 v20H2 的支援已於 2020 年 11 月 18 日發佈。對 Windows 10 v1903 的支援已於 2021 年 2 月 16 日終止。
