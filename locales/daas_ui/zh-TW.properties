wex.fleet.mgmt.remediation.kernel_panic_error.desc=發生了內核異常，代表出現重大的系統錯誤，而 Linux 內核無法從此狀況中復原。這可能是由於硬體故障、驅動程式損壞、內核參數配置錯誤，或是內核模組不相容所引起。必須立即展開調查，找出根本原因。
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt1=檢查系統記錄 (/var/log/messages、/var/log/syslog 或 journalctl) 中異常發生之前的錯誤訊息。
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt2=使用 memtest86 和 smartctl 等工具檢查硬體健全狀況，特別是記憶體 (RAM) 和磁碟完整性。
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt3=驗證系統近期的變更 (例如，內核更新、驅動程式安裝或是組態變更等)。
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt4=如果系統無法開機，請啟動救援或復原模式以存取系統。
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt5=若懷疑內核模組或驅動程式存在不相容問題，請將其還原或更新。
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt6=若問題仍然存在或涉及硬體問題，請諮詢廠商或社群支援。
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.desc=啟用磁碟加密可保護靜態敏感資料，確保儲存在磁碟上的所有資訊在缺少正確驗證時均無法讀取。對於需要處理機密或受監管資料的系統而言，這項安全措施至關重要。
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step1=根據您的 Linux 發行版本，使用像是 LUKS (Linux 統一金鑰設定) 或 dm-crypt 等工具實作完整磁碟加密。
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step2=如果完整磁碟加密並不可行，則對敏感分割區 (例如 /home、/var 或 /data) 進行加密。
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step3=配置安全金鑰管理，包括複雜密碼，或是與 TPM (信任平台模組) 整合 (如果可用)。
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step4=妥善地備份加密金鑰，以防金鑰遺失時連帶失去資料。
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step5=測試加密設定，從而確保系統能夠正確開機，並且在驗證後能夠存取資料。
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step6=文件加密組態和復原程序，旨在確保合規性和營運持續性。
wex.fleet.mgmt.remediation.linux_firewall_disabled.step1=根據您的 Linux 發行版本，安裝並配置防火牆工具，例如 firewalld、ufw 或 iptables。
wex.fleet.mgmt.remediation.linux_firewall_disabled.step2=啟用防火牆服務於開機時啟動
wex.fleet.mgmt.remediation.linux_firewall_disabled.step3=定義防火牆規則，僅允許必要的服務 (例如 SSH、HTTP/HTTPS)，並封鎖其餘所有服務。
wex.fleet.mgmt.remediation.linux_firewall_disabled.step4=使用以下命令驗證防火牆狀態和規則: sudo firewall-cmd --list-all (用於 firewalld), sudo ufw status (用於 ufw)
wex.fleet.mgmt.remediation.linux_firewall_disabled.step5=定期稽核防火牆組態，確保其符合安全性原則及營運需求。
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.desc=啟用安全開機功能，可透過驗證開機載入程式、內核模組及驅動程式的數位簽章的方式，協助在開機過程中保護系統免受未經授權或惡意程式碼的侵害。這可增強系統完整性與安全性，尤其是在企業或合規性導向的環境中。
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step1=驗證 UEFI 韌體是否支援安全開機，並確保已在 UEFI 設定中啟用該功能。
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step2=安裝並配置與安全開機相容的已簽署開機載入程式及內核套件 (例如，使用 shim 和已簽署 GRUB)。
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step3=驗證內核、模組及所有必要元件是否均已簽署。
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step4=重新開機並使用 mokutil 確認安全開機狀態。
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step5=如果使用非標準元件，請註冊自訂金鑰。
wex.fleet.mgmt.remediation.missing_linux_security_updates.desc=系統缺少一或多個重大安全性更新。這些更新修正了作業系統、內核及已安裝套件中的已知漏洞。若未能確實套用這些項目，可能會使系統面臨未經授權的存取、資料外洩，或服務中斷等風險。
wex.fleet.mgmt.remediation.missing_linux_security_updates.step1=使用系統的套件管理員 (例如 apt、yum、dnf、zypper) 檢查並找出缺少的安全性修補程式。
wex.fleet.mgmt.remediation.missing_linux_security_updates.step2=立即套用所有重大安全性更新，有效緩解已知威脅和漏洞的影響。
wex.fleet.mgmt.remediation.missing_linux_security_updates.step3=必要時重新啟動系統，尤其是在內核或核心服務更新之後。
wex.fleet.mgmt.remediation.missing_linux_security_updates.step4=啟用自動安全性更新或安排定期修補排程，確保能及時受到保護。
wex.fleet.mgmt.remediation.missing_linux_security_updates.step5=藉由檢查記錄和確認套件版本的方式，驗證更新是否成功。
wex.fleet.mgmt.remediation.missing_linux_security_updates.step6=執行更新後的漏洞掃描，確保沒有任何殘留風險。
wex.fleet.mgmt.remediation.missing_linux_updates.desc=系統缺少一或多個 Linux 重大更新。這些更新可能包括安全性修補程式、內核修正和穩定性改善項目。執行過時的系統會增加系統漏洞、當機及相容性問題的風險。
wex.fleet.mgmt.remediation.missing_linux_updates.step1=使用套件管理員 (例如 yum、dnf、apt 或 zypper) 檢查可用的更新，進而找出缺少的重要修補程式。
