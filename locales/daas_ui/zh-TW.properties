wpt.details.desc=HP {appName} 是全球最安全的尋找、鎖定及清除服務，使您能更可靠地保護資料、追蹤您的 HP 裝置機群，並防止未經授權的使用者存取您在網路上的檔案與文件。由 HP Workforce Experience Platform 提供技術支援的 HP {appName} 是一項完整的硬體強制執行服務，可協助您尋找、鎖定及清除各種裝置，即使電腦處於離線或關機狀態也能運作自如。
wpt.details.header=建立起第一道防線
wpt.disclaimer.point1=根據 HP 對於「尋找、鎖定與抹除」軟體服務的內部分析。根據截至 2021 年 10 月的加密技術與持續性 (包括硬體強制執行的持續性) 評估，此為最安全的解決方案。
wpt.disclaimer.point2=HP {appName} 適用於特定 HP 600、800、1000、採用 Windows 作業系統的 Elite Dragonfly 筆記型電腦、特定 800 桌上型電腦和 Z1 G8 工作站，並在裝置開機並連線到網際網路時正常運作。
wpt.disclaimer.point3=HP Workforce Experience Platform 是遙測與分析平台，可提供有關裝置和應用程式的重要資料，且不做為單獨服務另售。HP Workforce Experience Platform 遵循嚴格的 GDPR 隱私權法規，且通過 ISO27001、ISO27701、ISO27017 及 SOC2 Type2 資訊安全認證。需存取網際網路並與 Workforce Experience Platform 入口網站連線。如需完整的系統需求，請造訪 <a href=\"{link}\" target=\"_blank\" style=\"text-decoration: none; color: #027aae; cursor: pointer;\">{text}</a>。
wpt.disclaimer.point4=「硬體強制執行」是指 HP Sure Run Gen4 及更新版本，僅適用於搭載此服務的相容 HP 電腦，且需使用 Windows 10 或更新版本的作業系統。
wpt.disclaimer.point5=HP 硬體支援的服務層級與回應時間可能因您所在的地理位置而異。服務期間從硬體購買之日起算。須遵守約束和限制。如需詳細資訊，請造訪 <a href="https://www.hp.com/go/cpc" target="_blank" style="text-decoration: none; color: #027aae; cursor: pointer;">www.hp.com/go/cpc</a>。HP 服務受購買之時向客戶提供或告知的 HP 適用服務條款與條件約束。當地適用法律可能會賦予客戶其他法定權利，此等權利一概不受 HP 服務條款與條件或隨 HP 產品提供的 HP 有限保固影響。
wpt.explore.header=探索解決方案
wpt.feature.cost.desc=遺失一台重要的電腦所帶來的損失，可能遠非金錢可以彌補。HP {appName} 可協助您緩解風險並減少遺失電腦所造成的損失。現在，您可以透過一套完善的方式來定位遺失或遭竊的電腦，並輕鬆鎖定或清除資料。
wpt.feature.cost.title=降低成本、免除擔憂
wpt.feature.data.desc=運用我們最安全的服務與閾值加密技術，協助您在所有 HP 裝置上尋找、鎖定並清除資料，確保您的敏感資訊受到保護。
