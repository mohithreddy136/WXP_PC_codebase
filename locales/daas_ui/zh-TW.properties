requirements.list.hp_print_fleetproxy.desc1=Print Fleet Proxy 要求在同一台電腦上安裝 HP Web Jetadmin。HP 強烈建議您在安裝 HP Fleet Proxy 之前先升級至最新版的 Web Jetadmin。
requirements.list.hp_print_fleetproxy.desc2=目前，HP 僅針對 HP Web Jetadmin 10.5 SR4 測試 HP Fleet Proxy。雖然 HP Fleet Proxy 可能與舊版的 HP Web Jetadmin 相容，但 HP 無法保證所有功能皆能如預期運作。
requirements.list.hp_print_fleetproxy.desc3=Web Jetadmin 是一種資源密集型服務。雖然 HP Fleet Proxy 不應增加太多額外負擔，但如果主機伺服器的運算能力不足以支援兩項服務及其管理的裝置，仍可能會對效能產生影響。您應確保託管 HP Web Jetadmin 和 HP Fleet Proxy 的伺服器具有足夠強大的效能與處理器核心數，以避免任何效能問題。
requirements.list.hp_print_fleetproxy.desc4=在測試 2000 個裝置時，HP 發現以下基本硬體規格應足以達到可接受的效能表現。若您發現效能緩慢，或管理超過 2,000 台裝置，可能需要運算能力更強的伺服器。
requirements.list.hp_print_fleetproxy.desc5=Print Fleet Proxy 是一項能與雲端服務進行通訊的內部部署服務。因此，您必須配置防火牆，允許 WJA 伺服器與 HP Command Center 之間的輸入及輸出通訊，並透過 DNS 篩選或 IP 白名單的方式進行。
requirements.list.hp_print_fleetproxy.desc6=您可以在此找到該清單:
requirements.list.hp_print_fleetproxy.hp-nf1=DNS 篩選: 配置您的防火牆，允許透過 443 埠進行的輸出 HTTPS 要求通往以下端點:
requirements.list.hp_print_fleetproxy.hp-nf2=IP 白名單: 若要將 IP 位址加入白名單，您必須納入 HP Fleet Proxy 可能需要通訊的每個雲端伺服器 IP 位址。
