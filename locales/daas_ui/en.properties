wex.fleet.mgmt.remediation.kernel_panic_error.desc=A kernel panic has occurred, indicating a critical system error that the Linux kernel cannot recover from. This might be caused by hardware faults, corrupted drivers, misconfigured kernel parameters, or incompatible kernel modules. Immediate investigation is required to identify the root cause.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt1=Review system logs (/var/log/messages, /var/log/syslog, or journalctl) for error messages preceding the panic.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt2=Check hardware health, especially memory (RAM) and disk integrity using tools like memtest86 and smartctl.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt3=Verify recent changes to the system (e.g., kernel updates, driver installations, or configuration changes).
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt4=Boot into a rescue or recovery mode to access the system if it's unbootable.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt5=Revert or update kernel modules or drivers if they are suspected to be incompatible.
wex.fleet.mgmt.remediation.kernel_panic_error.desc.pt6=Consult vendor or community support if the issue persists or is hardware-specific.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.desc=Enabling disk encryption protects sensitive data at rest by ensuring that all information stored on the disk is unreadable without proper authentication. This is a critical security measure for systems handling confidential or regulated data.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step1= Implement full disk encryption using tools such as LUKS (Linux Unified Key Setup) or dm-crypt, depending on your Linux distribution.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step2=Encrypt sensitive partitions (e.g., /home, /var, or /data) if full disk encryption is not feasible.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step3=Configure secure key management, including passphrases or integration with TPM (Trusted Platform Module) if available.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step4=Backup encryption keys securely to prevent data loss in case of key misplacement.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step5=Test encryption settings to ensure that the system boots correctly and data can be accessed after authentication.
wex.fleet.mgmt.remediation.linux_disk_encryption_not_enabled.step6=Document encryption configuration and recovery procedures for compliance and operational continuity.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step1=Install and configure a firewall tool such as firewalld, ufw, or iptables, depending on your Linux distribution.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step2=Enable the firewall service to start on boot
wex.fleet.mgmt.remediation.linux_firewall_disabled.step3=Define firewall rules to allow only necessary services (e.g., SSH, HTTP/HTTPS) and block all others.
wex.fleet.mgmt.remediation.linux_firewall_disabled.step4= Verify firewall status and rules using: sudo firewall-cmd --list-all (for firewalld), sudo ufw status (for ufw)
wex.fleet.mgmt.remediation.linux_firewall_disabled.step5=Regularly audit firewall configurations to ensure they align with security policies and operational needs.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.desc=Enabling Secure Boot helps protect the system against unauthorized or malicious code during the boot process by verifying the digital signatures of bootloaders, kernel modules, and drivers. This enhances system integrity and security, especially in enterprise or compliance-driven environments.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step1=Verify UEFI firmware support for Secure Boot and ensure it is enabled in UEFI settings.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step2=Install and configure signed bootloaders and kernel packages compatible with Secure Boot (e.g., using shim and signed GRUB).
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step3=Verify kernel, modules and all required components are signed.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step4=Reboot and confirm Secure Boot status using mokutil.
wex.fleet.mgmt.remediation.linux_secure_boot_not_enabled.step5=Enroll custom keys if using non-standard components.
wex.fleet.mgmt.remediation.missing_linux_security_updates.desc=The system is missing one or more critical security updates. These updates address known vulnerabilities in the operating system, kernel, and installed packages. Failure to apply them may expose the system to unauthorized access, data breaches, or service disruptions.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step1=Review and identify missing security patches using the system's package manager (e.g., apt, yum, dnf, zypper).
wex.fleet.mgmt.remediation.missing_linux_security_updates.step2=Apply all critical security updates immediately to mitigate known threats and vulnerabilities.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step3=Reboot the system if required, especially after kernel or core service updates.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step4=Enable automatic security updates or configure a regular patching schedule to ensure timely protection.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step5=Verify that the update was successful by checking the logs and confirming package versions.
wex.fleet.mgmt.remediation.missing_linux_security_updates.step6=Perform a post-update vulnerability scan to ensure no residual risks remain.
wex.fleet.mgmt.remediation.missing_linux_updates.desc=The system is missing one or more critical Linux updates. These updates might include security patches, kernel fixes, and stability improvements. Running an outdated system increases the risk of vulnerabilities, system crashes, and compatibility issues.
wex.fleet.mgmt.remediation.missing_linux_updates.step1=Review available updates using your package manager (e.g., yum, dnf, apt, or zypper) to identify missing critical patches.
wex.fleet.mgmt.remediation.missing_linux_updates.step2=Apply all security and kernel updates as soon as possible to mitigate known vulnerabilities.
wex.fleet.mgmt.remediation.missing_linux_updates.step3=Reboot the system if required, especially after kernel or core system updates.
wex.fleet.mgmt.remediation.missing_linux_updates.step4=Enable automatic updates or configure regular patching schedules to ensure timely application of future updates.
wex.fleet.mgmt.remediation.missing_linux_updates.step5=Verify update success by checking system logs and confirming the current kernel and package versions.
wex.fleet.mgmt.remediation.network_connection_not_secure.desc=A network connection was reported without expected security in the last 24 hours.
wex.fleet.mgmt.remediation.network_connection_not_secure.desc1=Unauthenticated connection detected in the last 7 days.
wex.fleet.mgmt.remediation.network_disconnections.desc=Devices reported repeated network disconnections in the last 24 hours.
wex.fleet.mgmt.remediation.network_disconnections.desc1=Network disconnections have been detected in the last 7 days.
wex.fleet.mgmt.remediation.network_speed_slow.desc=Reported nominal network speed was slow in the last 24 hours.
