wex.ra.remediation.antivirus_not_enabled=Microsoft Defender Antivirus is an antivirus software that's included in Windows and can help protect your device from viruses, malware, and other threats.
wex.ra.remediation.antivirus_signature_outdated=To ensure optimal protection, antivirus definition files should be kept updated.
wex.ra.remediation.antivirus_signature_outdated_other= The device is configured to use a third-party non-Microsoft antivirus to help protect the device from viruses, malware, and other threats, but antivirus signature updates are needed on the device.
wex.ra.remediation.app_crash=More than 10 software errors in the last 7 days in Teams, Outlook, Zoom, Webex, Chrome, Office.
wex.ra.remediation.avg_fan_speed_high=The average fan speed is high for an extended period of time.
wex.ra.remediation.battery_calibrate=The battery requires a calibration.
wex.ra.remediation.battery_early_detection_wear=Within the last 30 days, the battery has been predicted to have less than 70% full-charge capacity remaining.
wex.ra.remediation.battery_needs_attention=Workforce Experience Platform displays records of battery warnings and failures that can be used to obtain service for a battery that is experiencing issues
wex.ra.remediation.bitlocker_encryption_not_enabled=To protect data at rest, disk encryption is strongly recommended.
wex.ra.remediation.bsod=There have been more than 3 Bug Checks (BSOD events) within the last 7 days.
wex.ra.remediation.bsod_occured=The device has experienced 1 or more Bug Check events within the last 7 days.
wex.ra.remediation.cpu_utilization_high=Possible Causes: A running application is hung / unresponsive.
wex.ra.remediation.disk_needs_attention=Workforce Experience Platform displays records of Disk warnings and failures that can be used to obtain service for a disk that is experiencing issues.
wex.ra.remediation.disk_utilization_high=Hard disk is near full disk capacity and low in free space.
wex.ra.remediation.docking_station_ac_adapter_failed=The Docking Station AC Adapter is having a hardware issue.
wex.ra.remediation.docking_station_ac_adapter_running_at_reduced_perofmance=The docking station AC adapter is not performing correctly.
wex.ra.remediation.docking_station_firmware_out_of_date=Possible Causes: The docking station may require a Firmware or Driver update.
wex.ra.remediation.excessive_os_shutdown_time=Shutdown time takes 3 or more minutes to complete.
wex.ra.remediation.excessive_os_startup_time=System startup time takes more than 3 minutes to complete.
wex.ra.remediation.firewall_disabled=Firewall helps prevent hackers and malicious software from gaining access to your PC through the internet or a network.
wex.ra.remediation.firewall_signature_outdated=Firewall requires regular updates to ensure optimal protection from network-based attacks.
wex.ra.remediation.frequent_bsod_occured=There have been more than 3 Bug Checks (BSOD events) within the last 7 days.
wex.ra.remediation.frequent_network_disconnection= For home networks, ensure your router firmware is up to date and place the router in a central location to minimize interference. Additionally, reduce the number of connected devices and consider using a wired connection for critical devices to maintain a stable and reliable network.
wex.ra.remediation.gpu_health_issue=Workforce Experience Platform has detected an issue with the GPU that requires immediate attention.
wex.ra.remediation.high_collaboration_sw_errors=More than 10 software errors in the last 7 days in Teams, Outlook, Zoom, Webex, Chrome, Office.
wex.ra.remediation.high_windows_crash=The OS has experienced 1 or more unexpected crashes or reboots in the last 7 days.
wex.ra.remediation.last_reboot_more_than_21_days=The last reboot was more than 21 days ago.
wex.ra.remediation.maximise_my_battery_health_not_enabled=HP Battery Health Manager is available on all HP business notebooks since 2016. To improve battery life, it is recommended that Battery Health Manager be enabled
wex.ra.remediation.memory_utilization_high=The average Memory utilization over the last 30 days is 85% or greater.
wex.ra.remediation.missing_critical_bios_updates=Update the BIOS for compatible devices through the platform by selecting the devices below and selecting "Apply Policy". For incompatible devices, update system drivers and firmware using Windows Update or HP Image Assistant.
wex.ra.remediation.missing_critical_driver_updates=The Driver Inventory Report contains a detailed inventory of devices that are missing critical device driver updates.
wex.ra.remediation.missing_windows_security_updates=The Workforce Experience Platform  Security dashboard contains KPIs displaying the count of devices missing Windows Security Updates.
wex.ra.remediation.os_crash=The OS has experienced 1 or more unexpected crashes or reboots in the last 7 days.
wex.ra.remediation.poor_network_signal_strength=For home networks, rebooting your router or moving the router to reduce the number of obstacles between the access point and PC can help improve Wi-Fi signal strength.
wex.ra.remediation.poor_nominal_speed=For home networks, consider upgrading your router to a newer model that supports the latest Wi-Fi standards, such as Wi-Fi 6. Additionally, optimize your network layout by placing the router in a central location, reducing interference from other devices, and using wired connections where possible for more stable performance.
wex.ra.remediation.unauthenticated_connection=For home networks, select a robust encryption protocol, such as WPA2 or WPA3, and set a strong, unique password for access. Additionally, consider implementing MAC address filtering and regularly updating your router's firmware to enhance security and prevent unauthorized connections.
wex.ra.remediation.windows_secure_boot_not_enabled=Secure Boot is a security standard developed by members of the PC industry to ensure that a device boots using only software that's trusted by the original equipment manufacturer (OEM).
