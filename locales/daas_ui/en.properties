wex.fleet.mgmt.recommended.desc.high_collaboration_sw_errors=Resolving collaboration software issues ensures seamless teamwork and sustained productivity. We've seen more than 10 software errors in the last 7 days in Teams, Outlook, Zoom, Webex, Chrome, Office.
wex.fleet.mgmt.recommended.desc.high_windows_crash= Resolving OS crashes ensures system stability, consistent performance and uninterrupted user productivity.
wex.fleet.mgmt.recommended.desc.kernel_panic_error=Resolving Kernel Panic errors improves system stability, enhances security and prevents data loss. 
wex.fleet.mgmt.recommended.desc.last_reboot_more_than_21_days= Restarting devices clears temporary files and refreshes system processes, improving overall performance and stability.
wex.fleet.mgmt.recommended.desc.linux_disk_encryption_not_enabled=Enabling disk encryption significantly enhances data security by protecting the contents of your storage devices.
wex.fleet.mgmt.recommended.desc.linux_firewall_disabled=Enabling Linux Firewall helps block unauthorized access and protects your network from potential threats.
wex.fleet.mgmt.recommended.desc.linux_secure_boot_not_enabled=Enabling Secure Boot ensures that only trusted software is loaded during the boot process, enhancing system security.
