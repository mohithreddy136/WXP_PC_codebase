banner.iot.update.description=A TechPulse platform infrastructure change will be implemented on Mon 27-Feb, 2023. You may be required to update proxy, firewall, and SSL inspection software settings. Run the network assessment tool at <a href='https://www.hpdaas.com/software' target='_blank'>HP TechPulse - Software (hpdaas.com)</a> and check if any of the four (4) *.IoT test targets return a 'Fail' message. If the test results in a failure, follow the instructions here '<b><a href='https://hp.service-now.com/techpulse_kb?id=kb_article&sysparm_article=KB0011291' target='_blank'>KB0011291</a> - Configuring a Proxy or Firewall'</b> and <b>make these changes by Thu 23-Feb, 2023</b>.
