exp.HpBatteryHealthManagerNotEnabled.reference1Text=HP Battery Health Manager - Support
exp.HpBatteryHealthManagerNotEnabled.references=References:
exp.HpBatteryHealthManagerNotEnabled.settingLetDetail1=Dynamically changes how the system charges the battery based on usage conditions and temperature over time.
exp.HpBatteryHealthManagerNotEnabled.settingLetTitle=Let HP Manage My Battery Charging
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases1=Mixed-use environments where the notebook is regularly removed from AC power and the battery is allowed to discharge.
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases2=Prefer a single process for your organization.
exp.HpBatteryHealthManagerNotEnabled.settingLetUseCases3=The notebook is less than a year old.
exp.HpBatteryHealthManagerNotEnabled.settingMaxDetail1=Limits the maximum state-of-charge to 80% to optimize battery health and mitigate swelling.
