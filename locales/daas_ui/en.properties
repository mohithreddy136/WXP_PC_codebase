azureonboard.marketing.disclaimer.content=The information contained herein is subject to change without notice. The only warranties for HP products and services are set forth in the express warranty statements accompanying such products and services. Nothing herein should be construed as constituting an additional warranty. HP shall not be liable for technical or editorial errors or omissions contained herein.
azureonboard.marketing.disclaimer.contentlist1=HP Proactive Insights and/or included components may vary by region, by operating system, or by authorized HP service partner. Please contact your local HP representative or authorized partner for specific details in your location. HP services are governed by the applicable HP terms and conditions of service provided or indicated to Customer at the time of purchase. Customer may have additional statutory rights according to applicable local laws, and such rights are not in any way affected by the HP terms and conditions of service or the HP Limited Warranty provided with your HP Product.
azureonboard.marketing.disclaimer.contentlist2=HP {appName} is a telemetry and analytics platform that provides critical data around devices and applications and is not sold as a standalone service. HP {appName} follows stringent GDPR privacy regulations and is ISO27001, ISO27701, ISO27017 and SOC2 Type2 certified for Information Security. Internet access with connection to {appName} is required. For full system requirements, please visit <a target='_blank' href={link}>{text}</a>.
azureonboard.marketing.disclaimer.contentlist3=BIOS updates only available on HP devices.
azureonboard.marketing.disclaimer.contentlist4=For details about OS coverage, please visit <a target='_blank' href={link}>{text}</a>.
azureonboard.marketing.employeesection.description=Collect, measure, and manage your employee digital experience through a correlation of hardware, application, and employee experience surveys across all your devices.
azureonboard.marketing.employeesection.heading=Proactive Employee Insight
azureonboard.marketing.hardwaresection.description=Proactively monitor device hard drives, CPU usage, thermal levels, and battery health, enabling you to predict potential impacts by analyzing your data against a 20+ million device data lake.
azureonboard.marketing.hardwaresection.heading=Proactive Hardware Insight
azureonboard.marketing.insightsection.description=Diagnose performance issues, software errors, blue-screen-of-death crashes, and system usage, while updating drivers and patches to ensure you have safe security profiles.
azureonboard.marketing.insightsection.heading=Proactive Application Insight
azureonboard.marketing.learnmoresection.content=Aggregating knowledge from 20+ million devices and billions of data points, HP Proactive Insights leverages the HP TechPulse analytics platform to identify and resolve issues before they impact employees.
azureonboard.marketing.learnmoresection.description=We're helping you change your device management paradigm through AI-powered proactive control of computer performance, security, costs, downtime, and your employee satisfaction. You will leverage intelligence gained across 20+ million other computing devices to improve your organization. 
azureonboard.marketing.learnmoresection.heading=HP Proactive Insights delivers meaningful analysis powered by billions of data points
