exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.cause1=The layout of your home can cause Wi-Fi problems.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.cause2=The access point could be behind walls and obstacles.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.description=Wi-Fi signal strength was reported weak in the last 24 hours.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.moreInfo=More Information:
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.moreInfoLink=https://support.microsoft.com/en-us/windows/wi-fi-problems-and-your-home-layout-e1ed42e7-a3c5-d1be-2abb-e8fad00ad32a#WindowsVersion=Windows_11
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.possibleCauses=Possible Causes for Home Network:
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1=Option 1: Restarting router
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step1=Unplug the modem and router from the power outlet.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step2=Wait at least 15 seconds.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step3=Plug the modem back into the AC outlet first, wait 1-2 minutes, then turn on the router.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation1.step4=Wait for all panel lights on your cable modem to turn green before testing your internet connection.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2=Option 2: Move your access point.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step1=Move your access point, if you can, to reduce the number of walls or other obstacles that are between your access point and your PC.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step2=Move your PC closer to the access point if you can.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendation2.step3=Move the access point towards the middle of your home or room if you can, and higher if possible. Placing it in a corner or under a desk can reduce your Wi-Fi signal strength.
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.recommendations=Recommendations:
exp.mgmt.troubleshoot.network.wifisignalstrengthisweak.title=Wi-Fi Signal Strength Is Weak
exp.mgmt.troubleshoot.network.wifispeedisslow.cause1=The access point could be behind walls and obstacles.
exp.mgmt.troubleshoot.network.wifispeedisslow.cause2=Router firmware could be outdated.
exp.mgmt.troubleshoot.network.wifispeedisslow.description=Wi-Fi nominal speed was reported slow in the last 24 hours.
exp.mgmt.troubleshoot.network.wifispeedisslow.possibleCauses=Possible Causes for Home Network:
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation1=Restart your modem and router
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation1.step1=Turn off your modem first, then your router.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation2=Move your router
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation2.step1=Try moving your router to a different location in your home or office, or adjust the antennae to face a different direction.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation3=Update your router's firmware
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation3.step1=Regularly updating your router's firmware can help fix bugs and connectivity issues. While some routers might have automatic updates, most require manual updates.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation4=Change your router's frequency
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation4.step1=Wi-Fi routers automatically select a frequency band, but you can try changing it from 2.4 GHz to 5 GHz to see if it improves your speeds. However, you should check if your router supports 5 GHz before doing so.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation5=Update your Wi-Fi drivers
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation5.step1=Outdated or corrupted drivers can cause network issues, be sure that your Wi-Fi adapter is up to date.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation6=Avoid interference
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation6.step1=Channel interference can significantly reduce throughput and slow down data transfer, so try to eliminate any interference you might be experiencing.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation7=Check other devices
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendation7.step1=See what other devices are connected to your network and what they're doing. For example, if another device is downloading a lot of data, it could be affecting your speeds.
exp.mgmt.troubleshoot.network.wifispeedisslow.recommendations=Recommendations:
exp.mgmt.troubleshoot.network.wifispeedisslow.title=Wi-Fi Speed Is Slow
