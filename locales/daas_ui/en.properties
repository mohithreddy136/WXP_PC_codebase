dnto.subscriptions.section.details.desc1=Employees are accustomed to and even demand the flexibility to work how and where they want to. With IT teams stretched beyond their limit, employee experience, productivity, and engagement are suffering.
dnto.subscriptions.section.details.desc2=HP Workforce Experience Pro intelligently anticipates and resolves digital friction from a consolidated and modular platform.
dnto.subscriptions.section.details.desc3=Whether you're managing a small team in a single location or navigating the complexities of a global hybrid workforce, HP Workforce Experience Pro provides a unified platform to support and optimize the digital experiences of your employees.
dnto.subscriptions.section.details.desc4=Boost employee productivity by proactively solving IT issues before they occur. Reduce IT support hours and costs with advanced AI. Strengthen endpoint security by anticipating and resolving threats. 
dnto.subscriptions.section.details.desc5=Improve employee sentiment with actionable insights from pulse surveys. Optimize costs with smart hardware refreshes. Seamlessly integrate with existing multi-vendor and multi-OS environments.
dnto.subscriptions.section.details.heading=Subscription details
