exp.GpuHealthIssue.causeBlueScreenErrors=Blue screen errors: Blue screen errors could be due to too many graphics-intensive programs or visual effects running simultaneously, or driver and hardware issues.
exp.GpuHealthIssue.causeDoubleBitEcc=Double-bit ECC memory errors: The graphics card is experiencing double-bit ECC memory errors, which could indicate hardware issues or faults in the memory.
exp.GpuHealthIssue.causeHighDoubleBitEccOverTime=High number of double-bit ECC memory errors over time: The graphics card has a high number of double-bit ECC memory errors, and the average number of errors has been increasing for at least 3 weeks.
exp.GpuHealthIssue.causeHighTdrEvents=High number of TDR (display driver timeout and recovery) events: The graphics card has experienced a high number of TDR events, indicating potential driver or hardware problems.
exp.GpuHealthIssue.causeMissingDriverUpdate=Missing critical driver update: The graphics card is missing a critical driver update, which can affect performance and stability.
exp.GpuHealthIssue.causeThermalIssues=Thermal issues: The graphics card is experiencing a high number of thermal issues, and the GPU or memory temperature is above the maximum operating temperature.
exp.GpuHealthIssue.driverOption1=Option 1: Use HP Image Assistant to update drivers
exp.GpuHealthIssue.driverOption2=Option 2: Use Windows Update to update drivers
exp.GpuHealthIssue.possibleCauses=Possible Causes:
exp.GpuHealthIssue.remediationBlueScreenPrefix=For blue screen errors: Check if too many graphics-intensive programs or visual effects are running at the same time. Update the graphics card driver, reset overclocked settings to defaults, perform a clean install of the driver or reset settings to factory defaults, ensure adequate power supply, and clean air vents and fan. Analyze the mini-dump file for specific remediation steps:
exp.GpuHealthIssue.remediationDoubleBitEcc=For double-bit ECC memory errors: Continue to monitor the situation and check if performance continues to deteriorate. If the number of errors remains high, consider replacing the graphics card.
exp.GpuHealthIssue.remediationMissingDriver=For missing driver update: Update the graphics card driver to the latest version to address performance problems.
exp.GpuHealthIssue.remediationTdr=For TDR events: Continue to monitor and update the graphics card driver if the problem persists. Reset graphics settings to default, reset overclocked settings to defaults, update the BIOS if an update is available, and check for sufficient power supply and proper airflow. Clean air vents and fan.
exp.GpuHealthIssue.remediationThermal=For thermal issues: Check for restricted airflow, clean air vents, and ensure the fan is working properly and is clean.
exp.GpuHealthIssue.suggestedRemediations=Suggested Remediations:
exp.GpuHealthIssue.title=Address GPU health
exp.HpBatteryHealthManagerNotEnabled.causeNotCompatible=Device is not compatible with HP Battery Health Manager.
exp.HpBatteryHealthManagerNotEnabled.causeRequiresBiosUpdate=Device requires a BIOS update.
exp.HpBatteryHealthManagerNotEnabled.description=HP Battery Health Manager is available on all HP business notebooks since 2016. To improve battery life, it is recommended that Battery Health Manager be enabled.
exp.HpBatteryHealthManagerNotEnabled.option1Detail=HP recommends enabling HP Battery Health Manager to either 'Let HP Manage My Battery Charging' or 'Maximize My Battery Health' depending on usage and device age.
