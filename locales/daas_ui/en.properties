requirements.list.hp_print_fleetproxy.desc1=The Print Fleet Proxy requires HP Web Jetadmin to be installed on the same PC. HP strongly recommends that you upgrade to the latest version of Web Jetadmin before installing HP Fleet Proxy.
requirements.list.hp_print_fleetproxy.desc2=Currently, HP is only testing the HP Fleet Proxy against HP Web Jetadmin 10.5 SR4. Although HP Fleet Proxy might work with earlier versions of HP Web Jetadmin, HP does not guarantee that all features will function as expected.
requirements.list.hp_print_fleetproxy.desc3=Web Jetadmin is a resource-intensive service. While HP Fleet Proxy should not add much additional overhead, there might be a performance impact if the host server does not have enough computing power to support both services and the devices they manage. You should ensure that the server hosting HP Web Jetadmin and HP Fleet Proxy is robust enough and has enough processor cores to mitigate any performance issues.
requirements.list.hp_print_fleetproxy.desc4=In testing 2000 devices, HP found that the following baseline hardware specifications should be sufficient to produce acceptable performance results. If you notice slow performance, or if you manage more than 2,000 devices, you might need a server with more computing power.
requirements.list.hp_print_fleetproxy.desc5=Print Fleet Proxy is an on-premise service that communicates with a cloud-based service. As a result, you must configure your firewall to allow inbound and outbound communication between the WJA server and HP Command Center, either through DNS filtering or IP whitelisting.
requirements.list.hp_print_fleetproxy.desc6=You can find that list here:
requirements.list.hp_print_fleetproxy.hp-nf1=DNS filtering: Configure your firewall to allow outbound HTTPS requests over port 443 to the following endpoints:
requirements.list.hp_print_fleetproxy.hp-nf2=IP Whitelisting: To whitelist IP addresses, you'll need to include the IP address of every possible cloud server that HP Fleet Proxy might need to communicate with.
