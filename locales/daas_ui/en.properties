dnto.subscriptions.about_hp.desc1=We are a technology company born of the belief that companies should do more than just make a profit. They should make the world a better place. Our efforts in climate action, human rights, and digital equity prove that we are doing everything in our power to make it so.
dnto.subscriptions.about_hp.desc2=With over 80 years of actions that prove our intentions, we have the confidence to envision a world where innovation drives extraordinary contributions to humanity.
dnto.subscriptions.about_hp.desc3=And our technology - a product and service portfolio of personal systems, printers, and 3D printing solutions - was created to inspire this meaningful progress.
