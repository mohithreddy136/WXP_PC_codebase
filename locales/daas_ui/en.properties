exp.MemoryUtilizationIsHighForAnExtendedTime.causeHungApp=A running application is hung / unresponsive.
exp.MemoryUtilizationIsHighForAnExtendedTime.causeInsufficientMemory=The computer does not have adequate memory for its usage.
exp.MemoryUtilizationIsHighForAnExtendedTime.causeLongRunningApp=A running application requires a large amount of memory for an extended time to complete a task, such as Antivirus scanning.
exp.MemoryUtilizationIsHighForAnExtendedTime.causeMemoryLeak=An installed application might have a memory leak bug.
exp.MemoryUtilizationIsHighForAnExtendedTime.option1Detail=To help customers extend their device life and improve end user experience, a common practice for PCs whose memory is overutilized is to add memory to the device.
exp.MemoryUtilizationIsHighForAnExtendedTime.option1Title=Option 1: Increase device memory.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail1=Open the Device Utilization report.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail2=Applications that consume the most memory will be identified in the Apps Causing High Memory Usage column.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Detail3=Based on the application in question, response options will vary. If these are business-critical applications, upgrading the memory might alleviate the issue. Non-business-critical applications can be removed from the device or their settings adjusted to reduce load on the device.
exp.MemoryUtilizationIsHighForAnExtendedTime.option2Title=Option 2: Identify and uninstall applications.
exp.MemoryUtilizationIsHighForAnExtendedTime.option3Detail=Restart the computer to completely close all running applications.
exp.MemoryUtilizationIsHighForAnExtendedTime.option3Title=Option 3: Restart the device.
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Detail1=Use Task Manager to view running applications by memory utilization.
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Detail2=Close applications using the most memory.
exp.MemoryUtilizationIsHighForAnExtendedTime.option4Title=Option 4: Close applications.
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Detail1=Use Task Manager to identify an application where the Memory utilization is steadily increasing to unusual proportions, but never decreasing.
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Detail2=Check for updates to that application from the manufacturer.
exp.MemoryUtilizationIsHighForAnExtendedTime.option5Title=Option 5: Identify potential memory leak and update.
