dnto.subscriptions.privacy_statement.desc1=HP recognizes that privacy is a fundamental human right and further recognizes the importance of privacy, security and data protection to our customers and partners worldwide. As a global organization, with legal entities, business processes, management structures, and technical systems that cross international borders, we strive to provide protections across all of our operations that exceed legal minimums and to deploy consistent, rigorous policies and procedures. 
dnto.subscriptions.privacy_statement.desc2=As used in this statement, terms such as "we," "us," "our," and "Company" refer to HP branded companies and current and future affiliates, as defined by local law (herein "HP"). Contact information for HP's Data Protection Officer appears in the "{0}" section below.
