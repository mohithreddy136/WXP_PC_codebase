poly.lens.addon.details.description=Manage your HP collaboration device fleet across your entire organization with confidence and clarity. From streamlined deployment and effortless maintenance to proactive monitoring and meaningful insights, IT teams get centralized control across spaces, rooms and devices. With secure, cloud-based management and seamless support for hybrid work, you can reduce operational overhead, stay ahead of issues, and deliver a consistent, reliable experience wherever your teams work.
poly.lens.addon.feature.centralized.header=Centralized Personal Device Management
poly.lens.addon.feature.centralized.text=Enabled by the HP Poly Studio apps, deliver a seamless, self-service experience for end users while IT teams maintain centralized visibility and control over personal devices. Manage inventory, updates, monitoring, and insights with confidence, wherever your teams work.
poly.lens.addon.feature.effortless.maintenance.header=Effortless Maintenance
poly.lens.addon.feature.effortless.maintenance.text=Manage settings, features, and software updates across your fleet with minimal effort. Apply settings, stage updates and fine-tune configurations at scale without sacrificing control or precision.
poly.lens.addon.feature.meaningful.measurement.header=Meaningful Measurement
poly.lens.addon.feature.meaningful.measurement.text=Understand how devices, spaces, and people are actually working. Turn utilization and performance data into smarter, data-driven decisions about your collaboration investments.
poly.lens.addon.feature.proactive.monitoring.header=Proactive Monitoring
poly.lens.addon.feature.proactive.monitoring.text=Stay ahead of issues with clear visibility into device health and status. Get alerted when something isn't right, so problems are addressed before they disrupt meetings.
poly.lens.addon.feature.secure.header=Secure, Cloud-Based Control
poly.lens.addon.feature.secure.text=Manage everything from a trusted, cloud-based platform that scales as your organization grows while meeting enterprise security and compliance needs.
poly.lens.addon.feature.simplified.deployment.header=Simplified Deployment
poly.lens.addon.feature.simplified.deployment.text=Stage, pre-configure, and deploy devices with confidence. Automated onboarding workflows reduce setup time, eliminate errors, and get devices ready before they ever reach a user or room.
poly.lens.addon.subtitle=Cloud-based management and insights across collaboration spaces, rooms, and devices.
