btg.addon.list.feature_one.description=DCT is the underlying mesh technology that enables HP devices to discover, connect, and collaborate while intelligently managing and simplifying situational transitions. It enables real-time sharing of context, state, and capabilities - transforming standalone products into a tightly integrated, adaptive ecosystem.
btg.addon.list.feature_one.title=Seamless Connectivity Layer
