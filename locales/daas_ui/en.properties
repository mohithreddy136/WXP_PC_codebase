side_panal.smart_refresh.hardware_persona_1=CPU-Intensive: Devices that use a lot of CPU
side_panal.smart_refresh.hardware_persona_2=Storage-Heavy: Devices that use a lot of storage
side_panal.smart_refresh.hardware_persona_3=Standard Profile: Devices with average usage metrics that match a normal profile
side_panal.smart_refresh.hardware_persona_4=Moderate Docking: Devices that use a docking station and/or other peripherals frequently
side_panal.smart_refresh.hardware_persona_5=Long-Session Display: Devices that typically have their displays turned on for a long period of time
side_panal.smart_refresh.hardware_personas_header=Hardware Personas
side_panal.smart_refresh.hardware_personas_sub_text=Identified by AI-driven device clusters based on hardware utilization
side_panal.smart_refresh.help_sec1_description=The 3 steps: Identify, Categorize, Recommend
side_panal.smart_refresh.help_sec1_header=How it works
side_panal.smart_refresh.help_sec1_point_1_desc=Assess each device across 9 data points, summarized in a Refresh Urgency Score*. This score helps you prioritize individual at-risk devices to avoid interruptions to user productivity.
side_panal.smart_refresh.help_sec1_point_1_title=1. Identify
side_panal.smart_refresh.help_sec1_point_2_desc=An AI model groups devices into distinct Hardware and Software personas, based on usage. These personas can help guide you to the right replacement  device.
side_panal.smart_refresh.help_sec1_point_2_title=2. Categorize
side_panal.smart_refresh.help_sec1_point_3_desc1=If you work with an HP Partner, Smart Refresh will recommend replacements for each device. These recommendations come from the relevant persona's top-performing models that are available within your partner's uploaded catalog. If you do not see device recommendations, or the devices you do see are out of date, please contact your partner and request them to upload the latest catalog.
side_panal.smart_refresh.help_sec1_point_3_desc2=If you do not work with an HP Partner, you will not see device recommendations in Smart Refresh. Please contact your HP account representative for the best replacement models.
side_panal.smart_refresh.help_sec1_point_3_desc3=Last catalog upload date: 
side_panal.smart_refresh.help_sec1_point_3_title=3. Recommend
side_panal.smart_refresh.help_sec1_point_4_desc=Use the 'Complete' Refresh Status to remove any PCs that don't need a refresh or cannot be refreshed at this time. You can view these devices and change their status back to 'Requires Action' to see them again in the PC list
side_panal.smart_refresh.help_sec1_point_4_title=4. Statuses
side_panal.smart_refresh.help_sec2_description=How we determine when a device needs replacement
side_panal.smart_refresh.help_sec2_header=Refresh Urgency Score
side_panal.smart_refresh.help_sec2_sub_text=Refresh Urgency Score is calculated from a device's performance data in 9 areas. The severity corresponds with the numerical score as follows:
side_panal.smart_refresh.help_sec2_table_col1=Refresh Urgency
side_panal.smart_refresh.help_sec2_table_col2=Refresh Score
side_panal.smart_refresh.help_sec2_table_high=Refresh Now
side_panal.smart_refresh.help_sec2_table_low=Healthy
side_panal.smart_refresh.help_sec2_table_medium=Refresh Soon
side_panal.smart_refresh.help_sec3_header=Factors
side_panal.smart_refresh.help_sec3_point_1=CPU Usage: Average percentage used in the last 30 days
side_panal.smart_refresh.help_sec3_point_2=Memory Usage: Average percentage used in the last 30 days
side_panal.smart_refresh.help_sec3_point_3=Disk Usage: Last recorded percentage used
side_panal.smart_refresh.help_sec3_point_4=OS Crashes: Total Operating System crashes in the last 7 days
side_panal.smart_refresh.help_sec3_point_5=BSODs: Total Blue Screen of Deaths in the last 7 days
side_panal.smart_refresh.help_sec3_point_6=Startup Duration: Last recorded time in minutes
side_panal.smart_refresh.help_sec3_point_7=Shutdown Duration: Last recorded time in minutes
side_panal.smart_refresh.help_sec3_point_8=Software Errors for Collaboration Apps: Total errors in the last 7 days
side_panal.smart_refresh.help_sec3_point_9=Docking Station Power Status: Last recorded data, Yes/No
side_panal.smart_refresh.help_sec3_sub_text=The following nine factors contribute to the score and include descriptions of how each is measured:
side_panal.smart_refresh.help_sub_title=Upgrade PCs at the right time with HP's Smart Refresh. Here's how it works:
side_panal.smart_refresh.personas_header=Personas
side_panal.smart_refresh.personas_sub_text=AI-based groups of devices, determined by usage patterns
side_panal.smart_refresh.point_1_desc=Evaluate the current state of the PCs in terms of hardware performance, software usability, and security.
side_panal.smart_refresh.point_1_title=1. Assessment
side_panal.smart_refresh.point_2_desc=Prioritize the PCs that need immediate attention based on their usage, importance to business operations, or level of obsolescence.
side_panal.smart_refresh.point_2_title=2. Prioritization
side_panal.smart_refresh.point_3_desc=Carry out the planned upgrades or replacements efficiently, minimizing downtime and disruption to users.
side_panal.smart_refresh.point_3_title=3. Implementation
side_panal.smart_refresh.point_4_desc=Ensure that the refreshed PCs are equipped with the latest security measures to protect against cyber threats.
side_panal.smart_refresh.point_4_title=4. Security
side_panal.smart_refresh.point_5_desc=Regularly monitor the refreshed PCs to ensure they continue to perform optimally, and perform necessary maintenance as required.
side_panal.smart_refresh.point_5_title=5. Monitoring and Maintenance
side_panal.smart_refresh.software_persona_1=Dormant: Users who do not frequently use their device
side_panal.smart_refresh.software_persona_2=Office 365: Users who frequently use office applications, such as Excel and Word
side_panal.smart_refresh.software_persona_3=Power Coder: Users who frequently use developer tools for coding
side_panal.smart_refresh.software_persona_4=Productivity Coder: Users who frequently use developer tools for coding
side_panal.smart_refresh.software_persona_5=Remote Worker: Users who frequently use productivity software, such as OneNote and Adobe Acrobat
side_panal.smart_refresh.software_persona_6=Healthcare Worker: Users who typically use their devices remotely
side_panal.smart_refresh.software_persona_7=Cloud Strategist: Users who frequently use medical professional software, such as ICU monitoring and hospital management systems
side_panal.smart_refresh.software_persona_8=Utility Expert: Users who use extensive cloud services
side_panal.smart_refresh.software_persona_9=Media Consumer: Users who frequently use utility software, such as WinRAR and System Monitor
side_panal.smart_refresh.software_personas_header=Software Personas
side_panal.smart_refresh.software_personas_sub_text=Identified by AI-driven device clusters based on software utilization
side_panal.smart_refresh.sub_title=Smart Refresh refers to the process for upgrading personal computers (PCs) in a smart or efficient manner. This involves several aspects:
side_panal.smart_refresh.title=Smart Refresh
