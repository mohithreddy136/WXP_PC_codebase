btg.addon.description=HP IQ combines context awareness, effortless collaboration, and a personalized UI with enterprise-grade security to enhance workforce efficiency and personal flow.
btg.addon.list.feature_five.description=With HP Poly Studio working alongside Poly Lens, users can personalize their devices and maintain seamless connectivity from any location.
