exp.ExcessiveOsStartupTime.option1=Option 1: Windows 11 - Startup Apps in Settings
exp.ExcessiveOsStartupTime.option1Guide=To improve the performance of the device, and to resolve a slow login time, removing applications from starting up when you log in has the most impact. For Windows 11 devices, Microsoft offers a guide to take control of your Windows startup.
exp.ExcessiveOsStartupTime.option1GuideLink=https://www.microsoft.com/en-us/windows/learning-center/take-control-of-windows-startup
exp.ExcessiveOsStartupTime.option1GuideLinkText=https://www.microsoft.com/en-us/windows/learning-center/take-control-of-windows-startup
exp.ExcessiveOsStartupTime.option1StepApps=On the left-hand side of the window, select Apps.
exp.ExcessiveOsStartupTime.option1Steps=by changing the Windows startup programs using the following steps:
exp.ExcessiveOsStartupTime.option1StepSettings=Select Settings.
exp.ExcessiveOsStartupTime.option1StepStart=Select the Start button, which looks like the Microsoft logo.
exp.ExcessiveOsStartupTime.option1StepStartup=Select Startup at the bottom of the Apps window.
exp.ExcessiveOsStartupTime.option1StepToggles=Use the toggles to determine which apps you want to run on startup. Toggle on if you want the app to open on startup or toggle off if you don't want the app to open on startup.
exp.ExcessiveOsStartupTime.option2=Option 2: Windows 11 - Startup Apps in Task Manager
exp.ExcessiveOsStartupTime.option2Guide=Startup apps can also be enabled and disabled from the Windows Task Manager, using the following steps:
exp.ExcessiveOsStartupTime.option2StepDisable=Right-click on an app and select Disable (if the Status column shows Enabled).
exp.ExcessiveOsStartupTime.option2StepStart=Select the Start button, which looks like the Microsoft logo.
exp.ExcessiveOsStartupTime.option2StepStartupApps=Select "Startup apps" from the left navigation.
exp.ExcessiveOsStartupTime.option2StepTaskManager=Type "Task Manager" and press Enter to open the Windows Task Manager.
exp.ExcessiveOsStartupTime.option3=Option 3: Uninstall Applications
exp.ExcessiveOsStartupTime.option3Guide=Applications that do not launch automatically at startup can also contribute to slow login time, as these applications can contain files, services, and registry entries that might be partially loaded. System tray applications are some examples of applications that are running, even though there might not be an open window with the application running. To review and remove unnecessary applications, complete the following steps. Note: Some applications might require administrative rights to remove.
exp.ExcessiveOsStartupTime.option3StepControlPanel=Type "Control" and press Enter to open the Control Panel.
exp.ExcessiveOsStartupTime.option3StepPrograms=Open Programs and Features.
exp.ExcessiveOsStartupTime.option3StepStart=Select the Start button, which looks like the Microsoft logo.
exp.ExcessiveOsStartupTime.option3StepUninstall=Select an application to remove and select Uninstall.
exp.ExcessiveOsStartupTime.option4=Option 4: Use PowerShell and the ActiveDirectory module to run Get-GpResultantSetofPolicy to analyze policies and how long they take to apply on the affected machine(s) to identify possible improvements.
exp.ExcessiveOsStartupTime.possibleCauses=Possible Causes:
exp.ExcessiveOsStartupTime.suggestedRemediations=Suggested Remediations:
