wex.labs.remediation.ai.description=Remediation with AI guides you to the most effective solution. It intelligently narrows down options so your team can resolve issues efficiently and consistently.
wex.labs.remediation.ai.description.disclaimer=You are about to interact with an AI solution. Content generated by AI might contain inaccuracies and should be verified against the details provided. Please note that AI-generated responses might be incomplete or incorrect, and HP assumes no responsibility for actions taken based on this content.
wex.labs.remediation.ai.details.analyzesAvailableRemediations.desc=The algorithm scans existing remediations in the platform, including scripts, policies, and device action/updates, to recommend the most relevant remediation.<br/><br/>It looks at historical usage and success rates to understand what typically resolves this type of issue within your organization. Users can spend less time determining the right course of action and allow AI to do the work.
wex.labs.remediation.ai.details.analyzesAvailableRemediations.title=Analyzes Available Remediations
wex.labs.remediation.ai.details.applyOrReview.desc=Depending on the remediation the admins can choose to: <br/><div class=remediation-ai-ui><ul><li>Apply immediately across selected devices</li><li>Schedule for later to minimize disruption</li><li>Review details before confirming the action</li></ul></div><br/>Once applied, the activity and outcomes are tracked for transparency and continuous learning.
wex.labs.remediation.ai.details.applyOrReview.title=Apply, Schedule, or Review
wex.labs.remediation.ai.details.continuousLearning.desc=Over time, recommendations gain accuracy and confidence.
wex.labs.remediation.ai.details.continuousLearning.title=Continuous Learning
wex.labs.remediation.ai.details.howItWorks.title=How it works
wex.labs.remediation.ai.details.issueToRemediation.desc=When an issue crosses a defined threshold, it surfaces on your dashboard with a clear description of what's happening and how it might impact your devices. The WXP platform now allows for direct remediation and the AI remediation feature helps narrow down the best option to fix the issue.
wex.labs.remediation.ai.details.issueToRemediation.title=Issue to Remediation
wex.labs.remediation.ai.details.learnsandImproves.desc=The algorithm continuously refines its understanding of what works best for your organization.<br/>Each time a remediation is applied, the system learns:<div class=remediation-ai-ui><ul><li>How effective it was</li><li>How long it took to resolve the issue</li><li>Whether similar issues reoccurred</li></ul></div><br/>This feedback loop strengthens future recommendations, making them more accurate and tailored over time.
wex.labs.remediation.ai.details.learnsandImproves.title=Learns and Improves over Time
wex.labs.remediation.ai.details.overview.desc=Remediation with AI feature helps IT admins quickly move from detection to resolution. It analyzes your fleet data and recommends the most effective policy, script, or device update for the issue at hand. The algorithm uses patterns from existing remediations in your environment to suggest what's most likely to work.
wex.labs.remediation.ai.details.recommendBestFix.desc=Each recommendation includes: <br/><div class=remediation-ai-ui><ul><li>Type of action: Script, policy, or update</li><li>Why it's relevant: Remediation and automation fix issues in real time, improve employee productivity, enhance digital experience, and save time and decrease vulnerability.</li></ul></div>
wex.labs.remediation.ai.details.recommendBestFix.title=Recommends the Best Fix
wex.labs.remediation.ai.details.relevance.desc=AI works within your organization's own remediation library.
wex.labs.remediation.ai.details.relevance.title=Relevance
wex.labs.remediation.ai.details.scriptInfo.desc=For faster saving of your script, the system reads it and auto-fills metadata fields such as title, description, synopsis, and any input parameters detected allowing you to quickly review and save your new script.
wex.labs.remediation.ai.details.scriptInfo.title=Script Information Autofill
