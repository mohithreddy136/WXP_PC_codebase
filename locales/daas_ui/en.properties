asset_details_last_fast_startup.final_note=Fast startup only applies to Shutdown > Start, not to restarts.
asset_details_last_fast_startup.hibernation_note=Fast startup requires hibernation enabled. If the option is missing, run this command in an elevated command prompt.
asset_details_last_fast_startup.note.description=This timestamp indicates the start of the most recent fast boot session, which occurs when:
asset_details_last_fast_startup.note.point1=The system is shut down with fast startup enabled (hybrid shutdown)
asset_details_last_fast_startup.note.point2=When Fast Startup is disabled, then Last Fast Startup will display Disabled
asset_details_last_fast_startup.note.point3=Important: In Fast Startup, Last restart remains unchanged and reflects the last full boot or restart.
