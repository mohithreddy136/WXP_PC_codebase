account_management.subscriptions.addon.anyware.azure_notice=License is only currently offered in Azure Marketplace. HP Anyware Standard license includes access to HP Anyware Manager Enterprise.
account_management.subscriptions.addon.anyware.desc=Manage and provision remote desktops for your team. End users will have secure access to desktops without the need for VPN. Monitor your remote fleet in one place when you integrate HP Anyware with WXP
account_management.subscriptions.addon.anyware.desc.short=Securely access, manage, and monitor desktops
account_management.subscriptions.addon.anyware.enterprise.header=HP Anyware Manager Enterprise
account_management.subscriptions.addon.anyware.features.automation=Automate Tasks
account_management.subscriptions.addon.anyware.features.automation.desc=Integrate your custom admin workflow seamlessly into the management plane
account_management.subscriptions.addon.anyware.features.multitenant_rbac=Multi-Tenant and Role-Based Access Control
account_management.subscriptions.addon.anyware.features.multitenant_rbac.desc=IT can manage multiple organizations with a single instance of HP Anyware Manager Enterprise and assign permissions based on role.
account_management.subscriptions.addon.anyware.features.productivity=Enable End User Productivity
account_management.subscriptions.addon.anyware.features.productivity.desc=End users will experience the desktop as if it were local, regardless of their performance needs or network conditions.
account_management.subscriptions.addon.anyware.features.provision_desktops=Manage Physical and Virtual Desktops
account_management.subscriptions.addon.anyware.features.provision_desktops.desc=IT can configure and monitor remote desktops through HP Anyware Manager Enterprise. They can also provision virtual desktops to end users at any time.
account_management.subscriptions.addon.anyware.features.remote_access=Provide End Users with Secure Remote Access
account_management.subscriptions.addon.anyware.features.remote_access.desc=End users will have secure access to desktops without the need for VPN. HP Anyware offers simplilfied access via cloud gateways.
account_management.subscriptions.addon.anyware.features.role_access.desc=Perform user assignment and session routing without needing to install a gateway in other environments
account_management.subscriptions.addon.anyware.features.role_cloud_gateways=Simplified Access via Cloud Gateways
account_management.subscriptions.addon.anyware.features.setup=Any IT Environment and Simple Setup
account_management.subscriptions.addon.anyware.features.setup.desc=A flexible, intuitive solution that simplifies deployment and management across diverse infrastructures, including on-premises, cloud, and hybrid environments, while reducing IT complexity and footprint.
account_management.subscriptions.addon.anyware.features.workforce_integration=Workforce Experience Integration
account_management.subscriptions.addon.anyware.features.workforce_integration.desc=IT can centralize remote desktop data within the Workforce Experience Platform, ultimately providing a central view of their fleet.
account_management.subscriptions.addon.anyware.header=HP Anyware
account_management.subscriptions.addon.anyware.overview.desc1=HP Anyware is a high-performance software solution that provides end users with secured access to their remote or virtual desktops without a VPN. HP Anyware includes access to an IT management plane called HP Anyware Manager Enterprise.
account_management.subscriptions.addon.anyware.overview.desc2=HP Anyware Manager Enterprise (AME) is a multi-tenant management plane that allows IT to manage both physical and virtual desktops.
account_management.subscriptions.addon.anyware.required_components.header=Required Components for Workforce Experience Integration
account_management.subscriptions.addon.anyware.required_components.li1=HP Anyware Standard
account_management.subscriptions.addon.anyware.required_components.li2=HP Anyware Manager Enterprise
account_management.subscriptions.addon.anyware.security_compliance=Security and compliance
account_management.subscriptions.addon.anyware.security_compliance.desc1=HP Anyware prioritizes security and compliance across its product offerings to ensure robust protection and adherence to industry standards. Key features include end-to-end encryption, secure remote access, and multi-factor authentication, safeguarding data integrity and confidentiality.
account_management.subscriptions.addon.anyware.security_compliance.desc2=HP Anyware also integrates advanced threat detection and response capabilities to proactively mitigate risks. Compliance with regulations such as GDPR, HIPAA, and SOC 2 underscores HP Anyware's commitment to maintaining stringent security protocols. Continuous monitoring and regular security audits ensure that HP Anyware products remain resilient against emerging cyber threats, providing users with a secure and trustworthy IT management  experience.
account_management.subscriptions.addon.anyware.technology=Remoting Technology
account_management.subscriptions.addon.anyware.technology.desc=HP Anyware's award winning PCoIP® remote display technology delivers a high- definition and highly responsive computing experience through challenging network conditions.
account_management.subscriptions.addon.anyware.technology.desc.li1=PCoIP® encodes, compresses, encrypts, and transports image pixels from a central server or workstation.
account_management.subscriptions.addon.anyware.technology.desc.li2=It then decrypts and decompresses the image for users on virtually any endpoint.
account_management.subscriptions.addon.connect_accounts=Connect Accounts
account_management.subscriptions.addon.oob.desc.short=BIOS-level remote control for advanced diagnostics and remediation
account_management.subscriptions.addon.oob.desclaimer1=1. Out-of-band diagnostics and remediation is available as a license in varying term lengths and is vendor-agnostic for any PCs that are Intel® vPro® Enterprise and Intel® AMT enabled. Includes and requires Workforce Experience Platform Starter to administer and manage the software solution. Available in US, Canada and EU from HP representatives or HP-authorized resellers. For details, see (add url link to license terms/eula).
account_management.subscriptions.addon.oob.desclaimer2=2. Based on HP's internal analysis of PC manufacturers with power cycle control, non-OS control, BIOS control and reimaging control as of 9/24/2024.
account_management.subscriptions.addon.oob.desclaimer3=3. The HP Insights agent is required and is a telemetry and analytics app that provides critical data around devices and applications, is not sold as a standalone service and is ISO27001, ISO27701, ISO27017 and SOC2 Type2 certified for Information Security. Internet access with connection to the portal is required. For full system requirements, please visit http://www.hpdaas.com/requirements. Purchase of any HP Insights agent-enabled service necessitates enabling software to run on each device. HP Services Scan is provided through Windows Update on select HP hardware and will check entitlement on each hardware device to determine if an enabled service has been purchased, and will download applicable software automatically. To disable this feature, please follow the instructions at <a target='_blank' href='http://www.hpdaas.com/requirements' style=\"text-decoration:none; color:#4D52E5\">http://www.hpdaas.com/requirements</a>
account_management.subscriptions.addon.oob.desclaimer4=4. WXP Starter is included and required to administer and manage the software solution.
account_management.subscriptions.addon.oob.features.remote_control=Remote control - even when the Operating System is down
account_management.subscriptions.addon.oob.features.remote_control.desc=IT can remotely access BIOS to reboot, re-image, and recover mixed-brand PCs wherever work happens.
account_management.subscriptions.addon.oob.features.scalable=Scalable, centralized management
account_management.subscriptions.addon.oob.features.scalable.desc=Simplify PC provisioning, bulk license control, and role-based access with this feature that integrates in WXP for enterprise deployment, utilization and management.
account_management.subscriptions.addon.oob.features.secure=Secure, end-user experiences
account_management.subscriptions.addon.oob.features.secure.desc=Users have visibility into remote sessions and can stop the connection at any point. Secure, seamless support builds trust for an improved user experience.
account_management.subscriptions.addon.oob.header=Out-of-band Remote Connect
account_management.subscriptions.addon.oob.overview.desc1=Looking to improve digital experiences for a hybrid workforce? HP Out-of-band Remote Connect gives support techs remote BIOS access to reboot, re-image, and recover PCs, even if the OS isn't working. No user involvement, no desk visit.
account_management.subscriptions.addon.vyopta.connect_accounts.error=We couldn't connect your account. Please check your connection and try again.
account_management.subscriptions.addon.vyopta.connect_accounts.found=We've detected a Vyopta account "<b>{orgName}</b>". Would you like to connect it to WXP?
account_management.subscriptions.addon.vyopta.connect_accounts.no_permissions=You don't have permissions. Please contact the Vyopta account administrator for assistance.
account_management.subscriptions.addon.vyopta.connect_accounts.not_found=We weren't able to automatically detect your {service} account. Please reach out to {support_link} to help set up this connection if you are already a {service} customer.
account_management.subscriptions.addon.vyopta.connect_accounts.org_already_mapped=The Vyopta ID is already linked to another tenant. Please reach out to your account administrator for assistance.
account_management.subscriptions.addon.vyopta.connect_accounts.request_support=Please reach out to your {service} account administrator for help.
account_management.subscriptions.addon.vyopta.connect_accounts.success=We've successfully connected your account.
account_management.subscriptions.addon.vyopta.connect_accounts.unauthorized=We detected your organization in {service}, but it looks like you don't have the necessary permissions to connect accounts.
account_management.subscriptions.addon.vyopta.desc=Optimize collaboration with real-time insights. Monitor call quality, meeting room usage, and system performance across Microsoft Teams, Zoom, Poly, and Webex. When it's integrated with WXP, it helps IT enhance digital experiences and drive workplace efficiency.
account_management.subscriptions.addon.vyopta.features.comprehensive_monitoring=Comprehensive monitoring across collaboration platforms
account_management.subscriptions.addon.vyopta.features.comprehensive_monitoring.desc=Gain holistic visibility into your multi-vendor Unified Communications (UC) environment, enabling efficient management of video and voice collaboration tools.
account_management.subscriptions.addon.vyopta.features.deep_integration=Deep integration with WXP
account_management.subscriptions.addon.vyopta.features.deep_integration.desc=Vyopta's analytics and monitoring data are seamlessly embedded within WXP, enabling IT teams to manage collaboration performance alongside other workplace technologies. This centralized approach improves IT efficiency, reduces complexity, and enhances digital experience management.
account_management.subscriptions.addon.vyopta.features.enhance_user_engagement=Enhance user engagement and wellness
account_management.subscriptions.addon.vyopta.features.enhance_user_engagement.desc=Utilize collaboration analytics to identify barriers to productivity, fostering improved employee experiences and well-being.
account_management.subscriptions.addon.vyopta.features.optimize_meeting_space=Optimize meeting space utilization
account_management.subscriptions.addon.vyopta.features.optimize_meeting_space.desc=Analyze room occupancy and usage patterns to maximize real estate investments and enhance meeting room efficiency.
account_management.subscriptions.addon.vyopta.features.proactive_issue_detection=Proactive issue detection and resolution
account_management.subscriptions.addon.vyopta.features.proactive_issue_detection.desc=Leverage real-time monitoring to identify and address collaboration quality issues before they impact users, reducing troubleshooting time.
account_management.subscriptions.addon.vyopta.header=Collaboration Experience by Vyopta
account_management.subscriptions.addon.vyopta.overview=Empower IT teams with advanced monitoring and analytics for collaboration tools. Vyopta integration within WXP provides real-time visibility into meeting room usage, call quality, and system performance across platforms like Microsoft Teams, Zoom, Poly, and Webex. Enhance employee productivity by proactively addressing collaboration issues and optimizing workplace experiences.
account_management.subscriptions.addon.vyopta.short_desc=Valuable analytics and room insights to optimize collaboration environments
account_management.subscriptions.addon.wolf.desc=Deployment, visibility, and end-to-end protection using both embedded PC and software security to strengthen PC defenses.
account_management.subscriptions.addon.wolf_security=HP Wolf Security
account_management.subscriptions.addon.wolf_security.desc=Unmatched endpoint protection of devices from cyberattacks powered by HP Wolf. View telemetry in Workforce Experience for enhanced security.
account_management.subscriptions.addon.wpt.desc=Remotely track, lock, and secure lost or stolen devices. When it's integrated with WXP, it helps IT teams track PC assets and reduce device loss risks - even when devices are powered off.
account_management.subscriptions.addon.wpt.features.always_available=Always available
account_management.subscriptions.addon.wpt.features.always_available.desc=Leverages custom hardware and software to find/lock/erase even if PC is off, not on the internet, or won't boot.
account_management.subscriptions.addon.wpt.features.message_customization=Message customization
account_management.subscriptions.addon.wpt.features.message_customization.desc=Transmit custom message to target PC for unlock instructions
account_management.subscriptions.addon.wpt.features.remote_lock_and_erase=Remote lock and erase
account_management.subscriptions.addon.wpt.features.remote_lock_and_erase.desc=Lock device at firmware level to protect data, and render stolen device useless. Erase primary storage on lost or stolen device to avoid data breach.
account_management.subscriptions.addon.wpt.features.seamless_integration=Seamless integration with WXP
account_management.subscriptions.addon.wpt.features.seamless_integration.desc=Manage device security directly within WXP, streamlining IT operations and endpoint management.
account_management.subscriptions.addon.wpt.features.separations_of_duties=Separation of duties
account_management.subscriptions.addon.wpt.features.separations_of_duties.desc=Multiple approvers required for lock/erase prevents mistakes or insider threats.
account_management.subscriptions.addon.wpt.features.strong_audit_trail=Strong audit trail
account_management.subscriptions.addon.wpt.features.strong_audit_trail.desc=Logs successful Lock and Erase execution on WXP platform as proof of compliance.
account_management.subscriptions.addon.wpt.header=HP Wolf Protect and Trace with Wolf Connect
account_management.subscriptions.addon.wpt.overview=Enhance asset management and reduce data breach risks with HP Wolf Protect & Trace. Integrated into WXP, this unique solution enables IT teams to locate, lock, and wipe lost or stolen devices - even when powered off. Global coverage and simple administration suitable for all customer sizes. 
account_management.subscriptions.addon.wpt.requirements.purchase=Requires the purchase of a new HP PC from your HP sales representative or authorized channel partner.<br>  Requires a supported PC with "WWAN" display option.  Supported PCs at: https://www.hpwolf.com/en/legal/ptwc/platforms
account_management.subscriptions.addon.wpt.short_desc=Remotely track, lock, and erase a PC globally, even when it's off
