wpt.details.desc=Reliably protect data, track your fleet of HP devices, and keep unauthorized users from accessing your files and documents on your network with HP {appName}, the world's most secure find, lock, and erase service. Powered by HP Workforce Experience Platform, HP {appName} provides a complete hardware-enforced service for locating, locking, and erasing devices, even when PCs are offline or powered down.
wpt.details.header=Establish Your First Line of Defense
wpt.disclaimer.point1=Based on HP's internal analysis of Find, Lock and Wipe software services. Most secure based on cryptography and persistence (including hardware-enforced persistence) as of October 2021.
wpt.disclaimer.point2=HP {appName} is available on select HP 600, 800, 1000, Windows based Elite Dragonfly Laptops, select 800 desktops, and Z1 G8 Workstations, and will function when the device is turned on and connected to the internet.
wpt.disclaimer.point3=HP Workforce Experience Platform is a telemetry and analytics platform that provides critical data around devices and applications and is not sold as a standalone service. HP Workforce Experience Platform follows stringent GDPR privacy regulations and is ISO27001, ISO27701, ISO27017 and SOC2 Type2 certified for Information Security. Internet access with connection to Workforce Experience Platform portal is required. For full system requirements, please visit <a href=\"{link}\" target=\"_blank\" style=\"text-decoration: none; color: #027aae; cursor: pointer;\">{text}</a>.
wpt.disclaimer.point4=Hardware-enforced refers to HP Sure Run Gen4 and higher, which is available on compatible HP PCs with this service, and requires Windows 10 and higher.
wpt.disclaimer.point5=Service levels and response times for HP Hardware Supports may vary depending on your geographic location. Service starts on date of hardware purchase. Restrictions and limitations apply. For details, visit <a href="https://www.hp.com/go/cpc" target="_blank" style="text-decoration: none; color: #027aae; cursor: pointer;">www.hp.com/go/cpc</a>. HP Services are governed by the applicable HP terms and conditions of service provided or indicated to Customer at the time of purchase. Customer may have additional statutory rights according to applicable local laws, and such rights are not in any way affected by the HP terms and conditions of service or the HP Limited Warranty provided with your HP Product.
wpt.explore.header=Explore solution
wpt.feature.cost.desc=Losing an important PC can cost much more than money. Help mitigate risk and reduce the costs associated with losing a PC with HP {appName}. Now you have a comprehensive way to locate a missing or stolen PC and easily lock or erase data.
wpt.feature.cost.title=Help reduce cost and worry
wpt.feature.data.desc=Utilize our most secure service with threshold cryptography to find, lock, and erase data from all of your HP devices, helping ensure that your sensitive information is protected.
wpt.feature.data.title=Protect your devices and data
wpt.feature.monitoring.desc=With HP Workforce Experience Platform simplified user dashboard, ITDMs can respond to lost or stolen devices faster, monitoring the health and protection status of all devices on one user-friendly platform.
wpt.feature.monitoring.title=Speed response with integrated monitoring
