exp.NetworkDisconnections.causePoorWifiSignal.detail1=Weak or obstructed signal leads to unstable device connectivity.
exp.NetworkDisconnections.causePoorWifiSignal.detail2=Recommendation: Position router centrally and adjust channel/frequency to reduce interference.
exp.NetworkDisconnections.causeRouterIssues=Router firmware or hardware issues.
