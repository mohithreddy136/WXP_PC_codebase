wex.fleet.mgmt.recommended.desc.antivirus_not_enabled=Enabling  Microsoft Defender provides essential protection against malware and other security threats.
wex.fleet.mgmt.recommended.desc.antivirus_not_enabled_other=Enabling antivirus software protects devices from malware and secures your system against attacks.
wex.fleet.mgmt.recommended.desc.antivirus_signature_outdated=Regularly updating malware signatures ensures Windows Defender can detect and protect against the latest threats.
wex.fleet.mgmt.recommended.desc.antivirus_signature_outdated_other=Keeping malware signatures current ensures comprehensive protection against the latest threats.
wex.fleet.mgmt.recommended.desc.avg_fan_speed_high=Addressing high fan speeds helps prevent overheating and potential damage to your device's internal components.
wex.fleet.mgmt.recommended.desc.battery_calibrate=Calibrating the battery improves power reading accuracy and enhances battery life and performance.
wex.fleet.mgmt.recommended.desc.battery_early_detection_wear=Addressing battery wear ensures efficient device operation, consistent performance and extended battery life.
wex.fleet.mgmt.recommended.desc.battery_needs_attention=Replacement of defective batteries can ensure good device performance, and system health. Devices which are covered by warranty may be eligible for battery replacement.
wex.fleet.mgmt.recommended.desc.bitlocker_encryption_not_enabled=Enabling BitLocker protects sensitive data by encrypting your drive, enhancing overall security against unauthorized access.
wex.fleet.mgmt.recommended.desc.bsod_occured=Resolving Blue Screen errors ensures system stability, prevents unexpected shutdown and maintains reliability.
wex.fleet.mgmt.recommended.desc.cpu_utilization_high=Analyzing high CPU usage helps prevent performance bottlenecks and keeps the system running smoothly.
wex.fleet.mgmt.recommended.desc.disk_needs_attention=Disk performance is degrading and may soon lead to slower performance or instability if not addressed.
wex.fleet.mgmt.recommended.desc.disk_utilization_high=Freeing up disk space prevents system slowdowns and ensures smooth operation by avoiding storage overload.
wex.fleet.mgmt.recommended.desc.docking_station_ac_adapter_failed=Fixing adapter failures ensures consistent power supply to docking stations, preventing connectivity issues.
wex.fleet.mgmt.recommended.desc.docking_station_ac_adapter_running_at_reduced_perofmance=Enhancing adapter performance ensures reliable connections and optimal functionality of docking stations.
wex.fleet.mgmt.recommended.desc.docking_station_firmware_out_of_date=Firmware updates for docking stations ensures device compatibility and improves overall system performance.
wex.fleet.mgmt.recommended.desc.excessive_os_login_time=Shortening login times reduces delays and improves user efficiency during system access.
wex.fleet.mgmt.recommended.desc.excessive_os_shutdown_time=Optimizing shutdown times minimizes wait periods and ensures efficient system shutdowns.
wex.fleet.mgmt.recommended.desc.excessive_os_startup_time=Faster startup time speeds up access to system and enhances user efficiency and productivity.
wex.fleet.mgmt.recommended.desc.firewall_disabled=Enabling Windows Firewall helps block unauthorized access and protects your network from potential threats.
