requirements.list.proSecurity.windows.supportLifecycle.content1=The HP Service Level Objective is to provide support for the most current 3 Windows 10 Semi-Annual Channel releases.
requirements.list.proSecurity.windows.supportLifecycle.content2=HP's objective is to release support of the new OS release for Wolf Pro Security's Threat Containment feature within 30 days of its availability to the Semi-Annual Channel (\"SAC\").  Interim or pre-release Windows Insider builds are not supported. For more information about Windows OS releases, please see <a href='https://docs.microsoft.com/en-us/windows/release-information/' target='_blank'>https://docs.microsoft.com/en-us/windows/release-information/</a>.
requirements.list.proSecurity.windows.supportLifecycle.content3=To ensure customers on older Windows versions have adequate time to upgrade to the more current releases, HP will continue to support the 4th most current release (currently Windows 10 v1903) for at least 90 days after support for the newest Semi-Annual Channel release is available in Wolf Pro Security.  After this period, support for the older OS release will end.  The same support policy applies to Long Term Service Channel releases of Windows 10. Thus, those systems will also need to be updated according to the policy listed above.
requirements.list.proSecurity.windows.supportLifecycle.content4=Sure Click Pro support for Windows 10 v2004 was released on July 31, 2020. Support will be withdrawn for Windows 10 v1809 effective October 31, 2020.
requirements.list.proSecurity.windows.supportLifecycle.content5=Windows 7 and 8.1 are not supported by HP Proactive Security
requirements.list.proSecurity.windows.supportLifecycle.content6=Sure Click Pro support for Windows 10 v20H2 was released on November 18, 2020.  Support ended for Windows 10 v1903 effective February 16, 2021. 
requirements.list.proSecurity.windows.supportLifecycle.content7=HP released Sure Click Pro threat containment support for Windows 10 v21H1 on July 5, 2021. Support will be withdrawn for Windows 10 v1909 effective October 3, 2021.
