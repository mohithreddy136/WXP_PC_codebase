Global.gridTitle.forCashDrawer_line3 = 此选项卡中显示的现金抽屉已手动打开，并且没有 POS 软件交易触发收银台打开。这将表明在 POS 软件之外发生潜在交易或存在潜在损失活动。
Global.gridTitle.forCashDrawer_line4 = 3. 对于现金抽屉警报类型 = 在未经授权的时间段内打开。
Global.gridTitle.forCashDrawer_line5 = 此选项卡中显示的现金抽屉已在配置的标准工作时间之外打开。这将表明现金抽屉在不应被访问的时间内被访问，从而突出显示潜在的可疑事件。
Global.gridTitle.forCashDrawer_line6 = 1. 对于现金抽屉警报类型 = 超出“打开时间”。
Global.gridTitle.kniefCutsTabs = 这是收据打印机的列表，其中的打印机已达到刀切数的使用增量。建议根据需要检查和维修打印机切刀。此过程需要检查打印机切刀是否仍然足够锋利以轻松切割收据，并根据需要磨快和更换打印机切刀。
Global.gridTitle.msrTabs = 这是磁条阅读器的列表，其中的磁条阅读器已达到正常读取次数的使用增量。建议清洁阅读器。此过程需要清除卡槽中的碎屑和堆积物，以保证阅读器持续正常工作。
Global.gridTitle.peripheralClaimingError = 由于在下表中突出显示的多种不同原因，此选项卡中显示的外围设备在收集外围设备的统计数据时出现问题。这包括与声明带 POS 软件的外围设备、正确配置 HP 外围设备代理等的冲突。
Global.gridTitle.peripheralThresholdMet = 此选项卡突出显示已超过预期寿命使用阈值的外围设备(扫描仪、磁条阅读器和收据打印机)，这表明外围设备由于使用年限而出现故障的风险相对较高。具体是从日志数据类中提取数据，还是从已建立的阈值报告中提取数据，视哪种方式更为容易而定。最终都是相同的数据。
Global.gridTitle.printedLineTabs = This is the list of Receipt Printers that have reached an increment of usage for printed lines in which it is recommended that that the Printhead is serviced. This entails cleaning the printhead of the printer to enable high quality outputs.
Global.gridTitle.printedLineTabs = 这是收据打印机的列表，其中的打印机已达到打印行数的使用增量。建议对打印头进行维修。此过程需要清洁打印机的打印头，以实现高质量输出。
Global.gridTitle.USBDevices = 此选项卡突出显示未配置为连接到基本设备并因此处于未知和意外状态的任何 USB 设备。所示设备可能未经授权或突出显示潜在安全威胁。
