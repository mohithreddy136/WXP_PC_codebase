Global.gridTitle.forCashDrawer = 1. For Cash Drawer Alert Type = Open Time exceeded.
Global.gridTitle.forCashDrawer_line1 = Kontantskuffer som vises i denne fanen har overskredet konfigurert tidsterskel for hvor lenge kassa har vært åpen. Dette vil fremheve uaktsomhet og potensielt mistenkelig aktivitet for POS-bane.
Global.gridTitle.forCashDrawer_line2 = 2. For kontaktskuff-varseltype = Manuell kontantskuff åpen.
Global.gridTitle.forCashDrawer_line3 = Kontantskuffer som vises i denne fanen ble åpnet manuelt uten en POS-programvaretransaksjon som utløser åpning av kassa. Dette vil indikere at en potensiell transaksjon finner sted utenfor POS-programvaren eller en potensiell tapsaktivitet.
Global.gridTitle.forCashDrawer_line4 = 3. For kontantskuff-varseltype = Åpnet under uautoriserte timer.
Global.gridTitle.forCashDrawer_line5 = Kontantskuffer som vises i denne fanen ble åpnet utenfor de konfigurerte standard driftstimene. Dette vil indikere at en kontantskuff ble åpnet på et uventet tidspunkt, noe som fremhever en potensielt mistenkelig hendelse.
Global.gridTitle.forCashDrawer_line6 = 1. For kontantskuff-varseltype = Overskredet tid åpen.
Global.gridTitle.kniefCutsTabs = Dette er en liste over kvitteringsskrivere som har nådd en økning i bruken av knivkutt. Det anbefales å inspisere og utføre service på skriverkniven ved behov. Dette krever sjekking av at skriverkniven fortsatt er skarp nok til å kunne kutte kvitteringer, og sliping og erstatning ved behov.
Global.gridTitle.msrTabs = Dette er en liste over magnetiske stripelesere som har nådd en økning i bruken av gode avlesninger. Det anbefales rengjøring av leseren. Dette krever rengjøring og fjerning av oppsamlet rusk fra kortsporet for å muliggjøre fortsatt ytelse for leseren.
Global.gridTitle.peripheralClaimingError = Periferiutstyr vist i denne fanen har problemer med statistikk fra periferienheter som samles inn på grunn av en rekke forskjellige grunner som fremheves i tabellen nedenfor. Dette inkluderer konflikter med kreving av periferiutstyr med POS-programvare, ordentlig konfigurasjon av HP Peripheral Agent, og mer.
Global.gridTitle.peripheralThresholdMet = Denne fanen fremhever periferiutstyr (skannere, magnetisk stipe-lesere og kvitteringsskrivere) som har overskredet forventet bruksterskel for levetid, noe som indikerer at periferienheten har en relativt høyere risiko for å feile på grunn av bruksalder. Enten ved å hente ut data fra loggdataklassen eller fra en etablert terskelrapport, det som er lettere vil fungere. Til syvende og sist er dette samme data.
Global.gridTitle.printedLineTabs = This is the list of Receipt Printers that have reached an increment of usage for printed lines in which it is recommended that that the Printhead is serviced. This entails cleaning the printhead of the printer to enable high quality outputs.
Global.gridTitle.printedLineTabs = Dette er en liste over kvitteringsskrivere som har nådd en økning i bruken av utskrevne linjer. Det anbefales å utføre service på skrivehodet. Dette krever rengjøring av skrivehodet på skriveren for å aktivere utskrifter av høy kvalitet.
Global.gridTitle.USBDevices = Denne fanen fremhever eventuelle USB-enheter som ikke er konfigurert for tilkobling til baseenheten og derfor er ukjent og uventet. Viste enheter kan være uautoriserte eller fremheve en potensiell sikkerhetstrussel.
