graphHeaders.Disk_Capacity_Forecasting.Summary.desc_11 = Ikke relevant. Det er nok harddiskplass for øyeblikket, men ikke nok data til å spå på forhånd hvor lang tid som gjenstår før harddisken når terskelen.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_2 = Rapporten benytter data for de siste 3–6 månedene for å fastslå gjenværende tid før harddiskkapasiteten når terskelen angitt i rapportfilteret. Kategoriseringene på øverste nivå for harddiskkapasitet-status er som følger:
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_3 = Umiddelbart. Gjenværende harddiskplass har nådd terskelen
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_4 = Innen 1 måned. Gjenværende harddiskplass når terskelen innen 1 måned
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_5 = Innen 2 måneder. Gjenværende harddiskplass når terskelen innen 2 måned
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_6 = Innen 3 måneder. Gjenværende harddiskplass når terskelen innen 3 måned
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_7 = OK. Harddiskplassen kan være OK for de neste 1, 2 eller 3 månedene, avhengig av informasjonen i kolonnen Ytterligere status.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_8 = 1+. Det er nok harddiskplass for minst 1 måned
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_9 = 2+. Det er nok harddiskplass for minst 2 måneder
