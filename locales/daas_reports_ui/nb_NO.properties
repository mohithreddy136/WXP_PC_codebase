valueReminderEmail_serviceRemediation_startupPerformance_line10 = Velg C:- stasjonen hvis du blir bedt om å velge. Vent så mens programmet skanner etter filer som kan slettes.
valueReminderEmail_serviceRemediation_startupPerformance_line11 = Noen filtyper er forhåndsvalgt. Får å finne ut mer om hver filtype kan du klikke på navnet for å se en beskrivelse før oppryddingen.
valueReminderEmail_serviceRemediation_startupPerformance_line12 = Du kan også velge papirkurven for å tømme den.
valueReminderEmail_serviceRemediation_startupPerformance_line13 = Klikk på OK for å slette de valgte filene.
valueReminderEmail_serviceRemediation_startupPerformance_line14 = Prøv å bruke en ekstern harddisk
valueReminderEmail_serviceRemediation_startupPerformance_line15 = Vurder å flytte elementer med store filstørrelser, for eksempel bilder, musikk og videoer i høy oppløsning til en ekstern harddisk.
valueReminderEmail_serviceRemediation_startupPerformance_line16 = Slett Windows-installasjonsfiler (datamaskiner oppdatert til Windows 10)
valueReminderEmail_serviceRemediation_startupPerformance_line17 = I Diskopprydding-vinduet klikker du på Rydd opp i systemfiler
valueReminderEmail_serviceRemediation_startupPerformance_line18 = Velg C:- stasjonen, og vent mens programmet skanner etter filer som kan slettes.
valueReminderEmail_serviceRemediation_startupPerformance_line19 = Velg Tidligere Windows-installasjon(er) og Midlertidige Windows-installasjonsfiler, hvis de er til stede, og klikk deretter på OK.
valueReminderEmail_serviceRemediation_startupPerformance_line2 = Finn og installer oppdaterte programvare- og maskinvaredrivere for din datamaskin.
valueReminderEmail_serviceRemediation_startupPerformance_line20 = Avinstaller ubrukte programmer
valueReminderEmail_serviceRemediation_startupPerformance_line21 = Søk i Windows for å slette et program, og klikk deretter på Endre eller slett et program fra resultatene.
valueReminderEmail_serviceRemediation_startupPerformance_line22 = Klikk på et program du ikke trenger lenger, og klikk deretter på Avinstaller.
valueReminderEmail_serviceRemediation_startupPerformance_line23 = Gå til
valueReminderEmail_serviceRemediation_startupPerformance_line3 = I Windows, søk etter og åpne Windows Update.
valueReminderEmail_serviceRemediation_startupPerformance_line4 = Klikk på én av de følgende alternativene, hvis det kommer opp, i Windows Update-vinduet:
valueReminderEmail_serviceRemediation_startupPerformance_line5 = Hvis det finnes oppdateringer å laste ned, klikker du på Installer nå.
valueReminderEmail_serviceRemediation_startupPerformance_line6 = Hvis ingen oppdateringer er oppført, klikker du på Se etter oppdateringer, og så klikker du på Installer nå etter at Windows har oppdaget tilgjengelige oppdateringer.
valueReminderEmail_serviceRemediation_startupPerformance_line7 = Utfør en opprydding av systemet og harddisken
valueReminderEmail_serviceRemediation_startupPerformance_line8 = Slett unødvendige filer: Søk i Windows etter diskopprydding
valueReminderEmail_serviceRemediation_startupPerformance_line9 = Klikk på Diskopprydding i resultatene
valueReminderEmail_serviceRemediation_storageSpaceHealth_line1 = Frigjør plassen på harddisken
valueReminderEmail_serviceRemediation_storageSpaceHealth_line10 = Merk av for Tidligere Windows-installasjon(er), og klikk deretter på OK.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line11 = En varselsmelding vises.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line12 = Klikk på Ja for å fullføre opprydningen av de tidligere Windows-installasjonene.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line13 = Klikk på Oppdater-ikonet under Del A i vinduet Windows trenger mer plass.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line14 = Når oppdateringen fullføres, vises statusen Fullført! Gå til Del B under Del A.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line15 = Sett inn en flash-stasjon eller en ekstern harddisk med 16 GB ledig lagringsplass.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line16 = Hvis Fullført!-meldingen ikke vises under Del A, trenger Windows-oppdateringen mer plass.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line17 = Klikk på Frigjør plass for å slette flere filer.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line18 = Klikk på Fortsett.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line19 = Klikk på lukk i Nesten klar-vinduet.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line2 = Hvis du vil installere versjonsoppdateringer for Windows 10, trenger du 10 GB med plass på harddisken og en 16 GB USB-flash-stasjon. Windows 10-oppsett inkluderer et alternativ for å slette unødvendige filer på harddisken direkte fra Innstillinger-appeen ved hjelp av Diskopprydding-veiviseren. Hvis tilgjengelig kan du frigjøre diskplass ved å lagre data i skyen (på nettet).
valueReminderEmail_serviceRemediation_storageSpaceHealth_line20 = Søk etter Windows Update-innstillinger i Windows.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line21 = I listen over resultater klikker du på Windows Update-innstillinger for å åpne Windows Update-vinduet.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line22 = Under overskriften En omstart er planlagt velger du et tidspunkt for å starte Windows på nytt for å gå videre med oppgraderingen, eller klikk på Start på nytt nå for å starte oppdateringen umiddelbart.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line23 = Frigjør plass ved hjelp av skyen (nettbasert lagring)
valueReminderEmail_serviceRemediation_storageSpaceHealth_line24 = For optimal ytelse er den bærbare PC-en din beregnet for bruk med skylagring. Som et alternativ til å slette filer på datamaskinen din for å frigjøre mer harddiskplass for Windows-oppdateringen, kan du flytte filer til skyen.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line3 = Søk etter Windows Update-innstillinger i Windows.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line4 = I listen over resultater klikker du på Windows Update-innstillinger for å åpne Windows Update-vinduet.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line5 = Windows Update-vinduet vises og Windows-oppdateringen starter automatisk.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line6 = Windows-oppdatering oppdager at mer lagringsplass er nødvendig for oppdateringen, og åpner vinduet Windows trenger mer plass.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line7 = Klikk på Frigjør plass.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line8 = I Lagringsbruk-vinduet klikker du på en kategori for å slette unødvendige filer.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line9 = Søk etter og åpne Diskopprydding i Windows.
