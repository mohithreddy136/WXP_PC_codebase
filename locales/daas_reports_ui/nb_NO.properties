graphHeaders.Disk_Capacity_Forecasting.Summary.desc_1 = Planleggingsrapporten for harddiskkapasitet forutser gjenværende tid før harddiskkapasiteten når en forhåndsangitt terskel. Terskelen kan velges i rapportens filtre, og defineres som 0–10 %, 0–20 %, 0–30 %, 0–40 % og 0–50 %.
