graphHeaders.User_Mobility_Factor.Summary.desc_1 = Mobilitetsaspektene for brukere basert på enhetens geografiske plassering.
graphHeaders.User_Mobility_Factor.Summary.desc_2 = Brukerens mobilitetsfaktor i løpet av en periode er basert på flere og kompliserte mønstre for mobil oppførsel. For eksempel reiser noen brukere veldig ofte med samme eller forskjellige enheter med forskjellige formfaktorer, mens andre ofte reiser frem og tilbake mellom to eller tre steder med enhetene, og andre igjen er i konstant bevegelse over korte avstander med sine enheter. Brukerens mobilitetsfaktor benytter den geografiske plasseringen til brukeres enheter som er registrert i HP TechPulse Proactive Management, i motsetning til brukerplasseringer fra andre eksterne kilder.
graphHeaders.User_Mobility_Factor.Summary.desc_3 = De plasseringsbaserte tjenestene som sporer geografisk plassering er som standard deaktivert for alle kunder, og kundene kan aktivere eller deaktivere plasseringsbaserte tjenester i den skybaserte portalen HP TechPulse Proactive Management. Selv i tilfeller der plasseringsbaserte tjenester er aktivert, tillater ikke HP TechPulse Proactive Management innsamling av enhetsplasseringsdata for enheter som er klassifisert som eid av ansatte eller private enheter (i den skybaserte portalen HP TechPulse Proactive Management).
graphHeaders.User_Mobility_Factor.Summary.desc_4 = Brukerens mobilitetsfaktor er en vurdering mellom 1 og 10, og er en relativ vurdering på tvers av alle enheter i analyse og proaktiv administrering. En vurdering på 1 betyr at brukerens enheter er de minst mobile, og en vurdering på 10 betyr at brukerens enheter er de mest mobile. En vurdering på -1 indikerer at det ikke finnes plasseringsdata for brukerens enheter.
graphHeaders.User_Mobility_Factor.Summary.desc_5 = Analysen av brukerens mobilitetsfaktor er planlagt gjennomført periodisk én gang i begynnelsen av hver måned. Forrige planlagte utførelse var {last_scheduled_date}
graphHeaders.User_Mobility_Factor.Summary.desc_6 = Grunnet månedlig planlagt behandling vises ikke brukere og enheter som ble registrert eller avregistrert fra HP TechPulse Proactive Management etter sist planlagte behandling, i denne rapporten.
