graphHeaders.Disk_Capacity_Forecasting.Summary.desc_7 = OK. Diskutrymmet kan vara OK för åtminstone de kommande 1, 2 eller 3 månader beroende på informationen i kolumnen för ytterligare status.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_8 = 1+. Är diskutrymmet OK i minst 1 månad
