graphHeaders.User_Mobility_Factor.Summary.desc_1 = Användares mobilitetsaspekter baserat på deras enheters geografiska plats.
graphHeaders.User_Mobility_Factor.Summary.desc_2 = Användarens mobilitetsfaktor under en viss period är baserad på flera komplicerade mobila beteendemönster. Till exempel reser ständigt en del användare med samma eller olika enheter i olika format till olika platser, medan vissa ofta reser fram och tillbaka med sina enheter mellan två eller tre platser, och ytterligare andra ständigt rör sig korta avstånd med sina enheter. Till användares mobilitetsfaktor används den geografiska platsen för användares enheter som är registrerade för HP TechPulse Proactive Management, till skillnad från användares plats från externa källor.
graphHeaders.User_Mobility_Factor.Summary.desc_3 = De platsbaserade tjänsterna för att spåra enheters geografiska plats är som standard inaktiverade för alla kunder, och kunderna erbjuds alternativet att aktivera eller inaktivera tjänsterna i den molnbaserade portalen för HP TechPulse Proactive Management. Även om platsbaserade tjänster är aktiverade tillåter inte HP TechPulse Proactive Management att platsinformation för enheter samlas in för enheter som är klassificerade som ägda av anställda eller personliga enheter (inom den molnbaserade portalen för HP TechPulse Proactive Management).
graphHeaders.User_Mobility_Factor.Summary.desc_4 = Användarens mobilitetsfaktor anges på en skala mellan 1 och 10 och är en relativ gradering av alla enheter inom områdena analys och proaktiv hantering. Graderingen 1 betyder att en användares enheter är av den minst mobila typen medan 10 betyder att de är av den mest mobila typen. Graderingen -1 indikerar att det inte finns några platsdata för användarens enheter.
graphHeaders.User_Mobility_Factor.Summary.desc_5 = Analysen av användarens mobilitetsfaktor har schemalagts att köras periodvis en gång i början av varje månad. Den senaste schemalagda körningen var den {last_scheduled_date}
graphHeaders.User_Mobility_Factor.Summary.desc_6 = Eftersom schemalagd rapportkörning endast sker en gång i månaden kommer inte den här rapporten att visa de användare och enheter som registrerats eller avregistrerats i HP TechPulse Proactive Management efter den senaste schemalagda körningen.
