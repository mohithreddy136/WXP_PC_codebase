Global.gridTitle.forCashDrawer = 1. For Cash Drawer Alert Type = Open Time exceeded.
Global.gridTitle.forCashDrawer_line1 = Kassalådor som visas på den här fliken har överskridit den konfigurerade tidsgränsen de kan vara öppna. Detta kan visa vårdslöshet och potentiellt misstänkt aktivitet för deras POS.
Global.gridTitle.forCashDrawer_line2 = 2. För varningstyper per kassalåda = kassalåda har öppnats manuellt.
Global.gridTitle.forCashDrawer_line3 = Kassalådor som visas på den här fliken öppnades manuellt utan att en POS-programvarutransaktion utlöste att kassan öppnades. Detta kan indikera en potentiell transaktion som äger rum utanför POS-programvaran eller en potentiell aktivitet som skapar förlust.
Global.gridTitle.forCashDrawer_line4 = 3. För varningstyper per kassalåda = öppnades under obehörig tid.
Global.gridTitle.forCashDrawer_line5 = Kassalådor som visas på den här fliken öppnades utanför de konfigurerade vanliga öppettiderna. Detta skulle indikera att en kassalåda var tillgänglig under en tid då den inte förväntades kunna nås vilket indikerar en potentiellt misstänkt händelse.
Global.gridTitle.forCashDrawer_line6 = 1. För varningstyper per kassalåda = öppettiden har överskridits.
Global.gridTitle.kniefCutsTabs = Detta är listan över kvittoskrivare som har ökat användningen av kniven. Det rekommenderas att skrivarkniven inspekteras och underhåll utförs efter behov. Detta kräver att du kontrollerar att skrivarkniven fortfarande är tillräckligt vass för att enkelt kunna skära kvitton samt slipa den och byta ut efter behov.
Global.gridTitle.msrTabs = Detta är listan över magnetbandsläsare som har ökat användningen för godkända avläsningar. Det rekommenderas att läsaren rengörs. Detta kräver att kortplatsen rensas på skräp ansamlingar för att möjliggöra läsarens fortsatta prestanda.
Global.gridTitle.peripheralClaimingError = Kringutrustning som visas på denna flik lyfter fram problem med att statistik från kringutrustning samlas in på grund av ett antal olika skäl, som lyfts fram i tabellen nedan. Detta inkluderar konflikter med anspråk på kringutrustning med POS-programvaran, korrekt konfigurering av HP Peripheral Agent och mer.
Global.gridTitle.peripheralThresholdMet = Den här fliken visar kringutrustning (skanners, magnetbandsläsare och kvittoskrivare) som har överskridit sin förväntade livscykel vilket indikerar att driftstopp har en relativt högre risk att uppstå på grund av åldern. Oavsett om det är för att extrahera data från loggdataklasser eller från en etablerad rapport med tröskelvärden fungerar det som lättast. I slutändan är det samma data.
Global.gridTitle.printedLineTabs = This is the list of Receipt Printers that have reached an increment of usage for printed lines in which it is recommended that that the Printhead is serviced. This entails cleaning the printhead of the printer to enable high quality outputs.
Global.gridTitle.printedLineTabs = Detta är listan över kvittoskrivare som har ökat användningen av utskrivna linjer. Det rekommenderas att underhåll utförs på skrivhuvudet. Detta kräver rengöring av skrivhuvudet på skrivaren för att möjliggöra utskrifter av hög kvalitet.
Global.gridTitle.USBDevices = Den här fliken visar alla USB-enheter som inte är konfigurerade för att anslutas till basenheten och som därför är okända och oväntade. Enheter som visas kan vara obehöriga eller möjliggöra ett potentiellt säkerhetshot.
