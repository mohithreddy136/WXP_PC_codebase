graphHeaders.Disk_Capacity_Forecasting.Summary.desc_1 = 디스크 용량 계획 보고서는 디스크 공간이 사전 지정된 임계값에 도달하기까지 남은 시간을 미리 예측합니다. 임계값은 보고서 필터에서 선택할 수 있으며, 0~10%, 0~20%, 0~30%, 0~40%, 0~50%로 지정되어 있습니다.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_10 = 3+. 디스크 공간이 최소 3개월 이상 정상입니다.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_11 = 해당 없음. 현재 디스크 공간은 정상이지만, 디스크 공간이 임계값에 도달하기까지 남은 시간을 미리 예측하기에는 데이터가 충분하지 않습니다
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_2 = 보고서는 지난 3~6개월 동안의 데이터를 사용하여 디스크 용량이 보고서 필터에 설정된 임계값에 도달하기까지 남은 시간을 확인합니다. 디스크 용량 상태의 상위 수준 분류는 다음과 같습니다.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_3 = 즉시. 남은 디스크 공간이 임계값에 도달했습니다.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_4 = 1개월 내. 디스크 공간이 1개월 이내에 임계값에 도달합니다.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_5 = 2개월 내. 디스크 공간이 2개월 이내에 임계값에 도달합니다.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_6 = 3개월 내. 디스크 공간이 3개월 이내에 임계값에 도달합니다.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_7 = 정상. 디스크 공간은 추가 상태 열의 정보에 따라 최소 1개월, 2개월 또는 3개월 동안 정상일 수 있습니다.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_8 = 1+. 디스크 공간이 최소 1개월 이상 정상입니다.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_9 = 2+. 디스크 공간이 최소 2개월 이상 정상입니다.
