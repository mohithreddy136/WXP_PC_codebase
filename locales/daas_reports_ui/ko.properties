Global.gridTitle.forCashDrawer = 1. For Cash Drawer Alert Type = Open Time exceeded.
Global.gridTitle.forCashDrawer_line1 = 이 탭에 표시된 Cash Drawer를 여는 데 걸리는 시간으로 설정한 임계값을 초과했습니다. POS 레인을 부주의하게 관리했거나 의심스러운 활동이 발생했을 수 있습니다.
Global.gridTitle.forCashDrawer_line2 = 2. Cash Drawer 알림 유형 = Cash Drawer 수동 열림.
Global.gridTitle.forCashDrawer_line3 = 이 탭에 표시된 Cash Drawer가 서랍을 여는 POS 소프트웨어 트랜잭션 없이 수동으로 열렸습니다. POS 소프트웨어 외부에서 잠재적 트랙잭션이 이루어졌거나 도난이 발생했을 수 있습니다.
Global.gridTitle.forCashDrawer_line4 = 3. Cash Drawer 알림 유형 = 승인 시간 외 열림.
Global.gridTitle.forCashDrawer_line5 = 이 탭에 표시된 Cash Drawer가 구성된 표준 작동 시간이 아닌 시간에 열렸습니다. 예정에 없던 시간에 Cash Drawer에 접근이 있었다는 의미이며, 잠재적으로 의심스러운 이벤트를 강조합니다.
Global.gridTitle.forCashDrawer_line6 = 1. Cash Drawer 알림 유형 = 열기 시간 초과.
Global.gridTitle.kniefCutsTabs = 나이프 컷의 사용량이 증가한 영수증 프린터 목록입니다. 필요에 따라 프린터 나이프를 점검받고 수리받는 것이 좋습니다. 프린터 나이프가 영수증을 쉽게 자를 수 있을 만큼 여전히 날카로운지 확인하고 필요에 따라 칼을 갈고 교체해야 합니다.
Global.gridTitle.msrTabs = 양호한 읽기 사용량이 증가한 자기띠 판독기 목록입니다. 판독기를 청소하는 것이 좋습니다. 판독기가 계속 작동하려면 카드 슬롯에 쌓인 이물질과 축적물을 제거해야 합니다.
Global.gridTitle.peripheralClaimingError = 이 탭에 나와 있는 주변기기는 아래 테이블에 강조 표시된 여러 이유로 인해 주변 장치에서 통계를 수집하는 데 문제가 있습니다. 여기에는 POS 소프트웨어를 실행 중인 주변기기 클레임, HP Peripheral Agent의 적절한 구성 등과의 충돌이 포함됩니다.
Global.gridTitle.peripheralThresholdMet = 이 탭에는 예정 사용 수명 임계값을 초과한 주변기기(스캐너, 자기띠 판독기, 영수증 프린터)가 강조 표시됩니다. 이는 주변 장치가 사용 기간에 따라 고장 위험이 상대적으로 높아질 수 있다는 점을 나타냅니다. 로그 데이터 클래스에서 데이터를 추출해도 되고, 설정된 임계값 보고서에서 데이터를 추출해도 됩니다. 더 편리한 방법으로 작업할 수 있습니다. 데이터는 모두 동일합니다.
Global.gridTitle.printedLineTabs = This is the list of Receipt Printers that have reached an increment of usage for printed lines in which it is recommended that that the Printhead is serviced. This entails cleaning the printhead of the printer to enable high quality outputs.
Global.gridTitle.printedLineTabs = 인쇄된 라인의 사용량이 증가한 영수증 프린터 목록입니다. 인쇄 헤드를 서비스받는 것이 좋습니다. 고품질 출력이 가능하도록 프린터의 인쇄 헤드를 세척해야 합니다.
Global.gridTitle.USBDevices = 이 탭에는 기본 유닛에 연결되도록 구성되지 않아 알 수 없고 예상할 수 없는 모든 USB 장치가 강조 표시됩니다. 표시된 장치는 권한이 없을 수 있고, 잠재적인 보안 위협을 강조할 수 있습니다.
