graphHeaders.Disk_Capacity_Forecasting.Summary.desc_1 = Planlægningsrapporten for diskkapacitet forudser den tid, der er tilbage, før diskpladsen når en forudbestemt grænseværdi. Grænseværdierne kan vælges i rapportfiltrene og defineres som 0-10 %, 0-20 %, 0-30 %, 0-40 % og 0-50 %.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_10 = 3+. Diskpladsen er OK i mindst 3 måneder
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_11 = I/R. Diskpladsen er OK indtil videre, men der er ikke tilstrækkeligt med data til at vurdere, hvor lang tid der er tilbage, før diskpladsen når grænseværdien.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_2 = Rapporten bruger data for de seneste 3-6 måneder til at fastslå den tid, der er tilbage, inden diskkapaciteten når den grænseværdi, der er fastsat i rapportfilteret. Topniveaukategoriseringerne for status for diskkapacitet er som følger:
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_3 = Omgående. Den resterende diskplads har nået grænseværdien
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_4 = Inden for 1 måned. Diskpladsen når grænseværdien inden for 1 måned
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_5 = Inden for 2 måneder. Diskpladsen når grænseværdien inden for 2 måneder
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_6 = Inden for 3 måneder. Diskpladsen når grænseværdien inden for 3 måneder
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_7 = OK. Diskpladsen er muligvis OK for mindst de næste 1, 2 eller 3 måneder afhængigt af oplysningerne fra kolonnen med yderligere status.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_8 = 1+. Diskpladsen er OK i mindst 1 måned
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_9 = 2+. Diskpladsen er OK i mindst 2 måneder
