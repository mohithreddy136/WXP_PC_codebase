valueReminderEmail_serviceRemediation_storageSpaceHealth_line24 = Din bærbare computer er beregnet til at bruge cloud-lager, da dette giver den bedste ydeevne. I stedet for at frigøre plads på harddisken til Windows-opdateringen ved at slette filer på computeren kan du flytte filerne til skyen.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line3 = Søg efter Windows Update-indstillinger i Windows.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line4 = Klik på indstillingerne for Windows Update på listen med resultater for at åbne vinduet Windows Update.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line5 = Vinduet Windows Update vises, og herefter startes Windows-opdateringen automatisk.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line6 = Windows-opdateringen registrerer, at opdateringen kræver mere harddiskplads, og åbner vinduet Windows har brug for plads.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line7 = Klik på Frigør plads.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line8 = Klik på en kategori i vinduet Lagerbrug for at slette unødvendige filer.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line9 = Søg efter Diskoprydning i Windows, og åbn programmet.
