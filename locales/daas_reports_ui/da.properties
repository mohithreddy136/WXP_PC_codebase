valueReminderEmail_serviceRemediation_storageSpaceHealth_line2 = Hvis du vil installere opdateringer til din version af Windows 10, skal du have 1 GB ledig plads på harddisken og et USB-flashdrev med 16 GB. Windows 10-opsætningen gør det muligt at slette overflødige filer på harddisken direkte i programmet Indstillinger ved hjælp af installationsvejledningen til Diskoprydning. Hvis det er muligt, kan du også gemme data i skyen (online) i stedet for at frigøre plads på harddisken.
