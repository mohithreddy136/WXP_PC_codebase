Global.gridTitle.forCashDrawer = 1. For Cash Drawer Alert Type = Open Time exceeded.
Global.gridTitle.forCashDrawer_line1 = Kontantskuffer, der vises på denne fane, har overskredet deres konfigurerede tærskel for åbning. Dette vil fremhæve uagtsomhed og potentiel mistænkelig aktivitet for deres POS-bane.
Global.gridTitle.forCashDrawer_line2 = 2. For advarselstypen kontantskuffe = Manuel kontantskuffe åben.
Global.gridTitle.forCashDrawer_line3 = Kontantskuffer vist på denne fane blev åbnet manuelt uden at en POS-softwaretransaktion udløste, at kassen skulle åbne. Dette ville indikere en potentiel transaktion, der finder sted uden for POS-softwaren eller en potentiel tabsaktivitet.
Global.gridTitle.forCashDrawer_line4 = 3. For advarselstypen kontantskuffe = Åbnet i uautoriserede timer.
Global.gridTitle.forCashDrawer_line5 = Kontantskuffer vist på denne fane blev åbnet uden for de konfigurerede standarddriftstimer. Dette ville indikere, at der var adgang til en kontantskuffe i en periode, hvor den ikke forventedes at blive åbnet, hvilket fremhæver en potentiel mistænkelig hændelse.
Global.gridTitle.forCashDrawer_line6 = 1. For advarselstypen kontantskuffe = Åben tid overskredet.
Global.gridTitle.kniefCutsTabs = Dette er en liste over modtagerprintere, som har nået et belastningstrin i antal knivskæringer. Det anbefales af printerknive efterses og serviceres efter behov. Det anbefales at kontrollere, at printerknive stadig er tilpas skarp til nemt at kunne skære modtagelser og at den skærpes eller udskiftes efter behov.
Global.gridTitle.msrTabs = Dette er en liste over Magnetiske kortlæsere, som har nået et belastningstrin for gode aflæsninger. Det anbefales, at aflæseren renses. Dette kræver rensning af kortåbningen for at fjerne skidt og ophobninger for fortsat at kunne udføre aflæsninger.
Global.gridTitle.peripheralClaimingError = Der er problemer med at vise statistik over indsamling for de eksterne enheders, som fremgår af listen herunder. Dette omfatter konflikter med at søge efter eksternt udstyr med POS-software, korrekt konfigurering af HP Peripheral Agent med mere.
Global.gridTitle.peripheralThresholdMet = Denne fane fremhæver perifert udstyr (scannere, magnetstribelæsere og kvitteringsprintere), der har overskredet deres forventede brugstærskel for levetid, hvilket indikerer, at den eksterne enhed har en relativt højere risiko for fejl på grund af brugsalderen. Uanset om det er at udtrækning af data fra logfiler om dataklasse eller fra en allerede oprettet rapport om grænser, fungerer den metode, som er nemmest. I sidste ende er det de samme data.
Global.gridTitle.printedLineTabs = This is the list of Receipt Printers that have reached an increment of usage for printed lines in which it is recommended that that the Printhead is serviced. This entails cleaning the printhead of the printer to enable high quality outputs.
Global.gridTitle.printedLineTabs = Dette er en liste over Modtagerprintere, som har nået et belastningstrin i antal udskrevne linjer. Det anbefales, at skrivehovedet serviceres. Dette kræver rensning af printerens skrivehoved for at gøre udskrivning i høj kvalitet muligt.
Global.gridTitle.USBDevices = Denne fane fremhæver enhver USB-enhed, der ikke er konfigureret til at blive tilsluttet baseenheden og derfor er ukendt og uventet. Enheder, der vises, kan være uautoriserede eller fremhæve en potentiel sikkerhedstrussel.
