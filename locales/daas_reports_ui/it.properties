Global.gridTitle.forCashDrawer = 1. For Cash Drawer Alert Type = Open Time exceeded.
Global.gridTitle.forCashDrawer_line1 = I cassetti contanti mostrati in questa scheda hanno superato il proprio limite temporale configurato di apertura. Ciò potrebbe indicare una negligenza e un'attività potenzialmente sospetta per la postazione POS.
Global.gridTitle.forCashDrawer_line2 = 2. Per il tipo avviso per cassetti contanti = Apertura manuale cassetto contanti.
Global.gridTitle.forCashDrawer_line3 = I cassetti contanti mostrati in questa scheda sono stati aperti manualmente senza una transazione software POS che ne attivi l’apertura. Ciò potrebbe indicare una potenziale transazione esterna al software POS o una potenziale attività di sottrazione.
Global.gridTitle.forCashDrawer_line4 = 3. Per il tipo avviso per cassetti contanti = Apertura durante ore non autorizzate.
Global.gridTitle.forCashDrawer_line5 = I cassetti contanti mostrati in questa scheda sono rimasti aperti al di fuori delle ore di apertura standard configurate. Ciò potrebbe indicare che un cassetto contanti è stato aperto in un orario in cui avrebbe dovuto rimanere chiuso, mostrando un evento potenzialmente sospetto.
Global.gridTitle.forCashDrawer_line6 = 1. Per il tipo avviso per cassetti contanti = Tempo di apertura superato.
Global.gridTitle.kniefCutsTabs = Questo è l'elenco delle stampanti di ricevute che hanno raggiunto un incremento di utilizzo per i tagli con lama. Si raccomanda che la lama della stampante sia ispezionata e revisionata come necessario. Ciò richiede di controllare che la lama della stampante sia ancora sufficientemente affilata per tagliare facilmente le ricevute e di affilarla e sostituirla se necessario.
Global.gridTitle.msrTabs = Questo è un elenco di lettori di bande magnetiche che hanno raggiunto un incremento di utilizzo per letture di qualità. Si raccomanda di pulire il lettore. Ciò richiede la pulizia dello slot per scheda dai detriti e dagli accumuli per consentire un funzionamento continuato del lettore.
Global.gridTitle.peripheralClaimingError = Le periferiche mostrate in questa scheda stanno avendo problemi con le statistiche da dispositivi periferici che vengono raccolti a causa di una serie di ragioni diverse evidenziate nella tabella sottostante. Questo include i conflitti con la rivendicazione della periferica con il software POS, la corretta configurazione del HP Peripheral Agent, e altro ancora.
Global.gridTitle.peripheralThresholdMet = Questa scheda evidenzia periferiche (scanner, lettori di bande magnetiche e stampanti per ricevute) che hanno superato la propria durata di vita prevista e che pertanto presentano un maggiore rischio di guasto a causa dell'età. Che si tratti di estrarre i dati dalla classe dei dati di log o da un rapporto di soglia stabilito, qualsiasi operazione risulti più facile funzionerebbe. In definitiva sono sempre gli stessi dati.
Global.gridTitle.printedLineTabs = This is the list of Receipt Printers that have reached an increment of usage for printed lines in which it is recommended that that the Printhead is serviced. This entails cleaning the printhead of the printer to enable high quality outputs.
Global.gridTitle.printedLineTabs = Questo è l’elenco delle stampanti di ricevute che hanno raggiunto un incremento di utilizzo per le linee stampate. Si raccomanda la manutenzione della testina di stampa. Ciò richiede la pulizia della testina di stampa della stampante per consentire di eseguire stampe di alta qualità.
Global.gridTitle.USBDevices = Questa scheda evidenzia qualsiasi dispositivo USB non configurato per la connessione all’unità base e che risulta pertanto sconosciuto e imprevisto. I dispositivi mostrati potrebbero non essere autorizzati o evidenziare una potenziale minaccia per la sicurezza.
