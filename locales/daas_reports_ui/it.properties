valueReminderEmail_serviceRemediation_startupPerformance_line17 = Nella finestra Pulizia disco, fare clic su Pulisci file di sistema
valueReminderEmail_serviceRemediation_startupPerformance_line18 = Selezionare l'unità C: quindi attendere durante la ricerca da parte della app dei file da eliminare.
valueReminderEmail_serviceRemediation_startupPerformance_line19 = Selezionare Installazioni Windows precedenti e File di installazione di Windows temporanei, quindi fare clic su OK.
valueReminderEmail_serviceRemediation_startupPerformance_line2 = Trovare e installare il software e i driver hardware aggiornati per il computer.
valueReminderEmail_serviceRemediation_startupPerformance_line20 = Disinstallazione delle applicazioni inutilizzate
valueReminderEmail_serviceRemediation_startupPerformance_line21 = Cercare "eliminare un programma" in Windows, quindi fare clic su Cambia o elimina un programma nei risultati.
valueReminderEmail_serviceRemediation_startupPerformance_line22 = Fare clic su un'app che non serve più, quindi fare clic su Disinstalla.
valueReminderEmail_serviceRemediation_startupPerformance_line23 = Visitare
valueReminderEmail_serviceRemediation_startupPerformance_line3 = In Windows, cercare e aprire Windows Update.
valueReminderEmail_serviceRemediation_startupPerformance_line4 = Fare clic su una delle seguenti opzioni, se visualizzate, nella finestra di Windows Update:
valueReminderEmail_serviceRemediation_startupPerformance_line5 = Se gli aggiornamenti sono disponibili per il download, fare clic su Installa ora.
valueReminderEmail_serviceRemediation_startupPerformance_line6 = Se nell'elenco non sono presenti aggiornamenti, fare clic su Verifica disponibilità aggiornamenti, quindi su Installa ora una volta rilevati gli aggiornamenti disponibili in Windows.
valueReminderEmail_serviceRemediation_startupPerformance_line7 = Eseguire la pulizia del sistema e del disco rigido
valueReminderEmail_serviceRemediation_startupPerformance_line8 = Elimina file inutilizzati: Cercare pulizia disco in Windows
valueReminderEmail_serviceRemediation_startupPerformance_line9 = Fare clic su Pulizia disco nei risultati
valueReminderEmail_serviceRemediation_storageSpaceHealth_line1 = Creare spazio sull’unità disco rigido
valueReminderEmail_serviceRemediation_storageSpaceHealth_line10 = Selezionare la casella di controllo Installazione precedente di Windows, quindi fare clic su OK.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line11 = Viene visualizzato un messaggio di avviso.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line12 = Fare clic su Sì per completare la pulizia delle precedenti installazioni di Windows.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line13 = Nella finestra "Windows ha bisogno di più spazio", nella parte A, fare clic sull'icona Aggiorna.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line14 = Al termine dell'aggiornamento, lo stato sarà Completato Vai alle visualizzazioni della parte B nella parte A.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line15 = Inserire un'unità flash o collegare un disco rigido esterno con 16 GB di spazio di archiviazione disponibile.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line16 = Se il messaggio "Completato" non viene visualizzato nella parte A, è necessario più spazio per l'aggiornamento di Windows.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line17 = Fare clic su Libera spazio per eliminare altri file.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line18 = Fare clic su Continua.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line19 = Nella finestra visualizzata, fare clic su Chiudi.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line2 = Per installare gli aggiornamenti della versione di Windows 10, sono necessari 10 GB di spazio libero su disco rigido e un'unità flash USB da 16 GB. L'installazione di Windows 10 include un'opzione per eliminare i file non necessari sul disco rigido direttamente dall'app Impostazioni mediante la procedura guidata Pulizia disco. Se disponibile, un'alternativa per liberare spazio su disco è archiviare i dati nel cloud (online).
valueReminderEmail_serviceRemediation_storageSpaceHealth_line20 = In Windows, cercare le impostazioni di Windows Update.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line21 = Nell'elenco dei risultati, fare clic su Impostazioni di Windows Update per aprire la finestra di Windows Update.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line22 = Sotto l'intestazione "È stato pianificato un riavvio", scegliere un orario per riavviare Windows per procedere con l'aggiornamento o fare clic su Riavvia ora per iniziare immediatamente l'aggiornamento.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line23 = Libera spazio utilizzando il cloud (archiviazione online)
valueReminderEmail_serviceRemediation_storageSpaceHealth_line24 = Per prestazioni ottimali, il PC notebook è destinato all'uso con archiviazione cloud. In alternativa all'eliminazione dei file sul computer per liberare più spazio sul disco rigido per l'aggiornamento di Windows, è possibile spostare i file nel cloud.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line3 = In Windows, cercare le impostazioni di Windows Update.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line4 = Nell'elenco dei risultati, fare clic su Impostazioni di Windows Update per aprire la finestra di Windows Update.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line5 = Viene visualizzata la finestra di Windows Update e l'aggiornamento inizia automaticamente.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line6 = L'aggiornamento di Windows rileva che è necessario più spazio di archiviazione per l'aggiornamento e apre una finestra.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line7 = Fare clic su Libera spazio.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line8 = Nella finestra Utilizzo memoria, fare clic su una categoria per eliminare i file non necessari.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line9 = In Windows, cercare e aprire Pulizia disco.
