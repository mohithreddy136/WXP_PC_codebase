graphHeaders.Disk_Capacity_Forecasting.Summary.desc_1 = Il rapporto Pianificazione capacità disco segnala preventivamente il tempo rimasto prima che lo spazio su disco raggiunga una soglia predeterminata. È possibile selezionare le soglie nei filtri del rapporto, definite come 0-10%, 0-20%, 0-30%, 0-40% e 0-50%.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_10 = 3+. Lo spazio su disco non darà problemi per almeno 3 mesi
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_11 = N/D. Lo spazio su disco per il momento non darà problemi, ma non sono disponibili dati sufficienti per prevedere il tempo rimasto prima che lo spazio su disco raggiunga la soglia predeterminata
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_2 = Il rapporto utilizza i dati degli ultimi 3-6 mesi per stabilire il tempo rimasto prima che la capacità del disco raggiunga la soglia impostata nel filtro del rapporto. Le principali classificazioni per lo stato della capacità del disco sono le seguenti:
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_3 = Immediato. Lo spazio su disco rimanente ha raggiunto la soglia predeterminata
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_4 = Entro 1 mese. Lo spazio su disco raggiungerà la soglia predeterminata entro 1 mese
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_5 = Entro 2 mesi. Lo spazio su disco raggiungerà la soglia predeterminata entro 2 mesi
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_6 = Entro 3 mesi. Lo spazio su disco raggiungerà la soglia predeterminata entro 3 mesi
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_7 = OK. Lo spazio su disco non darà problemi per almeno i prossimi 1, 2 o 3 mesi, a seconda delle informazioni nella colonna dello stato aggiuntivo
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_8 = 1+. Lo spazio su disco non darà problemi per almeno 1 mese
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_9 = 2+. Lo spazio su disco non darà problemi per almeno 2 mesi
