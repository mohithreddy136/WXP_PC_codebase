valueReminderEmail_serviceRemediation_memoryUtilization_line3 = Do reset Windows 10 to increase computer performance
valueReminderEmail_serviceRemediation_memoryUtilization_line4 = 停用 Windows 中的背景執行程式
valueReminderEmail_serviceRemediation_memoryUtilization_line5 = 透過修改 Windows 中的虛擬記憶體設定來提高電腦效能
valueReminderEmail_serviceRemediation_memoryUtilization_line6 = 以下建議應有助於解決記憶體問題。
valueReminderEmail_serviceRemediation_memoryUtilization_line7 = 如需更多資訊，請造訪
valueReminderEmail_serviceRemediation_softwareErrors_line1 = 更新至最新軟體 (非 Microsoft Windows)
valueReminderEmail_serviceRemediation_softwareErrors_line2 = 應將引起問題的軟體更新至最新版本，以修復已知的效能和錯誤。
valueReminderEmail_serviceRemediation_softwareErrors_line3 = 更新您的 Windows 作業系統軟體
valueReminderEmail_serviceRemediation_softwareErrors_line4 = 尋找 Windows 10 更新相關問題的最新資訊，以及在電腦上安裝更新之前建議採取的動作
valueReminderEmail_serviceRemediation_startupPerformance_line1 = 使用「Windows 更新」更新驅動程式和軟體
valueReminderEmail_serviceRemediation_startupPerformance_line10 = 選取 C: 磁碟，然後等待應用程式掃描可刪除的檔案。
valueReminderEmail_serviceRemediation_startupPerformance_line11 = 某些檔案類型是預先選擇的。若想瞭解各個檔案類型，請在清理前按一下檔案名稱以查看相關說明。
valueReminderEmail_serviceRemediation_startupPerformance_line12 = 您也可以選取資源回收筒以將其清空。
valueReminderEmail_serviceRemediation_startupPerformance_line13 = 按一下「確定」以刪除所選檔案。
valueReminderEmail_serviceRemediation_startupPerformance_line14 = 嘗試使用外接硬碟
valueReminderEmail_serviceRemediation_startupPerformance_line15 = 可考慮將大型檔案 (例如高解析度相片、音樂和影片) 移至外部硬碟。
valueReminderEmail_serviceRemediation_startupPerformance_line16 = 刪除 Windows 安裝檔 (已升級至 Windows 10 的電腦)
valueReminderEmail_serviceRemediation_startupPerformance_line17 = 在「磁碟清理」視窗中，按一下 [清理系統檔]
valueReminderEmail_serviceRemediation_startupPerformance_line18 = 選取 C: 磁碟，然後等待應用程式掃描可刪除的檔案。
valueReminderEmail_serviceRemediation_startupPerformance_line19 = 選取「先前的 Windows 安裝」和「臨時 Windows 安裝檔案」(如有出現)，然後按一下「確定」。
valueReminderEmail_serviceRemediation_startupPerformance_line2 = 針對您的電腦尋找及安裝已更新的軟體和硬體驅動程式。
valueReminderEmail_serviceRemediation_startupPerformance_line20 = 解除安裝未使用的應用程式
valueReminderEmail_serviceRemediation_startupPerformance_line21 = 在 Windows 中搜尋要刪除的程式，然後按一下「變更」或在搜尋結果中刪除程式。
valueReminderEmail_serviceRemediation_startupPerformance_line22 = 按一下不再需要的應用程式，然後按一下「解除安裝」。
valueReminderEmail_serviceRemediation_startupPerformance_line23 = 請造訪
valueReminderEmail_serviceRemediation_startupPerformance_line3 = 在 Windows 中，搜尋並開啟「Windows 更新」。
valueReminderEmail_serviceRemediation_startupPerformance_line4 = 在「Windows 更新」視窗中按一下以下其中一個選項 (如有出現):
valueReminderEmail_serviceRemediation_startupPerformance_line5 = 如果有更新可供下載，請按一下「立即安裝」。
valueReminderEmail_serviceRemediation_startupPerformance_line6 = 如果目前沒有列出任何更新，請按一下「檢查更新」，當 Windows 偵測到可用更新後，再按一下「立即安裝」。
valueReminderEmail_serviceRemediation_startupPerformance_line7 = 執行系統和硬碟清理
valueReminderEmail_serviceRemediation_startupPerformance_line8 = 刪除不需要的檔案: 在 Windows 中搜尋磁碟清理
valueReminderEmail_serviceRemediation_startupPerformance_line9 = 在結果中按一下「磁碟清理」
valueReminderEmail_serviceRemediation_storageSpaceHealth_line1 = 釋出硬碟空間
valueReminderEmail_serviceRemediation_storageSpaceHealth_line10 = 選取「先前的 Windows 安裝」核取方塊，然後按一下「確定」。
valueReminderEmail_serviceRemediation_storageSpaceHealth_line11 = 警告訊息隨即顯示。
valueReminderEmail_serviceRemediation_storageSpaceHealth_line12 = 按一下「是」以完成先前 Windows 安裝的清理。
valueReminderEmail_serviceRemediation_storageSpaceHealth_line13 = 在「Windows 需要更多空間」視窗中的 A 部分下方，按一下「重新整理」圖示。
valueReminderEmail_serviceRemediation_storageSpaceHealth_line14 = 重新整理完成後，則表示狀態「已完成!」移至 A 部分下的 B 部分顯示。
valueReminderEmail_serviceRemediation_storageSpaceHealth_line15 = 插入隨身碟或連接外接硬碟 (需具備 16 GB 可用儲存空間)。
valueReminderEmail_serviceRemediation_storageSpaceHealth_line16 = 如果 A 部分下未顯示「已完成!」訊息，則表示 Windows 更新需要更多空間。
valueReminderEmail_serviceRemediation_storageSpaceHealth_line17 = 按一下「釋出空間」以刪除其他檔案。
valueReminderEmail_serviceRemediation_storageSpaceHealth_line18 = 按一下「繼續」。
valueReminderEmail_serviceRemediation_storageSpaceHealth_line19 = 在「即將完成」視窗中，按一下「關閉」。
valueReminderEmail_serviceRemediation_storageSpaceHealth_line2 = 若要安裝 Windows 10 版本更新，您需要 10 GB 的可用硬碟空間和 16 GB 的 USB 隨身碟。Windows 10 的設定包含一個選項，可透過「磁碟清理」精靈直接從「設定」應用程式刪除硬碟中不需要的檔案。如果可行，另一種釋出磁碟空間的方式就是將資料儲存到雲端 (線上)。
valueReminderEmail_serviceRemediation_storageSpaceHealth_line20 = 在 Windows 中搜尋「Windows 更新」設定。
valueReminderEmail_serviceRemediation_storageSpaceHealth_line21 = 在結果清單中，按一下「Windows 更新」設定」以開啟「Windows 更新」視窗。
valueReminderEmail_serviceRemediation_storageSpaceHealth_line22 = 在「已排程重新啟動」標題下，選擇重新啟動 Windows 的時間以繼續進行升級，或按一下「立即重新啟動」以立即開始更新。
valueReminderEmail_serviceRemediation_storageSpaceHealth_line23 = 使用雲端 (線上儲存空間) 以釋出空間
valueReminderEmail_serviceRemediation_storageSpaceHealth_line24 = 為能獲得最佳效能，應讓您的筆記型電腦搭配雲端儲存空間一同使用。除了刪除電腦中的檔案以釋出更多硬碟空間進行 Windows 更新以外，您也可以將檔案移至雲端。
valueReminderEmail_serviceRemediation_storageSpaceHealth_line3 = 在 Windows 中搜尋「Windows 更新」設定。
valueReminderEmail_serviceRemediation_storageSpaceHealth_line4 = 在結果清單中，按一下「Windows 更新」設定」以開啟「Windows 更新」視窗。
valueReminderEmail_serviceRemediation_storageSpaceHealth_line5 = 接著會顯示「Windows 更新」視窗並自動開始執行 Windows 更新。
valueReminderEmail_serviceRemediation_storageSpaceHealth_line6 = Windows 更新偵測到需要更多儲存空間才能完成更新，並開啟「Windows 需要更多空間」視窗。
valueReminderEmail_serviceRemediation_storageSpaceHealth_line7 = 按一下「釋出空間」。
valueReminderEmail_serviceRemediation_storageSpaceHealth_line8 = 在「儲存空間使用量」視窗中，對任一類別按一下即可刪除不需要的檔案。
valueReminderEmail_serviceRemediation_storageSpaceHealth_line9 = 在 Windows 中，搜尋並開啟「磁碟清理」。
