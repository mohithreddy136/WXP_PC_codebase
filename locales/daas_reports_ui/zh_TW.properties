Global.gridTitle.forCashDrawer = 1. For Cash Drawer Alert Type = Open Time exceeded.
Global.gridTitle.forCashDrawer_line1 = 此索引標籤中顯示的收銀機已超過其設定的打開時間臨界值。這將凸顯出其 POS 通道的疏忽和潛在可疑活動。
Global.gridTitle.forCashDrawer_line2 = 2. 針對收銀機警示類型 = 手動打開收銀機。
Global.gridTitle.forCashDrawer_line3 = 此索引標籤中顯示的收銀機為手動打開，而非透過 POS 軟體交易觸發所打開。這可能表示其並非 POS 軟體產生的交易，或存在潛在的損失風險。
Global.gridTitle.forCashDrawer_line4 = 3. 針對收銀機警示類型 = 未經授權的事件。
Global.gridTitle.forCashDrawer_line5 = 此索引標籤中顯示的收銀機是在設定的標準營業時間之外被打開的。這表示收銀機是在非預期使用時間內被打開，代表可能發生可疑事件。
Global.gridTitle.forCashDrawer_line6 = 1. 針對收銀機警示類型 = 超過打開時間。
Global.gridTitle.kniefCutsTabs = 這是刀切數已達到使用增量的收據印表機清單。建議視需要檢查和維修印表機裁切刀。這需要檢查印表機裁切刀是否仍足夠鋒利以順利裁切收據，並視需要進行磨刀或更換。
Global.gridTitle.msrTabs = 這是良好讀取次數已達到使用增量的磁條讀卡機清單。建議清潔讀卡機。這需要清理讀卡機插槽中的灰塵與堆積物，以確保讀卡機持續正常運作。
Global.gridTitle.peripheralClaimingError = 此索引標籤中顯示的周邊設備因下表所列的各種原因，導致無法收集周邊裝置的統計資料。這包括與 POS 軟體的周邊設備權利要求衝突、HP Peripheral Agent 的正確設定問題，以及其他情況。
Global.gridTitle.peripheralThresholdMet = 此索引標籤會標示已超過預期使用壽命臨界值的周邊設備 (掃描器、磁條讀卡機及收據印表機)，表示該周邊裝置因使用年限而面臨較高的故障風險。無論是從記錄資料類別中擷取資料，還是從既有的臨界值報告中取得，就以最為方便的方式進行即可。最後都會得到相同的資料。
Global.gridTitle.printedLineTabs = This is the list of Receipt Printers that have reached an increment of usage for printed lines in which it is recommended that that the Printhead is serviced. This entails cleaning the printhead of the printer to enable high quality outputs.
Global.gridTitle.printedLineTabs = 這是列印行數已達到使用增量的收據印表機清單。建議對列印頭進行維修。這需要清潔印表機的列印頭，以確保高品質的輸出。
Global.gridTitle.USBDevices = 此索引標籤會標示任何未配置為連接至基本裝置，因此被視為是未知且非預期的 USB 裝置。顯示的裝置可能是未經授權的，或可能表示潛在的安全威脅。
