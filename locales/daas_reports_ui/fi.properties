Global.gridTitle.forCashDrawer = 1. For Cash Drawer Alert Type = Open Time exceeded.
Global.gridTitle.forCashDrawer_line1 = Tässä välilehdessä näytetyt kassalaatikot ovat ylittäneet aukipitoajalleen määritetyn aikarajan. Tämä viittaa laiminlyöntiin ja mahdolliseen epäilyttävään toimintaan kyseisellä kassalla.
Global.gridTitle.forCashDrawer_line2 = 2. Kassalaatikon hälytystyyppi = manuaalinen kassalaatikon avaaminen.
Global.gridTitle.forCashDrawer_line3 = Tässä välilehdessä näytetyt kassalaatikot avattiin manuaalisesti ilman, että kassaohjelmiston maksutapahtuma olisi avannut kassalaatikon. Tämä viittaa mahdolliseen maksutapahtumaan, joka on tehty kassaohjelmiston ulkopuolella tai mahdolliseen tappioita aiheuttavaan toimintaan.
Global.gridTitle.forCashDrawer_line4 = 3. Kassalaatikon hälytystyyppi = avattu luvallisen ajan ulkopuolella.
Global.gridTitle.forCashDrawer_line5 = Tässä välilehdessä näytetyt kassalaatikot avattiin määritetyn aukioloajan ulkopuolella. Toisin sanoen kassalaatikko avattiin odottamattomaan aikaan, mikä saattaa viitata epäilyttävään tapahtumaan.
Global.gridTitle.forCashDrawer_line6 = 1. Kassalaatikon hälytystyyppi = aukipitoaika ylittyi.
Global.gridTitle.kniefCutsTabs = Tämä on luettelo kuittitulostimista, joilla on tietty määrä leikkauskertoja. Tulostimen terä on suositeltavaa tarkastaa ja huoltaa tarvittaessa. Tulostimen terän on oltava riittävän terävä leikkaamaan kuitit helposti, ja se pitää teroittaa ja vaihtaa tarvittaessa.
Global.gridTitle.msrTabs = Tämä on luettelo magneettiraitalukijoista, joilla on tietty määrä lukukertoja. Lukija on suositeltavaa puhdistaa. Korttiurasta pitää puhdistaa roskat ja kertynyt lika, jotta lukija toimisi edelleen.
Global.gridTitle.peripheralClaimingError = Tämän välilehden oheislaitteista kerätyissä tilastotiedoissa on ongelmia eri syistä, jotka kuvataan seuraavassa taulukossa. Tämä sisältää ristiriidat oheislaitteen haltuunotossa kassapääteohjelmistolla, HP Peripheral Agent -sovelluksen oikeiden määritysten tekemisen ja muuta.
Global.gridTitle.peripheralThresholdMet = Tällä välilehdellä näytetään oheislaitteet (skannerit, magneettiraitalukijat ja kuittitulostimet), jotka ovat ylittäneet odotetun käyttöikärajansa. Se tarkoittaa, että oheislaitteen vikaantumisriski on tavanomaista suurempi sen käyttöiän takia. Haluttiinpa kerätä tietoja lokitietoluokasta tai vakiintuneesta raja-arvoraportista, mikä vain on helpointa. Loppujen lopuksi kyse on samoista tiedoista.
Global.gridTitle.printedLineTabs = This is the list of Receipt Printers that have reached an increment of usage for printed lines in which it is recommended that that the Printhead is serviced. This entails cleaning the printhead of the printer to enable high quality outputs.
Global.gridTitle.printedLineTabs = Tämä on luettelo kuittitulostimista, joilla on tulostettu tietty määrä rivejä. Tulostuspää on suositeltavaa huoltaa. Tulostimen tulostuspää pitää puhdistaa, jotta sillä voi tulostaa laadukkaita tulosteita.
Global.gridTitle.USBDevices = Tällä välilehdellä näytetään USB-laitteet, joita ei ole määritetty yhdistettäväksi perusyksikköön, minkä takia ne ovat tuntemattomia ja odottamattomia. Näytetyt laitteet voivat olla luvattomia tai mahdollisia tietoturvauhkia.
