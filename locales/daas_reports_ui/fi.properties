graphHeaders.User_Mobility_Factor.Summary.desc_1 = Käyttäjien liikkuvuustiedot laitteen maantieteelliseen sijaintiin perustuen.
graphHeaders.User_Mobility_Factor.Summary.desc_2 = Käyttäjän liikkuvuuskerroin tietyllä ajanjaksolla perustuu useisiin monitahoisiin liikkuvuuden käytösmalleihin. Osa käyttäjistä esimerkiksi matkustaa jatkuvasti eri paikkoihin sama laite tai erilaisia laitteita mukanaan, toiset matkustavat usein kahden tai kolmen eri paikan välillä laitteidensa kanssa ja toiset puolestaan liikkuvat jatkuvasti lyhyitä matkoja laitteidensa kanssa. Käyttäjän liikkuvuuskertoimen luomiseen käytetään käyttäjien HP TechPulse Proactive Managementin kautta hallinnoitujen laitteiden maantieteellisiä sijainteja, ei ulkoisista lähteistä saatavia käyttäjän sijaintitietoja.
graphHeaders.User_Mobility_Factor.Summary.desc_3 = Laitteiden maantieteellisen sijainnin seurantaan käytettävät sijaintipalvelut ovat oletuksena poissa käytöstä kaikilla asiakkailla, ja asiakkaille tarjotaan mahdollisuus ottaa sijaintipalvelut käyttöön tai poistaa ne käytöstä pilvipohjaisessa HP TechPulse Proactive Management -portaalissa. Vaikka sijaintipalvelut olisi kytketty päälle, HP TechPulse Proactive Management ei salli sijaintitietojen keräämistä laitteista, jotka on luokiteltu työntekijöiden omistamiksi tai henkilökohtaisiksi laitteiksi (pilvipohjaisen HP TechPulse Proactive Management -portaalin kautta).
graphHeaders.User_Mobility_Factor.Summary.desc_4 = Käyttäjän liikkuvuuskerroin on arvo väliltä 1–10, ja se on suhteellinen arvo verrattuna kaikkiin analytiikan ja ennakoivan hallinnan laitteisiin. Arvo 1 tarkoittaa, että käyttäjän laitteet ovat vähiten liikkuvia, ja arvo 10 tarkoittaa, että ne ovat liikkuvimpia. Arvo -1 ilmaisee, että käyttäjän laitteista ei ole saatavana sijaintitietoja.
graphHeaders.User_Mobility_Factor.Summary.desc_5 = Käyttäjän liikkuvuuskertoimen analyysi on ajastettu suoritettavaksi kerran jokaisen kuukauden alussa. Viimeisin ajastettu suorituskerta oli {last_scheduled_date}
