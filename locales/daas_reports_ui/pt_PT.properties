Global.gridTitle.forCashDrawer = 1. For Cash Drawer Alert Type = Open Time exceeded.
Global.gridTitle.forCashDrawer_line1 = As gavetas registadoras apresentadas neste separador excederam o limiar de tempo configurado para a caixa registadora estar aberta. Isto destacaria a negligência e uma potencial atividade suspeita para o POS.
Global.gridTitle.forCashDrawer_line2 = 2. Para tipo de alerta de gaveta registadora = abertura manual de gaveta registadora.
Global.gridTitle.forCashDrawer_line3 = As gavetas registadoras apresentadas neste separador foram abertas manualmente sem uma transação de software POS acionar a abertura da caixa registadora. Isto indicaria uma potencial transação ocorrendo fora do software POS ou uma potencial atividade de perda.
Global.gridTitle.forCashDrawer_line4 = 3. Para tipo de alerta de gaveta registadora = aberta durante horário não autorizado.
Global.gridTitle.forCashDrawer_line5 = As gavetas registadoras apresentadas neste separador foram abertas fora do horário de funcionamento normal configurado. Isto indicaria que uma gaveta registadora foi acedida durante um horário em que não era suposto ser acedida, destacando um potencial evento suspeito.
Global.gridTitle.forCashDrawer_line6 = 1. Para tipo de alerta de gaveta registadora = tempo de abertura excedido.
Global.gridTitle.kniefCutsTabs = Esta é a lista de impressoras de recibos que atingiram um incremento de utilização relativo aos cortes da lâmina. É recomendada a inspeção e manutenção da lâmina da impressora, conforme necessário. Isto requer verificar se a lâmina da impressora está afiada o suficiente para cortar facilmente recibos e afiar e substituir, conforme necessário.
Global.gridTitle.msrTabs = Esta é a lista de leitores de cartões magnéticos que atingiram um incremento de utilização relativo a boas leituras. É recomendada a limpeza do leitor. Isto requer limpar os resíduos e detritos da ranhura para cartões para permitir o desempenho contínuo do leitor.
Global.gridTitle.peripheralClaimingError = Os periféricos neste separador apresentam problemas com as estatísticas de dispositivos periféricos recolhidas devido a uma variedade de diferentes razões sublinhadas na seguinte tabela. Isto inclui conflitos com a solicitação de periféricos com software de ponto de venda a retalho, configuração adequada do HP Peripheral Agent entre outros.
Global.gridTitle.peripheralThresholdMet = Este separador destaca os periféricos (scanners, leitores de banda magnética e impressoras de recibos) que excederam o limiar de utilização da vida útil esperada, o que indica que o dispositivo periférico tem um risco relativamente superior de falhar devido à idade de utilização. Quer seja para extrair dados de uma classe de dados de registo ou de um relatório de limiar estabelecido, o que for mais fácil irá funcionar. Em última análise, são os mesmos dados.
Global.gridTitle.printedLineTabs = This is the list of Receipt Printers that have reached an increment of usage for printed lines in which it is recommended that that the Printhead is serviced. This entails cleaning the printhead of the printer to enable high quality outputs.
Global.gridTitle.printedLineTabs = Esta é a lista de impressoras de recibos que atingiram um incremento de utilização relativo às linhas impressas. É recomendada a manutenção da cabeça de impressão. Isto requer a limpeza da cabeça de impressão da impressora para obter resultados de elevada qualidade.
Global.gridTitle.USBDevices = Este separador destaca qualquer dispositivo USB que não esteja configurado para ser ligado à unidade base e é desconhecido e inesperado. Os dispositivos apresentados podem ser dispositivos não autorizados ou serem uma potencial ameaça à segurança.
