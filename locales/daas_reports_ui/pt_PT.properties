valueReminderEmail_serviceRemediation_firewallProtection_line2 = Deverá executar sempre a Firewall do Windows Defender, mesmo que tenha uma outra firewall ativada. Desativar a Firewall do Windows Defender pode tornar o dispositivo (e a rede, se tiver uma) mais vulnerável a acessos não autorizados.
valueReminderEmail_serviceRemediation_firewallProtection_line3 = Para ligar e desligar o Firewall do Windows Defender, selecione o botão Iniciar.
valueReminderEmail_serviceRemediation_firewallProtection_line4 = Selecione Definições -> Atualização e Segurança -> Segurança do Windows -> Firewall e proteção de rede.
valueReminderEmail_serviceRemediation_firewallProtection_line5 = Selecione um perfil de rede.
valueReminderEmail_serviceRemediation_firewallProtection_line6 = Em Firewall do Windows Defender, selecione Ligar ou Desligar.
valueReminderEmail_serviceRemediation_firewallProtection_line7 = Se o dispositivo estiver ligado a uma rede, as definições das políticas da rede poderão impedir a execução destes passos.
valueReminderEmail_serviceRemediation_firewallProtection_line8 = Para mais informações, contacte o seu administrador. Para mais informações, visite:
valueReminderEmail_serviceRemediation_HPSureClickAdvanced_line1 = Dispositivos HP
valueReminderEmail_serviceRemediation_HPSureClickAdvanced_line2 = HP Sure Click is available on most HP PCs and supports Microsoft® Internet Explorer, Google Chrome, and Chromium™. Supported attachments include Microsoft Office (Word, Excel, PowerPoint) and PDF files in read-only mode, when Microsoft Office or Adobe Acrobat are installed.
valueReminderEmail_serviceRemediation_HPSureSenseAdvanced_line1 = Dispositivos HP
valueReminderEmail_serviceRemediation_HPSureSenseAdvanced_line2 = O HP Sure Sense requer o Windows 10. Consulte a disponibilidade nas especificações do produto.
valueReminderEmail_serviceRemediation_HPSureStart_line1 = Dispositivos HP
valueReminderEmail_serviceRemediation_HPSureStart_line2 = O HP Sure Start já está configurado e ativado para que a maioria dos utilizadores possa utilizar a configuração predefinida do HP Sure Start.
valueReminderEmail_serviceRemediation_memoryUtilization_line1 = Problemas de memória
valueReminderEmail_serviceRemediation_memoryUtilization_line2 = Tente ajustar a forma como o computador usa os recursos de memória
valueReminderEmail_serviceRemediation_memoryUtilization_line3 = Do reset Windows 10 to increase computer performance
valueReminderEmail_serviceRemediation_memoryUtilization_line4 = Desative os programas a correr em segundo plano no Windows
valueReminderEmail_serviceRemediation_memoryUtilization_line5 = Aumente o desempenho do computador alterando as definições de memória virtual no Windows
valueReminderEmail_serviceRemediation_memoryUtilization_line6 = As recomendações que se seguem devem ajudar a solucionar problemas de memória.
valueReminderEmail_serviceRemediation_memoryUtilization_line7 = Para mais informações, visite:
valueReminderEmail_serviceRemediation_softwareErrors_line1 = Atualizar para o software mais recente (sem ser Microsoft Windows)
valueReminderEmail_serviceRemediation_softwareErrors_line2 = O software que está a causar problemas deve ser atualizado para as versões mais recentes para resolver problemas de desempenho e erros conhecidos.
valueReminderEmail_serviceRemediation_softwareErrors_line3 = Atualizar o software do SO Windows
valueReminderEmail_serviceRemediation_softwareErrors_line4 = Encontre as informações mais recentes para problemas relacionados com a atualização do Windows 10, junto com sugestões sobre ações a realizar antes de instalar a atualização no PC
valueReminderEmail_serviceRemediation_startupPerformance_line1 = Atualize os controladores e o software com o Windows Update
valueReminderEmail_serviceRemediation_startupPerformance_line10 = Selecione a unidade C: se solicitado, aguarde enquanto a aplicação procura os ficheiros para eliminar.
valueReminderEmail_serviceRemediation_startupPerformance_line11 = Alguns tipos de ficheiros são pré-selecionados. Para obter mais informações sobre cada tipo de ficheiro, clique no nome para ver uma descrição antes de efetuar a limpeza.
valueReminderEmail_serviceRemediation_startupPerformance_line12 = Também pode selecionar Reciclagem para esvaziar a mesma.
valueReminderEmail_serviceRemediation_startupPerformance_line13 = Clique em OK para eliminar os ficheiros selecionados.
valueReminderEmail_serviceRemediation_startupPerformance_line14 = Tente usar uma unidade de disco rígido externa
valueReminderEmail_serviceRemediation_startupPerformance_line15 = Considere mover itens de grande tamanho, como fotografias, música e vídeos de alta resolução para uma unidade de disco externa.
valueReminderEmail_serviceRemediation_startupPerformance_line16 = Elimine os ficheiros de instalação do Windows (computadores atualizados para o Windows 10)
valueReminderEmail_serviceRemediation_startupPerformance_line17 = Na janela Limpeza do Disco, clique em Limpar ficheiros do sistema
valueReminderEmail_serviceRemediation_startupPerformance_line18 = Selecione a unidade C: aguarde enquanto a aplicação procura os ficheiros para eliminar.
valueReminderEmail_serviceRemediation_startupPerformance_line19 = Selecione os ficheiros de instalação de Instalação(ões) anterior(es) do Windows e de Ficheiros Temporários do Windows, se existentes, e depois clique em OK.
valueReminderEmail_serviceRemediation_startupPerformance_line2 = Encontre e instale controladores de software e hardware atualizados para o computador.
valueReminderEmail_serviceRemediation_startupPerformance_line20 = Desinstale aplicações não utilizadas
valueReminderEmail_serviceRemediation_startupPerformance_line21 = Pesquise o Windows para eliminar um programa e depois clique em Alterar ou eliminar um programa nos resultados.
valueReminderEmail_serviceRemediation_startupPerformance_line22 = Clique numa aplicação que já não precisa, e clique em Desinstalar.
valueReminderEmail_serviceRemediation_startupPerformance_line23 = Visite
valueReminderEmail_serviceRemediation_startupPerformance_line3 = No Windows, procure e abra o Windows Update.
valueReminderEmail_serviceRemediation_startupPerformance_line4 = Clique numa das seguintes opções, se apresentada, na janela do Windows Update:
valueReminderEmail_serviceRemediation_startupPerformance_line5 = Se estiverem disponíveis atualizações para serem descarregadas, clique em Instalar agora.
valueReminderEmail_serviceRemediation_startupPerformance_line6 = Se não forem mostradas atualizações na lista, clique em Procurar atualizações; em seguida, clique em Instalar agora após o Windows detetar as atualizações disponíveis.
valueReminderEmail_serviceRemediation_startupPerformance_line7 = Realizar uma limpeza do sistema e do disco rígido
valueReminderEmail_serviceRemediation_startupPerformance_line8 = Eliminar ficheiros desnecessários: Procure a limpeza do disco no Windows
valueReminderEmail_serviceRemediation_startupPerformance_line9 = Clique em Limpeza da Unidade de Disco Rígido nos resultados
valueReminderEmail_serviceRemediation_storageSpaceHealth_line1 = Liberte espaço na unidade de disco rígido
valueReminderEmail_serviceRemediation_storageSpaceHealth_line10 = Selecione a caixa de seleção Instalação(ões) anterior(es) do Windows e depois clique em OK.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line11 = É exibida uma mensagem de erro.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line12 = Clique em Sim para concluir a limpeza das instalações anteriores do Windows.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line13 = Na janela O windows necessita de mais espaço, em Parte A, clique no ícone Atualizar.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line14 = Assim que concluir a Atualização, o estado fica Concluído! Vá para a Parte B exibida abaixo da Parte A.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line15 = Insira a unidade USB ou ligue uma unidade de disco externa com 16 GB de espaço de armazenamento livre.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line16 = Se a mensagem Concluído! não for exibida na Parte A, é necessário mais espaço para concluir a atualização do Windows.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line17 = Clique em Libertar espaço para eliminar mais ficheiros.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line18 = Clique em Continuar.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line19 = Na janela Quase concluído, clique em Fechar.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line2 = Para instalar as atualizações da versão do Windows 10 precisa de 10 GB de espaço livre na unidade de disco rígido e de uma unidade flash USB de 16 GB. A configuração do Windows 10 inclui uma opção para eliminar ficheiros desnecessários da unidade de disco rígido diretamente na aplicação Definições utilizando o assistente de Limpeza do disco. Se disponível, uma alternativa para libertar espaço na unidade de disco rígido é armazenar dados na nuvem (online).
valueReminderEmail_serviceRemediation_storageSpaceHealth_line20 = No Windows, procure as definições do Windows Update.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line21 = Na lista de resultados, clique nas definições de Windows Update para abrir a janela de atualizações do Windows.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line22 = No título Foi agendado um reinício, selecione uma hora para reiniciar o Windows para continuar com a atualização ou clique em Reiniciar agora para iniciar a atualização de imediato.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line23 = Liberte espaço utilizando a Nuvem (Armazenamento Online)
valueReminderEmail_serviceRemediation_storageSpaceHealth_line24 = Para um desempenho ideal, o seu notebook deverá ser utilizado com o armazenamento na nuvem. Como alternativa à eliminação de ficheiros do seu computador para libertar mais espaço no disco rígido para a atualização do Windows, pode mover ficheiros para a nuvem.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line3 = No Windows, procure as definições do Windows Update.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line4 = Na lista de resultados, clique nas definições de Windows Update para abrir a janela de atualizações do Windows.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line5 = É exibida a janela Windows Update e a atualização começa automaticamente.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line6 = O Windows Update deteta que é necessário mais espaço para a atualização, e abre a janela O Windows necessita de mais espaço.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line7 = Clique em Libertar espaço.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line8 = Na janela utilização de Armazenamento, clique numa categoria para libertar ficheiros desnecessários.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line9 = No Windows, procure e abra Limpeza do disco.
