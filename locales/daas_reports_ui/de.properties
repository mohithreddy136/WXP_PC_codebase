valueReminderEmail_serviceRemediation_encryptionProtection_line1 = Wenn auf Ihrem Computer keine Geräteverschlüsselung verfügbar ist, können Sie stattdessen die Verschlüsselung mit BitLocker aktivieren.
valueReminderEmail_serviceRemediation_encryptionProtection_line2 = Suchen Sie in Windows nach "Systeminformationen".
valueReminderEmail_serviceRemediation_encryptionProtection_line3 = Klicken Sie in der Ergebnisliste mit der rechten Maustaste auf die App.
valueReminderEmail_serviceRemediation_encryptionProtection_line4 = Wählen Sie "Als Administrator ausführen" aus.
valueReminderEmail_serviceRemediation_encryptionProtection_line5 = Wählen Sie im Fenster "Systeminformationen" die Option "Systemübersicht" aus.
valueReminderEmail_serviceRemediation_encryptionProtection_line6 = Führen Sie einen Bildlauf nach unter in der Liste zu "Unterstützung der Geräteverschlüsselung" durch.
valueReminderEmail_serviceRemediation_encryptionProtection_line7 = Ist die Geräteverschlüsselung verfügbar und wird in der Spalte "Wert" angezeigt, dass die Anforderungen oder Voraussetzungen erfüllt sind, aktivieren Sie die Verschlüsselung.
valueReminderEmail_serviceRemediation_encryptionProtection_line8 = Wenn die Geräteverschlüsselung nicht verfügbar ist, aktivieren Sie BitLocker.
valueReminderEmail_serviceRemediation_encryptionProtection_line9 = For more details please visit
valueReminderEmail_serviceRemediation_firewallProtection_line1 = Windows Defender Firewall aktivieren oder deaktivieren
valueReminderEmail_serviceRemediation_firewallProtection_line2 = Sie sollten immer die Windows Defender Firewall ausführen, selbst wenn eine andere Firewall aktiv ist. Wenn Sie die Windows Defender Firewall deaktivieren, vermindern Sie den Schutz Ihres Geräts (und Ihres Netzwerks, falls vorhanden) vor unbefugtem Zugriff.
valueReminderEmail_serviceRemediation_firewallProtection_line3 = Um die Windows Defender Firewall zu aktivieren oder zu deaktivieren, wählen Sie die Schaltfläche "Start" aus.
valueReminderEmail_serviceRemediation_firewallProtection_line4 = Wählen Sie "Einstellungen -> Update und Sicherheit -> Windows Sicherheit -> Firewall und Netzwerkschutz".
valueReminderEmail_serviceRemediation_firewallProtection_line5 = Wählen Sie ein Netzwerkprofil aus.
valueReminderEmail_serviceRemediation_firewallProtection_line6 = Ändern Sie unter "Windows Defender Firewall" die Einstellung in "Ein" oder "Aus".
valueReminderEmail_serviceRemediation_firewallProtection_line7 = Wenn Ihr Gerät mit einem Netzwerk verbunden ist, verhindern die Netzwerkrichtlinieneinstellungen möglicherweise, dass Sie diese Schritte ausführen.
valueReminderEmail_serviceRemediation_firewallProtection_line8 = Weitere Informationen erhalten Sie von Ihrem Administrator. Weitere Details finden Sie unter
valueReminderEmail_serviceRemediation_HPSureClickAdvanced_line1 = HP Geräte
valueReminderEmail_serviceRemediation_HPSureClickAdvanced_line2 = HP Sure Click is available on most HP PCs and supports Microsoft® Internet Explorer, Google Chrome, and Chromium™. Supported attachments include Microsoft Office (Word, Excel, PowerPoint) and PDF files in read-only mode, when Microsoft Office or Adobe Acrobat are installed.
valueReminderEmail_serviceRemediation_HPSureSenseAdvanced_line1 = HP Geräte
valueReminderEmail_serviceRemediation_HPSureSenseAdvanced_line2 = HP Sure Sense erfordert Windows 10. Informationen zur Verfügbarkeit enthalten die Produktspezifikationen.
valueReminderEmail_serviceRemediation_HPSureStart_line1 = HP Geräte
valueReminderEmail_serviceRemediation_HPSureStart_line2 = HP Sure Start ist konfiguriert und bereits aktiviert, sodass die meisten Benutzer die Standardkonfiguration von HP Sure Start verwenden können.
valueReminderEmail_serviceRemediation_memoryUtilization_line1 = Probleme mit dem Arbeitsspeicher
valueReminderEmail_serviceRemediation_memoryUtilization_line2 = Versuchen Sie, die Verwendung von Arbeitsspeicherressourcen durch Ihren Computer anzupassen
valueReminderEmail_serviceRemediation_memoryUtilization_line3 = Do reset Windows 10 to increase computer performance
valueReminderEmail_serviceRemediation_memoryUtilization_line4 = Deaktivieren Sie Programm, die in Windows im Hintergrund ausgeführt werden
valueReminderEmail_serviceRemediation_memoryUtilization_line5 = Steigern Sie die Computerleistung durch eine Änderung der Einstellungen für virtuellen Arbeitsspeicher in Windows
valueReminderEmail_serviceRemediation_memoryUtilization_line6 = Mit den folgenden Empfehlungen sollten Sie Probleme mit dem Arbeitsspeicher lösen können.
valueReminderEmail_serviceRemediation_memoryUtilization_line7 = Weitere Informationen finden Sie unter
valueReminderEmail_serviceRemediation_softwareErrors_line1 = Auf die neueste Software aktualisieren (andere Software als Microsoft Windows)
valueReminderEmail_serviceRemediation_softwareErrors_line2 = Die Software, die Probleme verursacht, sollte auf die neueste Version aktualisiert werden, um bekannte Probleme und Fehler zu beheben.
valueReminderEmail_serviceRemediation_softwareErrors_line3 = Windows Betriebssystemsoftware aktualisieren
valueReminderEmail_serviceRemediation_softwareErrors_line4 = Suchen Sie nach den aktuellsten Informationen zu Problemen im Zusammenhang mit Windows 10 Updates sowie nach Hinweisen zu durchzuführenden Maßnahmen, bevor sie das Update auf Ihrem PC installieren.
valueReminderEmail_serviceRemediation_startupPerformance_line1 = Aktualisieren Sie Treiber und Software mit Windows Update
valueReminderEmail_serviceRemediation_startupPerformance_line10 = Wählen Sie das Laufwerk C: bei der entsprechenden Aufforderung aus und warten Sie, während die App nach zu löschenden Dateien sucht.
valueReminderEmail_serviceRemediation_startupPerformance_line11 = Einige Dateitypen sind bereits ausgewählt. Wenn Sie Informationen zu einem Dateityp wünschen, klicken Sie vor der Bereinigung auf den entsprechenden Namen, um eine Beschreibung anzuzeigen.
valueReminderEmail_serviceRemediation_startupPerformance_line12 = Sie können auch "Papierkorb" auswählen, um diesen zu leeren.
valueReminderEmail_serviceRemediation_startupPerformance_line13 = Klicken Sie auf OK, um die ausgewählten Dateien zu löschen.
valueReminderEmail_serviceRemediation_startupPerformance_line14 = Verwenden Sie eine externe Festplatte
valueReminderEmail_serviceRemediation_startupPerformance_line15 = Möglicherweise ist es sinnvoll, sehr große Dateien wie Fotos mit hoher Auflösung, Musikstücke und Videos auf einer externen Festplatte zu speichern.
valueReminderEmail_serviceRemediation_startupPerformance_line16 = Windows Installationsdateien löschen (auf Windows 10 aktualisierte Computer)
valueReminderEmail_serviceRemediation_startupPerformance_line17 = Klicken Sie im Fenster "Datenträgerbereinigung" auf "Systemdateien bereinigen"
valueReminderEmail_serviceRemediation_startupPerformance_line18 = Wählen Sie das Laufwerk C: aus und warten Sie, während die App nach zu löschenden Dateien sucht.
valueReminderEmail_serviceRemediation_startupPerformance_line19 = Wählen Sie "Vorherige Windows-Installation(en)" und "Temporäre Windows-Installationsdateien" aus, falls vorhanden, und klicken Sie auf OK.
valueReminderEmail_serviceRemediation_startupPerformance_line2 = Suchen Sie nach aktualisierten Software- und Hardwaretreibern für Ihren Computer und installieren Sie diese.
valueReminderEmail_serviceRemediation_startupPerformance_line20 = Deinstallieren Sie nicht verwendete Apps
valueReminderEmail_serviceRemediation_startupPerformance_line21 = Suchen Sie in Windows nach "Programm entfernen" und klicken Sie in den Ergebnissen auf "Programm ändern oder entfernen".
valueReminderEmail_serviceRemediation_startupPerformance_line22 = Klicken Sie auf eine App, die Sie nicht mehr benötigen, und klicken Sie anschließend auf "Deinstallieren".
valueReminderEmail_serviceRemediation_startupPerformance_line23 = Besuchen Sie
valueReminderEmail_serviceRemediation_startupPerformance_line3 = Suchen Sie in Windows nach "Windows Update" und öffnen Sie das Programm.
valueReminderEmail_serviceRemediation_startupPerformance_line4 = Klicken Sie im Windows Update-Fenster auf eine der folgenden Optionen, falls vorhanden:
valueReminderEmail_serviceRemediation_startupPerformance_line5 = Falls Updates für den Download verfügbar sind, klicken Sie auf "Jetzt installieren".
valueReminderEmail_serviceRemediation_startupPerformance_line6 = Wenn keine Updates aufgelistet werden, klicken Sie auf "Nach Updates suchen". Werden verfügbare Updates gefunden, klicken Sie auf "Jetzt installieren".
valueReminderEmail_serviceRemediation_startupPerformance_line7 = Bereinigung des Systems und der Festplatte ausführen
valueReminderEmail_serviceRemediation_startupPerformance_line8 = Nicht benötigte Dateien löschen: Durchsuchen Sie Windows nach "Datenträgerbereinigung"
valueReminderEmail_serviceRemediation_startupPerformance_line9 = Klicken Sie in den Ergebnissen auf "Datenträgerbereinigung"
valueReminderEmail_serviceRemediation_storageSpaceHealth_line1 = Geben Sie Speicherplatz auf der Festplatte frei
valueReminderEmail_serviceRemediation_storageSpaceHealth_line10 = Aktivieren Sie das Kontrollkästchen "Vorherige Windows Installation(en)", und klicken Sie dann auf "OK".
valueReminderEmail_serviceRemediation_storageSpaceHealth_line11 = Ein Warnhinweis wird angezeigt.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line12 = Klicken Sie auf "Ja", um die Bereinigung vorheriger Windows Installationen abzuschließen.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line13 = Klicken Sie im Fenster "Windows benötigt mehr Speicherplatz" unter Teil A auf das Symbol "Aktualisieren".
valueReminderEmail_serviceRemediation_storageSpaceHealth_line14 = Nach der Aktualisierung ist der Status "Abgeschlossen". Unter Teil A werden Sie aufgefordert, zu Teil B zu wechseln.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line15 = Legen Sie ein Flash-Laufwerk ein oder schließen Sie eine externe Festplatte mit 16 GB freiem Speicherplatz an.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line16 = Wenn die Meldung "Abgeschlossen" nicht unter Teil A angezeigt wird, ist für das Windows Update mehr Speicherplatz erforderlich.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line17 = Klicken Sie auf "Speicherplatz freigeben", um weitere Dateien zu löschen.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line18 = Klicken Sie auf Weiter.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line19 = Klicken Sie im Fenster "Fast geschafft" auf "Schließen".
valueReminderEmail_serviceRemediation_storageSpaceHealth_line2 = Um die Windows 10 Versionsupdates zu installieren, benötigen Sie 10 GB freien Festplattenspeicher und ein USB-Flash-Laufwerk mit 16 GB. Das Windows 10 Setup bietet direkt über die App "Einstellungen" mit dem Assistenten für die Datenträgerbereinigung eine Option zum Löschen nicht benötigter Dateien auf Ihrer Festplatte. Eine Alternative zum Freigeben von Festplattenspeicher könnte ggf. das Speichern von Daten in der Cloud (online) sein.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line20 = Suchen Sie in Windows nach "Windows Update-Einstellungen".
valueReminderEmail_serviceRemediation_storageSpaceHealth_line21 = Klicken Sie in der Ergebnisliste auf "Windows Update-Einstellungen", um das Fenster "Windows Update" zu öffnen.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line22 = Wählen Sie unter "Ein Neustart wurde geplant" einen Zeitpunkt für den Windows Neustart aus, um das Update fortzusetzen, oder klicken Sie auf "Jetzt neu starten", um direkt das Update zu starten.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line23 = Geben Sie Speicherplatz mit der Cloud frei (Online-Speicher)
valueReminderEmail_serviceRemediation_storageSpaceHealth_line24 = Für eine optimale Leistung ist Ihr Notebook-PC zur Nutzung mit Cloud-Speicher konzipiert. Als Alternative zum Löschen von Dateien auf Ihrem Computer, um für das Windows Update Speicherplatz auf der Festplatte freizugeben, können Sie Dateien in die Cloud verschieben.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line3 = Suchen Sie in Windows nach "Windows Update-Einstellungen".
valueReminderEmail_serviceRemediation_storageSpaceHealth_line4 = Klicken Sie in der Ergebnisliste auf "Windows Update-Einstellungen", um das Fenster "Windows Update" zu öffnen.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line5 = Das Fenster "Windows Update" wird angezeigt und das Windows Update startet automatisch.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line6 = Windows Update hat festgestellt, dass für das Update mehr Speicherplatz benötigt wird, und öffnet das Fenster "Windows benötigt mehr Speicherplatz".
valueReminderEmail_serviceRemediation_storageSpaceHealth_line7 = Klicken Sie auf "Speicherplatz freigeben".
valueReminderEmail_serviceRemediation_storageSpaceHealth_line8 = Klicken Sie im Fenster "Speichernutzung" auf eine Kategorie, um unnötige Dateien zu löschen.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line9 = Suchen Sie in Windows nach "Datenträgerbereinigung" und öffnen Sie sie.
