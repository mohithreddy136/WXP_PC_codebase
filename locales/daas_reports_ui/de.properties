graphHeaders.Disk_Capacity_Forecasting.Summary.desc_1 = Der Bericht zur Planung der Festplattenkapazität prognostiziert die verbleibende Zeit, bis die Speicherkapazität einen festgelegten Grenzwert erreicht. Die Grenzwerte können in den Filtern der Berichte ausgewählt und als 0-10 %, 0-20 %, 0-30 %, 0-40 % und 0-50 % definiert werden.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_10 = 3+. Der Plattenspeicherplatz reicht für mindestens 3 Monate
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_11 = Nicht verfügbar. Der Plattenspeicherplatz reicht für den Moment aus, aber es sind nicht genügend Daten vorhanden, um die verbleibende Zeit zu bestimmen, bis der Plattenspeicherplatz den Grenzwert erreicht.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_2 = Der Bericht verwendet die Daten der letzten 3-6 Monate, um die verbleibende Zeit zu bestimmen, bis die Speicherkapazität den im Filter des Berichts festgelegten Grenzwert erreicht. Die obersten Kategorien für den Status der Festplattenkapazität sind wie folgt:
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_3 = Sofort. Der verbleibende Plattenspeicherplatz hat den Grenzwert erreicht
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_4 = Innerhalb von 1 Monat. Der Plattenspeicherplatz wird den Grenzwert innerhalb von 1 Monat erreichen
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_5 = Innerhalb von 2 Monaten. Der Plattenspeicherplatz wird den Grenzwert innerhalb von 2 Monaten erreichen
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_6 = Innerhalb von 3 Monaten. Der Plattenspeicherplatz wird den Grenzwert innerhalb von 3 Monaten erreichen
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_7 = OK. Der Plattenspeicherplatz kann abhängig von den Informationen in der Spalte "Zusätzlicher Status" noch für mindestens 1, 2 oder 3 Monate reichen
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_8 = 1+. Der Plattenspeicherplatz reicht für mindestens 1 Monat
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_9 = 2+. Der Plattenspeicherplatz reicht für mindestens 2 Monate
