Global.gridTitle.forCashDrawer = 1. For Cash Drawer Alert Type = Open Time exceeded.
Global.gridTitle.forCashDrawer_line1 = Die auf dieser Registerkarte aufgeführten Kassenschubladen haben den konfigurierten Schwellenwert für die Öffnungszeit überschritten. Dieser Alarm weist auf eine Nachlässigkeit und möglicherweise verdächtige Aktivität in der POS-Spur hin.
Global.gridTitle.forCashDrawer_line2 = 2. Alarmtyp Kassenschublade = Manuelle Öffnung der Kassenschublade.
Global.gridTitle.forCashDrawer_line3 = Die auf dieser Registerkarte aufgeführten Kassenschubladen wurden manuell geöffnet, ohne dass die Öffnung durch eine Transaktion der POS-Software ausgelöst wurde. Dieser Alarm weist auf eine potenzielle Transaktion außerhalb der POS-Software oder eine potenzielle Verlustaktivität hin.
Global.gridTitle.forCashDrawer_line4 = 3. Alarmtyp Kassenschublade = Öffnung außerhalb autorisierter Zeiten.
Global.gridTitle.forCashDrawer_line5 = Die auf dieser Registerkarte aufgeführten Kassenschubladen wurden außerhalb der konfigurierten Standardbetriebszeiten geöffnet. Dieser Alarm gibt an, dass zu einer Zeit auf eine Kassenschublade zugegriffen wurde, zu der der Zugriff nicht erwartet wurde. Dies weist auf ein potenziell verdächtiges Ereignis hin.
Global.gridTitle.forCashDrawer_line6 = 1. Alarmtyp Kassenschublade = Öffnungszeit überschritten.
Global.gridTitle.kniefCutsTabs = Dies ist die Liste der Belegdrucker, deren Nutzung in Bezug auf Messerschnitte einen bestimmten Wert erreicht hat. Es wird empfohlen, das Druckermesser zu untersuchen und bei Bedarf zu warten. Es muss überprüft werden, ob das Messer noch scharf genug ist, um Belege problemlos abzuschneiden. Ggf. muss es geschärft oder ausgetauscht werden.
Global.gridTitle.msrTabs = Dies ist die Liste der Magnetstreifen-Lesegeräte, deren Nutzung in Bezug auf hochwertige Lesevorgänge einen bestimmten Wert erreicht hat. Es wird empfohlen, das Lesegerät zu reinigen. Der Kartensteckplatz muss von Verunreinigungen und Rückständen befreit werden, um eine fortgesetzte hohe Leistung des Lesegeräts sicherzustellen.
Global.gridTitle.peripheralClaimingError = Bei den auf dieser Registerkarte angezeigten Peripheriegeräten gibt es Probleme mit der Erfassung der Statistiken von Peripheriegeräten, und zwar aus verschiedenen Gründen, die in der folgenden Tabelle aufgeführt sind. Dazu gehören Konflikte bei der Beanspruchung von Peripheriegeräten mit der POS-Software, die richtige Konfiguration des HP Peripheral Agent und mehr.
Global.gridTitle.peripheralThresholdMet = Auf dieser Registerkarte werden Peripheriegeräte (Scanner, Magnetstreifenleser und Belegdrucker) hervorgehoben, die den jeweiligen Schwellenwert für die erwartete Nutzungsdauer überschritten haben. Dadurch wird darauf hingewiesen, dass die Peripheriegeräte aufgrund des Nutzungsalters ein relativ hohes Ausfallrisiko aufweisen. Es ist unerheblich, ob die Daten aus der Klasse der Protokolldaten oder aus einem vorhandenen Schwellenwertbericht extrahiert werden, je nachdem, was einfacher ist. Letztlich handelt es sich um dieselben Daten.
Global.gridTitle.printedLineTabs = This is the list of Receipt Printers that have reached an increment of usage for printed lines in which it is recommended that that the Printhead is serviced. This entails cleaning the printhead of the printer to enable high quality outputs.
Global.gridTitle.printedLineTabs = Dies ist die Liste der Belegdrucker, deren Nutzung in Bezug auf gedruckte Zeilen einen bestimmten Wert erreicht hat. Es wird empfohlen, den Druckkopf zu warten. Eine Reinigung des Druckkopfs ist erforderlich, um eine hohe Qualität der Druckausgabe zu gewährleisten.
