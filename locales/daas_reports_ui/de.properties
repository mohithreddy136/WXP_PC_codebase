graphHeaders.User_Mobility_Factor.Summary.desc_1 = Die Mobilitätsaspekte von Benutzern basieren auf dem Standort ihrer Geräte.
graphHeaders.User_Mobility_Factor.Summary.desc_2 = Der Mobilitätsfaktor von Benutzern in einem bestimmten Zeitraum basiert auf verschiedenen, komplexen mobilitätsbezogenen Verhaltensmustern. Beispielsweise reisen einige Benutzer mit denselben oder unterschiedlichen Geräten bzw. Gerätetypen ständig an verschiedene Orte, während andere Benutzer mit ihren Geräten häufig zwischen zwei oder drei Orten hin- und herpendeln und wieder andere mit ihren Geräten regelmäßig kurze Strecken zurücklegen. Der Mobilitätsfaktor nutzt die Ortungsinformationen von für HP TechPulse Proactive Management registrierten Geräten anstelle von Informationen zum Benutzerstandort aus externen Quellen.
graphHeaders.User_Mobility_Factor.Summary.desc_3 = Die standortbezogenen Services zur Ortung von Geräten sind standardmäßig für alle Kunden deaktiviert. Kunden haben die Möglichkeit, die standortbezogenen Services im cloudbasierten HP TechPulse Proactive Management Portal zu aktivieren oder zu deaktivieren. Auch bei aktivierten standortbezogenen Services gestattet HP TechPulse Proactive Management keine Erfassung von Standortdaten für Geräte, die als mitarbeitereigene oder Privatgeräte klassifiziert sind (innerhalb des cloudbasierten HP TechPulse Proactive Management Portals).
graphHeaders.User_Mobility_Factor.Summary.desc_4 = Der Mobilitätsfaktor des Benutzers wird mit einem Rang zwischen 1 und 10 angegeben. Es handelt sich dabei um einen relativen Rang für alle Geräte in Analytics and Proactive Management. Ein Rang von 1 gibt an, dass die Geräte eines Benutzers so gut wie gar nicht mobil verwendet werden, während ein Rang von 10 angibt, dass die Geräte eines Benutzers äußerst mobil verwendet werden. Ein Rang von -1 gibt an, dass keine Standortdaten für die Geräte eines Benutzers erfasst wurden.
graphHeaders.User_Mobility_Factor.Summary.desc_5 = Die periodische Analyse des Mobilitätsfaktors des Benutzers wurde auf einmal am Anfang des Monats festgelegt. Die letzte geplante Ausführung war am {last_scheduled_date}
graphHeaders.User_Mobility_Factor.Summary.desc_6 = Aufgrund der monatlichen Ausführung werden Benutzer und Geräte, die nach der letzten geplanten Ausführung bei HP TechPulse Proactive Management angemeldet oder abgemeldet wurden, nicht in diesem Bericht aufgeführt.
