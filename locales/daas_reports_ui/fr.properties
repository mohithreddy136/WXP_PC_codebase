valueReminderEmail_serviceRemediation_deviceHealth_line1 = Support technique des ordinateurs HP
valueReminderEmail_serviceRemediation_deviceHealth_line2 = Si vous souhaitez qu’un vaste centre de connaissance vous aide à améliorer l’intégrité de votre périphérique, rendez-vous sur la page suivante :
valueReminderEmail_serviceRemediation_DevicesEnrolled_line1 = Télécharger le logiciel HP TechPulse
valueReminderEmail_serviceRemediation_DevicesEnrolled_line2 = Pour inscrire votre périphérique, il vous suffit de télécharger le logiciel HP TechPulse à partir de
valueReminderEmail_serviceRemediation_DevicesEnrolled_line3 = or
valueReminderEmail_serviceRemediation_diskHealth_line1 = Remplacez les disques dont la panne est prévue
valueReminderEmail_serviceRemediation_diskHealth_line2 = Il vous est recommandé de trouver des baies SSD/disques durs adaptés à votre ordinateur HP.
valueReminderEmail_serviceRemediation_diskHealth_line3 = Problèmes liés à un espace limité sur le disque
valueReminderEmail_serviceRemediation_diskHealth_line4 = Supprimez vos fichiers temporaires avec le Nettoyage de disque dans Windows.
valueReminderEmail_serviceRemediation_diskHealth_line5 = Réglez vos paramètres de restauration du système pour libérer l’espace sur le disque dur dans Windows.
valueReminderEmail_serviceRemediation_diskHealth_line6 = Essayez de libérer de l’espace supplémentaire sur le disque dur dans Windows 10 en supprimant les programmes non utilisés.
valueReminderEmail_serviceRemediation_diskHealth_line7 = For more information please visit
valueReminderEmail_serviceRemediation_diskHealth_line8 = To improve disk space
valueReminderEmail_serviceRemediation_diskHealth_line9 = For more information please visit
valueReminderEmail_serviceRemediation_driveroutofdate_line1 = Téléchargement ou mise à jour des logiciels et des pilotes des ordinateurs HP
valueReminderEmail_serviceRemediation_driveroutofdate_line2 = Pour préserver un fonctionnement fluide de votre ordinateur HP, mettez à jour régulièrement les logiciels.
valueReminderEmail_serviceRemediation_driveroutofdate_line3 = Veuillez consulter
valueReminderEmail_serviceRemediation_encryptionProtection_line1 = Si le cryptage de périphérique n’est pas disponible sur votre ordinateur, vous pouvez plutôt activer le cryptage BitLocker.
valueReminderEmail_serviceRemediation_encryptionProtection_line2 = Dans Windows, recherchez les Informations système
valueReminderEmail_serviceRemediation_encryptionProtection_line3 = Faites un clic droit sur l'application dans la liste des résultats.
valueReminderEmail_serviceRemediation_encryptionProtection_line4 = Sélectionnez Exécuter en tant qu’administrateur.
valueReminderEmail_serviceRemediation_encryptionProtection_line5 = Dans la fenêtre Informations système, sélectionnez Récapitulatif Système.
valueReminderEmail_serviceRemediation_encryptionProtection_line6 = Faites défiler la liste vers le bas pour retrouver l’assistance au cryptage du périphérique.
valueReminderEmail_serviceRemediation_encryptionProtection_line7 = Si le cryptage du périphérique est disponible et que la mention « Répond à la configuration requise » ou « Répond aux prérequis » est répertoriée dans la colonne Valeur, activez le cryptage.
valueReminderEmail_serviceRemediation_encryptionProtection_line8 = Si le cryptage du périphérique n’est pas disponible, activez BitLocker.
valueReminderEmail_serviceRemediation_encryptionProtection_line9 = For more details please visit
valueReminderEmail_serviceRemediation_firewallProtection_line1 = Activer ou désactiver le pare-feu Windows Defender
valueReminderEmail_serviceRemediation_firewallProtection_line2 = Vous devrez toujours exécuter le pare-feu Windows Defender même si vous avez activé un autre pare-feu. En désactivant le pare-feu Windows Defender, votre périphérique (et votre réseau, le cas échéant) peut devenir plus vulnérable face aux accès non autorisés.
valueReminderEmail_serviceRemediation_firewallProtection_line3 = Pour activer ou désactiver le pare-feu Windows Defender, sélectionnez le bouton Démarrer.
valueReminderEmail_serviceRemediation_firewallProtection_line4 = Sélectionnez Paramètres -> Mise à jour et Sécurité -> Sécurité Windows -> Pare-feu et protection du réseau.
valueReminderEmail_serviceRemediation_firewallProtection_line5 = Sélectionnez un profil réseau.
valueReminderEmail_serviceRemediation_firewallProtection_line6 = Dans le pare-feu Windows Defender, activez ou désactivez le paramètre.
valueReminderEmail_serviceRemediation_firewallProtection_line7 = Si votre périphérique est connecté à un réseau, des paramètres de politique réseau peuvent vous empêcher d’exécuter ces étapes.
valueReminderEmail_serviceRemediation_firewallProtection_line8 = Pour plus d’informations, contactez votre administrateur. Pour en savoir plus, veuillez consulter
valueReminderEmail_serviceRemediation_HPSureClickAdvanced_line1 = Périphériques HP
valueReminderEmail_serviceRemediation_HPSureClickAdvanced_line2 = HP Sure Click is available on most HP PCs and supports Microsoft® Internet Explorer, Google Chrome, and Chromium™. Supported attachments include Microsoft Office (Word, Excel, PowerPoint) and PDF files in read-only mode, when Microsoft Office or Adobe Acrobat are installed.
valueReminderEmail_serviceRemediation_HPSureSenseAdvanced_line1 = Périphériques HP
valueReminderEmail_serviceRemediation_HPSureSenseAdvanced_line2 = HP Sure Sense nécessite Windows 10. Voir les spécifications du produit pour connaître la disponibilité.
valueReminderEmail_serviceRemediation_HPSureStart_line1 = Périphériques HP
valueReminderEmail_serviceRemediation_HPSureStart_line2 = HP Sure Start est configuré et déjà activé de sorte que la plupart des utilisateurs puissent se servir de sa configuration par défaut.
valueReminderEmail_serviceRemediation_memoryUtilization_line1 = Problèmes de mémoire
valueReminderEmail_serviceRemediation_memoryUtilization_line2 = Essayer d'ajuster la manière dont votre ordinateur utilise les ressources mémoire
valueReminderEmail_serviceRemediation_memoryUtilization_line3 = Do reset Windows 10 to increase computer performance
valueReminderEmail_serviceRemediation_memoryUtilization_line4 = Désactiver les programmes qui s'exécutent en arrière-plan dans Windows
valueReminderEmail_serviceRemediation_memoryUtilization_line5 = Augmenter la performance de l’ordinateur en modifiant les paramètres de la mémoire virtuelle dans Windows
valueReminderEmail_serviceRemediation_memoryUtilization_line6 = Les recommandations suivantes devraient vous aider à résoudre les problèmes de mémoire.
valueReminderEmail_serviceRemediation_memoryUtilization_line7 = Pour en savoir plus, veuillez consulter
valueReminderEmail_serviceRemediation_softwareErrors_line1 = Mettre à jour avec le dernier logiciel (hors Microsoft Windows)
valueReminderEmail_serviceRemediation_softwareErrors_line2 = Le logiciel qui cause des problèmes doit être mis à jour aux dernières versions pour corriger les problèmes connus de performance et les bugs.
valueReminderEmail_serviceRemediation_softwareErrors_line3 = Mettre à jour le logiciel Windows OS
valueReminderEmail_serviceRemediation_softwareErrors_line4 = Retrouver les toutes dernières informations sur les problèmes liés à la mise à jour Windows 10 ainsi que des conseils sur les actions à entreprendre avant d'installer votre PC
valueReminderEmail_serviceRemediation_startupPerformance_line1 = Mettre à jour les pilotes et les logiciels avec Windows Update
valueReminderEmail_serviceRemediation_startupPerformance_line10 = Sélectionnez le lecteur C: lorsque vous y êtes invité, ensuite patientez pendant que l’application analyse les fichiers à supprimer.
valueReminderEmail_serviceRemediation_startupPerformance_line11 = Certains types de fichiers sont présélectionnés. Pour en savoir plus sur chaque type de fichier, cliquez sur le nom pour afficher une description avant le nettoyage.
valueReminderEmail_serviceRemediation_startupPerformance_line12 = Vous pouvez également sélectionner Corbeille pour la vider.
valueReminderEmail_serviceRemediation_startupPerformance_line13 = Cliquez sur OK pour supprimer les fichiers sélectionnés.
valueReminderEmail_serviceRemediation_startupPerformance_line14 = Essayer en utilisant un disque dur externe
valueReminderEmail_serviceRemediation_startupPerformance_line15 = Envisagez de déplacer les éléments présentant des tailles de fichier importantes, notamment les photos haute résolution, la musique et les vidéos, sur un disque dur externe.
valueReminderEmail_serviceRemediation_startupPerformance_line16 = Supprimer les fichiers d’installation Windows (ordinateurs mis à niveau vers Windows 10)
valueReminderEmail_serviceRemediation_startupPerformance_line17 = Dans la fenêtre Nettoyage du disque, cliquez sur Nettoyer les fichiers systèmes
valueReminderEmail_serviceRemediation_startupPerformance_line18 = Sélectionnez le lecteur C: ensuite patientez pendant que l’application analyse les fichiers à supprimer.
valueReminderEmail_serviceRemediation_startupPerformance_line19 = Cochez Installation(s) Windows précédentes et Fichiers d’installation Windows temporaires, le cas échéant, puis cliquez sur OK.
valueReminderEmail_serviceRemediation_startupPerformance_line2 = Retrouvez et installez les pilotes logiciels et matériels de votre ordinateur.
valueReminderEmail_serviceRemediation_startupPerformance_line20 = Désinstaller des applications inutiles
valueReminderEmail_serviceRemediation_startupPerformance_line21 = Recherchez Supprimer un programme dans Windows, puis cliquez sur Modifier ou supprimer un programme dans les résultats.
valueReminderEmail_serviceRemediation_startupPerformance_line22 = Cliquez sur une application dont vous n’avez plus besoin, puis cliquez sur Désinstaller.
valueReminderEmail_serviceRemediation_startupPerformance_line23 = Veuillez consulter
valueReminderEmail_serviceRemediation_startupPerformance_line3 = Dans Windows, recherchez et ouvrez Windows Update.
valueReminderEmail_serviceRemediation_startupPerformance_line4 = Cliquez sur l’une des options suivantes, le cas échéant, sur la fenêtre Windows Update :
valueReminderEmail_serviceRemediation_startupPerformance_line5 = Si des mises à jour sont disponibles au téléchargement, cliquez sur Installer maintenant.
valueReminderEmail_serviceRemediation_startupPerformance_line6 = Si aucune mise à jour n’est actuellement répertoriée, cliquez sur Vérifier les mises à jour, puis cliquez sur Installer maintenant, si Windows détecte des mises à jour disponibles.
valueReminderEmail_serviceRemediation_startupPerformance_line7 = Effectuer un nettoyage du système et du disque dur
valueReminderEmail_serviceRemediation_startupPerformance_line8 = Supprimer les fichiers inutiles : Rechercher Nettoyage de disque dans Windows
valueReminderEmail_serviceRemediation_startupPerformance_line9 = Cliquer sur Nettoyage de disque dans les résultats
valueReminderEmail_serviceRemediation_storageSpaceHealth_line1 = Libérer de l’espace sur le disque dur
valueReminderEmail_serviceRemediation_storageSpaceHealth_line10 = Cochez la case Installation(s) Windows précédente(s), puis cliquez sur OK.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line11 = Un message d'avertissement apparaît.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line12 = Cliquez sur Oui pour terminer le nettoyage des installations Windows précédentes.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line13 = Dans la fenêtre « Windows a besoin d’espace supplémentaire », dans la Partie A, cliquez sur l’icône Actualiser.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line14 = Une fois l’actualisation terminée, vous apercevez l’état « Terminé ! » Accédez aux affichages de la Partie B dans Partie A.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line15 = Insérez une unité flash ou fixez un disque dur externe avec 16 Go d’espace de stockage disponible.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line16 = Si le message « Terminé ! » n'apparaît pas dans la Partie A, cela signifie que davantage d'espace est requis pour la mise à jour Windows.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line17 = Cliquez sur Libérer de l’espace pour effacer des fichiers supplémentaires.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line18 = Cliquez sur Continuer.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line19 = Dans la fenêtre « Bientôt prêt », cliquez sur Fermer.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line2 = Pour installer les mises à jour de la version Windows 10, vous avez besoin de 10 Go d’espace libre sur le disque dur et de 16 Go d'unité flash USB. L'installation de Windows 10 comprend une option de suppression des fichiers inutiles sur votre disque dur directement à partir de l’application Paramètres, en utilisant l’assistant de Nettoyage de disque. Le cas échéant, il est également possible de libérer de l’espace sur le disque en stockant des données sur le cloud (en ligne).
valueReminderEmail_serviceRemediation_storageSpaceHealth_line20 = Dans Windows, recherchez les paramètres de Windows Update.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line21 = Dans la liste des résultats, cliquez sur les paramètres Windows Update pour ouvrir la fenêtre Windows Update.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line22 = Dans le libellé « Un redémarrage a été planifié », choisissez une heure pour le redémarrage Windows et pour procéder à la mise à niveau ou cliquez sur « Redémarrer maintenant » pour commencer immédiatement la mise à jour.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line23 = Libérer de l’espace avec le cloud (stockage en ligne)
valueReminderEmail_serviceRemediation_storageSpaceHealth_line24 = Pour une performance optimale, votre ordinateur portable est conçu pour une utilisation avec un stockage cloud. Une solution alternative à la suppression de fichiers sur votre ordinateur afin de libérer davantage d’espace sur votre disque dur pour la mise à jour Windows, vous pouvez déplacer les fichiers vers le cloud.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line3 = Dans Windows, recherchez les paramètres de Windows Update.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line4 = Dans la liste des résultats, cliquez sur les paramètres Windows Update pour ouvrir la fenêtre Windows Update.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line5 = La fenêtre Windows Update apparaît et les mises à jour de Windows Update démarrent automatiquement.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line6 = Windows Update détecte qu'un espace de stockage supérieur est nécessaire pour la mise à jour, et ouvre la fenêtre « Windows a besoin d’espace supplémentaire ».
valueReminderEmail_serviceRemediation_storageSpaceHealth_line7 = Cliquez sur Libérer de l’espace.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line8 = Dans la fenêtre d'utilisation de l'espace de stockage, cliquez sur une catégorie pour effacer les fichiers inutiles.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line9 = Dans Windows, recherchez et ouvrez le Nettoyage de disque.
