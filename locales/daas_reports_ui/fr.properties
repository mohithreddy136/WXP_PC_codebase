Global.gridTitle.forCashDrawer = 1. For Cash Drawer Alert Type = Open Time exceeded.
Global.gridTitle.forCashDrawer_line1 = Les tiroirs-caisses affichés dans cet onglet ont dépassé leur seuil de durée d’ouverture configuré. Cette information peut indiquer une négligence ou une activité potentiellement suspecte dans la ligne PDV.
Global.gridTitle.forCashDrawer_line2 = 2. Pour le type d’alerte Tiroir-caisse = Ouverture manuelle du tiroir-caisse.
Global.gridTitle.forCashDrawer_line3 = Les tiroirs-caisses affichés dans cet onglet ont été ouverts manuellement sans transaction du logiciel PDV déclenchant l’ouverture. Cette information peut indiquer une transaction potentielle ayant lieu en dehors du cadre du logiciel PDV ou une activité de perte potentielle.
Global.gridTitle.forCashDrawer_line4 = 3. Pour le type d’alerte Tiroir-caisse = Ouverture durant les heures non autorisées.
Global.gridTitle.forCashDrawer_line5 = Les tiroirs-caisses affichés dans cet onglet ont été ouverts en dehors des heures de fonctionnement standard configurées. Cette information indique qu’un tiroir-caisse a fait l’objet d’un accès à un moment où cela était inattendu, indiquant un événement potentiellement suspect.
Global.gridTitle.forCashDrawer_line6 = 1. Pour le type d’alerte Tiroir-caisse = Durée d’ouverture dépassée.
Global.gridTitle.kniefCutsTabs = Voici la liste des imprimantes de reçus ayant atteint un incrément d’utilisation pour les découpes par lame. L’inspection et la maintenance de la lame de l’imprimante sont recommandées selon les besoins. Pour ce faire, vous devez vérifier que la lame de l’imprimante est suffisamment aiguisée pour couper facilement les reçus. L’aiguisage et le remplacement doivent se faire selon les besoins.
Global.gridTitle.msrTabs = Voici la liste des lecteurs de cartes magnétiques ayant atteint un incrément d’utilisation pour les lectures réussies. Le nettoyage du lecteur est recommandé. Pour ce faire, les débris doivent être nettoyés dans le connecteur de carte pour permettre une bonne performance continue du lecteur.
Global.gridTitle.peripheralClaimingError = Les périphériques illustrés dans cet onglet rencontrent des problèmes avec les statistiques des périphériques collectées à cause de raisons diverses mises en évidence dans le tableau ci-dessous. Cela inclut les conflits de revendication de périphérique avec un logiciel point de vente, de configuration correcte de HP Peripheral Agent, et plus encore.
Global.gridTitle.peripheralThresholdMet = Cet onglet met en évidence les dispositifs (scanneurs, lecteurs de carte magnétique et imprimantes de reçus) qui ont dépassé leur seuil d’utilisation et de durée de vie attendu, ce qui indique que le dispositif présente un risque plus élevé de défaillance en raison de son ancienneté. Qu’il s’agisse d’extraire des données d’une classe de données de journaux ou d’un rapport de seuil établi, la solution la plus simple est adaptée. En fin de compte, il s’agit des mêmes données.
Global.gridTitle.printedLineTabs = This is the list of Receipt Printers that have reached an increment of usage for printed lines in which it is recommended that that the Printhead is serviced. This entails cleaning the printhead of the printer to enable high quality outputs.
Global.gridTitle.printedLineTabs = Voici la liste des imprimantes de reçus ayant atteint un incrément d’utilisation pour les lignes imprimées. La maintenance de la tête d’impression est recommandée. Pour ce faire, le nettoyage de la tête d’impression de l’imprimante est requis pour obtenir des impressions de haute qualité.
Global.gridTitle.USBDevices = Cet onglet met en évidence tout périphérique USB qui n’est pas configuré pour être connecté à l’unité de base et qui est donc inconnu et inattendu. Les périphériques affichés peuvent ne pas être autorisés ou peuvent souligner une menace de sécurité potentielle.
