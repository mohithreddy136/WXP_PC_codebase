graphHeaders.Disk_Capacity_Forecasting.Summary.desc_11 = N.v.t. De schijfruimte is voor nu OK, maar er zijn niet genoeg gegevens om een verwachting te maken van de tijd die nog resteert voordat de schijfruimte de drempel bereikt
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_2 = In dit rapport worden gegevens van de afgelopen 3–6 maanden gebruikt om te bepalen hoeveel tijd resteert voordat de schijfcapaciteit de in de rapportfilter ingestelde drempel bereikt. De categorisaties op het hoogste niveau voor Status schijfcapaciteit zijn als volgt:
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_3 = Onmiddellijk. De resterende schijfruimte heeft de drempel bereikt
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_4 = Binnen 1 maand. De schijfruimte bereikt binnen 1 maand de drempel
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_5 = Binnen 2 maanden. De schijfruimte bereikt binnen 2 maanden de drempel
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_6 = Binnen 3 maanden. De schijfruimte bereikt binnen 3 maanden de drempel
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_7 = OK. De schijfruimte blijft ten minste de komende 1, 2 of 3 maanden OK, afhankelijk van de informatie in de kolom Extra status
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_8 = 1+. De schijfruimte is nog minstens 1 maand OK
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_9 = 2+. De schijfruimte is nog minstens 2 maanden OK
