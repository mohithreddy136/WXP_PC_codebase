graphHeaders.Disk_Capacity_Forecasting.Summary.desc_1 = Het rapport Planning schijfcapaciteit geeft van tevoren een verwachting van de tijd die nog resteert voordat de schijfruimte een vooraf bepaalde drempel bereikt. De drempels kunnen in de rapportfilters worden geselecteerd en zijn gedefinieerd als 0-10%, 0-20%, 0-30%, 0-40% en 0-50%.
