Global.gridTitle.forCashDrawer = 1. For Cash Drawer Alert Type = Open Time exceeded.
Global.gridTitle.forCashDrawer_line1 = Voor geldladen die op dit tabblad worden weergegeven, is de geconfigureerde tijdslimiet voor openen overschreden. Dit kan duiden op nalatigheid of een mogelijk verdachte activiteit bij de POS-terminal.
Global.gridTitle.forCashDrawer_line2 = 2. Type waarschuwing geldlade = Geldlade handmatig geopend.
Global.gridTitle.forCashDrawer_line3 = Geldladen die op dit tabblad worden weergegeven, zijn handmatig geopend zonder een transactietrigger van de POS-software om de lade te openen. Dit kan duiden op een transactie die plaatsvindt buiten de POS-software of een mogelijke verliesactiviteit.
Global.gridTitle.forCashDrawer_line4 = 3. Type waarschuwing geldlade = Geopend op onbevoegd tijdstip.
Global.gridTitle.forCashDrawer_line5 = Geldladen die op dit tabblad worden weergegeven, zijn geopend buiten de geconfigureerde standaardbedrijfsuren. Dit kan duiden op het openen van een geldlade op een onverwacht tijdstip, wat een mogelijk verdachte activiteit is.
Global.gridTitle.forCashDrawer_line6 = 1. Type waarschuwing geldlade = Tijd open overschreden.
Global.gridTitle.kniefCutsTabs = Dit is de lijst met bonprinters die een toename van het gebruik van messneden hebben bereikt. Zo nodig worden inspectie en onderhoud van het printermes aanbevolen. Hiervoor moet gecontroleerd worden of het printermes nog scherp genoeg is om gemakkelijk bonnen te snijden en zo nodig moet het geslepen of vervangen worden.
Global.gridTitle.msrTabs = Dit is de lijst met magneetstriplezers die een toename van het gebruik voor goede leesbewerkingen hebben bereikt. Reiniging van de lezer wordt aanbevolen. Hiervoor moet vuil en ophoping uit het kaartslot worden verwijderd, zodat de lezer goed blijft functioneren.
Global.gridTitle.peripheralClaimingError = Randapparatuur die op dit tabblad wordt weergegeven, ondervindt problemen met het verzamelen van statistieken van randapparatuur vanwege een aantal verschillende redenen die in de onderstaande tabel worden aangegeven. Dit omvat conflicten met het claimen van randapparatuur met POS-software, de juiste configuratie van de HP Peripheral Agent en meer.
Global.gridTitle.peripheralThresholdMet = Op dit tabblad ziet u de randapparatuur (scanners, magneetstriplezers en bonnenprinters) waarvoor de verwachte levensduur is overschreden. Het randapparaat heeft dus een relatief grotere kans op uitval. Of het nu gaat om gegevens uit de klasse van logboekgegevens of uit een rapport over vastgestelde drempelwaarden, afhankelijk van wat eenvoudiger werkt. Uiteindelijk zijn het dezelfde gegevens.
Global.gridTitle.printedLineTabs = This is the list of Receipt Printers that have reached an increment of usage for printed lines in which it is recommended that that the Printhead is serviced. This entails cleaning the printhead of the printer to enable high quality outputs.
Global.gridTitle.printedLineTabs = Dit is de lijst met bonprinters die een toename van het gebruik van afgedrukte regels hebben bereikt. Onderhoud van de printkop wordt aanbevolen. Hiervoor moet de printkop van de printer gereinigd worden om afdrukken van hoge kwaliteit mogelijk te maken.
Global.gridTitle.USBDevices = Op dit tabblad ziet u alle USB-apparaten die niet geconfigureerd zijn om verbinding te maken met de basisunit en die daarom onbekend en onverwacht zijn. De weergegeven apparaten zijn mogelijk niet geautoriseerd of vormen mogelijk een bedreiging voor de veiligheid.
