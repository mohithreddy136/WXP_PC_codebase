valueReminderEmail_serviceRemediation_softwareErrors_line2 = De software die problemen veroorzaakt, moet worden bijgewerkt naar de nieuwste versie om bekende prestatieproblemen en bugs op te lossen.
valueReminderEmail_serviceRemediation_softwareErrors_line3 = De Windows-besturingssysteemsoftware bijwerken
valueReminderEmail_serviceRemediation_softwareErrors_line4 = Zoek de meest recente informatie over problemen met betrekking tot de Windows 10-update en bekijk tips voor acties die u kunt ondernemen voordat u de update op uw pc installeert.
valueReminderEmail_serviceRemediation_startupPerformance_line1 = Stuurprogramma's en software bijwerken met Windows Update
valueReminderEmail_serviceRemediation_startupPerformance_line10 = Selecteer het station C: wanneer u daarom wordt gevraagd en wacht tot de app de te verwijderen bestanden heeft gevonden.
valueReminderEmail_serviceRemediation_startupPerformance_line11 = Sommige bestandstypen zijn vooraf geselecteerd. Voor informatie over elk bestandstype klikt u op de naam en bekijkt u de omschrijving voordat u het opschonen start.
valueReminderEmail_serviceRemediation_startupPerformance_line12 = U kunt ook de prullenbak selecteren om deze leeg te maken.
valueReminderEmail_serviceRemediation_startupPerformance_line13 = Klik op OK om de geselecteerde bestanden te verwijderen.
valueReminderEmail_serviceRemediation_startupPerformance_line14 = Gebruik een externe harde schijf
valueReminderEmail_serviceRemediation_startupPerformance_line15 = Overweeg items met een groot bestandsformaat, zoals foto's met hoge resolutie, muziek en video's, naar een externe vaste schijf te verplaatsen.
valueReminderEmail_serviceRemediation_startupPerformance_line16 = Verwijder Windows-installatiebestanden (computers die zijn bijgewerkt naar Windows 10)
valueReminderEmail_serviceRemediation_startupPerformance_line17 = Klik in het venster Schijfopruiming op Systeembestanden opschonen
valueReminderEmail_serviceRemediation_startupPerformance_line18 = Selecteer het station C: en wacht tot de app de te verwijderen bestanden heeft gevonden.
valueReminderEmail_serviceRemediation_startupPerformance_line19 = Selecteer Vorige Windows-installatie(s) en Tijdelijke Windows-installatiebestanden, indien aanwezig, en klik vervolgens op OK.
valueReminderEmail_serviceRemediation_startupPerformance_line2 = Zoek en installeer bijgewerkte stuurprogramma's voor de software en hardware van uw computer.
valueReminderEmail_serviceRemediation_startupPerformance_line20 = Verwijder ongebruikte apps
valueReminderEmail_serviceRemediation_startupPerformance_line21 = Zoek in Windows naar het programma dat u wilt verwijderen en klik op Wijzigen of verwijderen in de resultaten.
valueReminderEmail_serviceRemediation_startupPerformance_line22 = Klik op een app die u niet meer nodig hebt en klik vervolgens op Verwijderen.
valueReminderEmail_serviceRemediation_startupPerformance_line23 = Ga naar
valueReminderEmail_serviceRemediation_startupPerformance_line3 = Zoek en open Windows Update in Windows.
valueReminderEmail_serviceRemediation_startupPerformance_line4 = Klik op een van de volgende opties, indien aanwezig, in het Windows Update-venster:
valueReminderEmail_serviceRemediation_startupPerformance_line5 = Als er updates beschikbaar zijn om te downloaden, klikt u op Nu installeren.
valueReminderEmail_serviceRemediation_startupPerformance_line6 = Als er momenteel geen updates beschikbaar zijn, klikt u op Controleren op updates en vervolgens op Nu installeren als Windows beschikbare updates heeft gevonden.
valueReminderEmail_serviceRemediation_startupPerformance_line7 = Het systeem en de harde schijf opschonen
valueReminderEmail_serviceRemediation_startupPerformance_line8 = Onnodige bestanden verwijderen: Zoek in Windows naar Schijfopruiming
valueReminderEmail_serviceRemediation_startupPerformance_line9 = Klik op Schijfopruiming in de resultaten
valueReminderEmail_serviceRemediation_storageSpaceHealth_line1 = Maak ruimte vrij op de vaste schijf
valueReminderEmail_serviceRemediation_storageSpaceHealth_line10 = Schakel het selectievakje Vorige Windows-installatie(s) in en klik op OK.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line11 = Er wordt een waarschuwingsbericht weergegeven.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line12 = Klik op Ja om het opschonen van de vorige Windows-installaties te voltooien.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line13 = In het venster waarin wordt aangegeven dat Windows meer ruimte nodig heeft, klikt u onder deel A op het pictogram Vernieuwen.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line14 = Wanneer het vernieuwen is voltooid, ziet u de status Voltooid. Ga naar deel B dat wordt weergegeven onder deel A.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line15 = Plaats een flashdrive of sluit een externe harde schijf aan met 16 GB beschikbare opslagruimte.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line16 = Als het bericht Voltooid niet wordt weergegeven onder deel A, is er meer ruimte nodig voor de Windows-update.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line17 = Klik op Ruimte vrijmaken om extra bestanden te verwijderen.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line18 = Klik op Doorgaan.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line19 = Klik in het venster Bijna gereed op Sluiten.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line2 = Als u Windows 10-updates wilt installeren, hebt u 10 GB vrije ruimte op de vaste schijf en een USB-flashdrive van 16 GB nodig. De installatie van Windows 10 bevat een optie voor het verwijderen van overbodige bestanden op de vaste schijf rechtstreeks vanuit de app Instellingen met behulp van de wizard Schijfopruiming. Indien beschikbaar, is het alternatief voor het vrijmaken van schijfruimte het opslaan van gegevens in de cloud (online).
valueReminderEmail_serviceRemediation_storageSpaceHealth_line20 = Zoek in Windows naar Windows Update.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line21 = Klik in de lijst met resultaten op Windows Update om het venster Windows Update te openen.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line22 = Kies de tijd voor het opnieuw opstarten van Windows of klik op Nu opnieuw opstarten om de update direct uit te voeren.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line23 = Maak ruimte vrij door bestanden te verplaatsen naar de cloud (online opslag)
valueReminderEmail_serviceRemediation_storageSpaceHealth_line24 = Voor optimale prestaties wordt u aangeraden cloudopslag te gebruiken voor uw notebook-pc. In plaats van bestanden van uw computer te verwijderen om meer ruimte op de harde schijf vrij te maken voor de Windows-update, kunt u bestanden ook naar de cloud verplaatsen.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line3 = Zoek in Windows naar Windows Update.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line4 = Klik in de lijst met resultaten op Windows Update om het venster Windows Update te openen.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line5 = Het venster Windows Update wordt weergegeven en de Windows-update wordt automatisch gestart.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line6 = Windows Update detecteert dat er meer opslagruimte nodig is voor de update en opent een venster waarin dit wordt aangegeven.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line7 = Klik op Ruimte vrijmaken.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line8 = Klik in het venster Opslaggebruik op een categorie om overbodige bestanden te verwijderen.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line9 = Zoek in Windows naar Schijfopruiming en open deze app.
