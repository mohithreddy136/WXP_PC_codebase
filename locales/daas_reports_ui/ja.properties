Global.gridTitle.forCashDrawer = 1. For Cash Drawer Alert Type = Open Time exceeded.
Global.gridTitle.forCashDrawer_line1 = このタブに表示されるキャッシュ ドロワーは、設定された開錠時間のしきい値を超えています。これは、そのPOSレーンでの過失や、疑わしい使用状況の可能性を示しています。
Global.gridTitle.forCashDrawer_line2 = 2. キャッシュ ドロワーの警告タイプ = 手動での開錠。
Global.gridTitle.forCashDrawer_line3 = このタブに表示されるキャッシュ ドロワーは、POSソフトウェアの処理によらずに手動で開錠されています。これは、POSソフトウェア以外の場所で処理が発生している可能性があるか、損失が発生した可能性があることを示しています。
Global.gridTitle.forCashDrawer_line4 = 3. キャッシュ ドロワーの警告タイプ = 許可された時間外の開錠。
Global.gridTitle.forCashDrawer_line5 = このタブに表示されるキャッシュ ドロワーは、設定された標準運用時間外に開錠されています。これは、キャッシュ ドロワーが、アクセスされるべきではない時間帯にアクセスされたことを示しており、疑わしいイベントが発生した可能性をハイライトしています。
Global.gridTitle.forCashDrawer_line6 = 1. キャッシュ ドロワーの警告タイプ = 開錠時間の超過。
Global.gridTitle.kniefCutsTabs = ナイフ カットの使用回数が増分値に達したレシート プリンターの一覧です。必要に応じてプリンター ナイフを点検および修理することをお勧めします。プリンター ナイフがレシートをスムーズにカットできるだけの切れ味を維持しているかどうかを確認し、必要に応じて研磨したり交換したりする必要があります。
Global.gridTitle.msrTabs = 正常に読み取るための使用回数が増分値に達した磁気ストライプ リーダーの一覧です。リーダーをクリーニングすることをお勧めします。リーダーの性能を維持するために、カード スロットに堆積したゴミなどを取り除くことが必要です。
Global.gridTitle.peripheralClaimingError = 下の表で強調表示されているさまざまな理由により、このタブに表示されている周辺機器には、周辺デバイスから収集されている統計に問題があります。これには、POSソフトウェアを使用した周辺機器の要求との競合、[HP Peripheral Agent]の適切な構成などが含まれます。
Global.gridTitle.peripheralThresholdMet = このタブでは、予想耐用年数のしきい値を超えた周辺機器（スキャナー、磁気ストライプ リーダー、およびレシート プリンター）がハイライトされます。ここでは、使用年数が多いために故障のリスクが相対的に高くなっている周辺機器を示します。ログ データ クラスからデータを抽出するか、作成したしきい値レポートからデータを抽出するかどうかに関係なく、どちらかより簡単な方法で抽出できます。最終的に抽出されるデータは同じです。
Global.gridTitle.printedLineTabs = This is the list of Receipt Printers that have reached an increment of usage for printed lines in which it is recommended that that the Printhead is serviced. This entails cleaning the printhead of the printer to enable high quality outputs.
Global.gridTitle.printedLineTabs = 印字行の使用回数が増分値に達したレシート プリンターの一覧です。プリント ヘッドを修理することをお勧めします。高品質な出力を実現するためには、プリンターのプリント ヘッドをクリーニングする必要があります。
Global.gridTitle.USBDevices = このタブでは、ベース ユニットに接続されるように構成されていないために、未知および予期しない状態であるUSBデバイスを強調表示します。表示されているデバイスは、不正なデバイスであるか、セキュリティ上の脅威の可能性を示しています。
