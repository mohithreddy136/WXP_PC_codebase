graphHeaders.User_Mobility_Factor.Summary.desc_1 = ユーザーのデバイスの地理位置情報に基づく、ユーザーのモビリティの様相です。
graphHeaders.User_Mobility_Factor.Summary.desc_2 = 一定の期間内のユーザーのモビリティ ファクターは、複数の複雑なモバイル行動のパターンに基づいています。たとえば、同じまたは別のフォーム ファクターの異なるデバイスを持って常に異なる場所に移動するユーザーもいれば、自分のデバイスを持って2、3か所を頻繁に行ったり来たりするユーザーもいます。他には、自分のデバイスを持って常に短い距離間を移動し続けるユーザーもいます。ユーザーのモビリティ ファクターには、外部ソースからのユーザー位置情報を利用する方法とは異なり、[HP TechPulseプロアクティブ管理]に登録されているデバイスの地理位置情報を利用します。
graphHeaders.User_Mobility_Factor.Summary.desc_3 = 位置情報に基づいてデバイスの地理的位置を追跡するサービスは、初期設定ではすべての顧客に対してオフになっており、顧客がクラウドベースの[HP TechPulseプロアクティブ管理]ポータルで位置情報に基づくサービスを有効または無効にするオプションが用意されています。位置情報に基づくサービスがオンになっている場合でも、[HP TechPulseプロアクティブ管理]では、従業員個人所有のデバイスまたは個人のデバイスとして分類されているデバイスについては、（クラウドベースの[HP TechPulseプロアクティブ管理]ポータル内での）デバイス位置情報データの収集は許可されません。
graphHeaders.User_Mobility_Factor.Summary.desc_4 = ユーザーのモビリティ ファクターは1から10までのランクで、APM（Analytics and Proactive Management）内のすべてのデバイスでの相対ランキングです。ランキングが1の場合はユーザーのデバイスのモバイル性は最も低く、ランキングが10の場合はモバイル性が最も高いことを示します。ランキングが-1の場合は、ユーザーのデバイスの場所データがないことを示します。
graphHeaders.User_Mobility_Factor.Summary.desc_5 = ユーザー モビリティ ファクター分析は、毎月月初に1回、定期的に実行されるようにスケジュールが設定されています。最後のスケジュール実行：{last_scheduled_date}
graphHeaders.User_Mobility_Factor.Summary.desc_6 = 月ごとにスケジュール設定に基づいて実行されるため、スケジュール設定された最後の実行の後に[HP TechPulse]の[Proactive Management]に登録または登録解除されたユーザーおよびデバイスは、このレポートには反映されません。
