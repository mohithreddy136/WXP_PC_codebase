graphHeaders.Disk_Capacity_Forecasting.Summary.desc_1 = ディスク容量計画レポートでは、ディスクの空き領域があらかじめ決めたしきい値に達するまでの残り時間を予測します。しきい値は、レポート フィルターで0～10%、0～20%、0～30%、0～40%、および0～50%から選択できます。
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_10 = 3+：ディスクの空き領域は少なくとも3か月間は問題ありません
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_11 = 予測不能：今のところディスクの空き領域に問題はありませんが、ディスクの空き領域がしきい値に達するまでの残り時間を予測するための十分なデータがありません
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_2 = レポートでは、直近の3～6か月のデータを使用して、ディスクの空き容量がレポート フィルターで設定したしきい値に達するまでの残り時間を判断します。[ディスクの空き領域の状態]の最上位のカテゴリは以下のとおりです。
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_3 = 即時：残りのディスク容量がしきい値に達しました
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_4 = 1か月以内：ディスクの空き領域が1か月以内にしきい値に達します
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_5 = 2か月以内：ディスクの空き領域が2か月以内にしきい値に達します
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_6 = 3か月以内：ディスクの空き領域が3か月以内にしきい値に達します
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_7 = OK：ディスクの空き領域は、[その他の状態]列の情報に応じて、少なくとも次の1か月、2か月、または3か月の間は問題ないと予測されます。
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_8 = 1+：ディスクの空き領域は少なくとも1か月間は問題ありません
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_9 = 2+：ディスクの空き領域は少なくとも2か月間は問題ありません
