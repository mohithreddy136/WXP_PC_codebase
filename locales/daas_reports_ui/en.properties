graphHeaders.Disk_Capacity_Forecasting.Summary.desc_1 = The Disk Capacity Planning report forecasts ahead the time duration left prior to the disk space reaching a predetermined threshold. The thresholds are selectable in the report filters and defined as 0-10%, 0-20%, 0-30%, 0-40% and 0-50%.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_10 = 3+. The disk space is OK for at least 3 months
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_11 = N/A. The disk space is OK for now, but there is not enough data to forecast ahead the time duration left prior to the disk space reaching the threshold
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_2 = The report uses data for last 3-6 months to determine the time left before the disk capacity will reach the threshold set in the report filter. The top level categorizations for Disk Capacity Status are as follows:
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_3 = Immediate. The remaining disk space has reached the threshold
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_4 = Within 1 month. The disk space will reach the threshold within 1 month
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_5 = Within 2 months. The disk space will reach the threshold within 2 months
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_6 = Within 3 months. The disk space will reach the threshold within 3 months
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_7 = OK. The disk space may be OK for at least the next 1, 2, or 3 months depending on the information in the Additional Status column
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_8 = 1+. The disk space is OK for at least 1 month
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_9 = 2+. The disk space is OK for at least 2 months
