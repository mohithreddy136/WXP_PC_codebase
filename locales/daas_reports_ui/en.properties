Global.gridTitle.forCashDrawer = 1. For Cash Drawer Alert Type = Open Time exceeded.
Global.gridTitle.forCashDrawer_line1 = Cash drawers shown in this tab have exceeded their configured time threshold for their till being opened. This would highlight the negligence and potentially suspicious activity for their POS lane.
Global.gridTitle.forCashDrawer_line2 = 2. For Cash Drawer Alert Type = Manual Cash Drawer Open.
Global.gridTitle.forCashDrawer_line3 = Cash drawers shown in this tab were opened manually without a POS software transaction triggering the till to open. This would indicate a potential transaction taking place outside of the POS software or a potential loss activity. 
Global.gridTitle.forCashDrawer_line4 = 3. For Cash Drawer Alert Type = Opened During Unauthorized Hours.
Global.gridTitle.forCashDrawer_line5 = Cash drawers shown in this tab were opened outside of the configured standard operating hours. This would indicate that a cash drawer was accessed during a time when it was not expected to be accessed, highlighting a potentially suspicious event.
Global.gridTitle.forCashDrawer_line6 = 1. For Cash Drawer Alert Type = Open Time exceeded.
Global.gridTitle.kniefCutsTabs = This is the list of Receipt Printers that have reached an increment of usage for knife cuts. It is recommended that the printer knife is inspected and serviced as needed. This requires checking that the printer knife is still sufficiently sharp to easily cut receipts and sharpening and replacing as needed.
Global.gridTitle.msrTabs = This is the list of Magnetic Stripe Readers that have reached an increment of usage for good reads. It is recommended that the reader is cleaned. This requires cleaning out the card slot of debris and buildup to enable continued performance of the reader.
Global.gridTitle.peripheralClaimingError =  Peripherals shown in this tab are having issues with statistics from peripheral devices being collected due to a number of different reasons highlighted in the below table. This includes conflicts with claiming of peripheral with POS Software, proper configuring of the HP Peripheral Agent, and more.
Global.gridTitle.peripheralThresholdMet = This tab highlights peripherals (scanners, magnetic stripe readers, and receipt printers) that have exceeded their expected lifetime usage threshold, which indicates that the peripheral device is at a relatively higher risk of failing due to usage age. Whether it is to extract data from log data class or from an established threshold report, whichever is easier would work. Ultimately it is the same data.
Global.gridTitle.printedLineTabs = This is the list of Receipt Printers that have reached an increment of usage for printed lines in which it is recommended that that the Printhead is serviced. This entails cleaning the printhead of the printer to enable high quality outputs.
Global.gridTitle.printedLineTabs = This is the list of Receipt Printers that have reached an increment of usage for printed lines. It is recommended that the print head is serviced. This requires cleaning the print head of the printer to enable high-quality outputs.
Global.gridTitle.USBDevices = This tab highlights any USB device that is not configured to be connected to the base unit and is therefore unknown and unexpected. Devices shown could be unauthorized or highlight a potential security threat.
