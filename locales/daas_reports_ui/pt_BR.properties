graphHeaders.Disk_Capacity_Forecasting.Summary.desc_1 = O relatório de planejamento da capacidade em disco prevê o tempo restante para que o espaço em disco alcance um limite predeterminado. Os limites podem ser selecionados nos filtros do relatório e são definidos como 0–10%, 0–20%, 0–30%, 0–40% e 0–50%.
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_10 = 3+. O espaço em disco estará OK por pelo menos três meses
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_11 = N/D. O espaço em disco está OK no momento, mas não há dados suficientes para prever o tempo que falta para o espaço em disco chegar ao limite
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_2 = O relatório usa dados dos últimos 3 a 6 meses para determinar o tempo restante para que a capacidade em disco alcance o limite predeterminado no filtro do relatório. As categorias de alto nível para o status da capacidade em disco são as seguintes:
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_3 = Imediato. O espaço em disco restante está chegando ao limite
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_4 = Em 1 mês. O espaço em disco vai chegar ao limite dentro de um mês
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_5 = Em 2 meses. O espaço em disco vai chegar ao limite dentro de dois meses
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_6 = Em 3 meses. O espaço em disco vai chegar ao limite dentro de três meses
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_7 = OK. O espaço em disco deverá estar OK, no mínimo, pelos próximos 1, 2 ou 3 meses, dependendo da informação contida na coluna Status adicional
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_8 = 1+. O espaço em disco estará OK por pelo menos um mês
graphHeaders.Disk_Capacity_Forecasting.Summary.desc_9 = 2+. O espaço em disco estará OK por pelo menos dois meses
