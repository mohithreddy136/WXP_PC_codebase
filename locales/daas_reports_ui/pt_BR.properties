Global.gridTitle.forCashDrawer = 1. For Cash Drawer Alert Type = Open Time exceeded.
Global.gridTitle.forCashDrawer_line1 = As gavetas de dinheiro mostradas nesta aba excederam o limite de tempo configurado para ficarem abertas. Isso pode destacar a negligência e a atividade potencialmente suspeita para sua faixa de POS.
Global.gridTitle.forCashDrawer_line2 = 2. Para tipo de alerta da gaveta de dinheiro = Gaveta de dinheiro aberta manualmente.
Global.gridTitle.forCashDrawer_line3 = As gavetas de dinheiro mostradas nesta aba foram abertas manualmente sem uma transação de software POS acionando a abertura da caixa registradora. Isso pode indicar uma transação potencial ocorrendo fora do software POS ou uma atividade de perda potencial.
Global.gridTitle.forCashDrawer_line4 = 3. Para tipo de alerta da gaveta de dinheiro = Aberta durante o horário não autorizado.
Global.gridTitle.forCashDrawer_line5 = As gavetas de dinheiro mostradas nesta aba foram abertas fora do horário de funcionamento padrão configurado. Isso pode indicar que uma gaveta de dinheiro foi acessada em um momento em que isso não era esperado, destacando um evento potencialmente suspeito.
Global.gridTitle.forCashDrawer_line6 = 1. Para tipo de alerta da gaveta de dinheiro = Tempo de abertura excedido.
Global.gridTitle.kniefCutsTabs = Esta é a lista de Impressoras de recibos que tiveram um aumento de uso para cortes da lâmina. Recomenda-se que a lâmina da impressora seja inspecionada e reparada conforme necessário. Isso requer a verificação de que a lâmina da impressora ainda está suficientemente afiada para cortar facilmente os recibos e afiar e substituir conforme necessário.
Global.gridTitle.msrTabs = Esta é a lista de Leitores de tarja magnética que tiveram um aumento de uso para leituras boas. Recomenda-se a limpeza do leitor. Isso requer a limpeza de detritos e acúmulos do slot do cartão para permitir o desempenho contínuo do leitor.
Global.gridTitle.peripheralClaimingError = Os periféricos mostrados nessa guia estão com problemas de estatísticas dos dispositivos periféricos sendo coletadas devido a um número de diferentes razões destacadas na tabela abaixo. Isso inclui conflitos com reclamações de periférico de PDV, configuração adequada com Agente de periférico e outros.
Global.gridTitle.peripheralThresholdMet = Essa aba destaca os periféricos (scanners, leitores de tarja magnética e impressoras de recibos) que excederam o limite de uso esperado durante a vida útil, o que indica que o dispositivo periférico corre um risco relativamente maior de falhar devido ao tempo de uso. Seja para extrair dados da classe de dados do logo ou de um relatório de limite estabelecido, o que for mais fácil deve funcionar. No final, são os mesmos dados.
Global.gridTitle.printedLineTabs = This is the list of Receipt Printers that have reached an increment of usage for printed lines in which it is recommended that that the Printhead is serviced. This entails cleaning the printhead of the printer to enable high quality outputs.
Global.gridTitle.printedLineTabs = Esta é a lista de Impressoras de recibos que tiveram um aumento de uso para linhas impressas. Recomenda-se que o cabeçote de impressão seja reparado. Isso requer a limpeza do cabeçote de impressão da impressora para permitir resultados de alta qualidade.
Global.gridTitle.USBDevices = Esta aba destaca qualquer dispositivo USB que não esteja configurado para ser conectado à unidade base e, portanto, é desconhecido e inesperado. Os dispositivos mostrados podem ser não autorizados ou podem destacar uma ameaça potencial à segurança.
