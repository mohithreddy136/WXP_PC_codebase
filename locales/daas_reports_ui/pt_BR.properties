valueReminderEmail_serviceRemediation_HPSureClickAdvanced_line1 = Dispositivos da HP
valueReminderEmail_serviceRemediation_HPSureClickAdvanced_line2 = HP Sure Click is available on most HP PCs and supports Microsoft® Internet Explorer, Google Chrome, and Chromium™. Supported attachments include Microsoft Office (Word, Excel, PowerPoint) and PDF files in read-only mode, when Microsoft Office or Adobe Acrobat are installed.
valueReminderEmail_serviceRemediation_HPSureSenseAdvanced_line1 = Dispositivos da HP
valueReminderEmail_serviceRemediation_HPSureSenseAdvanced_line2 = O HP Sure Sense requer Windows 10. Consulte as especificações do produto para conferir a disponibilidade.
valueReminderEmail_serviceRemediation_HPSureStart_line1 = Dispositivos da HP
valueReminderEmail_serviceRemediation_HPSureStart_line2 = O HP Sure Start está configurado e já ativado para que a maioria dos usuários possa usar a configuração padrão do HP Sure Start.
valueReminderEmail_serviceRemediation_memoryUtilization_line1 = Problemas de memória
valueReminderEmail_serviceRemediation_memoryUtilization_line2 = Tente ajustar a forma como o computador usa recursos de memória
valueReminderEmail_serviceRemediation_memoryUtilization_line3 = Do reset Windows 10 to increase computer performance
valueReminderEmail_serviceRemediation_memoryUtilization_line4 = Desabilite programas em execução em segundo plano no Windows
valueReminderEmail_serviceRemediation_memoryUtilization_line5 = Aumente o desempenho do computador modificando as configurações de memória virtual no Windows
valueReminderEmail_serviceRemediation_memoryUtilization_line6 = As recomendações abaixo devem ajudar a resolver problemas de memória.
valueReminderEmail_serviceRemediation_memoryUtilization_line7 = Para obter mais informações, visite
valueReminderEmail_serviceRemediation_softwareErrors_line1 = Atualize para o software mais recente (sem Microsoft Windows)
valueReminderEmail_serviceRemediation_softwareErrors_line2 = O software que está causando problemas deve ser atualizado para as versões mais recentes para corrigir bugs e erros de desempenho conhecidos.
valueReminderEmail_serviceRemediation_softwareErrors_line3 = Atualize seu software do SO Windows
valueReminderEmail_serviceRemediation_softwareErrors_line4 = Encontre as informações mais atualizadas para problemas relacionados à atualização do Windows 10, além de dicas sobre as ações a serem tomadas antes de instalar a atualização no seu PC
valueReminderEmail_serviceRemediation_startupPerformance_line1 = Atualize drivers e software com o Windows Update
valueReminderEmail_serviceRemediation_startupPerformance_line10 = Selecione a unidade C: se solicitado. Aguarde enquanto o aplicativo verifica os arquivos a serem excluídos.
valueReminderEmail_serviceRemediation_startupPerformance_line11 = Alguns tipos de arquivos estão pré-selecionados. Para saber mais sobre cada tipo de arquivo, clique no nome para visualizar uma descrição antes da limpeza.
valueReminderEmail_serviceRemediation_startupPerformance_line12 = Você também pode selecionar Lixeira para esvaziá-la.
valueReminderEmail_serviceRemediation_startupPerformance_line13 = Clique em OK para excluir os arquivos selecionados.
valueReminderEmail_serviceRemediation_startupPerformance_line14 = Experimente usar uma unidade de disco rígido externa
valueReminderEmail_serviceRemediation_startupPerformance_line15 = Considere mover itens com tamanhos grandes de arquivo, como fotos, músicas e vídeos de alta resolução, para um disco rígido externo.
valueReminderEmail_serviceRemediation_startupPerformance_line16 = Exclua os arquivos de instalação do Windows (computadores atualizados para o Windows 10)
valueReminderEmail_serviceRemediation_startupPerformance_line17 = Na janela Limpeza de Disco, clique em Limpar arquivos do sistema
valueReminderEmail_serviceRemediation_startupPerformance_line18 = Selecione a unidade C: e, em seguida, aguarde enquanto o aplicativo verifica os arquivos a serem excluídos.
valueReminderEmail_serviceRemediation_startupPerformance_line19 = Selecione Instalação(ões) anterior(es) do Windows e arquivos de instalação temporários do Windows, se houver, e clique em OK.
valueReminderEmail_serviceRemediation_startupPerformance_line2 = Encontre e instale drivers de software e hardware atualizados para o seu computador.
valueReminderEmail_serviceRemediation_startupPerformance_line20 = Desinstale aplicativos não utilizados
valueReminderEmail_serviceRemediation_startupPerformance_line21 = Pesquise no Windows por excluir um programa e clique em Alterar ou excluir um programa nos resultados.
valueReminderEmail_serviceRemediation_startupPerformance_line22 = Clique em um aplicativo que você não precisa mais e clique em Desinstalar.
valueReminderEmail_serviceRemediation_startupPerformance_line23 = Visite
valueReminderEmail_serviceRemediation_startupPerformance_line3 = No Windows, pesquise por Windows Update e abra-o.
valueReminderEmail_serviceRemediation_startupPerformance_line4 = Clique em uma das opções a seguir caso sejam apresentadas na janela do Windows Update:
valueReminderEmail_serviceRemediation_startupPerformance_line5 = Se houver atualizações disponíveis para download, clique em Instalar agora.
valueReminderEmail_serviceRemediation_startupPerformance_line6 = Se nenhuma atualização estiver listada no momento, clique em Verificar atualizações e clique em Instalar agora após o Windows detectar as atualizações disponíveis.
valueReminderEmail_serviceRemediation_startupPerformance_line7 = Realize uma limpeza no disco rígido e no sistema
valueReminderEmail_serviceRemediation_startupPerformance_line8 = Exclua arquivos desnecessários: Pesquise no Windows pela limpeza de disco
valueReminderEmail_serviceRemediation_startupPerformance_line9 = Clique em Limpeza de Disco nos resultados
valueReminderEmail_serviceRemediation_storageSpaceHealth_line1 = Libere espaço no disco rígido
valueReminderEmail_serviceRemediation_storageSpaceHealth_line10 = Marque a caixa de seleção Instalação(ões) anterior(es) do Windows e clique em OK.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line11 = Uma mensagem de aviso será exibida.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line12 = Clique em Sim para concluir a limpeza das instalações anteriores do Windows.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line13 = Na janela Windows precisa de mais espaço, embaixo de Parte A, clique no ícone Atualizar.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line14 = Quando a atualização é concluída, o status muda para Concluído! Vá para a Parte B, embaixo da Parte A.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line15 = Insira uma unidade flash ou conecte uma unidade de disco rígido externa com 16 GB de espaço disponível.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line16 = Se a mensagem Concluído! não for exibida embaixo da Parte A, é necessário mais espaço para a atualização do Windows.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line17 = Clique em Liberar espaço para excluir arquivos adicionais.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line18 = Clique em Continuar.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line19 = Na janela Quase pronto, clique em Fechar.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line2 = Para instalar as atualizações de versão do Windows 10, você precisa de 10 GB de espaço livre no disco rígido e uma unidade flash USB de 16 GB. A instalação do Windows 10 inclui uma opção para excluir arquivos desnecessários do disco rígido diretamente do aplicativo Configurações usando o assistente de Limpeza de Disco. Se disponível, uma alternativa para liberar espaço em disco é armazenar dados na nuvem (online).
valueReminderEmail_serviceRemediation_storageSpaceHealth_line20 = No Windows, pesquise pelas configurações do Windows Update.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line21 = Na lista de resultados, clique em configurações do Windows Update para abrir a janela do Windows Update.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line22 = Embaixo do título Uma reinicialização foi agendada, escolha um horário para reiniciar o Windows para prosseguir com a atualização ou clique em Reiniciar agora para iniciar a atualização imediatamente.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line23 = Libere espaço usando a nuvem (armazenamento online)
valueReminderEmail_serviceRemediation_storageSpaceHealth_line24 = Para um desempenho ideal, o notebook deve ser usado com armazenamento em nuvem. Como alternativa à exclusão de arquivos no seu computador para liberar mais espaço no disco rígido para a atualização do Windows, você pode mover arquivos para a nuvem.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line3 = No Windows, pesquise pelas configurações do Windows Update.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line4 = Na lista de resultados, clique em configurações do Windows Update para abrir a janela do Windows Update.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line5 = A janela do Windows Update é exibida e a atualização do Windows é iniciada automaticamente.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line6 = A atualização do Windows detecta que é necessário mais espaço de armazenamento para a atualização e abre a janela Windows precisa de mais espaço.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line7 = Clique em Liberar espaço.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line8 = Na janela Uso de armazenamento, clique em uma categoria para excluir arquivos desnecessários.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line9 = No Windows, pesquise pela Limpeza de Disco e abra-a.
