Global.gridTitle.forCashDrawer = 1. For Cash Drawer Alert Type = Open Time exceeded.
Global.gridTitle.forCashDrawer_line1 = Las gavetas de efectivo mostradas en esta ficha han excedido el umbral de tiempo configurado para su apertura. Esto destacaría la negligencia y, potencialmente, una actividad sospechosa en su POS.
Global.gridTitle.forCashDrawer_line2 = 2. En el caso del tipo de alerta de la gaveta de efectivo = apertura manual de la gaveta de efectivo.
Global.gridTitle.forCashDrawer_line3 = Las gavetas de efectivo mostradas en esta ficha se abrieron manualmente sin que una transacción del software de POS activara la apertura. Esto indicaría que, potencialmente, se está realizando una transacción fuera del software de POS o una actividad de pérdida potencial.
Global.gridTitle.forCashDrawer_line4 = 3. En el caso del tipo de alerta de la gaveta de efectivo = abierta durante horas no autorizadas.
Global.gridTitle.forCashDrawer_line5 = Las gavetas de efectivo que se muestran en esta ficha se abrieron fuera de los horarios de operación estándar configurados. Esto indicaría que se accedió a una gaveta de efectivo durante un momento en que no se esperaba el acceso, lo que destaca un evento potencialmente sospechoso.
Global.gridTitle.forCashDrawer_line6 = 1. En el caso del tipo de alerta de la gaveta de efectivo = tiempo de apertura excedido.
Global.gridTitle.kniefCutsTabs = Esta es la lista de Impresoras de recibos que alcanzaron un incremento de uso de cortes de cuchilla. Se recomienda examinar la cuchilla de la impresora y repararla si es necesario. Esto requiere verificar si la cuchilla está bien afilada para cortar los recibos con facilidad, y afilarla o reemplazarla.
Global.gridTitle.msrTabs = Esta es la lista de Lectores de banda magnética que alcanzaron un incremento de uso de buenas lecturas. Se recomienda la limpieza del lector. Esto requiere la eliminación de polvo y residuos de la ranura para tarjetas para mantener el buen funcionamiento del lector.
Global.gridTitle.peripheralClaimingError = Los periféricos mostrados en esta pestaña tienen problemas con estadísticas de dispositivos periféricos que se están recopilando debido a diversos motivos resaltados en la tabla a continuación. Esto incluye conflictos de reclamación de periféricos con Software de POS, configuración adecuada de HP Peripheral Agent y otros.
Global.gridTitle.peripheralThresholdMet = Esta ficha destaca los periféricos (escáneres, lectores de cinta magnética e impresoras de recibos) que han excedido su umbral de uso esperado en su vida útil, lo que indica que el dispositivo periférico corre un riesgo relativamente más alto de fallar debido al tiempo de uso. Ya sea para extraer datos de registro o de un informe de umbral establecido, lo que sea más fácil funcionaría. En última instancia, son los mismos datos.
Global.gridTitle.printedLineTabs = This is the list of Receipt Printers that have reached an increment of usage for printed lines in which it is recommended that that the Printhead is serviced. This entails cleaning the printhead of the printer to enable high quality outputs.
Global.gridTitle.printedLineTabs = Esta es la lista de Impresoras de recibos que alcanzaron un incremento de uso de líneas impresas. Se recomienda el mantenimiento del cabezal de impresión. Esto consiste en limpiar el cabezal de impresión para obtener resultados de alta calidad.
Global.gridTitle.USBDevices = Esta ficha destaca cualquier dispositivo USB que no se haya configurado ni esté conectado a la unidad base y, por lo tanto, sea desconocido e inesperado. Los dispositivos mostrados podrían no estar autorizados o destacar una amenaza de seguridad potencial.
