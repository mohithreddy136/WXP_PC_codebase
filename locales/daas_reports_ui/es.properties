valueReminderEmail_serviceRemediation_HPSureStart_line2 = HP Sure Start está configurado y activado para que la mayoría de los usuarios puedan usar la configuración predeterminada del software.
valueReminderEmail_serviceRemediation_memoryUtilization_line1 = Problemas de memoria
valueReminderEmail_serviceRemediation_memoryUtilization_line2 = Trate de ajustarse a la forma en que su equipo usa los recursos de la memoria
valueReminderEmail_serviceRemediation_memoryUtilization_line3 = Do reset Windows 10 to increase computer performance
valueReminderEmail_serviceRemediation_memoryUtilization_line4 = Deshabilite los programas que se ejecutan en segundo plano en Windows
valueReminderEmail_serviceRemediation_memoryUtilization_line5 = Aumente el rendimiento del equipo mediante la modificación de las configuraciones de la memoria virtual en Windows
valueReminderEmail_serviceRemediation_memoryUtilization_line6 = Las siguientes recomendaciones deben ayudar a resolver problemas de memoria.
valueReminderEmail_serviceRemediation_memoryUtilization_line7 = Para obtener más información, visite
valueReminderEmail_serviceRemediation_softwareErrors_line1 = Actualice el software a la versión más reciente (que no sea Microsoft Windows)
valueReminderEmail_serviceRemediation_softwareErrors_line2 = Debe actualizar el software que está causando problemas a la versión más reciente para resolver errores y problemas de rendimiento conocidos.
valueReminderEmail_serviceRemediation_softwareErrors_line3 = Actualice su software del SO Windows
valueReminderEmail_serviceRemediation_softwareErrors_line4 = Encuentre la información más reciente sobre los problemas realcionados con la actualización de Windows 10, junto con consejos sobre acciones que puede realizar antes de instalar la actualización en su PC
valueReminderEmail_serviceRemediation_startupPerformance_line1 = Actualice los controladores y el software con Windows Update
valueReminderEmail_serviceRemediation_startupPerformance_line10 = Seleccione la unidad C: si se le pide. Luego espere mientras la aplicación busca los archivos que se pueden eliminar.
valueReminderEmail_serviceRemediation_startupPerformance_line11 = Algunos tipos de archivos están preseleccionados. Para obtener más información sobre cada tipo, haga clic en el nombre para ver una descripción antes de la limpieza.
valueReminderEmail_serviceRemediation_startupPerformance_line12 = También puede seleccionar la Papelera de reciclaje y vaciarla.
valueReminderEmail_serviceRemediation_startupPerformance_line13 = Haga clic en Aceptar para eliminar los archivos seleccionados.
valueReminderEmail_serviceRemediation_startupPerformance_line14 = Use una unidad de disco duro externa
valueReminderEmail_serviceRemediation_startupPerformance_line15 = Considere pasar a una unidad de disco duro externa archivos de gran tamaño, como fotos de alta resolución, música y videos.
valueReminderEmail_serviceRemediation_startupPerformance_line16 = Elimine los archivos de instalación de Windows (equipos actualizados a Windows 10)
valueReminderEmail_serviceRemediation_startupPerformance_line17 = En la ventana de la Limpieza de disco, haga clic en Limpiar los archivos del sistema
valueReminderEmail_serviceRemediation_startupPerformance_line18 = Seleccione la unidad C: y espere mientras la aplicación busca los archivos que va a eliminar.
valueReminderEmail_serviceRemediation_startupPerformance_line19 = Seleccione los archivos de instalaciones previas y temporales de Windows, si están presentes, y haga clic en Aceptar.
valueReminderEmail_serviceRemediation_startupPerformance_line2 = Encuentre e instale software y controladores de hardware actualizados para su equipo.
valueReminderEmail_serviceRemediation_startupPerformance_line20 = Desinstale aplicaciones que no usa
valueReminderEmail_serviceRemediation_startupPerformance_line21 = Busque Windows para eliminar un programa, luego haga clic en Cambiar o eliminar un programa en los resultados.
valueReminderEmail_serviceRemediation_startupPerformance_line22 = Haga clic en una aplicación que ya no necesita, luego haga clic en Desinstalar.
valueReminderEmail_serviceRemediation_startupPerformance_line23 = Visite
valueReminderEmail_serviceRemediation_startupPerformance_line3 = En Windows, busque y abra Windows Update.
valueReminderEmail_serviceRemediation_startupPerformance_line4 = Haga clic en una de las siguientes opciones, si se le presentan, en la ventana de Windows Update:
valueReminderEmail_serviceRemediation_startupPerformance_line5 = Si hay actualizaciones disponibles para descarga, haga clic en Instalar ahora.
valueReminderEmail_serviceRemediation_startupPerformance_line6 = Si no se enumeran actualizaciones en este momento, haga clic en Buscar actualizaciones y luego haga clic en Instalar ahora, después de que Windows detecte las actualizaciones disponibles.
valueReminderEmail_serviceRemediation_startupPerformance_line7 = Realice una limpieza del sistema y del disco duro
valueReminderEmail_serviceRemediation_startupPerformance_line8 = Eliminar archivos innecesarios: Busque en Windows la limpieza de disco
valueReminderEmail_serviceRemediation_startupPerformance_line9 = Haga clic en Limpieza de disco en los resultados
valueReminderEmail_serviceRemediation_storageSpaceHealth_line1 = Libere espacio en el disco duro
valueReminderEmail_serviceRemediation_storageSpaceHealth_line10 = Seleccione la casilla de verificación de Instalaciones anteriores de Windows, y haga clic en Aceptar.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line11 = Aparece un mensaje de advertencia.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line12 = Haga clic en Sí para completar la limpieza de las instalaciones anteriores de Windows.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line13 = En la ventana Windows necesita más espacio, en la Parte A, haga clic en el icono de Actualizar.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line14 = Cuando concluye la actualización, aparece en la Parte A el estatus Completo! Vaya a la Parte B.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line15 = Inserte una unidad flash o conecte una unidad de disco duro externa con 16 GB de espacio de almacenamiento disponible.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line16 = Si no aparece el mensaje Completo! en la Parte A, se necesita más espacio para la actualización de Windows.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line17 = Haga clic en Liberar espacio para eliminar archivos adicionales.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line18 = Haga clic en Continuar.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line19 = En la ventana Casi hemos finalizado, haga clic en Cerrar.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line2 = Para instalar las actualizaciones de la versión Windows 10, usted necesita 10 GB de espacio libre en la unidad de disco duro y una unidad flash USB de 16 GB. La configuración de Windows 10 incluye una opción para eliminar los archivos innecesarios en su unidad de disco duro, directamente en la aplicación Configuración, usando el asistente de Limpieza de disco. Si está disponible, una alternativa para liberar el espacio en disco es almacenar los datos en la nube (en línea).
valueReminderEmail_serviceRemediation_storageSpaceHealth_line20 = En Windows, busque las configuraciones de Windows Update.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line21 = En la lista de resultados, haga clic en las actualizaciones de Windows Update para abrir la ventana de Windows Update.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line22 = Bajo el encabezado Se ha programado un reinicio, elija un momento para reiniciar Windows con el fin de continuar con la actualización o haga clic en Reiniciar ahora para empezar la actualización de inmediato.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line23 = Libere espacio usando la Nube (Almacenamiento en línea)
valueReminderEmail_serviceRemediation_storageSpaceHealth_line24 = Para obtener un rendimiento óptimo, su notebook puede usar el almacenamiento en la nube. Como alternativa a la eliminación de archivos en su equipo para liberar más espacio en el disco duro para la actualización de Windows, puede pasar los archivos a la nube.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line3 = En Windows, busque las configuraciones de Windows Update.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line4 = En la lista de resultados, haga clic en las actualizaciones de Windows Update para abrir la ventana de Windows Update.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line5 = La ventana de Windows Update aparece y se inicia de forma automática la actualización de Windows.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line6 = Windows Update detecta que se necesita más espacio para la actualización y abre la ventana Windows necesita más espacio.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line7 = Haga clic en Liberar espacio.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line8 = En la ventana de Uso de almacenamiento, haga clic en una categoría para eliminar los archivos innecesarios.
valueReminderEmail_serviceRemediation_storageSpaceHealth_line9 = En Windows, busque y abra Limpieza de disco.
